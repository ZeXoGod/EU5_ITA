 #
 # Institutions
 feudalism: "Feudalesimo"
 feudalism_desc: "Nel corso del tempo, molte società sviluppano istituzioni di governo più forti e permanenti. Dopo la caduta dell'Impero Romano, gran parte dell'$europe$ si è gradualmente trasformata in un sistema feudale, una struttura in cui i $peasants_estate$ svolgevano lavori nelle proprietà dei ricchi $nobles_estate$ in cambio di protezione e del diritto di utilizzare quella terra per i propri scopi.\n\nPer ragioni simili, in tutto il mondo si sono formati sistemi paralleli di proprietà terriera e obblighi reciproci, alcuni dei quali hanno radici che risalgono a tempi ancora più remoti del feudalesimo europeo."

 legalism: "Legalismo"
 legalism_desc: "Le teorie alla base del legalismo sono state parte integrante della società cinese per centinaia di anni. Il concetto che leggi severe, autorità centralizzata ed efficienza burocratica portino a uno Stato stabile e prospero con un esercito potente è profondamente radicato in molte ideologie in tutta l'$east_asia$.\n\nMan mano che i mercanti e i migranti facilitavano lo scambio di idee in tutto il mondo, il legalismo entrò nella vasta sfera musulmana, dove divenne parte del rapporto simbiotico tra credenti e sudditi non musulmani.\n\nIn $europe$, il legalismo è emerso dagli ultimi spasimi dell'Impero Romano. Dopo il suo declino, i suoi codici legali sistematici sono stati adattati e trasformati nella giurisprudenza fondamentale per molte nazioni del continente."

 meritocracy: "Meritocrazia"
 meritocracy_desc: "Gli individui di grande prestigio e potere spesso nominano le persone a loro più vicine a posizioni particolarmente influenti.\n\nL'avvento della meritocrazia come istituzione e movimento di pensiero era molto popolare nelle corti della $CHI$. Lì, lo stesso Confucio sosteneva l'idea che chi governa dovrebbe farlo sulla base del merito, non per lo status ereditato. Ciò portò alla sostituzione della tradizionale aristocrazia cinese con una basata esclusivamente sul merito.\n\nLo sviluppo di questa istituzione avrebbe causato ripercussioni oltre i confini del $asia$, raggiungendo infine le corti reali dell'$europe$, anche quelle i cui nobili avevano una presa schiacciante sui meccanismi del potere e dell'autorità."

 renaissance: "Rinascimento"
 renaissance_desc: "I cittadini più ricchi e potenti delle città-stato italiane hanno patrocinato artisti e studiosi che stanno infondendo nuova vita agli ideali classici e all'estetica dei loro antenati greci e romani. Come movimento culturale, il Rinascimento ha già avuto un profondo impatto sulla letteratura, l'arte, la filosofia e la musica della nostra regione. L'umanesimo rinascimentale si è sviluppato in una tradizione intellettuale completa, pronta a permeare tutti gli aspetti della società; un vero umanista rinascimentale è un esperto in tutto, dalla politica e la filosofia all'arte, all'analisi testuale, alla musica e all'architettura.\n\nNuovi ideali per i governanti - così come per i governati - si stanno diffondendo con la stessa rapidità con cui le macchine da stampa possono distribuire copie.\n\nGli ideali rinascimentali sono ora pronti a rimodellare il mondo secondo questi sofisticati principi classici."

 banking: "Sistema Bancario"
 banking_desc: "Il prestito di denaro esiste fin dalla comparsa delle monete metalliche nell'antichità. Tuttavia, la sua disponibilità dipende fortemente dal popolo, dalla cultura o dalla religione dominante di un dato Stato.\n\nNel Medioevo si verificò un cambiamento, incoraggiato dalla rinnovata crescita delle attività commerciali a lungo raggio nel continente eurasiatico e nelle sue periferie. I prestatori di denaro specializzati cominciarono a organizzarsi quando le comunità ebraiche iniziarono ad operare tra il mondo cristiano e quello musulmano. Tuttavia, il boom della domanda di credito che seguì le Crociate nel XII secolo incoraggiò i mercanti delle città-stato italiane a creare strutture più grandi per il prestito di denaro, fondando di fatto le prime istituzioni bancarie, come le case Peruzzi e Bardi.\n\nFurono sviluppati altri strumenti, come le cambiali e le obbligazioni, e dinastie bancarie come i $medici_dynasty$, i $fugger_dynasty$ o i $welser_dynasty$ divennero presto potenti quanto gli Stati."

 professional_armies: "Eserciti Professionistici"
 professional_armies_desc: "Gli eserciti esistono da quando è stata inventata la guerra, molte migliaia di anni fa. Tuttavia, la loro forma è cambiata nel corso dei secoli e diversi tipi di reclutamento e organizzazione si sono sviluppati in culture e periodi diversi.\n\nNel tardo Medioevo, gli eserciti di molte società si basavano su sistemi di leva, con cavalieri e fanti che formavano un nucleo che veniva reclutato stagionalmente. Alcuni stati, tuttavia, erano abbastanza potenti da finanziare eserciti permanenti, composti da soldati professionisti disponibili per il servizio durante tutto l'anno.\n\nQuesto sistema si sviluppò anche in $europe$ dopo lo scoppio della Guerra dei Cent'anni, essendo uno dei principali cambiamenti che promossero una rivoluzione militare nell'età moderna. Aumentare le dimensioni e la qualità degli eserciti professionali, trovando al contempo nuove fonti di reddito per finanziarli, divenne presto una delle principali sfide per i governanti di tutto il mondo."

 new_world: "Nuovo Mondo"
 new_world_desc: "La scoperta del Nuovo Mondo ha inaugurato una nuova era, non solo per i colonizzatori e i colonizzati, ma anche per molte nazioni del Vecchio Mondo, poiché l'espansione coloniale ha portato alla diffusione di nuove risorse e innovazioni, nonché a una più completa comprensione della vastità del nostro mondo. Con la diffusione di nuovi animali, colture, metalli preziosi e malattie in tutto il $atlantic_ocean_continent$, sono stati compiuti i primi passi verso un'economia veramente globale.\n\nCon la mappatura e la documentazione di terre e popoli stranieri, le idee e il dibattito religioso e filosofico sono sempre più influenzati da ciò che abbiamo scoperto nelle società d'oltreoceano. Le grandi menti sentono il bisogno di mettere in discussione ciò che un tempo era accettato come verità e, dal $valladolid$ a Fatehpur Sikri, la natura del mondo è ora oggetto di dibattito."

 printing_press: "Macchina da Stampa"
 printing_press_desc: "La capacità di produrre in serie la parola scritta rivoluzionerà la diffusione delle informazioni e, per molti versi, la società nel suo complesso. Introdotta da individui di talento, come il tipografo veneziano Aldus Manutius, questa nuova arte contribuirà ad alimentare il $renaissance$ rendendo più accessibili i classici tradotti. In seguito, la Riforma trasse grande beneficio dalla possibilità di diffondere pubblicazioni critiche e traduzioni delle Sacre Scritture.\n\nOra che la stampa è maturata come tecnica e si è diffusa in tutta $europe$, centinaia di migliaia di copie di ogni genere di pubblicazione, dagli opuscoli religiosi e politici ai trattati scientifici e alle guide di galateo, circolano nel continente. Con la diffusione sempre più capillare delle tipografie, i governanti hanno trovato difficile contenere la nuova tecnica, poiché la relativa facilità di produzione consente di aggirare la censura trasferendo la propria attività oltre confine o anche solo cambiando il nome sul frontespizio."

 pike_and_shot: "Picca e Fucile"
 pike_and_shot_desc: "Alla fine del XV secolo, nel pieno delle guerre italiane, iniziò a svilupparsi un nuovo tipo di guerra. La diffusione dei picchieri nel tardo Medioevo come alternativa agli uomini d'arme in grado di affrontare con successo le cariche della cavalleria pesante fu accompagnata dallo sviluppo di armi da fuoco portatili, principalmente archibugi a miccia e moschetti. I soldati adottarono una nuova formazione, in cui i picchieri formavano un quadrato, mentre gli archibugieri si dispiegavano ai lati e davanti, cercando riparo dietro o all'interno del quadrato nel caso in cui la formazione entrasse in combattimento ravvicinato. Questo nuovo tipo di formazione, chiamata Pike and Shot, era preferita dai Tedeschi #italic Landsknechts#! e dai Spagnoli #italic Tercios#!, e fu presto adottata da altri eserciti, regnando sovrana sui campi di battaglia dell'$europe$ per quasi due secoli, fino a quando non fu sostituita all'inizio del XVIII secolo dalle formazioni di fanteria in linea armate con nuovi moschetti a pietra focaia muniti di baionette."

 confessionalism: "Confessionalismo"
 confessionalism_desc: "Il Cattolicesimo è stato considerato a lungo un'entità unitaria, ma l'avvento delle varie fedi protestanti ha posto fine a questa situazione. Data la miriade di interpretazioni diverse di ciò che dovrebbe essere la fede, il Cristianesimo è tutt'altro che unito. Ma mentre prima qualsiasi deviazione dagli insegnamenti della Chiesa tradizionale poteva essere facilmente etichettata come eresia, i confini tra le diverse sette sono fortunatamente diventati più sfumati.\n\nDi conseguenza, sia le autorità religiose che quelle secolari hanno mostrato un crescente interesse a definire chiaramente la forma delle loro specifiche dottrine, applicando le loro particolari regole e opinioni su tutti gli aspetti della fede e della vita. Ciò consente loro di avere un controllo più saldo sulla fede della popolazione, ma aumenta anche la differenziazione e quindi l'animosità verso tutte le altre forme di credo."

 global_trade: "Commercio Globale"
 global_trade_desc: "I beni vengono trasportati da un continente all'altro sin dall'antichità. Ma mentre in passato ciò era limitato a un numero prestabilito di rotte e a merci specifiche, come i prodotti manifatturieri provenienti dall'$india$ e dalla $CHI$ che attraversavano il $indian_ocean_continent$ e la Via della Seta, oggi il commercio sta diventando sempre più parte di una rete mondiale più ampia. Con la scoperta delle Americhe, la creazione di rotte marittime intorno al $africa$ e l'attraversamento del $pacific_ocean_continent$, le reti commerciali locali si stanno intrecciando in un'unica rete interconnessa che abbraccia tutto il mondo.\n\nL'$silver$ estratto nelle $andes_region$ viene ora spedito via $europe$ fino alla $CHI$ e all'$india$, il $iron$ estratto e lavorato in $scandinavian_region$ viene venduto in $west_africa$ dai mercanti inglesi, e altri stanno facendo fortuna semplicemente distribuendo $cloth$ e spezie ai commercianti del $south_east_asia$. I mercanti dell'$india$ stanno persino investendo in future iniziative commerciali europee! Forse è ancora presto per parlare di un'economia veramente globale, ma sicuramente i primi semi sono stati piantati."

 artillery_institution: "Artiglieria"
 artillery_institution_desc: "L'invenzione della polvere da sparo in $CHI$ portò allo sviluppo di un dispositivo che avrebbe impiegato la sua potenza di fuoco in guerra: l'artiglieria. Sebbene l'artiglieria si diffuse in tutto l'$europe$ E il $asia$ nel XIII secolo, la sua diffusione come sistema d'arma non avvenne fino al XV secolo, quando i miglioramenti nella lunghezza dei cannoni e nella composizione della polvere da sparo resero l'artiglieria abbastanza potente da rappresentare una minaccia per i castelli e le fortificazioni in pietra comuni in $europe$. Ben presto l'artiglieria sarebbe stata utilizzata non solo negli assedi, ma anche sui campi di battaglia, poiché i cannoni di calibro più piccolo erano abbastanza mobili da poter essere rapidamente dispiegati e utilizzati. La sua evoluzione finale come sistema bellico chiave sarebbe avvenuta nel XVIII secolo, soprattutto dopo che Napoleone ne perfezionò l'uso in momenti cruciali durante le battaglie."

 manufactories: "Manifatture"
 manufactories_desc: "Sebbene una serie di innovazioni tecniche durante il XVI e il XVII secolo aumentò la produzione di alcuni beni, come il $iron$ o i $cloth$, il più grande miglioramento industriale avvenne sotto forma di un'organizzazione ottimizzata. Creando manifatture, spesso al di fuori dei confini cittadini, i capitalisti mercantili potevano sia aggirare le antiche leggi corporative che ostacolavano la produzione di massa, sia sperimentare nuovi modi per aumentare la produzione attraverso l'organizzazione e la specializzazione del lavoro centralizzato. I precursori della successiva industrializzazione furono in grado di aumentare la produzione facilitando l'accesso alle materie prime e organizzando il lavoro su larga scala, piuttosto che investendo in nuovi macchinari costosi. Questo fu di per sé un enorme cambiamento rispetto ai metodi spesso fortemente regolamentati del passato e, insieme ai successivi progressi tecnici, questa nuova modalità di produzione avrebbe rivoluzionato la società."

 scientific_revolution: "Rivoluzione Scientifica"
 scientific_revolution_desc: "Il mondo è più piccolo che mai. L'ascesa del commercio globale e l'espansione dell'industria tipografica hanno portato a un aumento del flusso di idee, consentendo una diffusione più capillare delle conoscenze . Ciò, a sua volta, ha portato a una più approfondita analisi e messa in discussione della realtà del mondo. Ciò che una volta era semplicemente accettato come un dato di fatto ora viene messo in discussione, ciò che era poco compreso ora viene osservato e ciò che era solo supposto è stato verificato.\n\nI recenti progressi in settori come la matematica, la fisica e la biologia sono innegabili, ma la vera rivoluzione è il cambiamento nella percezione e nell'approccio alla scienza stessa e nel nostro modo di comprenderla. La sperimentazione sistematica è la vera rivoluzione scientifica e cambierà completamente la nostra concezione del mondo."

 military_revolution: "Rivoluzione Militare"
 military_revolution_desc: "Il continuo stato di guerra che ha colpito l'$europe$ nel XVI e XVII secolo ha portato a un forte aumento delle dimensioni degli eserciti, una necessità nata dalla crescente autorità dei regimi assolutisti rivali. La fanteria è ora armata in massa con moschetti a pietra focaia, che aumentano notevolmente la loro potenza di fuoco e le loro prestazioni in battaglia grazie all'innovativa formazione in linea, che sostituisce la vecchia formazione $pike_and_shot$.\n\nLe nostre esigenze militari influenzano le capacità dell'amministrazione statale, che continua ad espandersi per gestire la manodopera e le finanze richieste da questo aumento delle dimensioni dell'esercito. Questa pressione ha anche portato allo sviluppo di catene di approvvigionamento per nutrire e sostenere gli eserciti, nonché di depositi intermedi che supportano le forze operative. Il risultato finale di questi progressi sarebbe un'ondata di guerre tra paesi sempre più militarizzati per tutto il XVIII secolo."

 enlightenment: "Illuminismo"
 enlightenment_desc: "Il razionalismo e l'empirismo hanno guadagnato un'incredibile popolarità tra le menti più brillanti dell'epoca. Nelle lettere, nelle pubblicazioni e nei caffè, i giganti intellettuali, dai re agli scienziati, discutono i meriti della tolleranza, della metodologia scientifica avanzata e della diffusione degli ideali dell'Illuminismo a tutta l'umanità. Dalle università e dalle corti dei monarchi illuminati vengono inviate spedizioni per misurare, catalogare e mappare il mondo, in modo da poter comprendere meglio le leggi che governano tutto ciò che ci circonda. Altri pensatori sono più interessati alle leggi della società e cercano di comprendere meglio i diritti dell'uomo.\n\nImprese colossali, come la creazione di un'enciclopedia completa di tutte le conoscenze o di un indice completo di tutte le piante, gli animali e i funghi del mondo, vengono perseguite per il bene superiore dell'umanità. La luce della ragione è stata accesa e molti non si daranno pace finché non sarà portata in tutti gli angoli della terra."

 industrialization: "Industrializzazione"
 industrialization_desc: "L'alba del XVIII secolo ha dato origine a molte nuove istituzioni, mentre cresce la sete di progresso dell'umanità. I progressi nel campo della produzione e della manifattura, così come l'introduzione di macchinari complessi, cambieranno il mondo come lo conosciamo su scala globale. La rivoluzione industriale ha portato cambiamenti permanenti, non solo al commercio e agli affari, ma anche al tessuto sociale di molte nazioni. Invenzioni come il telaio meccanico e il motore a vapore spingeranno le capacità dell'umanità al suo apice più alto mai raggiunto."

 levee_en_masse: "Levée en Masse"
 levee_en_masse_desc: "La guerra è un concetto in continua evoluzione, studiato e migliorato per generazioni e generazioni. Abbiamo assistito all'ascesa di potenti imperi, ciascuno con le proprie ambizioni. Per soddisfare il bisogno di espansione e fornire il carburante necessario per realizzare queste ambizioni, saranno redatte nuove leggi di coscrizione a livello nazionale. Alzeremo eserciti di giovani reclute entusiaste, la cui dimensione lascerà un segno indelebile nella storia."

 local_governor_advance: "$local_governor$"
 local_governor_advance_desc: "$local_governor_desc$"

 colonies: "Colonie"
 colonies_desc: "Sia inviando la nostra gente a stabilirsi in nuove terre, sia imponendo il nostro dominio sugli indigeni nei nostri possedimenti d'oltremare, sia attraverso una combinazione di entrambi, la creazione di una colonia costituisce un punto d'appoggio per il nostro potere che ci consentirà di espandere ulteriormente il nostro controllo - e i nostri confini - in questi territori non rivendicati."

 feudalism_advance: "Feudalesimo"
 feudalism_advance_desc: "Il feudalesimo è un sistema politico basato sul servizio o sul lavoro in cambio del possesso e della coltivazione della terra. È un insieme di diritti e doveri a cui è vincolato ogni membro di un modello sociale strutturato."

 horse_riding_advance: "Equitazione"
 horse_riding_advance_desc: "L'addomesticamento dei cavalli ha rivoluzionato il modo in cui le persone si spostano e trasportano le merci. Inoltre, l'uso dei cavalli in combattimento fornisce ai guerrieri a cavallo non solo un modo più veloce di muoversi, ma anche una posizione più elevata da cui attaccare i nemici o addirittura schiacciarli sotto il peso dei loro destrieri."

 rights_of_man: "Diritti dell'Uomo"
 rights_of_man_desc: "In prima linea nel pensiero rivoluzionario attuale c'è la nozione radicale di uguaglianza per tutti. Filosofi di tutto il mondo hanno collaborato alla stesura di un documento intitolato "Dichiarazione dei diritti dell'uomo e del cittadino", in cui si proclama che questi diritti sono universali e devono essere applicati dalla legge. È probabile che ciò costituisca un ampio stimolo per diffondere i concetti di libertà e democrazia, e faremmo bene a non restare indietro rispetto alle altre nazioni."

 rotherham_plough: "Aratro di Rotherham"
 rotherham_plough_desc: "L'aratro di base in uso in $europe$ è rimasto invariato fin dall'epoca romana. Ora, grazie a un design migliorato, lo stesso aratro può essere reso molto più leggero, riducendo lo sforzo degli animali da tiro e ottenendo così un rendimento maggiore."

 modern_bureaucracy: "Burocrazia Moderna"
 modern_bureaucracy_desc: "Per utilizzare al meglio le terre e i sudditi che controlliamo, dobbiamo ampliare, riorganizzare e professionalizzare la nostra burocrazia. Creeremo organizzazioni dedicate all'amministrazione di aspetti specifici dello Stato, eliminando così la necessità di soluzioni ad hoc.\n\nConsultiamo le nostre università per determinare il modo più efficiente di governare. Nel frattempo, incoraggeremo i nostri giovani nobili a servire lo Stato con la penna piuttosto che con la spada."

 separation_of_powers: "Separazione dei Poteri"
 separation_of_powers_desc: "È apparso un trattato incendiario e anonimo sulla teoria politica. Nonostante gli sforzi per sopprimere il testo, esso si sta diffondendo rapidamente in tutto il mondo. Esso analizza la natura delle varie forme di governo, siano esse monarchie, dispotismi o democrazie, e sostiene una rigorosa separazione dei poteri esecutivo, legislativo e giudiziario.\n\nQuesta separazione proteggerebbe il popolo e limiterebbe il potere monarchico, il che è comprensibilmente una prospettiva molto popolare per molti dei nostri sudditi. Nonostante le sfortunate implicazioni per l'autorità del sovrano, queste idee potrebbero apportare grandi benefici alla nostra nazione."

 measuring_the_world: "Misurazione del Mondo"
 measuring_the_world_desc: "Le nuove scienze ci hanno fornito una serie di modi diversi per descrivere e misurare il mondo che ci circonda. Tuttavia, non possiamo conoscere tutte le risorse che potrebbero essere a nostra disposizione finché non avremo cercato accuratamente minerali in tutte le nostre terre, contato fino all'ultimo suddito e valutato fino all'ultima impresa . Ordiniamo ai nostri esperti accademici di condurre un'indagine approfondita, prima sulla nostra nazione e poi sul mondo intero!"

 the_constitution: "Costituzione"
 the_constitution_desc: "È stato sviluppato un nuovo concetto filosofico chiamato costituzionalismo, in base al quale il governo accetta limiti legali al proprio potere attraverso leggi stabilite piuttosto che governare con decreti arbitrari. Sebbene alcuni possano trovare questa idea intrigante, è ovviamente poco popolare tra i monarchi..."

 absolute_rulership: "Potere Assoluto"
 absolute_rulership_desc: "Molte persone chiedono di avere un ruolo nel governo, ma soprattutto perché vogliono essere ricompensate senza fare troppa fatica. L'idea dell'assolutismo ha recentemente suscitato il nostro interesse, poiché adottarla ci consentirebbe di sbarazzarci di quei parassiti egoisti e di governare da soli..."

 national_sovereignty: "Sovranità Nazionale"
 national_sovereignty_desc: "Le numerose e lunghe guerre della prima metà del XVII secolo hanno portato alla creazione di un sistema diplomatico internazionale basato sull'integrità territoriale degli Stati. Sono gli Stati, piuttosto che i singoli governanti o i raggruppamenti sovranazionali, gli attori sulla scena internazionale, e nessuno Stato ha il diritto di intervenire negli affari interni di un altro."

 military_administration: "Amministrazione Militare"
 military_administration_desc: "Gli eserciti in continua crescita del XVI secolo hanno imposto esigenze altrettanto elevate alle amministrazioni nazionali. Creando un'organizzazione permanente incaricata della strategia e delle operazioni di approvvigionamento militare e mantenendo un numero maggiore di soldati in servizio anche durante l'inverno o in tempo di pace, saremo finalmente in grado di schierare grandi eserciti a costi inferiori e di sostenerli in modo più efficiente."

 early_modern_administation: "Prima Amministrazione Moderna"
 early_modern_administation_desc: "Con il passare del tempo, divenne evidente che una burocrazia più centralizzata, con organi amministrativi gestiti da funzionari istruiti e impiegati direttamente dallo Stato, era una necessità per portare a termine gli ambiziosi progetti dei sovrani dell'età moderna."

 renaissance_thought: "Il Pensiero $renaissance$"
 renaissance_thought_desc: "L'idea di una nobile oligarchia che governa la società non è affatto nuova, esistendo almeno fin dall'epoca romana. Questo sistema rimane radicato nella struttura di molte nazioni e l'idea sta riacquistando popolarità tra coloro che contano..."

 medieval_administration: "Amministrazione Medievale"
 medieval_administration_desc: "Con un'élite militare al governo della nostra società, la fase successiva dello sviluppo consiste nel creare una classe di amministratori colti. In genere, questi ruoli saranno ricoperti da membri del clero."

 impulse_warfare: "Tattica d'Impulso"
 impulse_warfare_desc: "L'introduzione delle truppe di fanteria leggera ha portato a un cambiamento significativo nella guerra. Gli schermagliatori vengono schierati in avanti in ordine sparso per distrarre e molestare il nemico prima dell'attacco principale della fanteria, che viene tipicamente sferrato in formazione a linea o a colonna."

 line_infantry: "Fanteria di Linea"
 line_infantry_desc: "Con l'invenzione delle baionette, ogni moschettiere poteva fungere anche da picchiere. Ciò consentì di rimuovere le picche dall'equipaggiamento della fanteria e fornì alle formazioni di fanteria una maggiore potenza di fuoco."

 gustavian_infantry: "Fanteria Gustaviana"
 gustavian_infantry_desc: "Gustavo Adolfo, sovrano di $SWE$, apportò diverse innovazioni alla sua fanteria che ne migliorarono le prestazioni. Le sue formazioni furono ristrette e rese rettangolari per aumentare il numero di moschetti che potevano sparare in ogni raffica, e l'aggiunta di piccoli pezzi di artiglieria aumentò ulteriormente la loro potenza di fuoco."

 standardisation_of_calibre: "Standardizzazione del Calibro"
 standardisation_of_calibre_desc: "Con la crescente importanza dell'artiglieria sul campo di battaglia, il numero di armi da fuoco continuò ad aumentare. Tuttavia, poiché ogni arma era prodotta separatamente, anche il rifornimento richiedeva un grande sforzo. Nel 1544, nel tentativo di mitigare questo problema, l'imperatore Carlo V dichiarò che ci sarebbero stati solo cinque calibri di armi, mentre il re Enrico II di $FRA$ fissò lo standard dei calibri a sei."

 maurician_infantry: "Fanteria Mauriziana"
 maurician_infantry_desc: "Le dimensioni e la profondità del $spanish_square$ le conferivano resistenza, ma lo rendevano lento e macchinoso da manovrare sul campo di battaglia. Ciò comportava anche che una grande percentuale di soldati rimanesse inattiva durante le battaglie. Maurizio di Nassau, statolder dei $NED$, ridusse il numero totale di uomini nella formazione per renderla più mobile e ne ridusse la profondità, in modo da mantenere la stessa potenza di fuoco e lo stesso valore d'urto."

 spanish_square: "Quadrato Spagnolo"
 spanish_square_desc: "Il Quadrato Spagnolo si è evoluto organicamente dalla formazione $pike_and_shot$. Al suo centro c'era un tradizionale quadrato di picchieri e ad ogni angolo c'era un gruppo di archibugieri. In questo modo, mantenevano la resistenza del tradizionale quadrato di picchieri e la potenziavano con la potenza di fuoco degli archibugi."

 standardized_pikes: "Picche Standardizzate"
 standardized_pikes_desc: "La picca è un'arma straordinariamente semplice da realizzare, ma per trarne il massimo vantaggio, l'intera formazione deve brandire armi di lunghezza e lama simili."

 pike_square: "Quadrato di Picche"
 pike_square_desc: "Durante tutto il Medioevo, il dominio della cavalleria fu messo in discussione da picchieri disciplinati. In battaglie come Bannockburn o Golden Spurs, i picchieri decimarono la cavalleria. Una combinazione di addestramento e disciplina migliorati e l'aggiunta di spadaccini per fornire supporto nel combattimento ravvicinato ha portato questa formazione al massimo della sua efficienza."

 medieval_military: "Esercito Medievale"
 medieval_military_desc: "Nel corso dei secoli passati, gli eserciti di terra sono diventati più professionali e ben organizzati. Sono stati messi in atto sistemi migliori per supportare il mix di soldati di leva e professionisti che ora dominano i campi di battaglia, e la fanteria sta lentamente ma costantemente guadagnando potere, pronta a superare quello della cavalleria."

 insurance_companies: "Compagnie Assicurative"
 insurance_companies_desc: "Un'ulteriore riduzione del rischio è arrivata con lo sviluppo delle assicurazioni. Pagando una piccola somma a un broker assicurativo, i mercanti potevano proteggersi da perdite catastrofiche. Questa riduzione del rischio di investimento ha portato a un conseguente fiorire del commercio."

 the_gold_standard: "Sistema Aureo"
 the_gold_standard_desc: "Il persistente deficit commerciale tra $europe$ e $CHI$ ha causato una carenza di lingotti d'argento non solo in $europe$, ma in tutto il mondo. Il passaggio dalla moneta d'argento a quella d'oro consentirà l'immissione in circolazione di nuove monete e incoraggerà il flusso commerciale in quantità sempre maggiori."

 joint_stock_companies: "Società per Azioni"
 joint_stock_companies_desc: "Con la crescita del commercio, crebbe anche il rischio associato. Era necessario sviluppare nuovi modi per accumulare capitale e gestire questo rischio. Nelle società per azioni, l'onere dell'impresa era condiviso tra i numerosi azionisti."

 public_punishments: "Punizioni Pubbliche"
 public_punishments_desc: "La vita in mare è piena di pericoli e quindi le punizioni devono essere severe. Se i comportamenti scorretti non vengono scoraggiati in modo efficace, ci troveremo rapidamente nei guai. Nel corso del tempo si è evoluto un sistema di punizioni altamente pubbliche e ora è giunto il momento di formalizzare tali procedimenti. Ciò migliorerà notevolmente la disciplina in mare."

 merchants_and_trade: "Mercanti e Commercio"
 merchants_and_trade_desc: "I modelli commerciali erano stati gravemente compromessi, probabilmente a causa di epidemie e pandemie. Ora il commercio sta lentamente iniziando a riprendersi."

 naval_ambitions: "Ambizioni Navali"
 naval_ambitions_desc: "Con una spinta in più al morale della marina, i nostri marinai conquisteranno le onde e domineranno i mari. Nel frattempo, i nostri coloni potranno sfidare gli angoli più bui del mondo, fondando nuovi insediamenti più lontani che mai da casa."

 chartered_companies: "Compagnie Privilegiate"
 chartered_companies_desc: "Il mondo è grande e, per sviluppare il nostro commercio globale, dobbiamo correre dei rischi seri. Fortunatamente nel nostro paese ci sono mercanti disposti a farlo, utilizzando principalmente il proprio capitale. Concedendo a tali compagnie una carta governativa che conferisce loro diritti speciali per esercitare poteri governativi e monopoli in determinate aree, possiamo controllare e incoraggiare lo sviluppo commerciale di tutto, dalle reti di commercio estero ai nostri possedimenti coloniali d'oltremare."

 development_of_maritime_law: "Sviluppo del Diritto Marittimo"
 development_of_maritime_law_desc: "Con sempre più paesi che inviano i propri sudditi o cittadini all'estero per varie iniziative commerciali e con così tante persone che vivono così vicine tra loro per così tanto tempo, è diventato assolutamente essenziale avere almeno un concetto di base delle leggi comuni del mare. Con pubblicazioni come 'Mare Liberum' o la successiva 'De Dominio Maris Dissertatio', sono state gettate le basi per un diritto internazionale del mare."

 basic_financial_instruments: "Strumenti Finanziari di Base"
 basic_financial_instruments_desc: "Il commercio con l'estero è molto rischioso, ma anche altamente redditizio. Lo sviluppo di strumenti finanziari come le lettere di credito contribuirà a ridurre tale rischio e ad aumentare i nostri profitti."

 naval_professionalism: "Professionalizzazione della Marina"
 naval_professionalism_desc: "Fino all'inizio del XVII secolo, le marine permanenti erano piuttosto piccole e anche le potenze marittime più importanti mantenevano per lo più solo una forza navale sufficiente a soddisfare le loro esigenze immediate. Nel corso del tempo, tuttavia, molti Stati hanno iniziato a muoversi nella direzione della creazione di marine professionali più grandi. Se non vogliamo che i nostri rivali ci superino in materia navale, dobbiamo sforzarci di creare una marina permanente più grande con strutture amministrative adeguate a sostenerla. Dovremmo anche garantire che la carriera navale possa essere un'occupazione a vita per i nostri ufficiali."

 superior_ship_design: "Progettazione Navale Migliorata"
 superior_ship_design_desc: "Costruire navi leggermente più veloci di quelle dei nostri avversari, anche se la differenza di velocità è talmente trascurabile da non avere alcun significato militare, può comunque infondere fiducia ai nostri equipaggi e rendere i nostri nemici diffidenti nell'affrontarci in uno scontro alla pari."

 patron_of_art: "Mecenate delle Arti"
 patron_of_art_desc: "La nostra ricerca verso la creazione di una società culturalmente sofisticata inizia qui. Le nostre creazioni artistiche passeranno alla storia come le meraviglie più straordinarie di questa epoca."

 pragmatism: "Pragmatismo"
 pragmatism_desc: "Troppi paesi lasciano che siano le percezioni degli altri Stati a plasmare le loro politiche. È una scelta sciocca: se i mercenari sono più adatti alle nostre esigenze, li useremo invece di investire in un costoso esercito permanente."

 knowledge_transfer: "Trasferimento di Conoscenze"
 knowledge_transfer_desc: "Preservare l'esperienza e la conoscenza dei nostri veterani di guerra è fondamentale per addestrare adeguatamente le nuove reclute. Dobbiamo garantire che coloro che hanno prestato servizio in combattimento trasmettano queste conoscenze ai tirocinanti attraverso un sistema di tutoraggio."

 organised_recruiting: "Reclutamento Organizzato"
 organised_recruiting_desc: "In passato, quando un capitano cercava di riempire i ranghi di un reggimento, il processo di reclutamento richiedeva molto tempo, poiché non molte persone desideravano affrontare una morte certa nei nostri eserciti. Tuttavia, applicando i principi della ragione a questo problema, saremo in grado di elaborare un sistema che consentirà ai combattenti di indossare l'uniforme molto più rapidamente."

 optimism: "Ottimismo"
 optimism_desc: "La vittoria non si conquista solo sul campo di battaglia, ma anche nei salotti. Il nostro progresso della ragione aiuta il nostro popolo a scrollarsi di dosso gli effetti delle battute d'arresto temporanee e a prepararsi invece alla nostra inevitabile vittoria."

 formalized_officer_corps: "Corpo Ufficiali Formalizzato"
 formalized_officer_corps_desc: "Tradizionalmente, i nostri ufficiali militari provengono dalla nobiltà, ma non abbiamo abbastanza persone in quella classe sociale per ricoprire i ruoli necessari. Tuttavia, ci sono molti membri qualificati delle classi inferiori nei nostri eserciti che potrebbero fare al caso nostro: dovremmo considerare la possibilità di promuovere alcuni di loro come ufficiali professionisti."

 deus_vult: "Deus Vult"
 deus_vult_desc: "Unitevi al grido di battaglia delle Crociate - 'Dio lo vuole' - e schiacciate gli eretici!"

 missionary_schools: "Scuole Missionarie"
 missionary_schools_desc: "Sebbene non manchino persone disposte a diffondere la vera fede, la maggior parte di loro finisce per fare più male che bene. Tuttavia, istituire scuole specializzate per formare adeguatamente i missionari garantirà che avremo più persone in grado non solo di diffondere la fede, ma anche di farlo con successo."

 church_attendance_duty: "Obbligo di Frequenza in Chiesa"
 church_attendance_duty_desc: "L'adozione di una politica di frequenza obbligatoria in chiesa sottolineerà l'importanza dei nostri valori e delle nostre credenze religiose e ridurrà al minimo i costi per il mantenimento dell'ordine pubblico."

 divine_supremacy: "Supremazia Divina"
 divine_supremacy_desc: "È della massima importanza liberare la nostra nazione e i confini circostanti dai non credenti che affliggono le nostre terre."

 devoutness: "Devozione"
 devoutness_desc: "La religione è uno dei baluardi più importanti del nostro governo. Mostrando pubblicamente la nostra devozione religiosa, ispireremo il popolo a seguire il nostro esempio e questa diffusione della pietà tra la nostra gente rafforzerà il nostro dominio."

 religious_tradition: "Tradizione Religiosa"
 religious_tradition_desc: "La forza della nostra fede e le impressionanti manifestazioni pubbliche di devozione e culto che mettiamo in scena sono ammirate da altri paesi vicini e lontani. Questo è un chiaro riflesso del prestigio e della gloria del nostro regno."

 ecumenism: "Ecumenismo"
 ecumenism_desc: "Determinare come trattare gli eretici nel nostro regno è sempre complicato. Sebbene il buon vecchio approccio del fuoco e della spada risolva alla fine la maggior parte dei problemi, anche la diplomazia può avere successo. Incoraggiando il dialogo tra le varie sette, possiamo ridurre le incomprensioni e promuovere la pace nel regno."

 advanced_bureaucracy: "Burocrazia Avanzata"
 advanced_bureaucracy_desc: "Ci consente di aumentare il gettito fiscale adottando un sistema amministrativo più burocratico gestito da funzionari statali."

 organised_construction: "Costruzione Organizzata"
 organised_construction_desc: "Migliorare le infrastrutture del nostro governo è un'impresa costosa. Tuttavia, se strutturiamo correttamente il processo, possiamo farlo con una spesa minore."

 smithian_economics: "Economia Smithiana"
 smithian_economics_desc: "Opponendoci al mercantilismo e limitando l'influenza dello Stato nelle questioni economiche, sosterremo un mercato libero che aumenterà la nostra efficienza produttiva complessiva."

 national_bank: "Banca Nazionale"
 national_bank_desc: "Istituendo un'autorità centrale per le questioni finanziarie, avremo un maggiore controllo sull'economia della nostra nazione."

 debt_and_loans: "Debiti e Prestiti"
 debt_and_loans_desc: "Il debito a volte è semplicemente inevitabile. Tuttavia, un mercato del debito organizzato ci consentirà di emettere prestiti a un tasso di interesse più basso."

 centralized_government: "Governo Centralizzato"
 centralized_government_desc: "Se centralizziamo lo Stato, sarà più facile promuovere le idee e l'agenda del centro rispetto alle altre regioni."

 nationalistic_enthusiasm: "Entusiasmo Nazionalistico"
 nationalistic_enthusiasm_desc: "Fornire un sostegno adeguato alle nostre truppe è fondamentale per la difesa nazionale. Grazie alla nostra eccellente amministrazione, siamo in grado di ottenere generosi sconti sulle nostre forniture militari."

 additional_colonists: "Coloni Aggiuntivi"
 additional_colonists_desc: "Il Nuovo Mondo è molte cose, ma la più importante è che è vuoto. Beh, comunque nessuno di importante vive lì. Facendo conoscere alle persone le infinite opportunità che le attendono nel Nuovo Mondo, incoraggeremo più persone ad andare a stabilirsi lì."

 additional_merchants: "Mercanti Aggiuntivi"
 additional_merchants_desc: "Le colonie non ci servono a nulla se non riusciamo a portare le loro ricchezze nella madrepatria. Dobbiamo espandere la nostra classe mercantile per garantire che ciò avvenga."

 faster_colonists: "Coloni più Veloci"
 faster_colonists_desc: "Non si possono semplicemente mandare dei coloni nel Nuovo Mondo e aspettarsi che costruiscano una colonia. Prima c'è un lungo processo di preparazione della spedizione con tutto ciò di cui avranno bisogno per sopravvivere nella loro nuova casa. Ora che abbiamo un po' di esperienza, possiamo accelerare questo processo."

 additional_diplomats: "Diplomatici Aggiuntivi"
 additional_diplomats_desc: "La spinta ad espandere il nostro Paese significa che dobbiamo anche ampliare la nostra influenza diplomatica. Dobbiamo garantire che il nostro servizio diplomatico disponga di personale adeguato."

 improved_shipyards: "Cantieri Navali Migliorati"
 improved_shipyards_desc: "Per difendere i nostri interessi in tutto il mondo, avremo bisogno di una forte [navy|e]. Dobbiamo garantire che i nostri cantieri navali siano in grado di produrre navi il più rapidamente possibile per sostituire eventuali perdite che potremmo subire."

 experienced_diplomats: "Diplomatici Esperti"
 experienced_diplomats_desc: "A volte è sufficiente che le persone #italic credano#! che siamo potenti. Abbiamo lavorato duramente sul nostro servizio diplomatico per garantire che la nostra parola abbia un peso maggiore."

 competetive_merchants: "Mercanti Competitivi"
 competetive_merchants_desc: "Per portare l'attenzione sul nostro commercio, dobbiamo essere in grado di battere la concorrenza degli altri paesi. Dobbiamo garantire che il nostro sistema legale offra ai nostri mercanti ogni possibile vantaggio."

 organised_mercenary_payment: "Pagamenti Organizzati ai Mercenari"
 organised_mercenary_payment_desc: "I capitani mercenari sono molto astuti. Cercheranno di convincere due comandanti dello stesso esercito a fare a gara per aggiudicarsi i loro servizi. Dobbiamo semplificare il nostro processo di reclutamento dei mercenari per evitare questo tipo di inganni e garantire di essere sempre nella posizione migliore durante le trattative."

 benefits_for_mercenaries: "Vantaggi per i Mercenari"
 benefits_for_mercenaries_desc: "I mercenari penseranno sempre prima a se stessi, quindi dobbiamo assicurarci che quelli che assumiamo rimangano con noi. Prendendoci cura delle nostre compagnie mercenarie, queste rimarranno fedeli più a lungo e richiederanno meno compensi monetari diretti."

 organised_mercenary_recruitment: "Reclutamento dei Mercenari"
 organised_mercenary_recruitment_desc: "Il denaro non è l'unico fattore limitante quando si tratta di reclutare mercenari. L'altro ostacolo è trovare compagnie mercenarie che desiderino davvero servire con noi. Pertanto, dobbiamo assicurarci che il nostro sistema consenta a ogni compagnia di unirsi a noi."

 bookkeeping: "Contabilità"
 bookkeeping_desc: "A volte il denaro scarseggia e abbiamo bisogno di prendere in prestito. I prestatori temono sempre di non essere rimborsati. Tenendo registri meticolosi, saremo in grado di garantire che tutti vengano rimborsati, il che ci consentirà di negoziare tassi di interesse più bassi."

 legislative_efficiency_idea: "Efficienza Amministrativa"
 legislative_efficiency_idea_desc: "Il fattore più importante per un governo efficiente è ottenere i consigli giusti. Dobbiamo garantire la massima inclusività possibile quando si tratta di consulenti, in modo da poter massimizzare il numero di punti di vista diversi che ci vengono presentati."

 resilient_state: "Stato Resiliente"
 resilient_state_desc: "Ogni Stato affronta periodi di declino. Questi momenti di debolezza sono spesso quelli in cui gli scontenti e gli emarginati si sentono autorizzati a ribellarsi. Se costruiamo un'amministrazione solida in grado di resistere a questi sconvolgimenti, saremo in grado di riprenderci molto più rapidamente da questa triste situazione."

 war_cabinet: "Gabinetto di Guerra"
 war_cabinet_desc: "La guerra è il momento in cui il paese è più vulnerabile e lo stress causato dai conflitti può compromettere seriamente la capacità di governare. Assicurandoci che i protagonisti della nostra amministrazione siano coinvolti durante i periodi di guerra, possiamo evitare questi problemi."

 aristocracy: "Aristocrazia"
 aristocracy_desc: "L'aristocrazia è una parte fondamentale di qualsiasi monarchia, poiché i nobili che circondano la dinastia reale sono proprio ciò che dà legittimità al monarca. In definitiva, il concetto di sangue reale non può esistere senza il corrispondente concetto di sangue nobile. Pertanto, l'aristocrazia sostiene il monarca, ma in cambio della propria lealtà si aspetta alcuni privilegi, poiché non deve mai essere confusa con la plebaglia comune."

 noble_knights: "Cavalieri Nobili"
 noble_knights_desc: "Il sostegno alla cavalleria richiede un sistema economico che produca un gran numero di cavalli in eccedenza. Se garantissimo i privilegi alla nostra nobiltà, non solo sarebbe molto più felice, ma farebbe gran parte del lavoro necessario per produrre i cavalli di cui abbiamo tanto bisogno. Il nostro giullare di corte lo descriveva come "servizio garantito ai servi"."

 serfdom: "Servi"
 serfdom_desc: "Essere un soldato di fanteria nell'esercito è esattamente una carriera da sogno, con cibo scadente, paga bassa e servizi medici praticamente inesistenti. Pertanto, i tentativi di reclutamento sono spesso inutili. Se legassimo i nostri contadini alla terra, tuttavia, sapremmo sempre esattamente dove trovare reclute."

 noble_officers: "Ufficiali Nobili"
 noble_officers_desc: "La scelta di chi guida le nostre truppe è fondamentale, e i nostri nobili desiderano assicurarsi che venga data loro la precedenza quando si tratta di ricoprire questi ruoli. Ciò darà loro la possibilità di dimostrare il proprio valore affrontando il nemico con le armi bianche, e noi glielo consentiremo."

 local_nobility: "Nobiltà Locale"
 local_nobility_desc: "I nobili sanno di essere semplicemente migliori delle altre persone e daranno la loro lealtà solo a coloro che ritengono degni. Se affermiamo i loro privilegi, ricorderanno naturalmente la nostra generosità e saranno più resistenti alle tentazioni delle potenze straniere."

 international_nobility: "Nobiltà Internazionale"
 international_nobility_desc: "Le relazioni internazionali sono una questione delicata. Alcuni sostengono che la classe mercantile, abituata a trattare con gli stranieri, sia la più adatta a questo compito. Chi la pensa così, tuttavia, ignora i legami di parentela che le nostre famiglie nobili hanno stabilito nel corso degli anni. Dovremmo sfruttare questi legami per aiutare la nostra causa diplomaticamente."

 noble_resilience: "Connessioni Nobili"
 noble_resilience_desc: "I vari gruppi mercenari di questo continente sono spesso guidati da nobili minori. Stringendo amicizia con l'aristocrazia, possiamo usare la loro rete di contatti per cercare gruppi di soldati mercenari più numerosi e più grandi."

 military_traditions: "Tradizioni Militari"
 military_traditions_desc: "La natura della guerra è in continua evoluzione e dobbiamo garantire che anche la percezione del nostro esercito si evolva di conseguenza. Incoraggiando una tradizione di servizio tra la nostra nobiltà, rafforzeremo l'idea che l'alto status sociale si guadagni attraverso la gloria sul campo di battaglia. Sebbene il coraggio e l'abilità nel combattimento rimangano importanti, la vera eccellenza militare risiede ora nella competenza professionale piuttosto che in concetti nebulosi come il valore personale."

 tradition_of_payment: "Pagamenti Puntuali"
 tradition_of_payment_desc: "È sempre forte la tentazione di pagare con un po' di ritardo i soldati di ventura: dopotutto, non si sa mai quali spese impreviste potrebbero presentarsi. Ma noi #italic non lo faremo#!; pagheremo i nostri mercenari esattamente in tempo, e i capitani mercenari lo sapranno e lo ricorderanno."

 abolished_serfdom: "Servitù Abolita"
 abolished_serfdom_desc: "Sappiamo dai resoconti dell'antica Roma che un esercito di cittadini liberi è molto più disposto a combattere di uno composto da uomini costretti. Dovremmo dare ai nostri contadini una relativa libertà; essi combatteranno allora con più fervore per difendere la loro patria e quei privilegi."

 bill_of_rights: "Carta dei Diritti"
 bill_of_rights_desc: "Concedendo ai cittadini alcuni diritti fondamentali, ridurremo la probabilità di una rivolta contadina."

 free_merchants: "Mercanti Liberi"
 free_merchants_desc: "Nelle società più reazionarie e conservatrici, i mercanti sono guardati con disprezzo perché considerati in qualche modo inferiori a chi possiede la terra. Ebbene, questo atteggiamento sciocco non fa per noi; sappiamo che la ricchezza è potere, indipendentemente dalla sua provenienza."

 free_subjects: "Stati Cliente Liberi"
 free_subjects_desc: "Anche se dare una bella bastonata a un servo può essere soddisfacente, sorprendentemente non è il modo migliore per farlo lavorare di più. Qualche filosofo naturalista ha avuto l'idea di rendere il profitto la motivazione principale per i lavoratori. Se sostituiamo i canoni monetari con pagamenti in natura, i nostri contadini saranno incentivati a produrre di più."

 humanist_tolerance: "Tolleranza Umanista"
 humanist_tolerance_desc: "Impegnandoci a creare una società più tollerante e cercando di risolvere i nostri problemi sociali e religiosi in modo più razionale, il rischio di disordini civili sarà ridotto."

 emancipation: "Emancipazione"
 emancipation_desc: "Per molto tempo abbiamo limitato la proprietà terriera solo a coloro che ritenevamo sufficientemente affidabili. Se dovessimo abolire queste restrizioni, la proprietà terriera potrebbe essere consolidata. Ciò a sua volta creerebbe un bacino di manodopera stagionale per la quale la vita militare potrebbe essere interessante."

 dynamic_court: "Corte Dinamica"
 dynamic_court_desc: "Una corte veramente innovativa è quella in cui chiunque può raggiungere una posizione di rilievo. Dobbiamo impegnarci per garantire che le vecchie tradizioni, così come i pregiudizi legati alla nascita o al livello di ricchezza, non ostacolino lo sviluppo della nostra corte né costituiscano un ostacolo per le persone di talento che desiderano servire il nostro Stato."

 innovativeness: "Sete di Conoscenza"
 innovativeness_desc: "La curiosità naturale e il desiderio di comprendere il nostro mondo e il suo funzionamento sono ciò che ci spinge ad andare avanti. Il nostro popolo è desideroso di acquisire conoscenze, ed è proprio questa scintilla nelle loro menti che darà il via al progresso della nostra nazione."

 economic_ideas: "Economia Asservita"
 economic_ideas_desc: "L'economia e la ricchezza di un paese dovrebbero essere al servizio del governo, e non il contrario. Pertanto, è nell'interesse dello Stato accumulare la maggior parte delle risorse, sia per dimostrare il nostro potere sia per attuare meglio la nostra volontà. Solo con questo sistema la nostra nazione potrà prosperare veramente."

 expansionism: "Un Seme tra le Spine"
 expansionism_desc: "Il mondo è enorme e non dovremmo adagiarci sulla nostra posizione al suo interno, perché i nostri vicini non faranno necessariamente lo stesso. Dobbiamo puntare ad espandere i nostri confini e a rafforzarci, per non rischiare di essere fagocitati dai paesi vicini in crescita."

 formal_administration: "Amministrazione Formale"
 formal_administration_desc: "Procedure corrette e un apparato amministrativo ben oliato portano alla prosperità di un paese, poiché senza un'amministrazione adeguata, qualsiasi cosa lo Stato tenti di realizzare rimarrà semplicemente infruttuosa. Formalizzeremo e standardizzeremo la nostra amministrazione, in modo che la volontà dello Stato si diffonda naturalmente in ogni angolo della nazione."

 plutocracy: "Il Potere della Moneta"
 plutocracy_desc: "Ricchezza e potere non sono sinonimi, ma sono certamente correlati: non solo il potere può rendere ricchi, ma anche la ricchezza può garantire il potere. Lo comprendiamo bene, poiché i membri più ricchi della nostra popolazione sono anche quelli che occupano le posizioni di potere nel nostro Paese."

 rebellion_support: "Contatti Segreti"
 rebellion_support_desc: "Questi sono tempi turbolenti e non tutti sono contenti di chi li governa. Contattando questi gruppi insoddisfatti all'estero, potremmo riuscire a convertirli alla nostra causa e persuaderli a incitare una rivolta, che sarebbe uno strumento devastante per destabilizzare i nostri nemici."

 privateers: "Corsari"
 privateers_desc: "Dichiarare guerra al commercio nemico è il massimo nella guerra navale. Incoraggeremo i marinai più incalliti e navigati che riusciremo ad assumere a colpire il cuore del commercio nemico, il che dovrebbe aiutarci a riempire rapidamente le nostre casse."

 vetting: "Controllo di Idoneità"
 vetting_desc: "Poiché molte delle nostre cariche governative sono ricoperte da persone che cercano di fare carriera, a volte ci rendiamo conto che coloro che gestiscono la nostra amministrazione sono suscettibili alle tangenti delle potenze straniere. Effettuando alcuni semplici controlli sui precedenti personali sarà possibile eliminare i funzionari più inclini alla corruzione."

 rumourmongering: "Diffusione di Voci"
 rumourmongering_desc: "I nemici sono vulnerabili su tutti i fronti. Il veleno nell'orecchio destro può essere letale quanto diecimila soldati. Dobbiamo essere pronti a praticare tutte le arti oscure di cui potremmo aver bisogno per vincere..."

 efficient_spies: "Spie Efficienti"
 efficient_spies_desc: "La maggior parte dei contadini venderebbe volentieri la propria madre per dell'oro, ma alcuni hanno abilità e talenti che noi del governo potremmo trovare molto utili per... ah, #italic l'arte di governare#! Sebbene sia difficile trovare questi cittadini comuni meritevoli, grazie all'esperienza stiamo imparando a separare il grano dal loglio."

 shady_recruitment: "Reclutamento Losco"
 shady_recruitment_desc: "La nostra capacità di identificare e reclutare eccellenti agenti dalle classi più basse ha creato un'ottima cortina fumogena: non potremmo mai essere #italic noi#! a costringere questi malfattori a eseguire i nostri ordini segreti! Ed è esattamente quello che volevamo che pensassero..."

 destabilising_efforts: "Tentativi di Destabilizzazione"
 destabilising_efforts_desc: "Le nostre abilità di spionaggio ci consentono di colpire la stabilità stessa dei nemici. Abbiamo il potere di trasformare i loro più grandi amici nei loro nemici..."

 espionage: "Spionaggio"
 espionage_desc: "Ci permette di addestrare più spie e quindi aumentare le nostre possibilità di ottenere informazioni politiche e militari sui nostri nemici."

 foreign_embassies: "Ambasciate Straniere"
 foreign_embassies_desc: "La diplomazia è un delicato equilibrio che ci impone di bilanciare le esigenze e i desideri di più entità contemporaneamente. Mantenere ambasciate in altri paesi che ci riferiscono regolarmente ci fornirà le informazioni necessarie per valutare meglio le nostre opzioni diplomatiche."

 claim_fabrication: "Rivendicazioni Falsificate"
 claim_fabrication_desc: "Rivendicare qualcosa come proprio è facile; convincere tutti gli altri che la propria rivendicazione è valida è molto più difficile. Allargando la nostra rete diplomatica, possiamo garantire che le persone che contano sappiano che abbiamo avanzato questa rivendicazione."

 cabinet: "Gabinetto"
 cabinet_desc: "Istituendo un consiglio esecutivo, siamo in grado di riunire i nostri diplomatici più abili."

 adaptability: "Adattabilità"
 adaptability_desc: "C'è ciò che è nostro e ciò che fa parte del nostro dominio ancestrale che non verrà mai ceduto. Un po' di flessibilità nel definire questi confini 'ancestrali' porterà all'accettazione di più terre come nostro territorio legittimo e, se dovesse verificarsi il peggio, il mondo intero saprà che la nostra crociata per recuperarlo sarà giusta."

 revolution_and_counter: "Rivoluzione e Contro-Rivoluzione"
 revolution_and_counter_desc: "Con la politica del momento che diventa sempre più polarizzata e radicale, potremmo non avere altra scelta che dichiarare guerra ai governi che non sono come il nostro."

 diplomatic_influence: "Influenza Diplomatica"
 diplomatic_influence_desc: "Concentrandoci sulla diplomazia, possiamo aumentare il potere che esercitiamo sulla scena mondiale e conquistare molti amici e potenziali alleati."

 flexible_negotiation: "Negoziazione Versatile"
 flexible_negotiation_desc: "Non è mai possibile prevedere con certezza cosa si potrà ottenere durante i negoziati di pace, quindi dovremmo presentarci con tutte le opzioni aperte."

 agent_training: "Formazione degli Agenti"
 agent_training_desc: "Abbiamo in programma molte operazioni segrete, ma non disponiamo di agenti sufficienti per portarle a termine. Stabilire un metodo di addestramento per le nostre spie contribuirà a rafforzare i ranghi degli agenti disponibili per missioni pericolose."

 additional_loyalist_recruitment: "Reclutamento di Nuovi Lealisti"
 additional_loyalist_recruitment_desc: "Naturalmente, ci sono persone all'interno delle nazioni soggette al nostro dominio che riconoscono il nostro diritto divino di governare. Reclutando e aiutando questi individui illuminati, possiamo rafforzare la nostra presa su questi territori."

 audit_checks: "Ispezioni"
 audit_checks_desc: "Mentre lavoriamo per infiltrarci in altre nazioni, dobbiamo stare attenti alle idee velenose che si diffondono nelle nostre corti. Mettere insieme un team di revisione per assicurarci che i nostri ministri agiscano nell'interesse dello Stato dovrebbe aiutare a sradicare qualsiasi elemento marcio."

 grand_army: "Grande Esercito"
 grand_army_desc: "Ci permette di creare uno degli eserciti più grandi e potenti che il mondo abbia mai visto."

 glorious_arms: "Esercito Glorioso"
 glorious_arms_desc: "La vista del nostro glorioso e prestigioso esercito farà tremare di paura tutti i nostri avversari."

 bayonet_leaders: "Ufficiali in Prima Linea"
 bayonet_leaders_desc: "Gli uomini ben guidati seguiranno, quindi dobbiamo assicurarci che i nostri ufficiali guidino dal fronte."

 battlefield_commisions: "Commissioni Militari"
 battlefield_commisions_desc: "Ci permette di concentrarci maggiormente sui progressi militari e quindi di rafforzare la nostra tradizione militare."

 improved_foraging: "Miglioramento dell'approvvigionamento"
 improved_foraging_desc: "Tradizionalmente, non eravamo in grado di combattere efficacemente in terre che non fornivano cibo a sufficienza. Tuttavia, le nostre truppe sono diventate più abili nell'acquisire cibo in natura, rendendo possibile combattere con eserciti più grandi."

 improved_manuever: "Manovre Migliorate"
 improved_manuever_new: "Aggiramento Migliorato"
 improved_manuever_desc: "Il posizionamento tattico è un'abilità fondamentale per qualsiasi comandante. La capacità di manovrare efficacemente le truppe sul campo di battaglia ci darà un vantaggio significativo."

 engineer_corps: "Corpo degli Ingegneri"
 engineer_corps_desc: "Ci permette di riunire le menti tecnologiche più brillanti della nostra nazione e di avvalerci dei loro servizi senza pari."

 military_drill: "Esercitazioni Militari"
 military_drill_desc: "Ci permette di investire nell'addestramento militare e quindi di migliorare le formazioni di battaglia, l'uso delle armi e il morale del nostro esercito."

 regimental_system: "Sistema Reggimentale"
 regimental_system_desc: "Organizzando i nostri eserciti in reggimenti legati a specifiche aree geografiche, consentiamo loro di mettere radici nelle comunità locali. Successivamente, dovremo reclutare battaglioni aggiuntivi per questi reggimenti, ma grazie ai legami regionali il reclutamento sarà più rapido."

 defensive_mentality: "Mentalità Difensiva"
 defensive_mentality_desc: "C'è chi pensa che l'attacco sia la migliore forma di difesa, ma è un'idea sciocca. Lasciamo invece che siano i nostri nemici a venire da noi; li contrasteremo con incredibile zelo. Le nostre truppe difenderanno tenacemente le loro case e le nostre fortezze resisteranno più a lungo agli assedi."

 superior_firepower: "Potenza di Fuoco Superiore"
 superior_firepower_desc: "L'uso di una potenza di fuoco massiccia per destabilizzare il nemico prima di sferrare il colpo di grazia è uno dei punti di forza del nostro esercito e faremo in modo che i nostri leader lo sappiano."

 supply_trains: "Convogli di Rifornimento"
 supply_trains_desc: "Durante una campagna militare, l'attrito è il nostro nemico più temibile e la chiave per difendere i nostri uomini da esso è una rete logistica ben pianificata ed efficiente, in grado di fornire ampio supporto e rifornimenti."

 national_conscripts: "Coscritti Nazionali"
 national_conscripts_desc: "Aumenta il numero dei nostri militari rendendo obbligatorio il servizio militare per coloro che ne hanno diritto."

 shrewd_commerce_practice: "Commercio Accorto"
 shrewd_commerce_practice_desc: "Ci consente di avvalerci di pratiche commerciali più raffinate, dando ai nostri mercanti un vantaggio sui nostri concorrenti."

 free_trade: "Libero Scambio"
 free_trade_desc: "Le nostre principali famiglie di mercanti desiderano assicurarsi privilegi commerciali come loro esclusiva prerogativa, ma noi non siamo disposti a farlo e consentiremo quindi la crescita della classe mercantile."

 merchant_adventures: "Iniziative Mercantili"
 merchant_adventures_desc: "Questo ci permette di avvalerci dei numerosi commercianti desiderosi di fama e fortuna, desiderosi di offrire i propri servizi per avere la possibilità di cercare ed esplorare nuove rotte commerciali."

 national_trade_policy: "Politica Commerciale Nazionale"
 national_trade_policy_desc: "Adottando una politica commerciale nazionale, possiamo rafforzare la nostra presenza commerciale e aumentare l'efficacia dei nostri scambi."

 overseas_merchants: "Mercanti Esteri"
 overseas_merchants_desc: "Per espandere il commercio, dobbiamo estendere i diritti di cittadinanza alle persone che vivono all'estero, sostengono il nostro commercio e appartengono alla giusta classe sociale."

 trade_manipulation: "Manipolazione Commerciale"
 trade_manipulation_desc: "In quei punti chiave in cui la supremazia commerciale potrebbe andare in un senso o nell'altro, superare la concorrenza regionale è fondamentale per espandere il nostro reddito commerciale."

 fast_negotiations: "Negoziazioni Rapide"
 fast_negotiations_desc: "A volte la chiave per concludere un accordo commerciale è essere i più veloci. Dobbiamo garantire che i nostri mercanti possano sempre concludere con successo i loro affari."

 colonial_ventures: "Iniziative Coloniali"
 colonial_ventures_desc: "Ci consente di inviare più coloni in terre inesplorate."

 quest_for_the_new_world: "La Ricerca del Nuovo Mondo"
 quest_for_the_new_world_desc: "Ci permette di unirci alle nazioni che intendono esplorare il mondo al di fuori dei propri confini o di cercare di essere la prima nazione a circumnavigare il globo, intraprendendo una ricerca del Nuovo Mondo."

 overseas_exploration: "Cercatori di Fortuna"
 overseas_exploration_desc: "Fondare colonie in terre lontane è quasi sempre un viaggio di sola andata per chi vi partecipa. Anche se non si viene colpiti da strane malattie sconosciute o non si muore di fame a causa di un terreno inospitale, il tempo necessario per tornare indietro significa che molto probabilmente non si tornerà mai a casa. Sebbene queste realtà possano scoraggiare alcuni, se ricordiamo alle persone le potenziali ricchezze che si possono ottenere dalla vita coloniale, possiamo incoraggiarle a stabilirsi in terre più lontane nonostante i pericoli."

 land_of_opportunity: "Terra delle Opportunità"
 land_of_opportunity_desc: "Descrivendo le nostre colonie e le terre circostanti non rivendicate come luoghi in cui chiunque può fare fortuna, aumenteremo rapidamente l'emigrazione verso i nostri possedimenti coloniali. Ciò significa che la nazione spenderà meno soldi per incoraggiare le persone ad andare lì."

 vice_roys: "Viceré"
 vice_roys_desc: "Ci permette di nominare viceré, migliorando così l'amministrazione delle nostre colonie e aumentando la quantità di denaro che generano."

 free_colonies: "Colonie Libere"
 free_colonies_desc: "Solo poche persone sono disposte a trasferirsi all'estero per espandere il nostro grande impero coloniale. Tuttavia, la promessa di un appezzamento di terreno da coltivare in proprietà libera incoraggerà molte più persone a cercare fortuna all'estero. Il bello è che c'è terra in abbondanza per tutti!"

 global_empire: "Impero Globale"
 global_empire_desc: "Il nostro impegno nei confronti dell'impero coloniale ha trasformato l'atteggiamento nei confronti del lavoro nell'amministrazione coloniale. Non più visto come un rifugio per corsari in cerca di fortuna, è ora considerato una carriera prestigiosa per i più brillanti e i migliori. Questo cambiamento si riflette in una riscossione delle imposte più efficiente."

 formal_diplomacy: "Diplomazia Formale"
 formal_diplomacy_desc: "In un momento in cui il potere sta passando dalle mani di individui potenti al controllo di un'autorità centralizzata, è saggio costruire ponti e aprire canali di comunicazione tra noi e i nostri vicini. La diplomazia è fondamentale, ora più che mai di fronte a queste potenze emergenti."

 explorer_commisions_advance: "Commissioni di Esplorazione"
 explorer_commisions_advance_desc: "Oltre le nostre coste si trovano terre inesplorate, pronte per essere conquistate! Recluteremo coraggiosi esploratori per salpare verso l'ignoto e riportare indietro merci esotiche. Si tratta di un'opportunità vitale e potenzialmente molto redditizia per noi."

 offensive_army: "Esercito Offensivo"
 offensive_army_desc: "L'era della polvere da sparo e delle innovazioni militari è alle porte e con essa arriva un rinnovato interesse e una nuova vitalità nella conduzione della guerra. Per accrescere la nostra gloria, dobbiamo garantire con diligenza standard elevati per le nostre forze armate offensive."

 defensive_army: "Esercito Difensivo"
 defensive_army_desc: "L'ascesa di molti potenti Stati intorno a noi ha accelerato la nostra necessità di una forza difensiva robusta, poiché intendiamo mantenere la nostra integrità territoriale. La conoscenza del territorio della nostra patria, dei sentieri nascosti e delle tattiche regionali ci aiuterà a superare questo periodo turbolento."

 national_trade: "Commercio Nazionale"
 national_trade_desc: "Tessuti, lana e altre merci ricercate hanno fatto il loro ingresso in tutto il mondo. In un'epoca in cui il commercio di una nazione raggiunge lidi lontani, dobbiamo assicurarci che i nostri mercanti abbiano sempre un vantaggio!"

 exploration: "Idee di Esplorazione"
 exploration_desc: "La nostra superiorità navale ci consente di proiettare il nostro potere ben oltre i nostri orizzonti, estendendo la nostra naturale rivendicazione su terre lontane come nostre per diritto di scoperta."

 superior_seamanship: "Competenza Nautica Superiore"
 superior_seamanship_desc: "Ci consente di trasformare la nostra marina in una forza navale suprema con navi di prima classe e capitani ed equipaggi altamente qualificati."

 naval_glory: "Gloria Navale"
 naval_glory_desc: "La vista impressionante della nostra gloriosa marina farà tremare di paura tutti i nostri avversari!"

 grand_navy: "Grande Flotta"
 grand_navy_desc: "Ci permette di creare una delle marine più grandi e potenti che il mondo abbia mai visto."

 sea_hawks: "Falchi di Mare"
 sea_hawks_desc: "Ci permette di concentrarci fortemente sui progressi militari, aumentando così la nostra tradizione navale."

 excellent_shipwrights: "Costruttori Navali Eccellenti"
 excellent_shipwrights_desc: "Riunendo i migliori costruttori navali che la nostra nazione ha da offrire, siamo in grado di costruire una marina militare composta da navi moderne senza pari in termini di maestria artigianale e manovrabilità."

 naval_fighting_instruction: "Addestramento al Combattimento Navale"
 naval_fighting_instruction_desc: "Permette ai nostri veterani navali di ideare nuovi metodi per migliorare l'efficienza della nostra marina militare nei blocchi."

 press_gangs: "Arruolamento Forzato"
 press_gangs_desc: "La vita in mare è dura e spietata, e non tutti sono entusiasti di intraprendere una carriera navale. Legalizzando l'arruolamento forzato di marinai e altri naviganti qualificati, sarà più facile equipaggiare le nostre navi, accelerando anche il processo di messa in servizio delle navi."

 quality_education: "Forze ben Addestrate"
 quality_education_desc: "Il momento più cruciale per qualsiasi esercito arriva dopo la battaglia. Che vincano o perdano, le truppe sono più vulnerabili quando sono esauste. Dobbiamo garantire che le nostre truppe siano altamente addestrate e possano riprendersi facilmente dal combattimento, affinché i nostri nemici non approfittino dei nostri momenti di debolezza."

 finest_of_horses: "I Cavalli Migliori"
 finest_of_horses_desc: "Con quanta stabilità quelle truppe conquistano il terreno! Con quanta bellezza si schierano quelle cavallerie! Cavalli pregiati con cavalieri ben addestrati sono il segno distintivo di qualsiasi forza combattente moderna, e i nostri sono particolarmente impressionanti."

 oak_forests_for_ships: "Foreste di Querce per le Navi"
 oak_forests_for_ships_desc: "Più le nostre navi sono resistenti, più possono infliggere danni. Assicuriamoci di avere una scorta pronta del miglior rovere stagionato per le nostre navi da guerra."

 private_to_marshal: "Da Soldato a Maresciallo"
 private_to_marshal_desc: "Ogni soldato semplice ha un bastone da maresciallo nella sua borsa. Per coloro che si distinguono in battaglia, seguiranno promozioni e ricompense. Le truppe lo sanno e ne traggono ispirazione."

 naval_drill: "Esercitazione Navale"
 naval_drill_desc: "La confusione del combattimento può rendere una nave da guerra inutilizzabile per molto tempo. Un equipaggio ben addestrato si riprenderà molto più rapidamente di uno normale."

 merchant_marine: "Marina Mercantile"
 merchant_marine_desc: "Che ogni nave mercantile sventoli con orgoglio il nostro emblema e sappia che la nostra marina sarà sempre lì a proteggerla, se necessario."

 massed_battery: "Cannoni Concentrati"
 massed_battery_desc: "Concentriamo la nostra artiglieria in un'unica grande batteria. La sua potenza distruttiva aprirà un varco nelle linee nemiche!"

 benefits_for_horseowners: "Vantaggi per i Proprietari di Cavalli"
 benefits_for_horseowners_desc: "La vita costa poco, ma i cavalli sono costosi. Se istituiamo un sistema di benefici per chi possiede cavalli, avremo più scelta quando se ne presenterà la necessità."

 the_old_and_infirm: "Il Vecchio e l'Infermo"
 the_old_and_infirm_desc: "I nostri sergenti veterani sono tra gli uomini più spregevoli e corrotti che si possano immaginare, ma ciò non significa che siano inutili. Invece di lasciarli mendicare per le strade una volta terminato il loro servizio, possiamo mettere questi vecchi lupi al lavoro. Li trasformeremo in sergenti istruttori e quartiermastri, in modo da poter sfruttare le loro abilità uniche."

 the_young_can_serve: "I Giovani Possono Servire"
 the_young_can_serve_desc: "Quanti anni deve avere un ragazzo prima di diventare un uomo? Quanti anni deve avere prima di poter morire per il suo Paese? Alcuni governanti sono schizzinosi; noi, invece, siamo macellai che garantiscono pari opportunità."

 enforced_service: "Servizio Obbligatorio"
 enforced_service_desc: "Il principio del volontariato è alla base dell'intera struttura del nostro esercito, ma a volte semplicemente non ci sono abbastanza coscritti disponibili. Dovremmo costringere... ehm, #italic incoraggiare#! le persone a offrirsi volontarie."

 ships_penny: "Tributo Navale"
 ships_penny_desc: "Le navi sono costose da costruire e mantenere. Imponendo un penny navale, una piccola tassa sulle attività commerciali o portuali, possiamo garantire che la nostra flotta rimanga forte senza prosciugare il nostro tesoro."

 standardized_artillery: "Artiglieria Standardizzata"
 standardized_artillery_desc: "Ogni fonditore di ferro custodisce gelosamente i propri segreti e le proprie tecniche, trattando ogni cannone come un'opera d'arte su misura. Anche se questo può lusingare il loro ego, è tutt'altro che ideale quando cerchiamo di ordinare munizioni. d'ora in poi, insisteremo affinché tutti i cannoni siano realizzati secondo le nostre specifiche precise. Ciò dovrebbe ridurre i costi e migliorare la produzione."

 mass_army: "Esercito di Massa"
 mass_army_desc: "Finora siamo stati molto selettivi riguardo a chi potesse prestare servizio come membro arruolato nel nostro esercito. Abbiamo preso solo i più poveri e i più disperati, in pratica le persone che nessuno avrebbe rimpianto. Ora, però, apriremo i ranghi a tutti coloro che desiderano prestare servizio e non hanno una ricchezza significativa di cui parlare."

 mercenary_contracts: "Contratti Mercenari"
 mercenary_contracts_desc: "Stipulando contratti permanenti con capitani mercenari selezionati, possiamo assicurarci di avere sempre a disposizione un ampio bacino di mercenari da cui attingere, qualora fossero necessari."

 local_traditions: "Tradizioni Locali"
 local_traditions_desc: "Governare una grande nazione significa governare popoli diversi, ciascuno con i propri costumi e tradizioni. Incorporando queste tradizioni nel nostro codice ufficiale di leggi, creeremo una popolazione più felice e più fedele."

 indirect_rule: "Governo Indiretto"
 indirect_rule_desc: "A volte il modo migliore per convincere le persone a fare ciò che vuoi è far loro credere di aver avuto voce in capitolo. Un sistema di governo indiretto come questo ridurrà i disordini nelle province appena acquisite, dando loro l'impressione di avere più autodeterminazione di quanta ne abbiano in realtà."

 cultural_ties: "Legami Culturali"
 cultural_ties_desc: "Culture diverse hanno costumi diversi e, per qualche motivo, tendono a resistere ai tentativi dei loro governanti di cambiare tali costumi. Possiamo trasformare questa debolezza in un punto di forza incorporando i leader locali nel nostro sistema di governo e facendo sì che eseguano la nostra volontà in un modo che sia gradito al loro popolo."

 benevolence: "Benevolenza"
 benevolence_desc: "La nostra nazione è un baluardo di tolleranza e illuminismo. Facendo in modo che tutte le altre nazioni lo sappiano, possiamo promuovere migliori relazioni con l'estero."

 establish_cadet_branches: "Istituzione di Rami Cadetti"
 establish_cadet_branches_desc: "L'eredità può essere una questione delicata. Definendo chiaramente i ruoli e i diritti della nostra dinastia attraverso i rami cadetti, possiamo garantire una linea di successione più stabile."

 tribute_system: "Sistema di Tributi"
 tribute_system_desc: "Rafforzare le nostre entrate istituendo un sistema formalizzato di tributi annuali da parte dei nostri vassalli."

 integrated_elites: "Élite Integrate"
 integrated_elites_desc: "Coinvolgendo l'élite al potere delle nazioni soggette nel nostro governo, possiamo semplificare notevolmente il processo di integrazione delle loro province."

 state_propaganda: "Propaganda di Stato"
 state_propaganda_desc: "Come per un uomo, la reputazione di una nazione è tutto, e l'istituzione di un servizio di propaganda ufficiale garantirà che il nostro buon nome non venga infangato dalle menzogne dei nostri nemici."

 postal_service: "Servizio Postale"
 postal_service_desc: "Date le attuali condizioni delle comunicazioni, è difficile garantire che i nostri dispacci diplomatici arrivino in modo tempestivo. La creazione di una rete di uffici postali e stazioni di posta renderà più facile far sentire la nostra voce in terre lontane."

 marcher_lords: "Signori delle Marche"
 marcher_lords_desc: "Concedendo una notevole autonomia ai vassalli delle regioni di confine, questi 'Signori delle Marche' saranno in grado di radunare grandi eserciti militari per sostenerci nelle nostre guerre."

 boarding_parties: "Squadre di Abbordaggio"
 boarding_parties_desc: "Insegnando ai nostri ufficiali di marina a condurre azioni di abbordaggio contro le navi nemiche, possiamo ottenere un vantaggio nei combattimenti navali anche quando affrontiamo nemici superiori [navies|e]."

 improved_rams: "Arieti Migliorati"
 improved_rams_desc: "L'idea di dotare le navi da guerra di speroni risale a migliaia di anni fa, ma da allora sono stati compiuti grandi progressi nella metallurgia e dovremmo approfittarne per creare speroni più resistenti."

 naval_cadets: "Cadetti Navali"
 naval_cadets_desc: "Promuovendo la marina come scelta professionale ideale per i secondogeniti e i terzogeniti dell'aristocrazia, possiamo creare un corpo professionale di ufficiali navali che supervisionino i nostri artiglieri."

 copper_bottoms: "Rivestimento in Rame"
 copper_bottoms_desc: "Il legno può essere il materiale ideale per la costruzione navale, ma tende a deteriorarsi nel tempo. Rivestendo le nostre navi con una corazza di rame sotto la linea di galleggiamento possiamo ridurre questo deterioramento, consentendo loro di resistere meglio ai lunghi viaggi."

 escort_ships: "Corvette"
 escort_ships_desc: "Le corvette sono una classe di piccole navi da guerra progettate per scortare le navi amiche e molestare il nemico, facendo affidamento sulla velocità e sulla manovrabilità piuttosto che sulla potenza di fuoco concentrata."

 national_arsenal: "Arsenale Nazionale"
 national_arsenal_desc: "Creando un arsenale nazionale dove le nostre navi da guerra possano essere costruite e mantenute secondo standard uniformi, potremo disporre di una marina militare più grande."

 garrison_conscription: "Guarnigioni di Leva"
 garrison_conscription_desc: "Arruolando i nostri giovani cittadini abili per le nostre guarnigioni, possiamo garantire di avere abbastanza guardie per difendere i nostri confini."

 expanded_supply_trains: "Convogli di Rifornimento Ampliati"
 expanded_supply_trains_desc: "Investire maggiori risorse nei nostri treni di rifornimento consentirà al nostro esercito di operare per periodi di tempo più lunghi in territorio ostile."

 sheltered_ports: "Porti Riparati"
 sheltered_ports_desc: "È un fatto spiacevole che le navi tendano a subire danni durante le battaglie, ed è altrettanto spiacevole che tali danni raramente possano essere riparati in mare. Per alleviare questo problema, creeremo un sistema di porti riparati lungo la nostra costa dove le nostre navi potranno ripararsi."

 diplomatic_corps: "Corpo Diplomatico"
 diplomatic_corps_desc: "Attraverso l'istituzione di un corpo diplomatico professionale, garantiremo che le conoscenze acquisite con fatica dai diplomatici più anziani vengano trasmesse alle generazioni più giovani."

 civil_servants: "Funzione Pubblica"
 civil_servants_desc: "L'istituzione di un servizio civile composto da giovani burocrati motivati ci consentirà di adattarci rapidamente ai nuovi progressi nell'amministrazione e nella governance."

 free_cities: "Città Libere"
 free_cities_desc: "Concedere alle nostre città l'autogoverno in materia di commercio ci consentirà di aprire nuove e redditizie rotte commerciali."

 preaching_missions: "Missioni di Predicazione"
 preaching_missions_desc: "Istituire spedizioni missionarie che garantiranno che la nostra popolazione professi l'unica vera fede."

 marine_regiments: "Reggimenti di Fanti di Marina"
 marine_regiments_desc: "I marines sono unità militari specializzate in operazioni anfibie. Possono essere utilizzati per razziare le coste e abbordare le navi nemiche, pur continuando a combattere anche sulla terraferma."

 discipline_drills: "Esercitazioni Disciplinate"
 discipline_drills_desc: "Durante il combattimento, solo tre cose contano: la potenza di fuoco, la forza lavoro e la disciplina necessaria per combinare le due cose. Esercitazioni e addestramenti militari regolari elevano il nostro esercito a un nuovo standard."

 open_levy_standards: "Ampliamento dei Criteri di Leva"
 open_levy_standards_desc: "Cosa spinge un uomo a combattere e morire per il proprio Paese? È la sua fede? La lealtà alla sua nazione? O è semplicemente il desiderio di proteggere la sua famiglia? alla fine, la risposta non ha importanza, poiché tutti hanno il dovere di servire sotto la nostra bandiera."

 influence: "Diplomazia della Pressione"
 influence_desc: "Per porre fine a una guerra sono necessari negoziati tra le due parti in conflitto, ma a volte una delle due si dimostra troppo ostinata per accettare la sconfitta. In questi casi, l'arte della pressione diplomatica, ricordando gentilmente loro la potenziale imminente distruzione, li motiverà ad accettare più facilmente le nostre generose condizioni."

 divine_passion: "Passione Divina"
 divine_passion_desc: "I tempi stanno cambiando. La fede era un tempo la cosa più importante nella nostra vita, ma ora idee un tempo considerate blasfeme si stanno diffondendo tra la gente comune. Di fronte a un mondo in evoluzione, il nostro clero trova conforto nella sua incrollabile dedizione alla nostra causa."

 servants_of_god: "Servitori di Dio"
 servants_of_god_desc: "Essere un ingranaggio di questa macchina celeste è un grande onore; il nostro popolo trova uno scopo profondo nel servire la volontà di Dio. Questa convinzione di servire collettivamente uno scopo divino fa battere il cuore del nostro popolo con fragoroso entusiasmo."

 by_the_grace_of_god: "Per Grazia di Dio"
 by_the_grace_of_god_desc: "Il mondo è stato creato con le fiamme e nelle fiamme finiremo tutti. Il nostro dio ha donato il fuoco della vita a noi umili mortali, bruciando le nostre anime nel processo e facendoci vedere la verità del suo pericolo. Non temere."

 state_of_clerics: "Stato Clericale"
 state_of_clerics_desc: "La natura di una teocrazia risiede nella sua vicinanza al divino. Per raggiungere questa vicinanza, molte azioni del nostro governo sono svolte dal clero, che combina i rituali religiosi con i doveri burocratici degli amministratori."

 friends_in_high_places: "Amici nelle Alte Sfere"
 friends_in_high_places_desc: "C'è solo un percorso che ci condurrà alla felicità eterna e immortale. Conoscere il divino significa anche conoscere i suoi sacri agenti su questa Terra, che ci aiuteranno a trovare quel percorso."

 flesh_is_weak: "La Carne è Debole"
 flesh_is_weak_desc: "La carne può essere debole e corruttibile, ma l'anima non lo è. I nostri eserciti hanno imparato a combattere come se condividessero la stessa anima, e quindi il loro morale non può mai essere spezzato."

 alpha_and_omega: "Alfa e Omega"
 alpha_and_omega_desc: "Il nostro Dio è l'inizio e la fine di tutte le cose. La sua voce sarà l'unico suono che i nostri nemici udranno al di sopra delle urla della battaglia. La sua natura pia li condurrà tra le sue braccia accoglienti. Allora vedranno la verità.
 conviction_of_sin: "Condanna del Peccato"
 conviction_of_sin_desc: "Coloro che hanno commesso il male cadranno in ginocchio sotto il peso della loro malvagità! Le loro azioni malvagie li perseguiteranno per sempre e non troveranno pace finché non avranno espiato gli incubi che essi stessi hanno causato."

 martyrs: "Martiri"
 martyrs_desc: "Un martire è qualcuno che capisce che morire per la propria fede è il più grande degli onori. Il popolo della nostra terra tiene la fede nel proprio cuore ed è sempre pronto a unirsi alla nostra causa. Se muoiono da martiri, è un onore e non una tragedia."

 cultural_acceptance_advance: "Accettazione Culturale"
 cultural_acceptance_advance_desc: "È evidente che, man mano che assorbiamo altri popoli nella nostra nazione, le tradizioni straniere che essi portano con sé possono causare attriti con le nostre. Un modo per risolvere questo problema è semplicemente tollerare tali stranieri come se fossero nostri parenti, senza cercare di sottometterli alla nostra cultura."

 unlock_traditional_galley_advance: "$n_traditional_galley$"
 unlock_traditional_galley_advance_desc: "$n_traditional_galley_desc$"

 hollander_beater: "Battitore Olandese"
 hollander_beater_desc: "Per secoli, le cartiere hanno fatto affidamento su martelli meccanici per battere la pasta di carta grumosa, frantumando le fibre per creare la materia prima necessaria alla produzione della carta. Utilizzando i mulini a vento locali come fonte di energia, artigiani intraprendenti hanno ora ideato una soluzione più efficiente: il "Hollander Beater", un' e a vasca contenente un rullo orizzontale alimentato dal vento con delle lame. Queste lame sono in grado di sminuzzare in poche ore la stessa quantità di pasta che i vecchi martelli riuscivano a sminuzzare in giorni."

 faceting: "Sfaccettatura"
 faceting_desc: "I maestri tagliatori di gemme hanno fatto una scoperta rivoluzionaria nel taglio dei diamanti sperimentando la polvere di diamante sospesa nell'olio sui loro scaif. Ciò consente agli artigiani di tagliare le pietre in forme completamente nuove e con una brillantezza molto maggiore. La tecnica risultante, nota come sfaccettatura, produce una pietra dalla forma geometrica gradevole e con migliori qualità ottiche. Man mano che le nuove pietre e la tecnica per tagliarle si diffondono nelle corti e nelle botteghe, la domanda di gioielli e pietre preziose aumenta notevolmente."

 maritime_decay_advance_disc: "Percorsi Consolidati"
 maritime_decay_advance_disc_desc: "I mari sono costantemente solcati da mercanti desiderosi di ottenere il massimo profitto. Ciò porta naturalmente alla creazione di rotte più consolidate e frequentate rispetto ad altre, con quelle più popolari che vedono un flusso costante di navi che vanno e vengono."

 rgo_logistics_discovery: "Magazzini Locali"
 rgo_logistics_discovery_desc: "Se i mercanti e gli artigiani potessero accedere ai prodotti di cui hanno bisogno a livello locale, ciò non solo alleggerirebbe il loro lavoro, ma impedirebbe anche che i prezzi diventassero eccessivamente alti. A tal fine, i magazzini fungeranno da centri di distribuzione locali per soddisfare le esigenze di tutti."

 port_cost_distance_from_capital_advance: "Capitani Esperti"
 port_cost_distance_from_capital_advance_desc: "Non tutti i furfanti sono degni di essere capitani; solo i più esperti e abili tra loro guideranno le nostre navi. Questi lupi di mare dovrebbero essere in grado di ritrovare la strada per tornare in porto in sicurezza anche nelle tempeste più violente."

 land_morale_attrition_cost_advance: "Addestramento di Marcia"
 land_morale_attrition_cost_advance_desc: "È normale che gli eserciti debbano marciare per lunghe distanze per raggiungere il nemico. Pertanto, le lunghe marce sono un elemento fondamentale del nostro addestramento militare, che abitua i nostri combattenti a percorrere lunghe distanze e ad arrivare comunque freschi alla battaglia."

 land_morale_movement_cost_advance_disc: "Marcia Coordinata"
 land_morale_movement_cost_advance_disc_desc: "Un esercito in movimento è vulnerabile e soggetto a disorganizzazione. Addestrare le nostre truppe a marciare in modo organizzato e coordinato garantisce che mantengano le loro formazioni di battaglia, anche se attaccate mentre sono in movimento."

 trade_through_owned_disc_advance: "Itinerari Commerciali"
 trade_through_owned_disc_advance_desc: "I mercanti raramente rimangono fermi in un posto, cercando sempre di trovare gli scambi più redditizi. Il loro continuo andare e venire è uno spettacolo comune nelle nostre terre e, nel corso del tempo, hanno tracciato i propri percorsi per accorciare il viaggio verso le loro destinazioni."

 hire_artist_cost_modifier_advance_disc: "Terra di Cultura"
 hire_artist_cost_modifier_advance_disc_desc: "La cultura e le arti definiscono l'identità di ogni paese. Promuovendo con orgoglio le nostre conquiste culturali, lasceremo un'impressione duratura in tutto il mondo."

 rural_rgo_disc_advance: "Sviluppo degli Insediamenti"
 rural_rgo_disc_advance_desc: "Qualsiasi insediamento, per quanto piccolo, prospererà finché la terra sarà ricca e ci saranno persone disposte a lavorarla. Anche il villaggio più piccolo può diventare prospero e brulicante di attività nel corso del tempo."

 leader_recruit_cost_advance: "Scuole per gli Ufficiali"
 leader_recruit_cost_advance_desc: "Guidare le truppe non è un compito facile. Strategia, tattica, intuito mentale: queste sono solo alcune delle abilità che un leader di successo deve possedere. La fondazione di scuole di addestramento per ufficiali garantirà che un numero maggiore dei nostri combattenti sviluppi buone capacità di leadership e ci fornirà anche un bacino più ampio di comandanti esperti da cui attingere."

 morale_recovery_rev_dip_choice: "Riposo Consolidato"
 morale_recovery_rev_dip_choice_desc: "Nessun esercito può esistere in uno stato di azione permanente; tutti i soldati hanno bisogno di tempo per riposarsi e recuperare le energie. Stabilendo linee guida e procedure per il loro riposo, senza permettere alcuna pigrizia, possiamo mantenere le nostre truppe in condizioni ottimali."

 merchant_power_from_maritime_rev_dip_choice: "Flotte Mercantili"
 merchant_power_from_maritime_rev_dip_choice_desc: "Le navi mercantili sono diventate una vista comune nelle nostre acque. I nostri commercianti hanno così tante navi che vanno e vengono che hanno effettivamente formato una propria flotta."

 administrative_leadership: "Comandanti Amministrativi"
 administrative_leadership_desc: "Un leader militare non deve conoscere solo le questioni militari. Anche la logistica, l'amministrazione e l'allocazione delle forniture, le spese monetarie e argomenti simili sono tutti aspetti fondamentali per il successo di qualsiasi campagna militare."

 cultures_capacity_mil_choice: "Ambizioni Multiculturali"
 cultures_capacity_mil_choice_desc: "L'espansione di un paese porterà inevitabilmente all'integrazione di altre culture. Pertanto, se vogliamo espandere ulteriormente i nostri confini, dobbiamo essere pronti a diventare più multiculturali."

 rgo_logistics_mil_choice: "Magazzini Migliorati"
 rgo_logistics_mil_choice_desc: "Disporre di magazzini adeguati per conservare i prodotti richiesti dalle imprese locali è fondamentale se vogliamo che tali imprese, per non parlare dell'intera economia, funzionino senza intoppi."

 land_morale_movement_cost_rev_choice_mil: "Avanzata Inarrestabile"
 land_morale_movement_cost_rev_choice_mil_desc: "Le nostre armate in marcia sono uno spettacolo da vedere. Il loro addestramento e la loro disciplina risplendono quando marciano all'unisono verso la battaglia, senza lasciarsi scoraggiare dalle lunghe marce precedenti."

 port_cost_distance_from_capital_choice_mil: "Pattuglie Costiere"
 port_cost_distance_from_capital_choice_mil_desc: "Mantenere pattugliamenti regolari lungo tutte le nostre coste garantirà che la nostra autorità amministrativa sia percepita ovunque, anche nelle regioni più remote."

 protected_harbor_advance: "$protected_harbor$"
 protected_harbor_advance_desc: "$protected_harbor_desc$"

 a_bedouin_cavalry_advance: "$a_bedouin_cavalry$"
 a_bedouin_cavalry_advance_desc: "$a_bedouin_cavalry_desc$"

 repair_at_sea_aod: "Equipaggi Professionali"
 repair_at_sea_aod_desc: "Mentre gli ultimi progressi nell'arte navale stanno ampliando i confini della navigazione a vela come la conosciamo, è necessario che gli equipaggi di tali navi sappiano sfruttare appieno queste nuove capacità. Solo la formazione di marinai professionisti permanenti consentirà loro di svolgere correttamente i compiti necessari per la manutenzione di queste nuove navi all'avanguardia."

 repair_at_sea: "Carenaggio Costiero"
 repair_at_sea_desc: "Le navi stanno intraprendendo viaggi più lunghi che mai, resi possibili dai nuovi progressi tecnici. Ciò significa che sono necessarie riparazioni più complesse, ma non sempre sono disponibili porti con attrezzature adeguate e artigiani qualificati. I nostri marinai devono essere addestrati nell'arte del carenaggio, ovvero l'arenamento deliberato delle imbarcazioni per esporre le parti che necessitano di pulizia o riparazione. Questo è l'unico modo in cui le nostre flotte possono mantenere la navigabilità lontano dai loro porti di origine."

 repair_at_sea_aorev: "Carenaggio Avanzato"
 repair_at_sea_aorev_desc: "Questa forma avanzata di carenaggio viene eseguita in acque costiere profonde. Il carico pesante viene spostato su un lato della nave per inclinarla, consentendo all'equipaggio di accedere al lato opposto dello scafo per le riparazioni senza dover arenare la nave e attendere la bassa marea come nel carenaggio tradizionale."

 blast_furnace: "Altoforno"
 blast_furnace_desc: "Metodo più costoso rispetto alla metallurgia tradizionale, l'uso degli altiforni consente di raffinare ulteriormente la ghisa grezza trasformandola in ghisa fusa mediante una nuova fusione con diverse quantità di ferro, acciaio, calcare e carbone. La ghisa fusa trasformata in questo modo in ferro battuto crea un materiale eccellente per la realizzazione di prodotti complessi come i cannoni."

 saiger_process_discovery: "Processo Saiger Perfezionato"
 saiger_process_discovery_desc: "Il miglioramento dei metodi di lavorazione e di produzione consentirà alle nostre miniere di $silver$ e $lead$ di prosperare."

 slitting_mills: "Laminatoi"
 slitting_mills_desc: "Si tratta di un nuovo tipo di mulini ad acqua sviluppati per tagliare le barre del $iron$ in tondini. Ciò consente uno sviluppo più efficiente degli strumenti e dei macchinari del $iron$, in quanto permette ai fonditori di utilizzare tondini più adatti alle loro esigenze rispetto alle barre più grandi, riducendo gli scarti nel processo di forgiatura."

 coke_blast_furnace: "Altoforno a Coke"
 coke_blast_furnace_desc: "Si tratta di un nuovo tipo di altoforno che utilizza il coke al posto del carbone come combustibile. È più economico e ci permette di costruire forni più grandi, anche se il coke ha lo svantaggio di essere meno puro del carbone, un problema che deve ancora essere risolto."

 hot_blast_furnace: "Forno ad Alta Temperatura"
 hot_blast_furnace_desc: "I problemi posti dagli altiforni a coke, in particolare la quantità di impurità che il coke crea nella ghisa finale, hanno portato allo sviluppo del getto di aria calda. Questo non solo riduce notevolmente l'uso di coke, migliorando così la qualità del $iron$, ma consente anche l'uso di carbone minerale grezzo come combustibile, se disponibile, il che rappresenta un grande passo avanti nella metallurgia del $iron$."

 new_currency_demands: "Nuove Richieste Valutarie"
 new_currency_demands_desc: "La scoperta di nuove terre ha anche portato a un aumento dei flussi commerciali. Ciò ha causato a sua volta un aumento della domanda di monete e, sebbene le valute in metalli nobili come l'$goods_gold$ e l'$silver$ rimangano i valori principali, altri metalli meno pregiati come il $copper$ e le sue leghe hanno visto aumentare il loro uso e la loro circolazione."

 powerful_statues: "Statue Imponenti"
 powerful_statues_desc: "Un paese prospero è il vero segno di un sovrano forte, ma il popolo crederà che un sovrano sia forte solo se viene raffigurato come tale. A tal fine, molti sovrani commissionano statue di se stessi, spesso realizzate in pietra o bronzo, per proiettare un'immagine di forza e potere a chiunque guardi i loro volti raffigurati. Tuttavia, queste manifestazioni di ego non sono sempre efficaci e talvolta portano solo al trasferimento di grandi quantità di materiali."

 renaissance_sculptures: "Sculture Rinascimentali"
 renaissance_sculptures_desc: "Il $renaissance$ ha portato con sé un maggiore interesse per tutte le forme d'arte. Sembra che al giorno d'oggi nessuno sia nessuno se non ha un'opera d'arte che adorna la propria casa! Le sculture sono una delle forme più prolifiche di espressione artistica, il che ha portato ad un aumento del numero di cave, poiché la domanda di $stone$ è aumentata notevolmente tra gli appassionati d'arte."

 green_vitriol: "Vetriolo Verde"
 green_vitriol_desc: "Sebbene tecnicamente non sia la stessa sostanza del $alum$, il $green_vitriol$ è stato tradizionalmente confuso con esso negli scritti alchemici ed entrambi hanno proprietà simili. Pertanto, non è raro utilizzare l'uno come sostituto dell'altro."

 shared_products_procedures: "Prodotti e Procedure Condivisi"
 shared_products_procedures_desc: "Il mondo è diventato più piccolo e abbiamo incontrato una miriade di nuovi popoli e territori inesplorati. Insieme a queste scoperte, siamo anche entrati in contatto con molti nuovi prodotti e modi di utilizzarli. Anche i beni più specializzati, come il $alum$, possono essere utilizzati in altri modi in altri luoghi."

 ostentatious_clothing: "Abbigliamento Appariscente"
 ostentatious_clothing_desc: "È diritto e dovere delle classi dominanti mostrare il proprio potere attraverso il proprio aspetto. Per questo motivo, indossano abiti sempre più sgargianti, utilizzando le tecniche più recenti per ottenere colori e motivi vivaci e lussuosi."

 riches_of_foreign_coasts: "Ricchezze delle Coste Straniere"
 riches_of_foreign_coasts_desc: "Le terre lontane ci hanno portato molte risorse, ma non solo le terre stesse sono ricche. Anche le coste e i mari sono ricchi, e le conoscenze che abbiamo acquisito dai pescatori di perle stranieri consentono ai nostri di avere più successo nelle loro catture."

 foreign_mining_techniques: "Tecniche Minerarie Straniere"
 foreign_mining_techniques_desc: "Le pietre preziose sono apprezzate dall'umanità da millenni. Entrando in contatto con popoli stranieri provenienti da terre lontane, possiamo imparare non solo quali tipi di pietre preziose sono più apprezzate in $gems$, ma anche quali tecniche vengono utilizzate per ottenerle."

 windmills_advance: "$windmill$"
 windmills_advance_desc: "$windmill_desc$"

 local_smelters_advance: "$local_smelters$"
 local_smelters_advance_desc: "$local_smelters_desc$"

 corps_organisation: "Spirito di Corpo"
 corps_organisation_desc: "Gli eserciti tradizionali facevano affidamento su una disciplina ferrea per mantenere l'ordine nei ranghi. Facendo appello all'orgoglio dell'unità, tuttavia, è possibile raggiungere livelli di disciplina ancora più elevati."

 open_sea_exploration: "Esplorazione Oltreoceano"
 open_sea_exploration_desc: "I vasti mari ci promettono grandi ricchezze e nuove opportunità commerciali su coste lontane."

 napoleonic_warfare: "Guerra Napoleonica"
 napoleonic_warfare_desc: "Gli assedi sono un'occupazione costosa e dispendiosa in termini di tempo per il nostro esercito. Invece di concentrarci su ogni fortificazione che ci ostacola, dobbiamo dedicare le nostre tattiche interamente a sferrare il colpo decisivo che ci farà vincere la guerra."

 march_to_the_sound_of_the_guns_advance: "$march_to_sound_of_guns$"
 march_to_the_sound_of_the_guns_advance_desc: "Con la crescita costante del nostro esercito, le nostre esigenze logistiche sono cambiate. I nostri generali adotteranno la dottrina della "marcia al suono dei cannoni", ordinando alle forze disperse di muoversi verso la battaglia in modo indipendente quando sentono i combattimenti. Ciò consente un rapido rinforzo senza dover attendere ordini."

 country_unification_advance: "Supervisione degli Stati Cliente"
 country_unification_advance_desc: "Prima inizieremo a integrare l'amministrazione dei nostri sudditi affinché seguano le nostre regole, più facile sarà l'integrazione di altre questioni. Creare un collegamento permanente con i nostri sudditi renderà questo processo significativamente più agevole."

 renaissance_urbanisation: "Pianificazione Urbanistica del $renaissance$"
 renaissance_urbanisation_desc: "Tenere conto delle aree dedicate allo sfruttamento delle risorse durante la fase di pianificazione consentirà ai nostri centri urbani di produrre più beni rispetto al passato."

 renaissance_city_rights: "Diritti di Città Formali"
 renaissance_city_rights_desc: "Stabilendo che solo il nostro sovrano può concedere i diritti di città, centralizziamo il controllo sullo sviluppo urbano e diamo alla nostra amministrazione una chiara visione d'insieme dello stato del nostro paese."

 absolutism_control_decline_advance: "Amministrazione Assolutista"
 absolutism_control_decline_advance_desc: "I sovrani assolutisti dimostrano il loro potere non solo a corte, ma anche attraverso un apparato amministrativo che può estendersi in tutto il paese."

 construction_speed_renaissance: "Gilde dei Muratori"
 construction_speed_renaissance_desc: "I massoni si affidano ad associazioni più ampie, note come gilde, per condividere e preservare le loro conoscenze ed esperienze in un sistema in cui i muratori veterani insegnano ai giovani apprendisti."

 construction_speed_discovery: "Assi e Mattoni Standardizzati"
 construction_speed_discovery_desc: "La standardizzazione della produzione di assi e mattoni utilizzando tecniche più moderne mira a facilitare la costruzione."

 construction_speed_reformation: "Trattati di Architettura"
 construction_speed_reformation_desc: "La stesura di trattati di architettura, che spesso raccolgono conoscenze secolari, consente un apprendimento e una diffusione più rapidi delle tecniche di costruzione efficaci."

 construction_speed_absolutism: "Ingegneria Architettonica"
 construction_speed_absolutism_desc: "La costruzione degli edifici è diventata più sofisticata nel corso del tempo, incorporando metodi e tecniche provenienti da una vasta gamma di discipline, comunemente considerate un tipo di ingegneria."

 construction_speed_revolutions: "Strutture in Ghisa"
 construction_speed_revolutions_desc: "Lo sviluppo di una metallurgia più avanzata del ferro battuto e fuso consente di realizzare strutture metalliche più elaborate, come pilastri e colonne, che rendono la costruzione degli edifici molto più veloce."

 apothecary_advance: "$apothecary$"
 apothecary_advance_desc: "$apothecary_desc$"

 unlock_handgonners_advance: "$a_handgonners$"
 unlock_handgonners_advance_desc: "$a_handgonners_desc$"

 manufactories_advance: "Manifatture"
 manufactories_advance_desc: "I recenti progressi tecnologici nella meccanizzazione hanno facilitato la nascita di impianti di produzione concentrati sotto forma di manifatture. Queste aziende ci hanno aiutato a migliorare notevolmente la velocità e la qualità della produzione."

 scientific_revolution_advance: "Rivoluzione Scientifica"
 scientific_revolution_advance_desc: "I recenti sviluppi in matematica, fisica, astronomia, biologia e chimica non solo hanno messo in discussione, ma hanno completamente cambiato la nostra visione del mondo che ci circonda. La società sta progredendo a una velocità mai vista prima e ogni giorno vengono compiuti nuovi progressi scientifici."

 military_revolution_advance: "Rivoluzione Militare"
 military_revolution_advance_desc: "La guerra non cambia mai, ma il modo di combatterla sì. I recenti sviluppi nel campo degli armamenti hanno dimostrato che i vecchi metodi di combattimento sono obsoleti e gli eserciti hanno subito un completo cambiamento di paradigma. Adattarsi a questi cambiamenti è l'unico modo per continuare a essere una potenza militare forte."

 power_projection_advance_5: "Ambizioni Assolutistiche"
 power_projection_advance_5_desc: "Con la crescente centralizzazione del potere statale, i governanti di tutto il mondo hanno iniziato a considerarsi sovrani assoluti dei rispettivi territori. Come il sole che illumina il mondo intero, cercano di essere l'unica fonte di autorità, estendendo la loro volontà incontrastata in ogni angolo del loro dominio."

 absolutist_court: "Corte Assolutista"
 absolutist_court_desc: "L'autorità è diventata sempre più centralizzata nella persona del sovrano. I cortigiani e i funzionari ora fungono da estensioni della volontà reale piuttosto che da attori autonomi. Questa concentrazione di autorità consente ai sovrani di attuare i propri desideri in modo più rapido ed efficiente."

 government_size_absolutism: "Subordinati Fedeli"
 government_size_absolutism_desc: "Concentrare il potere nelle mani dei sovrani permette loro di agire direttamente, ma hanno comunque bisogno di persone al loro servizio che li aiutino a portare a termine tali azioni. Non dare alcun potere reale a questi subordinati, rendendoli al contempo fedeli al sovrano, permette al $crown_estate$ di ospitarne un numero maggiore senza temere lotte intestine o malcontento."

 naval_doctrines_advance: "Dottrine Navali"
 naval_doctrines_advance_desc: "La guerra navale ha subito molti cambiamenti negli ultimi anni, con navi e flotte che sono diventate più grandi e più specializzate. Di conseguenza, diversi paesi stanno iniziando a utilizzare una varietà di tattiche e dottrine, adattate ai loro punti di forza o al loro modo particolare di utilizzare le flotte."

 global_supply_limit_modifier_advance_5: "Pianificazione Logistica dell'Esercito"
 global_supply_limit_modifier_advance_5_desc: "La distanza che un esercito può percorrere dipende dalla sua logistica. Con uno studio e una pianificazione adeguati, gli eserciti possono resistere a campagne più lunghe e più lontane."

 rgo_size_advance_absolutism: "Fisiocrazia"
 rgo_size_advance_absolutism_desc: "I recenti sviluppi del pensiero economico hanno spostato l'attenzione dagli ideali mercantilisti del valore risiedente nel commercio verso la nozione che il valore risiede nel processo di produzione stesso. Di conseguenza, la produzione è migliorata e aumentata costantemente."

 food_advance_absolutism: "Campi Delimitati"
 food_advance_absolutism_desc: "Fino a poco tempo fa, la proprietà e l'uso della terra erano relativamente comuni e liberi. Tuttavia, ora c'è una crescente tendenza ad avviare un processo di delimitazione specifica dei terreni, determinando chiaramente i confini e le dimensioni dei campi dedicati esclusivamente all'agricoltura. Con questo tipo di uso specifico, la loro produzione e sfruttamento possono essere notevolmente aumentati."

 naval_morale_advance_5: "Flotte Permanenti"
 naval_morale_advance_5_desc: "L'espansione globale del commercio e degli scambi richiede forze navali permanenti per proteggere gli interessi nazionali. Il mantenimento di una marina militare permanente e sempre presente consentirà alle navi di operare in modo più efficace insieme come flotta."

 new_world_advance: "Nuovo Mondo"
 new_world_advance_desc: "Come afferma il navigatore fiorentino Amerigo Vespucci, le terre scoperte da Colombo non sono le Indie, ma, in realtà, un intero Nuovo Mondo sconosciuto ai nostri antenati e in attesa di essere mappato e rivendicato."

 colonial_charters: "Carte Coloniali"
 colonial_charter_progress_tt_title: "Progressi della Carta Coloniale"
 colonial_charters_desc: "Questi nuovi documenti garantiranno i diritti dei nostri connazionali quando si insedieranno nel selvaggio Nuovo Mondo. Essi conferiscono alle nostre colonie il diritto esclusivo di governare queste nuove terre e regolano il loro rapporto con la madrepatria."

 plantation_buildings_advance: "Piantagioni"
 plantation_buildings_advance_desc: "Il clima mite e le abbondanti terre fertili del Nuovo Mondo rendono le Colonie il luogo ideale per la produzione di colture molto redditizie come il $sugar$ e il $tobacco$."

 diplomatic_range_age_1: "Inviati Stranieri"
 diplomatic_range_age_1_desc: "La diplomazia tra i paesi è sempre stata importante. Tuttavia, l'arte della manovra diplomatica sta diventando sempre più intensa e complessa, ed è ormai prassi comune inviare i nostri inviati in luoghi sempre più lontani rispetto al passato per espandere le nostre relazioni estere."

 diplomatic_range_age_2: "Rete Diplomatica"
 diplomatic_range_age_2_desc: "Mantenere una rete consolidata di diplomatici esperti intorno a noi ci permette di inviare inviati in paesi ancora più lontani."

 diplomatic_range_age_3: "Ambasciate"
 diplomatic_range_age_3_desc: "L'attuale situazione internazionale richiede che istituiamo uffici permanenti per i nostri diplomatici nei paesi vicini. È l'unico modo per garantire che i nostri interessi siano tutelati nella nostra regione mentre estendiamo la nostra influenza al di là di essa."

 trade_envoys: "Inviati Commerciali"
 trade_envoys_desc: "Con il recente aumento degli scambi commerciali con terre lontane, i nostri inviati hanno iniziato a partecipare a spedizioni commerciali per stabilire contatti diplomatici con paesi che prima erano fuori dalla nostra portata."

 diplomatic_range_age_5: "Missioni Diplomatiche"
 diplomatic_range_age_5_desc: "La complessità della politica moderna non può più essere gestita da singoli inviati. Per espandere ulteriormente la nostra influenza e proteggere i nostri interessi in quei luoghi lontani, invieremo squadre di diplomatici esperti in ogni paese."

 diplomatic_range_age_6: "Ambasciate Globali"
 diplomatic_range_age_6_desc: "Con ogni nazione che cerca di espandere ulteriormente la propria influenza, il mondo è diventato più interconnesso che mai. Solo l'istituzione di ambasciate permanenti in tutto il globo può consentire a questa interconnessione di sostenersi."

 new_world_crops: "Colture del Nuovo Mondo"
 new_world_crops_desc: "Le terre generose del Nuovo Mondo hanno fornito molti tesori al nostro Paese. Una delle scoperte più importanti è quella delle strane piante esotiche coltivate come cibo e spezie dagli indigeni di quelle terre. Coltivare questi prodotti nei nostri campi fornirà alla nostra popolazione la varietà e la novità alimentare che desidera."

 rgo_size_advance_discovery: "Tecniche di Estrazione Avanzate"
 rgo_size_advance_discovery_desc: "La scoperta di nuovi minerali e l'invenzione di nuovi strumenti hanno portato a una raccolta più efficiente delle risorse e all'accelerazione della linea di produzione."

 printing_press_advance: "Macchina da Stampa"
 printing_press_advance_desc: "La diffusione delle tecniche di stampa in questo secolo ha portato a una più ampia diffusione della conoscenza e a un più facile scambio di informazioni, accelerando la duplicazione di importanti manoscritti."

 gov_reform_discovery_a: "Prima Riforma Amministrativa"
 gov_reform_discovery_a_desc: "Il nostro popolo è alle soglie di una nuova era. Per sfruttare le nostre capacità interne, dobbiamo adattare il nostro governo e perfezionare il nostro dominio amministrativo."

 government_size_discovery: "Capacità Amministrativa Iniziale"
 government_size_discovery_desc: "Il nostro dominio è costituito da molti settori amministrativi e, man mano che lo espandiamo, dobbiamo apportare le modifiche necessarie al nostro governo per tenere conto di questa crescita."

 power_projection_advance_4: "Influenza Esterna Dominante"
 power_projection_advance_4_desc: "La nostra presenza ai tavoli diplomatici trasmette sempre un'aria di grandezza e prestigio. La nostra voce e la nostra influenza risuoneranno in tutti coloro con cui interagiamo."

 regulate_court_procedures: "Procedure Giudiziarie Regolamentate"
 regulate_court_procedures_desc: "Applicando un regime rigoroso e una routine alle nostre operazioni, ridurremo ogni potenziale costo in eccesso e gestiremo un tribunale parsimonioso ed efficiente."

 pike_and_shot_advance: "Picca e Moschetto"
 pike_and_shot_advance_desc: "Un nuovo tipo di guerra è emerso sul campo di battaglia: i picchieri formano un quadrato difensivo, mentre gli archibugieri si dispiegano ai lati e sul fronte, ritirandosi dietro o all'interno del quadrato nel caso in cui la formazione entri in combattimento ravvicinato."

 lazaretto_advance: "$lazaretto$"
 lazaretto_advance_desc: "$lazaretto_desc$"

 pest_house_advance: "$pest_house$"
 pest_house_advance_desc: "$pest_house_desc$"

 naval_morale_advance_2: "Tecniche di Navigazione"
 naval_morale_advance_2_desc: "I nostri marinai si stanno abituando a viaggi più lunghi, utilizzando una nuova serie di tecniche e strumenti, come le bussole a secco, per migliorare la loro padronanza della navigazione."

 confessionalism_advance: "Confessionalismo"
 confessionalism_advance_desc: "Esistono una miriade di interpretazioni diverse di ciò che dovrebbe essere la fede e, di conseguenza, è cresciuto l'interesse sia delle autorità religiose che di quelle secolari a definire chiaramente la metodologia delle loro specifiche confessioni, applicando le loro regole e opinioni particolari su tutti gli aspetti della fede e della vita."

 global_trade_advance: "Commercio Globale"
 global_trade_advance_desc: "Fin dall'antichità le merci sono state trasportate da un continente all'altro, ma oggi tutto il commercio sta diventando sempre più parte di una rete mondiale più ampia. Forse è ancora presto per parlare di un'economia veramente globale, ma sicuramente i primi semi sono stati piantati."

 artillery_institution_advance: "Artiglieria d'assedio"
 artillery_institution_advance_desc: "L'invenzione della polvere da sparo in Sòng $CHI$ ha portato allo sviluppo di un nuovo dispositivo che impiega la sua potenza di fuoco in guerra: l'artiglieria. Queste armi rappresentano una seria minaccia per i castelli in pietra e altre fortificazioni."

 gov_reform_reformation_a: "Il Principe"
 gov_reform_reformation_a_desc: "Gli eventi attuali hanno determinato la necessità per i governanti di affrontare la gestione dello Stato in modo più sistematico, tenendo conto sia dei diversi ceti sociali del paese, sia dei distinti attori diplomatici che li circondano."

 power_projection_advance_3: "Ambizioni Regionali"
 power_projection_advance_3_desc: "La capacità di proiettare il proprio potere oltre i confini nazionali è di vitale importanza per mantenere la rilevanza sulla scena regionale. Studiando le strategie delle grandi potenze del passato e del presente, possiamo elevare il prestigio della nostra nazione ovunque e sfruttare tale reputazione per esercitare il nostro potere."

 confessional_court: "Corte Confessionale"
 confessional_court_desc: "Le spese di corte possono facilmente mandare in bancarotta anche la nazione più ricca. Al fine di raggiungere un buon equilibrio tra lusso e spese ragionevoli, possiamo adottare piccole misure per ridurre tali costi senza diminuire la magnificenza della nostra corte."

 rgo_size_advance_reformation: "Filatoio"
 rgo_size_advance_reformation_desc: "Man mano che apprendiamo metodi nuovi e migliori per l'estrazione delle risorse, la nostra produzione aumenterà vertiginosamente, rendendoci più ricchi nel processo!"

 food_advance_reformation: "Agricoltura di Mercato"
 food_advance_reformation_desc: "È possibile introdurre colture nuove e migliorate per aumentare la produttività agricola. Sia attraverso la selezione delle varietà esistenti che importando cultivar straniere di qualità superiore, possiamo aumentare in modo significativo la nostra produzione alimentare."

 scientific_experimentation: "Sperimentazione Scientifica"
 scientific_experimentation_desc: "Tutto accade per una ragione. Comprendendo la spiegazione che sta dietro ogni cosa, possiamo imparare cosa aspettarci quando si verificano situazioni simili."

 banking_advance: "Settore Bancario"
 banking_advance_desc: "Il prestito di denaro è antico quanto il mondo, ma non è privo di rischi. Possiamo ridurre al minimo tali pericoli se istituzionalizziamo tali pratiche e facciamo in modo che il denaro venga prestato secondo condizioni controllate ed eque."

 trade_companies_advance: "Compagnie Commerciali"
 trade_companies_advance_desc: "È sempre stato chiaro che il denaro fa girare il mondo. Con la continua scoperta di nuovi prodotti desiderabili in terre lontane, le società commerciali specializzate nella loro distribuzione sono sicure di ottenere enormi profitti."

 naval_morale_advance_3: "Spedizioni Oltreoceano"
 naval_morale_advance_3_desc: "Il recente aumento del commercio marittimo a lungo raggio ha abituato i nostri marinai a stare in mare per lunghi periodi di tempo, rendendoli resistenti agli effetti negativi dei lunghi viaggi."

 road_advance_1: "Rete Stradale"
 road_advance_1_desc: "L'importanza del commercio e degli scambi sta diventando sempre più rilevante, così come la creazione di reti stradali più complesse per facilitare e aumentare la circolazione di persone e merci."

 power_projection_advance_2: "Ambizioni Sovranazionali"
 power_projection_advance_2_desc: "Sebbene le vecchie idee sulla creazione di imperi siano ancora presenti nelle menti dei governanti di quest'epoca, essi hanno anche iniziato a cristallizzare nuovi modi per affermare il proprio dominio su altri paesi e popoli."

 renaissance_advance: "Rinascimento"
 renaissance_advance_desc: "Le ondate di pensiero innovativo e di scoperte che permeano il nostro regno devono essere sfruttate e utilizzate se vogliamo rimanere all'avanguardia nell'innovazione tecnologica."

 professional_armies_advance: "Eserciti Professionali"
 professional_armies_advance_desc: "La modernizzazione dei nostri eserciti dipende in gran parte dal mantenimento dei nostri centri di reclutamento e organizzazione. Dobbiamo impegnarci a preservare un'organizzazione militare chiara e solida, eliminando gli sprechi e le ridondanze."

 gunpowder_advance: "Polvere da Sparo"
 gunpowder_advance_desc: "L'uso della polvere da sparo sul campo di battaglia avrà sicuramente un impatto positivo sulle nostre prestazioni e ci consentirà di eccellere negli scontri militari."

 drill_army_advance: "Esercitazione Militare"
 drill_army_advance_desc: "Non dipenderemo più da uomini reclutati e non addestrati. Se vogliamo difendere i nostri confini e sconfiggere i nostri rivali, dobbiamo condurre esercitazioni regolari e organizzate."

 renaissance_development: "Trattati Accademici"
 renaissance_development_desc: "Questa era di pensiero, arti e scienza porterà nuove ondate di scoperte e invenzioni, consentendoci di ottimizzare l'adozione di istituzioni straniere."

 art_school_advance: "Scuole d'Arte"
 art_school_advance_desc: "La dedizione alle arti estetiche e il perfezionamento dei nostri artisti devono essere adeguatamente coltivati attraverso l'istituzione di scuole d'arte. Ciascuna di esse dovrà essere un incubatore per individui dotati, affinché possano intraprendere la loro carriera artistica e portare gloria e splendore alla nostra nazione!"

 pound_lock_canals_advance: "Canali con Chiuse"
 pound_lock_canals_advance_desc: "Abbiamo scolpito la superficie stessa della Terra per ottenere accesso al cibo, alla ricchezza e a una migliore circolazione delle merci. L'invenzione di speciali cancelli, chiamati "Mitre Gates", ci aiuterà a fornire al nostro popolo i beni necessari per crescere e prosperare."

 a_renaissance_janissaries_advance: "$a_renaissance_janissaries$"
 a_renaissance_janissaries_advance_desc: "$a_renaissance_janissaries_desc$"

 a_discovery_janissaries_advance: "$a_discovery_janissaries$"
 a_discovery_janissaries_advance_desc: "$a_discovery_janissaries_desc$"

 a_reformation_janissaries_advance: "$a_reformation_janissaries$"
 a_reformation_janissaries_advance_desc: "$a_reformation_janissaries_desc$"

 a_absolutism_janissaries_advance: "$a_absolutism_janissaries$"
 a_absolutism_janissaries_advance_desc: "$a_absolutism_janissaries_desc$"

 a_revolutions_janissaries_advance: "$a_revolutions_janissaries$"
 a_revolutions_janissaries_advance_desc: "$a_revolutions_janissaries_desc$"

 nomadic_legacy: "Eredità Nomade"
 nomadic_legacy_desc: "Il nostro popolo è nato in sella, libero di vagare per il mondo senza bisogno di mettere radici."

 siberian_frontier: "Frontiera Siberiana"
 siberian_frontier_desc: "Le lontane lande desolate della Siberia ci chiamano. Dobbiamo aprirci un varco fino al suo cuore ghiacciato e lasciare che i nostri cosacchi avanzino e rivendichino la terra per il popolo russo."

 ostrog_advance: "$ostrog$"
 ostrog_advance_desc: "$ostrog_desc$"

 janissaries_advance: "Giannizzeri"
 janissaries_advance_desc: "I giannizzeri sono le unità d'élite dei nostri eserciti, addestrati fin dall'infanzia e temprati dalla disciplina."

 slave_raiding_wars: "Guerre di Razzia per gli Schiavi"
 slave_raiding_wars_desc: "Gli schiavi sono la pietra angolare della nostra economia. Attaccare e saccheggiare i nostri vicini per catturare la loro popolazione e ridurla in schiavitù è quindi la linfa vitale del nostro paese."

 trade_caravans: "Carovane Commerciali"
 trade_caravans_desc: "Fin dall'antichità, rotte commerciali redditizie hanno attraversato i nostri territori. La nostra gente è abituata a interagire con lunghe carovane di mercanti che commerciano merci provenienti da terre lontane."

 the_sahel_trade: "Il Commercio con il $sahel_region$"
 the_sahel_trade_desc: "Da secoli le carovane commerciano tra il $sahel_region$ e il Mediterraneo, e i benefici di questo commercio superano di gran lunga i pericoli di attraversare le sabbie roventi del Sahara."

 rudimentary_coastal_ship_repair: "Riparazioni Improvvisate"
 rudimentary_coastal_ship_repair_desc: "È inevitabile che le navi si deteriorino durante la navigazione. Il battito delle onde e l'azione corrosiva dell'acqua salata si accumulano nel tempo, danneggiando sia lo scafo che le cime, indipendentemente dalla qualità costruttiva dell'imbarcazione. Per ovviare a questo problema, i marinai sono soliti eseguire una manutenzione regolare delle loro navi per mantenerle in condizioni ottimali e, in caso di danni più significativi, essere in grado di mantenerle a galla fino al raggiungimento di un porto sicuro."

 religious_icon_power_advance: "Icone Religiose"
 religious_icon_power_advance_desc: "Le icone sono la rappresentazione fisica della nostra fede, raffigurazioni sacre di figure sante progettate per ispirare timore reverenziale e devozione in coloro che le contemplano."

 scientific_mapping_advance: "Mappatura Cartografica"
 scientific_mapping_advance_desc: "I recenti progressi nelle scienze della geografia e della cartografia hanno permesso una rappresentazione più accurata delle masse terrestri e delle caratteristiche naturali, sia in termini di dimensioni relative che di posizioni esatte."

 integrate_area_advance: "Migliore Integrazione"
 integrate_area_advance_desc: "La nostra amministrazione sta migliorando e, di conseguenza, possiamo permetterci la manodopera necessaria per integrare contemporaneamente nel nostro Paese porzioni di territorio più estese."

 maritime_advance_age_2: "Flotte Commerciali"
 maritime_advance_age_2_desc: "Con la crescita del commercio, aumenta anche la necessità di trasportare quantità maggiori di merci in modo più rapido ed efficiente. Pertanto, chi investe nel commercio marittimo non baderà a spese per costruire le flotte più grandi che può permettersi."

 maritime_advance_age_3: "Flotte di Esplorazione"
 maritime_advance_age_3_desc: "Man mano che la nostra conoscenza del mondo cresce, aumenta anche la necessità di saperne ancora di più. Dai mari lontani a est alle nuove coste a ovest, la distanza che dobbiamo percorrere in nave è aumentata e con essa anche la necessità di una flotta più grande."

 maritime_advance_age_4: "Flotte Globali"
 maritime_advance_age_4_desc: "Considerati i progressi dell'ultimo secolo, sembra che il mondo sia diventato più piccolo anziché più grande. Paesi che fino ad ora non avevano alcun contatto stanno invece intrattenendo costanti relazioni diplomatiche e commerciali . Di conseguenza, sono necessarie flotte più grandi e migliori per poter mantenere tutti questi collegamenti con l'estero."

 maritime_advance_age_5: "Convogli"
 maritime_advance_age_5_desc: "Con l'espansione del commercio marittimo, con le nostre navi che trasportano merci in quantità maggiori e verso lidi più lontani che mai, aumenta anche la necessità di mantenere un flusso commerciale costante. L'organizzazione di flotte commerciali di convogli consentirà una circolazione più stabile delle navi mercantili."

 maritime_advance_age_6: "Convogli Armati"
 maritime_advance_age_6_desc: "I convogli commerciali sono ovviamente un obiettivo molto allettante per qualsiasi pirata. Navi piene zeppe di merci e monete sono un bottino che pochi si lascerebbero sfuggire. Pertanto, è fondamentale dotare tali convogli commerciali di armamenti difensivi per scoraggiare tali attacchi. Accompagnare le flotte commerciali con fregate o altre imbarcazioni armate ne garantisce la sicurezza."

 coastal_trade_routes_advance: "Espansione Costiera"
 coastal_trade_routes_advance_desc: "Il modo più sicuro per qualsiasi nave di navigare è farlo vicino alla costa. A meno che non debbano effettivamente attraversare il mare, non c'è alcun bisogno reale per le nostre navi di allontanarsi dalla costa protettiva, ed è comunque più veloce viaggiare in nave che via terra. Pertanto, mantenere un flusso costante di navi lungo le nostre coste consentirà una più facile circolazione di merci e persone."

 exploration_maintenance_advance: "Costruzione Robusta"
 exploration_maintenance_advance_desc: "Il fattore chiave nella costruzione di una nave è la sua capacità di resistere alle intemperie e al martellamento incessante delle onde. Sviluppando metodi di costruzione navale più robusti, possiamo garantire che le nostre imbarcazioni possano navigare per periodi di tempo più lunghi."

 global_trade_routes_advance: "Rotte Commerciali d'Oltremare"
 global_trade_routes_advance_desc: "Il mondo è diventato più grande grazie alle numerose nuove scoperte, ma è anche diventato più piccolo con la proliferazione delle rotte commerciali internazionali. Con le navi che trasportano costantemente merci e persone da e verso terre lontane, quelle coste distanti sembrano effettivamente più vicine di prima."

 safe_exploration_techniques_advance: "Lezioni di Esplorazione"
 safe_exploration_techniques_advance_desc: "Avventurarsi nell'ignoto fa sempre paura, ma al giorno d'oggi ci sono pochi luoghi che sono veramente inesplorati. Anche se molti luoghi in tutto il mondo non sono ancora stati esplorati completamente, sono comunque noti a noi e abbiamo le conoscenze e l'esperienza per raggiungerli. Grazie al patrimonio di conoscenze che i nostri esploratori hanno raccolto durante i loro numerosi viaggi, possiamo avventurarci con sicurezza in territori inesplorati."

 imperial_ambitions: "Ambizioni Imperiali"
 imperial_ambitions_desc: "I grandi imperi del passato sono fonte di ispirazione per artisti e poeti, sempre citati con stupore e ammirazione. Se vogliamo suscitare la stessa reazione nei confronti del nostro Paese, dovremmo aspirare alla stessa grandezza."

 letters_of_marque: "Lettere di Marca"
 letters_of_marque_desc: "La pirateria è un atto riprovevole. I pirati non sono altro che ladri senza valore che cercano di trarre profitto dalla sofferenza altrui! Autorizzare formalmente le navi a razziare i nostri nemici, tuttavia, è tutta un'altra questione e potrebbe essere estremamente redditizio per noi."

 sturdy_privateers: "Navi Corsare Robuste"
 sturdy_privateers_desc: "I corsari sono sempre in prima linea. Se vogliamo sfruttare appieno il loro potenziale, dobbiamo assicurarci che non vengano affondati dopo la prima salva di cannoni! Assicurarci che navighino solo su imbarcazioni robuste sarà vantaggioso per noi nel lungo periodo e, naturalmente, anche per i corsari stessi, che vivranno più a lungo."

 rgo_build_time_advance: "Metodi di Costruzione Rinascimentali"
 rgo_build_time_advance_desc: "I grandi edifici e le imponenti statue eretti in passato sono ancora in piedi. È innegabile che le tecniche di costruzione utilizzate per progettarli ed erigerli fossero sofisticate e ben sviluppate. C'è ancora molto che possiamo imparare studiandoli."

 arts_academy_advance: "$arts_academy$"
 arts_academy_advance_desc: "L'arte è il respiro vitale dell'umanità e ciò che trasforma il mondo da un'esistenza insipida in una tela vibrante piena di meraviglie e possibilità. Dobbiamo promuovere una maggiore curiosità artistica tra la nostra gente."

 metallurgy: "Metallurgia"
 metallurgy_desc: "La metallurgia, l'arte di manipolare e lavorare il metallo, è una delle capacità distintive delle civiltà avanzate. Gli strumenti e le armi in metallo sono di gran lunga superiori a quelli in pietra, consentendo sia ai lavoratori che ai soldati di operare con maggiore efficienza."

 supply_depot_advance_age_2_renaissance: "Depositi di Rifornimenti"
 supply_depot_advance_age_2_renaissance_desc: "Nessun esercito può sopravvivere senza rifornimenti. La creazione di depositi permanenti dedicati all'approvvigionamento delle nostre forze combattenti consente un rifornimento continuo delle linee di rifornimento, mantenendo i nostri eserciti sempre in condizioni ottimali."

 supply_depot_advance_age_3_discovery: "Depositi dell'Esercito"
 supply_depot_advance_age_3_discovery_desc: "Lo sviluppo e il dispiegamento di eserciti permanenti hanno aumentato la domanda di armi, uniformi e altre forniture militari, che dovrebbero essere conservate nelle immediate vicinanze dei nostri soldati."

 supply_depot_advance_age_4_reformation: "Depositi di Munizioni"
 supply_depot_advance_age_4_reformation_desc: "Il dispiegamento generalizzato dell'artiglieria sui campi di battaglia e negli assedi ha creato una forte domanda di munizioni e polvere da sparo per alimentarla, aumentando l'importanza dei depositi di stoccaggio."

 supply_depot_advance_age_5_absolutism: "Depositi Avanzati"
 supply_depot_advance_age_5_absolutism_desc: "Gli eserciti possono ora penetrare più in profondità nel territorio nemico e sostenerne l'occupazione per periodi più lunghi, rendendo necessario costruire e mantenere depositi avanzati più vicini a loro, pur rimanendo collegati alle linee di rifornimento posteriori."

 supply_depot_advance_age_6_revolutions: "Depositi per la Campagna"
 supply_depot_advance_age_6_revolutions_desc: "L'operatività di più eserciti in campagne più lunghe ha messo a dura prova i nostri sistemi di approvvigionamento, rendendo ancora più importanti i depositi più grandi e di rapida costruzione per sostenerli."

 army_country_looting_advance: "Truppe di Incursori"
 army_country_looting_advance_desc: "Le incursioni e i saccheggi sono fondamentalmente il modo in cui il nostro esercito si sostiene. Ovunque vadano le nostre truppe, saccheggiano tutto ciò che possono."

 minting_income_factor_building: "Proprietà della Valuta"
 minting_income_factor_building_desc: "Ci sono molti tipi di valuta in circolazione, ma quella che porta il nostro sigillo è la più ampiamente accettata come affidabile."

 artillery_vs_fort_age_5_absolutism: "Cannoni d'assedio"
 artillery_vs_fort_age_5_absolutism_desc: "La polvere da sparo ha permesso la creazione di diversi tipi di armi. Per sfondare le linee della fanteria non è necessaria la stessa potenza richiesta per abbattere le mura di un castello, quindi negli assedi è necessario impiegare un tipo speciale di cannone."

 artists_advance_absolutism: "Correnti Artistiche"
 artists_advance_absolutism_desc: "L'arte è sempre stata creata in molti modi diversi, ma i recenti progressi le hanno permesso di svilupparsi ulteriormente in una miriade di manifestazioni, grazie alla sperimentazione di nuovi mezzi e tecniche da parte degli artisti."

 subject_loyalty_absolutism: "Lealtà Assoluta"
 subject_loyalty_absolutism_desc: "Non tolleriamo alcun dissenso o rivolta. A tutti i sudditi, siano essi cittadini di base o appartenenti a un gruppo conquistato, è richiesta lealtà assoluta."

 improve_relation_impact_absolutism: "Ministero Permanente degli Affari Esteri"
 improve_relation_impact_absolutism_desc: "Il nostro corpo diplomatico in continua crescita richiede la creazione di un Ministero degli Affari Esteri permanente per gestire e coordinare i nostri numerosi inviati e coordinare i loro sforzi."

 hand_cannon_guild_advance: "$hand_cannon_guild$"
 hand_cannon_guild_advance_desc: "Tubi metallici primitivi che costituivano una forma meno avanzata delle armi da fuoco successive. Sviluppati inizialmente in $CHI$, i primi cannoni portatili si diffusero in $KOR$ e $JAP$ nel 1270."

 subjects_advance: "Nazioni Clienti"
 subjects_advance_desc: "Concedere alle nostre nazioni soggette una certa autonomia sul governo locale impedisce loro di ribellarsi, garantendo al contempo che continuino a fornire tributi al regno."

 slave_center_advance: "$slave_center$"
 slave_center_advance_desc: "Una corretta gestione del lavoro vincolato all'interno del nostro regno è fondamentale per il benessere continuo del nostro popolo."

 war_score_absolutism_advance: "Richieste Aggressive"
 war_score_absolutism_advance_desc: "Il potere dello Stato è direttamente legato alla sua capacità militare. Più un paese è popoloso, più grande può diventare il suo esercito. Dobbiamo adottare un approccio aggressivo per annettere quanto più territorio possibile nei trattati di pace, in modo da ottenere un vantaggio sui nostri vicini."

 spy_construction_absolutism: "Reti di Spionaggio Globali Ampliate"
 spy_construction_absolutism_desc: "Poiché i vari imperi e istituzioni che compongono il nostro mondo continuano ad espandersi, dovremo mantenere e forse aumentare lo spionaggio se vogliamo rimanere un passo avanti ai nostri rivali."

 absolutism_agressive_advance: "Lo Stato Prima di Tutto"
 absolutism_agressive_advance_desc: "Man mano che varie regioni del mondo vengono formalmente consolidate e le risorse diventano più limitate, è diritto dello Stato esercitare una politica aggressiva per soddisfare i bisogni materiali del suo popolo ed espandere il suo potere. E anche se la guerra dovrebbe essere vista come l'ultimo atto della diplomazia, rimane comunque una mossa diplomatica, poiché lo Stato è al di sopra delle restrizioni umane come la moralità e la legge."

 relations_absolutism_advance: "Politica Estesa"
 relations_absolutism_advance_desc: "Mentre il mondo che ci circonda cambia per adattarsi alla portata sempre più ampia di un teatro veramente globale, anche i nostri sforzi diplomatici devono stare al passo con questa esigenza sempre crescente di sicurezza contro le minacce straniere."

 correct_box_advance_absolutism: "Formazioni di Battaglia Flessibili"
 correct_box_advance_absolutism_desc: "Sono state sviluppate nuove tattiche che rendono più flessibili e coordinate le unità di fanteria, cavalleria e artiglieria sul campo di battaglia, solitamente raggruppate in brigate."

 anti_piracy_warfare: "Convolezioni Mercantili"
 anti_piracy_warfare_desc: "L'ascesa di pirati spietati e senza legge nel Nuovo Mondo - e lungo le rotte marittime che vi conducono - ha avuto un grande impatto sui nostri mercanti e sul nostro commercio. d'ora in poi, le nostre navi mercantili formeranno convogli con una nave da guerra di scorta per proteggerle e avranno a bordo un piccolo contingente militare per garantire ulteriormente la loro sopravvivenza in alto mare."

 trade_range_advance_age_3: "Navi Mercantili Migliorate"
 trade_range_advance_age_3_desc: "Abbiamo sviluppato navi più grandi che richiedono un equipaggio più ridotto per navigare e che possono viaggiare più lontano senza bisogno di fermarsi. Ciò dovrebbe aumentare notevolmente la portata dei nostri sforzi commerciali."

 trade_range_advance_age_2: "Mercati Lontani"
 trade_range_advance_age_2_desc: "Con la crescita della nostra economia, sorgono nuove opportunità. Mentre prima le rotte commerciali a breve distanza erano molto redditizie, recentemente quelle a lunga distanza hanno iniziato a portare maggiori guadagni. Le nostre navi mercantili ora navigano più lontano alla ricerca delle offerte migliori."

 overseas_trade: "Commercio Oltremare"
 overseas_trade_desc: "La notizia della scoperta di terre lontane ha raggiunto la nostra nazione e i nostri mercanti si stanno già preparando ad espandere le loro attività commerciali. Questi territori inesplorati sono ricchi di mercati prosperi che trasudano ricchezza, come frutti maturi che aspettano solo di essere raccolti."

 ship_building_techniques_absolutism: "Bacino Galleggiante"
 ship_building_techniques_absolutism_desc: "Lo sviluppo del bacino di carenaggio, o bacino galleggiante, consentirà ai nostri costruttori navali di costruire navi molto più velocemente rispetto al passato."

 ship_building_techniques_discovery: "Miglioramento della Costruzione Navale"
 ship_building_techniques_discovery_desc: "Le nuove tecniche di costruzione delle nostre navi ci aiuteranno a produrle più rapidamente."

 spy_construction_discovery: "Organizzazione Spionistica Migliorata"
 spy_construction_discovery_desc: "Assumendo persone affidabili come informatori e posizionandole strategicamente in situazioni in cui vengono condivise informazioni clandestine, possiamo migliorare la nostra capacità di raccogliere informazioni sui nostri nemici e sulle loro attività."

 diplomatic_training: "Formazione Diplomatica"
 diplomatic_training_desc: "Il nostro manuale diplomatico è stato perfezionato e, di conseguenza, abbiamo aggiunto eccellenti diplomatici al nostro entourage nel tentativo di rafforzare i nostri sforzi all'estero."

 formalized_relations: "Relazioni Formalizzate"
 formalized_relations_desc: "Stabilire relazioni formali con i paesi confinanti di nostro interesse è fondamentale se vogliamo mantenere un equilibrio di potere e promuovere i nostri interessi."

 artists_advance_discovery: "Stampe Artistiche"
 artists_advance_discovery_desc: "L'uso diffuso della stampa aprirà nuove opportunità alla nostra gente per condividere le proprie abilità artistiche in modo più ampio e veloce che mai.
 improved_book_binding: "Rilegatura Migliorata"
 improved_book_binding_desc: "I fiori del pensiero e della conoscenza devono essere innaffiati da un costante approvvigionamento di libri se vogliamo prosperare e coltivare il nostro popolo."

 lumber_improvements_discovery: "Silvicoltura Specializzata"
 lumber_improvements_discovery_desc: "Dedicando una parte del territorio alla coltivazione e al raccolto di alberi robusti, possiamo aumentare la qualità e la quantità della nostra produzione di legname."

 lumber_improvements_reformation: "Lame per Seghe Migliorate"
 lumber_improvements_reformation_desc: "Grazie ai recenti progressi nella produzione di utensili, le nostre lame per seghe sono più robuste che mai e richiedono meno manutenzione. Ciò renderà molto più facile rispetto al passato fornire legname adeguato per le attività economiche."

 lumber_improvements_absolutism: "Segherie ad Energia Eolica"
 lumber_improvements_absolutism_desc: "Con l'introduzione dell'energia eolica nelle nostre segherie, siamo in grado di trasformare il legname in tavole a una velocità molto maggiore rispetto al passato."

 coal_improvements_absolutism: "Cokefazione Migliorata"
 coal_improvements_absolutism_desc: "Ottimizzando il processo di raffinazione del carbone, possiamo utilizzarlo in modo più efficace come combustibile, eliminando al contempo gli effetti collaterali che avrebbero un impatto negativo su altri prodotti industriali."

 coal_improvements_revolutions: "Forni a Cupola Migliorati"
 coal_improvements_revolutions_desc: "Per la produzione di coke, una parte fondamentale della lavorazione del ferro, abbiamo bisogno di molti forni a cupola. Grazie a tecniche di costruzione migliorate e a un uso più efficiente dei mattoni, saremo in grado di aumentare di conseguenza la qualità del coke prodotto."

 correct_box_advance_discovery: "Tenenti"
 correct_box_advance_discovery_desc: "Con la crescita dei nostri eserciti professionali, gli ufficiali incaricati di guidarli comandano formazioni sempre più grandi. Per assisterli, creeremo il grado di tenente. Questi ufficiali si occuperanno di trasmettere gli ordini dal comando e guideranno anche unità più piccole sul campo di battaglia."

 artists_advance_reformations: "Sviluppo dell'Arte Secolare"
 artists_advance_reformations_desc: "Sulla scia della Riforma, nuove forme d'arte fioriscono come boccioli su una vite. È diventato più facile per gli artisti ottenere riconoscimento nel loro campo e trovare impiego nelle corti di tutto il mondo."

 war_score_reformations_advance: "Diritto Divino di Conquistare"
 war_score_reformations_advance_desc: "La vittoria sul campo di battaglia è il risultato di qualcosa di più della semplice esecuzione di piani di battaglia e strategie belliche: è un intervento divino a nostro favore. Pertanto, il nostro diritto di conquistare e annettere nuovi territori per i quali abbiamo versato sangue è un'estensione della volontà divina che sostiene la nostra supremazia."

 reformation_subject_opinions_advance: "Signori Economici"
 reformation_subject_opinions_advance_desc: "I contratti che definiscono la sovranità su un altro Stato coprono molti aspetti diversi. Uno di questi è l'obbligo commerciale interno del suddito nei confronti del suo signore. Con l'aumentare dell'importanza del commercio globale, l'espansione di questi obblighi diventa sempre più importante."

 spy_construction_reformation: "Crittografia Avanzata"
 spy_construction_reformation_desc: "Se vogliamo raccogliere informazioni sui nostri nemici, dobbiamo migliorare la nostra abilità nel decifrare e ideare codici segreti. Dobbiamo indurre i nostri nemici in un falso senso di sicurezza inviando loro comunicazioni che sembrano ordinarie, ma che in realtà contengono informazioni nascoste e codificate. Peccato che i nostri nemici non saranno abbastanza intelligenti da capirlo!"

 subject_income_reformation_advance: "Controllo Finanziario più Rigoroso"
 subject_income_reformation_advance_desc: "Le responsabilità finanziarie dei nostri sudditi nei nostri confronti sono chiaramente definite. Tuttavia, rendere più rigorosi questi contratti garantirà pagamenti puntuali e porterà a un tesoro più solido."

 correct_box_advance_reformation: "Organizzazione Reggimentale"
 correct_box_advance_reformation_desc: "Gli eserciti professionali hanno reso possibile la creazione di un nuovo tipo di unità, il reggimento, che non solo è una posizione permanente per i soldati, ma anche un'utile formazione di battaglia."

 recruitment_improvements_reformation: "Uffici di Reclutamento"
 recruitment_improvements_reformation_desc: "Affinché il nostro Paese possa creare un esercito formidabile, dobbiamo migliorare le nostre attività di reclutamento. Con un aumento del tempo e del denaro spesi per i centri e le attività di reclutamento, attireremo rapidamente soldati capaci."

 mercenaries_reformation_advance: "Garantire il Pagamento dei Mercenari"
 mercenaries_reformation_advance_desc: "È ben noto che i mercenari non lavorano gratis. Promettendo loro una ricompensa equa e una parte del bottino, potremo assicurarci più facilmente la loro lealtà e garantire che le compagnie più esperte siano disposte a lavorare per noi."

 renaissance_subject_opinions_advance: "Signori Culturali"
 renaissance_subject_opinions_advance_desc: "Negli ultimi anni, le questioni relative alla cultura, all'umanesimo e alla filosofia naturale hanno acquisito maggiore importanza. Questa influenza culturale si estende non solo al nostro popolo, ma anche agli Stati che ci hanno giurato fedeltà, rendendo la nostra posizione di dominatori culturali un prezioso strumento diplomatico."

 spy_construction_renaissance: "Reti di Spionaggio"
 spy_construction_renaissance_desc: "Lo spionaggio è stato uno strumento prezioso per gli imperi fin dall'antichità. L'arte dello spionaggio ci permette di essere meglio informati sulle minacce interne ed esterne e di monitorare le attività di Stati e attori potenzialmente pericolosi. I mongoli erano maestri in questa arte e utilizzavano lo spionaggio per preparare e garantire il successo delle loro campagne militari."

 recruitment_improvements_renaissance: "Reclutamento Organizzato"
 recruitment_improvements_renaissance_desc: "Lo sviluppo di eserciti professionali ha aumentato le nostre capacità militari. Per sostenere questo sviluppo, lo Stato dovrà migliorare anche la sua capacità di reclutare soldati."

 correct_box_advance_renaissance: "Ufficiali"
 correct_box_advance_renaissance_desc: "Lo sviluppo di eserciti professionali ha portato alla nomina di posizioni di comando permanenti, cariche concesse con nomina diretta dal sovrano."

 improve_relation_impact_renaissance: "Doni Diplomatici Sontuosi"
 improve_relation_impact_renaissance_desc: "I doni diplomatici sono stati scambiati fin dall'antichità, come misura per impressionare o persuadere i sovrani stranieri sottolineando l'alto status e l'invidiabile ricchezza di chi li offriva. I doni potevano variare da tessuti pregiati, a splendidi gioielli, ad animali sorprendenti come giraffe o elefanti."

 late_feudal_relations: "Relazioni Tardo-Feudali"
 late_feudal_relations_desc: "Il feudalesimo si basa sui concetti di #italic auxilium#! e #italic consilium#!, ovvero aiuto militare e consiglio, dovuti dai vassalli ai loro signori. Ciò ha creato una complessa gerarchia di rango, privilegi e doveri reciproci."

 artists_advance_revolutions: "Arte Illuminata"
 artists_advance_revolutions_desc: "Con l'avvento dell'Illuminismo, le arti fioriscono in tutte le forme e a tutti i livelli della società. Le nuove pubblicazioni musicali e letterarie stanno in particolare portando a un ampio interesse per queste arti."

 revolutions_subject_opinions_advance: "Signori Benevoli"
 revolutions_subject_opinions_advance_desc: "Le fiamme della rivoluzione non sono una minaccia da sottovalutare. Se vogliamo garantire la lealtà dei nostri sudditi, dobbiamo soffocare sul nascere qualsiasi idea di rivolta nominando governatori affidabili ed eliminando ogni causa di disordini."

 war_score_revolutions_advance: "Argomenti della Ragione"
 war_score_revolutions_advance_desc: "Le guerre sono sempre eventi brutti che causano sofferenza a entrambe le parti. Sottolineare questo fatto e fare appello alla ragione e alla logica dei nostri oppositori ci darà sicuramente un vantaggio significativo quando negozieremo gli inevitabili cambiamenti dei confini."

 spy_construction_revolutions: "Contatti con i Dissidenti"
 spy_construction_revolutions_desc: "Man mano che nuove idee e nuovi sistemi politici prendono piede in tutto il mondo, è logico che sorgano anche coloro che protestano contro lo status quo. Dovremo stanziare risorse per sostenere queste voci dissenzienti nelle nazioni rivali, al fine di ottenere informazioni preziose e contribuire ai loro effetti destabilizzanti."

 revolutions_agressive_advance: "Conflitti Giustificati"
 revolutions_agressive_advance_desc: "Il teatro diplomatico internazionale prospera grazie all'equilibrio di potere tra le nazioni. Le guerre di aggressione sono malviste e, se vinte, potrebbero portare alla formazione di coalizioni che si uniscono contro il vincitore. Tuttavia, attraverso un uso intelligente della diplomazia e dell'interpretazione, possiamo far apparire i nostri nemici come gli aggressori contro di noi, giustificando la nostra bellicosità e i vantaggi che ne derivano agli occhi dell'opinione pubblica."

 subject_income_revolutions_advance: "Sovranità Remunerata"
 subject_income_revolutions_advance_desc: "Il mondo che ci circonda sta subendo enormi cambiamenti in tutti i settori. Possiamo trarre vantaggio da questa instabilità formalizzando accordi tributari con le nazioni soggette in cambio del nostro sostegno. La protezione sovrana, a quanto pare, ha un prezzo."

 artillery_vs_fort_age_6_revolutions: "Obici Avanzati"
 artillery_vs_fort_age_6_revolutions_desc: "La necessità di un'arma migliore che si collocasse tra il fuoco diretto dei cannoni d'assedio e quello indiretto con una traiettoria più alta dei mortai ha portato il nostro esercito a sviluppare nuovi obici che soddisfano questa esigenza.
 recruitment_improvements_revolutions: "Reclutamento di Massa"
 recruitment_improvements_revolutions_desc: "Con potenziali minacce che emergono da un'area geografica più ampia che mai, dobbiamo espandere di conseguenza il nostro reclutamento militare. Offrendo incentivi ai volontari e arruolando anche i criminali, possiamo mobilitare rapidamente le forze per affrontare qualsiasi pericolo."

 correct_box_advance_revolutions: "Stato Maggiore"
 correct_box_advance_revolutions_desc: "La crescita degli eserciti e il loro impiego in campagne più lunghe ha creato la necessità di assegnare ufficiali designati alla pianificazione e alla logistica, concentrati sul coordinamento efficace dei diversi corpi sul campo di battaglia."

 urbanization: "Urbanizzazione"
 urbanization_desc: "Le nuove opportunità e la sicurezza offerte dalla vita nelle nostre città emergenti stanno attirando sempre più persone dalle fattorie rurali verso le città, dove sono desiderose di intraprendere lavori industriali creati dalle nuove fabbriche moderne."

 advanced_anti_piracy_warfare: "Rinuncia alla Pirateria"
 advanced_anti_piracy_warfare_desc: "Nella nostra epoca di scoperte e umanesimo, non c'è più posto per i furti e le violenze che i pirati infliggono in alto mare. Sempre più nazioni si stanno unendo per affrontare questa minaccia comune al benessere e alla prosperità di tutti e hanno giurato di porre fine a questo flagello."

 dip_choice_subject_opinions: "Sudditi Emissari"
 dip_choice_subject_opinions_desc: "Il mantenimento di una comunicazione costante con le nazioni soggette attraverso emissari dedicati avrà un impatto positivo sulle nostre relazioni, rafforzando il nucleo del nostro dominio e garantendo la lealtà di tutti i paesi che si trovano sotto la nostra bandiera."

 early_anti_piracy_warfare: "Leghe Anti-Pirateria"
 early_anti_piracy_warfare_desc: "La proliferazione di pirati, briganti e ladri nelle acque lungo le nostre rotte commerciali ha costretto i nostri mercanti a unirsi e a formare delle Leghe Mercantili, che facilitano la protezione delle loro imbarcazioni durante i lunghi viaggi."

 pop_promotion_speed_age_5: "Promozioni Burocratiche"
 pop_promotion_speed_age_5_desc: "La burocrazia si sta espandendo per soddisfare le esigenze della burocrazia in espansione, il che aumenta di conseguenza la nostra necessità di funzionari istruiti che entrino a far parte dei ranghi amministrativi."

 army_movement_speed_absolutism: "Riviste"
 army_movement_speed_absolutism_desc: "Le riviste di campo non sono una tecnologia nuova, ma il loro uso è stato notevolmente diffuso dalla crescita senza precedenti degli eserciti moderni. La fornitura costante di munizioni che garantiscono facilita i movimenti dell'esercito e ne estende il raggio operativo."

 army_movement_speed_revolutions: "Contratti di Fornitura"
 army_movement_speed_revolutions_desc: "Pagare prezzi equi per il cibo e le forniture di cui il nostro esercito ha bisogno mentre si muove attraverso una regione, invece di saccheggiarla, accelera il nostro movimento attraverso l'area, poiché saranno gli stessi contadini a portare le loro merci ai punti di raccolta da noi stabiliti."

 regiment_reinforcement_speed_absolutism: "Maresciallo dell'alloggio"
 regiment_reinforcement_speed_absolutism_desc: "Gli eserciti permanenti sono diventati il nuovo standard della guerra, il che comporta una serie di sfide. Il Maresciallo dell'Alloggio, una nuova figura all'interno delle nostre forze armate, avrà il compito di superare queste sfide organizzando la logistica delle nostre forze in continua crescita."

 pop_promotion_speed_age_3: "Nobiltà al Servizio"
 pop_promotion_speed_age_3_desc: "Tradizionalmente, i nostri aristocratici raggiungevano il loro status attraverso il servizio militare al loro sovrano. Tuttavia, le esigenze di uno Stato in crescita richiedono ora che i membri della nobiltà minore vengano promossi a ranghi più alti, mentre persone di altre classi, come i mercanti, vengono elevate al rango di nobili."

 regiment_reinforcement_speed_discovery: "Logistica Militare Anticipata"
 regiment_reinforcement_speed_discovery_desc: "La logistica è metà della battaglia. Mentre i soldati combattono, le loro armi e armature perdono la loro resistenza e possono persino rompersi sotto l'assalto nemico. La creazione di depositi di rifornimenti locali e l'utilizzo di altri metodi logistici ci consentono di riattrezzare i nostri soldati in tempi record."

 pop_promotion_speed_age_4: "Sacerdoti Confessori"
 pop_promotion_speed_age_4_desc: "L'età della Riforma e del Confessionalismo ha rinnovato l'interesse per le confessioni organizzate e c'è richiesta di un maggior numero di ecclesiastici disposti a guidare il proprio gregge in questi tempi difficili. Questi ecclesiastici confessionali rendono gli uffici religiosi molto più attraenti per coloro che cercano certezze e guida spirituale."

 assault_ability_reformation: "Assalti Militari Riformati"
 assault_ability_reformation_desc: "Delegando la responsabilità di assaltare le brecce alle nostre truppe migliori e più disciplinate, penetreremo anche nelle fortificazioni più formidabili dietro cui i nostri nemici potrebbero nascondersi."

 regiment_reinforcement_speed_reformation: "Flacone di Polvere"
 regiment_reinforcement_speed_reformation_desc: "L'uso di armi da fuoco è diventato sempre più diffuso tra le nostre forze armate. Tuttavia, la polvere da sparo è un materiale difficile da maneggiare a causa della sua vulnerabilità alle condizioni atmosferiche e agli impatti esterni. Una fiaschetta speciale proteggerà la nostra polvere da sparo dagli agenti atmosferici, consentendoci di rifornire più facilmente le nostre truppe."

 pop_promotion_speed_age_2: "Mobilità Sociale Favorevole"
 pop_promotion_speed_age_2_desc: "Il sogno della maggior parte dei contadini - sfuggire alla povertà e scalare la scala sociale - è una realtà nella nostra società. Premiando il duro lavoro, la meticolosità e la corretta incarnazione dei nostri ideali, non avremo mai carenza di persone capaci e influenti."

 regiment_reinforcement_speed_renaissance: "Formazione Permanente"
 regiment_reinforcement_speed_renaissance_desc: "Gli eserciti professionali stanno cambiando il modo di condurre la guerra, che ora si basa su unità permanenti che prestano servizio per lunghi periodi di tempo. Mantenere un flusso regolare di soldati addestrati in queste unità è una sfida, ma è assolutamente necessario per il loro funzionamento ottimale."

 pop_promotion_speed_age_6: "Mobilità Sociale Capitalista"
 pop_promotion_speed_age_6_desc: "L'espansione del capitalismo ha dato vita a una nuova era di mobilità sociale, in cui la ricchezza sta sostituendo le gerarchie tradizionali come mezzo per determinare lo status sociale. Tutti, dai magnati degli affari agli impiegati ai lavoratori industriali, sono desiderosi di acquistare il loro ingresso negli strati superiori."

 regiment_reinforcement_speed_revolutions: "Formazione di Massa"
 regiment_reinforcement_speed_revolutions_desc: "Gli eserciti permanenti moderni sono più grandi di qualsiasi forza militare del passato. Le tattiche vengono eseguite da decine di migliaia di soldati e le vittime si accumulano in numero senza precedenti. Le nostre nuove tecniche di addestramento militare dovrebbero compensare l'alto numero di vittime della guerra moderna preparando centinaia di soldati alla battaglia contemporaneamente."

 siege_ability_revolutions: "Ufficiali d'artiglieria"
 siege_ability_revolutions_desc: "L'artiglieria è diventata così centrale nella guerra moderna che ufficiali specializzati addestrati nelle tecniche di artiglieria e nello schieramento tattico sono ora essenziali sul campo di battaglia."

 assault_ability_revolutions: "Marcia Contro il Fuoco"
 assault_ability_revolutions_desc: "I nostri eserciti marciano volontariamente nel caos dei cannoni e della polvere, aprendo la strada alle nostre truppe per conquistare i forti nemici. Nonostante i progressi nell'artiglieria e le nuove tecniche di fortificazione, la nostra abilità nell'assaltare le mura nemiche rimane impareggiabile."

 army_country_movement_speed_advance: "Gruppi di Ricognizione"
 army_country_movement_speed_advance_desc: "Grazie all'uso di esploratori a cavallo, possiamo controllare il terreno che si trova davanti agli eserciti e pianificare come aggirare eventuali difficoltà. Questo ci permette di viaggiare a una velocità maggiore rispetto ad altri eserciti che si trovano nella stessa posizione."

 army_country_casus_belli_advance: "Pretesti"
 army_country_casus_belli_advance_desc: "I nostri diplomatici e spie professionisti eccellono nel fabbricare pretesti credibili per giustificare quasi tutte le azioni che potremmo intraprendere sulla scena internazionale."

 army_country_integration_speed_advance: "Rispetta il Governo Locale"
 army_country_integration_speed_advance_desc: "Il nostro popolo è composto da temibili signori della guerra che desiderano diffondere la loro eredità in ogni angolo del mondo. Al fine di integrare e gestire il nostro dominio in continua espansione, abbiamo deciso di rispettare il più possibile il modo di comportarsi delle popolazioni locali conquistate e di non interferire eccessivamente."

 army_country_diplo_range_advance: "Inviati Armati"
 army_country_diplo_range_advance_desc: "Il nostro esercito è temuto in lungo e in largo. Nonostante la nostra reputazione, dovremmo comunque stabilire relazioni diplomatiche con le nazioni che hanno il nostro stesso obiettivo: la distruzione dei nostri nemici comuni. Inviando inviati ben armati e scortati alle corti straniere, possiamo garantire che la nostra influenza diplomatica non risenta di episodi di violenza."

 minting_trade_range_trad_building: "Spedizioni Commerciali Pianificate"
 minting_trade_range_trad_building_desc: "Il commercio con i paesi stranieri è la linfa vitale della nostra nazione. Pianificando meticolosamente le rotte commerciali e accumulando scorte per ogni viaggio, possiamo raggiungere mercati più lontani dalle nostre basi."

 minting_trade_range_disc_building: "Depositi Commerciali Ampliati"
 minting_trade_range_disc_building_desc: "La crescente domanda del commercio internazionale dovrà essere presa in considerazione nella pianificazione delle nostre attività commerciali. Con questa espansione dei nostri depositi commerciali, potremo raggiungere nuove coste senza mettere a rischio il nostro prezioso carico."

 trade_center_building_country_advance: "Empori"
 trade_center_building_country_advance_desc: "Con tecniche intelligenti, possiamo facilmente rendere i nostri mercati controllati più attraenti per i mercanti stranieri, aumentando così i nostri guadagni."

 export_building_country_advance: "Esportazione Agile"
 export_building_country_advance_desc: "I costi per esportare merci di valore dai nostri mercati controllati possono essere piuttosto elevati, rendendo i nostri prodotti meno attraenti. Eseguendo queste azioni di esportazione più rapidamente, possiamo rendere il nostro commercio più dinamico."

 counter_espionage_building_country_advance: "Codici Segreti"
 counter_espionage_building_country_advance_desc: "È risaputo che le nostre attività attirano attenzioni indesiderate. Se desideriamo mantenere i nostri piani nascosti da questi sguardi curiosi, dovremmo criptare le nostre comunicazioni."

 medical_school_advance: "Facoltà di Medicina"
 medical_school_advance_desc: "Siti specializzati nella formazione medica, queste scuole sono il luogo in cui gli studiosi vanno per imparare a conoscere il corpo umano, le malattie e come curarle e prevenirle."

 slave_manned_galleys: "Galee a Remi con Equipaggio di Schiavi"
 slave_manned_galleys_desc: "Le grandi flotte di galee comportano costi altrettanto ingenti, poiché devono disporre di un numero sufficiente di rematori per funzionare. Assegnando questo compito agli schiavi, possiamo ridurre significativamente il costo del personale delle nostre marine."

 jesuits_bark: "Corteccia dei Gesuiti"
 jesuits_bark_desc: "È stato osservato che alcune popolazioni indigene del Sud America utilizzano la corteccia di un albero specifico per curare i brividi. Grazie agli esperimenti di un farmacista gesuita, questa corteccia si è dimostrata efficace anche nel trattamento della malaria ed è già nota come 'Corteccia dei Gesuiti'. Distribuirla alla popolazione colpita ridurrà notevolmente gli effetti della malattia."

 quinine: "Chinino"
 quinine_desc: "Sebbene la 'Corteccia dei Gesuiti' sia stata efficace nel trattamento della malaria in passato, il suo consumo sotto forma di polvere di corteccia essiccata lascia molto spazio a miglioramenti. Isolando ed estraendo il vero componente curativo dalla corteccia, possiamo aumentare notevolmente l'efficacia del trattamento."

 state_efficiency: "Infrastrutture Locali"
 state_efficiency_desc: "Nonostante la nostra attenzione sia rivolta alle questioni nazionali, non dobbiamo trascurare i nostri legislatori statali locali e i nostri ufficiali giudiziari."

 efficient_mining: "Estrazione Efficiente"
 efficient_mining_desc: "Emetteremo un decreto per perfezionare ogni aspetto dell'estrazione dei metalli all'interno del nostro dominio, nel tentativo di regolarne la presenza nei nostri mercati."

 efficient_construction_plans: "Piani di Costruzione Efficienti"
 efficient_construction_plans_desc: "La nostra strategia di costruzione efficiente ci consente di portare a termine lavori complessi senza prendere misure insufficienti."

 expanded_infrastructure_network: "Rete Infrastrutturale Ampliata"
 expanded_infrastructure_network_desc: "La nostra rete stradale nazionale è una parte fondamentale del nostro successo commerciale e amministrativo. Pertanto, dovremmo preoccuparci di mantenerla e migliorarla."

 fort_logistics: "Logistica delle Fortificazioni"
 fort_logistics_desc: "Organizzando il nostro sistema di fortificazioni in modo sistematico, sia dal punto di vista costruttivo che logistico, potremo risparmiare sui costi di manutenzione a lungo termine."

 regulation_bureau: "Ufficio di Regolamentazione"
 regulation_bureau_desc: "Un organo legislativo la cui giurisdizione comprende il mantenimento e la promozione delle leggi relative all'inflazione, nonché l'amministrazione locale delle nostre province."

 more_merchants_age_of_trad: "Gilde dei Mercanti"
 more_merchants_age_of_trad_desc: "La formazione delle gilde ha plasmato la nostra economia per molto tempo. Sebbene siano organizzazioni comuni tra i nostri artigiani, lo stesso non si può dire per i nostri mercanti. Dovremmo incoraggiare i nostri commercianti a formare gilde simili al fine di ottimizzare le nostre ambizioni mercantili."

 construction_speed_traditions: "Maestri Muratori"
 construction_speed_traditions_desc: "I nostri sforzi nel campo dell'edilizia non dovrebbero mai fermarsi e lasciare i nostri villaggi e le nostre città inattivi. Assumendo un capomastro, che supervisionerà e pianificherà i nostri lavori di costruzione, potremo apportare miglioramenti significativi nell'espansione del nostro paese."

 diplomatic_capacity_traditions: "Archivi Ampliati"
 diplomatic_capacity_traditions_desc: "Le normali attività diplomatiche richiedono pratiche burocratiche e una documentazione dettagliata dei nostri contatti."

 rural_rgo_traditions: "Bonifica del Terreno"
 rural_rgo_traditions_desc: "Dobbiamo domare i confini più remoti del nostro paese per espandere le nostre capacità economiche. Non solo forniremo più spazio alla nostra gente, ma potremo ottimizzare il loro contributo al nostro paese."

 matchlock_gun: "Fucili da Caccia Primitivi"
 matchlock_gun_desc: "I miglioramenti apportati alle armi prodotte dai nostri armaioli forniranno ai nostri cacciatori strumenti migliori per portare a casa pelli e selvaggina in abbondanza."

 flintlock_gun: "Fucili da Caccia Migliorati"
 flintlock_gun_desc: "Con lo sviluppo di fucili a pietra focaia migliorati e munizioni speciali per la caccia, i nostri cacciatori saranno ancora più capaci di catturare le loro prede."

 long_rifle: "Fucile Lungo da Caccia"
 long_rifle_desc: "Con fucili lunghi specifici progettati per la caccia, i nostri cacciatori avranno uno strumento affidabile per procurarsi cibo e pellicce."

