 # Institutions
 feudalism: "Feudalesimo"
 #feudalism_desc: "Nel corso del tempo, la maggior parte delle società sviluppa l'esigenza di una struttura comune con istituzioni governative più forti e permanenti. Dopo la caduta dell'Impero Romano, questa esigenza è stata soddisfatta da una serie di istituzioni e costumi che, nel loro insieme, sono spesso considerati parte del sistema feudale europeo.\n\nPer ragioni simili, in tutto il mondo si sono formati sistemi governativi e sociali permanenti, alcuni dei quali hanno radici che risalgono a molto prima del feudalesimo stesso." #OLD ITA
 feudalism_desc: "Over time, many societies develop stronger and more permanent institutions of government. After the fall of the Roman Empire, much of $europe$ gradually developed into a feudal system, a structure in which $peasants_estate$ performed labor on properties owned by wealthy $nobles_estate$ in exchange for protection and the right to use that land for their own purposes.\n\nFor similar reasons, parallel systems of land tenure and reciprocal obligation have formed across the world, some with roots that go even further back than European feudalism." #NEW
 #feudalism_desc: "Over time, most societies develop a need for a common structure with stronger and more permanent institutions of government. After the fall of the Roman Empire, this need came to be filled by a number of institutions and customs that taken together are often considered to be part of the European Feudal system.\n\nFor similar reasons, permanent government and societal systems have formed all over the world, some of which have roots that go far further back than Feudalism itself." #OLD ENG
 legalism: "Legalismo"
 #legalism_desc: "Le teorie alla base del Legalismo si sono integrate nelle strutture sociali cinesi nel corso di centinaia di anni. Il concetto secondo cui il puro idealismo e la stabilità interna portano a uno Stato ricco e prospero e a un esercito potente è profondamente radicato nei forum di pensiero dei domini dell'Asia orientale.\n\nTuttavia, con lo scambio di idee portato dai mercanti e dai migranti, il concetto di Legalismo si è diffuso nei vasti territori del mondo musulmano. Lì ha assunto la forma di una relazione simbiotica tra pagani e credenti negli Stati islamici.\n\nIl Legalismo in Europa ha segnato il rito di passaggio dalla fine del grande Impero Romano alle sue radici giuridiche residue, molte delle quali sarebbero poi servite come base per una nuova giurisprudenza in tutto il vecchio continente." #OLD ITA
 legalism_desc: "The theories behind Legalism have been integral to $CHI_ADJ$ society for hundreds of years. The concept that strict laws, centralized authority, and bureaucratic efficiency lead to a stable, prosperous state with a powerful army is deeply rooted in many ideologies throughout $east_asia$.\n\nAs merchants and migrants facilitated the exchange of ideas across the world, Legalism entered the vast $muslim_ADJ$ sphere, where it became part of the symbiotic relationship between believers and non-$muslim_ADJ$ subjects.\n\nIn $europe$, Legalism emerged from the dying gasps of the Roman Empire. After its decline, its systematic legal codes were adapted and transformed into the foundational jurisprudence for many nations on the continent." #NEW
 #legalism_desc: "The theories behind Legalism have been integrating into Chinese societal structures for hundreds of years. The concept that pure idealism and domestic stability leads to a rich, prosperous state and a powerful army is deeply rooted in the forums of thought in the Eastern Asian domains.\n\nHowever, as merchants and migrants brought forth the exchange of ideas, the concept of Legalism made its way across the vast expanses of the Muslim world. There, it adopted the stance of a symbiotic relationship between heathens and believers in Islamic states.\n\nLegalism in Europe signified the rite of passage, from the dying grasps of the great Roman Empire to its remnant legal roots, many of which would later serve as the basis for new jurisprudence across the old continent." #OLD ENG
 meritocracy: "Meritocrazia"
 #meritocracy_desc: "Molti individui di grande prestigio e in posizioni di potere spesso sceglievano di nominare le persone a loro più vicine in ruoli influenti.\n\n L'avvento della Meritocrazia come istituzione e movimento di pensiero era molto popolare nelle corti della Cina imperiale. Lì, lo stesso Confucio sosteneva l'idea che chi governa dovrebbe farlo sulla base del merito, non dello status ereditario.\n\nCiò portò alla sostituzione della nobiltà cinese legata ai legami di sangue con una basata esclusivamente sulle capacità meritocratiche. Lo sviluppo di questa istituzione si sarebbe diffuso oltre i confini dell'Asia e avrebbe finito per raggiungere anche le corti reali dei monarchi europei, i cui nobili avevano una solida padronanza dei meccanismi del potere e dell'autorità." #OLD ITA
 meritocracy_desc: "Individuals of great prestige and power often appoint those closest to them to particularly influential positions.\n\nThe advent of Meritocracy as an institution and thought movement was largely popular in the courts of $CHI$. There, Confucius himself supported the notion that those who govern should do so on the basis of merit, not due to inherited status. This led to the replacement of the traditional $CHI_ADJ$ aristocracy with one based solely on merit.\n\nThe development of this institution would cause ripples across and beyond the borders of $asia$, eventually reaching the royal courts of $europe$, even those whose nobles had a crushing grasp on the mechanisms of power and authority." #NEW
 #meritocracy_desc: "Many individuals of great prestige and in positions of power often chose to appoint those closest to them in influential spots.\n\nThe advent of Meritocracy as an institution and a thought movement was largely popular in the courts of Imperial China. There, Confucius himself supported the notion that those who govern should do so on the basis of merit, not of inherited status.\n\nThis led to the replacement of the Chinese nobility of blood ties to one based solely on meritocratic abilities. This institution's development would ripple across and beyond the borders of Asia and would eventually reach the royal courts of even European monarchs whose Nobles had a firm grasp on the mechanisms of power and authority." #OLD ENG
 #
 renaissance: "Rinascimento"
 #renaissance_desc: "A partire dal XIV secolo, i ricchi e i potenti delle città-stato italiane hanno iniziato a patrocinare artisti e studiosi desiderosi di esplorare le antiche società romane e greche dei loro antenati.\n\n Come movimento culturale, il Rinascimento abbraccia già gran parte della regione e ha avuto un profondo impatto sulla letteratura, l'arte, la filosofia e la musica. Gli studiosi umanisti analizzano anche la società in cui vivono, confrontandola con gli ideali dei filosofi classici. L'umanesimo rinascimentale è diventato un movimento più maturo, pronto a permeare tutti gli aspetti della società.\nUn nuovo ideale per i governanti e per i governati si sta diffondendo con la stessa rapidità con cui i primi stampatori riescono a distribuire copie di queste nuove idee.\n\nUn vero umanista rinascimentale è un esperto in tutto, dalla politica e la filosofia all'arte, all'analisi testuale, alla musica e all'architettura. Il Rinascimento è ora pronto a rimodellare il mondo per adattarlo meglio ai suoi ideali classici." #OLD ITA
 renaissance_desc: "The wealthiest and most powerful citizens in the $ITA_ADJ$ city-states have been patronizing artists and scholars who are breathing new life into the classical ideals and aesthetics of their Greek and Roman forebears. As a cultural movement, the Renaissance has already had a profound impact on the literature, art, philosophy, and music of our region. Renaissance Humanism has developed into a fully-formed intellectual tradition ready to permeate all aspects of society; A true Renaissance Humanist is an expert in everything from politics and philosophy to art, textual analysis, music, and architecture.\n\nNew ideals for rulers — as well as those who are ruled — are spreading as quickly as printing presses can distribute copies.\n\nRenaissance ideals are now poised to reshape the world according to these sophisticated classical principles." #NEW
 #renaissance_desc: "Starting now in the 14th century, the wealthy and powerful in the Italian City states have been patronizing artists and scholars willing to explore the old Roman and Greek societies of their forefathers.\n\nAs a cultural movement the Renaissance already encompasses most of the region and has had a profound impact on literature, art, philosophy, and music. Humanist scholars are also analyzing the society in which they live, comparing it to the ideals of the Classical philosophers. Renaissance Humanism has grown into a more mature movement, ready to permeate all aspects of society.\nA new ideal for rulers as well as those who are ruled is spreading as quickly as the early Printers can distribute copies of these new ideas.\n\nA true Renaissance Humanist is an expert on everything from politics and philosophy to art, textual analysis, music, and architecture. The Renaissance is now ready to reshape the world to better fit its classical ideals." #OLD ENG
 banking: "Sistema Bancario"
 #banking_desc: "Il prestito di denaro esiste fin dall'apparizione delle monete metalliche nell'antichità. Tuttavia, dipendeva da alcuni individui e dai loro gruppi familiari o dagli Stati antichi. Nel Medioevo si verificò un cambiamento, incoraggiato dalla rinnovata crescita delle attività commerciali a lungo raggio nel continente eurasiatico e nelle sue periferie.\n\nUsurai specializzati cominciarono a organizzarsi quando le comunità ebraiche iniziarono ad operare tra il mondo cristiano e quello islamico. Tuttavia, il boom della domanda di credito che seguì le Crociate nel XII secolo incoraggiò i mercanti delle città-stato italiane a creare strutture più grandi per il prestito di denaro, fondando di fatto le prime istituzioni bancarie, come le case Peruzzi e Bardi.\n\nFurono sviluppati altri strumenti, come le cambiali e le obbligazioni, e dinastie bancarie come i Medici, i Fugger o i Welser divennero presto potenti quanto gli Stati." #OLD ITA
 banking_desc: "Moneylending has existed since metal-based coins first appeared in Antiquity. However, its availability is heavily dependent on the dominant people, culture, or religion of a given state.\n\nA shift occurred in the Middle Ages, encouraged by the renewed growth of long-range commercial activities on the Eurasian continent and its peripheries. Specialized moneylenders began to organize when $judaism_ADJ$ communities started operating between the $christian_ADJ$ and $muslim_ADJ$ worlds. However, the boom of credit demand that followed the Crusades in the 12th century encouraged merchants in the $ITA_ADJ$ city-states to create larger structures for moneylending, effectively founding the first banking institutions, such as the Peruzzi and Bardi houses.\n\nMore instruments were developed, like bills of exchange and debt bonds, and banking dynasties such as the $medici_dynasty$, $fugger_dynasty$, or $welser_dynasty$ soon became as powerful as states." #NEW
 #banking_desc: "Money lending has existed since metal-based coins appeared in Antiquity. However, it depended on some individuals and their family groupings or on the Ancient States. A shift occurred in the Middle Ages, encouraged by the renewed growth of long-range commercial activities on the Eurasian continent and its peripheries.\n\nSpecialized moneylenders began to organize when Jewish communities started operating between the Christian and Islamic worlds. However, the boom of credit demand that followed the Crusades in the 12th century encouraged merchants in the Italian city-states to create larger structures for money lending, effectively founding the first Banking institutions, such as the Peruzzi and Bardi houses.\n\nMore instruments were developed, like bills of exchange and debt bonds, and Banking dynasties such as the Medici, Fugger or Welser soon became as powerful as States." #OLD ENG
 professional_armies: "Eserciti Professionistici"
 #professional_armies_desc: "Gli eserciti esistono da quando è stata inventata la guerra, molte migliaia di anni fa. Tuttavia, la loro forma è cambiata nel corso dei secoli e si sono sviluppati diversi tipi di reclutamento e organizzazione nelle diverse culture e periodi storici.\n\nNel tardo Medioevo, gli eserciti di una vasta gamma di società si basavano su leve basate sulle strutture della società feudale, con cavalieri e fanti che formavano un nucleo che veniva reclutato stagionalmente. In alcune regioni, tuttavia, gli Stati erano abbastanza potenti da finanziare eserciti permanenti, con soldati professionisti disponibili per il servizio durante tutto l'anno.\n\nQuesto sistema si sviluppò anche in Europa dopo lo scoppio della Guerra dei Cent'anni, rappresentando uno dei principali cambiamenti che promossero una rivoluzione militare nell'età moderna. Aumentare le dimensioni e la qualità degli eserciti professionali, trovando al contempo nuove fonti di reddito per finanziarli, divenne ben presto una delle principali sfide per i governanti di tutto il mondo." #OLD ITA
 professional_armies_desc: "Armies have existed since war was invented, many thousands of years ago. However, their form has changed over the centuries, and different types of recruitment and organization have developed in different cultures and periods.\n\nIn the Late Middle Ages, armies in many societies relied on levy systems, with knights and footmen forming a core that was levied seasonally. Some states, however, were powerful enough to finance standing armies, staffed by professional soldiers who would be available for duty throughout the year.\n\nThis system also developed in $europe$ after the outbreak of the Hundred Years War, being one of the main changes that promoted a military revolution in the Early Modern Age. Increasing the size and quality of professional armies, while finding new sources of revenue to finance them, soon became one of the main challenges for rulers around the world." #NEW
 #professional_armies_desc: "Armies have existed since war was invented, many thousands of years ago. However, their form has changed over the centuries, and different types of recruitment and organization have developed in different cultures and periods.\n\nIn the Late Middle Ages, armies in a wide range of societies relied on levies based on the structures of feudal society, with knights and footmen forming a core that was levied seasonally. In some regions, however, states were powerful enough to finance standing armies, with professional soldiers who would be available for duty throughout the year.\n\nThis system was also developed in Europe after the outbreak of the Hundred Years' War, being one of the main changes that promoted a Military Revolution in the Early Modern Age. Increasing the size and quality of Professional Armies, while finding new sources of revenue to finance them, soon became one of the main challenges for rulers around the world." #OLD ENG
 #
 new_world: "Nuovo Mondo"
 #new_world_desc: "La scoperta del Nuovo Mondo ha inaugurato una nuova era non solo per i colonizzatori e i colonizzati, ma ha anche portato alla diffusione di materiali e tecniche, nonché alla consapevolezza della vastità del globo. Con la diffusione di animali, colture, argento e malattie attraverso l'Atlantico, sono stati compiuti i primi passi verso un'economia veramente globale. Con la mappatura e la documentazione di terre e popoli stranieri, le idee e il dibattito religioso e filosofico sono sempre più influenzati da ciò che abbiamo scoperto nelle società d'oltreoceano. Le grandi menti sentono il bisogno di mettere in discussione ciò che un tempo era considerato verità e, da Valladolid a Fatehpur Sikri, la natura del mondo è ora oggetto di dibattito." #OLD ITA
 new_world_desc: "The discovery of the New World has ushered in a new era — not only for the colonizers and the colonized, but for many nations in the Old World, as colonial expansion has led to widespread availability of new resources and innovations, as well as a fuller realization of our vast world. As new animals, crops, precious metals, and diseases spread across the $atlantic_ocean_continent$, the first steps have been taken towards a truly global economy.\n\nWith foreign lands and peoples being mapped and documented, ideas as well as religious and philosophical debate are increasingly being colored by what we have found in overseas societies. Great minds feel the need to question what was once accepted as truth, and from $valladolid$ to Fatehpur Sikri, the nature of the world is now up for debate." #NEW
 #new_world_desc: "The discovery of the New World has heralded a new era not only for the colonizers and the colonized, but it has also led to the spread of materials and techniques as well as a realization of the vastness of the globe. As animals, crop types, silver and diseases spread across the Atlantic, the first steps have been taken towards a truly global economy. With foreign lands and people being mapped and documented, ideas as well as religious and philosophical debate are increasingly being colored by what we have found in overseas societies. Great minds feel the need to question what was once truth, and from Valladolid to Fatehpur Sikri, the nature of the world is now up for debate." #OLD ENG
 printing_press: "Macchina da Stampa"
 #printing_press_desc: "La possibilità di produrre in massa testi scritti avrebbe rivoluzionato la diffusione delle informazioni e, sotto molti aspetti, l'intera società moderna. Introdotta da personaggi del Rinascimento come il tipografo veneziano Aldo Manuzio, questa nuova arte contribuì ad alimentare il Rinascimento rendendo più accessibili i classici tradotti. In seguito, la Riforma trasse grande beneficio dalla possibilità di diffondere pubblicazioni critiche e traduzioni delle Sacre Scritture.\n\nOra che la stampa è maturata come tecnica e si è diffusa in tutta Europa, centinaia di migliaia di copie di tutto, dagli opuscoli religiosi e politici ai trattati scientifici e alle istruzioni su come comportarsi, circolano nel continente. Con le tipografie che diventano sempre più comuni, i governanti hanno trovato difficile contenere la nuova tecnica, poiché i mezzi di produzione relativamente facili consentono di aggirare la censura spostando l'attività oltre confine o anche solo cambiando il nome sul frontespizio." #OLD ITA
 printing_press_desc: "The ability to mass-produce the written word would revolutionize the spread of information and, in many ways, society as a whole. Pioneered by talented individuals, such as $VEN_ADJ$ printer Aldus Manutius, this new art helped fuel the $renaissance$ by making the translated classics more widely available. Later, the Reformation benefitted greatly from the ability to spread critical publications and translations of the Holy Scriptures.\n\nNow that printing has matured as a technique and spread throughout $europe$, hundreds of thousands of copies of everything from religious and political pamphlets, to scientific treatises, to etiquette guides are circulating the continent. With print shops growing ever more commonplace, rulers have found it hard to contain the new technique, as the comparatively easy means of production means censorship can be sidestepped by moving one's business across a border — or even just changing the name on a title page." #NEW
 #printing_press_desc: "The ability to mass-produce the written word would revolutionize the spread of information and in many ways early modern society as a whole. Pioneered by Renaissance men such as Venetian Printer Aldus Manutius, the new art helped fuel the Renaissance by making the translated classics more widely available. Later the Reformation benefitted greatly from the ability to spread critical publications and translations of the Holy Scriptures.\n\nNow that Printing has matured as a technique and spread throughout Europe, hundreds of thousands of copies of everything from Religious and Political pamphlets to scientific treatises and instructions on how to behave are circulating the continent. With print shops growing evermore commonplace, rulers have found it hard to contain the new technique as the comparatively easy means of production means censorship can be sidestepped by moving business across a border or even just changing the name on a title page." #OLD ENG
 #pike_and_shot: "Picca e Moschetto" #OLD ITA
 pike_and_shot: "Pike and Shot" #NEW
 #pike_and_shot: "Pike & Shot" #OLD ENG
 #pike_and_shot_desc: "Alla fine del XV secolo, nel pieno delle guerre d'Italia, iniziò a svilupparsi un nuovo tipo di guerra. La diffusione dei picchieri nel tardo Medioevo, in alternativa ai soldati d'arme in grado di affrontare con successo le cariche della cavalleria pesante, fu accompagnata dallo sviluppo di armi da fuoco portatili, principalmente archibugi e moschetti a miccia. I soldati adottarono una nuova formazione, in cui i picchieri formavano un quadrato, mentre gli archibugieri si dispiegavano ai lati e sul fronte, cercando riparo dietro o all'interno del quadrato nel caso in cui la formazione entrasse in combattimento ravvicinato. Questo nuovo tipo di formazione, chiamata Picca e Moschetto, era preferita dai Lanzichenecchi tedeschi e dai Tercios spagnoli, e fu presto adottata da altri eserciti, regnando sovrana sui campi di battaglia europei per quasi due secoli, fino a quando non fu sostituita all'inizio del XVIII secolo dalle formazioni di fanteria in linea armate con nuovi moschetti a pietra focaia muniti di baionette." #OLD ITA
 pike_and_shot_desc: "A new type of warfare began to develop at the end of the 15th Century, in the midst of the $ITA_ADJ$ Wars. The generalization of pikemen in the Late Middle Ages as an alternative to men-at-arms who could successfully face heavy cavalry charges was accompanied by the development of portable firearms, mainly matchlock arquebuses and muskets. The soldiers now adopt a new formation, in which the pikemen form a square, while the arquebusiers fan out to the sides and front, and seek cover behind or inside the square in case the formation enters close combat. This new type of formation, called Pike and Shot, was favored by $GER_ADJ$ #italic Landsknechts#! and $SPA_ADJ$ #italic Tercios#!, and was soon adopted by other armies, reigning supreme on the battlefields of $europe$ for nearly two centuries, until superseded in the early 18th Century by line infantry formations armed with new flintlock muskets mounting bayonets." #NEW
 #pike_and_shot_desc: "A new type of warfare began to develop at the end of the 15th Century, in the midst of the Italian Wars. The generalization of pikemen in the Late Middle Ages as an alternative to men-at-arms who could successfully face heavy cavalry charges was accompanied by the development of portable firearms, mainly matchlock arquebuses and muskets. The soldiers now adopt a new formation, in which the pikemen form a square, while the arquebusiers fan out to the sides and front, and seek cover behind or inside the square in case the formation enters close combat. This new type of formation, called Pike & Shot, was favored by German Landsknechts and Spanish Tercios, and was soon adopted by other armies, reigning supreme on European battlefields for nearly two centuries, until superseded in the early 18th Century by line infantry formations armed with new flintlock muskets mounting bayonets." #OLD ENG
 #
 confessionalism: "Confessionalismo"
 #confessionalism_desc: "Il cattolicesimo è stato considerato a lungo un'entità unitaria, ma l'avvento delle varie correnti protestanti ha posto fine a questa situazione. Con l'emergere di una miriade di interpretazioni diverse di ciò che dovrebbe essere la fede, il cristianesimo è tutt'altro che unito. Ma se prima qualsiasi scostamento dalla Chiesa poteva essere facilmente etichettata come eretica, ora i confini che creano le differenze sono diventati almeno più sfumati.\n\nDi conseguenza, sia le autorità religiose che quelle secolari hanno mostrato un crescente interesse a definire chiaramente le forme delle loro specifiche confessioni, applicando le loro regole e opinioni particolari su tutti gli aspetti della fede e della vita. Ciò consente loro di avere un controllo più saldo sulla fede della popolazione, ma aumenta anche la diversificazione e quindi l'ostilità con tutti gli altri credi." #OLD ITA
 confessionalism_desc: "$catholic$ has been regarded as a unitary entity for a long time, but the advent of the various $protestant_ADJ$ faiths has put an end to that. Given the myriad of different interpretations of what the faith should be, $christian$ is anything but united. But whereas before any deviance from mainstream Church teachings could be easily labeled as heresy, the lines between the different sects have mercifully become blurrier.\n\nAs such, there has been an increasing interest both for religious and secular authorities alike to clearly define the shape of their specific doctrines, enforcing their particular rules and views on all aspects of faith and life. This allows them a more firm grip on the faith of their population, but also increases the differentiation, and thus animosity with all other forms of belief." #NEW
 #confessionalism_desc: "Catholicism has been regarded as a unitary entity for a long time, but the advent of the various Protestant Faiths has put an end to that. With the rise of a myriad of different interpretations of what the Faith should be, Christianity is anything but united. But where before any deviance from the Church could be easily labeled as heretic, now the lines creating the differences have become blurrier at least.\n\nAs such, there has been an increasing interest both for religious and secular authorities alike to clearly define the shapes of their specific confessions, enforcing their particular rules and views on all aspects of faith and life. This allows them a more firm grip on the faith of their population, but also increases the differentiation and thus animosity with all the other confessions." #OLD ENG
 global_trade: "Commercio Globale"
 #global_trade_desc: "Sin dall'antichità le merci vengono trasportate da un continente all'altro. Ma mentre in passato ciò era limitato a un numero prestabilito di rotte e merci, come i manufatti provenienti dall'India e dalla Cina che attraversavano l'Oceano Indiano e la Via della Seta, oggi tutto il commercio sta diventando sempre più parte di una rete mondiale più ampia. Con la scoperta delle Americhe, le rotte marittime intorno all'Africa e la traversata dell'Oceano Pacifico, le reti commerciali locali sono state collegate in un'unica rete interconnessa che abbraccia tutto il mondo. n\nL'argento estratto nelle Ande viene ora imballato e trasportato attraverso l'Europa fino alla Cina e all'India. Il ferro estratto e lavorato in Scandinavia viene venduto in Africa occidentale dai mercanti inglesi, mentre altri stanno facendo fortuna semplicemente distribuendo tessuti e spezie nell'ambito del commercio sud-est asiatico. I mercanti indiani locali stanno investendo in future iniziative commerciali europee. Forse è ancora presto per parlare di un'economia veramente globale, ma sicuramente i primi semi sono stati piantati." #OLD ITA
 global_trade_desc: "Goods have been moved across continents since antiquity. But where this was previously limited to a set number of routes and and specific goods, such as the manufactured products from $india$ and $CHI$ finding their way across the $indian_ocean_continent$ and along the Silk Road, trade is now increasingly becoming part of a greater world network. With the discovery of the Americas, establishment of sea routes around $africa$, and the crossing of the $pacific_ocean_continent$, local trade networks are being woven into a single, interconnected, world-spanning web.\n\n$silver$ mined in the $andes_region$ is now being shipped via $europe$ all the way to $CHHI$ and $india$, $iron$ mined and wrought in $scandinavian_region$ is being sold in $west_africa$ by $ENG_ADJ$ merchants, and others are making a fortune just by distributing $cloth$ and spices to traders from $south_east_asia$. Merchants in $india$ are even investing in future European trade ventures! It may still be early to speak of a truly global economy, but surely the first seeds have been sown." #NEW
 #global_trade_desc: "Goods have been moved across continents since antiquity. But where this was previously limited to a set number of routes and goods such as the manufactured goods of India and China finding their way across the Indian Ocean and along the Silk Road, all trade is now increasingly becoming part of a greater world network. With the discovery of the Americas, sea routes around Africa and the crossing of the Pacific Ocean, local trade networks are being connected into one world-spanning interconnected web.\n\nSilver mined in the Andes is now being boxed and taken via Europe all the way to China and India. Iron mined and wrought in Scandinavia is being sold in West Africa by English merchants, and others are making a fortune just distributing cloth and spices within the Southeast Asian trade sphere. Local Indian merchants are investing in future European trade ventures. It may still be early to speak of a truly Global Economy, but surely the first seeds have been sown." #OLD ENG
 artillery_institution: "Artiglieria"
 #artillery_institution_desc: "L'invenzione della polvere da sparo nella Cina sotto la dinastia dei Song portò allo sviluppo di un nuovo dispositivo che avrebbe impiegato la sua potenza di fuoco in guerra: l'artiglieria. Sebbene si diffuse in tutta l'Eurasia nel XIII secolo, il suo utilizzo come sistema d'arma comune non avvenne fino al XV secolo, quando i miglioramenti nella lunghezza dei cannoni e nella ricetta della polvere da sparo resero l'artiglieria molto più potente, rappresentando ora una minaccia per i castelli e le fortificazioni in pietra, i più comuni in Europa. Ben presto l'artiglieria sarebbe stata utilizzata non solo negli assedi, ma anche sui campi di battaglia, poiché i cannoni di calibro più piccolo offrivano ora la mobilità necessaria per essere rapidamente dispiegati e utilizzati. Il suo sviluppo definitivo come sistema bellico chiave sarebbe avvenuto nel XVIII secolo, soprattutto dopo che Napoleone ne perfezionò l'uso in momenti chiave durante le battaglie." #OLD ITA
 artillery_institution_desc: "The invention of gunpowder in $CHI$ led to the development of a device that would employ its firepower in warfare: the artillery. Although artillery spread throughout $europe$ AND $asia$ in the 13th century, its widespread adoption as a weapon system did not happen until the 15th century, when improvements in cannon length and gunpowder composition made artillery powerful enough to pose a threat to the stone-built castles and fortifications common in $europe$. Soon artillery would be used not only in sieges, but also on battlefields, as smaller-caliber guns were mobile enough to be quickly deployed and used. Its final evolution as a key warfare system would come in the 18th century, especially after Napoleon perfected its use at crucial points during battles." #NEW
 #artillery_institution_desc: "The invention of gunpowder in Song China led to the development of a new device that would employ its firepower in warfare, the artillery. Although it spread throughout Eurasia in the 13th Century, its use as a common weapon system did not happen until the 15th century, as improvements in the cannon length and gunpowder recipe made artillery much more powerful, now posing a threat to stone-built castles and fortifications, the most common in Europe. Soon, artillery would be used not only in sieges but also on battlefields, as smaller caliber guns now featured the mobility required to be quickly deployed and used. Its final development as a key warfare system would come in the 18th Century, especially after Napoleon perfected its use at key points during battles." #OLD ENG
 #
 manufactories: "Manifatture"
 #manufactories_desc: "Sebbene una serie di innovazioni tecniche nel corso del XVI e XVII secolo abbiano aumentato in una certa misura la produzione di alcuni prodotti come il ferro o il tessuto, il miglioramento più significativo nel campo della produzione è avvenuto sotto forma di nuove forme di organizzazione. Creando manifatture, spesso al di fuori dei confini cittadini, i mercanti capitalisti potevano aggirare le antiche leggi corporative che ostacolavano la produzione di massa e sperimentare nuovi modi per aumentare la produzione attraverso l'organizzazione e la specializzazione del lavoro in un unico luogo. I precursori della successiva industrializzazione sono stati in grado di aumentare la produzione facilitando l'accesso alle materie prime e l'organizzazione di massa del lavoro piuttosto che ricorrendo a costosi macchinari nuovi. Questo è di per sé un enorme cambiamento rispetto ai metodi spesso fortemente regolamentati del passato e, insieme ai successivi progressi tecnici, questa nuova modalità di produzione rivoluzionerà la società." #OLD ITA
 manufactories_desc: "While a number of technical innovations during the 16th and 17th centuries increased production output for some goods, such as $iron$ or $cloth$, the biggest industrial improvement came in the form of optimized organization. By creating manufactories, often outside city limits, merchant capitalists could both bypass the ancient guild laws that inhibited mass production and pioneer ways to increase output through the organization and specialization of centralized labor. The forerunners of later Industrialization were able to increase production by facilitating access to raw materials and organizing labor on a mass scale, rather than by investing in expensive new machinery. This was in itself a huge change from the often heavily regulated methods of old, and together with later technical advances, this new mode of production would come to revolutionize society." #NEW
 #manufactories_desc: "While a number of technical innovations during the course of the 16th and 17th centuries have increased the output of production for some products such as iron or cloth to an extent, the biggest improvement in the field of production has come in the form of new forms of organization. By creating manufactories, often outside the city limits, merchant capitalists can both bypass the ancient guild laws that inhibit mass production, and pioneer ways to increase production through the organization and specialization of labor in one place. The forerunners of the later Industrialization were able to increase output by facilitating access to raw materials and mass organization of labor rather than by expensive new machinery. This is in itself a huge change over the often heavily regulated methods of old, however, and together with later technical advances this new mode of production will come to revolutionize society." #OLD ENG
 scientific_revolution: "Rivoluzione Scientifica"
 #scientific_revolution_desc: "È evidente che il mondo è più piccolo che mai. L'ascesa del commercio globale e dell'industria tipografica ha portato a un aumento del flusso di persone e idee, consentendo una diffusione più capillare della conoscenza. Ciò ha portato a sua volta a una più approfondita analisi e messa in discussione della realtà del mondo. Ciò che un tempo era semplicemente accettato come un dato di fatto ora viene messo in discussione, ciò che era poco compreso ora viene osservato e ciò che era solo supposto, verificato\n\nI recenti progressi in settori come la matematica, la fisica o la biologia sono innegabili, ma la vera rivoluzione è il cambiamento nella percezione e nell'approccio alla scienza stessa e nel modo di comprenderla. La sperimentazione sistematica è la vera rivoluzione scientifica e cambierà sicuramente in modo radicale la nostra concezione del mondo." #OLD ITA
 scientific_revolution_desc: "The world is smaller now than ever before. The rise of global trade and expansion of the printing industry have led to an increased flow of ideas, allowing for a more widespread dissemination of knowledge. This, in turn, resulted in a more thorough questioning and analysis of the reality of the world. What was once just accepted as fact is now questioned, what was only poorly understood is now observed, and what was only supposed has been tested.\n\nThe recent advancements in areas such as mathematics, physics, and biology are undeniable, but the real revolution is the change in the perception and approach towards science itself, and our way of understanding it. Systematic experimentation is the true scientific revolution, and it will completely change our conception of the world." #NEW
 #scientific_revolution_desc: "It is clear that the world is smaller now than ever before. The rise of a global trade and the printing industry led to an increased flow of people and ideas, allowing for a more widespread dissemination of knowledge. This in turn resulted in a more thorough questioning and analysis of the reality of the world. What was once just accepted as fact is now questioned, what was only poorly understood is now observed, and what was only supposed, tested.\n\nThe recent advancements in areas such as mathematics, physics., or biology are undeniable, but the real revolution is the change in the perception and approach towards science itself and the way of understanding it. Systematic experimentation is the true scientific revolution, and it will surely change completely our conception of the world." #OLD ENG
 military_revolution: "Rivoluzione Militare"
 #military_revolution_desc: "Il continuo stato di guerra che ha colpito l'Europa nel XVI e XVII secolo ha portato a un forte aumento delle dimensioni degli eserciti, una necessità dettata dalla crescente autorità dei regimi assolutisti rivali. La fanteria è ora armata in massa con moschetti a pietra focaia, che aumentano notevolmente la potenza di fuoco e le prestazioni in battaglia grazie all'innovativa formazione in linea, che sostituisce la vecchia formazione Picca e Moschetto. Tali esigenze influenzano anche le capacità dell'amministrazione statale, che continua ad espandersi per gestire la manodopera e le finanze richieste da questo aumento delle dimensioni dell'esercito. Ciò sta anche guidando lo sviluppo delle catene di approvvigionamento necessarie per nutrire e sostenere gli eserciti, attraverso depositi intermedi che supportano gli eserciti operativi. Il risultato di questi progressi non sarebbe altro che un incremento di guerre tra paesi sempre più militarizzati nel XVIII secolo." #OLD ITA
 military_revolution_desc: "The continuous state of war affecting $europe$ in the 16th and 17th centuries led to a sharp increase in the size of armies, a necessity born of the growing authority of competing absolutist regimes. The infantry is now armed en masse with flintlock muskets, greatly increasing their firepower and performance in battle by being deployed in the innovative line formation, which replaces the old $pike_and_shot$.\n\nOur military needs affect the capabilities of the state administration; it continues to expand to handle the manpower and finances required by this increase in the size of the military. This pressure has also led to the development of supply chains to feed and sustain armies, as well as intermediate depots that support the operational forces. The ultimate result of these advances would be a surge of wars between increasingly militarized countries throughout the 18th century." #NEW
 #military_revolution_desc: "The continuous state of war affecting Europe in the 16th and 17th Centuries leads to a sharp increase in the size of armies, as a necessity born of the growing authority of competing absolutist regimes. The infantry is now armed en masse with flintlock muskets, greatly increasing their firepower and performance in battle by being deployed in the innovative line formation, replacing the old Pike & Shot. Those needs also affect the capabilities of the state administration as it continues to expand to handle the manpower and finances required by this increase in the size of the military. That also is spearheading the development of the supply chains required to feed and sustain armies, through intermediate depots that support the operational armies. The result of these advances would be none other than an upsurge of wars between increasingly militarized countries in the 18th Century." #OLD ENG
 #
 enlightenment: "Illuminismo"
 #enlightenment_desc: "Il secolo scorso ha visto il razionalismo e l'empirismo guadagnare una popolarità sempre crescente tra le grandi menti dell'epoca. Nelle lettere, nelle pubblicazioni e nei caffè, re, scienziati, filosofi e letterati discutono dei meriti della tolleranza, del metodo scientifico e della diffusione degli ideali dell'Illuminismo a tutta l'umanità. Dalle università o dalle corti dei monarchi illuminati vengono inviate spedizioni per misurare, catalogare, pesare e mappare il mondo, in modo da poter comprendere meglio le leggi che governano tutto ciò che ci circonda. Altri discutono delle leggi che governano la società e cercano di raggiungere una comprensione dei Diritti dell'Uomo. Grandi progetti come l'impresa colossale di creare un'enciclopedia completa di tutto il sapere o un indice completo di tutte le piante, gli animali e i funghi del mondo vengono portati avanti per il bene superiore dell'umanità. La Luce della Ragione è stata accesa e molti non si daranno pace finché non sarà portata in tutti gli angoli della terra." #OLD ITA
 enlightenment_desc: "Rationalism and Empiricism have gained incredible popularity among the greatest minds of the age. In letters, publications, and coffeehouses, intellectual giants from kings to scientists debate the merits of tolerance, advanced scientific methodology, and the spread of Enlightenment ideals to all of humanity. From universities and the courts of enlightened monarchs, expeditions are being sent to measure, catalog, and map the world so that we can better understand the laws governing everything around us. Other thinkers are more interested in the laws of society and try to better understand the Rights of Man.\n\nColossal undertakings, such as creating a complete encyclopedia of all knowledge or a complete index of all plants, animals, and fungi in the world, are being pursued for the greater good of humanity. The Light of Reason has been lit, and many will not rest until it has been brought to all corners of the earth." #NEW
 #enlightenment_desc: "The last century has seen Rationalism and Empiricism gaining an ever-increasing popularity among the great minds of the age. In letters, publications and coffee houses, kings, scientists, philosophers, and littérateurs are discussing the merits of tolerance, the scientific method, and the spreading of the ideals of the Enlightenment to all of humanity. From universities or courts of enlightened monarchs, expeditions are being sent to measure, catalog, weigh, and map the world so that we can better understand the laws that govern everything around us. Others discuss the laws that govern society and try to reach an understanding of the Rights of Man.\n\nGreat projects such as the colossal undertaking of creating a complete encyclopedia of all knowledge or a complete index of all plants, animals, and fungi in the world are being pursued for the greater good of humanity. The Light of Reason has been lit and many will not rest until it has been brought to all corners of the earth." #OLD ENG
 industrialization: "Industrializzazione"
 #industrialization_desc: "L'alba del XVIII secolo ha dato origine a molte nuove istituzioni, mentre la sete di crescita dell'uomo prendeva piede. I progressi nel campo della produzione e della manifattura, nonché l'introduzione di macchinari complessi, avrebbero cambiato il mondo così come lo conosciamo su scala globale. L'avvento della rivoluzione industriale portò cambiamenti internazionali e duraturi non solo nel commercio e negli affari, ma anche nel tessuto sociale stesso. Invenzioni come il telaio meccanico e il motore a vapore avrebbero spinto le capacità dell'umanità al suo apice più alto mai raggiunto." #OLD ITA
 industrialization_desc: "The dawn of the 18th century has given rise to many new institutions as humanity's thirst for progress grows. Advances in the field of production and manufacturing, as well as the introduction of complicated machinery, will change the world as we know it on a global scale. The Industrial Revolution has brought about permanent change — not just to commerce and business, but to the social fabric of many nations. Inventions such as the power loom and steam engine shall push the capabilities of mankind to its highest zenith yet." #NEW
 #industrialization_desc: "The dawn of the 18th century gave rise to many new institutions as man's thirst for growth took hold. Advances in the field of production, and manufacturing as well as the introduction of complicated machinery will change the world as we know it on a global scale. The rise of the Industrial Revolution brings about international and lasting changes not just in commerce and business but in the fabric of society itself. Inventions such as the power loom and steam engines shall push the capabilities of mankind to its highest zenith yet." #OLD ENG
 levee_en_masse: "Levée en Masse"
 #levee_en_masse_desc: "La guerra è un concetto in continua evoluzione, innovato e perfezionato di generazione in generazione. Il XVIII secolo vide l'ascesa di potenti imperi, ciascuno con le proprie ambizioni. Per soddisfare il bisogno di espansione e fornire il carburante necessario per realizzare queste ambizioni, furono redatte e firmate nuove leggi di coscrizione a livello nazionale, che reclutarono eserciti composti da tutti i giovani non sposati, la cui dimensione avrebbe plasmato il corso della storia." #OLD ITA
 levee_en_masse_desc: "Warfare is an ever-evolving concept, having been studied and improved upon for generations and generations. We have witnessed the rise of powerful empires, each with its own ambitions. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted. We shall raise armies of young, eager recruits, the size of which will leave an indelible mark upon history." #NEW
 #levee_en_masse_desc: "Warfare is an ever-evolving concept, innovated and honed generation after generation. The 18th century saw the rise of powerful empires, each with its own ambitions. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted and signed in effect, raising armies of all unmarried young men, the size of which will shape the course of history." #OLD ENG
 local_governor_advance: "$local_governor$" #NEW
 local_governor_advance_desc: "$local_governor_desc$" #NEW
 #
 # Advances
 colonies: "Colonie"
 #colonies_desc: "Sia inviando i nostri cittadini a stabilirsi in nuove terre, sia insediando gli indigeni in un determinato luogo sotto il nostro dominio, sia con una combinazione di entrambe le strategie, una colonia rappresenta un punto d'appoggio del nostro potere in una determinata regione che ci consentirà di espandere ulteriormente il nostro controllo." #OLD ITA
 colonies_desc: "Be it by sending our own people to settle in new lands, by imposing our rule over the natives in our overseas holdings, or through a mix of both, establishing a colony creates a foothold for our power that will let us further expand our control — and borders — in these unclaimed territories." #NEW
 #colonies_desc: "Be it by sending our own people to settle in new lands, by establishing natives in a certain place under our rule or by a mix of both, a colony is a foothold of our own power in a certain region that will let us further expand our control." #OLD ENG
 feudalism_advance: "Feudalesimo"
 #feudalism_advance_desc: "Il feudalesimo è un sistema politico basato sul servizio o sul lavoro in cambio della proprietà della terra. È un insieme di diritti e doveri a cui ogni membro di un modello sociale strutturato è vincolato." #OLD ITA
 feudalism_advance_desc: "Feudalism is a political system that is based on service or labor in exchange for holding and working land. It is a collection of rights and obligations to which each member of a structured societal model is bonded." #NEW
 #feudalism_advance_desc: "Feudalism is a political system that is based on service or labor in exchange for holding land. It is a collection of rights and obligations that each member of a structured societal model is bonded to." #OLD ENG
 #horse_riding_advance: "Cavalleria" #OLD ITA
 horse_riding_advance: "Horse-Riding" #NEW
 #horse_riding_advance: "Horse Riding" #OLD ENG
 #horse_riding_advance_desc: "L'addomesticamento dei cavalli rivoluzionò il modo in cui le persone si spostavano e trasportavano carichi pesanti. L'uso dei cavalli in combattimento forniva ai guerrieri a cavallo non solo un modo più veloce di spostarsi, ma anche una posizione più elevata da cui attaccare i nemici o schiacciarli sfruttando il peso della cavalcatura a proprio vantaggio." #OLD ITA
 horse_riding_advance_desc: "The domestication of horses has revolutionized the way people move and transport goods. Additionally, the use of horses in combat provides mounted warriors not only with a faster way of moving, but also a higher ground from which to attack their enemies — or even to crush them under the weight of their mounts." #NEW
 #horse_riding_advance_desc: "The taming of horses revolutionized the way people moved and carried heavy weights around. The use of horses in combat provided the mounted warriors with not only a faster way of moving but also a higher ground to attack their enemies or to steamroll them using the weight of the mount to their advantage." #OLD ENG
 rights_of_man: "Diritti dell'Uomo"
 #rights_of_man_desc: "All'avanguardia del pensiero rivoluzionario attuale c'è la nozione radicale di uguaglianza per tutti. Filosofi provenienti da diverse parti del mondo hanno collaborato alla stesura di un documento intitolato “Dichiarazione dei diritti dell'uomo e del cittadino”, in cui si proclama che tali diritti sono universali e devono essere applicati per legge. È probabile che ciò avrà ampie ripercussioni sullo sviluppo e sulla diffusione dei concetti di libertà e democrazia, e faremmo bene a non restare indietro." #OLD ITA
 rights_of_man_desc: "At the forefront of current revolutionary thought is the radical notion of equality for all. Philosophers from around the world have collaborated to create a document entitled the 'Declaration of the Rights of Man and of the Citizen', proclaiming that these rights are universal and should be enforced by law. It is likely that this will be ample fuel for popularizing the concepts of freedom and democracy, and we would do well not to lag behind other nations." #NEW
 #rights_of_man_desc: "At the forefront of current revolutionary thought is the radical notion of equality for all. Philosophers from different parts of the world have worked together to create a document entitled the 'Declaration of the Rights of Man and of the Citizen', proclaiming that these rights are universal and should be enforced by law. It is likely that this will have ample repercussions for the development and spread of the concepts of freedom and democracy, and we would do well not to lag behind." #OLD ENG
 rotherham_plough: "Aratro di Rotherham"
 #rotherham_plough_desc: "L'aratro di base utilizzato in Europa è rimasto invariato fin dall'epoca romana. Oggi, grazie ai miglioramenti apportati al suo design, lo stesso aratro può essere reso molto più leggero, riducendo il carico di lavoro sugli animali da tiro e consentendo loro di svolgere più lavoro." #OLD ITA
 rotherham_plough_desc: "The basic plow in use in $europe$ has been unchanged since Roman times. Now, thanks to an improved design, the same plow can be made much lighter, reducing the strain on draft animals and thereby getting more work out of them." #NEW
 #rotherham_plough_desc: "The basic plow in use in Europe has been unchanged since the Roman times. Now, thanks to improvements in design, the same plow can be made much lighter, reducing the workload on draft animals, allowing them to do more work." #OLD ENG
 modern_bureaucracy: "Burocrazia Moderna"
 #modern_bureaucracy_desc: "Per sfruttare al meglio i territori e i sudditi che controlliamo, dobbiamo ampliare, riorganizzare e professionalizzare la nostra burocrazia. Un'organizzazione solida è in grado di gestire ogni aspetto del nostro Stato ed eliminare la necessità di soluzioni ad hoc. Mettiamo le nostre università al lavoro per studiare i modi migliori per governare in modo efficiente e incoraggiamo i figli della nobiltà a servire lo Stato con la penna piuttosto che con la spada." #OLD ITA
 modern_bureaucracy_desc: "In order to best utilize the lands and subjects we control, we must enlarge, reorganize, and professionalize our bureaucracy. We shall create organizations dedicated to administering specific aspects of the state, and thus eliminate the need for ad hoc solutions.\n\nLet us consult with our universities to determine how to most efficiently rule and govern. Meanwhile, we shall encourage our young nobles to serve the state with a pen rather than a sword in hand." #NEW
 #modern_bureaucracy_desc: "In order to make the most of the lands and subjects we control we must enlarge, reorganize, and professionalize our bureaucracy. A robust organization can handle each part of our state and eliminate the need for ad hoc solutions. Let us put our universities at work to consider the best ways to efficiently rule and govern and let us encourage the sons of the nobility to serve the state with a pen in hand rather than a sword." #OLD ENG
 separation_of_powers: "Separazione dei Poteri"
 #separation_of_powers_desc: "È apparso un trattato anonimo sulla teoria politica che, nonostante i tentativi di sopprimerlo, si sta rapidamente diffondendo in tutto il mondo. Esso tratta della natura delle forme di governo, siano esse monarchie, dispotismi o democrazie, e sostiene una rigorosa separazione tra i poteri esecutivo, legislativo e giudiziario. Ciò proteggerebbe il popolo e limiterebbe il potere di un monarca, il che è comprensibilmente una prospettiva molto popolare per molti dei nostri sudditi. Nonostante le spiacevoli implicazioni per il potere dei monarchi, queste idee potrebbero apportare grandi benefici alla nostra nazione." #OLD ITA
 separation_of_powers_desc: "An incendiary, anonymous treatise on political theory has emerged. Despite efforts to suppress the text, it is spreading quickly across the world. It analyzes the nature of various forms of government, be they monarchies, despotisms, or democracies, and argues for a strict separation of the executive, legislative, and judiciary branches.\n\nThis separation would protect the people and limit monarchical, which is understandably a very popular prospect for many of our subjects. Despite the unfortunate implications for the ruler's authority, these ideas may well benefit our nation greatly." #NEW
 #separation_of_powers_desc: "An anonymous treatise on political theory has emerged, and despite efforts to suppress it, it is quickly spreading across the world. It deals with the nature of forms of government, be they monarchies, despotisms, or democracies, and argues for a strict separation of the executive, legislative, and judiciary branches. This would protect the people and limit the power of a monarch, which is understandably a very popular prospect for many of our subjects. Despite the unfortunate implications for the power of monarchs, these ideas may well benefit our nation greatly." #OLD ENG
 measuring_the_world: "Misurazione del Mondo"
 #measuring_the_world_desc: "Le nuove scienze ci hanno fornito una serie di modi diversi per descrivere e misurare il mondo che ci circonda. Mandiamo questi uomini colti nel mondo in generale e nel nostro Paese in particolare. Non possiamo sapere quali risorse abbiamo a disposizione finché non avremo esplorato a fondo tutte le nostre terre alla ricerca di minerali, contato ogni singolo suddito e valutato ogni singola impresa." #OLD ITA
 measuring_the_world_desc: "The new sciences have given us a number of different ways to describe and measure the world around us. However, we cannot know all of the resources that could be at our disposal until we have thoroughly searched all our lands for minerals, counted every last subject, and assessed every last enterprise. Let us command out scholarly experts to conduct a thorough survey — first of our nation, then of the entire world!" #NEW
 #measuring_the_world_desc: "The new sciences have given us a number of different ways to describe and measure the world around us. Let us send these learned men out into the world in general and into our country in particular. We cannot know what resources are at our disposal until we have thoroughly searched all our lands for minerals, counted every last subject and assessed every last enterprise." #OLD ENG
 the_constitution: "Costituzione"
 #the_constitution_desc: "È stato sviluppato un nuovo concetto filosofico chiamato costituzionalismo, secondo il quale il governo accetta limiti legali al proprio potere. Si tratta di un'idea intrigante, ma non crediamo che possa prendere piede." #OLD ITA
 the_constitution_desc: "A new philosophical concept called constitutionalism has been developed, wherein the government accepts legal limits to its power through established law rather than ruling by arbitrary decree. While some may find this idea intriguing, it is obviously not popular with monarchs..." #NEW
 #the_constitution_desc: "A new philosophical concept called constitutionalism has been developed, where the government accepts legal limits to its power. This is an intriguing idea, but we cannot see it catching on." #OLD ENG
 absolute_rulership: "Potere Assoluto"
 #absolute_rulership_desc: "Ci sono molte persone che chiedono di ricoprire un ruolo nel governo, ma in realtà desiderano soprattutto ottenere ricompense senza alcuno sforzo. Si sta diffondendo una nuova interessante idea di assolutismo, ovvero un sistema in cui ci liberiamo di questi parassiti e governiamo da soli." #OLD ITA
 absolute_rulership_desc: "Many people demand to be given a role in the government, but mostly because they want to be rewarded without expending much effort. The idea of absolutism has recently piqued our interest, as adopting it would empower us to dispose of those self-serving parasites and rule alone..." #NEW
 #absolute_rulership_desc: "There are many people who demand to be given a role in the government, but in reality mostly want rewards without effort. A new interesting idea of absolutism is spreading, which is a system where we dispose of those parasites and govern alone." #OLD ENG
 national_sovereignty: "Sovranità Nazionale"
 #national_sovereignty_desc: "Le numerose e lunghe guerre della prima metà del XVII secolo hanno portato alla creazione di un sistema diplomatico internazionale in cui l'integrità territoriale degli Stati è un elemento fondamentale. Gli attori sulla scena internazionale sono gli Stati piuttosto che i singoli governanti o i raggruppamenti sovranazionali e nessuno Stato ha il diritto di intervenire negli affari interni di un altro." #OLD ITA
 national_sovereignty_desc: "The many long wars in the first half of the 17th century have led to an international diplomatic system for which the territorial integrity of states is a cornerstone. States, rather than individual rulers or supra-national groupings, are the actors in the international arena, and no state has the right to intervene in the internal affairs of another." #NEW
 #national_sovereignty_desc: "The many and long wars of the first half of the 17th century have led to an international diplomatic system where the territorial integrity of states is a cornerstone. States rather than individual rulers or supra-national groupings are the actors in the international arena and no state has the right to intervene in the internal affairs of another." #OLD ENG
 military_administration: "Amministrazione Militare"
 #military_administration_desc: "Le armate in continua crescita del XVI secolo imponevano requisiti sempre più stringenti ai sistemi amministrativi degli Stati. Creando un'organizzazione permanente incaricata di occuparsi dell'approvvigionamento e della pianificazione delle forniture militari e mantenendo un numero maggiore di soldati in servizio anche durante l'inverno o in tempo di pace, nel lungo periodo saremo in grado di schierare grandi eserciti a costi inferiori e di sostenerli in modo più efficiente durante la guerra." #OLD ITA
 military_administration_desc: "The ever-increasing armies of the 16th century have imposed equally heightened demands on national administrations. By creating a permanent organization charged with military supply strategy and operation, and by keeping more troops on the rolls even during winter or peacetime, we will ultimately be able to field large armies more cheaply and to support those armies more efficiently." #NEW
 #military_administration_desc: "The ever-increasing armies of the 16th century put bigger and harder demands on the administrative systems of states. By creating a permanent organization charged with taking care of the procuring and planning of Military supplies and by keeping more troops on the rolls even during wintertime or peacetime we will in the long run be able to field large armies more cheaply and be able to support these armies more efficiently while at war." #OLD ENG
 early_modern_administation: "Prima Amministrazione Moderna"
 #early_modern_administation_desc: "Col tempo, divenne evidente che una burocrazia più centralizzata, con organi amministrativi gestiti da funzionari istruiti e assunti direttamente dallo Stato, era una necessità per gli ambiziosi progetti dei sovrani dell'età moderna." #OLD ITA
 early_modern_administation_desc: "Over time, it became apparent that a more centralized bureaucracy, with administrative bodies run by educated officials employed directly by the state, was a necessity to complete the ambitious projects of the Early Modern rulers." #NEW
 #early_modern_administation_desc: "In time, it became apparent that a more centralized bureaucracy with administrative bodies run by educated officials employed directly by the state was a necessity for the ambitious projects of the Early Modern rulers." #OLD ENG
 #renaissance_thought: "Pensiero Rinascimentale" #OLD ITA
 renaissance_thought: "$renaissance$ Thought" #NEW
 #renaissance_thought: "Renaissance Thought" #OLD ENG
 #renaissance_thought_desc: "L'idea di una nobile oligarchia al governo della società esiste almeno fin dai tempi dei romani ed è rimasta popolare in alcune parti del mondo. Ora questa idea sta tornando ad acquisire popolarità tra coloro che contano." #OLD ITA
 renaissance_thought_desc: "The notion of a noble oligarchy ruling over society is hardly new, having existed since at least Roman times. This system remains entrenched in the structure of many nations, and the idea is regaining popularity among those who matter..." #NEW
 #renaissance_thought_desc: "The notion of a noble oligarchy ruling the society has existed, since well, at least the Roman times, and remained popular in some parts of the world. Now this idea is once more gaining popularity amongst those who matter." #OLD ENG
 medieval_administration: "Amministrazione Medievale"
 #medieval_administration_desc: "Con un'élite militare a governare la nostra società, la fase successiva dello sviluppo consiste nell'avere una classe di amministratori colti. Di solito, questi provengono dai ranghi del clero." #OLD ITA
 medieval_administration_desc: "With a military elite in place to govern our society, the next stage of development is to build a literate class of administrators. Typically, these roles will be filled by drawing from the clergy." #NEW
 #medieval_administration_desc: "With a military elite to govern our society, the next stage of development is to have a literate class of administrators. Usually, these will be drawn from the ranks of clergy." #OLD ENG
 impulse_warfare: "Tattica d'Impulso"
 #impulse_warfare_desc: "L'introduzione delle truppe di fanteria leggera portò a un cambiamento nell'arte della guerra. Gli schermagliatori venivano schierati in avanti in ordine sparso per distrarre e molestare il nemico prima dell'attacco principale della fanteria, che veniva tipicamente sferrato in linea o in colonna." #OLD ITA
 impulse_warfare_desc: "The introduction of light infantry troops has led to a significant change in warfare. Skirmishers are deployed forward in loose order to distract and harass the enemy before the main infantry attack, which is typically delivered in either a line or a column formation." #NEW
 #impulse_warfare_desc: "The introduction of light infantry troops led to a change in warfare. Skirmishers were deployed forward in loose order to distract and harass the enemy before the main infantry attack, which was typically delivered in either a line or a column." #OLD ENG
 line_infantry: "Fanteria di Linea"
 #line_infantry_desc: "Grazie alle baionette, ogni moschettiere poteva fungere anche da picchiere. Ciò consentiva di rimuovere le picche dall'equipaggiamento della fanteria e forniva alle formazioni di fanteria una maggiore potenza di fuoco." #OLD ITA
 line_infantry_desc: "With the invention of bayonets, each musketeer could also function as a pikeman. This allowed pikes to be removed from infantry equipment, and provided infantry formations with more firepower." #NEW
 #line_infantry_desc: "Thanks to bayonets, each musketeer could function as a pikeman as well. This allowed pikes to be removed from infantry equipment and provided infantry formations with more firepower." #OLD ENG
 gustavian_infantry: "Fanteria Gustaviana"
 #gustavian_infantry_desc: "Gustavo Adolfo, re di Svezia, sviluppò ulteriormente le unità di fanteria per migliorarne la potenza di fuoco. Le sue formazioni di fanteria furono ridotte e rese rettangolari per aumentare il numero di moschetti che potevano sparare in ogni raffica. L'aggiunta di piccoli pezzi di artiglieria aumentò ulteriormente la potenza di fuoco della fanteria." #OLD ITA
 gustavian_infantry_desc: "Gustavus Adolphus, ruler of $SWE$, made several innovations to his infantry that improved their performance. His formations were narrowed and made rectangular to increase the number of muskets that could fire in each volley, and the attachment of small artillery pieces further increased their firepower." #NEW
 #gustavian_infantry_desc: "Gustavus Adolphus, King of Sweden, further developed infantry units to improve their firepower. His infantry formations were narrowed and made rectangular to increase the number of muskets that could fire in each volley. Attachment of small artillery pieces further increased the firepower of infantry." #OLD ENG
 #standardisation_of_calibre: "Standardizzazione del Calibro" #OLD ITA
 standardisation_of_calibre: "Caliber Standardization" #NEW
 #standardisation_of_calibre: "Standardization of Caliber" #OLD ENG
 #standardisation_of_calibre_desc: "Con la crescente importanza dell'artiglieria sul campo di battaglia, anche il numero di armi da fuoco continuò ad aumentare. Tuttavia, poiché ogni arma era fabbricata separatamente, anche il rifornimento richiedeva un grande sforzo. Nel 1544, l'imperatore Carlo V dichiarò che ci sarebbero stati solo 5 calibri di armi, mentre il re Enrico II di Francia ne stabilì 6 standard." #OLD ITA
 standardisation_of_calibre_desc: "With artillery's growing importance on the battlefield, the number of firearms kept increasing. But because each gun was made separately, it also required great effort to resupply. In 1544, in an effort to mitigate this, Emperor Charles V declared that there would be only five calibers of guns, while King Henry II of $FRA$ set the standard of calibers at six." #NEW
 #standardisation_of_calibre_desc: "With artillery's growing importance in the battlefield, also the number of firearms kept increasing. But because each gun was made separately, it also required great effort to resupply. In 1544, Emperor Charles V declared that there would be only 5 calibers of guns, while King Henry II of France set 6 standard calibers." #OLD ENG
 maurician_infantry: "Fanteria Mauriziana"
 #maurician_infantry_desc: "Le dimensioni e la profondità del Quadrato Spagnolo gli conferivano resistenza, ma lo rendevano lento e macchinoso da manovrare sul campo di battaglia. Inoltre, comportava che una percentuale elevata di soldati rimanesse inattiva durante le battaglie. Maurizio di Nassau, statolder dei Paesi Bassi, ridusse il numero totale di uomini nella formazione per renderla più mobile e ne diminuì la profondità, in modo da mantenere la stessa potenza di fuoco e gli stessi valori di impatto." #OLD ITA
 maurician_infantry_desc: "The size and depth of the $spanish_square$ gave it staying power, but made it slow and cumbersome to maneuver on the battlefield. It also led to a large percentage of troops being inactive during battles. Maurice of Nassau, the Stadtholder of the $NED$, reduced the total number of men in the formation to make it more mobile and reduced its depth, so it maintained the same firepower and shock value." #NEW
 #maurician_infantry_desc: "The size and depth of the Spanish Square gave it staying power but made it slow and cumbersome to maneuver on the battlefield. It also led to a large percentage of troops being inactive during battles. Maurice of Nassau, the Stadtholder of the Netherlands, reduced the total number of men in the formation to make it more mobile and reduced its depth, so it maintained the same firepower and shock values." #OLD ENG
 spanish_square: "Quadrato Spagnolo"
 #spanish_square_desc: "La formazione Quadrato Spagnolo si sviluppò naturalmente dalle formazioni picca e moschetto. Al suo centro c'era una formazione tradizionale Quadrato di Picche. Ad ogni angolo era presente un gruppo di archibugieri. Manteneva la resistenza della tradizionale formazione Quadrato di Picche e la potenziava con la potenza di fuoco degli archibugi." #OLD ITA
 spanish_square_desc: "The Spanish Square evolved organically from the $pike_and_shot$ formation. At its core was a traditional pike square, and at each corner, it had a group of arquebusiers. This way, they maintained the staying power of the traditional pike square and enhanced it with the firepower of the arquebus." #NEW
 #spanish_square_desc: "Spanish Square developed naturally from the Pike and shot formations. At its core was a traditional Pike Square. At each of the corners, it had a group of Arquebusiers. It kept the staying power of the traditional pike square and enhanced it with the firepower of the Arquebus." #OLD ENG
 standardized_pikes: "Picche Standardizzate"
 #standardized_pikes_desc: "Una picca è un'arma straordinariamente semplice da realizzare, ma per trarne il massimo vantaggio è necessario che l'intera formazione sia equipaggiata con armi di lunghezza e lama simili." #OLD ITA
 standardized_pikes_desc: "A pike is a remarkably simple weapon to make, but to get the full benefit from their use, the entire formation must be wielding weapons of similar length and blade." #NEW
 #standardized_pikes_desc: "A pike is a remarkably simple weapon to make but to get the full benefit from the use of pikes, it is required for the whole formation to be wielding weapons of similar length and blade." #OLD ENG
 pike_square: "Quadrato di Picche"
 #pike_square_desc: "Durante tutto il Medioevo, il predominio della cavalleria fu messo in discussione dai disciplinati picchieri. In battaglie come quella di Bannockburn o degli Speroni d'Oro, la cavalleria fu sconfitta dai picchieri. Una combinazione di addestramento e disciplina migliorati e l'aggiunta di spadaccini per fornire supporto nel combattimento ravvicinato ha portato questa formazione al massimo della sua efficienza." #OLD ITA
 pike_square_desc: "Throughout the Middle Ages, the dominance of cavalry was challenged by disciplined pikemen. In battles such as Bannockburn or the Golden Spurs, the pikemen decimated the cavalry. A combination of improved training and discipline, and the addition of swordsmen to provide close combat support, has raised this formation to the peak of its efficiency." #NEW
 #pike_square_desc: "Throughout the Middle Ages cavalry's dominance was being challenged by disciplined pikemen. In battles such as Bannockburn or the Golden Spurs, cavalry was defeated by pikes. A combination of improved training and discipline, and the addition of swordsmen to provide close combat support has raised this formation to the peak of its efficiency." #OLD ENG
 medieval_military: "Esercito Medievale"
 #medieval_military_desc: "Alla fine del Medioevo, gli eserciti di terra erano diventati più professionali e ben organizzati. Sono stati messi in atto sistemi migliori per supportarela combinazione di soldati di leva e professionisti che ora dominano i campi di battaglia e il potere della fanteria sta lentamente ma costantemente guadagnando terreno sulla cavalleria." #OLD ITA
 medieval_military_desc: "Over the past centuries, land armies have become more professional and well-organized. Better systems are in place to support the mix of levies and professional soldiers that now dominate the battlefields, and the infantry is slowly but steadily gaining power, poised to overtake that of the cavalry arm." #NEW
 #medieval_military_desc: "By the end of the Middle Ages the land armies had become more professional and well organized. Better systems are in place to support the mix of levies and professional soldiers that now dominate the battlefields and the power of infantry is slowly but steadily gaining on the cavalry arm." #OLD ENG
 insurance_companies: "Compagnie Assicurative"
 #insurance_companies_desc: "Un'ulteriore riduzione del rischio è stata ottenuta con lo sviluppo delle assicurazioni. La possibilità per le persone di compensare il rischio pagando una piccola commissione ad un mediatore assicurativo ha consentito un'ulteriore crescita del commercio." #OLD ITA
 insurance_companies_desc: "A further reduction of risk came with the development of insurance. By paying a small fee to an insurance broker, merchants could protect themselves against catastrophic losses. This reduced risk of investment led to a subsequent flourishing of trade." #NEW
 #insurance_companies_desc: "A further reduction of risk came with the development of insurance. The ability for people to offset risk through payment of a small fee to an insurance broker allowed for further growth of trade." #OLD ENG
 the_gold_standard: "Sistema Aureo"
 #the_gold_standard_desc: "Il persistente deficit commerciale tra Europa e Cina ha causato una carenza di lingotti d'argento in Europa e in tutto il mondo. Il passaggio dalla moneta d'argento alla moneta d'oro consentirà l'immissione in circolazione di nuova moneta e un aumento del flusso commerciale." #OLD ITA
 the_gold_standard_desc: "The ongoing trade deficit between $europe$ and $CHI$ has caused a shortage of silver bullion not only in $europe$, but all over the world. Switching from silver to gold coinage will allow new coins to enter circulation and encourage trade to flow in ever greater amounts." #NEW
 #the_gold_standard_desc: "The ongoing trade deficit between Europe and China has caused a shortage of silver bullion in Europe and all over the world. Switching from silver coinage to gold coinage will allow new coinage to enter circulation and get trade flowing in ever greater amounts." #OLD ENG
 joint_stock_companies: "Società per Azioni"
 #joint_stock_companies_desc: "Con la crescita del commercio aumentavano anche i rischi. Era necessario sviluppare nuovi modi per accumulare capitale e gestire i rischi. Nelle società per azioni il rischio imprenditoriale era condiviso tra i numerosi azionisti." #OLD ITA
 joint_stock_companies_desc: "As trade grew, so did the associated risk. New ways of accumulating capital and managing this risk needed to be developed. In joint stock companies, the burden of enterprise was shared among their many shareholders." #NEW
 #joint_stock_companies_desc: "As trade grew, so did the risk. New ways of accumulating capital and managing risk needed to be developed. In Joint Stock Companies the risk of enterprise was shared among their many shareholders." #OLD ENG
 public_punishments: "Punizioni Pubbliche"
 #public_punishments_desc: "La vita in mare è piena di pericoli e quindi le punizioni devono essere severe. Se non hanno un effetto deterrente sufficiente, ci troveremo rapidamente nei guai. Nel corso del tempo un sistema di punizioni altamente pubbliche, si è evoluto ed ora è giunto il momento di formalizzarle. Ciò migliorerà notevolmente la disciplina in mare." #OLD ITA
 public_punishments_desc: "Life at sea is full of dangers, and thus the punishments need to be harsh. If wrongdoing is not thoroughly deterred, we will quickly run into trouble. Over time, a system of highly public punishments has evolved, and now the time has come to formalize those proceedings. This will greatly enhance discipline at sea." #NEW
 #public_punishments_desc: "Life at sea is full of dangers and thus the punishments need to be harsh. If they do not have a sufficient deterrence effect, we will quickly run into trouble. Over time a system of highly public punishments has evolved, and now the time has come to formalize those. This will greatly enhance discipline at sea." #OLD ENG
 #merchants_and_trade: "Mercanti e Commercio" #OLD ITA
 merchants_and_trade: "Merchants and Trade" #NEW
 #merchants_and_trade: "Merchants & Trade" #OLD ENG
 merchants_and_trade_desc: "I modelli commerciali erano stati gravemente compromessi, probabilmente a causa di epidemie e pandemie. Ora il commercio sta lentamente iniziando a riprendersi."
 naval_ambitions: "Ambizioni Navali"
 #naval_ambitions_desc: "Con un ulteriore impulso al morale della marina, i nostri marinai conquisteranno le onde e domineranno i mari. Mentre i nostri coloni saranno in grado di sfidare gli angoli più oscuri del mondo, fondando nuovi insediamenti più lontani che mai dalla loro patria." #OLD ITA
 naval_ambitions_desc: "With an extra boost to naval morale, our sailors will conquer the waves and rule the seas. Meanwhile, our colonists will be able to brave the darkest corners of the world, founding new settlements farther from home than ever before." #NEW
 #naval_ambitions_desc: "With an extra boost to naval morale, our sailors will conquer the waves and rule the seas. While our colonists will be able to brave the dark corners of the world, founding new settlements farther from home than ever before." #OLD ENG
 chartered_companies: "Compagnie Privilegiate"
 #chartered_companies_desc: "Il mondo è grande e per sviluppare il nostro commercio a volte è necessario correre rischi piuttosto elevati. Fortunatamente nel nostro Paese ci sono mercanti disposti a farlo, utilizzando principalmente il proprio capitale. Concedendo a tali società una carta governativa che conferisce loro diritti speciali per esercitare poteri governativi e monopoli in determinate aree, possiamo controllare e incoraggiare lo sviluppo commerciale di tutto, dai contatti commerciali con l'estero ai nostri possedimenti coloniali oltreoceano." #OLD ITA
 chartered_companies_desc: "The world is a big place, and in order to develop our global trade, we must take some serious risks. Luckily there are merchant in our country willing to do so, using mostly their own capital. By sanctioning such companies with a government charter giving them special rights to exercise government powers as well as monopolies in certain areas, we can control and encourage commercial development of everything from foreign trade networks to our colonial possessions overseas." #NEW
 #chartered_companies_desc: "The world is a big place and in order to develop our trade in it sometimes quite big risks must be taken. Luckily there are Merchants in our country that would be willing to do so, using mostly their own capital. By sanctioning such companies with a Government charter giving them special rights to exercise government powers as well as monopolies in certain areas we can control and encourage commercial development of everything from foreign trade contacts to our colonial possessions overseas." #OLD ENG
 development_of_maritime_law: "Sviluppo del Diritto Marittimo"
 #development_of_maritime_law_desc: "Con sempre più paesi che inviano i propri sudditi o cittadini all'estero per varie iniziative commerciali e con così tante persone che vivono a stretto contatto tra loro per così tanto tempo, è diventato assolutamente essenziale avere almeno una conoscenza di base delle leggi comuni del mare. Con pubblicazioni come “Mare Liberum” o la successiva “De Dominio Maris Dissertatio” sono state gettate le basi per un diritto internazionale del mare." #OLD ITA
 development_of_maritime_law_desc: "With more and more countries sending their subjects or citizens abroad on various trading ventures and with so many living so close to each other for so long times it has become absolutely essential to have at least a basic concept of common laws of the seas. With publications such as 'Mare Liberum' or the later 'De Dominio Maris Dissertatio', the foundations to an international law of the seas have been laid." #NEW
 #development_of_maritime_law_desc: "With more and more countries sending their subjects or citizens abroad on various trading ventures and with so many living so close to each other for so long times it has become absolutely essential to have at least a basic concept of common laws of the seas. With publications such as 'Mare Liberum' or the later 'De Dominio Maris Dissertatio' the foundations to an international law of the seas have been laid." #OLD ENG
 basic_financial_instruments: "Strumenti Finanziari di Base"
 #basic_financial_instruments_desc: "Il commercio estero è molto rischioso ma anche altamente redditizio. Lo sviluppo di strumenti finanziari come le lettere di credito contribuirà a ridurre il rischio, aumentando i nostri profitti." #OLD ITA
 basic_financial_instruments_desc: "Overseas trade is very risky, but also highly profitable. The development of financial instruments like letters of credit will help reduce that risk and increase our profits." #NEW
 #basic_financial_instruments_desc: "Overseas trade is very risky but also highly profitable. The development of financial instruments like letters of credit will help reduce the risk, increasing our profits." #OLD ENG
 naval_professionalism: "Professionalizzazione della Marina"
 #naval_professionalism_desc: "Anche all'inizio del XVII secolo le marine permanenti erano piuttosto ridotte e persino le potenze navali di rilievo mantenevano per lo più una forza navale sufficiente a soddisfare le loro esigenze immediate. Nel corso del tempo, tuttavia, ci stiamo muovendo nella direzione di una marina professionale più grande. Se non vogliamo vedere i nostri rivali superarci in campo navale, dobbiamo sforzarci di creare una marina permanente più grande, dotata di una struttura amministrativa che la sostenga e che garantisca che la carriera navale possa essere un'occupazione permanente per i nostri ufficiali." #OLD ITA
 naval_professionalism_desc: "Until the beginning of the 17th century, permanent navies were quite small, and even notable martitime powers mostly maintained only enough of a naval force to meet their immediate needs. Over time, however, many states have started moving in the direction of establishing larger professional navies. Unless we want to see our rivals overtake us in naval matters, we must strive to create a larger permanent navy with the proper administrative structures to support it. We should also ensure that a naval career can be a lifelong occupation for our officers." #NEW
 #naval_professionalism_desc: "Even at the beginning of the 17th century permanent navies were quite small and even naval powers of note would mostly maintain a naval force to meet their immediate needs. Over time, however, we are moving in the direction of a larger professional navy. Unless we want to see our rivals overtaking us in naval matters we must strive to create a larger permanent navy with an administrative structure to support it as well as ensure that a naval career can be a permanent occupation for our officers." #OLD ENG
 superior_ship_design: "Progettazione Navale Migliorata"
 #superior_ship_design_desc: "Costruire navi leggermente più veloci di quelle dei nostri avversari, anche se la differenza di velocità è talmente trascurabile da non avere alcun significato militare, può comunque infondere fiducia ai nostri equipaggi e rendere i nostri nemici diffidenti nell'affrontarci in uno scontro alla pari.Costruire [ships|e] leggermente più veloci di quelle dei nostri avversari, anche se la differenza di velocità è talmente trascurabile da non avere alcun significato militare, può comunque infondere fiducia ai nostri equipaggi e rendere i nostri nemici diffidenti nell'affrontarci in uno scontro alla pari." #OLD ITA
 superior_ship_design_desc: "Building ships that are slightly faster than those of our opponents, even if the amount of this extra speed is so negligible that it is of no military significance, can still fill our crews with confidence and make our enemy wary of taking us on in an even fight." #NEW
 #superior_ship_design_desc: "Building [ships|e] that are slightly faster than those of our opponents, even if the amount of this extra speed is so negligible that it is of no military significance, can still fill our crews with confidence and make our enemy wary of taking us on in an even fight." #OLD ENG
 patron_of_art: "Mecenate delle Arti"
 #patron_of_art_desc: "La nostra ricerca verso una società culturalmente colta inizia qui. Le nostre meraviglie artistiche passeranno alla storia come le più straordinarie di quest'epoca." #OLD ITA
 patron_of_art_desc: "Our quest towards cultivating a culturally sophisticated society begins here. Our artistic creations will go down in history as the most marvelous wonders of this era." #NEW
 #patron_of_art_desc: "Our quest towards a culturally cultivated society begins here. Our artistic wonders will go down in history as the most marvelous of this era." #OLD ENG
 pragmatism: "Pragmatismo"
 #pragmatism_desc: "Troppi paesi lasciano che la percezione del paese influenzi le loro politiche. È insensato — se i mercenari sono più adatti alle nostre esigenze, li useremo invece di investire in un costoso esercito permanente." #OLD ITA
 pragmatism_desc: "Too many countries let how other states perceive them shape their policies. That is foolish — if mercenaries are more suitable for our needs, we will use them instead of investing in an expensive standing army." #NEW
 #pragmatism_desc: "Too many countries let the perception of the country shape their policies. That is foolish — if mercenaries are more suitable for our needs, we will use them instead of investing in an expensive standing army." #OLD ENG
 knowledge_transfer: "Trasferimento di Conoscenze"
 #knowledge_transfer_desc: "Preservare l'esperienza è la cosa più importante che un Paese possa fare. Dobbiamo garantire che coloro che prestano servizio in combattimento trasmettano queste conoscenze alle nuove reclute attraverso un sistema di tutoraggio." #OLD ITA
 knowledge_transfer_desc: "Preserving the experience and knowledge of our combat veterans is vital to properly training new recruits. We need to ensure that those who have served in combat pass on this knowledge to trainees through a system of mentoring." #NEW
 #knowledge_transfer_desc: "Preserving of experience is the most important thing a country can do. We need to ensure that those who serve in combat pass on this knowledge to the younger recruits, through a system of mentoring." #OLD ENG
 organised_recruiting: "Reclutamento organizzato"
 #organised_recruiting_desc: "Nei tempi antichi, quando un capitano cercava di reclutare uomini per il suo [regiment|e], il processo richiedeva molto tempo poiché non erano in molti a desiderare di andare incontro a una morte certa nelle nostre armate. Tuttavia, applicando i principi della ragione a questo problema, saremo in grado di elaborare un sistema che consentirà di arruolare gli uomini molto più rapidamente." #OLD ITA
 organised_recruiting_desc: "In days of yore, when a captain sought to fill the ranks of a regiment, the recruitment process was time-consuming, as not many people wished to embrace certain death in our armies. However, by applying the principles of reason to this problem, we will be able to come up with a system that will get fighters into uniform much quicker." #NEW
 #organised_recruiting_desc: "In days of yore when a captain sought to recruit men to fill his [regiment|e], the process was time-consuming as not many people wished to embrace certain death in our armies. However, by applying the principles of reason to this problem we will be able to come up with a system that will get men into uniform much quicker." #OLD ENG
 optimism: "Ottimismo"
 #optimism_desc: "La vittoria non si conquista solo sul campo di battaglia, ma anche nei salotti. Il nostro progresso razionale rende il nostro popolo capace di scrollarsi di dosso gli effetti delle battute d'arresto temporanee e prepararsi invece alla nostra inevitabile vittoria." #OLD ITA
 optimism_desc: "Victory is not just won on the battlefield, but also in the drawing rooms. Our advancement of reason helps our people shrug off the effects of temporary setbacks, and prepare instead for our inevitable victory." #NEW
 #optimism_desc: "Victory is not just won off the battlefield but also in the drawing rooms. Our advancement of reason makes our people able to shrug off the effects of temporary setbacks and prepare instead for our inevitable victory." #OLD ENG
 formalized_officer_corps: "Corpo Ufficiali Formalizzato"
 #formalized_officer_corps_desc: "Tradizionalmente gli ufficiali provengono dalla nobiltà, ma non abbiamo così tanti nobili da causare una carenza di ufficiali. Tuttavia, nei nostri eserciti ci sono in realtà molte persone di classe inferiore. Dovremmo considerare la possibilità di promuovere alcuni di loro come ufficiali professionisti." #OLD ITA
 formalized_officer_corps_desc: "Traditionally, our military officers come from the nobility, but we do not have enough people in that estate to fill the necessary roles. However, there are many skilled members of the lower classes in our armies who would do nicely — we should consider promoting some of them as professional officers." #NEW
 #formalized_officer_corps_desc: "Traditionally officers come from the nobility, but we do not have that many nobles leading to a shortage of officers. However, there are actually plenty of persons of lower class in our armies. We should consider promoting some of them as professional officers." #OLD ENG
 deus_vult: "Deus Vult"
 #deus_vult_desc: "Unisciti al grido di battaglia delle crociate, “Dio lo vuole”, e schiaccia gli infedeli." #OLD ITA
 deus_vult_desc: "Join the battle cry of the Crusades — 'God wills it' — and crush the heretics!" #NEW
 #deus_vult_desc: "Join the battle cry of the crusades, 'God wills it' and crush the infidels." #OLD ENG
 missionary_schools: "Scuole Missionarie"
 #missionary_schools_desc: "Sebbene non manchino persone disposte ad andare in giro a diffondere la vera fede, la maggior parte di loro finisce semplicemente per fare più male che bene. Tuttavia, le scuole specializzate nella formazione dei missionari garantiranno che avremo più persone in grado non solo di diffondere la fede, ma anche di avere successo." #OLD ITA
 missionary_schools_desc: "Although there is no shortage of people willing to spread the word of the true faith, most of them ultimately do more harm than good. However, establishing specialist schools to properly train missionaries will ensure we have more people who cannot only spread the faith, but do so successfully." #NEW
 #missionary_schools_desc: "Although there is no shortage of people ready to go out and spread the true faith, most of these people simply do more harm than good. However, specialist schools to train the missionaries will ensure we have more people who cannot only spread the faith but succeed as well." #OLD ENG
 church_attendance_duty: "Obbligo di Frequenza in Chiesa"
 #church_attendance_duty_desc: "Adottando una politica di frequenza obbligatoria alla chiesa, l'enfasi sui valori e le credenze religiose ridurrà senza dubbio al minimo i costi per il mantenimento dell'ordine pubblico." #OLD ITA
 church_attendance_duty_desc: "Adopting a mandatory church attendance policy will emphasize the importance of our religious values and beliefs, and will minimize the costs of maintaining law and order." #NEW
 #church_attendance_duty_desc: "By adopting a mandatory church attendance policy, the emphasis on religious values and beliefs will unquestionably minimize the costs of maintaining law and order." #OLD ENG
 divine_supremacy: "Supremazia Divina"
 #divine_supremacy_desc: "È della massima importanza liberare la nostra nazione e i confini circostanti dagli infedeli che infestano le nostre terre." #OLD ITA
 divine_supremacy_desc: "It is of the utmost importance that we rid our nation and its surrounding borders of the non-believers that plague our lands." #NEW
 #divine_supremacy_desc: "It is of the utmost importance that we rid our nation and its surrounding borders from the infidels pestering our lands." #OLD ENG
 #devoutness: "Devozione" #OLD ITA
 devoutness: "Devotion" #NEW
 #devoutness: "Devoutness" #OLD ENG
 #devoutness_desc: "La religione è uno dei baluardi più importanti del nostro governo. Se i governanti danno pubblico esempio di devozione, i governati seguiranno il loro esempio. La crescente devozione del nostro popolo rafforzerà il nostro governo." #OLD ITA
 devoutness_desc: "Religion is one of the most important bulwarks of our rulership. By making grand displays of our religious devotion in public, we will inspire the people to follow suit, and this proliferation of piety amongst our people will strengthen our rule." #NEW
 #devoutness_desc: "Religion is one of the most important bulwarks of our rulership. By public displays of piety by the rulers, the ruled will follow suit. The growing of piety amongst our people will strengthen our rule." #OLD ENG
 religious_tradition: "Tradizione Religiosa"
 #religious_tradition_desc: "La forza della nostra fede e le manifestazioni pubbliche di devozione e culto sono ammirate da altri paesi vicini e lontani. Ciò si riflette nel prestigio e nella gloria del nostro regno." #OLD ITA
 religious_tradition_desc: "The strength of our faith, and the impressive public displays of piety and worship we stage, are admired by other countries both near and far. This is a clear reflection of the prestige and glory of our realm." #NEW
 #religious_tradition_desc: "The strength of our faith and public displays of piety and worship are admired by other lands both near and far. This is reflected in the prestige and glory of our realm." #OLD ENG
 ecumenism: "Ecumenismo"
 #ecumenism_desc: "Il problema di come trattare gli eretici nel regno è sempre difficile. Sebbene il buon vecchio approccio del fuoco e della spada risolva alla fine la maggior parte dei problemi, anche la diplomazia può avere successo. Incoraggiando il dialogo tra le varie sette, possiamo ridurre le incomprensioni e promuovere la pace nel regno." #OLD ITA
 ecumenism_desc: "Determining how to deal with the heretics in our realm is always tricky. Although the good, old-fashioned fire-and-sword approach will solve most problems eventually, diplomacy can also succeed. By encouraging dialogue between the various sects, we can reduce misunderstandings and promote peace in the realm." #NEW
 #ecumenism_desc: "The problem with how to deal with heretics in the realm is always difficult. Although the good old-fashioned fire and sword approach will solve most problems eventually, diplomacy can also succeed. By encouraging dialogue between the various sects, we can reduce misunderstanding and promote peace in the realm." #OLD ENG
 advanced_bureaucracy: "Burocrazia Avanzata"
 advanced_bureaucracy_desc: "Ci consente di aumentare il gettito fiscale adottando un sistema amministrativo più burocratico gestito da funzionari statali."
 organised_construction: "Costruzione Organizzata"
 #organised_construction_desc: "La necessità di aggiornare le infrastrutture del nostro governo è un'operazione costosa, ma se strutturiamo correttamente il processo possiamo farlo in modo più economico." #OLD ITA
 organised_construction_desc: "Upgrading our government's infrastructure is a costly business. However, if we structure the process correctly, we can do it for less expense." #NEW
 #organised_construction_desc: "The need to upgrade the infrastructure of our government is a costly business, if we structure the process correctly we can do this cheaper." #OLD ENG
 smithian_economics: "Economia Smithiana"
 smithian_economics_desc: "Opponendoci al mercantilismo e limitando l'influenza dello Stato nelle questioni economiche, sosterremo un mercato libero che aumenterà la nostra efficienza produttiva complessiva."
 national_bank: "Banca Nazionale"
 national_bank_desc: "Istituendo un'autorità centrale per le questioni finanziarie, avremo un maggiore controllo sull'economia della nostra nazione."
 debt_and_loans: "Debiti e Prestiti"
 #debt_and_loans_desc: "Il debito è talvolta semplicemente inevitabile, tuttavia un mercato del debito organizzato ci consentirà di emettere prestiti a un tasso di interesse più basso." #OLD ITA
 debt_and_loans_desc: "Debt is sometimes simply unavoidable. However, an organized debt market will allow us to float loans at a lower interest rate." #NEW
 #debt_and_loans_desc: "Debt is sometimes simply unavoidable, however, an organized debt market will allow us to float loans at a lower interest rate." #OLD ENG
 centralized_government: "Governo Centralizzato"
 #centralized_government_desc: "Se centralizziamo lo Stato, sarà più facile promuovere le idee e il programma del centro rispetto alle regioni." #OLD ITA
 centralized_government_desc: "If we centralize the state, then we will find it easier to advance the ideas and agenda of the center over the other regions." #NEW
 #centralized_government_desc: "If we centralize the state then we will find it easier to advance the ideas and agenda of the center over the regions." #OLD ENG
 nationalistic_enthusiasm: "Entusiasmo Nazionalistico"
 #nationalistic_enthusiasm_desc: "Il sostegno alle nostre truppe è fondamentale per la difesa nazionale. Grazie alla nostra eccellente amministrazione, siamo in grado di garantire sconti generosi per le nostre forniture." #OLD ITA
 nationalistic_enthusiasm_desc: "Giving our troops adequate support is vital to national defense. With our excellent administration, we are able to secure generous discounts on our military supplies." #NEW
 #nationalistic_enthusiasm_desc: "The supporting of our troops is vital to national defense. With our excellent administration, we are able to secure generous discounts for our supplies." #OLD ENG
 additional_colonists: "Coloni Aggiuntivi"
 #additional_colonists_desc: "Il nuovo mondo è molte cose, ma soprattutto è vuoto. Beh, comunque nessuno di importante vive lì. Facendo conoscere alle persone le infinite opportunità che offre il nuovo mondo, incoraggeremo più persone ad andare lì e stabilirsi." #OLD ITA
 additional_colonists_desc: "The New World is many things, but the most important thing of all is that it is empty. Well, no one important lives there, at any rate. By letting people know of the boundless opportunities that await them in the New World, we will encourage more people to go forth and settle there." #NEW
 #additional_colonists_desc: "The new world is many things, most important of all, empty. Well, no one important lives there at any rate. By letting people know of the boundless opportunities we have in the new world we will encourage more people to go forth and settle there." #OLD ENG
 additional_merchants: "Mercanti Aggiuntivi"
 #additional_merchants_desc: "Le colonie non servono a nulla se non riusciamo a portare i prodotti nella madrepatria. Dobbiamo ampliare la nostra classe mercantile per garantire che ciò avvenga." #OLD ITA
 additional_merchants_desc: "Colonies are no good to us unless we can bring their riches home to the mother country. We must expand our merchant class to ensure that this happens." #NEW
 #additional_merchants_desc: "Colonies are no good unless we get the produce home to the mother country. We must expand our merchant class to ensure that this happens." #OLD ENG
 faster_colonists: "Coloni più Veloci"
 #faster_colonists_desc: "Non è possibile semplicemente inviare dei coloni e aspettarsi che costruiscano una colonia. È necessario un lungo processo di preparazione della spedizione con tutti gli oggetti necessari per sopravvivere nella loro nuova casa. Grazie alla nostra esperienza passata, possiamo accelerare questo processo." #OLD ITA
 faster_colonists_desc: "You cannot simply send colonists out to the New World and expect them to just build a colony. There is first a time-consuming process of preparing the expedition with everything they will need to survive in their new home. We can speed this process up, now that we have some prior experience." #NEW
 #faster_colonists_desc: "You cannot simply send colonists out and expect them to build a colony. There is a time-consuming process of preparing the expedition with all the items they will need to survive in their new home. Using our experience from the past, we can speed this process up." #OLD ENG
 additional_diplomats: "Diplomatici Aggiuntivi"
 additional_diplomats_desc: "La spinta ad espandere il nostro Paese significa che dobbiamo anche ampliare la nostra influenza diplomatica. Dobbiamo garantire che il nostro servizio diplomatico disponga di personale adeguato."
 improved_shipyards: "Cantieri Navali Migliorati"
 #improved_shipyards_desc: "Per difendere i nostri interessi in tutto il mondo avremo bisogno di una [navy|e] forte. Dobbiamo garantire che i nostri cantieri navali siano in grado di produrre navi il più rapidamente possibile per sostituire eventuali perdite che potremmo subire." #OLD ITA
 improved_shipyards_desc: "To defend our interests around the globe, we will require a strong [navy|e]. We must ensure our shipyards can produce ships as quickly as possible to replace any losses we may suffer." #NEW
 #improved_shipyards_desc: "To defend our interests around the globe we will require a strong [navy|e]. We must ensure our shipyards can produce ships as quickly as possible to replace any losses we may suffer." #OLD ENG
 experienced_diplomats: "Diplomatici Esperti"
 #experienced_diplomats_desc: "A volte è sufficiente che le persone credano che siamo potenti. Abbiamo lavorato duramente sul nostro servizio diplomatico per garantire che la nostra parola abbia un peso maggiore." #OLD ITA
 experienced_diplomats_desc: "Sometimes it is simply enough for people to #italic believe#! that we are powerful. We have worked hard on our diplomatic service to ensure that our word carries extra weight." #NEW
 #experienced_diplomats_desc: "Sometimes it is simply enough for people to believe that we are powerful. We have worked hard on our diplomatic service to ensure that our word carries extra weight." #OLD ENG
 competetive_merchants: "Mercanti Competitivi"
 #competetive_merchants_desc: "Per portare il commercio nel nostro Paese dobbiamo essere in grado di battere la concorrenza degli altri Paesi. Dobbiamo garantire che il nostro sistema giuridico offra loro ogni possibile vantaggio." #OLD ITA
 competetive_merchants_desc: "To bring the focus of our trade home, we must be able to beat competition from other countries. We need to ensure that our legal system gives our merchants every possible advantage." #NEW
 #competetive_merchants_desc: "To bring trade home we must be able to beat the competition from other countries. We need to ensure that our legal system gives them every possible edge." #OLD ENG
 organised_mercenary_payment: "Pagamenti Organizzati ai Mercenari"
 #organised_mercenary_payment_desc: "I capitani mercenari sono gente scaltra. Cercheranno di mettere due comandanti dello stesso esercito in competizione tra loro per aggiudicarsi i loro servizi. Semplificheremo il nostro processo di reclutamento dei mercenari per evitare abusi da parte dei comandanti e assicurarci di essere sempre nella posizione negoziale migliore." #OLD ITA
 organised_mercenary_payment_desc: "Mercenary captains are a canny lot. They will try to coax two commanders in the same army into a bidding war over their services. We must streamline our mercenary recruitment process to prevent this sort of trickery, and to ensure we are always in the best position during negotiations." #NEW
 #organised_mercenary_payment_desc: "Mercenary captains are a canny lot. They will try to get two commanders in the same army into a bidding war for their services. We will streamline our mercenary recruitment process to prevent abuses by commanders and ensure we are always in the best negotiating position." #OLD ENG
 benefits_for_mercenaries: "Vantaggi per i Mercenari"
 #benefits_for_mercenaries_desc: "I mercenari cercheranno sempre l'accordo migliore, quindi dobbiamo assicurarci che rimangano con noi. Prendendoci cura delle nostre compagnie mercenarie, queste rimarranno fedeli più a lungo e richiederanno meno compensi monetari diretti." #OLD ITA
 benefits_for_mercenaries_desc: "Mercenaries will always look out for themselves first, so we need to ensure that any we hire remain with us. By properly looking after our mercenary companies, they will stay loyal for longer and require less direct monetary compensation." #NEW
 #benefits_for_mercenaries_desc: "Mercenaries will always look for the best deal, so we need to ensure that mercenaries remain with us. By ensuring we look after our mercenary companies, they will stay loyal for longer and require less direct monetary compensation." #OLD ENG
 organised_mercenary_recruitment: "Reclutamento dei Mercenari"
 #organised_mercenary_recruitment_desc: "Il denaro non è l'unico limite quando si tratta di reclutare mercenari. L'altro ostacolo è trovare compagnie mercenarie che desiderino davvero lavorare con noi. Pertanto, dobbiamo garantire che il nostro sistema consenta a tutte le compagnie di unirsi a noi." #OLD ITA
 organised_mercenary_recruitment_desc: "Money is not the only limiting factor when it comes to recruiting mercenaries. The other bottleneck is finding mercenary companies who actually wish to serve with us. Thus, we must ensure our system allows every company to join us." #NEW
 #organised_mercenary_recruitment_desc: "Money is not the only limit when it comes to recruiting mercenaries. The other bottleneck is having mercenary companies who actually wish to serve with us. Thus, we must ensure our system allows every company to join us." #OLD ENG
 bookkeeping: "Contabilità"
 #bookkeeping_desc: "A volte i soldi scarseggiano e abbiamo bisogno di chiedere un prestito. I prestatori temono sempre di non essere rimborsati. Tenendo registri meticolosi, saremo in grado di garantire che tutti vengano pagati e questo ci consentirà di negoziare tassi di interesse più bassi." #OLD ITA
 bookkeeping_desc: "Sometimes money is short, and we need to borrow. Lenders always worry that they will not be paid back. By maintaining meticulous records, we will be able to ensure that everyone gets reimbursed, which will allow us to negotiate lower rates of interest." #NEW
 #bookkeeping_desc: "Sometimes money is short and we need to borrow. Lenders always worry that they will not be paid back. By maintaining meticulous records, we will be able to ensure that everyone gets paid and that will allow us to negotiate lower rates of interest." #OLD ENG
 legislative_efficiency_idea: "Efficienza Amministrativa"
 #legislative_efficiency_idea_desc: "La parte più importante di qualsiasi governo è ottenere i consigli giusti. Dobbiamo garantire la massima inclusività possibile quando si tratta di consulenti, in modo da poter massimizzare il numero di punti di vista diversi che ci vengono presentati." #OLD ITA
 legislative_efficiency_idea_desc: "The most important factor in efficient government is getting the right advice. We must ensure that we are as inclusive as possible when it comes to advisors, so we can maximize the number of different viewpoints we are presented with." #NEW
 #legislative_efficiency_idea_desc: "The most important part of any government is getting the right advice. We must ensure that we are as inclusive as possible when it comes to advisors, so we can maximize the number of different viewpoints we are presented with." #OLD ENG
 resilient_state: "Stato Resiliente"
 #resilient_state_desc: "Ogni Stato attraversa periodi di declino. È in questi momenti che gli scontenti o gli emarginati sentono che è giunto il momento di ribellarsi. Se costruiamo un'amministrazione resiliente di fronte a questi sconvolgimenti, saremo in grado di riprenderci molto più rapidamente da questa triste situazione." #OLD ITA
 resilient_state_desc: "Every state faces times of decline. These times of weakness are often when the discontented and excluded feel empowered to rebel. If we build a solid administration that can stand resilient in the face of these upsets, we will be able to recover much quicker from this sad state of affairs." #NEW
 #resilient_state_desc: "Every state faces times of decline. This is when the discontented or the excluded feel it is time to rebel. If we build up an administration that is resilient in the face of these upsets, we will be able to recover much quicker from this sad state of affairs." #OLD ENG
 war_cabinet: "Gabinetto di Guerra"
 #war_cabinet_desc: "La guerra è il momento in cui il Paese è più vulnerabile, e lo stress causato dai conflitti può compromettere seriamente la capacità di governare. Assicurando il coinvolgimento dei principali attori durante i periodi di guerra, possiamo evitare questi stress." #OLD ITA
 war_cabinet_desc: "War is when the country is at its most vulnerable, and the stresses of wars can seriously undermine the ability to rule. By ensuring that key players in our administration are involved during times of warfare, we can avoid these problems." #NEW
 #war_cabinet_desc: "Warfare is when the country is at its most vulnerable, the stresses of wars can seriously undermine the ability to rule. By ensuring that key players are involved during times of warfare we can avoid these stresses." #OLD ENG
 aristocracy: "Aristocrazia"
 #aristocracy_desc: "L'aristocrazia è una parte fondamentale di qualsiasi monarchia, poiché è proprio il gruppo di nobili che circonda la dinastia reale a dare legittimità al monarca. In fin dei conti, non può esistere sangue reale senza il concetto di sangue nobile. Pertanto, l'aristocrazia offre il proprio sostegno al monarca, ma si aspetta sempre di godere di alcuni privilegi, poiché non deve mai essere confusa con la plebaglia comune." #OLD ITA
 aristocracy_desc: "Aristocracy is a key part of any monarchy, as the nobles surrounding the royal dynasty are precisely what gives justification to the monarch. In the end, the concept of royal blood cannot exist without the corresponding concept of noble blood. As such, the aristocracy supports the monarch, but they expect to have some privileges in exchange for their loyalty, as they must never be confused with the common rabble." #NEW
 #aristocracy_desc: "Aristocracy is a key part of any monarchy, as a group of nobles around the royal dynasty is precisely what gives justification to the monarch. In the end, there can not be any royal blood without the concept of noble blood. As such, aristocracy gives their support to the monarch, but they will also always expect to have some privileges, as they must never be confused with the common rabble." #OLD ENG
 noble_knights: "Cavalieri Nobili"
 #noble_knights_desc: "Il sostegno alla cavalleria richiede un sistema economico che produca un gran numero di cavalli in eccedenza. Se garantissimo i privilegi alla nostra classe nobiliare, non solo sarebbero molto più felici, ma farebbero gran parte del lavoro necessario per produrre i cavalli necessari. Il nostro giullare di corte lo descriveva come un servizio garantito ai servi." #OLD ITA
 noble_knights_desc: "Supporting cavalry requires an economic system that produces a large number of surplus horses. If we were to guarantee the privileges of our nobility, not only would they be much happier, but they would do much of the work to produce the much-needed horses. Our court fool described it as 'service guarantees serfs.'" #NEW
 #noble_knights_desc: "Supporting cavalry requires an economic system that produces a large number of surplus horses. If we were to guarantee the privileges of our noble class not only would they be much happier they would do much of the work to produce the needed horses. Our court fool described it as service guarantees serfs." #OLD ENG
 serfdom: "Servi"
 #serfdom_desc: "Il soldato semplice nell'esercito non è proprio la carriera che chiunque vorrebbe, con il cibo scadente, la paga bassa e i servizi medici praticamente inesistenti. Se legassimo i nostri contadini alla terra, sapremmo esattamente dove cercare le reclute." #OLD ITA
 serfdom_desc: "Being a foot soldier in the army is exactly a dream career, what with the poor food, low pay, and virtually nonexistent medical services. Therefore, recruitment attempts are often a fruitless affair. If we were to tie our peasantry to the land, however, we would always know exactly where to find recruits." #NEW
 #serfdom_desc: "A foot soldier in the army is not quite the career that anyone wanted, what with the poor [food|e], low pay, and virtually nonexistent medical services. If we were to tie our peasants to the land we would know exactly where to look for recruits." #OLD ENG
 noble_officers: "Ufficiali Nobili"
 #noble_officers_desc: "Chi guida le nostre truppe è una scelta importante. La nostra nobiltà sta cercando di garantire che venga data loro la preferenza. Questo darà loro la possibilità di dimostrare il proprio valore affrontando il nemico con le armi bianche, e noi glielo consentiremo." #OLD ITA
 noble_officers_desc: "The choice of who leads our troops is a crucial one, and our nobles wish to ensure that preference is given to them when it comes to filling these roles. It will give them a chance to show their valor by giving the enemy cold steel, and we will allow them to do this." #NEW
 #noble_officers_desc: "Who leads our troops is an important choice. Our nobility is seeking to ensure that preference is given to them. It will give them a chance to show their valor by giving the enemy cold steel, and we will allow them to do this." #OLD ENG
 local_nobility: "Nobiltà Locale"
 #local_nobility_desc: "I nobili sanno di essere semplicemente migliori delle persone comuni e daranno la loro lealtà a coloro che ne sono degni. Se confermiamo i loro privilegi, essi ricorderanno naturalmente la nostra generosità e saranno più resistenti alle lusinghe delle potenze straniere." #OLD ITA
 local_nobility_desc: "The nobles know they are simply better than other people, and will only give their loyalty to those they deem worthy. If we affirm their privileges, they will of course remember our generosity, and be more resistant to the temptations of foreign powers." #NEW
 #local_nobility_desc: "The nobility know they are simply better than normal people and will give their loyalty to those that are worthy. If we confirm their privileges, they will of course remember our largess and be more resistant to the inducements of foreign powers." #OLD ENG
 international_nobility: "Nobiltà Internazionale"
 #international_nobility_desc: "Le relazioni internazionali sono una questione delicata. Alcuni sostengono che la classe mercantile, abituata a trattare con gli stranieri, sia la più adatta a questo compito. Chi la pensa così ignora i legami di parentela che le nostre famiglie nobili hanno instaurato nel corso degli anni, legami che dovrebbero essere sfruttati per aiutare la nostra causa sul piano diplomatico." #OLD ITA
 international_nobility_desc: "International relations is a tricky business. Some say that the merchant class, who are used to dealing with foreigners, are best suited for this. Those who say so, however, ignore the kindred ties that our noble families have established through the years. We should take advantage of these ties to help our cause diplomatically." #NEW
 #international_nobility_desc: "International relations are a tricky business. Some say that the merchant class who are used to dealing with foreigners are best for this. Those who say so ignore the kindred ties that our noble families have established through the years, these ties should be taken advantage of to help our cause diplomatically." #OLD ENG
 noble_resilience: "Connessioni Nobili"
 #noble_resilience_desc: "I vari gruppi mercenari di questo continente sono spesso guidati da nobili minori. Stringendo amicizia con la nobiltà, possiamo sfruttare la loro rete di contatti per cercare gruppi di soldati mercenari più numerosi e più grandi." #OLD ITA
 noble_resilience_desc: "The various mercenary groups on this continent are often headed by lesser nobles. By befriending the aristocracy, we can use their network of contacts to seek out more — and larger — groups of mercenary soldiers." #NEW
 #noble_resilience_desc: "The various mercenary groups of this continent are often headed by lesser nobles. By befriending the nobility, we can make use of their network of contacts to seek out more and larger groups of mercenary soldiers." #OLD ENG
 military_traditions: "Tradizioni Militari"
 #military_traditions_desc: "Il pensiero militare è in continua evoluzione e noi facciamo in modo che il nostro pensiero militare si evolva con esso. Incoraggiando una tradizione di servizio tra la nostra nobiltà, essere un uomo di rango significa essere un uomo che ha conquistato la gloria sul campo di battaglia. Sebbene il coraggio e cose simili siano sempre utili, non c'è niente di meglio che surclassare il nemico per rendere tutto più facile." #OLD ITA
 military_traditions_desc: "The nature of war is constantly evolving, and we must ensure that perceptions of our military evolve with it. By encouraging a tradition of service amongst our nobility, we shall entrench the idea that high social status is earned through glory on the battlefield. While bravery and combat skill remain important, true military excellence now lies in professional expertise rather than nebulous things like personal valor." #NEW
 #military_traditions_desc: "Military thought is constantly evolving, and we ensure that our military thought evolves with it. By encouraging a tradition of service amongst our nobility, to be a man of status is to be a man who has won glory on the battlefield. Although bravery and stuff like that is always useful, there is nothing quite like outclassing your enemy to make it easy." #OLD ENG
 tradition_of_payment: "Pagamenti Puntuali"
 #tradition_of_payment_desc: "C'è sempre la tentazione di ritardare di qualche giorno il pagamento dei mercenari, dopotutto non si sa mai quali spese impreviste potrebbero presentarsi. Noi non lo faremo, pagheremo i nostri mercenari puntualmente e i capitani dei mercenari lo sapranno e lo terranno a mente." #OLD ITA
 tradition_of_payment_desc: "It is always tempting to be a little late paying soldiers of fortune — after all, you never know what sudden expenses might come along. But we will #italic not do that#!; we shall pay our mercenaries exactly on time, and mercenary captains will know this and remember this." #NEW
 #tradition_of_payment_desc: "There is always the temptation to be just a few days late with payments to mercenaries, after all, you never know what sudden expenses might come along. We will not do that, we will pay our mercenaries exactly on time and mercenary captains will know this and remember this." #OLD ENG
 abolished_serfdom: "Servitù Abolita"
 #abolished_serfdom_desc: "Sappiamo dai resoconti dell'epoca romana che un esercito di cittadini liberi è molto più disposto a combattere rispetto a uno composto da soldati costretti alle armi. Dobbiamo rendere i nostri contadini abbastanza liberi, e loro combatteranno per difendere la loro libertà." #OLD ITA
 abolished_serfdom_desc: "We know from reading ancient Roman accounts that a citizen army of free men is far more willing to fight than those who are forced. We should give our peasants a relative amount of freedom; they will then fight more fervently to defend their homeland — and those privileges." #NEW
 #abolished_serfdom_desc: "We know from reading the accounts of Roman times that a citizen army of free men is far more willing to fight than those who are forced. We must make our peasantry fairly free, and they will fight to defend their freedom." #OLD ENG
 bill_of_rights: "Carta dei Diritti"
 #bill_of_rights_desc: "Concedendo ai cittadini determinati diritti fondamentali, riduciamo la probabilità di una rivolta contadina." #OLD ITA
 bill_of_rights_desc: "By granting the citizens certain fundamental rights, we will reduce the likelihood of a peasant uprising." #NEW
 #bill_of_rights_desc: "By granting the citizens certain fundamental rights, we reduce the likelihood of a peasant uprising." #OLD ENG
 free_merchants: "Mercanti Liberi"
 #free_merchants_desc: "Nelle società più reazionarie e conservatrici, gli uomini d'affari sono guardati con disprezzo, come se fossero in qualche modo inferiori a chi possiede la terra. Beh, non per noi: noi sappiamo che la ricchezza è potere, indipendentemente dalla sua provenienza." #OLD ITA
 free_merchants_desc: "In more reactionary and hidebound societies, merchants are looked down upon as somehow being less than those who own land. Well, this foolish attitude is not for us; we know that wealth is power regardless of where it comes from." #NEW
 #free_merchants_desc: "In more reactionary and hidebound societies men of trade are looked down upon as somehow being lesser men than those who own land. Well not for us, we know that wealth is power regardless of where it comes from." #OLD ENG
 free_subjects: "Stati Cliente Liberi"
 #free_subjects_desc: "Sebbene dare una bella lezione a un servo possa essere soddisfacente, non è il modo migliore per farlo lavorare più duramente. Alcuni filosofi naturali hanno avuto l'idea di rendere il profitto la motivazione principale delle persone: se sostituissimo i canoni monetari con pagamenti in natura, i nostri contadini sarebbero incentivati a produrre di più." #OLD ITA
 free_subjects_desc: "Although giving a servant a damn good thrashing might be satisfying, it is surprisingly not the best way to make them work harder. Some natural philosopher has stumbled upon the idea of making profit the prime motivation for working people. If we replace monetary rents with payment in kind, our peasant laborers will be incentivized to produce more." #NEW
 #free_subjects_desc: "Although giving a servant a damn good thrashing might be satisfying, it is not the best way to actually get them to work harder. Some natural philosopher has hit on the idea of making profit the prime motivation for people, if we replace monetary rents with payment in kind, our peasants will be incentivized to produce more." #OLD ENG
 humanist_tolerance: "Tolleranza Umanista"
 #humanist_tolerance_desc: "Impegnandoci per creare una società più tollerante e cercando di risolvere i nostri problemi sociali e religiosi in modo più razionale, il rischio di disordini civili diminuirà." #OLD ITA
 humanist_tolerance_desc: "By striving to create a more tolerant society, and attempting to solve our social and religious problems in more rational ways, the risk of civil disorder will be diminished." #NEW
 #humanist_tolerance_desc: "By striving towards a more tolerant society and making attempts at solving our social and religious problems in more rational ways, the risk of civil disorder will diminish." #OLD ENG
 emancipation: "Emancipazione"
 #emancipation_desc: "Per molto tempo abbiamo limitato la proprietà della terra solo a coloro che ritenevamo sufficientemente affidabili. Se dovessimo abolire queste restrizioni, la proprietà terriera verrebbe consolidata. Ciò creerebbe a sua volta un bacino di manodopera stagionale per cui la vita militare potrebbe diventare una scelta interessante." #OLD ITA
 emancipation_desc: "For a long time, we have restricted land ownership to only those we felt were trustworthy enough. If we were to lift these restrictions, then land holdings could be consolidated. This in turn would create a pool of seasonal labor for whom the army life might be worth pursuing." #NEW
 #emancipation_desc: "For a long time we have restricted ownership of land to only those we felt were trustworthy enough. If we were to lift these restrictions, then land holdings would be consolidated. This in turn would create a pool of seasonal labor for whom the army life might be worth pursuing." #OLD ENG
 dynamic_court: "Corte Dinamica"
 #dynamic_court_desc: "Una corte veramente innovativa è quella in cui chiunque può emergere e distinguersi. Dobbiamo impegnarci affinché le vecchie tradizioni, la nascita o la ricchezza non costituiscano un ostacolo allo sviluppo della nostra corte o una barriera per le persone di talento che desiderano cercare fortuna al servizio del nostro Stato." #OLD ITA
 dynamic_court_desc: "A truly innovative court is one where any person may rise to prominence. We must strive to make sure that old traditions, as well as prejudices around one's birth or level of wealth, do not hinder the development of our court or act as a barrier to talented people wishing to serve our state." #NEW
 #dynamic_court_desc: "A truly innovative court is one where any person may rise to shine. We must strive to make sure that old traditions, birth or wealth aren't a hindrance to the development of our court or a barrier to talented people wishing to seek their fortune in the service of our state." #OLD ENG
 innovativeness: "Sete di Conoscenza"
 #innovativeness_desc: "La curiosità naturale e il desiderio di conoscere il mondo e il suo funzionamento sono ciò che ci spinge ad andare avanti. La nostra gente vuole sapere, ed è proprio questa scintilla nelle loro menti che darà il via al progresso della nostra nazione." #OLD ITA
 innovativeness_desc: "Natural curiosity, and the desire to understand our world and how it functions, is what pushes us forward. Our people are eager to gain knowledge, and it is this spark in their minds that will ignite progress for our nation." #NEW
 #innovativeness_desc: "Natural curiosity and the wish to know about the world and how it functions is what pushes us forward. Our people want to know, and it is this spark in their minds what will ignite progress for our nation." #OLD ENG
 economic_ideas: "Economia Asservita"
 #economic_ideas_desc: "L'economia e la ricchezza di un paese dovrebbero servire lo Stato, e non il contrario. Pertanto, lo Stato dovrebbe agire nel proprio interesse per accumulare al suo interno la maggior quantità possibile di risorse. Solo così la nostra nazione potrà prosperare veramente." #OLD ITA
 economic_ideas_desc: "The economy and wealth of a country should serve the government, not the opposite way around. As such, it is in the state's best interests to accumulate the lion's share of resources, both as a show of our power and in order to better carry out our will. Only with this system can our nation truly prosper." #NEW
 #economic_ideas_desc: "The economy and wealth of a country should serve the state, and not the opposite. As such, the state should act in its best interest to accumulate within itself the highest amounts of resources. Only with this will our nation truly prosper." #OLD ENG
 expansionism: "Un Seme Tra le Spine"
 #expansionism_desc: "Il mondo è vasto e non possiamo accontentarci di rimanere nel nostro piccolo appezzamento di terra, perché i nostri vicini non faranno necessariamente lo stesso. Dobbiamo puntare ad espanderci e a rafforzarci, per non rischiare di essere soffocati dai nostri vicini in crescita." #OLD ITA
 expansionism_desc: "The world is huge, and we should not grow complacent with our position in it, for our neighbors will not necessarily do the same. We shall set our sights on expanding our borders and making ourselves stronger, lest we risk being swallowed up by growing neighbor states." #NEW
 #expansionism_desc: "The world is vast, and we cannot content ourselves with staying in our small plot of land, for our neighbors will not necessarily do the same. We shall set our sights on expanding and making ourselves stronger, lest we risk being choked to death by our growing neighbors." #OLD ENG
 formal_administration: "Amministrazione Formale"
 #formal_administration_desc: "Procedure corrette e un apparato amministrativo ben oliato portano alla prosperità di un Paese, poiché senza un'amministrazione adeguata qualsiasi iniziativa dello Stato rimarrebbe vana. Formalizzeremo e standardizzeremo il nostro, in modo che la volontà dello Stato si diffonda naturalmente in ogni angolo della nazione." #OLD ITA
 formal_administration_desc: "Correct procedures and a well-oiled administrative apparatus result in a prosperous country, for without a proper administration, anything that the state attempts to accomplish will just remain fruitless. We will formalize and standardize our administration, so that the will of the state flows through it naturally to all corners of the nation." #NEW
 #formal_administration_desc: "Correct procedures and a well-oiled administrative apparatus result in a prosperous country, for without a proper administration anything that the state intends to do will just remain fruitless. We will formalize and standardize ours, so that the will of the state flows through it naturally to all corners of the nation." #OLD ENG
 plutocracy: "Il Potere della Moneta"
 #plutocracy_desc: "Ricchezza e potere non sono sinonimi, ma sono certamente correlati. Infatti, non solo il potere può rendere ricchi, ma anche la ricchezza può garantire potere. Lo comprendiamo bene, poiché le persone più ricche sono anche quelle che occupano le posizioni di potere nel nostro Paese." #OLD ITA
 plutocracy_desc: "Wealth and power are not synonyms, but they are certainly related: Not only can power make someone wealthy, but wealth can also grant someone power. We understand that well, as our wealthiest members of the population are also the ones who occupy the seats of power in our country." #NEW
 #plutocracy_desc: "Wealth and power are not synonyms, but they are certainly related. For not only power can make someone wealthy, but also wealth can grant someone power. We understand that, as our most wealthy individuals are also the ones that occupy the seats of power with our country." #OLD ENG
 rebellion_support: "Contatti Segreti"
 #rebellion_support_desc: "TQuesti sono tempi turbolenti e non tutti sono soddisfatti di chi li governa. Contattando questi gruppi insoddisfatti all'estero potremmo riuscire a convertirli alla nostra causa e convincerli a incitare una rivolta, che sicuramente servirebbe come strumento per destabilizzare i nostri nemici." #OLD ITA
 rebellion_support_desc: "These are turbulent times, and not everyone is happy with who rules over them. By contacting these dissatisfied groups abroad, we may be able to turn them to our cause and persuade them to incite a revolt, which would be a devastating tool for destabilizing our enemies." #NEW
 #rebellion_support_desc: "These are turbulent times, and not all people are happy with the ones that rule over them. By contacting these dissatisfied groups abroad we may be able to turn them to our cause and persuade them to incite a revolt, which would certainly serve as a tool to destabilize our enemies." #OLD ENG
 privateers: "Corsari"
 #privateers_desc: "La guerra al commercio nemico è il primo dei tre pilastri fondamentali per la vittoria. Incoraggeremo i capitani di mare più irascibili a colpire il commercio nemico." #OLD ITA
 privateers_desc: "Waging war on enemy commerce is at the apex of naval warfare. We shall encourage the crustiest, saltiest seadogs we can hire to strike at the heart of the enemy's trade, which should help refill our own coffers quickly." #NEW
 #privateers_desc: "Waging war on enemy commerce rests on the apex of the first triad of victory. We will encourage crusty sea captains to strike at the enemy's trade." #OLD ENG
 vetting: "Controllo di Idoneità"
 #vetting_desc: "Con così tanti uffici a scopo di lucro, a volte ci rendiamo conto che coloro che gestiscono la nostra amministrazione sono suscettibili alle tangenti da parte di potenze straniere. Alcuni semplici controlli sui precedenti personali consentiranno di eliminare i soggetti più inclini alla corruzione." #OLD ITA
 vetting_desc: "Because so many of our government positions are held by those seeking to advance themselves, we sometimes find that those who run our administration are susceptible to bribes from foreign powers. Running some simple background checks will weed out the officials most prone to corruption." #NEW
 #vetting_desc: "With so many offices for profit, we sometimes find that those who run our administration are susceptible to bribes from foreign powers. A few simple background checks will weed out the most prone to corruption." #OLD ENG
 #rumourmongering: "Diffusione di Voci" #OLD ITA
 rumourmongering: "Rumor-Mongering" #NEW
 #rumourmongering: "Rumor-mongering" #OLD ENG
 #rumourmongering_desc: "I nemici sono vulnerabili su tutti i fronti. Il veleno nell'orecchio destro può essere letale quanto diecimila soldati. Dobbiamo essere pronti a praticare tutte le arti oscure necessarie per vincere." #OLD ITA
 rumourmongering_desc: "Enemies are vulnerable on all fronts. Poison in the right ear can be just as deadly as ten thousand soldiers. We must be ready to practice all the shadowy arts we may need to win..." #NEW
 #rumourmongering_desc: "Enemies are vulnerable on all fronts. Poison in the right ear can be just as deadly as ten thousand soldiers. We must be ready to practice all the dark arts we need to win." #OLD ENG
 efficient_spies: "Spie efficienti"
 #efficient_spies_desc: "La maggior parte dei contadini venderebbe la propria madre per denaro, ma trovare quelli che possono fare qualcosa di veramente utile è più difficile. Grazie all'esperienza, stiamo imparando a separare il grano dalla paglia." #OLD ITA
 efficient_spies_desc: "Most peasants would happily sell their own mother for gold, but there are some with skills and talents that we in the government might find very useful for...ah, #italic statecraft#!. Although finding these worthy commoners is difficult, through experience we are learning to separate the wheat from the chaff." #NEW
 #efficient_spies_desc: "Most peasants will sell their own mother for cash but finding those who can do something truly useful is more difficult. Through experience, we are learning to separate the wheat from the chaff." #OLD ENG
 shady_recruitment: "Reclutamento Losco"
 #shady_recruitment_desc: "La nostra capacità di individuare e reclutare persone provenienti dalle classi sociali più basse fa sì che molti non credano che siamo davvero noi a fare queste cose. Il che è positivo." #OLD ITA
 shady_recruitment_desc: "Our ability to identify and recruit excellent operatives from the very lowest classes has created an excellent smokescreen: It could in no way be #italic us#! compelling these miscreants to do our secret bidding! Which is exactly what we wanted them to think..." #NEW
 #shady_recruitment_desc: "Our ability to identify and recruit from the very lowest classes leaves many disbelieving that it is indeed us that are doing these things. Which is nice." #OLD ENG
 destabilising_efforts: "Tentativi di Destabilizzazione"
 #destabilising_efforts_desc: "Le nostre capacità di spionaggio ci consentono di colpire proprio la [stability|e] dei nemici. Possiamo trasformare i loro migliori amici nei loro nemici." #OLD ITA
 destabilising_efforts_desc: "Our espionage skills allow us to target the very stability of the enemies. We have the power to turn their greatest friends into their enemies..." #NEW
 #destabilising_efforts_desc: "Our abilities at espionage allow us to target the very [stability|e] of the enemies. We can make their greatest friends be their enemies." #OLD ENG
 espionage: "Spionaggio"
 espionage_desc: "Ci permette di addestrare più spie e quindi aumentare le nostre possibilità di ottenere informazioni politiche e militari sui nostri nemici."
 foreign_embassies: "Ambasciate Straniere"
 #foreign_embassies_desc: "La diplomazia è un'arte delicata che consiste nel cercare di bilanciare più parti contemporaneamente. Se manteniamo ambasciate in altri paesi che ci riferiscono regolarmente, avremo le informazioni necessarie per valutare le nostre opzioni." #OLD ITA
 foreign_embassies_desc: "Diplomacy is a delicate balancing act that requires us to balance the needs and desires of multiple entities at the same time. Maintaining embassies in other countries that report to us on a regular basis will give us the information needed to better weigh our diplomatic options." #NEW
 #foreign_embassies_desc: "Diplomacy is a delicate art of trying to balance several sides at the same time. If we maintain embassies in other countries reporting to us on a regular basis then we will have the information needed in order to ponder our options." #OLD ENG
 claim_fabrication: "Rivendicazioni Falsificate"
 #claim_fabrication_desc: "Affermare che qualcosa è tuo è facile, convincere tutti gli altri che hai ragione è molto più difficile. Allargando la nostra rete diplomatica, possiamo garantire che le persone che contano sappiano che questa rivendicazione è nostra." #OLD ITA
 claim_fabrication_desc: "Claiming something as yours is easy; persuading everyone else that your claim is valid is much harder. By spreading our diplomatic net wide, we can ensure that the people who matter know that we have staked this claim." #NEW
 #claim_fabrication_desc: "Claiming something as yours is easy, persuading everyone else that you have a valid claim is much harder. By spreading our diplomatic net wide, we can ensure that the people who matter know that this claim is ours." #OLD ENG
 cabinet: "Gabinetto"
 cabinet_desc: "Istituendo un consiglio esecutivo, siamo in grado di riunire i nostri diplomatici più abili."
 adaptability: "Adattabilità"
 #adaptability_desc: "Ciò che è nostro e ciò che fa parte del nostro dominio ancestrale non verrà mai ceduto. Un po' di flessibilità in questo senso porterà a considerare una porzione molto più ampia di territorio come non cedibile e, se dovesse verificarsi il peggio, il mondo intero saprà che la nostra crociata per recuperarlo sarà giusta." #OLD ITA
 adaptability_desc: "There is what is ours, and what is part of our ancestral domain that will never be surrendered. A bit of flexibility in defining these 'ancestral' borders will lead to more land being accepted as our rightful territory, and should the worst happen, the whole world will know our crusade to recover it will be just." #NEW
 #adaptability_desc: "There is what is ours and what is part of our ancestral domain that will never be surrendered. A bit of flexibility here will see much more land being considered as never to be surrendered and should the worst happen, the whole world will know our crusade to recover it will be just." #OLD ENG
 revolution_and_counter: "Rivoluzione e Contro-Rivoluzione"
 #revolution_and_counter_desc: "Con la politica dell'epoca che diventa sempre più polarizzata e radicale, potremmo non avere altra scelta che dichiarare guerra ai governi che non sono come il nostro. Abbracciando questa idea, non possiamo fare nulla." #OLD ITA
 revolution_and_counter_desc: "With the politics of the time becoming more polarized and more radical, we may have no choice but to wage war on governments that are not the same as our own." #NEW
 #revolution_and_counter_desc: "With the politics of the time becoming more polarized and more radical, we may have no choice but to wage war on governments that are not the same as our own. By embracing this idea, we can at no cost." #OLD ENG
 diplomatic_influence: "Influenza Diplomatica"
 #diplomatic_influence_desc: "Concentrandoci sulla diplomazia possiamo aumentare il potere che esercitiamo sulla scena diplomatica. Questo potere può farci guadagnare molti amici." #OLD ITA
 diplomatic_influence_desc: "By focusing on diplomacy, we can increase the power we wield on the world stage, and win many friends and potential allies." #NEW
 #diplomatic_influence_desc: "By focusing on Diplomacy we can increase the power we wield on the diplomatic stage. This power can gain us many friends." #OLD ENG
 flexible_negotiation: "Negoziazione Versatile"
 #flexible_negotiation_desc: "Non si può mai sapere con certezza cosa si potrà ottenere al tavolo dei negoziati di pace, quindi dovremmo presentarci con tutte le opzioni aperte." #OLD ITA
 flexible_negotiation_desc: "You can never quite predict what could be gained during peace talks, so we should enter with all options open." #NEW
 #flexible_negotiation_desc: "You can never quite know what can be gained at the peace table, so we should enter with all options open." #OLD ENG
 agent_training: "Formazione degli Agenti"
 #agent_training_desc: "Abbiamo in programma molte operazioni segrete, ma ci mancano gli uomini per portarle a termine. Stabilire un metodo di addestramento per le nostre spie contribuirà ad aumentare il numero di agenti disponibili per missioni pericolose." #OLD ITA
 agent_training_desc: "We have many covert operations planned, but lack sufficient agents to carry them out. Establishing a training method for our spies will help bolster the ranks of operatives available for dangerous missions." #NEW
 #agent_training_desc: "We have many covert operations planned but lack the men for the tasks. Establishing a training method for our spies will help bolster the available agents for dangerous missions." #OLD ENG
 additional_loyalist_recruitment: "Reclutamento di Nuovi Lealisti"
 #additional_loyalist_recruitment_desc: "Naturalmente, ci sono persone che risiedono nelle terre dei nostri sudditi che comprendono il diritto divino del nostro dominio. Reclutando e aiutando questi individui illuminati possiamo rafforzare la nostra presa sugli stati clienti." #OLD ITA
 additional_loyalist_recruitment_desc: "Naturally, there are those within our subject nations who recognize our divine right to rule. By recruiting and aiding these enlightened individuals, we can strengthen our grasp on these territories." #NEW
 #additional_loyalist_recruitment_desc: "Naturally, there are those who reside in our subjects' lands who understand the divine right of our rule. By recruiting and aiding these enlightened individuals we can strengthen our grasp on subject nations." #OLD ENG
 audit_checks: "Ispezioni"
 #audit_checks_desc: "Mentre cerchiamo di infiltrarci in altre nazioni, dobbiamo stare attenti alle idee dannose che si diffondono nelle nostre corti. Mettere insieme una squadra di revisione per assicurarci che i nostri ministri agiscano nell'interesse dello Stato aiuterà a sradicare alcuni elementi marci." #OLD ITA
 audit_checks_desc: "While we work to infiltrate other nations, we must be vigilant of poisonous ideas spreading around our own courts. Assembling an audit team to ensure our ministers are acting in the state's interest should help root out any rotten elements." #NEW
 #audit_checks_desc: "While we look to infiltrate other nations, we must be vigilant of poisonous ideas spreading around our own courts. Assembling an audit team to ensure our ministers are acting in the state's interest will help root out some rotten elements." #OLD ENG
 grand_army: "Grande Esercito"
 grand_army_desc: "Ci permette di creare uno degli eserciti più grandi e potenti che il mondo abbia mai visto."
 glorious_arms: "Esercito Glorioso"
 glorious_arms_desc: "La vista del nostro glorioso e prestigioso esercito farà tremare di paura tutti i nostri avversari."
 bayonet_leaders: "Ufficiali in Prima Linea"
 #bayonet_leaders_desc: "Gli uomini che sono ben guidati seguiranno, quindi faremo in modo che i nostri ufficiali guidino dall'avanguardia." #OLD ITA
 bayonet_leaders_desc: "Men who are well-led will follow, so we must ensure that our officers lead from the front." #NEW
 #bayonet_leaders_desc: "Men who are well led will follow, so we will ensure that our officers will lead from the front." #OLD ENG
 battlefield_commisions: "Commissioni Militari"
 battlefield_commisions_desc: "Ci permette di concentrarci maggiormente sui progressi militari e quindi di rafforzare la nostra tradizione militare."
 improved_foraging: "Foraggiamento Migliorato"
 #improved_foraging_desc: "Tradizionalmente non eravamo in grado di combattere efficacemente in terre che non fornivano grandi quantità di cibo. Tuttavia, le nostre truppe sono diventate più abili nell'approvvigionamento di [food|e] consentendo così a eserciti più numerosi di combattere." #OLD ITA
 improved_foraging_desc: "Traditionally, we were unable to fight effectively in lands that did not supply enough food. However, our troops have become better at acquiring food in the wild, making it possible for larger armies to fight." #NEW
 #improved_foraging_desc: "Traditionally we were unable to fight effectively in lands which did not supply a lot of food. However, our troops have become better at acquiring [food|e] allowing larger armies to fight." #OLD ENG
 improved_manuever: "Manovre Migliorate"
 improved_manuever_new: "Aggiramento Migliorato"
 #improved_manuever_desc: "L'uso adeguato delle truppe sul campo di battaglia è un'abilità fondamentale per un buon comandante. La capacità di sapere dove spostare le truppe ci darà un vantaggio." #OLD ITA
 improved_manuever_desc: "Tactical positioning is a vital skill for any commander. The ability to maneuver troops effectively around the battlefield will give us a significant edge." #NEW
 #improved_manuever_desc: "Using troops on the battlefield is a vital skill for a good commander. The ability to know where to move troops will give us an edge." #OLD ENG
 engineer_corps: "Corpo degli Ingegneri"
 #engineer_corps_desc: "Ci permette di riunire le menti più brillanti che la nostra nazione ha da offrire nel campo della tecnologia militare e di avvalerci dei loro servizi senza pari." #OLD ITA
 engineer_corps_desc: "Allows us to gather the greatest technological minds our nation has to offer, and make use of their unrivaled services." #NEW
 #engineer_corps_desc: "Allows us to gather the greatest minds our nation has to offer in the area of military technology and make use of their unrivaled services." #OLD ENG
 military_drill: "Esercitazioni Militari"
 #military_drill_desc: "Ci permette di investire nell'addestramento militare e quindi di migliorare le formazioni di battaglia, l'uso delle armi e il morale del nostro esercito." #OLD ITA
 military_drill_desc: "Allows us to invest in military training and thereby improve battle formations, weapon handling, and our army's morale." #NEW
 #military_drill_desc: "Allows us to invest in military training and thereby improve battle formations, weapon handling and boost the morale of our army." #OLD ENG
 regimental_system: "Sistema Reggimentale"
 #regimental_system_desc: "Organizzando i nostri eserciti in [regiments|e] legati a specifiche aree geografiche, possiamo consentire all'esercito di mettere radici nella comunità. In questo modo, quando dovremo reclutare nuovi battaglioni per i nostri [regiments|e], potremo farlo più rapidamente." #OLD ITA
 regimental_system_desc: "By organizing our armies into regiments tied to distinct geographical areas, we allow them to put down roots in local communities. Then, we need to raise additional battalions for these regiments, recruitment will be faster thanks to these regional ties." #NEW
 #regimental_system_desc: "By organizing our armies into [regiments|e] tied to distinct geographical areas we can allow the army to put down roots into the community. Thus, when we come to raise more battalions for our [regiments|e] they will be able to be recruited faster." #OLD ENG
 defensive_mentality: "Mentalità Difensiva"
 #defensive_mentality_desc: "C'è chi pensa che l'attacco sia la miglior difesa, ma è una sciocchezza: lasciamoli avvicinare e poi colpiamoli con un contrattacco. Le nostre truppe difenderanno tenacemente e le nostre fortezze resisteranno più a lungo." #OLD ITA
 defensive_mentality_desc: "There are those who think that attack is the best form of defense, but that is foolish. Let our enemies come to us instead; we shall counter with incredible zeal. Our troops will defend their homes tenaciously, and our fortresses will withstand sieges for longer." #NEW
 #defensive_mentality_desc: "There are those who think that attack is the best form of defense, but that is foolish let them come to us and then hit them on the counter. Our troops will defend tenaciously, and our fortresses will hold out for longer." #OLD ENG
 superior_firepower: "Potenza di Fuoco Superiore"
 #superior_firepower_desc: "L'uso di una potenza di fuoco concentrata per destabilizzare il nemico prima di sferrare il colpo di grazia è uno dei punti di forza del nostro esercito, e faremo in modo che i nostri leader ne siano consapevoli." #OLD ITA
 superior_firepower_desc: "The use of massed firepower to disrupt the enemy before delivering a coup de grâce is one of our army's strengths, and we will make sure that our leaders know this." #NEW
 #superior_firepower_desc: "The use of massed firepower to disrupt the enemy before delivering the coup de grâce is one of our army's strengths, and we will ensure that our leaders know this." #OLD ENG
 supply_trains: "Convogli di Rifornimento"
 #supply_trains_desc: "Durante una campagna militare, l'[attrition|e] è il nostro nemico più temibile e la chiave per difendere i nostri uomini da esso è una rete logistica ben pianificata ed efficiente, in grado di fornire supporto e rifornimenti." #OLD ITA
 supply_trains_desc: "While on campaign, attrition is our most formidable foe, and the key to defending our men against it is a well-planned and efficiently run logistic network capable of providing ample support and supplies." #NEW
 #supply_trains_desc: "While on campaign, [attrition|e] is our most formidable foe, and the key to defend our men against it is a well-planned and efficiently run logistic network capable of providing support and supplies." #OLD ENG
 national_conscripts: "Coscritti Nazionali"
 #national_conscripts_desc: "Aumenta il numero dei nostri militari rendendo obbligatorio per gli uomini l'arruolamento nel servizio militare." #OLD ITA
 national_conscripts_desc: "Increases our military numbers by making military service compulsory for those eligible." #NEW
 #national_conscripts_desc: "Increases our military numbers by making it compulsory for men to enroll for military service." #OLD ENG
 shrewd_commerce_practice: "Commercio Accorto"
 #shrewd_commerce_practice_desc: "Ci consente di avvalerci di pratiche commerciali più raffinate, garantendo ai nostri mercanti un vantaggio competitivo rispetto alla concorrenza." #OLD ITA
 shrewd_commerce_practice_desc: "Allows us to make use of more refined trading practices, giving our merchants the upper hand over our competitors." #NEW
 #shrewd_commerce_practice_desc: "Allows us to make use of more refined trading practices giving our merchants the upper hand over our competitors." #OLD ENG
 free_trade: "Libero Scambio"
 #free_trade_desc: "Le attuali famiglie di mercanti stanno cercando di garantire che i privilegi commerciali rimangano di loro esclusiva competenza, ma noi non siamo disposti ad accettarlo e consentiremo la crescita della classe mercantile." #OLD ITA
 free_trade_desc: "Our leading merchant families wish to secure trade privileges as their exclusive preserve, but we are unwilling to do so, and will therefore allow the growth of the merchant class." #NEW
 #free_trade_desc: "The current merchant families are seeking to ensure that trade privileges remain their exclusive preserve, but we are unwilling to do so and will allow the growth of the merchant class." #OLD ENG
 merchant_adventures: "Iniziative Mercantili"
 #merchant_adventures_desc: "Ci permette di avvalerci dei numerosi mercanti desiderosi di fama e fortuna, desiderosi di offrire i propri servizi per avere la possibilità di cercare ed esplorare nuove rotte commerciali." #OLD ITA
 merchant_adventures_desc: "This allows us to make use of the numerous traders lusting for fame and fortune, eager to offer their services for a chance to search and explore new trade routes." #NEW
 #merchant_adventures_desc: "Allows us to make use of the numerous traders lusting for fame and fortune, eager to offer their services for a chance to search and explore new trade routes." #OLD ENG
 national_trade_policy: "Politica Commerciale Nazionale"
 national_trade_policy_desc: "Adottando una politica commerciale nazionale, possiamo rafforzare la nostra presenza commerciale e aumentare l'efficacia dei nostri scambi."
 overseas_merchants: "Mercanti Esteri"
 #overseas_merchants_desc: "Per far crescere il commercio dobbiamo estendere i diritti di cittadinanza alle persone che vivono all'estero, sostengono il nostro commercio e appartengono alla giusta classe sociale." #OLD ITA
 overseas_merchants_desc: "To expand trade, we need to extend the rights of citizenship to people who live abroad, support our trade, and are of the right social class." #NEW
 #overseas_merchants_desc: "To grow trade we need to extend the rights of citizenship to people who live abroad, support our trade and are of the right social class." #OLD ENG
 trade_manipulation: "Manipolazione Commerciale"
 #trade_manipulation_desc: "In quei punti chiave in cui il commercio potrebbe andare in un senso o nell'altro, la capacità di ottenere un vantaggio è fondamentale per la crescita delle nostre entrate commerciali." #OLD ITA
 trade_manipulation_desc: "At those key choke points where trade supremacy could go one way or another, edging out the regional competition is crucial to expanding our trade income." #NEW
 #trade_manipulation_desc: "At those key choke points where trade could go one way or another, the ability to gain an edge there is key to the growth of our trade income." #OLD ENG
 fast_negotiations: "Negoziazioni Rapide"
 #fast_negotiations_desc: "A volte la chiave per concludere un accordo commerciale è essere i più veloci. Dobbiamo garantire che i nostri mercanti siano in grado di concludere l'accordo." #OLD ITA
 fast_negotiations_desc: "Sometimes the key to closing a trade deal is to be the quickest one. We must ensure that our merchants can always successfully close their deals." #NEW
 #fast_negotiations_desc: "Sometimes the key to closing a trade deal is to be quickest. We need to ensure that our merchants are able to have the deal done." #OLD ENG
 colonial_ventures: "Iniziative Coloniali"
 #colonial_ventures_desc: "Ci permette di inviare più Coloni nelle terre inesplorate." #OLD ITA
 colonial_ventures_desc: "Enables us to send more colonists to uncharted lands." #NEW
 #colonial_ventures_desc: "Enables us to send more Colonists to uncharted lands." #OLD ENG
 quest_for_the_new_world: "La Ricerca del Nuovo Mondo"
 #quest_for_the_new_world_desc: "Ci permette di unirci agli altri paesi pronti ad esplorare il mondo al di fuori dei propri confini o che aspirano a essere i primi a circumnavigare il globo, intraprendendo la ricerca del nuovo mondo." #OLD ITA
 quest_for_the_new_world_desc: "Allows us to join the nations set to explore the world outside their borders, or strive to be the first nation to circumnavigate the globe, by commencing a quest for the New World." #NEW
 #quest_for_the_new_world_desc: "Allows us to join the number of nations set to explore the world outside their borders or strive to be the first nation to circumnavigate the world by commencing a quest for the new world." #OLD ENG
 #overseas_exploration: "Cercatori di Fortuna" #OLD ITA
 overseas_exploration: "Fortune-Seekers" #NEW
 #overseas_exploration: "Fortune Seekers" #OLD ENG
 #overseas_exploration_desc: "Fondare colonie in terre lontane è praticamente un viaggio di sola andata. Se non si viene colpiti da strane malattie sconosciute, il tempo necessario per tornare indietro significa che non si tornerà più a casa. Se ricordiamo alle persone le potenziali ricchezze, possiamo incoraggiarle a cercare terre più lontane." #OLD ITA
 overseas_exploration_desc: "Establishing colonies in distant lands is nearly always a one-way trip for those involved. Even if strange new diseases do not take you or unforgiving terrain does not starve you, the amount of time it takes to sail back means you will most likely never come home. While these realities are discouraging to some, if we remind people of the potential riches to be gained from colonial life, we can encourage them to settle lands further afield despite the dangers." #NEW
 #overseas_exploration_desc: "Setting up colonies in distant lands is pretty much a one-way trip. If strange new diseases do not get you, the amount of time it takes to sail back means you will not be coming home. If we remind people of the potential riches, we can encourage them to seek lands further afield." #OLD ENG
 land_of_opportunity: "Terra delle Opportunità"
 #land_of_opportunity_desc: "Descrivendo le terre coloniali e le nuove terre vergini dove chiunque può fare fortuna, forse anche alcune donne, le persone emigreranno più rapidamente verso le colonie. Ciò significa che la nazione spenderà meno soldi per incoraggiare le persone ad andare lì." #OLD ITA
 land_of_opportunity_desc: "By portraying our colonies and the surrounding unclaimed lands as places where anyone can make their fortune, we will rapidly increase emigration to our colonial holdings. This means the nation will spend less money encouraging people to go there." #NEW
 #land_of_opportunity_desc: "By portraying colonial lands and new virgin land where any man can make his fortune, possibly some women too, people will emigrate quicker to the colonies. Meaning the nation will have spent less money encouraging people to go there." #OLD ENG
 vice_roys: "Viceré"
 #vice_roys_desc: "Ci permette di nominare viceré e quindi di migliorare l'amministrazione delle nostre colonie e aumentare la quantità di denaro che generano." #OLD ITA
 vice_roys_desc: "Makes it possible for us to establish Viceroys, therby improving the administration of our colonies and increase the amount of money they generate." #NEW
 #vice_roys_desc: "Makes it possible for us to establish Viceroys and thereby improve the administration of our Colonies and increase the amount of money they generate." #OLD ENG
 free_colonies: "Colonie Libere"
 #free_colonies_desc: "Solo poche persone sono disposte a trasferirsi all'estero per espandere il nostro grande impero coloniale. Tuttavia, la promessa di un appezzamento di terreno da coltivare, di proprietà libera, incoraggerà molte più persone a cercare fortuna all'estero. La cosa bella è che c'è terra in abbondanza per tutti." #OLD ITA
 free_colonies_desc: "Only so many people are willing to move abroad to expand our great colonial empire. However, the promise of a plot of land to farm in freehold will encourage many more people to seek their fortunes abroad. The nice thing about this is that there is plenty of land for everyone!" #NEW
 #free_colonies_desc: "Only so many people are willing to move abroad to expand our great colonial empire. However, the promise of a plot of land to farm, in free hold, will encourage many more people to seek their fortune abroad. The nice thing about it is that there is plenty of land for everyone." #OLD ENG
 global_empire: "Impero Globale"
 #global_empire_desc: "Il nostro impegno nei confronti dell'impero coloniale ha cambiato l'atteggiamento delle persone nei confronti dei lavori nell'amministrazione coloniale. Non è più un luogo per predoni che cercano di massimizzare la propria fortuna, ma è invece visto come una carriera per i più brillanti e i migliori. Ciò si riflette nelle nostre tasse." #OLD ITA
 global_empire_desc: "Our commitment to our colonial empire has transformed attitudes towards working in the colonial administration. No longer seen as a haven for fortune-seeking freebooters, it is now regarded as a prestigious career for the brightest and best. This shift is reflected in more efficient tax collection." #NEW
 #global_empire_desc: "Our commitment to our colonial empire has changed the attitude of people to jobs in the colonial administration. No longer a place for freebooters who seek to maximize their fortune, instead it is seen as a career for the brightest and the best. This is reflected in our taxes." #OLD ENG
 formal_diplomacy: "Diplomazia Formale"
 #formal_diplomacy_desc: "In un'epoca in cui il potere passa dalle mani di individui potenti a un'autorità centralizzata, è saggio costruire ponti e canali di comunicazione tra noi e i nostri vicini. Ora più che mai, la diplomazia è fondamentale di fronte alle potenze emergenti." #OLD ITA
 formal_diplomacy_desc: "At a time where power is shifting from the hands of powerful individuals towards control by a centralized authority, it is wise to build bridges and open channels of communication between us and our neighbors. Diplomacy is key, and more so than ever in the face of these rising powers." #NEW
 #formal_diplomacy_desc: "At an age where power shifts from the hands of powerful individuals to towards centralized authority, it is wise to build bridges and channels of communication between us and our neighbors. Now, more than ever, diplomacy is key at the face of rising powers." #OLD ENG
 explorer_commisions_advance: "Commissioni di Esplorazione"
 #explorer_commisions_advance_desc: "Oltre le nostre coste si estendono terre inesplorate, pronte per essere conquistate! Il reclutamento di uomini coraggiosi ed esploratori disposti a salpare verso l'ignoto rappresenta per noi un'opportunità redditizia e fondamentale." #OLD ITA
 explorer_commisions_advance_desc: "Beyond our shores lie uncharted lands, ripe for the taking! We shall recruit brave explorers to set course for the unknown and bring back exotic goods. This is a vital — and possibly very lucrative — opportunity for us." #NEW
 #explorer_commisions_advance_desc: "Beyond our shores lie uncharted lands, ripe for the taking! The recruitment of brave men and explorers to set course for the unknown, is a lucrative and vital opportunity for us." #OLD ENG
 offensive_army: "Esercito Offensivo"
 #offensive_army_desc: "L'era della polvere da sparo e delle innovazioni militari è alle porte e con essa arriva un rinnovato interesse e una nuova vitalità nella conduzione delle guerre. Per accrescere la nostra gloria dobbiamo garantire con diligenza gli elevati standard delle nostre forze armate offensive." #OLD ITA
 offensive_army_desc: "The era of gunpowder and military innovations is upon us, and with it comes a renewed interest in and vitality to the conduct of warfare. To further our glory, we must diligently ensure high standards for our offensive armed forces." #NEW
 #offensive_army_desc: "The era of gunpowder and military innovations is upon us and with them, they bring a renewed interest and vitality to the conduct of warfare. To further our glory we must diligently ensure the high standards of our offensive armed forces." #OLD ENG
 defensive_army: "Esercito Difensivo"
 #defensive_army_desc: "L'ascesa di molti Stati potenti intorno a noi ha evidenziato la necessità di una forza difensiva solida, mentre ci impegniamo a mantenere la nostra integrità territoriale. La conoscenza del terreno, dei percorsi e delle tattiche ci aiuterà a superare questo periodo turbolento." #OLD ITA
 defensive_army_desc: "The rise of many powerful states around us has hastened our need for a robust defensive force, as we intend to maintain our territorial integrity. Knowledge of our homeland's native terrain, hidden paths, and regional tactics will see us through this turbulent period." #NEW
 #defensive_army_desc: "The rise of many powerful states around us has indicated the need for a robust defensive force, as we strive to maintain our territorial integrity. Knowledge of the terrain, paths and tactics will see us through this turbulent period." #OLD ENG
 national_trade: "Commercio Nazionale"
 #national_trade_desc: "Tessuti, lana e altre merci ricercate hanno fatto il giro del mondo. In un'epoca in cui il commercio raggiunge lidi lontani, dobbiamo assicurarci che i nostri mercanti abbiano un vantaggio competitivo!" #OLD ITA
 national_trade_desc: "Cloth, wool, and other sought-after commodities have made their way across the world. At an age where a nation's commerce reaches faraway shores, we must make sure our merchants always have the advantage!" #NEW
 #national_trade_desc: "Cloth, wool and other sought-after commodities have made their rounds across the world. At an age where commerce reaches faraway shores, we must make sure our merchants have the advantage!" #OLD ENG
 exploration: "Idee di Esplorazione"
 #exploration_desc: "La nostra capacità di solcare i mari oltre il nostro orizzonte è in linea con la nostra naturale rivendicazione sulle coste e sugli abitanti dei territori inesplorati." #OLD ITA
 exploration_desc: "Our naval superiority allows us to project power well past our own horizons, extending a natural claim to distant lands as our own by right of discovery." #NEW
 #exploration_desc: "Our ability to sail the seas beyond our horizon adheres to our natural claim over the shores and the inhabitants of uncharted territory." #OLD ENG
 superior_seamanship: "Competenza Nautica Superiore"
 #superior_seamanship_desc: "Ci consente di trasformare la nostra [navy|e] in una forza navale suprema con navi di alta classe e capitani e marinai altamente qualificati." #OLD ITA
 superior_seamanship_desc: "Enables us to transform our navy into a supreme naval force with top-class vessels and highly skilled captains and crew." #NEW
 #superior_seamanship_desc: "Enables us to transform our [navy|e] into a supreme naval force with high-class vessels and highly skilled captains and sailors." #OLD ENG
 naval_glory: "Gloria Navale"
 #naval_glory_desc: "La vista della nostra gloriosa e prestigiosa marina militare farà tremare di paura tutti i nostri avversari." #OLD ITA
 naval_glory_desc: "The awesome sight of our glorious navy will make all adversaries tremble in fear!" #NEW
 #naval_glory_desc: "The sight of our glorious and prestigious navy will make all adversaries tremble in fear." #OLD ENG
 grand_navy: "Grande Flotta"
 #grand_navy_desc: "Ci permette di creare una delle più grandi e potenti [navies|e] che il mondo abbia mai visto." #OLD ITA
 grand_navy_desc: "Allows us to create one of the largest and most powerful navies the world has ever seen." #NEW
 #grand_navy_desc: "Allows us to create one of the largest and most powerful [navies|e] the world has ever seen." #OLD ENG
 sea_hawks: "Falchi di Mare"
 #sea_hawks_desc: "Ci permette di concentrarci fortemente sui progressi militari e quindi di rafforzare la nostra tradizione navale." #OLD ITA
 sea_hawks_desc: "Allows us to focus heavily on military advancements, and thereby increase our Naval Tradition." #NEW
 #sea_hawks_desc: "Allows us to focus heavily on military advancements and thereby increase our naval tradition." #OLD ENG
 excellent_shipwrights: "Costruttori Navali Eccellenti"
 #excellent_shipwrights_desc: "Riunendo i migliori costruttori navali che la nostra nazione ha da offrire, siamo in grado di costruire una [navy|e] di navi moderne senza pari in termini di maestria artigianale e manovrabilità." #OLD ITA
 excellent_shipwrights_desc: "By gathering the best shipbuilders our nation has to offer, we are able to build us a navy of modern vessels unmatched in craftsmanship and maneuverability." #NEW
 #excellent_shipwrights_desc: "By gathering the best shipbuilders our nation has to offer, we are able to build us a [navy|e] of modern vessels unmatched in craftsmanship and maneuverability." #OLD ENG
 naval_fighting_instruction: "Addestramento al Combattimento Navale"
 #naval_fighting_instruction_desc: "Consente ai nostri veterani della marina di ideare nuovi metodi per migliorare l'efficienza delle nostre [navies|e] nei [blockades|e]." #OLD ITA
 naval_fighting_instruction_desc: "Allows our naval veterans to devise new methods to improve our navy's efficiency in blockades." #NEW
 #naval_fighting_instruction_desc: "Allows our naval veterans to devise new methods to improve our [navy|e]'s efficiency in [blockades|e]." #OLD ENG
 press_gangs: "Arruolamento Forzato"
 #press_gangs_desc: "La vita in mare è dura e spietata e non tutti sono entusiasti di intraprendere una carriera nella Marina. Legalizzando l'arruolamento forzato di uomini con abitudini marinare, sarà più facile equipaggiare le nostre navi, accelerando il processo di messa in servizio delle stesse." #OLD ITA
 press_gangs_desc: "Life at sea is hard and unforgiving, and not everyone is keen on a naval career. By legalizing the impressment of sailors and other skilled seafarers, it will be easier to crew our ships, speeding up the process of commissioning ships as well." #NEW
 #press_gangs_desc: "Life at sea is hard and unforgiving and not everyone is keen on a career in the Navy. By legalizing the impressment of men of seafaring habits, it will be easier to crew our ships speeding up the process of commissioning ships." #OLD ENG
 #quality_education: "Istruzione di Qualità" #OLD ITA
 quality_education: "Well-Trained Forces" #NEW
 #quality_education: "Quality Education" #OLD ENG
 #quality_education_desc: "Il momento più cruciale nell'esistenza di qualsiasi esercito è subito dopo una battaglia. Che abbiano vinto o perso, le truppe esauste sono più vulnerabili. Dobbiamo assicurarci che le nostre truppe siano pronte al combattimento prima che lo sia il nemico." #OLD ITA
 quality_education_desc: "The most crucial time for any army comes after battle. Win or lose, troops are most vulnerable when they are exhausted. We must ensure that our troops are highly trained and can recover easily from combat, lest our enemies take advantage of us in moments of weakness." #NEW
 #quality_education_desc: "The most vital moment of any army's existence is straight after a battle. Win or lose, exhausted troops are most vulnerable. We must ensure that our troops are ready for combat before the opposition is." #OLD ENG
 finest_of_horses: "I Cavalli Migliori"
 #finest_of_horses_desc: "Con quanta stabilità quelle truppe avanzano sul terreno! Con quanta bellezza si schiera quella cavalleria! Guardate quei cavalli grigi! Chi sono quei valorosi cavalieri? Sono truppe eccellenti." #OLD ITA
 finest_of_horses_desc: "How steadily those troops take the ground! How beautifully those cavalry form! Fine horses with well-trained riders are a hallmark of any modern fighting force, and ours are particularly impressive." #NEW
 #finest_of_horses_desc: "How steadily those troops take the ground! How beautifully that cavalry forms! Look at those grey horses! Who are those fine horsemen? These are fine troops." #OLD ENG
 oak_forests_for_ships: "Foreste di Querce per le Navi"
 #oak_forests_for_ships_desc: "Più le nostre navi sono resistenti, più possono infliggere danni. Assicuriamoci di avere una scorta pronta del miglior rovere stagionato per le nostre navi da guerra." #OLD ITA
 oak_forests_for_ships_desc: "The more punishment our ships can take, the more they can dish out. Let us ensure that we have a ready supply of the finest seasoned oak for our warships." #NEW
 #oak_forests_for_ships_desc: "The more punishment our ships can take the more they can dish out. Let us ensure that we have a ready supply of the finest seasoned oak for our warships." #OLD ENG
 private_to_marshal: "Da Soldato a Maresciallo"
 private_to_marshal_desc: "Ogni soldato semplice ha un bastone da maresciallo nella sua borsa. Per coloro che si distinguono in battaglia, seguiranno promozioni e ricompense. Le truppe lo sanno e ne traggono ispirazione."
 naval_drill: "Esercitazione Navale"
 naval_drill_desc: "La confusione del combattimento può rendere una nave da guerra inutilizzabile per molto tempo. Un equipaggio ben addestrato si riprenderà molto più rapidamente di uno normale."
 merchant_marine: "Marina Mercantile"
 #merchant_marine_desc: "Che ogni nave mercantile sventoli con orgoglio la nostra bandiera mercantile e sappia che la nostra marina militare sarà sempre pronta a proteggerla in caso di necessità." #OLD ITA
 merchant_marine_desc: "Let every merchant ship fly our emblem with pride and know that our navy will always be there to protect them, if needed." #NEW
 #merchant_marine_desc: "Let every merchant ship fly our merchant ensign with pride and know that our navy will always be there to protect them if needs must." #OLD ENG
 massed_battery: "Cannoni Concentrati"
 #massed_battery_desc: "Riuniamo la nostra artiglieria in un'unica grande batteria, la cui potenza distruttiva aprirà una breccia nelle linee nemiche." #OLD ITA
 massed_battery_desc: "Let us mass our artillery in a single grand battery. Its destructive power will blast a hole in the enemy lines!" #NEW
 #massed_battery_desc: "Let us mass our artillery in a single grand battery, its destructive power will blast a hole in the enemy lines." #OLD ENG
 benefits_for_horseowners: "Vantaggi per i Proprietari di Cavalli"
 #benefits_for_horseowners_desc: "La vita costa poco, ma i cavalli sono costosi. Se istituissimo un sistema di agevolazioni per chi possiede cavalli, avremmo più scelta." #OLD ITA
 benefits_for_horseowners_desc: "Life is cheap, but horses are expensive. If we set up a system of benefits for those who own horses, we will have more to choose from when the need arises." #NEW
 #benefits_for_horseowners_desc: "Life is cheap, but horses are expensive. If we set up a system of benefits for those who do own horses we will have more to choose from." #OLD ENG
 the_old_and_infirm: "Il Vecchio e l'Infermo"
 #the_old_and_infirm_desc: "I sergenti veterani sono tra gli uomini più spregevoli e corrotti che si possano immaginare, ma sono comunque utili. Piuttosto che lasciarli mendicare per le strade, uomini come loro dovrebbero essere impiegati al termine del loro servizio. Trasformiamoli in sergenti istruttori e quartiermastri, in modo da poter sfruttare le loro abilità uniche." #OLD ITA
 the_old_and_infirm_desc: "Our veteran sergeants are some of the most despicable and corrupt men imaginable, but that does not mean they are useless. Rather than leave them to be beggars on our streets when their service ends, we can put these old dogs to work. We shall make them into drill sergeants and quartermasters so that their unique skills can be put to use." #NEW
 #the_old_and_infirm_desc: "The veteran sergeants are some of the most despicable and corrupt men imaginable, but these men are still useful. Rather than leave them to be beggars on our streets, men like this should be used when their service ends. Let's make them into drill sergeants and quartermasters so that their unique skills can be put to use." #OLD ENG
 the_young_can_serve: "I Giovani Possono Servire"
 #the_young_can_serve_desc: "Quanti anni deve avere un ragazzo prima di diventare un uomo? Quanti anni deve avere prima di poter morire per il proprio Paese? Alcuni governanti sono schizzinosi, ma non noi, infatti garantiamo a tutti pari opportunità." #OLD ITA
 the_young_can_serve_desc: "How old does a boy have to be before he is a man? How old must he be before he can die for his country? Some rulers are squeamish; We, on the other hand, are an equal opportunity butcher." #NEW
 #the_young_can_serve_desc: "How old does a boy have to be before he is a man? How old must he be before he can die for his country? Some rulers are squeamish, we on the other hand are an equal opportunity butcher." #OLD ENG
 enforced_service: "Servizio Obbligatorio"
 #enforced_service_desc: "Il principio del volontariato è alla base dell'intera struttura del nostro esercito. A volte non ci sono abbastanza volontari. Dovremmo obbligare le persone a fare volontariato." #OLD ITA
 enforced_service_desc: "The principle of volunteering underpins our whole army structure, but sometimes there are simply not enough willing conscripts. We should force — erm, #italic encourage#! people to volunteer." #NEW
 #enforced_service_desc: "The principle of volunteering underpins our whole army structure. Sometimes there aren't enough volunteers. We should force people to volunteer." #OLD ENG
 ships_penny: "Tributo Navale"
 #ships_penny_desc: "Le navi sono costose, quello che dobbiamo fare è convincere altre persone ad aiutarci a pagarle. Il tributo navale ne è un esempio perfetto." #OLD ITA
 ships_penny_desc: "Ships are expensive to build and maintain. By imposing a ship's penny — a small tax levied on trade or port activities — we can ensure our fleet remains strong without draining our treasury." #NEW
 #ships_penny_desc: "Ships are expensive, what we need to do is to get other people to help pay for them. The Ship's penny is a perfect example of this." #OLD ENG
 standardized_artillery: "Artiglieria Standardizzata"
 #standardized_artillery_desc: "Ogni fonditore di ferro custodisce gelosamente i propri segreti e le proprie tecniche, rendendo ogni cannone un'opera d'arte su misura. Sebbene ciò possa essere positivo per il loro ego, non è il modo migliore per ordinare i cannoni. D'ora in poi insisteremo affinché ogni cannone sia realizzato secondo le nostre specifiche precise, e sarà anche molto più economico." #OLD ITA
 standardized_artillery_desc: "Each iron founder jealously guards his secrets and techniques, treating every cannon as a bespoke work of art. While this may flatter their egos, it is far from ideal when we are trying to order munitions. From now on, we will insist that all cannons be made to our own exact specifications. This should reduce costs as well as improve production." #NEW
 #standardized_artillery_desc: "Each iron founder jealously guards his secrets and techniques and makes each cannon a bespoke piece of art. While this may be good for their egos it is not the best way to order cannon. From now on we will insist that each cannon is made to our own exact specifications, and it will also be a lot cheaper as well." #OLD ENG
 mass_army: "Esercito di Massa"
 #mass_army_desc: "Finora siamo stati molto selettivi nella scelta di chi dovesse prestare servizio militare. Abbiamo arruolato solo i più poveri e i più disperati, in pratica persone di cui nessuno avrebbe sentito la mancanza. Ora invece apriremo le porte dell'esercito a tutti coloro che non sono ricchi." #OLD ITA
 mass_army_desc: "We have, up to now, been very selective about who can serve as an enlisted member of our military. We only took the poorest and most desperate — basically, the people no one else would miss. Now, though, we shall open up the ranks to everyone who wishes to serve and has no significant wealth to speak of." #NEW
 #mass_army_desc: "We have, up to now, been very choosy over who should serve as a ranker in our military. We only took the poorest and most desperate, basically, the people no one else would miss. Now though we are going to open up the ranks to everyone, who isn't rich." #OLD ENG
 mercenary_contracts: "Contratti Mercenari"
 #mercenary_contracts_desc: "Stipulando contratti permanenti con alcuni capitani mercenari possiamo assicurarci di avere sempre a disposizione un ampio bacino di mercenari da cui attingere, qualora fossero necessari." #OLD ITA
 mercenary_contracts_desc: "By drawing up standing contracts with select mercenary captains, we can ensure that we will always have access to a large pool of mercenaries to draw upon, should they be needed." #NEW
 #mercenary_contracts_desc: "By drawing up standing contracts with certain mercenary captains we can ensure that we will always have access to a large pool of mercenaries to draw on, should they be needed." #OLD ENG
 local_traditions: "Tradizioni Locali"
 #local_traditions_desc: "Governare una grande nazione significa governare su molti popoli diversi, ciascuno con i propri costumi e tradizioni. Incorporando queste tradizioni nel nostro codice ufficiale di leggi creiamo una popolazione felice e leale." #OLD ITA
 local_traditions_desc: "Governing a large nation means ruling over diverse peoples, each with their own customs and traditions. By incorporating these traditions into our official code of laws, we will create a happier and more loyal populace." #NEW
 #local_traditions_desc: "Governing a large nation means ruling over many diverse peoples, each with their own customs and traditions. By incorporating these traditions into our official code of laws we create a happy and loyal populace." #OLD ENG
 indirect_rule: "Governo Indiretto"
 #indirect_rule_desc: "A volte il modo migliore per convincere le persone a fare ciò che vuoi è lasciarle credere che siano loro a prendere le decisioni. Un sistema di governo indiretto di questo tipo ridurrà i disordini nelle province appena conquistate." #OLD ITA
 indirect_rule_desc: "Sometimes the best way to get people to do what you want is to let them believe that they have had a choice in the matter. A system of indirect rule like that will reduce the unrest in newly acquired provinces, giving them the impression that they have more self-determination than they truly do." #NEW
 #indirect_rule_desc: "Sometimes the best way to get people to do what you want is to let them believe that they're making their own choices. Such a system of indirect rule will reduce the unrest in newly acquired provinces." #OLD ENG
 cultural_ties: "Legami Culturali"
 #cultural_ties_desc: "Culture diverse hanno usanze diverse e, per qualche motivo, tendono a opporsi ai tentativi dall'alto di cambiare tali usanze. Possiamo trasformare questa debolezza in un punto di forza incorporando i leader locali nel nostro sistema di governo e facendo sì che essi attuino la nostra volontà in un modo che sia loro gradito." #OLD ITA
 cultural_ties_desc: "Different cultures have different customs, and for some reason, they tend to resist attempts from their rulers to change said customs. We can turn this weakness into a strength by incorporating local leaders into our system of government and having them carry out our will in a way that will be palatable to their people." #NEW
 #cultural_ties_desc: "Different cultures have different customs, and for some reason tend to resist attempts from above to change said customs. We can turn this weakness into a strength by incorporating local leaders into our system of government and having them carry out our will in a way that is palatable to them." #OLD ENG
 benevolence: "Benevolenza"
 benevolence_desc: "La nostra nazione è un baluardo di tolleranza e illuminismo. Facendo in modo che tutte le altre nazioni lo sappiano, possiamo promuovere migliori relazioni con l'estero."
 establish_cadet_branches: "Istituzione di Rami Cadetti"
 #establish_cadet_branches_desc: "L'eredità può essere una questione delicata. Definendo chiaramente i ruoli e i diritti della nostra dinastia attraverso i Rami Cadetti, possiamo garantire una linea di successione più stabile." #OLD ITA
 establish_cadet_branches_desc: "Inheritance can be a tricky business. By clearly defining roles and rights for our dynasty through cadet branches, we can ensure a more stable line of succession." #NEW
 #establish_cadet_branches_desc: "Inheritance can be a tricky business. By clearly defining roles and rights for our dynasty through Cadet Branches, we can ensure a more stable line of succession." #OLD ENG
 tribute_system: "Sistema di Tributi"
 tribute_system_desc: "Rafforzare le nostre entrate istituendo un sistema formalizzato di tributi annuali da parte dei nostri vassalli."
 integrated_elites: "Élite Integrate"
 #integrated_elites_desc: "Inserendo l'élite dirigente delle nazioni soggette nel nostro governo, possiamo facilitare notevolmente il processo di integrazione delle loro province." #OLD ITA
 integrated_elites_desc: "By bringing the ruling elite of our subject nations into our government, we can significantly streamline the process of integrating their provinces." #NEW
 #integrated_elites_desc: "By bringing the ruling elite of our subject nations into our government we can smoothen the process of integrating their provinces significantly." #OLD ENG
 state_propaganda: "Propaganda di Stato"
 state_propaganda_desc: "Come per un uomo, la reputazione di una nazione è tutto, e l'istituzione di un servizio di propaganda ufficiale garantirà che il nostro buon nome non venga infangato dalle menzogne dei nostri nemici."
 postal_service: "Servizio Postale"
 postal_service_desc: "Date le condizioni attuali delle comunicazioni, è difficile garantire che i nostri dispacci diplomatici arrivino in modo tempestivo. La creazione di una rete di uffici postali e stazioni di posta renderà più facile far sentire la nostra voce in terre lontane."
 marcher_lords: "Signori delle Marche"
 marcher_lords_desc: "Concedendo una notevole autonomia ai vassalli delle regioni di confine, questi 'Signori delle Marche' saranno in grado di radunare grandi eserciti militari per sostenerci nelle nostre guerre."
 boarding_parties: "Squadre di Abbordaggio"
 boarding_parties_desc: "Insegnando ai nostri ufficiali di marina a condurre azioni di abbordaggio contro le navi nemiche, possiamo ottenere un vantaggio nei combattimenti navali anche quando affrontiamo nemici superiori [navies|e]."
 improved_rams: "Arieti Migliorati"
 improved_rams_desc: "L'idea di dotare le navi da guerra di speroni risale a migliaia di anni fa, ma da allora sono stati compiuti grandi progressi nella metallurgia e dovremmo approfittarne per creare speroni più resistenti."
 naval_cadets: "Cadetti Navali"
 #naval_cadets_desc: "Promuovendo la marina militare come scelta professionale per i secondogeniti e i terzogeniti della nobiltà, possiamo creare un corpo professionale di ufficiali di marina incaricati di supervisionare i nostri artiglieri." #OLD ITA
 naval_cadets_desc: "By promoting the navy as the ideal career choice for second and third sons of the aristocracy, we can create a professional corps of naval officers to oversee our gunnery crews." #NEW
 #naval_cadets_desc: "By promoting the navy as the career choice of the nobility's second and third sons, we can create a professional corps of naval officers to oversee our gunnery crews." #OLD ENG
 copper_bottoms: "Rivestimento in Rame"
 copper_bottoms_desc: "Il legno può essere il materiale ideale per la costruzione navale, ma tende a deteriorarsi nel tempo. Rivestendo le nostre navi con una corazza di rame sotto la linea di galleggiamento possiamo ridurre questo deterioramento, consentendo loro di resistere meglio ai lunghi viaggi."
 escort_ships: "Corvette"
 #escort_ships_desc: "Le Corvette erano una classe di piccole navi da guerra progettate per scortare le navi amiche e molestare il nemico, facendo affidamento sulla velocità e sulla manovrabilità piuttosto che sulla potenza di fuoco concentrata." #OLD ITA
 escort_ships_desc: "Corvettes are a class of small warships that are designed to escort friendly vessels and harass the enemy, relying on speed and maneuverability rather than massed firepower." #NEW
 #escort_ships_desc: "Corvettes were a class of small warships that were designed to escort friendly vessels and harass the enemy, relying on speed and maneuverability rather than massed firepower." #OLD ENG
 national_arsenal: "Arsenale Nazionale"
 national_arsenal_desc: "Creando un arsenale nazionale dove le nostre navi da guerra possano essere costruite e mantenute secondo standard uniformi, potremo disporre di una marina militare più grande."
 garrison_conscription: "Guarnigioni di Leva"
 #garrison_conscription_desc: "Arruolando i nostri giovani abili nelle nostre guarnigioni possiamo assicurarci di avere abbastanza uomini per difendere i nostri confini." #OLD ITA
 garrison_conscription_desc: "By conscripting our able young citizens for our garrisons, we can ensure that we have enough guards to defend our borders." #NEW
 #garrison_conscription_desc: "By conscripting our able young men for our garrisons we can ensure that we have enough men to defend our borders." #OLD ENG
 expanded_supply_trains: "Convogli di Rifornimento Ampliati"
 #expanded_supply_trains_desc: "Investire maggiori risorse nei nostri convogli di rifornimento consentirà al nostro esercito di operare per periodi più lunghi in territori ostili." #OLD ITA
 expanded_supply_trains_desc: "Investing more resources into our supply trains will allow our army to operate for longer periods of time in hostile territory." #NEW
 #expanded_supply_trains_desc: "Investing more resources into our supply trains will allow our army to operate for longer periods of time in hostile land." #OLD ENG
 sheltered_ports: "Porti Riparati"
 #sheltered_ports_desc: "È un fatto spiacevole che le navi tendano a subire danni durante le battaglie, ed è altrettanto spiacevole che raramente tali danni possano essere riparati in mare. Per ovviare a questo problema, creeremo una rete di Porti Riparati lungo la nostra costa dove le nostre navi potranno ripararsi." #OLD ITA
 sheltered_ports_desc: "It is an unfortunate fact that ships tend to be damaged during battle, and equally unfortunate that the damage can rarely be repaired at sea. To alleviate this problem, we will create a system of sheltered ports along our coastline where our ships can patch themselves up." #NEW
 #sheltered_ports_desc: "It is an unfortunate fact that ships tend to be damaged during battle, and equally unfortunate that the damage can rarely be repaired at sea. To alleviate this problem we will create a system of sheltered ports along our coastline where our ships can patch themselves up." #OLD ENG
 diplomatic_corps: "Corpo Diplomatico"
 #diplomatic_corps_desc: "Attraverso l'istituzione di un Corpo Diplomatico professionale garantiamo che le lezioni apprese con fatica dai diplomatici di alto livello vengano trasmesse alle generazioni più giovani." #OLD ITA
 diplomatic_corps_desc: "Through the establishment of a professional diplomatic corps, we will ensure that the hard-earned knowledge of senior diplomats is passed on to the younger generation." #NEW
 #diplomatic_corps_desc: "Through the establishment of a professional Diplomatic Corps we ensure that the hard-learned lessons of senior diplomats are passed on to the younger generation." #OLD ENG
 civil_servants: "Funzione Pubblica"
 #civil_servants_desc: "La creazione di un corpo di funzionari composto da giovani burocrati motivati ci consentirà di adattarci rapidamente ai nuovi progressi nell'amministrazione e nella governance." #OLD ITA
 civil_servants_desc: "Establishing a civil service of eager young bureaucrats will ensure that we can quickly adapt to new advances in administration and governance." #NEW
 #civil_servants_desc: "Establishing a Civil Service of eager young bureaucrats will ensure that we can quickly adapt to new advances in administration and governance." #OLD ENG
 free_cities: "Città Libere"
 free_cities_desc: "Concedere alle nostre città l'autogoverno in materia di commercio ci consentirà di aprire nuove e redditizie rotte commerciali."
 preaching_missions: "Missioni di Predicazione"
 #preaching_missions_desc: "Organizza spedizioni missionarie che assicurino che la nostra popolazione professi l'unica vera fede." #OLD ITA
 preaching_missions_desc: "Establish missionary expeditions that will ensure that our population worships the one true faith." #NEW
 #preaching_missions_desc: "Establish missionary expeditions that will ensure that our population worships the one, true faith." #OLD ENG
 marine_regiments: "Reggimenti di Fanti di Marina"
 #marine_regiments_desc: "I fanti di marina sono unità militari specializzate in operazioni anfibie e vengono impiegati per compiere incursioni sulle coste e abbordare navi nemiche, pur continuando a combattere anche sui campi di battaglia terrestri." #OLD ITA
 marine_regiments_desc: "Marines are military units that specialize in amphibious operations. They can be used in raiding shores and boarding enemy vessels, while still seeing action on land." #NEW
 #marine_regiments_desc: "Marines are military units specialized in amphibious operations and find use in raiding shores and boarding enemy vessels while still seeing action on land battlefields." #OLD ENG
 discipline_drills: "Esercitazioni Disciplinate"
 #discipline_drills_desc: "Durante il combattimento contano solo tre valori: potenza di fuoco, forza lavoro e disciplina, che combina i primi due. Addestramenti ed esercitazioni militari regolari miglioreranno le capacità delle nostre truppe portandole a un nuovo livello." #OLD ITA
 discipline_drills_desc: "During combat, only three things matter: firepower, manpower, and the discipline to combine the two. Regular military drills and exercises shall elevate our to a new standard." #NEW
 #discipline_drills_desc: "During combat only three values matter: firepower, manpower and the discipline which combines the former two with each other. Regular military drills and exercises shall improve the military of our troops to a new standard." #OLD ENG
 open_levy_standards: "Ampliamento dei Criteri di Leva"
 #open_levy_standards_desc: "Cosa dovrebbe rendere un uomo idoneo a combattere e morire per il proprio Paese? La sua fede? O la sua lealtà verso la famiglia? Alla fine, però, l'unica risposta giusta è che non possiamo fare eccezioni. Tutti hanno il dovere di servire sotto la nostra bandiera." #OLD ITA
 open_levy_standards_desc: "What makes a man willing to fight and die for his country? Is it his faith? Loyalty to his nation? Or is it simply a desire to protect his family? In the end, the answer does not matter, as everyone has the duty of serving under our banner." #NEW
 #open_levy_standards_desc: "What should make a man eligible to fight and die for his country? Is it his belief? Or his loyalty to his family? In the end though, the only right answer is that we can not make any exceptions. Everyone has the duty to serve under our banner." #OLD ENG
 influence: "Diplomazia della Pressione"
 #influence_desc: "Per porre fine a una guerra sono necessari negoziati tra le due parti, ma a volte la parte avversaria si dimostra troppo ostinata per accettare la sconfitta. In questi casi, una diplomazia pressante e il richiamo alla loro imminente distruzione dovrebbero fornire loro una motivazione sufficiente per accettare più facilmente le nostre generose condizioni." #OLD ITA
 influence_desc: "Ending a war requires negotiations between the two opposing parties, and sometimes one party proves itself too stubborn to accept defeat. In such cases, the art of diplomatic pressure — and gently reminding them of their potential imminent annihilation — shall motivate them to accept our generous terms more easily." #NEW
 #influence_desc: "Ending a war requires negotiations between the two parties, and sometimes the opposite party proves itself as too stubborn to accept defeat. In such cases, the art of pressuring diplomacy and reminding them of their imminent annihilation shall give them enough motivation to accept our generous terms more easily." #OLD ENG
 divine_passion: "Passione Divina"
 #divine_passion_desc: "I tempi stanno cambiando. Laddove un tempo la fede era al di sopra di tutto, idee che un tempo erano considerate pagane si stanno diffondendo tra la gente comune. Di fronte a un mondo in continua evoluzione, il nostro clero trova conforto nella nostra incrollabile dedizione alla nostra causa." #OLD ITA
 divine_passion_desc: "Times are changing. Faith was once the most important thing in our lives, but now, ideas once seen as blasphemous are spreading among the common folk. In the face of an evolving world, our clergy finds solace in their unshaken dedication to our cause." #NEW
 #divine_passion_desc: "Times are changing. Where once faith stood above all, ideas which were once seen as heathen are spreading in the common folk. In the face of an evolving world, our Clergy finds solace in our unshaken dedication to our cause." #OLD ENG
 servants_of_god: "Servitori di Dio"
 #servants_of_god_desc: "Essere un ingranaggio di questo meccanismo celeste è uno dei più grandi onori che un uomo possa mai ricevere. Avere il nostro dio come Signore fa battere il cuore del nostro popolo con fragoroso entusiasmo." #OLD ITA
 servants_of_god_desc: "Being a cog in this heavenly machine is a great honor; our people find deep purpose in serving God's will. This belief that we collectively serve divine purpose makes the heart of our people beat with thunderous acclaim." #NEW
 #servants_of_god_desc: "Being a cog in this heavenly machinery is one of the greatest honors that a man can ever bear. Having our own god as Lord makes the heart of our people beat with thunderous acclaim." #OLD ENG
 by_the_grace_of_god: "Per Grazia di Dio"
 #by_the_grace_of_god_desc: "Il mondo è stato creato con le fiamme e con le fiamme finiremo tutti. Il nostro dio ha donato il fuoco della vita a noi, umili mortali, bruciando le nostre anime nel processo e facendoci vedere la verità del suo pericolo. Non avrai paura." #OLD ITA
 by_the_grace_of_god_desc: "The world was created with flames, and in flames shall we all end. Our god has gifted the fire of life to us humble mortals, burning our souls in the process and making us see the truth of its danger. Thou shall not be afraid." #NEW
 #by_the_grace_of_god_desc: "The world was created with flames and with flames we shall all end. Our god has gifted the fire of life to us, humble mortals, burning our souls in the process and making us see the truth of its danger. Thou shall not be afraid." #OLD ENG
 state_of_clerics: "Stato Clericale"
 #state_of_clerics_desc: "La natura di una teocrazia risiede nella sua vicinanza al divino. Per raggiungere questo obiettivo, molti dei nostri elementi governativi sono gestiti dal clero, che combina i rituali religiosi con i compiti burocratici degli amministratori." #OLD ITA
 state_of_clerics_desc: "The nature of a theocracy is held in its proximity to the divine. To achieve this closeness, many actions of our government are carried out by the clergy, combining religious ritual with the bureaucratic duties of administrators." #NEW
 #state_of_clerics_desc: "The nature of a theocracy is in its proximity to the divine. To achieve this, many of our governmental elements are carried out by the clergy which combine religious rituals with the bureaucratic duties of administrators." #OLD ENG
 friends_in_high_places: "Amici nelle Alte Sfere"
 #friends_in_high_places_desc: "C'è solo un percorso che ci condurrà alla felicità eterna e immortale. Conoscere Dio significa conoscere i suoi agenti più vicini qui sulla Terra. Loro ci aiuteranno a trovare quel percorso." #OLD ITA
 friends_in_high_places_desc: "There is only one path that will lead us to undying, everlasting happiness. To know the divine is to also know its sacred agents on this Earth, who will help us find that path." #NEW
 #friends_in_high_places_desc: "There is only one path that will lead us to undying, everlasting happiness. To know god is to know his closest agents here on Earth. They will help us find that path." #OLD ENG
 #flesh_is_weak: "La Carne è Debole" #OLD ITA
 flesh_is_weak: "Flesh is Weak" #NEW
 #flesh_is_weak: "Flesh Is Weak" #OLD ENG
 #flesh_is_weak_desc: "La carne è debole, l'anima no. I nostri eserciti hanno imparato a combattere come se condividessero la stessa anima, e quindi il loro morale non verrà mai spezzato." #OLD ITA
 flesh_is_weak_desc: "The flesh may be weak and corruptible, but the soul is not. Our armies have learned to fight as if they shared the same soul, and thus their morale can never be broken." #NEW
 #flesh_is_weak_desc: "The flesh is weak, the soul is not. Our armies have learned to fight as if they shared the same soul, and thus their morale shall never be broken." #OLD ENG
 alpha_and_omega: "Alfa e Omega"
 alpha_and_omega_desc: "Il nostro Dio è l'inizio e la fine di tutte le cose. La sua voce sarà l'unico suono che i nostri nemici udranno al di sopra delle urla della battaglia. La sua natura pia li condurrà tra le sue braccia accoglienti. Allora vedranno la verità.
 conviction_of_sin: "Condanna del Peccato"
 #conviction_of_sin_desc: "Coloro che hanno commesso azioni riprovevoli si inginocchieranno. Il peso dei loro atti malvagi li perseguiterà per sempre. Non dormiranno sonni tranquilli finché non avranno espiato gli incubi subdoli che hanno causato." #OLD ITA
 conviction_of_sin_desc: "Those who have done wrong will fall to their knees under the heavy weight of their own wickedness! Their evil deeds shall haunt them forevermore, and they will not sleep until they have atoned for the devious nightmares they themselves have caused." #NEW
 #conviction_of_sin_desc: "They will kneel, those who have done wrong. The heavy weight of their wicked acts will haunt them forevermore. They shall not sleep soundly until they have atoned for the devious nightmares that they have caused." #OLD ENG
 martyrs: "Martiri"
 #martyrs_desc: "Un martire è qualcuno che comprende che morire per il proprio dio è il più grande degli onori. Gli abitanti della nostra terra custodiscono la loro fede nel profondo del cuore e sono sempre desiderosi di unirsi alla nostra causa." #OLD ITA
 martyrs_desc: "A martyr is someone who understands that dying on behalf of their faith is the highest of honors. The people of our land keep their faith close to their hearts, and are always keen to join our cause. If they die as martyrs, it is an honor and not a tragedy." #NEW
 #martyrs_desc: "A martyr is someone who understands that dying on behalf of their god is the highest of honors. The people of our land keep their faith close to their hearts and are always keen to join our cause." #OLD ENG
 cultural_acceptance_advance: "Accettazione Culturale"
 #cultural_acceptance_advance_desc: "È evidente che, quando si assorbono altre popolazioni, le loro tradizioni straniere possono causare attriti con le nostre. Un modo per risolvere questo problema è semplicemente tollerare questi stranieri come se fossero nostri parenti." #OLD ITA
 cultural_acceptance_advance_desc: "It is apparent that as we absorb other peoples into our nation, the foreign traditions they bring with them may cause friction with our own. One way of resolving this is to simply tolerate such foreigners as if they were our own kinsmen, and not to attempt to subdue them to our culture." #NEW
 #cultural_acceptance_advance_desc: "It is apparent that as absorb other peoples, their foreign traditions may cause friction with our own. One way of resolving this is to simply tolerate such foreigners as if they were our own kinsmen." #OLD ENG
 unlock_traditional_galley_advance: "$n_traditional_galley$"
 unlock_traditional_galley_advance_desc: "$n_traditional_galley_desc$"
 
 hollander_beater: "Battitore Olandese"
 #hollander_beater_desc: "Per secoli, le cartiere hanno utilizzato martelli meccanici per battere la pasta di carta grumosa, frantumando le fibre per ottenere la materia prima necessaria alla produzione della carta. Utilizzando i mulini a vento locali come fonte di energia, alcuni artigiani intraprendenti hanno ora ideato una soluzione più efficiente. Quello che chiamano Battitore Olandese è una vasca con un rullo orizzontale alimentato dal vento e dotato di lame. Queste lame sono in grado di sminuzzare in poche ore la stessa quantità di pasta che i vecchi martelli riuscivano a sminuzzare in giorni." #OLD ITA
 hollander_beater_desc: "For centuries, paper mills have relied on mechanical hammers to beat lumpen paper pulp, crushing the fiber to create the raw material needed to then create paper. Using local windmills for power, enterprising artisans have now devised a more efficient solution: the 'Hollander Beater', a vat containing a wind-powered horizontal roller with blades. These blades can shred as much pulp in hours as the old hammers did over days." #NEW
 #hollander_beater_desc: "For centuries, paper mills have relied on mechanical hammers to beat lumpen paper pulp, crushing the fiber to create the raw material needed to then create paper. Using the local windmills for power, enterprising artisans have now devised a more efficient solution. What they call the Hollander Beater, is a vat with a wind-powered horizontal roller with blades. These blades can shred as much pulp in hours as the old hammers did in days." #OLD ENG
 faceting: "Sfaccettatura"
 #faceting_desc: "I maestri tagliatori di gemme hanno fatto un passo avanti nel taglio dei diamanti sperimentando la polvere di diamante sospesa nell'olio sui loro scaif. Questo permette agli artigiani di tagliare le pietre rare in forme completamente nuove e con una brillantezza molto maggiore. La tecnica risultante, nota come sfaccettatura, produce una pietra dalla forma geometrica più gradevole e con migliori qualità ottiche. Man mano che le nuove pietre e la tecnica per realizzarle si diffondono nelle corti e nei laboratori, la domanda di gioielli, diamanti e pietre preziose sta aumentando notevolmente." #OLD ITA
 faceting_desc: "Master gemcutters have made a breakthrough in diamond-cutting by experimenting with diamond dust suspended in oil on their scaifs. This allows the artisans to cut stones in entirely new shapes, and to a much higher brilliance. The resulting technique, known as faceting, produces a stone of a pleasing geometric shape and with better optical qualities. As the new stones, and the technique for cutting them, spreads across courts and workshops, the demand for jewelry and precious stones increases greatly." #NEW
 #faceting_desc: "Gem-cutting masters have made a breakthrough in diamond cutting by experimenting with diamond dust suspended in oil on their scaifs. This is allowing the artisans to cut the rare stones in entirely new shapes and to much greater brilliance. The resulting technique, known as faceting, produces a stone of a more pleasing geometric shape and with better optical qualities. As the new stones, and the technique for making them, spread across courts and workshops the demand for jewelry, diamonds and precious stones is increasing greatly." #OLD ENG

 maritime_decay_advance_disc: "Percorsi Consolidati"
 #maritime_decay_advance_disc_desc: "I mari sono costantemente solcati da vari mercanti alla ricerca del massimo profitto. Ciò porta naturalmente alla creazione di rotte più consolidate e frequentate rispetto ad altre, con quelle migliori caratterizzate da un traffico costante di navi che vanno e vengono." #OLD ITA
 maritime_decay_advance_disc_desc: "The seas are constantly crossed by eager merchants searching for the best profit. This naturally evolves into certain routes becoming more established and frequented than others, with the most popular ones seeing a steady steam of ships sailing back and forth." #NEW
 #maritime_decay_advance_disc_desc: "The seas are constantly sailed by various merchants searching for the best profit. This naturally evolves into certain routes becoming more established and frequented than others, with the best ones being a constant of ships sailing back and forth." #OLD ENG
 rgo_logistics_discovery: "Magazzini Locali"
 #rgo_logistics_discovery_desc: "Se i mercanti e gli artigiani potessero accedere ai prodotti desiderati a livello locale, ciò non solo alleggerirebbe il loro carico di lavoro, ma eviterebbe anche un aumento eccessivo dei prezzi dei prodotti. A tal fine, i magazzini fungeranno da centri di distribuzione locali per soddisfare le esigenze di tutti." #OLD ITA
 rgo_logistics_discovery_desc: "If merchants and artisans can access the products they need locally, that would not only ease the burden of their work, but keep prices from being excessively high. To that effect, storehouses will serve as local distribution hubs to supply everyone's needs." #NEW
 #rgo_logistics_discovery_desc: "If merchants and artisans can access their wanted products locally, that would not only ease the burden of their work but also avoid the prices of products to rise excessively. To that effect, storehouses will serve as local distribution hubs to supply everyone's needs." #OLD ENG
 port_cost_distance_from_capital_advance: "Capitani Esperti"
 #port_cost_distance_from_capital_advance_desc: "Non tutti i furfanti possono diventare capitani di una nave, solo i più esperti e abili tra loro potranno guidare le nostre imbarcazioni. Questi lupi di mare devono essere in grado di riportare la nave in porto in tutta sicurezza anche nelle tempeste più violente." #OLD ITA
 port_cost_distance_from_capital_advance_desc: "Not every scallywag is worthy of being a captain; only the most experienced and skillful of them will lead our vessels. Such salty seadogs should be capable of safely finding their way back to port even in the fiercest of storms." #NEW
 #port_cost_distance_from_capital_advance_desc: "Not every scallywag can end up being captain of a ship, only the most experienced and skillful of them will lead our vessels. Such sea dogs should be capable of safely finding their way back to port even in the fiercest of storms." #OLD ENG
 land_morale_attrition_cost_advance: "Addestramento di Marcia"
 #land_morale_attrition_cost_advance_desc: "È risaputo che qualsiasi esercito deve marciare per lunghe distanze per raggiungere il nemico. Per questo motivo, le lunghe marce sono un elemento fondamentale dell'addestramento delle nostre truppe, che si abituano così a camminare per ore e ore e ad arrivare comunque fresche sul campo di battaglia." #OLD ITA
 land_morale_attrition_cost_advance_desc: "It is common for armies to have to march great distances in order to reach their enemy. As such, long marches are a staple of our military training regimen, accustomizing our fighters to walking long distances and still arriving fresh for the battle." #NEW
 #land_morale_attrition_cost_advance_desc: "It is common knowledge that any army would need to march great distances in order to reach their enemy. As such, long marches are a staple of the training of our troops, getting them used to having to walk for hours and still arrive fresh at the battle." #OLD ENG
 land_morale_movement_cost_advance_disc: "Marcia Coordinata"
 #land_morale_movement_cost_advance_disc_desc: "Un esercito in movimento è più vulnerabile e soggetto a disorganizzazione. Abituare le nostre truppe a marciare in modo organizzato e coordinato garantisce che possano mantenere le loro formazioni di battaglia anche se attaccate mentre sono in movimento." #OLD ITA
 land_morale_movement_cost_advance_disc_desc: "An army on the move is vulnerable, and prone to disorganization. Training our troops to march in an organized and coordinated manner ensures that they will retain their battle formations, even if attacked while moving." #NEW
 #land_morale_movement_cost_advance_disc_desc: "An army on the move is when it is more vulnerable, and prone to disorganization. Having our troops used to marching in an organized and coordinated manner ensures that they can retain their battle formations even if attack while on the move." #OLD ENG
 trade_through_owned_disc_advance: "Itinerari Commerciali"
 #trade_through_owned_disc_advance_desc: "I mercanti raramente rimangono fermi in un posto, cercando sempre di trovare gli scambi più redditizi. Il loro continuo andare e venire è uno spettacolo comune nelle nostre terre, spesso tracciando persino i propri percorsi per accorciare le distanze da percorrere." #OLD ITA
 trade_through_owned_disc_advance_desc: "Merchants rarely stay still in one place, always trying to find the most profitable trades. Their constant coming and going is a common sight in our lands, and over time they have beaten their own paths to shorten the journey to their destinations." #NEW
 #trade_through_owned_disc_advance_desc: "Merchants rarely stay still in one place, always trying to find the most profitable trades. Their constant coming and going is a common sight in our lands, usually even carving their own paths to shorten the distances they have to travel." #OLD ENG
 hire_artist_cost_modifier_advance_disc: "Terra di Cultura"
 #hire_artist_cost_modifier_advance_disc_desc: "La cultura e le arti sono ciò che definisce l'identità di qualsiasi paese. Essendo orgogliosi della nostra cultura e dei nostri artisti, possiamo sicuramente lasciare il segno nel mondo e far sentire la nostra presenza ovunque." #OLD ITA
 hire_artist_cost_modifier_advance_disc_desc: "Culture and the arts define the identity of any country. By proudly promoting our cultural achievements, we will leave a lasting impression on the entire world." #NEW
 #hire_artist_cost_modifier_advance_disc_desc: "Culture and arts is what sets the identity of any country. By being proud of our culture and our artists, we can certainly have our mark in the world be felt everywhere." #OLD ENG
 rural_rgo_disc_advance: "Sviluppo degli Insediamenti"
 #rural_rgo_disc_advance_desc: "Qualsiasi insediamento, per quanto piccolo, prospererà finché la terra sarà fertile e ci saranno persone disposte a lavorarla. Anche il villaggio più piccolo diventerà prospero e vivace col tempo." #OLD ITA
 rural_rgo_disc_advance_desc: "Any settlement, no matter how small, will thrive as long as the land is rich and there are people willing to work it. Even the smallest village can become prosperous and bustling with activity over time." #NEW
 #rural_rgo_disc_advance_desc: "Any settlement, no matter how small, will thrive as long as the land is rich and there is people willing to work it. Even the smallest village will become prosperous and bustling with activity in time." #OLD ENG
 leader_recruit_cost_advance: "Scuole per gli Ufficiali"
 #leader_recruit_cost_advance_desc: "Guidare le truppe non è un compito facile. Strategia, tattica, intuito mentale: queste sono solo alcune delle competenze che un leader di successo deve possedere. Disporre delle accademie adeguate per la formazione di tali leader ci garantirà una maggiore disponibilità di personale qualificato." #OLD ITA
 leader_recruit_cost_advance_desc: "Leading troops is not an easy task. Strategy, tactics, mental insight — these are just some of the skills a successful leader must have. Founding officer training schools will ensure that more of our fighting men develop good leadership skills, and give us a bigger pool of expert commanders to draw from as well." #NEW
 #leader_recruit_cost_advance_desc: "Leading troops is not an easy task. Strategy, tactics, mental insight, these are just some of the skills a successful leader must have. Having the proper academies for the instruction of such leaders will ensure that we have a greater pool of them more easily available." #OLD ENG
 morale_recovery_rev_dip_choice: "Riposo Consolidato"
 #morale_recovery_rev_dip_choice_desc: "Nessun esercito può rimanere permanentemente in stato di azione, tutti i soldati hanno bisogno di tempo per riposarsi e recuperare le energie. Stabilendo un tempo adeguato per il riposo, senza che questo degeneri in pigrizia, possiamo mantenere le nostre truppe in condizioni ottimali." #OLD ITA
 morale_recovery_rev_dip_choice_desc: "No army can exist in a permanent state of action; all soldiers need time for rest and recovery. By establishing guidelines and procedures for them to rest, without permitting any laziness, we can keep our troops in prime condition." #NEW
 #morale_recovery_rev_dip_choice_desc: "No army can stay permanently in a state of action, all soldiers need their time of rest and recovery. By establishing a proper time for them to rest, without allowing it to fall into laziness, we can keep our troops in prime condition." #OLD ENG
 merchant_power_from_maritime_rev_dip_choice: "Flotte Mercantili"
 #merchant_power_from_maritime_rev_dip_choice_desc: "La presenza di navi mercantili nelle nostre acque è diventata ormai un evento comune. I nostri mercanti hanno così tante imbarcazioni che vanno e vengono che hanno praticamente formato una loro flotta." #OLD ITA
 merchant_power_from_maritime_rev_dip_choice_desc: "Merchant ships have become a common sight in our waters. Our traders have so many vessels going back and forth that they have effectively formed their own fleet." #NEW
 #merchant_power_from_maritime_rev_dip_choice_desc: "The presence of merchant ships in our waters has become a common sight. Our merchants have so many vessels going back and forth that they have effectively formed their own fleet." #OLD ENG
 administrative_leadership: "Comandanti Amministrativi"
 #administrative_leadership_desc: "Un leader militare non deve conoscere solo le questioni militari. Anche argomenti relativi alla logistica, all'amministrazione e all'assegnazione delle forniture, alle spese monetarie e simili sono fondamentali per il successo di qualsiasi campagna militare." #OLD ITA
 administrative_leadership_desc: "A military leader must not only know about military matters. Logistics, supply administration and allocation, monetary expenses, and similar topics are all also critical concerns for any successful military campaign." #NEW
 #administrative_leadership_desc: "A military leader must not only know about military matters. Subjects related to logistics, supply administration and allocation, monetary expenses, and such are all also critical for any successful military campaign." #OLD ENG
 cultures_capacity_mil_choice: "Ambizioni Multiculturali"
 #cultures_capacity_mil_choice_desc: "L'espansione di un paese porterà inevitabilmente all'integrazione di altre culture al suo interno. Pertanto, se vogliamo espandere ulteriormente i nostri confini, dobbiamo essere pronti a diventare più multiculturali." #OLD ITA
 cultures_capacity_mil_choice_desc: "A country's expansion will inevitably result in it bringing other cultures into its fold. Thus, if we want to further expand our borders, we need to be prepared to become more multicultural." #NEW
 #cultures_capacity_mil_choice_desc: "A country's expansion will undoubtedly result in it getting other cultures into its fold. Thus, if we want to further expand our borders, we need to be prepared to become more multicultural." #OLD ENG
 rgo_logistics_mil_choice: "Magazzini Migliorati"
 #rgo_logistics_mil_choice_desc: "Disporre di magazzini adeguati per conservare i prodotti richiesti dalle imprese locali è fondamentale se vogliamo che tali imprese e l'intera economia funzionino senza intoppi." #OLD ITA
 rgo_logistics_mil_choice_desc: "Having proper storehouses to hold the products required by local businesses is a must if we want those enterprises — to say nothing of the entire economy — to function smoothly." #NEW
 #rgo_logistics_mil_choice_desc: "Having proper storehouses to hold the products required by the local business is a must if we want those business and the whole of the economy to function smoothly." #OLD ENG
 land_morale_movement_cost_rev_choice_mil: "Avanzata Inarrestabile"
 #land_morale_movement_cost_rev_choice_mil_desc: "La marcia dei nostri eserciti è uno spettacolo da vedere. Il loro addestramento e la loro disciplina risplendono quando marciano all'unisono e si schierano in battaglia senza lasciarsi scoraggiare dalle lunghe marce precedenti." #OLD ITA
 land_morale_movement_cost_rev_choice_mil_desc: "Our armies on the march is a sight to behold. Their training and discipline shines when they march in unison into battle, unfazed by any previous long march." #NEW
 #land_morale_movement_cost_rev_choice_mil_desc: "The marching of our armies is a sight to behold. Their training and discipline shines when they march in unison and form into battle unfazed by any previous long march." #OLD ENG
 port_cost_distance_from_capital_choice_mil: "Pattuglie Costiere"
 #port_cost_distance_from_capital_choice_mil_desc: "Una pattugliamento adeguato su tutte le nostre coste garantirà una forte presenza della nostra amministrazione su tutte le coste, anche quelle più remote." #OLD ITA
 port_cost_distance_from_capital_choice_mil_desc: "Maintaining regular patrols along all our coasts will ensure that our administrative authority is felt everywhere, even in the farthest regions." #NEW
 #port_cost_distance_from_capital_choice_mil_desc: "Having proper patrols on all our coasts will ensure that the presence of our administration is felt strongly in all of them, even in the farthest ones." #OLD ENG
 protected_harbor_advance: "$protected_harbor$"
 protected_harbor_advance_desc: "$protected_harbor_desc$"
 a_bedouin_cavalry_advance: "$a_bedouin_cavalry$"
 a_bedouin_cavalry_advance_desc: "$a_bedouin_cavalry_desc$"
 repair_at_sea_aod: "Equipaggi Professionali" #Age of Discovery
 #repair_at_sea_aod_desc: "Mentre gli ultimi progressi nella costruzione navale stanno ampliando i confini della navigazione a vela, abbiamo bisogno che i loro equipaggi sfruttino appieno queste nuove capacità. Solo una formazione come marinai professionisti permanenti consentirebbe loro di svolgere correttamente tutti i compiti necessari per stare al passo con la manutenzione delle nuove navi." #OLD ITA
 repair_at_sea_aod_desc: "While the latest advances in naval craftsmanship are pushing the boundaries of sailing as we know it, we need any crewmen on said ships to know how to fully exploit these new capabilities. Only training permanent professional sailors will allow them to correctly perform the necessary tasks to maintain these cutting-edge new ships." #NEW
 #repair_at_sea_aod_desc: "While the last advances in naval craftsmanship are pushing forward the boundaries of sailing, we need their crewmen to fully exploit these new capabilities. Only having them trained as permanent professional sailors would allow them to perform correctly all the tasks needed to keep up with the maintenance of the new ships. " #OLD ENG
 repair_at_sea: "Carenaggio Costiero" #Age of Absolutism
 #repair_at_sea_desc: "Le navi trascorrono sempre più tempo in mare, grazie al costante sviluppo di nuove tecnologie. Ciò comporta la necessità di riparazioni più complesse, ma non sempre è disponibile un porto. I nostri marinai devono essere addestrati a eseguire operazioni di carenaggio lontano dalla loro base operativa, sfruttando a loro vantaggio la bassa marea costiera." #OLD ITA
 repair_at_sea_desc: "Ships are undertaking longer voyages than ever before, made possible by new technical advances. This means more complex repairs are needed, but ports with adequate equipment and skilled craftsmen are not always available. Our sailors must be trained in the art of careening — deliberately beaching vessels to expose the parts that need cleaning or repair. This is the only way our fleets can maintain seaworthiness far from their home ports." #NEW
 #repair_at_sea_desc: "Ships are increasingly spending more time sailing, something made possible by the regular development of new technical advances. This means that more complex repair is needed, and not always a port is available. Our sailors need to be trained in the process of making careening possible far away from their base of operations, by using coastal low tide in their favor." #OLD ENG
 repair_at_sea_aorev: "Carenaggio Avanzato" #Age of Revolutions
 #repair_at_sea_aorev_desc: "Questo processo avanzato di carenaggio viene eseguito in acque costiere profonde, durante il quale un carico pesante viene posizionato su uno dei lati della nave per inclinarla. Ciò consente all'equipaggio di accedere all'altro lato dell'imbarcazione per ripararla, senza doversi fermare sulla costa e attendere la bassa marea, come nel caso del carenaggio tradizionale." #OLD ITA
 repair_at_sea_aorev_desc: "This advanced form of careening is performed in deep coastal waters. Heavy cargo is shifted to one side of the ship to make it heel, allowing the crew to access the opposite side of the hull for repairs without needing to beach the vessel and wait for low tide as with regular careening." #NEW
 #repair_at_sea_aorev_desc: "This advanced process of careening is performed in coastal deep waters, during which heavy-weighted cargo is put into one of the sides of a ship to make it heel. This allows the crew to access the other side of the vessel to repair it, without needing to stop on the coast and wait for low tide, as with regular careening." #OLD ENG
 blast_furnace: "Altoforno" #Age of Discovery
 #blast_furnace_desc: "Metodo più costoso rispetto alla metallurgia tradizionale, l'uso degli altiforni consente di raffinare ulteriormente la ghisa grezza trasformandola in ghisa, rifondendola con diverse quantità di ferro, acciaio, calcare e carbone. La ghisa così trasformata in ferro battuto è un materiale eccellente per prodotti più complessi, come i cannoni." #OLD ITA
 blast_furnace_desc: "A more expensive method than traditional metallurgy, the use of blast furnaces allows us to further refine pig iron into cast iron by re-melting it with different quantities of iron, steel, limestone, and charcoal. Cast iron made into wrought iron this way creates an excellent material for making complex products such as cannon." #NEW
 #blast_furnace_desc: "A more expensive method than traditional metallurgy, the use of blast furnaces allows to further refine pig iron to cast iron, by re-melting it with different quantities of iron, steel, limestone, and charcoal. The cast iron made into wrought iron this way makes for an excellent material for more complex products, such as cannons." #OLD ENG
 saiger_process_discovery: "Processo Saiger Perfezionato"
 #saiger_process_discovery_desc: "Il miglioramento dei metodi di lavorazione e di lavoro consentirà alle nostre miniere d'argento e di piombo di prosperare." #OLD ITA
 saiger_process_discovery_desc: "Improved processing and work methods will allow our $silver$ and $lead$ mines to prosper." #NEW
 #saiger_process_discovery_desc: "Improved processing and work methods will allow our silver and lead mines to prosper." #OLD ENG
 slitting_mills: "Laminatoi" #Age of Reformation
 #slitting_mills_desc: "Si tratta di un nuovo tipo di mulini ad acqua sviluppati per tagliare barre di ferro in tondini. Ciò consente uno sviluppo più efficiente degli utensili e dei macchinari in ferro, poiché permette ai fonditori di utilizzare tondini più adatti alle loro esigenze rispetto alle barre più grandi, riducendo gli scarti nel processo di forgiatura." #OLD ITA
 slitting_mills_desc: "These are a new type of watermills developed for slitting bars of $iron$ into rods. This allows for more efficient development of $iron$ tools and machinery, as it allows casters to use rods that more appropriate for their needs compared to bigger bars, wasting less byproduct in the forging process." #NEW
 #slitting_mills_desc: "These are a new type of watermills developed for slitting bars of iron into rods. This allows for more efficient development of iron tools and machinery, as it allows the casters to use rods that fit their needs more appropriately compared to bigger bars, wasting less byproduct in the forging process." #OLD ENG
 coke_blast_furnace: "Altoforno a Coke" #Age of Absolutism
 #coke_blast_furnace_desc: "Si tratta di un nuovo tipo di altoforno che consente l'utilizzo del coke al posto del carbone vegetale come combustibile. Non solo è più economico, ma permette anche di realizzare forni più grandi, sebbene presenti lo svantaggio che il coke contiene più impurità rispetto al carbone vegetale, un problema che deve ancora essere risolto." #OLD ITA
 coke_blast_furnace_desc: "This is a new type of blast furnace, which uses coke instead of charcoal as its fuel. It is cheaper and allows us to build larger furnaces, although coke has the disadvantage of being less pure than charcoal, which is a problem yet to be addressed." #NEW
 #coke_blast_furnace_desc: "This is a new type of blast furnace, which allows the use of coke instead of charcoal as its fuel. It is not only cheaper, but it also allows for larger furnaces, although it has the disadvantage of coke having more impurities than charcoal, which is a problem yet to be addressed." #OLD ENG
 hot_blast_furnace: "Forno ad Alta Temperatura" #Age of Revolutions
 #hot_blast_furnace_desc: "I problemi posti dagli altiforni a coke, con ghisa più impura a causa dell'uso del coke, hanno portato allo sviluppo del vento caldo. Questo non solo riduce notevolmente l'uso del coke, migliorando così la qualità del ferro, ma consente anche l'uso di carbone minerale grezzo come combustibile, se disponibile, il che rappresenta un grande passo avanti nella metallurgia del ferro." #OLD ITA
 hot_blast_furnace_desc: "The problems posed by the coke blast furnaces, especially the amount of impurities the coke creates in the final cast iron, has led to the development of the hot blast. It not only greatly reduces the use of coke, therefore improving the quality of the $iron$, but also allows the use of raw mineral coal as fuel if available, which is a great step forward in $iron$ metallurgy." #NEW
 #hot_blast_furnace_desc: "The problems posed by the coke blast furnaces, with cast iron with more impurities due to the use of coke, has led to the development of the hot blast. It not only greatly reduces the use of coke, therefore improving the quality of iron, but it also allows the use of raw mineral coal as fuel if available, which is a great step forward in the metallurgy of iron." #OLD ENG
 new_currency_demands: "Nuove Richieste Valutarie"
 #new_currency_demands_desc: "La scoperta di nuove terre ha portato anche a un aumento dei flussi commerciali. Ciò ha causato a sua volta un aumento della domanda di monete e, sebbene le valute in metalli nobili come l'$goods_gold$ e l'$silver$ rimangano le principali forme di valore, anche altri metalli meno pregiati come il $copper$ e le sue leghe hanno visto aumentare il loro utilizzo e la loro circolazione." #OLD ITA
 new_currency_demands_desc: "The discovery of new lands has also led to an increased flow of trade. This has in turn caused a rise in the demand for coins, and although the noble metal currencies made of $goods_gold$ and $silver$ remain the main values, other lesser metals like $copper$ and its alloys have seen their use and circulation increased." #NEW
 #new_currency_demands_desc: "The discovery of new lands has also led to an increase flow of trade. This has in turn caused a rise in the demand for coins, and although the noble metal currencies made of $goods_gold$ and $silver$ remain the main values, other lesser metals like $copper$ and its alloys have seen their use and circulation increased." #OLD ENG
 #powerful_statues: "Statue Possenti" #OLD ITA
 powerful_statues: "Impressive Statuary" #NEW
 #powerful_statues: "Powerful Statues" #OLD ENG
 #powerful_statues_desc: "Un paese prospero è segno di un sovrano forte, ma il popolo crederà che un sovrano sia forte solo se gli viene mostrato in questo modo. A tal fine, molti sovrani commissionano una vasta gamma di statue che li raffigurano, spesso realizzate in pietra o bronzo, per trasmettere al popolo un'immagine di forza e potere. Tuttavia, non sempre sono efficaci in questo senso e talvolta hanno come unico risultato il trasferimento di grandi quantità di materiali." #OLD ITA
 powerful_statues_desc: "A prosperous country is the true sign of a strong ruler, but the people will only believe that a ruler is strong if they are depicted as such. To that effect, many rulers commission statues of themselves, often made out of stone or bronze, to project an image of strength and power to any who look upon their rendered visages. However, these displays of ego are not always effective, and sometimes only result in great amounts of materials being moved around." #NEW
 #powerful_statues_desc: "A prosperous country is the sign of a strong ruler, but the people will only believe that a ruler is strong if shown like that. To that effect, many rulers commission a wide range of statues of themselves, often made out of stone or bronze, to project to the people an image of strength and power. However, they are not always effective on that, and sometimes they only result in great amounts of materials being moved around." #OLD ENG
 renaissance_sculptures: "Sculture Rinascimentali"
 #renaissance_sculptures_desc: "L'avvento del $renaissance$ ha portato con sé un maggiore interesse per tutte le forme d'arte. Sembra che al giorno d'oggi non si sia nessuno se non si possiede un'opera d'arte che adorna la propria casa. Le sculture sono una delle forme di espressione artistica più prolifiche tra la gente, e questo ha causato la comparsa e l'aumento di molte cave, in grado di fornire pietre di molti tipi diversi a coloro che hanno inclinazioni artistiche." #OLD ITA
 renaissance_sculptures_desc: "The $renaissance$ has brought with it greater interest in arts in all forms. It seems that nowadays no one is anybody if they do not have a piece of art adorning their homes! Sculptures are one of the most prolific forms of artistic expression, which has led to an increase in the number of quarries as demand for $stone$ has risen dramatically among the artistically inclined." #NEW
 #renaissance_sculptures_desc: "The wake of the $renaissance$ has brought with it greater interest in arts in all forms. It seems that nowadays one is nobody if they do not have an art piece adorning their homes. Sculptures are one of the most prolific forms of artistic expression among the people, and that has caused the appearance and increase of many quarries, to be able to supply with stones of many different types to those artistically inclined." #OLD ENG
 green_vitriol: "Vetriolo Verde"
 #green_vitriol_desc: "Sebbene tecnicamente non sia la stessa sostanza dell'$alum$, il $green_vitriol$ è stato tradizionalmente indicato negli scritti alchemici in modo indistinguibile dall'$alum$, ed entrambi hanno proprietà simili. Pertanto, non è raro utilizzare l'uno come sostituto dell'altro." #OLD ITA
 green_vitriol_desc: "Although not technically the same substance as $alum$, $green_vitriol$ has been traditionally conflated with it in alchemical writings, and both have similar properties. As such, it is not uncommon to use one as a substitute for the other." #NEW
 #green_vitriol_desc: "Although not technically the same substance as $alum$, $green_vitriol$ has been traditionally referred in alchemical writings indistinguishably with $alum$, and both have similar properties. As such, is not uncommon to use one as substitute for the other." #OLD ENG
 shared_products_procedures: "Prodotti e Procedure Condivisi"
 #shared_products_procedures_desc: "Il mondo è diventato più piccolo, con molte nuove terre e popoli da scoprire. Con essi, siamo anche entrati in contatto con molti nuovi prodotti e modi di utilizzarli. Anche i beni più specializzati, come l'$alum$, possono essere utilizzati in altri modi in altri luoghi." #OLD ITA
 shared_products_procedures_desc: "The world has become smaller, and we have encountered a plethora of new peoples and undiscovered territory. Along with these discoveries, we have also come into contact with many new products and ways of utilizing them. Even the most specialized goods, like $alum$, can be used in other ways in other places." #NEW
 #shared_products_procedures_desc: "The world has become smaller, with many new lands and peoples being encountered. With them, we have also come into contact with many new products and ways of utilizing them. Even the most specialized goods, like $alum$, can be used in other ways in other places." #OLD ENG
 ostentatious_clothing: "Abbigliamento Appariscente"
 #ostentatious_clothing_desc: "È diritto e dovere delle classi dominanti mostrare il proprio potere attraverso il proprio aspetto. Per questo motivo indossano abiti sempre più appariscenti, utilizzando le tecniche più avanzate per ottenere colori e motivi vivaci e lussuosi." #OLD ITA
 ostentatious_clothing_desc: "It is the right and duty of the ruling classes to display their power through their appearance. As such, they are wearing increasingly flamboyant attire, making use of the latest techniques to achieve vibrant and luxurious colors and patterns." #NEW
 #ostentatious_clothing_desc: "It is the right and duty of the ruler classes to display their power through their appearance. As such, they are wearing increasingly flamboyant attire, making use of the latest techniques to achieve vibrant and luxurious colors and patterns." #OLD ENG
 riches_of_foreign_coasts: "Ricchezze delle Coste Straniere"
 #riches_of_foreign_coasts_desc: "Le terre lontane ci hanno portato molte risorse, ma non solo le terre stesse sono ricche. Anche le coste e il mare sono abbondanti, e acquisire conoscenze dai pescatori di perle stranieri permette anche ai nostri di ottenere catture più abbondanti." #OLD ITA
 riches_of_foreign_coasts_desc: "Distant lands have brought to us many resources, but not only the lands themselves are rich. Coasts and seas are also plentiful, and the knowledge we have gained from foreign pearl divers allows ours to be more successful in their catches." #NEW
 #riches_of_foreign_coasts_desc: "Distant lands have brought to us many resources, but not only the lands themselves are rich. Coasts and sea are also plentiful, and getting knowledge from foreign pearl divers allows ours to also be more abundant in their catches." #OLD ENG
 foreign_mining_techniques: "Tecniche Minerarie Straniere"
 #foreign_mining_techniques_desc: "Le pietre preziose sono apprezzate dall'umanità da millenni in tutto il mondo. Entrando in contatto con popoli stranieri provenienti da luoghi lontani, possiamo imparare non solo quali sono le gemme che essi apprezzano di più, ma anche quali tecniche utilizzano per ottenerle." #OLD ITA
 foreign_mining_techniques_desc: "Precious stones have been appreciated by humanity for millennia. By coming into contact with foreign peoples from faraway lands, we can learn not only about the types of $gems$ they value most, but also about the techniques they use to obtain them." #NEW
 #foreign_mining_techniques_desc: "Precious stones have been appreciated by humanity for millennia all over the world. By getting into contact with foreign peoples from far away we can learn not only about the types of $gems$ they value most but also about the techniques they use to obtain them." #OLD ENG

 windmills_advance: "$windmill$"
 windmills_advance_desc: "$windmill_desc$"
 local_smelters_advance: "$local_smelters$"
 local_smelters_advance_desc: "$local_smelters_desc$"
 
 
 corps_organisation: "Esprit de Corps"
 #corps_organisation_desc: "Gli eserciti tradizionali facevano affidamento su una disciplina ferrea per mantenere l'ordine nei ranghi, tuttavia, facendo appello all'orgoglio dell'unità è possibile raggiungere livelli di disciplina ancora più elevati." #OLD ITA
 corps_organisation_desc: "Traditional armies relied on furious discipline to maintain order in the ranks. By appealing to unit pride, however, we can reach even higher levels of discipline." #NEW
 #corps_organisation_desc: "Traditional armies relied on furious discipline to maintain order in the ranks, however, by appealing to unit pride we can reach even higher levels of discipline." #OLD ENG
 #open_sea_exploration: "Esplorazione Oltreoceano" #OLD ITA
 open_sea_exploration: "Overseas Exploration" #NEW
 #open_sea_exploration: "Oversea Exploration" #OLD ENG
 #open_sea_exploration_desc: "I vasti mari ci promettono grandi ricchezze e nuove opportunità commerciali su coste lontane." #OLD ITA
 open_sea_exploration_desc: "The vast seas promise us great riches and new opportunities for trade on distant shores." #NEW
 #open_sea_exploration_desc: "The vast seas promise us great riches and new opportunity for trade on distant shores." #OLD ENG
 napoleonic_warfare: "Guerra Napoleonica"
 #napoleonic_warfare_desc: "Gli assedi sono un'occupazione costosa e dispendiosa in termini di tempo per il nostro esercito. Invece di concentrarci su ogni fortificazione che incontriamo sul nostro cammino, dobbiamo dedicare la nostra tattica interamente al colpo decisivo che ci farà vincere la guerra." #OLD ITA
 napoleonic_warfare_desc: "Sieges are a costly and time-consuming occupation for our army. Instead of focusing on every fortification in our way, we need to dedicate our tactics entirely to landing the decisive blow that will win us the war." #NEW
 #napoleonic_warfare_desc: "Sieges are a costly and time-consuming occupation for our army. Instead of focusing on every fortification in our way, we need to dedicate our tactic entirely on the decisive blow that will win us the war." #OLD ENG
 march_to_the_sound_of_the_guns_advance: "$march_to_sound_of_guns$"
 #march_to_the_sound_of_the_guns_advance_desc: "Con la crescita costante del nostro esercito, allentare i requisiti logistici diventa più importante che mai. Ordinare ai nostri generali di disperdere le truppe e rinforzare il campo di battaglia una volta scoppiati i combattimenti ci porterà grandi vantaggi." #OLD ITA
 march_to_the_sound_of_the_guns_advance_desc: "With the steady growth of our army, our logistical needs have changed. Our generals will adopt 'march to the sound of guns' doctrine — ordering dispersed forces to move toward battle independently when they hear fighting. This enables rapid reinforcement without having to await orders." #NEW
 #march_to_the_sound_of_the_guns_advance_desc: "With the steady growth of our army, relaxing the requirements on logistics becomes more important than ever before. Ordering our generals to disperse their troops and reinforce the battlefield once fighting breaks out will benefit us greatly." #OLD ENG
 country_unification_advance: "Supervisione degli Stati Cliente"
 #country_unification_advance_desc: "Prima inizieremo a integrare l'amministrazione dei nostri sudditi affinché seguano le nostre regole, più facile sarà l'integrazione di altre questioni. Creare un collegamento permanente con i nostri stati cliente faciliterà notevolmente questo processo." #OLD ITA
 country_unification_advance_desc: "The earlier we start integrating the administration of our subjects to follow the rules of our own, the easier the integration of other matters will be. Creating a permanent liaison with our subjects will make this process significantly smoother." #NEW
 #country_unification_advance_desc: "The earlier we start integrating the administration of our subjects to follow the rules of our own, the easier the integration of other matters will be. Creating a permanent Liaison with our subjects will smooth this process over significantly." #OLD ENG
 #renaissance_urbanisation: "Urbanistica Rinascimentale" #OLD ITA
 renaissance_urbanisation: "$renaissance$ City Planning" #NEW
 #renaissance_urbanisation: "Renaissance City Planning" #OLD ENG
 #renaissance_urbanisation_desc: "La pianificazione di aree dedicate allo sfruttamento delle risorse consentirà ai nostri centri urbani di produrre più beni rispetto al passato." #OLD ITA
 renaissance_urbanisation_desc: "Accounting for dedicated areas for resource exploitation during the planning phase will allow our urban centers to produce more goods than before." #NEW
 #renaissance_urbanisation_desc: "Accounting for dedicated areas for resource exploitation during planning will allow our urban centers to produce more goods than before." #OLD ENG
 renaissance_city_rights: "Diritti di Città Formali"
 #renaissance_city_rights_desc: "Stabilire che la concessione dei diritti cittadini sia di esclusiva competenza del nostro sovrano consentirà alla nostra amministrazione di avere una visione molto chiara dello stato del nostro Paese." #OLD ITA
 renaissance_city_rights_desc: "By establishing that only our ruler can grant city rights, we centralize control over urban development and give our administration a clear overview of the state of our country." #NEW
 #renaissance_city_rights_desc: "Establishing that the granting of city rights is only in the hands of our ruler will allow our administration to have a very clear overview of the state of our country." #OLD ENG

 absolutism_control_decline_advance: "Amministrazione Assolutista"
 #absolutism_control_decline_advance_desc: "I sovrani assolutisti non solo sono disposti a mostrare il proprio potere a corte, ma anche attraverso un apparato amministrativo che può estendersi in tutto il paese." #OLD ITA
 absolutism_control_decline_advance_desc: "Absolutist rulers not only demonstrate their power in court, but also through an administrative apparatus that may spread throughout the country." #NEW
 #absolutism_control_decline_advance_desc: "Absolutist rulers are not only willing to display their power in court, but also through an administrative apparatus that may spread throughout the country." #OLD ENG

 construction_speed_renaissance: "Gilde dei Muratori"
 #construction_speed_renaissance_desc: "I muratori si affidano ad associazioni più ampie, note come corporazioni, per condividere e preservare le loro conoscenze ed esperienze, in un sistema in cui i muratori veterani insegnano agli apprendisti più giovani." #OLD ITA
 construction_speed_renaissance_desc: "Freemasons rely on broader associations, known as guilds, to share and preserve their knowledge and experience in a system where veteran masons teach younger apprentices." #NEW
 #construction_speed_renaissance_desc: "Freemasons rely on broader associations, known as guilds, to share and preserve their knowledge and experience, in a system whereby veteran masons teach younger apprentices." #OLD ENG
 construction_speed_discovery: "Assi e Mattoni Standardizzati"
 #construction_speed_discovery_desc: "La standardizzazione della produzione di assi e mattoni mediante tecniche più moderne mira a rendere più facile e semplice la costruzione degli edifici." #OLD ITA
 construction_speed_discovery_desc: "The standardization of plank and brick production using more modern techniques aims to enable easier construction." #NEW
 #construction_speed_discovery_desc: "The standardization of plank and brick production using more modern techniques aims to enable easier and simpler building construction." #OLD ENG
 construction_speed_reformation: "Trattati di Architettura"
 #construction_speed_reformation_desc: "La stesura di trattati di architettura, che spesso raccolgono conoscenze secolari, consente un apprendimento più rapido e la diffusione delle tecniche di costruzione più efficaci." #OLD ITA
 construction_speed_reformation_desc: "The writing of architectural treatises, which often compile centuries-old knowledge, allows for faster learning and dissemination of effective construction techniques." #NEW
 #construction_speed_reformation_desc: "The writing of architectural treatises, which often compile centuries-old knowledge, allows for faster learning and the dissemination of the most effective construction techniques." #OLD ENG
 construction_speed_absolutism: "Ingegneria Architettonica"
 construction_speed_absolutism_desc: "La costruzione degli edifici è diventata più sofisticata nel corso del tempo, incorporando metodi e tecniche provenienti da una vasta gamma di discipline, comunemente considerate un tipo di ingegneria."
 construction_speed_revolutions: "Strutture in Ghisa"
 construction_speed_revolutions_desc: "Lo sviluppo di una metallurgia più avanzata del ferro battuto e fuso consente di realizzare strutture metalliche più elaborate, come pilastri e colonne, che rendono la costruzione degli edifici molto più veloce."

 apothecary_advance: "$apothecary$"
 apothecary_advance_desc: "$apothecary_desc$"
 unlock_handgonners_advance: "$a_handgonners$"
 unlock_handgonners_advance_desc: "$a_handgonners_desc$"
 manufactories_advance: "Manifatture"
 #manufactories_advance_desc: "I recenti progressi tecnologici e la meccanizzazione hanno facilitato la nascita di impianti di produzione concentrati sotto forma di manifatture. Il miglioramento della velocità e della quantità di produzione grazie a essi consente maggiori benefici." #OLD ITA
 manufactories_advance_desc: "Recent technological advances in mechanization have facilitated the rise of concentrated production facilities in the form of manufactories. These businesses have helped us greatly improve the rate and quality of production." #NEW
 #manufactories_advance_desc: "The recent technological advances and mechanization have facilitated the rise of concentrated production facilities in the form of manufactories. The improved rate and quantity of production thanks to them allow for greater benefits." #OLD ENG
 scientific_revolution_advance: "Rivoluzione Scientifica"
 #scientific_revolution_advance_desc: "I recenti sviluppi nel campo della matematica, della fisica, dell'astronomia, della biologia e della chimica non solo hanno messo in discussione, ma hanno completamente cambiato la nostra visione del mondo che ci circonda. La società sta progredendo a una velocità mai vista prima e ogni giorno vengono fatte nuove scoperte scientifiche." #OLD ITA
 scientific_revolution_advance_desc: "Recent developments in mathematics, physics, astronomy, biology and chemistry have not only challenged, but completely changed our view of the world around us. Society is progressing at a greater speed than ever before, and more scientific breakthroughs are made every day." #NEW
 #scientific_revolution_advance_desc: "Recent developments in mathematics, physics, astronomy, biology and chemistry have not only challenged but completely changed our view of the world around us. Society is progressing at a greater speed than ever before, and more discoveries in science are made every day." #OLD ENG
 military_revolution_advance: "Rivoluzione Militare"
 #military_revolution_advance_desc: "La guerra non cambia mai, ma il modo di combatterla sì. I recenti sviluppi nel campo degli armamenti hanno dimostrato che i vecchi metodi di combattimento sono ormai obsoleti e gli eserciti hanno subito un vero e proprio cambiamento di paradigma. Adattarsi a questi cambiamenti è l'unico modo per continuare a essere una potenza militare forte." #OLD ITA
 military_revolution_advance_desc: "War never changes, but the manner of waging it does. Recent arms developments have proved that the old ways of fighting are obsolete, and armies have experienced a full paradigm shift. Adapting to those changes is the only way to continue being a strong military power." #NEW
 #military_revolution_advance_desc: "War never changes, but the way of waging it does. The recent developments in armament have proved that the old ways of fighting are obsolete, and armies have experienced a whole paradigm shift. Adapting to those changes is the only way to keep being a strong military power." #OLD ENG
 power_projection_advance_5: "Ambizioni Assolutistiche"
 #power_projection_advance_5_desc: "Con la crescente centralizzazione del potere degli Stati, l'idea di essere l'unico sovrano di tutto il territorio disponibile ha iniziato a prendere forma nella mente di quasi tutti i governanti del mondo. Immaginandosi come equivalenti al sole, che da solo illumina tutta la terra, essi desiderano avere autorità assoluta su tutto." #OLD ITA
 power_projection_advance_5_desc: "As state power becomes increasingly centralized, rulers across the world have begun to envision themselves as absolute sovereigns over their respective territories. Like the sun that illuminates the entire world, they seek to be the sole source of authority, their will extending unchallenged across every corner of their domain." #NEW
 #power_projection_advance_5_desc: "With an increasing centralization of the power of the states, the idea of being the single ruler of all the available territory has started to form in the minds of almost all rulers of the world. Imagining themselves as an equivalent to the sun, which by itself brings light to all the land, they want to have absolute authority over all." #OLD ENG
 absolutist_court: "Corte Assolutista"
 #absolutist_court_desc: "L'autorità è stata recentemente centralizzata nella persona del sovrano stesso in tutto il mondo. Il resto della corte è costituito più da servitori dei sovrani e subordinati della loro autorità che da attori autonomi. Ciò consente ai sovrani di attuare i propri desideri in modo più rapido ed efficiente." #OLD ITA
 absolutist_court_desc: "Authority has become increasingly centralized in the person of the ruler. Courtiers and officials now serve as extensions of royal will rather than autonomous actors. This concentration of authority allows rulers to enact their wishes more quickly and efficiently." #NEW
 #absolutist_court_desc: "The authority has recently been centralized into the person of the ruler itself all over the world. The rest of the court are more servants to the rulers and subordinates of their authority rather than autonomous actors. This allows rulers to more quickly and efficiently enact their wishes." #OLD ENG
 government_size_absolutism: "Subordinati Fedeli"
 #government_size_absolutism_desc: "Concentrare il potere nelle mani dei governanti consente loro di agire in modo più diretto, ma hanno comunque bisogno di persone al loro servizio che mettano in atto tali azioni. Tuttavia, il fatto che questi subordinati non abbiano alcun potere reale e siano fedeli alla figura del governante consente alla corte di averne un numero maggiore senza temere lotte intestine o malcontento." #OLD ITA
 government_size_absolutism_desc: "Concentrating power in the hands of the rulers allows them to take direct action, but they still need people under them to help carry out those actions. Giving those subordinates no real power, while making them unfailingly loyal to the ruler, allows the $crown_estate$ to host more of them without fear of infighting or discontent." #NEW
 #government_size_absolutism_desc: "Having the power concentrated on the hands of the rulers allows them more direct action, but they still need people under them to act upon those actions. However, having those subordinates no real power and being loyal to the figure of the ruler allows the court to have more of them without fear of infighting or discontent." #OLD ENG
 naval_doctrines_advance: "Dottrine Navali"
 #naval_doctrines_advance_desc: "Negli ultimi anni la guerra navale ha subito molti cambiamenti, con navi e flotte che sono diventate più grandi e più specializzate. Di conseguenza, i diversi paesi stanno iniziando a utilizzare tattiche e dottrine diverse, adattate ai propri punti di forza o a un modo particolare di utilizzare le proprie flotte." #OLD ITA
 naval_doctrines_advance_desc: "Naval warfare has seen many changes in recent years, with ships and fleets both becoming larger and more specialized. As a result of this, different countries are starting to use a variety of tactics and doctrines, tailored to their strong points or their particular way of using their fleets." #NEW
 #naval_doctrines_advance_desc: "Naval warfare has seen many changes in recent years, with ships and fleets becoming bigger and more specialized. As a result of that, different countries are starting to use different tactics and doctrines, tailored to their strong points or a particular way of using their fleets." #OLD ENG
 global_supply_limit_modifier_advance_5: "Pianificazione Logistica dell'Esercito"
 #global_supply_limit_modifier_advance_5_desc: "La marcia di qualsiasi esercito è supportata dalla sua logistica. Con uno studio e una pianificazione adeguati, gli eserciti possono resistere a campagne più lunghe e più lontane." #OLD ITA
 global_supply_limit_modifier_advance_5_desc: "How far an army can march is a consequence of its logistics. With proper study and planning, armies can withstand longer and more distant campaigns." #NEW
 #global_supply_limit_modifier_advance_5_desc: "The march of any army is supported by its logistics. With the proper study and planning of them, armies can withstand longer and farther campaigns." #OLD ENG
 rgo_size_advance_absolutism: "Fisiocrazia"
 #rgo_size_advance_absolutism_desc: "I recenti sviluppi nel pensiero economico hanno spostato l'attenzione dalle precedenti idee mercantilistiche sul valore nel commercio verso l'idea che il valore risieda nel processo di produzione stesso. Di conseguenza, la produzione stessa sta costantemente migliorando ed aumentando." #OLD ITA
 rgo_size_advance_absolutism_desc: "Recent developments in economic thought have shifted the focus from the mercantilist ideals of value lying in trade towards the notion that value lies in the production process itself. As a result, production has been steadily improving and increasing." #NEW
 #rgo_size_advance_absolutism_desc: "Recent developments in economic thought have shifted the focus from the previous mercantilist ideas of value in trade, towards the idea that the value lies in the production process itself. As such, the production itself has been steadily improving and increasing." #OLD ENG
 food_advance_absolutism: "Campi Delimitati"
 #food_advance_absolutism_desc: "Fino a poco tempo fa, la proprietà della terra e il suo uso appropriato erano più o meno comuni e liberi. Tuttavia, c'è una tendenza crescente ad avviare un processo di delimitazione specifica dei terreni, determinando chiaramente i confini e le dimensioni dei campi dedicati esclusivamente all'agricoltura. In questo modo, la loro produzione e il loro sfruttamento possono essere notevolmente aumentati." #OLD ITA
 food_advance_absolutism_desc: "Until recently, land ownership and use was relatively common and free. However, there is now an increasing tendency to start a process of specific land delimitation, clearly determining the borders and size of fields exclusively dedicated to agriculture. With this kind of specified use, their production and exploitation can be greatly increased." #NEW
 #food_advance_absolutism_desc: "Until recently, ownership of land and its appropriate use was more or less common and free. However, there's an increasing tendency to start a process of specific land delimitation, clearly determining the borders and size of fields exclusively dedicated to agriculture. With this, their production and exploitation can be increased greatly." #OLD ENG
 naval_morale_advance_5: "Flotte Permanenti"
 #naval_morale_advance_5_desc: "L'attuale situazione mondiale e l'aumento degli scambi commerciali in tutto il mondo richiedono l'uso di flotte permanenti per tutelare gli interessi dei diversi paesi. Disporre di una marina militare consolidata e sempre presente consente alle navi di operare meglio tra loro." #OLD ITA
 naval_morale_advance_5_desc: "The global expansion of trade and commerce demands permanent naval forces to protect national interests. Maintaining an established, ever-present standing navy will allow ships to operate more effectively together as a fleet." #NEW
 #naval_morale_advance_5_desc: "The current situation of the world, and all the increase in trade and commerce all over it, requires the use of permanent fleets to guard the interests of the different countries. Having an established and ever-present navy allows ships to better operate among each other." #OLD ENG
 new_world_advance: "Nuovo Mondo"
 #new_world_advance_desc: "Come dice il navigatore fiorentino Amerigo Vespucci, le terre scoperte da Colombo non sono le Indie, ma, in realtà, un intero Nuovo Mondo sconosciuto ai nostri antenati e che aspetta di essere mappato e rivendicato." #OLD ITA
 new_world_advance_desc: "As the $FLO_ADJ$ navigator Amerigo Vespucci says, the lands discovered by Columbus are not the Indies but, in fact, a whole New World unknown to our ancients and waiting to be mapped and claimed." #NEW
 #new_world_advance_desc: "As the Florentine navigator Amerigo Vespucci says, the lands discovered by Columbus are not the Indies but, in fact, a whole New World unknown to our ancients and waiting to be mapped and claimed." #OLD ENG
 colonial_charters: "Carte Coloniali"
 colonial_charter_progress_tt_title: "Progressi della Carta Coloniale"
 #colonial_charters_desc: "Questi nuovi documenti garantiranno i diritti dei nostri connazionali quando colonizzeranno le terre selvagge del Nuovo Mondo, conferiranno alle colonie il diritto esclusivo di governare le nuove terre e regoleranno i loro rapporti con la madrepatria." #OLD ITA
 colonial_charters_desc: "These new documents will ensure the rights of our countrymen when they settle the untamed New World. They give our colonies the exclusive right of governing these new lands and regulate their relationship with the mother country." #NEW
 #colonial_charters_desc: "These new documents will ensure the rights of our countrymen when they settle the untamed land of the New World, will give to the colonies the exclusive right of governing the new land and regulate their relationship with the motherland." #OLD ENG
 plantation_buildings_advance: "Piantagioni"
 #plantation_buildings_advance_desc: "Il clima mite e favorevole e le terre vaste e fertili del Nuovo Mondo rendono le Colonie il luogo ideale per la produzione di colture molto redditizie come lo zucchero e il tabacco." #OLD ITA
 plantation_buildings_advance_desc: "The mild climate and abundant fertile lands of the New World make the Colonies the ideal location for producing very profitable crops like $sugar$ and $tobacco$." #NEW
 #plantation_buildings_advance_desc: "The mild and benign climate and vast and fertile lands of the New World make the Colonies the ideal locations for the production of very profitable crops like sugar and tobacco." #OLD ENG
 diplomatic_range_age_1: "Inviati Stranieri" 
 #diplomatic_range_age_1_desc: "La diplomazia tra i paesi è sempre stata importante. Tuttavia, sta diventando sempre più intensa e complessa, e inviare inviati sempre più lontani per espandere le nostre relazioni estere sta diventando sempre più comune." #OLD ITA
 diplomatic_range_age_1_desc: "Diplomacy between countries has always been important. However, the art of diplomatic maneuvering is growing in intensity and complexity, and it has become common to send our envoys ever further afield than before to expand our foreign relations." #NEW
 #diplomatic_range_age_1_desc: "Diplomacy between countries has always been important. However, it is growing in intensity and complexity, and sending envoys ever further afield to expand our foreign relations is becoming more common." #OLD ENG
 diplomatic_range_age_2: "Rete Diplomatica"
 #diplomatic_range_age_2_desc: "Mantenendo una rete diplomatica solida e consolidata intorno a noi, possiamo utilizzarla per inviare inviati anche in paesi più lontani." #OLD ITA
 diplomatic_range_age_2_desc: "Maintaining an established network of skilled diplomats around us allows us to send envoys to countries even further away." #NEW
 #diplomatic_range_age_2_desc: "By maintaining a good and established network of diplomats all around us, we can use it to send envoys to countries even further away." #OLD ENG
 diplomatic_range_age_3: "Ambasciate"
 #diplomatic_range_age_3_desc: "L'attuale situazione internazionale richiede che istituiamo uffici permanenti per i nostri diplomatici nei paesi confinanti. È l'unico modo per garantire che i nostri interessi siano tutelati nella nostra regione mentre estendiamo la nostra influenza al di là di essa. " #OLD ITA
 diplomatic_range_age_3_desc: "The current international situation requires that we set up permanent offices for our diplomats in neighboring countries. It is the only way to ensure that our interests are upheld in our region while we extend our reach beyond it." #NEW
 #diplomatic_range_age_3_desc: "The current international situation requires that we set up permanent offices for our diplomats in neighboring countries. It is the only way to ensure that our interests are upheld in our region while we extend our reach beyond it. " #OLD ENG
 trade_envoys: "Inviati Commerciali" 
 #trade_envoys_desc: "Con il recente aumento degli scambi commerciali con terre lontane, i nostri inviati hanno iniziato a partecipare a spedizioni commerciali per stabilire contatti diplomatici con paesi che prima erano fuori dalla nostra portata." #OLD ITA
 trade_envoys_desc: "With the recent increase in trade to and from faraway lands, our envoys have started joining trade expeditions to establish diplomatic contacts with countries that were previously out of our reach." #NEW
 #trade_envoys_desc: "With the recent increase in trade to and from faraway lands, our envoys have started joining trade expeditions to establish diplomatic contacts with countries that were before out of our reach." #OLD ENG
 diplomatic_range_age_5: "Missioni Diplomatiche"
 #diplomatic_range_age_5_desc: "La complessità della politica moderna non è più un compito che può essere svolto da un singolo inviato. Per espandere ulteriormente la nostra influenza e proteggere i nostri interessi in quei luoghi lontani, invieremo intere missioni di diplomatici esperti in ogni paese." #OLD ITA
 diplomatic_range_age_5_desc: "The complexity of modern politics can no longer be handled by single envoys. To expand our influence even further and protect our interests in those faraway places, we will send skilled teams of expert diplomats to each country." #NEW
 #diplomatic_range_age_5_desc: "The complexity of modern politics is no longer a task for a single envoy. To expand our influence even further and protect our interests in those far away places, we will send whole missions of expert diplomats to each country." #OLD ENG
 diplomatic_range_age_6: "Ambasciate Globali" 
 #diplomatic_range_age_6_desc: "Con i diversi paesi che cercano di espandere ulteriormente la propria influenza, il mondo è diventato più interconnesso che mai. Solo l'istituzione di ambasciate permanenti in tutto il mondo può consentire a questa interconnettività di sostenersi." #OLD ITA
 diplomatic_range_age_6_desc: "With every nation trying to expand its reach even farther, the world has become more interconnected than ever before. Only establishing permanent embassies all over the globe can allow this interconnectivity to sustain itself." #NEW
 #diplomatic_range_age_6_desc: "With the different countries trying to expand their reaches even further, the world has become more interconnected than ever before. Only the establishment of permanent embassies all over the globe can allow this interconnectivity to sustain itself." #OLD ENG
 new_world_crops: "Colture del Nuovo Mondo"
 #new_world_crops_desc: "Le terre generose del Nuovo Mondo hanno fornito molti tesori al nostro Paese, uno dei più grandi è la scoperta di piante strane ed esotiche coltivate dagli indigeni di quelle terre come cibo e spezie. L'introduzione di quelle colture nei nostri campi fornirà alla nostra popolazione la varietà e la novità che desidera." #OLD ITA
 new_world_crops_desc: "The bountiful lands of the New World have provided many treasures to our country. One of the most important discoveries is that of the strange, exotic plants cultivated as food and spices by the natives of those lands. Growing those crops in our fields will provide our population with the dietary variety and novelty they crave." #NEW
 #new_world_crops_desc: "The bountiful lands of the New World have provided many treasures to our country, one of the biggest ones is the discovery of strange and exotic plants raised by the natives of those lands as food and spices. The introduction of those crops into our fields will provide our population with the variety and novelty they crave." #OLD ENG
 rgo_size_advance_discovery: "Tecniche di Estrazione Avanzate"
 #rgo_size_advance_discovery_desc: "Diverse scoperte di minerali e invenzioni di nuovi strumenti hanno consentito una raccolta più efficiente delle risorse e l'accelerazione delle linee di produzione." #OLD ITA
 rgo_size_advance_discovery_desc: "The discovery of new minerals and the invention of new tools has resulted in more efficient resource gathering and production line acceleration." #NEW
 #rgo_size_advance_discovery_desc: "Various discoveries of minerals and inventions of new tools have given way to more efficient resource gathering and the acceleration of production lines." #OLD ENG
 printing_press_advance: "Macchina da Stampa"
 #printing_press_advance_desc: "La diffusione delle tecniche di stampa nel corso del secolo attuale ha favorito la diffusione della conoscenza e facilitato lo scambio di informazioni, accelerando la riproduzione di importanti manoscritti." #OLD ITA
 printing_press_advance_desc: "The popularization of printing techniques this century has resulted in the wider spread of knowledge, as well as easier exchange of information, by speeding up the duplication of important manuscripts." #NEW
 #printing_press_advance_desc: "The popularization of printing techniques during the current century, has given way to the spread of knowledge as well as the easier exchange of information by speeding up the duplication of important manuscripts." #OLD ENG
 gov_reform_discovery_a: "Prima Riforma Amministrativa"
 #gov_reform_discovery_a_desc: "Il nostro popolo si trova alle soglie di una nuova era. Per sfruttare le nostre capacità interne, dobbiamo adeguare il nostro governo e perfezionare il nostro dominio amministrativo." #OLD ITA
 gov_reform_discovery_a_desc: "Our people stand at the threshold of a new era. In order to harness our internal capabilities, we must adapt our government and refine our administrative domain." #NEW
 #gov_reform_discovery_a_desc: "Our people stand at the gate of a new era. In order to harness our internal capabilities, we must adapt our government and refine our administrative domain." #OLD ENG
 government_size_discovery: "Capacità Amministrativa Iniziale"
 #government_size_discovery_desc: "Il nostro dominio comprende molti settori amministrativi e, man mano che lo espandiamo, dobbiamo apportare le modifiche necessarie al nostro governo per tenere conto di questa crescita. " #OLD ITA
 government_size_discovery_desc: "Our domain consists of many administrative sectors, and as we expand it, we must make the necessary adjustments to our government to account for this growth. " #NEW
 #government_size_discovery_desc: "Our domain consists of many administrative sectors and as we expand it, we must make the necessary adjustments to our government to account for this growth. " #OLD ENG
 power_projection_advance_4: "Influenza Esterna Dominante"
 #power_projection_advance_4_desc: "La nostra presenza ai tavoli diplomatici crea un'atmosfera di grandezza e prestigio. La nostra voce e la nostra influenza saranno ascoltate da tutti coloro con cui interagiamo." #OLD ITA
 power_projection_advance_4_desc: "Our presence at the diplomatic tables always conveys an air of grandeur and prestige. Our voice and influence shall resonate with all those with whom we engage." #NEW
 #power_projection_advance_4_desc: "Our presence at the diplomatic tables weaves an air of grandeur and prestige. Our voice and influence shall be heard by all those with whom we engage." #OLD ENG
 regulate_court_procedures: "Procedure Giudiziarie Regolamentate"
 #regulate_court_procedures_desc: "Applicando un rigido regime e una routine alle nostre procedure di udienza, saremo in grado di ridurre eventuali costi eccessivi e gestire una corte parsimoniosa ed efficiente." #OLD ITA
 regulate_court_procedures_desc: "By applying a strict regimen and routine to our operations, we will reduce any potential excess cost, and run a frugal and efficient court." #NEW
 #regulate_court_procedures_desc: "By applying a strict regiment and routine to our hall procedures, we will be able to reduce any potential excess cost and run a frugal and efficient court." #OLD ENG
 pike_and_shot_advance: "Picca e Moschetto"
 #pike_and_shot_advance_desc: "Si è iniziato a sviluppare un nuovo tipo di guerra, con la generalizzazione dei picchieri che formano un quadrato, mentre gli archibugieri si dispiegano ai lati e sul fronte e cercano riparo dietro o all'interno del quadrato nel caso in cui la formazione entri in combattimento ravvicinato." #OLD ITA
 pike_and_shot_advance_desc: "A new type of warfare has emerged on the battlefield: Pikemen form a defensive square, while arquebusiers fan out to the sides and front, retreating behind or inside the square in case the formation enters close combat." #NEW
 #pike_and_shot_advance_desc: "A new type of warfare has started to be developed, with the generalization of pikemen forming a square, while arquebusiers fan out to the sides and front, and seek cover behind or inside the square in case the formation enters close combat." #OLD ENG
 lazaretto_advance: "$lazaretto$"
 lazaretto_advance_desc: "$lazaretto_desc$"
 pest_house_advance: "$pest_house$"
 pest_house_advance_desc: "$pest_house_desc$"
 naval_morale_advance_2: "Tecniche di Navigazione"
 #naval_morale_advance_2_desc: "I nostri marinai si stanno abituando a viaggi più lunghi, utilizzando una nuova serie di tecniche e strumenti, come le bussole a secco, che migliorano la loro padronanza della navigazione." #OLD ITA
 naval_morale_advance_2_desc: "Our sailors are becoming accustomed to longer journeys, using a new set of techniques and instruments, such as dry compasses, to improve their mastery of navigation." #NEW
 #naval_morale_advance_2_desc: "Our sailors are getting used to longer travels, using a new set of techniques and instruments, such as dry compasses, that improve their mastery of navigation." #OLD ENG
 confessionalism_advance: "Confessionalismo"
 #confessionalism_advance_desc: "Con l'emergere di una miriade di interpretazioni diverse di ciò che dovrebbe essere la fede, è cresciuto l'interesse sia delle autorità religiose che di quelle secolari a definire chiaramente le forme delle loro specifiche confessioni, imponendo le loro regole e opinioni particolari su tutti gli aspetti della fede e della vita." #OLD ITA
 confessionalism_advance_desc: "There are a myriad of different interpretations of what the Faith should be, and as such, there has been an increased interest among religious and secular authorities alike to clearly define the methodology of their specific confessions, enforcing their particular rules and views on all aspects of faith and life." #NEW
 #confessionalism_advance_desc: "With the rise of a myriad of different interpretations of what the Faith should be, there has been an increasing interest both for religious and secular authorities alike to clearly define the shapes of their specific confessions, enforcing their particular rules and views on all aspects of faith and life." #OLD ENG
 global_trade_advance: "Commercio Globale"
 #global_trade_advance_desc: "Sin dall'antichità le merci sono state trasportate da un continente all'altro, ma oggi tutti gli scambi commerciali stanno diventando sempre più parte di una rete mondiale più ampia. Potrebbe essere ancora presto per parlare di una Economia Globale, ma sicuramente i primi semi sono stati piantati." #OLD ITA
 global_trade_advance_desc: "Goods have been moved across continents since antiquity, but all trade is now increasingly becoming part of a greater world network. It may still be early to speak of a truly global economy, but surely the first seeds have been sown." #NEW
 #global_trade_advance_desc: "Goods have been moved across continents since antiquity, but all trade is now increasingly becoming part of a greater world network. It may still be early to speak of a truly Global Economy, but surely the first seeds have been sown." #OLD ENG
 artillery_institution_advance: "Artiglieria d'Assedio"
 #artillery_institution_advance_desc: "L'invenzione della polvere da sparo nella Cina dei Song portò allo sviluppo di un nuovo dispositivo che avrebbe impiegato la sua potenza di fuoco in guerra: l'artiglieria. Il suo utilizzo rappresenta ora una minaccia per i castelli e le fortificazioni in pietra." #OLD ITA
 artillery_institution_advance_desc: "The invention of gunpowder in Sòng $CHI$ has led to the development of a new device that employs its firepower in warfare: the artillery. These weapons pose a serious threat to stone-built castles and other fortifications." #NEW
 #artillery_institution_advance_desc: "The invention of gunpowder in Song China led to the development of a new device that would employ its firepower in warfare, the artillery. Its use now poses a threat to stone-built castles and fortifications." #OLD ENG
 gov_reform_reformation_a: "Il Principe"
 #gov_reform_reformation_a_desc: "I nuovi tempi impongono ai governanti un approccio diverso per affrontare la gestione dello Stato in modo più sistematico, tenendo conto sia dei diversi ceti sociali del paese sia dei diversi attori diplomatici che li circondano." #OLD ITA
 gov_reform_reformation_a_desc: "Current events have determined that rulers need to approach the management of the state more systematically, taking into account both the different estates of the country, and the distinct diplomatic actors that surround them." #NEW
 #gov_reform_reformation_a_desc: "The new times determine that the rulers need to have a different approach to address the management of the State more systematically, taking into account both the different estates of the country and the different diplomatic actors that surround them." #OLD ENG
 power_projection_advance_3: "Ambizioni Regionali"
 #power_projection_advance_3_desc: "La capacità di un paese di proiettare il proprio potere è di vitale importanza per essere rilevanti sulla scena regionale. Imparando dagli altri, dal passato e dal presente, possiamo rendere il nostro paese famoso ovunque e sfruttare questa posizione per esercitare il nostro potere." #OLD ITA
 power_projection_advance_3_desc: "The ability to project power beyond our borders is of vital importance to maintaining relevance on the regional stage. By studying the strategies of great powers past and present, we can elevate our nation's prestige everywhere and leverage that reputation to exert power." #NEW
 #power_projection_advance_3_desc: "The ability of a country to project its power is of vital importance in order to be relevant in the Regional Stage. By learning from others, past and present, we can make our country well-known everywhere and use that position to exert power." #OLD ENG
 confessional_court: "Corte Confessionale"
 #confessional_court_desc: "Le spese di corte possono facilmente diventare esorbitanti e mandare in bancarotta anche il paese più ricco. Per raggiungere un buon equilibrio tra sfarzo e spese ragionevoli, possiamo adottare piccoli accorgimenti che riducono tali costi senza intaccare la magnificenza della nostra corte." #OLD ITA
 confessional_court_desc: "Court expenses can easily bankrupt even the richest nation. In order to achieve a good balance between luxury and sensible expenses, we can adopt small measures to reduce those costs without reducing the magnificence of our court." #NEW
 #confessional_court_desc: "Court expenses can easily run crazy and bankrupt the richest country. In order to achieve a good balance between lavishness and sensible expense, we can adopt small tricks that reduce those costs without reducing the magnificence of our court." #OLD ENG
 rgo_size_advance_reformation: "Filatoio"
 #rgo_size_advance_reformation_desc: "Man mano che apprendiamo metodi nuovi e migliori per l'estrazione delle risorse, la nostra produzione può aumentare vertiginosamente, rendendoci più ricchi nel processo." #OLD ITA
 rgo_size_advance_reformation_desc: "As we learn new and better methods of resource extraction, our production will skyrocket, making us richer in the process!" #NEW
 #rgo_size_advance_reformation_desc: "As we learn new and better methods of extraction of resources, our production can skyrocket, making us richer in the process." #OLD ENG
 food_advance_reformation: "Agricoltura di Mercato"
 #food_advance_reformation_desc: "È possibile introdurre colture più recenti e migliori nei nostri campi per ottenere una maggiore produttività. Selezionando varietà migliori o sostituendole con prodotti stranieri, possiamo facilmente aumentare la nostra produzione alimentare." #OLD ITA
 food_advance_reformation_desc: "New and improved crops can be introduced to increase agricultural productivity. Whether through selective breeding of existing varieties or importing superior foreign cultivars, we can significantly boost our food production." #NEW
 #food_advance_reformation_desc: "Newer and better crops can be introduced in our fields for better productivity. Either by selecting better types or by replacing them with foreign products, we can easily make our food production bust." #OLD ENG
 scientific_experimentation: "Sperimentazione Scientifica"
 #scientific_experimentation_desc: "Le cose accadono per una ragione. Comprendendo il motivo che sta dietro ogni cosa, possiamo imparare cosa aspettarci quando si verificano situazioni simili." #OLD ITA
 scientific_experimentation_desc: "Things happen for a reason. By understanding the explanation behind everything, we can learn what to expect when similar situations arise." #NEW
 #scientific_experimentation_desc: "Things happen for a reason. By understanding the reason behind everything, we can learn what to expect when similar situations arise." #OLD ENG
 banking_advance: "Settore Bancario"
 #banking_advance_desc: "Il prestito di denaro è antico quanto il mondo, ma non è privo di rischi. Possiamo istituzionalizzare tali pratiche e garantire che il denaro venga prestato in modo controllato ed equo." #OLD ITA
 banking_advance_desc: "Moneylending is old as time, but it is not without risks. We can minimize said dangers if we institutionalize those practices and see that money is loaned under controlled and fair stipulations." #NEW
 #banking_advance_desc: "Money lending is old as time, but is not without risks. We can institutionalize those practices and have money be lent under controlled and fairways." #OLD ENG
 trade_companies_advance: "Compagnie Commerciali"
 #trade_companies_advance_desc: "È sempre stato chiaro che il denaro fa girare il mondo. Con un numero sempre maggiore di prodotti provenienti da terre lontane, le società commerciali specializzate nella loro sfruttamento e distribuzione sono destinate a generare grandi profitti." #OLD ITA
 trade_companies_advance_desc: "It has always been plain that money makes the world go 'round. With desirable new products constantly being discovered in distant lands, trade companies that specialize in distributing them are sure to reap enormous profits." #NEW
 #trade_companies_advance_desc: "It has always been clear that money makes the world go round. With even more products being found in farther away lands, trade companies specialized in exploiting and distributing them are sure to bring about great profits." #OLD ENG
 naval_morale_advance_3: "Spedizioni Oltreoceano"
 #naval_morale_advance_3_desc: "La recente diffusione del commercio marittimo a lungo raggio ha abituato i nostri marinai a trascorrere lunghi periodi in mare, rendendoli resistenti ai suoi effetti negativi." #OLD ITA
 naval_morale_advance_3_desc: "The recent rise of long-range overseas commerce has accustomed our sailors to being at sea for long periods of time, making them resistant to the adverse effects of long journeys." #NEW
 #naval_morale_advance_3_desc: "The recent prevalence of long-range overseas commerce has made our sailors used to being at sea for long periods of time, making them resistant to its adverse effects." #OLD ENG
 road_advance_1: "Rete Stradale"
 #road_advance_1_desc: "L'importanza del commercio sta diventando sempre più rilevante, così come la creazione di reti stradali più sviluppate e complesse per facilitare e aumentare la circolazione di persone e merci." #OLD ITA
 road_advance_1_desc: "The importance of trade and commerce is becoming more and more relevant, and so is the establishment of more complex road networks to facilitate and increase the movement of people and goods." #NEW
 #road_advance_1_desc: "The importance of trade and commerce is becoming more and more relevant, and so is the establishment of more developed and complex road networks to facilitate and increase the movement of people and goods." #OLD ENG
 power_projection_advance_2: "Ambizioni Sovranazionali"
 #power_projection_advance_2_desc: "Sebbene le vecchie idee sulla creazione di imperi siano ancora presenti nelle menti dei governanti di questa epoca, essi hanno anche iniziato a cristallizzare nuovi modi per affermare il proprio dominio su altri paesi e popoli." #OLD ITA
 power_projection_advance_2_desc: "Although the old ideas about forging empires still linger in the minds of the rulers in this age, they have also begun to crystallize new ways of establishing their dominance over other countries and peoples." #NEW
 #power_projection_advance_2_desc: "Although the old ideas about forging empires are still present in the minds of the rulers of this Age, they have also begun to crystallize new ways of establishing their dominance over other countries and peoples." #OLD ENG
 renaissance_advance: "Rinascimento"
 #renaissance_advance_desc: "Le ondate di pensiero innovativo e le scoperte che permeano il nostro settore devono essere sfruttate e utilizzate se vogliamo rimanere all'avanguardia nell'innovazione tecnologica. " #OLD ITA
 renaissance_advance_desc: "The waves of innovative thought and discoveries that permeate our realm must be harnessed and utilized if we are to remain at the forefront of technological innovation." #NEW
 #renaissance_advance_desc: "The waves of innovative thought and discoveries that permeate our realm must be harnessed and utilized if we are to stay at the forefront of technological innovation. " #OLD ENG
 professional_armies_advance: "Eserciti Professionali"
 #professional_armies_advance_desc: "La modernizzazione dei nostri eserciti dipende in gran parte dal mantenimento dei nostri centri di reclutamento e organizzazione. Dobbiamo impegnarci per preservare un'organizzazione militare chiara e solida, eliminando sprechi e ridondanze." #OLD ITA
 professional_armies_advance_desc: "The modernization of our armies is largely dependent upon the maintenance of our recruitment and organization centers. We must strive towards preserving a clear and robust military organization, cutting waste and redundancy." #NEW
 #professional_armies_advance_desc: "The modernization of our armies is largely dependent upon the maintenance of our recruitment and organization centers. We must strive towards preserving a clear and robust military organization, cutting wastes and redundancies." #OLD ENG
 gunpowder_advance: "Polvere da Sparo"
 gunpowder_advance_desc: "L'uso della polvere da sparo sul campo di battaglia avrà sicuramente un impatto positivo sulle nostre prestazioni e ci consentirà di eccellere negli scontri militari."
 drill_army_advance: "Esercitazione Militare"
 #drill_army_advance_desc: "Non dipenderemo più da uomini inesperti e reclutati alla bell'e meglio. Se vogliamo difendere i nostri confini e sconfiggere i nostri rivali, dobbiamo condurre esercitazioni regolari e organizzate." #OLD ITA
 drill_army_advance_desc: "No longer shall we depend upon untrained levied men. If we are to defend our borders and smite our rivals, we must conduct regular and organized drills." #NEW
 #drill_army_advance_desc: "No longer shall we depend upon untrained and levied men. If we are to defend our borders and smite our rivals, we must conduct regular and organized drills." #OLD ENG
 renaissance_development: "Trattati Accademici"
 #renaissance_development_desc: "L'era del pensiero, delle arti e della scienza porterà con sé nuove ondate di scoperte e invenzioni, consentendoci di migliorare la nostra adozione delle istituzioni straniere." #OLD ITA
 renaissance_development_desc: "This era of thought, arts, and science will bring forth new waves of discoveries and inventions, allowing us to optimize our adoption of foreign institutions." #NEW
 #renaissance_development_desc: "The era of thought, arts, and science will bring forth new waves of discoveries and inventions, allowing us to improve our adoption of foreign institutions." #OLD ENG
 art_school_advance: "Scuole d'Arte"
 #art_school_advance_desc: "La dedizione all'arte e la raffinatezza dei nostri artisti devono essere coltivate adeguatamente attraverso la creazione di scuole d'arte. Un forum in cui i talenti possano iniziare la loro carriera e portare gloria e splendore al nostro nome!" #OLD ITA
 art_school_advance_desc: "Dedication to the aesthetic crafts, and the refinement of our artists, must be properly cultivated by the establishment of art schools. Each shall be an incubator for gifted individuals to commence their artistic careers and bring glory and splendor to our nation!" #NEW
 #art_school_advance_desc: "The dedication to the artistic craft and the refinement of our artists must be properly cultivated by the construction of art schools. A forum for gifted individuals to commence their career and bring glory and splendor to our name!" #OLD ENG
 pound_lock_canals_advance: "Canali con Chiuse"
 #pound_lock_canals_advance_desc: "La trasformazione del territorio al fine di introdurre benessere, accesso al cibo e una migliore circolazione delle merci è un'impresa ben nota al nostro popolo. L'invenzione di cancelli speciali chiamati  'Porte a Mitria' contribuirà a fornire al nostro popolo i mezzi necessari per crescere e prosperare." #OLD ITA
 pound_lock_canals_advance_desc: "We have carved into the very face of Earth in order to gain access to food, affluence, and better circulation of goods. The invention of special gates, called 'Mitre Gates', will assist us in providing the necessities for our people to grow and prosper." #NEW
 #pound_lock_canals_advance_desc: "The carving of the Earth in order to introduce affluence, access to food and the better circulation of goods is a known endeavor to our people. The invention of special gates called 'Mitre Gates' will assist in providing the necessities for our people to grow and prosper." #OLD ENG
 a_renaissance_janissaries_advance: "$a_renaissance_janissaries$"
 a_renaissance_janissaries_advance_desc: "$a_renaissance_janissaries_desc$"
 a_discovery_janissaries_advance: "$a_discovery_janissaries$"
 a_discovery_janissaries_advance_desc: "$a_discovery_janissaries_desc$"
 a_reformation_janissaries_advance: "$a_reformation_janissaries$"
 a_reformation_janissaries_advance_desc: "$a_reformation_janissaries_desc$"
 a_absolutism_janissaries_advance: "$a_absolutism_janissaries$"
 a_absolutism_janissaries_advance_desc: "$a_absolutism_janissaries_desc$"
 a_revolutions_janissaries_advance: "$a_revolutions_janissaries$"
 a_revolutions_janissaries_advance_desc: "$a_revolutions_janissaries_desc$"
 nomadic_legacy: "Eredità Nomade"
 #nomadic_legacy_desc: "La nostra gente è nata in sella, libera di vagare per il mondo senza bisogno di mettere radici." #OLD ITA
 nomadic_legacy_desc: "Our people are born in the saddle, free to roam the world without the need to put down roots." #NEW
 #nomadic_legacy_desc: "Our people are born on the saddle, free to roam the world without the need to establish roots." #OLD ENG
 siberian_frontier: "Frontiera Siberiana"
 #siberian_frontier_desc: "Le lontane lande desolate della Siberia ci chiamano. Dobbiamo aprirci una strada e lasciare che i nostri Cosacchi avanzino e conquistino terre per il popolo Russo." #OLD ITA
 siberian_frontier_desc: "The distant wastes of Siberia call to us. We must clear a path to its frozen heart, and let our Cossacks go forth and claim land for the $RUS_ADJ$ people." #NEW
 #siberian_frontier_desc: "The distant wastes of Siberia call to us. We must clear a path and let our Cossacks go forth and bring land for the Russian people." #OLD ENG
 ostrog_advance: "$ostrog$"
 ostrog_advance_desc: "$ostrog_desc$"
 janissaries_advance: "Giannizzeri"
 #janissaries_advance_desc: "I Giannizzeri sono l'élite dei nostri eserciti, addestrati fin dall'infanzia e temprati dalla disciplina." #OLD ITA
 janissaries_advance_desc: "Janissaries are the elite units of our armies, trained since childhood and forged through discipline." #NEW
 #janissaries_advance_desc: "Janissaries are the elite of our armies, trained since childhood and forged through discipline." #OLD ENG
 slave_raiding_wars: "Guerre di Razzia per gli Schiavi"
 #slave_raiding_wars_desc: "Gli schiavi sono la pietra angolare della nostra economia. Attaccare e saccheggiare i nostri vicini per catturare la loro popolazione e ridurla in schiavitù è quindi l'aria che mantiene in vita il nostro Paese." #OLD ITA
 slave_raiding_wars_desc: "Slaves are the cornerstone of our economy. Attacking and raiding our neighbors to capture their population and enslave them is therefore the lifeblood of our country." #NEW
 #slave_raiding_wars_desc: "Slaves are the cornerstone of our economy. Attacking and raiding our neighbors to capture their population and enslave them is thus the air that keeps our country alive." #OLD ENG
 trade_caravans: "Carovane Commerciali"
 #trade_caravans_desc: "Fin dall'antichità, rotte commerciali redditizie hanno attraversato i nostri territori. La nostra gente è abituata a interagire con lunghe carovane di mercanti che commerciano merci provenienti da terre lontane." #OLD ITA
 trade_caravans_desc: "Lucrative trade routes have crossed our territories since ancient times. Our people are used to interacting with long caravan trains of merchants trading in goods from lands far away." #NEW
 #trade_caravans_desc: "Lucrative trade routes have crossed our territories since ancient times. Our people are used to interacting with long caravans of merchants trading in goods from lands far away." #OLD ENG
 #the_sahel_trade: "Il Commercio nel Sahel" #OLD ITA
 the_sahel_trade: "The $sahel_region$ Trade" #NEW
 #the_sahel_trade: "The Sahel Trade" #OLD ENG
 #the_sahel_trade_desc: "Da secoli le carovane commerciano tra il Sahel e il Mediterraneo, e i benefici di tale commercio superano di gran lunga i pericoli legati all'attraversamento delle sabbie roventi del Sahara." #OLD ITA
 the_sahel_trade_desc: "Caravans have been trading between the $sahel_region$ and the Mediterranean for ages, the benefits from this trade greatly outweighing the perils of crossing the burning sands of the Sahara." #NEW
 #the_sahel_trade_desc: "Caravans have been trading between the Sahel and the Mediterranean for ages, the benefits from such trade greatly outweighing the perils of having to cross the burning sands of the Sahara." #OLD ENG
 #rudimentary_coastal_ship_repair: "Riparazioni Improvvisate" #OLD ITA
 rudimentary_coastal_ship_repair: "Makeshift Reapirs" #NEW
 #rudimentary_coastal_ship_repair: "Makeshift Reparations" #OLD ENG
 #rudimentary_coastal_ship_repair_desc: "È inevitabile che le navi si deteriorino durante la navigazione. Il battito delle onde e l'azione corrosiva dell'acqua salata si accumulano nel tempo e danneggiano sia lo scafo che le cime, indipendentemente dalla qualità costruttiva dell'imbarcazione. Per ovviare a questo problema, i marinai sono abituati a eseguire una manutenzione regolare della loro nave per mantenerla in condizioni ottimali e, in caso di danni più gravi, anche per riuscire a mantenerla a galla fino al raggiungimento di un porto sicuro." #OLD ITA
 rudimentary_coastal_ship_repair_desc: "It is unavoidable that ships deteriorate while sailing. The beating of the waves and the bite of saltwater accumulate over time, damaging both the hull and ropes no matter how well-constructed the vessel. To alleviate this, sailors are used to performing regular maintenance on their ships to keep them in prime condition, and when more significant damage is received, even being able to keep it afloat until they reach a safe harbor." #NEW
 #rudimentary_coastal_ship_repair_desc: "It is unavoidable that ships deteriorate while sailing. The beating of the waves and the bite of salt water accumulate over time and damage both the hull and ropes no matter how well constructed the vessel. To alleviate this, sailors are used to having to perform regular maintenance on their ship to keep it working in prime condition, and when more significant damage is received even being able to keep it afloat until they reach a safe harbor." #OLD ENG
 religious_icon_power_advance: "Icone Religiose"
 religious_icon_power_advance_desc: "Le icone sono la rappresentazione fisica della nostra fede, raffigurazioni sacre di figure sante progettate per ispirare timore reverenziale e devozione in coloro che le contemplano."
 scientific_mapping_advance: "Mappatura Cartografica"
 #scientific_mapping_advance_desc: "I recenti progressi nei campi della geografia, della cartografia e della mappatura consentono di creare rappresentazioni più accurate delle masse terrestri e delle caratteristiche naturali, sia in termini di dimensioni relative che di posizioni esatte." #OLD ITA
 scientific_mapping_advance_desc: "Recent improvements in the sciences of geography and cartography have allowed for more accurate depictions of land masses and natural features, both in terms of their relative sizes and their exact positions." #NEW
 #scientific_mapping_advance_desc: "The recent improvements in the fields and sciences of geographic knowledge, cartography, and mapping allow for the creation of more accurate depictions of land masses and natural features, both in terms of their relative sizes and their exact positions." #OLD ENG
 integrate_area_advance: "Migliore Integrazione"
 #integrate_area_advance_desc: "CLa nostra amministrazione sta migliorando e, di conseguenza, possiamo permetterci la manodopera necessaria per integrare contemporaneamente nel Paese porzioni di territorio più estese." #OLD ITA
 integrate_area_advance_desc: "Our administration is improving, and as such, we can afford the manpower to integrate larger sections of land into our country at once." #NEW
 #integrate_area_advance_desc: "Our administration is improving and as such we can afford the manpower to integrate larger chunks of land into the country at once." #OLD ENG
 maritime_advance_age_2: "Flotte Commerciali"
 #maritime_advance_age_2_desc: "Con la crescita del commercio aumenta anche la necessità di trasportare quantità maggiori di merci in modo più rapido ed efficiente. Di conseguenza, chi investe nel commercio marittimo non baderà a spese per acquistare la flotta più grande che può permettersi." #OLD ITA
 maritime_advance_age_2_desc: "As commerce grows, so does the need to more quickly and efficiently transport greater quantities of goods. As such, those invested in maritime trade will spare no expense in building the bigger fleets they can afford." #NEW
 #maritime_advance_age_2_desc: "As commerce grows, so does the need to more quickly and efficiently transport greater quantities of goods. As such, those invested in maritime trade will spare no expense in getting the bigger fleet they can afford." #OLD ENG
 maritime_advance_age_3: "Flotte di Esplorazione"
 #maritime_advance_age_3_desc: "Man mano che la conoscenza del mondo e delle nuove terre si diffonde, cresce anche il bisogno di saperne sempre di più. Dai mari lontani a est alle nuove coste a ovest, le onde da solcare sono aumentate e con esse anche la necessità di una flotta più grande per navigarle." #OLD ITA
 maritime_advance_age_3_desc: "As our knowledge of the world grows, so does the need to learn even more about it. From the far seas to the east to the new coasts in the west, the length at which we must sail has increased, and thus so has the need for a bigger fleet." #NEW
 #maritime_advance_age_3_desc: "As knowledge of the world and new lands spreads, so does the need to know even more about it. From the far seas on the east to the new coasts on the west, the waves to sail have increased, and thus so has the need for a bigger fleet to sail them." #OLD ENG
 maritime_advance_age_4: "Flotte Globali"
 #maritime_advance_age_4_desc: "Con le recenti scoperte avvenute ovunque negli ultimi secoli, sembra che il mondo sia diventato più piccolo anziché più grande. Paesi che fino ad ora non avevano alcun contatto tra loro intrattengono invece costanti relazioni diplomatiche e commerciali. Di conseguenza, sono necessarie flotte più grandi e migliori per poter mantenere tutti questi collegamenti con l'estero." #OLD ITA
 maritime_advance_age_4_desc: "Given the advances of the last century, it seems like the world has become smaller rather than bigger. Countries that had no contact until now are instead engaging in constant diplomatic and commercial relations. As a result, bigger and better fleets are needed to be able to maintain all those overseas connections." #NEW
 #maritime_advance_age_4_desc: "With the recent discoveries everywhere in the last centuries, it seems like the world has become smaller rather than bigger. Countries that had no contact until now are instead engaging in constant diplomatic and commercial relations. As a result, bigger and better fleets are needed to be able to maintain all those overseas connections." #OLD ENG
 maritime_advance_age_5: "Convogli"
 #maritime_advance_age_5_desc: "Con l'espansione del commercio marittimo, che trasporta merci da terre sempre più lontane e in quantità sempre maggiori, aumenta la necessità di un flusso più costante. L'organizzazione di flotte commerciali di convogli consente una circolazione stabile delle navi mercantili." #OLD ITA
 maritime_advance_age_5_desc: "As maritime trade expands, with our ships ferrying goods back and forth in greater quantities and to more distant shores than ever before, the need to maintain a consistent flow of commerce also increases. Organizing convoy trade fleets will allow a more stable circulation of trade ships." #NEW
 #maritime_advance_age_5_desc: "As maritime trade expands, carrying back and forth goods from further away lands and in greater quantity, the need for a more constant flow of it increases. Organizing convoy trade fleets allows a stable circulation of trade ships." #OLD ENG
 maritime_advance_age_6: "Convogli Armati"
 maritime_advance_age_6_desc: "I convogli commerciali sono ovviamente un obiettivo molto allettante per qualsiasi pirata. Navi piene zeppe di merci e monete sono un bottino che pochi si lascerebbero sfuggire. Pertanto, è fondamentale dotare tali convogli commerciali di armamenti difensivi per scoraggiare tali attacchi. Accompagnare le flotte commerciali con fregate o altre imbarcazioni armate ne garantisce la sicurezza."
 coastal_trade_routes_advance: "Espansione Costiera" 
 #coastal_trade_routes_advance_desc: "Il modo più sicuro per qualsiasi nave di navigare è farlo vicino alla costa. A meno che non debbano effettivamente attraversare il mare, non c'è alcun bisogno reale per loro di allontanarsi dalla costa e perdere la sua protezione, ed è comunque più veloce che viaggiare via terra. Pertanto, favorire un flusso costante di navi lungo le nostre coste consentirà una più facile circolazione di merci e persone." #OLD ITA
 coastal_trade_routes_advance_desc: "The safest way for any ship to sail is to do it close to the coast. Unless they actually have to cross the sea, there is no real need for our ships to sail away from the protective coastline, and it is still quicker traveling by ship than by land. As such, maintaining a constant flow of ships along our coasts will allow for easier circulation of goods and people." #NEW
 #coastal_trade_routes_advance_desc: "The safest way for any ship to sail is to do it close to the coast. Unless they actually have to cross the sea, there's no real need for them to sail away from the coast and lose its protection, and it is still quicker than going by land. As such, fomenting a constant flow of ships along our coasts will allow for easier circulation of goods and people." #OLD ENG
 exploration_maintenance_advance: "Costruzione Robusta"
 #exploration_maintenance_advance_desc: "Il fattore chiave nella costruzione di una nave è la sua capacità di resistere alle intemperie e al moto ondoso. Sviluppando metodi di costruzione navale più robusti, possiamo garantire che le nostre imbarcazioni possano navigare per periodi di tempo più lunghi." #OLD ITA
 exploration_maintenance_advance_desc: "The key factor when building a ship is its capacity for resisting inclement weather and the relentless pounding of waves. By developing sturdier methods of ship construction, we can ensure that our vessels can sail for longer periods of time." #NEW
 #exploration_maintenance_advance_desc: "The key factor when building a ship is its capacity for resisting the inclemency of the weather and the beating of the waves. By developing sturdier methods of ship construction we can ensure that our vessels can sail for longer periods of time." #OLD ENG
 global_trade_routes_advance: "Rotte Commerciali Oltremare"
 #global_trade_routes_advance_desc: "Man mano che il mondo è diventato più grande grazie alle nuove scoperte, è anche diventato più piccolo grazie alle nuove e più frequenti rotte commerciali. Con le navi che trasportano costantemente merci e persone da e verso terre lontane, quelle terre sembrano effettivamente più vicine di prima." #OLD ITA
 global_trade_routes_advance_desc: "The world has become larger, thanks to so many new discoveries, but it has also grown smaller with the proliferation of international trade routes. With ships constantly carrying goods and people to and from far away lands, those distant shores actually seem closer than before." #NEW
 #global_trade_routes_advance_desc: "As the world has become bigger with new discoveries, it also has become smaller with new and more frequent trade routes. With ships constantly bringing goods and people to and from far away lands, those lands seem actually closer than before." #OLD ENG
 #safe_exploration_techniques_advance: "Conoscenza Accumulata" #OLD ITA
 safe_exploration_techniques_advance: "Lessons of Exploration" #NEW
 #safe_exploration_techniques_advance: "Accumulated Knowledge" #OLD ENG
 #safe_exploration_techniques_advance_desc: "Avventurarsi nell'ignoto fa sempre paura, ma al giorno d'oggi sono pochi i luoghi che sono davvero sconosciuti. Nonostante molti luoghi in tutto il mondo non siano ancora stati esplorati completamente, sono comunque già noti ed esistono informazioni sufficienti su come raggiungerli. Basandoci sulle conoscenze di chi ci ha preceduto, possiamo avventurarci in territori inesplorati come mai prima d'ora." #OLD ITA
 safe_exploration_techniques_advance_desc: "Heading into the unknown is always scary, but nowadays, there are few places that are truly undiscovered. While many places around the world have still not been fully explored, they are nonetheless known to us, and we have the knowledge and experience to reach them. With the wealth of knowledge our explorers have collected over their many journeys, we can confidently venture into uncharted territory." #NEW
 #safe_exploration_techniques_advance_desc: "Going into the unknown is always scary, but nowadays, there are few places that are truly unknown. Despite many places around the world still not being fully explored, they are nonetheless already known, and there is enough information about how to get there. By building upon the knowledge of people that came before us, we can venture into uncharted territory like never before." #OLD ENG
 imperial_ambitions: "Ambizioni Imperiali"
 #imperial_ambitions_desc: "Non è un segreto che i grandi imperi del passato siano fonte di ispirazione per epopee e poemi, sempre guardati con stupore e ammirazione. Se vogliamo suscitare la stessa reazione nei confronti del nostro Paese, dobbiamo aspirare alla stessa grandezza." #OLD ITA
 imperial_ambitions_desc: "The great empires of the past are a source of inspiration for artists and poets alike, always spoken of with awe and admiration. If we want to generate the same reaction towards our own country, we should aspire to the same grandeur." #NEW
 #imperial_ambitions_desc: "It is no secret that the great empires of the past are a source of inspiration for epics and poems, always looked at with awe and admiration. If we want to generate the same reaction towards our own country we need to aspire to the same grandeur." #OLD ENG
 letters_of_marque: "Lettere di Marca"
 #letters_of_marque_desc: "La pirateria è un atto riprovevole. Ladri senza scrupoli che cercano di trarre profitto dalla sofferenza altrui. Autorizzare le navi a razziare i nostri nemici, tuttavia, è tutta un'altra questione." #OLD ITA
 letters_of_marque_desc: "Piracy is an appalling act. They are naught but worthless thieves looking to profit from the suffering of others! Formally authorizing ships to raid our enemies, however, is another matter entirely, and could be extremely profitable for us." #NEW
 #letters_of_marque_desc: "Piracy is an appalling act. Worthless thieves looking to profit from the suffering of others. Authorizing ships to raid our enemies, however, is another matter entirely." #OLD ENG
 sturdy_privateers: "Navi Corsare Robuste"
 #sturdy_privateers_desc: "I corsari sono sempre in prima linea. Se vogliamo sfruttarne appieno il potenziale, non possiamo permettere che vengano affondati dopo i primi colpi di cannone. Farli navigare su navi robuste sarà vantaggioso nel lungo periodo." #OLD ITA
 sturdy_privateers_desc: "Privateers are always in the line of fire. If we wish to utilize their full potential, we must ensure they are not sunk after the first round of cannon fire! Making sure they only sail on the sturdiest vessels will be beneficial to us in the long run — and to the privateers themselves, of course, as they will live longer." #NEW
 #sturdy_privateers_desc: "Privateers are always in the line of fire. If we want to use them to their fullest potential, we cannot allow them to get sunk after the first rounds of cannon impacts. Having them sail on sturdy ships will be beneficial in the long run." #OLD ENG
 #rgo_build_time_advance: "Metodi di Costruzione Rinascimentali" #OLD ITA
 rgo_build_time_advance: "$renaissance$ Building Methods" #NEW
 #rgo_build_time_advance: "Renaissance Building Methods" #OLD ENG
 #rgo_build_time_advance_desc: "I grandi edifici e le grandi opere infrastrutturali del passato sono ancora lì, a testimonianza del passato. È innegabile che le tecniche di costruzione utilizzate per progettarli e realizzarli fossero sofisticate e ben sviluppate. C'è ancora molto che possiamo imparare studiandoli." #OLD ITA
 rgo_build_time_advance_desc: "The great edifices and grand statues erected in the past still stand proudly. It is undeniable that the construction techniques used to design and erect them were sophisticated and well-developed. There is still much we can learn from studying them." #NEW
 #rgo_build_time_advance_desc: "The great buildings and infrastructure projects of the past still stand proudly. It is undeniable that the construction techniques used to design and erect them were sophisticated and well-developed. There is still much we can learn from studying them." #OLD ENG
 arts_academy_advance: "$arts_academy$"
 arts_academy_advance_desc: "L'arte è il respiro vitale dell'umanità e ciò che trasforma il mondo da un'esistenza insipida in una tela vibrante piena di meraviglie e possibilità. Dobbiamo promuovere una maggiore curiosità artistica tra la nostra gente."
 metallurgy: "Metallurgia"
 #metallurgy_desc: "L'arte della metallurgia, ovvero la capacità di manipolare e lavorare diversi metalli, è uno dei fattori chiave che giustificano lo sviluppo di qualsiasi civiltà avanzata. Essendo di gran lunga superiori in termini di capacità rispetto alla pietra, gli strumenti e le armi in metallo consentono una maggiore efficienza dei lavoratori e delle truppe." #OLD ITA
 metallurgy_desc: "Metallurgy, the art of manipulating and working metal, stands as one of the defining capabilities of advanced civilization. Metal tools and weapons are far superior than their stone counterparts, enabling both workers and soldiers to operate with better efficiency." #NEW
 #metallurgy_desc: "The art of metallurgy, or the ability to manipulate and work with different metals, is one of the key factors that justify the development of any advanced civilization. Being way superior in its capabilities compared to simpler stone, metal tools and weapons allow for more efficient workers and troops." #OLD ENG
 supply_depot_advance_age_2_renaissance: "Depositi di Rifornimenti"
 #supply_depot_advance_age_2_renaissance_desc: "Nessun esercito può sopravvivere senza rifornimenti. La creazione di depositi permanenti dedicati alla loro fornitura consente un rifornimento continuo delle linee di approvvigionamento, mantenendo i nostri eserciti sempre al massimo delle loro prestazioni." #OLD ITA
 supply_depot_advance_age_2_renaissance_desc: "No army can survive without supplies. Establishing permanent supply depots dedicated to providing for our fighting forces allows for a continuous feeding of the supply lines, keeping our armies always in peak condition." #NEW
 #supply_depot_advance_age_2_renaissance_desc: "No army can survive without supplies. The establishment of permanent supply depots dedicated to providing them allows for a continuous feed of the supply lines, keeping our armies always at the peak of their performance." #OLD ENG
 supply_depot_advance_age_3_discovery: "Depositi dell'Esercito"
 #supply_depot_advance_age_3_discovery_desc: "Lo sviluppo e l'impiego di eserciti permanenti hanno aumentato la domanda di armi, uniformi e altre forniture militari che devono essere immagazzinate nelle loro vicinanze." #OLD ITA
 supply_depot_advance_age_3_discovery_desc: "The development and deployment of standing armies have increased the demands for weaponry, uniforms, and other military supplies, which should be stored in close proximity to our soldiers." #NEW
 #supply_depot_advance_age_3_discovery_desc: "The development and deployment of standing armies have increased the demands of weaponry, uniforms, and other military supplies that need to be stored close to them." #OLD ENG
 supply_depot_advance_age_4_reformation: "Depositi di Munizioni"
 #supply_depot_advance_age_4_reformation_desc: "L'impiego generalizzato dell'artiglieria sia sui campi di battaglia che negli assedi ha creato una domanda di munizioni e polvere da sparo per alimentarla, aumentando l'importanza dei depositi per immagazzinarla." #OLD ITA
 supply_depot_advance_age_4_reformation_desc: "Generalized deployment of artillery for battlefields and sieges has created a high demand for the ammunition and gunpowder to fuel them, increasing the importance of storage depots." #NEW
 #supply_depot_advance_age_4_reformation_desc: "The generalized deployment of Artillery both on battlefields and sieges has created a demand for ammunition and gunpowder to serve them, increasing the importance of depots to store it." #OLD ENG
 supply_depot_advance_age_5_absolutism: "Depositi Avanzati"
 #supply_depot_advance_age_5_absolutism_desc: "Gli eserciti possono ora operare più a fondo e più a lungo nel territorio nemico, rendendo necessario creare e mantenere depositi avanzati più vicini a loro, pur rimanendo collegati alle linee di rifornimento della retroguardia." #OLD ITA
 supply_depot_advance_age_5_absolutism_desc: "Armies can now penetrate deeper into enemy territory and sustain themselves there for longer periods, making it necessary to build and maintain forward depots closer to them while being linked to rear supply lines." #NEW
 #supply_depot_advance_age_5_absolutism_desc: "Armies can now operate deeper and longer in enemy territory, making it necessary to create and keep forward depots closer to them, while linked to rearguard supply lines." #OLD ENG
 supply_depot_advance_age_6_revolutions: "Depositi per la Campagna"
 #supply_depot_advance_age_6_revolutions_desc: "L'operatività di più eserciti in campagne più lunghe ha messo a dura prova i nostri sistemi di approvvigionamento, rendendo ancora più importanti i depositi più grandi e creati rapidamente per sostenerli." #OLD ITA
 supply_depot_advance_age_6_revolutions_desc: "The operation of multiple armies on longer campaigns has put extra stress on our supply systems, making bigger, rapidly constructed depots even more important to sustain them." #NEW
 #supply_depot_advance_age_6_revolutions_desc: "The operation of multiple armies on longer campaigns has put extra stress on our supply systems, thus making bigger and quickly created depots even more important to sustain them." #OLD ENG
 #army_country_looting_advance: "Saccheggiatori Orgogliosi" #OLD ITA
 army_country_looting_advance: "Raider Troops" #NEW
 #army_country_looting_advance: "Proud Raiders" #OLD ENG
 #army_country_looting_advance_desc: "Le razzie e i saccheggi sono quasi alla base del sostentamento del nostro esercito. Ovunque vadano le nostre truppe, saccheggiano tutto ciò che possono." #OLD ITA
 army_country_looting_advance_desc: "Raiding and looting is fundamentally how our army sustains itself. Everywhere our troops go, they pillage as much as they can." #NEW
 #army_country_looting_advance_desc: "Raiding and looting is almost the basis of how our army sustains itself. Everywhere our troops go, they pillage as much as they can." #OLD ENG
 minting_income_factor_building: "Proprietà della Valuta"
 #minting_income_factor_building_desc: "Esistono molti tipi di valuta, ma quella che porta il nostro sigillo ha dimostrato di essere accettata e riconosciuta e ha conquistato la fiducia delle persone." #OLD ITA
 minting_income_factor_building_desc: "There are many types of currency in circulation, but the one that bears our seal is the most widely accepted as trustworthy." #NEW
 #minting_income_factor_building_desc: "There are many types of currency around, but the one that bears our seal has proved acceptance and recognition and has gained people's trust." #OLD ENG
 artillery_vs_fort_age_5_absolutism: "Cannoni d'Assedio"
 #artillery_vs_fort_age_5_absolutism_desc: "La polvere da sparo consente la creazione di diversi tipi di armi. Per sfondare le linee della fanteria non è necessaria la stessa potenza richiesta per abbattere le mura di un castello, pertanto negli assedi è necessario impiegare un tipo speciale di cannone." #OLD ITA
 artillery_vs_fort_age_5_absolutism_desc: "Gunpowder has made way for the creation of multiple different types of weapons. Cutting through lines of infantry does not require the same power as breaking down castle walls, and so a specialized type of cannon has to be deployed in sieges." #NEW
 #artillery_vs_fort_age_5_absolutism_desc: "Gunpowder allows the creation of multiple different types of weapons. Cutting through lines of infantry does not require the same power as breaking down castle walls, and so a specialized type of cannon has to be deployed in sieges." #OLD ENG
 artists_advance_absolutism: "Correnti Artistiche"
 #artists_advance_absolutism_desc: "L'arte ha sempre avuto molteplici modi di esprimersi, ma i recenti progressi le hanno permesso di svilupparsi ulteriormente in una miriade di manifestazioni." #OLD ITA
 artists_advance_absolutism_desc: "Art has always been created in a number of different ways, but recent advances have allowed it to develop even further into a myriad of manifestations, as artists explore new media and techniques." #NEW
 #artists_advance_absolutism_desc: "Art has always had multiple ways of being expressed, but the recent advances have allowed it to develop even further into a myriad of manifestations." #OLD ENG
 subject_loyalty_absolutism: "Lealtà Assoluta"
 #subject_loyalty_absolutism_desc: "Non tolleriamo alcun dissenso o rivolta tra il nostro popolo, perché dovremmo permetterlo tra i nostri sudditi?" #OLD ITA
 subject_loyalty_absolutism_desc: "We tolerate no dissent or revolt. Absolute loyalty is demanded from all subjects, whether they are part of the core citizenry or a conquered group." #NEW
 #subject_loyalty_absolutism_desc: "We do not tolerate any dissent or revolt among our own people, why should we allow it among our subjects?" #OLD ENG
 improve_relation_impact_absolutism: "Ministero Permanente degli Affari Esteri"
 #improve_relation_impact_absolutism_desc: "La forza diplomatica in continua crescita del nostro Paese ci ha imposto di creare un Ministero degli Affari Esteri permanente per gestire e coordinare i nostri numerosi inviati e coordinare i loro sforzi." #OLD ITA
 improve_relation_impact_absolutism_desc: "Our ever-growing diplomatic corps necessitates our creating a permanent Foreign Affairs Ministry to manage and coordinate our many envoys and coordinate their efforts." #NEW
 #improve_relation_impact_absolutism_desc: "The ever-growing diplomatic force of our country required us to create a permanent Foreign Affairs Ministry to manage and coordinate our many envoys and coordinate their efforts." #OLD ENG
 hand_cannon_guild_advance: "$hand_cannon_guild$"
 #hand_cannon_guild_advance_desc: "Si trattava di tubi metallici primitivi che non potevano essere paragonati alle armi più avanzate sviluppate in seguito. Sviluppati inizialmente in Cina, i primi cannoni portatili si diffusero in Corea e Giappone nel 1270." #OLD ITA
 hand_cannon_guild_advance_desc: "Primitive metal tubes which were a lesser form of later, more advanced guns. First developed in $CHI$, the early hand cannon spread to $KOR$ and $JAP$ in 1270." #NEW
 #hand_cannon_guild_advance_desc: "These were primitive metal tubes which could not be compared to later more advanced guns. First developed in China, the early hand cannon spread to Korea and Japan in 1270." #OLD ENG
 subjects_advance: "Nazioni Clienti"
 #subjects_advance_desc: "La delega del governo locale ai sudditi sotto la nostra bandiera è un modo accettabile per impedire alla loro gente di ribellarsi, mentre si estrae da loro un prezioso tributo." #OLD ITA
 subjects_advance_desc: "Granting our subject nations some autonomy over local governance keeps them from revolting while ensuring they continue to provide tribute to the realm." #NEW
 #subjects_advance_desc: "The delegation of local government to subjects under our banner is an acceptable way to keep their folks from revolting whilst extracting precious tribute from them." #OLD ENG
 slave_center_advance: "$slave_center$"
 #slave_center_advance_desc: "La corretta gestione del lavoro forzato all'interno del nostro regno è fondamentale per garantire il benessere continuo del nostro popolo." #OLD ITA
 slave_center_advance_desc: "Properly managing bonded labor within our realm is imperative to the continued affluence of our people." #NEW
 #slave_center_advance_desc: "The proper management of bonded labor within our realm is imperative to the continued affluence of our people." #OLD ENG
 war_score_absolutism_advance: "Richieste Aggressive"
 #war_score_absolutism_advance_desc: "Il potere dello stato è direttamente legato alla sua capacità militare. Come risulta, maggiore è la popolazione di un paese, più imponente può diventare il suo esercito. La nostra diplomazia deve adottare un approccio aggressivo per annettere quanto più territorio possibile nei trattati di pace, al fine di sviluppare ulteriormente il nostro vantaggio sui Paesi vicini." #OLD ITA
 war_score_absolutism_advance_desc: "The power of the state is directly tied to its military capacity. The more populous a country is, the grander its army can become. We must take an aggressive approach toward annexing as much land as possible in peace treaties to seize the advantage over our neighbors." #NEW
 #war_score_absolutism_advance_desc: "The power of the state is directly tied to its military capacity. As it turns out, the more population a country possesses, the grander the army can become. Our diplomacy must take an aggressive approach to annex as much land as possible in the peace treaties to further develop our advantage over our neighbors." #OLD ENG
 spy_construction_absolutism: "Reti di Spionaggio Globali Ampliate"
 #spy_construction_absolutism_desc: "Con l'espansione continua degli imperi e delle istituzioni mondiali, dobbiamo mantenere i nostri sforzi di spionaggio per non rimanere indietro rispetto ai nostri rivali." #OLD ITA
 spy_construction_absolutism_desc: "As the various empires and institutions that make up our world continue to expand, we shall need to maintain and perhaps increase espionage if we wish to stay one step ahead of our rivals." #NEW
 #spy_construction_absolutism_desc: "With the ever-expanding empires and institutions of the world, we need to maintain our espionage efforts to not fall behind our rivals." #OLD ENG
 absolutism_agressive_advance: "Lo Stato Prima di Tutto"
 #absolutism_agressive_advance_desc: "In tempi in cui le regioni si consolidano e le risorse diventano più limitate, è diritto dello stato esercitare una politica aggressiva per soddisfare i bisogni materiali del proprio popolo ed espandere il proprio potere. E sebbene le guerre debbano essere considerate l'ultimo atto della diplomazia, esse rimangono comunque una mossa diplomatica, poiché lo stato è al di sopra delle restrizioni umane quali la moralità e le leggi." #OLD ITA
 absolutism_agressive_advance_desc: "As various regions of the world are formally consolidated and resources become more limited, it is the right of the state to exercise an aggressive policy to satisfy the material needs of its people and expand its power. And while war should be seen as the last act of diplomacy, it is still a diplomatic play, as the state is above human restrictions such as morality and law." #NEW
 #absolutism_agressive_advance_desc: "In times when regions get consolidated and resources become more limited, it is the right of the state to exercise an aggressive policy to satisfy the material needs of its people and expand its power. And while wars should be seen as the last act of diplomacy, it still is a diplomatic play as the state is above the human restrictions such as morality and laws." #OLD ENG
 relations_absolutism_advance: "Politica Estesa"
 relations_absolutism_advance_desc: "Mentre il mondo che ci circonda cambia per adattarsi alla portata sempre più ampia di un teatro veramente globale, anche i nostri sforzi diplomatici devono stare al passo con questa esigenza sempre crescente di sicurezza contro le minacce straniere."
 correct_box_advance_absolutism: "Formazioni di Battaglia Flessibili"
 #correct_box_advance_absolutism_desc: "Sono state sviluppate nuove tattiche che rendono più flessibile e coordinato l'impiego delle unità di fanteria, cavalleria e artiglieria sul campo di battaglia, solitamente raggruppate in brigate." #OLD ITA
 correct_box_advance_absolutism_desc: "New tactics have developed, making for more flexible and coordinated infantry, cavalry, and artillery units on the battlefield, usually grouped as brigades." #NEW
 #correct_box_advance_absolutism_desc: "New tactics have developed, making for a more flexible and coordinated of infantry, cavalry and artillery units on the battlefield, usually grouped as brigades." #OLD ENG
 anti_piracy_warfare: "Convogli Mercantili"
 #anti_piracy_warfare_desc: "L'ascesa dei pirati spietati e senza legge nel Nuovo Mondo e le rotte marittime che vi conducono stanno avendo un forte impatto sui nostri mercanti e sul nostro commercio. D'ora in poi le nostre navi mercantili formeranno convogli per facilitarne la protezione da parte di una nave da guerra di scorta e avranno a bordo un piccolo contingente di militari per garantire la loro protezione in alto mare." #OLD ITA
 anti_piracy_warfare_desc: "The rise of cutthroat, lawless buccaneers in the New World — and along the maritime routes leading to it — had made a great impact on our merchants and our trade. From now on, our merchant ships will form convoys with an accompanying warship to protect them, and will have on board a small military contingent to further ensure their survival on the high seas." #NEW
 #anti_piracy_warfare_desc: "The rise of the cutthroat and lawless buccaneers in the New World and the maritime routes that lead to it is making a great impact on our merchants and our trade. From now our merchant ships will form convoys to make them easier to protect by an accompanying warship, and will have on board a small contingent of military men to ensure their protection in the high seas." #OLD ENG
 trade_range_advance_age_3: "Navi Mercantili Migliorate"
 #trade_range_advance_age_3_desc: "Con lo sviluppo di navi più grandi che impiegano equipaggi più ridotti e che possono navigare più a lungo senza fermarsi, la portata delle nostre attività commerciali aumenterà notevolmente." #OLD ITA
 trade_range_advance_age_3_desc: "We have developed larger ships that require a smaller crew to sail, and which can travel farther without needing to stop. This should greatly increase the range of our trade efforts as a result." #NEW
 #trade_range_advance_age_3_desc: "With the development of bigger ships that use smaller crews and that can sail longer without stopping, the range of our trade efforts will be greatly increased." #OLD ENG
 trade_range_advance_age_2: "Mercati Lontani"
 #trade_range_advance_age_2_desc: "Con la crescita dell'economia nascono nuove opportunità. Se prima le rotte a breve distanza erano molto redditizie, ora sono quelle a lunga distanza a garantire maggiori guadagni. Le nostre navi mercantili ora navigano più lontano alla ricerca delle offerte migliori." #OLD ITA
 trade_range_advance_age_2_desc: "As our economy grows, new opportunities arise. Whereas before short-distance trade routes were very profitable, longer-distance routes have recently started to bring in more money. Our merchant vessels are now sailing farther away for the best offers." #NEW
 #trade_range_advance_age_2_desc: "As the economy grows, new opportunities arise. Where before short distance routes were very profitable, now longer-distance routes bring more money. Our merchant vessels are now sailing further away for the best offers." #OLD ENG
 overseas_trade: "Commercio Oltremare"
 #overseas_trade_desc: "Quando notizie provenienti da terre lontane raggiungono la nostra nazione, i nostri mercanti cercano nuovi mercati che mostrino le loro ricchezze, come frutti maturi che aspettano solo di essere raccolti." #OLD ITA
 overseas_trade_desc: "News of the discovery of distant lands has reached our nation, and our merchants are already preparing to expand their trading operations. These unexplored territories are filled with prosperous markets dripping with wealth, like so much ripe fruit waiting to be collected." #NEW
 #overseas_trade_desc: "As news of distant lands reaches our nation, our merchants look for newer markets that show their riches, as ripe fruit waiting to be collected." #OLD ENG
 ship_building_techniques_absolutism: "Bacino Galleggiante"
 #ship_building_techniques_absolutism_desc: "Lo sviluppo del bacino galleggiante consentirà ai nostri costruttori navali di costruire navi molto più rapidamente rispetto al passato." #OLD ITA
 ship_building_techniques_absolutism_desc: "The development of the wet dock, or floating dock, will allow our shipwrights to construct ships much faster than before." #NEW
 #ship_building_techniques_absolutism_desc: "The development of the wet dock or floating dock will allow our shipwrights to construct ships much faster than before." #OLD ENG
 #ship_building_techniques_discovery: "Costruzione Navale Migliorata" #OLD ITA
 ship_building_techniques_discovery: "Improved Shipbuilding" #NEW
 #ship_building_techniques_discovery: "Improved Ship Building" #OLD ENG
 #ship_building_techniques_discovery_desc: "Le nuove tecniche di costruzione delle nostre navi ci aiuteranno a realizzarle più rapidamente." #OLD ITA
 ship_building_techniques_discovery_desc: "New building techniques for our ships will help us produce them faster." #NEW
 #ship_building_techniques_discovery_desc: "New building techniques for our ships will help us create them faster." #OLD ENG
 spy_construction_discovery: "Organizzazione Spionistica Migliorata"
 #spy_construction_discovery_desc: "Assumendo persone affidabili come informatori e assegnando loro incarichi che consentono loro di accedere alle informazioni, possiamo migliorare la nostra capacità di raccogliere informazioni sui nostri nemici e sulle loro attività." #OLD ITA
 spy_construction_discovery_desc: "By hiring trustworthy individuals as informants and strategically positioning them in situations where clandestine information is shared, we can improve our capability to gather information about our enemies and their activities." #NEW
 #spy_construction_discovery_desc: "By hiring trustworthy individuals as informants and placing them in positions where information is shared, we can improve our capabilities to gather information about our enemies and their activities." #OLD ENG
 diplomatic_training: "Formazione Diplomatica"
 #diplomatic_training_desc: "Il manuale diplomatico all'interno della nostra corte è stato perfezionato, con il risultato che alla nostra cerchia si sono aggiunti eccellenti diplomatici nel tentativo di rafforzare i nostri sforzi in politica estera." #OLD ITA
 diplomatic_training_desc: "Our diplomatic playbook has been refined, and as a result, we have added excellent diplomats to our entourage in an attempt to bolster our foreign efforts." #NEW
 #diplomatic_training_desc: "The diplomatic playbook within our court has been refined, resulting in excellent diplomats being added to our entourage in an attempt to bolster our foreign efforts." #OLD ENG
 formalized_relations: "Relazioni Formalizzate"
 #formalized_relations_desc: "L'instaurazione di relazioni formali con i paesi confinanti di nostro interesse è fondamentale se vogliamo mantenere un equilibrio di potere e promuovere i nostri interessi.." #OLD ITA
 formalized_relations_desc: "Establishing formal relations with neighboring countries of interest is crucial if we are to maintain a balance of power and promote our interests." #NEW
 #formalized_relations_desc: "The establishment of formal relations with neighboring countries of interest is vital if we are to maintain a balance of power and promote our interests." #OLD ENG
 artists_advance_discovery: "Stampe Artistiche"
 artists_advance_discovery_desc: "L'uso diffuso della stampa aprirà nuove opportunità alla nostra gente per condividere le proprie abilità artistiche in modo più ampio e veloce che mai.
 improved_book_binding: "Rilegatura Migliorata"
 #improved_book_binding_desc: "La crescita del pensiero e della conoscenza deve essere sostenuta da un costante approvvigionamento di libri se vogliamo prosperare e coltivare il nostro popolo." #OLD ITA
 improved_book_binding_desc: "The blossoms of thought and knowledge must be watered by a steady supply of books if we are to prosper and cultivate as a people." #NEW
 #improved_book_binding_desc: "The growth of thought and knowledge must be backed by a steady supply of books if we are to prosper and cultivate our people." #OLD ENG
 lumber_improvements_discovery: "Silvicoltura Specializzata"
 #lumber_improvements_discovery_desc: "Separando alcune parti dei nostri terreni per piantare e coltivare alberi robusti, possiamo aumentare la qualità e la quantità dei nostri segherie." #OLD ITA
 lumber_improvements_discovery_desc: "By dedicating a portion of land to the cultivation and harvesting of strong trees, we can increase the quality and quantity of our lumber production." #NEW
 #lumber_improvements_discovery_desc: "By having parts of our lands separated for the planting and nurturing of strong trees, we can increase the quality and quantity of our lumbermills." #OLD ENG
 lumber_improvements_reformation: "Lame per Seghe Migliorate"
 #lumber_improvements_reformation_desc: "Grazie ai progressi compiuti nella produzione di utensili, le lame delle nostre seghe sono più robuste che mai e richiedono meno manutenzione. Ciò garantirà la fornitura costante di legname di cui la nostra economia ha bisogno." #OLD ITA
 lumber_improvements_reformation_desc: "Thanks to recent advances in toolmaking, our sawblades are sturdier than ever before and require less maintenance. This will make supplying adequate lumber for economic activities far easier than before." #NEW
 #lumber_improvements_reformation_desc: "With the advances made in tool making, the blades of our saws are sturdier than ever before while requiring less maintenance. This will ensure the steady supply of lumber our economy needs." #OLD ENG
 lumber_improvements_absolutism: "Segherie ad Energia Eolica"
 #lumber_improvements_absolutism_desc: "Con la costruzione di mulini a vento per alimentare le nostre segherie, saremo in grado di trasformare il nostro legname in tavole a una velocità mai raggiunta prima." #OLD ITA
 lumber_improvements_absolutism_desc: "With the introduction of wind power to our sawmills, we are able to process timber into planks at a much faster rate than we could previously." #NEW
 #lumber_improvements_absolutism_desc: "With the construction of windmills to power our sawmills, we will be able to process our timber into planks at a faster rate than ever before." #OLD ENG
 coal_improvements_absolutism: "Cokefazione Migliorata"
 #coal_improvements_absolutism_desc: "Ottimizzando il processo di raffinazione del carbone estratto, saremo in grado di utilizzarlo in modo più efficace come combustibile e senza effetti collaterali che influiscono sugli altri prodotti." #OLD ITA
 coal_improvements_absolutism_desc: "By streamlining the coal refining process, we can use it more effectively as fuel while eliminating side effects that would negatively impact other industrial products." #NEW
 #coal_improvements_absolutism_desc: "By streamlining the process of refining our mined coal, we will be able to use it more effectively as fuel and without side effects impacting the other products." #OLD ENG
 coal_improvements_revolutions: "Forni a Cupola Migliorati"
 #coal_improvements_revolutions_desc: "Per la produzione di Coke, una parte fondamentale della nostra lavorazione del ferro, abbiamo bisogno di grandi quantità di forni a cupola. Grazie ai miglioramenti apportati alla loro costruzione e all'uso di mattoni, saremo in grado di aumentare la qualità del coke prodotto." #OLD ITA
 coal_improvements_revolutions_desc: "For the production of coke, a vital part of iron processing, we need many beehive ovens. With improved construction techniques and better usage of bricks, we will be able to accordingly raise the quality of the produced coke." #NEW
 #coal_improvements_revolutions_desc: "For the production of Coke, a vital part of our iron processing, we need large quantities of beehive ovens. With improvements to their construction and the usage of bricks, we will be able to raise the quality of the produced coke." #OLD ENG
 correct_box_advance_discovery: "Tenenti"
 #correct_box_advance_discovery_desc: "Con la crescita degli Eserciti Professionali, i loro Ufficiali di Carriera guidano formazioni sempre più grandi. Per assisterli, i Luogotenenti si occupano di trasmettere i loro ordini e di guidare unità più piccole sui campi di battaglia." #OLD ITA
 correct_box_advance_discovery_desc: "As our professional armies grow, the commissioned officers that lead them are commanding increasingly bigger formations. To assist them, we will create the rank of lieutenant. These officers take charge of transmitting orders from command, and also lead smaller units on the battlefield." #NEW
 #correct_box_advance_discovery_desc: "As the Professional Armies grow, their Commissioned Officers lead increasingly bigger formations. To assist them, Lieutenants take charge of transmitting their orders and leading smaller units in the battlefields." #OLD ENG
 artists_advance_reformations: "Sviluppo dell'Arte Secolare"
 #artists_advance_reformations_desc: "Con lo sviluppo di nuove branche artistiche sulla scia della Riforma, diventa più facile per le persone ottenere riconoscimento nel proprio campo di attività e trovare lavoro nelle corti di tutto il mondo." #OLD ITA
 artists_advance_reformations_desc: "In the wake of the Reformation, new forms of art flourish like blossoms on a vine. It has become easier for artists to gain recognition in their field, and also to find employment in the courts of the world." #NEW
 #artists_advance_reformations_desc: "With new artistic branches developing in the wake of the Reformation it becomes easier for people to get recognized in their field of work and find work in the courts of the world." #OLD ENG
 war_score_reformations_advance: "Diritto Divino di Conquistare"
 #war_score_reformations_advance_desc: "La nostra vittoria sul campo di battaglia è più di una semplice buona esecuzione dei piani di battaglia e delle strategie belliche. È un intervento divino a nostro favore. Pertanto, il diritto di conquistare e annettere nuovi territori per i quali abbiamo versato sangue è un'estensione della volontà divina che ci porta al successo." #OLD ITA
 war_score_reformations_advance_desc: "Victory on the battlefield is the result of more than just good execution of battle plans and war strategies — it is a divine intervention in our favor. Therefore, our right to conquer and annex new territories for which we have spilled blood is an extension of the divine will that champions our supremacy." #NEW
 #war_score_reformations_advance_desc: "Our victory on the battlefield is more than just good execution of battle plans and war strategies. It is a divine intervention in our favor. Thus, the right to conquer and annex new territories we have spilled blood for is an extension of the divine will for us to succeed." #OLD ENG
 #reformation_subject_opinions_advance: "Supremazia Economica" #OLD ITA
 reformation_subject_opinions_advance: "Economic Overlords" #NEW
 #reformation_subject_opinions_advance: "Economical Overlordship" #OLD ENG
 #reformation_subject_opinions_advance_desc: "Il contratto che definisce la sovranità su un altro Stato deve coprire molti aspetti diversi. Uno di questi è rappresentato dagli obblighi commerciali interni del suddito nei confronti del proprio sovrano e, con la crescente importanza del commercio globale, diventa sempre più importante ampliarli ulteriormente." #OLD ITA
 reformation_subject_opinions_advance_desc: "Contracts that define suzerainty over another state cover many different aspects. One such is the domestic trade obligations of the subject to their overlord. As global trade becomes more and more prominent, the expansion of these obligations becomes increasingly important." #NEW
 #reformation_subject_opinions_advance_desc: "The contract which defines the suzerainty over another state has many different aspects to cover. One such is the domestic trade obligations of the subject to their overlord, and as Global Trade becomes more and more prominent, it becomes increasingly more important to further expand them." #OLD ENG
 spy_construction_reformation: "Crittografia Avanzata"
 #spy_construction_reformation_desc: "Se vogliamo raccogliere informazioni sui nostri nemici, è importante ingannarli facendogli credere di essere al sicuro. Solo così potremo raccogliere informazioni dettagliate e corrette sui loro piani e sferrare un attacco contro di loro. " #OLD ITA
 spy_construction_reformation_desc: "If we want to gather intelligence on our enemies, we must improve our skill in cracking and devising secret codes. We shall lull our enemies into a false sense of security by sending what appear to be only ordinary communications, which shall actually contain hidden, encoded information. A pity our enemies will not be clever enough to understand it!" #NEW
 #spy_construction_reformation_desc: "If we want to gather intel on our enemies it is important to deceive them into a false sense of security. Only then we can gather detailed and correct information about their plans and strike against them. " #OLD ENG
 #subject_income_reformation_advance: "Strutture di Potere Esterne" #OLD ITA
 subject_income_reformation_advance: "Firmer Financial Control" #NEW
 #subject_income_reformation_advance: "External Power Structures" #OLD ENG
 #subject_income_reformation_advance_desc: "La catena di comando tra noi e i nostri sudditi è una linea netta che determina le loro responsabilità nei nostri confronti. Rafforzare questi contratti e garantire il loro pagamento puntuale porterà sicuramente a una tesoreria sana da parte nostra." #OLD ITA
 subject_income_reformation_advance_desc: "The financial responsibilities our subjects have towards us are clearly defined. However, tightening these contracts will ensure timely payments and lead to a healthier treasury." #NEW
 #subject_income_reformation_advance_desc: "The chain of command between us and our subjects is a clear-cut line that determines their responsibilities towards us. Tightening these contracts and assuring their timely payment will surely lead to a healthy treasury on our behalf." #OLD ENG
 correct_box_advance_reformation: "Organizzazione Reggimentale"
 #correct_box_advance_reformation_desc: "Gli eserciti professionali hanno reso possibile la creazione di un nuovo tipo di unità, il reggimento, che non solo è una destinazione permanente per i soldati, ma anche un'utile formazione di battaglia." #OLD ITA
 correct_box_advance_reformation_desc: "Professional armies have made it possible to create a new type of unit, the regiment, which not only is a permanent position for soldiers, but also a useful battle formation." #NEW
 #correct_box_advance_reformation_desc: "The Professional Armies have made it possible to create a new type of unit, the Regiment, which not only is a permanent destination for soldiers, but also a useful battle formation." #OLD ENG
 recruitment_improvements_reformation: "Uffici di Reclutamento"
 #recruitment_improvements_reformation_desc: "Affinché il nostro Paese possa costituire un esercito formidabile, è indispensabile migliorare le nostre attività di reclutamento. Grazie a un maggiore impegno nei centri di reclutamento, potremo attirare persone capaci con maggiore rapidità." #OLD ITA
 recruitment_improvements_reformation_desc: "For our country to create a formidable army, we must improve our recruitment efforts. With increased time and money spent on recruitment centers and activities, we will attract able soldiers with haste." #NEW
 #recruitment_improvements_reformation_desc: "For our country to mount a formidable army, it is mandatory to improve our recruitment efforts. With increased effort spent on recruitment centers, we will draw able bodies with more speed." #OLD ENG
 #mercenaries_reformation_advance: "Garantire il Pagamento dei Mercenari" #OLD ITA
 mercenaries_reformation_advance: "Ensure Mercenary Payments" #NEW
 #mercenaries_reformation_advance: "Ensure Payment for Mercenaries" #OLD ENG
 #mercenaries_reformation_advance_desc: "È risaputo che i Mercenari lavorano solo in cambio di una retribuzione adeguata. Promettendo loro salari equi e una parte del bottino possiamo legarli più saldamente a noi e assicurarci che compagnie più grandi lavorino per noi." #OLD ITA
 mercenaries_reformation_advance_desc: "It is well understood that mercenaries do not work for free. By promising fair compensation and a share of the plunder, we can assure their loyalty more easily, and ensure the most skilled companies will be willing to work for us" #NEW
 #mercenaries_reformation_advance_desc: "It is well known that Mercenaries work for an adequate payment only. By promising fair salaries and share of the plunder we can bind them more strongly to us and ensure greater companies to work for us" #OLD ENG
 #renaissance_subject_opinions_advance: "Supremazia Culturale" #OLD ITA
 renaissance_subject_opinions_advance: "Cultural Overlords" #NEW
 #renaissance_subject_opinions_advance: "Cultured Overlordship" #OLD ENG
 #renaissance_subject_opinions_advance_desc: "Negli ultimi anni si sono diffuse tematiche culturali e ideologiche basate sull'importanza dell'umanità e della natura. Ciò non vale solo per il nostro popolo, ma anche per coloro che hanno giurato fedeltà a noi, rendendolo un nuovo strumento diplomatico." #OLD ITA
 renaissance_subject_opinions_advance_desc: "In recent years, matters of culture, humanism, and natural philosophy have risen in prominence. This cultural influence extends not only to our own people, but also to states who have sworn allegiance to us, making our position as cultural overlords a valuable diplomatic tool." #NEW
 #renaissance_subject_opinions_advance_desc: "In recent years the matters of culture and ideas based on the importance of humanity and nature have spread out. This not only applies to our people but also those who have sworn allegiance to us, making it a new diplomatic tool." #OLD ENG
 spy_construction_renaissance: "Reti di Spionaggio"
 #spy_construction_renaissance_desc: "Sin dai tempi antichi, gli imperi hanno fatto ampio ricorso alle spie per ottenere informazioni sulle minacce interne ed esterne. I mongoli hanno raggiunto la maestria in questo campo, utilizzando lo spionaggio per preparare e garantire il successo delle loro campagne militari." #OLD ITA
 spy_construction_renaissance_desc: "Espionage has been a valuable tool for empires since ancient times. Spycraft allows us to become better informed about both internal and external threats, and to monitor the activities of potentially dangerous states and actors. The Mongols were masters of this art, using espionage to prepare for and secure the success of their military campaigns." #NEW
 #spy_construction_renaissance_desc: "Spies have been widely used since ancient times by empires to get informed of their internal and external threats. The Mongols made this a mastery, as they employed espionage to prepare and secure the success of their military campaigns." #OLD ENG
 recruitment_improvements_renaissance: "Reclutamento Organizzato"
 #recruitment_improvements_renaissance_desc: "Lo sviluppo di eserciti professionali ha determinato un aumento delle capacità militari. Per sostenerlo, lo Stato dovrà migliorare anche la propria capacità di reclutare soldati." #OLD ITA
 recruitment_improvements_renaissance_desc: "The development of professional armies has increased our military capabilities. To sustain this, the state will need to improve its capacity for recruiting soldiers as well." #NEW
 #recruitment_improvements_renaissance_desc: "The development of professional armies has caused an increase in the capabilities of the military. To sustain it, the state will need to improve its capacity for recruiting soldiers as well." #OLD ENG
 correct_box_advance_renaissance: "Ufficiali"
 #correct_box_advance_renaissance_desc: "Lo sviluppo degli Eserciti Professionali ha portato alla nomina di ufficiali permanenti a capo delle sue unità, una carica concessa con nomina diretta dal sovrano." #OLD ITA
 correct_box_advance_renaissance_desc: "The development of professional armies has led to the appointment of permanent command positions, offices granted by direct commission from the ruler." #NEW
 #correct_box_advance_renaissance_desc: "The development of Professional Armies has led to the appointment of permanent officers heading its units, an office granted by direct commission of the ruler." #OLD ENG
 #improve_relation_impact_renaissance: "Regali Diplomatici Esotici" #OLD ITA
 improve_relation_impact_renaissance: "Lavish Diplomatic Gifts" #NEW
 #improve_relation_impact_renaissance: "Exotic Diplomatic Gifts" #OLD ENG
 #improve_relation_impact_renaissance_desc: "I doni diplomatici sono stati una costante fin dall'antichità, per convincere i sovrani stranieri su una determinata questione sottolineando il loro alto status. I doni potevano variare da diversi oggetti di lusso ad animali vivi come giraffe o elefanti." #OLD ITA
 improve_relation_impact_renaissance_desc: "Diplomatic gifts have been exchanged since ancient times, as a measure of impressing or persuading foreign rulers by emphasizing the high status and enviable wealth of the giver. Gifts could range from fine cloth, to splendid jewelry, to astonishing animals such as giraffes or elephants." #NEW
 #improve_relation_impact_renaissance_desc: "Diplomatic gifts have been a constant since ancient times, to convince foreign rulers on a certain matter by emphasizing their high status. Gifts could range from different luxurious objects to living animals such as giraffes or elephants." #OLD ENG
 late_feudal_relations: "Relazioni Tardo-Feudali"
 #late_feudal_relations_desc: "Il feudalesimo si basa sui concetti di #italic auxilium#! e #italic consilium#! forniti dai diversi ranghi nobiliari ai rispettivi signori, creando una gerarchia che si è notevolmente sviluppata nel corso dei secoli." #OLD ITA
 late_feudal_relations_desc: "Feudalism is built upon the concepts of #italic auxilium#! and #italic consilium#!, or military aid and counsel, owed by vassals to their lords. Over this, this has created an intricate hierarchy of rank, privilege, and reciprocal duties." #NEW
 #late_feudal_relations_desc: "Feudalism is based upon the concepts of the #italic auxilium#! and #italic consilium#! given by different ranks of nobles to their respective lords, creating a hierarchy that has greatly developed through the ages." #OLD ENG
 artists_advance_revolutions: "Arte Illuminata"
 #artists_advance_revolutions_desc: "Con l'avvento dell'Illuminismo, l'Arte fiorisce in tutti i suoi settori e a tutti i livelli della società. Le Nuove Pubblicazioni musicali e letterarie stanno suscitando un ampio interesse per queste arti." #OLD ITA
 artists_advance_revolutions_desc: "With the rise of the Enlightenment, the arts are flourishing in all forms and at all levels of society. New publications of music and literature are in particular leading to a broad developing interest in these arts." #NEW
 #artists_advance_revolutions_desc: "With the rise of the Enlightenment Art is flourishing in all its branches and levels of society. New Publications of music of literature are leading to broad interest in these arts." #OLD ENG
 #revolutions_subject_opinions_advance: "Supremazia Benevola" #OLD ITA
 revolutions_subject_opinions_advance: "Benign Overlords" #NEW
 #revolutions_subject_opinions_advance: "Benign Overlordship" #OLD ENG
 #revolutions_subject_opinions_advance_desc: "Le fiamme della Rivoluzione sono una minaccia da non sottovalutare. Se vogliamo assicurarci la fedeltà dei nostri sudditi, dobbiamo soffocare sul nascere qualsiasi idea di rivolta, nominando governatori fedeli e rimuovendo ogni motivo di malcontento." #OLD ITA
 revolutions_subject_opinions_advance_desc: "The fires of revolution are no trifling threat. If we wish to guarantee the loyalty of our subjects, we must suffocate any notion of uprising in its cradle by appointing trustworthy governors and removing any cause for unrest." #NEW
 #revolutions_subject_opinions_advance_desc: "The fires of the Revolution are a threat to not trifle with. If we want to ensure the loyalty of our subjects we must suffocate ideas of uprising in their cradle early, by appointing loyal governors and removing any reasons for unrest." #OLD ENG
 war_score_revolutions_advance: "Argomenti della Ragione"
 #war_score_revolutions_advance_desc: "Le guerre sono sempre eventi terribili che causano sofferenza a entrambe le parti. Sottolineare questi fatti e fare appello alla logica e alla ragione dell'altra parte ci darà un vantaggio significativo quando negozieremo gli inevitabili cambiamenti dei confini." #OLD ITA
 war_score_revolutions_advance_desc: "Wars are always ugly affairs that bring suffering to both sides. Emphasizing this fact, and appealing to our opposition's reason and logic, will surely give us a significant advantage when negotiating the inevitable border changes." #NEW
 #war_score_revolutions_advance_desc: "Wars are always an ugly affair which brings suffering to both sides. Emphasizing these facts and appealing to the logic and reason of the other party will bring us a significant advantage when we negotiate the inevitable border changes." #OLD ENG
 #spy_construction_revolutions: "Contatti con i Dissidenti" #OLD ITA
 spy_construction_revolutions: "Contact with Dissidents" #NEW
 #spy_construction_revolutions: "Contacts with Dissenters" #OLD ENG
 #spy_construction_revolutions_desc: "Con la diffusione di nuove idee e sistemi politici nel nostro mondo consolidato, dovremo allocare risorse per sostenere questi dissidenti nei paesi dei nostri rivali e ottenere informazioni preziose." #OLD ITA
 spy_construction_revolutions_desc: "As new ideas and political systems raise their heads around the world, there must logically also arise those who protest the status quo. We will need to allocate resources to support these dissenting voices in our rival nations in order to extract valuable information and contribute to their destabilizing effects." #NEW
 #spy_construction_revolutions_desc: "With new ideas and political systems spreading over our established world we will need to allocate resources to support these dissenters in our rival's countries and extract valuable information." #OLD ENG
 revolutions_agressive_advance: "Conflitti Giustificati"
 #revolutions_agressive_advance_desc: "Il teatro diplomatico internazionale prospera grazie all'equilibrio di potere tra le nazioni. Pertanto, le guerre di aggressione sono malviste e, se vinte, potrebbero portare alla formazione di coalizioni che si uniscono contro il vincitore.\n Tuttavia, attraverso un uso intelligente della diplomazia e delle interpretazioni, possiamo far apparire i nostri nemici come gli aggressori, rendendo la nostra guerra e i nostri guadagni più che giustificati agli occhi dell'opinione pubblica." #OLD ITA
 revolutions_agressive_advance_desc: "The international diplomatic theater thrives on a balance of power between the nations. Wars of aggression are frowned upon and, if won, might lead to coalitions forming and uniting against the winner.\nThrough clever usage of diplomacy and interpretation, however, we can make our enemies appear as the aggressors against us, justifying our warmongering and gains from it in the eyes of the public." #NEW
 #revolutions_agressive_advance_desc: "The international diplomatic theater thrives for a balance of power of the nations. Thus, wars of aggression are frowned upon and, if won, might lead to the formation of coalitions uniting against the winner.\nThrough clever usage of diplomacy and interpretations, however, we can let our enemies appear as the aggressor against us, making our war and our gains more than justified in the eyes of the public." #OLD ENG
 subject_income_revolutions_advance: "Sovranità Remunerata"
 #subject_income_revolutions_advance_desc: "Mentre il mondo intorno a noi subisce enormi cambiamenti in tutti i settori, ora più che mai possiamo sfruttare i contratti di pagamento dei nostri soggetti in cambio del sostegno alla loro sopravvivenza." #OLD ITA
 subject_income_revolutions_advance_desc: "The world around us is undergoing tremendous change in all sectors. We can capitalize on this instability by formalizing tributary arrangements with subject nations in exchange for supporting them. Sovereign protection, it turns out, has a price." #NEW
 #subject_income_revolutions_advance_desc: "While the world around us undergoes tremendous changes in all sectors, now more than ever we can leverage payment contracts from our subjects in exchange for supporting their continued existence." #OLD ENG
 #artillery_vs_fort_age_6_revolutions: "Obici Avanzati" #OLD ITA
 artillery_vs_fort_age_6_revolutions: "Advanced Howitzers" #NEW
 #artillery_vs_fort_age_6_revolutions: "Advance Howitzers" #OLD ENG
 artillery_vs_fort_age_6_revolutions_desc: "La necessità di un'arma migliore che si collocasse tra il fuoco diretto dei cannoni d'assedio e quello indiretto con una traiettoria più alta dei mortai ha portato il nostro esercito a sviluppare nuovi obici che soddisfano questa esigenza.
 recruitment_improvements_revolutions: "Reclutamento di Massa"
 #recruitment_improvements_revolutions_desc: "Con la minaccia di conflitti che si estendono su un territorio molto più vasto che mai, dobbiamo ampliare di conseguenza il nostro sistema di reclutamento. Premiando i volontari che si arruolano nell'esercito e costringendo i criminali a prestare servizio, saremo in grado di reagire molto più rapidamente a qualsiasi pericolo." #OLD ITA
 recruitment_improvements_revolutions_desc: "With potential threats emerging from across a wider geographical expanse than ever before, we need to expand our military recruitment accordingly. By offering incentives to volunteers while also pressing criminals into service, we can rapidly mobilize forces to meet any danger." #NEW
 #recruitment_improvements_revolutions_desc: "With the threat of conflicts spanning much wider territory than ever before, we need to expand our recruitment system accordingly. By both rewarding volunteers joining the army and pressing criminal individuals into service we will be able to react much faster to any danger." #OLD ENG
 correct_box_advance_revolutions: "Stato Maggiore"
 #correct_box_advance_revolutions_desc: "La crescita degli eserciti e il loro impiego in campagne più lunghe ha reso necessario assegnare ufficiali fissi ai compiti di pianificazione e logistica, coordinando efficacemente i diversi corpi dell'esercito sul campo di battaglia." #OLD ITA
 correct_box_advance_revolutions_desc: "The growth of armies and their deployment in longer campaigns has created a need to assign designated officers to planning and logistics, focused on effectively coordinating the different corps on the battlefield." #NEW
 #correct_box_advance_revolutions_desc: "The growth of armies and its deployment in longer campaigns has created the necessity of assigning fixed officers to the planning and logistic duties, effectively coordinating the different army corps in the battlefield." #OLD ENG
 urbanization: "Urbanizzazione"
 #urbanization_desc: "Le nuove opportunità e la sicurezza che le città emergenti offrono alla nostra popolazione stanno attirando sempre più persone dalle fattorie delle zone rurali verso i posti di lavoro industriali creati dalle nuove e moderne fabbriche." #OLD ITA
 urbanization_desc: "The new opportunities and security offered by life in our emerging cities are drawing more and more people off of rural farms and into cities, where they are eager to take up industrial jobs created by the new, modern factories." #NEW
 #urbanization_desc: "The new opportunities and security that the emergent cities offer to our population are attracting more and more people out of the farms of the rural areas and into the industrial jobs created by the new and modern factories." #OLD ENG
 advanced_anti_piracy_warfare: "Rinuncia alla Pirateria"
 #advanced_anti_piracy_warfare_desc: "In quest'epoca di scoperte e pensiero umanistico non c'è più posto per i furti e le violenze che i pirati perpetrano in alto mare. Sempre più nazioni si stanno unendo per affrontare questa minaccia comune al benessere e alla prosperità di tutti e promettono di porre fine a questo flagello." #OLD ITA
 advanced_anti_piracy_warfare_desc: "In our age of discovery and humanism, there is no longer a place for the thievery and violence that pirates inflict on the high seas. More and more nations are banding together to face this common threat to the well-being and prosperity of all, and have sworn to put an end to this scourge." #NEW
 #advanced_anti_piracy_warfare_desc: "In this day and age of discoveries and humanistic thinking there is no longer a place for the thievery and violence that pirates inflict on the high seas. More and more nations are banding together to face this common threat to the well-being and prosperity of all and are promising to bring an end to this scourge." #OLD ENG
 dip_choice_subject_opinions: "Sudditi Emissari"
 #dip_choice_subject_opinions_desc: "La comunicazione continua con i nostri sudditi avrà sicuramente un impatto positivo sulle nostre relazioni, rafforzando il nucleo del nostro dominio e tutti i paesi che fedelmente si schierano sotto la nostra bandiera." #OLD ITA
 dip_choice_subject_opinions_desc: "Continued communication with our subject nations through dedicated emissaries will positively impact our relations, strengthening the core of our domain and ensuring the loyalty of all countries that stand under our banner." #NEW
 #dip_choice_subject_opinions_desc: "The continued communication with our subjects will surely have a positive impact on our relations, strengthening the core of our domain and all the countries that loyally stand under our banner." #OLD ENG
 early_anti_piracy_warfare: "Leghe Anti-Pirateria"
 #early_anti_piracy_warfare_desc: "La proliferazione di pirati, briganti e ladri nelle acque utilizzate dai nostri mercanti per commerciare e sostenere la nostra economia li ha costretti a unirsi e a formare delle Leghe Mercantili per facilitare la protezione delle loro imbarcazioni durante i lunghi viaggi." #OLD ITA
 early_anti_piracy_warfare_desc: "The proliferation of pirates, brigands, and robbers in the waters along our trade routes has forced our merchants to band together and form Merchant Leagues, which facilitate the protection of their boats during long journeys." #NEW
 #early_anti_piracy_warfare_desc: "The proliferation of pirates, brigands and robbers in the waters used by our merchants to trade and maintain our economy has forced them to band together and form Merchant Leagues to facilitate the protection of their boats during long journeys." #OLD ENG
 #pop_promotion_speed_age_5: "Burocrati Promossi" #OLD ITA
 pop_promotion_speed_age_5: "Bureaucratic Promotions" #NEW
 #pop_promotion_speed_age_5: "Promoted Bureaucrats" #OLD ENG
 #pop_promotion_speed_age_5_desc: "La burocrazia si sta espandendo per soddisfare le esigenze della burocrazia in espansione, aumentando la necessità di funzionari istruiti che possano entrare a far parte dei ranghi amministrativi." #OLD ITA
 pop_promotion_speed_age_5_desc: "The bureaucracy is expanding to meet the needs of the expanding bureaucracy, which correspondingly increases our need for educated officials to join the administrative ranks." #NEW
 #pop_promotion_speed_age_5_desc: "The bureaucracy is expanding to meet the needs of the expanding bureaucracy, increasing the needs of educated officials that could join the administrative ranks." #OLD ENG
 army_movement_speed_absolutism: "Magazines"
 #army_movement_speed_absolutism_desc: "L'uso dei depositi mobili non è una novità, ma la crescita senza precedenti degli eserciti moderni ne ha reso popolare l'utilizzo. La fornitura costante di munizioni che essi sono in grado di garantire a un esercito ne facilita i movimenti e ne amplia il raggio operativo." #OLD ITA
 army_movement_speed_absolutism_desc: "Field magazines are not new technology, but their use has been greatly popularized by the unparalleled growth of modern armies. The steady supply of ammunition they provide facilitates ease of army movement, and extends their operational range." #NEW
 #army_movement_speed_absolutism_desc: "The use of field magazines is not a discovery, but the unparalleled growth of modern armies has popularized their use. The steady supply of ammunition that they can provide to an army facilitates their movement and extends their operational range." #OLD ENG
 army_movement_speed_revolutions: "Contratti di Fornitura"
 #army_movement_speed_revolutions_desc: "Pagare prezzi equi per il cibo e le provviste di cui il nostro esercito ha bisogno mentre attraversa una regione, invece di saccheggiarla, accelera il movimento attraverso l'area, poiché gli stessi contadini porterebbero le loro merci ai punti di raccolta da noi istituiti." #OLD ITA
 army_movement_speed_revolutions_desc: "Paying fair prices for the food and supplies our army needs while moving through a region instead of raiding accelerates our movement through the area, as the peasants themselves will bring their goods to the collection points we establish." #NEW
 #army_movement_speed_revolutions_desc: "Paying fair prices for the food and supplies that our army needs while moving through a region instead of raiding, accelerates the movement through the area as the peasants themselves would bring their goods to the collection points we set up." #OLD ENG
 regiment_reinforcement_speed_absolutism: "Maresciallo dell'Alloggio"
 regiment_reinforcement_speed_absolutism_desc: "Gli eserciti permanenti sono diventati il nuovo standard della guerra, il che comporta una serie di sfide. Il Maresciallo dell'Alloggio, una nuova figura all'interno delle nostre forze armate, avrà il compito di superare queste sfide organizzando la logistica delle nostre forze in continua crescita."
 pop_promotion_speed_age_3: "Nobiltà al Servizio"
 #pop_promotion_speed_age_3_desc: "Tradizionalmente, i nobili ottenevano il loro status grazie al servizio militare prestato al loro sovrano. Tuttavia, le esigenze di uno stato in crescita richiedono che i membri della bassa nobiltà vengano promossi a ranghi più elevati, mentre altre persone, come i mercanti, hanno diritto al titolo nobiliare." #OLD ITA
 pop_promotion_speed_age_3_desc: "Traditionally, our artistocrats achieved their status through military service to their ruler. However, the demands of a growing state now necessitate members of the lower nobility being promoted to higher ranks, while people from other classes, such as merchants, are elevated as nobles." #NEW
 #pop_promotion_speed_age_3_desc: "Traditionally the Nobles achieved their status through military service to their ruler. However, the demands of a growing state are requiring members of the lower nobility to be promoted to higher ranks, while other people such as merchants are entitled as nobles." #OLD ENG
 regiment_reinforcement_speed_discovery: "Logistica Militare Anticipata"
 #regiment_reinforcement_speed_discovery_desc: "La logistica è metà della battaglia. Mentre i soldati combattono sul campo di battaglia, le loro armi e armature perdono la loro resistenza e si rompono sotto l'attacco nemico. La creazione di depositi di rifornimenti locali e altri metodi logistici ci consentono di riattrezzare un soldato con nuove armi in breve tempo." #OLD ITA
 regiment_reinforcement_speed_discovery_desc: "Logistics are half the battle. As soldiers fight, their weaponry and armor will lose their durability, and possibly even break under the enemy onslaught. Establishing local supply depots, as well as employing other logistic methods, allows us to re-equip our soldiers in record time." #NEW
 #regiment_reinforcement_speed_discovery_desc: "Logistics are half the battle. As soldiers fight on the battlefield, their weaponry and armor will lose their durability and break under the enemy attack. The establishment of local supply depots as well as other logistic methods allow us to re-equip a soldier with new weapons in a short time." #OLD ENG
 #pop_promotion_speed_age_4: "Clero Confessionale" #OLD ITA
 pop_promotion_speed_age_4: "Confessional Clerics" #NEW
 #pop_promotion_speed_age_4: "Confessional Clergymen" #OLD ENG
 #pop_promotion_speed_age_4_desc: "L'Era della Riforma e del Confessionalismo ha rinnovato l'interesse delle confessioni organizzate a impiegare un maggior numero di ecclesiastici per guidare il proprio gregge in questi tempi difficili, rendendo così gli uffici religiosi molto più attraenti per la popolazione." #OLD ITA
 pop_promotion_speed_age_4_desc: "The Age of Reformation and Confessionalism have renewed interest in organized confessions, and there is demand for more clerics willing to guide their flocks through these troublesome times. These confessional clergy make religious offices much more appealing to those people seeking certainty and spiritual guidance." #NEW
 #pop_promotion_speed_age_4_desc: "The Age of Reformation and Confessionalism has renewed the interest of organized confessions to deploy more clergymen to guide their flock in these troublesome times, therefore making the religious offices much more appealing to the people." #OLD ENG
 assault_ability_reformation: "Assalti Militari Riformati"
 #assault_ability_reformation_desc: "Affidando il compito di assaltare le fortificazioni ad alcune delle nostre truppe più agguerrite e disciplinate, riusciremo a sfondare anche le difese più solide e resistenti dietro cui i nostri nemici potrebbero nascondersi." #OLD ITA
 assault_ability_reformation_desc: "By delegating the responsibility of assaulting breaches to our finest and most disciplined troops, we will penetrate even the most formidable fortifications that our foes may hide behind." #NEW
 #assault_ability_reformation_desc: "By delegating the responsibility of assaulting breaches to some of our finest and most disciplined troops, we will punch through even the thickest and strongest of fortifications that our foes may hide behind." #OLD ENG
 regiment_reinforcement_speed_reformation: "Flacone di Polvere"
 #regiment_reinforcement_speed_reformation_desc: "Le armi da fuoco stanno diventando sempre più diffuse nelle nostre forze armate. Tuttavia, la polvere da sparo rimane un materiale difficile da maneggiare a causa della sua vulnerabilità alle condizioni atmosferiche e agli impatti esterni. La fiaschetta per polvere da sparo la proteggerà dagli agenti atmosferici, consentendoci di rifornire i nostri rinforzi con meno sforzo." #OLD ITA
 regiment_reinforcement_speed_reformation_desc: "Use of gunpowder weaponry has become increasingly prevalent among our fighting forces. However, gunpowder is a troublesome material to work with due to its vulnerability to weather and external impact. A specialized flask will protect our gunpowder from the elements, allowing us to supply our troops more easily." #NEW
 #regiment_reinforcement_speed_reformation_desc: "Gunpowder weaponry is increasingly becoming more prevalent in our forces. Yet, gunpowder still is a troublesome material to work with due to its vulnerability to weather and external impacts. The gunpowder flask will protect it from the elements, allowing us to supply our reinforcements with less effort." #OLD ENG
 pop_promotion_speed_age_2: "Mobilità Sociale Favorevole"
 #pop_promotion_speed_age_2_desc: "Il sogno della maggior parte dei contadini, quello di sfuggire alla povertà e scalare la scala sociale, è una realtà nella nostra società. Premiando il duro lavoro, la meticolosità e la corretta incarnazione dei nostri ideali, non avremo mai carenza di persone capaci e influenti." #OLD ITA
 pop_promotion_speed_age_2_desc: "The dream of most peasants — to escape poverty and climb the social ladder — is a reality within our society. By rewarding hard work, meticulousness, and the proper embodiment of our ideals, we will never have a shortage of capable and influential people." #NEW
 #pop_promotion_speed_age_2_desc: "The dream of most peasants, of escaping poverty and climbing the social ladder, is but a reality within our society. By rewarding hard work, meticulousness and the proper embodiment of our ideals, we will never have a shortage of capable and influential people." #OLD ENG
 regiment_reinforcement_speed_renaissance: "Formazione Permanente"
 #regiment_reinforcement_speed_renaissance_desc: "Gli eserciti professionali stanno cambiando il modo di condurre la guerra, che ora si basa su unità permanenti che prestano servizio per lunghi periodi. Mantenere un flusso regolare di soldati addestrati in queste unità è una sfida, ma è assolutamente necessario per il loro funzionamento." #OLD ITA
 regiment_reinforcement_speed_renaissance_desc: "Professional armies are shifting the way warfare is conducted, as now it is based on permanent units that serve for long periods of time. Maintaining a regular flow of trained soldiers into those units is a challenge, but very much needed for their optimal operation." #NEW
 #regiment_reinforcement_speed_renaissance_desc: "Professional armies are shifting the way warfare is conducted, as now it is based in permanent units serving throughout a long period. Keeping a regular flow of trained soldiers to those units is a challenge, but very much needed for their functioning." #OLD ENG
 pop_promotion_speed_age_6: "Mobilità Sociale Capitalista"
 #pop_promotion_speed_age_6_desc: "L'espansione del Capitalismo sta dando vita a una nuova era di mobilità sociale, in cui la ricchezza sta sostituendo le gerarchie tradizionali come mezzo per elevare lo status sociale, dai capitalisti agli impiegati agli operai industriali." #OLD ITA
 pop_promotion_speed_age_6_desc: "The expansion of capitalism has given birth to a new age of social mobility, in which wealth is replacing the traditional hierarchies as means of determining social status. Everyone, from business moguls to clerks to industrial laborers, is eager to buy their way into the upper strata." #NEW
 #pop_promotion_speed_age_6_desc: "The expansion of Capitalism is giving birth to a new age of social mobility, in which the wealth is replacing the traditional hierarchies as means of elevating the social status, from capitalists to clerks to industrial workers." #OLD ENG
 regiment_reinforcement_speed_revolutions: "Formazione di Massa"
 #regiment_reinforcement_speed_revolutions_desc: "Gli eserciti permanenti dei giorni nostri sono più imponenti di qualsiasi forza militare del passato. Le tattiche vengono eseguite da decine di migliaia di soldati e le vittime sono in numero senza precedenti. Il nostro nuovo addestramento militare terrà conto del numero di vittime della guerra moderna istruendo centinaia di soldati contemporaneamente." #OLD ITA
 regiment_reinforcement_speed_revolutions_desc: "Modern standing armies are grander than any military force of the past. Tactics are executed by the tens of thousands, and the casualties pile up in unprecedented numbers. Our new military training techniques should offset the high death toll of modern warfare by readying hundreds of soldiers for battle at the same time." #NEW
 #regiment_reinforcement_speed_revolutions_desc: "The standing armies of the modern day are grander than any military force of the past. Tactics are executed by the tens of thousands, and casualties are in unprecedented numbers. Our new military training will accommodate for the death toll of modern warfare by instructing hundreds of soldiers at the same time." #OLD ENG
 siege_ability_revolutions: "Ufficiali d'Artiglieria"
 #siege_ability_revolutions_desc: "L'importanza dell'artiglieria è cresciuta al punto che, nel teatro di guerra moderno, è ormai indispensabile disporre di ufficiali specializzati, addestrati sui requisiti tecnici dei cannoni e sulle moderne tattiche che consentono di sfruttarli al meglio." #OLD ITA
 siege_ability_revolutions_desc: "Artillery has become so central to modern warfare that specialized officers trained in gunnery techniques and tactical deployment are now essential on the battlefield." #NEW
 #siege_ability_revolutions_desc: "The importance of artillery has grown to the point that specialized officials trained in the technical requirements of the guns and the modern tactics that use them to their fullest are a necessity in the modern theater of war." #OLD ENG
 assault_ability_revolutions: "Marcia Contro il Fuoco"
 #assault_ability_revolutions_desc: "I nostri eserciti marciano volontariamente nel caos dei cannoni e della polvere mentre aprono la strada alle nostre truppe per conquistare i forti nemici. Nonostante i progressi nell'artiglieria e le nuove tecniche di fortificazione, la nostra abilità nell'assaltare le mura nemiche rimarrà impareggiabile." #OLD ITA
 assault_ability_revolutions_desc: "Our armies willingly march into the mayhem of cannon fire and dust, carving a path for our troops to take the enemy's forts. Despite advances in artillery and new fortification techniques, our skill in assaulting enemy walls remains unrivaled." #NEW
 #assault_ability_revolutions_desc: "Our armies willingly march into the mayhem of cannon fire and dust as they carve a path for our troops to take the enemy's forts. Despite advances in artillery and new fortification techniques, our skill in assaulting the enemy's walls shall remain unrivaled." #OLD ENG
 army_country_movement_speed_advance: "Gruppi di Ricognizione"
 #army_country_movement_speed_advance_desc: "Grazie all'impiego di esploratori a cavallo possiamo controllare il terreno davanti alle nostre truppe e pianificare le manovre dei nostri eserciti in base alle condizioni del terreno. Questo ci permette di attraversare gli stessi luoghi più rapidamente rispetto agli altri eserciti." #OLD ITA
 army_country_movement_speed_advance_desc: "Through the use of mounted scouts, we can check the terrain lying ahead of armies, and plan how to maneuver around any difficulties. This allows us to travel at a faster rate than other armies could in that same location." #NEW
 #army_country_movement_speed_advance_desc: "Through the usage of mounted scouts we can check the terrain ahead of our troops and plan the maneuver of our armies around it. This allows us to traverse the same locations at a faster rate as other armies would need." #OLD ENG
 army_country_casus_belli_advance: "Pretesti"
 #army_country_casus_belli_advance_desc: "La capacità dei nostri diplomatici professionisti e delle nostre spie di carriera di creare situazioni false ma credibili ci permette di inventare falsi pretesti che possiamo usare per giustificare quasi qualsiasi azione sulla scena internazionale." #OLD ITA
 army_country_casus_belli_advance_desc: "Our professional diplomats and spies excel at fabricating credible pretexts to justify almost any action we might take on the international stage." #NEW
 #army_country_casus_belli_advance_desc: "The ability of our professional diplomats and career spies to create false but credible situations allows us the creation of false pretexts that we can use to justify almost any action on the international stage." #OLD ENG
 army_country_integration_speed_advance: "Rispetta il Governo Locale"
 #army_country_integration_speed_advance_desc: "Il nostro popolo è composto da temibili signori della guerra che desiderano diffondere la loro eredità in ogni angolo del mondo. Per integrare e gestire il nostro dominio in continua espansione, abbiamo scelto di rispettare il più possibile il modo di comportarsi delle popolazioni locali conquistate." #OLD ITA
 army_country_integration_speed_advance_desc: "Our people are fearsome warlords who wish to spread their legacy to every corner of the world. As a means of integrating and managing our ever-growing domain, we have decided to mostly respect the way conquered locals conduct themselves, and not to interfere excessively." #NEW
 #army_country_integration_speed_advance_desc: "Our people are fearsome warlords who wish to spread their legacy to every corner of our world. As a means to integrate and manage our ever-growing domain, we opt to mostly respect the way conquered locals conduct themselves." #OLD ENG
 army_country_diplo_range_advance: "Inviati Armati"
 #army_country_diplo_range_advance_desc: "Il nostro esercito è temuto in lungo e in largo. Nonostante la nostra reputazione, dovremmo stabilire relazioni diplomatiche con le nazioni che hanno lo stesso obiettivo: la distruzione dei nostri nemici comuni. Inviando inviati ben armati e scortati alle corti straniere, possiamo garantire che la nostra influenza diplomatica non risenta delle esplosioni di violenza." #OLD ITA
 army_country_diplo_range_advance_desc: "Our army is feared far and wide. Despite our reputation, we should still establish diplomatic relations with nations that have the same goal as ourselves: the destruction of our common enemies. By sending well-armed and escorted envoys to foreign courts, we can ensure our diplomatic reach will not suffer under outbreaks of violence." #NEW
 #army_country_diplo_range_advance_desc: "Our army is feared far and wide. Despite our reputation, we should establish diplomatic relations with nations that have the same goal in mind: the destruction of our common enemies. By sending well-armed and escorted envoys to foreign courts, we can ensure our diplomatic reach will not suffer under outbreaks of violence." #OLD ENG
 minting_trade_range_trad_building: "Spedizioni Commerciali Pianificate"
 #minting_trade_range_trad_building_desc: "Il commercio con i paesi stranieri è la linfa vitale della nostra nazione. Pianificando meticolosamente le rotte commerciali e assicurandoci scorte sufficienti per ogni viaggio, possiamo raggiungere mercati più lontani dalle nostre basi." #OLD ITA
 minting_trade_range_trad_building_desc: "Trade with foreign countries is the lifeblood of our nation. By meticulously planning out the trading routes and stockpiling supplies for each voyage, we can reach markets further from our bases." #NEW
 #minting_trade_range_trad_building_desc: "Trade with foreign countries is the lifeblood of our nation. By meticulously planning the trading routes and securing enough stockpiles for each voyage we can reach markets further from our bases." #OLD ENG
 minting_trade_range_disc_building: "Depositi Commerciali Ampliati"
 #minting_trade_range_disc_building_desc: "Le crescenti esigenze del commercio internazionale dovranno essere prese in considerazione nella pianificazione delle nostre attività commerciali. Grazie all'espansione dei nostri depositi commerciali, potremo raggiungere nuovi lidi senza mettere a rischio i nostri preziosi carichi." #OLD ITA
 minting_trade_range_disc_building_desc: "The growing demands of international trade will need to be accounted for in the planning of our trading endeavors. With this expansion of our trade depots, we can reach new shores without risking our valuable cargo." #NEW
 #minting_trade_range_disc_building_desc: "The growing demands of international trade will need to be accounted for in the planning of our trading endeavors. With this expansion of our Trade Depots, we can reach new shores without risking our valuable cargo." #OLD ENG
 trade_center_building_country_advance: "Empori"
 #trade_center_building_country_advance_desc: "Con tecniche intelligenti, possiamo facilmente rendere i nostri mercati controllati più attraenti per i mercanti stranieri, aumentando così i profitti che ne ricaviamo." #OLD ITA
 trade_center_building_country_advance_desc: "With clever techniques, we can easily make our controlled markets more attractive to foreign merchants, increasing the amount of money we earn in the process." #NEW
 #trade_center_building_country_advance_desc: "With clever techniques, we can easily make our controlled markets more attractive to foreign merchants, increasing the amount of money we get from it in the process." #OLD ENG
 export_building_country_advance: "Esportazione Agile"
 #export_building_country_advance_desc: "I costi per esportare beni di valore dai nostri mercati controllati possono diventare piuttosto elevati, rendendo i nostri prodotti meno attraenti. Rendendo più rapide queste operazioni di esportazione, possiamo rendere il nostro commercio più dinamico." #OLD ITA
 export_building_country_advance_desc: "Costs to export valuable goods from our controlled markets can be quite high, making our products less attractive. By performing these export actions quicker, we can make our trade more dynamic." #NEW
 #export_building_country_advance_desc: "Costs to export valuable goods from our controlled markets can get quite high, making our products less attractive. By making these export actions quicker we can make our trade more dynamic." #OLD ENG
 counter_espionage_building_country_advance: "Codici Segreti"
 #counter_espionage_building_country_advance_desc: "È risaputo che le nostre attività attirano l'attenzione di occhi non sempre graditi. Se vogliamo tenere le nostre azioni lontane da questi sguardi curiosi, dovremmo crittografare le nostre comunicazioni." #OLD ITA
 counter_espionage_building_country_advance_desc: "It is well known that our activities attract unwelcome attention. If we wish to keep our plans hidden from these curious gazes, we should encrypt our communications." #NEW
 #counter_espionage_building_country_advance_desc: "It is well known that our activities attract the attention of not always welcomed eyes. If we want to keep our actions away from these curious gazes we should encrypt our communications." #OLD ENG
 medical_school_advance: "Facoltà di Medicina"
 #medical_school_advance_desc: "Siti specializzati per medici qualificati, le facoltà di medicina sono luoghi in cui gli studiosi imparano a conoscere il corpo umano, le sue malattie e come prevenirle o curarle." #OLD ITA
 medical_school_advance_desc: "Specialized sites for medical training, these schools are where scholars go to learn about the human body, diseases, and how to treat and prevent them." #NEW
 #medical_school_advance_desc: "Specialized sites for trained medicus, Medical Schools are where scholars go to learn about the human body, its diseases, and how to prevent or treat them." #OLD ENG
 #slave_manned_galleys: "Invio di Schiavi alle Galee" #OLD ITA
 slave_manned_galleys: "Slave-Manned Galleys" #NEW
 #slave_manned_galleys: "Manning Galleys with Slaves" #OLD ENG
 #slave_manned_galleys_desc: "Le grandi flotte di galee comportano costi enormi, poiché necessitano di un numero sufficiente di rematori per funzionare. Impiegando schiavi, possiamo essere certi di sostenere costi inferiori per l'utilizzo delle nostre flotte." #OLD ITA
 slave_manned_galleys_desc: "Massive galley fleets incur equally massive costs, as they must have enough oarsmen to function. By assigning slaves to this task, we can significantly lessen the cost of staffing our navies." #NEW
 #slave_manned_galleys_desc: "Massive galley fleets incur in massive costs as they need to be provided with enough oarsmen to function. By employing slaves, we can be sure that we will have lesser costs to use our navies." #OLD ENG
 
 
 jesuits_bark: "Corteccia dei Gesuiti"
 jesuits_bark_desc: "È stato osservato che alcune popolazioni indigene del Sud America utilizzano la corteccia di un albero specifico per curare i brividi. Grazie agli esperimenti di un farmacista gesuita, questa corteccia si è dimostrata efficace anche nel trattamento della malaria ed è già nota come “Corteccia dei Gesuiti”. Distribuirla alla popolazione colpita ridurrà notevolmente gli effetti della malattia."
 quinine: "Chinino"
 quinine_desc: "Sebbene la “Corteccia dei Gesuiti” sia stata efficace nel trattamento della malaria in passato, il suo consumo sotto forma di polvere di corteccia essiccata lascia molto spazio a miglioramenti. Isolando ed estraendo il vero componente curativo dalla corteccia, possiamo aumentare notevolmente l'efficacia del trattamento."
 
 state_efficiency: "Infrastrutture Locali"
 #state_efficiency_desc: "Nonostante la nostra attenzione sia rivolta alle questioni di portata nazionale, non dobbiamo trascurare i nostri legislatori statali locali e gli ufficiali giudiziari." #OLD ITA
 state_efficiency_desc: "Despite our focus on country-wide affairs, we must not neglect our local state legislators and bailiffs." #NEW
 #state_efficiency_desc: "Despite our focus on the country-wide scale of affairs, we must not neglect to tend to our local state legislators and bailiffs." #OLD ENG
 efficient_mining: "Estrazione Efficiente"
 #efficient_mining_desc: "Emanare un decreto per perfezionare ogni aspetto dell'estrazione dei metalli all'interno del nostro dominio, nel tentativo di regolamentarne la presenza nei nostri mercati. " #OLD ITA
 efficient_mining_desc: "We shall issue a decree to refine every aspect of metal mining within our domain, in an effort to regulate its presence in our markets. " #NEW
 #efficient_mining_desc: "Issue a decree to refine every aspect of metal mining within our domain, in an effort to regulate its presence in our markets. " #OLD ENG
 efficient_construction_plans: "Piani di Costruzione Efficienti"
 #efficient_construction_plans_desc: "La nostra efficiente pianificazione dei lavori di costruzione ci consente di portare a termine gli ordini senza prendere scorciatoie." #OLD ITA
 efficient_construction_plans_desc: "Our efficient building strategy allows us to complete complex work orders without taking any half measures." #NEW
 #efficient_construction_plans_desc: "Our efficient planning around construction allows us to complete orders of work without cutting any corners." #OLD ENG
 expanded_infrastructure_network: "Rete Infrastrutturale Ampliata"
 #expanded_infrastructure_network_desc: "La rete stradale all'interno della nostra nazione è una parte fondamentale della nostra prosperità commerciale e amministrativa. Pertanto, dovremmo preoccuparci di migliorarla e mantenerla." #OLD ITA
 expanded_infrastructure_network_desc: "Our national road network is a vital part of our commercial and administrative success. As such, we should care to maintain and improve it." #NEW
 #expanded_infrastructure_network_desc: "The road network within our nation is a vital part of our commercial and administrative flourishing. As such, we should care to improve and maintain it." #OLD ENG
 fort_logistics: "Logistica delle Fortificazioni"
 #fort_logistics_desc: "Ordinando il nostro sistema di fortificazioni in modo adeguato sia dal punto di vista costruttivo che logistico, potremo risparmiare denaro sulla sua manutenzione a lungo termine." #OLD ITA
 fort_logistics_desc: "By ordering our system of fortifications in an organized manner, both construction-wise and logistically, we may save some coin on maintaining it in the long term." #NEW
 #fort_logistics_desc: "By ordering our system of fortifications in a proper manner both construction-wise and logistically, we may save some coin on maintaining it in the long term." #OLD ENG
 regulation_bureau: "Ufficio di Regolamentazione"
 regulation_bureau_desc: "Un organo legislativo la cui giurisdizione comprende il mantenimento e la promozione delle leggi relative all'inflazione, nonché l'amministrazione locale delle nostre province."

 more_merchants_age_of_trad: "Gilde dei Mercanti"
 #more_merchants_age_of_trad_desc: "La formazione delle corporazioni ha plasmato il tessuto della nostra economia per molto tempo. Sebbene siano una realtà comune per i nostri artigiani, lo stesso non si può dire per i nostri mercanti. Dovremmo incoraggiare i mercanti a formare corporazioni allo stesso modo, per ottimizzare le nostre ambizioni mercantili." #OLD ITA
 more_merchants_age_of_trad_desc: "The formation of guilds has shaped our economy for a long time. While they are common organizations amongst our artisans, the same cannot be said for our merchants. We should encourage our traders to form similar guilds in order to streamline our mercantile ambitions." #NEW
 #more_merchants_age_of_trad_desc: "The Formation of Guilds has shaped the fabric of our economy for a long time. While they are a common occurrence for our craftsmen, the same can not be said for our merchants. We should encourage the traders to form guilds the same way to streamline our mercantile ambitions." #OLD ENG
 construction_speed_traditions: "Maestri Muratori"
 construction_speed_traditions_desc: "I nostri sforzi nel campo dell'edilizia non dovrebbero mai fermarsi e lasciare i nostri villaggi e le nostre città inattivi. Assumendo un capomastro, che supervisionerà e pianificherà i nostri lavori di costruzione, potremo apportare miglioramenti significativi nell'espansione del nostro paese."
 diplomatic_capacity_traditions: "Archivi Ampliati"
 diplomatic_capacity_traditions_desc: "Le normali attività diplomatiche richiedono pratiche burocratiche e una documentazione dettagliata dei nostri contatti."
 #rural_rgo_traditions: "Bonifica del Terreno" #OLD ITA
 rural_rgo_traditions: "Clearing Terrain" #NEW
 #rural_rgo_traditions: "Clearing of Terrain" #OLD ENG
 #rural_rgo_traditions_desc: "Dobbiamo addomesticare le zone più remote del nostro paese per espandere le nostre capacità economiche. Non solo forniremo più spazio al nostro popolo, ma potremo anche migliorare il suo contributo al paese." #OLD ITA
 rural_rgo_traditions_desc: "We must tame the far reaches of our country in order to expand our economic capabilities. Not only will we provide more space for our people, but we can optimize their contributions to our country." #NEW
 #rural_rgo_traditions_desc: "We must tame the far reaches of our country to expand our economic capabilities. Not only will we provide more space for our people, but we can improve their contribution to our country." #OLD ENG
 matchlock_gun: "Fucili da Caccia Primitivi"
 #matchlock_gun_desc: "I miglioramenti apportati alle armi dai nostri armaioli forniranno inoltre ai nostri cacciatori strumenti migliori per portare a casa abbondanti bottini di pellicce e selvaggina." #OLD ITA
 matchlock_gun_desc: "Improvements to the weapons produced by our gunsmiths will also provide our hunters with better tools to bring home ample furs and wild game." #NEW
 #matchlock_gun_desc: "Improvements to the guns produced by our gunsmiths will also provide our hunters with better tools to bring home ample furs and wild game." #OLD ENG
 flintlock_gun: "Fucili da Caccia Migliorati"
 #flintlock_gun_desc: "Grazie alle pistole a pietra focaia migliorate e alle munizioni speciali per la caccia, i nostri cacciatori saranno ancora più abili nel catturare le loro prede." #OLD ITA
 flintlock_gun_desc: "With the development of improved flintlock guns and special ammunition for hunting, our hunters will be even more capable of bagging their prey." #NEW
 #flintlock_gun_desc: "With the improved flintlock guns and special ammunition for hunting, our hunters will be even more capable of getting their prey." #OLD ENG
 long_rifle: "Fucile Lungo da Caccia"
 #long_rifle_desc: "Con fucili specifici a canna lunga realizzati appositamente per la caccia, i nostri cacciatori avranno a disposizione uno strumento affidabile per procurarsi sia la selvaggina che le pellicce." #OLD ITA
 long_rifle_desc: "With specific long rifles designed for hunting, our hunters will have a reliable tool for procuring food and furs." #NEW
 #long_rifle_desc: "With specific long rifle guns manufactured for hunting, our hunters will have a reliable tool available to get both wild game and furs." #OLD ENG
 
