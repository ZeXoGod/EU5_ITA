 bur_between_two_realms: "Tra Due Regni"
 #bur_between_two_realms_desc: "Possiamo considerarci membri sia delle terre tradizionali del $hre$ che del regno di $FRA$. Sebbene ciò possa complicare i rapporti feudali, queste circostanze ci hanno resi abili diplomatici, capaci di giocare su entrambi i fronti a nostro vantaggio." #OLD ITA
 bur_between_two_realms_desc: "We can consider ourselves to be both members of the traditional lands of the $hre$, and of the realm of $FRA$. While this can complicate feudal relations, the situation has molded us into adept diplomats, able to skillfully play both sides to our own advantage." #NEW
 #bur_between_two_realms_desc: "We can consider us both members of the traditional lands of the $hre$ and of the realm of $FRA$. While this can complicate feudal relations, the situations made us into adept diplomats, being able to play both sides to our own advantage." #OLD ENG
 bur_knightly_prowess: "Prodezza Cavalleresca"
 #bur_knightly_prowess_desc: "Occupiamo una posizione prestigiosa all'interno del sistema feudale della $FRA$. Pertanto, è giusto che le nostre truppe siano viste come un riflesso dello spirito $BUR_ADJ$." #OLD ITA
 bur_knightly_prowess_desc: "We occupy a prestigious position within the feudal system of $FRA$. Therefore, it is only right that our troops are seen as a reflection of the $BUR_ADJ$ spirit." #NEW
 #bur_knightly_prowess_desc: "We occupy a prestigious position within the feudal system of $FRA$. Therefore, it is only right, that our troops are seen as a reflection of the $BUR_ADJ$ spirit." #OLD ENG
 bur_rich_soil_of_burgundy: "Promuovi l'Agricoltura"
 #bur_rich_soil_of_burgundy_desc: "Le terre di $BUR$ sono particolarmente adatte alla coltivazione di piante e all'allevamento di animali. Soprattutto l'uva si adatta perfettamente alle condizioni del luogo. Grazie alle nostre competenze in materia di coltivazione, dovrebbe essere facile promuovere lo sviluppo dell'industria agricola." #OLD ITA
 bur_rich_soil_of_burgundy_desc: "The lands of $BUR$ are well-suited to growing plants and herding animals. Grapes are particularly apt for local growing conditions. With skilled cultivation, it should be easy to foster an agricultural industry." #NEW
 #bur_rich_soil_of_burgundy_desc: "The lands of $BUR$ are well suited to grow plants and herd animals. Especially grapes are perfectly suited for the conditions. With our skilled cultivation it should be easy to foster an agricultural industry." #OLD ENG
 mos_skilled_tax_collectors: "Esattori delle Tasse"
 #mos_skilled_tax_collectors_desc: "La nostra posizione di esattori dei tributi per l'$GLH_horde$ ci ha permesso di acquisire molti anni di esperienza nella raccolta dei tributi e di trattenere per noi una parte dei profitti." #OLD ITA
 mos_skilled_tax_collectors_desc: "Our position as the collector of tribute for the $GLH_horde$ has given us many years of experience in gathering tribute... and in retaining some of the profits for ourselves." #NEW
 #mos_skilled_tax_collectors_desc: "Our position as the collector of tribute for the $GLH_horde$ has given us many years of experience in gathering tribute and retaining some of the profits for ourselves." #OLD ENG
 mos_dynastic_ties: "Governare attraverso i Legami Dinastici"
 #mos_dynastic_ties_desc: "Le terre della $russian_region$ sono state governate da una sola dinastia per molto tempo. Dovremmo sfruttare la nostra posizione tra i nostri pari e i nostri legami di sangue per assumere un ruolo di leadership." #OLD ITA
 mos_dynastic_ties_desc: "The lands of $russian_region$ have been ruled by one dynasty since time immemorial. We should utilize our position among our peers and our blood ties to take a leading role." #NEW
 #mos_dynastic_ties_desc: "The lands of $russian_region$ have been ruled by one dynasty for a long time. We should utilize our position among our peers and our blood ties to take a leading role." #OLD ENG
 mos_patrol_the_territories: "Leve Organizzate"
 #mos_patrol_the_territories_desc: "Governare la vasta distesa della $russian_region$ non è un compito facile. Dovremmo istituire centri di reclutamento locali per facilitare l'arruolamento nelle nostre armate." #OLD ITA
 mos_patrol_the_territories_desc: "Governing the vast expanse of $russian_region$ is no easy task. We should establish local recruitment centers to make drafting levies into our armies easier." #NEW
 #mos_patrol_the_territories_desc: "Governing the vast expanse of $russian_region$ is no easy task. We should establish local centers of recruitment to ease the drafting of levies into our armies." #OLD ENG
 russian_integration: "Tradizione $russian_group$"
 #russian_integration_desc: "Il $russian_group$ è vasto e diversificato nella sua cultura. Per unificarlo come facevano i sovrani del passato, dovremmo valorizzare la nostra storia comune e creare un legame indissolubile tra le persone." #OLD ITA
 russian_integration_desc: "The $russian_group$ are vast and diverse in their culture. To unify them like the rulers of old once did, we should promote our shared history and forge an unbreakable cultural bond between the different groups." #NEW
 #russian_integration_desc: "The $russian_group$ are vast and diverse in their culture. To unify them like the rulers of old, we should elevate our shared history and forge a bond between the people that will become unbreakable." #OLD ENG
 russian_resiliance: "Reclutamento $russian_group$"
 #russian_resiliance_desc: "Le invasioni del passato da parte del $mongolian_group$ hanno lasciato nel $russian_group$ una forte determinazione a resistere al dominio straniero. Possiamo sfruttare la loro motivazione per aumentare il numero delle nostre truppe." #OLD ITA
 russian_resiliance_desc: "The $mongolian_group$ invasions of the past left a strong determination within the $russian_group$ to resist foreign rule. We can utilize their zeal to reinforce our troops." #NEW
 #russian_resiliance_desc: "The $mongolian_group$ invasions of the past left a strong determination within the $russian_group$ to resist foreign rule. We can utilize their drive to bolster the number of our troops." #OLD ENG
 land_of_the_rus: "Terra dei Rus'"
 #land_of_the_rus_desc: "La riunificazione della Rus' è un obiettivo comune tra i governanti $russian_group$ e gli aspiranti conquistatori possono utilizzarlo come giustificazione per la conquista." #OLD ITA
 land_of_the_rus_desc: "Reunification of the Rus' is a common goal among the $russian_group$ rulers, and aspiring conquerors can use this as a justification of conquest." #NEW
 #land_of_the_rus_desc: "Reunification of the Rus' is a common goal among the $russian_group$ rulers and the aspiring conquerors can use this as a justification of conquest." #OLD ENG
 russian_legitimization: "Legittimità Comune"
 #russian_legitimization_desc: "Il popolo $russian_group$ ha occupato e governato queste terre per secoli. È naturale che sia un sovrano $russian_group$ a governare il proprio popolo. Più ci presentiamo come $russian_group$, più facile sarà per il popolo accettare il nostro governo." #OLD ITA
 russian_legitimization_desc: "The $russian_group$ people have occupied and ruled these lands for centuries. It is only natural that a $russian_group$ ruler should govern their own people. The more $russian_group$ we present ourselves to be, the easier the people will accept our leadership." #NEW
 #russian_legitimization_desc: "The $russian_group$ people have occupied and ruled these lands for centuries. It is only natural that it should be a $russian_group$ ruler governing their own people. The more $russian_group$ we present ourselves, the easier the people will accept our rule." #OLD ENG
 nor_seaborn_country: "Paese Marittimo"
 #nor_seaborn_country_desc: "Il popolo $NOR_ADJ$ ha sempre scelto di attraversare il paese in barca, ogni volta che era conveniente. Questo rende il nostro popolo adatto alla vita marinara, pronto a servire nella nostra marina militare quando necessario." #OLD ITA
 nor_seaborn_country_desc: "The $NOR_ADJ$ people have always chosen to traverse the country by boat, whenever it is convenient. This makes our people adept sailors, ready to man our navy whenever necessary." #NEW
 #nor_seaborn_country_desc: "The $NOR_ADJ$ people have always chosen to traverse the country rather on boat, whenever it is convenient. This makes our people adapt sailors, ready to man our navy when it is necessary." #OLD ENG
 #nor_bounties_of_the_sea: "I Doni del Mare" #OLD ITA
 nor_bounties_of_the_sea: "Bountiful Seas" #NEW
 #nor_bounties_of_the_sea: "Bounties of the Sea" #OLD ENG
 #nor_bounties_of_the_sea_desc: "La terra $NOR_ADJ$ non è in grado di fornire alla nostra gente il necessario per il proprio sostentamento. Ci rivolgeremo quindi al mare per procurarci il cibo e, fortunatamente, le acque del Mare del Nord ci offrono abbondanti zone di pesca da sfruttare." #OLD ITA
 nor_bounties_of_the_sea_desc: "The $NOR_ADJ$ land cannot provide our people with enough food to sustain themselves. We will look to the sea to feed our people instead. Fortunately, the waters of the North Sea provide us with plenty of fishing grounds." #NEW
 #nor_bounties_of_the_sea_desc: "The $NOR_ADJ$ land can not provide our people with enough to sustain themselves. We will look out to the sea to provide our people with food instead and fortunately the waters of the North Sea gives us plenty of fishing grounds to use." #OLD ENG
 #nor_merchant_tradition: "Mercanti Norvegesi" #OLD ITA
 nor_merchant_tradition: "$NOR_ADJ$ Merchants" #NEW
 #nor_merchant_tradition: "Norwegian Merchants" #OLD ENG
 #nor_merchant_tradition_desc: "I porti di $NOR$ sono da tempo una meta ambita dai mercanti di tutta $europe$. È giunto il momento non solo di ospitare mercanti stranieri nei nostri porti, ma anche di trarre noi stessi vantaggio dai commerci dell'$europe$ settentrionale." #OLD ITA
 nor_merchant_tradition_desc: "The ports of $NOR$ have long been a desirable destination for merchants from all around $europe$. It is time that we not only host foreign merchants in our ports, but benefit from the trades of northern $europe$ ourselves." #NEW
 #nor_merchant_tradition_desc: "The ports of $NOR$ have long been desired destination for merchants from all around $europe$. It is time that we not only host foreign merchants in our ports, but benefit from the trades of northern $europe$ ourselves." #OLD ENG

