 age_1_traditions: "Tradizioni"
 age_1_traditions_desc: "Da migliaia di anni in tutto il mondo sono state fondate diverse società, le cui fondamenta possono essere inquadrate in tradizioni quali $legalism$, $meritocracy$ o $feudalism$."
 age_2_renaissance: "Rinascimento"
 age_2_renaissance_desc: "Le società influenzate dalla $mge_pax_mongolica$, dall'$islamic_golden_age$ e dal $renaissance$ in $europe$ stanno assistendo alla nascita di una nuova era di conoscenza, arte e innovazione grazie all'aumento delle interazioni con l'estero e alla creazione di nuove istituzioni."
 age_3_discovery: "Scoperte"
 age_3_discovery_desc: "Con l'avvento dell'età moderna, vengono mappati nuovi continenti, mentre la società feudale sta lentamente cedendo il passo a Stati centralizzati.\nPer un leader intraprendente, questa epoca è il momento perfetto per gettare le basi di un impero che abbraccia tutto il globo..."
 age_4_reformation: "Riforme"
 age_4_reformation_desc: "Da est a ovest, questa è l'era delle convinzioni religiose, dei dibattiti e dei movimenti di massa. Le chiese protestanti sono radicate in $europe$, il millenarismo ha preso piede in Iran e il $religious_syncretism$ plasma la società in $india$."
 age_5_absolutism: "Assolutismo"
 age_5_absolutism_desc: "Man mano che i governi acquisiscono l'autorità assoluta sui propri paesi, la loro dedizione si sposta dall'accumulo di potere alla costruzione di imperi. Questa è l'era dello Stato, dei sovrani e dei loro eserciti."
 age_6_revolutions: "Rivoluzioni"
 age_6_revolutions_desc: "La riflessione dell'Illuminismo sui diritti, sull'autorità e sulla natura stessa del nostro mondo ha portato al rifiuto diffuso delle vecchie gerarchie. Mentre l'assolutismo crolla sotto il peso della rivoluzione, anche i regni vengono abbattuti per lasciare spazio alle repubbliche..."
