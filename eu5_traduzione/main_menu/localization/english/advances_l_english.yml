 age_1_traditions: "Tradizioni"
 #age_1_traditions_desc: "Nel corso dei secoli e dei millenni, in tutto il mondo sono state fondate diverse società, le cui basi possono essere ricondotte a tradizioni quali il Legalismo, la Meritocrazia o il Feudalesimo." #OLD ITA
 age_1_traditions_desc: "Different societies have been established all over the world for thousands of years, and their foundations can be framed in traditions such as $legalism$, $meritocracy$, or $feudalism$." #NEW
 #age_1_traditions_desc: "Different societies have been established throughout the world for hundreds and thousands of years, and their foundations can be framed in traditions such as Legalism, Meritocracy, or Feudalism." #OLD ENG
 age_2_renaissance: "Rinascimento"
 #age_2_renaissance_desc: "Una nuova era di conoscenza, arte e progresso sta emergendo grazie alle crescenti interazioni e istituzioni nelle società medievali influenzate dalla Pax Mongolica, dall'Età dell'Oro Islamica e dal Rinascimento Europeo." #OLD ITA
 age_2_renaissance_desc: "Societies affected by the $mge_pax_mongolica$, $islamic_golden_age$, and $renaissance$ in $europe$ are witnessing the emergence of a new era of knowledge, art, and innovation as a result of increased foreign interactions and the establishment of new institutions." #NEW
 #age_2_renaissance_desc: "A new era of knowledge, arts, and progress is emerging due to growing interactions and institutions in the medieval societies affected by Pax Mongolica, the Islamic Golden Age, and the European Renaissance." #OLD ENG
 age_3_discovery: "Scoperte"
 #age_3_discovery_desc: "All'alba dell'era moderna vengono mappati nuovi continenti, mentre la società feudale sta lentamente cedendo il passo a stati centralizzati.\nPer uno stato intraprendente, questa epoca può vedere la fondazione di un impero mondiale." #OLD ITA
 age_3_discovery_desc: "As the Early Modern Era dawns, new continents are being mapped, while feudal society is slowly giving way to centralized states.\nFor an enterprising leader, this age is the perfect time to build the foundations of a globe-spanning empire..." #NEW
 #age_3_discovery_desc: "At the dawn of the Early Modern era new continents are being mapped while feudal society is slowly giving way to centralized states.\nFor an enterprising state this age can see the foundation of a worldwide empire." #OLD ENG
 age_4_reformation: "Riforme"
 #age_4_reformation_desc: "Da est a ovest, questa è l'epoca delle convinzioni religiose, dei dibattiti e dei movimenti di massa. In Europa, le chiese Protestanti sono consolidate, mentre il millenarismo prende piede in Iran e il sincretismo religioso plasma la società indiana." #OLD ITA
 age_4_reformation_desc: "From East to West, this is the age of religious conviction, debate, and mass movements. $protestant$ churches are entrenched in $europe$, millenarianism has taken hold of Iran, and $religious_syncretism$ shapes society in $india$." #NEW
 #age_4_reformation_desc: "From East to West this is the age of religious conviction, debates and mass movements. In Europe, the Protestant churches are entrenched while millenarianism takes hold of Iran and religious Syncretism shapes Indian society." #OLD ENG
 age_5_absolutism: "Assolutismo"
 #age_5_absolutism_desc: "Man mano che i governi strappano il potere assoluto nei loro paesi ad altre parti, sono ora in grado di dedicarsi alla costruzione di imperi. Questa è l'era dello Stato, dei governanti e dei loro eserciti." #OLD ITA
 age_5_absolutism_desc: "As governments seize absolute authority over their countries, their devotion turns from amassing power to building empires. This is the age of the state; of rulers and their armies." #NEW
 #age_5_absolutism_desc: "As governments wrest the absolute power in their countries from other parties, they are now able to devote themselves to the building of Empires. This is the age of the state, of rulers, and their armies." #OLD ENG
 age_6_revolutions: "Rivoluzioni"
 #age_6_revolutions_desc: "La messa in discussione dei diritti, dell'autorità e del mondo stesso durante l'Illuminismo ha portato al rifiuto dell'Ancien Régime. Con il passaggio dell'Assolutismo alla Rivoluzione, i regni potrebbero dover lasciare il posto alle Repubbliche." #OLD ITA
 age_6_revolutions_desc: "The Enlightenment's interrogation of rights, authority, and the nature of our world itself has led to widespread rejection of the old hierarchies. As absolutism crumbles before revolution, so too are kingdoms brought down to make way for republics..." #NEW
 #age_6_revolutions_desc: "The questioning of rights, authority and the world itself during the Enlightenment has led to the rejection of the Ancient Regime. As Absolutism gives way to Revolution kingdoms may have to make place for Republics." #OLD ENG
