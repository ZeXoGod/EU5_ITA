 increase_control_area_advance: "Aumenta Controllo su Vasta Scala"
 increase_control_area_advance_desc: "Man mano che il nostro potente paese cresce, dovremo tenere sotto stretto controllo la nostra popolazione.
 improved_supply_lines: "Linee di Fornitura Migliorate"
 improved_supply_lines_desc: "La guerra moderna richiede sempre più risorse per i nostri eserciti, soprattutto dopo lo sviluppo del fuoco di salva e l'uso diffuso dell'artiglieria sul campo di battaglia."
 supply_lines: "Linee di Fornitura"
 #supply_lines_desc: "Lo sviluppo degli eserciti professionali ha cambiato il modo di fare la guerra. La logistica è ora essenziale e le linee di rifornimento sono assolutamente necessarie per mantenere gli eserciti nutriti e riforniti di munizioni." #OLD ITA
 supply_lines_desc: "The development of professional armies has changed the way war is waged. Logistics are now essential, and supply lines are absolutely necessary to keep armies fed and supplied with ammunition." #NEW
 #supply_lines_desc: "The development of professional armies has changed the way war is waged. Logistics is now essential, and supply lines are absolutely necessary to keep armies fed and supplied with ammunition." #OLD ENG
 improved_logistics: "Logistica Migliorata"
 #improved_logistics_desc: "L'arte moderna della guerra oggi distingue chiaramente tra funzionari dilettanti che parlano di tattica e funzionari professionisti che studiano la logistica." #OLD ITA
 improved_logistics_desc: "The modern art of war nowadays clearly differentiates between amateur officers who talk about tactics, and professional officers who actually study logistics." #NEW
 #improved_logistics_desc: "The modern art of war nowadays clearly differentiates between amateur officials who talk about tactics and professional officials who study logistics." #OLD ENG
 mining_advance: "Estrazione Mineraria"
 mining_advance_desc: "L'estrazione mineraria è stata un'attività economica fondamentale sin dagli albori dell'umanità. L'uso diffuso della lavorazione dei metalli non ha fatto altro che aumentare l'importanza della prospezione e dell'estrazione di diversi tipi di minerali e metalli per lo sviluppo di società complesse." 
 bronze_working: "Lavorazione del Bronzo" 
 #bronze_working_desc: "Il bronzo è una lega di rame e stagno, scoperta e sviluppata per realizzare utensili e armi molto più resistenti, poiché è anche un materiale più duttile e più facile da lavorare rispetto al rame." #OLD ITA
 bronze_working_desc: "Bronze is an alloy of $copper$ and $tin$, discovered and developed to make much more durable tools and weapons, as it also more ductile and easier to work with than $copper$." #NEW
 #bronze_working_desc: "Bronze is the alloy of copper and tin, discovered and developed to make much more durable tools and weapons, as it also is a more ductile and easier to work material compared to copper." #OLD ENG
 #iron_working: "Lavorazione del Ferro" #OLD ITA
 iron_working: "$iron$ Working" #NEW
 #iron_working: "Iron Working" #OLD ENG
 #iron_working_desc: "Il ferro è un materiale fondamentale per la produzione di diversi tipi di utensili e armi, rendendolo essenziale per il commercio dei fabbri che si trovano in ogni villaggio, ma anche per le catene di produzione più grandi." #OLD ITA
 iron_working_desc: "$iron$ is a key material for the production of different types of tools and weapons, making it vital for village blacksmiths as well as large manufacturing chains." #NEW
 #iron_working_desc: "Iron is a key material for the production of different types of tools and weapons, making it key to the trade of blacksmiths who can be found in every village, but also to larger manufacturing chains." #OLD ENG
 advanced_mining: "Estrazione Mineraria Avanzata" 
 #advanced_mining_desc: "Lo sviluppo di strumenti più avanzati e resistenti ha reso possibile un'ulteriore espansione delle attività minerarie per l'estrazione di nuovi minerali e metalli." #OLD ITA
 advanced_mining_desc: "The development of more advanced and durable tools has made possible to further expand mining operations for new minerals and metals." #NEW
 #advanced_mining_desc: "The development of more advanced and durable tools has made possible to further expand the mining operations for new minerals and metals." #OLD ENG
 fine_metals_mining: "Estrazione di Metalli Preziosi" 
 fine_metals_mining_desc: "La scoperta e lo sviluppo di nuove leghe metalliche hanno reso possibile l'estrazione e lo sfruttamento di nuovi metalli preziosi su scala più ampia, rendendo il processo altamente redditizio rispetto ad altri tipi di attività mineraria." 
 ranching: "Allevamento" 
 #ranching_desc: "L'allevamento del bestiame ha sviluppato la possibilità di allevare mandrie di cavalli, il che ha reso possibile allevare gli animali migliori per i viaggi, le guerre e molti altri compiti." #OLD ITA
 ranching_desc: "Cattle breeding led to the ability to raise entire herds of horses, which in turn has made it possible to breed the best animals for travel, war, and many other tasks." #NEW
 #ranching_desc: "Cattle breeding developed the possibility of raising herds of horses, which made it possible to breed the best animals for travel, wars and many other tasks." #OLD ENG
 mining_law_advance: "$mining_law$"
 mining_law_advance_desc: "$mining_law_desc$"
 
 
 fort_limit_1_advance: "Sistema Castellania"
 fort_limit_1_advance_desc: "I castellani ufficiali vengono nominati per gestire le fortezze locali e le loro guarnigioni, segnando il primo quadro organizzato per l'amministrazione e la manutenzione delle fortezze."
 fort_limit_2_advance: "Guardie di Frontiera"
 fort_limit_2_advance_desc: "I guardiani regionali coordinano diversi castelli lungo le marche di frontiera, stabilendo rotte di rifornimento, catene di comando e difesa reciproca tra roccaforti vicine."
 fort_limit_3_advance: "Ufficio della Difesa"
 #fort_limit_3_advance_desc: "La corona centralizza la supervisione delle fortificazioni sotto un ufficio formale nella capitale, consolidando registri, fondi e ordini di manutenzione in un'unica autorità amministrativa." #OLD ITA
 fort_limit_3_advance_desc: "The $crown_estate$ centralizes oversight of fortifications under a formal bureau in the capital, consolidating records, funds, and maintenance orders into a single administrative authority." #NEW
 #fort_limit_3_advance_desc: "The crown centralizes oversight of fortifications under a formal bureau in the capital, consolidating records, funds, and maintenance orders into a single administrative authority." #OLD ENG
 fort_limit_4_advance: "Ispettori Generali"
 fort_limit_4_advance_desc: "Ispettori professionisti viaggiano per il regno per valutare guarnigioni, magazzini e mura, applicando standard uniformi e garantendo l'affidabilità di ogni luogo fortificato."
 fort_limit_5_advance: "Ingegneria Standardizzata"
 fort_limit_5_advance_desc: "Vengono introdotti standard nazionali per la costruzione e la riparazione, consentendo una pianificazione efficiente, progetti condivisi e una manutenzione prevedibile in tutta la nostra rete di fortezze.."
 fort_limit_6_advance: "Servizi Topografici"
 fort_limit_6_advance_desc: "Una mappatura completa e l'integrazione logistica collegano ogni fortezza in un sistema difensivo coerente; un risultato ottenuto grazie alla collaborazione tra burocrazia, scienza e potere statale."
 
 chancery_advance: "Cancelleria"
 #chancery_advance_desc: "Una Cancelleria è un ufficio burocratico che i sovrani medievali hanno creato per governare i propri domini, poiché i cambiamenti sociali li rendevano sempre più complessi e difficili da gestire. La funzione principale di una Cancelleria è quella di redigere, inviare e ricevere documenti relativi alla gestione di tali domini." #OLD ITA
 chancery_advance_desc: "A chancery is a bureaucratic office that medieval rulers developed for governing their domains as societal changes made them more complex and increasingly difficult to manage. The main function of a chancery is to write, send, and receive documents related to the management of these domains." #NEW
 #chancery_advance_desc: "A Chancery is a bureaucratic office that medieval rulers have developed for governing their domains as societal changes made them more complex and increasingly difficult to manage. The main function of a Chancery is to write, send and receive documents related to the management of these domains." #OLD ENG
 chancery_records: "Documenti della Cancelleria"
 #chancery_records_desc: "Il crescente apparato delle Cancellerie richiedeva un altro livello di amministrazione, poiché la loro burocrazia stava diventando sempre più complessa da gestire. Ciò si concretizzò nella forma dei Registri della Cancelleria, un ufficio istituito per conservare tutte le lettere ricevute dalla Cancelleria, nonché una copia di tutti i documenti emessi dai suoi scrivani e notai." #OLD ITA
 chancery_records_desc: "The growing apparatus of chanceries requires another level of administration, since their bureaucracy is becoming even more complex to manage. This comes in the form of chancery records, an office established to keep all letters received at the chancery, as well as a copy of all the documents issued by its scribes and notaries." #NEW
 #chancery_records_desc: "The growing apparatus of Chanceries required another level of administration since their bureaucracy is becoming even more complex to manage. This comes in the form of Chancery Records, an office established to keep all letters received at the Chancery, as well as a copy of all the documents issued by its scribes and notaries." #OLD ENG
 lieutenancy_advance: "Luogotenenza"
 lieutenancy_advance_desc: "Con l'espansione del patrimonio della Corona, le prolungate assenze del monarca dai vari regni indeboliscono la Corona e mettono a dura prova i rapporti con i sudditi. Per ovviare a questo problema, nasce la figura del luogotenente, che funge da rappresentante temporaneo del monarca durante le sue assenze, che non sono destinate a essere permanenti. Questi luogotenenti non provengono solo dalla stirpe reale, ma anche dalla cerchia domestica legata alla famiglia del re."
 viceroyalty_advance: "Vicereame"
 viceroyalty_advance_desc: "Un vicereame è un'unità territoriale distinta e semi-autonoma all'interno di un regno, caratterizzata come uno stato monarchico governato da un viceré designato. Queste entità amministrative sono affidate a un viceré, nominato dal monarca, con la responsabilità cruciale di gestire e governare un paese o una provincia specifici. Tipicamente situato lontano dal centro del regno, il vicereame opera come entità separata, esibendo un certo grado di autogoverno pur essendo in ultima analisi responsabile nei confronti del monarca regnante. Il ruolo del viceré comprende una vasta gamma di compiti, tra cui l'attuazione delle politiche, il mantenimento dell'ordine e la rappresentanza dell'autorità del re nella regione designata."


 #tolerance_idea: "Idee sulla Tolleranza" #OLD ITA
 tolerance_idea: "Ideas of Tolerance" #NEW
 #tolerance_idea: "Tolerance Ideas" #OLD ENG
 #tolerance_idea_desc: "Ogni essere umano è stato creato uguale al Creatore, e quindi comprendiamo che le loro credenze, anche se errate, possono essere accettate come mezzo per una futura conversione all'Unica Vera Fede." #OLD ITA
 tolerance_idea_desc: "Every human was created equal to the Creator, and therefore we understand that their beliefs, even if wrong, can be accepted as a means to eventual conversion to the one true faith." #NEW
 #tolerance_idea_desc: "Every human was created equal to the Creator, and therefore we understand that their beliefs, even if wrong, can be accepted as a means to eventual conversion to the One True Faith." #OLD ENG
 empiricism: "Empirismo"
 empiricism_desc: "Le cose sono ciò che sono perché possiamo percepirle, vederle e, in generale, sperimentarle con i nostri sensi. È proprio grazie a queste prove empiriche che riusciamo a elaborare idee nuove."
 print_culture: "Cultura della Stampa"
 #print_culture_desc: "Con l'invenzione della Stampa, la diffusione della conoscenza non è mai stata così facile. Le nuove tecniche e i progressi raggiungeranno ogni angolo della nostra nazione e la renderanno più forte e più ricca." #OLD ITA
 print_culture_desc: "With the invention of the printing press, the spread of knowledge has never been easier. New techniques and advances will reach every corner of our nation and make it grow stronger and richer." #NEW
 #print_culture_desc: "With the invention of the Printing Press, the spread of knowledge has never been easier. New techniques and advances will reach every corner of our nation and make it grow stronger and richer." #OLD ENG
 religious_unification: "Unificazione Religiosa"
 religious_unification_desc: "Esiste una sola religione vera, ed è quindi nostro dovere unire tutti i fedeli sotto l'unica guida di Dio."
 humanism: "Umanesimo"
 #humanism_desc: "L'umanità è la creazione più elevata del Signore e, in quanto tale, è naturale collocarla al centro del Creato. Ogni aspetto della Natura Umana deve essere preservato e incoraggiato, dal suo benessere alla sua capacità di libero arbitrio o di esplorazione del Mondo." #OLD ITA
 humanism_desc: "Mankind is the highest creation of our Lord, and thus it is natural to place it in the center of Creation. Every aspect of human nature has to be preserved and encouraged, from its well-being to its propensity for free will and exploration." #NEW
 #humanism_desc: "Mankind is the highest creation of our Lord and in this manner, it is natural to put it in the center of Creation. Every aspect of Human Nature has to be preserved and encouraged, from its well-being to its ability for free will or exploring the World." #OLD ENG
 merchant_traditions: "Tradizioni Mercantili"
 #merchant_traditions_desc: "Il commercio è la linfa vitale dell'economia, poiché il suo flusso è garanzia di una buona salute economica. Con i nostri mercanti concentrati sul mantenimento del flusso commerciale, possiamo affermarci come tradizione e reputazione di commercio vivace, rendendo più facile attrarre il commercio estero verso di noi." #OLD ITA
 merchant_traditions_desc: "A steady flow of trade and commerce is a sure sign of a healthy economy. With our merchants focusing on keeping the trade flowing, we can establish a tradition of and reputation for lively commerce, making it easier to attract foreign trade to our nation." #NEW
 #merchant_traditions_desc: "Trade and commerce is the lifeblood of the economy, as its flow is a guarantee of a healthy one. With our merchants focusing on keeping the trade flowing, we can establish ourselves a tradition and reputation of lively commerce, making it easier to attract foreign trade to ourselves." #OLD ENG
 benign_diplomats: "Diplomatici Benevoli"
 #benign_diplomats_desc: "L'arte della diplomazia è complessa. Non basta essere bravi con le parole, poiché anche la presenza e il comportamento sono fondamentali per l'interpretazione delle parole stesse. Chiedendo ai nostri diplomatici di concentrarsi sul dare un'impressione più amichevole, possiamo assicurarci di essere visti in modo più favorevole dagli altri paesi." #OLD ITA
 benign_diplomats_desc: "The art of diplomacy is an intricate one. Being good with words is not enough, as one's overall presence and demeanor are crucial to how the words themselves are interpreted. By having our diplomats focus on making a good impression, we will be seen more favorably by other countries." #NEW
 #benign_diplomats_desc: "The art of diplomacy is an intricate one. Being good at words is not enough, as the overall presence and demeanor presented are also crucial to how the words themselves are interpreted. By having our diplomats focus on giving a more amicable impression, we can ensure to be seen more favorably by other countries." #OLD ENG
 grand_banquets: "Grandi Banchetti"
 #grand_banquets_desc: "Nessuna questione importante può essere discussa senza accompagnarla con un pasto, e più la questione è importante, più il pasto dovrebbe essere abbondante. Organizzare regolarmente grandi banchetti ci permette di discutere costantemente e in modo adeguato tutte le questioni che richiedono attenzione." #OLD ITA
 grand_banquets_desc: "No important matter can be discussed without an accompanying meal, and the more important the matter is, the more indulgent the meal should be. Having regular grand banquets allows us to constantly and properly discuss all matters that need consideration." #NEW
 #grand_banquets_desc: "No important matter can be discussed without the accompanying of a meal, and the more important the matter is the more copious the meal should be. Having regular grand banquets allows us to constantly and properly discuss all matters that need consideration." #OLD ENG
 buffer_states: "Stati Cuscinetto"
 #buffer_states_desc: "Non c'è niente di peggio che avere come vicino qualcuno con cui si è in conflitto. Se vogliamo evitare tensioni ai confini, avere altri stati che fungono da cuscinetto tra noi e i nostri potenziali nemici ci consentirà di avere un po' di respiro." #OLD ITA
 buffer_states_desc: "There is nothing worse than arguing with one's neighbor. If we want to avoid border tensions, having other states act as a buffer between us and our potential enemies will allow us some breathing room." #NEW
 #buffer_states_desc: "There is nothing worse than being neighbors with someone you have an argument with. If we want to avoid border tensions, having other states act as a buffer between us and our potential enemies will allow us some breathing space." #OLD ENG
 camp_followers: "Vivandieri"
 #camp_followers_desc: "I guerrieri costituiscono ovviamente la maggior parte dei nostri eserciti, ma nessun esercito può essere composto solo da guerrieri. Senza il seguito di persone che trasportano cibo e attrezzature per l'esercito, quest'ultimo non sarebbe in grado di spostarsi. Organizzando e strutturando questi seguaci del campo possiamo aumentarne notevolmente l'utilità e l'efficienza." #OLD ITA
 camp_followers_desc: "Warriors obviously make up the bulk of our armies, but no army can consist of fighters alone. Without the extra entourage of people transporting food and equipment for the army, it would not be able to feasibly go anywhere. By organizing and structuring these camp followers, we can greatly increase their usefulness and efficiency." #NEW
 #camp_followers_desc: "Warriors obviously make the bulk of our armies, but no army can consist of warriors alone. Without the extra entourage of people transporting food and equipment for the army, it would not be able to feasibly go anywhere. By organizing and structuring these camp followers we can greatly increase their use and efficiency." #OLD ENG

 

 #Sweden
 swedish_tradition: "Attacco Incessante"
 #swedish_tradition_desc: "Se ci si schiera in formazione Svinfylking e si carica il nemico, questi verrà annientato! I cavalli sono fatti per essere cavalcati in battaglia e non hanno posto sul campo di battaglia." #OLD ITA
 swedish_tradition_desc: "Forming our marching troops into a #italic Svinfylking#! and charging is enough force to shatter any opponent! Mounted troops are not superior; other than being ridden to the battle itself, horses have no place on the battlefield." #NEW
 #swedish_tradition_desc: "If one just forms up in a Svinfylking and charges the opponent, they will shatter! Horses are meant to be used to be ridden to battle, and have no place on the battlefield." #OLD ENG
 swedish_heritage: "Contadini Liberi"
 #swedish_heritage_desc: "I contadini svedesi hanno storicamente costituito una parte importante del paese e le differenze tra la nobiltà e i contadini liberi non sono mai state significative." #OLD ITA
 swedish_heritage_desc: "$SWE_ADJ$ peasants have always made significant contributions to our country; the differences between a noble and a free farmer have never been big." #NEW
 #swedish_heritage_desc: "Swedish peasants have historically been a major part of the country, and the differences between nobility and a free farmer was never big." #OLD ENG
 kung_och_riksdag: "Kung och Riksdag"
 #kung_och_riksdag_desc: "I Re Svedesi spesso dipendevano dalla collaborazione con gli Stati, in particolare con la numerosa classe contadina, per controbilanciare il potere della nobiltà. Durante il regno di Gustavo Adolfo, tuttavia, fu raggiunto un compromesso storico con la nobiltà, che si impegnò a mettere le proprie risorse a disposizione della nazione in cambio di nuovi privilegi." #OLD ITA
 kung_och_riksdag_desc: "$SWE_ADJ$ rulers often depended on cooperation with the estates, especially with such a large peasant class compared to that of the nobility. During the reign of Gustavus Adolphus, however, a historic compromise was made with the aristocrats, who loyally pledged their resources to the disposal of the nation in return for new privileges." #NEW
 #kung_och_riksdag_desc: "The Swedish Kings often depended on cooperation with the Estates, especially with the large peasant class to balance out the nobility. During Gustavus Adolphus reign, however, a historic compromise was made with the nobility, who pledged to loyally put their resources to the nation's disposal in return for new privileges." #OLD ENG
 #swedish_steel: "Acciaio Svedese" #OLD ITA
 swedish_steel: "$SWE_ADJ$ Steel" #NEW
 #swedish_steel: "Swedish Steel" #OLD ENG
 #swedish_steel_desc: "Mentre gli altri eserciti sparano raffiche imprecisi contro i loro nemici, noi marceremo contro di loro in ranghi disciplinati, spareremo una sola raffica a distanza ravvicinata e poi li affronteremo con le armi bianche." #OLD ITA
 swedish_steel_desc: "While other armies may be content to wildly fire inaccurate volleys at their enemies, we shall march at them in disciplined ranks, deliver a single volley at close range, and then feed them cold steel." #NEW
 #swedish_steel_desc: "While other armies fire inaccurate volleys at their enemies, we will march at them in disciplined ranks, deliver a single volley at close range, and then give them cold steel." #OLD ENG
 #hakkapelitta: "'Hakkapeliitta'" #OLD ITA
 hakkapelitta: "Hakkapeliitta" #NEW
 #hakkapelitta: "The 'Hakkapeliitta'" #OLD ENG
 #hakkapelitta_desc: "La Finlandia è un luogo piuttosto povero e arretrato, e il servizio nell'esercito Svedese offre alle persone eccellenti opportunità di avanzamento finanziario attraverso il saccheggio. La buona abilità nell'equitazione e i cavalli di alta qualità ci consentono di formare una cavalleria eccellente e temuta che, secondo i nostri nemici, è invulnerabile grazie alla stregoneria." #OLD ITA
 hakkapelitta_desc: "$FIN$ is considered a rather poor and backwards region, but service in the $SWE_ADJ$ cavalry offers skilled $FIN_ADJ$ horsemen ample opportunities for glory and plunder. Superior horsemanship and high-quality mounts allow us to raise the feared #italic Hakkapeliitta#! — cavalry so effective in battle that our enemies whisper they must be protected by witchcraft." #NEW
 #hakkapelitta_desc: "Finland is a rather poor and backward place, and service in the Swedish army gives people excellent opportunities for financial advancement via looting. Good horsemanship and high-quality horses allow us to raise excellent and feared cavalry who, our enemies maintain, are invulnerable due to witchcraft." #OLD ENG
 indelningsverket: "Indelningsverket"
 #indelningsverket_desc: "Il sistema Svedese di assegnazione consisteva nella divisione dei contadini in gruppi di 10 persone a fini di reclutamento. Questo sistema facilitava la ricerca di persone da arruolare nell'esercito e la loro organizzazione in unità." #OLD ITA
 indelningsverket_desc: "The $SWE_ADJ$ allotment system divides the peasantry into groups of ten for recruitment purposes. This system made it easier to find people to serve in the army and organize them into units." #NEW
 #indelningsverket_desc: "The Swedish allotment system was the division of the peasantry into groups of 10 for recruitment purposes. This system made it easier to find people to serve in the army and organize them into units." #OLD ENG
 #swedish_absolutism: "Assolutismo Svedese" #OLD ITA
 swedish_absolutism: "$SWE_ADJ$ Absolutism" #NEW
 #swedish_absolutism: "Swedish Absolutism" #OLD ENG
 #swedish_absolutism_desc: "L'assolutismo è la teoria secondo cui un solo uomo dovrebbe essere al comando, quell'uomo è il re, e dovrebbe avere la capacità di governare senza essere ostacolato dal consiglio privato." #OLD ITA
 swedish_absolutism_desc: "Absolutism is the theory that one person should be in charge, that this person is the monarch, and that said monarch shall run the government unfettered by the Privy Council." #NEW
 #swedish_absolutism_desc: "Absolutism is the theory that one man should be in charge, that man is the King, and he should have the ability to run the government unfettered by the privy council." #OLD ENG
 produktplakatet: "Produktplakatet"
 #produktplakatet_desc: "Il decreto vieta alle navi straniere che arrivano in Svezia di trasportare merci provenienti da paesi diversi dal proprio o dalle proprie colonie." #OLD ITA
 produktplakatet_desc: "The decree forbids foreign ships arriving in $SWE$ to bring goods from countries other than their own or their colonies." #NEW
 #produktplakatet_desc: "The decree forbids foreign ships arriving in Sweden to bring goods from countries other than their own or colonies." #OLD ENG
 mulltimmer_masugn: "Mulltimmer Masugn"
 #mulltimmer_masugn_desc: "Il ferro Svedese, apprezzato per la sua purezza e resistenza, soddisfaceva non solo il fabbisogno interno, ma riforniva anche le fonderie e le armerie di tutte le nazioni del continente. La Mulltimmer Masugn non era costruita solo in pietra, ma anche in legno isolato con sabbia, ghiaia e terra." #OLD ITA
 mulltimmer_masugn_desc: "$SWE_ADJ$ $iron$, prized for its purity and strength, supplies not only our domestic needs but also the foundries and armories of nations across the continent. The #italic Mulltimmer Masugn#! was not built just with stone, but also with wood isolated with sand, gravel and dirt." #NEW
 #mulltimmer_masugn_desc: "Swedish iron, prized for its purity and strength, supplied not only our domestic needs but also the foundries and armories of nations across the continent. The Mulltimmer Masugn was not built just by stone, but also with wood isolated with sand, gravel and dirt." #OLD ENG
 swedish_royal_post_office: "Kungliga Postverket"
 #swedish_royal_post_office_desc: "La Kungliga Postverket (Agenzia Postale Reale) fu fondata durante il regno della regina Cristina. Creata per migliorare l'amministrazione statale e le comunicazioni nel vasto Impero Svedese, istituì una rete affidabile di corrieri e stazioni di posta. Il sistema divenne fondamentale per il coordinamento militare, la diplomazia e il governo durante l'era della Svezia come grande potenza." #OLD ITA
 swedish_royal_post_office_desc: "The #italic Kungliga Postverket#!, or Royal Postal Agency, was created to improve state administration and communication across the expanse of $SWE$. It establishes a reliable network of couriers and waystations, and has become crucial for our military coordination, diplomacy, and governance." #NEW
 #swedish_royal_post_office_desc: "The Kungliga Postverket (Royal Postal Agency) was founded during reign of Queen Christina. Created to improve state administration and communication across the vast Swedish Empire, it established a reliable network of couriers and waystations. The system became crucial for military coordination, diplomacy, and governance during Sweden's era as a great power." #OLD ENG
 polhem_machina_nova: "Machina Nova"
 #polhem_machina_nova_desc: "Christopher Polhem, soprannominato il “padre dell'ingegneria Svedese”, trasformò l'industria Svedese con la sua Machina Nova, una serie innovativa di sistemi meccanici per ottimizzare e aumentare la produzione. Utilizzando complessi sistemi di ingranaggi, camme e energia idraulica, Polhem sviluppò macchine in grado di svolgere compiti che prima venivano eseguiti a mano, dalla frantumazione del minerale nelle miniere alla tessitura e alla segatura. Il suo Laboratorium Mechanicum fungeva sia da officina che da scuola, diffondendo le conoscenze meccaniche in tutto il regno." #OLD ITA
 polhem_machina_nova_desc: "Christopher Polhem, dubbed the 'father of $SWE_ADJ$ engineering, has transformed $SWE_ADJ$ industry with his #italic Machina Nova#!, an innovative array of mechanical systems designed to streamline and boost production. Using intricate systems of gears, cams, and water power, Polhem has developed several machines capable of performing tasks previously done by hand, from ore-crushing in mines to textile weaving and sawmilling." #NEW
 #polhem_machina_nova_desc: "Christopher Polhem, dubbed the 'father of Swedish engineering,' transformed Sweden's industry with his Machina Nova, an innovative array of mechanical systems to streamline and boost production. Using intricate systems of gears, cams, and water power, Polhem developed machines capable of performing tasks previously done by hand, from ore crushing in mines to textile weaving and saw milling. His Laboratorium Mechanicum served as both a workshop and a school, spreading mechanical knowledge throughout the kingdom." #OLD ENG
 swedish_copper_coins: "Swedish Copper Coins" #NEW
 swedish_copper_coins_desc: "The abundance of copper in $SWE$, primarily from the Stora Kopparberget mine in Falun, has prompted the country to use it as the main metal for minting a new national currency, the #italic daler#!. This is issued as a large money plate, called #italic plåtmynt#!, which can weigh up to 20 kilograms. Some argue that this might not be very practical and that the volume of money in circulation could exceed copper reserves, but they seem narrow-minded." #NEW
 combined_arms_advance_reformation: "Combined Arms" #NEW
 combined_arms_advance_reformation_desc: "Warfare is becoming increasingly complex, driven by the widespread adoption of standing armies composed of soldiers hired for permanent service. The introduction of new weapons, such as firearms and cannons, encourages an approach that balances and combines light and heavy infantry, cavalry, and artillery, supported by auxiliary units." #NEW
 combined_arms_advance_revolutions: "Advanced Combined Arms" #NEW
 combined_arms_advance_revolutions_desc: "The regular use of combined arms over several centuries has led to the dominance of this type of warfare. Light infantry and cavalry have the role of weakening and disorganizing enemy forces, while simultaneously screening and protecting their own. Heavy infantry and cavalry bear the brunt of the fighting, seeking decisive charges to rout the enemy, while artillery and auxiliary forces support them from a distance at the rear." #NEW




 
 #Hungary
 hun_composite_light_cavalry: "Cavalleria Leggera Composita"
 #hun_composite_light_cavalry_desc: "Composta da arcieri a cavallo e da veloci cavalieri, la cavalleria leggera del nostro paese è la spina dorsale delle nostre forze militari. Ha dimostrato il proprio valore nella grande battaglia di Marchfeld del 1278 e ancora una volta condurrà le nostre forze alla gloria." #OLD ITA
 hun_composite_light_cavalry_desc: "Made up of horse archers as well as swift horsemen, our light cavalry is the backbone of our military force. Our mounted forces have shown their mettle time and time again, and will inevitably lead our forces to glory once more." #NEW
 #hun_composite_light_cavalry_desc: "Made of horse archers as well as swift horsemen, the light cavalry of our country is the backbone of our military force. It showed its merit in the great Battle of the Marchfeld of 1278, and it will once again lead our forces to glory." #OLD ENG
 hun_castle_warriors: "Guerrieri del Castello"
 #hun_castle_warriors_desc: "I Guerrieri del Castello, una classe selezionata nel nostro stato, hanno il dovere di prestare servizio militare ai loro #italic ispáns#! locali nei distretti dei castelli reali. Nati nei primi tempi del regno, questi proprietari terrieri privilegiati mantengono una posizione unica, difendendo il loro regno e custodendo i loro diritti ereditari." #OLD ITA
 hun_castle_warriors_desc: "The Castle Warriors, one of the most select classes in our society, are duty-bound to provide military service to their local #italic ispáns#! in royal castle districts. Stalwarts from the earliest days of our nation, these privileged landholders hold a unique position, actively defending their realm while cherishing their hereditary rights." #NEW
 #hun_castle_warriors_desc: "The Castle Warriors, a select class in our state, are bound by duty to provide military service to their local #italic ispáns#! in royal castle districts. Emerging in the kingdom's earliest days, these privileged landholders uphold a unique position, defending their realm while cherishing their hereditary rights." #OLD ENG
 #hun_renaissance_knowledge: "Un Principe Rinascimentale" #OLD ITA
 hun_renaissance_knowledge: "A $renaissance$ Prince" #NEW
 #hun_renaissance_knowledge: "A Renaissance Prince" #OLD ENG
 #hun_renaissance_knowledge_desc: "I servi consideravano il loro Re un sovrano giusto perché li proteggeva dalle richieste eccessive e dagli abusi dei magnati. Era un vero principe Rinascimentale, un leader militare e amministratore di successo, un linguista eccezionale e un mecenate illuminato delle arti." #OLD ITA
 hun_renaissance_knowledge_desc: "The peasants consider their ruler a just one because they are officially protected from having excessive demands and other abuses heaped upon them by magnates. The ruler of $HUN$ is a true $renaissance$ prince — a successful military leader and administrator, an outstanding linguist, and an enlightened patron of the arts." #NEW
 #hun_renaissance_knowledge_desc: "The serfs considered their King a just ruler because he protected them from excessive demands and other abuses by the magnates. He was a true Renaissance prince, a successful military leader and administrator, an outstanding linguist, and an enlightened patron of the arts." #OLD ENG
 #hun_bulwark_of_christianity: "Baluardo del Cristianesimo" #OLD ITA
 hun_bulwark_of_christianity: "Bulwark of $christian$" #NEW
 #hun_bulwark_of_christianity: "Bulwark of Christianity" #OLD ENG
 #hun_bulwark_of_christianity_desc: "Con l'ascesa del potere Turco nel sud, spetta al popolo del Regno d'Ungheria difendere la Cristianità dalla minaccia Turca. Fate sapere che non verremo meno al nostro dovere.." #OLD ITA
 hun_bulwark_of_christianity_desc: "With $turkish_culture$ power rising in the south, it falls to the people of $HUN$ to defend faithful kingdoms from the $turkish_culture$ threat. Let it be known that we will not flinch from our sacred duty!" #NEW
 #hun_bulwark_of_christianity_desc: "With Turkish power rising in the south it falls to the people of the Kingdom of Hungary to defend Christendom from the Turkish threat. Let it be known that we will not flinch from our duty." #OLD ENG
 hun_found_the_black_army: "Fondata l'Armata Nera"
 #hun_found_the_black_army_desc: "Ispirandosi agli scritti di Giulio Cesare, l'Ungheria avrà un nucleo di truppe professionali per i suoi eserciti. Questi uomini saranno così duri che i nostri nemici li chiameranno l'esercito nero." #OLD ITA
 hun_found_the_black_army_desc: "Inspired by the writings of Julius Caesar, $HUN$ shall maintain a corps of professional soldiers. These warriors will be so fierce that our enemies shall whisper terrified tales of 'The Black Army' to their children at night!" #NEW
 #hun_found_the_black_army_desc: "Inspired by the writing of Julius Caesar, Hungary shall have a core of professional troops for her armies. These men will be so tough that our enemies will brand the soldiers the black army." #OLD ENG
 hun_reformed_coinage: "Riforma Monetaria"
 #hun_reformed_coinage_desc: "Per pagare il nostro nuovo esercito professionale avremo bisogno di un flusso costante di entrate. Riformare il sistema monetario per standardizzare i pesi renderà tutto questo molto più facile, perché sapremo quanto dovranno pagare le persone." #OLD ITA
 hun_reformed_coinage_desc: "To pay for our new professional army, we will need a steady stream of revenue. Reforming the coinage to standardize weights will make this much easier, because we shall know exactly how much people need to pay." #NEW
 #hun_reformed_coinage_desc: "To pay for our new professional army we will need a steady stream of revenue. Reforming the coinage to standardize the weights will make this much easier because we know how much people will have to pay." #OLD ENG
 #hun_curtailed_peasantry: "Limitare la Libertà dei Contadini" #OLD ITA
 hun_curtailed_peasantry: "Curtail Peasant Liberties" #NEW
 #hun_curtailed_peasantry: "Curtail the Freedom of the Peasantry" #OLD ENG
 #hun_curtailed_peasantry_desc: "L'Ungheria non ha frontiere naturali su cui basare la sua difesa. La pianura selvaggia che ha portato qui i nostri antenati era perfetta per lanciare incursioni verso Ovest, non per difendersi. Se vogliamo difendere l'Ungheria, avremo bisogno di risorse. Se accettiamo che i nostri magnati leghino più strettamente i contadini alla terra, loro faranno in modo che lavorino più duramente." #OLD ITA
 hun_curtailed_peasantry_desc: "$HUN$ is not blessed with protective natural frontiers. The wild plains that first brought our ancestors here were perfect for launching raids into the West, not for defense. If $HUN$ is to defend itself, we will need resources. The best solution is to allow our magnates to bind the peasants more closely to the land, ensuring greater productivity." #NEW
 #hun_curtailed_peasantry_desc: "Hungary is not blessed with natural frontiers on which she can base her defense. The wild plain that first brought our ancestors here was perfect for launching raids into the West, not for defense. If Hungary is to be defended we will need resources. If we agree to allow our magnates to tie the peasantry more closely to the land they will ensure they work harder." #OLD ENG
 hun_strengthened_towns: "Rafforzare le Città"
 #hun_strengthened_towns_desc: "L'Ungheria ha bisogno di ricchezza per crescere e prosperare, e le città sono fondamentali per questo. Se garantiamo che le nostre città siano adeguatamente protette dai nobili, continueranno a portare commercio che potremo tassare." #OLD ITA
 hun_strengthened_towns_desc: "Towns are key factors in producing the wealth $HUN$ needs to grow and prosper. If we ensure the operations of our townships are protected from the power-hungry machinations of the nobility, they will continue to bring in trade, which we can tax." #NEW
 #hun_strengthened_towns_desc: "Hungary needs wealth to grow and prosper, and the towns are key to this. If we ensure our towns are properly protected from the nobles they will continue to bring in trade that we can tax." #OLD ENG
 #hun_hungarian_reformation_intro: "Le idee della Riforma si diffusero in Europa a macchia d'olio, e come tali erano destinate a raggiungere anche le nostre terre." #OLD ITA
 hun_hungarian_reformation_intro: "The ideas of the Reformation spread through $europe$ like wildfire, and as such were bound to find their way to our lands eventually." #NEW
 #hun_hungarian_reformation_intro: "The ideas of the Reformation spread through Europe like wildfire, and as such were bound to find their way to our lands." #OLD ENG
 #hun_hungarian_reformation: "Riforma Ungherese" #OLD ITA
 hun_hungarian_reformation: "$HUN_ADJ$ Reformation" #NEW
 #hun_hungarian_reformation: "Hungarian Reformation" #OLD ENG
 #hun_hungarian_reformation_desc: "$hun_hungarian_reformation_intro$ CLe nostre terre sono state minacciate da potenze straniere per troppo tempo. Unendoci alla Riforma e abbandonando il dovere di seguire il Papa come cagnolini, possiamo spezzare almeno una delle catene che ci opprimono!" #OLD ITA
 hun_hungarian_reformation_desc: "$hun_hungarian_reformation_intro$ Our realm has been threatened by outside powers for long enough. By joining the Reformation and abandoning the duty of following the Pope like a lapdog, we can break at least one of the shackles oppressing us!" #NEW
 #hun_hungarian_reformation_desc: "$hun_hungarian_reformation_intro$ Our lands have been threatened by outside powers for long enough. By joining the Reformation and abandoning the duty to follow the Pope like his lapdog, we can break at least one of the shackles that suppress us!" #OLD ENG
 #hun_the_catholic_shield: "Lo Scudo Cattolico" #OLD ITA
 hun_the_catholic_shield: "The $catholic_ADJ$ Shield" #NEW
 #hun_the_catholic_shield: "The Catholic Shield" #OLD ENG
 #hun_the_catholic_shield_desc: "$hun_hungarian_reformation_intro$ Eppure, i cuori dei fedeli rimangono forti. Dio e i suoi fedeli servitori resisteranno alla follia eretica." #OLD ITA
 hun_the_catholic_shield_desc: "$hun_hungarian_reformation_intro$ Yet, the hearts of the faithful remain strong. God and his loyal servants will withstand this heretical madness." #NEW
 #hun_the_catholic_shield_desc: "$hun_hungarian_reformation_intro$ Yet, the hearts of the faithful remain strong. God and his loyal servants will withstand the heretical madness." #OLD ENG
 hun_realm_of_many_religions: "Regno delle Molte Religioni"
 #hun_realm_of_many_religions_desc: "$hun_hungarian_reformation_intro$ Purtroppo, la Riforma ha diviso le famiglie, trasformato ex amici in nemici e minacciato la stabilità stessa di molti stati. Tuttavia, il nostro regno sa bene che non deve cadere vittima della lotta teologica. Dopotutto, siamo un popolo e un regno di molte religioni." #OLD ITA
 hun_realm_of_many_religions_desc: "$hun_hungarian_reformation_intro$ Alas, the Reformation has split families apart, made former friends into enemies, and threatened the very stability of many nations. However, our realm knows better than to fall victim to this theological quarreling. We are a people and a realm of many religions, after all." #NEW
 #hun_realm_of_many_religions_desc: "$hun_hungarian_reformation_intro$ Alas, the Reformation split families apart, made former friends into enemies, and threatened the very stability of many states. However, our realm knows better than to fall victim to the theological fight. We are a people and a realm of many religions after all." #OLD ENG
 hun_multi_culturalism: "Regno delle Molte Culture"
 #hun_multi_culturalism_desc: "Il bacino dei Carpazi non è solo la patria degli ungheresi. Slovacchi, Ruteni, Cumani, Tedeschi e molte altre minoranze diverse considerano il nostro regno la loro casa. È quindi naturale che il nostro governo sia abile nell'integrare con facilità culture diverse nel nostro stato." #OLD ITA
 hun_multi_culturalism_desc: "The Carpathian Basin is home to more than just $HUN_ADJ$ people. $slovak$, $ruthenian$,$cuman_culture$, and $german_carpathian$ people, among many other different minorities, call our realm their home. Given this diversity, it is only natural that our government proficiently absorbs and adopts these different cultures into our state." #NEW
 #hun_multi_culturalism_desc: "The Carpathian Basin is home to more than just the Hungarians. Slovaks, Ruthenians, Cumans, Germans and many other different minorities call our realm their home. As such, it is only natural that our government is proficient in adopting different cultures into our state with ease." #OLD ENG
 #hun_revolutionized_military_tactics: "Tattiche Militari Rivoluzionarie" #OLD ITA
 hun_revolutionized_military_tactics: "Revolutionary Military Tactics" #NEW
 #hun_revolutionized_military_tactics: "Revolutionized Military Tactics" #OLD ENG
 #hun_revolutionized_military_tactics_desc: "Con il progresso della tecnologia militare, evolvono anche le tattiche sul campo di battaglia. È fondamentale per la sopravvivenza del nostro stato stare al passo con la natura in continua evoluzione della guerra terrestre." #OLD ITA
 hun_revolutionized_military_tactics_desc: "As military technology advances, so do battlefield tactics. It is imperative to the survival of our state that we keep pace with the ever-evolving nature of land warfare." #NEW
 #hun_revolutionized_military_tactics_desc: "As the military technology advances, so do the tactics on the battlefield. It is imperative to the survival of our state that we keep up with the ever-revolutionizing nature of land warfare." #OLD ENG
 #hun_hungarian_unity: "Unità Ungherese" #OLD ITA
 hun_hungarian_unity: "$HUN_ADJ$ Unity" #NEW
 #hun_hungarian_unity: "Hungarian Unity" #OLD ENG
 #hun_hungarian_unity_desc: "Sebbene il nostro popolo abbia dovuto affrontare molte minacce esterne, lo spirito e la volontà degli ungheresi rimangono intatti. L'unità degli ungheresi è di grande ispirazione per i nostri orgogliosi soldati che difenderanno la nostra patria fino all'ultimo uomo." #OLD ITA
 hun_hungarian_unity_desc: "Although our subjects have faced many external threats over the years, the spirit and will of the $HUN_ADJ$ people remains unbroken. Unifying $HUN_ADJ$ hearts is greatly inspiring to our patriotic soldiers, who will defend our homelands to the last man." #NEW
 #hun_hungarian_unity_desc: "Although our people have faced many external threats, the spirit and the will of the Hungarians remain unbroken. The unity of the Hungarians is of great inspiration to our proud soldiers who will defend our homelands to the last man." #OLD ENG
 hun_hungarian_hussars: "$a_hungarian_hussars$"
 hun_hungarian_hussars_desc: "$a_hungarian_hussars_desc$"
 #
 salic_law_advance: "Legge Salica"
 #salic_law_advance_desc: "Il ruolo delle donne nelle monarchie di tutto il mondo non è sempre rispettato. Non è raro, infatti, che queste monarchie abbiano leggi che vietano espressamente alle donne di partecipare all'eredità, che viene completamente ignorata a favore dei loro fratelli o cugini maschi." #OLD ITA
 salic_law_advance_desc: "The rulership of women is not always respected — nor even permitted. As such, it is not uncommon for governments to pass laws directly barring women from inheritance, rejecting them in favor of their male siblings or cousins." #NEW
 #salic_law_advance_desc: "The role of women among monarchies of the world is not always respected. As such, it is not uncommon for these monarchies to have laws that directly forbid women to participate in the inheritance at all, being completely skipped in favor of their male siblings or cousins." #OLD ENG
 partition_inheritance_advance: "Divisione Ereditaria"
 #partition_inheritance_advance_desc: "Le rivalità tra i figli di un monarca non sono rare, poiché ognuno di loro vorrebbe diventare il futuro monarca. Per evitare tali rivalità, alcuni monarchi decidono di dividere tutti i loro territori e titoli tra tutti i loro figli, in modo che tutti si sentano soddisfatti di ricevere un'eredità equa." #OLD ITA
 partition_inheritance_advance_desc: "Rivalries among royal offspring are not uncommon, as each one would like to be the ruler one day. To avoid such in-fighting, some monarchs choose to divide their territories and titles among all their sons, so that all of them are satisfied with a more or less equal share of the inheritance." #NEW
 #partition_inheritance_advance_desc: "Rivalries among the sons of a monarch are not uncommon, as each one would like to be the future monarch. To avoid such rivalries, some monarchs decide to divide all their territories and titles among all their sons, so that all of them feel satisfied in getting an inheritance equally." #OLD ENG
 
 national_assemblies_advance: "Assemblee Nazionali"
 national_assemblies_advance_desc: "$national_assemblies_desc$"
 enlightenment_advance: "Illuminismo"
 #enlightenment_advance_desc: "Il secolo scorso ha visto il Razionalismo e l'Empirismo guadagnare una popolarità sempre crescente tra le grandi menti dell'epoca. La Luce della Ragione è stata accesa e molti non si daranno pace finché non sarà portata in ogni angolo della terra." #OLD ITA
 enlightenment_advance_desc: "The last century has seen Rationalism and Empiricism gain ever-increasing popularity among the greatest minds of the age. The Light of Reason has been lit, and many will not rest until it has been brought to all corners of the earth." #NEW
 #enlightenment_advance_desc: "The last century has seen Rationalism and Empiricism gaining an ever-increasing popularity among the great minds of the age. The Light of Reason has been lit and many will not rest until it has been brought to all corners of the earth." #OLD ENG
 distribution_of_power_advance: "$distribution_of_power_law$"
 distribution_of_power_advance_desc: "$distribution_of_power_law_desc$"
 industrialization_advance: "Industrializzazione"
 #industrialization_advance_desc: "L'avvento della rivoluzione industriale porta con sé cambiamenti internazionali e duraturi non solo nel commercio e negli affari, ma anche nel tessuto sociale stesso. Invenzioni come il telaio meccanico e il motore a vapore spingeranno le capacità dell'umanità al suo apice più alto mai raggiunto." #OLD ITA
 industrialization_advance_desc: "The Industrial Revolution has brought about permanent change — not just to commerce and business, but to the social fabric of many nations. Inventions such as the power loom and steam engine shall push the capabilities of mankind to its highest zenith yet." #NEW
 #industrialization_advance_desc: "The rise of the industrial revolution brings about international and lasting changes not just in commerce and business but in the fabric of society itself. Inventions such as the power loom and steam engines shall push the capabilities of mankind to its highest zenith yet." #OLD ENG
 levee_en_masse_advance: "Levée en Masse"
 #levee_en_masse_advance_desc: "La guerra è un concetto in continua evoluzione, innovato e perfezionato di generazione in generazione. Per soddisfare il bisogno di espansione e fornire il carburante necessario per realizzare queste ambizioni, saranno redatte e firmate nuove leggi di coscrizione a livello nazionale, che recluteranno eserciti composti da tutti i giovani non sposati, la cui dimensione determinerà il corso della storia." #OLD ITA
 levee_en_masse_advance_desc: "Warfare is an ever-evolving concept, having been studied and improved upon for generations and generations. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted. We shall raise armies of young, unmarried recruits, the size of which will leave an indelible mark upon history." #NEW
 #levee_en_masse_advance_desc: "Warfare is an ever-evolving concept, innovated and honed generation after generation. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted and signed in effect, raising armies of all unmarried young men, the size of which will shape the course of history." #OLD ENG
 #griot_advance: "Griot" #OLD ITA
 griot_advance: "Griots" #NEW
 #griot_advance: "Griot" #OLD ENG
 #griot_advance_desc: "I Griot sono narratori, storici, consiglieri, musicisti e poeti allo stesso tempo. Custodiscono le storie e le leggende delle generazioni passate, mediano tra due parti in conflitto e servono i loro governanti e le popolazioni locali come consiglieri." #OLD ITA
 griot_advance_desc: "The #italic griots#! are storytellers, historians, counselors, musicians, and poets all at once. They safeguard the stories and legends of past generations, mediate between warring parties, and serve both their rulers and local people as advisors." #NEW
 #griot_advance_desc: "The Griots are storytellers, historians, counselors, musicians, and poets all at once. They safeguard the stories and legends of past generations, mediate between two warring parties, and serve their rulers and local peoples as advisors." #OLD ENG
 west_african_caravan_stop_advance: "$caravan_stop$ Sahariana"
 #west_african_caravan_stop_advance_desc: "Il commercio tra l'Africa subsahariana e il Nord Africa fa parte della nostra identità da secoli. Tuttavia, il viaggio attraverso il vasto deserto, nonostante i molti anni di esperienza accumulata, è faticoso e pericoloso. La chiave per garantire il commercio Sahariano è la $caravan_stop$, un luogo dove i mercanti e le loro carovane potevano fermarsi e riposare durante il loro viaggio attraverso il deserto." #OLD ITA
 west_african_caravan_stop_advance_desc: "Trade between sub-Saharan $africa$ and $north_africa$ has been part of our identity for centuries. The journey across the vast desert, even with the many years of accumulated experience, is always taxing and dangerous. The key to securing trade in this region is the $caravan_stop$, a place where merchants and their caravans can rest and refresh themselves on their way through the desert." #NEW
 #west_african_caravan_stop_advance_desc: "Trade between sub-Saharan Africa and North Africa has been part of our identity for centuries. The journey across the vast desert, even with the many years of accumulated experience is taxing and dangerous though. The key to securing Saharan trade is the $caravan_stop$, a place where merchants and their caravans could stop and rest on their way through the desert." #OLD ENG
 #Sunday Schools Generic
 sunday_schools_advance: "Scuole Domenicali"
 #sunday_schools_advance_desc: "L'istruzione dei meno fortunati è una parte importante della nostra missione religiosa. Dovremmo fondare scuole, strettamente legate al nostro normale servizio ecclesiastico, per fornire un'istruzione di base al nostro gregge." #OLD ITA
 sunday_schools_advance_desc: "Educating the people is an important part of our religious duties. We should establish schools, closely tied to our normal worship services, to provide basic education to our flock." #NEW
 #sunday_schools_advance_desc: "The education of the less fortunate is an important part of our religious mission. We should establish schools, closely tied to our normal church service, to provide a basic education to our flock." #OLD ENG
 #catholic advances
 #res_publica_christiana: "Cristianesimo Universale" #OLD ITA
 res_publica_christiana: "Universal $christian$" #NEW
 #res_publica_christiana: "Universal Christianity" #OLD ENG
 #res_publica_christiana_desc: "Dobbiamo perseguire buoni rapporti con i nostri fratelli cristiani, anche se alcune delle loro pratiche sono considerate eretiche." #OLD ITA
 res_publica_christiana_desc: "We must pursue good relations with our fellow $christian_ADJ$ faithful of all denomination, even if we consider some of their practices to be heresy." #NEW
 #res_publica_christiana_desc: "We must pursue good relations with our fellow Christians, even if some of their practices are considered heresy." #OLD ENG
 roman_orthodoxy: "Ortodossia Romana"
 #roman_orthodoxy_desc: "La rettitudine della fede Cattolica Romana e della sua dottrina deve rimanere indiscussa per garantire al popolo la loro autorità." #OLD ITA
 roman_orthodoxy_desc: "The righteousness of the Roman $catholic_ADJ$ faith and its doctrines must remain unquestioned, in order to entrench its authority in the minds of our people." #NEW
 #roman_orthodoxy_desc: "The righteousness of the Roman Catholic faith and its doctrine must remain unquestioned to assure the people of their authority." #OLD ENG
 marian_devotion: "Devozione alla Vergine Maria"
 #marian_devotion_desc: "La nostra Devozione alla Vergine Maria deve rimanere un pilastro centrale del nostro culto." #OLD ITA
 marian_devotion_desc: "Our dedication to the Virgin Mary must remain a central pillar of our worship." #NEW
 #marian_devotion_desc: "Our Devotion to the Virgin Mary must remain a central pillar of our worship." #OLD ENG
 #crusading_knights: "Esperienza delle Crociate Baltiche" #OLD ITA
 crusading_knights: "Baltic Crusades Experience" #NEW
 #crusading_knights: "Experience of the Baltic Crusades" #OLD ENG
 #crusading_knights_desc: "Inviare i nostri migliori cavalieri e nobili nelle zone pagane del Mar Baltico o del Mar Mediterraneo è una tradizione di lunga data nel nostro Paese. In questo modo porteremo avanti l'opera di Cristo diffondendo la fede tra i popoli non illuminati e, inoltre, acquisiremo comandanti esperti per i nostri eserciti." #OLD ITA
 crusading_knights_desc: "In this country, we have a long tradition of sending our finest knights and aristocrats to spread the true faith to heathens in the $baltic_region$ and Mediterranean regions. We will fulfill our $christian_ADJ$ mission by bringing the faith to the unenlightened, while also acquiring experienced commanders for our armies." #NEW
 #crusading_knights_desc: "Sending our finest knights and nobles to the heathen areas of the Baltic or Mediterranean Seas has a long tradition in our country. We will both fulfill the good work of Christ in bringing the faith to the unenlightened and, additionally, we will gain experienced commanders for our armies." #OLD ENG
 #catholic_pilgrimages: "Pellegrinaggi Cattolici" #OLD ITA
 catholic_pilgrimages: "$catholic_ADJ$ Pilgrims" #NEW
 #catholic_pilgrimages: "Catholic Pilgrimages" #OLD ENG
 #catholic_pilgrimages_desc: "I luoghi sacri della nostra fede meritano cura e attenzione da parte di ogni fedele. Incoraggiare i pellegrinaggi ed elevare coloro che hanno intrapreso questo percorso dovrebbe essere un'azione importante nel nostro paese." #OLD ITA
 catholic_pilgrimages_desc: "The holy sites of our faith should be seen by every follower. Encouraging pilgrimages, and elevating those who have undergone the process, should be a priority of our administration." #NEW
 #catholic_pilgrimages_desc: "The holy sites of our faith deserve care and attention from every follower. Encouraging pilgrimages and elevating those who have undergone the process should be an important action in our country." #OLD ENG
 inquisition_advance: "Inquisizione"
 #inquisition_advance_desc: "L'Inquisizione fu istituita nel XII secolo come strumento per combattere l'eresia Catara, ma la sua influenza crebbe notevolmente nel Tardo Medioevo, diventando il principale strumento della Chiesa Cattolica per contrastare la diffusione di dottrine dissidenti." #OLD ITA
 inquisition_advance_desc: "The Inquisition was created in the 12th century as a means to combat the Cathar heresy, but its reach grew significantly in the Late Middle Ages as the main tool of the $catholic_ADJ$ Church to counter the spread of dissident doctrines." #NEW
 #inquisition_advance_desc: "The Inquisition was created in the 12th century as a means to combat the Cathar heresy, but its reach grew significantly in the Late Middle Ages as the main tool of the Catholic Church to counter the spread of dissident doctrines." #OLD ENG
 #preaching_friars: "Frati Predicatori" #OLD ITA
 preaching_friars: "Itinerant Preaching Friars" #NEW
 #preaching_friars: "Preaching Friars" #OLD ENG
 #preaching_friars_desc: "È diventato piuttosto comune che i frati inizino a predicare la nostra fede. Dovremmo esaltare coloro che intraprendono questo compito e lodare i loro sforzi nell'affermare la convinzione dei nostri contadini." #OLD ITA
 preaching_friars_desc: "Preaching friars — members of $mendicant_orders$ like the Dominicans and Franciscans — have taken their ministry beyond the monastery walls to preach directly among the people. By supporting and praising them openly for these acts of devotion, we can strengthen religious conviction throughout the realm, even among the most remote peasants." #NEW
 #preaching_friars_desc: "It has become quite popular for friars to start preaching our faith. We should elevate those who take up this task and praise their efforts in affirming the conviction of our peasants." #OLD ENG
 devotio_moderna: "Devotio Moderna"
 #devotio_moderna_desc: "Il movimento della devozione moderna si sta diffondendo nella nostra fede e dovremmo mettere in pratica alcuni dei suoi insegnamenti nella nostra corte, mostrandoci come una casa di Cristiani devoti." #OLD ITA
 devotio_moderna_desc: "The #italic Devotio Moderna#!, or modern devotional movement, is rapidly gaining popularity among members of our faith. We should implement some of their teachings into our court, so as to make ourselves appear particularly devout." #NEW
 #devotio_moderna_desc: "The movement of modern devotion is spreading throughout our faith, and we should implement some of their teachings into our court, displaying a house of devout Christians." #OLD ENG
 #denounce_heretics: "Denuncia degli Eretici" #OLD ITA
 denounce_heretics: "Denunciation of Heretics" #NEW
 #denounce_heretics: "Denouncement of Heretics" #OLD ENG
 #denounce_heretics_desc: "Dobbiamo conservare l'unica vera fede e denunciare tutti coloro che ne esprimono critiche eretiche." #OLD ITA
 denounce_heretics_desc: "We must ensure the supremacy of the one true faith, and denounce all criticisms of it as the bitterest of heresy." #NEW
 #denounce_heretics_desc: "We need to retain the one true faith and denounce all who utter heretical criticisms of it." #OLD ENG
 beguins_and_beghards: "Ordini Religiosi Laici"
 #beguins_and_beghards_desc: "Molti fedeli si sono dedicati alla vita di preghiera e alle buone opere che solitamente caratterizzano la vita monastica dei monaci e delle monache. Tuttavia, essi non hanno preso i voti ufficiali e agiscono senza l'approvazione ufficiale del Papa. Ciononostante, dovremmo sostenere questi sforzi popolari volti a compiere buone azioni e aiutare la nostra popolazione." #OLD ITA
 beguins_and_beghards_desc: "Many of the faithful have devoted themselves to a life of prayer and good works, which usually comes with taking the veil or becoming a monk. However, they have not taken formal vows, and act without official $PAP_ADJ$ approval. Nevertheless, we should support these popular efforts to do good deeds and help our people." #NEW
 #beguins_and_beghards_desc: "Many of the faithful have devoted themselves to the life of prayer and good works which usually come with the monastic life of monks and nuns. However, they have not taken the official vows and act without official Papal approval. Nonetheless, we should support these popular efforts to do good deeds and help our population." #OLD ENG
 conquistador_advance: "Conquistadors"
 #conquistador_advance_desc: "La scoperta del Nuovo Mondo attira avventurieri di ogni tipo, disposti a rischiare la fortuna e la vita in spedizioni incerte, con la promessa di ricchezze, fama e potere senza pari. Queste spedizioni sono un accordo tra il loro capo e la Corona, legalmente manifestato come 'capitolazioni di conquista'." #OLD ITA
 conquistador_advance_desc: "The discovery of the New World attracts adventurers of all stripes to risk their fortunes and lives on uncertain expeditions, with the promise of unparalleled wealth, fame, and power. These expeditions are formalized through agreements between expedition leaders and the government, legally manifested as 'capitulations of conquest'." #NEW
 #conquistador_advance_desc: "The discovery of the New World attracts adventurers of all stripes to risk their fortunes and lives on uncertain expeditions, with the promise of unparalleled wealth, fame, and power. These expeditions are an agreement between their leader and the Crown legally manifested as 'capitulations of conquest'." #OLD ENG
 grand_display_of_faith: "Grandi Dimostrazioni di Fede"
 #grand_display_of_faith_desc: "Per onorare Dio, dobbiamo costruire grandi monumenti in suo nome. Questo non solo dimostrerà la nostra devozione all'unico vero Dio, ma mostrerà anche la bellezza dei nostri abili architetti." #OLD ITA
 grand_display_of_faith_desc: "To honor God, we need to construct great monuments in His name. Not only will this display our devotion to our faith, but it will also demonstrate the magnificent skills of our sculptors and architects." #NEW
 #grand_display_of_faith_desc: "To honor God, we need to construct great monuments in His name. Not only will this display our devotion to the one true God, but it will also show the beauty of our skilled architects." #OLD ENG
 #monastery_productions: "Frugalità dei Monasteri" #OLD ITA
 monastery_productions: "Monastic Frugality" #NEW
 #monastery_productions: "Frugality of the Monasteries" #OLD ENG
 #monastery_productions_desc: "Gli occupanti dei nostri monasteri sostengono gli ideali della frugalità. Il nostro clero dovrebbe prendere questi monaci e queste monache come esempio per il proprio comportamento." #OLD ITA
 monastery_productions_desc: "The holy occupants of our monasteries are bastions of sensible, frugal living. Our clergy should consider adapting their own lifestyles to more closely resemble those of these monks and nuns." #NEW
 #monastery_productions_desc: "The occupants of our monasteries are upholding the ideals of frugality. Our clergy should take those monks and nuns as an example for their own behavior." #OLD ENG
 #reform_church_music: "Riforma della Musica Sacra" #OLD ITA
 reform_church_music: "Reformed Church Music" #NEW
 #reform_church_music: "Reform of Church Music" #OLD ENG
 #reform_church_music_desc: "Dobbiamo accettare le riforme proposte alla nostra musica liturgica. La musica diluita attualmente in uso non può più essere considerata accettabile." #OLD ITA
 reform_church_music_desc: "We must accept the proposed reforms to our liturgical music. The diluted, soulless tunes currently in fashion can no longer be considered acceptable ways to express the glory of the divine." #NEW
 #reform_church_music_desc: "We must accept the reforms proposed to our liturgical music. The diluted music currently in use can no longer be considered acceptable." #OLD ENG
 frequent_councils: "Concili Frequenti"
 #frequent_councils_desc: "È stato proposto di tenere frequenti concili per la nostra fede, al fine di evitare che le critiche si protraggano troppo a lungo. Anche se non abbiamo il pieno controllo sul comportamento della curia, possiamo almeno esercitare tutta l'influenza di cui disponiamo per realizzare questa proposta." #OLD ITA
 frequent_councils_desc: "It has been proposed that holding religious councils more frequently would prevent theological disputes and criticisms from festering unchecked. While we may not have full control over the curia, we can at least use our influence to encourage regular synods that address relevant issues before they can become crises." #NEW
 #frequent_councils_desc: "It has been proposed to hold frequent councils for our faith to avoid criticisms festering too long. While we might not have full sway over the behavior of the curia, we can at least apply the influence we can muster to realize this proposal." #OLD ENG
 mendicant_orders: "Ordini Mendicanti"
 #mendicant_orders_desc: "Gli ordini religiosi, che hanno fatto voto di povertà e di vita itinerante, hanno portato assistenza in molte parti del nostro paese. Dovremmo sostenere questi sforzi il più possibile, senza interferire con i loro voti." #OLD ITA
 mendicant_orders_desc: "The orders of our faith, who have taken vows of poverty and live itinerant lives, have brought assistance to many remote parts of our country. We should support their efforts as much as we can without disrupting their holy missions." #NEW
 #mendicant_orders_desc: "The orders of our faith, who have vowed themselves to poverty and an itinerant life, have brought assistance to many parts of our country. We should support those efforts as much as we can without disturbing their vows." #OLD ENG
 exsurge_domine: "Exsurge Domine"
 exsurge_domine_desc: "Per sradicare il male dell'eresia, il Signore Stesso si leverà e li epurerà dalle nostre terre!"
 confutatio_augustana: "Rifiutare False Confessioni"
 #confutatio_augustana_desc: "In tempi turbolenti come questi, dobbiamo trasmettere ai nostri sudditi una linea chiara su ciò che consideriamo pensiero eretico e sulla dottrina che un cristiano devoto deve seguire." #OLD ITA
 confutatio_augustana_desc: "In these turbulent times, we must clearly define orthodox $christian_ADJ$ doctrine, while systematically refuting the false beliefs that endanger the very souls of our people." #NEW
 #confutatio_augustana_desc: "In turbulent times like these, we have to deliver a clear line to our subjects of what we see as heretical thought and what doctrine a proper Christian has to follow." #OLD ENG
 roman_catechism: "Catechismo Romano"
 #roman_catechism_desc: "Il nostro clero deve adeguarsi alle istruzioni ufficiali della Chiesa. Ciò renderà i nostri sacerdoti più efficienti e faciliterà la loro formazione." #OLD ITA
 roman_catechism_desc: "Our clergy must adopt the official Roman Catechism as their guide for instruction. This text will improve priestly education and ensure only consistent, orthodox teachings are transmitted to the populace." #NEW
 #roman_catechism_desc: "Our clergy needs to adapt to the official instructions of the Church. This will make our priests more efficient and ease their education." #OLD ENG
 oversea_missions: "Missioni d'Oltremare"
 oversea_missions_desc: "Il nostro clero è pronto e disposto a diffondere la nostra fede in nuovi territori oltreoceano. Grazie al loro contributo, colonizzare nuove terre sarà più facile ed economico."
 #baptism_books: "Libri sul Battesimo" #OLD ITA
 baptism_books: "Baptism Records" #NEW
 #baptism_books: "Baptism Books" #OLD ENG
 #baptism_books_desc: "Dobbiamo confermare il battesimo come un importante pilastro della nostra fede e dare al nostro clero l'opportunità di seguirlo per il bene di tutti i fedeli." #OLD ITA
 baptism_books_desc: "We must confirm baptism as an important cornerstone of our faith by keeping meticulous records of who in our population has or has not yet been baptized." #NEW
 #baptism_books_desc: "We must confirm baptism as an important cornerstone of our faith and give our clergy the opportunity to follow this for the sake of all of the faithful." #OLD ENG
 second_scholasticism: "Secondo $scholasticism$"
 second_scholasticism_desc: "Dovremo far rivivere e perfezionare il movimento filosofico della scolastica medievale."
 catholic_sunday_schools: "$sunday_schools_advance$"
 catholic_sunday_schools_desc: "$sunday_schools_advance_desc$"
 index_librorum_prohibitorum: "Indice dei Libri Proibiti"
 #index_librorum_prohibitorum_desc: "Le idee pericolose della Riforma potranno diffondersi nelle menti dei nostri sudditi solo se questi avranno accesso a opere scritte che propagano questi pensieri sciocchi." #OLD ITA
 index_librorum_prohibitorum_desc: "The dangerous ideas of the Reformation will spread like a toxic fungus in the minds of our subjects if they have access to written works propagating these silly thoughts! We must forbid certain dangerous texts, and keep a comprehensive list of which books are not allowed." #NEW
 #index_librorum_prohibitorum_desc: "The dangerous ideas of the Reformation will only be able to spread in the minds of our subjects if they have access to written works propagating these silly thoughts." #OLD ENG
 catholic_cuius_regio_eius_religio: "Cuius Regio, Eius Religio"
 #catholic_cuius_regio_eius_religio_desc: "#italic Di chi è il regno, sua è la religione.#! Dovremo accettare che altri paesi seguano una fede diversa dalla nostra, e questo sarà talvolta fondamentale per la nostra diplomazia." #OLD ITA
 catholic_cuius_regio_eius_religio_desc: "#italic Whose realm, his religion.#! We will have to accept that other countries follow other faiths, and that this will sometimes be a crucial factor in diplomacy." #NEW
 #catholic_cuius_regio_eius_religio_desc: "#italic Whose realm, his religion.#! We will have to accept that other countries follow a separate faith, and this will be sometimes vital for our diplomacy." #OLD ENG
 #embellish_baroque_art: "Abbellire le Opere Barocche" #OLD ITA
 embellish_baroque_art: "Promote Baroque Art" #NEW
 #embellish_baroque_art: "Embellish Baroque Works" #OLD ENG
 #embellish_baroque_art_desc: "Il mecenatismo artistico ha una grande tradizione nella nostra fede. Lo sviluppo dello stile barocco riflette bene la nostra teologia e dovremmo continuare a sostenere questi artisti." #OLD ITA
 embellish_baroque_art_desc: "Our faith has a long tradition of sponsoring and promoting great works of art. The development of the splendid new Baroque style reflects the pathos and glory of our theology beautifully, and should receive particular sponsorship." #NEW
 #embellish_baroque_art_desc: "Sponsoring art has great tradition in our faith. The development of the baroque style reflects our theology well, and we should continue to sponsor these artists." #OLD ENG
 national_churches: "Chiesa Nazionale"
 #national_churches_desc: "Lo Stato deve assumere un maggiore controllo sulla Chiesa nel nostro paese, poiché non possiamo permettere che entità straniere esercitino un'influenza eccessiva sulla nostra amministrazione." #OLD ITA
 national_churches_desc: "The State must take greater control over the Church in our land. We cannot allow foreign entities to exercise undue influence over our ecclesiastical administration; our Church must serve our realm first." #NEW
 #national_churches_desc: "The State must take greater control of the Church in our land, as we can not allow foreign entities to exercise too much influence over our administration." #OLD ENG
 entrenched_church: "Chiesa Radicata"
 #entrenched_church_desc: "Indipendentemente dalle persone che governiamo, la Chiesa ci offrirà un modo per dare loro una struttura unificata." #OLD ITA
 entrenched_church_desc: "No matter which people we rule over, the Church provides a way to give them a unified structure." #NEW
 #entrenched_church_desc: "No matter which people we rule over, the Church will offer us a way to give them a unified structure." #OLD ENG
 #catholic_enlightenment: "Illuminismo Cattolico" #OLD ITA
 catholic_enlightenment: "$catholic_ADJ$ Enlightenment" #NEW
 #catholic_enlightenment: "Catholic Enlightenment" #OLD ENG
 #catholic_enlightenment_desc: "Affinché la nostra fede possa superare i tempi dell'Illuminismo, dobbiamo adattarci e acquisire una nuova prospettiva sulla Chiesa." #OLD ITA
 catholic_enlightenment_desc: "For our faith to withstand the attacks of the Enlightenment, we must adapt, and present new perspectives in and about the Church." #NEW
 #catholic_enlightenment_desc: "For our faith to weather the times of the enlightenment, we must adapt and gain a new perspective on the Church." #OLD ENG
 divine_church_music: "Musica Religiosa Sacra"
 #divine_church_music_desc: "Molti dei nostri compositori hanno creato le loro opere più grandi ispirandosi alla fede. Dovremmo continuare a cercare gli artisti più talentuosi e ingaggiarli per non permettere che nelle nostre chiese e cattedrali si ascolti musica di qualità inferiore." #OLD ITA
 divine_church_music_desc: "Many of our composers have created their greatest works thanks to the inspiration provided by their faith. We should actively seek out the most talented artists and hire them immediately so as to never let our churches and cathedrals suffer from inferior music." #NEW
 #divine_church_music_desc: "Many of our composers have created their greatest works with the inspiration of the faith. We should continue to search for the most talented artist and hire them to never let our churches and cathedrals witness inferior music." #OLD ENG
 continue_missionary_works: "Opere Missionarie"
 #continue_missionary_works_desc: "L'impegno missionario volto a diffondere la nostra fede negli angoli più remoti del mondo non potrà mai essere considerato concluso. Dobbiamo sostenere più missioni per diffondere il verbo cattolico." #OLD ITA
 continue_missionary_works_desc: "Missionary efforts to carry our faith to the far corners of the world can never be considered finished. We need to sponsor more missions to further bring the light of $catholic$ to these unilluminated souls." #NEW
 #continue_missionary_works_desc: "The missionary effort to spread our faith into the far corners of the world can never be considered finished. We need to sponsor more missions to spread the good word of Catholicism." #OLD ENG
 #protestant advances
 #protestant_invite_persecuted: "Invita gli Indesiderati" #OLD ITA
 protestant_invite_persecuted: "Welcome the Unwelcome" #NEW
 #protestant_invite_persecuted: "Invite the Unwanted" #OLD ENG
 #protestant_invite_persecuted_desc: "Mentre noi abbiamo visto la luce della vera fede, molti dei nostri fratelli soffrono sotto il dominio oppressivo di persone fuorviate. Dovremmo invitare e sostenere queste persone affinché si stabiliscano nelle nostre terre, dove potranno vivere senza ripercussioni e, cosa ancora più importante, contribuire al nostro tesoro." #OLD ITA
 protestant_invite_persecuted_desc: "While we have seen the light of the true faith, many of our brethren suffer under the oppressive rule of misguided heathens. We should invite these people to settle in our lands, where they can process their faith without repercussions and, more importantly, contribute to our treasury." #NEW
 #protestant_invite_persecuted_desc: "While we have seen the light of the true faith, many of our brethren are suffering under the oppressive rule of the misguided. We should invite and support these people to settle in our lands, where they can live without repercussions and, more importantly, contribute to our treasury." #OLD ENG
 protestant_administration_tax: "Esattori Fiscali Efficienti"
 #protestant_administration_tax_desc: "In passato il clero si faceva carico di parte dell'onere fiscale. Sebbene alcune di queste strutture siano state smantellate sulla scia della Riforma, le persone capaci sono ancora presenti e pronte a servirci." #OLD ITA
 protestant_administration_tax_desc: "Previously, the clerics shouldered a significant portion of the tax burden. While some of these structures have been dismantled in the wake of the Reformation, the capable common people are still around, and thus must help make up for that missing clerical revenue." #NEW
 #protestant_administration_tax_desc: "Previously the clergy took some of the burden of proper taxation into their hand. While some of these structures have been dismantled in the wake of the Reformation, the capable people are still present and ready to serve us." #OLD ENG
 confessio_augustana: "Una Nuova Confessione"
 #confessio_augustana_desc: "La Riforma ci offre l'opportunità di definire un nuovo credo per il nostro popolo e, cosa ancora più importante, di accettarne le critiche e modificarlo." #OLD ITA
 confessio_augustana_desc: "The Reformation gives us the opportunity to define a new creed for our people and, more importantly, to accept critique and make adjustments accordingly." #NEW
 #confessio_augustana_desc: "The Reformation gives us the opportunity to define a new creed for our people and more importantly, accept critiques of it and alter it." #OLD ENG
 devotionalism: "Devotionalismo"
 #devotionalism_desc: "Dobbiamo far rivivere la teologia Agostiniana e costruire la nostra fede sulle emozioni e sul fervore dei fedeli." #OLD ITA
 devotionalism_desc: "We must revive Augustinian theology, and recognize that our beliefs are built on the emotions and fervor of the faithful." #NEW
 #devotionalism_desc: "We must revive the Augustinian theology and build our faith on the emotions and fervor of the faithful." #OLD ENG
 protect_the_new_faith: "Scudo della Fede"
 #protect_the_new_faith_desc: "La nostra Fede è assediata da nemici su tutti i fronti e dovremo difendere il nostro diritto alla nostra confessione contro gli oppressori papisti." #OLD ITA
 protect_the_new_faith_desc: "Our religion is beset on all sides by enemies. We will have to defend our rights to our own confession against the $catholic_ADJ$ oppressors." #NEW
 #protect_the_new_faith_desc: "Our Faith is beset on all sides by enemies, and we will have to defend our right to our own confession against the papist oppressors." #OLD ENG
 expulsion_of_heretics: "Espulsione degli Eretici"
 #expulsion_of_heretics_desc: "I fastidiosi eretici del nostro dominio potrebbero essere al centro di una ribellione contro il nostro sovrano. Sarebbe meglio se li reindirizzassimo invece verso le nostre colonie d'oltremare, dove possono causare meno problemi." #OLD ITA
 expulsion_of_heretics_desc: "The troublesome heretics in our domain could easily foment rebellion against our ruler. It would be better if we redirected them to our overseas colonies instead, where they can cause less trouble." #NEW
 #expulsion_of_heretics_desc: "The troublesome heretics of our domain could be the center of a rebellion against our ruler. It would be better if we redirected them to our overseas colonies instead, where they can cause less trouble." #OLD ENG
 repurposed_monasteries: "Monasteri Riadattati"
 #repurposed_monasteries_desc: "Le vecchie terre ecclesiastiche confiscate dal nostro Stato durante la conversione del nostro Paese possono ora servirci come nuovi centri di produzione o amministrazione." #OLD ITA
 repurposed_monasteries_desc: "Former religious properties seized by the state during our national conversion process can serve us now in new ways, such as centers for production or administration." #NEW
 #repurposed_monasteries_desc: "The old clerical lands seized by our state during the conversion of our country can serve us now as new centers for production or administration." #OLD ENG
 involved_laity: "Laici Coinvolti"
 involved_laity_desc: "Con il crescente coinvolgimento dei laici nell'amministrazione quotidiana della nostra Chiesa, il nostro popolo ha trovato un legame più personale con la fede stessa."
 protestant_cuius_regio_eius_religio: "$catholic_cuius_regio_eius_religio$"
 protestant_cuius_regio_eius_religio_desc: "$catholic_cuius_regio_eius_religio_desc$"
 protestant_painters: "Arte Protestante"
 #protestant_painters_desc: "La Riforma ha spinto sempre più artisti a ritrarre nuovi scenari, lontani dalla glorificazione di Dio. Assumere un numero maggiore di questi artisti ci farà apparire come grandi mecenati delle arti." #OLD ITA
 protestant_painters_desc: "The Reformation has given our artists the opportunity to explore new themes, finally freed from the obligatory glorification of God. Hiring more of these artists will reflect well on us, and give us the reputation of being a great patron of the arts." #NEW
 #protestant_painters_desc: "The Reformation has compelled more and more artist to portray new sceneries, removed from the glorification of God. Hiring more of these artists will reflect well on us as a great patron of the arts." #OLD ENG
 protestant_sunday_schools: "$sunday_schools_advance$"
 protestant_sunday_schools_desc: "$sunday_schools_advance_desc$"
 protestant_work_ethic: "Lavoratori Diligenti"
 #protestant_work_ethic_desc: "L'influenza dei predicatori puritani o pietisti sulla Riforma è innegabile. La loro attenzione a virtù come la diligenza e la frugalità ci aiuterà a promuovere una forza lavoro di alta qualità." #OLD ITA
 protestant_work_ethic_desc: "The influence of Puritan and Pietist preachers on the Reformation is undeniable. Their emphasis on virtues like diligence and frugality will help us to foster an industrious and dedicated workforce." #NEW
 #protestant_work_ethic_desc: "The influence of puritan or pietist preachers on the Reformation is undeniable. Their focus on virtues like diligence and frugality will help us to foster a workforce of high quality." #OLD ENG
 embrace_romanticism: "Abbraccia il Romanticismo"
 #embrace_romanticism_desc: "Sulla scia dell'illuminismo, non dovremmo dimenticare il fascino della romanticizzazione. I nostri artisti romantici produrranno sicuramente grandi opere d'arte." #OLD ITA
 embrace_romanticism_desc: "In the wake of the Enlightenment's emphasis on reason, we must not forget the power of emotion and imagination. By embracing Romanticism, which celebrates nature, folklore, and national character, our artists will produce works that stir the soul." #NEW
 #embrace_romanticism_desc: "In the wake of the enlightenment, we should not forget the appeal of romanticization. Our romantic artists will surely produce great works of art." #OLD ENG
 #wary_of_heretic_preachers: "Difesa contro gli Eretici" #OLD ITA
 wary_of_heretic_preachers: "Defense Against Heretics" #NEW
 #wary_of_heretic_preachers: "Defense against Heretics" #OLD ENG
 #wary_of_heretic_preachers_desc: "Dovremo stare attenti alle forze che cercano di convertire il nostro popolo o di riconvertirlo alla nostra fede precedente. Etichettando questi predicatori come maliziosi e ostili, possiamo preparare il nostro popolo a questi contatti e rafforzare più facilmente l'ortodossia religiosa." #OLD ITA
 wary_of_heretic_preachers_desc: "We will need to be wary of forces trying to convert our people, or seduce them back to our previous faith. By publicly declaring these preachers to be malicious and hostile, we can prepare our people for these interactions and more easily reinforce religious orthodoxy." #NEW
 #wary_of_heretic_preachers_desc: "We will need to be wary of forces trying to convert our people, or reconvert them to our previous faith. By labeling these preachers as malicious and hostile we can prepare our people for those contacts, and enforce religious orthodoxy easier." #OLD ENG
 protestant_innovation: "Innovazioni Protestanti"
 #protestant_innovation_desc: "Fin dalle origini della nostra fede, abbiamo imparato il valore intrinseco di mettere in discussione le dottrine e le credenze consolidate. Lo stesso principio può essere applicato ad altri campi di studio." #OLD ITA
 protestant_innovation_desc: "Since the founding days of our faith, we have emphasized the inherent value of questioning established doctrines and beliefs. We should apply these same ethics to other fields of study." #NEW
 #protestant_innovation_desc: "Beginning with the origins of our faith, we have learned the inherent value of questioning established doctrines and beliefs. The same things we can apply to other fields of study." #OLD ENG
