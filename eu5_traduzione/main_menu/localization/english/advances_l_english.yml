 maj_sumpah_palapa: "Sumpah Palapa"
 #maj_sumpah_palapa_desc: "Il capo del nostro esercito e la persona che risponde direttamente al nostro sovrano detiene grande influenza e potere, plasmando la storia del nostro popolo. Per assicurare la loro efficienza e comprensione della gravità di una tale posizione, sarà richiesto un giuramento speciale, uno che sottolinei i nostri sogni di conquista e rinvigorisca i nostri spiriti." #OLD ITA
 maj_sumpah_palapa_desc: "The head of our military directly answers to our ruler, and holds enough influence and power to shape the future of our realm. To ensure they understand what an important role they have been given, they are required to swear a special oath, one that underlines our dreams of conquest and bolsters our spirits." #NEW
 #maj_sumpah_palapa_desc: "The head of our military and the person that directly answers to our ruler holds great influence and power, shaping the history of our people. To ensure their efficiency and comprehension of the gravity of such a position, a special oath will be demanded, one that underlines our dreams of conquest and bolsters our spirits." #OLD ENG
 
 maj_bubu_and_jala: "Bubu e Jala"
 maj_bubu_and_jala_desc: "$bubu_building_desc$"
 
 maj_the_magic_arrow: "La Freccia Magica"
 maj_the_magic_arrow_desc: "$a_cetbang_cannon_desc$"
 
 maj_maritime_silk_road: "Via della Seta Marittima"
 #maj_maritime_silk_road_desc: "La nostra posizione geografica, completata dalla nostra crescente influenza, ci ha permesso di presiedere l'estesa e proficua rete commerciale che porta $silk$ e $spices$ da Est a Ovest." #OLD ITA
 maj_maritime_silk_road_desc: "Our geographical position, complemented by our growing influence, has led to us presiding over the extensive and profitable trade network that carries $silk$ and $spices$ from East to West." #NEW
 #maj_maritime_silk_road_desc: "Our geographical position, complimented by our growing influence, has come to allow us to preside over the extensive and profitable trade network that brings $silk$ and $spices$ from East to West." #OLD ENG
 
 maj_restore_candi_shrines: "Restaurare i Santuari Candi"
 #maj_restore_candi_shrines_desc: "Sparsi per Nusantara ci sono una serie di templi conosciuti come Candi. Dovremmo restaurare questi templi ovunque li troviamo per rinnovare la fede del nostro popolo." #OLD ITA
 maj_restore_candi_shrines_desc: "Scattered throughout Nusantara are a series of temples known as #italic candi#!. We should restore these temples wherever we find them to renew our people's faith." #NEW
 #maj_restore_candi_shrines_desc: "Scattered throughout Nusantara are a series of temples known as Candi. We should restore these temples wherever we find them to renew our people's faith." #OLD ENG
 
 maj_the_ghali: "$n_madurese_gali$"
 maj_the_ghali_desc: "$n_madurese_gali_desc$"
 
 maj_island_colonies: "Colonie Insulari"
 #maj_island_colonies_desc: "Il nostro contatto con molti vicini locali nell'arcipelago ha dato spazio all'idea che le risorse naturali e la terra vacante siano mature per essere prese, sicure e prospere sotto il nostro controllo." #OLD ITA
 maj_island_colonies_desc: "Contact with our neighbors in the archipelago has shown us clearly that the raw resources and unclaimed lands are ripe for the taking, promising to become secure and prosperous under our control." #NEW
 #maj_island_colonies_desc: "Our contact with many local neighbors in the archipelago has given way to the idea that the raw resources and vacant land is ripe for the taking, secure and prosperous under our control." #OLD ENG
 
 maj_preservation_of_javanese_history: "Preservazione della Storia $javanese_culture$"
 #maj_preservation_of_javanese_history_desc: "La profondità e la storia del popolo $javanese_culture$ sono una parte integrante della nostra identità culturale e del nostro essere. Per proteggere la nostra identità, dobbiamo preservare le tradizioni su cui abbiamo costruito le fondamenta di un grande paese." #OLD ITA
 maj_preservation_of_javanese_history_desc: "The history of the $javanese_culture$ people is an integral part of our cultural identity. To protect this identity, we must preserve the traditions upon which we built our great country." #NEW
 #maj_preservation_of_javanese_history_desc: "The depth and history of the $javanese_culture$ people is an integral part of our cultural identity and being. In order to protect our identity, we must preserve the traditions upon which we built the foundation of a great country." #OLD ENG
 
                                                                                                                                                                                                                                                                                     

       
 #Japan
 #heian_kyo: "Heian-kyō" #OLD ITA
 heian_kyo: "Heian-Kyō" #NEW
 #heian_kyo: "Heian-kyō" #OLD ENG
 #heian_kyo_desc: "La città di Heian-kyō è stata la residenza dell'Imperatore per secoli, essendo un centro per l'arte e la cultura. È lì dove la sontuosa corte del tempo dei $fujiwara$ fiorì e tutto il popolo del Giappone la guardava con timore reverenziale per ispirazione. Abbracceremo la sua tradizione e con il nostro mecenatismo faremo fiorire ancora una volta la cultura della nostra capitale." #OLD ITA
 heian_kyo_desc: "The city of Heian-Kyō has been the residence of the Emperor for centuries, and is a center for art and culture. It is there where the lavish court of the $fujiwara_dynasty$ flourished, and all the people in $JAP$ looked to it with awe and inspiration. We shall embrace its traditional role, and with our patronage make the culture of our capital flourish once again." #NEW
 #heian_kyo_desc: "The city of Heian-kyō has been the residence of the Emperor for centuries, being a center for art and culture. It is there where the lavish court of the time of the $fujiwara$ flourished and all the people in Japan looked at it in awe for inspiration. We shall embrace its tradition and with our patronage make the culture of our capital flourish once again." #OLD ENG
 matsuri: "Matsuri"
 #matsuri_desc: "Ogni santuario e tempio locale ha le sue feste e celebrazioni. Tutta la popolazione circostante è sempre desiderosa di parteciparvi, poiché è la loro occasione per offrire la loro devozione e gratitudine al loro Kami protettore locale." #OLD ITA
 matsuri_desc: "Every local shrine and temple has its own festivals and celebrations. The people are always eager to participate, for it is their chance to offer devotion and gratitude towards their local protector #italic Kami#!." #NEW
 #matsuri_desc: "Every local shrine and temple has its own festivals and celebrations. All the population around is always eager to participate in them, for it is their chance to offer their devotion and gratitude towards their local protector Kami." #OLD ENG
 onmyodo: "Onmyōdō"
 #onmyodo_desc: "Proveniente dalla $china$ secoli fa, le teorie di Yīn e Yáng si evolsero nel $japan_region$ in $onmyodo$. Gli esperti in essa, chiamati Onmyōji, si occupano di purificazione ed esorcismo di spiriti maligni e vendicativi, così come di divinazione, astronomia e studio della natura." #OLD ITA
 onmyodo_desc: "Coming from $china$ centuries ago, the theories of Yīn and Yáng evolved in $JAP$ into $onmyodo$. Expert practitioners, called #italic onmyōji#!, deal with the purification and exorcism of evil and vengeful spirits, as well as with divination, astronomy, and the study of nature." #NEW
 #onmyodo_desc: "Coming from $china$ centuries ago, the theories of Yīn and Yáng evolved in $japan_region$ into $onmyodo$. Experts in it, called Onmyōji, deal with purification and exorcism of evil and vengeful spirits, as well as with divination, astronomy, and the study of nature." #OLD ENG
 sumo: "Sumō"
 #sumo_desc: "Avendo le sue origini in una danza rituale agricola per pregare per buoni raccolti, la pratica del $sumo$ è sfuggita ai confini della corte e dei sacerdoti. È ora una pratica popolare eseguita dalla gente comune che serve anche come modo di addestramento al combattimento militare." #OLD ITA
 sumo_desc: "Derived from an ancient agricultural ritual, in which dances served as prayers for a good harvest, the practice of $sumo$ has escaped the confines of the court and is now a popular practice among the commoners. It also serves as a form of combat training." #NEW
 #sumo_desc: "Having its origins in an agricultural ritualistic dance to pray for good harvests, the practice of $sumo$ has escaped the confines of court and priests. It is now a popular practice performed by the common folk that serves also as a way of military combat training." #OLD ENG
 nanto_rokushuu: "Nanto Rokushū"
 #nanto_rokushuu_desc: "I templi di $nara$ sono stati influenti da quando il $buddhist$ venne dalla $china$. Le sei scuole formate in essi sono un deposito di conoscenza, specialmente sugli insegnamenti del Buddha e sui vari modi di raggiungere l'illuminazione, ma anche su altri argomenti più mondani come amministrare correttamente un monastero." #OLD ITA
 nanto_rokushuu_desc: "The temples of $nara$ have been influential since $buddhist$ first came from $china$. The six schools that formed around these temples are a renowned repository of knowledge, especially about the teachings of the Buddha and the various ways of achieving enlightenment. However, they also teach more mundane, but equally valuable subjects, such as how to properly administrate a monastery." #NEW
 #nanto_rokushuu_desc: "The temples of $nara$ have been influential since $buddhist$ came from $china$. The six schools formed in them are a repository of knowledge, especially about the teachings of the Buddha and the various ways of achieving enlightenment, but also about other more mundane subjects such as how to properly administer a monastery." #OLD ENG
 shinbutsu_shuugou: "Shinbutsu-Shūgō"
 #shinbutsu_shuugou_desc: "Da quando il $buddhist$ giunse nel $japan_region$, i suoi insegnamenti sono stati mescolati con il culto dei Kami locali, e sia Buddha che Kami si sono fusi in un insieme unitario e combinato di credenze, sebbene con pratiche rituali chiaramente distinte." #OLD ITA
 shinbutsu_shuugou_desc: "Since $buddhist$ came to $japan_region$, its teachings have coexisted with the worship of local #italic Kami#!. This has led to them both blending into a single combined set of beliefs, albeit with distinct ritualistic practices." #NEW
 #shinbutsu_shuugou_desc: "Since $buddhist$ came to $japan_region$, its teachings have been mixed with the worship of local Kami, and both Buddha and Kami have blended into a unitary and combined set of beliefs, albeit with clearly distinct ritualistic practices." #OLD ENG
 honji_suijaku: "Honji Suijaku"
 #honji_suijaku_desc: "Uno dei fattori chiave per il $shinbutsu_shuugou$ è identificare i Kami locali come manifestazioni dei diversi Buddha, e i Buddha come manifestazioni dei diversi Kami. Alla fine entrambi sono solo uno e lo stesso, forma centrale o #italic Honji#! che assume diverse manifestazioni o #italic Suijaku#!." #OLD ITA
 honji_suijaku_desc: "One of the key practices in $shinbutsu_shuugou$ is to identify the local #italic Kami#! as manifestations of the different Buddha, and the Buddhas as manifestations of the different #italic Kami#!. In the end, they are one and the same, with core forms or #italic Honji#! taking on different aspects, or #italic suijaku#!." #NEW
 #honji_suijaku_desc: "One of the key factors for $shinbutsu_shuugou$ is to identify the local Kami as manifestations of the different Buddha, and the Buddhas as manifestations of the different Kami. In the end both are just one and the same, core form or #italic Honji#! taking different manifestations or #italic Suijaku#!." #OLD ENG
 hachiman_worship: "Culto di Hachiman"
 hachiman_worship_desc: "Hachiman è una delle divinità più venerate. Originariamente una deificazione di Ōjin Tennō, dopo l'introduzione del $buddhist$ fu successivamente identificato anche come Bodhisattva. È il protettore della linea imperiale e il dio tutelare della classe guerriera."
 gozan_jissetsu: "Gozan Jissetsu"
 #gozan_jissetsu_desc: "Il 'Sistema delle Cinque Montagne' è un sistema tradizionale originato in $china$ di monasteri $buddhist_ADJ$ Chán sponsorizzati dallo stato, che ricevono quel nome perché si trovavano in cima a montagne sacre. Nel $japan_region$, la pratica continuò nel periodo Kamakura con la sponsorizzazione dei templi Zen, le cinque montagne di $kyoto$ e le cinque montagne di $kamakura$. Mantenendo la sponsorizzazione di tali istituzioni, possiamo usarle per aiutare a stabilizzare il nostro governo." #OLD ITA
 gozan_jissetsu_desc: "The 'Five Mountains System' originated in $china$ from state-sponsored Chán $buddhist_ADJ$ monasteries, atop the holy mountains that gave the system its name. In $japan_region$, the practice continued in the $kamakura$ period by the sponsoring of the Zen temples, the Five Mountains of $kyoto$ and the Five Mountains of $kamakura$. By maintaining our sponsorship of such institutions, we can use them to help stabilize our rule." #NEW
 #gozan_jissetsu_desc: "The 'Five Mountains System' is a traditional system originated in $china$ of state-sponsored Chán $buddhist_ADJ$ monasteries, receiving that name because they were on top of holy mountains. In $japan_region$, the practice continued in the Kamakura period by the sponsoring of the Zen temples, the five mountains of $kyoto$ and the five mountains of $kamakura$. By keeping the sponsorship on such institutions, we can use them to help stabilize our rule." #OLD ENG
 bodaiji: "Bodaiji"
 #bodaiji_desc: "È stato comune nelle nostre terre sin dall'antichità venerare i nostri antenati. Così, i più influenti dei nostri governanti possono erigere interi templi per essere sepolti e venerati dopo la morte. Di conseguenza, anche la memoria della loro vita e delle loro gesta sarà preservata e ricordata." #OLD ITA
 bodaiji_desc: "Since antiquity, our people have venerated our ancestors. The most influential of our rulers erect entire temples, where they will be entombed and then worshiped after death, and where their deeds and words will be remembered for all time." #NEW
 #bodaiji_desc: "It has been common in our lands since antiquity to venerate our ancestors. Thus, the most influential of our rulers can erect whole temples for them to be entombed and venerated after death. As a result, the memory of their life and deeds will also be preserved and remembered." #OLD ENG
 kagura: "Kagura"
 #kagura_desc: "Originariamente danze rituali sacre eseguite davanti alla corte dalle #italic Miko#!, le fanciulle del santuario, il $kagura$ ha anche ispirato l'esecuzione di danze rituali popolari in tutto il $japan_region$. Queste danze si sono evolute in una miriade di forme, ma tutte mantengono la tradizione e il rituale da cui provengono." #OLD ITA
 kagura_desc: "Originally sacred ritual dances performed in front of the court by the #italic miko#!, the shrine maidens, the $kagura$ also inspired the performance of popular ritual dances all around $japan_region$. These dances have evolved into a myriad of forms, but all of them preserving the tradition and ritual they come from." #NEW
 #kagura_desc: "Originally sacred ritual dances performed in front of the court by the #italic Miko#!, the shrine maidens, the $kagura$ also inspired the performance of popular ritual dances all around $japan_region$. These dances have evolved into a myriad of forms, but all of them keep the tradition and ritual they come from." #OLD ENG
 obon: "Obon"
 #obon_desc: "Una delle feste più importanti, $obon$ è il momento di onorare i morti e gli antenati. Durante le celebrazioni, vengono eseguite offerte di cibo e danze rituali. Le persone accendono anche fuochi e lanterne per guidare le anime dei morti a casa per le celebrazioni, e ancora una volta verso la terra dei morti." #OLD ITA
 obon_desc: "One of the most important festivals in our culture, $obon$ is the time to honor the dead, and our ancestors in particular. During the celebrations, offerings of food and ritual dances are performed. People also light fires and lanterns to guide the souls of the dead back home for the celebrations, and once again back to the land of the dead." #NEW
 #obon_desc: "One of the most important festivals, $obon$ is the time to honor the dead and the ancestors. During the celebrations, offerings of food and ritual dances are performed. People also light fires and lanterns to guide the souls of the dead back home for the celebrations, and once again back to the land of the dead." #OLD ENG
 neo_confucianism: "Neo-$SECT_CONFUCIANISM_NAME$"
 #neo_confucianism_desc: "Il Neo-$SECT_CONFUCIANISM_NAME$, uno sviluppo successivo del $SECT_CONFUCIANISM_NAME$ nella sua storia millenaria, è già presente nel $japan_region$ da secoli. Tuttavia, un ulteriore sostegno da parte dello stato assicurerà che il nostro governo abbia una presa salda sulla nazione." #OLD ITA
 neo_confucianism_desc: "$SECT_CONFUCIANISM_NAME$ has a millenary history, and Neo-$SECT_CONFUCIANISM_NAME$ has already existed in $japan_region$ for centuries. However, active state involvement and support of the faith will strengthen our authority." #NEW
 #neo_confucianism_desc: "Neo-$SECT_CONFUCIANISM_NAME$, a later development of $SECT_CONFUCIANISM_NAME$ in its millenary history, has already been present in $japan_region$ for centuries. However, further support of it from the state will ensure that our government has a firm grip over the nation." #OLD ENG
 danka_system: "Sistema Danka"
 #danka_system_desc: "Per secoli, le famiglie nel $japan_region$ hanno avuto uno stretto rapporto con i templi $buddhist_ADJ$ locali, dando loro patrocinio finanziario in cambio della cura dei templi per i loro bisogni spirituali. Estendere questo sistema a tutta la nostra popolazione assicurerà che la fede del nostro popolo sia sicura." #OLD ITA
 danka_system_desc: "For centuries, households in $japan_region$ have had close relationships with local $buddhist_ADJ$ temples, giving them financial patronage in exchange for the temples taking care of their spiritual needs. Formally enforcing this system will keep our people devoted to the faith, and secure the vital role our religion plays in society." #NEW
 #danka_system_desc: "For centuries, households in $japan_region$ have had a close relationship with the local $buddhist_ADJ$ temples, giving them financial patronage in exchange for the temples taking care of their spiritual needs. Extending this system to all our populace will ensure that the faith of our people is secure." #OLD ENG
 harae: "Harae"
 #harae_desc: "Nella nostra fede, la pratica dell'#italic $harae$#!, o purificazione rituale, è fondamentale per rimuovere tutti i #italic Tsumi#!, peccati, e #italic Kegare#!, impurità. Assicurandoci che la nostra popolazione esegua i rituali $harae$ correttamente e frequentemente, possiamo garantire che tutto il nostro paese rimanga puro." #OLD ITA
 harae_desc: "In our faith, the practice of #italic $harae$#!, or ritual purification, is key to removing all #italic tsumi#!, sins, and #italic kegare#!, spiritual uncleanness. Mandating that our population performs the $harae$ rituals properly and frequently ensures that our country remains spiritually pure." #NEW
 #harae_desc: "In our faith, the practice of #italic $harae$#!, or ritual purification, is key to remove all #italic Tsumi#!, sins, and #italic Kegare#!, uncleanness. Making sure that our population performs the $harae$ rituals properly and frequently, we can ensure that all our country remains pure." #OLD ENG
 jisha_bugyou: "Jisha-Bugyō"
 #jisha_bugyou_desc: "L'amministratore e supervisore di tutti i templi e santuari, il $jisha_bugyou$ supervisionerà tutte le attività che queste istituzioni religiose svolgono, assicurandosi che i loro interessi siano allineati con quelli del governo." #OLD ITA
 jisha_bugyou_desc: "The administrator and supervisor of all the temples and shrines, the $jisha_bugyou$ also oversees the activities these religious institutions perform, making sure that their interests align with those of the government." #NEW
 #jisha_bugyou_desc: "The administrator and supervisor of all the temples and shrines, the $jisha_bugyou$ will oversee all the activities these religious institutions perform, making sure that their interests align with those of the government." #OLD ENG
 kokugaku: "Kokugaku"
 #kokugaku_desc: "Quasi dalla sua nascita come paese, il $japan_region$ e lo $shinto$ sono stati influenzati da idee straniere provenienti dalla $china$ e dal $buddhist$. Un nuovo movimento sta prendendo piede, affermando che il nostro spirito nazionale è naturalmente puro, e che tutte le influenze straniere dovrebbero essere rimosse da esso." #OLD ITA
 kokugaku_desc: "Almost since its inception as a country, $japan_region$ and $shinto$ have been influenced by foreign ideas coming from $china$ and $buddhist$. A new movement is taking root, claiming that our own national spirit is naturally pure, and that our society must be cleansed of any foreign influences." #NEW
 #kokugaku_desc: "Almost since its inception as a country, $japan_region$ and $shinto$ have been influenced by foreign ideas coming from $china$ and $buddhist$. A new movement is taking root, claiming that our own national spirit is naturally pure, and that all foreign influences ought to be removed from it." #OLD ENG
 home_shrines: "Santuari Domestici"
 #home_shrines_desc: "Il culto e i rituali sono stati tradizionalmente relegati a santuari e templi. Tuttavia, sempre più del nostro popolo sta iniziando ad avere nelle proprie case sia santuari familiari locali chiamati #italic Kamidana#! per venerare i Kami che #italic Butsudan#! come altare $buddhist_ADJ$ per i loro antenati." #OLD ITA
 home_shrines_desc: "Ritual and religious practice have been traditionally relegated to shrines and temples. However, more and more of our people are placing in their homes both local family shrines, called #italic kamidana#!, to venerate the Kami, and #italic butsudan#! as $buddhist_ADJ$ altars for their ancestors." #NEW
 #home_shrines_desc: "Cult and rituals have been traditionally relegated to shrines and temples. However, more and more of our people are starting to have in their homes both local family shrines called #italic Kamidana#! to venerate the Kami and #italic Butsudan#! as a $buddhist_ADJ$ altar for their ancestors." #OLD ENG
 fukko_shinto: "Fukko $shinto$"
 #fukko_shinto_desc: "Mentre le persone stanno rifiutando l'influenza straniera nella nostra cultura, stanno anche rifiutando la mescolanza $buddhist_ADJ$ e $SECT_CONFUCIANISM_NAME$ nella nostra fede. Secondo questa linea di pensiero, è necessaria una rivitalizzazione dello $shinto$." #OLD ITA
 fukko_shinto_desc: "As people are rejecting foreign influence in our culture, they are also starting to reject the teachings of $buddhist_ADJ$ and $SECT_CONFUCIANISM_NAME$ interfering in our faith. Given this emerging demand for doctrinal purity, a formal revitalization of $shinto$ might be wise." #NEW
 #fukko_shinto_desc: "As people are rejecting foreign influence in our culture, so are they rejecting $buddhist_ADJ$ and $SECT_CONFUCIANISM_NAME$ mixing in our faith. According to this line of thought, a revitalization of $shinto$ is needed." #OLD ENG
 jap_bushido: "Bushidō"
 #jap_bushido_desc: "Sebbene mai effettivamente codificato attraverso regole specifiche, il modo in cui un guerriero dovrebbe comportarsi è chiaro. Il dovere di un guerriero è combattere e vincere in battaglia, ed espandere la gloria del proprio clan, indipendentemente dai metodi necessari per raggiungere ciò." #OLD ITA
 jap_bushido_desc: "Although never formally codified into specific rules, the way a warrior should behave is clear: A warrior's duty is to fight and win in battle, and to expand the glory of one's own clan, regardless of the methods needed to achieve that." #NEW
 #jap_bushido_desc: "Although never actually codified through specific rules, the way a warrior should behave is clear. A warrior's duty is to fight and win in battle, and to expand the glory of its own clan, regardless of the methods needed to achieve that." #OLD ENG
 jap_land_of_the_rising_sun: "Terra del Sol Levante"
 #jap_land_of_the_rising_sun_desc: "La terra del Giappone è una con una storia lunga e gloriosa. La nostra unica tradizione culturale, i nostri coraggiosi soldati e la nostra geografia inespugnabile, ci rendono più forti di molti altri stati nella nostra regione. È giunto il momento per la Terra del Sol Levante di prendere il suo posto tra le grandi nazioni di questo mondo!" #OLD ITA
 jap_land_of_the_rising_sun_desc: "$japan_region$ has a long and glorious history. Our unique cultural traditions, our brave soldiers, and our unconquerable geography make us stronger than many other states in our region. The time has come for the Land of the Rising Sun to take its place among the great nations of this world!" #NEW
 #jap_land_of_the_rising_sun_desc: "The land of Japan is one with a long and glorious history. Our unique cultural tradition, our brave soldiers, and our unconquerable geography, make us stronger than many other states in our region. The time has come for the Land of the Rising Sun to take its place among the great nations of this world!" #OLD ENG
 jap_ancestral_legacy: "Eredità Ancestrale"
 #jap_ancestral_legacy_desc: "La discendenza ancestrale del nostro clan è ben nota, e un pilastro che dobbiamo sostenere e mantenere. È la nostra storia passata che ci definisce e assicura il nostro diritto a governare." #OLD ITA
 jap_ancestral_legacy_desc: "The ancestral lineage of our clan is well-known, and our reputation is a pillar of our identity — one that we strive at all costs to uphold, as our history both defines us and ensures our right to rule." #NEW
 #jap_ancestral_legacy_desc: "The ancestral lineage of our clan is well-known, and a pillar that we must uphold and maintain. It is our past history what defines us and ensures our right to rule." #OLD ENG
 jap_shinobi: "Shinobi no Mono"
 #jap_shinobi_desc: "L'informazione è fondamentale per ottenere qualsiasi vantaggio. A tal fine, da tempo utilizziamo spie e infiltrati per raccogliere informazioni per noi. Questi $jap_shinobi$ sono di solito della classe samurai, sebbene possano anche essere reclutati dalla popolazione locale, e vengono inviati nelle terre nemiche per mescolarsi nella loro società e stabilire una rete di informazioni di cui possiamo trarre vantaggio in seguito." #OLD ITA
 jap_shinobi_desc: "Information is key to gaining the advantage in any situation. To that effect, we have long since used spies and infiltrators to gather reconnaissance. These $jap_shinobi$ are usually from the samurai class, although they can also be recruited from the local peasant population, and are sent into enemy territory, where they blend in and establish networks of informants." #NEW
 #jap_shinobi_desc: "Information is key to get any advantage. To that effect, we have since long used spies and infiltrators to gather information for us. These $jap_shinobi$ are usually from the samurai class, although they can also be recruited from the local population, and are sent to the enemy lands to blend into their society and establish a network of information we can take advantage of afterward." #OLD ENG
 #jap_head_hunting: "Caccia alle Teste" #OLD ITA
 jap_head_hunting: "Head-Hunting" #NEW
 #jap_head_hunting: "Head Hunting" #OLD ENG
 #jap_head_hunting_desc: "Le imprese di un guerriero in battaglia possono essere veramente gloriose solo se effettivamente provate. A tal fine, i samurai andranno a raccogliere le teste decapitate dei nemici che hanno ucciso per presentarle successivamente al generale. Più numerose e più importanti sono le teste che un samurai prende, migliori saranno le ricompense che otterrà per questo." #OLD ITA
 jap_head_hunting_desc: "The achievements of a warrior in battle are only truly noteworthy if they can be proven. To that end, samurai will collect the decapitated heads of enemies they have slain to present them later to their general. The more numerous and more important the heads that a samurai takes, the better the rewards he will receive." #NEW
 #jap_head_hunting_desc: "The achievements of a warrior in battle can only be truly glorious if actually proven. To that effect, samurai will go collecting the decapitated heads of the enemies they have slain to present them later to the general. The more numerous and more important the heads that a samurai takes, the better the rewards he will get for that." #OLD ENG
 jap_ichiban_yari: "Ichiban Yari"
 #jap_ichiban_yari_desc: "Essere il primo guerriero a infliggere danni a un nemico è un grande onore, e quindi i nostri guerrieri sono ansiosi di essere la prima lancia a spaccare la forza dell'avversario una volta che si presenta l'opportunità." #OLD ITA
 jap_ichiban_yari_desc: "Drawing first blood in battle is an honor and a good omen, and thus our warriors are eager to land the first strike whenever they have the opportunity to do so." #NEW
 #jap_ichiban_yari_desc: "To be the first warrior to inflict damage onto an enemy is a great honor, and thus our warriors are eager to be the first spear to cleave the opponent's force once the opportunity is presented." #OLD ENG
 jap_ashigaru: "Ashigaru"
 #jap_ashigaru_desc: "La guerra è sempre stata il territorio dei potenti samurai. Sviluppi recenti, tuttavia, hanno dimostrato la necessità di una fonte di truppe sostanzialmente più grande dei soli samurai, e includono anche truppe contadine. Questi ashigaru non saranno solo plebaglia comune però, poiché il loro addestramento costante e la vasta esperienza di battaglia li rendono combattenti formidabili in grado di stare alla pari con i samurai." #OLD ITA
 jap_ashigaru_desc: "Warfare has always been the domain of the mighty samurai. Recent developments, however, have proved the need for more substantial reinforcements, and thus our battlefields now also include peasant troops. These #italic ashigaru#! will not be just common rabble, however, as their rigorous training and ample battle experience makes them formidable fighters, on equal footing with the samurai." #NEW
 #jap_ashigaru_desc: "Warfare has always been the territory of the mighty samurai. Recent developments, however, have proved the need for a substantially bigger source of troops than just the samurai, and also include peasant troops. These ashigaru will not be just common rabble though, as their constant training and ample battle experience makes them formidable fighters able to stand on equal footing as the samurai." #OLD ENG
 jap_daiku_construction: "Costruzione Daiku"
 #jap_daiku_construction_desc: "La costruzione di edifici usando tecniche tradizionali di falegnameria, o #italic daiku#! è stata presente nel $japan_region$ sin dalla sua nascita. I nostri edifici in legno sono resilienti ma flessibili, e ammirati da tutti. Dalla più umile capanna al più alto palazzo, il legno è sempre presente nei nostri edifici." #OLD ITA
 jap_daiku_construction_desc: "Traditional carpentry techniques, or #italic daiku#! have been used in $japan_region$ since the earliest days of our history. Our wooden buildings are resilient yet flexible, and admired by many for their beauty and skillful construction. From the lowliest hut to the most elaborate palace, wood is our most universal building resource." #NEW
 #jap_daiku_construction_desc: "The construction of buildings using traditional techniques of carpentry, or #italic daiku#! has been present in $japan_region$ since its inception. Our wooden buildings are resilient yet flexible, and admired by everyone. From the lowest hut to the highest palace, wood is ever present in our buildings." #OLD ENG
 jap_wandering_ronin: "Rōnin Erranti"
 #jap_wandering_ronin_desc: "È molto comune per i samurai vagare per la terra in cerca della migliore posizione di impiego, cambiando la loro fedeltà al signore che li paga di più. Questi uomini vanno e vengono come le onde, ma possiamo sempre farne uso." #OLD ITA
 jap_wandering_ronin_desc: "It is fairly common for samurai to wander the country in search of the best employment opportunities, switching their allegiance to whoever pays them the most. These warriors come and go like the errant waves, but we can always make use of them." #NEW
 #jap_wandering_ronin_desc: "It is very common for samurai to wander the land in search for the best employment position, switching their allegiance to the lord that pays them the most. These men come and go like the waves, but we can always make use of them." #OLD ENG
 jap_reformed_land_holding: "Riforma della Proprietà Terriera"
 #jap_reformed_land_holding_desc: "Tradizionalmente, la terra veniva valutata in base alle dimensioni, ma questo non teneva conto del fatto che non tutta la terra è uguale. D'ora in poi, sarà valutata in base al valore del riso che può essere coltivato su di essa. Questo ci renderà più facile sfruttare al meglio il nostro territorio." #OLD ITA
 jap_reformed_land_holding_desc: "Traditionally, we assessed land value based on size, but this failed to take into account that not all land is the same. From now on, it will be valued according to how much $rice$ can be grown there. This will streamline related economic actions and make it easier to get the best outcomes from our agricultural ventures." #NEW
 #jap_reformed_land_holding_desc: "Traditionally, land was assessed by size, but this failed to take into account that not all land is the same. From now on, it will be valued according to the value of rice that can be grown on it. This will make it easier for us to make the best out of our territory." #OLD ENG
 jap_jokamachi: "Jōkamachi"
 #jap_jokamachi_desc: "I tempi turbolenti presentano un grave pericolo per la popolazione, quindi tenderà a riunirsi attorno alla sicurezza dei luoghi fortificati. La crescita delle città attorno ai castelli fortificati attirerà indubbiamente commercio e prosperità verso di esse." #OLD ITA
 jap_jokamachi_desc: "Turbulent times are gravely dangerous for our people, so for safety, they tend to settle around the security of fortified places. These huddles eventually turn into cities, which of course provide commercial and cultural assets in addition to physical protection for those who huddle behind the walls." #NEW
 #jap_jokamachi_desc: "Turbulent times present a grave danger for the populace, so they will tend to gather around the security of fortified places. The growth of cities around fortified castles will undoubtedly attract commerce and prosperity towards them." #OLD ENG
 jap_terakoya: "Terakoya"
 #jap_terakoya_desc: "Queste scuole private forniscono educazione di base ai comuni, promuovendo alfabetizzazione, calcolo e valori morali. Le scuole Terakoya svolgono un ruolo vitale nel promuovere una popolazione più istruita e socialmente consapevole, contribuendo alla stabilità e al progresso del paese durante questa era." #OLD ITA
 jap_terakoya_desc: "These private schools provide basic education to commoners, promoting literacy, numeracy, and moral values. #italic Terakoya#! play a vital role in fostering a more educated and socially aware populace, contributing to national stability and progress." #NEW
 #jap_terakoya_desc: "These private schools provide basic education to commoners, promoting literacy, numeracy, and moral values. The Terakoya schools play a vital role in fostering a more educated and socially aware populace, contributing to the country's stability and progress during this era." #OLD ENG
 jap_codified_bushido: "Bushidō Codificato"
 #jap_codified_bushido_desc: "Il comportamento atteso di un guerriero è sempre più idealizzato, con valori come onore e lealtà che assumono più importanza della loro effettiva utilità in battaglia reale. Questa versione romanticizzata e codificata del Bushidō, tuttavia, migliorerà certamente il modo in cui i nostri eserciti sono percepiti, anche se non è così che si comportano effettivamente." #OLD ITA
 jap_codified_bushido_desc: "The expected behavior of a warrior is becoming increasingly idealized, with values such as honor and loyalty being given more importance than their actual utility in real battle. This romanticized and codified version of #italic Bushidō#!, however, will improve how our armies are perceived, even if it is not how they actually behave." #NEW
 #jap_codified_bushido_desc: "The expected behavior of a warrior is increasingly idolized, with values such as honor and loyalty taking more importance than their actual utility in real battle. This romanticized and codified version of Bushidō, however, will certainly improve how our armies are perceived, even if it is not how they actually behave." #OLD ENG
 #Japanese unique
 kgk_omi_genji: "Ōmi-Genji"
 #kgk_omi_genji_desc: "I nostri antenati appartenevano un tempo al clan Uda Genji della famiglia Minamoto, e siamo stati gli Shugo di Ōmi per generazioni. Il nostro diritto a difenderla è assicurato." #OLD ITA
 kgk_omi_genji_desc: "We are the Ōmi-Genji, descendants of the Uda Genji branch of the Minamoto family, who have governed Ōmi as hereditary #italic Shugo#! for generations. Our well-established position gives us unquestioned legitimacy to defend and rule our ancestral domain." #NEW
 #kgk_omi_genji_desc: "Our ancestors once belonged to the Uda Genji clan of the Minamoto family, and we have been the Shugo of Ōmi for generations. Our right to defend it is secured." #OLD ENG
 kgk_emerging_clan: "Clan Emergente"
 #kgk_emerging_clan_desc: "Nonostante la nostra eredità ancestrale, il nostro clan come ramo del clan Sasaki è relativamente recente. Per questo, il nostro popolo sente la necessità di dimostrare il nostro valore come nome indipendente." #OLD ITA
 kgk_emerging_clan_desc: "Despite our impressive ancestry, our clan is very new, as our split from the Sasaki clan is relatively recent. Our people are eager to prove their worth as scions of an independent name." #NEW
 #kgk_emerging_clan_desc: "Despite our ancestral heritage, our clan as a split of the Sasaki clan is relatively recent. As such, our people feel the need to prove our worth as an independent name." #OLD ENG
 #akt_march_of_akita: "Marca di Akita" #OLD ITA
 akt_march_of_akita: "March of $akita$" #NEW
 #akt_march_of_akita: "March of Akita" #OLD ENG
 #akt_march_of_akita_desc: "Il nostro feudo di Akita nella provincia settentrionale di Dewa era un'antica zona di conflitto contro i 'barbari' del nord. Il confine del Giappone si è espanso molto a nord, ma lo spirito dei nostri antenati vive ancora nel nostro sangue." #OLD ITA
 akt_march_of_akita_desc: "$akita$, our fief in northern Dewa Province, was an ancient zone of conflict against northern 'barbarians'. The border of $JAP$ has expanded far into the North, but the spirit of our ancestors still lives in our blood — let any who dare stand in our way!" #NEW
 #akt_march_of_akita_desc: "Our fief of Akita in Northern Dewa province was an ancient zone of conflict against northern 'barbarians'. The border of Japan has expanded far into the North, but the spirit of our ancestors still lives in our blood." #OLD ENG
 #akt_ezo_kanrei: "Ezo Kanrei" #OLD ITA
 akt_ezo_kanrei: "$ezo_area$ Kanrei" #NEW
 #akt_ezo_kanrei: "Ezo Kanrei" #OLD ENG
 #akt_ezo_kanrei_desc: "La posizione di Ezo Kanrei (amministratore di $ezo_area$) è stata assegnata al nostro clan dallo Shogunato Kamakura. Siamo incaricati di gestire l'isola come luogo di esilio per i criminali, quindi manteniamo stretti contatti attraverso lo stretto." #OLD ITA
 akt_ezo_kanrei_desc: "The position of the $ezo_area$ #italic Kanrei#!, or administrator of $ezo_area$, has been assigned to our clan since the time of the $kamakura$ Shogunate. We are in charge of managing the island as a place of exile for criminals, necessitating constant communication across the strait." #NEW
 #akt_ezo_kanrei_desc: "The position of Ezo Kanrei (administrator of $ezo_area$) has been assigned to our clan since the Kamakura Shogunate. We are in charge of managing the island as a place of exile for criminals, so we keep close contacts across the strait." #OLD ENG
 akt_ainu_trade: "Commercio $ainu_culture$"
 #akt_ainu_trade_desc: "Siamo tra i primi $japanese_group$ che hanno stabilito un commercio permanente con gli $ainu_culture$. Le nostre navi vanno avanti e indietro tra le loro terre e le nostre, portando grandi benefici ad entrambi." #OLD ITA
 akt_ainu_trade_desc: "We are among the first $japanese_group$ to have established permanent trade with the $ainu_culture$. Our ships go back and forth between their lands and ours, greatly benefiting both communities." #NEW
 #akt_ainu_trade_desc: "We are among the first $japanese_group$ who established permanent trade with the $ainu_culture$. Our ships go back and forth between their lands and ours, greatly benefiting both." #OLD ENG
 asa_legacy_of_emperor_keitai: "Eredità dell'Imperatore Keitai"
 #asa_legacy_of_emperor_keitai_desc: "Molti secoli fa, l'imperatore Keitai usò Echizen per lanciare la sua guerra per prendere il trono imperiale. Come lui, non dobbiamo esitare a proiettare potere oltre i nostri confini e a lanciare invasioni nei regni vicini quando la situazione lo richiede." #OLD ITA
 asa_legacy_of_emperor_keitai_desc: "Many centuries ago, emperor Keitai launched his campaign to take the imperial throne from $echizen_province$. Like him, we must not hesitate to project power beyond our borders and to launch invasions into neighboring realms when the situation calls for it." #NEW
 #asa_legacy_of_emperor_keitai_desc: "Many centuries ago, emperor Keitai used Echizen to launch his war to take the imperial throne. Like him, we must not hesitate to project power beyond our borders and to launch invasions into neighboring realms when the situation calls for it." #OLD ENG
 #asa_control_of_buddhist_sects: "Controllo delle Sette Buddiste" #OLD ITA
 asa_control_of_buddhist_sects: "Control of $buddhism_ADJ$ Sects" #NEW
 #asa_control_of_buddhist_sects: "Control of Buddhist Sects" #OLD ENG
 #asa_control_of_buddhist_sects_desc: "Echizen ospita molti templi importanti di diverse sette come l'Eiheiji della setta Sōtō e l'Heisenji della setta Tendai. Se potessimo controllarli tutti e stabilire una pace confessionale nella provincia, avremmo le fondamenta di una politica religiosa ideale per tutto il nostro territorio." #OLD ITA
 asa_control_of_buddhist_sects_desc: "$echizen_province$ is home to many important temples representing different sects, such as the Eiheiji of the Sōtō tradition and the Heisenji of the Tendai tradition, among others. If we could bring all of them under our control and establish religious peace throughout the province, it would be the foundation of an ideal religious policy for our entire nation." #NEW
 #asa_control_of_buddhist_sects_desc: "Echizen is home to many important temples of different sects such as the Eiheiji of the Sōtō sect and the Heisenji of the Tendai sect. If we could control all of them and establish a confessional peace in the province, we would have the foundation of an ideal religious policy for our entire territory." #OLD ENG
 ask_defender_of_the_imperial_court: "Difensori della Corte Imperiale"
 #ask_defender_of_the_imperial_court_desc: "Quando lo Shogunato Kamakura cadde, mantenemmo l'Imperatore e la Corte Imperiale al sicuro. Questo ci ha garantito una posizione in prima linea tra tutti i clan del Giappone, come il vero protettore dell'Impero e delle tradizioni di corte." #OLD ITA
 ask_defender_of_the_imperial_court_desc: "When the $kamakura$ Shogunate fell, we were the ones who protected the Emperor and the Imperial Court. This has afforded us a position at the forefront of all clans in $JAP$, as the true protector of the Empire and its courtly traditions." #NEW
 #ask_defender_of_the_imperial_court_desc: "When the Kamakura Shogunate fell, we kept the Emperor and the Imperial Court safe. This has afforded us a position at the forefront of all clans in Japan, as the true protector of the Empire and the courtly traditions." #OLD ENG
 ask_bugyoshu_and_hokushu: "Bugyōshū e Hōkōshū"
 #ask_bugyoshu_and_hokushu_desc: "Dobbiamo rafforzare i funzionari della nostra amministrazione come i Magistrati Bugyōshū e i Comandanti Hōkōshū. Una burocrazia forte sarà talvolta l'unica cosa che si frappone tra noi e una guerra civile aperta." #OLD ITA
 ask_bugyoshu_and_hokushu_desc: "We must strengthen the authority of our administrative officials, such as the Bugyōshū magistrates and the Hōkōshū commanders. A strong bureaucracy can sometimes be the only thing that stands between us and an open civil war." #NEW
 #ask_bugyoshu_and_hokushu_desc: "We must strengthen the officials of our administration such as the Bugyōshū Magistrates and the Hōkōshū Commanders. A strong bureaucracy will sometimes be the only thing that stands between us and an open civil war." #OLD ENG
 ask_higashiyama_culture: "Cultura Higashiyama"
 #ask_higashiyama_culture_desc: "Costruita attorno all'estetica del Buddismo Zen, la cultura Higashiyama vede la bellezza nella semplicità. Promuove lo sviluppo della cerimonia del tè, la disposizione dei fiori, il teatro e l'arte. Questa fioritura culturale ha portato grande prestigio a coloro che la praticano e si rifletterà grandemente su di noi." #OLD ITA
 ask_higashiyama_culture_desc: "Built around the ascetics of Zen $buddhism$, Higashiyama culture sees beauty in simplicity. It has promoted development of the formal tea ceremony, #italic ikebana#! flower arrangements, theater, and art. This blossoming of culture has brought great prestige to those who practice the arts, and will reflect well upon our realm." #NEW
 #ask_higashiyama_culture_desc: "Built around the ascetics of Zen Buddhism, Higashiyama culture sees beauty in simplicity. It promotes the development of the tea ceremony, flower arraigning, theater, and art. This flowering of culture has brought great prestige to those who practice it and will reflect greatly upon us." #OLD ENG
 ask_shugo_system: "Sistema Shugo"
 #ask_shugo_system_desc: "Gli Shugo sono vassalli importanti per lo Shogunato, amministrando le terre in nome del $JAPANESE_SHOGUNATE_LEADER_MALE$. Grazie a loro, possiamo amministrare le nostre terre meglio e più efficientemente." #OLD ITA
 ask_shugo_system_desc: "#italic Shugo#! are important vassals for the Shogunate, administrating the lands in name of the $JAPANESE_SHOGUNATE_LEADER_MALE$. Thanks to them, we can administer our lands better and more efficiently." #NEW
 #ask_shugo_system_desc: "Shugo are important vassals for the Shogunate, administrating the lands in name of the $JAPANESE_SHOGUNATE_LEADER_MALE$. Thanks to them, we can administer our lands better and more efficiently." #OLD ENG
 #cba_lineage_of_taira: "Discendenza Taira" #OLD ITA
 cba_lineage_of_taira: "$taira_dynasty$ Lineage" #NEW
 #cba_lineage_of_taira: "Taira Lineage" #OLD ENG
 #cba_lineage_of_taira_desc: "Il clan Chiba è un antico ramo dei Taira del tardo periodo Heian. Questo fatto ci conferisce più potere e influenza di quanto la nostra situazione politica indicherebbe altrimenti." #OLD ITA
 cba_lineage_of_taira_desc: "The $chiba_dynasty$ clan is an old branch of the $taira_dynasty$, having split from them in the late Heian period. This gives us more power and influence than our political situation would otherwise indicate." #NEW
 #cba_lineage_of_taira_desc: "The Chiba clan is an old branch of the Taira from the late Heian period. This fact gives us more power and influence than our political situation would otherwise indicate." #OLD ENG
 cba_katori_jingu: "$katori_shrine$"
 #cba_katori_jingu_desc: "$katori_shrine$ venera Futsunushi no Kami, un dio patrono delle arti marziali e quindi riverito da tutti i guerrieri in Giappone. Dovremmo sfruttare questo fatto per il miglioramento dei nostri stessi samurai." #OLD ITA
 cba_katori_jingu_desc: "$katori_shrine$ is dedicated to Futsunushi no Kami, a patron god of martial arts who is revered by every warrior in $japan_region$. By becoming the shrine's primary patron and encouraging our samurai to train there, we will assert our legitimacy while also strengthening the morale and abilities of our warriors." #NEW
 #cba_katori_jingu_desc: "$katori_shrine$ worships Futsunushi no Kami, a god patron of martial arts and thus revered by all warriors in Japan. We should exploit this fact for the betterment of our own samurai." #OLD ENG
 cba_dream_of_masakado: "Sogno di Masakado"
 #cba_dream_of_masakado_desc: "Taira no Masakado, un grande guerriero e stretto parente del nostro clan nell'era antica, una volta cercò di diventare l'Imperatore del Giappone orientale. Masakado purtroppo non poté realizzare la sua ambizione, ma il suo sogno di creare un nuovo paese per i samurai dovrebbe essere la nostra guida in ogni momento." #OLD ITA
 cba_dream_of_masakado_desc: "$taira_dynasty$ no Masakado, a great warrior and close kinsman of our clan, once tried to become the Emperor of Eastern $japan_region$. Sadly, Masakado could not fulfill his ambition, but his dream of founding a new nation of samurai should be our guiding star." #NEW
 #cba_dream_of_masakado_desc: "Taira no Masakado, a great warrior and close kinsman of our clan in the ancient era, once tried to become the Emperor of Eastern Japan. Masakado could not fulfill his ambition unfortunately, but his dream to create a new country for samurai should be our guide at all times." #OLD ENG
 cba_irrigation_of_southern_kanto: "Irrigazione del Kantō Meridionale"
 #cba_irrigation_of_southern_kanto_desc: "Gran parte dei nostri domini sono aree paludose che non supporterebbero un'agricoltura intensiva. Sviluppi tecnologici recenti nel campo dell'irrigazione, tuttavia, ci permettono di coltivare nuovi campi e di drenare le paludi quando necessario. Intraprendiamo un grande progetto di sviluppo delle terre sotto il nostro controllo per il miglioramento dell'economia." #OLD ITA
 cba_irrigation_of_southern_kanto_desc: "Large parts of our domain is marshland that cannot support intensive agriculture. Recent developments in irrigation technology, however, make it possible to drain marshes and cultivate new arable lands. Let us undertake a grand project of developing these otherwise useless lands; we stand to profit enormously." #NEW
 #cba_irrigation_of_southern_kanto_desc: "Large parts of our domains are marshy areas that would not support intensive agriculture. Recent technological developments in the field of irrigation, however, allow us to cultivate new fields and to drain marshes when needed. Let us undertake a grand project of developing the lands under our control for the betterment of the economy." #OLD ENG
 #csk_clans_of_tosa: "Clan di Tosa" #OLD ITA
 csk_clans_of_tosa: "Clans of $tosa_province$" #NEW
 #csk_clans_of_tosa: "Clans of Tosa" #OLD ENG
 #csk_clans_of_tosa_desc: "La nostra provincia natale Tosa è tradizionalmente divisa tra clan potenti. Se vogliamo essere in grado di espanderci ulteriormente dobbiamo unirci tutti insieme. Ci aiuteranno a salire, e in cambio aumenteremo il loro potere." #OLD ITA
 csk_clans_of_tosa_desc: "Our home province $tosa_province$ has always been divided between powerful clans. If we wish to expand our holdings, we must join forces with these other clans — they will help us rise up, and in return we will increase their power." #NEW
 #csk_clans_of_tosa_desc: "Our home province Tosa is traditionally divided between powerful clans. If we are to be able to expand any further we must all join together. They will help us rise up, and in return we will increase their power." #OLD ENG
 #csk_god_of_arts: "Dio delle Arti" #OLD ITA
 csk_god_of_arts: "God of the Arts" #NEW
 #csk_god_of_arts: "God of Arts" #OLD ENG
 #csk_god_of_arts_desc: "Il fondatore ancestrale del nostro clan, Hata no Kawakatsu, era molto ammirato come dio patrono di tutte le arti, dalle danze tradizionali al teatro. Il nostro clan deve essere all'altezza della sua eredità se vuole guadagnare il rispetto del popolo giapponese." #OLD ITA
 csk_god_of_arts_desc: "The ancestral founder of our clan, Hata no Kawakatsu, was highly admired as the patron god of all art, from traditional dances to theater. Our clan must live up to his legacy if we are to earn the respect we deserve." #NEW
 #csk_god_of_arts_desc: "The ancestral founder of our clan, Hata no Kawakatsu, was highly admired as the patron God of all art, from traditional dances to theater. Our clan must live up to his legacy if it is to earn the respect of the Japanese people." #OLD ENG
 csk_unification_of_shikoku: "Unificazione di Shikoku"
 #csk_unification_of_shikoku_desc: "Shikoku è vista come una terra povera e isolata dal resto del Giappone, dove non accade nulla di importante. Lasciamoli continuare a pensarlo e trascurare la nostra unificazione dell'isola finché non sarà troppo tardi." #OLD ITA
 csk_unification_of_shikoku_desc: "Shikoku is seen as a poor, isolated land by the rest of $japan_region$, where nothing of importance happens. Let them continue thinking that and overlook our unification of the island until it is too late." #NEW
 #csk_unification_of_shikoku_desc: "Shikoku is seen as a poor, isolated land by the rest of Japan, where nothing of importance happens. Let them continue thinking that and overlook our unification of the island until it is too late." #OLD ENG
 csk_expand_the_navy: "Espandere la Marina"
 #csk_expand_the_navy_desc: "Il Giappone è una nazione insulare e per prosperare qui è necessaria una marina forte. Tosa è un luogo ideale per iniziare la costruzione di un'armata nostra." #OLD ITA
 csk_expand_the_navy_desc: "$japan_region$ is a nation of islands, and as a result, a strong navy is an absolute necessity. $tosa_province$ is an ideal place to begin building an armada of our own." #NEW
 #csk_expand_the_navy_desc: "Japan is an island nation and in order to prosper here a strong navy is required. Tosa is an ideal place to begin the construction of an armada of our own." #OLD ENG
 #dte_fujiwara_hokke: "$fujiwara$ Hokke" #OLD ITA
 dte_fujiwara_hokke: "$fujiwara_dynasty$ Hokke" #NEW
 #dte_fujiwara_hokke: "$fujiwara$ Hokke" #OLD ENG
 #dte_fujiwara_hokke_desc: "Come uno dei rami della casa settentrionale dei $fujiwara$, la legittimità del nostro governo è indiscutibile." #OLD ITA
 dte_fujiwara_hokke_desc: "As one of the branches of the northern house of the $fujiwara_dynasty$, the legitimacy of our rule is impeachable." #NEW
 #dte_fujiwara_hokke_desc: "As one of the branches of the northern house of the $fujiwara$, the legitimacy of our rule is unquestionable." #OLD ENG
 dte_oshu_shugo: "Ōshū Shugo"
 #dte_oshu_shugo_desc: "Come clan onorevole che risale al primo periodo Kamakura, abbiamo una forte pretesa a governare l'intera provincia di Ōshū. Fortunatamente per noi, quale terra esattamente copra Ōshū non è ben definito." #OLD ITA
 dte_oshu_shugo_desc: "As an honorable clan dating back to the early $kamakura$ period, we have a strong claim to rule over the entire Ōshū province. Fortunately for us, what land Ōshū exactly covers is not well-defined." #NEW
 #dte_oshu_shugo_desc: "As an honorable clan dating back to the early Kamakura period, we have a strong claim to rule the entire Ōshū province. Fortunately for us, what land Ōshū exactly covers is not well-defined." #OLD ENG
 dte_dragon_of_oshu: "Drago di Ōshū"
 #dte_dragon_of_oshu_desc: "La nostra potenza e il nostro potere saranno l'invidia dei nostri nemici. Il nostro nome sarà per sempre associato al Drago di Ōshū." #OLD ITA
 dte_dragon_of_oshu_desc: "Our might and power will be the envy of our enemies. Our name will forever be associated with the Dragon of Ōshū." #NEW
 #dte_dragon_of_oshu_desc: "Our might and power will be the envy of our enemies. Our name will forever be associated to the Dragon of Ōshū." #OLD ENG
 dte_intensive_domain_development: "Sviluppo Intensivo del Dominio"
 #dte_intensive_domain_development_desc: "Il clima rigido e la geografia montuosa rendono $ou_area$ una regione povera agli occhi di molti. C'è, tuttavia, un grande potenziale per migliorare le nostre terre. Fondando nuove città, incoraggiando e proteggendo il commercio, costruendo vie d'acqua e aumentando la terra coltivata, possiamo migliorare sostanzialmente il nostro cuore. Abolendo pedaggi e tasse soffocanti, possiamo anche rendere i nostri sudditi ricchi e la regione prospera." #OLD ITA
 dte_intensive_domain_development_desc: "Many dismiss $ou_area$ as poor due to its harsh weather and mountains, yet the region holds great potential. Through infrastructure investment — new towns, waterways, expanded cultivation — and by abolishing stifling tolls and taxes, we can substantially improve our heartland and make our subjects wealthy." #NEW
 #dte_intensive_domain_development_desc: "Harsh weather and mountainous geography make $ou_area$ a poor region in the eyes of many. There is, however, great potential to improve upon our lands. By founding new towns, encouraging and protecting trade, building waterways, and increasing the cultivated land, we can substantially improve our heartland. By abolishing stifling tolls and taxes, we can also make our subjects wealthy and the region prosperous." #OLD ENG
 htk_hatakeyama_heritage: "Eredità Hatakeyama"
 #htk_hatakeyama_heritage_desc: "Alcuni considerano i leader del nostro clan come ribelli causatori di problemi a causa della storia passata del nome del nostro clan. Questo è, tuttavia, solo un segno della nostra resilienza. Siamo rinati, non ci arrenderemo mai, e combatteremo per ciò che è nostro non importa chi possa opporsi a noi!" #OLD ITA
 htk_hatakeyama_heritage_desc: "Some consider our clan leaders to be rebellious troublemakers due to the stigma attached to our clan name. However, this enmity is naught but a symbol of our resilience. We have been reborn; we will never surrender, and will fight for what is ours no matter who may oppose us!" #NEW
 #htk_hatakeyama_heritage_desc: "Some consider our clan leaders as rebellious troublemakers due to the past history of our clan name. This is, however, but a sign of our resilience. We have been reborn, we will never surrender, and will fight for what is ours no matter who may oppose us!" #OLD ENG
 htk_shogunate_ties: "Legami con lo Shogunato"
 #htk_shogunate_ties_desc: "Come clan discendente da uno dei rami degli Ashikaga, i nostri legami con l'autorità dello Shogunato sono forti. La nostra associazione con esso ci farà sempre tenere in alta considerazione." #OLD ITA
 htk_shogunate_ties_desc: "As a clan descending from one of the branches of the $ashikaga_dynasty$, we have particularly strong ties to the authority of the Shogunate. As long as we maintain this association, our clan will continue to be held in high regard." #NEW
 #htk_shogunate_ties_desc: "As a clan descending from one of the branches of the Ashikaga, our ties to the authority of the Shogunate are strong. Our association with it will always make us be held in high regard." #OLD ENG
 htk_clan_spread: "Diffusione del Clan"
 #htk_clan_spread_desc: "Non ci accontentiamo di limitare il nostro clan a un singolo luogo, e cerchiamo di diffondere la nostra influenza in tutto il paese. Non importa quanto ci diffondiamo, l'autorità del nostro clan sarà indiscutibile in tutto il nostro territorio." #OLD ITA
 htk_clan_spread_desc: "Our clan is not content to occupy a single location, and we do our utmost to project our influence all over the country. No matter how far it may spread, our clan authority must be unquestionable in all our holdings." #NEW
 #htk_clan_spread_desc: "We are not content on limiting our clan to a single place, and we try to spread our influence all over the country. No matter how far we spread, the authority of our clan will be unquestionable in all our territory." #OLD ENG
 hsk_rising_clan: "Clan in Ascesa"
 #hsk_rising_clan_desc: "Sebbene le nostre origini siano relativamente umili, anche rispetto ad altri clan discendenti dagli Ashikaga, siamo comunque riusciti ad accrescere considerevolmente la nostra influenza. Il nostro clan è decisamente in ascesa, e continueremo a farlo." #OLD ITA
 hsk_rising_clan_desc: "Although our origins are relatively humble, even compared to other clans descending from the $ashikaga_dynasty$, we have managed nonetheless to grow our influence considerably. Our clan is decidedly on the rise, and our ascension must not be hindered!" #NEW
 #hsk_rising_clan_desc: "Although our origins are relatively humble, even compared to other clans descending from the Ashikaga, we have managed nonetheless to grow our influence considerably. Our clan is definitely on the rise, and we will continue to do so." #OLD ENG
 #hsk_control_of_izumi_sea: "Controllo del Mare di Izumi" #OLD ITA
 hsk_control_of_izumi_sea: "Control of the $izumi$ Sea" #NEW
 #hsk_control_of_izumi_sea: "Control of the Izumi Sea" #OLD ENG
 #hsk_control_of_izumi_sea_desc: "I territori del nostro clan sono stati tradizionalmente attorno al Canale di Kii. Il controllo del commercio che entra nella terraferma attraverso di esso ci permetterà quindi di ottenere grandi profitti da esso, e prosperare immensamente." #OLD ITA
 hsk_control_of_izumi_sea_desc: "Our clan's territory has traditionally been situated around the Kii Channel. Taking control of trade entering the mainland through that point will bring us massive profits, and we shall flourish immensely." #NEW
 #hsk_control_of_izumi_sea_desc: "The territories of our clan have been traditionally around the Kii Channel. Control of the trade entering the mainland through there will thus allow us to get great profit from it, and flourish immensely." #OLD ENG
 hsk_branches_and_retainers: "Rami e Vassalli"
 #hsk_branches_and_retainers_desc: "La nostra stirpe si estende ampiamente, e i nostri congiunti e vassalli possiedono diversi territori ricchi mantenendo la loro lealtà al leader del clan. Attraverso l'armonia interna, il nostro clan sarà tra i più potenti del Giappone." #OLD ITA
 hsk_branches_and_retainers_desc: "Our widespread clan controls rich territories through a network of loyal kinsmen and retainers. By maintaining internal harmony in our dynasty, our clan will become one of the most powerful in $JAP$." #NEW
 #hsk_branches_and_retainers_desc: "Our bloodline spreads wide, and our kinsmen and retainers own several rich territories while keeping their loyalty to the clan leader. Through internal harmony, our clan will be among the most powerful in Japan." #OLD ENG
 img_claim_to_shogunate: "Pretesa allo Shogunato"
 #img_claim_to_shogunate_desc: "A causa del fatto che il nostro clan discende dalla famiglia Ashikaga, abbiamo una buona pretesa per assumere il manto del $JAPANESE_SHOGUNATE_LEADER_MALE$ se la linea principale dovesse perire. Anche se il Bakufu sembra sicuro ora, dobbiamo assicurarci che nessuno dimentichi qual è il nostro diritto di nascita." #OLD ITA
 img_claim_to_shogunate_desc: "As our clan is descended from the $ashikaga_dynasty$ family, we have a strong claim on the position of $JAPANESE_SHOGUNATE_LEADER_MALE$, should the main line perish. Even if the Bakufu is not threatened, it would still be in our best interests to remind everyone of our legitimacy. Just in case it ever becomes relevant..." #NEW
 #img_claim_to_shogunate_desc: "Due to our clan being descendant from the Ashikaga family, we have a good claim to take on the mantle of the $JAPANESE_SHOGUNATE_LEADER_MALE$ if the main line should perish. Even though the Bakufu appear safe now, we must ensure none forget what is our birthright." #OLD ENG
 img_supreme_ruler_of_tokaido: "Controllo del Tōkaidō"
 #img_supreme_ruler_of_tokaido_desc: "Il Tōkaidō è la rotta commerciale più importante tra il Giappone centrale e orientale. Le nostre terre sono state tradizionalmente nel mezzo di essa, il che ci permetterebbe di esercitare il controllo su questa regione in modo da poter controllare l'economia dell'intera regione." #OLD ITA
 img_supreme_ruler_of_tokaido_desc: "The Tōkaidō is the most important trade route between Central and Eastern $japan_region$. As our ancestral lands are in the middle of all this trade, it would behoove us to take control over the entire region, so as to reap the most benefits from local commercial activity." #NEW
 #img_supreme_ruler_of_tokaido_desc: "The Tōkaidō is the most important trade route between Central and Eastern Japan. Our lands have been traditionally in the midst of it, which would allow us to exert control over this region so that we can control the economy of the entire region." #OLD ENG
 img_unlikely_alliances: "Alleanze Improbabili"
 #img_unlikely_alliances_desc: "A volte, il modo migliore per sconfiggere un nemico è farlo diventare tuo amico. Assicurare i nostri fianchi attraverso matrimoni non solo pacificherà i nostri nemici e ci farà guadagnare nuovi alleati allo stesso tempo, ma assicurerà che possiamo alla fine dominarli anche attraverso il sangue." #OLD ITA
 img_unlikely_alliances_desc: "Sometimes, the best way to defeat an enemy is to make them your friend. Securing our rule through strategic marriages will not only pacify our foes and gain us new allies, but will also ensure that we can ultimately dominate our rivals through blood." #NEW
 #img_unlikely_alliances_desc: "Sometimes, the best way to defeat an enemy is to make him your friend. Securing our flanks through marriage will not only pacify our foes and gain us new allies at the same time, but will ensure we can ultimately dominate them through blood as well." #OLD ENG
 img_march_to_kyoto: "Marcia su $kyoto$"
 #img_march_to_kyoto_desc: "In tempi in cui il Giappone e $kyoto$ sono impantanati nel caos politico, chiunque potrebbe avere l'idea di marciare nella capitale e prendere il potere. Come stretti congiunti degli Ashikaga è nostro obbligo, e nostro diritto, assicurare la stabilità del paese." #OLD ITA
 img_march_to_kyoto_desc: "In these dangerous times when $japan_region$ and $kyoto$ are mired in political chaos, anyone could march into the capital and seize power. As close kinsmen of the $ashikaga_dynasty$, it is our obligation — and our right — to ensure the stability of the country." #NEW
 #img_march_to_kyoto_desc: "In times when Japan and $kyoto$ are mired in political chaos, anyone could get the idea to march into the capital and seize power. As close kinsmen of the Ashikaga it is our obligation, and our right, to ensure the stability of the country." #OLD ENG
 isk_sanindo_gate: "Porta di $sanindou_area$"
 #isk_sanindo_gate_desc: "La provincia di $tango_province$ è la porta di $kyoto$ in $sanindou_area$ e una terra di grande importanza economica. Stabilendo ed espandendo fermamente la nostra presenza lì, possiamo trarre vantaggio da tale prosperità." #OLD ITA
 isk_sanindo_gate_desc: "The province of $tango_province$ is the gate to $kyoto$ in $sanindou_area$ and a place of crucial economic importance. By firmly establishing and expanding our presence there, we can take advantage of such prosperity." #NEW
 #isk_sanindo_gate_desc: "The province of $tango_province$ is the gate of $kyoto$ in $sanindou_area$ and a land of great economic importance. By firmly establishing and expanding our presence there, we can take advantage of such prosperity." #OLD ENG
 isk_minister_of_samurai_dokoro: "Ministro del Samurai-Dokoro"
 #isk_minister_of_samurai_dokoro_desc: "Siamo uno dei quattro potenti clan che sono tradizionalmente nominati come capo delle forze militari e di polizia nel Samurai-Dokoro. È quindi nostra responsabilità, e nostro privilegio, mantenere la pace nella capitale e in altre aree importanti." #OLD ITA
 isk_minister_of_samurai_dokoro_desc: "We are one of four powerful clans traditionally appointed to be the chief of military and police in the Samurai-Dokoro. It is thus our responsibility, and our privilege, to keep the peace in the capital and other important places." #NEW
 #isk_minister_of_samurai_dokoro_desc: "We are one of four powerful clans that are traditionally appointed to be the chief of military and police in the Samurai-Dokoro. It is thus our responsibility, and our privilege to, keep the peace in the capital and other important areas." #OLD ENG
 ito_gokenin_family: "Famiglia Gokenin"
 #ito_gokenin_family_desc: "I nostri antenati aiutarono Minamoto no Yoritomo durante la fondazione dello Shogunato Kamakura. Come ricompensa di questo contributo, fummo classificati come suoi Gokenin e ci fu assegnato il feudo nella provincia di $hyuuga_province$. Questo è un onore che poche famiglie nel Kyūshū godono." #OLD ITA
 ito_gokenin_family_desc: "Our ancestors helped Minamoto no Yoritomo during the foundation of the $kamakura$ Shogunate. As a reward for this contribution, we were ranked as his #italic Gokenin#!, and awarded a fiefdom in $hyuuga_province$ Province. This is an honor few families in Kyūshū enjoy." #NEW
 #ito_gokenin_family_desc: "Our ancestors helped Minamoto no Yoritomo during the foundation of the Kamakura Shogunate. As the reward of this contribution, we were ranked as his Gokenin and got awarded the fief in the $hyuuga_province$ province. This is an honor few families in Kyūshū enjoy." #OLD ENG
 ito_sympathy_to_foreign_faiths: "Simpatia per Nuove Fedi"
 #ito_sympathy_to_foreign_faiths_desc: "Gli stranieri che vengono nella nostra terra portano con sé credenze straniere. Dobbiamo ovviamente assicurarci che questo sia innocuo per le religioni tradizionali, ma finché non c'è danno per noi non c'è motivo di impedire alle persone di scegliere la propria fede." #OLD ITA
 ito_sympathy_to_foreign_faiths_desc: "Foreigners coming to our land bring with them foreign beliefs. We must of course make sure that this is harmless to our traditional belief systems, but as long as there is no risk to us, we see no reason to disallow people from choosing their own faith." #NEW
 #ito_sympathy_to_foreign_faiths_desc: "Foreigners coming to our land bring with them foreign beliefs. We must of course make sure that this is harmless to traditional religions, but as long as there is no harm to us there is no reason to disallow people to choose their own faith." #OLD ENG
 kkc_disinguished_family_in_kyushu: "Famiglia Distinta"
 #kkc_disinguished_family_in_kyushu_desc: "A differenza di altri clan potenti nel Kyūshū, la nostra famiglia si stabilì qui prima della fondazione dello Shogunato Kamakura. Le nostre imprese sono ben note, e il nostro nome è rispettato." #OLD ITA
 kkc_disinguished_family_in_kyushu_desc: "Unlike other powerful clans in Kyūshū, our family settled here before the establishment of the $kamakura$ Shogunate. Our achievements are well known, and our name is respected." #NEW
 #kkc_disinguished_family_in_kyushu_desc: "Unlike other powerful clans in Kyūshū, our family settled here before the establishment of the Kamakura Shogunate. Our achievements are well known, and our name is respected." #OLD ENG
 kkc_resistance_against_foreign_intervention: "Resistenza Contro le Invasioni"
 #kkc_resistance_against_foreign_intervention_desc: "I nostri contributi alla difesa del paese durante le invasioni mongole sono ben noti. Le imprese di Kikuchi Takefusa nel respingere gli invasori sono lodate, e tutte le nostre truppe mirano a combattere con la stessa bravura." #OLD ITA
 kkc_resistance_against_foreign_intervention_desc: "Our contributions to defending the country against the $MGE_ADJ$ invasions are well known. Kikuchi Takefusa's achievements in repelling the invaders are widely lauded, and all our troops aim to fight as bravely as him." #NEW
 #kkc_resistance_against_foreign_intervention_desc: "Our contributions to the defense of the country during the Mongol invasions are well known. The achievements of Kikuchi Takefusa in repelling the invaders are lauded, and all our troops aim to fight as bravely as him." #OLD ENG
 ktb_southern_court: "Sostenitori dell'Imperatore"
 #ktb_southern_court_desc: "Mentre il ramo imperiale ha perso influenza politica, siamo ancora noti per mostrare il nostro ardente sostegno alla Corte Meridionale dopo la loro divisione. Questa reputazione di servizio leale al Trono del Crisantemo mostrerà al mondo che abbiamo una determinazione maggiore di molte delle casate minori che ora dominano il Giappone." #OLD ITA
 ktb_southern_court_desc: "We supported the Southern Court during the Imperial schism, showing loyalty to the Chrysanthemum Throne despite their struggles. This reputation for loyal service grants us more prestige and moral authority than many of the lesser houses that now dominate $japan_region$." #NEW
 #ktb_southern_court_desc: "While the Imperial branch has lost political influence, we are still known for showing our ardent support to the Southern Court after their split. This reputation of loyal service to the Chrysanthemum Throne will show the world that we have greater determination than many of the lesser houses that now dominate Japan." #OLD ENG
 ktb_control_of_ise: "Controllo di $ise_province$"
 #ktb_control_of_ise_desc: "Dal ricco sud al densamente popolato e urbano nord, siamo riusciti a estendere il nostro controllo sull'intera provincia di $ise_province$. Questo ci permetterà di usare il pieno potenziale delle risorse della provincia per l'ulteriore crescita dell'influenza del nostro clan." #OLD ITA
 ktb_control_of_ise_desc: "From the wealthy south to the densely populated urban north, we have extended our control over the entire province of $ise_province$. This will allow us to fully exploit provincial resources to further the growth of our clan's influence." #NEW
 #ktb_control_of_ise_desc: "From the rich south to the densely populated and urban north, we have managed to extend our control over the entire province of $ise_province$. This will allow us to use the full potential of the province's resources for the further growth of our clan's influence." #OLD ENG
 ktb_blessing_of_amaterasu: "Benedizione di Amaterasu"
 #ktb_blessing_of_amaterasu_desc: "Come custodi del più sacro dei santuari del $japan_region$ a $ise_province$, siamo benedetti dalla dea del sole e dell'universo. Dobbiamo elevarci per essere degni del compito di mantenere e prenderci cura di questo tesoro nazionale, il che ci farà guadagnare il rispetto del popolo $japanese_group$." #OLD ITA
 ktb_blessing_of_amaterasu_desc: "As the keepers of the holiest of $japan_region$'s shrines at $ise_province$, we are blessed by Amaterasu, goddess of the sun and the universe. We must rise to be worthy of the task of maintaining and caring for this national treasure, which will earn us the respect of the $japanese_group$ people." #NEW
 #ktb_blessing_of_amaterasu_desc: "As the keepers of the holiest of $japan_region$'s shrines at $ise_province$, we are blessed by the goddess of the sun and the universe. We must rise to be worthy of the task of maintaining and caring for this national treasure, which will earn us the respect of the $japanese_group$ people." #OLD ENG
 ktb_the_march_of_kitabatake_akiee: "Marcia di Kitabatake Akiie"
 #ktb_the_march_of_kitabatake_akiee_desc: "Il nostro onorevole antenato Kitabatake Akiie dimostrò che anche la marcia da $ou_area$ al Giappone centrale può essere intrapresa in tempi rapidi se si ha abbastanza determinazione. Dobbiamo imparare da tale impresa e addestrare i nostri eserciti per manovre rapide in modo da poter spostarci velocemente da un fronte all'altro se la situazione lo richiede." #OLD ITA
 ktb_the_march_of_kitabatake_akiee_desc: "Our honorable ancestor Kitabatake Akiie proved that even the long march from $ou_area$ to central $japan_region$ can be undertaken rapidly if one has enough determination. We must learn from this feat and train our armies in swift maneuvering, so that we can quickly move from one front to another as needed." #NEW
 #ktb_the_march_of_kitabatake_akiee_desc: "Our honorable ancestor Kitabatake Akiie proved that even the march from $ou_area$ to central Japan can be undertaken in quick time if one has enough determination. We must learn from such a feat and train our armies for swift maneuvers so that we can quickly move from one front to another if the situation calls for it." #OLD ENG
 kno_shugo_of_iyo: "Shugo di $iyo_province$"
 #kno_shugo_of_iyo_desc: "Dal tardo periodo Heian nel XII secolo, siamo stati la più grande potenza navale nel Mare Interno di Seto, e la nostra marina forte è come abbiamo acquisito il titolo di Shugo di questa provincia." #OLD ITA
 kno_shugo_of_iyo_desc: "Since the late Heian Period, we have been the biggest naval power in the Seto Inland Sea. In fact, our navy is how we became #italic Shugo#! of this province." #NEW
 #kno_shugo_of_iyo_desc: "Since the late Heian Period in 12th century, we have been the biggest naval power in the Seto Inland Sea, and our strong navy is how we acquired the title of Shugo of this province." #OLD ENG
 kno_ruler_of_inland_sea: "Governo del Mare Interno"
 #kno_ruler_of_inland_sea_desc: "Il Mare Interno di Seto ha un'importanza speciale per le rotte commerciali del Giappone e mantenere il dominio navale qui può fare o distruggere il nostro clan. Dobbiamo assicurarci di avere sempre una marina forte per controllare il commercio marittimo." #OLD ITA
 kno_ruler_of_inland_sea_desc: "The Seto Inland Sea has a special importance for trade routes of $japan_region$, and maintaining naval dominance here could make or break our clan. We must ensure that we always have a strong navy with which to control maritime trade." #NEW
 #kno_ruler_of_inland_sea_desc: "The Seto Inland Sea has a special importance to the trade routes of Japan and maintaining naval dominance here can make or break our clan. We must ensure that we always have a strong navy to control maritime trade." #OLD ENG
 kno_murakami_suigun: "Murakami Suigun"
 #kno_murakami_suigun_desc: "Il clan Murakami è ben noto come una banda di pirati che operano nel Mare Interno di Seto. Integriamoli completamente nel nostro clan e inviamo questi temibili corsari verso i nostri nemici!" #OLD ITA
 kno_murakami_suigun_desc: "The Murakami clan is well-known for committing piracy in the Seto Inland Sea. Let us integrate them fully in our own clan, and send these fearsome privateers after our enemies!" #NEW
 #kno_murakami_suigun_desc: "The Murakami clan is well known as the as a band of pirates operating in the Seto Inland Sea. Let us integrate them fully in our own clan and send these fearsome privateers towards our enemies!" #OLD ENG
 mri_descendant_of_oe_hiromoto: "Discendenti di Ōe no Hiromoto"
 #mri_descendant_of_oe_hiromoto_desc: "Ōe no Hiromoto, uno studioso e politico che contribuì notevolmente alla fondazione dello Shogunato Kamakura, fu l'antenato del nostro clan. Ancora oggi, il suo spirito vive nel nostro clan, e siamo orgogliosi di mantenere un'amministrazione efficace." #OLD ITA
 mri_descendant_of_oe_hiromoto_desc: "Ōe no Hiromoto, a scholar and politician who made great contributions to the establishment of the $kamakura$ Shogunate, was the ancestor of our clan. To this day, his spirit is embodied in our people, and we take pride in effectively administering the lands he secured for us." #NEW
 #mri_descendant_of_oe_hiromoto_desc: "Ōe no Hiromoto, a scholar and politician who contributed greatly to the establishment of the Kamakura Shogunate, was the ancestor of our clan. To this day, his spirit lives on in our clan, and we take proud in maintaining an effective administration." #OLD ENG
 mri_munakata_three_goddesses: "Tre Dee di Munakata"
 #mri_munakata_three_goddesses_desc: "Le tre figlie di Susanoo-no-Mikoto sono patrone del mare e della navigazione. La loro benedizione renderà le nostre marine inarrestabili in mare." #OLD ITA
 mri_munakata_three_goddesses_desc: "The three daughters of Susanoo-no-Mikoto are patron goddesses of the sea and navigation. Their blessings will make our navies unstoppable." #NEW
 #mri_munakata_three_goddesses_desc: "The three daughters of Susanoo-no-Mikoto are patrons of the sea and navigation. Their blessing will make our navies unstoppable at sea." #OLD ENG
 nbu_genji_in_the_north: "Ōshū Genji"
 #nbu_genji_in_the_north_desc: "Siamo originariamente un ramo cadetto dei Kai Genji, e al nostro fondatore fu dato un feudo nella provincia di Ōshū nel XII secolo come ricompensa per il servizio leale allo Shogunato Kamakura. Dopo quel punto, ci siamo abituati a questa regione con il suo inverno rigido, e sappiamo come utilizzare queste condizioni nelle nostre strategie e tattiche." #OLD ITA
 nbu_genji_in_the_north_desc: "We are originally a cadet branch of the Kai Genji; our founder was given a fief in Ōshū Province as a reward for loyal service to the $kamakura$ Shogunate. Over time, we have grown accustomed to this region with its harsh winters, and know how to utilize these conditions to our strategic and tactical advantage." #NEW
 #nbu_genji_in_the_north_desc: "We are originally a cadet branch of the Kai Genji, and our founder was given a fief in the Ōshū province in the 12th century as a reward for loyal service to the Kamakura Shogunate. After that point, we have grown accustomed to this region with its harsh winter, and know how to utilize these conditions in our strategies and tactics." #OLD ENG
 #nbu_fight_against_famines: "Sconfiggere le Carestie" #OLD ITA
 nbu_fight_against_famines: "Fighting Famine" #NEW
 #nbu_fight_against_famines: "Defeating the Famines" #OLD ENG
 nbu_fight_against_famines_desc: "A causa dei venti freddi nel tardo autunno e delle forti nevicate fino alla prima primavera, il nostro popolo soffre spesso di gravi carestie e fame. Dobbiamo costruire riserve di cibo e indagare su come possiamo migliorare le terre sotto il nostro controllo per contrastare future catastrofi."
 nbu_northern_horses: "Cavalli del Nord"
 #nbu_northern_horses_desc: "Mutsu ha ranch da cui le persone nei giorni antichi inviavano cavalli a Kyoto. La tradizione dell'allevamento di cavalli continua ed è una che dovremmo coltivare poiché ci permette di crescere cavalleria più facilmente di molti dei nostri vicini." #OLD ITA
 nbu_northern_horses_desc: "Mutsu has ranches, from which horses were sent to $kyoto$ in ancient times. The tradition of horse farming continues until today, and is one we should cultivate, as it allows us to raise cavalry more easily than many of our neighbors." #NEW
 #nbu_northern_horses_desc: "Mutsu has ranches from where people in ancient days sent horses to Kyoto. The tradition of horse farming continues and is one we should cultivate as it allows us to raise cavalry more easily than many of our neighbors." #OLD ENG
 oda_uninspiring_clan: "Clan Poco Ispirante"
 #oda_uninspiring_clan_desc: "Nonostante abbiamo una discendenza ancestrale, il nostro clan apparentemente non è rilevante come i nostri vicini. La loro sottovalutazione della nostra forza si rivelerà la loro rovina." #OLD ITA
 oda_uninspiring_clan_desc: "Despite having an illustrious lineage, our clan is not considered particularly relevant, threatening, or interesting to outsiders. Their underestimation of our strength and cunning will soon prove to be their undoing..." #NEW
 #oda_uninspiring_clan_desc: "Despite having an ancestral lineage, our clan is apparently not as relevant as our neighbors. Their underestimating of our strength will prove to be their downfall." #OLD ENG
 oda_generals: "Generali $ODA$"
 #oda_generals_desc: "L'ossessione per la nascita e il privilegio ha reso questo paese debole e l'ascesa di potenti clan autodidatti in tutto il regno ha chiaramente dimostrato quanto inutili possano essere tali nozioni. Prendiamo questa lezione a cuore e lasciamo che il successo e l'abilità siano il principio guida per chi dovrebbe salire al comando dei nostri eserciti. Una leadership forte è un requisito per un'espansione rapida." #OLD ITA
 oda_generals_desc: "Obsession with birth and privilege has made this country weak, and the rise of self-made powerful clans throughout the realm has clearly proven how useless such notions can be. Let us take this lesson to heart, and allow success and skill be the guiding principles for who should rise to command our armies. Strong leadership is a requirement for rapid expansion." #NEW
 #oda_generals_desc: "Obsession with birth and privilege has made this country weak and the rise of self-made powerful clans throughout the realm has clearly proven how useless such notions can be. Let us take this lesson to heart and let success and skill be the guiding principle for who should rise to command our armies. Strong leadership is a requirement for rapid expansion." #OLD ENG
 oda_tenka_fubu: "Tenka Fubu"
 oda_tenka_fubu_desc: "È chiaramente il nostro destino tenere tutto il paese nella nostra presa. Nessuno resisterà alla nostra autorità, e tutti sotto il Cielo si piegheranno alla nostra potenza militare."
 oda_triple_firing: "Fuoco Triplo"
 #oda_triple_firing_desc: "L'avvento delle armi da fuoco ha, e continuerà a, rivoluzionare la guerra nell'arcipelago giapponese e padroneggiando queste nuove armi possiamo dominare qualsiasi campo di battaglia. Per aumentare il ritmo del loro fuoco, i nostri archibugi formeranno ranghi, permettendo a uno di sparare mentre altri due ricaricano." #OLD ITA
 oda_triple_firing_desc: "The advent of firearms has and will continue to revolutionize warfare in $japan_region$, and through mastering these new weapons, we can dominate any battlefield. In order to increase the rate of their fire, our arquebusiers will form ranks, allowing one line to fire while two others reload." #NEW
 #oda_triple_firing_desc: "The advent of firearms has, and will continue to, revolutionize warfare in the Japanese archipelago and through mastering these new weapons we can dominate any battlefield. In order to increase the rate of their fire, our arquebusiers will form ranks, allowing one to fire while two others reload." #OLD ENG
 oda_influential_strongholds: "Roccaforti Influenti"
 #oda_influential_strongholds_desc: "Il $japan_region$ è in molti modi una terra di castelli e fortificazioni. È attraverso la costruzione di forti posizioni difensive che si può affermare influenza sia sul regno politico che sulle rotte vitali per le campagne militari. Questo apprendimento è uno che dobbiamo prendere a cuore. È attraverso i castelli che ci assicuriamo che le persone siano costantemente ricordate della nostra presenza e potere. In ogni momento dobbiamo dare priorità alla riduzione delle fortificazioni nemiche e all'erezione delle nostre in posizioni strategiche." #OLD ITA
 oda_influential_strongholds_desc: "$japan_region$ is a land of castles and fortifications. It is through the construction of strong defensive positions that one can assert influence both over the political realm and the routes vital to military campaigns. This learning is one we must take to heart. It is also through our castles that we impose our presence and power upon the common people. At all times, we must prioritize the reduction of enemy fortifications and the erection of our own in strategic locations." #NEW
 #oda_influential_strongholds_desc: "$japan_region$ is in many ways a land of castles and fortifications. It is through the construction of strong defensive positions that one can assert influence both over the political realm and the routes vital to military campaigns. This learning is one we must take to heart. It is through the castles that we make sure that the people are constantly reminded of our presence and power. At all times we must prioritize the reduction of enemy fortifications and the erection of our own in strategic locations." #OLD ENG
 oda_patronization_of_the_west: "Patrocinio dell'Occidente"
 #oda_patronization_of_the_west_desc: "I missionari occidentali hanno portato molte idee e tecniche nella nostra terra, e a differenza delle vecchie sette buddiste non hanno legami precedenti con proprietari terrieri corrotti o città ribelli. Dovremmo accogliere gli occidentali nelle nostre città ed esaminare i benefici che possono portare alla nostra corte." #OLD ITA
 oda_patronization_of_the_west_desc: "Western missionaries brought many ideas and techniques to our land, and unlike the $buddhist_ADJ$ sects of old, they have no previous ties to corrupt landowners or rebellious cities. We should welcome these foreigners into our cities, and see what benefits they could bring to our court." #NEW
 #oda_patronization_of_the_west_desc: "Western missionaries brought many ideas and techniques to our land, and unlike the old Buddhist sects they have no previous ties to corrupt landowners or rebellious cities. We should welcome the westerners into our cities and examine the benefits they can bring to our court." #OLD ENG
 ogs_ogasawara_ryu: "Ogasawara-Ryū"
 #ogs_ogasawara_ryu_desc: "Gli stili tradizionali hanno un alto valore nella nostra società. Abbiamo formalizzato il sistema di arti marziali ed etichetta sin da quando il fondatore del nostro clan, Ogasawara Nagakiyo, sviluppò originariamente la nostra scuola. Tutti i samurai dovrebbero imparare le vie della nostra scuola." #OLD ITA
 ogs_ogasawara_ryu_desc: "Traditional forms of many things are highly valued in our society. We have formalized the official system of martial arts and etiquette for samurai since the founder of our clan, Ogasawara Nagakiyo, originally developed a special school, where all samurai should go to learn the proper techniques." #NEW
 #ogs_ogasawara_ryu_desc: "Traditional styles have high value in our society. We have formalized the system of martial arts and etiquette since the founder of our clan, Ogasawara Nagakiyo, originally developed our own school. All samurai should learn the ways of our school." #OLD ENG
 ogs_shinano_shugo: "Shugo di $shinano_province$"
 #ogs_shinano_shugo_desc: "Il nostro clan appartiene a un vecchio sotto-ramo dei Genji e governa la provincia di $shinano_province$ come suo Shugo. Questa terra è montuosa e poco accogliente per alcuni. Per il nostro popolo, tuttavia, è stata da tempo una parte integrata della nostra difesa contro gli estranei. Portiamo questa esperienza con noi ovunque vadano i nostri eserciti e assicuriamoci sempre di ottenere buone informazioni locali per sfruttare al meglio il terreno in qualsiasi regione in cui combattiamo." #OLD ITA
 ogs_shinano_shugo_desc: "Our clan belongs to a sub-branch of the Minamoto, and rules $shinano_province$ Province as its #italic Shugo#!. Our land is mountainous and unwelcoming to many. For our people, however, it has for a long time been an integrated part of our defenses against outsiders. Let us take this experience with us wherever our armies go, and make sure to always obtain thorough information about the terrain in any region where we do battle." #NEW
 #ogs_shinano_shugo_desc: "Our clan belongs to an old sub-branch of the Genji and rules the $shinano_province$ province as its Shugo. This land is mountainous and unwelcoming to some. For our people, however, it has for a long time been an integrated part of our defense against outsiders. Let us take this experience with us wherever our armies go and always make sure we obtain good local information to make the most of the terrain in any region we do battle." #OLD ENG
 ogs_kiso_uma: "Kiso-Uma"
 #ogs_kiso_uma_desc: "I cavalli nell'area di Kiso sono i nostri amici unici. Non sono alti o veloci come altri tipi, ma ciò che hanno è alta resistenza e sono robusti per sopravvivere nelle montagne." #OLD ITA
 ogs_kiso_uma_desc: "Horses from the Kiso area are our preferred breed. They are not as high nor as fast as other types, but they make up for it with high stamina, and are sturdy enough to survive in the mountains." #NEW
 #ogs_kiso_uma_desc: "Horses in Kiso area are our unique friends. They are not as tall or quick as other types, but what they do have is high stamina and are sturdy to survive in the mountains." #OLD ENG
 ogs_improvment_of_nakasendo: "Migliorare il Nakasendō"
 #ogs_improvment_of_nakasendo_desc: "Il Nakasendō è una delle rotte più importanti tra il Giappone centrale e orientale. Controllarla significa anche controllare il commercio che vi scorre attraverso." #OLD ITA
 ogs_improvment_of_nakasendo_desc: "The Nakasendō is one of the most important routes between central and eastern $japan_region$. Controlling it also means controlling the trade that flows through it." #NEW
 #ogs_improvment_of_nakasendo_desc: "The Nakasendō is one of the most important routes between central and eastern Japan. Controlling it also means getting to control the trade that flows through it." #OLD ENG
 suw_suwa_taisha: "Suwa Taisha"
 #suw_suwa_taisha_desc: "Suwa Taisha al Lago Suwa è uno dei santuari più antichi del Giappone, e molto adorato non solo a Shinano. Il suo festival più importante, Onbashira-matsuri, dimostra il coraggio del nostro popolo mentre trasportano i tronchi sacri dalla montagna al santuario." #OLD ITA
 suw_suwa_taisha_desc: "Suwa Taisha at Lake Suwa is one of the oldest shrines in $japan_region$, and highly adored throughout the country. Its most important festival, #italic Onbashira-matsuri#!, proves the bravery of our people as they carry the sacred logs from the mountain to the shrine." #NEW
 #suw_suwa_taisha_desc: "Suwa Taisha at Suwa Lake is one of the oldest shrines in Japan, and highly adored not only in Shinano. Its most important festival, Onbashira-matsuri, proves the bravery of our people as they travel the sacred logs from the mountain to the shrine." #OLD ENG
 otm_lord_of_bungo: "Signore di Bungo"
 #otm_lord_of_bungo_desc: "Siamo lo Shugo di Bungo dall'era Kamakura. Queste terre sono note per i loro terreni altamente fertili e i ricchi raccolti di questa regione ci permettono di nutrire eserciti più grandi di molti altri $daimyo$." #OLD ITA
 otm_lord_of_bungo_desc: "We have been the #italic Shugo#! of Bungo since the $kamakura$ era. These lands are known for their highly fertile soil, and the rich harvests from this region allow us to feed larger armies than many other $daimyo$ can support." #NEW
 #otm_lord_of_bungo_desc: "We are the Shugo of Bungo since the Kamakura era. These lands are known for their highly fertile grounds and the rich harvests of this region allow us to feed larger armies than many other $daimyo$." #OLD ENG
 otm_domination_of_kyushu: "Dominazione del Kyūshū"
 #otm_domination_of_kyushu_desc: "Siamo stati assegnati come Shugo di $bungo_province$, $hizen_province$ e $hyuuga_province$. Abbiamo una posizione forte per rivendicare tutta l'isola del Kyūshū per noi." #OLD ITA
 otm_domination_of_kyushu_desc: "We have been designated #italic Shugo#! of $bungo_province$, $hizen_province$, and $hyuuga_province$. This positions us perfectly to claim all of Kyūshū for ourselves!" #NEW
 #otm_domination_of_kyushu_desc: "We have been assigned as Shugo of $bungo_province$, $hizen_province$, and $hyuuga_province$. We have a strong position to claim all the island of Kyūshū for us." #OLD ENG
 otm_nanban_trade: "Accogliere il Commercio Nanban"
 #otm_nanban_trade_desc: "Altri potrebbero evitare gli stranieri come barbari, ma noi riconosciamo i benefici e i vantaggi del commercio con loro. Si sappia che saranno sempre benvenuti nei nostri porti, e saremo in grado di espandere la nostra rete commerciale più lontano dei nostri rivali." #OLD ITA
 otm_nanban_trade_desc: "Others may denounce foreigners as barbarians, but we recognize the benefits and advantages of trading with them. Let it be known that they will always be welcome in our ports — and we will be able to expand our trade network further than our rivals." #NEW
 #otm_nanban_trade_desc: "Others may shun the foreigners as barbarians, but we recognize the benefits and advantages of trade with them. Let it be known that they will always be welcome in our ports, and we will be able to expand our trade network further than our rivals." #OLD ENG
 #otm_christian_conversion: "Convertiti Cristiani" #OLD ITA
 otm_christian_conversion: "$christian_ADJ$ Converts" #NEW
 #otm_christian_conversion: "Christian Converts" #OLD ENG
 #otm_christian_conversion_desc: "Le nostre crescenti interazioni con gli stranieri hanno attirato l'interesse di molti all'interno del nostro clan verso la fede cristiana. I cristiani hanno molti potenti protettori tra i nostri signori e vassalli, e pochi sono zelanti quanto i convertiti recenti. Facciamo buon uso di questi convertiti cristiani, indipendentemente da quale strada prenda il nostro stesso clan e usiamo la loro influenza e il loro zelo per promuovere la nostra causa." #OLD ITA
 otm_christian_conversion_desc: "Our increasing interactions with foreigners have sparked an interest in $christian$ for many in our clan. The $christian_ADJ$ people have many powerful advocates among our lords and vassals, and few are as zealous as recent converts. Let us make good use of these $christian_ADJ$ converts, regardless of which route our own clan takes, and use their influence and zeal to further our own agenda." #NEW
 #otm_christian_conversion_desc: "Our increasing interactions with the foreigners have drawn the interest of many within our clan towards the Christian faith. The Christians have many powerful protectors among our lords and vassals, and few are as zealous as recent converts. Let us make good use of these Christian converts, regardless of which route our own clan takes and use their influence and their zeal to further our case." #OLD ENG
 #ouc_descendant_of_baekje: "Discendente di Baekje" #OLD ITA
 ouc_descendant_of_baekje: "Descendants of Baekje" #NEW
 #ouc_descendant_of_baekje: "Descendant of Baekje" #OLD ENG
 #ouc_descendant_of_baekje_desc: "La nostra cronaca dice che siamo discendenti del Principe Imseong della casa reale dell'antico Regno Baekje nella Penisola Coreana. Questa leggenda ci permette una posizione prestigiosa nell'Asia Orientale." #OLD ITA
 ouc_descendant_of_baekje_desc: "Our chronicle says we are descendants of Prince Imseong of the royal house of the ancient Baekje Kingdom, which once ruled in $korea_region$. This legendary connection means we hold a prestigious position in $east_asia$." #NEW
 #ouc_descendant_of_baekje_desc: "Our chronicle says we are descendants of Prince Imseong of the royal house of the ancient Baekje Kingdom in the Korean Peninsula. This legend allows us a prestigious position in East Asia." #OLD ENG
 #ouc_korea_trade: "Commercio Coreano" #OLD ITA
 ouc_korea_trade: "Trade with $korea_region$" #NEW
 #ouc_korea_trade: "Korean Trade" #OLD ENG
 #ouc_korea_trade_desc: "La nostra posizione geografica ci ha lasciato come il clan più attivo per il commercio con la Corea e molti beni esotici sono praticamente monopolizzati dai nostri mercanti. Dobbiamo fare ciò che possiamo per mantenere questa posizione favorevole e sfruttarla per superare qualsiasi arrivista che ci sfiderebbe." #OLD ITA
 ouc_korea_trade_desc: "Due to our location, we are the clan trading most actively with $korea_region$, and as a result we have a near-monopoly on many exotic goods. We must do what we can to retain this favorable position, and leverage it to out-compete any upstart that might challenge us." #NEW
 #ouc_korea_trade_desc: "Our geographic position has left us as the most active clan for trading with Korea and many exotic goods are practically monopolized by our merchants. We must do what we can to retain this favorable position and leverage it to out-compete any upstart that would challenge us." #OLD ENG
 #ouc_fight_against_wokou: "Proteggere Contro la Pirateria" #OLD ITA
 ouc_fight_against_wokou: "Countering Piracy" #NEW
 #ouc_fight_against_wokou: "Protect Against Piracy" #OLD ENG
 #ouc_fight_against_wokou_desc: "Per mantenere buone relazioni con il continente per i nostri mercanti, dobbiamo pattugliare costantemente il mare. Finché pirati e contrabbandieri saranno comuni in queste acque, gli stranieri non si fideranno di noi e potrebbero agire contro di noi." #OLD ITA
 ouc_fight_against_wokou_desc: "In order to retain good relations with nations on the continent for the sake of our traders, we must mount constant sea patrols. As long as pirates and smugglers are common in our waters, foreigners will not trust us, and may even act against us." #NEW
 #ouc_fight_against_wokou_desc: "In order to retain good relations with the continent for our traders, we need to patrol the sea constantly. As long as pirates and smugglers are common in these waters, the foreigners will not trust us and may act against us." #OLD ENG
 ouc_welcome_missionaries: "Accogliere gli Occidentali"
 #ouc_welcome_missionaries_desc: "Man mano che la nostra rete commerciale inizia ad espandersi, entriamo in contatto con più stranieri e più fedi. Indipendentemente da ciò in cui credono, il loro denaro è buono, e quindi dovremmo essere aperti alle loro idee quanto necessiamo per assicurare il loro commercio." #OLD ITA
 ouc_welcome_missionaries_desc: "As our trade network expands, we come in more frequent contact with foreigners and their strange habits and faiths. Regardless of what they believe, their coin is good enough; we should appear to be open to their ideas as we are to their business if we wish to secure repeat commerce." #NEW
 #ouc_welcome_missionaries_desc: "As our trade network begins to expand, we come in contact with more foreigners and more faiths. Regardless of what they believe, their coin is good, and so we should be as open to their ideas as we need to secure their commerce." #OLD ENG
 stk_hitachi_genji: "Genji di $hitachi_province$"
 #stk_hitachi_genji_desc: "Siamo uno dei Genji più antichi nella regione di Kantō, e abbiamo combattuto per la gloria del nostro clan nel Giappone orientale ancora prima che Minamoto no Yoritomo fondasse lo Shogunato Kamakura. La nostra posizione come Shugo di $hitachi_province$ è quindi indiscussa." #OLD ITA
 stk_hitachi_genji_desc: "We are one of the oldest Minamoto lines in the Kantō region, and have fought for our clan's glory in eastern $japan_region$ since before Minamoto no Yoritomo founded the $kamakura$ Shogunate. Our position as #italic Shugo#! of $hitachi_province$ is therefore never in question." #NEW
 #stk_hitachi_genji_desc: "We are one of the oldest Genji in the Kantō region, and have fought for our clan's glory in Eastern Japan even before Minamoto no Yoritomo founded the Kamakura Shogunate. Our position as Shugo of $hitachi_province$ is thus unquestioned." #OLD ENG
 stk_kashima_jingu: "$kashima_shrine$"
 #stk_kashima_jingu_desc: "$kashima_shrine$ è uno dei tre santuari più importanti nel Kantō. Questo santuario venera Takemikazuchi-no-O-no-Kami, che è il dio del tuono e delle spade, e anche noto come patrono della lotta $sumo$. La custodia di questo santuario rafforza la determinazione dei nostri eserciti." #OLD ITA
 stk_kashima_jingu_desc: "$kashima_shrine$ is one of three most important shrines in the Kantō region. This shrine is dedicated to Takemikazuchi-no-O-no-Kami, who is the god of thunder and swords, and also the patron god of $sumo$ wrestling. Our custodianship of this shrine strengthens the resolve of our armies." #NEW
 #stk_kashima_jingu_desc: "$kashima_shrine$ is one of three most important shrines in the Kantō. This shrine worships Takemikazuchi-no-O-no-Kami, who is the god of thunder and swords, and also known as the patron of $sumo$ wrestling. The custodianship of this shrine strengthens the resolve of our armies." #OLD ENG
 stk_eastern_coalitions: "Coalizioni Orientali"
 #stk_eastern_coalitions_desc: "Non importa quanto ostili siano i clan intorno a noi, abbiamo sempre fatto un buon lavoro nel presentarci come una terza parte ragionevole a cui altri clan possono attaccarsi per ottenere protezione dagli invasori. Questa tradizione di coalizioni orientali ci servirà bene finché ci assicureremo che i clan che fanno affidamento su di noi non debbano mai preoccuparsi della protezione." #OLD ITA
 stk_eastern_coalitions_desc: "Regardless of the hostile clans around us, we have always presented ourselves as a reasonable third party for other clans to attach themselves to for protection against invaders. This tradition of eastern coalitions will serve us well, as long as we make sure that the clans who rely on us never have to worry about protection." #NEW
 #stk_eastern_coalitions_desc: "No matter the hostile clans around us, we have always done a good job of presenting ourselves as a reasonable third party for other clans to attach themselves to in order to gain protection from invaders. This tradition of eastern coalitions will serve us well as long as we make sure that the clans that rely on us never have to worry about protection." #OLD ENG
 sba_multiple_shugo: "Shugo Multipli"
 #sba_multiple_shugo_desc: "Siamo stati assegnati come Shugo di più province. Queste terre ci permettono di arricchirci dalle risaie e dalle botteghe degli artigiani più abili del Giappone." #OLD ITA
 sba_multiple_shugo_desc: "We have been made #italic Shugo#! of multiple provinces. Administering all this land will make us rich from revenue generated by our fertile rice paddies and the workshops of the region's most skilled artisans." #NEW
 #sba_multiple_shugo_desc: "We have been assigned as Shugo of multiple provinces. These lands allow us to grow rich from rice paddies and the workshops of Japan's most skilled artisans." #OLD ENG
 sba_access_to_northern_japan: "Legami con Ōshū"
 #sba_access_to_northern_japan_desc: "La provincia di Ōshū è la nostra seconda casa ed è la fonte del nostro clan. Dobbiamo fare uso dei nostri legami con Ōshū per assicurarci i forti cavalli da guerra di quella regione." #OLD ITA
 sba_access_to_northern_japan_desc: "Ōshū Province is our second home and where our clan originated. We must make use of our ties to Ōshū to procure some of the strong war horses native to that region." #NEW
 #sba_access_to_northern_japan_desc: "Ōshū province is our second home and is the source of our clan. We must make use of our ties to Ōshū to secure the strong war horses of that region." #OLD ENG
 sba_shiba_retainers: "Vassalli $SBA$"
 #sba_shiba_retainers_desc: "Abbiamo vassalli talentuosi, ma ambiziosi all'interno del nostro clan. Queste famiglie possono anche a volte essere causa di fazioni nella nostra famiglia, tuttavia, e saremmo saggi a tenerle sotto controllo. Una supervisione stretta e ricompense sufficienti potrebbero rendere queste famiglie le risorse più grandi del nostro governo." #OLD ITA
 sba_shiba_retainers_desc: "We have talented, but ambitious vassals in our clan. They are a frequent cause of familial friction, and we would be wise to rein them in. Then again, close supervision and lavish, yet strategic rewards could turn these powerful families into the greatest assets of our rule." #NEW
 #sba_shiba_retainers_desc: "We have talented, but ambitious vassals inside our clan. These families can also at times be the cause of fraction in our family, however, and we would be wise to rein them in. Close supervision and sufficient rewards could make these families the greatest assets of our rule." #OLD ENG
 smz_satsuma_shugo: "Shugo di $satsuma_province$"
 #smz_satsuma_shugo_desc: "Siamo sempre stati tradizionalmente lo Shugo della provincia di $satsuma_province$, tanto che il suo nome è diventato sinonimo del nostro clan. I nostri guerrieri sono orgogliosi di questo fatto, e pronti a combattere per noi." #OLD ITA
 smz_satsuma_shugo_desc: "We have always traditionally held the title of #italic Shugo#! of $satsuma_province$; its name has become synonymous with our clan. Our warriors are proud of this, and therefore always ready to defend our territory." #NEW
 #smz_satsuma_shugo_desc: "We have always traditionally been the Shugo of the province of $satsuma_province$, up to its name has become synonymous with our clan. Our warriors are proud of this fact, and ready to fight for us." #OLD ENG
 smz_tsurinobuse: "Tsurinobuse"
 #smz_tsurinobuse_desc: "Tsurinobuse, 'attirare e imboscata', è la nostra tattica più efficace, che ci permette di battere nemici in numero superiore. Dobbiamo fare di questa una tattica centrale dei nostri eserciti e sorprendere i comandanti dalla mente ottusa degli altri clan." #OLD ITA
 smz_tsurinobuse_desc: "#italic Tsurinobuse#!, 'lure and ambush', is our most effective tactic. This strategy enables us to beat enemies when we are vastly outnumbered, which is of course a very valuable skill. We must make this a central tactic of our armies, and give the dull-witted commanders of rival clans a little surprise." #NEW
 #smz_tsurinobuse_desc: "Tsurinobuse, 'lure and ambush', is our most effective tactic, which enables us to beat outnumbering enemies. We must make this a central tactic of our armies and surprise the dull-minded commanders of other clans." #OLD ENG
 smz_shimazu_charge: "Carica $SMZ$"
 #smz_shimazu_charge_desc: "Anche quando circondati e in inferiorità numerica, i nostri soldati continueranno a marciare avanti, finché non raggiungeranno l'altro lato delle linee nemiche. La carica delle nostre truppe sarà leggendaria." #OLD ITA
 smz_shimazu_charge_desc: "Even when surrounded and outnumbered, our soldiers will keep marching forward until they reach the other side of the enemy lines. The charge of our troops will be legendary!" #NEW
 #smz_shimazu_charge_desc: "Even when surrounded and outnumbered, our soldiers will keep marching forward, until they reach the other side of the enemy lines. The charge of our troops will be legendary." #OLD ENG
 smz_tanegashima: "Tanegashima Teppō"
 #smz_tanegashima_desc: "Gli occidentali che sbarcarono per la prima volta sull'Isola di Tanegashima portarono con sé armi nuove e interessanti. Questi archibugi stanno diventando una vista sempre più comune in tutto il $japan_region$, ma da nessuna parte sono stati disponibili per così tanto tempo come qui." #OLD ITA
 smz_tanegashima_desc: "The Westerners who first landed on Tanegashima brought with them new and interesting weapons. These arquebuses are becoming an increasingly common sight all over $japan_region$, but nowhere have they been available for as long as here." #NEW
 #smz_tanegashima_desc: "The westerners who first landed on Tanegashima Island brought with them new and interesting weapons. These arquebuses are becoming an increasingly common sight all over $japan_region$, but nowhere have they been available for as long as here." #OLD ENG
 smz_early_westernization: "Occidentalizzazione Precoce"
 #smz_early_westernization_desc: "Grazie al contatto frequente e precoce con i paesi occidentali, abbiamo imparato molto sulle tecnologie e idee straniere. Basandoci su queste, possiamo attuare riforme nell'economia, industria ed educazione per aiutarci a ottenere un vantaggio sugli altri clan giapponesi." #OLD ITA
 smz_early_westernization_desc: "Thanks to frequent early contact with Western countries, we have learned a lot about foreign technology and other innovations. Using this knowledge, we can carry out reforms in economy, industry, and education that will help gain an edge over other clans." #NEW
 #smz_early_westernization_desc: "Thanks to frequent and early contact with the western countries, we have learned a lot about foreign technologies and ideas. Based on these, we can carry out reforms in economy, industry, and education to help us gain an edge over other Japanese clans." #OLD ENG
 shn_vice_minister_of_dazaifu: "Vice-Ministro di Dazaifu"
 #shn_vice_minister_of_dazaifu_desc: "Come mostra il nome del nostro clan, proveniamo dal vice ministro nominato del Dazaifu nella provincia di $chikuzen_province$. Questa istituzione è stata sin dall'antichità il centro diplomatico e militare della regione, e noi tradizionalmente governiamo il Kyūshū settentrionale come rappresentanti degli Imperatori." #OLD ITA
 shn_vice_minister_of_dazaifu_desc: "As the name of our clan shows, we come from the appointed vice minister of the Dazaifu in $chikuzen_province$ province. This institution has since antiquity been the diplomatic and military center of the region, and we traditionally govern Northern Kyūshū as representative of the Emperor." #NEW
 #shn_vice_minister_of_dazaifu_desc: "As the name of our clan shows, we come from the appointed vice minister of the Dazaifu in $chikuzen_province$ province. This institution has since antiquity been the diplomatic and military center of the region, and we traditionally govern Northern Kyūshū as representative of the Emperors." #OLD ENG
 #shn_defender_against_mongols: "Difensore del Giappone" #OLD ITA
 shn_defender_against_mongols: "Defender of $JAP$" #NEW
 #shn_defender_against_mongols: "Defender of Japan" #OLD ENG
 #shn_defender_against_mongols_desc: "Come famiglia samurai principale nel Kyūshū settentrionale, abbiamo combattuto coraggiosamente contro le due invasioni mongole. Se dovesse sorgere la necessità, ci alzeremo ancora una volta per difendere sia il Kyūshū che il regno in generale dagli invasori esterni." #OLD ITA
 shn_defender_against_mongols_desc: "As a prominent samurai family from Northern Kyūshū, we have bravely fought against both $MGE_ADJ$ invasions. Should the need arise, we will once again rise to defend both Kyūshū and the realm at large from outside invaders." #NEW
 #shn_defender_against_mongols_desc: "As a leading samurai family in Northern Kyūshū, we have bravely fought against the two Mongol invasions. Should the need arise, we will once again rise to defend both Kyūshū and the realm at large from outside invaders." #OLD ENG
 #shn_diplomacy_through_tsushima: "Diplomazia attraverso Tsushima" #OLD ITA
 shn_diplomacy_through_tsushima: "Diplomacy Through Tsushima" #NEW
 #shn_diplomacy_through_tsushima: "Diplomacy through Tsushima" #OLD ENG
 #shn_diplomacy_through_tsushima_desc: "Grazie alla nostra presenza in $tsushima_province$, abbiamo una ricca esperienza di negoziati con la Corea attraverso l'isola. In questo modo, siamo sempre stati in grado di mantenere un canale aperto verso l'esterno, anche in tempi in cui le relazioni ufficiali sono state vietate." #OLD ITA
 shn_diplomacy_through_tsushima_desc: "Thanks to our presence in $tsushima_province$, we have a wealth of experience in negotiating with $korea_region$. This way, we have always been able to keep a channel open to the outside world, even during times when official relations were forbidden." #NEW
 #shn_diplomacy_through_tsushima_desc: "Thanks to our presence in $tsushima_province$, we have rich experience of negotiations with Korea through the island. In this way, we have always been able to keep a channel open towards the outside, even in times when the official relations have been forbidden." #OLD ENG
 soo_tradition_of_wakou: "Tradizione Wakō"
 #soo_tradition_of_wakou_desc: "Sebbene apprezziamo il commercio legale e pacifico sotto certificato ufficiale, dobbiamo prepararci per situazioni peggiori con tensione militare. Fortunatamente, la tradizione di pirateria sulla nostra isola potrebbe aiutarci a risolvere i problemi con la forza." #OLD ITA
 soo_tradition_of_wakou_desc: "While we appreciate lawful and peaceful trade, we also need to be prepared for tense military situations. Fortunately, the local tradition of piracy could help us solve certain combat-related issues." #NEW
 #soo_tradition_of_wakou_desc: "While we appreciate lawful and peaceful trade under official certificate, we need to prepare for worse situations with military tension. Fortunately, piracy tradition on our island could help us to solve problems with power." #OLD ENG
 soo_fight_for_tsushima: "Combattere per Tsushima"
 #soo_fight_for_tsushima_desc: "Situata tra il continente asiatico e le isole giapponesi, la nostra patria $tsushima_province$ e la sua zona marittima sono il luogo dove i paesi si scontrano e combattono duramente. Possano le nostre flotte essere forti, così che possiamo non solo difendere il nostro paese, ma anche espanderlo!" #OLD ITA
 soo_fight_for_tsushima_desc: "Lying between $asia$ and the islands of $japan_region$, our homeland of $tsushima_province$ and its surrounding waters are where countries clash and fight hard. May our own fleets be strong, so that we can not only defend our country, but also expand it!" #NEW
 #soo_fight_for_tsushima_desc: "Laying between the Asian continent and the Japanese islands, our homeland $tsushima_province$ and its sea zone are the place where countries clash and fight hard. May our fleets be strong, so that we can not only defend our country, but also expand it!" #OLD ENG
 soo_bahan_ship: "Nave Bahan"
 #soo_bahan_ship_desc: "Le nostre navi corsare sono temute per la bandiera di Hachiman. Nessuno intercetterà la nostra flotta protetta da questo dio della guerra!" #OLD ITA
 soo_bahan_ship_desc: "Our privateer ships fly the flag of Hachiman, spreading terror wherever they go. No one would dare attack a fleet protected by the god of war himself!" #NEW
 #soo_bahan_ship_desc: "Our privateer ships are feared by flying the flag of Hachiman. Nobody will intercept our fleet protected by this the war god!" #OLD ENG
 tkd_kai_shugo: "Shugo di $kai_province$"
 #tkd_kai_shugo_desc: "Siamo discendenti dei Genji di $kai_province$, e siamo stati tradizionalmente nominati come suo Shugo. Come tale, siamo stati intrinsecamente associati ad essa, e i famosi cavalli della provincia sono già sinonimo della nostra cavalleria." #OLD ITA
 tkd_kai_shugo_desc: "We are descendants of the Genji of $kai_province$, and have been traditionally appointed as its #italic Shugo#!. As such, we are intrinsically associated with it, and the famous horses from the province are already synonymous with our cavalry." #NEW
 #tkd_kai_shugo_desc: "We are descendants of the Genji of $kai_province$, and have been traditionally appointed as its Shugo. As such, we have been intrinsically associated with it, and the famous horses of the province are already synonymous with our cavalry." #OLD ENG
 tkd_takeda_ryu: "Takeda-Ryū"
 #tkd_takeda_ryu_desc: "Le forme tradizionali di arti marziali sono state tramandate nella nostra famiglia per generazioni. Tra queste, c'è grande enfasi sull'equitazione e il tiro con l'arco a cavallo, rendendo le nostre truppe montate soldati molto più efficaci." #OLD ITA
 tkd_takeda_ryu_desc: "Traditional forms of martial arts have been practiced in our family for generations. Among them, there is particular emphasis on horse riding and mounted archery, making our mounted troops much more effective soldiers than those from other clans." #NEW
 #tkd_takeda_ryu_desc: "Traditional forms of martial arts have been passed down in our family for generations. Among them, there is great emphasis on horse riding and horse archery, making our mounted troops into much more effective soldiers." #OLD ENG
 tkd_tiger_of_kai: "Tigre di Kai"
 #tkd_tiger_of_kai_desc: "Leader forti saranno una salvaguardia più affidabile per un dominio di qualsiasi numero di castelli forti. I nostri generali devono allenarsi duramente per il loro lavoro futuro e guadagnarsi il diritto di essere chiamati la 'Tigre di Kai'." #OLD ITA
 tkd_tiger_of_kai_desc: "Strong leaders are better at safeguarding their domains than any number of imposing castles. Our generals must train hard, and earn the right to be called the 'Tiger of Kai'." #NEW
 #tkd_tiger_of_kai_desc: "Strong leaders will be a more reliable safeguard for a domain than any number of strong castles. Our generals must train hard for their future work and earn the right to be called the 'Tiger of Kai'." #OLD ENG
 tkd_fuurinkazan: "Fūrinkazan"
 #tkd_fuurinkazan_desc: "Rapido come il vento, gentile come la foresta, aggressivo come il fuoco, immobile come una montagna. Le parole del grande maestro di guerra Sun Tzu saranno incise nel nome della nostra famiglia, e diventeranno il nostro motto." #OLD ITA
 tkd_fuurinkazan_desc: "'Swift like the wind, gentle like the forest, aggressive like fire, immovable like a mountain.' The words of the great war master Sun Tzu shall be permanently etched into our family's history, and shall serve as our motto." #NEW
 #tkd_fuurinkazan_desc: "Swift like the wind, gentle like the forest, aggressive like fire, immovable like a mountain. The words of the great war master Sun Tzu shall be engraved into our family's name, and shall become our motto." #OLD ENG
 tki_genji_in_mino: "Genji di $mino_province$"
 #tki_genji_in_mino_desc: "Come capo dei Genji in $mino_province$ e suo Shugo nominato, abbiamo guidato altri samurai locali per generazioni. Il nostro dominio occupa una posizione strategica da cui controllare le regioni vicine." #OLD ITA
 tki_genji_in_mino_desc: "As the head of the Genji in $mino_province$ and its appointed #italic Shugo#!, we have led other local samurai for generations. Our domain occupies an advantageous position from which to control the neighboring regions." #NEW
 #tki_genji_in_mino_desc: "As the head of the Genji in $mino_province$ and its appointed Shugo, we have led other local samurai for generations. Our domain occupies a strategic position from which to control the neighboring regions." #OLD ENG
 #tki_banner_of_bellflower: "Stendardo della Campanula" #OLD ITA
 tki_banner_of_bellflower: "Bellflower Banner" #NEW
 #tki_banner_of_bellflower: "Banner of Bellflower" #OLD ENG
 #tki_banner_of_bellflower_desc: "Essendo stati il suo Shugo per generazioni, il nostro emblema è già sinonimo di $mino_province$. Tutti gli uomini in essa combatteranno sotto il nostro stendardo." #OLD ITA
 tki_banner_of_bellflower_desc: "Having been its Shugo for generations, our emblem is already synonymous with $mino_province$. All who live there will fight under our banner." #NEW
 #tki_banner_of_bellflower_desc: "Having been its Shugo for generations, our emblem is already synonym with $mino_province$. All men in it will fight under our banner." #OLD ENG
 tki_flood_control_of_three_rivers: "Controllo delle Inondazioni"
 #tki_flood_control_of_three_rivers_desc: "Nella nostra provincia natale, i tre grandi fiumi di Kiso, Nagara e Ibi, spesso causano gravi inondazioni nelle nostre risaie. Dovremmo controllare tali corsi d'acqua e aumentare la fertilità delle nostre terre in tutte le province sotto il nostro governo." #OLD ITA
 tki_flood_control_of_three_rivers_desc: "In our home province, the three big rivers of Kiso, Nagara, and Ibi often cause serious flooding in our rice fields. We should control this overflow, and use it to increase the yield in all provinces under our rule." #NEW
 #tki_flood_control_of_three_rivers_desc: "In our home province, the three big rivers of Kiso, Nagara, and Ibi, often cause serious floods in our rice fields. We should control such streams and increase the fertility of our lands in all provinces under our rule." #OLD ENG
 ues_strong_dynastic_ties: "Forti Legami Dinastici"
 #ues_strong_dynastic_ties_desc: "La nostra famiglia discende dalla prestigiosa linea dei $fujiwara$, e abbiamo anche forti legami con gli Ashikaga, essendo la madre di Ashikaga Takauji un membro del nostro clan. Questi legami dinastici si riveleranno inestimabili per la prosperità del nostro clan." #OLD ITA
 ues_strong_dynastic_ties_desc: "Our family descends from the prestigious line of the $fujiwara_dynasty$, and we also have strong ties to the $ashikaga_dynasty$, as the mother of $ashikaga_dynasty$ Takauji was a member of our clan. These dynastic ties will prove invaluable for our prosperity." #NEW
 #ues_strong_dynastic_ties_desc: "Our family descends from the prestigious line of the $fujiwara$, and we also have strong ties with the Ashikaga, being the mother of Ashikaga Takauji a member of our clan. These dynastic ties will prove invaluable for the prosperity of our clan." #OLD ENG
 ues_double_shugo: "Doppio Shugo"
 #ues_double_shugo_desc: "Siamo stati nominati Shugo di entrambe le province di $kouzuke_province$ e $tango_province$. Le loro terre abbondanti ci serviranno bene per la nostra espansione." #OLD ITA
 ues_double_shugo_desc: "We have been appointed #italic Shugo#! of both $kouzuke_province$ and $tango_province$ Provinces. Their plentiful lands are the perfect starting point for our expansion." #NEW
 #ues_double_shugo_desc: "We have been appointed Shugo of both $kouzuke_province$ and $tango_province$ provinces. Their plentiful lands will serve us well for our expansion." #OLD ENG
 ues_eastern_power: "Potenza Orientale"
 #ues_eastern_power_desc: "Sebbene ci sia stato concesso territorio sia nell'est che nell'ovest del $japan_region$, è nell'est dove saremo in grado di prosperare meglio. Dai nostri ricchi territori lì, possiamo ottenere molti guerrieri per combattere per la nostra causa." #OLD ITA
 ues_eastern_power_desc: "Although we have been granted territory in both eastern and western $japan_region$, it is in the east where we will truly be able to flourish. Our territories there are rich, and we can attract many skilled local warriors to fight for our cause." #NEW
 #ues_eastern_power_desc: "Although we have been granted territory both in the East and West of $japan_region$, it is in the east where we will be able to flourish better. From our rich territories there, we can get many warriors to fight for our cause." #OLD ENG
 ues_dragon_of_echigo: "Drago di Echigo"
 #ues_dragon_of_echigo_desc: "Il nostro clan ha coltivato uno spirito di coraggio e giustizia, che farebbe temere ai nemici di affrontarci sul campo di battaglia. Dobbiamo far sapere al mondo della forza dei leader del nostro clan. Tutti temeranno e rispetteranno il Drago di Echigo." #OLD ITA
 ues_dragon_of_echigo_desc: "Our clan has fostered such an extraordinary spirit of courage and justice that it intimidates our opponents on the battlefield. We will declare the strength of our leaders to all the world, and everyone will quake with terror at the thought of the Dragon of Echigo!" #NEW
 #ues_dragon_of_echigo_desc: "Our clan has fostered a spirit of courage and justice, that would make enemies fear us in the battlefield. We must let the world know about the strength of our clan leaders. Everyone will fear and respect the Dragon of Echigo." #OLD ENG
 #utn_fujiwara_descendant: "Discendente $fujiwara$" #OLD ITA
 utn_fujiwara_descendant: "$fujiwara_dynasty$ Descendants" #NEW
 #utn_fujiwara_descendant: "$fujiwara$ Descendant" #OLD ENG
 #utn_fujiwara_descendant_desc: "La genealogia dice che gli antenati del nostro clan erano originariamente membri della famiglia $fujiwara$ a $kyoto$. Questa parentela con una famiglia così antica e riverita è una che possiamo ancora usare sotto forma di connessioni diplomatiche con la Corte Imperiale e gli altri clan." #OLD ITA
 utn_fujiwara_descendant_desc: "Our genealogy shows that the ancestors of our clan were originally members of the $fujiwara_dynasty$ family from $kyoto$. This kinship to such an ancient and revered dynasty is very useful for making diplomatic connections to the Imperial Court and with the other clans." #NEW
 #utn_fujiwara_descendant_desc: "The genealogy says that the ancestors of our clan were originally members of the $fujiwara$ family in $kyoto$. This kinship to such an ancient and revered family is one we can still use in the form of diplomatic connections with the Imperial Court and the other clans." #OLD ENG
 utn_legacy_of_nasu_no_yoichi: "Eredità di Nasu no Yoichi"
 #utn_legacy_of_nasu_no_yoichi_desc: "$shimotsuke_province$ fu un tempo la casa di Nasu no Yoichi, che è famoso per la sua abilità come arciere nella vecchia Guerra Genpei. Ancora oggi, i guerrieri di $shimotsuke_province$ lo tengono in alta considerazione, e siamo stati anche chiamati 'i migliori arcieri nel Kantō'." #OLD ITA
 utn_legacy_of_nasu_no_yoichi_desc: "$shimotsuke_province$ was once the home of Nasu no Yoichi, who was famous for his abilities as an archer during the Genpei War. To this day, the warriors of $shimotsuke_province$ hold him in high regard; we are proud to be called 'the best archers in Kantō' and to carry on Nasu no Yoichi's legacy." #NEW
 #utn_legacy_of_nasu_no_yoichi_desc: "$shimotsuke_province$ was once the home of Nasu no Yoichi, who is famous for his ability as an archer in the old Genpei War. To this day, the warriors of $shimotsuke_province$ held him in high regard, and we have also been called 'the best archers in Kantō'." #OLD ENG
 utn_mediator_of_kanto: "Mediatore del Kantō"
 #utn_mediator_of_kanto_desc: "Come uno dei clan più antichi nel Kantō, abbiamo una profonda comprensione della politica in questa regione e abbiamo lavorato come mediatori tra diverse fazioni molte volte. In questo modo, sappiamo anche come espandere il nostro territorio efficacemente senza provocare l'odio e la paura degli altri." #OLD ITA
 utn_mediator_of_kanto_desc: "As one of the oldest clans in Kantō, we have a keen insight into regional politics, and have worked as a mediator between different factions on many occasions. This same comprehensive understanding of our home region allows us to expand our territory effectively without provoking others." #NEW
 #utn_mediator_of_kanto_desc: "As one of the oldest clans in Kantō, we have a keen insight of politics in this region and have worked as mediator between different factions many times. In this way, we also know how to expand our territory effectively without provoking the hate and fear of others." #OLD ENG
 #ymn_descendant_of_nitta: "Discendente di Nitta" #OLD ITA
 ymn_descendant_of_nitta: "Descendants of the $nitta_dynasty$" #NEW
 #ymn_descendant_of_nitta: "Descendant of Nitta" #OLD ENG
 #ymn_descendant_of_nitta_desc: "Siamo discendenti del clan Nitta, il più grande rivale della vecchia famiglia Ashikaga. Per alcuni questo sarebbe una prova della nostra lealtà mentre per altri questo ci rende un candidato naturale all'opposizione. Dobbiamo utilizzare abilmente questa discendenza nelle molte proposte politiche di quest'epoca." #OLD ITA
 ymn_descendant_of_nitta_desc: "We are descendants of the $nitta_dynasty$ clan, ancient rivals of the $ashikaga_dynasty$ family. To some this is proof of the depths of our loyalty, while to others this makes us a natural enemy. We must cleverly utilize our lineage as a diplomatic weapon." #NEW
 #ymn_descendant_of_nitta_desc: "We are descendants of the Nitta clan, the biggest rival of the old Ashikaga family. To some this would be a proof of our loyalty while to others this makes us a natural opposition candidate. We must cleverly utilize this lineage in the many political overtures of this age." #OLD ENG
 #ymn_mediate_succession_disputes: "Mediare Dispute di Successione" #OLD ITA
 ymn_mediate_succession_disputes: "Succession Dispute Mediation" #NEW
 #ymn_mediate_succession_disputes: "Mediate Succession Disputes" #OLD ENG
 #ymn_mediate_succession_disputes_desc: "Mentre molti degli altri clan Shugo litigano tra loro su chi sia il legittimo erede di chi, si rivolgono a noi per aiutare a mediare le loro dispute. Nel farlo, possiamo guadagnare più alleati e contatti, per non parlare di destabilizzare i nostri rivali." #OLD ITA
 ymn_mediate_succession_disputes_desc: "As many of the other clans squabble within themselves over who is the rightful heir to whom, they turn to us to mediate their disputes. Doing so puts us in a unique position of power and trust, making it easy for us to make new allies and contacts — and to destabilize our rivals." #NEW
 #ymn_mediate_succession_disputes_desc: "As many of the other Shugo clans squabble within themselves over who is the rightful heir to whom, they turn to us to help mediate their disputes. In doing so, we can gain more allies and contacts, not to mention destabilize our rivals." #OLD ENG
 ymn_leader_of_western_army: "L'Armata Occidentale"
 #ymn_leader_of_western_army_desc: "Forgiamo una grande armata occidentale per unire gli stati litigiosi del Giappone. Bravura e generali abili con soldati ben addestrati costringeranno facilmente gli orientali in ginocchio!" #OLD ITA
 ymn_leader_of_western_army_desc: "Let us forge a great western army to unite the squabbling states of $japan_region$. Skillful generals, well-trained soldiers, and ironclad bravery will easily force the Easterners to their knees!" #NEW
 #ymn_leader_of_western_army_desc: "Let us forge a great western army to unite the squabbling states of Japan. Bravery and skillful generals with well-trained soldiers will easily force the easterners on their knees!" #OLD ENG
 ymn_isolated_heartland: "Cuore Isolato"
 #ymn_isolated_heartland_desc: "Le nostre terre natali sono montuose e isolate. Fortunatamente, questo significa anche che saranno difficili da raggiungere per qualsiasi aspirante conquistatore. Costruiamo le nostre difese attorno ai punti di forza naturali della nostra geografia e facciamo pentire qualsiasi attaccante di aver mai rivolto i loro occhi avidi ai nostri possedimenti." #OLD ITA
 ymn_isolated_heartland_desc: "Our homeland is mountainous and isolated. Fortunately, this also means that any potential conquerors would find our territory almost impossible to reach! Let us build our defenses so that they complement the natural protective strength of our geography — any invader will bitterly regret the day they turned their greedy eyes to our possessions." #NEW
 #ymn_isolated_heartland_desc: "Our homelands are mountainous and isolated. Fortunately, this also means that they will be hard to reach for any would-be conqueror. Let us build our defenses around the natural strengths of our geography and make any attacker regret ever turning their greedy eyes to our possessions." #OLD ENG
 
 #West Africa
 #dahomey_amazons: "Amazzoni del Dahomey" #OLD ITA
 dahomey_amazons: "Dahomey Amazons" #NEW
 #dahomey_amazons: "Dahomey Amazonians" #OLD ENG
 #dahomey_amazons_desc: "Un corpo femminile di guerriere, reclutato dalle mogli del re. Guadagnandosi la loro reputazione come Amazzoni dalla mitologia greca per la loro ferocia in battaglia, sono sicure di incutere paura nei ranghi nemici. Queste $dahomey_amazons$ servono $DAH$ e i suoi interessi." #OLD ITA
 dahomey_amazons_desc: "A corp of female warriors, recruited from among the king's wives. They have earned their reputation as mythological Amazons due to their ferocity in battle and the fear they strike in the ranks of their opponents. These $dahomey_amazons$ are entirely devoted to $DAH$ and its interests." #NEW
 #dahomey_amazons_desc: "A female corp of warriors, recruited from the king's wives. Earning their reputation as Amazons from Greek mythology due to their ferocity in battle, they are sure to strike fear into the enemy ranks. These $dahomey_amazons$ serve $DAH$ and its interests." #OLD ENG

 dah_children_of_the_panther: "Figli della Pantera"
 #dah_children_of_the_panther_desc: "La nostra antica leggenda afferma che la nostra discendenza reale discende dall'unione di una principessa e una pantera. Questo antico racconto può solo aumentare il nostro prestigio e la nostra fama tra i nostri vicini." #OLD ITA
 dah_children_of_the_panther_desc: "Our ancient legends state that our royal line is descended from the union of a princess and a panther. This ancient and mystical tale will enhance our prestige and fame." #NEW
 #dah_children_of_the_panther_desc: "Our ancient legend state our royal lineage is descended from the union of a princess and a panther. This ancient tale can only enhance our prestige and fame among our neighbors." #OLD ENG

 dah_slave_hunts: "Cacce agli Schiavi"
 #dah_slave_hunts_desc: "Attraverso le incursioni ai nostri vicini, otteniamo schiavi che non solo possono essere impiegati economicamente o scambiati con i nostri vicini, ma che possono anche essere messi a servire nel nostro esercito. In tali modi, aumentiamo il numero di uomini che possiamo chiamare alle armi." #OLD ITA
 dah_slave_hunts_desc: "While raiding the surrounding territories, we obtain slaves who cannot only be employed economically or bartered to our neighbors, but who can serve in our armies. In this way, we will increase the number of fighters that can be called to arms." #NEW
 #dah_slave_hunts_desc: "Through raiding our neighbors, we obtain slaves who cannot only be employed economically or bartered to our neighbors, but who can also be made to serve in our army. In such ways, we increase the number of men we may call to arms." #OLD ENG

 dah_migan_mehu: "Migan e Mehu"
 #dah_migan_mehu_desc: "Il Migan e il Mehu sono i due ministri principali dei nostri re. Uno sorveglia il nord, l'altro il sud; uno sorveglia la giustizia, l'altro il commercio. Insieme, portano pace e prosperità alla nostra terra." #OLD ITA
 dah_migan_mehu_desc: "The Migan and the Mehu are the ruler's two chief ministers. One oversees the north, the other the south; one oversees justice, the other commerce. Together, they bring stability and prosperity." #NEW
 #dah_migan_mehu_desc: "The Migan and the Mehu are the two chief ministers of our kings. One oversees the north, the other the south; one oversees justice, the other commerce. Together, they bring peace and prosperity to our land." #OLD ENG

 dah_lagredis: "Lagredis"
 #dah_lagredis_desc: "Introducendo un numero di giovani nobili effeminati nell'harem reale e presentandoli come mogli reali, possiamo dare loro la libertà di agire inosservati come occhi e orecchie del re, specialmente in questioni di intrighi di palazzo." #OLD ITA
 dah_lagredis_desc: "By secretly placing male courtiers disguised as royal wives in the harem, they will be able to act unseen as the king's eyes and ears, especially in matters of palace intrigue." #NEW
 #dah_lagredis_desc: "By introducing a number of effeminate young noblemen in the royal harem and presenting them as royal wives, we can give them the freedom to act unseen as the king's eyes and ears, especially in matters of palace intrigue." #OLD ENG

 dah_yovogan: "Lo Yovogan"
 #dah_yovogan_desc: "Man mano che sempre più stranieri arrivano sulle nostre coste, è necessario istituire un nuovo ufficio nel nostro governo per studiare i loro modi e apprendere i loro segreti, così da poterne beneficiare." #OLD ITA
 dah_yovogan_desc: "As more and more foreigners are coming to our shores, we should establish a new office in our government to study and learn from their ways, so that we may benefit from this exchange of cultures." #NEW
 #dah_yovogan_desc: "As more and more foreigners come to our shores, it is necessary to establish a new office in our government to study their ways and learn their secrets, so that we may benefit from them." #OLD ENG

 dah_dahomey_palaces: "Palazzi di Abomey"
 #dah_dahomey_palaces_desc: "Un vasto complesso palatino nella nostra capitale sarebbe un segno sicuro del nostro potere per tutti coloro che oserebbero sfidarlo." #OLD ITA
 dah_dahomey_palaces_desc: "Building a sprawling palace complex in our capital would be an elegant, yet imposing demonstration of our power. Any who may consider taking up arms against us will surely be deterred by the sight of our sumptuous palaces." #NEW
 #dah_dahomey_palaces_desc: "A vast palatial complex in our capital would be a sure sign of our power to all who would dare challenge it." #OLD ENG

 kbo_ribat_fortifications: "Fortificazioni Ribāṭ"
 #kbo_ribat_fortifications_desc: "Usate in tutto il mondo $muslim_ADJ$, queste piccole fortificazioni hanno permesso la protezione di carovane, centri commerciali e comunità isolate." #OLD ITA
 kbo_ribat_fortifications_desc: "Used throughout the $muslim_ADJ$ world, these small fortifications have provided protections to caravans, commercial hubs, and isolated communities alike." #NEW
 #kbo_ribat_fortifications_desc: "Used throughout the $muslim_ADJ$ world, these small fortifications have allowed the protection of caravans, commercial hubs, and isolated communities." #OLD ENG
 
#Muslim
 people_of_allah: "Popolo di $muslim_god_name$"
 people_of_allah_desc: "Siamo i seguaci di $muslim_god_name$, l'unico vero Dio, e rispettiamo la Sua Parola. Tutti coloro che credono in Lui sono nostri fratelli e sorelle ai Suoi occhi."
 holy_revelation: "Sacra Rivelazione"
 holy_revelation_desc: "La Parola di $muslim_god_name$ fu rivelata al suo Profeta Muḥammad, pace sia su di lui, e trascritta nel Santo $common_string_quran$. Attraverso i suoi versetti, la volontà di $muslim_god_name$ è trasmessa ai Suoi fedeli, e tutti i credenti $muslim_ADJ$ dovrebbero essere familiari con i suoi passaggi."
 islamic_calligraphy: "Calligrafia Islamica"
 #islamic_calligraphy_desc: "L'$muslim$ non è solo una religione di pace, ma di arti. La calligrafia dei versetti del $common_string_quran$ e i nomi dei profeti molte volte si trovano tra la scrittura e le arti." #OLD ITA
 islamic_calligraphy_desc: "$muslim$ is not only a religion of peace, but of the arts. The calligraphy used to write the verses of the $common_string_quran$ and the names of the prophets often straddles the line between scripture and art." #NEW
 #islamic_calligraphy_desc: "$muslim$ is not only a religion of peace, but of arts. The calligraphy of the verses of the $common_string_quran$ and the names of the prophets many times straddles between scripture and arts." #OLD ENG
 islamic_prayer: "Aṣ-Ṣalāh Farḍ"
 #islamic_prayer_desc: "Uno dei Cinque Pilastri dell'$muslim$, Aṣ-Ṣalāh è l'obbligo per un fedele $muslim_ADJ$ di eseguire preghiere quotidiane. Sebbene il numero di volte che si deve pregare al giorno e i movimenti specifici nel farlo possano variare da scuola a scuola, l'atto di pregare quotidianamente è una costante tra tutti gli $muslim$." #OLD ITA
 islamic_prayer_desc: "One of the Five Pillars of $muslim$, Aṣ-Ṣalāh is the obligation for a $muslim_ADJ$ faithful to perform daily prayers. Although the number of times one must pray every day and the specific movements when doing it may vary from school to school, the act of daily prayer is common among all $muslim$." #NEW
 #islamic_prayer_desc: "One of the Five Pillars of $muslim$, Aṣ-Ṣalāh is the obligation for a $muslim_ADJ$ faithful to perform daily prayers. Although the number of times one must pray a day and the specific movements when doing it may vary from school to school, the act of praying daily is a constant among all $muslim$." #OLD ENG
 zakah: "Al-Zakāh Wājib"
 zakah_desc: "Uno dei Cinque Pilastri dell'$muslim$, Al-Zakāh è una forma di elemosina considerata un obbligo religioso per ogni fedele $muslim_ADJ$. Dare denaro per aiutare i bisognosi è una carità obbligatoria per chiunque possa permetterselo, ed è considerata una tassa."
 muslim_lineage: "Discendenza $muslim_ADJ$"
 #muslim_lineage_desc: "Sin dai tempi di Muḥammad, pace sia su di lui, l'$muslim$ è stato intrinsecamente legato alle strutture di governo. Per questo, la nostra è anche una linea legittimata dalla fede stessa." #OLD ITA
 muslim_lineage_desc: "Ever since the times of Muḥammad, peace be upon him, $muslim$ has been intrinsically linked to rulership structures. As such, our dynastic line is also legitimized by the faith itself." #NEW
 #muslim_lineage_desc: "Ever since the times of Muḥammad, peace be upon him, $muslim$ has been intrinsically linked to rulership structures. As such, ours is also a line legitimized by the faith itself." #OLD ENG
 muslim_caravans: "Carovane $muslim_ADJ$"
 #muslim_caravans_desc: "Dalle molte rotte della Via della Seta, alle rotte del sale attraverso il Sahara, il nostro popolo ha la tradizione di intraprendere avventure in carovane commerciali verso terre lontane, fornendo un'ampia varietà di beni attraverso tutto il mondo $muslim_ADJ$." #OLD ITA
 muslim_caravans_desc: "From the many paths of the Silk Road, to the salt routes across the Sahara, our people have a tradition of embarking on trade ventures to faraway lands, providing us and the rest of the $muslim_ADJ$ world with a wide selection of available goods." #NEW
 #muslim_caravans_desc: "From the many routes of the Silk Road, to the salt routes across the Sahara, our people have the tradition of going on trade caravan ventures to faraway lands, providing a wide variety of goods through all $muslim_ADJ$ world." #OLD ENG
 islamic_golden_age: "Età dell'Oro Islamica"
 #islamic_golden_age_desc: "Nonostante i giorni culturalmente gloriosi dell'$muslim$ siano già alle nostre spalle, è innegabile l'impatto che l'$islamic_golden_age$ ebbe in tutto il mondo, non solo nei paesi $muslim_ADJ$. Alcuni di questi paesi infedeli stanno solo ora iniziando a scoprire la nostra grandezza nelle arti e nelle scienze mentre erano bloccati in un'età di ignoranza." #OLD ITA
 islamic_golden_age_desc: "The impact that the $islamic_golden_age$ had on the entire world, not only in $muslim_ADJ$ countries, is absolutely undeniable. Some of these infidel nations are only now emerging from their dark ages of ignorance, making their first attempts at artistic and scientific 'discoveries' that we invented — and perfected — long ago." #NEW
 #islamic_golden_age_desc: "Despite the culturally glorious days of $muslim$ being already behind us, it is undeniable the impact that the $islamic_golden_age$ had all over the world, not only in $muslim_ADJ$ countries. Some of these infidel countries are just now starting to discover our greatness in arts and sciences while they were stuck in an age of ignorance." #OLD ENG
 ramadan: "Ramaḍān"
 #ramadan_desc: "Una commemorazione della prima rivelazione al Profeta Muḥammad, pace sia su di lui, il mese di $ramadan$ è il mese più sacro nell'$muslim$. Durante questo mese, tutti i fedeli $muslim_ADJ$ sono tenuti a eseguire Ṣawm, digiuno e astinenza, durante le ore diurne, così come preghiera e riflessione." #OLD ITA
 ramadan_desc: "A commemoration of the first revelation to Prophet Muḥammad, peace be upon him, the month of $ramadan$ is the holiest month in $muslim$. During this month, all $muslim_ADJ$ faithful are expected to perform Ṣawm — fasting and abstinence — during the daylight hours, as well as prayer and reflection." #NEW
 #ramadan_desc: "A commemoration of the first revelation to Prophet Muḥammad, peace be upon him, the month of $ramadan$ is the holiest month in $muslim$. During this month, all $muslim_ADJ$ faithful are expected to perform Ṣawm, fasting and abstinence, during the daylight hours, as well as prayer and reflection." #OLD ENG
 sunnah: "Sunnah"
 #sunnah_desc: "Consistente nelle tradizioni e pratiche attribuite a Muḥammad, pace sia su di lui, la $sunnah$ è come ogni fedele $muslim_ADJ$ dovrebbe comportarsi, ed è anche ciò che dà al $sunni$ il suo nome. Sebbene le diverse scuole di giurisprudenza possano variare sui dettagli, tutte hanno la loro base nella $sunnah$." #OLD ITA
 sunnah_desc: "Consisting of the traditions and practices attributed to Muḥammad, peace be upon him, the $sunnah$ dictates how every $muslim_ADJ$ faithful should behave, and is also what gives $sunni$ its name. Although the different schools of jurisprudence may vary on the details, they all have their basis in the $sunnah$." #NEW
 #sunnah_desc: "Consisting on the traditions and practices attributed to Muḥammad, peace be upon him, the $sunnah$ is how every $muslim_ADJ$ faithful should behave, and also what gives $sunni$ its name. Although the different schools of jurisprudence may vary on the details, they all have their basis on the $sunnah$." #OLD ENG
 imamate: "Imamato"
 imamate_desc: "La base della fede $shia_ADJ$ è che Muḥammad, pace sia su di lui, designò 'Alī ibn Abī Ṭālib come suo successore. Per questo, la figura dell'Imām è quella di un leader spirituale proveniente dalla linea di Muḥammad, pace sia su di lui, per guidare tutti i fedeli $muslim_ADJ$."
 indian_sea_trade: "Commercio del Mare Indiano"
 #indian_sea_trade_desc: "I mercanti $muslim_ADJ$ hanno navigato le acque dell'$indian_ocean_region$ per generazioni, andando sempre più lontano in cerca di prodotti lucrativi. Dalle coste orientali dell'$africa$ all'$india$, e persino fino alle isole delle spezie dell'$indonesia_region$, le acque sono solcate da vascelli $muslim_ADJ$." #OLD ITA
 indian_sea_trade_desc: "$muslim_ADJ$ traders have sailed the waters of the $indian_ocean_region$ for generations, traveling impossibly far in search of rare and valuable goods. From the eastern coasts of $africa$, to the shores of $india$, and even as far as the spice islands of $indonesia_region$, the waters are crossed by vessels of the $muslim_ADJ$ faithful." #NEW
 #indian_sea_trade_desc: "$muslim_ADJ$ traders have sailed the waters of the $indian_ocean_region$ for generations, going ever farther away in search of lucrative products. From the eastern coasts of $africa$ to $india$, and even as far as the spice islands of $indonesia_region$, the waters are cleaved by $muslim_ADJ$ vessels." #OLD ENG
 muslim_trade_communities: "Comunità Commerciali $muslim_ADJ$"
 #muslim_trade_communities_desc: "La presenza di mercanti $muslim_ADJ$ in terre lontane li mette in contatto con molti popoli e credenze diversi. La creazione di comunità commerciali tra loro permette una certa mescolanza e sincretismo delle loro credenze con la vera Parola di $muslim_god_name$." #OLD ITA
 muslim_trade_communities_desc: "The presence of $muslim_ADJ$ traders in faraway lands puts them in contact with many different peoples and beliefs. The establishment of trade communities among them allows for a certain degree of blending and syncretism of their beliefs with the true Word of $muslim_god_name$." #NEW
 #muslim_trade_communities_desc: "The presence of $muslim_ADJ$ traders in faraway lands puts them in contact with many different peoples and beliefs. The establishment of trade communities among them allows for a certain blending and syncretism of their beliefs with the true Word of $muslim_god_name$." #OLD ENG
 expansionist_faith: "Fede Espansionista"
 #expansionist_faith_desc: "In passato, l'$muslim$ si espanse molto rapidamente dalle sue origini in $arabia_region$. In solo un paio di generazioni, riuscì a raggiungere dall'$iberia_region$ all'$india$, nell'espansione più rapida che il mondo avesse mai visto. Ci sono nuove terre oltre i nostri confini ora, e forse è tempo per una seconda espansione $muslim_ADJ$." #OLD ITA
 expansionist_faith_desc: "From its origins in $arabia_region$, $muslim$ has expanded far and fast. In a few generations, its believers spanned from $iberia_region$ to $india$, the most rapid religious expansion the world has ever seen. There are new lands waiting to be touched by our light, however — perhaps it is time for a second $muslim_ADJ$ expansion." #NEW
 #expansionist_faith_desc: "In the past, $muslim$ expanded very quickly from its origins in $arabia_region$. In just a couple generations, it managed to reach from $iberia_region$ to $india$, in the fastest expansion the world had ever seen. There are new lands beyond our borders now, and perhaps it is time for a second $muslim_ADJ$ expansion." #OLD ENG
 blend_of_influences: "Mescolanza di Influenze"
 #blend_of_influences_desc: "L'$muslim$ è stato in grado di espandersi in molti luoghi dalle sue origini in $arabia_region$, e in questa espansione è entrato in contatto con molti popoli e modi di vita diversi. Molti scambi di influenze sono avvenuti durante questo processo, al punto che molte caratteristiche non provenienti originariamente dall'$muslim$ sono diventate intrinsecamente legate ad esso, mentre le molte culture che hanno accettato l'$muslim$ sono state anche influenzate da esso." #OLD ITA
 blend_of_influences_desc: "$muslim$ has expanded to many new places since its origins in $arabia_region$, and with this spread, it came into contact with many different peoples and ways of life. Many exchanges of influence happened during this process, to the point that many characteristics not originally part of $muslim$ have become intrinsically associated with the faith." #NEW
 #blend_of_influences_desc: "$muslim$ has been able to expand to many places since its origins in $arabia_region$, and in this expansion it has come into contact with many different peoples and ways of life. Many exchanges of influences have happened during this process, to the point that many characteristics not coming originally from $muslim$ have become intrinsically tied to it, while the many cultures that have accepted $muslim$ have also been influenced by it." #OLD ENG
 islamic_schoolars: "Scuole Islamiche"
 #islamic_schoolars_desc: "L'$muslim$ ha sempre incoraggiato il pensiero e lo studio delle sue scritture, persino al punto in cui sono emerse diverse scuole di pensiero su come interpretarle. I nostri studiosi del $common_string_quran$ e degli altri testi sacri sono quindi individui molto istruiti, capaci di eseguire le discussioni più profonde." #OLD ITA
 islamic_schoolars_desc: "$muslim$ has always encouraged study and analysis of its scriptures, to the point where we have developed entirely different schools of thought on how to interpret them. Our scholars are therefore extremely learned in the $common_string_quran$ and our other holy texts, capable of having the most in-depth theological discussions." #NEW
 #islamic_schoolars_desc: "$muslim$ has always encouraged thought and study of its scriptures, even to the point where different schools of thought on how to interpret them have emerged. Our scholars in the $common_string_quran$ and the other holy texts are thus very learned individuals, able of performing the deepest discussions." #OLD ENG
 gunpowder_empires: "Imperi della Polvere da Sparo"
 #gunpowder_empires_desc: "La polvere da sparo potrebbe essere stata inventata nell'estremo Oriente, ma fu attraverso l'$muslim$ che si diffuse in tutto il mondo e divenne ampiamente utilizzata. Le armi a polvere da sparo sono state un pilastro dei nostri eserciti per generazioni, e la sua produzione e utilizzo è una delle caratteristiche che ci definiscono." #OLD ITA
 gunpowder_empires_desc: "Gunpowder may have been invented in the Far East, but it was through $muslim$ that it became widely used throughout the world. Gunpowder weapons have been a staple of our armies for generations, and its production and use is one of our defining characteristics." #NEW
 #gunpowder_empires_desc: "Gunpowder may have been invented in the far East, but it was through $muslim$ that it spread all over the world and became widely used. Gunpowder weapons have been a staple of our armies for generations, and its production and use is one of the characteristics that define us." #OLD ENG
 established_holy_sites: "Luoghi Sacri Consolidati"
 #established_holy_sites_desc: "Mentre altre religioni hanno un uso alquanto lassista e incoerente dei loro luoghi sacri, le regole dell'$muslim$ verso i luoghi sacri sono abbastanza chiare. Per questo, è fuori dubbio che eseguiremo i nostri pellegrinaggi diligentemente quando sarà il momento." #OLD ITA
 established_holy_sites_desc: "While other religions have somewhat lax and inconsistent views towards how their holy sites are used, the rules of $muslim$ about sacred places are quite clear. Our people will undoubtedly make their pilgrimages with the appropriate reverence and dignity." #NEW
 #established_holy_sites_desc: "While other religions have somewhat lax and inconsistent use of their holy places, the rules of $muslim$ towards holy sites is quite clear. As such, it is beyond doubt that we will perform our pilgrimages dutifully when the time comes." #OLD ENG
 islamic_courts: "Corti Islamiche"
 #islamic_courts_desc: "Le corti reali dei paesi $muslim_ADJ$ sono sempre state tra le più ammirate al mondo. Lodate per la nostra cultura raffinata e i beni esotici, i racconti della magnificenza delle nostre corti si sono diffusi ovunque, e il nostro popolo è orgoglioso di appartenere a una tale corte." #OLD ITA
 islamic_courts_desc: "The royal courts of $muslim_ADJ$ countries have always been among the most admired in the world. Praised for our refined culture and luxurious appointments, tales of the magnificence of our courts have spread far and wide, and our people take great pride in this reputation." #NEW
 #islamic_courts_desc: "The royal courts of $muslim_ADJ$ countries have always been among the most admired in the world. Praised for our refined culture and exotic goods, tales of the magnificence of our courts have spread all over, and our people are proud to belong to such a court." #OLD ENG
 schools_of_thought: "Scuole di Pensiero"
 #schools_of_thought_desc: "L'$muslim$ è sempre stato legato alla conoscenza e all'educazione. Dalle varie scuole di giurisprudenza e teologia, alle diverse scuole di conoscenza costruite da vari governanti, le opere degli studiosi $muslim_ADJ$ sono state ammirate non solo nel mondo $muslim_ADJ$ ma anche tra gli infedeli." #OLD ITA
 schools_of_thought_desc: "$muslim$ tradition has always emphasized the pursuit of knowledge and education. From schools of jurisprudence and theology to the great libraries and institutions of learning established by various rulers, $muslim_ADJ$ scholarship has earned admiration throughout the $muslim_ADJ$ world and well beyond." #NEW
 #schools_of_thought_desc: "$muslim$ has always been tied to knowledge and education. From the various schools of jurisprudence and theology, to the different schools of knowledge built by various rulers, the works of $muslim_ADJ$ scholars have been admired not only in the $muslim_ADJ$ world but also among the infidels." #OLD ENG
 distant_trade_ventures: "Imprese Commerciali Lontane"
 #distant_trade_ventures_desc: "È dalle terre più lontane che possiamo ottenere i prodotti più lucrativi. Per molti anni, i mercanti $muslim_ADJ$ hanno viaggiato grandi distanze sia via terra che attraverso i mari in cerca di opportunità commerciali proficue." #OLD ITA
 distant_trade_ventures_desc: "It is from the most distant places that the most lucrative trade goods come. For many years, $muslim_ADJ$ traders have traveled huge distances both on land and across the seas in search of profitable trade opportunities." #NEW
 #distant_trade_ventures_desc: "It is from the most faraway lands that we can get the most lucrative products. For many years, $muslim_ADJ$ traders have traveled great distances both on land and across the seas in search of profitable trade opportunities." #OLD ENG
 #resilient_merchants: "Mercanti Resilienti" #OLD ITA
 resilient_merchants: "Resilient Traders" #NEW
 #resilient_merchants: "Resilient Merchants" #OLD ENG
 #resilient_merchants_desc: "I mercanti $muslim_ADJ$ hanno dovuto sopportare le condizioni più dure per le loro spedizioni. Dall'attraversamento delle sabbie ardenti del Sahara e dei deserti del Gobi, alla navigazione delle acque afflitte dai monsoni dell'$indian_ocean_region$, hanno dimostrato ancora e ancora la loro resilienza nel sopportare difficoltà per un commercio di successo." #OLD ITA
 resilient_merchants_desc: "$muslim_ADJ$ traders endure the harshest of conditions during their expeditions. From crossing the scorching sands of the Sahara and Gobi Deserts, to braving the monsoon-plagued waters of the $indian_ocean_region$, they have proved time and again that they will undergo any hardship in order to bring about successful trade." #NEW
 #resilient_merchants_desc: "$muslim_ADJ$ traders have had to endure the harshest conditions for their expeditions. From the crossing of the scorching sands of the Sahara and Gobi deserts, to the sailing of the monsoon-plagued waters of the $indian_ocean_region$, they have proved once and again their resilience in enduring hardships for a successful trade." #OLD ENG
 jewels_of_the_desert: "Gioielli del Deserto"
 #jewels_of_the_desert_desc: "È vero che l'$muslim$ ebbe origine dalle sabbie dell'$arabia_region$, e si espanse in molte altre aree che erano anch'esse aride. Tuttavia, alcune città $muslim_ADJ$ furono in grado di brillare intensamente nonostante si trovassero nel mezzo di aree desertiche e furono lodate come centri di vita opulenta. Con abbastanza sforzo, qualsiasi insediamento può diventare ricco come loro." #OLD ITA
 jewels_of_the_desert_desc: "$muslim$ arose from the sands of $arabia_region$ and spread across a largely arid region. Yet some $muslim_ADJ$ cities became like prosperous jewels shining in the harsh desert, literal and figurative oasis made bountiful through trade, architecture, and irrigation. With wise investment and planning, any desert settlement can achieve a similar status." #NEW
 #jewels_of_the_desert_desc: "It is true that $muslim$ originated from the sands of $arabia_region$, and expanded to many other areas that were also arid. However, some $muslim_ADJ$ cities were able to shine brightly despite being in the middle of desert areas and were lauded as centers of affluent life. With enough effort, any settlement can become as rich as them." #OLD ENG
 comprehensive_land_survey: "Rilevamento Completo delle Terre"
 #comprehensive_land_survey_desc: "Per sapere chi dovrebbe pagare le tasse, dobbiamo prima sapere chi possiede cosa. Un rilevamento completo delle terre e poi assicurarsi che sia mantenuto aggiornato sono essenziali per questo. Otterremo sempre ciò che ci è dovuto." #OLD ITA
 comprehensive_land_survey_desc: "In order to know who should pay taxes, we must first know who owns what. A comprehensive land survey, and regularly updating it, are therefore essential. We will always get what we are due!" #NEW
 #comprehensive_land_survey_desc: "In order to know who should pay tax, we must first know who owns what. A comprehensive land survey and then ensuring that it is kept up to date are essential for that. We will always get what we are due." #OLD ENG
 counting_the_people: "Contare le Persone"
 #counting_the_people_desc: "Ora che sappiamo chi possiede cosa, il seguito logico è farsi un'idea di chi vive dove. Questo ci permetterà di sapere dove guardare quando cerchiamo uomini per servire nei nostri eserciti." #OLD ITA
 counting_the_people_desc: "Now that we know who owns what, the logical follow-up is to get a clearer idea of who lives where. This will tell us where to look when we need fresh recruits for our armies." #NEW
 #counting_the_people_desc: "Now that we know who owns what, the logical follow-up is to get an idea of who lives where. This will allow us to know where to look when we seek men to serve in our armies." #OLD ENG
 cosmopolitan_court: "Corte Cosmopolita"
 #cosmopolitan_court_desc: "Persone da tutto il mondo si riuniscono per ammirare la nostra corte $muslim_ADJ$. Il fascino di una tale corte non sta diminuendo, e questo permette la presenza nelle nostre sale di un'ampia varietà di talenti." #OLD ITA
 cosmopolitan_court_desc: "People from all over admire the beauty and sophistication of our $muslim_ADJ$ court. We have therefore become an appealing destination for talented luminaries of all kinds, which only adds to our overall court vibrancy and prestige." #NEW
 #cosmopolitan_court_desc: "People from all over gather to admire our $muslim_ADJ$ court. The appeal of such a court is not waning, and this allows for the presence in our halls of a wide variety of talents." #OLD ENG
 caliphate: "Ḵilāfa"
 #caliphate_desc: "La Ḵilāfa o Califfato è l'unione di tutti i fedeli $muslim_ADJ$ sotto un unico governante nella forma del $rank_empire_muslim_ruler_male$, che deve essere il successore di Muḥammad, pace sia su di lui, sia politicamente che spiritualmente. Sebbene ci siano differenze su chi dovrebbe essere idoneo a essere $rank_empire_muslim_ruler_male$, l'idea di tutti gli $muslim$ uniti sotto un unico stendardo è stata presente sin dalla sua nascita" #OLD ITA
 caliphate_desc: "The #italic Ḵilāfa#!, or Caliphate, is the union of all $muslim_ADJ$ faithful under a single ruler in the form of the $rank_empire_muslim_ruler_male$, who is to be the political and spiritual successor of Muḥammad, peace be upon him. Although there are different ideas about who is eligible to be $rank_empire_muslim_ruler_male$, the idea of all $muslim$ united under a single banner has always been the primary focus of this process." #NEW
 #caliphate_desc: "The Ḵilāfa or Caliphate is the union of all $muslim_ADJ$ faithful under a single ruler in the form of the $rank_empire_muslim_ruler_male$, who is to be the successor of Muḥammad, peace be upon him, both politically and spiritually. Although there are differences on who should be eligible to be $rank_empire_muslim_ruler_male$, the idea of all $muslim$ united under a single banner has been present since its inception" #OLD ENG
 ibadi_imamate: "Imamato $ibadi_ADJ$"
 #ibadi_imamate_desc: "Diverso dall'idea del $caliphate$ o dell'Imām $shia_ADJ$ nominato divinamente, un Imām $ibadi_ADJ$ non è tenuto a governare sull'interezza del mondo $muslim_ADJ$. Invece, ogni comunità dovrebbe essere capace di essere governata indipendentemente dal proprio Imām." #OLD ITA
 ibadi_imamate_desc: "Unlike the $caliphate$ or a divinely appointed $shia_ADJ$ Imām, an $ibadi_ADJ$ Imām does not rule over the entirety of the $muslim_ADJ$ world, but instead governs locally. Every community can be ruled independently by its own Imām." #NEW
 #ibadi_imamate_desc: "Different from the idea of the $caliphate$ or the divinely appointed $shia_ADJ$ Imām, an $ibadi_ADJ$ Imām is not required to rule over the entirety of the $muslim_ADJ$ world. Instead, every community should be capable of being ruled independently by their own Imām." #OLD ENG
 contacts_network: "Rete di Contatti"
 #contacts_network_desc: "La diffusione dell'$muslim$ su un territorio molto vasto ha permesso ai paesi $muslim_ADJ$ il contatto con molte terre lontane diverse. Mantenere una rete di contatti così ricca è sempre benefico nella sfera diplomatica." #OLD ITA
 contacts_network_desc: "The extensive reach of $muslim$ has brought $muslim_ADJ$ countries in contact with many different foreign lands. Maintaining a rich network of international contacts such as ours is always beneficial for diplomacy." #NEW
 #contacts_network_desc: "The spread of $muslim$ over a very vast territory has allowed $muslim_ADJ$ countries contact with many different faraway lands. Maintaining such a rich network of contacts is always beneficial on the diplomatic sphere." #OLD ENG
 infiltration_tactics: "Tattiche di Infiltrazione"
 #infiltration_tactics_desc: "Sebbene l'antico ordine $shia_ADJ$ $nizari_school$ degli Ḥashshāshīyīn sia stato in gran parte mitizzato oltre il loro scopo originale, è innegabile che le loro tattiche di sotterfugio e assassinio fossero efficaci. Se impieghiamo noi stessi tali tattiche di infiltrazione possiamo anche beneficiare dello stesso successo." #OLD ITA
 infiltration_tactics_desc: "Although the ancient $nizari_school$ $shia_ADJ$ order of the #italic Ḥashshāshīyīn#! has been largely mythicized beyond their original scope, their tactics of subterfuge and assassination were undeniably effective. If we employ such infiltration tactics ourselves, we should benefit from the same success." #NEW
 #infiltration_tactics_desc: "Although the ancient $nizari_school$ $shia_ADJ$ order of the Ḥashshāshīyīn has been largely mythicized beyond their original scope, it is undeniable that their tactics of subterfuge and assassination were effective. If we employ such infiltration tactics ourselves we are also to benefit from the same success." #OLD ENG
 unified_armies: "Eserciti Unificati"
 #unified_armies_desc: "È innegabile che l'$muslim$ si sia diffuso in molte culture e popoli diversi dalla sua emersione in $arabia_region$. Finché credono in $muslim_god_name$, qualsiasi persona dovrebbe essere in grado di combattere nel suo nome, indipendentemente dalla loro origine." #OLD ITA
 unified_armies_desc: "It cannot be denied that $muslim$ has spread to many different cultures and peoples since its emergence in $arabia_region$. As long as they believe in $muslim_god_name$, any person should be able to fight in His name, regardless of their origin." #NEW
 #unified_armies_desc: "It is undeniable that $muslim$ has spread to many different cultures and peoples since its emergence in $arabia_region$. As long as they believe in $muslim_god_name$, any person should be able to fight in His name, regardless of their origin." #OLD ENG
 harsh_environments: "Ambienti Ostili"
 #harsh_environments_desc: "L'$muslim$ si è diffuso sin dalla sua nascita attraverso alcuni degli ambienti più ostili del mondo. Gli infedeli troverebbero sempre difficile quando vengono a combattere sulle nostre terre alle nostre condizioni." #OLD ITA
 harsh_environments_desc: "$muslim$ has, since its inception, found its way to civilizations in some of the harshest environments of the world. If anyone from outside our region tries to invade our territories, they will find it fiendishly difficult — as they should!" #NEW
 #harsh_environments_desc: "$muslim$ has since its inception spread through some of the harshest environments of the world. Infidels would always find it difficult when they come to fight on our lands under or own terms." #OLD ENG
 
 #Buddhism
 four_noble_truths: "Quattro Nobili Verità"
 #four_noble_truths_desc: "L'origine e il fondamento degli insegnamenti del Buddha, le $four_noble_truths$ sono una spiegazione della realtà dell'essere. Nulla è permanente, causando dolore allo spirito a causa del suo attaccamento a questa esistenza transitoria. Questo dolore può essere alleviato solo liberandosi e lasciando andare questi attaccamenti, il che si raggiunge seguendo il $noble_eightfold_path$." #OLD ITA
 four_noble_truths_desc: "The foundational teachings of the Buddha, the $four_noble_truths$ explain the reality of being. Nothing is permanent, which causes pain to the spirit, due to its attachment to this transient existence. This spiritual pain can only be eased by liberating oneself from desire and letting go of these attachments, which is achieved by following the $noble_eightfold_path$." #NEW
 #four_noble_truths_desc: "The origin and foundation of the teachings of the Buddha, the $four_noble_truths$ are an explanation of the reality of the being. Nothing is permanent, causing pain to the spirit due to its attachment to this transient existence. This pain can only be eased by liberating oneself and letting go of these attachments, which is achieved by following the $noble_eightfold_path$." #OLD ENG
 noble_eightfold_path: "Nobile Ottuplice Sentiero"
 #noble_eightfold_path_desc: "Riassunto come il sentiero verso la liberazione dal Saṃsāra e verso il Nirvāṇa, il $noble_eightfold_path$ è la distillazione delle pratiche $buddhist_ADJ$. Dettando sia lo stato mentale che le azioni fisiche, determina il comportamento di qualsiasi seguace del $buddhist$." #OLD ITA
 noble_eightfold_path_desc: "The path to being liberated from Saṃsāra and achieving Nirvāṇa, the $noble_eightfold_path$ is the purest distillation of $buddhist_ADJ$ practices. Dictating both one's mental state and physical actions, it determines proper comportment for any follower of $buddhist$." #NEW
 #noble_eightfold_path_desc: "Summarized as the path to liberation from Saṃsāra and towards Nirvāṇa, the $noble_eightfold_path$ is the distillation of $buddhist_ADJ$ practices. Dictating both the mental state and the physical actions, it determines the behavior of any follower of $buddhist$." #OLD ENG
 middle_way: "Via di Mezzo"
 #middle_way_desc: "Il Buddha ci insegna che dovremmo evitare gli estremi, poiché né con l'indulgenza sensoriale né con l'ascetismo estremo si può raggiungere l'illuminazione." #OLD ITA
 middle_way_desc: "The Buddha teaches us that we should avoid extremes, as neither with sensual indulgence nor extreme asceticism can one achieve enlightenment." #NEW
 #middle_way_desc: "The Buddha teaches us that we should avoid the extremes, as neither with sensual indulgence nor extreme asceticism can one achieve enlightenment." #OLD ENG
 three_jewels: "Tre Gioielli"
 #three_jewels_desc: "I $three_jewels$ o Tre Rifugi sono i tre supporti in cui un seguace del $buddhist$ prende rifugio. Questi rifugi sono il #italic Buddha#!, l'illuminato; il #italic Dharma#!, gli insegnamenti del Buddha; e il #italic Saṃgha#!, la comunità monastica che preserva il Dharma." #OLD ITA
 three_jewels_desc: "The $three_jewels$, or Three Refuges, are the three supports in which a follower of $buddhist$ takes refuge. These refuges are the #italic Buddha#!, the enlightened one; the #italic Dharma#!, the teachings of the Buddha; and the #italic Saṃgha#!, the monastic community that preserves the Dharma." #NEW
 #three_jewels_desc: "The $three_jewels$ or Three Refuges are the three supports in which a follower of $buddhist$ takes refuge. These refuges are the #italic Buddha#!, the enlightened one; the #italic Dharma#!, the teachings of the Buddha; and the #italic Saṃgha#!, the monastic community that preserves the Dharma." #OLD ENG
 buddhist_syncretism: "Sincretismo $buddhist_ADJ$"
 #buddhist_syncretism_desc: "Sebbene si sia diffuso lontano e ampiamente, il $buddhist$ ha le sue origini in $india$, ed è entrato in contatto con molte credenze diverse. Per questo, contiene molto sincretismo non solo con le precedenti tradizioni $hindu_ADJ$ ma con le molte divinità a cui è stato esposto." #OLD ITA
 buddhist_syncretism_desc: "$buddhist$ has its origins in $india$, but it has since spread far and wide, coming in contact with many different beliefs. As such, it contains much syncretism not only with the previous $hindu_ADJ$ traditions, but with the many other deities it has been exposed to." #NEW
 #buddhist_syncretism_desc: "Although it has spread far and wide, $buddhist$ has its origins in $india$, and it has come in contact with many different beliefs. As such, it contains much syncretism not only with the previous $hindu_ADJ$ traditions but with the many deities it has been exposed to." #OLD ENG
 sutra: "Sūtra"
 #sutra_desc: "Un tipo di testo sacro sia nelle religioni $dharmic_ADJ$ che $buddhist_ADJ$, sono vari nel formato e nel contenuto. Indipendentemente da ciò, sono sempre considerati una fonte di conoscenza e un loro studio appropriato è richiesto se si vuole sviluppare il proprio spirito." #OLD ITA
 sutra_desc: "A type of sacred text in both $dharmic_ADJ$ and $buddhist_ADJ$ religions, they vary in format and content. Regardless, they are always considered to be valid sources of knowledge, and proper study of them is required if one is to develop their spirit." #NEW
 #sutra_desc: "A type of sacred text in both $dharmic_ADJ$ and $buddhist_ADJ$ religions, they are varied in format and content. Regardless, they are always considered to be a source of knowledge and proper study of them is required if one is to develop their spirit." #OLD ENG
 buddhist_councils: "Concili $buddhist_ADJ$"
 #buddhist_councils_desc: "Sin dalla morte di Siddhārtha Gautama, numerosi concili hanno avuto luogo tra le comunità monastiche per discutere i testi dei diversi canoni. Sebbene i resoconti dei concili specifici possano variare da scuola a scuola, il potere coesivo di un tale concilio dovrebbe essere innegabile." #OLD ITA
 buddhist_councils_desc: "Throughout $buddhist_ADJ$ history, monastic councils have discussed canonical texts across different schools. Although the specific form, outcomes, and records of the councils may vary from school to school, the unifying power of such councils — bringing diverse traditions into dialogue — should not be underestimated." #NEW
 #buddhist_councils_desc: "Ever since the death of Siddhārtha Gautama, numerous councils have been taken place among the monastic communities to discuss the texts of the different canons. Although the records of the specific councils may vary from school to school, the cohesive power of such a council should be undeniable." #OLD ENG
 buddhist_canon: "Canone $buddhist_ADJ$"
 #buddhist_canon_desc: "Ricevendo nomi diversi e contenendo anche testi diversi a seconda del ramo del $buddhist$, il $buddhist_canon$ è la collezione di scritture sacre del $buddhist$. Dalle regole monastiche ai #italic Sūtra#! o insegnamenti del Buddha, qualsiasi persona dedicata al $buddhist$ dovrebbe essere familiare con essi." #OLD ITA
 buddhist_canon_desc: "Called different names and even containing different texts, depending on the branch of $buddhist$, the $buddhist_canon$ is a collection of sacred $buddhist_ADJ$ texts. Containing everything from monastic rules to #italic Sūtra#!, or teachings of the Buddha, any person dedicated to $buddhist$ should be familiar with them." #NEW
 #buddhist_canon_desc: "Receiving different names and also containing different texts depending on the branch of $buddhist$, the $buddhist_canon$ is the collection of sacred scriptures of $buddhist$. From monastic rules to #italic Sūtra#! or teachings of the Buddha, any person dedicated to $buddhist$ should be familiar with them." #OLD ENG
 pali_canon: "Canone $pali_language$"
 #pali_canon_desc: "Sebbene ci siano molti canoni diversi nel $buddhist$ a seconda della scuola, il $pali_canon$ $theravada_ADJ$ è il più antico e prestigioso. Altre scuole hanno creato i loro canoni con un mix di testi da varie fonti, mentre il $pali_canon$ è rimasto immutato dai tempi di Ashoka 'il Grande', e contiene le parole dello stesso Buddha. Ha anche servito come base o riferimento per molte altre scuole." #OLD ITA
 pali_canon_desc: "Although there are many different canons in $buddhist$, depending on the school, the $theravada_ADJ$ $pali_canon$ is the oldest and most prestigious. Other schools have created their canons from a mix of texts with various sources, but the $pali_canon$ has remained unchanged since the times of Ashoka 'the Great', and contains the words of the Buddha himself. It has also served as the foundation of many other schools." #NEW
 #pali_canon_desc: "Although there are many different canons in $buddhist$ depending on the school, the $theravada_ADJ$ $pali_canon$ is the oldest and most prestigious. Other schools have created their canons with a mix of texts from various sources, while the $pali_canon$ has remained unchanged since the times of Ashoka 'the Great', and contains the words of the Buddha himself. It has also served as basis or reference for many other schools." #OLD ENG
 buddhist_universities: "Università $buddhist_ADJ$"
 #buddhist_universities_desc: "Sin dall'antichità, i centri $buddhist_ADJ$ sono stati anche centri di apprendimento e conoscenza, attirando persone da ogni dove per imparare dentro le loro mura. Nālandā fu il più grande di questi centri nell'antico passato, ma molti altri hanno seguito la sua scia da allora." #OLD ITA
 buddhist_universities_desc: "Since antiquity, $buddhist_ADJ$ centers have also been hubs of learning and knowledge, attracting people from all over to study in our institutions. Nālandā was the biggest of these centers in the past, but many others have followed in its footsteps since." #NEW
 #buddhist_universities_desc: "Since antiquity, $buddhist_ADJ$ centers have also been centers of learning and knowledge, attracting people from all over to learn inside their walls. Nālandā was the biggest of these centers in the ancient past, but many other have followed in its wake since." #OLD ENG
 xuanzang_travels: "Viaggi di Xuánzàng"
 #xuanzang_travels_desc: "Xuánzàng, un monaco $buddhist_ADJ$ $chinese_group$ durante la dinastia Táng nel VII secolo, intraprese un viaggio via terra di 17 anni in $india$ per visitare i centri di apprendimento e raccogliere una grande quantità di testi $buddhist$. Visitò tra gli altri luoghi Nālandā, dove imparò dai migliori maestri, e al suo ritorno in $china$ portò con sé più di mille documenti, che diedero un grande contributo al $mahayana$. Il suo viaggio e i suoi resoconti servirono come base per il racconto di #italic Viaggio in Occidente#!, in cui un monaco è incaricato dal Buddha di viaggiare in $india$ in cerca di alcuni testi sacri accompagnato tra gli altri dal Re Scimmia Sūn Wùkōng." #OLD ITA
 xuanzang_travels_desc: "Xuánzàng, a $chinese_group$ $buddhist_ADJ$ monk who lived during the Táng dynasty in the 7th century, embarked on a seventeen-year overland trip to $india$ in order to visit it centers of learning and to gather a great number of $buddhist$ texts. Among other places he visited Nālandā, where he learned from the best masters, and on his return to $china$ he brought with him more than a thousand documents, which made a great contribution to $mahayana$. His trip and his records served as basis for the tale of #italic Journey to the West#!, in which a monk is tasked by the Buddha to travel to $india$ in search of some holy texts. accompanied among others by the Monkey King, Sūn Wùkōng." #NEW
 #xuanzang_travels_desc: "Xuánzàng, a $chinese_group$ $buddhist_ADJ$ monk during the Táng dynasty in the 7th century, embarked on a 17-years overland trip to $india$ in order to visit the centers of learning and gather a great amount of $buddhist$ texts. He visited among other places Nālandā, where he learned from the best masters, and in his return to $china$ he brought with him more than a thousand documents, which made a great contribution to $mahayana$. His trip and his records served as basis for the tale of #italic Journey to the West#!, in which a monk is tasked by the Buddha to travel to $india$ in search of some holy texts accompanied among others by the Monkey King Sūn Wùkōng." #OLD ENG
 silk_road_transmission: "Trasmissione della Via della Seta"
 #silk_road_transmission_desc: "È innegabile l'effetto che la Via della Seta ha avuto per la diffusione del $buddhist$. Sia attraverso le rotte terrestri che attraverso la Via della Seta Marittima, il commercio ha permesso al $buddhist$ di raggiungere molto più lontano della sua fonte originale in $india$." #OLD ITA
 silk_road_transmission_desc: "It is undeniable the effect that the Silk Road has had on the spread of $buddhist$. Whether via land or sea, trade has allowed $buddhist$ to spread far from its origins in $india$." #NEW
 #silk_road_transmission_desc: "It is undeniable the effect that the Silk Road has had for the spread of $buddhist$. Whereas via the land routes or through the Maritime Silk Road, trade has allowed $buddhist$ to reach much further than its original source in $india$." #OLD ENG
 bodhisattva: "Bodhisattva"
 #bodhisattva_desc: "Indipendentemente dalla scuola, un $bodhisattva$ è una figura importante, sebbene le caratteristiche esatte e l'importanza che hanno possano variare tra le diverse scuole. Tuttavia, in tutti i casi sono esseri meritevoli di riverenza e ammirazione." #OLD ITA
 bodhisattva_desc: "Regardless of the school of $buddhist$ one adheres to, a $bodhisattva$ is an important figure, although their exact characteristics and importance vary between the different traditions. In all cases, however, they are deserving of reverence and admiration." #NEW
 #bodhisattva_desc: "Regardless of the school, a $bodhisattva$ is an important figure, although the exact characteristics and importance they have may vary among the different schools. However, in all cases they are being deserving of reverence and admiration." #OLD ENG
 avalokitesvara: "Avalokiteśvara"
 avalokitesvara_desc: "Conosciuto anche come Guānyīn o Kannon, $avalokitesvara$ è uno dei Bodhisattva più riveriti. Rappresentato come maschio o femmina a seconda della scuola, e persino in alcune considerato l'origine di tutte le divinità $hindu_ADJ$, $avalokitesvara$ è il $bodhisattva$ della compassione, ed è associato al mantra #italic Oṃ maṇi padme hūm̐#!."
 maitreya: "Maitreya"
 maitreya_desc: "$maitreya$ è attualmente un $bodhisattva$, profetizzato per essere il futuro e ultimo Buddha dell'era attuale. Il suo destino è ristabilire gli insegnamenti del Dharma nel mondo dopo che sono stati dimenticati dall'umanità, e per questo è il successore di Siddhārtha Gautama."
 mount_meru: "Monte Meru"
 #mount_meru_desc: "$mount_meru$ è la montagna sacra al centro dell'universo sia in senso fisico che spirituale per l'$hindu$, il $buddhist$ e il $jain$. Come è il centro attorno al quale tutto il resto ruota, così tutto il nostro paese ruota attorno al nostro governante." #OLD ITA
 mount_meru_desc: "$mount_meru$ is the sacred mountain at the center of the universe in both the physical and spiritual sense for $hindu$, $buddhist$, and $jain$. As it is the center around which everything else revolves, so does our entire country revolve around our ruler." #NEW
 #mount_meru_desc: "$mount_meru$ is the sacred mountain at the center of the universe in both the physical and spiritual sense for $hindu$, $buddhist$, and $jain$. As it is the center around which everything else revolves, so is all our country revolving around our ruler." #OLD ENG
 naraka: "Naraka"
 #naraka_desc: "Chiamato anche Niraya, $naraka$ si riferisce ai regni della sofferenza per purificare il proprio cattivo karma prima di essere reincarnati. Ci sono molti regni $naraka$, e sia il tempo che un individuo deve risiedere in essi che le sofferenze che riceveranno mentre lo fanno dipenderanno dalla quantità di karma che devono guadagnare per rinascere in uno dei regni superiori." #OLD ITA
 naraka_desc: "Also called #italic Niraya#!, $naraka$ refers to the realms of suffering where one's bad karma is cleansed before being reincarnated. There are many $naraka$ realms, and both the time an individual must reside in them and the punishments they will receive while doing so depends on how much karma they need to gain before being reborn in one of the upper realms." #NEW
 #naraka_desc: "Also called Niraya, $naraka$ refers to the realms of suffering to cleanse one's bad karma before being reincarnated. There are many $naraka$ realms, and both the time an individual must reside in them and the sufferings they will receive while doing so will depend on the amount of karma they need to gain to be reborn in one of the upper realms." #OLD ENG
 four_heavenly_kings: "Quattro Re Celesti"
 #four_heavenly_kings_desc: "Ciascuno presiedendo una delle direzioni cardinali, i $four_heavenly_kings$ sono incaricati di proteggere il regno Deva dagli Asura. Sono anche responsabili di controllare la virtù e la moralità tra i mortali." #OLD ITA
 four_heavenly_kings_desc: "Each presiding over one of the cardinal directions, the $four_heavenly_kings$ are in charge of protecting the Deva realm from the Asuras. They are also responsible for assessing the virtue and morality of mortals." #NEW
 #four_heavenly_kings_desc: "Each one presiding one of the cardinal directions, the $four_heavenly_kings$ are in charge of protecting the Deva realm from the Asuras. They are also responsible for checking for virtue and morality among the mortals." #OLD ENG
 vegetarianism: "Vegetarianismo"
 #vegetarianism_desc: "Sebbene variando a seconda della scuola, ci sono alcune regole nel Dharma per l'astinenza dal mangiare carne. Ogni scuola avrà regole diverse sulla severità di questa astinenza, e anche se debba applicarsi solo alla comunità monastica o alla popolazione in generale." #OLD ITA
 vegetarianism_desc: "Although it depends on the school, there are some rules in the Dharma regarding abstinence from meat consumption. Each school has different views about the strictness of this abstinence, and also whether it should apply only to the monastic community or to the population in general." #NEW
 #vegetarianism_desc: "Although varying depending on the school, there are some rules in the Dharma for the abstinence of eating meat. Each school will have different rules on the strictness of this abstinence, and also whether it should apply only to the monastic community or to the population in general." #OLD ENG
 edicts_of_ashoka: "Editti di Ashoka"
 #edicts_of_ashoka_desc: "Un codice legale pubblicato dall'Imperatore Ashoka 'il Grande' nel III secolo a.C., includono la promozione del $buddhist$. Sebbene qualcosa di molti secoli fa, è ancora meritevole di grande rispetto e riverenza da qualsiasi fedele $buddhist_ADJ$." #OLD ITA
 edicts_of_ashoka_desc: "A legal code published by Emperor Ashoka 'the Great' in the 3rd century BCE, these edicts include strictures promoting for $buddhist$. Although this code is from many centuries ago, it still deserves respect and reverence from any member of the $buddhist_ADJ$ faithful." #NEW
 #edicts_of_ashoka_desc: "A legal code published by Emperor Ashoka 'the Great' in the 3rd century BCE, they include the promotion of $buddhist$. Although something from many centuries ago, it is still deserving of great respect and reverence from any $buddhist_ADJ$ faithful." #OLD ENG
 five_precepts: "Cinque Precetti"
 #five_precepts_desc: "Servendo come base dell'etica $buddhist_ADJ$ e del codice di moralità, i $five_precepts$ rappresentano le regole più basilari che qualsiasi persona deve seguire nel $buddhist$, sia parte della comunità monastica ordinata o meno. Istruiscono le persone ad astenersi dall'uccidere, rubare, cattiva condotta sessuale, mentire e intossicazione." #OLD ITA
 five_precepts_desc: "The foundational code of $buddhist_ADJ$ ethics and morality, the $five_precepts$ represent the most basic rules believers must follow in $buddhist$, whether part of the ordained monastic community or not. They instruct people to abstain from killing, stealing, sexual misconduct, lying, and intoxication." #NEW
 #five_precepts_desc: "Serving as a basis of $buddhist_ADJ$ ethics and morality code, the $five_precepts$ represent the most basic rules that any person must follow in $buddhist$, whereas part of the ordained monastic community or not. They instruct people to abstain from killing, stealing, sexual misconduct, lying, and intoxication." #OLD ENG
 monastic_communities: "Comunità Monastiche"
 #monastic_communities_desc: "Il centro della vita $buddhist_ADJ$ sono le sue comunità di monaci e monache, chiamate #italic Saṃgha#!. Sono governate dal #italic Vinaya#!, le regole e i precetti che dettano le vite di qualsiasi comunità monastica $buddhist_ADJ$." #OLD ITA
 monastic_communities_desc: "$buddhist_ADJ$ life is centered around its communities of monks and nuns, called the #italic Saṃgha#!. They are governed by the #italic Vinaya#!, the rules and precepts that dictate the operations of any $buddhist_ADJ$ religious community." #NEW
 #monastic_communities_desc: "The center of $buddhist_ADJ$ life is its communities of monks and nuns, called the #italic Saṃgha#!. They are governed by the #italic Vinaya#!, the rules and precepts that dictate the lives of any $buddhist_ADJ$ monastic community." #OLD ENG
 prestigious_schools: "Scuole Prestigiose"
 #prestigious_schools_desc: "Il $buddhist$ si è sviluppato in una miriade di scuole, ognuna centrata attorno a un tipo di comunità monastica e dichiarando preferenza su certi testi. Tuttavia, alcune di queste scuole hanno guadagnato più riconoscimento, mentre altre sono state relegate all'oscurità. Associandosi con le più prestigiose, le persone possono ricevere un riflesso di quell'apprezzamento." #OLD ITA
 prestigious_schools_desc: "$buddhist$ has developed into a myriad of schools, each one centered around one type of monastic community and declaring a preference for certain texts. However, some of these schools have gained recognition, while others have been relegated to obscurity. Associating with the more prestigious schools gives those people a bit of prestige as well." #NEW
 #prestigious_schools_desc: "$buddhist$ has developed into a myriad of schools, each one centered around one type of monastic community and declaring preference over certain texts. However, some of these schools have gained more recognition, while others have been relegated to obscurity. By associating with the most prestigious ones, people can receive a reflection of that appreciation." #OLD ENG
 offerings: "Offerte"
 #offerings_desc: "È un precetto del $buddhist$ fare offerte ai $three_jewels$ per accumulare merito. Queste offerte possono essere materiali o non materiali, e alcune delle comunità monastiche dipendono dal cibo dato dai loro seguaci per la loro sopravvivenza." #OLD ITA
 offerings_desc: "It is a precept of $buddhist$ to make offerings to the $three_jewels$ in order to accumulate merit. These offerings may be material or non-material, and some monastic communities depend completely on food donated by their followers for their survival." #NEW
 #offerings_desc: "It is a precept of $buddhist$ to make offerings to the $three_jewels$ to accumulate merit. These offerings may be material or non-material, and some of the monastic communities depend on the food given by their followers for their survival." #OLD ENG
 incense_burning: "Bruciare Incenso"
 #incense_burning_desc: "La pratica di bruciare incenso è un pilastro di qualsiasi rituale o offerta $buddhist_ADJ$. Variando in forme e aspetti, è comune sia per i laici che per i monaci e le monache ordinati accendere incenso prima di eseguire qualsiasi rituale o meditazione. Per questo, l'odore dell'incenso permea costantemente qualsiasi tempio $buddhist_ADJ$." #OLD ITA
 incense_burning_desc: "The practice of burning incense is a staple of any $buddhist_ADJ$ ritual or offering. Varying in shapes and forms, it is common for both lay people and ordained monks and nuns alike to light incense before performing any ritual or meditation. As such, the smell of incense constantly permeates any $buddhist_ADJ$ temple." #NEW
 #incense_burning_desc: "The practice of burning incense is a staple of any $buddhist_ADJ$ ritual or offering. Varying in shapes and forms, it is common for both lay people and ordered monks and nuns to light incense before performing any ritual or meditation. As such, the smell of incense constantly permeates any $buddhist_ADJ$ temple." #OLD ENG
 ascetic_practices: "Pratiche Ascetiche"
 #ascetic_practices_desc: "Sebbene il Buddha ci abbia avvertito dei pericoli dell'ascetismo estremo, alcuni tra la comunità monastica praticano ancora alcune pratiche ascetiche. Limitare il tipo di stoffa che possono indossare, il cibo che possono mangiare o dove possono vivere sono alcune delle azioni eseguite da coloro che vogliono percorrere questo sentiero che, sebbene non sia un requisito per l'ottenimento del merito, ha ancora i suoi benefici per il praticante." #OLD ITA
 ascetic_practices_desc: "Although the Buddha warned us about the dangers of extreme asceticism, some among the monastic community still perform these strict practices. Limiting the type of cloth they can wear, the food they can eat, or where they can live are some of the restrictions adopted by those who wish to walk this path. Although such abstemious behavior is not a requirement for obtaining merit, it has its own benefits for the practitioner." #NEW
 #ascetic_practices_desc: "Although the Buddha warned us about the dangers of extreme asceticism, some among the monastic community still perform some ascetic practices. Limiting the type of cloth they can wear, the food they can eat or where they can live are some of the actions performed by those wanting to walk this path which, although not a requirement for the obtaining of merit, does still have its own benefits for the practitioner." #OLD ENG
 mindfulness: "Consapevolezza"
 #mindfulness_desc: "Una delle parti essenziali della pratica del $buddhist$, la $mindfulness$ significa essere consapevoli dei fenomeni sia del corpo che della mente, mantenendo presenti gli insegnamenti del Buddha. Con questo, si possono evitare l'insorgere di stati indesiderati e svilupparsi in quelli desiderati." #OLD ITA
 mindfulness_desc: "An essential part of $buddhist_ADJ$ practice, $mindfulness$ means to be aware of the phenomena of both body and mind, while keeping the teachings of the Buddha always present in the mind. With this, one can avoid the arising of unwanted states, and develop into the wanted ones." #NEW
 #mindfulness_desc: "One of the essential parts of the practice of $buddhist$, $mindfulness$ means to be aware of the phenomena of both body and mind, while keeping present the teachings of the Buddha. With this, one can avoid the arising of unwanted states and develop into the wanted ones." #OLD ENG
 dana: "Dāna"
 dana_desc: "Denotando generosità, $dana$ è definito come l'atto di dare senza nulla in cambio, ed è una virtù chiave in tutte le religioni legate al Dharma. Aiutare gli altri disinteressatamente, sia individualmente che comunitariamente, è uno dei modi chiave per accumulare karma."
 ahimsa: "Ahiṃsā"
 ahimsa_desc: "Il concetto di $ahimsa$, o non-violenza, è una virtù chiave tra tutte le religioni che seguono il Dharma. Qualsiasi conflitto è incoraggiato ad essere risolto pacificamente attraverso il dialogo, piuttosto che l'uso della forza. Sfortunatamente, questo non è sempre possibile, ma la violenza dovrebbe sempre essere l'ultima risorsa, e il suo uso deve essere giusto."
 resistance_to_persecution: "Resistenza alla Persecuzione"
 #resistance_to_persecution_desc: "Sebbene si sia diffuso in un'area ampia, il $buddhist$ ha anche visto la sua giusta dose di persecuzione attraverso le epoche. I suoi templi e immagini distrutti, i suoi seguaci massacrati o costretti a nascondersi, ma nonostante ciò le sue credenze sono continuate forti." #OLD ITA
 resistance_to_persecution_desc: "Although it has spread widely throughout the world, $buddhist$ has also seen its fair share of persecution across the ages. Its temples and images may have been destroyed, its followers slaughtered or forced into hiding, but nonetheless its faithful have persevered." #NEW
 #resistance_to_persecution_desc: "Although it has spread to a wide area, $buddhist$ has also seen its fare share of persecution across the ages. Its temples and images destroyed, its followers slaughtered or forced into hiding, but nonetheless its beliefs have continued strong." #OLD ENG
 buddhist_meditation: "Meditazione $buddhist_ADJ$"
 #buddhist_meditation_desc: "Una pratica comune tra tutti i seguaci $buddhist_ADJ$ indipendentemente dalla loro scuola è quella della meditazione. In essa, l'obiettivo è addestrare la mente e lo spirito per sviluppare consapevolezza, tranquillità e intuizione, e così raggiungere l'illuminazione." #OLD ITA
 buddhist_meditation_desc: "Meditation is a common practice among all $buddhist_ADJ$ followers, regardless of their school. The aim is to train the mind and the spirit to develop mindfulness, tranquility, and insight, and thus ultimately achieve enlightenment." #NEW
 #buddhist_meditation_desc: "A common practice among all $buddhist_ADJ$ followers regardless of their school is that of meditation. In it, the aim is to train the mind and the spirit to develop mindfulness, tranquility and insight, and thus achieve enlightenment." #OLD ENG
 
 #Hinduism
 sruti: "Śruti"
 #sruti_desc: "Significando 'ciò che è udito', gli $sruti$ sono i testi più antichi e sacri dell'$hindu$. Sono considerati una rivelazione divina e quindi non attribuiti ad autore umano, sebbene alcuni neghino la loro origine divinapur accettando ancora la loro autorità." #OLD ITA
 sruti_desc: "Meaning 'that which is heard', $sruti$ are the holiest and most ancient texts of $hindu$. They are considered to be a divine revelation and thus not attributed to human authorship, although some deny their divine origin while still accepting their authority." #NEW
 #sruti_desc: "Meaning 'that which is heard', $sruti$ are the most ancient and holiest texts of $hindu$. They are considered to be a divine revelation and thus not attributed to human authorship, although some deny their divine origin while still accepting their authority." #OLD ENG
 vedah: "Vēdaḥ"
 #vedah_desc: "I testi principali tra gli $sruti$ sono i $vedah$, che sono i più antichi testi in $sanskrit_language$. La loro paternità attribuita a Brahmā nel $mahabarata$, sono il Ṛgveda, lo Yajurveda, il Sāmaveda e l'Atharvaveda." #OLD ITA
 vedah_desc: "The main texts among the $sruti$ are the $vedah$, which are the oldest $sanskrit_language$ texts. Their authorship is attributed to Brahmā in the $mahabarata$, and they are the Ṛgveda, the Yajurveda, the Sāmaveda, and the Atharvaveda." #NEW
 #vedah_desc: "The main texts among the $sruti$ are the $vedah$, which are the oldest $sanskrit_language$ texts. Its authorship attributed to Brahmā in the $mahabarata$, they are the Ṛgveda, the Yajurveda, the Sāmaveda, and the Atharvaveda." #OLD ENG
 smrti: "Smṛti"
 #smrti_desc: "Significando 'ciò che è ricordato', i testi $smrti$ sono ispirati o originati dai $vedah$, e quindi sono considerati meno autorevoli degli $sruti$ per essere derivati da essi. Tuttavia, diversamente dagli $sruti$, i testi $smrti$ hanno paternità attribuita e sono trasmessi attraverso manoscritti." #OLD ITA
 smrti_desc: "Meaning 'that which is remembered', $smrti$ texts are inspired by or originated from the $vedah$, and thus are considered less authoritative than the $sruti$ due to being derived from them. However, unlike the $sruti$, the $smrti$ texts have attributed authorship and are transmitted through manuscripts." #NEW
 #smrti_desc: "Meaning 'that which is remembered', $smrti$ texts are inspired by or originated from the $vedah$, and thus are considered less authoritative than the $sruti$ due to being derivative from them. However, differently from the $sruti$, the $smrti$ texts have attributed authorship and are transmitted through manuscripts." #OLD ENG
 mahabarata: "Mahābhārata"
 mahabarata_desc: "Uno dei due maggiori testi $smrti$ insieme al $ramayana$, il $mahabarata$ è un'epica dell'antica $india$. È il poema epico più lungo mai scritto, circa dieci volte più grande dell'#italic Iliade#! e dell'#italic Odissea#! in $greek_language$ combinate, e narra la storia di una lotta dinastica per il trono dell'antico regno $indian_group$ di Kuru culminante nella Guerra di Kurukshetra, chiamata anche Guerra del $mahabarata$. La storia termina con la morte di $krishna_avatar$ e la fine della sua dinastia."
 ramayana: "Rāmāyaṇa"
 ramayana_desc: "Uno dei due maggiori testi $smrti$ insieme al $mahabarata$, il $ramayana$ è un'epica dell'antica $india$. Narra la vita di $rama_avatar$, avatar di $vishnu_god$, come principe del regno di Kosala. Enfatizza l'importanza della virtù in tutti gli aspetti della vita di qualcuno."
 purana: "Purāṇa"
 #purana_desc: "Considerati come parte degli $smrti$, i $purana$ sono testi di una varietà di contenuti. Cosmologia, genealogie divine, astronomia, grammatica, storie d'amore... quasi tutto è contenuto in essi. Per questo, anche se non fanno parte degli $sruti$, la loro influenza nelle credenze e nella società $hindu_ADJ$ è indiscutibile, combinando molte credenze e tradizioni locali diverse nella narrativa comune dei $vedah$." #OLD ITA
 purana_desc: "Considered part of the $smrti$, the $purana$ are texts with a variety of content. Cosmology, divine genealogies, astronomy, grammar, love stories... almost everything can be found within them. As such, even though they are not part of the $sruti$, their influence on $hindu_ADJ$ beliefs and society is strong, as they combine diverse local beliefs and traditions into the common narrative of the $vedah$." #NEW
 #purana_desc: "Considered as part of the $smrti$, the $purana$ are texts of a variety of contents. Cosmology, divine genealogies, astronomy, grammar, love stories... almost everything is contained within them. As such, even though they are not part of the $sruti$, their influence in $hindu_ADJ$ beliefs and society is unquestionable, by combining many diverse local beliefs and traditions into the common narrative of the $vedah$." #OLD ENG
 atman: "Ātman"
 #atman_desc: "Riferito al vero ed eterno Sé immutabile, è l'essenza della coscienza di ogni individuo. Secondo le scuole $astika$, questo $atman$ è distinto dalla mente e dal corpo, ed è anche diverso dal Jivātman che persiste attraverso molteplici vite. Al contrario, le scuole $nastika$ interpretano il concetto diversamente, o lo rifiutano completamente." #OLD ITA
 atman_desc: "Referred to the true and eternal unchanging Self, it is the essence of each individual's consciousness. According to the $astika$ schools, this $atman$ is distinct from the mind and body, and it is also different from the Jivātman that persists across multiple lifetimes. In contrast, the $nastika$ schools interpret the concept differently, or reject it entirely." #NEW
 #atman_desc: "Referred to the true and eternal unchanging Self, it is the essence of the consciousness of each individual. According to the $astika$ schools, this $atman$ is distinct from the mind and body, and it is also different from the Jivātman that persists across multiple lifetimes. In contrast, the $nastika$ schools interpret the concept differently, or reject it entirely." #OLD ENG
 nastika_schools: "Scuole Nāstika"
 #nastika_schools_desc: "Alcune scuole di pensiero nell'$hindu$ si sono discostate dalle correnti principali, rifiutando l'autorità dei $vedah$ e l'esistenza dell'$atman$. Queste scuole, come il $jain$ e il $buddhist$, sono quindi eterodosse, sebbene contengano ancora molte delle credenze fondamentali condivise dell'$hindu$." #OLD ITA
 nastika_schools_desc: "Some schools of thought in $hindu$ deviate from the mainstream, rejecting the authority of the $vedah$ and the existence of $atman$. These schools, like $jain$ and $buddhist$, are thus heterodox, although they still contain many of the shared core beliefs of $hindu$." #NEW
 #nastika_schools_desc: "Some schools of thought in $hindu$ have deviated from the main currents, rejecting the authority of the $vedah$ and the existence of $atman$. These schools, like $jain$ and $buddhist$, are thus heterodox, although they still contain many of the shared core beliefs of $hindu$." #OLD ENG
 astika_schools: "Scuole Āstika"
 #astika_schools_desc: "Chiamate le scuole ortodosse dell'$hindu$, accettano l'autorità dei $vedah$ e l'esistenza dell'$atman$. Sebbene consistano in molte scuole diverse, questa comunanza di accettazione dà alle $astika_schools$ molto terreno comune." #OLD ITA
 astika_schools_desc: "Called the orthodox schools of $hindu$, they accept the authority of the $vedah$ and the existence of $atman$. Although consisting of many different branches, this commonality of acceptance gives the $astika_schools$ a lot of common ground." #NEW
 #astika_schools_desc: "Called the orthodox schools of $hindu$, they accept the authority of the $vedah$ and the existence of $atman$. Although consisting on many different schools, this commonality of acceptance gives the $astika_schools$ a lot of common ground." #OLD ENG
 diversity_of_beliefs: "Diversità di Credenze"
 #diversity_of_beliefs_desc: "Le credenze del popolo dell'$india$ si concentrano attorno al concetto di Dharma e al testo dei $vedah$, ma si manifestano in una miriade di forme e pratiche. Persino gli dei riconosciuti e adorati non sono gli stessi per tutti, ma un filo comune di concetti è presente ovunque." #OLD ITA
 diversity_of_beliefs_desc: "The beliefs of the people of $india$ center around the concept of Dharma and the text of the $vedah$, but they are manifested in a myriad of forms and practices. Even the gods recognized and worshiped are not the same for everyone, but a common thread of concepts is present throughout." #NEW
 #diversity_of_beliefs_desc: "The beliefs of the people of $india$ center around the concept of Dharma and the text of the $vedah$, but they are manifested in a myriad of forms and practices. Even the gods recognized and worshiped are not the same for everyone, but a common thread of concepts is present thorough." #OLD ENG
 ishvara: "Īśvara"
 #ishvara_desc: "Interpretato diversamente a seconda della scuola o ramo dell'$hindu$, $ishvara$ si riferisce all'Essere Supremo o Dio. Pertanto, può riferirsi a $shiva_god$ per lo $shaivism$, a $vishnu_god$ per il $vaishnavism$, o a qualsiasi Dio personale dell'individuo." #OLD ITA
 ishvara_desc: "Interpreted differently depending on the school or branch of $hindu$, $ishvara$ refers to the Supreme Being or God. Therefore, it can refer to $shiva_god$ for $shaivism$, to $vishnu_god$ for $vaishnavism$, or to any personal god of the individual." #NEW
 #ishvara_desc: "Interpreted differently depending on the school or branch of $hindu$, $ishvara$ refers to the Supreme Being or God. Therefore, it can refer to $shiva_god$ for $shaivism$, to $vishnu_god$ for $vaishnavism$, or to any personal God of the individual." #OLD ENG
 sanskritization: "Sanskritizzazione"
 #sanskritization_desc: "L'$hindu$ si è diffuso molto più lontano delle sue origini in $india$, e molte altre culture e paesi hanno adottato concetti e titoli in $sanskrit_language$ per riferirsi alla propria identità. Per questo, i concetti dell'$hindu$ sono stati facilmente permeando e fondendosi in credenze straniere." #OLD ITA
 sanskritization_desc: "$hindu$ has spread much farther than its origins in $india$, and many other cultures and countries have adopted $sanskrit_language$ concepts and titles to refer to their own identity. As such, the concepts of $hindu$ have seamlessly permeated and blended into foreign beliefs." #NEW
 #sanskritization_desc: "$hindu$ has spread much farther than its origins in $india$, and many other cultures and countries have adopted $sanskrit_language$ concepts and titles to refer to their own identity. As such, the concepts of $hindu$ have been easily permeating and blending into foreign beliefs." #OLD ENG
 bhakti_movement: "Movimento Bhakti"
 #bhakti_movement_desc: "Emerso nel VI secolo, promuove l'amore e la devozione al proprio Dio personale o verso un individuo illuminato. Inoltre, si rivolge alla popolazione principale parlando loro direttamente nei loro termini. Un movimento altamente influente, sta cambiando il modo in cui la religione e la credenza stessa sono sentite dalla popolazione." #OLD ITA
 bhakti_movement_desc: "Having emerged in the 6th century, this movement promotes love and devotion to one's personal god or towards an enlightened individual. It appeals to the lay population by speaking to them directly on their own terms. A highly influential movement, it is changing how religion and belief themselves are understood by our people." #NEW
 #bhakti_movement_desc: "Emerging in the 6th century, it promotes love and devotion to one's personal God or towards an enlightened individual. Also, it appeals to the main populace by speaking to them directly on their own terms. A highly influential movement, it is changing how religion and belief themselves are felt by the population." #OLD ENG
 yoga: "Yoga"
 #yoga_desc: "Una delle scuole e filosofie $hindu_ADJ$, lo $yoga$ è anche un insieme di pratiche sia fisiche che spirituali, con lo scopo di controllare la mente e il corpo. Praticato da millenni fa, è quasi diventato sinonimo del sentiero dell'illuminato." #OLD ITA
 yoga_desc: "A prominent $hindu_ADJ$ school and philosophy, $yoga$ is a set of practices both physical and spiritual, with the purpose of controlling the mind and body. Performed for millennia, it has almost become synonymous with the path of enlightenment." #NEW
 #yoga_desc: "One of the $hindu_ADJ$ schools and philosophies, $yoga$ is also a set of practices both physical and spiritual, with the purpose of controlling the mind and body. Performed since millennia ago, it has almost become synonym with the path of the enlightened one." #OLD ENG
 diwali: "Diwali"
 #diwali_desc: "Una festa della luce, durante il $diwali$ celebriamo il trionfo del Dharma, la vittoria del bene sul male e della luce sulle tenebre. Accenderemo candele e lanterne per simbolizzarlo, e onoreremo i nostri antenati." #OLD ITA
 diwali_desc: "Called the festival of light, $diwali$ is when we celebrate the triumph of the Dharma; the victory of good over evil and light over darkness. We will light candles and lanterns to symbolize this victory, and we will honor our ancestors." #NEW
 #diwali_desc: "A festival of light, during $diwali$ we celebrate the triumph of the Dharma, the victory of good over evil and light over darkness. We will light candles and lanterns to symbolize that, and we will honor our ancestors." #OLD ENG
 holi: "Holi"
 holi_desc: "Tenuto all'inizio della primavera per celebrare il suo arrivo, l'$holi$ è la festa dei colori e dell'amore. Commemoriamo l'agricoltura e i buoni raccolti, e allo stesso tempo godiamo della miriade di colori che la primavera offre. È anche il momento di divertirsi e risolvere conflitti, rimuovendo le proprie impurità emotive."
 holy_rivers: "Fiumi Sacri"
 #holy_rivers_desc: "I fiumi e la loro venerazione sono sempre stati una parte importante dell'$hindu$. Dall'Indo al Gange, ci sono molti fiumi considerati sacri, sulle cui rive si tengono molti rituali. Le loro acque sono considerate sacre, e rituali di purificazione su di esse sono comuni." #OLD ITA
 holy_rivers_desc: "Rivers and their veneration have always been an important part of $hindu$. From the Indus to the Ganges, there are many rivers considered holy, on the shores of which many rituals are held. Their waters are considered sacred, and they are a common site for purification rituals." #NEW
 #holy_rivers_desc: "Rivers and their veneration have always been an important part of $hindu$. From the Indus to the Ganges, there are many rivers considered holy, at the shores of which many rituals are held. Their waters are considered sacred, and purification rituals on them are common." #OLD ENG
 advaita_vedanta: "Advaita Vedānta"
 advaita_vedanta_desc: "Rifiutando il dualismo tra coscienza e materia, l'$advaita_vedanta$ afferma che l'$atman$, o il sé interiore o coscienza, è uno e lo stesso della realtà suprema o coscienza dell'universo, Brahman. In questo senso, il mondo materiale fisico è solo un'illusione che nasconde la realtà ultima del Brahman."
 hindu_muslim_relations: "Relazioni $hindu_ADJ$-$muslim_ADJ$"
 #hindu_muslim_relations_desc: "C'è stata molta interazione in passato tra $hindu$ e $muslim$, e continuerà ad esserci. I nostri popoli hanno imparato a vivere pacificamente insieme e persino un certo grado di sincretismo tra entrambe le fedi è avvenuto." #OLD ITA
 hindu_muslim_relations_desc: "There has been a lot of interaction in the past between $hindu$ and $muslim$, and there will continue to be so. Our peoples have learned to live peacefully together and there has even been some degree of syncretism between the two faiths." #NEW
 #hindu_muslim_relations_desc: "There has been a lot of interaction in the past between $hindu$ and $muslim$, and there will continue to be so. Our peoples have learned to live peacefully together and even some degree of syncretism between both faiths has occurred." #OLD ENG
 hindu_unification: "Unificazione $hindu_ADJ$"
 #hindu_unification_desc: "Nonostante le differenze nelle credenze e pratiche all'interno dell'$hindu$, ci sono più cose che ci uniscono che ci separano. Una visione comune unificata dell'$hindu$ ha iniziato a emergere, e il nostro popolo può guadagnare un grande senso di unità attraverso di essa." #OLD ITA
 hindu_unification_desc: "Despite the differences in beliefs and practices throughout $hindu$, there are more commonalities between us than differences. A common unified view of $hindu$ has started to emerge, and our people can gain a great sense of unity through it." #NEW
 #hindu_unification_desc: "Despite the differences in beliefs and practices inside $hindu$, there are more things uniting us than separating us. A common unified view of $hindu$ has started to emerge, and our people can gain a great sense of unity through it." #OLD ENG
 hindu_architecture: "Architettura $hindu_ADJ$"
 #hindu_architecture_desc: "Indipendentemente dallo stile di costruzione, che sia uno Śikhara, Vimāna o Prāṅg, i templi $hindu_ADJ$ sono distintivi ovunque per le loro alte torri decorate. Una rappresentazione del $mount_meru$, più o meno enfatizzata a seconda della regione, queste guglie servono sia come segnale che dimostrazione di potere." #OLD ITA
 hindu_architecture_desc: "Regardless of the style of construction, be it a Śikhara, Vimāna, or Prāṅg, $hindu_ADJ$ temples are recognizable everywhere for their tall, decorated towers. A representation of $mount_meru$, more or less emphasized depending on the region, these spires serve both as a signal of faith and a demonstration of power." #NEW
 #hindu_architecture_desc: "Regardless of the style of construction, be it a Śikhara, Vimāna, or Prāṅg, $hindu_ADJ$ temples are distinctive everywhere for their tall decorated towers. A representation of $mount_meru$, more or less emphasized depending on the region, these spires serve both as a signal and demonstration of power." #OLD ENG
 varna_system: "Sistema Varṇa"
 #varna_system_desc: "Dai tempi dei $vedah$, c'è stato il concetto del Dharma di un individuo classificato come una delle quattro possibilità: #italic Brāhmaṇa#!, studiosi o sacerdoti; #italic Kṣatriya#!, governanti o guerrieri; #italic Vaiśya#!, agricoltori o mercanti; o #italic Śūdra#!, artigiani o servitori. Queste classificazioni non sono strettamente rigide ma rappresentano invece l'ideale della vocazione di un individuo, ma sono state comunque molto influenti nella società $hindu_ADJ$." #OLD ITA
 varna_system_desc: "Since the times of the $vedah$, there has existed the concept of one's Dharma being classified as one of the four possibles: #italic Brāhmaṇa#!, scholars or priests; #italic Kṣatriya#!, rulers or warriors; #italic Vaiśya#!, farmers or merchants; or #italic Śūdra#!, artisans or servants. These classifications are not rigid, but instead represent the ideal of an individual's calling, and they have been very influential in $hindu_ADJ$ society." #NEW
 #varna_system_desc: "Since the times of the $vedah$, there has been the concept of the Dharma of an individual being classified as one of the four possibles: #italic Brāhmaṇa#!, scholars or priests; #italic Kṣatriya#!, rulers or warriors; #italic Vaiśya#!, farmers or merchants; or #italic Śūdra#!, artisans or servants. These classifications are not strictly rigid but instead represent the ideal of an individual's calling, but nonetheless have been very influential in $hindu_ADJ$ society." #OLD ENG
 extreme_pacifism: "Pacifismo Estremo"
 #extreme_pacifism_desc: "Basato sul concetto di $ahimsa$, l'$hindu$ sostiene sempre il pacifismo e la non-violenza. Tuttavia, i nostri nemici dovrebbero comunque stare attenti a non provocarci, per non finire a cadere verso l'estremo completamente opposto quando suscitati alla guerra." #OLD ITA
 extreme_pacifism_desc: "Based on the concept of $ahimsa$, $hindu$ always advocates for pacifism and nonviolence. However, our enemies should still be wary of provoking us, lest we end up exemplifying the complete opposite extreme when roused into war." #NEW
 #extreme_pacifism_desc: "Based on the concept of $ahimsa$, $hindu$ always advocates for pacifism and nonviolence. However, our enemies should still be weary not to provoke us, lest we end up falling towards the complete opposite extreme when roused into war." #OLD ENG
 hindu_empires: "Imperi $hindu_ADJ$"
 #hindu_empires_desc: "Ci sono stati molti imperi in passato che seguivano l'$hindu$. Dagli imperi Maurya e Gupta in $india$, all'Impero Śrīvijaya in $indonesia_region$, e la dinastia Chola di lunga durata, l'$hindu$ è sempre stato dietro il trono di governanti potenti." #OLD ITA
 hindu_empires_desc: "There have been many empires in the past that followed $hindu$. From the Maurya and Gupta empires in $india$, to the Śrīvijaya Empire in $indonesia_region$, and the long-lasting Chola Dynasty, $hindu$ has always been the spirital force behind the throne of powerful rulers." #NEW
 #hindu_empires_desc: "There have been many empires in the past following $hindu$. From the Maurya and Gupta empires in $india$, to the Śrīvijaya Empire in $indonesia_region$, and the long-lasting Chola Dynasty, $hindu$ has always been behind the throne of powerful rulers." #OLD ENG
 sacred_cattle: "Bestiame Sacro"
 #sacred_cattle_desc: "Come parte dell'$ahimsa$, il macello del bestiame è proibito. Per questo, sono rispettati e venerati come figura materna, e come simbolo di provvidenza e sacrificio altruistici. Essendo adorati dal tempo dei $vedah$, meritano tutto il nostro rispetto e attenzione." #OLD ITA
 sacred_cattle_desc: "As part of $ahimsa$, it is prohibited to slaughter cattle. They instead are respected and venerated as maternal figures, and are symbols of selfless provision and sacrifice. Having been worshiped since the time of the $vedah$, they still command enormous respect and attention." #NEW
 #sacred_cattle_desc: "As part of the $ahimsa$, the slaughter of cattle is prohibited. As such, they are respected and venerated as a maternal figure, and as a symbol of selfless provision and sacrifice. Being worshiped since the time of the $vedah$, they deserve all our respect and attention." #OLD ENG
 
 #Asia
 riches_of_asia: "Ricchezze dell'$asia$"
 #riches_of_asia_desc: "L'$asia$ è famosa in tutto il mondo per essere una terra ricca. Dalle città abbondanti della $persia_region$ e dell'$india$, agli articoli di lusso molto ricercati prodotti in $china$, alle quasi mitiche Isole delle Spezie in $indonesia_region$. I prodotti e le ricchezze dell'$asia$ sono molto apprezzati in tutto il mondo." #OLD ITA
 riches_of_asia_desc: "$asia$ is famous around the world for its riches. From the bountiful cities of $persia_region$ and $india$, to the highly-sought luxury items produced in $china$, to the almost mythical Spice Islands in $indonesia_region$, the luxurious goods coming from $asia$ are highly prized worldwide." #NEW
 #riches_of_asia_desc: "$asia$ is famous around the world for being a rich land. From the bountiful cities of $persia_region$ and $india$, to the highly-sought luxury items produced in $china$, to the almost mythical Spice Islands in $indonesia_region$. The products and riches of $asia$ are greatly appreciated worldwide." #OLD ENG
 silk_road: "Via della Seta"
 #silk_road_desc: "Sia la rotta terrestre che attraversa il Deserto del Gobi e la $persia_region$, o quelle marittime attraverso l'$indian_ocean_region$ e l'$indonesia_region$, le terre dell'$asia$ sono state per secoli attraversate da mercanti in cerca dei lucrativi profitti della famosa Via della Seta." #OLD ITA
 silk_road_desc: "Be it the land route crossing the Gobi Desert and $persia_region$, or its ocean counterpart through the $indian_ocean_region$ and $indonesia_region$, the lands of $asia$ have been for centuries traversed by merchants seeking profit on the famous Silk Road." #NEW
 #silk_road_desc: "Be it the land route crossing the Gobi Desert and $persia_region$, or the sea ones through the $indian_ocean_region$ and $indonesia_region$, the lands of $asia$ have been for centuries traversed by merchants searching the lucrative profits of the famous Silk Road." #OLD ENG
 exchange_of_ideas: "Scambio di Idee"
 #exchange_of_ideas_desc: "Non solo monete e profitto si sono mossi lungo la $silk_road$, ma anche idee e conoscenza fluiscono con il flusso e riflusso dei mercanti che percorrono il suo cammino." #OLD ITA
 exchange_of_ideas_desc: "Not only do coin and profit move along the $silk_road$, but ideas and knowledge also follow the ebb and flow of the merchants traveling along its path." #NEW
 #exchange_of_ideas_desc: "Not only coin and profit have been moving along the $silk_road$, but ideas and knowledge also flow with the ebb and flow of the merchants going along its path." #OLD ENG
 legacy_of_great_empires: "Eredità di Grandi Imperi"
 #legacy_of_great_empires_desc: "Dal trono del drago della $china$, ai vari imperi della $persia_region$, alle potenti dinastie $hindu_ADJ$ e $buddhist_ADJ$ dell'$india$ e del $south_east_asia$, l'$asia$ ha una lunga storia di potenti imperi che stabiliscono la loro presenza sulla terra." #OLD ITA
 legacy_of_great_empires_desc: "From the Dragon Throne of $china$, to the various empires of $persia_region$, to the powerful $hindu_ADJ$ and $buddhist_ADJ$ dynasties of $india$ and $south_east_asia$, $asia$ has been home to many mighty empires throughout history." #NEW
 #legacy_of_great_empires_desc: "From the dragon throne of $china$, to the various empires of $persia_region$, to the powerful $hindu_ADJ$ and $buddhist_ADJ$ dynasties of $india$ and $south_east_asia$, $asia$ has a long history of powerful empires establishing their presence in the land." #OLD ENG
 arduous_terrain: "Terreno Impervio"
 #arduous_terrain_desc: "L'$asia$ ospita alcune terre molto inospitali, dalle alte vette dell'Himalaya, all'arida distesa del Deserto del Gobi, alle fitte giungle dell'$india$ e del $south_east_asia$. E questo senza menzionare le stagioni dei monsoni e dei tifoni, e la presenza quasi costante di terremoti. Il suo popolo ha imparato a vivere in un ambiente così poco accogliente, ma gli invasori non la avranno così facile." #OLD ITA
 arduous_terrain_desc: "$asia$ is home to some very inhospitable lands, from the high peaks of the Himalaya, to the arid span of the Gobi Desert, to the dense jungles of $india$ and $south_east_asia$. And that does not even include the monsoon and typhoon seasons, and the almost constant present of earthquakes! Its people have learned to live in such an unwelcoming environment, but invaders will find it so easy." #NEW
 #arduous_terrain_desc: "$asia$ is home of some very inhospitable lands, from the high peaks of the Himalayas, to the arid span of the Gobi Desert, to the dense jungles of $india$ and $south_east_asia$. And that without mentioning the monsoon and typhoon seasons, and the almost constant present of earthquakes. Its people have learned to live in such unwelcoming environment, but invaders will not have it that easy." #OLD ENG
 fertile_lands: "Terre Fertili"
 #fertile_lands_desc: "In generale, le terre dell'$asia$ sono ricche di pioggia, e molti fiumi ricchi attraversano i suoi territori anche in quelle aree meno benedette dalle precipitazioni. Tranne alcune delle aree più aride del deserto, la terra fornisce cibo ampio alla popolazione, e persino in quelle regioni dove non lo fa le persone che vi vivono sono in grado di fare molto con ciò che possono avere." #OLD ITA
 fertile_lands_desc: "In general, the lands of $asia$ are blessed with plentiful rain, and many rivers cross its territories even in areas with less precipitation. Except for some of the most arid areas of the desert, our land provides ample food to our population. Even in those regions where it does not, the people living there are able to do much with what they have." #NEW
 #fertile_lands_desc: "In general, the lands of $asia$ are bountiful with rain, and many rich rivers cross its territories even in those areas less blessed with precipitation. Except some of the most arid areas of the desert, the land provides ample food to the population, and even in those regions where it does not the people living there are able to do much with they can have." #OLD ENG
 crossroads_of_religions: "Crocevia di Religioni"
 #crossroads_of_religions_desc: "L'$hindu$, il $buddhist$, l'$muslim$ e persino il $tengri$ sono religioni che hanno visto la loro espansione raggiungere molto più lontano del loro luogo di origine. L'$asia$ è stata testimone di tale scambio di credenze, e in molti casi della mescolanza e del sincretismo che è avvenuto tra di esse." #OLD ITA
 crossroads_of_religions_desc: "$hindu$, $buddhist$, $muslim$, and even $tengri$ are religions that have expanded into parts of the world very far from their places of origin. $asia$ has witnessed this exchange of beliefs for centuries, and in many cases the blending and syncretism that has happened among them." #NEW
 #crossroads_of_religions_desc: "$hindu$, $buddhist$, $muslim$, and even $tengri$ are religions that have seen their expansion reach much further away than their place of origin. $asia$ has been witness to such exchange of beliefs, and in many times the blending and syncretism that has happened among them." #OLD ENG
 religious_syncretism: "Sincretismo Religioso"
 #religious_syncretism_desc: "L'interazione tra diverse credenze e pratiche ha a volte portato non al loro rifiuto ma a una mescolanza e incorporazione di tali pratiche nelle proprie. Per questo, la presenza di pensieri e credenze straniere può non essere vista come qualcosa di ostile, ma come qualcosa da cui imparare." #OLD ITA
 religious_syncretism_desc: "Interaction between beliefs sometimes results in synthesis rather than rejection. Foreign thoughts and practices should therefore not be seen as hostile threats, but opportunities to learn, and possibly incorporate valuable elements into our own traditions." #NEW
 #religious_syncretism_desc: "The interaction between different beliefs and practices has sometimes resulted not in a rejection of them but a blending and incorporation of such practices into one's own. As such, the presence of foreign thoughts and beliefs may not be seen as something hostile, but as something to learn from." #OLD ENG
 source_of_knowledge: "Fonte di Conoscenza"
 #source_of_knowledge_desc: "Mentre alcune terre si vantano di essere all'avanguardia della conoscenza e dello sviluppo, alcune delle loro 'invenzioni' sono conosciute in $asia$ da secoli. Dall'abilità tecnologica della $china$ alla letteratura antica dell'$india$, non c'è nulla per cui l'Est debba invidiare l'Ovest." #OLD ITA
 source_of_knowledge_desc: "While foreign nations pride themselves on being at the forefront of knowledge and development, some of their recent 'inventions' have been known in $asia$ for centuries. From the technological prowess of $china$ to the ancient literature of $india$, there is nothing for the East to envy from the West." #NEW
 #source_of_knowledge_desc: "While some lands pride themselves in being at the forefront of knowledge and development, some of their 'inventions' have been known in $asia$ for centuries. From the technological prowess of $china$ to the ancient literature of $india$, there is nothing for the East to envy from the West." #OLD ENG
 structured_society: "Società Strutturata"
 #structured_society_desc: "Le società in $asia$ sono in generale abbastanza strutturate, con ogni individuo che sa qual è il suo ruolo in essa. Influenzate dalle idee filosofiche sociali dell'$hindu$ e del $SECT_CONFUCIANISM_NAME$, gli ingranaggi della società tendono a girare senza intoppi in $asia$." #OLD ITA
 structured_society_desc: "Religious and philosophical traditions, particularly those of $hindu$ and $SECT_CONFUCIANISM_NAME$, have historically influenced social organization in parts of $asia$, emphasizing proscribed role fulfillments within social hierarchies. The rigidity of living within these systems is offset by the relative ease with which social order is maintained." #NEW
 #structured_society_desc: "Societies in $asia$ are in general quite structured, with each individual knowing what their role in it is. Influenced by the philosophical societal ideas of $hindu$ and $SECT_CONFUCIANISM_NAME$, the gears of society tend to turn smoothly in $asia$." #OLD ENG
 #incense_preeminence: "Preminenza dell'Incenso" #OLD ITA
 incense_preeminence: "$incense$ Preeminence" #NEW
 #incense_preeminence: "Incense Preeminence" #OLD ENG
 #incense_preeminence_desc: "L'incenso è stato un pilastro della vita in $asia$ per secoli, forse più che in qualsiasi altro luogo al mondo. Sebbene alcune altre religioni lo usino anche per i loro rituali, la quasi ubiquità di esso in qualsiasi cerimonia $hindu_ADJ$ o $buddhist_ADJ$, così come nella vita quotidiana delle persone $muslim$, lo rendono una presenza costante ovunque in $asia$." #OLD ITA
 incense_preeminence_desc: "$incense$ has been a staple of life in $asia$ for centuries, maybe more so than anywhere in the world. Although other religions also use it for their rituals, its near-ubiquity in $hindu_ADJ$ and $buddhist_ADJ$ ceremonies, as well as its everyday use by $muslim$ people, give it a constant presence anywhere in $asia$." #NEW
 #incense_preeminence_desc: "Incense has been a staple of life in $asia$ for centuries, maybe more than anywhere in the world. Although some other religions also use it for their rituals, the almost ubiquity of it in any $hindu_ADJ$ or $buddhist_ADJ$ ceremony, as well as the everyday life of $muslim$ people, make it a constant presence anywhere in $asia$." #OLD ENG
 #incense_trade_route: "Rotta Commerciale dell'Incenso" #OLD ITA
 incense_trade_route: "$incense$ Trade Route" #NEW
 #incense_trade_route: "Incense Trade Route" #OLD ENG
 #incense_trade_route_desc: "L'alta domanda di incenso, non solo in $asia$ ma anche oltre, richiede molte rotte commerciali dedicate al suo commercio. Simile alla più famosa $silk_road$, il commercio dell'incenso collega l'Est con l'Ovest." #OLD ITA
 incense_trade_route_desc: "The high demand for $incense$, not only in $asia$ but also beyond it, requires the establishment of many trade routes dedicated to its commerce. Akin to the more famous $silk_road$, this trade of $incense$ links the East with the West." #NEW
 #incense_trade_route_desc: "The high demand of incense, not only in $asia$ but also beyond it, requires for many trade routes dedicated to its commerce. Akin to the more famous $silk_road$, the trade of incense links the East with the West." #OLD ENG
 #wake_of_the_mongol_horde: "Scia dell'Orda $mongolian_group$" #OLD ITA
 wake_of_the_mongol_horde: "Wake of the $MGE_ADJ$ Horde" #NEW
 #wake_of_the_mongol_horde: "Wake of the $mongolian_group$ Horde" #OLD ENG
 #wake_of_the_mongol_horde_desc: "Non c'è quasi nessun luogo in $asia$ che non abbia sentito l'influenza delle conquiste $mongolian_group$. Dopo il grande impero forgiato da $genghis_khan_name_no_tooltip$, la terra si sta ora riprendendo dall'essere stata calpestata dai suoi cavalli." #OLD ITA
 wake_of_the_mongol_horde_desc: "There is almost no place in $asia$ that has not felt the influence of the $MGE_ADJ$ conquests. After the fall of the once-great empire forged by $genghis_khan_name_no_tooltip$, the land is finally recovering from being trampled by his horses." #NEW
 #wake_of_the_mongol_horde_desc: "There is almost no place in $asia$ that has not felt the influence of the $mongolian_group$ conquests. After the great empire forged by $genghis_khan_name_no_tooltip$, the land is now recovering from being trampled by his horses." #OLD ENG
 cultural_melting_pot: "Crogiolo Culturale"
 #cultural_melting_pot_desc: "L'$asia$ non è altro che casa di un'ampia varietà di diversità culturale. Questa diversità e scambio costante è proprio ciò che per secoli ha permesso ai paesi in $asia$ di prosperare scambiando idee e influenze tra loro." #OLD ITA
 cultural_melting_pot_desc: "$asia$ is a highly diverse region, home to a wide variety of cultures. This diversity, and the cultural exchange and blended influences that result from it, has empowered our countries and allowed them to flourish in every domain from architecture to music to horticulture, and beyond." #NEW
 #cultural_melting_pot_desc: "$asia$ is nothing if not home to a wide variety of cultural diversity. This diversity and constant exchange is precisely what for centuries has allowed countries in $asia$ to flourish by exchanging ideas and influences among each other." #OLD ENG
 rise_of_great_individuals: "Ascesa di Grandi Individui"
 #rise_of_great_individuals_desc: "La storia dimostra che saranno i grandi individui ad elevarsi e raggiungere grandi cose. Più e più volte, imperi sono stati forgiati o distrutti dalla mano di un singolo governante, e tali imprese devono essere rispettate e ammirate." #OLD ITA
 rise_of_great_individuals_desc: "History proves that the most extraordinary individuals are the ones who rise to prominence and achieve great things. Time and again, empires have been forged or destroyed by the hand of a single ruler, and such achievements are to be respected and admired." #NEW
 #rise_of_great_individuals_desc: "History proves that great individuals will be the ones to rise and achieve great things. Time and again, empires have been forged or destroyed by the hand of a single ruler, and such achievements are to be respected and admired." #OLD ENG

 #Orthodox
 the_pentarchy: "La Pentarchia"
 #the_pentarchy_desc: "L'antica struttura della Chiesa formulata dall'Imperatore Giustiniano è ancora in pieno vigore nell'$orthodox$. Sebbene il patriarca di $rome$ creda di essere al di sopra di tutti nel suo $catholic$, per l'autentica Chiesa le città di $constantinople$, $alexandria$, $antioch$ e $jerusalem$ hanno ancora tutte la loro importanza." #OLD ITA
 the_pentarchy_desc: "The old structure of the Church formulated by Emperor Justinian is still in full effect in $orthodox$. Although the patriarch of $rome$ believes himself to be above all else, for the #italic authentic#! Church, the cities of $constantinople$, $alexandria$, $antioch$, and $jerusalem$ remain far more important." #NEW
 #the_pentarchy_desc: "The old structure of the Church formulated by Emperor Justinian is still in full effect in $orthodox$. Although the patriarch of $rome$ beliefs himself to be above all in his $catholic$, for the authentic Church the cities of $constantinople$, $alexandria$, $antioch$, and $jerusalem$ still all have their prominence." #OLD ENG
 imperial_creed: "Credo Imperiale"
 #imperial_creed_desc: "L'$orthodox$ è sempre stata la fede ufficiale dell'Impero Romano sin dalla sua adozione del $christian$. Le eresie dell'ovest e i loro 'imperatori' falsamente proclamati non saranno in grado di negare la legittimità della nostra linea." #OLD ITA
 imperial_creed_desc: "$orthodox$ has been the official faith of the Roman Empire ever since its adoption of $christian$. The heresies of the West and their falsely proclaimed 'emperors' will not be able to discredit our legitimacy." #NEW
 #imperial_creed_desc: "$orthodox$ has always been the official faith of the Roman Empire ever since its adoption of $christian$. The heresies of the west and their falsely proclaimed 'emperors' will not be able to deny the legitimacy of our line." #OLD ENG
 filioque_issue: "Questione del Filioque"
 #filioque_issue_desc: "L'aggiunta subdola della clausola #italic Filioque#! da parte degli eretici occidentali è stata fatta senza la convocazione di un concilio appropriato per deciderla, ed è quindi illegittima. Solo noi preserviamo il modo corretto di pregare, e loro sono per sempre così dannati all'inferno per la loro eresia." #OLD ITA
 filioque_issue_desc: "The heretical addition of the #italic Filioque#! clause, which states that the Holy Spirit proceeds from the Father 'and the Son', was done without calling the appropriate ecumenical council, and therefore it is illegitimate. We are the guardians of the true prayer, and $rome$ shall be damned for their heresy!" #NEW
 #filioque_issue_desc: "The underhanded addition of the clause #italic Filioque#! by the western heretics was done without the calling of a proper council to decide it, and is thus illegitimate. Only we preserve the proper way of prayer, and they are forever thus damned to hell for their heresy." #OLD ENG
 septuagint: "Settanta"
 #septuagint_desc: "Il nostro Vecchio Testamento è codificato in $greek_language$ nella versione conosciuta come i $septuagint$, una traduzione dall'$hebrew_language$ fatta nel III secolo a.C. da 72 traduttori isolati, raggiungendo tutti loro esattamente la stessa traduzione indipendentemente. È quindi sicuramente divinamente ispirato e la diretta parola di Dio." #OLD ITA
 septuagint_desc: "Our Old Testament is encoded in $greek_language$, using the version known as the $septuagint$, which is a translation from $hebrew_language$ done in the 3rd century BC. It was written by seventy-two isolated translators, who all came up with the exact same translations independently. It is thus definitely divinely inspired, and the direct word of God." #NEW
 #septuagint_desc: "Our Old Testament is encoded in $greek_language$ in the version known as the $septuagint$, a translation from $hebrew_language$ done in the 3rd century BC by 72 isolated translators, achieving all of them the exact same translation independently. It is thus definitely divinely inspired and the direct word of God." #OLD ENG
 anagignoskomena: "Anagignoskomena"
 #anagignoskomena_desc: "La nostra Bibbia contiene tutti i libri degni di venerazione e studio, anche se alcuni possono avere meno importanza di altri. Gli $anagignoskomena$ non sono presenti nella Bibbia in $hebrew_language$, quindi hanno meno importanza di altri testi, ma sono comunque degni di essere letti e non dovrebbero essere ignorati." #OLD ITA
 anagignoskomena_desc: "Our Bible contains all books worthy of veneration and study, even though some may have less importance than others. The $anagignoskomena$ are not present in the $hebrew_language$ Bible, so they receive less attention than other texts, but they are nonetheless worthy of being read and should not be disregarded." #NEW
 #anagignoskomena_desc: "Our Bible contains all books worthy of veneration and study, even though some may have less importance than others. The $anagignoskomena$ are not present in the $hebrew_language$ Bible, so they have less importance than other texts, but are nonetheless worthy to be read and should not be disregarded." #OLD ENG
 church_guidance: "Guida della Chiesa"
 #church_guidance_desc: "Le Scritture sono la Parola di Dio, ma solo la Chiesa è in grado di interpretare il suo significato corretto e relazionarlo al gregge. Qualsiasi lettura o interpretazione indipendente delle Scritture al di fuori della guida della Chiesa porterebbe solo a perdersi nelle falsità e sul sentiero verso l'eresia." #OLD ITA
 church_guidance_desc: "The Scriptures are the Word of God, but only the Church is able to interpret their correct meaning and to relate it accurately to the flock. Any independent reading or interpretation of the Scriptures outside of Church guidance would only lead to being lost in falsehoods and on the path to heresy." #NEW
 #church_guidance_desc: "The Scriptures are the Word of God, but only the Church is able to interpret its correct meaning and relate it to the flock. Any independent reading or interpretation of the Scriptures outside the Church guidance would only lead to being lost in falsehoods and on the path to heresy." #OLD ENG
 unchanging_tradition: "Tradizione Immutabile"
 #unchanging_tradition_desc: "La tradizione trasmessaci da Gesù Cristo e dagli apostoli è coerente, senza cambiamenti, aggiunte o sottrazioni. Questo è così perché la fede stessa è invariabile e praticata da tutti ovunque." #OLD ITA
 unchanging_tradition_desc: "The tradition passed down to us by Jesus Christ and the apostles is consistent, without any changes, additions, or subtractions whatsoever. Our faith is undeniable in its truths, and what is fundamentally true about this world cannot be changed by mortal hands." #NEW
 #unchanging_tradition_desc: "The tradition passed onto us by Jesus Christ and the apostles is consistent, without changes, additions, or subtractions. This is so because the faith itself is invariable and practiced by all everywhere." #OLD ENG
 church_councils: "Concili della Chiesa"
 #church_councils_desc: "Poiché la Chiesa deve essere unita, qualsiasi questione troppo grande per un singolo vescovo da risolvere richiederà la convocazione di un concilio, dove i vescovi cercheranno la mente della Chiesa stessa. Per questo, le decisioni di un concilio rifletteranno il consenso della Chiesa nel suo insieme." #OLD ITA
 church_councils_desc: "As the Church must be united in its judgments, any matter too complex for a single bishop to resolve requires us to call a council, where the bishops will consult the mind of the Church itself. The council's decisions shall therefore reflect the consensus of the Church as a whole." #NEW
 #church_councils_desc: "As the Church must be united, any matter too big for a single bishop to resolve will require the calling of a council, where the bishops will search the mind of the Church itself. As such, a council's decisions will reflect the consensus of the Church as a whole." #OLD ENG
 greek_rite: "Rito $greek_culture$"
 #greek_rite_desc: "I nostri riti e le pratiche canoniche sono stati per secoli ben definiti seguendo il rito $greek_culture$ di $constantinople$. Sebbene possano esserci alcune piccole variazioni in certi luoghi, l'omogeneità dei riti in tutto l'$orthodox$ è generalizzata." #OLD ITA
 greek_rite_desc: "Our rites and canonical practices have been for centuries well-defined following the $greek_culture$ rites of $constantinople$. Although there may be some small variations in certain places, there is remarkable homogeneity in the rites performed throughout $orthodox$." #NEW
 #greek_rite_desc: "Our rites and canonical practices have been for centuries well-defined following the $greek_culture$ rite of $constantinople$. Although there may be some small variations in certain places, the homogeneity of the rites all across $orthodox$ is generalized." #OLD ENG
 physical_body_of_christ: "Corpo Fisico di Cristo"
 #physical_body_of_christ_desc: "La nostra Chiesa è la manifestazione fisica del Corpo di Cristo sulla Terra, non avendo differenza da quello in Paradiso. Per questo, la Chiesa è l'incarnazione fisica del Signore Salvatore, inviato per il beneficio del loro popolo." #OLD ITA
 physical_body_of_christ_desc: "Our Church is the physical manifestation of the Body of Christ on Earth, having no difference from the one in Heaven. As such, the Church is the physical embodiment of the Lord Savior, sent for the benefit of His people." #NEW
 #physical_body_of_christ_desc: "Our Church is the physical manifestation of the Body of Christ on Earth, having no difference from the one in Heaven. As such, the Church is the physical embodiment of the Lord Savior, sent for the benefit of their people." #OLD ENG
 #sight_veneration: "Venerazione della Vista" #OLD ITA
 sight_veneration: "Icon Veneration" #NEW
 #sight_veneration: "Sight Veneration" #OLD ENG
 #sight_veneration_desc: "L'aspetto più importante per la venerazione è quello di ricordare ai fedeli attraverso i loro sensi. Per questo, le nostre chiese sono sempre adornate con immagini e colori vibranti, così che la presenza di Cristo sulla Terra possa essere immediatamente sentita da chiunque." #OLD ITA
 sight_veneration_desc: "The most important aspect of veneration is the faithful be reminded of great works, miracles, and figures through their natural sense. As such, our churches are adorned with vibrant images and colors, ringing with music and sweetly scented with our holy incense, so that the presence of Christ on Earth can be immediately felt by all inside." #NEW
 #sight_veneration_desc: "The most important aspect for veneration is that of reminding the faithful through their own senses. As such, our churches are always adorned with vibrant images and colors, so that the presence of Christ on Earth can be immediately felt by any." #OLD ENG
 theotokos: "Theotokos"
 #theotokos_desc: "La Vergine Maria è una figura chiave per noi, poiché ha adempiuto l'Antica Alleanza portando dentro di sé la Nuova Alleanza nella figura di Cristo. Per questo, essendo Cristo Dio-incarnato, lei era letteralmente la Madre di Dio, e ha un posto di rilievo al di sopra di tutti gli altri santi." #OLD ITA
 theotokos_desc: "The Virgin Mary is a key figure in our beliefs, as she fulfilled the Old Covenant by carrying within her the New Covenant in the figure of Christ. As such, being the bearer of Christ God-incarnate, she was literally the Mother of God, and has a place of prominence above all other saints." #NEW
 #theotokos_desc: "The Virgin Mary is a key figure for us, as she fulfilled the Old Covenant by carrying within her the New Covenant in the figure of Christ. As such, being Christ God-incarnate, she was literally the Mother of God, and has a place of prominence above all other saints." #OLD ENG
 heavenly_architecture: "Architettura Celeste"
 #heavenly_architecture_desc: "Gli edifici religiosi $orthodox_ADJ$ sono progettati sempre in imitazione del paradiso. Costruiti in modo più centralizzato rispetto a quelli dell'ovest basati sulla basilica, la cupola centrale che serve da tetto simboleggia il paradiso. Sempre coperti di immagini e icone, sono una meraviglia da ammirare." #OLD ITA
 heavenly_architecture_desc: "$orthodox_ADJ$ religious buildings are designed in imitation of heaven. Their construction centralized around the basilica, the central dome that serves as a roof and symbolizes the heavens. Richly decorated in beautiful images and gleaming golden icons, they are a wonder to behold." #NEW
 #heavenly_architecture_desc: "$orthodox_ADJ$ religious buildings are designed always in imitation of heaven. Constructed in a more centralized way than those of the west based on the basilica, the central dome serving as a roof symbolizes the heaven. Always covered in images and icons, they are a wonder to behold." #OLD ENG
 iconostasis: "Iconostasi"
 #iconostasis_desc: "Una caratteristica chiave di qualsiasi Chiesa $orthodox_ADJ$ è quella dell'$iconostasis$, un muro di icone che separa il corpo principale dell'edificio dall'altare. Le icone che contiene servono come visualizzazione del legame tra i fedeli e il Santo dei Santi, e quindi il legame tra il Paradiso e il popolo, servendo come guida per il popolo verso il Paradiso." #OLD ITA
 iconostasis_desc: "One key feature of any $orthodox_ADJ$ church is that of the $iconostasis$, a wall of icons that separates the main body of the building from the altar. The icons it contains serve as a visualization of the link between the worshipers and the Holy of Holies, and thus the link between Heaven and the people, serving as a guide for the people towards Heaven." #NEW
 #iconostasis_desc: "One key feature of any $orthodox_ADJ$ Church is that of the $iconostasis$, a wall of icons that separates the main body of the building from the altar. The icons it contains serve as a visualization of the link between the worshipers and the Holy of Holies, and thus the link between Heaven and the people, serving as a guide for the people towards Heaven." #OLD ENG
 julian_calendar: "Calendario Giuliano"
 julian_calendar_desc: "Il tempo del nostro paese e della nostra Chiesa è stato per secoli misurato dal $julian_calendar$, promulgato da Giulio Cesare nel 46 a.C. Non solo unifica tutte le nazioni $christian_ADJ$ orientali, ma serve anche a dettare quando le importanti feste e celebrazioni devono essere tenute."
 paschal_cycle: "Ciclo Pasquale"
 #paschal_cycle_desc: "L'$orthodox$ contiene alcune feste mobili attorno alla #italic Pascha#!, Pasqua, organizzate nel $paschal_cycle$. Le dieci settimane prima di Pascha sono chiamate Triodion, mentre i 50 giorni dopo Pascha sono chiamati Pentekostárion. Questo ciclo segna le celebrazioni più importanti nell'anno liturgico." #OLD ITA
 paschal_cycle_desc: "$orthodox$ contains some movable feasts around #italic Pascha#!, Easter, organized in the $paschal_cycle$. The ten weeks before Pascha are called #italic Triodion#!, while the fifty days after Pascha are called #italic Pentekostárion#!. This cycle marks the most important celebrations in the liturgical year." #NEW
 #paschal_cycle_desc: "$orthodox$ contains some movable feasts around #italic Pascha#!, Easter, organized in the $paschal_cycle$. The ten weeks before Pascha are called Triodion, while the 50 days after Pascha are called Pentekostárion. This cycle marks the most important celebrations in the liturgical year." #OLD ENG
 oktoechos: "Oktōēchos"
 oktoechos_desc: "Un sistema a otto modi di scrivere musica, l'$oktoechos$ è stato il sistema usato per scrivere canti e musica religiosa per la Chiesa per secoli. È il fondamento del canto $orthodox_ADJ$, sebbene con alcune variazioni tra le culture."
 prestigious_monasticism: "Monachesimo Prestigioso"
 prestigious_monasticism_desc: "Nell'$orthodox$, il monachesimo e l'ascetismo sono molto apprezzati e quasi un requisito. Qualsiasi vescovo deve essere prima un monaco, e deve diventare monaco prima di essere consacrato se non lo è. Per questo, i monasteri e i centri di monachesimo hanno un grande impatto sulla nostra vita clericale."
 national_rites: "Riti Nazionali"
 #national_rites_desc: "La presenza dei diversi patriarcati autocefali nella nostra Chiesa permette alcune variazioni dei riti nazionali di ogni paese. Tuttavia, l'unità del messaggio rimane, e l'intera Chiesa come entità singola non è spezzata." #OLD ITA
 national_rites_desc: "The presence of different autocephalous patriarchates in our Church allows for certain variations between the national rites of each country. However, the unity of the message remains, and the Church as a single entity is not broken." #NEW
 #national_rites_desc: "The presence of the different autocephalous patriarchates in our Church allows for certain variations of the national rites of each country. However, the unity of the message remains, and the whole of the Church as a single entity is not broken." #OLD ENG
 heirs_of_rome: "Eredi di Roma"
 #heirs_of_rome_desc: "Ci sono state molte persone che affermavano di essere gli eredi di Roma e dell'intero Impero Romano. Tuttavia, solo la nostra fede è la vera fede del vecchio Impero, e solo noi possiamo legittimamente affermare di essere un discendente diretto da esso." #OLD ITA
 heirs_of_rome_desc: "Many have claimed to be the heirs of Rome and indeed the whole Roman Empire. However, only our religion is the true faith of the old Empire, and therefore only we can legitimately claim to be a direct descendant from it." #NEW
 #heirs_of_rome_desc: "There have been many people claiming to be the heirs of Rome and the whole Roman Empire. However, only our faith is the true faith of the old Empire, and only we can legitimately claim to be a direct descendant from it." #OLD ENG
 legacy_of_saint_andrew: "Eredità di Sant'Andrea"
 #legacy_of_saint_andrew_desc: "Secondo la leggenda, Sant'Andrea visitò la Scizia e le coste settentrionali dell'area del $black_sea_area$, prevedendo un grande sviluppo del $christian$ quando raggiunse la futura posizione di $kyiv$." #OLD ITA
 legacy_of_saint_andrew_desc: "According to legend, Saint Andrew himself visited Scythia and the northern shores of the $black_sea_area$, prophesying a great flourishing of $christian$ once he reached the future site of $kyiv$." #NEW
 #legacy_of_saint_andrew_desc: "According to the legend, Saint Andrew visited Scythia and the northern shores of the $black_sea_area$, foretelling a great development of $christian$ when reaching the future location of $kyiv$." #OLD ENG
 christianization_of_the_slavs: "Cristianizzazione degli Slavi"
 #christianization_of_the_slavs_desc: "Il popolo della Rus' di Kiev fu tra i primi del popolo $slavic_group$ orientale ad accettare la luce di Cristo e convertirsi all'$orthodox$. Da lì, la fede si diffuse lontano e in largo tra i popoli orientali." #OLD ITA
 christianization_of_the_slavs_desc: "The people of the Kievan Rus' were among the first of the Eastern $slavic_group$ people to accept the light of Christ and convert to $orthodox$. From there, the faith spread throughout the region." #NEW
 #christianization_of_the_slavs_desc: "The people of the Kievan Rus' were among the first of the Eastern $slavic_group$ people to accept the light of Christ and convert to $orthodox$. From there, the faith spread far and wide among the eastern peoples." #OLD ENG
 cyril_and_methodius: "Cirillo e Metodio"
 #cyril_and_methodius_desc: "Entrambi teologi $BYZ_ADJ$ del IX secolo, presero grande parte nell'evangelizzazione degli Slavi. Sono accreditati per aver sviluppato l'alfabeto glagolitico, il primo ad essere mai usato per trascrivere lo $church_slavonic_language$, e i loro seguaci svilupparono successivamente l'alfabeto cirillico, nominandolo dopo Cirillo in suo onore." #OLD ITA
 cyril_and_methodius_desc: "Two $BYZ_ADJ$ theologians from the 9th century, these men were instrumental to the evangelization of the Slavs. They are credited for developing the Glagolitic alphabet, the first one to ever be used to transcribe $church_slavonic_language$, and their followers later developed the Cyrillic alphabet, naming it after Cyril in his honor." #NEW
 #cyril_and_methodius_desc: "Both $BYZ_ADJ$ theologians from the 9th century, they took great part in the evangelization of the Slavs. They are credited for developing the Glagolitic alphabet, the first one to ever be used to transcribe $church_slavonic_language$, and their followers later developed the Cyrillic alphabet, naming it after Cyril in his honor." #OLD ENG
 interaction_between_church_and_state: "Interazione tra Chiesa e Stato"
 #interaction_between_church_and_state_desc: "I patriarcati hanno autorità assoluta sul proprio patriarcato e il loro popolo. Legando la loro autorità a quella del governante, possiamo trarre vantaggio dalle risorse della Chiesa per rafforzare l'autorità dello stato." #OLD ITA
 interaction_between_church_and_state_desc: "The patriarchates have absolute authority over their own jurisdictions and those who occupy them. By tying their authority to that of the ruler, we can take advantage of the resources of the Church, and use them to strengthen state authority." #NEW
 #interaction_between_church_and_state_desc: "The patriarchates have absolute authority over their own patriarchate and their folk. By tying their authority to that of the ruler, we can take advantage of the resources of the Church to strengthen the authority of the state." #OLD ENG
 outwards_expansion: "Espansione Verso l'Esterno"
 #outwards_expansion_desc: "È il santo dovere della Chiesa portare la luce di Cristo al pagano e agli infedeli. Per questo, dobbiamo cercare oltre i nostri confini per portare la salvezza alle loro anime." #OLD ITA
 outwards_expansion_desc: "It is the holy duty of the Church to bring the light of Christ to the pagan and the infidels. We must go beyond our borders to carry salvation to every lost soul!" #NEW
 #outwards_expansion_desc: "It is the holy duty of the Church to bring the light of Christ to the pagan and the infidels. As such, we must search beyond our borders to carry salvation to their souls." #OLD ENG
 justified_holy_wars: "Guerre Sante Giustificate"
 #justified_holy_wars_desc: "Non possiamo permettere a pagani ed eretici di dettare le nostre azioni. È nostro santo dovere purificare la terra dalla loro impurità affinché il vero regno di Dio possa manifestarsi sulla Terra." #OLD ITA
 justified_holy_wars_desc: "We cannot allow heathens and heretics to dictate our actions. It is our holy duty to cleanse the land of their impurity so that the true realm of God can be manifested on Earth." #NEW
 #justified_holy_wars_desc: "We can not allow heathens and heretics to dictate our actions. It is our holy duty to cleanse the land of their impurity so that the true realm of God can be manifested on Earth." #OLD ENG
 resistance_to_the_infidels: "Resistenza agli Infedeli"
 #resistance_to_the_infidels_desc: "I nostri fratelli $orthodox_ADJ$ si sono trovati a volte sotto il giogo di infedeli stranieri. Tuttavia, abbiamo imparato a sopportare tali oppressioni, e persino vivere insieme a quegli infedeli." #OLD ITA
 resistance_to_the_infidels_desc: "Our $orthodox_ADJ$ brethren have seen themselves at times under the yoke of foreign infidels. However, we have learned to endure such oppression, and even live in peace alongside these infidels." #NEW
 #resistance_to_the_infidels_desc: "Our $orthodox_ADJ$ brethren have seen themselves at times under the yoke of foreign infidels. However, we have learned to endure such oppressions, and even live together with those infidels." #OLD ENG
 eastern_ecumenism: "Ecumenismo Orientale"
 #eastern_ecumenism_desc: "Le denominazioni $christian_ADJ$ dell'Ortodossia Orientale sono spesso confuse con l'$orthodox$ Orientale dai non iniziati. Sebbene siano diverse da noi in molte questioni chiave, sono ancora $christian_ADJ$, e molti punti in comune potrebbero essere usati per riportarle alla fede corretta." #OLD ITA
 eastern_ecumenism_desc: "$christian_ADJ$ denominations from the Oriental Orthodoxy are often confused with Eastern $orthodox$ by the uninitiated. Although they are different from us in many key issues, they are still $christian_ADJ$, and our many commonalities could be used to bring them back to the correct faith." #NEW
 #eastern_ecumenism_desc: "$christian_ADJ$ denominations from the Oriental Orthodoxy are often confused with Eastern $orthodox$ by the uninitiated. Although they are different from us in many key issues, they are still $christian_ADJ$, and many points in common could be used to bring them back to the proper faith." #OLD ENG
 structured_patriarchates: "Patriarcati Strutturati"
 #structured_patriarchates_desc: "I nostri patriarcati sono sempre stati ben organizzati e strutturati, ognuno avendo le proprie attribuzioni e delimitazioni. Questo permette un migliore funzionamento della Chiesa nel suo insieme, e dello stato di conseguenza." #OLD ITA
 structured_patriarchates_desc: "Our patriarchates have always been well organized and structured, each with its own attributions and delimitations. This allows for a better-functioning Church, which leads to a better-functioning state." #NEW
 #structured_patriarchates_desc: "Our patriarchates have always been well organized and structured, each one having each own attributions and delimitations. This allows for a better functioning of the Church as a whole, and the state as a result." #OLD ENG
 
 #Miaphysitism
 second_council_of_ephesus: "Secondo Concilio di Efeso"
 #second_council_of_ephesus_desc: "Il $second_council_of_ephesus$, convocato nel 449 su istanza del Papa Dioscoro di $alexandria$, fu un concilio $christian_ADJ$ legittimo, nonostante le chiese $catholic_ADJ$ e $orthodox_ADJ$ lo denuncino. In esso, fu accettata la formula di Cirillo di Alessandria, che afferma che Cristo è una singola natura incarnata, sia umana che divina." #OLD ITA
 second_council_of_ephesus_desc: "The $second_council_of_ephesus$, convened in 449 at the instance of Pope Dioscorus of $alexandria$, was a legitimate $christian_ADJ$ council despite its denunciation by the $catholic_ADJ$ and $orthodox_ADJ$ Churches. At this council, the formula of Cyril of Alexandria — which states that Christ is a single incarnate nature, both human and divine — was officially accepted." #NEW
 #second_council_of_ephesus_desc: "The $second_council_of_ephesus$, convened in 449 at the instance of Pope Dioscorus of $alexandria$, was a legitimate $christian_ADJ$ council, despite $catholic_ADJ$ and $orthodox_ADJ$ churches denouncing it. In it, it was accepted the formula of Cyril of Alexandria, which states that Christ is a single incarnate nature, both human and divine." #OLD ENG
 rejection_of_chalcedon: "Rifiuto di Calcedonia"
 #rejection_of_chalcedon_desc: "Poiché non accettarono il $second_council_of_ephesus$, il Concilio di Calcedonia fu convocato su istanza del Papa Leone I, che chiese l'annullamento del $second_council_of_ephesus$. Rifiutiamo questo falso concilio, e sosteniamo le decisioni prese in quello originale." #OLD ITA
 rejection_of_chalcedon_desc: "As they did not accept the $second_council_of_ephesus$, the Council of Chalcedon was called at the instance of Pope Leo I, who demanded the nullification of the $second_council_of_ephesus$. We reject this false council, and stand by the decisions made in the original one." #NEW
 #rejection_of_chalcedon_desc: "As they did not accept the $second_council_of_ephesus$, the Council of Chalcedon was called at the instance of Pope Leo I, who called for the nullification of the $second_council_of_ephesus$. We reject this false council, and stand by the decisions made on the original one." #OLD ENG
 monophysite_vs_miaphysite: "Monofisita vs $miaphysite_ADJ$"
 monophysite_vs_miaphysite_desc: "Sebbene il $miaphysite$ proclami anche che la figura di Cristo ha solo una singola natura, differisce sostanzialmente dalla visione Monofisita Eutichiana che proclama che l'umanità di Cristo fu assorbita nella sua divinità. Anche se ci possono essere alcuni che ci chiamano anche seguaci del Monofisismo, è solo un accordo nelle parole, poiché nella sostanza le nostre opinioni sono chiaramente diverse."
 original_christianity: "$christian$ Originale"
 #original_christianity_desc: "Ci sono stati molti scismi e divisioni nel mondo $christian_ADJ$, ma il nostro credo traccia le sue radici sul vero $christian$ originale formulato dal Primo Concilio di Nicea. Dopo di esso, solo gli eretici si sono separati dal ramo principale." #OLD ITA
 original_christianity_desc: "There have been many schisms and divisions in the $christian_ADJ$ world, but our creed traces its roots on the original true $christian$ formulated from the First Council of Nicaea. Every split from the main branch after this is mere heresy." #NEW
 #original_christianity_desc: "There have been many schisms and divisions in the $christian_ADJ$ world, but our creed traces its roots on the original true $christian$ formulated since the First Council of Nicaea. After it, only heretics have split from the main branch." #OLD ENG
 beyond_the_borders: "Oltre i Confini"
 #beyond_the_borders_desc: "Il $christian$ ha le sue origini indubbiamente all'interno della culla dell'Impero Romano, e molti dei suoi rami si sono accontentati di rimanere entro i suoi confini. Il $miaphysite$, tuttavia, era ai margini dell'Impero da quando fummo denunciati dai Calcedonesi, e ha osato andare oltre i suoi confini, portando la luce di Dio nei luoghi più remoti." #OLD ITA
 beyond_the_borders_desc: "$christian$ undoubtedly originated inside the cradle of the Roman Empire, and many of its branches have been content to stay in that region. $miaphysite$, however, was on the edges of the Empire after being denounced by the Chalcedonians, and has spread far beyond its birthplace, bringing the light of God to the most remote places." #NEW
 #beyond_the_borders_desc: "$christian$ has its origins undoubtedly inside the cradle of the Roman Empire, and many of its branches have been content with staying within its borders. $miaphysite$, however, was on the edges of the Empire since we were denounced by the Chalcedonians, and has dared to go beyond its borders, bringing the light of God to the most remote places." #OLD ENG
 isolated_reaches: "Estensioni Isolate"
 #isolated_reaches_desc: "Il $miaphysite$ è stato in grado di diffondersi in luoghi molto lontani. Anche se circondati da nemici e infedeli, la nostra fede è rimasta forte." #OLD ITA
 isolated_reaches_desc: "$miaphysite$ has managed to spread to very distant places. Even while surrounded by enemies and heretics, our faith has remained strong." #NEW
 #isolated_reaches_desc: "$miaphysite$ has been able to spread to very far away places. Even while surrounded by enemies and infidels, our faith has remained strong." #OLD ENG
 independent_leaders: "Leader Indipendenti"
 #independent_leaders_desc: "A causa dell'isolamento del $miaphysite$, è stato difficile a volte contattare altri patriarcati. Per questo, i nostri leader hanno imparato ad agire indipendentemente, pur avendo i propri modi di mantenere il contatto con il resto del $christian$ il più possibile." #OLD ITA
 independent_leaders_desc: "Due to the isolation of $miaphysite$, it has been difficult at times to contact other patriarchates. As such, our leaders have learned to act independently, while at the same time keeping in contact with the rest of the $christian_ADJ$ world as much as possible." #NEW
 #independent_leaders_desc: "Due to the isolation of $miaphysite$, it has been difficult at times to contact with other patriarchates. As such, our leaders have learned to act independently, while at the same time having their own ways of keeping in contact with the rest of $christian$ as much as possible." #OLD ENG
 jerusalem_focus: "Focus su $jerusalem$"
 #jerusalem_focus_desc: "Teniamo sempre la città santa di $jerusalem$ nelle nostre menti, poiché non solo fu il luogo dove Gesù predicò e morì, ma anche dove tornerà nella sua Seconda Venuta. Per questo, preghiamo sempre rivolti verso la direzione di $jerusalem$, non importa dove siamo." #OLD ITA
 jerusalem_focus_desc: "We always keep the holy city of $jerusalem$ in our minds, as not only it was the place where Jesus preached and died, but also where he will return to in his Second Coming. As such, we always pray facing in the direction of $jerusalem$, no matter where we are." #NEW
 #jerusalem_focus_desc: "We always keep the holy city of $jerusalem$ in our minds, as not only it was the place where Jesus preached and died, but also where he will come back in his Second Coming. As such, we always pray facing the direction towards $jerusalem$, no matter where we are." #OLD ENG
 #acceptance_of_old_testament: "Accettazione dell'Antico Testamento" #OLD ITA
 acceptance_of_old_testament: "Acceptance of the Old Testament" #NEW
 #acceptance_of_old_testament: "Acceptance of Old Testament" #OLD ENG
 #acceptance_of_old_testament_desc: "Alcune denominazioni $christian_ADJ$ hanno deciso di ridurre l'importanza dell'Antico Testamento, affermando che l'arrivo di Gesù lo supera completamente. Noi, tuttavia, sosteniamo che è ancora rilevante, e che alcune istruzioni in esso sono valide come lo erano quando furono scritte." #OLD ITA
 acceptance_of_old_testament_desc: "Some $christian_ADJ$ denominations have decided to reduce the importance of the Old Testament, claiming that the arrival of Jesus completely supersedes it. We, however, maintain that it is still relevant, and that some instructions in it are as valid as they were when they were written." #NEW
 #acceptance_of_old_testament_desc: "Some $christian_ADJ$ denominations have decided to reduce the importance of the Old Testament, claiming that the arrival of Jesus complete supersedes it. We, however, maintain that it is still relevant, and that some instructions in it are as valid as they were when they were written." #OLD ENG
 primacy_of_alexandria: "Primato di $alexandria$"
 #primacy_of_alexandria_desc: "Sebbene il $miaphysite$ abbia molti rami e leader indipendenti, riconosciamo $alexandria$ e la sua sede come nostro leader spirituale. Questo è solo un segno di rispetto per il Trono Apostolico lì, e un modo per onorarlo, piuttosto che una concessione di prerogative speciali ad esso." #OLD ITA
 primacy_of_alexandria_desc: "Although $miaphysite$ has many branches and independent leaders, we recognize $alexandria$ and its seat as our spiritual leader. However, this is a sign of respect for the Apostolic Throne and a way to honor it, rather than a bestowal of any special prerogatives." #NEW
 #primacy_of_alexandria_desc: "Although $miaphysite$ has many branches and independent leaders, we recognize $alexandria$ and its seat as our spiritual leader. This is just a sign of respect for the Apostolic Throne there, and a way to honor it, rather than a bestowal of any special prerogatives to it." #OLD ENG
 school_of_alexandria: "Scuola di $alexandria$"
 #school_of_alexandria_desc: "La $school_of_alexandria$ Catechetica, presumibilmente fondata dall'Apostolo Marco stesso secondo San Girolamo, è la più antica scuola di catechismo al mondo. In essa, studi biblici e teologici sono stati insegnati dall'inizio stesso del $christian$. Sebbene la scuola stessa fu distrutta quando il vescovo di $rome$ fu dichiarato al di sopra del patriarca di $alexandria$, la sua tradizione è perdurata." #OLD ITA
 school_of_alexandria_desc: "The Catechetical $school_of_alexandria$, allegedly founded by the Apostle Mark himself, is the oldest school of catechism in the world. There, biblical and theological studies have been taught since the start of $christian$ itself. Although the school itself was destroyed when the Bishop of $rome$ was declared to be above the Patriarch of $alexandria$, its tradition has endured." #NEW
 #school_of_alexandria_desc: "The Catechetical $school_of_alexandria$, allegedly founded by the Apostle Mark himself according to Saint Jerome, is the oldest school of catechism in the world. In it, biblical and theological studies have been taught since the start of $christian$ itself. Although the school itself was destroyed when de bishop of $rome$ was declared to be above the patriarch of $alexandria$, its tradition has endured." #OLD ENG
 #preserving_of_local_languages: "Preservazione delle Lingue Locali" #OLD ITA
 preserving_of_local_languages: "Preservation of Local Languages" #NEW
 #preserving_of_local_languages: "Preserving of Local Languages" #OLD ENG
 #preserving_of_local_languages_desc: "Nonostante l'importanza del $greek_language$ e del $latin_language$ nel primo $christian$, il $miaphysite$ ha preservato la sua liturgia in vernacoli più locali, come il $coptic_language$, l'$aramaic_language$ e l'$armenian_language$. Lingue antiche e tradizionali a pieno titolo, ogni ramo $miaphysite_ADJ$ preserva la propria lingua storica." #OLD ITA
 preserving_of_local_languages_desc: "Despite the importance of $greek_language$ and $latin_language$ in early $christian$, $miaphysite$ has preserved its liturgy in more local vernaculars, like $coptic_language$, $aramaic_language$, and $armenian_language$. Venerable languages in their own right, each $miaphysite_ADJ$ branch preserves its own historical tongue." #NEW
 #preserving_of_local_languages_desc: "Despite the importance of $greek_language$ and $latin_language$ in early $christian$, $miaphysite$ has preserved its liturgy in more local vernaculars, like $coptic_language$, $aramaic_language$, and $armenian_language$. Old and traditional languages in their own right, each $miaphysite_ADJ$ branch preserves its own historical tongue." #OLD ENG
 double_patriarchate: "Doppio Patriarcato"
 #double_patriarchate_desc: "Sia $alexandria$ che $antioch$ si vedono come aventi due patriarcati diversi, uno per il $miaphysite$ e un altro per l'$orthodox$. Sebbene possano rivendicare la legittimità della loro linea, solo il $miaphysite$ sta preservando i veri patriarcati." #OLD ITA
 double_patriarchate_desc: "Both $alexandria$ and $antioch$ see themselves as having two different patriarchates, one for $miaphysite$ and another for $orthodox$. Although they both may claim legitimacy, only $miaphysite$ preserves the true patriarchates." #NEW
 #double_patriarchate_desc: "Both $alexandria$ and $antioch$ see themselves as having two different patriarchates, one for $miaphysite$ and another for $orthodox$. Although they may claim the legitimacy of their line, only $miaphysite$ is preserving the true patriarchates." #OLD ENG
 eastern_christianity: "$christian$ Orientale"
 #eastern_christianity_desc: "Facciamo parte del ramo del cosiddetto $eastern_christianity$, che amalgama molte denominazioni diverse con diverse tradizioni teologiche e liturgiche, ma con molti aspetti culturali comuni." #OLD ITA
 eastern_christianity_desc: "We are part of the branch of so-called $eastern_christianity$, which amalgamates many different denominations with different theological and liturgical traditions, but also with many common cultural aspects." #NEW
 #eastern_christianity_desc: "We are part of the branch of the so-called $eastern_christianity$, which amalgamates many different denominations with different theological and liturgical traditions, but with many common cultural aspects." #OLD ENG
 #life_among_infidels: "Vita tra gli Infedeli" #OLD ITA
 life_among_infidels: "Life Among Heathens" #NEW
 #life_among_infidels: "Life Among Infidels" #OLD ENG
 #life_among_infidels_desc: "Le terre della nostra fede sono state spesso contaminate dalla presenza di infedeli, ma così i nostri predicatori si sono avventurati verso l'ignoto per portare la luce di Gesù in terre lontane. Abbiamo quindi influenzato questi infedeli in più modi di quanto ci si potrebbe aspettare, anche se non siamo stati in grado di far loro vedere l'errore delle loro credenze." #OLD ITA
 life_among_infidels_desc: "The lands of the faithful have often been tainted by the presence of unbelievers, but this is why our clerics have ventured forth towards the unknown to bring the light of Jesus to distant lands. We have thus influenced these lost souls in more ways than what one might expect, even if we have not been able to make them see the error of their beliefs." #NEW
 #life_among_infidels_desc: "The lands of our faith have often been tainted by the presence of infidels, but so have our preachers ventured forth towards the unknown to bright the light of Jesus to far-away lands. We have thus influenced these infidels in more ways than what one might expect, even if we have not been able to make them see the error of their beliefs." #OLD ENG
 gradual_departure: "Partenza Graduale"
 #gradual_departure_desc: "Sebbene siano stati rapidi a marchiarci come eretici, il $miaphysite$ non ha tagliato i legami con il resto del mondo $christian_ADJ$ istantaneamente. Abbiamo mantenuto il contatto con gli altri patriarcati, e partecipato ai concili, ma è stato gradualmente chiarito che il $miaphysite$ è diverso da quelle credenze eretiche." #OLD ITA
 gradual_departure_desc: "Although they were quick to brand us as heretics, $miaphysite$ did not cut ties with the rest of the $christian_ADJ$ world instantly. We kept in contact with the other patriarchates, and attended the councils, but it was gradually made clear that $miaphysite$ is too different from those heretical beliefs." #NEW
 #gradual_departure_desc: "Although they were quick to brand us as heretics, $miaphysite$ did not cut ties with the rest of the $christian_ADJ$ world instantly. We kept in contact with the other patriarchates, and attending the councils, but it was gradually made clear that $miaphysite$ is different from those heretical beliefs." #OLD ENG
 #thrive_under_persecution: "Prosperare sotto Persecuzione" #OLD ITA
 thrive_under_persecution: "Thriving Under Persecution" #NEW
 #thrive_under_persecution: "Thrive under Persecution" #OLD ENG
 #thrive_under_persecution_desc: "Sebbene i nostri fedeli siano stati perseguitati dagli eretici e dagli infedeli per secoli, la nostra fede ha perseverato. Non importa quante volte ci abbattono, risorgiamo di nuovo." #OLD ITA
 thrive_under_persecution_desc: "Although our faithful have been persecuted by heretics for centuries, our beliefs have persevered. No matter how many times they bring us down, we will rise again!" #NEW
 #thrive_under_persecution_desc: "Although our faithful have been persecuted by the heretics and infidels over centuries, our faith has persevered. No matter how many times they bring us down, we rise again." #OLD ENG
 #preserver_of_national_identity: "Preservatore dell'Identità Nazionale" #OLD ITA
 preserver_of_national_identity: "Preserving National Identity" #NEW
 #preserver_of_national_identity: "Preserver of National Identity" #OLD ENG
 #preserver_of_national_identity_desc: "È proprio per essere stati oppressi e perseguitati, che la nostra Chiesa può rivendicare il manto di preservatore della nostra identità. È stato nel seno della Chiesa dove le nostre lingue e tradizioni sono state meglio preservate, e la nostra fede in essa è rimasta intatta." #OLD ITA
 preserver_of_national_identity_desc: "It is because of our history of being persecuted and oppressed that our Church became responsible for preserving our identity. It is in the bosom of the Church where our languages and traditions have been kept safe, and therefore we have unshakeable faith in this institution." #NEW
 #preserver_of_national_identity_desc: "It is precisely due to having been oppressed and persecuted, that our Church can claim the mantle of preserver of our identity. It has been in the bosom of the Church where our languages and traditions have been best preserved, and our faith in it has been unbroken." #OLD ENG
 defense_against_heretics: "Difesa Contro gli Eretici"
 #defense_against_heretics_desc: "Sin dalla nostra separazione da loro, molte volte gli eretici sono venuti da noi con accuse e condanne. Si definiscono $christian_ADJ$, ma le loro opinioni sono ovviamente fuorviate dall'eresia mentre la nostra visione è chiara per la luce di Dio." #OLD ITA
 defense_against_heretics_desc: "Ever since our split from other $christian_ADJ$ faiths, the heretics have come to us with accusations and condemnations many times. They may call themselves $christian_ADJ$, but their views are obviously clouded, whereas our vision is made clear by the light of God." #NEW
 #defense_against_heretics_desc: "Ever since our split from them, many times have the heretics come to us with accusations and condemnations. They call themselves $christian_ADJ$, but their views are obviously misguided by heresy while our vision is clear by the light of God." #OLD ENG
 remote_patriarchates: "Patriarcati Remoti"
 #remote_patriarchates_desc: "A causa del fatto che il nostro popolo è stato conquistato e perseguitato, le sedi dei nostri patriarcati sono cadute molte volte nelle mani degli infedeli e sotto il loro controllo. Per questo, siamo stati costretti a rilocare e trasferire il nostro patriarcato in un luogo diverso, ma la sede originale è ancora preservata e riverita, anche se operante da distanza." #OLD ITA
 remote_patriarchates_desc: "Conquest and persecution have repeatedly forced our patriarchates to relocate after their seats have fallen under control of heathen conquerors. Though we now operate from new locations, the original seats remain spiritually revered in our tradition, albeit from a distance." #NEW
 #remote_patriarchates_desc: "Due to our people being conquered and persecuted, the seats of our patriarchates have many times fallen at the hand of the infidels and under their control. As such, we have been forced to relocate and transfer our patriarchate to a different place, but the original seat is still preserved and revered, even if operating from a distance." #OLD ENG
 further_reaches: "Estensioni Ulteriori"
 #further_reaches_desc: "Nonostante la nostra fede si sia vista confinata tra infedeli in molti casi, è stata anche in grado di raggiungere luoghi più lontani, e diffondersi a molti popoli e culture diverse." #OLD ITA
 further_reaches_desc: "Despite many attempts by nonbelievers to stop our faith from spreading, it has nevertheless made its way to many different peoples and cultures, bringing light wherever it goes." #NEW
 #further_reaches_desc: "Despite our faith having seen itself confined among infidels in many cases, it has also been able to reach further away places, and spread to many different peoples and cultures." #OLD ENG
 internal_communion: "Comunione Interna"
 #internal_communion_desc: "Nonostante abbiano patriarchi indipendenti, tutti i rami del $miaphysite$ hanno comunione interna tra loro. Questo permette loro di avere relazioni strette tra loro, e assicura l'unità della Chiesa." #OLD ITA
 internal_communion_desc: "Despite having independent patriarchs, all branches of $miaphysite$ maintain mutual communion. This helps them build relationships with each other, and promotes unity in the Church." #NEW
 #internal_communion_desc: "Despite having independent patriarchs, all branches of $miaphysite$ have internal communion among themselves. This allows them to have close relations with each other, and ensures the unity of the Church." #OLD ENG
 cradle_of_monasticism: "Culla del Monachesimo"
 #cradle_of_monasticism_desc: "La tradizione monastica nel $christian$ nacque in $egypt_region$, quando i fedeli $christian_ADJ$ lì andarono nel deserto a pregare e dedicare le loro vite a Dio. Il $miaphysite$ può rivendicare questa culla come propria, attraverso la tradizione Alessandrina." #OLD ITA
 cradle_of_monasticism_desc: "Monasticism in $christian$ was born in $egypt_region$, when the $christian_ADJ$ faithful retreated to the desert to pray and dedicate their lives to God. $miaphysite$ can therefore claim this history as their own through the Alexandrine tradition." #NEW
 #cradle_of_monasticism_desc: "Monasticism tradition in $christian$ was born in $egypt_region$, when $christian_ADJ$ faithful there went to the desert to pray and dedicate their lives to God. $miaphysite$ can claim this cradle as their own, through the Alexandrine tradition." #OLD ENG
 unique_architecture: "Architettura Unica"
 #unique_architecture_desc: "L'isolamento relativo dei nostri patriarcati ha portato a stili unici di architettura per i nostri luoghi sacri. Sebbene altre denominazioni $christian_ADJ$ possano essere state più prominenti, i nostri stili architettonici unici possono ugualmente catturare i cuori dei fedeli." #OLD ITA
 unique_architecture_desc: "The relative isolation of our patriarchates have resulted in the development of unique architectural styles for our holy places. Although other $christian_ADJ$ denominations may be more prominent, our captivating architecture is an inspiration to the faithful." #NEW
 #unique_architecture_desc: "The relative isolation of our patriarchates have resulted in unique styles of architecture for our holy places. Although other $christian_ADJ$ denominations may have been more prominent, our unique architecture styles can equally capture the hearts of the faithful." #OLD ENG

 #America
 #North American
 medicinal_infusions: "Infusi Medicinali"
 #medicinal_infusions_desc: "Le proprietà curative di certe piante hanno aiutato il nostro popolo a superare diverse malattie per secoli. Infusi fatti di alcune foglie particolari si dice che allunghino la vita del nostro popolo." #OLD ITA
 medicinal_infusions_desc: "The healing properties of certain plants have helped our people overcome different diseases for centuries. Infusions of certain leaves have even been said to lengthen the lives of our people." #NEW
 #medicinal_infusions_desc: "The healing properties of certain plants have helped our people overcome different diseases for centuries. Infusions made of some particular leaves have been said to lengthen the life of our people." #OLD ENG
 canoe_travels: "Canoe"
 #canoe_travels_desc: "Usando canoe leggere, possiamo sfruttare meglio le vie d'acqua e il trasporto del $north_america$, espandendo notevolmente la nostra capacità di dirigere il flusso di commercio e persone." #OLD ITA
 canoe_travels_desc: "Lightweight canoes are perfectly adapted to the waterways of $north_america$. These vessels can navigate shallow rivers and are light enough to portage — carry overland— when necessary. In this way, we can turn disconnected waterways into full trade routes, making it much easier to direct the flow of commerce and people." #NEW
 #canoe_travels_desc: "By using light canoes, we can better take advantage of the waterways and portage of $north_america$, greatly expanding our ability to direct the flow of trade and people." #OLD ENG
 seasonal_economy: "Economia Stagionale"
 #seasonal_economy_desc: "In tempi difficili, dobbiamo imparare a sopportare la vita. E la vita è sinonimo di natura. Il cambio delle stagioni implica anche il cambio dei nostri costumi. I villaggi devono essere tanto temporanei e mobili quanto il tempo." #OLD ITA
 seasonal_economy_desc: "In troubled times, we must learn to endure life, and life is synonymous with nature. The change of seasons necessitates a change in our lifestyles; villages must be adaptable and mobile." #NEW
 #seasonal_economy_desc: "In troubled times, we must learn to endure life. And life is synonymous with nature. The changing of seasons also implies the changing of our customs. Villages must be as temporary and mobile as the weather." #OLD ENG
 fishing_habits: "Abitudini di Pesca"
 #fishing_habits_desc: "A volte è difficile credere che alcuni del nostro popolo siano nati sulla terra e non nell'acqua, poiché i loro corpi nuotano con tale agilità che è quasi impossibile distinguerli dalla corrente del fiume." #OLD ITA
 fishing_habits_desc: "Sometimes it is difficult to believe that some of our people were born on land and not in the water, for their bodies swim with such agility that it is nearly impossible to distinguish them from the current of the river. As a result, we are experts at fishing." #NEW
 #fishing_habits_desc: "Sometimes it is difficult to believe that some of our people were born in land and not in water, for their bodies swim with such agility that it is nearly impossible to distinguish them from the current of the river." #OLD ENG
 whale_hunters: "Cacciatori di Balene"
 #whale_hunters_desc: "Balene, focene, trichechi, foche. Tutto ciò che il mare ci dà ed è più grande delle nostre voci, del nostro incauto sentimento di orgoglio. Tutto ciò che il mare ci dà, lo cacciamo." #OLD ITA
 whale_hunters_desc: "Whales, porpoises, walruses, seals... everything the sea gives us, we hunt." #NEW
 #whale_hunters_desc: "Whales, porpoises, walruses, seals. Everything the sea gives us and is greater than our voices, than our incautious sentiment of pride. Everything the sea gives us, we hunt it." #OLD ENG
 moundbuilding_advance: "Costruttori di Tumuli"
 #moundbuilding_advance_desc: "I tumuli del $north_america$ sono grandi monumenti alle imprese del nostro popolo, e dovremmo mantenere la loro struttura nella pianificazione delle nostre infrastrutture." #OLD ITA
 moundbuilding_advance_desc: "The ceremonial mounds built by our ancestors are monuments to their sophisticated earthwork engineering skills. By incorporating these mounds into the planning of our infrastructure, we will preserve a defining tradition of our civilization." #NEW
 #moundbuilding_advance_desc: "The mounds of $north_america$ are great monuments to the achievements of our people, and we should retain their structure in the planning of our infrastructure." #OLD ENG
 bison_hunters: "Cacciatori di Bisonti"
 #bison_hunters_desc: "I bisonti sono vita per il nostro popolo. Usiamo ogni parte dell'animale come tributo al suo sacrificio. Nutriamo il nostro popolo con la sua carne, usiamo le sue ossa per strumenti, usiamo la sua pelliccia contro il freddo durante i lunghi inverni o le sue pelli per i nostri vestiti o per coprire i nostri tipi, usiamo la sua anima come nostro animale simbolo. Tale è l'importanza del bisonte per la nostra cultura che ci sentiremmo senza guida senza di loro." #OLD ITA
 bison_hunters_desc: "Bison are a crucial resource for our people. We use every part of the animal as a tribute to its sacrifice. We feed our people with its flesh, we use its bones for tools; we use its fur to protect ourselves against the cold and its hides for our clothes. Even the animal's soul has symbolic meaning for us. Such is the importance of the bison to our culture that we would feel lost without them." #NEW
 #bison_hunters_desc: "Bisons are life to our people. We use every part of the animal as a tribute to its sacrifice. We feed our people with its flesh, we use its bones for tools, we use its fur against the cold during the long winters or its hides for our clothes or to cover our tipis, we use its soul as our symbol animal. Such is the importance of the bison for our culture that we would feel guideless without them." #OLD ENG
 federal_constitution: "Costruttori di Federazioni"
 #federal_constitution_desc: "Dovremmo unirci con popoli affini per formare una federazione, che pone la fiducia reciproca e lo sviluppo come loro massima priorità." #OLD ITA
 federal_constitution_desc: "We should unite with other groups of our kin to form a federation, which will put mutual trust and development as its first priority." #NEW
 #federal_constitution_desc: "We should band together with kindred people to form a federation, which puts mutual trust and development as their highest priority." #OLD ENG
 shared_knowledge: "Conoscenza Condivisa"
 #shared_knowledge_desc: "L'innovazione può venire in molte forme e se vogliamo mantenere il nostro posto di fronte alle minacce di tribù rivali, dovremo esplorare ogni vantaggio che potremmo ottenere." #OLD ITA
 shared_knowledge_desc: "Innovation can come in many forms and if we want to stay ahead of rival tribes, we will need to explore every advantage we can get." #NEW
 #shared_knowledge_desc: "Innovation can come in many forms and if we want to retain our place in the face of threats of rival tribes, we will need to explore every advantage we might get." #OLD ENG
 slash_and_burn: "Agricoltura Taglia e Brucia"
 #slash_and_burn_desc: "C'è una tecnica agricola che comporta la combustione della vegetazione per ottenere uno strato ricco di nutrienti di cenere che fertilizza il suolo. Abbiamo imparato che la terra diventa più forte dopo questo metodo, poiché diventa più forte dopo essere stata spezzata." #OLD ITA
 slash_and_burn_desc: "An agricultural technique that involves strategically cutting and burning the vegetation to obtain a nutrient-rich layer of ash that fertilizes underlying soil, making it excellent land for planting crops. We have learned that the land becomes stronger after this method, as a bone becomes stronger after being broken." #NEW
 #slash_and_burn_desc: "There is an agricultural technique that involves the burning of the vegetation to obtain a nutrient-rich layer of ash that fertilizes the soil. We have learned that the land becomes stronger after this method, as it gets stronger after being broken." #OLD ENG
 council_of_elders: "Consiglio degli Anziani"
 #council_of_elders_desc: "Il governo della nostra tribù esiste per assicurare che tutte le persone che ne fanno parte abbiano una voce e un parere in tutte le decisioni. Collaborare nell'amministrazione della nostra terra ci aiuterà a considerare nuove prospettive." #OLD ITA
 council_of_elders_desc: "Our tribal government ensures that everyone in it has a voice and an equal say in crucial decisions. This collaborative administration encourages us to consider new perspectives." #NEW
 #council_of_elders_desc: "The government of our tribe exists to ensure that all the people forming part of it have a voice and a saying in all the decisions. Collaborating in the administration of our land will help us consider new perspectives." #OLD ENG
 #experienced_fur_hunters: "Commercio di Pellicce" #OLD ITA
 experienced_fur_hunters: "$fur$ Trade" #NEW
 #experienced_fur_hunters: "Fur Trade" #OLD ENG
 #experienced_fur_hunters_desc: "Il commercio di pellicce con altre tribù e stranieri è una parte essenziale della nostra economia. Siamo molto orgogliosi delle nostre abilità di caccia e quindi siamo in grado di fornire la migliore qualità di pelliccia animale." #OLD ITA
 experienced_fur_hunters_desc: "Trading $fur$ with other tribes and foreigners is an essential part of our economy. We take great pride in our hunting abilities, and therefore are able to provide the best quality pelts." #NEW
 #experienced_fur_hunters_desc: "Fur trade with other tribes and foreigners is an essential part of our economy. We take great pride in our hunting abilities and therefore are able to provide the best quality of animal fur." #OLD ENG
 #Mesoamerica
 pyramid_architecture: "Architettura Piramidale"
 #pyramid_architecture_desc: "Il nostro popolo non è estraneo alla costruzione di strutture monumentali, costruendo piramidi di pietra dai giorni lontani di Teōtīhuacān, Tik'al, Copan e Palenque. Non abbiamo dimenticato l'arte della costruzione di piramidi e possiamo continuare questa tradizione." #OLD ITA
 pyramid_architecture_desc: "Our ancestors constructed massive stone pyramids in the far-gone days of Teōtīhuacān, Tik'al, Copan, and Palenque. We have not forgotten the art of pyramid building, and can carry on this tradition." #NEW
 #pyramid_architecture_desc: "Our people are no strangers to building monumental structures, constructing stone pyramids since the far-gone days of Teōtīhuacān, Tik'al, Copan, and Palenque. We have not forgotten the art of pyramid building and can carry on this tradition." #OLD ENG
 ball_game: "Tlachtli"
 #ball_game_desc: "Al centro della vita sociale nella nostra terra c'è il gioco della palla, dove i giocatori si sforzano di mantenere la palla nel campo di gioco colpendola con i fianchi. È sia un'alternativa rituale alla guerra che una grande parte della vita religiosa." #OLD ITA
 ball_game_desc: "The heart of social life in our society is the ball game, where players strive to keep the ball inside the playing court by striking it with their hips. It is both a ritual alternative to warfare and a large part of religious life." #NEW
 #ball_game_desc: "At the heart of social life in our land is the ball game, where players strive to keep the ball into the playing court by striking it with their hips. It is both a ritual alternative to warfare and a great part of religious life." #OLD ENG
 war_bonfires: "Falò di Guerra"
 #war_bonfires_desc: "Una rete di insediamenti di frontiera collegati tra loro da immensi falò per permettere all'allarme di diffondersi rapidamente ci permetterà di rispondere velocemente a qualsiasi nuova minaccia." #OLD ITA
 war_bonfires_desc: "A network of frontier settlements linked together by immense bonfires, which can be seen from a huge distance when lit, will allow us to quickly alert multiple settlements at once to threats, and therefore respond far faster." #NEW
 #war_bonfires_desc: "A network of frontier settlements linked together by immense bonfires to allow alert to quickly spread will enable us to respond quickly to any new threat." #OLD ENG
 merchant_officials: "Funzionari-Mercanti"
 #merchant_officials_desc: "I mercanti sono una fonte preziosa di reddito per il nostro paese. Portano ricchezza direttamente al nostro governante e riferiscono sulle circostanze in cui si trovano i nostri vicini." #OLD ITA
 merchant_officials_desc: "Merchants and their trading contribute substantially to our national income. However, merchants are also excellent sources of information, as they are often in the position to observe first-hand what circumstances our neighbors are in. By giving them official roles in the government, we can exploit their knowledge and mobility to our own ends." #NEW
 #merchant_officials_desc: "Merchants are a value source of income for our country. They bring wealth directly to our ruler and report on the circumstances our neighbors find themselves in." #OLD ENG
 copperworking: "Lavorazione del Rame"
 #copperworking_desc: "I nostri artigiani hanno iniziato a fabbricare strumenti dal metallo trovato nelle nostre terre. Se dovessimo padroneggiare quest'arte, ci darebbe un vantaggio tremendo sui nostri vicini." #OLD ITA
 copperworking_desc: "Our artisans have begun to craft tools out of $copper$, a precious metal found throughout our territory. If we were to master this art, it would give us a tremendous advantage over our neighbors." #NEW
 #copperworking_desc: "Our artisans have begun to craft tools out of the metal found in our lands. If we were to master this art, it would give us a tremendous advantage on our neighbors." #OLD ENG
 system_of_tributaries: "Sistema Tributario"
 #system_of_tributaries_desc: "Il governo diretto del territorio comporta il costo di grandi investimenti nella pacificazione della popolazione locale e dell'amministrazione soggiogata. Stabilire un governante leale e richiedere un tributo annuale elimina la minaccia di un $altepetl$ rivale e riempie il nostro stesso tesoro in modo facile e conveniente." #OLD ITA
 system_of_tributaries_desc: "Direct rule comes at the cost of extensive investment in subjugating and pacifying rival groups. By instead installing a loyal official to rule locally and demanding they pay an annual tribute, we eliminate threats from any rival $altepetl$ while filling our treasury at the same time." #NEW
 #system_of_tributaries_desc: "Direct rule of territory comes at the cost of great investment into pacifying the local population and subjugated administration. Establishing a loyal ruler and demanding an annual tribute eliminates the threat of a rival $altepetl$ and fills our own treasury in an easy and convenient way." #OLD ENG
 refined_obsidian_weaponry: "Armamenti di Ossidiana"
 #refined_obsidian_weaponry_desc: "Il vetro di ossidiana nera è un ottimo materiale per strumenti di ogni tipo. La natura dura e fragile del vetro lo rende un compito facile creare lame, punte di lancia o punte di freccia che lasciano ferite mortali su qualsiasi nemico." #OLD ITA
 refined_obsidian_weaponry_desc: "Obsidian is an excellent material for making all kinds of tools and weapons. The hard, glasslike rock holds a sharp edge beautifully, making it an easy task to create blades, spearheads, or arrowheads which leave deadly wounds on any foe." #NEW
 #refined_obsidian_weaponry_desc: "Black obsidian glass is great material for tools of all kind. The hard and brittle nature of the glass makes it an easy task to create blades, spearheads, or arrowheads which leave deadly wounds on any foe." #OLD ENG
 #precious_stones_art: "Intaglio di Pietre Preziose" #OLD ITA
 precious_stones_art: "Precious Stone Carving" #NEW
 #precious_stones_art: "Carving of Precious Stones" #OLD ENG
 #precious_stones_art_desc: "La nostra area è ricca di pietre preziose e questi materiali forniscono ottimi materiali per statue, specchi o vasi. I nostri artigiani saranno in grado di immortalarsi con questi grandi strumenti e creare grandi monumenti alla nostra cultura." #OLD ITA
 precious_stones_art_desc: "Our area is rich in precious stones, which are excellent for adding color, detail, and sparkle to artistic pieces and mundanities alike. Our craftsmen will immortalize themselves through these glittering jewels, and create great monuments to our culture." #NEW
 #precious_stones_art_desc: "Our area is rich in precious stones and these materials provide great materials for statues, mirrors, or vases. Our craftsmen will be able to immortalize themselves with these great tools and create great monuments to our culture." #OLD ENG
 #cultivate_the_land: "Coltivare la Terra" #OLD ITA
 cultivate_the_land: "Cultivate the Land" #NEW
 #cultivate_the_land: "Cultivate The Land" #OLD ENG
 #cultivate_the_land_desc: "La giungla è un ambiente difficile in cui vivere, specialmente se il tuo popolo desidera coltivare il proprio cibo e non vivere della terra. Disboscare le giungle è quindi uno dei compiti più importanti per la nostra società se deve sopravvivere e prosperare. Dobbiamo organizzare il nostro popolo in modo tale da poter impiegare grandi forze lavoro di uomini abili per eseguire questi lavori ogni volta che sorge la necessità." #OLD ITA
 cultivate_the_land_desc: "The jungle is a harsh environment in which to live, especially for farming cultures. Clearing portions of the jungle to create arable land is therefore one of our most vital tasks. We must organize our people in such a way that we can employ large labor forces to carry out these works whenever the need arises." #NEW
 #cultivate_the_land_desc: "The Jungle is a harsh environment to live in, especially if your people wish to grow their food and not live off the land. Clearing jungles is therefore one of the most important tasks for our society if it is to survive and prosper. We must organize our people in such a way that we may employ large labor forces of able-bodied men to carry out these works whenever a need for them arises." #OLD ENG
 feathered_serpent: "Il Serpente Piumato"
 #feathered_serpent_desc: "Una leggenda diffusa nelle nostre terre parla del Serpente Piumato. Sebbene questa figura sia molte cose per molte persone, Quetzalcōātl tra i $nahua_group$, K'uk'ulkan tra i $maya_language$ o Q'uq'umatz tra i $kiche_culture$, è una fonte di unità attraverso la nostra terra." #OLD ITA
 feathered_serpent_desc: "The legend of the Feathered Serpent is well-known across our lands. Although this figure represents many things to many people, such as Quetzalcōātl among the $nahua_group$, K'uk'ulkan among the $maya_language$ or Q'uq'umatz among the $kiche_culture$, he is a unifying figure for all of them." #NEW
 #feathered_serpent_desc: "A widespread legend across our lands speaks of the Feathered Serpent. Although this figure is many things to many people, Quetzalcōātl among the $nahua_group$, K'uk'ulkan among the $maya_language$ or Q'uq'umatz among the $kiche_culture$, he is a source of unity across our land." #OLD ENG
 ritual_bloodletting: "Salasso Rituale"
 #ritual_bloodletting_desc: "In molte culture della nostra terra, è considerato appropriato per il governante usare il sacrificio e il salasso come modo di rendere omaggio agli dei. Nel mantenere quella tradizione, affermiamo il nostro diritto a governare." #OLD ITA
 ritual_bloodletting_desc: "Many cultures in this region consider ritual sacrifice and bloodletting by the ruler as a way of paying homage to the gods. Maintaining this tradition pleases the gods and affirms our right to rule through divine tribute." #NEW
 #ritual_bloodletting_desc: "In many cultures of our land, it is considered proper for the ruler to use sacrifice and bloodletting as a way of paying homage to the gods. In maintaining that tradition, we affirm our right to rule." #OLD ENG
 
 #South America
 valley_irrigation: "Irrigazione Inter-Valle"
 #valley_irrigation_desc: "Costruendo grandi canali che collegano le fonti d'acqua delle valli della nostra patria insieme, possiamo migliorare notevolmente le nostre tecniche di irrigazione e la produttività della nostra terra." #OLD ITA
 valley_irrigation_desc: "By building extensive networks of canals and connecting the waterways of our homeland's valleys, we can greatly improve our irrigation techniques and the productivity of our farmlands." #NEW
 #valley_irrigation_desc: "By building great canals connecting the water sources of the valleys of our homeland together, we can greatly improve our irrigation techniques and the productivity of our land." #OLD ENG
 #artisan_migration: "Trasferimenti di Artigiani" #OLD ITA
 artisan_migration: "Relocating Artisans" #NEW
 #artisan_migration: "Artisan Relocations" #OLD ENG
 #artisan_migration_desc: "Non è appropriato che le nostre terre conquistate abbiano artigiani e uomini saggi migliori della capitale. Le mani e le menti più grandi dell'impero devono essere portate alla capitale per servirci direttamente." #OLD ITA
 artisan_migration_desc: "It is not fitting that territories we have conquered should have better artisans and wiser advisors than in our capital. The greatest hands and minds of the empire must be brought to the capital to serve us directly." #NEW
 #artisan_migration_desc: "It is not fitting that our conquered lands should have better artisans and wise men than the capital. The greatest hands and minds of the empire must be brought to the capital to serve us directly." #OLD ENG
 terrace_farming: "Agricoltura a Terrazzamenti"
 #terrace_farming_desc: "Per trarre il massimo vantaggio dallo spazio limitato degli altipiani, abbiamo sviluppato l'agricoltura a terrazzamenti e migliori tecniche di irrigazione." #OLD ITA
 terrace_farming_desc: "To take maximum advantage of the limited space in our highlands, we have developed terrace farming, a series of step-like platform fields on the sides of the mountains, as well as better irrigation techniques." #NEW
 #terrace_farming_desc: "To take maximal advantage of the limited space of the highlands, we have developed terrace farming and better irrigation techniques." #OLD ENG
 mountain_cities: "Fortezze di Vetta"
 #mountain_cities_desc: "Le nostre città e fortezze giacciono in cima a immense montagne, ben oltre le nuvole. Presentano un ostacolo formidabile a chiunque cerchi di invaderci." #OLD ITA
 mountain_cities_desc: "Our cities and fortresses occupy the tops of immense mountains, well past the clouds. They present a formidable obstacle to anyone who might attempt to invade us." #NEW
 #mountain_cities_desc: "Our cities and fortresses lie atop immense mountains, well past the clouds. They present a formidable obstacle to anyone who would seek to invade us." #OLD ENG
 river_trade: "Commercio Fluviale"
 #river_trade_desc: "La ricchezza dei grandi fiumi e mari è sempre stata ciò che nutre il nostro popolo. Abbracciamo il commercio fluviale e facciamo ciò che possiamo per proteggere i molti mercanti che viaggiano lungo la costa fino alla foce del grande fiume così che non manchino mai i bei beni che ci portano." #OLD ITA
 river_trade_desc: "The bounty of our great rivers and seas has always fed our people. Let us embrace the river trade, and do what we can to protect the many merchants that travel along the coast to the mouth of the mighty river, so that we may never lack for the fine goods they bring us." #NEW
 #river_trade_desc: "The wealth of the great rivers and seas has always been what feeds our people. Let us embrace the river trade and do what we can to protect the many merchants that travel along the coast to the mouth of the great river so that we may never lack for the fine goods they bring us." #OLD ENG
 rainforests_and_mountaintops: "Foreste Pluviali e Cime Montuose"
 #rainforests_and_mountaintops_desc: "Le foreste pluviali e le montagne della nostra terra brulicano di vita. A parte gli spiriti delle foreste, giaguari, anaconde, tarantole e una miriade di altri animali vivono tra noi e per qualcuno che li conosce offrono poco pericolo diretto. Per un nemico invasore, tuttavia, queste terre potrebbero sembrare una fortezza e gli animali selvatici i suoi difensori." #OLD ITA
 rainforests_and_mountaintops_desc: "The rainforests and mountains of our land are teeming with life. Apart from the spirits of the forests, jaguars, anacondas, tarantulas, and a myriad of other animals live among us, and for someone who knows them, they offer little direct danger. To an invading enemy, however, these lands might seem like a fortress and the wild animals as its defenders." #NEW
 #rainforests_and_mountaintops_desc: "The rainforests and mountains of our land are teeming with life. Apart from the spirits of the forests, jaguars, anacondas, tarantulas, and a myriad of other animals live among us and for someone who knows them they offer little direct danger. For an invading enemy, however, these lands might seem like a fortress and the wild animals as its defenders." #OLD ENG
 knot_system: "Nodi Parlanti"
 #knot_system_desc: "Usando la disposizione di corde e nodi per registrare informazioni, possiamo facilitare notevolmente l'amministrazione delle nostre terre e la registrazione di informazioni vitali." #OLD ITA
 knot_system_desc: "By using arrangements of cords and knots to record information, we can greatly facilitate administration of our lands and keeping accurate records of vital information." #NEW
 #knot_system_desc: "By using arrangement of cords and knots to record information, we can greatly facilitate the administration of our lands and the recording of vital information." #OLD ENG
 #llama_farming: "Allevamento di Lama" #OLD ITA
 llama_farming: "Llama Rearing" #NEW
 #llama_farming: "Llamas Farming" #OLD ENG
 #llama_farming_desc: "Le vaste mandrie di lama delle nostre terre ci forniscono tessuti per vestirci, carne per nutrirci e animali da soma per portare i nostri fardelli. Sono veramente inestimabili." #OLD ITA
 llama_farming_desc: "Our vast herds of llamas provide us with fabrics to clothe ourselves, meat to feed ourselves, and pack animals to carry our burdens. They are truly invaluable." #NEW
 #llama_farming_desc: "The vast llama herds of our lands provide us with fabrics to clothe ourselves, meat to feed ourselves, and pack animals to carry our burdens. They are truly invaluable." #OLD ENG
 mountain_roads: "Rete di Strade Montane"
 #mountain_roads_desc: "Per facilitare la redistribuzione dei beni, è necessaria una grande rete di strade montane che collegano valli lontane insieme e attraversano gole profonde. Costruiamola." #OLD ITA
 mountain_roads_desc: "To facilitate easier distribution of goods, a great network of mountain roads connecting far-off valleys together and crossing deep gorges is required. Let us build it." #NEW
 #mountain_roads_desc: "To facilitate the redistribution of goods, a great network of mountain roads connecting far-off valleys together and crossing deep gorges is required. Let us build it." #OLD ENG

 tears_of_the_sun: "Lacrime del Sole"
 tears_of_the_sun_desc: "Sebbene avventurieri da terre lontane sognino di trovare oro segrete sui sentieri di montagna in alto nelle Ande, per noi il metallo giallo ha più importanza artistica e sacra che semplice valore economico."
 hidden_cities: "Città Nascoste"
 hidden_cities_desc: "In una terra di picchi immensi e foreste pluviali impenetrabili, molte delle nostre città sono quasi inaccessibili agli estranei. Potrebbero facilmente rimanere nascoste per secoli, dimenticate dal mondo."
 potato_production: "Produzione di Patate"
 #potato_production_desc: "Dove il mais cresce male negli altipiani elevati della nostra terra, abbiamo imparato a fare affidamento invece sulle radici tuberose altamente nutritive di una pianta locale. Con una maggiore produzione, possiamo nutrire il nostro popolo e i nostri guerrieri con cibo facilmente mantenibile." #OLD ITA
 potato_production_desc: "Since maize grows poorly in the high plateaus of our land, we have learned to rely instead on the highly nutritious roots of a local plant. With increased production, we can feed our people and our warriors with this easily maintained crop." #NEW
 #potato_production_desc: "Where maize grows poorly in the high plateaus of our land, we have learned to rely instead on the highly nutritious tub-like roots of a local plant. With increased production, we can feed our people and our warriors with easily maintained food." #OLD ENG
 head_hunters: "Cacciatori di Teste"
 #head_hunters_desc: "Conquistare terre da popoli più deboli è una parte necessaria del nostro paese. Queste circostanze hanno creato un codice guerriero unico secondo il quale catturare e non uccidere il nemico è la massima dimostrazione di coraggio e valore. Questo ha reso il nostro popolo famoso per la loro maestria nel catturare persone vive." #OLD ITA
 head_hunters_desc: "Conquering territory from weaker peoples is a necessary evil in our state. These circumstances have created a unique warrior code, according to which capturing and not killing the enemy is the highest display of bravery and valor. This has made our people famous for their mastery in capturing people alive." #NEW
 #head_hunters_desc: "Conquering land from weaker peoples is a necessary part of our country. These circumstances have created a unique warrior code according to which capturing and not killing the enemy is the highest display of bravery and valor. This has made our people famous for their mastery of capturing people alive." #OLD ENG
 border_raiders: "Incursori Abili"
 #border_raiders_desc: "I nostri incursori sono famosi per la loro capacità di eseguire attacchi fulminei contro nemici ignari. La loro velocità e capacità di eludere la rappresaglia nemica può essere un grande vantaggio anche per le nostre truppe regolari." #OLD ITA
 border_raiders_desc: "Our raiders are famous for their ability to carry out lightning-fast attacks against unaware enemies. Their speed and ability to evade enemy retaliation should be studied and employed by our regular troops as well." #NEW
 #border_raiders_desc: "Our raiders are famous for their ability to carry out lighting fast attacks against unaware enemies. Their speed and ability to evade enemy retaliation can be a great asset to our regular troops as well." #OLD ENG
 lva_baltic_forestry: "Baltic Forestry" #NEW
 lva_baltic_forestry_desc: "Our forests are a vital resource, providing timber for construction and fuel for our fires. We must manage them wisely to ensure their continued abundance." #NEW
 lva_baltic_forts: "Baltic Forts" #NEW
 lva_baltic_forts_desc: "Our network of forts and castles scattered across the landscape provides a first line of defense against invaders. These strongholds allow us to monitor and control key routes through the Baltic." #NEW

 
 irish_travelling_bards_advance: "Bardi Viaggianti"
 irish_travelling_bards_advance_desc: "Poeti tradizionali addestrati nelle maniere di corte attraversano le nostre terre in cerca di qualche signore probabile che li assuma."

 irish_booleying_advance: "Transumanza del Bestiame"
 #irish_booleying_advance_desc: "In Irlanda, l'allevamento di mucche è il nostro stile di vita. Il nobile bovino non è solo una fonte di cibo, ma un simbolo di ricchezza. Attraverso la transumanza, un sistema di spostamento delle nostre mandrie da un pascolo distante all'altro, possiamo far crescere quella ricchezza." #OLD ITA
 irish_booleying_advance_desc: "In $IRE$, cattle-rearing is our way of life. The noble bovine is not only a source of food, but a symbol of wealth. By #italic booleying#!, a system of moving our herds from one distant pasture to another, we can grow that wealth." #NEW
 #irish_booleying_advance_desc: "In Ireland, cow rearing is our way of life. The noble bovine is not only a source of food, but a symbol of wealth. By booleying, a system of moving our herds from one distant pasture to another, we can grow that wealth." #OLD ENG

 irish_monastacism_advance: "Monachesimo Insulare"
 #irish_monastacism_advance_desc: "Sebbene siamo ora allineati con le pratiche cattolico romane in linea di principio, la vita religiosa in queste isole ha ancora una grande attenzione sul clero laico." #OLD ITA
 irish_monastacism_advance_desc: "Although we are now aligned with Roman $catholic_ADJ$ practices in principle, religious life in our islands still puts a great focus on lay clergy." #NEW
 #irish_monastacism_advance_desc: "Although we are now aligned with Roman Catholic practices in principle, religious life on these islands still has a great focus on lay clergy." #OLD ENG

 guards_of_the_shannon_advance: "Guardie dello Shannon"
 #guards_of_the_shannon_advance_desc: "La fortezza di Athlone, che si erge a cavallo del possente fiume Shannon, è la chiave per controllare il cuore dell'Irlanda. Gli O'Kelly di $HYM$, signori di lunga data di queste terre, hanno combattuto ferocemente per difendere i loro possedimenti contro le incursioni normanne." #OLD ITA
 guards_of_the_shannon_advance_desc: "The fortress of Athlone, standing astride the mighty river Shannon, is the key to controlling the heart of $IRE$. The O'Kellys of $HYM$, long-standing lords of these lands, have fought fiercely to defend their holdings against $norman$ incursions." #NEW
 #guards_of_the_shannon_advance_desc: "The fortress of Athlone, standing astride the mighty river Shannon, is the key to controlling the heart of Ireland. The O'Kellys of $HYM$, long-standing lords of these lands, have fought fiercely to defend their holdings against Norman incursions." #OLD ENG
 
 hiberno_norman_keeps_advance: "Torri Iberno-Normanne"
 #hiberno_norman_keeps_advance_desc: "I nostri antenati normanni costruirono splendide torri per mantenere la loro presa sull'ostile interno irlandese." #OLD ITA
 hiberno_norman_keeps_advance_desc: "Our $norman$ forebears built splendid towers to maintain their grip on the hostile interior of $IRE$." #NEW
 #hiberno_norman_keeps_advance_desc: "Our Norman forebears built splendid towers to maintain their grip on the hostile Irish interior." #OLD ENG

 #irish_frontier_settlement_advance: "Insediamenti di Frontiera Irlandesi" #OLD ITA
 irish_frontier_settlement_advance: "$IRE_ADJ$ Frontier Settlements" #NEW
 #irish_frontier_settlement_advance: "Irish Frontier Settlements" #OLD ENG
 #irish_frontier_settlement_advance_desc: "La terra che abbiamo preso dagli Irlandesi è matura per lo sfruttamento, e persone del tipo giusto migrano da lontano per stabilirsi in queste terre da affitto economiche." #OLD ITA
 irish_frontier_settlement_advance_desc: "The land we have seized from the $IRE_ADJ$ is ripe for exploitation. We just need to ensure that only the right sort of people migrate here to settle these cheap crofts." #NEW
 #irish_frontier_settlement_advance_desc: "The land we have seized from the Irishry is ripe for exploitation, and people of the good sort migrate from far away to settle these cheap croft lands." #OLD ENG

 celtic_raiders_advance: "Furor Celtica"
 #celtic_raiders_advance_desc: "Per millenni, la nostra guerra guerrigliera feroce e agile ha tormentato stranieri e nemici, battendoli con una successione devastante di scaramucce evasive e cariche raccapriccianti." #OLD ITA
 celtic_raiders_advance_desc: "For millennia, our ferocious and agile guerilla warfare has harried our foes, besting them with a devastating succession of evasive skirmishing and blood-curdling charges." #NEW
 #celtic_raiders_advance_desc: "For millennia, our ferocious and agile guerilla warfare has harried strangers and foes, besting them with a devastating succession of evasive skirmishing and blood-curdling charges." #OLD ENG
 
 ple_pale_defenseworks_advance: "Opere del Pale"
 #ple_pale_defenseworks_advance_desc: "Il nostro confine è definito da leggere opere difensive di terrapieni e palizzate progettate per scoraggiare i nostri vicini indisciplinati dalle loro irritanti incursioni." #OLD ITA
 ple_pale_defenseworks_advance_desc: "Our boundary is defined by light defensive works of dykes and palisades designed to deter our unruly neighbors from launching their irritating raids." #NEW
 #ple_pale_defenseworks_advance_desc: "Our boundary is defined by light defensive works of dykes and palisades designed to deter our unruly neighbors from their irritating raids." #OLD ENG
 
 ple_irish_viking_towns_advance: "Antiche Città Vichinghe"
 ple_irish_viking_towns_advance_desc: "Gli antichi porti commerciali fondati dagli Ostmen sono ancora alveari brulicanti di attività mercantile dove gli scaltri possono arricchirsi."
 
 cel_defensive: "Le Colline Parlano Celtico"
 #cel_defensive_desc: "Secoli sotto l'ombra della conquista hanno insegnato ai nostri guerrieri l'arte della pazienza e della resilienza. Possiamo lanciarci a capofitto nel pericolo, ma possiamo anche resistere, difendere e colpire solo quando il momento è giusto." #OLD ITA
 cel_defensive_desc: "Centuries of living under the shadow of conquest have taught our warriors the art of patience and resilience. We can rush headlong into danger, but we can also endure, defend, and strike only when the moment is right." #NEW
 #cel_defensive_desc: "Centuries under the shadow of conquest have taught our warriors the art of patience and resilience. We can rush headlong into danger, but we can also endure, defend, and strike only when the moment is right." #OLD ENG

 cel_western_shore: "La Costa Occidentale"
 #cel_western_shore_desc: "Per millenni, abbiamo pescato, commerciato e combattuto lungo le selvagge coste atlantiche. Da queste acque dure abbiamo imparato un'arte marinaresca ineguagliata da qualsiasi rivale." #OLD ITA
 cel_western_shore_desc: "For millennia we have fished, traded, and fought along the wild Atlantic coasts. From these harsh waters, we have learned seamanship unmatched by any rival." #NEW
 #cel_western_shore_desc: "For millennia, we have fished, traded, and fought along the wild Atlantic coasts. From these harsh waters we have learned seamanship unmatched by any rival." #OLD ENG

 cel_the_wests_awake: "L'Ovest si Risveglia"
 cel_the_wests_awake_desc: "Dopo lunghi secoli di silenzio, l'antico spirito dei popoli celtici si muove ancora una volta, pronto a riconquistare il suo posto tra le grandi civiltà del mondo."

 cel_celtic_nations: "Nazioni Celtiche"
 cel_celtic_nations_desc: "La nostra unione è fondata sull'ideale di unire i diversi popoli del mondo celtico sotto uno stendardo condiviso. Attraverso la cooperazione, miriamo a preservare il nostro patrimonio, promuovere i nostri valori e assicurare che le nazioni celtiche prosperino insieme di fronte alle pressioni esterne e ai tempi che cambiano."

 cel_celtic_diaspora: "Diaspora Celtica"
 cel_celtic_diaspora_desc: "Dal contadino al capotribù, molti hanno lasciato le nostre coste attraverso difficoltà o speranza, tessendo una rete lontana di parentela che porta la nostra lingua, costumi e orgoglio a terre lontane."

 cel_pan_celtic_nationalism: "Pan-Celtismo"
 cel_pan_celtic_nationalism_desc: "La nostra visione di un mondo celtico unito è più di un ideale - è un richiamo alle armi per tutti coloro che condividono il nostro patrimonio. Insieme, forgiamo legami che raggiungono oltre i confini, rendendo la nostra identità duratura come le colline e i mari che chiamiamo casa."
 
 ire_grand_jury_system: "Sistema della Grand Jury"
 ire_grand_jury_system_desc: "Le grand jury di contea prelevano la tassa per strade, ponti e tribunali. Con i giudici che cavalcano le assise, la supervisione si stringe in ogni contea."

 #ire_irish_establishment: "Establishment Irlandese" #OLD ITA
 ire_irish_establishment: "$IRE_ADJ$ Establishment" #NEW
 #ire_irish_establishment: "Irish Establishment" #OLD ENG
 #ire_irish_establishment_desc: "Un Esercito permanente in Irlanda controllato dall'Irlanda mantiene le guarnigioni pronte e i costi sotto controllo. Per la nostra soldataglia regolare, questo significa paga regolare. Per i nostri logisti e quartiermastri, significa una rete crescente di caserme che mantiene i costi sotto controllo." #OLD ITA
 ire_irish_establishment_desc: "A permanent army in $IRE$ — and controlled #italic from#! Ireland — keeps garrisons ready and costs down. For our regular soldiery, this means regular pay. For our logisticians and quartermasters, it means a growing network of barracks that keeps the costs in hand." #NEW
 #ire_irish_establishment_desc: "A permanent Army in Ireland controlled from Ireland keeps garrisons ready and costs in hand. For our regular soldiery, this means regular pay. For our logisticians and quartermasters, it means a growing network of barracks that keeps the costs in hand." #OLD ENG

 #ire_irish_volunteers: "Volontari Irlandesi" #OLD ITA
 ire_irish_volunteers: "$IRE_ADJ$ Volunteers" #NEW
 #ire_irish_volunteers: "Irish Volunteers" #OLD ENG
 ire_irish_volunteers_desc: "Corpi cittadini sono organizzati per la difesa nazionale e la sorveglianza costiera. Addestrandosi a proprie spese, suscitano lo spirito pubblico e irrigidiscono la linea."
 
 #legacy_of_the_normans: "Eredità dei Normanni" #OLD ITA
 legacy_of_the_normans: "$norman$ Legacy" #NEW
 #legacy_of_the_normans: "Legacy of the Normans" #OLD ENG
 #legacy_of_the_normans_desc: "Forgiato nel crogiolo della conquista, l'esercito normanno siciliano mescolò la carica inarrestabile dei cavalieri normanni con la sofisticazione strategica della guerra bizantina, araba e longobarda. Maestri sia della ferocia sul campo di battaglia che della flessibilità tattica, scolpirono un regno al crocevia delle civiltà." #OLD ITA
 legacy_of_the_normans_desc: "Forged in the crucible of conquest, the $SIC_ADJ$ $norman$ army blended the unstoppable charge of $norman$ knights with the strategic sophistication of $BYZ_ADJ$, Arab, and $lombard$ warfare. Masters of both battlefield ferocity and tactical flexibility, they carved a kingdom at the crossroads of civilizations." #NEW
 #legacy_of_the_normans_desc: "Forged in the crucible of conquest, the Sicilian Norman army blended the unstoppable charge of Norman knights with the strategic sophistication of Byzantine, Arab, and Lombard warfare. Masters of both battlefield ferocity and tactical flexibility, they carved a kingdom at the crossroads of civilizations." #OLD ENG
 sic_constitions_of_melfi: "Costituzioni di Melfi"
 #sic_constitions_of_melfi_desc: "L'Imperatore Federico II, il Re Hohenstaufen di Sicilia, redasse un codice legale per la Sicilia noto come le Costituzioni di Melfi, o Liber Augustalis. Ancora in uso secoli dopo, rappresenta una solida base per il governo del nostro stato, regolando il diritto pubblico, la procedura giudiziaria e il diritto feudale, privato e penale." #OLD ITA
 sic_constitions_of_melfi_desc: "Emperor Frederick II, the Hohenstaufen King of $SIC$, drafted a legal code for $SIC$ known as the Constitutions of Melfi, or #italic Liber Augustalis#!. Still in use centuries later, it represents a solid foundation for the governance of our state, regulating public law, judicial procedure and feudal, private and penal law." #NEW
 #sic_constitions_of_melfi_desc: "Emperor Frederick II, the Hohenstaufen King of Sicily, drafted a legal code for Sicily known as the Constitutions of Melfi, or Liber Augustalis. Still in use centuries later, it represents a solid foundation for the governance of our state, regulating public law, judicial procedure and feudal, private and penal law." #OLD ENG
 sic_studium_generale: "Studium Generale"
 #sic_studium_generale_desc: "Fondata nel 1434 dal Re Alfonso V d'Aragona, l'Università di Catania fu la più antica in Sicilia e una delle poche istituzioni meridionali a cui fu concesso il pieno status di Studium Generale. Unica per la sua carta reale e la mescolanza di educazione scolastica e legale, produsse giuristi, teologi e scienziati che servirono sia la Chiesa che la Corona in una regione culturalmente diversa." #OLD ITA
 sic_studium_generale_desc: "Founded by King Alfonso V of $ARA$, the University of $catania$ was the oldest in $SIC$ and one of the few southern institutions granted full #italic Studium Generale#! status. Unique for its royal charter and blend of scholastic and legal education, it produced jurists, theologians, and scientists who served both Church and Crown in a culturally diverse region." #NEW
 #sic_studium_generale_desc: "Founded in 1434 by King Alfonso V of Aragon, the University of Catania was the oldest in Sicily and one of the few southern institutions granted full Studium Generale status. Unique for its royal charter and blend of scholastic and legal education, it produced jurists, theologians, and scientists who served both Church and Crown in a culturally diverse region." #OLD ENG
 sic_naval_vigilance: "Vigilanza Navale"
 #sic_naval_vigilance_desc: "Le continue incursioni dai pirati barbareschi e dagli Ottomani costrinsero la Sicilia a mantenere una difesa costiera vigile. Le sue galee e fortezze divennero fondamentali per proteggere l'Europa meridionale." #OLD ITA
 sic_naval_vigilance_desc: "Constant raids from Barbary pirates and $TUR_ADJ$ ships have forced $SIC$ to maintain a vigilant coastal defense. Its galleys and forts became critical for protecting southern $europe$." #NEW
 #sic_naval_vigilance_desc: "Constant raids from Barbary pirates and the Ottomans forced Sicily to maintain a vigilant coastal defense. Its galleys and forts became critical for protecting Southern Europe." #OLD ENG
 #sic_sicilian_silk: "Seta Siciliana" #OLD ITA
 sic_sicilian_silk: "$SIC_ADJ$ $silk$" #NEW
 #sic_sicilian_silk: "Sicilian Silk" #OLD ENG
 #sic_sicilian_silk_desc: "Ai tempi di Federico II, la seta era la principale esportazione della Sicilia. Sebbene la nostra industria serica sia diminuita nei secoli successivi, la produzione siciliana essendo stata superata da quella degli stati italiani settentrionali, non c'è motivo per cui non debba risorgere. Investendo nella nostra produzione di seta, possiamo vedere i nostri tessitori e artigiani prosperare di nuovo." #OLD ITA
 sic_sicilian_silk_desc: "In the time of Frederick II, $silk$ was $SIC$'s major export. Although our $silk$ industry has declined in the intervening centuries, $SIC$'s productions having been outstripped by that of the northern $ITA_ADJ$ states, there is no reason why it should not rise again. By investing in our $silk$ production, we can see our weavers and craftsmen flourish anew." #NEW
 #sic_sicilian_silk_desc: "In the time of Frederick II, silk was Sicily's major export. Although our silk industry has declined in the intervening centuries, Sicily's produce having been outstripped by that of the northern Italian states, there is no reason why it should not rise again. By investing in our silk production, we can see our weavers and craftsmen flourish anew." #OLD ENG
 #sic_sicilian_enlightenment: "Illuminismo Siciliano" #OLD ITA
 sic_sicilian_enlightenment: "$SIC_ADJ$ Enlightenment" #NEW
 #sic_sicilian_enlightenment: "Sicilian Enlightenment" #OLD ENG
 #sic_sicilian_enlightenment_desc: "Sebbene lontana dai grandi salotti di Parigi o Vienna, la Sicilia promosse il proprio Illuminismo. Gli intellettuali sfidarono i privilegi feudali, promossero la scienza e sostennero riforme legali, spesso all'interno del quadro dell'umanesimo cattolico. Queste idee gettarono le basi per la modernità all'ombra della monarchia e della tradizione." #OLD ITA
 sic_sicilian_enlightenment_desc: "Though distant from the great salons of $paris$ or $vienna$, $SIC$ has fostered its own Enlightenment. Intellectuals challenged feudal privileges, promoted science, and advocated legal reforms, often within the framework of $catholic_ADJ$ humanism. These ideas laid the groundwork for modernity in the shadow of monarchy and tradition." #NEW
 #sic_sicilian_enlightenment_desc: "Though distant from the great salons of Paris or Vienna, Sicily fostered its own Enlightenment. Intellectuals challenged feudal privileges, promoted science, and advocated legal reforms, often within the framework of Catholic humanism. These ideas laid the groundwork for modernity in the shadow of monarchy and tradition." #OLD ENG
 #sic_sicilian_reforms: "Riforme Siciliane" #OLD ITA
 sic_sicilian_reforms: "$SIC_ADJ$ Reforms" #NEW
 #sic_sicilian_reforms: "Sicilian Reforms" #OLD ENG
 #sic_sicilian_reforms_desc: "Col passare del tempo, le nostre istituzioni sono diventate obsolete o semplicemente inefficienti. Le riforme sono necessarie se vogliamo che la nostra nazione diventi prospera e fiorente. Le nostre menti migliori lavoreranno fianco a fianco per assicurare che non ci siano sprechi e che i processi siano i più efficienti." #OLD ITA
 sic_sicilian_reforms_desc: "As time passes, our institutions become obsolete or just inefficient. Reforms are necessary if we want our nation to prosper and thrive. Our best minds will work hard to ensure that no waste happens, and that our processes are as efficient as possible." #NEW
 #sic_sicilian_reforms_desc: "As time passed, our institutions have become obsolete or just inefficient. Reforms are necessary if we want our nation to become prosperous and thriving. Our best minds will work hand by hand to ensure that no waste happens and that the processes are the most efficient." #OLD ENG
 
 
                    
 #Sub Saharan Africa
 nomadic_tendencies: "Tendenze Nomadi"
 #nomadic_tendencies_desc: "Alcuni del nostro popolo sono stati a lungo nomadi, mentre vagavamo per le terre da una terra abitabile all'altra. Anche ora, mentre tutto cambia, e costruiamo una città per il nostro popolo, alcune persone mantengono le loro tradizioni nomadi e continuano a vagare per le terre." #OLD ITA
 nomadic_tendencies_desc: "Many of our people have lived their lives as nomads, as our custom has been to travel from one habitable place to the next. Even now, as everything changes and we build a city for our people, some retain their nomadic traditions, and continue to wander." #NEW
 #nomadic_tendencies_desc: "Some of our people have long been nomads, as we have wandered the lands from one habitable land to the next. Even now, as everything changes, and we build a city for our people, some people remain their nomadic traditions and continue to wander the lands." #OLD ENG
 skilled_cavalry_raids: "Incursioni di Cavalleria"
 #skilled_cavalry_raids_desc: "Dai tempi dei nostri antenati, i cavalieri sono stati lo strumento delle nostre conquiste. I loro zoccoli tonanti attraverso le praterie del Sahel diffondono paura nei nostri nemici, e ci hanno permesso molte vittorie." #OLD ITA
 skilled_cavalry_raids_desc: "From the time of our ancestors, horsemen have been the agents of our conquests. The thunder of their hooves ringing across the grasslands of the $sahel_region$ spread fear in our enemies, and have brought us many victories." #NEW
 #skilled_cavalry_raids_desc: "From the time of our ancestors, horsemen have been the tool of our conquests. Their thunder hooves across the grasslands of the Sahel spread fear in our enemies, and has allowed us many victories." #OLD ENG
 land_of_the_ancestors: "Terra degli Antenati"
 #land_of_the_ancestors_desc: "La terra non è mera proprietà o polvere; è la nostra connessione con i grandi uomini che sono venuti prima di noi. Dalle terre migliori oltre, vegliano su di noi, e non dobbiamo mai lasciare che la connessione sia recisa." #OLD ITA
 land_of_the_ancestors_desc: "Land is not property, nor is it mere dust; it is our connection to our great forebears. From the better lands beyond, they watch over us. We must never let the connection between us be severed, and we must care for these lands in honor of those who first settled them." #NEW
 #land_of_the_ancestors_desc: "Land is not mere property or dust; it is our connection to the great men who have gone before us. From the better lands beyond, they watch over us, and we must never let the connection be severed." #OLD ENG
 wandering_scholars: "Studiosi Erranti"
 #wandering_scholars_desc: "Comunità di uomini saggi di molte fedi vivono tra le nostre terre, offrendo insegnamenti nella via della loro fede a tutti coloro che ascolteranno, diffondendo l'unica vera fede tra il nostro popolo." #OLD ITA
 wandering_scholars_desc: "Communities of learned scholars of many faiths live in our lands, offering religious instruction to all who will listen." #NEW
 #wandering_scholars_desc: "Communities of wise men of many faiths live among our lands, offering teachings in the way of their faith to all who will listen, spreading the one true faith among our people." #OLD ENG
 community_of_the_faithful: "Dominio di Molte Lingue"
 #community_of_the_faithful_desc: "Il nostro Impero unisce sotto i suoi stendardi persone di centinaia di origini. Parlano una moltitudine di lingue, provengono da tutte le direzioni dell'orizzonte, ma ciascuno nella propria lingua rende omaggio al nostro governante, legandoci insieme." #OLD ITA
 community_of_the_faithful_desc: "Our Empire is home to people from hundreds of different backgrounds. They speak a multitude of tongues, and come from all the directions of the horizon, but each in their own tongue pays homage to our ruler, binding us together." #NEW
 #community_of_the_faithful_desc: "Our Empire unites under its banners people of hundreds of origins. They speak a multitude of tongues, come from all the directions of the horizon, but each in their own tongue pay homage to our ruler, binding us together." #OLD ENG
 bound_by_service: "Legati dal Servizio"
 #bound_by_service_desc: "Siamo un popolo unico, e abbiamo un esercito unico. Portando truppe da tutti i nostri territori e popoli conquistati nell'esercito, assicuriamo meglio la loro integrazione all'interno della nostra società, e aumentiamo la loro accettazione al nostro governo." #OLD ITA
 bound_by_service_desc: "We are one people, and we have one army. By bringing troops from across all of our territories together, and pressing conquered peoples into military service, we can better integrate them into our society, and also increase their acceptance of our rule." #NEW
 #bound_by_service_desc: "We are one people, and we have one army. By bringing troops from across all of our territories and conquered people into the military, we ensure better their integration within our society, and increase their acceptance to our rule." #OLD ENG
 regnal_chronicles: "Cronache Regali"
 #regnal_chronicles_desc: "Dovremmo registrare la storia dei nostri re e le loro gesta in grandi cronache, affinché possano essere tramandate attraverso le generazioni e sempre ricordate." #OLD ITA
 regnal_chronicles_desc: "We should record the history of our splendid rulers and their illustrious deeds in great chronicles, so that they may be passed down across the generations and always remembered." #NEW
 #regnal_chronicles_desc: "We should record the history of our kings and their deeds in great chronicles, that they may be passed down across the generations and always remembered." #OLD ENG

 #expanded_slave_trade: "Rafforzare il Controllo sul Commercio di Schiavi" #OLD ITA
 expanded_slave_trade: "Control the Slave Trade" #NEW
 #expanded_slave_trade: "Strengthen control over the Slave Trade" #OLD ENG
 #expanded_slave_trade_desc: "La domanda di schiavi da parte di mercanti esterni cresce sempre di più ogni giorno. La nostra posizione nel mondo africano ci rende gli intermediari ideali per questo commercio. Incoraggiamo coloro che cercano mercati di schiavi a farlo nelle nostre terre e a fare affari nei nostri mercati." #OLD ITA
 expanded_slave_trade_desc: "The demand for $slaves_goods$ from external traders grows greater by the day. Our position in $africa$ makes us the ideal middlemen for this trade. Let us encourage those that seek slave markets to do so in our lands, and to make their business in our marketplaces." #NEW
 #expanded_slave_trade_desc: "The demand for slaves from external traders grows greater and greater by the day. Our position in the African world makes us the ideal middle men for this trade. Let us encourage those that seek slave markets to do so in our lands and to make their business in our marketplaces." #OLD ENG
 gifts_and_hostages: "Doni e Ostaggi"
 #gifts_and_hostages_desc: "Mentre il nostro popolo è ora unito, l'atto di piegare il ginocchio a un signore comune non è venuto facile per loro. Convocando tutti i governanti soggiogati alla capitale, possiamo impiegarli come prestigiosi inviati reali. Alcuni chiamerebbero questa una politica di presa di ostaggi, noi semplicemente la vediamo come un modo per ricordare al nostro popolo di mentalità indipendente delle loro lealtà." #OLD ITA
 gifts_and_hostages_desc: "While our people are now united, the act of bending the knee to a common overlord has not come easy to them. By summoning all subjugated rulers to the capital, we can employ them as prestigious royal envoys. Some would call this a policy of hostage-taking; we simply see it as a way to remind our more independent-minded subjects of their loyalties." #NEW
 #gifts_and_hostages_desc: "While our people are now united, the act of bending the knee to a common overlord has not come easy for them. By summoning all subjugated rulers to the capital, we can employ them as prestigious royal envoys. Some would call this a policy of hostage-taking, we simply see it as a way to remind our independent-minded people of their loyalties." #OLD ENG
 #people_of_ornaments: "Popolo di Ornamenti" #OLD ITA
 people_of_ornaments: "People of Ornamentation" #NEW
 #people_of_ornaments: "People of Ornaments" #OLD ENG
 #people_of_ornaments_desc: "I nostri artigiani sono rinomati in lungo e in largo, e si dice che non possano lasciare una superficie non decorata. Facciamo il massimo di questa reputazione e diffondiamo il loro lavoro ovunque andiamo." #OLD ITA
 people_of_ornaments_desc: "Our artisans are renowned far and wide, and it is said that they cannot leave a surface undecorated. Let us make the most of this reputation, and promote their creations as much as possible." #NEW
 #people_of_ornaments_desc: "Our artisans are renowned far and wide, and it is said that they cannot leave a surface undecorated. Let us make the most of this reputation and spread their work wherever we go." #OLD ENG
 courtly_competition: "Competizione di Corte"
 #courtly_competition_desc: "Un nobile preoccupato è un buon nobile. Ci sono così tanti titoli di corte nei nostri regni che alcuni dicono che la metà dei nostri uomini ne abbia uno. Assicuriamoci che i membri della nostra corte trascorrano più tempo a competere tra loro per attenzione e visibilità, piuttosto che minacciare il nostro governo." #OLD ITA
 courtly_competition_desc: "A preoccupied noble is a well-behaved noble. There are so many courtly titles in our realms that some say half of our men have one. Let us make sure our courtiers spend their time competing with one another for attention and visibility; they will be too busy to plot against our rule." #NEW
 #courtly_competition_desc: "A preoccupied noble is a good noble. There are so many courtly titles in our realms that some say half of our men have one. Let us make sure the members of our court spend more time competing with one another for attention and visibility, rather than threatening our rule." #OLD ENG
 overnight_army: "Un Esercito in una Notte"
 #overnight_army_desc: "La nostra capitale e le nostre città sono costruite sul modello degli accampamenti di un esercito. Hanno ali, avanguardie e fronti. Assicurando che il pensiero militare sia ovunque nella nostra vita quotidiana, miglioriamo la nostra prontezza per la guerra." #OLD ITA
 overnight_army_desc: "Our capital and other cities are built using army camps as a model. They have wings, vanguards, and fronts. In ensuring that military thinking permeates daily life, we will improve our overall combat readiness." #NEW
 #overnight_army_desc: "Our capital and our cities are built on the model of the camps of an army. They have wings, vanguards, and fronts. In ensuring that military thinking is everywhere in our daily life, we improve our readiness for warfare." #OLD ENG
 mining_tradition: "Tradizione Mineraria"
 mining_tradition_desc: "La nostra terra è ricca di materiali rari, pronti per essere strappati dalla terra e venduti a mercanti stranieri per grandi profitti. Saremmo sciocchi a non sfruttare questo."
 #intercontinental_trade: "Commercio a Lungo Raggio" #OLD ITA
 intercontinental_trade: "Far-Reaching Trade" #NEW
 #intercontinental_trade: "Far Reaching Trade" #OLD ENG
 #intercontinental_trade_desc: "I nostri mercanti riportano frequentemente cose affascinanti dalle corti di paesi lontani. Forse sarebbe possibile raggiungere coste ancora più lontane." #OLD ITA
 intercontinental_trade_desc: "Our merchants frequently bring back fascinating things from the courts of faraway countries. Perhaps it would be possible to reach even further shores?" #NEW
 #intercontinental_trade_desc: "Our merchants frequently bring back fascinating things from the courts of far away countries. Perhaps it would be possible to reach even further shores." #OLD ENG
 expanded_grazing_grounds: "Terreni di Pascolo Espansi"
 #expanded_grazing_grounds_desc: "Il nostro territorio ha molta terra che è ben adatta al pascolo di mandrie animali, rendendo facile per noi espandere la nostra produzione di bestiame." #OLD ITA
 expanded_grazing_grounds_desc: "Our territory has plenty of land which is well-suited for grazing animal herds, making it easy for us to expand our output of $livestock$." #NEW
 #expanded_grazing_grounds_desc: "Our territory has plenty of land which is well suited for grazing animal herds, making it easy for us to expand our output of livestock." #OLD ENG
 african_sturdy_grains_advance: "Agricoltura di Cereali Robusti"
 #african_sturdy_grains_advance_desc: "Un focus più forte sulla produzione agricola aiuterà il nostro popolo a prosperare in queste terre. Fortunatamente, i nostri terreni forniscono ampio spazio per coltivare varie colture." #OLD ITA
 african_sturdy_grains_advance_desc: "A stronger focus on agricultural production will help our people thrive. Thankfully, we have the ample space and fertile soil necessary to grow a number of crops." #NEW
 #african_sturdy_grains_advance_desc: "A stronger focus on agricultural production will help our people thrive in these lands. Thankfully, our soils provide ample space to grow various crops." #OLD ENG

#Bulgaria 
 legacy_of_ivan_asen_ii: "Eredità di Ivan Asen II"
 #legacy_of_ivan_asen_ii_desc: "Il regno di Ivan Asen II segnò una nuova vetta del potere bulgaro, della diplomazia e dell'espansione economica. La sua eredità perdura come fondamento per uno stato forte e centralizzato." #OLD ITA
 legacy_of_ivan_asen_ii_desc: "The reign of Ivan Asen II marked a new height of $BUL_ADJ$ power, diplomacy, and economic expansion. His legacy endures as a foundation for a strong and centralized state." #NEW
 #legacy_of_ivan_asen_ii_desc: "The reign of Ivan Asen II marked a new height of Bulgarian power, diplomacy, and economic expansion. His legacy endures as a foundation for a strong and centralized state." #OLD ENG

 #bulgarian_orthodox_patriarchate: "Patriarcato Ortodosso Bulgaro" #OLD ITA
 bulgarian_orthodox_patriarchate: "$BUL_ADJ$ $orthodox_ADJ$ Patriarchate" #NEW
 #bulgarian_orthodox_patriarchate: "Bulgarian Orthodox Patriarchate" #OLD ENG
 #bulgarian_orthodox_patriarchate_desc: "L'elevazione della Chiesa bulgara a Patriarcato riaffermò Tarnovo come rivale spirituale di Costantinopoli, rafforzando la nostra unità nazionale attraverso la fede." #OLD ITA
 bulgarian_orthodox_patriarchate_desc: "The elevation of the $BUL_ADJ$ Church to a patriarchate has reaffirmed $tarnovo$ as a spiritual rival to $constantinople$, strengthening our national unity through faith." #NEW
 #bulgarian_orthodox_patriarchate_desc: "The elevation of the Bulgarian Church to a Patriarchate reaffirmed Tarnovo as a spiritual rival to Constantinople, strengthening our national unity through faith." #OLD ENG

 expansionist_ambitions: "Ambizioni Espansioniste"
 #expansionist_ambitions_desc: "Mentre i Balcani si frammentavano, molte potenze balcaniche in ascesa guardavano verso l'esterno. Governanti ambiziosi perseguirono l'integrazione di terre diverse sotto una singola corona più forte, approfittando della debolezza bizantina." #OLD ITA
 expansionist_ambitions_desc: "As the Balkans fractured, many rising powers looked outward. Ambitious rulers pursued integration of diverse lands under a single, stronger crown, taking advantage of $BYZ_ADJ$ weakness." #NEW
 #expansionist_ambitions_desc: "As the Balkans fractured, many rising Balkan powers looked outward. Ambitious rulers pursued integration of diverse lands under a single, stronger crown, taking advantage of Byzantine weakness." #OLD ENG

 fortress_of_the_balkans: "Fortezza dei Balcani"
 #fortress_of_the_balkans_desc: "Affrontando minacce costanti da Crociati, Bizantini e Mongoli, la Bulgaria sviluppò un'estesa rete di città fortificate e difese montane." #OLD ITA
 fortress_of_the_balkans_desc: "Facing constant threats from crusaders, $BYZ$, and the Mongols, $BUL$ developed an extensive network of fortified cities and mountain defenses." #NEW
 #fortress_of_the_balkans_desc: "Facing constant threats from Crusaders, Byzantines, and Mongols, Bulgaria developed an extensive network of fortified cities and mountain defenses." #OLD ENG

 revival_of_the_literary_schools: "Rinascita delle Scuole Letterarie"
 #revival_of_the_literary_schools_desc: "Ispirate dal rinascimento culturale sotto Ivan Alexander, gli scriptoria e le scuole bulgare divennero guardiani dell'identità ortodossa slava." #OLD ITA
 revival_of_the_literary_schools_desc: "Inspired by the cultural renaissance under Ivan Alexander, $BUL_ADJ$ scriptoria and schools became guardians of $slavic_group$ $orthodox_ADJ$ identity." #NEW
 #revival_of_the_literary_schools_desc: "Inspired by the cultural renaissance under Ivan Alexander, Bulgarian scriptoria and schools became guardians of Slavic Orthodox identity." #OLD ENG

 #reformation_of_the_bulgarian_patriarchate: "Riforma del Patriarcato Bulgaro" #OLD ITA
 reformation_of_the_bulgarian_patriarchate: "Reformation of the $BUL_ADJ$ Patriarchate" #NEW
 #reformation_of_the_bulgarian_patriarchate: "Reformation of the Bulgarian Patriarchate" #OLD ENG
 #reformation_of_the_bulgarian_patriarchate_desc: "Far rivivere l'indipendenza del Patriarcato bulgaro rafforzò sia l'influenza religiosa che l'autorità morale dello stato." #OLD ITA
 reformation_of_the_bulgarian_patriarchate_desc: "Reviving the independence of the $BUL_ADJ$ Patriarchate strengthened both religious influence and the moral authority of the state." #NEW
 #reformation_of_the_bulgarian_patriarchate_desc: "Reviving the independence of the Bulgarian Patriarchate strengthened both religious influence and the moral authority of the state." #OLD ENG

#Burgundy
 promote_estates_general: "Promuovere gli États Généraux"
 #promote_estates_general_desc: "La Borgogna è una creazione feudale con varie parti congiunte sotto diverse condizioni, che ha creato forti identità locali. Promuovendo un'assemblea centrale, diamo un forum a questi interessi, promuovendo un governo fluido e incontestato." #OLD ITA
 promote_estates_general_desc: "$BUR$ is a feudal creation with various parts conjoined under different conditions, which has created strong local identities. By promoting a central assembly, we give a forum for these interests, promoting a smooth and uncontested rule." #NEW
 #promote_estates_general_desc: "Burgundy is a feudal creation with various parts conjoined under different conditions, which has created strong local identities. By promoting a central assembly, we give a forum for these interests, promoting a smooth and uncontested rule." #OLD ENG

 reform_the_feudal_army: "Riformare l'Esercito Feudale"
 #reform_the_feudal_army_desc: "Il sistema di leva feudale si è dimostrato lento e inaffidabile in una nuova era di guerra professionale. Ispirati dal modello francese, sostituiremo le nostre sparse armate vassalle con compagnie salariati, ufficiali esperti ed eserciti integrati. Un nucleo disciplinato di soldati professionisti formerà la spina dorsale di un esercito moderno e adattabile." #OLD ITA
 reform_the_feudal_army_desc: "The feudal levy system has proven slow and unreliable in this new age of professional warfare. Inspired by the $FRA_ADJ$ model, we will replace our scattered vassal hosts with salaried companies, skilled officers, and integrated armies. A disciplined core of professional soldiers will form the backbone of a modern and adaptable army." #NEW
 #reform_the_feudal_army_desc: "The feudal levy system has proven slow and unreliable in a new age of professional warfare. Inspired by the French model, we will replace our scattered vassal hosts with salaried companies, skilled officers, and integrated armies. A disciplined core of professional soldiers will form the backbone of a modern and adaptable army." #OLD ENG

 #influence_of_the_burgundian_towns: "Influenza delle Città Borgognone" #OLD ITA
 influence_of_the_burgundian_towns: "Influence of the $BUR_ADJ$ Towns" #NEW
 #influence_of_the_burgundian_towns: "Influence of the Burgundian Towns" #OLD ENG
 #influence_of_the_burgundian_towns_desc: "Gli Stati Generali tradizionali favoriscono il clero e la nobiltà, ma la crescente ricchezza e importanza politica delle città non può più essere ignorata. Raffinando la sua struttura per riflettere la crescente forza dei Borghesi, assicuriamo un governo più equilibrato preservando i privilegi degli altri. Una voce urbana più forte migliorerà anche le nostre capacità amministrative e accelererà il tasso di urbanizzazione." #OLD ITA
 influence_of_the_burgundian_towns_desc: "The traditional Estates General favors the clergy and nobility, but the rising wealth and political importance of towns can no longer be ignored. By refining its structure to reflect the growing strength of the merchant class, we ensure more balanced governance while preserving the privileges of the other estates. A stronger urban voice will also enhance our administrative capacities and speed up the rate of urbanization." #NEW
 #influence_of_the_burgundian_towns_desc: "The traditional Estates General favors the clergy and nobility, but the rising wealth and political importance of towns can no longer be ignored. By refining its structure to reflect the growing strength of the Burghers, we ensure more balanced governance while preserving the privileges of the others. A stronger urban voice will also enhance our administrative capacities as well as speed up the rate of urbanization." #OLD ENG

 compagnie_d_ordonnance: "Compagnies d'Ordonnance"
 #compagnie_d_ordonnance_desc: "La nostra dipendenza dalle leve feudali si è dimostrata inadeguata per le esigenze della guerra moderna. La creazione di unità di cavalleria permanentemente contrattate, le $compagnie_d_ordonnance$, ci fornisce una forza militare affidabile e professionale direttamente leale alla corona." #OLD ITA
 compagnie_d_ordonnance_desc: "Our reliance on feudal levies has proven inadequate for the demands of modern warfare. The creation of permanently contracted cavalry units, the #italic $compagnie_d_ordonnance$#!, provides us with a reliable and professional military force directly loyal to the Crown." #NEW
 #compagnie_d_ordonnance_desc: "Our reliance on feudal levies has proven inadequate for the demands of modern warfare. The creation of permanently contracted cavalry units, the $compagnie_d_ordonnance$, provides us with a reliable and professional military force directly loyal to the crown." #OLD ENG

 create_the_regimental_system: "Creare il Sistema Reggimentale"
 #create_the_regimental_system_desc: "Per assicurare reclutamento e rifornimento coerenti, dobbiamo stabilire un sistema reggimentale formale. Questa riforma ci permetterà di organizzare la manodopera più efficacemente, centralizzare le strutture di comando e ridurre la dipendenza da nobili locali e mercenari stranieri." #OLD ITA
 create_the_regimental_system_desc: "To ensure consistent recruitment and sufficient supply of fighters, we must establish a formal regimental system. This reform will allow us to organize manpower more effectively, centralize command structures, and reduce dependence on local nobles and foreign mercenaries." #NEW
 #create_the_regimental_system_desc: "To ensure consistent recruitment and supply, we must establish a formal regimental system. This reform will allow us to organize manpower more effectively, centralize command structures, and reduce dependence on local nobles and foreign mercenaries." #OLD ENG

#Normandy

 heirs_of_rollo: "Eredi di Rollo"
 #heirs_of_rollo_desc: "L'eredità di Rollo, il fondatore vichingo della Normandia, continua a definire la nostra casa regnante. Una linea così prestigiosa ha portato a una legittimità rafforzata e rispetto tra i nostri pari." #OLD ITA
 heirs_of_rollo_desc: "The legacy of Rollo, the Viking founder of $NRM$, continues to define our ruling house. Such a prestigious line has led to strengthened legitimacy and respect from our peers." #NEW
 #heirs_of_rollo_desc: "The legacy of Rollo, the Viking founder of Normandy, continues to define our ruling house. Such a prestigious line has led to a strengthened legitimacy and respect among our peers." #OLD ENG

 #trade_ports_in_the_channel: "Porti Commerciali nella Manica" #OLD ITA
 trade_ports_in_the_channel: "Channel Trade Ports" #NEW
 #trade_ports_in_the_channel: "Trade Ports in the Channel" #OLD ENG
 trade_ports_in_the_channel_desc: "La nostra posizione lungo la Manica ci permette di prosperare come porta commerciale. Investendo nelle nostre città portuali e nell'infrastruttura mercantile, possiamo dominare il commercio regionale minimizzando il costo delle operazioni oltremare."

 #norman_law: "Legge Normanna" #OLD ITA
 norman_law: "$NRM_ADJ$ Law" #NEW
 #norman_law: "Norman Law" #OLD ENG
 norman_law_desc: "Il nostro stato è governato dal proprio codice legale consuetudinario, il $couteume_de_normaundie$. Consacrando il privilegio nobile, il potere decentrato e i diritti di proprietà, questa tradizione legale assicura la stabilità locale affermando la nostra identità distinta."

 the_exchequer: "Lo Scacchiere"
 the_exchequer_desc: "Il nostro organo legislativo deve rimanere distinto da qualsiasi influenza esterna, in uno sforzo per preservare la nostra identità culturale e indipendenza. Ispirate dalle istituzioni fiscali anglo-normanne, le nostre procedure parlamentari sosterranno sicuramente le entrate della corona e miglioreranno la supervisione amministrativa."

 #frontline_in_the_caroline_war: "Prima Linea nella Guerra Carolina" #OLD ITA
 frontline_in_the_caroline_war: "Frontline of the Caroline War" #NEW
 #frontline_in_the_caroline_war: "Frontline in the Caroline War" #OLD ENG
 #frontline_in_the_caroline_war_desc: "Durante i lunghi conflitti tra Francia e Inghilterra, ci ergevano come campo di battaglia strategico. Le pressioni della guerra forgiarono un corpo ufficiali indurito e tradizioni di eccellenza sul campo di battaglia che perdurano fino ad oggi." #OLD ITA
 frontline_in_the_caroline_war_desc: "During the long conflicts between $FRA$ and $ENG$, we stood as a strategic battleground. The pressures of war forged a hardened officer corps and traditions of battlefield excellence that endure to this day." #NEW
 #frontline_in_the_caroline_war_desc: "During the long conflicts between France and England, we stood as a strategic battleground. The pressures of war forged a hardened officer corps and traditions of battlefield excellence that endure to this day." #OLD ENG
 
#Tunis

 #tunisian_corsairs: "Corsari Tunisini" #OLD ITA
 tunisian_corsairs: "$TUN_ADJ$ Corsairs" #NEW
 #tunisian_corsairs: "Tunisian Corsairs" #OLD ENG
 #tunisian_corsairs_desc: "Dalle loro roccaforti a Tunisi e La Goulette, i nostri corsari dominano il Mediterraneo. Con galere veloci e sponsorizzazione statale, incutono paura nei mercanti stranieri e rafforzano la nostra forza navale con spietata efficienza." #OLD ITA
 tunisian_corsairs_desc: "From their strongholds in $TUN$ and La Goulette, our corsairs dominate the Mediterranean. With swift galleys and the power of state sponsorship behind them, they strike fear into foreign merchants and bolster our naval strength with ruthless efficiency." #NEW
 #tunisian_corsairs_desc: "From their strongholds in Tunis and La Goulette, our corsairs dominate the Mediterranean. With swift galleys and state sponsorship, they strike fear into foreign merchants and bolster our naval strength with ruthless efficiency." #OLD ENG

 tamazight: "Tamazight"
 tamazight_desc: "Il popolo berbero dell'interno è una parte vitale della nostra società. Riconoscendo la loro identità culturale e promuovendo l'alfabetizzazione, espandiamo la nostra capacità di governare regioni diverse senza perdere coesione o una presa ferma sul potere."

 guardians_of_ifriqiya: "Guardiani dell'Ifrīqya"
 #guardians_of_ifriqiya_desc: "Come successori delle antiche città di Cartagine e Kairouan, portiamo il manto di guardiani sul cuore del Maghreb. Il nostro governo porta stabilità e sarà accolto da tutti in una regione un tempo contesa." #OLD ITA
 guardians_of_ifriqiya_desc: "As successors to the ancient cities of Carthage and Kairouan, we bear the mantle of guardianship over the heart of the $maghreb_region$. Our rule brings stability, and shall be welcomed by all in a once-contested region." #NEW
 #guardians_of_ifriqiya_desc: "As successors to the ancient cities of Carthage and Kairouan, we bear the mantle of guardianship over the heart of the Maghreb. Our rule brings stability and shall be welcomed by all in a once-contested region." #OLD ENG

 saharan_trade: "Commercio Sahariano"
 #saharan_trade_desc: "Dalle oasi di Ghadames alle carovane del Sahel, i nostri mercanti assicurano e raccolgono entrate dalle rotte trans-sahariane che ci collegano alle ricchezze dell'interno. Oro, sale e schiavi fluiscono verso nord attraverso la nostra protezione e supervisione." #OLD ITA
 saharan_trade_desc: "From the oases of $ghadames$ to the caravans of the $sahel_region$, our merchants secure and collect revenue from the trans-Saharan routes that connect us to the riches of the interior. $goods_gold$, $salt$, and $slaves_goods$ flow northward under our protection and oversight." #NEW
 #saharan_trade_desc: "From the oases of Ghadames to the caravans of the Sahel, our merchants secure and collect revenue from the trans-Saharan routes that connect us to the riches of the interior. Gold, salt, and slaves flow northward through our protection and oversight." #OLD ENG

 al_caid: "Al-Qā'id"
 #al_caid_desc: "Nominando un Qā'id leale per supervisionare le province e regolare il commercio per conto dello stato, diamo potere ai mercanti urbani assicurando al contempo il governo provinciale. Garantire affari equi e mercati regolamentati rafforzerà solo la nostra base economica." #OLD ITA
 al_caid_desc: "By appointing a loyal #italic Qā'id#! to oversee provinces and regulate trade on behalf of the state, we empower urban merchants while ensuring provincial governance. Ensuring fair dealings and regulated markets will greatly strengthen our economic base." #NEW
 #al_caid_desc: "By appointing a loyal Qā'id to oversee provinces and regulate trade on behalf of the state, we empower urban merchants while ensuring provincial governance. Ensuring fair dealings and regulated markets will only strengthen our economic base." #OLD ENG

 #connections_with_the_christian_world: "Connessioni con il Mondo Cristiano" #OLD ITA
 connections_with_the_christian_world: "Connections with the $christian_ADJ$ World" #NEW
 #connections_with_the_christian_world: "Connections with the Christian World" #OLD ENG
 #connections_with_the_christian_world_desc: "Sebbene la nostra fede differisca, non chiudiamo la porta all'opportunità. Trattati e accordi commerciali con stati cristiani assicurano che la diplomazia e il pragmatismo servano i nostri interessi a lungo termine." #OLD ITA
 connections_with_the_christian_world_desc: "Treaties and trade agreements with $christian_ADJ$ states ensure that diplomacy and pragmatism serve our long-term interests. Though our faith differs from theirs, we should not close the door to opportunity." #NEW
 #connections_with_the_christian_world_desc: "Though our faith differs, we do not close the door to opportunity. Treaties and trade agreements with Christian states ensure that diplomacy and pragmatism serve our long-term interests." #OLD ENG

 attract_foreign_pirates: "Attirare Pirati Stranieri"
 attract_foreign_pirates_desc: "I nostri porti sono stati a lungo un rifugio per coloro che cercano fortuna in alto mare. Accogliendo questi marinai esperti indipendentemente dalla loro fede o origine, possiamo rafforzare ulteriormente le nostre flotte corsare ed espandere la nostra forza marittima."

 rais_of_the_navy: "Ra'īs della Marina"
 #rais_of_the_navy_desc: "I nostri capitani corsari, i Ra'īs, sono più che pirati. In verità, sono comandanti navali esperti e la loro esperienza in mare alimenta un profondo pozzo di tradizione marittima che rafforza il fiero patrimonio della nostra marina." #OLD ITA
 rais_of_the_navy_desc: "Our corsair captains, the #italic Ra'īs#!, are more than just pirates. Truly, they are seasoned naval commanders, and their experience at sea feeds a deep well of maritime tradition that strengthens our navy's proud heritage." #NEW
 #rais_of_the_navy_desc: "Our corsair captains, the Ra'īs, are more than pirates. Truly, they are seasoned naval commanders and their experience at sea feeds a deep well of maritime tradition that strengthens our navy's proud heritage." #OLD ENG

 export_monopolies: "Monopoli di Esportazione"
 #export_monopolies_desc: "Controllando esportazioni chiave come olio d'oliva, tessuti e coloranti, assicuriamo sia la prosperità domestica che l'influenza all'estero. Tali pratiche protezionistiche ci permettono di proiettare potere attraverso il commercio tanto quanto la conquista, assicurando che i nostri mercati mantengano i nostri mercanti sopra gli stranieri, in cima." #OLD ITA
 export_monopolies_desc: "By controlling key exports such as olive oil, textiles, and $dyes$, we ensure both domestic prosperity and leverage abroad. Such protectionist practices allow us to project power through commerce as much as conquest, ensuring our own merchants maintain dominance over foreigners in our markets." #NEW
 #export_monopolies_desc: "By controlling key exports such as olive oil, textiles, and dyes, we ensure both domestic prosperity and leverage abroad. Such protectionist practices allow us to project power through commerce as much as conquest, ensuring our markets maintain our own merchants over foreigners, at the top." #OLD ENG

#Tlemcen

 beacon_of_maghrebi_trade: "Faro del Commercio Maghrebino"
 #beacon_of_maghrebi_trade_desc: "Tlemcen si trova al crocevia delle carovane sahariane, del commercio mediterraneo e dell'eminenza andalusa. Man mano che il commercio fiorisce attraverso i suoi mercati e porti, dobbiamo sforzarci di continuare ad espandere le nostre reti mercantili, affermando la nostra influenza sul commercio regionale." #OLD ITA
 beacon_of_maghrebi_trade_desc: "$TLE$ lies at the crossroads of Saharan caravans, Mediterranean commerce, and Andalusian eminence. As trade flourishes through its markets and ports, we must strive to continue expanding our merchant networks, asserting our influence over regional commerce." #NEW
 #beacon_of_maghrebi_trade_desc: "Tlemcen lies at the crossroads of Saharan caravans, Mediterranean commerce, and Andalusian eminence. As trade flourishes through its markets and ports, we must strive to continue expanding our merchant networks, asserting our influence over regional commerce." #OLD ENG

 qalat_al_mashwar_advance: "$qalat_al_mashwar$"
 #qalat_al_mashwar_advance_desc: "Il complesso fortificato di $qalat_al_mashwar$ si erge sia come bastione militare che come simbolo di autorità dinastica. Avendo investito nella sua espansione, la difesa di Tlemcen è rafforzata assicurando al contempo il controllo amministrativo sulle terre circostanti." #OLD ITA
 qalat_al_mashwar_advance_desc: "The fortified complex of $qalat_al_mashwar$ stands as both a military bastion and a symbol of dynastic authority. Having invested in its expansion, the defense of $TLE$ is strengthened while ensuring administrative control over the surrounding lands." #NEW
 #qalat_al_mashwar_advance_desc: "The fortified complex of $qalat_al_mashwar$ stands as both a military bastion and a symbol of dynastic authority. Having invested in its expansion, the defense of Tlemcen is strengthened while ensuring administrative control over the surrounding lands." #OLD ENG

 hispano_moresque_style: "Stile Ispano-Moresco"
 hispano_moresque_style_desc: "Le nostre città riflettono una miscela unica di eleganza andalusa e architettura maghrebina. Lo stile ispano-moresco, tramandato da artigiani e nobili stranieri, ispira una nuova fioritura culturale ed eleva il prestigio della nostra corte."

 city_of_scholars: "Città degli Studiosi"
 #city_of_scholars_desc: "Tlemcen è stata a lungo un centro di apprendimento islamico e scambio intellettuale. Le nostre madrase attirano studiosi da tutto il Maghreb e Al-'Andalus, promuovendo progresso scientifico e teologico per le generazioni a venire." #OLD ITA
 city_of_scholars_desc: "$TLE$ has long been a center of Islamic learning and intellectual exchange. Our madrasas attract scholars from across the $maghreb_region$ and Al-'Andalus, fostering scientific and theological progress for generations to come." #NEW
 #city_of_scholars_desc: "Tlemcen has long been a center of Islamic learning and intellectual exchange. Our madrasas attract scholars from across the Maghreb and Al-'Andalus, fostering scientific and theological progress for generations to come." #OLD ENG

 entrepot_connections: "Connessioni di Emporio"
 entrepot_connections_desc: "Per prosperare come hub commerciale, le nostre città devono essere collegate da solide infrastrutture. Dando potere alla classe nobile di costruire e mantenere strade strategiche, miglioriamo il commercio interno e rafforziamo le arterie del nostro regno."

#Verona

 perpetual_general_captain_of_the_people: "Capitano Generale Perpetuo del Popolo"
 #perpetual_general_captain_of_the_people_desc: "Nella politica mutevole della Verona medievale, il titolo di 'Capitano del Popolo' arrivò a incarnare più di un ufficio cerimoniale—divenne una pretesa duratura alla leadership. Radicato nella tradizione civica e rivendicato dagli Scaligeri per legittimare il loro potere, diede permanenza al loro governo in una città dove la lealtà era difficile da conquistare." #OLD ITA
 perpetual_general_captain_of_the_people_desc: "In the shifting politics of medieval $VER$, the title of 'Capitano del Popolo' came to embody more than a ceremonial office — it became a lasting claim to leadership. Rooted in civic tradition and claimed by the Scaligeri to legitimize their power, it gave permanence to their rule in a city where loyalty was hard-won." #NEW
 #perpetual_general_captain_of_the_people_desc: "In the shifting politics of medieval Verona, the title of 'Capitano del Popolo' came to embody more than a ceremonial office—it became a lasting claim to leadership. Rooted in civic tradition and claimed by the Scaligeri to legitimize their power, it gave permanence to their rule in a city where loyalty was hard-won." #OLD ENG

 scaligers_military_ambitions: "Ambizioni Militari degli Scaligeri"
 #scaligers_military_ambitions_desc: "Gli Scaligeri sognavano non solo di governare Verona, ma di trasformarla in una potenza lombarda. Le loro campagne spinsero attraverso la Valle del Po, scontrandosi con Milano, Venezia e Padova. Questa ambizione lasciò il suo segno sotto forma di città fortificate, leve indurite e una corte che respirava riforma militare." #OLD ITA
 scaligers_military_ambitions_desc: "The Scaligeri dreamed not only of ruling $VER$, but of transforming it into a $lombard$ power. Their campaigns pushed across the Po Valley, clashing with $ML$, $VEN$, and Padua. This ambition left its mark in the form of fortified towns, hardened levies, and a court that breathed military reform." #NEW
 #scaligers_military_ambitions_desc: "The Scaligeri dreamed not only of ruling Verona, but of transforming it into a Lombard power. Their campaigns pushed across the Po Valley, clashing with Milan, Venice, and Padua. This ambition left its mark in the form of fortified towns, hardened levies, and a court that breathed military reform." #OLD ENG

 court_of_great_refugees: "Corte dei Grandi Rifugiati"
 #court_of_great_refugees_desc: "La nostra grande capitale è diventata un rifugio per artisti, esuli e pensatori — sfollati dalla guerra, dalla fede o dalla politica altrove in Italia. Questi rifugiati sono destinati ad arricchire le corti della città con nuove tecniche, idee audaci e correnti culturali incrociate, rendendo Verona un raro santuario di innovazione in tempi turbolenti." #OLD ITA
 court_of_great_refugees_desc: "Our great capital has become a haven for artists, exiles, and thinkers — displaced by war, faith, or politics elsewhere in $ITA$. These refugees are destined to enrich the city's courts with new techniques, bold ideas, and cultural crosscurrents, making $VER$ a rare sanctuary of innovation in turbulent times." #NEW
 #court_of_great_refugees_desc: "Our great capital, has become a haven for artists, exiles, and thinkers — displaced by war, faith, or politics elsewhere in Italy. These refugees are destined to enrich the city's courts with new techniques, bold ideas, and cultural crosscurrents, making Verona a rare sanctuary of innovation in turbulent times." #OLD ENG

 #consolidate_italian_holdings: "Consolidare i Possedimenti Italiani" #OLD ITA
 consolidate_italian_holdings: "Consolidate $ITA_ADJ$ Holdings" #NEW
 #consolidate_italian_holdings: "Consolidate Italian Holdings" #OLD ENG
 #consolidate_italian_holdings_desc: "Gli Scaligeri governavano non solo Verona, ma una crescente rete di città nell'Italia settentrionale. Tenere insieme un tale regno richiedeva attenta diplomazia, delegazione astuta e eserciti professionali ben pagati. Solo attraverso il consolidamento Verona può ergersi come vero rivale delle altre grandi potenze della penisola." #OLD ITA
 consolidate_italian_holdings_desc: "The Scaligeri ruled not just $VER$, but a growing web of cities across northern $italy_region$. Holding such a realm together demands careful diplomacy, clever delegation, and well-paid professional armies. Only through consolidation can $VER$ stand as a true rival to the other great powers of the peninsula." #NEW
 #consolidate_italian_holdings_desc: "The Scaligeri ruled not just Verona, but a growing web of cities across northern Italy. Holding such a realm together demanded careful diplomacy, clever delegation, and well-paid professional armies. Only through consolidation can Verona stand as a real rival to the other great powers of the peninsula." #OLD ENG

 the_adige: "L'Adige"
 #the_adige_desc: "Il fiume Adige è la linfa vitale di Verona — un canale per il commercio, l'agricoltura e la prosperità. Mentre le sue acque scorrono dalle Alpi all'Adriatico, così anche la ricchezza scorre attraverso i nostri mercati e campi, nutrendo sia la città che la campagna." #OLD ITA
 the_adige_desc: "The Adige River is $VER$'s lifeline — a channel for trade, agriculture, and prosperity. As its waters flow from the Alps to the Adriatic, so too does wealth flow through our markets and fields, nourishing both town and countryside alike." #NEW
 #the_adige_desc: "The Adige River is Verona's lifeline — a channel for trade, agriculture, and prosperity. As its waters flow from the Alps to the Adriatic, so too does wealth flow through our markets and fields, nourishing both town and countryside alike." #OLD ENG

 marmorina: "Marmorina"
 #marmorina_desc: "In un tempo di pace, Verona fiorì sotto governanti che apprezzavano la bellezza tanto quanto il potere. La città guadagnerà il nome 'Marmorina' per la sua abbondanza di marmo romano, statue e architettura graziosa. Un nuovo ponte sull'Adige, il Ponte Navi, si erge come un'impresa di ingegneria, mentre la torre del Gardello — il primo orologio ad acqua d'Italia — segnava le ore di una città in tranquilla ascesa. Questa eredità di raffinatezza plasmerà indubbiamente non solo il nostro skyline, ma il nostro nome nei libri di storia." #OLD ITA
 marmorina_desc: "In these times of peace, $VER$ has flourished under rulers who value beauty as much as power. The city shall earn the name 'Marmorina' for its abundance of Roman marble, statues, and graceful architecture. A new bridge over the Adige, the Ponte Navi, stands as a feat of engineering, while the Gardello tower — the first water-driven clock in $ITA$ — marked the hours in quiet ascendancy. This legacy of refinement will undoubtedly shape not only our skyline, but how we shall be remembered in the annals of history." #NEW
 #marmorina_desc: "In a time of peace, Verona flourished under rulers who valued beauty as much as power. The city shall earn the name 'Marmorina' for its abundance of Roman marble, statues, and graceful architecture. A new bridge over the Adige, the Ponte Navi, stands as a feat of engineering, while the Gardello tower — Italy's first water-driven clock — marked the hours of a city in quiet ascendancy. This legacy of refinement will undoubtedly shape not only our skyline, but our name in history books." #OLD ENG

#Smolensk
 #diocese_of_smolensk: "Diocesi di Smolensk" #OLD ITA
 diocese_of_smolensk: "Diocese of $SMO$" #NEW
 #diocese_of_smolensk: "Diocese of Smolensk" #OLD ENG
 #diocese_of_smolensk_desc: "Un tempo roccaforte spirituale del Cristianesimo ortodosso e sede di uno dei vescovadi più antichi della regione, la Diocesi di Smolensk incarna la fede incrollabile del nostro popolo." #OLD ITA
 diocese_of_smolensk_desc: "Once a spiritual stronghold of $orthodox_ADJ$ $christian$ and home to one of the oldest bishoprics in the region, the Diocese of $SMO$ embodies our people's unshakable faith." #NEW
 #diocese_of_smolensk_desc: "Once a spiritual stronghold of Orthodox Christianity and home to one of the oldest bishoprics in the region, the Diocese of Smolensk embodies our people's unshakable faith." #OLD ENG

 #smolenskian_resolve: "Determinazione di Smolensk" #OLD ITA
 smolenskian_resolve: "$SMO_ADJ$ Resolve" #NEW
 #smolenskian_resolve: "Smolenskian Resolve" #OLD ENG
 #smolenskian_resolve_desc: "Per secoli, Smolensk è stata una terra divisa da estranei — duchi lituani, re polacchi e principi moscoviti. Per sopravvivere, ci siamo aggrappati a ciò che ci univa: la nostra fede e la nostra forza d'animo. Se mai dovessimo risorgere, dobbiamo scacciare le divisioni e radunarci attorno all'idea sacra che, soprattutto, c'è solo Smolensk." #OLD ITA
 smolenskian_resolve_desc: "For centuries, $SMO$ has been a land carved up by outsiders — $LIT_ADJ$ dukes, $POL_ADJ$ kings, and $MOS_ADJ$ princes. To survive, we clung to what united us: our faith and our fortitude. If we are ever to rise again, we must cast off divisions and rally around the sacred idea that, above all, there is only $SMO$." #NEW
 #smolenskian_resolve_desc: "For centuries, Smolensk has been a land carved up by outsiders — Lithuanian dukes, Polish kings, and Muscovite princes. To survive, we clung to what united us: our faith and our fortitude. If we are ever to rise again, we must cast off divisions and rally around the sacred idea that, above all, there is only Smolensk." #OLD ENG

 link_the_steppes_trade: "Collegare il Commercio delle Steppe"
 #link_the_steppes_trade_desc: "Posizionata tra foresta e steppa, Smolensk è stata a lungo un crocevia di guerra e commercio. Migliorando l'infrastruttura terrestre e assicurando le arterie del viaggio in carovana, possiamo riforgiare il nostro ruolo come cardine vitale tra la Rus' settentrionale, il Baltico e le rotte commerciali meridionali della steppa." #OLD ITA
 link_the_steppes_trade_desc: "Positioned between forest and steppe, $SMO$ has long been a crossroads of war and commerce. By improving overland infrastructure and securing the arteries of caravan travel, we can reforge our role as the vital hinge between northern Rus', the Baltic, and the southern trade routes of the steppes." #NEW
 #link_the_steppes_trade_desc: "Positioned between forest and steppe, Smolensk has long been a crossroads of war and commerce. By improving overland infrastructure and securing the arteries of caravan travel, we can reforge our role as the vital hinge between northern Rus', the Baltic, and the southern trade routes of the steppe." #OLD ENG

 hub_of_militarism: "Centro di Militarismo"
 #hub_of_militarism_desc: "A lungo la guerra ha definito il nostro destino, ma ora definirà la nostra forza. Dall'abbraccio rovinoso della guerra e dell'assedio, Smolensk sorge come centro di produzione militare — cannoni, armi da fuoco, polvere e dottrina fluiscono verso l'esterno dalle nostre armerie. Che il mondo ci veda non come un premio da prendere, ma come un martello da temere, pronto a colpire l'incudine dei conquistatori stranieri." #OLD ITA
 hub_of_militarism_desc: "Long has war defined our fate, but now it shall define our strength. From the ruinous embrace of warfare and siege, $SMO$ rises as a center of military production — cannons, firearms, powder and doctrine flow outward from our armories. Let the world see us not as a prize to be taken, but as a hammer to be feared, ready to strike the anvil of foreign conquerors." #NEW
 #hub_of_militarism_desc: "Long has war defined our fate, but now it shall define our strength. From the ruinous embrace of warfare and siege, Smolensk rises as a center of military production — cannons, firearms, powder and doctrine flow outward from our armories. Let the world see us not as a prize to be taken, but as a hammer to be feared, ready to strike the anvil of foreign conquerors." #OLD ENG

 #armories_of_smolensk: "Le Armerie di Smolensk" #OLD ITA
 armories_of_smolensk: "The Armories of $SMO$" #NEW
 #armories_of_smolensk: "The Armories of Smolensk" #OLD ENG
 #armories_of_smolensk_desc: "Dopo decenni di guerra su ogni confine, abbiamo imparato a combattere con armi sia dell'est che dell'ovest. Mescolando la grinta moscovita con la precisione occidentale, le nostre armerie ora producono artiglieria d'élite e tattiche ineguagliate dai nostri rivali. Dalle nostre fucine viene la potenza di fuoco — e dalla potenza di fuoco, dominio e perseveranza." #OLD ITA
 armories_of_smolensk_desc: "After decades of warfare on every border, we learned to fight with weapons of both east and west. Blending $MOS_ADJ$ grit with western precision, our armories now produce elite artillery and tactics unmatched by our rivals. From our forges comes firepower — and from firepower, domination and perseverance." #NEW
 #armories_of_smolensk_desc: "After decades of warfare on every border, we learned to fight with weapons of both east and west. Blending Muscovite grit with western precision, our armories now produce elite artillery and tactics unmatched by our rivals. From our forges comes firepower — and from firepower, domination and perseverance." #OLD ENG
 
#Provence
 #capetian_house_of_anjou: "Casa Capetingia d'Angiò" #OLD ITA
 capetian_house_of_anjou: "Capetian House of $ANJ$" #NEW
 #capetian_house_of_anjou: "Capetian House of Anjou" #OLD ENG
 #capetian_house_of_anjou_desc: "La fusione della dignità capetingia e dell'ambizione angioina scorre nel nostro sangue. Sebbene non indossiamo più la corona di Gerusalemme, rimaniamo eredi di un'eredità di regalità che un tempo si estendeva dall'Angiò all'Albania. Con attenta diplomazia e pianificazione, potremmo ancora far rivivere la grandezza dei nostri avi e rivendicare ciò che ci fu ingiustamente sottratto." #OLD ITA
 capetian_house_of_anjou_desc: "A potent mix of Capetian dignity and Angevin ambition courses through our blood. Though we no longer wear the crown of Jerusalem, we remain heirs to a legacy of kingship that once stretched from $ANJ$ to $ALB$. With careful diplomacy and planning, we may yet revive the grandeur of our forefathers and claim what was unjustly taken from us." #NEW
 #capetian_house_of_anjou_desc: "The fusion of Capetian dignity and Angevin ambition courses through our blood. Though we no longer wear the crown of Jerusalem, we remain heirs to a legacy of kingship that once stretched from Anjou to Albania. With careful diplomacy and planning, we may yet revive the grandeur of our forefathers and claim what was unjustly taken from us." #OLD ENG

 lords_of_the_rhone_corridor: "Signori del Corridoio del Rodano"
 #lords_of_the_rhone_corridor_desc: "La valle del Rodano è sempre stata la nostra arteria di potere, e i nostri castelli vegliano su di essa come sentinelle di pietra. Queste fortificazioni sono tra le più robuste di tutta Europa, un segno costante della nostra abilità militare e ingegneristica, che veglia per sempre sul nostro dominio." #OLD ITA
 lords_of_the_rhone_corridor_desc: "The Rhône Valley has always been our artery of power, and our castles stand watch over it like sentinels of stone. These fortifications are some of the sturdiest in all of $europe$, a steadfast sign of our military and engineering prowess, forever watching over our domain." #NEW
 #lords_of_the_rhone_corridor_desc: "The Rhône valley has always been our artery of power, and our castles stand watch over it like sentinels of stone. These fortifications are some of the most sturdy in all of Europe, a steadfast sign of our military and engineering prowess, forever watching over our domain." #OLD ENG

 angevin_heraldry: "Araldica Angioina"
 #angevin_heraldry_desc: "I gigli dorati e le aquile bicipiti dei nostri stendardi parlano di antiche pretese e ambizioni regali. Pretese che si estendono alla penisola italiana, e fino all'Albania e Gerusalemme, echeggiano ancora nella nostra corte. Che la Casa di Valois-Angiò si elevi più in alto che mai." #OLD ITA
 angevin_heraldry_desc: "The golden lilies and double-headed eagles of our banners speak to ancient rights and royal ambitions. Claims that stretch across $italy_region$, reaching as far as $ALB$ and $jerusalem$, still echo in our hearts. Let the House of Valois-Anjou rise higher than ever before!" #NEW
 #angevin_heraldry_desc: "The golden lilies and double-headed eagles of our banners speak to ancient claims and royal ambition. Claims that stretch the Italian peninsula, and as far as Albania and Jerusalem still echo in our court. Let the House of Valois-Anjou rise higher than ever before." #OLD ENG

 le_livre_des_tournois: "Le Livre des Tournois"
 le_livre_des_tournois_desc: "Scritto dalla regalità, il 'Libro dei Tornei' è più di un manuale — è una dichiarazione di orgoglio cortese e identità cavalleresca. La nostra nobiltà si addestra non solo per la guerra ma per lo spettacolo, e nel farlo preserva la disciplina marziale e il prestigio in tutto il regno."

 statutes_of_aix: "Statuti di Aix"
 statutes_of_aix_desc: "Una serie di leggi e statuti vagamente consolidati formano la spina dorsale legale del nostro governo. Questi statuti mescolano la giurisprudenza romana con costumi locali e tradizione angioina, permettendoci di gestire un mosaico di regioni come un unico dominio coeso: una vera monarchia composita, dove le parti sono diverse, ma la corona è indivisibile."

 #rade_of_toulon: "Rada di Tolone" #OLD ITA
 rade_of_toulon: "Rade of $toulon$" #NEW
 #rade_of_toulon: "Rade of Toulon" #OLD ENG
 #rade_of_toulon_desc: "Il porto naturale di Tolone offre la base ideale per le nostre ambizioni navali. Mentre Marsiglia prospera come nostro gioiello commerciale, Tolone sarà l'arsenale della Provenza, il punto di lancio di una futura potenza marittima." #OLD ITA
 rade_of_toulon_desc: "$toulon$'s natural harbor offers the ideal staging ground for our naval ambitions. While $marseille$ thrives as our commercial jewel, $toulon$ shall be the armory of $PRO$, and the launching point of a future maritime power." #NEW
 #rade_of_toulon_desc: "Toulon's natural harbor offers the ideal staging ground for our naval ambitions. While Marseille thrives as our commercial jewel, Toulon shall be the armory of Provence, the launching point of a future maritime power." #OLD ENG

 #piqure_de_marseilles: "Piqûre de Marseille" #OLD ITA
 piqure_de_marseilles: "Piqûre de $marseille$" #NEW
 #piqure_de_marseilles: "Piqûre de Marseille" #OLD ENG
 #piqure_de_marseilles_desc: "Attraverso i laboratori di Marsiglia, gli artigiani cuciono delicate trapunte boutis nello stile provenzale — apprezzate in tutta Europa per la loro qualità e fascino. Proprio come il nostro ducato, le opere d'arte del regno sono composte da molte parti cucite in un tutto unificato: una terra trapuntata, ricca di texture e cultura." #OLD ITA
 piqure_de_marseilles_desc: "Across the workshops of $marseille$, artisans stitch delicate #italic boutis#! quilts in the $PRO_ADJ$ style — treasured across $europe$ for their quality and charm. Much like our duchy, works of art created in our realm are composed of many parts stitched into a unified whole: a quilted land, rich in texture and culture." #NEW
 #piqure_de_marseilles_desc: "Across the workshops of Marseille, artisans stitch delicate boutis quilts in the Provençal style — treasured across Europe for their quality and charm. Much like our duchy, realm works of art are composed of many parts stitched into a unified whole: a quilted land, rich in texture and culture." #OLD ENG

#Hormuz

 orm_a_vast_emporium: "Un Vasto Emporio"
 #orm_a_vast_emporium_desc: "È stato detto che Hormuz è 'un vasto emporio dove c'erano popoli e merci di ogni descrizione da tutte le parti del mondo' o che 'Se tutto il mondo fosse un anello d'oro, Hormuz sarebbe il gioiello in esso'. L'identità del nostro regno è inseparabile dal commercio. Infatti, navi dal Gujarat, dall'Arabia e persino dalla Cina ancorano nei nostri porti, scambiando spezie, gemme, seta e storie." #OLD ITA
 orm_a_vast_emporium_desc: "It has been said that $ORM$ is 'a vast emporium where there were peoples and goods of every description from all parts of the world' or that 'If all the world were a golden ring, $ORM$ would be the jewel in it'. Our realm's identity is inseparable from commerce. Indeed, ships from $gujarat_area$, $arabia_region$, and even $CHI$ anchor in our ports, exchanging spices, $gems$, $silk$, and stories." #NEW
 #orm_a_vast_emporium_desc: "It has been said that Hormuz is 'a vast emporium where there were peoples and goods of every description from all parts of the world' or that 'If all the world were a golden ring, Hormuz would be the jewel in it'. Our realm's identity is inseparable from commerce. Indeed, ships from Gujarat, Arabia, and even China alike anchor in our ports, exchanging spices, gems, silk, and stories." #OLD ENG

 #hormuz_toll: "Pedaggio di Hormuz" #OLD ITA
 hormuz_toll: "$ORM$ Toll" #NEW
 #hormuz_toll: "Hormuz Toll" #OLD ENG
 #hormuz_toll_desc: "Nel punto più stretto del Golfo Persico si erge Hormuz, il guardiano del commercio marittimo Est-Ovest. Nessun vascello passa senza la nostra conoscenza o la nostra tariffa. Per secoli, questo pedaggio non solo ci ha arricchito, ma ha plasmato la nostra diplomazia e proiezione di potere attraverso i vasti mari." #OLD ITA
 hormuz_toll_desc: "At the narrowest point of the $persian_gulf$ stands $ORM$, the gatekeeper of east-west maritime trade. No vessel passes without our knowledge — or without paying our fee. For centuries, this toll has not just made us richer, but shaped our diplomacy and how we project power across the vast seas." #NEW
 #hormuz_toll_desc: "At the narrowest point of the Persian Gulf stands Hormuz, the gatekeeper to East-West maritime trade. No vessel passes without our knowledge or our fee. For centuries, this toll has not just enriched us, but shaped our diplomacy and power projection across the vast seas." #OLD ENG

 #gate_of_the_persian_gulf: "Porta del Golfo Persico" #OLD ITA
 gate_of_the_persian_gulf: "Gate of the $persian_gulf$" #NEW
 #gate_of_the_persian_gulf: "Gate of the Persian Gulf" #OLD ENG
 #gate_of_the_persian_gulf_desc: "Hormuz controlla lo stretto che collega l'Oceano Indiano all'interno dell'Asia. Chi detiene questo passaggio vitale detta il ritmo del traffico marittimo. Il nostro comando di queste acque deve essere assoluto, affinché la nostra influenza non sia diminuita." #OLD ITA
 gate_of_the_persian_gulf_desc: "$ORM$ controls the strait that links the $indian_ocean_continent$ to the interior of $asia$. Whoever holds this vital passage dictates the rhythm of maritime traffic. Our command of these waters must be absolute, lest our influence be diminished." #NEW
 #gate_of_the_persian_gulf_desc: "Hormuz controls the strait that links the Indian Ocean to the interior of Asia. Whoever holds this vital passage dictates the rhythm of maritime traffic. Our command of these waters must be absolute, lest our influence be diminished." #OLD ENG

 moqarrariya: "Istituzionalizzare la Moqarrariya"
 #moqarrariya_desc: "Per generazioni, il nostro regno ha mantenuto la pace con la terraferma attraverso l'antico sistema di tributi noto come Moqarrariya. Piuttosto che dipendere da consuetudini e negoziati, codifichiamo questi tributi in patti formali — assicurando acqua dolce, sicurezza via terra e stabilità a lungo termine attraverso una diplomazia affidabile." #OLD ITA
 moqarrariya_desc: "For generations, our realm maintained peace with the mainland through the ancient tribute system known as #italic Moqarrariya#!. Rather than depending on custom and negotiation, let us codify these tributes into formal pacts — securing fresh water, overland safety, and long-term stability through reliable diplomacy." #NEW
 #moqarrariya_desc: "For generations, our realm maintained peace with the mainland through the ancient tribute system known as Moqarrariya. Rather than depend on custom and negotiation, let us codify these tributes into formal pacts — securing fresh water, overland safety, and long-term stability through reliable diplomacy." #OLD ENG

 #develop_qeshm_and_ormuz: "Investire in Qeshm e Hormuz" #OLD ITA
 develop_qeshm_and_ormuz: "Invest in Qeshm and $ORM$" #NEW
 #develop_qeshm_and_ormuz: "Invest in Qeshm and Hormuz" #OLD ENG
 #develop_qeshm_and_ormuz_desc: "Sebbene aride e rocciose, le isole di Qeshm e Hormuz hanno sostenuto la vita urbana grazie a un'attenta provvista e un ricco commercio. Con un investimento adeguato, i loro porti e laboratori possono prosperare ulteriormente, trasformandoli da hub logistici in centri di innovazione e produttività." #OLD ITA
 develop_qeshm_and_ormuz_desc: "Though dry and rocky, the islands of Qeshm and $ORM$ have sustained urban life thanks to careful provisioning and rich trade. With proper investment, their ports and workshops can flourish further, turning them from logistical hubs into centers of innovation and productivity." #NEW
 #develop_qeshm_and_ormuz_desc: "Though dry and rocky, the islands of Qeshm and Hormuz have sustained urban life thanks to careful provisioning and rich trade. With proper investment, their ports and workshops can flourish further, turning them from logistical hubs into centers of innovation and productivity." #OLD ENG

 #ormuzi_navy: "La Marina Ormuzi" #OLD ITA
 ormuzi_navy: "The $ORM_ADJ$ Navy" #NEW
 #ormuzi_navy: "The Ormuzi Navy" #OLD ENG
 #ormuzi_navy_desc: "Il Golfo ha a lungo dipeso dalle nostre flotte — siano esse mercantili, di pattuglia o scorte armate. Ma per eguagliare le ambizioni di coloro che invidiano la nostra posizione, dobbiamo espandere e modernizzare. Che Hormuz diventi non solo un posto commerciale, ma l'arsenale marittimo del mare." #OLD ITA
 ormuzi_navy_desc: "The $persian_gulf$ is crossed daily by our fleets — be they traders, patrols, or armed escorts. But to match the ambitions of those who envy our position, we must expand and modernize. Let $ORM$ become more than just a trading post: a maritime arsenal." #NEW
 #ormuzi_navy_desc: "The Gulf has long depended on our fleets — be they traders, patrols, or armed escorts. But to match the ambitions of those who envy our position, we must expand and modernize. Let Hormuz become not just a trading post, but the maritime arsenal of the sea." #OLD ENG

 mint_of_the_gulf: "Zecca del Golfo"
 #mint_of_the_gulf_desc: "La monetazione Ormuzi circola da Bassora al Bengala, fidata per la sua purezza e peso. Istituzionalizzando la nostra zecca ed espandendo la nostra emissione, rafforziamo la nostra sovranità finanziaria — e rivendichiamo la supremazia fiscale sull'Oceano Indiano." #OLD ITA
 mint_of_the_gulf_desc: "Ormuzi coinage circulates from $basra_al_hamra$ to $bengal_area$, trusted for its purity and weight. By institutionalizing our mint and expanding our issuance, we reinforce our financial sovereignty — and claim fiscal supremacy over the $indian_ocean_region$." #NEW
 #mint_of_the_gulf_desc: "Ormuzi coinage circulates from Basra to Bengal, trusted for its purity and weight. By institutionalizing our mint and expanding our issuance, we reinforce our financial sovereignty — and claim the fiscal supremacy over the Indian Ocean." #OLD ENG
 #Savoy
 #sav_savoyard_flexibility: "Diplomatici Savoiardi" #OLD ITA
 sav_savoyard_flexibility: "$SAV_ADJ$ Diplomacy" #NEW
 #sav_savoyard_flexibility: "Savoyard Diplomats" #OLD ENG
 #sav_savoyard_flexibility_desc: "A causa della nostra posizione tra potenze maggiori, dovremo fare affidamento sulle nostre abilità diplomatiche per la sopravvivenza. Mantenendo relazioni diplomatiche anche con i nostri nemici più pericolosi, saremo in grado di spostare le nostre alleanze per assicurare la sopravvivenza del nostro paese." #OLD ITA
 sav_savoyard_flexibility_desc: "Due to our precarious location between greater powers, we must rely on our diplomatic skills for survival. By maintaining diplomatic relations even with our most dangerous foes, we will be able to shift our alliances to ensure the endurance of our country." #NEW
 #sav_savoyard_flexibility_desc: "Due to our position between greater powers, we will have to rely on our diplomatic skills for survival. By maintaining diplomatic relations even with our most dangerous foes, we will be able to shift our alliances to ensure the endurance of our country." #OLD ENG

 sav_house_of_savoy: "Una Casa Unita"
 #sav_house_of_savoy_desc: "La Savoia è stata governata da una linea stabile di conti per diversi secoli dalla sua creazione nel 1032. Assicurando l'unità della nostra famiglia regnante e una forte connessione con i rappresentanti locali, saremo in grado di non lasciare che queste terre si frammentino." #OLD ITA
 sav_house_of_savoy_desc: "$SAV$ has been ruled by a stable line of dynastic counts ever since its creation. By ensuring the unity of our ruling family and maintaining a strong connection to local representatives, we keep our land from being fractured." #NEW
 #sav_house_of_savoy_desc: "Savoy has been ruled by a stable line of counts for several centuries since it was created in 1032. By ensuring the unity of our ruling family and a strong connection to local representatives, we will be able to not let these lands fracture." #OLD ENG

 sav_fight_the_vaudois: "Resistere all'Eresia"
 #sav_fight_the_vaudois_desc: "Le nostre terre hanno a lungo sofferto sotto la predicazione eretica dei Valdesi. Solo per la nostra forza di volontà e il sostegno del divino, siamo stati in grado di contenere la loro influenza, e continueremo a difendere l'unica vera fede da queste idee pericolose." #OLD ITA
 sav_fight_the_vaudois_desc: "Our lands have long suffered under the heretical preaching of the Waldensians. By the force of our will and with the support of the divine, we have been able to contain their influence, and we shall continue to defend the one true faith from these dangerous ideas." #NEW
 #sav_fight_the_vaudois_desc: "Our lands have long suffered under the heretical preaching of the Waldensians. Only by our force of will and the support of the divine, we have been able to contain their influence, and we shall continue to defend the one true faith from these dangerous ideas." #OLD ENG

 sav_embrace_the_vaudois: "Una Luce nelle Tenebre"
 #sav_embrace_the_vaudois_desc: "Abbiamo abbracciato gli insegnamenti del movimento valdese e siamo dedicati a proteggere questa fede dalla feroce Chiesa cattolica, che desidera sradicare le sue idee." #OLD ITA
 sav_embrace_the_vaudois_desc: "We have embraced the teachings of the Waldensian movement and are dedicated to protecting this faith from the vicious $catholic_ADJ$ Church, which seeks to eradicate its ideas." #NEW
 #sav_embrace_the_vaudois_desc: "We have embraced the teachings of the Waldensian movement and are dedicated to protect this faith from the vicious Catholic Church, who desires to eradicate its ideas." #OLD ENG

 #sav_alpine_pass_control: "Controllo sui Passi" #OLD ITA
 sav_alpine_pass_control: "Control Over the Passes" #NEW
 #sav_alpine_pass_control: "Control over the Passes" #OLD ENG
 #sav_alpine_pass_control_desc: "Il passaggio attraverso le Alpi è problematico nel migliore dei casi, e può essere del tutto impossibile con carrozze o un seguito più grande. Mantenendo buoni percorsi, rifugi e stazioni di sosta, saremo in grado di dominare il terreno difficile e assicurare uno scambio costante di mercanti tra le nostre terre." #OLD ITA
 sav_alpine_pass_control_desc: "The passage over the Alps is troublesome at the best of times, and can be outright impossible with carriages or a larger entourage. By maintaining good pathways, shelters, and waystations, we will be able to dominate the difficult terrain and ensure a steady exchange of merchants throughout our territory." #NEW
 #sav_alpine_pass_control_desc: "The passage over the Alps is troublesome at the best of times, and can be outright impossible with carriages or a larger entourage. By maintaining good pathways, shelter, and waystations, we will be able to dominate the difficult terrain and ensure a steady exchange of merchants between our lands." #OLD ENG

 #sav_the_shroud_of_turin: "Pellegrinaggio alla Sacra Sindone" #OLD ITA
 sav_the_shroud_of_turin: "Holy Shroud Pilgrimage" #NEW
 #sav_the_shroud_of_turin: "Pilgrimage to the Holy Shroud" #OLD ENG
 #sav_the_shroud_of_turin_desc: "La nostra terra è in possesso di un artefatto sacrosanto, un pezzo di stoffa che porta il volto di Gesù di Nazareth. Naturalmente, ha attratto molti pellegrini a visitare e venerare questa sacra sindone. Questo flusso costante di pellegrini porta molta ricchezza alle nostre terre, che potremmo sfruttare." #OLD ITA
 sav_the_shroud_of_turin_desc: "Our realm is in the possession of a most holy artifact, a piece of cloth that bears the face of Jesus of Nazareth. Naturally, it has attracted numerous pilgrims, all clamoring to see and venerate this extraordinary relic. This constant stream of pilgrimage brings a great deal of wealth into our territory — which is all very much to our advantage." #NEW
 #sav_the_shroud_of_turin_desc: "Our land is in the possession of a most holy artifact, a piece of cloth that bears the face of Jesus of Nazareth. Naturally, it has attracted plenty of pilgrims to visit and venerate this holy shroud. This constant stream of pilgrims brings much wealth to our lands, which we could exploit." #OLD ENG

 sav_repopulate_the_valleys: "Popolare le Valli Alpine"
 #sav_repopulate_the_valleys_desc: "La popolazione delle valli alpine è stata a lungo attratta dalle aree urbane su entrambi i lati della catena montuosa. Questo lascia i piccoli villaggi delle valli minori in una posizione precaria e clima politico instabile. Dobbiamo assicurare che la nostra popolazione abbia molte ragioni per tornare alle valli e non lasciarle cadere in rovina." #OLD ITA
 sav_repopulate_the_valleys_desc: "Many people in our realm leave the alpine valleys they were born into to settle in the urban areas on either side of the mountain range. This depopulation leaves the small villages of lesser valleys in a precarious, politically unstable position. We must ensure that the valley lands are sufficiently populated and can be adequately maintained." #NEW
 #sav_repopulate_the_valleys_desc: "The population of the alpine valleys has long been drawn to the urban areas on both sides of the mountain range. This leaves the small villages of lesser valley in a precarious position and unstable political climate. We must ensure that our population has plenty of reasons to return to the valleys and not let them fall to ruin." #OLD ENG

 #Mainz
 mai_diadema_regni: "Diadema Regni"
 #mai_diadema_regni_desc: "La nostra amata città è stata descritta come la Corona dell'Impero, un soprannome che dovremo sostenere e mantenere. Mantenere lo status di Magonza all'interno dell'impero ci darà influenza e prestigio di vasta portata." #OLD ITA
 mai_diadema_regni_desc: "Our beloved city has been described as 'Diadema Regni', the Crown of the Empire, a moniker we strive mightily to maintain. Maintaining this distinction will help us remain above other Imperial cities in terms of our prestige and political influence." #NEW
 #mai_diadema_regni_desc: "Our beloved city has been described as the Crown of the Empire, a moniker we will have to uphold and maintain. Keeping the status of Mainz within the empire will give us far-reaching influence and prestige." #OLD ENG

 mai_city_and_archbishop: "Diritti della Città"
 #mai_city_and_archbishop_desc: "I cittadini di Magonza hanno prosperato sotto i diritti estensivi loro concessi da Adalberto di Magonza nel 1119 e 1122. Questi diritti, scolpiti nella porta di bronzo della Cattedrale, serviranno come promemoria della cooperazione tra i poteri separati all'interno della città, sia il clero che i cittadini." #OLD ITA
 mai_city_and_archbishop_desc: "The citizens of $MAI$ have prospered under the extensive rights granted to them by Adalbert of $MAI$ in the early 12th century. These rights, carved into the bronze door of the Cathedral, will serve as a reminder of cooperation between the separate powers within the city, both the clergy and the citizenry." #NEW
 #mai_city_and_archbishop_desc: "The citizens of Mainz have prospered under the extensive rights granted to them by Adalbert of Mainz in 1119 and 1122. These rights, carved into the bronze door of the Cathedral, will serve as a reminder of cooperation between the separate powers within the city, both the clergy and the citizens." #OLD ENG

 mai_leader_rheinish_league: "Lega Renana"
 #mai_leader_rheinish_league_desc: "Durante l'esistenza della Lega Renana, abbiamo naturalmente assunto una posizione di leadership e guida per gli altri membri. Sebbene la lega stessa si sia sciolta, la nostra posizione di leadership e guida degli stati minori intorno a noi non deve giungere al termine." #OLD ITA
 mai_leader_rheinish_league_desc: "When the Rheinish League was active, we naturally assumed a position of leadership and guidance for the other members. Although the League itself has disbanded, we must do everything we can to maintain our influence over our former associates." #NEW
 #mai_leader_rheinish_league_desc: "During the existence of the Rheinish League, we have naturally assumed a position of leadership and guidance for the other members. Although the league itself has disbanded, our position of leadership and guidance of the smaller states around us must not come to an end." #OLD ENG

 #mai_zealous_fight_against_heretics: "Proteggere la nostra Fede" #OLD ITA
 mai_zealous_fight_against_heretics: "Protect Our Faith" #NEW
 #mai_zealous_fight_against_heretics: "Protect our Faith" #OLD ENG
 #mai_zealous_fight_against_heretics_desc: "L'unità religiosa del nostro paese deve essere difesa contro ogni minaccia. Se dotassimo i nostri eserciti di guida morale sotto forma di sacerdoti, sarebbero molto più motivati a difendere le nostre credenze." #OLD ITA
 mai_zealous_fight_against_heretics_desc: "Our country's religious unity must be defended against any threat. If we provide our armies with moral guidance in the form of military chaplains, they will be much more motivated to defend our beliefs." #NEW
 #mai_zealous_fight_against_heretics_desc: "The religious unity of our country must be defended against any threat. If we staff our armies with moral guidance in the form of priest, they will be much more motivated to defend our beliefs." #OLD ENG

 mai_vicar_of_mainz: "Governo del Vicario"
 #mai_vicar_of_mainz_desc: "Per assicurare che le nostre terre siano governate in modo affidabile, anche in tempo di assenza del nostro governante, dovremmo nominare un vicario. Dotato di diritti estensivi, il vicario può governare con le nostre migliori intenzioni e ricordare al popolo comune della nostra presenza in ogni momento." #OLD ITA
 mai_vicar_of_mainz_desc: "To ensure our lands are governed reliably, even in the absence of our ruler, we should instate a vicar. Empowered with extensive rights, the vicar can rule with our best intentions and remind the common folk of our presence at all times." #NEW
 #mai_vicar_of_mainz_desc: "To ensure our lands are governed reliably, even in time of absence of our ruler, we should instate a vicar. Empowered with extensive rights, the vicar can rule with our best intentions and remind the common folk of our presence at all times." #OLD ENG

 mai_mainz_kingdom: "Mainzer Königreich"
 #mai_mainz_kingdom_desc: "Sebbene le celebrazioni del Mercoledì delle Ceneri siano un evento comune, nel nostro Paese hanno radici particolarmente profonde. Mentre il pubblico festeggia il #italic Fastnacht#!, o carnevale, con mascherate e banchetti sfrenati, la nostra corte organizzerà un evento speciale. Durante i festeggiamenti del carnevale, ridistribuiremo i ruoli della nostra corte tramite sorteggio, e anche il sovrano dovrà partecipare. Questa usanza di scambiare i ruoli, chiamata #italic Mainzer Königreich#!, si diffonderà ben oltre i nostri confini e garantirà la nostra eredità culturale." #OLD ITA
 mai_mainz_kingdom_desc: "While celebrations on Ash Wednesday are a common occurrence, they hold especially deep roots in our country. While the public celebrates the #italic Fastnacht#!, or carnival, with masquerade and excessive feasts, our court will engage in a special event. During the carnival celebrations, we will redistribute the roles of our court per lottery, with even the ruler having to participate. This custom of swapping roles, called #italic Mainzer Königreich#!, will spread far beyond our borders and help expand our cultural legacy." #NEW
 #mai_mainz_kingdom_desc: "While celebrations on Ash Wednesday are a common occurrence, they hold especially deep roots in our country. While the public celebrates the #italic Fastnacht#!, or carnival, with masquerade and excessive feasts, our court will engage in a special event. During the carnival celebrations, we will redistribute the roles of our court per lottery, with even the ruler having to participate. This custom of swapping roles, called #italic Mainzer Königreich#!, will carry far beyond our borders and ensure our cultural legacy." #OLD ENG

 #mai_center_of_printing: "Tipografie di Magonza" #OLD ITA
 mai_center_of_printing: "Printing Shops of $mainz$" #NEW
 #mai_center_of_printing: "Printing Shops of Mainz" #OLD ENG
 #mai_center_of_printing_desc: "Siamo ben posizionati per espandere la crescita delle presse da stampa all'interno del nostro territorio e diventare un importante produttore di libri in Europa." #OLD ITA
 mai_center_of_printing_desc: "By expanding our already-growing printing industry, we can become the leading producer of books in $europe$." #NEW
 #mai_center_of_printing_desc: "We are positioned well to expand on the growth of the printing presses within our territory and become a major producer of books within Europe." #OLD ENG

 #mai_garrison_of_the_rhine: "Città di Guarnigione del Reno" #OLD ITA
 mai_garrison_of_the_rhine: "Garrison of the Rhine" #NEW
 #mai_garrison_of_the_rhine: "Garrison City of the Rhine" #OLD ENG
 #mai_garrison_of_the_rhine_desc: "Difendere i nostri confini dalle minacce può essere un compito difficile, specialmente considerando il fiume che divide le nostre terre in due. Dobbiamo assicurare che un'estesa rete di guarnigioni e fortificazioni possa resistere ai nostri nemici." #OLD ITA
 mai_garrison_of_the_rhine_desc: "Defending our borders can be a difficult task, especially considering the river splitting our land in two. We must build an extensive network of garrisons and fortifications that can withstand our enemies." #NEW
 #mai_garrison_of_the_rhine_desc: "Defending our borders against threats can be a difficult task, especially considering the river splitting our lands in two. We must ensure an extensive network of garrisons and fortification can withstand our enemies." #OLD ENG
 
 #Croatia
 cro_maritime_connections: "Viaggi Marittimi"
 #cro_maritime_connections_desc: "La nostra costa frammentata non si presta a facili collegamenti stradali tra gli insediamenti costieri. Per questo motivo, dovremo stabilire connessioni permanenti via barca, assicurando che sia merci che persone non soffrano lunghi attraversamenti delle terre costiere stesse." #OLD ITA
 cro_maritime_connections_desc: "Due to our fragmentary coastline, connecting our coastal settlements by road is almost impossible. For this reason, we will have to establish permanent connections by boat, ensuring both goods and people will not have to suffer through longer journeys overland." #NEW
 #cro_maritime_connections_desc: "Our fragmented coastline does not lend itself for easy road connections between coastal settlements. For this reason, we will have to establish permanent connections by boat, ensuring both goods and people will not suffer long traversal of the coastal lands themselves." #OLD ENG

 cro_reliance_on_adriatic: "Ricchezze dell'Adriatico"
 #cro_reliance_on_adriatic_desc: "Il mare al largo delle nostre coste ci dà accesso a molto pesce e sale da estrarre, che può sostenere la nostra economia locale e fornirci ampi beni per l'esportazione." #OLD ITA
 cro_reliance_on_adriatic_desc: "The abundant seas give us access to plenty of $fish$ and $salt$, which can feed our people, sustain our local economy, and provide us with ample export goods." #NEW
 #cro_reliance_on_adriatic_desc: "The sea off our shores gives us access to plenty of fish and salt to extract, which can sustain our local economy and provide us with ample goods for exporting." #OLD ENG

 cro_trade_posts: "Posti Commerciali Croati"
 #cro_trade_posts_desc: "Le nostre terre sono situate tra molte destinazioni attraenti per i mercanti. Invece di lasciarli passare e ospitarli solo come intermediari, dovremmo sponsorizzare noi stessi il commercio e prendere la nostra giusta parte del commercio mediterraneo." #OLD ITA
 cro_trade_posts_desc: "Our land is situated between many attractive destinations for merchants. Instead of letting them pass through and only hosting them as intermediaries, we should sponsor some of this business ourselves, and take our fair share of the Mediterranean trade." #NEW
 #cro_trade_posts_desc: "Our lands are situated between many attractive destinations for merchants. Instead of letting them pass and only host them as intermediaries, we should sponsor trades ourselves and take our fair share of the Mediterranean trade." #OLD ENG

 cro_influx_of_foreign_knowledge: "Afflusso di Conoscenza Straniera"
 #cro_influx_of_foreign_knowledge_desc: "Molti artisti e studiosi stranieri hanno attraversato le nostre terre. Dovremmo dare loro incentivi per rimanere nelle nostre terre e promuovere le conquiste della nostra cultura." #OLD ITA
 cro_influx_of_foreign_knowledge_desc: "Many foreign artists and scholars have passed through our lands, but we should give them incentive to stay. Building a domestic community of talented creatives will decidedly further our cultural achievements." #NEW
 #cro_influx_of_foreign_knowledge_desc: "Many foreign artists and scholars have passed our lands. We should give them incentive to stay in our lands and further the achievements of our culture." #OLD ENG

 cro_antemurale_christianitatis: "Antemurale Christianitatis"
 #cro_antemurale_christianitatis_desc: "Dobbiamo comprenderci come difensori del Cristianesimo e dell'unica vera fede e come baluardo contro eretici e pagani allo stesso modo." #OLD ITA
 cro_antemurale_christianitatis_desc: "We see ourselves as defenders of $christian$ and as a bulwark against heretics and heathens alike." #NEW
 #cro_antemurale_christianitatis_desc: "We must understand ourselves as defenders of Christianity and the one true faith and as a bulwark against heretics and heathens alike." #OLD ENG

 cro_pandurs_recruitment: "Coscrizione dei Panduri"
 #cro_pandurs_recruitment_desc: "Stabiliremo reggimenti di fanti leggeri, che serviranno come applicazione della legge e protezione contro i razziatori in tempi di pace. Questi uomini si inseriranno anche facilmente nel nostro esercito, rafforzando le nostre forze in tempi difficili." #OLD ITA
 cro_pandurs_recruitment_desc: "We will establish regiments of light infantry, who will serve as law enforcement and protection against raiders during times of peace. These men will also easily fill our army, reinforcing our military when the need arises." #NEW
 #cro_pandurs_recruitment_desc: "We will establish regiments of light infantrymen, who will serve as law enforcement and protection against raiders in peaceful times. These men will also easily fill into our army, strengthening our forces in dire times." #OLD ENG

#Yemen

 arabia_felix: "Arabia Felix"
 #arabia_felix_desc: "Sin dall'antichità, lo Yemen è stato conosciuto come 'Arabia Felix', l'Arabia Fortunata. Benedetto da un clima temperato delle highlands e terreno fertile in un mare di deserto, rimane una delle regioni naturalmente più prospere della penisola. Coltiviamo quella prosperità e usiamola come fondamento di un regno fiorente." #OLD ITA
 arabia_felix_desc: "Ever since antiquity, $YEM$ has been known as 'Arabia Felix', the Fortunate Arabia. Blessed with a temperate highland climate and fertile soil in a sea of desert, it remains one of the most naturally prosperous regions of the peninsula. Let us nurture that prosperity and use it as the foundation of a thriving realm." #NEW
 #arabia_felix_desc: "Ever since antiquity, Yemen has been known as 'Arabia Felix', the Fortunate Arabia. Blessed with a temperate highland climate and fertile soil in a sea of desert, it remains one of the most naturally prosperous regions of the peninsula. Let us nurture that prosperity and use it as the foundation of a thriving realm." #OLD ENG

 coffea_arabica: "Coffea Arabica"
 #coffea_arabica_desc: "Sebbene altri abbiano tentato di trapiantare il nostro amato chicco, il caffè dell'Arabia rimane ineguagliato in sapore e fama. Dal vivace porto di Mocha alle corti di governanti lontani, il desiderio del mondo per la nostra bevanda è insaziabile." #OLD ITA
 coffea_arabica_desc: "Though others have attempted to transplant our beloved bean, the $coffee$ of $arabia_region$ remains unmatched in flavor and fame. From the bustling port of Mocha to the courts of faraway rulers, the world's desire for our drink is insatiable." #NEW
 #coffea_arabica_desc: "Though others have attempted to transplant our beloved bean, the coffee of Arabia remains unmatched in flavor and fame. From the bustling port of Mocha to the courts of faraway rulers, the world's desire for our drink is insatiable." #OLD ENG

 zaydi_scholarly_traditions: "Tradizioni Accademiche $zaidi_school$"
 #zaydi_scholarly_traditions_desc: "Le highlands dello Yemen sono state a lungo casa dell'imamato $zaidi_school$, un centro di apprendimento e pietà. Radicati nella giurisprudenza islamica, teologia e razionalismo, i nostri studiosi hanno assicurato lo stato di diritto e l'integrità morale del nostro governo per secoli." #OLD ITA
 zaydi_scholarly_traditions_desc: "The highlands of $YEM$ have long been home to the $zaidi_school$ imamate, a center of learning and piety. Rooted in Islamic jurisprudence, theology, and rationalism, our scholars have ensured the rule of law and the moral integrity of our governance for centuries." #NEW
 #zaydi_scholarly_traditions_desc: "The highlands of Yemen have long been home to the $zaidi_school$ imamate, a center of learning and piety. Rooted in Islamic jurisprudence, theology, and rationalism, our scholars have ensured the rule of law and the moral integrity of our governance for centuries." #OLD ENG

 #rasulid_bureaucracy: "Burocrazia Rasulide" #OLD ITA
 rasulid_bureaucracy: "$rasulid_dynasty$ Bureaucracy" #NEW
 #rasulid_bureaucracy: "Rasulid Bureaucracy" #OLD ENG
 #rasulid_bureaucracy_desc: "La dinastia Rasulide portò un ordine amministrativo senza precedenti nelle nostre terre. Con registri censuari, sistemi fiscali e una robusta struttura di gabinetto, trasformarono lo Yemen in uno dei regni più efficientemente governati della penisola." #OLD ITA
 rasulid_bureaucracy_desc: "The $rasulid_dynasty$ dynasty brought unprecedented administrative order to our lands. With census records, tax systems, and a robust cabinet structure, they transformed Yemen into one of the most efficiently governed realms in the region." #NEW
 #rasulid_bureaucracy_desc: "The Rasulid dynasty brought unprecedented administrative order to our lands. With census records, tax systems, and a robust cabinet structure, they transformed Yemen into one of the most efficiently governed realms in the peninsula." #OLD ENG

 #control_of_the_red_sea: "Controllo del Mar Rosso" #OLD ITA
 control_of_the_red_sea: "Red Sea Control" #NEW
 #control_of_the_red_sea: "Control of the Red Sea" #OLD ENG
 #control_of_the_red_sea_desc: "Il commercio dall'India e dall'Africa deve passare attraverso lo stretto chiamato Porta del Dolore. Facciamo rispettare il nostro dominio su questo punto di strozzatura marittimo e trasformiamo ogni nave di passaggio in un'opportunità." #OLD ITA
 control_of_the_red_sea_desc: "Any and all trade from $india$ and $africa$ must pass through the strait called Gate of Grief. Let us enforce our dominion over this maritime chokepoint and turn every passing ship into an opportunity." #NEW
 #control_of_the_red_sea_desc: "Trade from India and Africa must pass through the strait called Gate of Grief. Let us enforce our dominion over this maritime chokepoint and turn every passing ship into an opportunity." #OLD ENG

 #yem_unite_the_tribes: "Unire le Tribù Yemenite" #OLD ITA
 yem_unite_the_tribes: "Unite the $YEM_ADJ$ Tribes" #NEW
 #yem_unite_the_tribes: "Unite the Yemeni Tribes" #OLD ENG
 #yem_unite_the_tribes_desc: "Dalla costa di Tihāmah alle montagne di Ḥarāz, il nostro regno ospita innumerevoli tribù fieramente indipendenti. Sebbene abbiano a lungo resistito all'autorità centralizzata, sono anche la nostra forza. Unendole sotto un'unica causa, possiamo utilizzare meglio la loro forza lavoro." #OLD ITA
 yem_unite_the_tribes_desc: "From the Tihāmah coast to the Ḥarāz mountains, our realm is home to countless fiercely independent tribes. While they have long resisted centralized authority, they are also our strength. By uniting them under a single cause, we can better utilize them as a workforce." #NEW
 #yem_unite_the_tribes_desc: "From the Tihāmah coast to the Ḥarāz mountains, our realm is home to countless fiercely independent tribes. While they have long resisted centralized authority, they are also our strength. By uniting them under a single cause, we can better utilize their workforce." #OLD ENG

 port_of_aden: "Porto di Aden"
 #port_of_aden_desc: "Il porto di Aden è stato un nesso commerciale per millenni — il suo porto naturale accoglie navi dall'India, dall'Egitto e dall'Africa orientale. Se adeguatamente supportato, può ancora una volta diventare la pietra angolare della nostra economia marittima e l'orgoglio del Mar Rosso." #OLD ITA
 port_of_aden_desc: "The port of Aden has been a nexus of trade for millennia — its natural harbor welcoming ships from $india$, $egypt_region$, and $east_africa$. If properly supported, it can once again become the cornerstone of our maritime economy and the pride of the Red Sea." #NEW
 #port_of_aden_desc: "The port of Aden has been a nexus of trade for millennia — its natural harbor welcoming ships from India, Egypt, and East Africa. If properly supported, it can once again become the cornerstone of our maritime economy and the pride of the Red Sea." #OLD ENG

#Karaman

 sons_of_the_salur_tribe: "Figli della Tribù Salur"
 #sons_of_the_salur_tribe_desc: "I Karamanidi tracciano la loro ascendenza ai Salur, una delle principali tribù Oghuz. Noti sia per la loro leadership che per il loro valore, l'eredità Salur plasma l'identità del nostro stato e la nostra pretesa di rappresentare i Turkmeni dell'Anatolia." #OLD ITA
 sons_of_the_salur_tribe_desc: "The $KAR$ trace their ancestry to the Salur, one of the major Oghuz tribes. Known for both their leadership and valor, the Salur legacy shapes our state's identity and our claim to represent the $turkmen_culture$ of $anatolia_region$." #NEW
 #sons_of_the_salur_tribe_desc: "The Karamanids trace their ancestry to the Salur, one of the major Oghuz tribes. Known for both their leadership and valor, the Salur legacy shapes our state's identity and our claim to represent the Turkmen of Anatolia." #OLD ENG

 mehmed_beys_firman: "Firmano di Meḥmed Bey"
 #mehmed_beys_firman_desc: "Meḥmed I emise un decreto che richiedeva che solo il turco fosse parlato nelle corti, nelle logge dei dervisci, nelle assemblee e nelle piazze pubbliche. Questo atto rifiutò la dominanza persiana e araba nei circoli d'élite e gettò le basi per una politica culturale unicamente turkmena." #OLD ITA
 mehmed_beys_firman_desc: "Meḥmed I issued a decree demanding that only Turkish be spoken in courts, dervish lodges, assemblies, and public squares. This act rejected $persian_language$ and $arabic_language$ dominance in elite circles and laid the groundwork for a uniquely $turkmen_culture$ cultural policy." #NEW
 #mehmed_beys_firman_desc: "Meḥmed I issued a decree demanding that only Turkish be spoken in courts, dervish lodges, assemblies, and public squares. This act rejected Persian and Arabic dominance in elite circles and laid the groundwork for a uniquely Turkmen cultural policy." #OLD ENG

 #karamanid_cavalry: "Cavalleria Karamanide" #OLD ITA
 karamanid_cavalry: "$KAR$ Cavalry" #NEW
 #karamanid_cavalry: "Karamanid Cavalry" #OLD ENG
 #karamanid_cavalry_desc: "La cavalleria è sempre stata la pietra angolare della guerra turkmena. I nostri cavalieri, addestrati fin da giovani e montati su resistenti cavalli anatolici, sostengono le orgogliose tradizioni della guerra delle steppe con disciplina e forza d'urto." #OLD ITA
 karamanid_cavalry_desc: "Cavalry has always been the cornerstone of $turkmen_culture$ warfare. Our riders, trained from a young age and mounted on hardy Anatolian horses, uphold the proud traditions of steppe warfare with discipline and striking force." #NEW
 #karamanid_cavalry_desc: "Cavalry has always been the cornerstone of Turkmen warfare. Our riders, trained from a young age and mounted on hardy Anatolian horses, uphold the proud traditions of steppe warfare with discipline and striking force." #OLD ENG

 home_of_the_whirling_dervishes: "Casa dei Dervisci Rotanti"
 #home_of_the_whirling_dervishes_desc: "Konya, il nostro centro spirituale, è casa dei seguaci di Mevlânâ Jalāl al-Dīn Muḥammad Rūmī. La loro pratica sacra — il sema — simboleggia il viaggio dell'anima verso la verità divina. La loro presenza approfondisce la tradizione mistica del nostro regno e rafforza le nostre radici sufi." #OLD ITA
 home_of_the_whirling_dervishes_desc: "$konya$, our spiritual center, is home to the followers of Mevlânâ Jalāl al-Dīn Muḥammad Rūmī. Their sacred practice — the #italic sema#! — symbolizes the soul's journey toward divine truth. Their presence deepens the mystic traditions of our realm and reinforces our Sufi roots." #NEW
 #home_of_the_whirling_dervishes_desc: "Konya, our spiritual center, is home to the followers of Mevlânâ Jalāl al-Dīn Muḥammad Rūmī. Their sacred practice — the sema — symbolizes the soul's journey toward divine truth. Their presence deepens the mystic tradition of our realm and reinforces our Sufi roots." #OLD ENG

#Tibet 

 sakya_hegemony: "Egemonia Sakya"
 #sakya_hegemony_desc: "Nell'ultimo secolo, la scuola Sakya detiene l'autorità temporale sul Tibet, agendo come custodi spirituali e politici sotto il patronato mongolo. Il loro dominio inaugurò un'era di governo centralizzato e consolidamento scolastico. Sebbene il loro governo sia diminuito, la loro eredità continua a plasmare il nostro approccio all'autorità e all'ordine." #OLD ITA
 sakya_hegemony_desc: "For the last century, the Sakya school has held temporal authority over $TIB$, acting as spiritual and political stewards under $MGE_ADJ$ patronage. Their dominance ushered in an age of centralized governance and scholastic consolidation. Though their rule has waned, their legacy continues to shape our approach to authority and order." #NEW
 #sakya_hegemony_desc: "For the last century, the Sakya school holds temporal authority over Tibet, acting as spiritual and political stewards under Mongol patronage. Their dominance ushered in an age of centralized governance and scholastic consolidation. Though their rule has waned, their legacy continues to shape our approach to authority and order." #OLD ENG

 monastic_dominance: "Dominanza Monastica"
 #monastic_dominance_desc: "La fusione del governo spirituale e temporale definisce il panorama politico tibetano. Dal più piccolo villaggio alle sale del potere a Sakya, le istituzioni monastiche sono centrali in ogni sfera della vita. La loro autorità morale e abilità organizzativa assicurano lealtà, unità e resilienza culturale." #OLD ITA
 monastic_dominance_desc: "A fusion of spiritual and temporal rule defines our political landscape. From the smallest village to the halls of power in Sakya, monastic institutions are central to every sphere of life. Their moral authority and organizational prowess ensure loyalty, unity, and cultural resilience." #NEW
 #monastic_dominance_desc: "The fusion of spiritual and temporal rule defines the Tibetan political landscape. From the smallest village to the halls of power in Sakya, monastic institutions are central to every sphere of life. Their moral authority and organizational prowess ensure loyalty, unity, and cultural resilience." #OLD ENG

 the_yak: "Lo Yak"
 #the_yak_desc: "Addomesticato per secoli, lo yak è la spina dorsale della vita pastorale tibetana. Fornisce carne, latte, lana, trasporto e combustibile — il suo sterco essiccato una fonte vitale di energia sull'altopiano senza alberi. In tempi di bisogno o celebrazione, il burro di yak riempie le nostre lampade e tazze." #OLD ITA
 the_yak_desc: "Domesticated for centuries, the yak is the backbone of $TIB_ADJ$ pastoral life. It provides meat, milk, wool, transport, and fuel — even its dried dung is a vital source of fuel on the treeless plateau. In times of need or celebration, yak butter fills our lamps and cups." #NEW
 #the_yak_desc: "Domesticated for centuries, the yak is the backbone of Tibetan pastoral life. It provides meat, milk, wool, transport, and fuel — its dried dung a vital energy source on the treeless plateau. In times of need or celebration, yak butter fills our lamps and cups." #OLD ENG

 drokpa: "Drokpa"
 #drokpa_desc: "I nomadi Drokpa spesso operano come pastori e mercanti, portatori che collegano insediamenti distanti. Attraverso le loro tradizioni e impareggiabile conoscenza del terreno, attraversano le rotte ad alta quota tra Tibet, Bhutan, Ladakh e Nepal. Le loro carovane stagionali trasportano sale, lana e carne essiccata in cambio di grano e beni manufatti. Queste reti intrecciano le nostre montagne in un vibrante reticolo di commercio e diplomazia." #OLD ITA
 drokpa_desc: "The Drokpa nomads often operate as herders and traders, porters that connect distant settlements. Through their traditions and unparalleled knowledge of the terrain, they traverse the high-altitude routes between $TIB$, Bhutan, Ladakh, and $NPL$. Their seasonal caravans carry $salt$, $wool$, and dried meat in exchange for grain and manufactured goods. These networks knit our mountains into a vibrant lattice of commerce and diplomacy." #NEW
 #drokpa_desc: "The Drokpa nomads often operate as herders and traders, porters that connect distant settlements. Through their traditions and unparalleled knowledge of the terrain, they traverse the high-altitude routes between Tibet, Bhutan, Ladakh, and Nepal. Their seasonal caravans carry salt, wool, and dried meat in exchange for grain and manufactured goods. These networks knit our mountains into a vibrant lattice of commerce and diplomacy." #OLD ENG

 tibetan_monastic_education: "Sistema Educativo Monastico"
 #tibetan_monastic_education_desc: "Le nostre istituzioni monastiche hanno a lungo servito come centri di apprendimento, dibattito e disciplina spirituale. Attraverso un addestramento rigoroso e un approccio strutturato all'educazione, il clero mantiene uno standard elevato di integrità intellettuale e morale. Queste fondamenta sosterranno un governo saggio e una fioritura culturale attraverso il nostro regno illuminato." #OLD ITA
 tibetan_monastic_education_desc: "Our monastic institutions have long served as centers of learning, debate, and spiritual discipline. Through rigorous training and a structured approach to education, our clerics maintain a high standard of intellectual and moral integrity. These foundations will support wise governance and cultural flourishing across our enlightened realm." #NEW
 #tibetan_monastic_education_desc: "Our monastic institutions have long served as centers of learning, debate, and spiritual discipline. Through rigorous training and a structured approach to education, the clergy maintain a high standard of intellectual and moral integrity. These foundations will support wise governance and cultural flourishing across our enlightened realm." #OLD ENG


 tanye_guanxi: "Tányuè Guānxì"
 #tanye_guanxi_desc: "Per secoli, la nostra influenza spirituale in Cina ha formato il fondamento delle relazioni diplomatiche. Patronato imperiale, scambi di tributi e rituali sacri come Tányuè hanno assicurato sia rispetto che guadagno materiale." #OLD ITA
 tanye_guanxi_desc: "For centuries, our spiritual influence in $CHI$ has formed the bedrock of our diplomatic relations. Imperial patronage, tribute exchanges, and sacred rituals like #italic Tányuè#! secure both respect and material gain." #NEW
 #tanye_guanxi_desc: "For centuries, our spiritual influence in China has formed the bedrock of diplomatic relations. Imperial patronage, tribute exchanges, and sacred rituals like Tányuè secured both respect and material gain." #OLD ENG

 great_three: "Le Tre Grandi Sedi"
 #great_three_desc: "Sera, Ganden e Drepung, queste imponenti università monastiche formano il cuore intellettuale del Tibet. I loro studiosi addestrano una generazione dopo l'altra di monaci, diplomatici e governanti. Con la loro ascesa, il nostro regno divenne non solo un bastione di fede ma una culla di pensiero rigoroso e progresso istituzionale." #OLD ITA
 great_three_desc: "Sera, Ganden, and Drepung, these towering monastic universities form the intellectual heart of $TIB$. Their scholars train one generation after another of monks, diplomats, and rulers. With their rise, our realm became not only a bastion of faith but a cradle of rigorous thought and institutional progress." #NEW
 #great_three_desc: "Sera, Ganden, and Drepung, these towering monastic universities form the intellectual heart of Tibet. Their scholars train one generation after another of monks, diplomats, and rulers. With their rise, our realm became not only a bastion of faith but a cradle of rigorous thought and institutional progress." #OLD ENG

#Dai Viet

 dai_lang: "Villaggi Autonomi Viet"
 dai_lang_desc: "La campagna vietnamita è costruita sulla forza duratura del #italic làng#!, villaggi autonomi che incarnano il principio: 'i costumi del villaggio superano le leggi del re.' In una terra di montagne aspre e fiumi tortuosi, queste comunità si governano da sole, organizzano milizie locali, raccolgono tasse efficientemente e sostengono l'autorità reale alla base."


 nghia_quan: "I Nghĩa Quân"
 #nghia_quan_desc: "Attraverso la nostra storia, i #italic Nghĩa Quân#! — 'milizie giuste' — si sono sollevate in difesa della terra durante tempi di grande pericolo. Composte da contadini, studiosi e patrioti locali, resistettero sia contro invasori stranieri che contro la tirannia interna. Sebbene irregolari per natura, il loro valore e devozione al paese li hanno resi una forza formidabile quando mobilizzati." #OLD ITA
 nghia_quan_desc: "Throughout our history, the #italic Nghĩa Quân#! — 'righteous militias' — have risen in defense of our land during times of great peril. Composed of farmers, scholars, and local patriots, they stood against foreign invaders and internal tyranny alike. Though irregular in nature, their valor and devotion to the country have made them a formidable force when mobilized." #NEW
 #nghia_quan_desc: "Throughout our history, the #italic Nghĩa Quân#! — 'righteous militias' — have risen in defense of the land during times of great peril. Composed of farmers, scholars, and local patriots, they stood against foreign invaders and internal tyranny alike. Though irregular in nature, their valor and devotion to the country have made them a formidable force when mobilized." #OLD ENG
 
#Champa

 cha_go_tram_huong: "Gỗ Trầm Hương"
 #cha_go_tram_huong_desc: "Il durame resinoso delle nostre foreste, conosciuto come Agarwood o Trầm Hương, è apprezzato non solo per il suo aroma incantevole ma anche per le sue proprietà spirituali e medicinali. Oltre i mari, nobili e monaci lo bramano per incenso, profumi e offerte. Proteggendo le nostre foreste e raffinando i nostri metodi di raccolta, possiamo trasformare questo raro dono naturale in una delle nostre esportazioni più pregiate." #OLD ITA
 cha_go_tram_huong_desc: "The resinous heartwood of our native trees, known as agarwood or #italic Trầm Hương#!, is treasured not only for its enchanting aroma but also for its spiritual and medicinal properties. Across the seas, nobles and monks alike covet it for incense, perfumes, and offerings. By protecting our forests and refining our harvesting methods, we can turn this rare natural gift into one of our most prized exports." #NEW
 #cha_go_tram_huong_desc: "The resinous heartwood of our forests, known as Agarwood or Trầm Hương, is treasured not only for its enchanting aroma but also for its spiritual and medicinal properties. Across the seas, nobles and monks alike covet it for incense, perfumes, and offerings. By protecting our forests and refining our harvesting methods, we can turn this rare natural gift into one of our most prized exports." #OLD ENG

 my_son_sanctuary: "Santuario di Mỹ Sơn"
 #my_son_sanctuary_desc: "All'interno delle lussureggianti valli del Champa centrale giace il complesso templare sacro di Mỹ Sơn, dove per generazioni i nostri re e sacerdoti eseguono riti solenni a $shiva_god$, protettore del nostro regno. Queste torri sono scolpite con devozione e adornate con simboli sacri, ci collegano ai nostri antenati e al divino. Finché l'incenso brucia nei loro santuari, l'anima del Champa perdurerà." #OLD ITA
 my_son_sanctuary_desc: "Within the lush valleys of central $CHA$ lies the sacred temple complex of Mỹ Sơn, where for generations our kings and priests have performed solemn rites to $shiva_god$, protector of our realm. These towers are carved with devotion and adorned with sacred symbols, connecting us to our ancestors and the divine. As long as incense burns in their sanctuaries, the soul of $CHA$ shall endure." #NEW
 #my_son_sanctuary_desc: "Within the lush valleys of central Champa lies the sacred temple complex of Mỹ Sơn, where for generations our kings and priests perform solemn rites to $shiva_god$, protector of our realm. These towers are carved with devotion and adorned with sacred symbols, connect us to our ancestors and the divine. As long as incense burns in their sanctuaries, the soul of Champa shall endure." #OLD ENG

 #Lorraine
 #lor_mining_tradition: "Miniere della Lorena" #OLD ITA
 lor_mining_tradition: "Mines of $LOR$" #NEW
 #lor_mining_tradition: "Mines of Lorraine" #OLD ENG
 #lor_mining_tradition_desc: "Le nostre terre sono ricche di minerale e carbone, che saremo in grado di sfruttare a nostro vantaggio. L'estrazione di queste risorse potrebbe renderci un paese ricco e gettare le basi per le nostre ambizioni." #OLD ITA
 lor_mining_tradition_desc: "Our lands are rich in ore and coal. Extracting these resources could make us a rich country and lay the groundwork for our grand ambitions." #NEW
 #lor_mining_tradition_desc: "Our lands are rich in ore and coal, which we will be able to exploit to our advantage. Extraction of these resources could make us a rich country and lay the groundwork for our ambitions." #OLD ENG

 lor_cultural_diversity: "Terra di Molte Culture"
 #lor_cultural_diversity_desc: "Siamo situati tra diverse culture che si insediano nel nostro territorio. Stabilire uno stato per governare queste persone equamente non sarà facile, ma è una sfida necessaria da superare. Solo allora possiamo paragonarci allo stato lorenese da cui discendiamo." #OLD ITA
 lor_cultural_diversity_desc: "Our territory is home to many different peoples and cultures. Establishing a single state to govern this diverse population will not be easy, but we must. Only then will we be worthy successors to the $LOR_ADJ$ state from which we descend." #NEW
 #lor_cultural_diversity_desc: "We are situated between several cultures settling in our territory. Establishing a state to govern these people fairly will not be easy, but it is a necessary challenge to overcome. Only then we can compare ourselves to the Lorrainian state that we descend from." #OLD ENG

 lor_three_bishoprics: "Terra dei Vescovi"
 #lor_three_bishoprics_desc: "La Lorena ospita molti vescovadi con potenti sostenitori all'estero e all'interno della Chiesa stessa. La cooperazione con loro sarà uno strumento utile per far sentire la nostra voce all'interno della Chiesa più ampia e il sostegno dei vescovi ci permetterà di pacificare la popolazione più facilmente." #OLD ITA
 lor_three_bishoprics_desc: "$LOR$ is home to many bishops with powerful supporters abroad and within the Church itself. Cooperating with them will be useful when making our voice heard within the broader Church. Having the support of the bishops will also help us to pacify the population more easily." #NEW
 #lor_three_bishoprics_desc: "Lorraine is home to many bishoprics with powerful supporters abroad and within the Church itself. Cooperation with them will be a useful tool to make our voice heard within the broader Church and the support of the bishops will allow us to pacify the population more easily." #OLD ENG

 lor_between_great_powers: "Eredità di Antichi Re"
 lor_between_great_powers_desc: "Le nostre terre furono un tempo una parte importante della Lotaringia, uno dei regni franchi. Se non vogliamo cadere nell'irrilevanza, dovremo assicurare la nostra posizione diplomatica e stabilire alleanze durature."

 #lor_fortified_cities: "Città Fortificate della Lorena" #OLD ITA
 lor_fortified_cities: "Fortified Cities of $LOR$" #NEW
 #lor_fortified_cities: "Fortified Cities of Lorraine" #OLD ENG
 #lor_fortified_cities_desc: "Occupiamo punti di attraversamento vitali su diversi fiumi, che dobbiamo difendere a tutti i costi se vogliamo assicurare la nostra indipendenza. A tal fine, dobbiamo modernizzare i grandi castelli-ponte delle nostre città e costruire grandi cittadelle." #OLD ITA
 lor_fortified_cities_desc: "We occupy vital crossing points on several rivers, which we must defend at all costs if we want to secure our independence. To this effect, we must modernize the large bridge castles of our cities, and construct large citadels at strategic points." #NEW
 #lor_fortified_cities_desc: "We occupy vital crossing points on several rivers, which we must defend at all cost if we want to secure our independence. To this effect, we must modernize the large bridge castles of our cities and construct large citadels." #OLD ENG

 #Bosnia
 #bos_land_of_many_churches: "Molte Chiese della Bosnia" #OLD ITA
 bos_land_of_many_churches: "Many Churches of $BOS$" #NEW
 #bos_land_of_many_churches: "Many Churches of Bosnia" #OLD ENG
 #bos_land_of_many_churches_desc: "Le terre bosniache ospitano diverse chiese. Non solo la nostra terra è condivisa tra le chiese ortodosse e cattoliche, ma è anche casa dei Krstjani. Isolati dalla supervisione centrale, dovremo promuovere una comprensione locale e l'armonia tra i diversi gruppi per assicurare la nostra stabilità." #OLD ITA
 bos_land_of_many_churches_desc: "$BOS$ is home to several faiths. Not only is our land shared between the $orthodox_ADJ$ and $catholic_ADJ$ Churches, but it is also home to the $south_slavic_group$ $christian_ADJ$ faithful, the #italic Krstjani#!. Isolated from central supervision, we will have to foster a local understanding and harmony between these different groups to maintain our stability." #NEW
 #bos_land_of_many_churches_desc: "The Bosnian lands are home to several churches. Not only is our land shared between the orthodox and catholic churches, but it is also home to the Krstjani. Isolated from central supervision, we will have to foster a local understanding and harmony between the different groups to ensure our stability." #OLD ENG

 #bos_cultural_customs: "Costumi della Bosnia" #OLD ITA
 bos_cultural_customs: "Stećci of $BOS$" #NEW
 #bos_cultural_customs: "Customs of Bosnia" #OLD ENG
 #bos_cultural_customs_desc: "Il nostro popolo pratica molti costumi unici, non contenuti dalla differenza di fede. La costruzione di #italic stećci#!, lapidi elaborate decorate, segnerà il nostro territorio come unicamente bosniaco." #OLD ITA
 bos_cultural_customs_desc: "Our people practice unique customs that transcend religious differences. The construction of #italic stećci#!, elaborately decorated tombstones, is a tradition shared by all of us, regardless of faith. These distinctive monuments mark our lands as uniquely Bosnian." #NEW
 #bos_cultural_customs_desc: "Our people practice many unique customs, not contained by difference in faith. The construction of #italic stećci#!, elaborately decorated tombstones, will mark our territory as uniquely Bosnian." #OLD ENG

 bos_katun_communities: "Katun Valacchi"
 #bos_katun_communities_desc: "Parti della nostra popolazione sono organizzate in comunità pastorali autogovernate. Invece di piegarle alla volontà di un governo centrale, dovremmo cooperare con loro e cercare di estrarre più risorse dalle nostre aree più remote." #OLD ITA
 bos_katun_communities_desc: "Parts of our population are organized into self-governing, pastoralist communities. Instead of bending them to a central government's will, we should cooperate with them, and in doing so try to extract more resources from our more remote areas." #NEW
 #bos_katun_communities_desc: "Parts of our population are organized in self-governing, pastoralist communities. Instead of bending them to a central governments will, we should cooperate with them and try to extract more resources from our more remote areas." #OLD ENG

 bos_influence_of_the_stanak: "Riunioni dello Stanak"
 #bos_influence_of_the_stanak_desc: "La nostra nobiltà si riunisce regolarmente per discutere le questioni più urgenti per il nostro paese. Queste riunioni assicurano che i nostri signori nobili siano allineati sulla loro politica e mostrino unità all'interno delle nostre sessioni parlamentari." #OLD ITA
 bos_influence_of_the_stanak_desc: "Our nobility regularly gathers together to discuss the most pressing issues for our country. These meetings ensure our noble lords are aligned in their policies and show unity during our parliament sessions." #NEW
 #bos_influence_of_the_stanak_desc: "Our nobility regularly gathers together to discuss the most pressing issues for our country. These meetings ensure our noble lords are aligned on their policy and show unity within our parliament sessions." #OLD ENG

 bos_defiant_terrain: "Terreno Ribelle"
 #bos_defiant_terrain_desc: "Le terre bosniache consistono di colline boschive e montagne, attraversate da valli fluviali. Questo terreno si presta naturalmente a ritardare e stancare un esercito invasore, e dovremmo usare questo a nostro vantaggio. Affrontare il nostro nemico solo quando ci avvantaggia e lasciare che lo stesso terreno ostile rivendichi sia le loro provviste che le truppe preserverà la nostra forza." #OLD ITA
 bos_defiant_terrain_desc: "$BOS$ is a land of forested hills and mountains, cut through by river valleys. This terrain lends itself naturally to delaying and tiring invading armies, and we should use this to our advantage. Engaging our enemy only when it benefits us and letting the hostile terrain itself claim both their supplies and troops will preserve our strength." #NEW
 #bos_defiant_terrain_desc: "The Bosnian lands consist of forested hills and mountains, cut through by river valleys. This terrain lends itself naturally to delay and tire an invading army out, and we should use this to our advantage. Engaging our enemy only when it benefits us and let the hostile terrain itself claim both their supplies and troops will preserve our strength." #OLD ENG

 bos_kingly_ambitions: "Ambizioni Regie"
 #bos_kingly_ambitions_desc: "Le imprese e il lavoro del nostro popolo meritano di essere riconosciuti e protetti. A questo scopo, dovremo assicurare un forte riconoscimento e legami con altri governanti intorno a noi, stabilendo un titolo prestigioso per noi stessi." #OLD ITA
 bos_kingly_ambitions_desc: "The achievements and hard work of our people deserve recognition and protection. We will establish a prestigious title for ourselves and thereby secure that recognition from neighboring rulers, formalizing our status through diplomatic bonds." #NEW
 #bos_kingly_ambitions_desc: "The achievements and labor of our people deserve to be recognized and protected. To this aim, we will need to secure a strong recognition and bonds with other rulers around us, establishing a prestigious title for ourselves." #OLD ENG

 #Circassia
 cir_tribal_elections: "Elezioni Tribali"
 #cir_tribal_elections_desc: "Eleggeremo un leader nominale del nostro popolo, che agirà come rappresentante del nostro popolo, pur rimanendo fuori dagli affari specifici dei signori locali." #OLD ITA
 cir_tribal_elections_desc: "We will elect a nominal leader of our people, who will act as our representative but will not meddle with the oversight of local lords." #NEW
 #cir_tribal_elections_desc: "We will elect a nominal leader of our people, who will act as a representative of our people, while keeping out of specific affairs of local lords." #OLD ENG

 #cir_mercenary_employment: "Mercenari Circassi" #OLD ITA
 cir_mercenary_employment: "$CIR_ADJ$ Mercenaries" #NEW
 #cir_mercenary_employment: "Circassian Mercenaries" #OLD ENG
 #cir_mercenary_employment_desc: "Le nostre terre sono state ripetutamente razziati da potenze straniere per il loro beneficio, rendendo schiavo il nostro popolo. Alcuni di questi schiavi, usati come soldati, sono avanzati in terre lontane, accumulando potere e ricchezza nelle proprie mani. Con un po' di convincimento, potremmo convincerli a tornare nelle nostre terre e proteggerle da future invasioni." #OLD ITA
 cir_mercenary_employment_desc: "Our lands have again and again been raided by foreign powers, and our people enslaved. Some of these slaves, used as soldiers, have advanced in their new lives, accumulating power and wealth of their own. With some convincing, we could convince them to return to our lands, and protect it from future invasions." #NEW
 #cir_mercenary_employment_desc: "Our lands have again and again been raided by foreign powers for their own benefit, enslaving our people. Some of these slaves, used as soldiers, have advanced in far away lands, accumulating power and wealth in their own hands. With some convincing, we could convince them to return to our lands, and protect it from future invasions." #OLD ENG

 cir_horsemen_of_the_steppe: "Cavalieri Esperti"
 #cir_horsemen_of_the_steppe_desc: "La nostra posizione ai margini della grande steppa europea ha portato a diverse invasioni della nostra patria da parte di cavalieri. Se vogliamo assicurare la nostra indipendenza, dovremo sollevare un grande esercito noi stessi ed espandere la nostra influenza sulle steppe, assicurando la prosperità del nostro cuore." #OLD ITA
 cir_horsemen_of_the_steppe_desc: "Our position at the edge of the steppes has resulted in multiple mounted invasions of our homelands. If we want to ensure our independence, we will need to raise a great host ourselves, and expand our influence over the steppes, securing our heartland." #NEW
 #cir_horsemen_of_the_steppe_desc: "Our position at the edge of the great European steppe has lead to several invasions of our homeland by horsemen. If we want to ensure our independence, we will need to raise a great host ourselves and expand our influence over the steppes, securing the prosperity of our heartland." #OLD ENG

 cir_city_and_fortress: "Città Fortificate"
 #cir_city_and_fortress_desc: "I nostri insediamenti giacciono non protetti e una facile preda per qualsiasi invasore. Man mano che crescono, possiamo incorporare direttamente il terreno collinare nelle nostre linee difensive, migliorando la loro protezione. Se necessario, possiamo creare noi stessi il terreno elevato richiesto, preservando le case del nostro popolo." #OLD ITA
 cir_city_and_fortress_desc: "Our settlements lie unprotected, and are easy prey to any invader. As these settlements grow, however, we can directly incorporate the hilly terrain into our defensive lines, enhancing their protection. If necessary, we can even create the elevated terrain required ourselves." #NEW
 #cir_city_and_fortress_desc: "Our settlements lie unprotected and an easy prey to any invader. As they grow, we can directly incorporate hilly terrain into our defensive lines, enhancing their protection. If necessary, we can create the elevated terrain required ourselves, preserving our peoples homes." #OLD ENG

 cir_grand_prince_of_circassia: "Gran Principato"
 #cir_grand_prince_of_circassia_desc: "Per unificare il nostro popolo eleggeremo il più grande dei nostri signori come Gran Principe, servendo come leader ispiratore per le nostre truppe." #OLD ITA
 cir_grand_prince_of_circassia_desc: "To unify our people, we shall elect the greatest of our lords as the Grand Prince, who will serve as an inspiring leader for our troops." #NEW
 #cir_grand_prince_of_circassia_desc: "To unify our people we shall elect the greatest of our lords as the Grand Prince, serving as an inspiring leader for our troops." #OLD ENG

 #cir_multireligious_society: "Coesistenza delle Religioni" #OLD ITA
 cir_multireligious_society: "Religious Coexistence" #NEW
 #cir_multireligious_society: "Coexistence of Religions" #OLD ENG
 #cir_multireligious_society_desc: "Le nostre terre sono frequentate da molte persone cattoliche, musulmane e ortodosse, che si impegnano con il nostro popolo in frequenti scambi. Dovremmo promuovere una tolleranza collettiva tra tutti i nostri sudditi, per fornire un terreno fertile per la prosperità." #OLD ITA
 cir_multireligious_society_desc: "Our lands are frequented by many $catholic_ADJ$, $muslim_ADJ$, and $orthodox_ADJ$ people, who frequently engage in trade with our population. We should foster a collective tolerance between all our subjects, to promote peace and stability." #NEW
 #cir_multireligious_society_desc: "Our lands are frequented by many Catholic, Muslim, and Orthodox people, engaging with our people in frequent trade. We should foster a collective tolerance between all our subjects, to provide a fertile soil for prosperity." #OLD ENG
 
#Sunda

 seren_taun: "Sérén Taun"
 #seren_taun_desc: "Tenuto dopo il raccolto, il festival Sérén Taun è una cerimonia annuale di ringraziamento che celebra l'abbondanza agricola. Segnato da rituali, offerte e musica, rafforza i legami comunitari dei nostri Kampung-Kampung e ricorda a tutti il sacro equilibrio tra persone, riso e natura." #OLD ITA
 seren_taun_desc: "Held after the harvest, the #italic Sérén Taun#! festival is an annual thanksgiving ceremony celebrating agricultural abundance. Marked by rituals, offerings, and music, it strengthens the communal bonds of our #italic kampung-kampung#! and reminds all of the sacred balance between people, rice, and nature." #NEW
 #seren_taun_desc: "Held after the harvest, the Sérén Taun festival is an annual thanksgiving ceremony celebrating agricultural abundance. Marked by rituals, offerings, and music, it strengthens the communal bonds of our Kampung-Kampung and reminds all of the sacred balance between people, rice, and nature." #OLD ENG
 
 pepper_of_the_parahyangan: "Pepe del Parahyangan"
 #pepper_of_the_parahyangan_desc: "Il fertile terreno vulcanico degli altipiani sundanesi è perfetto per coltivare il pregiato pepe nero. Mercanti da tutto il mondo cercano i nostri grani di pepe per la loro potenza e aroma. Dobbiamo capitalizzare questo tesoro naturale per espandere la nostra influenza attraverso le spezie." #OLD ITA
 pepper_of_the_parahyangan_desc: "The fertile volcanic soil of the Sundanese highlands is perfect for growing the prized spice, black pepper. Traders from across the world seek our peppercorns for their potency and aroma. We must capitalize on this natural treasure to expand our influence through spice." #NEW
 #pepper_of_the_parahyangan_desc: "The fertile volcanic soil of the Sundanese highlands is perfect for growing the prized black pepper. Traders from across the world seek our peppercorns for their potency and aroma. We must capitalize on this natural treasure to expand our influence through spice." #OLD ENG

 pan_asian_trade: "Commercio Pan-Asiatico"
 #pan_asian_trade_desc: "Sunda si trova al crocevia di grandi imperi: India, Cina e il mondo islamico. Posizionandoci come nodo indispensabile in questa rete, assicuriamo l'accesso a beni, idee e partner attraverso l'Asia, trasformando i nostri porti in porte di prosperità." #OLD ITA
 pan_asian_trade_desc: "Sunda lies at the crossroads of great empires: $india$, $CHI$, and the Islamic world. By positioning ourselves as an indispensable node in this network, we secure access to goods, ideas, and partners across $asia$ turning our harbors into gateways of prosperity." #NEW
 #pan_asian_trade_desc: "Sunda lies at the crossroads of great empires: India, China, and the Islamic world. By positioning ourselves as an indispensable node in this network, we secure access to goods, ideas, and partners across Asia, turning our harbors into gateways of prosperity." #OLD ENG

 extend_kampung_kampung: "Estendere i Kampung-Kampung"
 #extend_kampung_kampung_desc: "Il fondamento della società sundanese risiede in ogni kampung, comunità rurali che punteggiano il paesaggio. Investire nell'infrastruttura di questi villaggi assicura crescita sostenibile, forte leadership locale e resilienza contro sia la carestia che l'invasione." #OLD ITA
 extend_kampung_kampung_desc: "The foundation of $SUN_ADJ$ society lies in every #italic kampung#!, rural communities that dot the landscape. Investing in the infrastructure of these villages ensures sustainable growth, strong local leadership, and resilience against both famine and invasion." #NEW
 #extend_kampung_kampung_desc: "The foundation of Sundanese society lies in every kampung, rural communities that dot the landscape. Investing in the infrastructure of these villages ensures sustainable growth, strong local leadership, and resilience against both famine and invasion." #OLD ENG

#Scandinavia

 #sca_unified_scandinavia: "Scandinavia Unificata" #OLD ITA
 sca_unified_scandinavia: "Unified $SCA$" #NEW
 #sca_unified_scandinavia: "Unified Scandinavia" #OLD ENG
 #sca_unified_scandinavia_desc: "L'unione di Danimarca, Norvegia, Svezia e Finlandia sotto una corona ha trasformato il Nord da campo di battaglia di re in competizione in una potenza centralizzata. Con amministrazione unificata e maggiore cooperazione tra gli stati, possiamo affermare un controllo più forte sul regno." #OLD ITA
 sca_unified_scandinavia_desc: "The union of $DAN$, $NOR$, $SWE$, and $FIN$ under one crown has turned the North from a battleground of competing kings into a centralized power. With unified administration and increased cooperation among the estates, we can assert stronger control over the realm." #NEW
 #sca_unified_scandinavia_desc: "The union of Denmark, Norway, Sweden, and Finland under one crown has turned the North from a battleground of competing kings into a centralized power. With unified administration and increased cooperation among the estates, we can assert stronger control over the realm." #OLD ENG

 sca_legacy_kalmar_union: "Eredità dell'Unione di Kalmar"
 sca_legacy_kalmar_union_desc: "Sebbene l'Unione di Kalmar si sia dissolta nel conflitto, stabilì un precedente per la sovranità nordica condivisa. Attingendo a questa eredità, riaffermiamo la nostra autorità e ricordiamo ai nostri sudditi che l'unità porta forza, non soggiogazione."

 sca_sound_toll: "Il Pedaggio del Sund"
 #sca_sound_toll_desc: "Il controllo sull'Øresund ci garantisce il diritto di imporre il Pedaggio del Sund su tutte le navi straniere che passano attraverso gli stretti danesi. Questo antico privilegio trasforma il vantaggio geografico in ricchezza tangibile, rafforzando il nostro dominio sul commercio settentrionale." #OLD ITA
 sca_sound_toll_desc: "Control over the Øresund grants us the right to impose the Sound Toll on all foreign ships passing through the $DAN_ADJ$ straits. This ancient privilege turns geographic advantage into tangible wealth, strengthening our dominance over northern trade." #NEW
 #sca_sound_toll_desc: "Control over the Øresund grants us the right to impose the Sound Toll on all foreign ships passing through the Danish straits. This ancient privilege turns geographic advantage into tangible wealth, strengthening our dominance over northern trade." #OLD ENG

 #norwegian_heritage: "Eredità Marittima Norvegese" #OLD ITA
 norwegian_heritage: "$NOR_ADJ$ Maritime Heritage" #NEW
 #norwegian_heritage: "Norwegian Maritime Heritage" #OLD ENG
 #norwegian_heritage_desc: "Le coste frastagliate della Norvegia e le tradizioni marittime hanno plasmato un popolo esperto nella navigazione, pesca e navigazione. L'eredità dei pescatori e costruttori navali norreni alimenta i nostri sforzi navali e sostiene la linfa vitale delle nostre comunità costiere." #OLD ITA
 norwegian_heritage_desc: "$NOR$'s rugged coastlines and maritime traditions have shaped a people skilled in seafaring, fishing, and navigation. The legacy of $NOR_ADJ$ fishermen and shipbuilders fuels our naval endeavors and bolsters the lifeblood of our coastal communities." #NEW
 #norwegian_heritage_desc: "Norway's rugged coastlines and maritime traditions have shaped a people skilled in seafaring, fishing, and navigation. The legacy of Norse fishermen and shipbuilders fuels our naval endeavors and bolsters the lifeblood of our coastal communities." #OLD ENG

 #danish_heritage: "Eredità dei Cantieri Navali Danesi" #OLD ITA
 danish_heritage: "$DAN_ADJ$ Dockyard Legacy" #NEW
 #danish_heritage: "Danish Dockyard Legacy" #OLD ENG
 #danish_heritage_desc: "Le lunghe tradizioni navali della Danimarca e la sua maestria nella logistica marittima culminarono in grandi cantieri navali come quelli di Copenaghen. Come Scandinavia, ereditiamo queste potenti infrastrutture e tradizioni, rafforzando la nostra posizione diplomatica e prontezza navale." #OLD ITA
 danish_heritage_desc: "$DAN$'s long naval traditions and its mastery of maritime logistics culminated in major dockyards like those in $kobenhavn$. As $SCA$, we inherit these powerful infrastructures and traditions, boosting our diplomatic standing and naval readiness." #NEW
 #danish_heritage_desc: "Denmark's long naval traditions and its mastery of maritime logistics culminated in major dockyards like those in Copenhagen. As Scandinavia, we inherit these powerful infrastructures and traditions, boosting our diplomatic standing and naval readiness." #OLD ENG

 #swedish_roots: "Radici Militari Svedesi" #OLD ITA
 swedish_roots: "$SWE_ADJ$ Military Roots" #NEW
 #swedish_roots: "Swedish Military Roots" #OLD ENG
 #swedish_roots_desc: "Dai disciplinati ranghi carolini alla forte classe contadina proprietaria, l'abilità militare della Svezia è un pilastro essenziale della Scandinavia. Integrando istituzioni e sistemi di reclutamento svedesi, rafforziamo la manodopera e la forza del nostro impero." #OLD ITA
 swedish_roots_desc: "From the disciplined Carolean ranks to the strong freeholding peasantry, $SWE$'s military prowess is an essential pillar of Scandinavia. By integrating $SWE_ADJ$ institutions and recruitment systems, we reinforce the manpower and strength of our empire." #NEW
 #swedish_roots_desc: "From the disciplined Carolean ranks to the strong freehold peasantry, Sweden's military prowess is an essential pillar of Scandinavia. By integrating Swedish institutions and recruitment systems, we reinforce the manpower and strength of our empire." #OLD ENG

 #finnish_heritage: "Cavalleria di Frontiera Finlandese" #OLD ITA
 finnish_heritage: "$FIN_ADJ$ Frontier Cavalry" #NEW
 #finnish_heritage: "Finnish Frontier Cavalry" #OLD ENG
 #finnish_heritage_desc: "La cavalleria finlandese — Hakkapeliitta — guadagnò una reputazione temibile nelle guerre europee. Questi cavalieri, cresciuti dalle foreste selvagge e pianure della Finlandia, portano esperienza, adattabilità e tenacia. Formalizzando il loro ruolo, creeremo una forza d'élite permanente all'interno dei nostri eserciti." #OLD ITA
 finnish_heritage_desc: "The $FIN_ADJ$ cavalry — #italic Hakkapeliitta#! — gained a fearsome reputation in wars in $europe$ These riders, raised in the wild forests and plains of $finland_area$, bring experience, adaptability, and toughness to our ranks. By formalizing their role, we will create a permanent elite force within our armies." #NEW
 #finnish_heritage_desc: "The Finnish cavalry — Hakkapeliitta — gained a fearsome reputation in European wars. These riders, raised from the wild forests and plains of Finland, bring experience, adaptability, and toughness. By formalizing their role, we will create a permanent elite force within our armies." #OLD ENG
 
#Jerusalem

 #symbol_of_catholicism: "Simbolo del Cattolicesimo" #OLD ITA
 symbol_of_catholicism: "Symbol of $catholic$" #NEW
 #symbol_of_catholicism: "Symbol of Catholicism" #OLD ENG
 #symbol_of_catholicism_desc: "Gerusalemme è la città più santa della Cristianità, il luogo stesso della Passione e Resurrezione di Cristo. Affermando la supremazia cattolica su queste terre sacre, diventiamo il faro spirituale del mondo latino e un pilastro della vera fede." #OLD ITA
 symbol_of_catholicism_desc: "$jerusalem$ is the holiest city in Christendom, the very place of Christ's Passion and Resurrection. By asserting $catholic_ADJ$ supremacy over these sacred grounds, we become the spiritual beacon of the Latin world and a pillar of the true faith." #NEW
 #symbol_of_catholicism_desc: "Jerusalem is the holiest city in Christendom, the very place of Christ's Passion and Resurrection. By asserting Catholic supremacy over these sacred grounds, we become the spiritual beacon of the Latin world and a pillar of the true faith." #OLD ENG

 #protectors_of_jerusalem: "Protettori di Gerusalemme" #OLD ITA
 protectors_of_jerusalem: "Protectors of $KOJ$" #NEW
 #protectors_of_jerusalem: "Protectors of Jerusalem" #OLD ENG
 protectors_of_jerusalem_desc: "Ci erigiamo in prima linea della Cristianità, circondati dall'incredulità. È nostro sacro dovere proteggere la Città Santa e incutere paura nei cuori dei pagani che oserebbero usurparla."

 latin_patriarch: "Patriarca Latino"
 #latin_patriarch_desc: "Il Papato ha reintegrato il Patriarca Latino di Gerusalemme, un tempo esiliato e dimenticato. Ora restaurato, il Patriarca rafforzerà la nostra influenza a Roma e rinforzerà il nostro ruolo di guardiano degli interessi della Chiesa in Oriente." #OLD ITA
 latin_patriarch_desc: "$PAP$ has reinstated the Latin Patriarch of $KOJ$, once exiled and forgotten. Now restored, the Patriarch shall strengthen our influence in 4rome$ and reinforce our role as guardian of the Church's interests in the East." #NEW
 #latin_patriarch_desc: "The Papacy has reinstated the Latin Patriarch of Jerusalem, once exiled and forgotten. Now restored, the Patriarch shall strengthen our influence in Rome and reinforce our role as guardian of the Church's interests in the East." #OLD ENG

 #rites_holy_sepulchre: "Riti del Santo Sepolcro" #OLD ITA
 rites_holy_sepulchre: "Rites of the Holy Sepulchre" #NEW
 #rites_holy_sepulchre: "Rites of the Holy Sepulcher" #OLD ENG
 #rites_holy_sepulchre_desc: "Nella Chiesa del Santo Sepolcro, gli antichi riti latini sono ancora una volta eseguiti in pieno splendore. Questi rituali solenni, che onorano la morte e resurrezione di Cristo, rafforzano il nostro mandato divino di governare questa terra e diffondere gli insegnamenti della nostra fede." #OLD ITA
 rites_holy_sepulchre_desc: "In the Church of the Holy Sepulchre, the ancient Latin rites are once more performed in full splendor. These solemn rituals, honoring the death and resurrection of Christ, reinforce our divine mandate to rule this land and spread the teachings of our faith." #NEW
 #rites_holy_sepulchre_desc: "In the Church of the Holy Sepulcher, the ancient Latin rites are once more performed in full splendor. These solemn rituals, honoring the death and resurrection of Christ, reinforce our divine mandate to rule this land and spread the teachings of our faith." #OLD ENG

 latinate_integration: "Integrazione Latina"
 #latinate_integration_desc: "Il nostro regno è un crogiolo di nobiltà europea, pellegrini zelanti e antica stirpe levantina. Attraverso un governo attento, intrecciamo insieme questa eredità diversa in una società cristiana latina, dove fede e cultura vanno di pari passo." #OLD ITA
 latinate_integration_desc: "Our realm is a crucible of noble blood from around $europe$, zealous pilgrims, and old Levantine stock. Through careful governance, we shall weave together this diverse heritage into a Latin $christian_ADJ$ society, where faith and culture go hand in hand." #NEW
 #latinate_integration_desc: "Our realm is a crucible of European nobility, pilgrim zealots, and old Levantine stock. Through careful governance, we shall weave together this diverse heritage into a Latin Christian society, where faith and culture go hand in hand." #OLD ENG
 
 
 #Chinese Culture and tag
 chinese_siege_engineers: "Assedi Pianificati"
 #chinese_siege_engineers_desc: "Le mura dei nostri forti e città sono sempre state spesse e robuste, e nemmeno le nostre migliori armi d'assedio sono in grado di danneggiarle seriamente. Per questo, i nostri ingegneri hanno dovuto sviluppare molte tattiche e strategie diverse per assediare con successo una posizione fortificata." #OLD ITA
 chinese_siege_engineers_desc: "Our thick, sturdy fortifications represent generations of defensive engineering expertise. Conversely, our thorough understanding of fortification weaknesses, learned from building impregnable walls, helps us to develop particularly effective siege tactics and strategies." #NEW
 #chinese_siege_engineers_desc: "The walls of our forts and cities have always been thick and sturdy, and not even our best siege weapons are able to seriously damage them. As such, our engineers have had to develop many different tactics and strategies to successfully siege a fortified position." #OLD ENG

 chi_legitimate_claimant: "Pretesa al Mandato"
 #chi_legitimate_claimant_desc: "Sebbene siamo emersi da umili origini, abbiamo dimostrato la nostra capacità di guidare e ispirato molti sudditi leali. Siamo ora visti come degni pretendenti al Mandato Celeste e al Regno di Mezzo." #OLD ITA
 chi_legitimate_claimant_desc: "Our origins may be humble, but we have proven our ability to lead, and have inspired and won the loyalty of many faithful subjects. We are now seen as worthy claimants to the Mandate of Heaven and the Middle Kingdom." #NEW
 #chi_legitimate_claimant_desc: "While we have emerged from a humble origin, we have proven our ability to lead and inspired many loyal subjects. We are now seen as worthy claimants to the Mandate of Heaven and the Middle Kingdom." #OLD ENG

 chi_great_rivers_of_china: "Fiumi Fertili"
 #chi_great_rivers_of_china_desc: "Sebbene ci sia un rischio associato ai grandi fiumi che scorrono attraverso le nostre terre, ci garantiranno anche grandi opportunità per produrre grandi quantità di cibo." #OLD ITA
 chi_great_rivers_of_china_desc: "While the great rivers flowing through our lands do have some associated risks for nearby settlements, they are also an invaluable tool for crop production." #NEW
 #chi_great_rivers_of_china_desc: "While there is an associated risk with the great rivers flowing through our lands, they will also grant us great opportunities to produce large amounts of food." #OLD ENG

 #Arabian
 #arabian_horsemanship: "Equitazione Araba" #OLD ITA
 arabian_horsemanship: "$AIA_ADJ$ Horsemanship" #NEW
 #arabian_horsemanship: "Arabian Horsemanship" #OLD ENG
 #arabian_horsemanship_desc: "I cavalli allevati nelle nostre terre sono desiderati in molte terre straniere per la loro bellezza e forza. Con il nostro focus sull'allevamento e l'esportazione, beneficeremo enormemente della loro rinomanza." #OLD ITA
 arabian_horsemanship_desc: "The $horses$ we raise are desired in many foreign lands for their beauty and strength. With our focus set on raising and exporting them, we will benefit greatly from their renown." #NEW
 #arabian_horsemanship_desc: "The horses raised in our lands are desired in many foreign lands for their beauty and strength. With our focus set on raising and exporting them, we will benefit greatly from their renown." #OLD ENG

 arabian_desert_warfare: "Forza del Deserto"
 #arabian_desert_warfare_desc: "Il terreno inospitale del deserto arabico ha reso i nostri guerrieri più forti e in grado di logorare il nostro nemico prima di muoversi per il colpo mortale." #OLD ITA
 arabian_desert_warfare_desc: "The inhospitable deserts of $AIA$ have made our warriors stronger, able to wear down the enemy before moving in for the killing blow." #NEW
 #arabian_desert_warfare_desc: "The inhospitable terrain of the Arabian desert has made our warriors stronger and able to wear down our enemy before moving in for the killing blow." #OLD ENG

 #arabia_cradle_of_islam: "Culla dell'Islam" #OLD ITA
 arabia_cradle_of_islam: "Cradle of $muslim$" #NEW
 #arabia_cradle_of_islam: "Cradle of Islam" #OLD ENG
 #arabia_cradle_of_islam_desc: "Le nostre terre ospitano alcuni dei luoghi più sacri della nostra fede. Questo fa sì che il nostro popolo si connetta profondamente con la propria fede e ispirerà molte grandi gesta." #OLD ITA
 arabia_cradle_of_islam_desc: "Our lands are host to some of the most holy sites in our faith. This divine proximity makes our people connect deeply with their beliefs, inspiring them to further and further greatness." #NEW
 #arabia_cradle_of_islam_desc: "Our lands host some the most holy places of our faith. This makes our people connect deeply with their faith and will inspire many great deeds." #OLD ENG

 arabia_red_sea_trade: "Commercio del Mar Rosso"
 #arabia_red_sea_trade_desc: "Ci sono molti avamposti commerciali lungo la nostra costa, che ospitano molti beni preziosi sia dalle nostre terre che da coste straniere. È tempo che rivendichiamo la nostra giusta parte di questa ricchezza di passaggio." #OLD ITA
 arabia_red_sea_trade_desc: "There are many trade outposts along our coastline, dealing in precious goods both from our own lands and foreign shores. It is time that we claim our fair share of this wealth." #NEW
 #arabia_red_sea_trade_desc: "There are many trade outposts along our coastline, hosting many precious goods both from our own lands and foreign shores. It is time that we claim our fair share of this passing wealth." #OLD ENG

 #Indonesia Region
 indonesia_outer_islands_archipelago: "Arcipelago Indonesiano"
 indonesia_outer_islands_archipelago_desc: "Le connessioni marittime giocano naturalmente un ruolo enorme all'interno della nostra società, poiché siamo circondati da acque. La nostra dipendenza dal commercio e trasporto marittimo rende l'attraversamento dei mari un compito banale per il nostro popolo."

 indonesia_naval_supremacy: "Abilità Navale"
 #indonesia_naval_supremacy_desc: "La nostra rilevanza politica all'interno dell'arcipelago si basa quasi esclusivamente sulla forza delle nostre forze navali. Migliorando l'addestramento dei nostri marinai e la costruzione della nostra flotta, assicureremo il nostro dominio sugli stati minori dell'Indonesia." #OLD ITA
 indonesia_naval_supremacy_desc: "Our political relevance within the archipelago almost solely relies on the strength of our naval forces. By improving our shipwrighting techniques and crew training, we will ensure our domination over the lesser states of $indonesia_region$." #NEW
 #indonesia_naval_supremacy_desc: "Our political relevance within the archipelago almost solely relies on the strength of our naval forces. By improving the training of our sailors and construction of our fleet, we will ensure our domination over the lesser states of Indonesia." #OLD ENG

 indonesia_trading_hub_of_the_east: "Hub Commerciale dell'Est"
 #indonesia_trading_hub_of_the_east_desc: "Non importa la loro origine o destinazione, ogni mercante d'Asia dovrà alla fine attraversare le nostre terre, portando con sé sia beni preziosi che racconti dei loro viaggi." #OLD ITA
 indonesia_trading_hub_of_the_east_desc: "No matter their origin or destination, every trader in $asia$ will eventually have to cross our lands, bringing both precious goods and tales of their travels with them." #NEW
 #indonesia_trading_hub_of_the_east_desc: "No matter their origin or destination, every trader of Asia will eventually have to cross our lands, bringing both precious goods and tales of their travels with them." #OLD ENG

 indonesia_archipelago_of_many_faiths: "Terra di Molti Popoli"
 indonesia_archipelago_of_many_faiths_desc: "Le nostre isole ospitano molti popoli diversi, che parlano lingue diverse e credono in molti dei diversi. Solo se stabiliamo una comprensione comune e tolleranza tra loro possiamo assicurare un paese prospero."

 #Italy Region
 italian_universities: "Università della Penisola"
 #italian_universities_desc: "L'Italia ospita molte grandi università e studiosi. Se vogliamo mantenere viva la fiamma del rinascimento, dobbiamo continuamente sostenere queste grandi istituzioni." #OLD ITA
 italian_universities_desc: "$ITA$ is home to many great universities and scholars. If we want to keep the flame of the $renaissance$ alive, we must continue to support these great institutions." #NEW
 #italian_universities_desc: "Italy is home to many great universities and scholars. If we want to keep the flame of the renaissance alive, we must continuously support these great institutions." #OLD ENG

 #italy_great_families: "Grandi Famiglie d'Italia" #OLD ITA
 italy_great_families: "Great Families of $ITA$" #NEW
 #italy_great_families: "Great Families of Italy" #OLD ENG
 #italy_great_families_desc: "Dopo la fondazione di un unico stato italiano, abbiamo assorbito molte grandi famiglie nobili nel nostro paese. Dovremmo utilizzare il loro prestigio e reputazione per migliorare la nostra, mantenendo quelle persone capaci occupate." #OLD ITA
 italy_great_families_desc: "After the foundation of our unified $ITA_ADJ$ state, we have absorbed many great noble families into our country. We should utilize their prestige and reputation to improve our own, while keeping those capable people busy." #NEW
 #italy_great_families_desc: "After the foundation of a sole Italian state, we have absorbed many great noble families into our country. We should utilize their prestige and reputation to improve our own, while keeping those capable people busy." #OLD ENG

 #italian_innovativeness: "Adattamento Italiano" #OLD ITA
 italian_innovativeness: "$ITA_ADJ$ Adaptiveness" #NEW
 #italian_innovativeness: "Italian Adaptation" #OLD ENG
 #italian_innovativeness_desc: "Abbiamo visto quali grandi passi gli umani possono fare con il rinascimento che fiorisce nelle nostre terre. Se vogliamo davvero progredire, non possiamo ostacolare l'accettazione di nuove idee, ma dobbiamo adattarle e renderle veramente nostre." #OLD ITA
 italian_innovativeness_desc: "With the flourishing of the $renaissance$ came a deeper understanding of what great strides human achievement can take. If we wish to truly be a nation of progress, we must adapt to these new ideas without fear, and never allow innovation to be obstructed." #NEW
 #italian_innovativeness_desc: "We have seen what great strides humans can take with the renaissance flourishing in our lands. If we want to truly advance, we can not obstruct the embracement of new ideas, but must adapt them and make them truly our own." #OLD ENG

 italian_condottieri: "Grandi Capitani Condottieri"
 #italian_condottieri_desc: "Le nostre terre sono famose per le loro grandi menti militari, che guidano eserciti gloriosi sia nel loro interesse che in quelli del miglior offerente. Dovremmo assicurare che queste persone siano sempre pronte a servirci prima di tutto." #OLD ITA
 italian_condottieri_desc: "Our nation is renowned for producing great military minds, whether they serve their own interests or are sworn in loyalty to the state. We should ensure that these adept intellects are willing to serve us first and foremost." #NEW
 #italian_condottieri_desc: "Our lands are famous for their great military minds, leading glorious armies in both their interest and those of the highest bidder. We should ensure that these people are always ready to serve us first and foremost." #OLD ENG

#United States of America

 usa_mayflower_compact: "Patto del Mayflower"
 usa_mayflower_compact_desc: "Legati insieme da pericolo e scopo condivisi, i primi coloni redassero un patto di autogoverno. Anche nella wilderness, i semi della società e del compromesso trovarono terreno."

 usa_empowered_assemblies: "Assemblee Potenziate"
 #usa_empowered_assemblies_desc: "Assemblee elette emersero in tutte le colonie, dando potere ai proprietari terrieri di governarsi da soli. Le umili origini della libertà giacciono attraverso le sale di queste istituzioni." #OLD ITA
 usa_empowered_assemblies_desc: "Elected assemblies emerged throughout the colonies, empowering landowners to govern themselves. The humble origins of liberty lie in the halls of these institutions." #NEW
 #usa_empowered_assemblies_desc: "Elected assemblies emerged throughout the colonies, empowering landowners to govern themselves. The humble origins of liberty lie across the halls of these institutions." #OLD ENG

 usa_great_awakening: "Grande Risveglio"
 usa_great_awakening_desc: "Un'ondata di revival religioso spazza la terra, sfidando le vecchie autorità e smuovendo la coscienza morale di un popolo in ascesa."

 usa_declaration_of_independence: "Dichiarazione d'Indipendenza"
 #usa_declaration_of_independence_desc: "#italic Riteniamo che queste verità siano di per sé evidenti, che tutti gli uomini sono creati uguali.#! \n\nCon questa audace dichiarazione, spezzeremo le catene della soggiogazione e abbracciamo il nostro destino condiviso." #OLD ITA
 usa_declaration_of_independence_desc: "#italic We hold these truths to be self-evident, that all men are created equal.#!\n\nWith this bold declaration, we shall break the chains of subjugation, and embraced our shared destiny!" #NEW
 #usa_declaration_of_independence_desc: "#italic We hold these truths to be self-evident, that all men are created equal.#! \n\nWith this bold declaration, we shall break the chains of subjugation and embraced our shared destiny." #OLD ENG

 usa_bill_of_rights: "Carta dei Diritti"
 usa_bill_of_rights_desc: "#italic ...o limitando la libertà di parola, o della stampa; o il diritto del popolo di riunirsi pacificamente, e di presentare petizioni al Governo per la riparazione di lamentele.#!"

 usa_recognized_sovereignty: "Sovranità Riconosciuta"
 #usa_recognized_sovereignty_desc: "Trattati e diplomazia hanno affermato ciò che le nostre lotte hanno guadagnato. Il nostro posto sul palcoscenico della diplomazia non è più messo in discussione, ma riconosciuto." #OLD ITA
 usa_recognized_sovereignty_desc: "Treaties and diplomacy affirmed what our struggles have earned. Our place on the stage of diplomacy is no longer questioned, but respected." #NEW
 #usa_recognized_sovereignty_desc: "Treaties and diplomacy affirmed what our struggles have earned. Our place among the stage of diplomacy is no longer questioned, but acknowledged." #OLD ENG

 usa_era_good_feelings: "Era dei Buoni Sentimenti"
 #usa_era_good_feelings_desc: "Sulla scia delle difficoltà, pace e unità hanno portato un raro momento di armonia nazionale. Il popolo fiorisce con ottimismo e ordine." #OLD ITA
 usa_era_good_feelings_desc: "In the wake of hardship, peace and unity have brought a rare moment of national harmony. The people flourish with optimism and order." #NEW
 #usa_era_good_feelings_desc: "In the wake of hardship, peace and unity brought a rare moment of national harmony. The people flourish with optimism and order." #OLD ENG
 
#Kongo

 kon_bakongo_confederation: "Confederazione Bakongo"
 #kon_bakongo_confederation_desc: "Prima dell'ascesa del nostro regno, il popolo di questa regione si governava attraverso consigli di clan e alleanze provinciali. Ciò che ora chiamiamo $KON$ emerse da secoli di relazioni intrecciate, dove la lealtà alla terra e alla stirpe superava la lealtà ai confini. Unire questo mosaico in un regno centralizzato non fu impresa da poco, ma ci riuscimmo, e lo terremo ancora insieme." #OLD ITA
 kon_bakongo_confederation_desc: "Before the rise of our realm, the people of this region governed themselves through clan councils and provincial alliances. What we now call $KON$ emerged from centuries of interwoven relationships, where loyalty to the land and kin outweighed loyalty to borders. Uniting this patchwork into a centralized realm was no small feat, but we did it and we will keep it together yet." #NEW
 #kon_bakongo_confederation_desc: "Before the rise of our realm, the people of this region governed themselves through clan councils and provincial alliances. What we now call $KON$ emerged from centuries of interwoven relationships, where loyalty to the land and kin outweighed loyalty to borders. Uniting this patchwork into a centralized realm was no small feat, but we did it, and we will keep it together yet." #OLD ENG

 kon_lineage_lukeni_lua_nimi: "Discendenza di Lukeni lua Nimi"
 kon_lineage_lukeni_lua_nimi_desc: "Tutte le cose devono iniziare da qualche parte, e per il nostro regno, quell'inizio risiede in Lukeni lua Nimi. Fu più di un conquistatore. Infatti, fu un fondatore, il padre del nostro regno. La sua stirpe comandava rispetto, non solo per la sua ascendenza, ma perché ricorda al popolo chi per primo osò sognare un $KON$ unificato."

 #kon_european_contact: "Contatto Europeo" #OLD ITA
 kon_european_contact: "Contact with $europe$" #NEW
 #kon_european_contact: "European Contact" #OLD ENG
 #kon_european_contact_desc: "Gli stranieri vennero dal mare con barbe, libri e barili di vino. Portarono con sé dei strani, lingue più strane e un intero oceano di opportunità. I nostri emissari hanno imparato i loro costumi, le loro intenzioni e, cosa più importante, come trasformare il loro bisogno di alleati nel nostro vantaggio." #OLD ITA
 kon_european_contact_desc: "The strangers came from the sea with beards, books, and barrels of wine. They brought with them strange gods, stranger languages, and an entire ocean of opportunity. Our emissaries have learned their customs, their intentions, and — most importantly — how to turn their need for allies into our advantage." #NEW
 #kon_european_contact_desc: "The strangers came from the sea with beards, books, and barrels of wine. They brought with them strange gods, stranger languages, and an entire ocean of opportunity. Our emissaries have learned their customs, their intentions, and most importantly how to turn their need for allies into our advantage." #OLD ENG

 kon_cultural_syncreticism: "Sincretismo Culturale"
 #kon_cultural_syncreticism_desc: "L'afflusso di stranieri e scambi ha avuto un impatto sulla nostra società. Tuttavia, non abbiamo abbandonato i nostri modi. Invochiamo divinità con nomi Kikongo, indossiamo molte insegne religiose, e le nostre cerimonie echeggiano sia di tamburi che di inni. Questo è un esempio vibrante della nostra chiarezza, e gli dei sembrano essere d'accordo." #OLD ITA
 kon_cultural_syncreticism_desc: "The influx of foreigners and cultural exchanges have made an impact on our society. However, we have not abandoned our own ways. We call upon deities by Kikongo names, we proudly wear our religious insignia, and our ceremonies echo with both drums and hymns. This is a vibrant example of our clarity, and the gods seem to agree." #NEW
 #kon_cultural_syncreticism_desc: "The influx of foreigners and exchanges have made an impact on our society. However, we have not abandoned our ways. We call upon deities by Kikongo names, we wear many religious insignias, and our ceremonies echo with both drums and hymns. This is a vibrant example of our clarity, and the gods seem to agree." #OLD ENG

 kon_study_european_firearms: "Studiare le Armi da Fuoco Europee"
 #kon_study_european_firearms_desc: "Il moschetto potrebbe non rendere un uomo coraggioso, ma certamente lo rende temuto. Lasciamo che gli Europei si vantino della loro superiorità, compreremo le loro armi, padroneggieremo i loro esercizi, e presto, l'unica cosa che separerà i nostri soldati dai loro sarà il colore delle loro bandiere." #OLD ITA
 kon_study_european_firearms_desc: "The musket may not make a man brave, but it certainly makes him fearsome. Let those in $europe$ boast of their superiority; we will buy their weapons, master their drills, and soon enough the only thing distinguishing our soldiers from theirs will be the color of their flags." #NEW
 #kon_study_european_firearms_desc: "The musket may not make a man brave, but it certainly makes him feared. Let the Europeans boast of their superiority, we will buy their weapons, master their drills, and soon enough, the only thing that separates our soldiers from theirs will be the color of their flags." #OLD ENG

 #kon_transatlantic_slave_trade: "Commercio Transatlantico degli Schiavi" #OLD ITA
 kon_transatlantic_slave_trade: "Transatlantic $slaves_goods$ Trade" #NEW
 #kon_transatlantic_slave_trade: "Transatlantic Slave Trade" #OLD ENG
 #kon_transatlantic_slave_trade_desc: "Prigionieri e lavoratori sono necessari oltre oceano, per popolare i molti cantieri, piantagioni e miniere. Sebbene questo sia ben lontano da un nobile sforzo, nessuno può negare la natura proficua di questi sfruttamenti." #OLD ITA
 kon_transatlantic_slave_trade_desc: "Prisoners and laborers are needed overseas to operate our many worksites, plantations, and mines. While this is far from a noble endeavor, none can deny the profitable nature of these exploits." #NEW
 #kon_transatlantic_slave_trade_desc: "Prisoners and laborers are needed overseas, to populate the many worksites, plantations, and mines. While this is far from a noble endeavor, none can deny the profitable nature of these exploits." #OLD ENG


#Ilkanate

 ilk_restore_yam: "Restaurare lo Yäm"
 #ilk_restore_yam_desc: "Lo Yäm, il nostro antico sistema di stazioni di staffetta e messaggeri, un tempo collegava gli angoli più lontani del mondo mongolo. Restaurando questa vasta rete attraverso la Persia e oltre, assicuriamo che i nostri ordini siano rapidi, i nostri inviati al sicuro e il nostro dominio reattivo, proprio come fu nei giorni d'oro dei Khan." #OLD ITA
 ilk_restore_yam_desc: "The Yäm, our ancient system of relay stations and messengers, once connected the furthest corners of the $MGE_ADJ$ world. By restoring this vast network across $persia_region$ and beyond, we ensure that our orders are swift, our envoys safe, and our dominion responsive, just as it was in the golden days of the Khans." #NEW
 #ilk_restore_yam_desc: "The Yäm, our ancient system of relay stations and messengers, once connected the furthest corners of the Mongol world. By restoring this vast network across Persia and beyond, we ensure that our orders are swift, our envoys safe, and our dominion responsive, just as it was in the golden days of the Khans." #OLD ENG

 ilk_ilkhanate_resurgent: "$ILK$ Risorto"
 #ilk_ilkhanate_resurgent_desc: "Ciò che una volta fu spezzato ora è rinato. I nostri stendardi sventolano ancora una volta attraverso la Persia, invocando timore reverenziale e paura in egual misura. Man mano che la voce del nostro crescente potere si diffonde, il mondo ricorderà cosa significa essere governati da un vero $ILKHANATE_LEADER_MALE$." #OLD ITA
 ilk_ilkhanate_resurgent_desc: "What was once broken is now reborn. Our banners fly once more across $persia_region$, invoking awe and fear in equal measure. As word of our rising power spreads, the world will remember what it means to be ruled by a true $ILKHANATE_LEADER_MALE$." #NEW
 #ilk_ilkhanate_resurgent_desc: "What was once broken is now reborn. Our banners fly once more across Persia, invoking awe and fear in equal measure. As word of our rising power spreads, the world will remember what it means to be ruled by a true $ILKHANATE_LEADER_MALE$." #OLD ENG

 ilk_persian_arts_and_architecture: "Arti e Architettura Persiane"
 ilk_persian_arts_and_architecture_desc: "I nostri antenati governavano con la spada, ma la loro grandezza fu misurata in palazzi, biblioteche e minareti. Seguiamo il loro esempio e finanziamo non solo mura e strade, ma moschee, giardini e scuole come testimonianze della grandezza dell'$ilkhanate$."

 ilk_descendants_of_genghis_khan: "Discendenti di $genghis_khan_name_no_tooltip$"
 ilk_descendants_of_genghis_khan_desc: "Il sangue del $rank_empire_horde_ruler_suffix_male$ scorre nelle nostre vene. Che nessun uomo dimentichi che il nostro governo fu ordinato nelle steppe e sigillato dalla conquista. I nostri cavalieri rimangono ineguagliati, e i nostri stendardi portano non solo un nome, ma un diritto di nascita."

 ilk_new_roots: "Nuove Radici"
 #ilk_new_roots_desc: "I giorni della pura conquista della steppa sono dietro di noi. Ci siamo seminati nel terreno del progresso e della riforma. Da quel terreno, uno stato più stabile e sofisticato crescerà. Sebbene il nostro cuore possa ancora battere al ritmo dei campi aperti, il nostro futuro risiede in istituzioni durature, non in incursioni fugaci." #OLD ITA
 ilk_new_roots_desc: "The days of pure steppe conquest lie behind us. We have sown ourselves into the soil of progress and reformation. From that soil, a more stable, sophisticated state shall grow. Though our hearts may still beat to the rhythm of the open fields, our future lies in lasting institutions, not fleeting raids." #NEW
 #ilk_new_roots_desc: "The days of pure steppe conquest lie behind us. We have sown ourselves into the soil of progress and reformation. From that soil, a more stable, sophisticated state shall grow. Though our heart may still beat to the rhythm of the open fields, our future lies in lasting institutions, not fleeting raids." #OLD ENG

 #Hindustan
 hin_sepahi: "Sipâhi"
 #hin_sepahi_desc: "Trascurare l'importanza dei soldati di fanteria è stata la caduta di molti aspiranti conquistatori in queste terre. Dobbiamo assicurare che le nostre truppe siano equipaggiate con le armi da fuoco più efficaci e addestrate in tattiche che possano adattarsi a qualsiasi nemico." #OLD ITA
 hin_sepahi_desc: "Neglecting the importance of the infantry has been the downfall of many would-be conquerors. We must ensure that our troops are equipped with the most effective firearms and drilled in tactics that can adapt to any foe." #NEW
 #hin_sepahi_desc: "Neglecting the importance of infantry soldiers has been the downfall of many would-be conquerors in these lands. We must ensure that our troops are equipped with the most effective firearms and drilled in tactics that can adapt to any foe." #OLD ENG

 #hin_united_india: "India Unita" #OLD ITA
 hin_united_india: "United $india$" #NEW
 #hin_united_india: "United India" #OLD ENG
 #hin_united_india_desc: "I molti popoli, culture, lingue e nazioni che compongono il subcontinente indiano saranno uniti sotto un unico stendardo. Solo con una comprensione comune e un'unità attentamente coltivata tra il popolo indiano possiamo aspirare ad ambizioni maggiori." #OLD ITA
 hin_united_india_desc: "The many people, cultures, languages, and nations that make up $india$ shall be finally united under a single banner. Only with common understanding and a carefully fostered unity among all our people can we strive towards greater ambitions." #NEW
 #hin_united_india_desc: "The many people, cultures, languages, and nations that make up the Indian subcontinent shall be united under one banner. Only with a common understanding and a carefully fostered unity among the Indian people we can strive towards greater ambitions." #OLD ENG

 hin_ganga: "Gaṅgā"
 #hin_ganga_desc: "Molti indù venerano il fiume Gange come una dea, portando purezza e redenzione ai fedeli. Imploriamo i pellegrini di visitare le rive del fiume per bagnarsi nelle acque sacre. Attraverso Gaṅgā, la nostra nazione è resa pura." #OLD ITA
 hin_ganga_desc: "Many $hindu_ADJ$ faithful worship the river Ganges as a goddess that brings purity and redemption to the faithful. We implore pilgrims to visit the river banks to bathe in the sacred waters. Through Gaṅgā, our nation is made pure." #NEW
 #hin_ganga_desc: "Many Hindus worship the river Ganges as a goddess, bringing purity and redemption to the faithful. We implore pilgrims to visit the river banks to bathe in the sacred waters. Through Gaṅgā, our nation is made pure." #OLD ENG

 hin_persianate_court: "Cultura di Corte Persianizzata"
 #hin_persianate_court_desc: "Lingue straniere e costumi di corte sono stati influenti nelle corti indiane per molto tempo. Dovremmo utilizzare queste connessioni per invitare i consiglieri più capaci a servire sotto la nostra guida." #OLD ITA
 hin_persianate_court_desc: "Foreign languages and noble customs have richly influenced the courts of $india$ for a long time. We should utilize these connections to invite the most capable advisors to serve under our guidance." #NEW
 #hin_persianate_court_desc: "Foreign languages and courtly customs have been influential in Indian courts for a long time. We should utilize these connections to invite the most capable advisors to serve under our guidance." #OLD ENG

 hin_gunpowder_empire: "Impero della Polvere da Sparo"
 #hin_gunpowder_empire_desc: "La nostra maestria nella guerra con la polvere da sparo ci ha portato gloria e un grande stato da governare. Questo dominio sarebbe impossibile senza promuovere la produzione di armi da fuoco per le nostre truppe." #OLD ITA
 hin_gunpowder_empire_desc: "Our mastery of gunpowder warfare has brought us glory and helped us found our great state. This dominance would be impossible without fostering firearms production for our troops." #NEW
 #hin_gunpowder_empire_desc: "Our mastery of gunpowder warfare has brought us glory and a great state to rule. This dominance would be impossible without fostering the production of firearms for our troops." #OLD ENG

 hin_sufism: "Attirare Missionari Sufi"
 #hin_sufism_desc: "I principi musulmani in tutto il mondo competono per attirare i più saggi insegnanti sufi. Man mano che la nostra rinomanza è cresciuta, più di questi sufi si sono uniti a noi. Si fondano città dove si stabiliscono, spesso in regioni precedentemente inospitali, e la popolazione locale è ispirata a convertirsi alla nostra fede dalla saggezza dei sufi." #OLD ITA
 hin_sufism_desc: "$muslim_ADJ$ princes across the world compete to attract the wisest Sufi teachers. As our renown has grown, more of these Sufis have joined us. Towns are founded wherever they settle, often in previously inhospitable regions, and the local people are inspired to convert through the wisdom of the Sufis." #NEW
 #hin_sufism_desc: "Muslim princes across the world compete to attract the wisest Sufi teachers. As our renown has grown, more of these Sufis have joined us. Towns are founded where they settle, often in previously inhospitable regions, and the local people are inspired to convert to our faith by the wisdom of the Sufis." #OLD ENG

 hin_administration_of_india: "Amministrazione Indiana"
 #hin_administration_of_india_desc: "Governare uno stato grande quanto un intero subcontinente non è compito facile. Dovremo sviluppare un robusto sistema di amministrazione in cooperazione con i principi locali per estrarre la ricchezza dalle nostre terre." #OLD ITA
 hin_administration_of_india_desc: "Governing a state as large as an entire subcontinent is no easy task. We will need to develop a robust system of administration in cooperation with local princes to get the most out of our production and to ensure widespread stability." #NEW
 #hin_administration_of_india_desc: "Governing a state as large as an entire subcontinent is no easy task. We will need to develop a robust system of administration in cooperation with local princes to extract the wealth from our lands." #OLD ENG

 #hin_indian_empire: "India Imperiale" #OLD ITA
 hin_indian_empire: "Imperial $india$" #NEW
 #hin_indian_empire: "Imperial India" #OLD ENG
 #hin_indian_empire_desc: "Nessun governante, sia esso musulmano, indù, buddista o giainista, è mai riuscito a conquistare l'intera India. Saremo i primi governanti universali dell'India!" #OLD ITA
 hin_indian_empire_desc: "No ruler, be they $muslim_ADJ$, $hindu_ADJ$, $buddhist_ADJ$, or $jain_ADJ$, has ever succeeded in conquering the entirety of the subcontinent. We shall be the first universal rulers of $india$!" #NEW
 #hin_indian_empire_desc: "No ruler, be they Muslim, Hindu, Buddhist, or Jain, has ever succeeded in conquering the entirety of India. We shall be the first universal rulers of India!" #OLD ENG

 hin_rocketry: "Sviluppare la Tecnologia dei Razzi"
 hin_rocketry_desc: "I razzi con custodia in ferro devono ancora essere ampiamente adattati per scopi militari, eppure il loro potere esplosivo ha sicuramente applicazioni tattiche. Dovremmo sperimentare con questa tecnologia e testarla sul campo di battaglia."

 #hin_industrialization: "Industrializzazione dell'India" #OLD ITA
 hin_industrialization: "Industrialization of $india$" #NEW
 #hin_industrialization: "Industrialization of India" #OLD ENG
 #hin_industrialization_desc: "Le condizioni nell'economia indiana sono ideali per una rapida crescita industriale. Con la nuova tecnologia possiamo assicurare condizioni migliori per la nostra produzione locale, in particolare nell'industria tessile. Con il focus sui nuovi metodi, il nostro stato pan-indiano può assicurare una crescita costante per le nostre industrie." #OLD ITA
 hin_industrialization_desc: "Conditions in our economy are ideal for rapid industrial growth. With new technology we can ensure better conditions for our local production, particularly in the textile industry. Our focus on new methods means that our state can ensure steady industrial expansion." #NEW
 #hin_industrialization_desc: "Conditions in the Indian economy are ideal for rapid industrial growth. With new technology we can ensure better conditions for our local production, particularly in the textile industry. With the focus on new methods, our pan-Indian state can ensure a steady growth for our industries." #OLD ENG

 #Carthage
 cth_merchant_legacy: "Eredità Mercantile"
 #cth_merchant_legacy_desc: "Le flotte commerciali fenicie viaggiarono attraverso il Mediterraneo per secoli. Tutta questa eredità permette ai figli di Cartagine di essere più efficienti e spietati quando si tratta di commercio. Governeremo ancora una volta sul flusso di merci." #OLD ITA
 cth_merchant_legacy_desc: "Phoenician trade fleets traveled through the Mediterranean for centuries. This economic legacy means that we are more efficient — and ruthless — when it comes to trade. We shall once again preside over the ebb and flow of goods!" #NEW
 #cth_merchant_legacy_desc: "Phoenician trade fleets traveled through the Mediterranean for centuries. All this legacy allows the sons of Carthage to be more efficient and ruthless when it comes to trade. We shall once again rule over the flow of goods." #OLD ENG

 cth_breadbasket_of_rome: "Granaio di Roma"
 #cth_breadbasket_of_rome_desc: "Secoli fa, i nostri progressi nelle tecniche di irrigazione e coltivazione dell'olivo guadagnarono a Cartagine il nome di granaio romano. Ora raccoglieremo l'antica conoscenza e ancora una volta combatteremo il deserto per coltivare gli uliveti proprio come nell'antichità." #OLD ITA
 cth_breadbasket_of_rome_desc: "Centuries ago, our advances in irrigation and olive cultivation earned $CTH$ the nickname of 'the breadbasket of Rome.' We will now consult our ancient agricultural knowledge, and once again do battle with the desert to plant our olive groves, just like in antiquity." #NEW
 #cth_breadbasket_of_rome_desc: "Centuries ago, our advances in irrigation and olive cultivation techniques earned Carthage the name of Roman breadbasket. We will now gather the ancient knowledge and once again battle the desert to grow the olive groves just like in antiquity." #OLD ENG

 cth_mercenary_army: "Esercito di Mercenari"
 #cth_mercenary_army_desc: "La nazione punica di Cartagine non ha una grande popolazione, quindi per secoli ci siamo affidati ai mercenari per combattere le nostre guerre per noi. Dalla riforma di Cartagine, abbiamo continuato quella tradizione per salvare la nostra popolazione dai pericoli della guerra." #OLD ITA
 cth_mercenary_army_desc: "Our ancestral empire did not have a massive population, so for centuries, we relied on mercenaries during war. Since the reformation of $CTH$ we have continued that tradition to save our population from dangers of the battlefield." #NEW
 #cth_mercenary_army_desc: "The Punic nation of Carthage does not have big population, so for centuries we relied on Mercenaries to fight our wars for us. Since the reformation of Carthage, we continued that tradition to save our population from dangers of war." #OLD ENG

 cth_cothons: "Cothon"
 #cth_cothons_desc: "L'antico cothon di Cartagine era una meraviglia tecnologica che le permetteva di costruire navi efficientemente. Ora, l'eredità dei tempi antichi ci servirà come modello per tutto il nostro paese. Studiare le antiche tecniche di costruzione navale ci permette di eccellere in quest'area ancora una volta. La Marina Cartaginese presto solcherà tutto il Mediterraneo." #OLD ITA
 cth_cothons_desc: "The ancient Carthaginian #italic cothon#! was a technological marvel that helped facilitate efficient ship construction. Now, this great legacy will serve as a blueprint for our whole country. Studying ancient shipbuilding techniques allows us to excel in this area once again, and the $CTH_ADJ$ navy will soon dominate the Mediterranean." #NEW
 #cth_cothons_desc: "The ancient cothon of Carthage was a technological marvel that allowed it to construct ships efficiently. Now, the legacy of ancient time will serve us as a blueprint for our whole country. Studying ancient ship making techniques allows us to excel in this area once again. Carthaginian Navy will soon cruise the whole Mediterranean." #OLD ENG

 cth_phoenician_sailors: "Marinai Fenici"
 #cth_phoenician_sailors_desc: "Dopo aver restaurato il nostro antico regno, abbiamo iniziato a raggiungere i nostri vecchi fratelli fenici in Libia. Di conseguenza, abbiamo un afflusso costante di volontari che vogliono unirsi alla restaurazione dell'antico regno fenicio di Cartagine. Sembra che ora possiamo mantenere una marina molto più grande." #OLD ITA
 cth_phoenician_sailors_desc: "After restoring our ancient kingdom, we started reaching out to our Phoenician brothers in Libya. As a result, we have a steady influx of volunteers that want to join the restoration of the ancient Phoenician kingdom of $CTH$. It seems we can maintain a much bigger navy now..." #NEW
 #cth_phoenician_sailors_desc: "After restoring out ancient kingdom, we started reaching out to our old Phoenician brothers in Libya. As a result, we have a steady influx of volunteers that want to join the restoration of the ancient Phoenician kingdom of Carthage. It seems we can maintain a much bigger navy now." #OLD ENG

 cth_legacy_of_hannon: "Eredità di Annone"
 #cth_legacy_of_hannon_desc: "Annone il Navigatore fu un grande esploratore dei tempi antichi che raggiunse lontano nel sud della costa africana. Seguiremo il suo esempio e ricominceremo i nostri viaggi di esplorazione per restaurare un grande impero commerciale. Questa volta, spingeremo la nostra esplorazione ancora più lontano, cercando nuove opportunità commerciali in tutto il globo." #OLD ITA
 cth_legacy_of_hannon_desc: "Hannon the Sailor was a legendary ancient explorer who ventured far into the south of the African coast. We shall follow his example, and mount exploration voyages in order to restore our lost trading empire. This time, we will push our expeditions even further, seeking out fresh trading opportunities across the entire world." #NEW
 #cth_legacy_of_hannon_desc: "Hannon the Sailor was a great explorer of the ancient times that reached far into the south of the African cost. We shall follow his example and restart our exploration voyages in order to restore a great trading empire. This time, we will push our exploration even further, seeking out fresh trading opportunities across the globe." #OLD ENG

 cth_beyond_the_pillars: "Oltre le Colonne"
 #cth_beyond_the_pillars_desc: "È tempo che le nostre fabbriche commerciali raggiungano oltre le mitiche colonne d'Ercole. Combinare l'antica conoscenza della colonizzazione con le moderne scoperte ci permette di stabilirci più efficientemente di altre nazioni più giovani, quelle che sono abbastanza nuove a questa esperienza. Le colonie cartaginesi saranno presto trovate in tutto il mondo." #OLD ITA
 cth_beyond_the_pillars_desc: "It is time for our trade factories to reach beyond the mythical pillars of Hercules. Combining ancient colonization knowledge with modern discoveries allows us to settle more efficiently than other younger nations, those who are fairly new to this experience. $CTH_ADJ$ colonies shall soon be found all around the world!" #NEW
 #cth_beyond_the_pillars_desc: "It is time for our trade factories to reach beyond the mythical pillars of Hercules. Combining ancient colonization knowledge with modern discoveries allows us to settle more efficiently than other younger nations, those who are fairly new to this experience. Carthaginian colonies shall soon be found all around the world." #OLD ENG

 #cth_wine_traders: "Commercio di Vino Punico" #OLD ITA
 cth_wine_traders: "Punic $wine$ Trade" #NEW
 #cth_wine_traders: "Punic Wine Trade" #OLD ENG
 #cth_wine_traders_desc: "Nei tempi antichi, abbiamo creato una pipeline commerciale del vino producendo grandi quantità di vino di bassa qualità da commerciare e importando vini di alta qualità noi stessi. Costruendo su quello, stiamo cercando di espandere le nostre capacità di produzione del vino per essere in grado di assumere il controllo del commercio del vino intorno al Mediterraneo." #OLD ITA
 cth_wine_traders_desc: "In ancient times, we created a $wine$ trading pipeline by producing large amounts of low-quality $wine$ to trade, and importing the good stuff for ourselves. Building on that tradition, we are looking into expanding our $wine$ production capabilities — we #italic will#! dominate the $wine$ trade in the Mediterranean!" #NEW
 #cth_wine_traders_desc: "In ancient times, we created a wine trading pipeline by producing large amounts of low quality wine to trade and importing high quality wines ourselves. Building on top of that, we are looking into expanding our wine producing capabilities to be able to take over wine trade around the Mediterranean." #OLD ENG

 cth_punic_global_trade: "Commercio Globale Punico"
 #cth_punic_global_trade_desc: "Per secoli, la nostra nazione ha dominato il commercio mediterraneo. Ora, con tutte le nuove scoperte, siamo destinati a dominarlo globalmente. Presto in ogni porto del mondo ci sarà una nave commerciale cartaginese da trovare." #OLD ITA
 cth_punic_global_trade_desc: "For centuries, our nation dominated the Mediterranean trade. Now, with all the new discoveries made in the centuries since, we stand poised to dominate the globe. Soon, there will be a $CTH_ADJ$ trading vessel in every port in this world!" #NEW
 #cth_punic_global_trade_desc: "For centuries, our nation dominated the Mediterranean trade. Now, with all the new discoveries, we are bound to dominate it globally. Soon in every port in the world there will be a Carthaginian trade vessel to be found." #OLD ENG

 cth_sufet_rule: "Governo dello Šūfeṭ"
 #cth_sufet_rule_desc: "Il nostro antico regno era guidato da un capo di stato eletto chiamato Šūfeṭ. In questa nuova era moderna, riorganizzeremo il nostro governo, prendendo esperienza dall'antichità e combinandola con le teorie moderne per creare il sistema repubblicano più potente, uno che eclisserà ogni Repubblica creata fino ad oggi." #OLD ITA
 cth_sufet_rule_desc: "Our ancient kingdom was headed by an elected head of state called the #italic Šūfeṭ#!. In this new modern age, we shall reorganize our government, taking experience from antiquity and combining it with modern theories to create a powerful Republican system, one that will outshine every Republic created up to this date!" #NEW
 #cth_sufet_rule_desc: "Our ancient kingdom was headed by an elected head of state called the Šūfeṭ. In this new modern age, we shall reorganize our government, taking experience from antiquity and combining it with modern theories to create the most powerful Republican system, one that will outshine every Republic created up to this date." #OLD ENG
 
 #Aztec Formable Advances

 network_of_cities: "Rete di Città"
 network_of_cities_desc: "Attraverso laghi e valli, le nostre città si legano tra loro grazie a strade, mercati e obiettivi comuni, rafforzando la nostra influenza."

 status_by_merit: "Stato in Base al Merito"
 status_by_merit_desc: "I guerrieri e i nobili si distinguono per il loro valore e il loro servizio, assicurando che l'autorità appartenga a coloro che se la sono veramente guadagnata."

 expansion_merchant_guilds: "Espansione delle Gilde dei Mercanti"
 expansion_merchant_guilds_desc: "I mercanti Pochtēcah estendono le loro rotte ben oltre i nostri confini, arricchendo ogni mercato fedele ai Mexihcah."

 centralized_city_governance: "Governance Urbana Centralizzata"
 centralized_city_governance_desc: "La riforma del nostro governo, nel tentativo di sostenere l'espansione dei nostri territori urbani di recente acquisizione, sarà unificata sotto una supervisione rigorosa, creando un'amministrazione più ordinata e affidabile."

 wealth_of_mesoamerica: "Ricchezza della Mesoamerica"
 wealth_of_mesoamerica_desc: "I fertili terreni, le foreste e le miniere di Ānāhuac producono immense ricchezze, sostenendo la nostra crescita e le nostre ambizioni imperiali. Un uso corretto di queste risorse rafforzerà la nostra prosperità."

 study_european_colonizers: "Studia i Colonizzatori Europei"
 study_european_colonizers_desc: "Degli sconosciuti hanno contattato la nostra gente. Le loro navi e le loro armi sconosciute incutono timore e soggezione. Comprendere i loro metodi potrebbe essere la chiave per la sopravvivenza."

 new_fire_ceremonies: "Nuove Cerimonie del Fuoco"
 new_fire_ceremonies_desc: "Una volta ogni cinquantadue anni, il mondo viene rinnovato dalle fiamme, unendo le persone nella fede e nell'equilibrio cosmico."

 sun_must_rise: "Il Sole Deve Sorgere"
 sun_must_rise_desc: "Attraverso la devozione e i rituali, manteniamo vivo il viaggio del sole, alleviando i cuori e rafforzando lo spirito del nostro popolo. La conservazione dell'equilibrio, e persino del mondo, poggia sulle nostre spalle."

 #Kurdistan Formable
 krs_kurdish_tribes: "Lealtà Tribale"
 krs_kurdish_tribes_desc: "Dopo aver affermato la nostra autorità su tutte le tribù di cultura $kurdish_culture$, potremo contare sui loro guerrieri esperti e temprati per difendere il nostro Paese."

 krs_legacy_of_the_kurdish_dynasties: "L'Eredità delle Dinastie Kurde"
 krs_legacy_of_the_kurdish_dynasties_desc: "Il nostro popolo ha fondato diverse grandi dinastie, governando territori che vanno dall'$egypt_region$ all'Iran. Legare il nostro Stato alla gloria dei sovrani del passato ci consentirà di diventare un simbolo di unificazione per la popolazione $kurdish_culture$ e renderà il nostro governo più legittimo agli occhi dei nostri sudditi."

 krs_kurdish_quarters: "I Prosperi Quartieri Kurdi"
 krs_kurdish_quarters_desc: "Durante il periodo di dominio straniero, molti dei nostri cittadini hanno creato quartieri prevalentemente Kurdi nelle città. Sebbene queste aree abbiano prosperato anche sotto governanti lontani, ora possiamo sfruttare direttamente la loro ricchezza e garantire un futuro più prospero al nostro popolo."

 krs_kurdish_horses: "Cavalleria Adattabile"
 krs_kurdish_horses_desc: "Le nostre terre natali sono circondate da molti aspiranti conquistatori, desiderosi di soggiogare il nostro popolo. Sebbene il nostro territorio possa rallentare gli eserciti nemici, rende anche difficile alle nostre truppe rispondere rapidamente alle minacce. Una cavalleria forte, tuttavia, ci consentirà di reagire rapidamente a qualsiasi minaccia, indipendentemente dal numero dei nemici."

 krs_kurdish_mercenaries: "Esperienza Mercenaria"
 krs_kurdish_mercenaries_desc: "Il nostro popolo ha a lungo prestato servizio come mercenario per signori stranieri, acquisendo una preziosa esperienza di combattimento al loro servizio. Ora che il nostro Paese è stato fondato, è giunto il momento di chiamare quei combattenti esperti sotto la nostra bandiera."

 krs_kurdish_warrior_poets: "Poeti Guerrieri"
 krs_kurdish_warrior_poets_desc: "I nostri governanti non devono essere solo guerrieri capaci, ma devono anche essere istruiti nelle belle arti e nell'amministrazione efficace. Scrivendo testi e documentando i loro regni, i nostri leader trasmetteranno le conoscenze e la storia del nostro popolo alle generazioni future, assicurando che nessuna preziosa intuizione vada perduta."

#Manchu Formable Advances

 mohe_ancestry: "Discendenza dei Mohe"
 mohe_ancestry_desc: "Il nostro popolo discende dalle tribù Mohe delle foreste dell'Amur. Le loro tradizioni di caccia, pastorizia e vita di frontiera modellano la nostra società."

 warka_ties: "Legami Warka"
 warka_ties_desc: "I nostri legami con i Warka ci hanno permesso di acquisire una grande conoscenza nella caccia e nella raccolta di cibo. Grazie a queste pratiche, garantiamo il sostentamento del nostro popolo anche durante i lunghi inverni."

 shadow_of_ambition: "Ombra dell'Ambizione"
 shadow_of_ambition_desc: "L'unificazione delle tribù Jurchen è solo il primo passo della nostra ambiziosa ascesa al potere. Presto il nostro nome incuterà timore e soggezione in tutto il continente."

 niyamniyan: "Niyamniyan"
 niyamniyan_desc: "La tradizione dei Cinque Nobili Talenti comprende l'equitazione, il tiro con l'arco, il comando militare, la lealtà e la disciplina. Questi aspetti della nostra società marziale costituiscono la spina dorsale della nostra orgogliosa cultura."

 southern_campaigns: "Campagne Meridionali"
 southern_campaigns_desc: "La $CHI$ è sede di ricchezze, prestigio e conoscenze incommensurabili. Sotto il dominio di una dinastia debole, spetta a noi conquistare il potere e riportare la prosperità e lo splendore di queste terre."

 foreign_learning: "Istruzione Straniera"
 foreign_learning_desc: "Da studiosi e testi stranieri adotteremo nuove pratiche amministrative, militari e accademiche, accelerando il ritmo del nostro sviluppo tecnologico."

#Malacca Formable

 melaka_tree: "L'Albero di Melaka"
 melaka_tree_desc: "Secondo la leggenda, il timido cervo topo cercò rifugio in quello che sarebbe poi diventato il nostro dominio. Le nostre origini sono umili, poco più che un villaggio di pescatori raggruppato all'ombra dell'albero di Melaka. Da queste radici sarebbe nato un popolo che un giorno avrebbe plasmato l'intera regione."

 orang_laut: "Orang Laut"
 orang_laut_desc: "Molto prima della nostra ascesa, gli Orang Laut vagavano per gli stretti come padroni del vento e delle maree. Ora, imparando i loro metodi e assumendo alcuni di loro, guidiamo i commercianti attraverso le acque strette e proteggiamo la nostra costa dai pirati. Tale vigilanza garantisce che tutti coloro che navigano verso $malacca$ arrivino sani e salvi."

 congregation_of_merchants: "Congregazione dei Mercanti"
 congregation_of_merchants_desc: "From $arabia_region$ to China and the coasts of $south_asia$, merchants of every shore converge upon $malacca$. Drawn by fair laws, secure waters, and bustling markets, they will form a great congregation that enriches our ports and carries our name across the seas."

 connections_with_china: "Collegamenti con la Cina"
 connections_with_china_desc: "Our envoys have secured recognition from China's most prestigious sovereigns. Tribute and goodwill flow between us, granting us prestige, protection, and a privileged place in the vast network of their trade."

 control_the_malacca_strait: "Controllare lo Stretto di Malacca"
 #control_the_malacca_strait_desc: "Lo stretto $inner_malacca_strait$ è la spina dorsale del nostro commercio marittimo. Controllando questo stretto vitale, convogliamo la ricchezza delle nazioni nei nostri porti e ci affermiamo come guardiani senza rivali del commercio est-ovest." #OLD ITA
 control_the_malacca_strait_desc: "The narrow $inner_strait_malacca$ is the backbone of our maritime commerce. By controlling this vital strait, we channel the wealth of nations into our harbors and establish ourselves as the unrivaled gatekeepers of the east-west trade." #NEW
 #control_the_malacca_strait_desc: "The narrow $inner_malacca_strait$ is the backbone of our maritime commerce. By controlling this vital strait, we channel the wealth of nations into our harbors and establish ourselves as the unrivaled gatekeepers of the east-west trade." #OLD ENG

 shahbandar: "Il Sistema Shāhbandar"
 shahbandar_desc: "Per gestire il vasto flusso di mercanti che arrivano nei nostri porti, nominiamo uno Shāhbandar come autorità incaricata di supervisionare le dogane, risolvere le controversie e organizzare i quartieri stranieri. Questo ufficio porta ordine nel nostro vivace centro commerciale e rafforzerà il nostro ruolo di crocevia dei mari."

#Malaya Formable
 
 settle_the_islands: "Colonizza le Isole"
 settle_the_islands_desc: "Tra le isole sparse della nostra patria si trovano innumerevoli coste che attendono il nostro tocco. Rafforzando la nostra presenza tra queste isole, assicuriamo la ricchezza del nostro popolo: nuovi scambi commerciali, nuovi raccolti e nuove comunità legate dalle onde che ci uniscono."


 people_of_the_sea: "Il Popolo del Mare"
 people_of_the_sea_desc: "Siamo un popolo plasmato dal vento e dalle maree. Fin dall'infanzia impariamo a conoscere i monsoni, il ritmo dello stretto e il richiamo dell'oceano aperto. I nostri marinai portano con sé questa conoscenza in ogni viaggio, guadagnandosi la fama in tutto l'arcipelago per il loro coraggio e la loro maestria."

 expert_hagglers: "Contrattatori Esperti"
 expert_hagglers_desc: "Ovunque i nostri commercianti approdino, che siano le coste dell'$south_asia$ o i mercati della lontana Cina, sono rispettati per la loro lingua tagliente e il loro acuto giudizio. Navigando con uguale abilità sia i mari che i negoziati, garantiscono che i nostri scambi commerciali non siano mai svantaggiosi."

 malay_merchants_in_every_port: "Mercanti Malesi in Ogni Porto"
 malay_merchants_in_every_port_desc: "Dai bazar dell'$arabia_region$ ai porti dell'$east_asia$, i nostri mercanti sono una presenza familiare. La loro presenza forma una vasta rete di cooperazione, facilitando la creazione delle nostre enclavi all'estero ed estendendo la nostra influenza in tutti i grandi centri commerciali del mondo."

 agreements_sea_nomads: "Accordi con i Nomadi del Mare"
 agreements_sea_nomads_desc: "I $sama_culture$ e altri popoli nomadi del mare vivono da tempo sull'acqua stessa, navigando tra le isole con abilità senza pari. Attraverso la condivisione delle conoscenze o accordi di reciproco rispetto e opportunità condivise, garantiremo un passaggio sicuro e riparazioni rapide."

 masters_of_spice: "Maestri delle Spezie"
 masters_of_spice_desc: "Il commercio dei chiodi di garofano è fonte di grande ricchezza per noi e per il nostro popolo. Proteggendo le terre e i mari da cui provengono queste spezie, siamo al centro di un commercio che abbraccia il mondo intero, e nessun mercante può ignorare il fascino di questi prodotti."

#Sokoto Formable
 sko_fulani_expansion: "Espansione di Sokoto"
 sko_fulani_expansion_desc: "Per troppo tempo il popolo dell'$west_africa$ ha lavorato sotto governanti che, pur professandosi giusti, si abbandonavano al sincretismo. Ora basta! La nostra bandiera sventolerà sempre sopra quella dei regni mondani!"

 sko_recruit_the_faithful: "Recluta i Fedeli"
 sko_recruit_the_faithful_desc: "Chiunque sia pronto a servire sotto i nostri leader giusti deve essere accolto, indipendentemente dalla propria origine."

 sko_education_for_all: "Studiosi Eruditi"
 sko_education_for_all_desc: "Incoraggiando la diffusione dell'alfabetizzazione e dell'istruzione sia tra gli uomini che tra le donne, possiamo far progredire la nostra società e rafforzare il nostro controllo sulle nostre terre. La famiglia dei nostri governanti deve occupare un posto speciale in questi sforzi, fungendo da modello da emulare."

 sko_religious_court: "Corte Più Religiosa"
 sko_religious_court_desc: "Anziché ostentare lo sfarzo mondano del nostro potere, la nostra corte dovrebbe concentrarsi sulle questioni spirituali. Invitando eminenti personalità religiose a insegnare nella nostra capitale, potremo dimostrare il nostro sincero impegno nei confronti della fede."

 sko_recruit_fulani_generals: "Recluta Comandanti $fulbe$"
 sko_recruit_fulani_generals_desc: "Il popolo $fulbe$ è composto da guerrieri illustri, che ricoprono ruoli di comando in ogni angolo dell'$west_africa$. Dovremmo affermarci come datore di lavoro permanente per i loro comandanti più capaci."

 sko_one_people_in_faith: "Unificazione nella Fede"
 sko_one_people_in_faith_desc: "Le nostre terre ospitano molte persone di culture e lingue diverse. Dobbiamo sottolineare la nostra fede come forza unificante, che riunisce tutte le persone sotto un'unica bandiera."
 
 #Italy Formable Advances
 ita_birthplace_of_the_renaissance: "Continuazione del Rinascimento"
 ita_birthplace_of_the_renaissance_desc: "L'$italy_region$ ha visto un grande afflusso di menti brillanti. Che si tratti di artisti itineranti che vengono qui per fare fortuna o della nostra gente ispirata a partecipare a questa grande rinascita delle arti, le nostre città sembrano traboccare di intelletti capaci. Con il nostro patrocinio, continueremo sicuramente ad attrarre persone di talento nella nostra cultura."

 ita_connect_the_interior: "Collegare l'Interno"
 ita_connect_the_interior_desc: "Mentre il terreno delle nostre terre consente trasporti rapidi e spostamenti lungo la costa, l'interno della penisola italiana è molto più difficile da attraversare in molti punti. Collegare non solo le località interne, ma anche le coste tra loro, garantirà operazioni commerciali più agevoli e una maggiore manovrabilità delle nostre truppe."

 ita_increased_recruitment: "Un Bene Prezioso"
 ita_increased_recruitment_desc: "L'$italy_region$ è un bene ambito da molti sovrani stranieri. Se vogliamo difendere il nostro Paese, dobbiamo ampliare il reclutamento sia per le nostre forze terrestri che per quelle marittime. Poiché l'$italy_region$ è vulnerabile alle invasioni sia attraverso i passi alpini che lungo la nostra vasta costa, dobbiamo garantire che l'esercito e la marina siano ben preparati ad affrontare qualsiasi conquistatore che cerchi di turbare la pace della penisola."

 ita_influence_over_the_clergy: "Clero Influente"
 ita_influence_over_the_clergy_desc: "Grazie alla sua vicinanza alla $papacy_reform$, l'$italy_region$ vanta una lunga tradizione di ecclesiastici potenti e di talento al servizio della fede. Indipendentemente da dove ci porteranno le questioni religiose, dovremmo mantenere buoni rapporti con il nostro clero."

 ita_enduring_hardship: "Le Difficoltà della Guerra"
 ita_enduring_hardship_desc: "Gli interessi stranieri in $italy_region$ hanno più volte trasformato le nostre terre nel campo di battaglia di paesi più potenti. Sostenere la nostra popolazione in questi momenti di difficoltà è un compito arduo. Creare luoghi sicuri dove rifugiare la popolazione durante i conflitti garantirà il loro sostegno anche durante le guerre più terribili."

 ita_flourishing_urban_centers: "Città Fiorenti"
 ita_flourishing_urban_centers_desc: "Le nostre terre sono benedette da molte aree altamente urbanizzate. Questo non solo ci offre ampie opportunità per la produzione di beni, ma i loro collegamenti commerciali ci consentono anche di spedirli sui mercati esteri a nostro vantaggio. Eliminare qualsiasi ostacolo all'espansione di queste industrie garantirà il loro continuo successo."

 ita_attractive_migration: "Paesaggio Affascinante"
 ita_attractive_migration_desc: "La terra fertile e mite della nostra penisola è una meta molto ambita dalle persone provenienti dai paesi confinanti che cercano fortuna. Sebbene molte delle nostre città facciano già affidamento sulla manodopera dei migranti stagionali, dovremmo intensificare i nostri sforzi per far sì che queste persone si stabiliscano definitivamente nelle nostre terre."
 kol_peace_in_the_city: "Peace in the City" #NEW
 kol_peace_in_the_city_desc: "Not so long ago, our city was nearly torn apart in the struggle between our burghers and our clergy. We must ensure that this conflict cannot repeat itself, and that every member of both our court and the city council cooperate in preserving Cologne as a central hub on the Rhine." #NEW
 kol_school_of_painting: "Cologne School of Painting" #NEW
 kol_school_of_painting_desc: "Our city is home to many capable painters and craftsmen skilled in the art of bringing images to life through the media of wood, stone, and especially glass. With the support of a strongly established artists' guild, they will thrive under our sponsorship and illuminate our city to new glory." #NEW
 tri_balance_the_landstande: "Balance the Landstände" #NEW
 tri_balance_the_landstande_desc: "Our territory is both home to many urban areas and castles of many imperial knights. Balancing them and their often opposing interests is no easy task. Only if they cooperate with us and the cathedral chapter, we can ensure the functionality of our government." #NEW
 hes_form_the_militia_army: "Professional Army Core" #NEW
 hes_form_the_militia_army_desc: "Our strategic position within the Empire makes us an attractive staging ground for other princes' armies whenever outside threats arise. However, hosting foreign troops hurts our finances. To prevent this costly burden, we must raise our own troops and put them into service of the Empire." #NEW
 noble_society_baden_palatine: "Society with the Donkey" #NEW
 noble_society_baden_palatine_desc: "Founded to protect knightly interests within the Empire, the #italic Gesellschaft mit dem Esel#! has entrenched itself in the lands surrounding $heidelberg$. Their expertise in governance, as well as their ability to sponsor tourneys, will improve our cultural standing." #NEW
 noble_society_nassau: "Society with the Lion" #NEW
 noble_society_nassau_desc: "Founded in the woes of the $western_schism$, the #italic Löwenbund#! is sworn to protect our lands from heretical revolts. We should grant them our official sponsorship and incorporate them into our court to further our cause." #NEW
 noble_society_mainz: "Bengler Society" #NEW
 noble_society_mainz_desc: "The #italic Klüppelgesellschaft#! has been founded by a group of knights concerned about the erosion of our power within the Holy Roman Empire. It would be wise of us to sponsor those willing to fight for our status." #NEW
 noble_society_franconia: "Fürspang Society" #NEW
 noble_society_franconia_desc: "The #italic Gesellschaft mit dem Fürspang#! is an order of knights formed to defend their interests and provide assistance to those who sponsor them. Providing them with extensive funds will grant us significantly more political prowess within our region and within the Holy Roman Empire." #NEW
 noble_society_tyrol: "Elefantenbund" #NEW
 noble_society_tyrol_desc: "Our lands are at risk of invasion from hostile neighbors, who desire the riches of our valleys. Creating and funding an order of knights, ready to defend our lands, allows us to draw on greater forces if the need ever arises." #NEW
 noble_society_cologne: "Order of Saint Hubert" #NEW
 noble_society_cologne_desc: "The #italic Hubertusorden#! will serve as a glorious reminder of our knights prowess in combat! The order will be a reward for our loyal knights, and its members will show our glory for all to see." #NEW
