 power_projection_advance_6: "Ambizioni Globali"
 #power_projection_advance_6_desc: "Il consolidamento dei paesi in entità più grandi ha portato alla formazione di grandi potenze che dominano gran parte dei loro continenti e hanno tutte l'intenzione di estendere ulteriormente il loro potere." #OLD ITA
 power_projection_advance_6_desc: "Consolidation of countries into bigger nations has resulted in the formation of major powers that dominate huge portions of their homelands, and have every intention of extending their power even further." #NEW
 #power_projection_advance_6_desc: "The consolidation of countries into bigger ones has resulted in the formation of major powers that dominate great parts of their continents, and have all the intention of extending their power even further." #OLD ENG
 enlightened_court: "Corte Illuminata"
 #enlightened_court_desc: "I valori dell'Illuminismo sono sempre presenti in qualsiasi corte moderna e con essi arriva la presenza delle persone più intellettuali e preparate. Grazie a ciò, oggi è possibile ottenere molto di più con molto meno." #OLD ITA
 enlightened_court_desc: "The values of the Enlightenment are ever-present in any modern court, and with them comes the presence of the most intellectual and learned people. Thanks to these illustrious and enlightened courtiers, much more can now be achieved with far less effort." #NEW
 #enlightened_court_desc: "The values of the Enlightenment are ever present in any modern court, and with them comes the presence of the most intellectual and prepared people. Thanks to that, much more can be achieved now with far less." #OLD ENG
 government_size_revolutions: "Rappresentazione Moderna"
 #government_size_revolutions_desc: "Grazie all'istituzione di varie forme di rappresentanza più efficace per il popolo, il governo è in grado di affrontare adeguatamente un numero di questioni mai visto prima." #OLD ITA
 government_size_revolutions_desc: "With the establishment of official forms of popular representation, the government is better able to address important issues than ever before." #NEW
 #government_size_revolutions_desc: "Via the establishment of various forms of better representation for the people, the government is able to properly address more issues than ever before." #OLD ENG
 global_supply_limit_modifier_advance_6: "Pianificazione Logistica della Campagna"
 #global_supply_limit_modifier_advance_6_desc: "La pianificazione della logistica bellica è diventata sempre più complessa, poiché la loro crescita in termini di dimensioni ha reso possibile schierare più eserciti per campagne a lungo termine, coinvolgendo centinaia di migliaia di soldati per diversi anni." #OLD ITA
 global_supply_limit_modifier_advance_6_desc: "Planning the logistics of warfare has become increasingly complex, as the growth in average army size has made it possible to field several armies at once for long-term campaigns, involving hundreds of thousands of soldiers for multiple years." #NEW
 #global_supply_limit_modifier_advance_6_desc: "Planning the logistics of warfare has become increasingly complex, as their growth in size has made it possible to field multiple armies for long-term campaigns, involving hundreds of thousands of soldiers for multiple years." #OLD ENG
 rgo_size_advance_revolutions: "Motore a Vapore"
 #rgo_size_advance_revolutions_desc: "Il potere del vapore come mezzo per alimentare una macchina è noto fin dall'antichità. Tuttavia, il suo potenziale non era mai stato pienamente realizzato fino a poco tempo fa, quando i recenti progressi nella fisica e nella matematica hanno permesso la creazione di motori a vapore più sofisticati, in grado di alimentare macchine più complesse. Ciò consente una produttività molto maggiore in tutti i campi." #OLD ITA
 rgo_size_advance_revolutions_desc: "Steam as a means to power a machine has been understood since antiquity. However, its potential had never been fully realized until recently, when the latest advances in physics and mathematics allowed the creation of more sophisticated steam engines, which in turn can power more complex machines. This allows for increased productivity in all fields." #NEW
 #rgo_size_advance_revolutions_desc: "The power of steam as a means to power a machine has been known since Antiquity. However, its potential had never been fully realized until recently, when the latest advances in physics and mathematics have allowed the creation of more sophisticated steam engines, which in turn can power more complex machines. This allows for much greater productivity in all fields." #OLD ENG
 military_tactics_advance_6: "Artiglieria da Campo"
 #military_tactics_advance_6_desc: "Poiché l'artiglieria è in grado di accompagnare il resto dell'esercito sul campo di battaglia, la sua influenza non è più limitata a ciò che si trova nel suo raggio di tiro. Le formazioni di artiglieria semi-autonome guidate da ufficiali di artiglieria possono invece essere schierate dove sono più necessarie." #OLD ITA
 military_tactics_advance_6_desc: "With artillery being mobile enough to accompany the rest of the army on the battlefield, its influence is no longer limited to whatever is in firing range. Semi-autonomous artillery formations led by artillery officers can instead be deployed where they are most needed." #NEW
 #military_tactics_advance_6_desc: "With artillery being able to accompany the rest of the army on the battlefield, no longer is its influence limited to that which is within its firing range. Semi-autonomous artillery formations led by artillery officers can instead be deployed where they are most needed." #OLD ENG
 road_advance_2: "Strade di Base"
 #road_advance_2_desc: "Le reti stradali rudimentali hanno lasciato il posto alla necessità di migliorare i nostri sistemi di trasporto. Ampliando le nostre strade, amplieremo la circolazione delle merci all'interno del nostro territorio." #OLD ITA
 road_advance_2_desc: "We have constructed rudimentary road networks, but those are quickly showing us why we need to advance our transportation systems. By expanding our road network, we will be able to circulate goods within our territory more easily." #NEW
 #road_advance_2_desc: "Rudimentary road networks have given way to the need to advance our transportation systems. By expanding our roads, we will broaden the circulation of goods within our territory" #OLD ENG
 written_alphabet: "Alfabeto Scritto"
 #written_alphabet_desc: "Un popolo è la somma della propria eredità e, in quanto tale, un alfabeto scritto non è che il primo passo per rivendicare l'immortalità e educare una società ben funzionante." #OLD ITA
 written_alphabet_desc: "What is a society but the sum of its legacy? A written alphabet, therefore, is but the first step towards immortalizing our culture, as well as the foundation of building an educated, well-functioning society." #NEW
 #written_alphabet_desc: "A people are the sum of their legacy and as such, a written alphabet is but the first step to claiming immortality and educating a well-functioning society." #OLD ENG
 codified_laws: "Leggi Codificate"
 #codified_laws_desc: "Le leggi e i regolamenti sono la linfa vitale di una società ben funzionante. Se vogliamo affinare la nostra efficienza e le nostre capacità interne, è fondamentale disporre di un insieme di leggi codificate solide." #OLD ITA
 codified_laws_desc: "Statutes and regulations are the backbone of any well-functioning society. If we are to hone our efficiency and internal capabilities, a set of robust codified laws is of vital importance." #NEW
 #codified_laws_desc: "Statutes and regulations are the lifeblood of a well-functioning society. If we are to hone our efficiency and internal capabilities, a set of robust codified laws are of vital importance." #OLD ENG
 taxation_advance: "Tassazione"
 #taxation_advance_desc: "Operare in una società civile implica il mantenimento di un'autorità centrale. Riscuotendo le tasse dai nostri sudditi e cittadini, potremo operare facilmente in modo produttivo." #OLD ITA
 taxation_advance_desc: "Operating a civilized society implies the maintenance of a central authority, and that authority must be supported through some form of currency. By extracting taxes from our subjects and citizens, we will be more productive and better able to achieve great things for our people." #NEW
 #taxation_advance_desc: "Operating in a civilized society implies the maintenance of a central authority. By extracting taxes from our subjects and citizens, we will easily operate in a productive manner." #OLD ENG
 state_administration_advance: "Amministrazione Statale"
 #state_administration_advance_desc: "La tassazione della nostra popolazione è fattibile solo se sappiamo chi vive dove e quali leggi e usanze locali si applicano alla popolazione. Pertanto, è necessario introdurre un sistema per amministrare il regno." #OLD ITA
 state_administration_advance_desc: "Taxing our population is only feasible as long as we know who lives where and what local customs and laws apply to each person. We must establish a comprehensive administration to properly manage our realm." #NEW
 #state_administration_advance_desc: "Taxation of our population is only as feasible as long as we know who lives where and what local customs and laws apply to the populace. As such, the introduction of a system to administrate the realm is necessary." #OLD ENG
 agriculture_advance: "Agricoltura"
 #agriculture_advance_desc: "La terra è una delle maggiori fonti di ricchezza, benessere e prodotti. Per far progredire la nostra società, nutrire la nostra popolazione e prosperare, dobbiamo imparare a sfruttarla." #OLD ITA
 agriculture_advance_desc: "The land is generous, and provides us with abundant crops and resources. But in order to advance our society and become a prosperous nation, we must learn how to shape and tame the land, and to extract the best possible treasures from it." #NEW
 #agriculture_advance_desc: "The land is one of the greatest sources of wealth, affluence, and products. In order to advance our society, feed our people, and prosper we must learn how to harness it." #OLD ENG
 city_building_advance: "Costruzione Urbana"
 #city_building_advance_desc: "Lo sviluppo dei centri urbani è al centro del movimento di urbanizzazione, che mira a costruire grandi complessi di edifici complessi." #OLD ITA
 city_building_advance_desc: "Developing our urban centers has become central to national prosperity, and is a cornerstone of the urbanization movement. By systematically constructing infrastructure and specialized buildings within our cities, we will fuel our economic growth." #NEW
 #city_building_advance_desc: "The development of city centers lies within the heart of the urbanization movement, aimed at erecting large sprawls of intricate buildings." #OLD ENG
 road_building: "Costruzione Stradale"
 #road_building_desc: "Il trasporto di merci, truppe e persone è fondamentale per la nostra sopravvivenza. Sviluppando la forma più elementare di rete stradale, saremo in grado almeno di collegare la nostra popolazione e di assisterla nelle sue attività quotidiane." #OLD ITA
 road_building_desc: "The transportation of goods, troops, and people is vital to our nation's survival. By developing a basic road network, we will be able to at least connect our people and assist them in their daily endeavors." #NEW
 #road_building_desc: "The transportation of goods, troops, and people is vital to our survival. By developing the most basic form of a road network, we will be able to at least connect our people and assist their daily endeavors." #OLD ENG
 #ship_building_advance: "Costruzione Navale" #OLD ITA
 ship_building_advance: "Shipbuilding" #NEW
 #ship_building_advance: "Ship Building" #OLD ENG
 #ship_building_advance_desc: "I mari racchiudono molte avventure, grandi ricchezze e opportunità commerciali ed espansionistiche." #OLD ITA
 ship_building_advance_desc: "The seas hold many adventures, much wealth, and commercial — as well as expansionist — opportunities." #NEW
 #ship_building_advance_desc: "The seas hold many adventures, much wealth, and commercial as well as expansionist opportunities." #OLD ENG
 mapmaking: "Cartografia"
 #mapmaking_desc: "Disegnare luoghi o paesi su un foglio di carta o su una pergamena è molto più che arte, significa raccogliere informazioni da utilizzare a fini strategici. Conoscendo la posizione dei luoghi, non solo possiamo coordinare meglio gli attacchi, ma anche acquisire una maggiore conoscenza del nostro territorio. Come dicevano gli anziani, la conoscenza è potere." #OLD ITA
 mapmaking_desc: "Accurately drawing the borders and landmarks of a country is much more than art — it helps us collect information about other nations for strategic purposes. By knowing where important places are exactly, we can not only better coordinate attacks, but also gain more knowledge about our own territory. As the elders often say, knowledge is power." #NEW
 #mapmaking_desc: "Drawing places or countries on a paper or a scroll is much more than art, it is about collecting information in them for strategic use. By knowing where places are, we can not only better coordinate attacks but also give us better knowledge of our own territory. As the elders said, knowledge is power." #OLD ENG
 standardized_coins: "Monete Standardizzate"
 #standardized_coins_desc: "Con la creazione della ricchezza, compaiono sempre più zecche. Sebbene abbiamo convissuto per anni con molti tipi di valute, è necessario stabilire nuovi standard per evitare frodi causate dall'uso di quantità inferiori di metalli preziosi o dalla raschiatura dei bordi delle monete." #OLD ITA
 standardized_coins_desc: "As wealth is created, more and more mints appear. While we have lived with many different currencies for years, official standards have to be set in order to avoid fraud caused by using lesser quantities of precious metals, or by rasping the edges of those coins." #NEW
 #standardized_coins_desc: "As wealth is created, more and more mints appear. While we have lived with many types of currencies for years, new standards have to be set in order to avoid fraud caused by using lesser quantities of noble metals or by rasping the edges of those coins." #OLD ENG
 humanism_ideas: "Umanesimo"
 #humanism_ideas_desc: "Ponendo l'essere umano al centro di tutto, accettiamo il nostro dovere di perseguire l'ignoto e di usare l'intelligenza che ci è stata donata per svelare i segreti del nostro mondo. Educando gli individui, garantiamo loro la libertà, il libero arbitrio e la responsabilità delle proprie azioni. Useremo la conoscenza degli antichi per progredire ulteriormente come esseri umani e imparare dai loro successi e dai loro fallimenti." #OLD ITA
 humanism_ideas_desc: "By considering humanity to be the center of everything, we accept our obligation to chase the unknown and to use the intelligence given to us to unveil the secrets of our world. By educating our people, we ensure their freedoms, their free will, and ownership of their own acts. We will use ancient knowledge to further human advancement, and learn equally from the successes and failures of our ancestors." #NEW
 #humanism_ideas_desc: "By putting humans as the center of everything, we accept our obligation to chase the unknown and use the intelligence given to us to unveil the secrets of our world. By educating the individuals, we ensure their freedoms, their free will, and ownership of their own acts. We will use the knowledge of the ancient to further advance as humans and learn from their successes and failures." #OLD ENG
 legalism_advance: "Legalismo"
 #legalism_advance_desc: "Le leggi e le regole non hanno alcun significato se non vengono raccolte, standardizzate e rese comprensibili a tutti i membri della nostra società. Se le applichiamo, il principio di libertà e giustizia raggiungerà anche gli angoli più remoti del nostro regno." #OLD ITA
 legalism_advance_desc: "Laws and rules mean nothing if they are not compiled, standardized, and made understandable to every member of our society. By codifying clear legal standards and enforcing them uniformly, we will ensure that the principles of order and justice reach the furthest corners of our realm." #NEW
 #legalism_advance_desc: "Laws and rules mean nothing if they are not compiled, standardized, and overall made understandable by the members of our society. Should we enforce them, the rule of freedom and justice will reach the furthest corners of our realm." #OLD ENG
 meritocracy_advance: "Meritocrazia"
 #meritocracy_advance_desc: "Il merito non è esclusivo delle classi più elevate della nostra società, ma può essere trovato ovunque, anche tra le persone più umili. Creando esami standardizzati che misurano questo merito, l'impegno e la competenza complessiva, possiamo trovare quei gioielli nascosti in bella vista per un futuro migliore della nostra nazione." #OLD ITA
 meritocracy_advance_desc: "Merit is not exclusive to the upper echelons of our society. It can be found everywhere, even among the humblest individuals. By creating standardized exams that measure this merit, effort, and overall competency, we can find intellectual jewels hidden in plain sight, and properly appoint them for the betterment of our nation." #NEW
 #meritocracy_advance_desc: "Merit is not exclusive of the upper echelons of our society, but can be found everywhere, even among the humblest individual. By creating standardized exams that measure this merit, effort, and overall competency, we can find those jewels hidden in plain sight for the better future of our nation." #OLD ENG
 cathedral_advance: "Cattedrale"
 #cathedral_advance_desc: "Una Cattedrale è il tempio Cristiano più grande e importante che esista, dove il Vescovo ha la sua cattedra o sede. Mentre una Chiesa può essere bella e ricca di dettagli, una Cattedrale è maestosa, di dimensioni enormi e con dettagli raffinati in ogni angolo." #OLD ITA
 cathedral_advance_desc: "A cathedral is one of the largest and most important types of $christian_ADJ$ temple, where the Bishop has a #italic cathedra#!, or seat. While a church can be beautiful and detailed, a cathedral is majestic, of enormous dimensions, and adorned with the finest and most intricate details." #NEW
 #cathedral_advance_desc: "A Cathedral is the biggest and most important Christian temple that there is, where the Bishop has his cathedra or seat. While a Church can be beautiful and detailed, a Cathedral is majestic, of enormous dimensions, and with the finest details in every corner." #OLD ENG

 infiltrate_administration: "[infiltrate_administration|e]"
 supportrebels: "[support_rebels|e]"

 infiltrate_administration_advance: "Infiltrarsi nell'Amministrazione"
 infiltrate_administration_advance_desc: "I conflitti con altri stati non si combattono solo sul campo di battaglia, ma anche nell'ombra. Conoscere la prossima mossa del nemico è una risorsa inestimabile per vincere le guerre. Pertanto, le nostre spie saranno specializzate nell'infiltrazione dell'amministrazione di uno Stato e ci trasmetteranno qualsiasi tipo di informazione.
 newspapers_advance: "Giornali"
 #newspapers_advance_desc: "Il concetto di annunci tramite tavole o fogli affissi in luoghi pubblici non è nuovo. Tuttavia, con la diffusione della $printing_press$ in tutto il mondo, cresce anche la necessità di informazioni accessibili su politica, esercito ed economia. Il giornale - una pubblicazione periodica che descrive gli eventi di attualità - soddisfa questa esigenza." #OLD ITA
 newspapers_advance_desc: "The concept of announcements being announced or posted where the public may read them is certainly not a new one. However, as the $printing_press$ becomes more popular around the world, so does the demand for accessible information about politics, war, and the economy. The newspaper - a periodical publication describing current events - shall satisfy this demand." #NEW
 #newspapers_advance_desc: "The concept of announcements via tablets or sheets posted in the public is not a new one. However, as the $printing_press$ spreads throughout the world, so does the need for accessible information about politics, military and economy. The newspaper - a periodical publication describing current events - shall satisfy this demand." #OLD ENG
 feudal_de_jure_law_advance: "$feudal_de_jure_law$"
 #feudal_de_jure_law_advance_desc: "#italic De Jure#! - 'secondo la legge' - è una descrizione di pratiche legalmente riconosciute indipendentemente dalla realtà della loro applicazione. I sistemi di una società feudale sono costruiti proprio su questo concetto." #OLD ITA
 feudal_de_jure_law_advance_desc: "#italic De jure#! - 'by law' - is a description of legally acknowledged practices regardless of the reality of its practice. The systems of a feudal society are built on this very concept." #NEW
 #feudal_de_jure_law_advance_desc: "#italic De Jure#! - 'by law' - is a description of legally acknowledged practices regardless of the reality of its practice. The systems of a Feudal Society are built on this very concept." #OLD ENG
 semi_salic_law_advance: "$semi_salic_law$"
 #semi_salic_law_advance_desc: "In base alla $salic_law$, solo gli uomini possono ereditare il trono. Tale pratica comporta un problema fatale nel momento in cui la linea maschile si estingue e la monarchia entra in una crisi di successione. Per evitarlo, il diritto delle donne sarà esteso in modo da renderle idonee all'eredità qualora non esistano eredi maschi idonei." #OLD ITA
 semi_salic_law_advance_desc: "By the right of the $salic_law$, only men are allowed to inherit the throne. This practice leads to a succession crisis in cases where the male bloodline dies out, and the monarchy gets thrown into chaos. In order to avoid such disturbances, the rights of women shall be expanded to include eligibility to rule the nation, should no suitable male heir exist." #NEW
 #semi_salic_law_advance_desc: "By the right of the $salic_law$, only men are allowed to inherit the throne. Such practice runs into a fatal issue once the male bloodline dies out, and the monarchy gets thrown into a succession crisis. In order to avoid it, the right of the women shall be expanded to be eligible for inheritance should no suitable male heir exist." #OLD ENG
 republican_foundation_law_advance: "$republican_foundation_law$"
 republican_foundation_law_advance_desc: "$republican_foundation_law_desc$"
 republican_election_law_advance: "$republican_election_law$"
 republican_election_law_advance_desc: "$republican_election_law_desc$"
 republican_electorate_law_advance: "$republican_electorate_law$"
 republican_electorate_law_advance_desc: "$republican_electorate_law_desc$"
 republican_power_law_advance: "$republican_power_law$"
 republican_power_law_advance_desc: "$republican_power_law_desc$"

 principle_of_administration_law_advance: "Principio del Diritto Amministrativo"
 #principle_of_administration_law_advance_desc: "La naturale evoluzione della nostra complessa amministrazione impone l'adozione di nuove leggi che riguardano la nostra amministrazione." #OLD ITA
 principle_of_administration_law_advance_desc: "The natural evolution of our complex government dictates the adoption of new laws pertaining to our administration." #NEW
 #principle_of_administration_law_advance_desc: "The natural evolution of our intricate administration dictates the adoption of new laws that pertain to our administration." #OLD ENG
 monarchy_reform_traditions_advance: "Tradizioni di Riforma Monarchica"
 #monarchy_reform_traditions_advance_desc: "Il potere non può essere affidato a qualsiasi individuo all'interno del regno. Concentrando l'influenza nelle mani del sovrano, l'ordine e la stabilità saranno mantenuti sotto una corona potente." #OLD ITA
 monarchy_reform_traditions_advance_desc: "Authority cannot be entrusted to just any individual. Concentrating power and influence in the hands of the ruler will help them create order and stability throughout the realm." #NEW
 #monarchy_reform_traditions_advance_desc: "Power cannot be trusted to just about any individual within the realm. By concentrating influence at the hands of the ruler, order and stability will be maintained under a powerful crown." #OLD ENG
 republic_reform_traditions_advance: "Tradizioni di Riforma Repubblicana"
 #republic_reform_traditions_advance_desc: "La diffusione del potere è un principio fondamentale in una repubblica sana. Leggi solide che regolano le elezioni a sorteggio garantiranno stabilità e riduzione della corruzione." #OLD ITA
 republic_reform_traditions_advance_desc: "Dissemination of power is a cornerstone belief of any healthy republic. Robust laws enforcing elections by lottery will ensure stability and reduce corruption." #NEW
 #republic_reform_traditions_advance_desc: "The dissemination of power is a cornerstone belief in a healthy republic. Robust laws that dictate lottery elections will ensure stability and reduction in corruption." #OLD ENG
 blockade_tactics: "Tattiche di Blocco"
 #blockade_tactics_desc: "L'impiego di formazioni adeguate e pattugliamenti al largo delle coste dei porti nemici aumenterà la nostra efficienza nel tagliare le loro linee di rifornimento, abbreviando gli assedi." #OLD ITA
 blockade_tactics_desc: "Employing effective formations and patrols near enemy ports will make it easier for us to cut off their supply lines, shortening sieges." #NEW
 #blockade_tactics_desc: "Employing proper formations and patrols off the coast of enemy ports will increase our efficiency to cut off their supply lines, shortening sieges." #OLD ENG
 recovery_efforts: "Sforzi di Recupero"
 #recovery_efforts_desc: "La guerra è una padrona crudele che non lascia dietro di sé altro che rovine e devastazione. Concentrando i nostri sforzi e aiutando il nostro popolo, possiamo accelerare la ripresa in tutto il regno." #OLD ITA
 recovery_efforts_desc: "War is a cruel mistress that leaves behind naught but wreckage and devastation. By concentrating our efforts on assisting our people as they return to ordinary life after so much horror, we can hasten recovery across the realm." #NEW
 #recovery_efforts_desc: "War is a cruel mistress that leaves behind naught but wrecks and devastation. By concentrating our efforts and assisting our people, we can speed up recovery across the realm." #OLD ENG
 naval_initiative_ren: "Tattiche di Dispiegamento"
 #naval_initiative_ren_desc: "È vero che la vittoria si ottiene prendendo l'iniziativa e mobilitando rapidamente le forze. Lo studio e l'attuazione di tattiche di dispiegamento consentiranno proprio questo." #OLD ITA
 naval_initiative_ren_desc: "It is true that victory often comes to those who draw first blood. Exhaustive study and effective implementation of deployment tactics will permit us to mobilize quickly and take initiative in combat situations, helping us achieve that victory." #NEW
 #naval_initiative_ren_desc: "It is true that victory comes through means of taking initiative and mobilizing fast. The study and implementation of deployment tactics will achieve exactly that." #OLD ENG
 army_initiative_ren: "Primo Colpo"
 #army_initiative_ren_desc: "L'elemento sorpresa, combinato con il primo attacco, determinerà talvolta il vincitore in un conflitto. Garantire la nostra iniziativa militare è un ottimo modo per mantenere un vantaggio competitivo." #OLD ITA
 army_initiative_ren_desc: "The element of surprise, combined with landing the first strike, often determines the ultimate victor in an armed conflict. Boosting our military initiative is an excellent way to maintain a competitive advantage." #NEW
 #army_initiative_ren_desc: "The element of surprise in combination with the first strike will, at times, determine the victor in a conflict. Ensuring our military initiative is a great way to maintain a competitive advantage." #OLD ENG
 
 law_making_renaissance: "Controllo Giuridico"
 #law_making_renaissance_desc: "I nuovi tempi comportano nuove situazioni e non sempre le leggi che sono state tradizionalmente applicate per generazioni saranno applicabili ai nuovi contesti. Abbiamo bisogno di un continuo esame e revisione delle nostre leggi, in modo da poterle adattare ai tempi attuali." #OLD ITA
 law_making_renaissance_desc: "New times mean new situations, and the laws that have been in place for generations may not be applicable to these new contexts. We should assign legal experts to continuously scrutinize and revise our laws, so that we can adapt them to our current times and needs." #NEW
 #law_making_renaissance_desc: "New times mean new situations, and not always will the laws that had been traditionally used for generations be applicable to the new contexts. We need to have a continuous scrutiny and revision of our laws, so that we can keep adapting them to our current times." #OLD ENG
 #subject_integration: "Consolidamento dei Titoli" #OLD ITA
 subject_integration: "Consolidation of Titles" #NEW
 #subject_integration: "Titles Consolidation" #OLD ENG
 #subject_integration_desc: "Sebbene avere molti paesi al nostro servizio possa avere i suoi vantaggi, solo riunendo realmente i loro diversi titoli sotto il nostro potremo trarre effettivamente beneficio dalle loro terre. Alla fine, è chiaro che un sovrano con un solo titolo impallidirà al confronto con noi, che abbiamo molti titoli sotto lo stesso sovrano." #OLD ITA
 subject_integration_desc: "Although having many countries serving us can be beneficial, only by gathering their different titles under our own will we be able to best utilize their resources. In the end, it is clear that a ruler with only one title will pale in comparison to us, with our splendid array of impressive-sounding titles." #NEW
 #subject_integration_desc: "Although having many countries serve us can have its own benefits, only by really gathering their different titles under our own will we be able to actually benefit from their land. In the end, it is clear that a ruler with only one title will pale in comparison to us, having many titles under the same ruler." #OLD ENG
 rgo_construction_ren: "Iniziative Infrastrutturali"
 #rgo_construction_ren_desc: "La nostra terra e la nostra gente sono la linfa vitale del nostro Paese. Impegnarci adeguatamente per migliorare le loro infrastrutture non solo porterà benefici a loro, ma ci ripagherà con interessi dieci volte superiori." #OLD ITA
 rgo_construction_ren_desc: "Our country is nothing without its land and its people. Improving the infrastructure of our nation will benefit the common folk as much as it benefits us." #NEW
 #rgo_construction_ren_desc: "Our land and our people are the lifeblood of our country. Giving them the appropriate effort to improve their infrastructure will not only benefit them, but will also return in a benefit for us tenfold." #OLD ENG
 naval_repair_ren: "Giunti più Resistenti"
 #naval_repair_ren_desc: "Tutti sanno che un foro nello scafo di una nave ne causerà inevitabilmente l'affondamento. Grazie a tecniche di costruzione più avanzate, siamo in grado di unire le assi di legno dello scafo in modo più saldo, il che non solo contribuisce a rendere le navi meno soggette a perdite, ma rende anche più facile tappare eventuali fori quando lo scafo viene danneggiato." #OLD ITA
 naval_repair_ren_desc: "Everyone knows that a hole in a ship's hull will inevitably lead to its sinking. With better building techniques, we can build a hull with more tightly jointed planks, making the ships less prone to leakage and holes in the hull much easier to repair." #NEW
 #naval_repair_ren_desc: "Everyone knows that a hole in a ship's hull will undoubtedly lead to its sinking. With better building techniques, we are able to have the wood planks making the hull more tightly jointed, which not only contributes to make the ships less prone to leakage, but also makes it easier to plug any hole when the hull gets damaged." #OLD ENG
 linked_armies_advance: "Trasmissione dei Messaggi"
 #linked_armies_advance_desc: "Il coordinamento tra le diverse unità di un esercito è fondamentale per il suo corretto funzionamento. Disporre di un sistema adeguato per trasmettere i messaggi tra i nostri generali e i loro ufficiali consentirà a tutte le nostre truppe di lavorare in modo più coeso e di rispondere più rapidamente a qualsiasi situazione." #OLD ITA
 linked_armies_advance_desc: "Good coordination between the different units of an army is crucial for it to function well. Having an organized system to relay messages between our generals and their unit officials allows all our troops to work more cohesively and respond faster to any situation." #NEW
 #linked_armies_advance_desc: "Coordination among the different units of an army is crucial for its proper functioning. Having a proper system to relay messages between our generals and their unit officials will allow all our troops to work more cohesively and with a more rapid response to any situation." #OLD ENG
 regular_levy_training: "Istruzioni Designate"
 #regular_levy_training_desc: "Le leve coscritte non sono per definizione le truppe meglio addestrate, ma ciò non significa che dobbiamo mandare in guerra un gruppo di soldati non addestrati. Assegnando loro istruttori adeguati provenienti dalle nostre truppe più esperte, potranno imparare dai migliori, e un periodo di addestramento obbligatorio con loro li renderà degli uomini veri." #OLD ITA
 regular_levy_training_desc: "Levies are by definition not the best-trained troops, but that does not mean that we have to send a bunch of untrained rabble to war. Assigning them proper instructors from our most proficient units will allow them to learn from the best, and a mandatory training period with them will make them ready — and eager — to fight." #NEW
 #regular_levy_training_desc: "Levies are by definition not the best trained of troops, but that does not mean that we have to send a bunch of untrained rabbles to war. Assigning them proper instructors from our most proficient troops will allow them to learn from the best, and a mandatory training period with them will make a man out of them." #OLD ENG
 court_accounting: "Contabilità della Corte"
 court_accounting_desc: "La corte è il simbolo del paese e la sua prosperità deve rappresentare la prosperità dello stato. Tuttavia, ciò non significa che la corte possa spendere più di quanto il paese possa sostenere, e dovrebbe esserci una contabilità adeguata che controlli le spese della corte. 
 
 lead_ore_dressing: "Trattamento del Piombo"
 #lead_ore_dressing_desc: "Attraverso il processo di arricchimento, il Piombo minerale veniva lavato e frantumato per rimuovere le impurità e separare lo stesso dalle rocce, dall'argilla e da altri minerali." #OLD ITA
 lead_ore_dressing_desc: "Through the dressing process, lead ore is washed and crushed to remove impurities and separate the ore from rocks, clay and other minerals." #NEW
 #lead_ore_dressing_desc: "Through the Dressing process the Lead ore was washed and crushed to remove impurities and separate the ore from rocks, clay and other minerals." #OLD ENG
 bole_smelting: "Fusione in Forno Aperto"
 #bole_smelting_desc: "Un metodo in cui il piombo veniva fuso all'aria aperta sfruttando il forte vento costante che soffiava sulla cima di una collina per soffiare aria fresca nel minerale in fusione." #OLD ITA
 bole_smelting_desc: "A method where lead is smelted in the open air using the constant strong winds at the top of hills to blow fresh air into the melting ore." #NEW
 #bole_smelting_desc: "A method where lead was smelted in the open air using the constant strong wind found on the top of a hill to blow fresh air into the melting ore." #OLD ENG
 cupola_smelting: "Cubilotto"
 #cupola_smelting_desc: "Utilizzando un forno a forma di cilindro, questo metodo offre un processo economico ed efficiente per la fusione del ferro, con la capacità unica di consentire una fusione continua." #OLD ITA
 cupola_smelting_desc: "Using a cylinder-shaped furnace, this method provides a cheap and efficient process of smelting iron, with the unique ability of continuous smelting." #NEW
 #cupola_smelting_desc: "Using a cylinder shaped furnace this method provides a cheap and efficient process of smelting iron, with the unique ability of continuous smelting." #OLD ENG
 faster_levy_recruitment: "Formazione Obbligatoria sull'Uso delle Armi"
 #faster_levy_recruitment_desc: "Tutti i contadini maschi devono essere abili nell'uso della lancia o dell'arco e allenarsi regolarmente, in modo da diventare soldati utili nel caso in cui fossero chiamati alle armi." #OLD ITA
 faster_levy_recruitment_desc: "All male peasants are required to be proficient with a spear or bow and to train regularly, so as to be a competent soldier if ever they are called to arms." #NEW
 #faster_levy_recruitment_desc: "All male peasants are required to be proficient with a spear or bow and train regularly, as to become a useful soldier in case they are called to arms." #OLD ENG
 merchant_power_from_maritime_discovery_advance: "Gilde dei Mercanti"
 #merchant_power_from_maritime_discovery_advance_desc: "Le confraternite dei mercanti consentono ai nostri mercanti di organizzarsi, condividere rotte commerciali redditizie e unire le forze quando acquistano e vendono nei mercati esteri." #OLD ITA
 merchant_power_from_maritime_discovery_advance_desc: "The confraternities of merchants allow our traders to organize, share profitable trade route information, and join forces when buying and selling in foreign markets." #NEW
 #merchant_power_from_maritime_discovery_advance_desc: "The confraternities of merchants allow our tradesmen to organize, share profitable trade routes and join forces when buying and selling in foreign markets." #OLD ENG
 merchant_power_from_maritime_reformation_advance: "Compagnie Mercantili"
 #merchant_power_from_maritime_reformation_advance_desc: "L'espansione dei mercati all'estero e le maggiori spese e rischi che ne derivano richiedono la creazione di associazioni di mercanti che condividano l'onere del commercio in queste nuove terre." #OLD ITA
 merchant_power_from_maritime_reformation_advance_desc: "The expansion of markets overseas — and the associated expenses and risks — require the creation of merchant associations that share the burden of trading in these new lands." #NEW
 #merchant_power_from_maritime_reformation_advance_desc: "The expansion of markets overseas and the derived greater expenses and risks, require the creation of merchant associations that share the burden of trading in these new lands." #OLD ENG
 merchant_power_from_maritime_absolutism_advance: "Camera di Commercio"
 #merchant_power_from_maritime_absolutism_advance_desc: "Con l'affermarsi di nuove idee nel campo del commercio e dell'economia, le imprese locali si uniscono per formare una rete commerciale in grado di promuovere i propri interessi e tutelare i propri diritti nei confronti delle entità politiche e delle influenze straniere." #OLD ITA
 merchant_power_from_maritime_absolutism_advance_desc: "With the emergence of new ideas about commerce and economics, the local businesses have joined together to form a business network that can further their interests and protect their rights against political entities and foreign influences." #NEW
 #merchant_power_from_maritime_absolutism_advance_desc: "With the rise of new ideas in commerce and economics the local businesses join together to form a business network that can further their interests and protect their rights against political entities and foreign influences." #OLD ENG
 
 
 paper_guild_fiber_pulp_maintenance_advance: "$paper_guild_fiber_pulp_maintenance$"
 #paper_guild_fiber_pulp_maintenance_advance_desc: ""Grazie all'utilizzo di piante fibrose come la canapa o il gelso da carta, la produzione di carta diventerà ampiamente disponibile in tutto il mondo. Sebbene economica da produrre, questa carta è di scarsa qualità." #OLD ITA
 paper_guild_fiber_pulp_maintenance_advance_desc: "Utilizing fiber plants like hemp or paper mulberry, paper production will become widely available across the world. While cheap to produce, this paper is lacking in quality." #NEW
 #paper_guild_fiber_pulp_maintenance_advance_desc: "Utilizing fiber plants like hemp or paper mulberry, the production of paper will become widely available across the world. While cheap to produce, it is lacking in its quality." #OLD ENG
 paper_guild_cloth_maintenance_advance: "$paper_guild_cloth_maintenance$"
 #paper_guild_cloth_maintenance_advance_desc: "$paper_guild_cloth_maintenance$, realizzato con cotone non idoneo alla lavorazione o all'uso ha stabilito nuovi standard in termini di qualità e durata." #OLD ITA
 paper_guild_cloth_maintenance_advance_desc: "$paper_guild_cloth_maintenance$, made from cotton unfit to be processed or otherwise used, set new standards for quality and durability." #NEW
 #paper_guild_cloth_maintenance_advance_desc: "$paper_guild_cloth_maintenance$, made from cotton unfit to be processed or used cloth set new standards in quality and durability." #OLD ENG
 paper_guild_wood_pulp_maintenance_advance: "$paper_guild_wood_pulp_maintenance$"
 paper_guild_wood_pulp_maintenance_advance_desc: "Utilizzando legno tenero ampiamente disponibile, la produzione della carta sarà più facile ed economica che mai.
 cannon_guild_steel_maintenance_advance: "Cannoni con Canna in Acciaio"
 #cannon_guild_steel_maintenance_advance_desc: "L'uso di cannoni in acciaio consentirà alla nostra artiglieria una maggiore precisione e gittata, senza sacrificare la mobilità." #OLD ITA
 cannon_guild_steel_maintenance_advance_desc: "Using cannons made of steel will give our artillery greater accuracy and range, without sacrificing their mobility." #NEW
 #cannon_guild_steel_maintenance_advance_desc: "Using Cannons made of steel will allow our artillery greater accuracy and range, without sacrificing their mobility." #OLD ENG
 firearms_guild_steel_maintenance_advance: "Armi da Fuoco con Canna in Acciaio"
 #firearms_guild_steel_maintenance_advance_desc: "L'introduzione dell'acciaio nella produzione di armi da fuoco ci consentirà di produrre armi più affidabili in grandi quantità." #OLD ITA
 firearms_guild_steel_maintenance_advance_desc: "Introducing steel into firearms production allows us to produce more reliable guns in higher quantities." #NEW
 #firearms_guild_steel_maintenance_advance_desc: "Introducing steel into the production of firearms will allow us to produce more reliable guns in high quantity." #OLD ENG
 grant_privilege_cost_modifier_renaissance_advance: "Privilegi e Doveri Codificati"
 #grant_privilege_cost_modifier_renaissance_advance_desc: "Consolidare il ruolo sociale di ciascun ceto nella nostra routine di corte faciliterà il processo di concessione di nuovi privilegi senza causare rivalità tra i diversi ceti." #OLD ITA
 grant_privilege_cost_modifier_renaissance_advance_desc: "By formally codifying the societal roles of each estate in written law, we will clarify their exact privileges and obligations. When rights and responsibilities are clearly defined, each estate knows exactly what it is owed and what it owes in return, and therefore it will be easier for us to grant new privileges without sparking rivalries." #NEW
 #grant_privilege_cost_modifier_renaissance_advance_desc: "Entrenching the societal role of each estate in our courtly routine will ease the process of granting new privileges without causing rivalries between different estates." #OLD ENG
 
 war_no_cb_cost_modifier_renaissance_advance: "Guerra Ricorrente"
 #war_no_cb_cost_modifier_renaissance_advance_desc: "Le guerre cambiano così come cambiano gli stati che vi sono coinvolti. Le loro maggiori capacità consentono loro di condurre guerre più lunghe, e quindi le guerre tra stati stanno diventando sempre più comuni.." #OLD ITA
 war_no_cb_cost_modifier_renaissance_advance_desc: "The nature of war is strongly influenced by which actors are involved. Those with superior capabilities can wage war for longer periods, and thus inter-state wars are becoming increasingly more common." #NEW
 #war_no_cb_cost_modifier_renaissance_advance_desc: "War changes as the states involved in it do. Their increased capabilities allow them to wage war for longer periods, and thus interstate wars are increasingly becoming more common." #OLD ENG
 global_nobles_max_literacy_advance: "Letteratura Nobiliare"
 #global_nobles_max_literacy_advance_desc: "I nobili attribuiscono maggiore importanza alle competenze letterarie, poiché la loro funzione primaria sta cambiando sempre più da guerrieri glorificati a cortigiani al servizio dei loro sovrani. Ciò sta creando una domanda di letteratura che sia attraente per loro." #OLD ITA
 global_nobles_max_literacy_advance_desc: "The nobles are increasingly changing their primary function from being warriors to courtiers in the direct service of their ruler, leading them to give more importance to intellectual matters than military concerns. This has created a demand for engaging literature that appeals to their aristocratic sensibilities." #NEW
 #global_nobles_max_literacy_advance_desc: "The nobles give more importance to literary skills as they increasingly change their primary function from being glorified warriors to becoming courtly courtiers at the service of their rulers. This is creating a demand for a literature that is appealing for them." #OLD ENG
 #global_burghers_max_literacy_advance: "Letteratura Borghese" #OLD ITA
 global_burghers_max_literacy_advance: "Merchant Literature" #NEW
 #global_burghers_max_literacy_advance: "Burgher Literature" #OLD ENG
 #global_burghers_max_literacy_advance_desc: "I borghesi fanno affidamento sulle loro competenze e abilità per prosperare, che a loro volta dipendono da una buona istruzione letteraria su determinati argomenti. La loro crescente ricchezza, grazie al progresso economico, determina anche un aumento della domanda di letteratura che ampliasse la loro cultura scritta." #OLD ITA
 global_burghers_max_literacy_advance_desc: "Members of our merchant class rely on their abilities to make a living, and those abilities in turn depend on their having had a thorough education in certain fields. Their increased wealth also increases their demand for any literature that might broaden their written culture." #NEW
 #global_burghers_max_literacy_advance_desc: "Burghers are reliant on their skills and abilities to prosper, which in turn depend on having a good literary education on certain matters. Their increasing wealth as the economy progresses also makes for an increased demand on any literature that widens their written culture." #OLD ENG
 global_clergy_max_literacy_advance: "Letteratura Clericale"
 #global_clergy_max_literacy_advance_desc: "I sacerdoti devono essere colti per la natura stessa della loro professione, basata sull'apprendimento, l'interpretazione e la diffusione della dottrina religiosa. Pertanto, la loro formazione spirituale dipende in larga misura dal loro accesso alla dottrina e agli insegnamenti religiosi.." #OLD ITA
 global_clergy_max_literacy_advance_desc: "Clerics are required to be literate by the nature of their occupation, which centers around learning, interpreting, and spreading their religious doctrine. Therefore, their spiritual formation and overall efficacy relies heavily on their access to religious doctrine and teachings." #NEW
 #global_clergy_max_literacy_advance_desc: "Clergymen have to be literate by the nature of their occupation, based on learning, interpreting, and spreading their religious doctrine. Therefore, their spiritual formation heavily relies on their access to religious doctrine and teachings." #OLD ENG
 land_morale_recovery_renaissance_advance: "Marcia Militare Organizzata"
 #land_morale_recovery_renaissance_advance_desc: "Gli eserciti diventano sempre più complessi da gestire poiché dipendono meno dalle leve. Un aspetto fondamentale di questo cambiamento è una migliore organizzazione degli eserciti durante la marcia, che consente alle truppe di essere più preparate e pronte quando si verifica una battaglia." #OLD ITA
 land_morale_recovery_renaissance_advance_desc: "Managing armies becomes increasingly more complex as they become less reliant on levies. A key aspect of this is improved organization of armies on the march, which helps the troops to be more prepared if a battle occurs." #NEW
 #land_morale_recovery_renaissance_advance_desc: "Armies become increasingly more complex to manage as they are less reliant on levies. A key aspect of this is a better organization of the armies as they march, allowing the troops to be more prepared and ready when a battle occurs." #OLD ENG
 merchant_power_from_maritime_renaissance_advance: "Partnership Commerciali"
 #merchant_power_from_maritime_renaissance_advance_desc: "L'aumento del commercio a lunga distanza sta spingendo i mercanti a innovare con nuove forme di partnership per trarne il massimo vantaggio. La più comune consiste nell'avere un partner che investe una somma di denaro nella spedizione commerciale, mentre l'altro è colui che viaggia e raccoglie le merci che saranno vendute al ritorno." #OLD ITA
 merchant_power_from_maritime_renaissance_advance_desc: "The rising prominence of long-distance trade has led merchants to innovate new ways of making the most of their activities through partnerships. The most common kind is having one partner invest a sum of money in the trading expedition, while the other does the traveling and procurement of goods to be sold after their return." #NEW
 #merchant_power_from_maritime_renaissance_advance_desc: "The rise in long-distance trading is leading merchants to innovate in new ways of partnership to make the most of it. The most common one is having one partner investing a sum of money in the trading expedition, while the other is the one traveling and gathering the goods that will be sold after the return." #OLD ENG
 merchant_power_from_maritime_revolutions_advance: "Compagnie Limitate"
 #merchant_power_from_maritime_revolutions_advance_desc: "I fallimenti comuni delle società per azioni portano alla nascita di un nuovo tipo di società, in cui la responsabilità degli azionisti è limitata a un importo fisso, rendendo meno rischiosa qualsiasi partnership commerciale che le utilizza come mezzo e, quindi, più attraente." #OLD ITA
 merchant_power_from_maritime_revolutions_advance_desc: "The frequent failures of chartered companies have led to the development of a new business model: limited companies, where shareholder liability is limited to their initial investment. This protection from unlimited debt makes such partnerships far less risky and more attractive to potential investors." #NEW
 #merchant_power_from_maritime_revolutions_advance_desc: "The common failures of chartered companies lead to a new type of company, in which the liability of the shareholders of the company is limited to a fixed sum, making less risky any trading partnership that uses them as means, and thus, more attractive." #OLD ENG
 
 send_people_to_colonial_charter_advance: "Nuove Terre dell'Abbondanza"
 #send_people_to_colonial_charter_advance_desc: "Nuove terre significano nuove opportunità e nuove risorse da sfruttare. Incoraggiando la nostra popolazione a stabilirsi lì e a sfruttarle, saremo in grado di trarne più facilmente i benefici." #OLD ITA
 send_people_to_colonial_charter_advance_desc: "New lands mean new opportunities — and new resources to exploit. By encouraging our population to settle abroad and take advantage of these abundant resources, we will reap enormous benefits." #NEW
 #send_people_to_colonial_charter_advance_desc: "New lands mean new opportunities, and new resources to exploit. By encouraging our population to settle there and exploit them we will be able to more easily get the benefits from them." #OLD ENG
 send_people_to_the_colonies_advance: "Nuove Terre di Opportunità"
 #send_people_to_the_colonies_advance_desc: "Un mondo completamente nuovo si apre davanti a noi, e questo stimola l'immaginazione delle persone a immaginare come sarebbe la loro vita in queste nuove terre. Dovremmo incoraggiare questi pensieri, abbellire queste storie, in modo che la nostra gente sia desiderosa di colonizzare queste nuove terre per noi." #OLD ITA
 send_people_to_the_colonies_advance_desc: "A whole new world lies open before us, and that means our people are dreaming about what their lives could be in these distant lands. We should encourage these thoughts, embellishing stories of gold and glory to be found in the unexplored territories, so that our people will be eager to settle these new lands for us." #NEW
 #send_people_to_the_colonies_advance_desc: "A whole new world is open before us, and that means food for the imagination of people to picture how their live would be in these new lands. We should encourage these thoughts, embellish these stories, so that our people are eager to settle these new lands for us." #OLD ENG
 #study_institutions_advance: "Condivisione della Conoscenza" #OLD ITA
 study_institutions_advance: "Shared Knowledge" #NEW
 #study_institutions_advance: "Share of Knowledge" #OLD ENG
 #study_institutions_advance_desc: "Non è una vergogna che gli altri sappiano ciò che noi non sappiamo, ma non è mai un vantaggio per noi non fare nulla per rimediare a questa situazione. Studiando attivamente dalle scoperte degli altri, possiamo migliorare la nostra conoscenza del mondo." #OLD ITA
 study_institutions_advance_desc: "It is not a shame that others know what we do not, but it is never to our benefit if we do nothing to remedy that ignorance. By actively studying and learning from the discoveries of others, we can better improve our own knowledge of the world." #NEW
 #study_institutions_advance_desc: "It is not a shame that others know what we do not, but it is never to our benefit if we do nothing to remediate that. By actively studying from the discoveries of others, we can better improve our own knowledge of the world." #OLD ENG
 reduce_inflations_advance: "Rigoroso Controllo Monetario"
 #reduce_inflations_advance_desc: "Alcuni potrebbero pensare che se abbiamo bisogno di più denaro l'unica cosa da fare sia coniarne di più, ma questo contribuirebbe solo alla nostra rovina. Mantenendo un controllo rigoroso sulle nostre procedure di conio, possiamo tenere sotto controllo l'inflazione e persino ridurla." #OLD ITA
 reduce_inflations_advance_desc: "Some may think that if we need more money, the only thing we need to do is mint more, but that is neither sustainable nor wise. By keeping strict control over our minting industry, we can keep our inflation in check, and possibly even reduce it." #NEW
 #reduce_inflations_advance_desc: "Some may think that if we need more money the only thing we need to do is mint more, but that will only contribute to our own demise. By keeping a strict control over our minting procedures, we can keep our inflation in check and even reduce it." #OLD ENG
 pop_promote_actions_advance: "Scala Sociale"
 #pop_promote_actions_advance_desc: "Si dice che il caos sia una scala che permette alle persone di migliorare il proprio status sociale. Per noi, questa scala non deriva dal caos ma dall'ordine, poiché abbiamo trovato un sistema per consentire alle persone di migliorare la propria posizione sociale con i propri mezzi, e persino lo incoraggiamo." #OLD ITA
 pop_promote_actions_advance_desc: "It is said that chaos is a ladder for those seeking higher status. For us, this ladder comes not from chaos but from order, as we have systematized pathways allowing our people to improve their social standing through merit. We not only permit such advancement; we actively encourage it." #NEW
 #pop_promote_actions_advance_desc: "It is said that chaos is a ladder that allows people to climb in their social status. For us, this ladder does not come from chaos but from order, as we have systematized a way for our people to get better in their social standing by their own means, and we even encourage it." #OLD ENG
 alleviate_concerns_advance: "Allentare le Tensioni"
 #alleviate_concerns_advance_desc: "Nessun paese trae vantaggio dal fatto che tutti i suoi vicini siano costantemente vigili sui suoi movimenti. Dobbiamo condurre una diplomazia attiva, attenuando costantemente qualsiasi tensione che possa sorgere, in modo che i nostri prossimi non abbiano motivo di preoccuparsi per noi." #OLD ITA
 alleviate_concerns_advance_desc: "No country benefits from its neighbors being constantly vigilant of its movements. We must employ active diplomacy to immediately deflate any tensions that may arise, so that our neighbors have no reason to be concerned about us." #NEW
 #alleviate_concerns_advance_desc: "No country benefits from having all its neighbors constantly vigilant of its movements. We must have actively diplomacy constantly smoothing any tension that may arise, so that our neighbors have no reason to be concerned about us." #OLD ENG
 #counter_espionage_action_advance: "Accesso Rigoroso alle Informazioni" #OLD ITA
 counter_espionage_action_advance: "Restricted Information Access" #NEW
 #counter_espionage_action_advance: "Stricter Information Access" #OLD ENG
 #counter_espionage_action_advance_desc: "Non possiamo aspettarci di ottenere risultati positivi né in ambito diplomatico né in quello militare se tutti i nostri segreti e le questioni discusse in privato possono facilmente trapelare all'estero. Dobbiamo esercitare un controllo più rigoroso sul flusso delle nostre informazioni per bloccare rapidamente qualsiasi possibile fuga di notizie." #OLD ITA
 counter_espionage_action_advance_desc: "We cannot expect to perform well in either the diplomatic or military spheres if our secrets can easily be leaked to any foreign country. We must keep stronger control over how our information flows to quickly plug any possible leakage." #NEW
 #counter_espionage_action_advance_desc: "We cannot expect to perform either in the diplomatic or the military spheres if any and all of our secrets and things discussed in close quarters can easily leak to any foreign country. We must actively keep stronger controls on how our information flows to quickly plug any possible leakage." #OLD ENG
 pacify_population_advance: "Controllo degli Agitatori"
 #pacify_population_advance_desc: "È inevitabile che, ad un certo punto, alcune persone possano essere scontente del nostro governo. Tuttavia, ciò non si trasformerà mai in qualcosa di grave, purché non lo trascuriamo e non lasciamo che la situazione peggiori. Se cerchiamo attivamente chiunque sia incline a sollevare la propria voce contro di noi, possiamo stroncare sul nascere qualsiasi agitazione prima che riesca a raccogliere abbastanza persone attorno a sé, mantenendo così la popolazione più soddisfatta di noi." #OLD ITA
 pacify_population_advance_desc: "At some point, people may be discontent with our leadership — it is practically unavoidable. However, these grumblings will not grow into anything major as long as we do not let them fester. If we actively seek out those who raise their voices against us, we can nip any agitation in the bud before they have the chance to rally others around them, and thus keep the general populace content. Or at least complacent." #NEW
 #pacify_population_advance_desc: "It is unavoidable that at some point some people may be discontent about our rule. However, that will never grow into anything major as long as we do not left it unattended and let it fester. If we actively search for any that is prone to raise their voices against us, we can nip any agitation in the bud before they can rally enough people around them, and thus keep the general populace more content with us." #OLD ENG
 nation_state_advance: "Stato Nazione"
 #nation_state_advance_desc: "Il concetto di unire un'unica cultura sotto un'unica bandiera è molto potente. Promuovendo un senso di identità nazionale, possiamo garantire la fedeltà dei nostri sudditi e cittadini alla nostra causa." #OLD ITA
 nation_state_advance_desc: "Uniting as a single culture under a single flag is a powerful, moving idea. By fostering a sense of national identity, we will ensure the loyalty of our subjects and citizens to our cause." #NEW
 #nation_state_advance_desc: "The concept of uniting a single culture under a single flag is a powerful one. By fostering a sense of national identity, we can ensure the loyalty of our subjects and citizens to our cause." #OLD ENG
 
 LIV_a_order_knights: "Cavalieri dell'Ordine di Livonia"
 #LIV_a_order_knights_desc: "La nostra nazione è fondata sulle spalle forti dei coraggiosi uomini cristiani che si sono uniti al nostro ordine come cavalieri. Le loro abilità marziali compenseranno il nostro numero esiguo rispetto a quello dei pagani che ci circondano." #OLD ITA
 LIV_a_order_knights_desc: "Our nation is founded on the strong backs of the brave $christian_ADJ$ men who have joined our order as knights. Their martial prowess will compensate for our low numbers, compared to those of the Pagans surrounding us, as will the light and strength of our faith." #NEW
 #LIV_a_order_knights_desc: "Our nation is founded over the strong shoulders of the brave Christian men that have joined our order as knights. Their martial abilities will compensate our low numbers compared to those of the Pagans surrounding us." #OLD ENG
 LIV_a_order_knights_2: "Alfieri dell'Ordine di Livonia"
 LIV_a_order_knights_2_desc: "I cavalieri del nostro ordine hanno dimostrato più volte il loro valore e la loro abilità in battaglia. Promuovendo i più capaci tra loro al grado di alfiere, ci assicuriamo che i nostri eserciti siano sempre guidati dai migliori."
 wallachian_tradition: "Una Nazione Fortificata"
 #wallachian_tradition_desc: "Le nostre terre sono delimitate dalle montagne e dal fiume Danubio, ma per il resto sono molto pianeggianti. Questi terreni fertili sono come autostrade per gli eserciti invasori, una volta superate quelle barriere naturali. Per difendere il nostro popolo, costruiremo fortificazioni e castelli su tutto il territorio." #OLD ITA
 wallachian_tradition_desc: "Our lands are bounded by mountains and the Danube river, but are otherwise quite flat. The rich soil of our territory is like a highway for invading armies once they breach our natural barrier. In order to better defend our people, we will build fortifications and castles all across the region." #NEW
 #wallachian_tradition_desc: "Our lands are bounded by mountains and the Danube river, but are otherwise very flat in nature. These rich soils are like highways for invading armies once those natural barriers are sorted. In order to defend our people, we will set fortifications and castles all across this territory." #OLD ENG
 wallachian_heritage: "Una Storia di Resistenza"
 #wallachian_heritage_desc: "Avendo fatto parte di diversi imperi in passato, il nostro popolo è abituato a combattere con tenacia. Qualsiasi nemico che osi attaccarci dovrà pagare con il sangue." #OLD ITA
 wallachian_heritage_desc: "Having been part of several empires in the past, our people are resilient fighters. Any enemy that dares to attack us will pay with blood." #NEW
 #wallachian_heritage_desc: "Having been part of several empires in the past, our people are used to fight with resilience. Any enemy that dares to attack us must pay with blood." #OLD ENG
 khedivates: "Khedivati"
 #khedivates_desc: "I grandi imperi sono solitamente costituiti da un nucleo centrale circondato da sudditi dalla fedeltà piuttosto dubbia. Dovremmo adottare le misure necessarie per tenere queste nazioni sotto sorveglianza. " #OLD ITA
 khedivates_desc: "Large empires are usually formed around a core territory, and otherwise surrounded by subject nations of somewhat dubious loyalty. We should take the necessary measures to keep these nations under our surveillance." #NEW
 #khedivates_desc: "Big empires are usually formed by a core and surrounded by subjects of somewhat dubious allegiances. We should take the measures needed to keep these nations under our surveillance. " #OLD ENG
 #french_tradition: "La Corte di Francia" #OLD ITA
 french_tradition: "La Cour de $FRA$" #NEW
 #french_tradition: "La Cour de France" #OLD ENG
 #french_tradition_desc: "Il nostro modo di gestire la diplomazia è noto per la sua complessità e raffinatezza ed è stato preso a modello da altre nazioni. Ma solo uno sciocco si accontenterebbe dei risultati raggiunti e non spingerebbe per migliorarli." #OLD ITA
 french_tradition_desc: "Our diplomatic maneuvers are renowned for their complexity and finesse, and our skilled envoys emulated across the continent. Yet only a fool would become complacent now — we could further refine our diplomacy through measures such as cultivating networks of informants and perfecting the art of negotiation. Let other nations muddle through yesterday's techniques while we pioneer tomorrow's." #NEW
 #french_tradition_desc: "Our ways to handle diplomacy are known for their complexity and finesse and have served as a model for other nations. But only a fool would be content with the point we have reached and not push to improve them." #OLD ENG
 french_heritage: "Una Nobiltà Cavalleresca"
 #french_heritage_desc: "I nobili della nostra nazione hanno sempre fornito i migliori soldati ai nostri eserciti. Le loro truppe addestrate serviranno la nostra nazione e sconfiggeranno i nostri nemici per la gloria." #OLD ITA
 french_heritage_desc: "The aristocrats of our nation have always provided the best soldiers for our armies. Their well-trained fighters will serve our nation and defeat our enemies in the name of righteous glory!" #NEW
 #french_heritage_desc: "The nobles of our nation have always provided the best soldiers to our armies. Their trained troops will serve our nation and defeat our enemies for the glory." #OLD ENG
 french_ambition: "Grande Armata"
 #french_ambition_desc: "La necessità di riforme tra le nostre truppe diventa evidente se confrontate con quelle dei nostri nemici. L'introduzione di nuovi metodi di addestramento garantirà che i nostri uomini distruggano quei nemici sul campo di battaglia." #OLD ITA
 french_ambition_desc: "When measured against our adversaries, our need for military reform becomes painfully apparent. By introducing modern drilling techniques, we can transform our troops into a disciplined force capable of destroying any foe in combat." #NEW
 #french_ambition_desc: "The need of reforms among our troops becomes apparent when compared to those of our enemies. The introduction of new ways of drilling will ensure that our men destroy those foes in the battlefield." #OLD ENG
 
 
 english_tradition: "Cuori di Leone"
 #english_tradition_desc: "Il coraggio e la disciplina dei fanti Inglesi sono stati testimoniati dalle mura difensive della Northumbria ai cieli oscuri della Francia. Ispirata dallo spirito coraggioso dei nostri re e dallo stoicismo della gente comune, la nostra fanteria combatte con la ferocia dei guerrieri Anglosassoni che l'hanno preceduta." #OLD ITA
 english_tradition_desc: "The bravery and discipline of $ENG_ADJ$ foot soldiers has been witnessed from the shieldwalls of $northumbria_area$ to the darkened skies of $FRA$. Inspired by the lion-hearted spirit of our kings and the stoicism of the common man, our infantry fights with the ferocity of the Anglo-Saxon warriors before them." #NEW
 #english_tradition_desc: "The bravery and discipline of English foot soldiers has been witnessed from the shield walls of Northumbria to the darkened skies of France. Inspired by the lion-hearted spirit of our kings, and the stoicism of the common man, our infantry fights with the ferocity of the Anglo-Saxon warriors before them." #OLD ENG
 english_heritage: "La Nostra Casa sull'Isola"
 #english_heritage_desc: "La nostra isola ci protegge dai nemici esterni, ma non servirà a nulla se non proteggiamo le acque circostanti. Essendo veri padroni dei mari che ci circondano, manterremo un controllo saldo su coloro che minacciano la nostra terra." #OLD ITA
 english_heritage_desc: "Our island protects us from outside enemies, but that will not matter if we do not protect the surrounding waters. By being true masters of our surrounding seas, we will keep a firm control on those who threaten our land." #NEW
 #english_heritage_desc: "Our island protects us from outside enemies, but it will amount to nothing if we do not protect the surrounding waters. By being true masters of our surrounding seas, we will keep a firm control on those who threaten our land." #OLD ENG
 english_ambition: "Sovrani delle Onde"
 english_ambition_desc: "Qualsiasi nazione che intenda dominare i mari deve disporre di una massiccia presenza navale. La nostra flotta sarà così imponente che le coste dei nostri nemici saranno sempre circondate dalle nostre navi."
 omani_tradition: "Golfo dell'$OMA$"
 omani_tradition_desc: "La nostra nazione si trova alle spalle degli ampi e ostili deserti della $arabia_region$, ma il mare a est ci permette di aggirarli. È via mare, non via terra, che dovremo svolgere la nostra diplomazia, il nostro commercio e la nostra espansione."
 omani_heritage: "Controllo del Golfo"
 #omani_heritage_desc: "I nostri marinai sono abituati a solcare mari lontani, ma è il controllo del golfo che ci circonda che rende possibili tali viaggi. Saremo sempre pronti a difendere le nostre acque da qualsiasi minaccia straniera." #OLD ITA
 omani_heritage_desc: "Our sailors are used to navigating far and wide upon the seas, but control of the gulf surrounding us is what allows such travels. We must always stand ready to defend our waters against any foreign threat." #NEW
 #omani_heritage_desc: "Our sailors are used to navigate far and wide the seas, but it is control of the gulf surrounding us what will allow such travels. We will always stand ready to defend our waters against any foreign threat." #OLD ENG
 omani_ambition: "Isolamento Territoriale"
 #omani_ambition_desc: "Sebbene non sia un'isola, il nostro territorio è di fatto isolato dal resto della $arabia_region$ a causa dei deserti. Per questo motivo abbiamo imparato quanto sia fondamentale avere un mare verso cui affacciarsi e quanto sarebbe utile per noi negarlo ai nostri nemici." #OLD ITA
 omani_ambition_desc: "Despite not being an island, our land is factually isolated from the rest of $arabia_region$ due to the surrounding deserts. As such, we have learned how crucial it is to have access to the sea, and how useful it will be for us if we take that option away from our enemies." #NEW
 #omani_ambition_desc: "Despite not being an island, our land is factually isolated from the rest of $arabia_region$ due to the deserts. As such, we have learned how crucial is to have a sea to go out to, and how useful it will be for us if we negate that to our enemies." #OLD ENG
 breton_tradition: "Penisola $breton$"
 #breton_tradition_desc: "Il nostro territorio comprende una discreta porzione di costa e, sin da quando i nostri antenati giunsero dalla Gran Bretagna, le nostre rive sono state animate da un'intensa attività. La nostra gente vive del mare e per il mare, e i nostri porti sono sempre pieni di navi mercantili e pescherecci." #OLD ITA
 breton_tradition_desc: "Ever since our ancestors came from $great_britain_region$, our extensive coastal holdings have been bustling with activity. Our people live by the sea and for the sea, and our ports are always full of trade and fishing boats." #NEW
 #breton_tradition_desc: "Our land comprises a fair amount of coast, and ever since our ancestors came from the Britain, our shores have been bustling with activity. Our people live by the sea and for the sea, and our ports are always full of trade and fishing boats." #OLD ENG


