 cannon_foundry_advance: "$cannon_foundry$"
 cannon_foundry_advance_desc: "$cannon_foundry_desc$"

 increase_control_area_advance: "Aumenta il Controllo su Vasta Scala"
 increase_control_area_advance_desc: "Man mano che il nostro potente paese cresce, dovremo tenere sotto stretto controllo la nostra popolazione.
 improved_supply_lines: "Miglioramento delle Linee di Rifornimento"
 improved_supply_lines_desc: "La guerra moderna richiede sempre più risorse per i nostri eserciti, soprattutto dopo lo sviluppo del fuoco di salva e l'uso diffuso dell'artiglieria sul campo di battaglia."

 supply_lines: "Linee di Rifornimento"
 supply_lines_desc: "Lo sviluppo di eserciti professionali ha cambiato il modo di fare la guerra. La logistica è ora essenziale e le linee di rifornimento sono assolutamente necessarie per mantenere gli eserciti nutriti e riforniti di munizioni."

 improved_logistics: "Logistica Migliorata"
 improved_logistics_desc: "L'arte moderna della guerra oggi distingue chiaramente tra ufficiali dilettanti che parlano di tattica e ufficiali professionisti che studiano effettivamente la logistica."

 mining_advance: "Estrazione Mineraria"
 mining_advance_desc: "L'estrazione mineraria è stata un'attività economica fondamentale sin dagli albori dell'umanità. L'uso diffuso della lavorazione dei metalli non ha fatto altro che aumentare l'importanza della prospezione e dell'estrazione di diversi tipi di minerali e metalli per lo sviluppo di società complesse."

 bronze_working: "Lavorazione del Bronzo"
 bronze_working_desc: "Il bronzo è una lega di $copper$ e $tin$, scoperta e sviluppata per realizzare strumenti e armi molto più resistenti, poiché è anche più duttile e più facile da lavorare rispetto al $copper$."

 iron_working: "Lavorazione del $iron$"
 iron_working_desc: "Il $iron$ è un materiale fondamentale per la produzione di diversi tipi di strumenti e armi, rendendolo vitale sia per i fabbri dei villaggi che per le grandi catene di produzione."

 advanced_mining: "Estrazione Mineraria Avanzata"
 advanced_mining_desc: "Lo sviluppo di strumenti più avanzati e resistenti ha reso possibile un'ulteriore espansione delle attività minerarie alla ricerca di nuovi minerali e metalli."

 fine_metals_mining: "Estrazione di Metalli Preziosi"
 fine_metals_mining_desc: "La scoperta e lo sviluppo di nuove leghe metalliche hanno reso possibile l'estrazione e lo sfruttamento di nuovi metalli preziosi su scala più ampia, rendendo il processo altamente redditizio rispetto ad altri tipi di attività mineraria."

 ranching: "Allevamento"
 ranching_desc: "L'allevamento del bestiame ha portato alla possibilità di allevare intere mandrie di cavalli, il che a sua volta ha reso possibile allevare gli animali migliori per i viaggi, la guerra e molti altri compiti."

 mining_law_advance: "$mining_law$"
 mining_law_advance_desc: "$mining_law_desc$"

 fort_limit_1_advance: "Sistema Castellania"
 fort_limit_1_advance_desc: "I castellani ufficiali vengono nominati per gestire le fortezze locali e le loro guarnigioni, segnando il primo quadro organizzato per l'amministrazione e la manutenzione delle fortezze."

 fort_limit_2_advance: "Guardie di Frontiera"
 fort_limit_2_advance_desc: "I guardiani regionali coordinano diversi castelli lungo le marche di frontiera, stabilendo rotte di rifornimento, catene di comando e difesa reciproca tra roccaforti vicine."

 fort_limit_3_advance: "Ufficio della Difesa"
 fort_limit_3_advance_desc: "Il $crown_estate$ centralizza la supervisione delle fortificazioni sotto un ufficio formale nella capitale, consolidando registri, fondi e ordini di manutenzione in un'unica autorità amministrativa."

 fort_limit_4_advance: "Ispettori Generali"
 fort_limit_4_advance_desc: "Ispettori professionisti viaggiano per il regno per valutare guarnigioni, magazzini e mura, applicando standard uniformi e garantendo l'affidabilità di ogni luogo fortificato."

 fort_limit_5_advance: "Ingegneria Standardizzata"
 fort_limit_5_advance_desc: "Vengono introdotti standard nazionali per la costruzione e la riparazione, consentendo una pianificazione efficiente, progetti condivisi e una manutenzione prevedibile in tutta la nostra rete di fortezze."

 fort_limit_6_advance: "Servizi Topografici"
 fort_limit_6_advance_desc: "Una mappatura completa e l'integrazione logistica collegano ogni fortezza in un sistema difensivo coerente; un risultato ottenuto grazie alla collaborazione tra burocrazia, scienza e potere statale."

 chancery_advance: "Cancelleria"
 chancery_advance_desc: "Una cancelleria è un ufficio burocratico che i sovrani medievali hanno sviluppato per governare i loro domini, poiché i cambiamenti sociali li rendevano più complessi e sempre più difficili da gestire. La funzione principale di una cancelleria è quella di scrivere, inviare e ricevere documenti relativi alla gestione di questi domini."

 chancery_records: "Documenti della Cancelleria"
 chancery_records_desc: "Il crescente apparato delle cancellerie richiede un altro livello di amministrazione, poiché la loro burocrazia sta diventando ancora più complessa da gestire. Ciò avviene sotto forma di registri della cancelleria, un ufficio istituito per conservare tutte le lettere ricevute dalla cancelleria, nonché una copia di tutti i documenti emessi dai suoi scrivani e notai."

 lieutenancy_advance: "Luogotenenza"
 lieutenancy_advance_desc: "Con l'espansione del patrimonio della Corona, le prolungate assenze del monarca dai vari regni indeboliscono la Corona e mettono a dura prova i rapporti con i sudditi. Per ovviare a questo problema, nasce la figura del luogotenente, che funge da rappresentante temporaneo del monarca durante le sue assenze, che non sono destinate a essere permanenti. Questi luogotenenti non provengono solo dalla stirpe reale, ma anche dalla cerchia domestica legata alla famiglia del re."

 viceroyalty_advance: "Vicereame"
 viceroyalty_advance_desc: "Un vicereame è un'unità territoriale distinta e semi-autonoma all'interno di un regno, caratterizzata come uno stato monarchico governato da un viceré designato. Queste entità amministrative sono affidate a un viceré, nominato dal monarca, con la responsabilità cruciale di gestire e governare un paese o una provincia specifici. Tipicamente situato lontano dal centro del regno, il vicereame opera come entità separata, esibendo un certo grado di autogoverno pur essendo in ultima analisi responsabile nei confronti del monarca regnante. Il ruolo del viceré comprende una vasta gamma di compiti, tra cui l'attuazione delle politiche, il mantenimento dell'ordine e la rappresentanza dell'autorità del re nella regione designata."

 tolerance_idea: "Idee di Tolleranza"
 tolerance_idea_desc: "Tutti gli esseri umani sono stati creati uguali al Creatore e quindi comprendiamo che le loro credenze, anche se errate, possono essere accettate come mezzo per la conversione finale all'unica vera fede."

 empiricism: "Empirismo"
 empiricism_desc: "Le cose sono ciò che sono perché possiamo percepirle, vederle e, in generale, sperimentarle con i nostri sensi. È proprio grazie a queste prove empiriche che riusciamo a elaborare idee nuove."

 print_culture: "Cultura della Stampa"
 print_culture_desc: "Con l'invenzione della stampa, la diffusione della conoscenza non è mai stata così facile. Nuove tecniche e progressi raggiungeranno ogni angolo della nostra nazione e la renderanno più forte e più ricca."

 religious_unification: "Unificazione Religiosa"
 religious_unification_desc: "Esiste una sola religione vera, ed è quindi nostro dovere unire tutti i fedeli sotto l'unica guida di Dio."

 humanism: "Umanesimo"
 humanism_desc: "L'umanità è la creazione più elevata del Signore, ed è quindi naturale collocarla al centro del Creato. Ogni aspetto della natura umana deve essere preservato e incoraggiato, dal suo benessere alla sua propensione al libero arbitrio e all'esplorazione."

 merchant_traditions: "Tradizioni Mercantili"
 merchant_traditions_desc: "Un flusso costante di scambi e commerci è un segno sicuro di un'economia sana. Con i nostri mercanti concentrati sul mantenimento del flusso commerciale, possiamo stabilire una tradizione e una reputazione di commercio vivace, rendendo più facile attrarre il commercio estero nella nostra nazione."

 benign_diplomats: "Diplomatici Benevoli"
 benign_diplomats_desc: "L'arte della diplomazia è complessa. Essere bravi con le parole non è sufficiente, poiché la presenza e il comportamento complessivi di una persona sono fondamentali per il modo in cui le parole stesse vengono interpretate. Facendo in modo che i nostri diplomatici si concentrino sul dare una buona impressione, saremo visti in modo più favorevole dagli altri paesi."

 grand_banquets: "Grandi Banchetti"
 grand_banquets_desc: "Nessuna questione importante può essere discussa senza un pasto di accompagnamento, e più la questione è importante, più il pasto dovrebbe essere sontuoso. Organizzare regolarmente grandi banchetti ci permette di discutere costantemente e in modo adeguato tutte le questioni che richiedono attenzione."

 buffer_states: "Stati Cuscinetto"
 buffer_states_desc: "Non c'è niente di peggio che litigare con il proprio vicino. Se vogliamo evitare tensioni ai confini, avere altri Stati che fungono da cuscinetto tra noi e i nostri potenziali nemici ci darà un po' di respiro."

 camp_followers: "Vivandieri"
 camp_followers_desc: "I guerrieri costituiscono ovviamente la maggior parte dei nostri eserciti, ma nessun esercito può essere composto solo da combattenti. Senza l'entourage aggiuntivo di persone che trasportano cibo e attrezzature per l'esercito, questo non sarebbe in grado di andare da nessuna parte. Organizzando e strutturando questi seguaci dell'accampamento, possiamo aumentare notevolmente la loro utilità ed efficienza."

 swedish_tradition: "Attacco Incessante"
 swedish_tradition_desc: "Formando le nostre truppe in marcia in uno #italic Svinfylking#! e caricando con forza sufficiente a distruggere qualsiasi avversario! Le truppe a cavallo non sono superiori; a parte essere cavalcate fino al campo di battaglia, i cavalli non hanno alcun ruolo sul campo di battaglia."

 swedish_heritage: "Contadini Liberi"
 swedish_heritage_desc: "I contadini svedesi hanno sempre dato un contributo significativo al nostro Paese; le differenze tra un nobile e un contadino libero non sono mai state grandi."

 kung_och_riksdag: "Kung och Riksdag"
 kung_och_riksdag_desc: "I governanti svedesi spesso dipendevano dalla cooperazione con i ceti sociali, soprattutto con una classe contadina così numerosa rispetto a quella nobiliare. Durante il regno di Gustavo Adolfo, tuttavia, fu raggiunto un compromesso storico con gli aristocratici, che promisero fedelmente di mettere le loro risorse a disposizione della nazione in cambio di nuovi privilegi."

 swedish_steel: "Acciaio Svedese"
 swedish_steel_desc: "Mentre altri eserciti potrebbero accontentarsi di sparare raffiche imprecisi contro i loro nemici, noi marceremo contro di loro in ranghi disciplinati, spareremo una sola raffica a distanza ravvicinata e poi li nutrirete con l'acciaio freddo."

 hakkapelitta: "Hakkapeliitta"
 hakkapelitta_desc: "La $FIN$ è considerato una regione piuttosto povera e arretrata, ma il servizio nella cavalleria svedese offre agli abili cavalieri finlandesi ampie opportunità di gloria e saccheggio. L'eccellente abilità equestre e i cavalli di alta qualità ci consentono di formare i temuti #italic Hakkapeliitta#! — una cavalleria così efficace in battaglia che i nostri nemici sussurrano che devono essere protetti dalla stregoneria."

 indelningsverket: "Indelningsverket"
 indelningsverket_desc: "Il sistema di assegnazione svedese divide i contadini in gruppi di dieci per scopi di reclutamento. Questo sistema ha reso più facile trovare persone da arruolare nell'esercito e organizzarle in unità."

 swedish_absolutism: "Assolutismo Svedese"
 swedish_absolutism_desc: "L'assolutismo è la teoria secondo cui una sola persona dovrebbe essere al comando, che questa persona è il monarca e che detto monarca dovrebbe governare senza essere ostacolato dal Consiglio Privato."

 produktplakatet: "Produktplakatet"
 produktplakatet_desc: "Il decreto vieta alle navi straniere che arrivano in $SWE$ di trasportare merci provenienti da paesi diversi dal proprio o dalle proprie colonie."

 mulltimmer_masugn: "Mulltimmer Masugn"
 mulltimmer_masugn_desc: "Il $iron$ svedese, apprezzato per la sua purezza e resistenza, soddisfa non solo il nostro fabbisogno interno, ma anche quello delle fonderie e delle armerie di tutte le nazioni del continente. Il #italic Mulltimmer Masugn#! non è stato costruito solo con pietra, ma anche con legno isolato con sabbia, ghiaia e terra."

 swedish_royal_post_office: "Kungliga Postverket"
 swedish_royal_post_office_desc: "Il #italic Kungliga Postverket#!, o Agenzia Postale Reale, è stato creato per migliorare l'amministrazione statale e le comunicazioni in tutta la $SWE$. Ha istituito una rete affidabile di corrieri e stazioni di posta ed è diventato fondamentale per il nostro coordinamento militare, la diplomazia e il governo."

 polhem_machina_nova: "Machina Nova"
 polhem_machina_nova_desc: "Christopher Polhem, soprannominato il 'padre dell'ingegneria svedese', ha trasformato l'industria svedese con la sua #italic Machina Nova#!, una serie innovativa di sistemi meccanici progettati per snellire e aumentare la produzione. Utilizzando intricati sistemi di ingranaggi, camme e energia idraulica, Polhem ha sviluppato diverse macchine in grado di svolgere compiti precedentemente eseguiti a mano, dalla frantumazione del minerale nelle miniere alla tessitura e alla segatura."

 swedish_copper_coins: "Monete di Rame Svedesi"
 swedish_copper_coins_desc: "L'abbondanza di rame in $SWE$, proveniente principalmente dalla miniera di Stora Kopparberget a Falun, ha spinto il Paese a utilizzarlo come metallo principale per coniare una nuova moneta nazionale, il #italic daler#!. Questa viene emessa sotto forma di una grande moneta metallica, chiamata #italic plåtmynt#!, che può pesare fino a 20 chilogrammi. Alcuni sostengono che ciò potrebbe non essere molto pratico e che il volume di denaro in circolazione potrebbe superare le riserve di rame, ma sembrano avere una visione ristretta."

 combined_arms_advance_reformation: "Armi Combinate"
 combined_arms_advance_reformation_desc: "La guerra sta diventando sempre più complessa, spinta dalla diffusione di eserciti permanenti composti da soldati assoldati a tempo indeterminato. L'introduzione di nuove armi, come le armi da fuoco e i cannoni, incoraggia un approccio che bilancia e combina fanteria leggera e pesante, cavalleria e artiglieria, supportate da unità ausiliarie."

 combined_arms_advance_revolutions: "Armi Combinate Avanzate"
 combined_arms_advance_revolutions_desc: "L'uso regolare delle armi combinate nel corso di diversi secoli ha portato al predominio di questo tipo di guerra. La fanteria leggera e la cavalleria hanno il compito di indebolire e disorganizzare le forze nemiche, proteggendo e coprendo al contempo le proprie. La fanteria pesante e la cavalleria sostengono il peso principale dei combattimenti, cercando di sferrare cariche decisive per sbaragliare il nemico, mentre l'artiglieria e le forze ausiliarie li supportano a distanza dalle retrovie."

 hun_composite_light_cavalry: "Cavalleria Leggera Composita"
 hun_composite_light_cavalry_desc: "Composta da arcieri a cavallo e da veloci cavalieri, la nostra cavalleria leggera è la spina dorsale della nostra forza militare. Le nostre forze a cavallo hanno dimostrato più volte il loro coraggio e inevitabilmente condurranno ancora una volta le nostre forze alla gloria."

 hun_castle_warriors: "Guerrieri del Castello"
 hun_castle_warriors_desc: "I Guerrieri del Castello, una delle classi più selezionate della nostra società, hanno il dovere di prestare servizio militare ai loro #italic ispáns#! locali nei distretti dei castelli reali. Fedeli sostenitori sin dai primi giorni della nostra nazione, questi privilegiati proprietari terrieri occupano una posizione unica, difendendo attivamente il loro regno e custodendo i loro diritti ereditari."

 hun_renaissance_knowledge: "Un Principe del $renaissance$"
 hun_renaissance_knowledge_desc: "I contadini considerano il loro sovrano giusto perché sono ufficialmente protetti da richieste eccessive e altri abusi da parte dei magnati. Il sovrano dell'$HUN$ è un vero principe del $renaissance$: un leader militare e amministratore di successo, un linguista eccezionale e un illuminato mecenate delle arti."

 hun_bulwark_of_christianity: "Baluardo del Cristianesimo"
 hun_bulwark_of_christianity_desc: "Con l'ascesa del potere turco nel sud, spetta al popolo dell'$HUN$ difendere i regni fedeli dalla minaccia del $turkish_culture$. Sappiate che non vacilleremo nel nostro sacro dovere!"

 hun_found_the_black_army: "Fondata l'Armata Nera"
 hun_found_the_black_army_desc: "Ispirata dagli scritti di Giulio Cesare, l'$HUN$ manterrà un corpo di soldati professionisti. Questi guerrieri saranno così feroci che i nostri nemici racconteranno ai loro figli storie terrificanti sull'Esercito Nero!"

 hun_reformed_coinage: "Riforma Monetaria"
 hun_reformed_coinage_desc: "Per pagare il nostro nuovo esercito professionale, avremo bisogno di un flusso costante di entrate. Riformare la moneta per standardizzarne il peso renderà tutto questo molto più facile, perché sapremo esattamente quanto le persone dovranno pagare."

 hun_curtailed_peasantry: "Limitare le Libertà dei Contadini"
 hun_curtailed_peasantry_desc: "L'$HUN$ non ha la fortuna di avere frontiere naturali protettive. Le pianure selvagge che hanno portato qui i nostri antenati erano perfette per lanciare incursioni verso ovest, ma non per difendersi. Se l'$HUN$ vuole difendersi, avremo bisogno di risorse. La soluzione migliore è permettere ai nostri magnati di legare più strettamente i contadini alla terra, garantendo una maggiore produttività."

 hun_strengthened_towns: "Rafforzare le Città"
 hun_strengthened_towns_desc: "Le città sono fattori chiave nella produzione della ricchezza di cui l'$HUN$ ha bisogno per crescere e prosperare. Se garantiamo che le operazioni dei nostri comuni siano protette dalle macchinazioni assetate di potere della nobiltà, continueranno a portare commercio, che potremo tassare."

 hun_hungarian_reformation_intro: "Le idee della Riforma si diffusero in $europe$ a macchia d'olio e, di conseguenza, erano destinate a raggiungere anche le nostre terre."
 hun_hungarian_reformation: "Riforma Ungherese"
 hun_hungarian_reformation_desc: "$hun_hungarian_reformation_intro$ Il nostro regno è stato minacciato da potenze straniere per troppo tempo. Unendoci alla Riforma e abbandonando il dovere di seguire il Papa come cagnolini, potremo spezzare almeno una delle catene che ci opprimono!"

 hun_the_catholic_shield: "Lo Scudo del Cattolicesimo"
 hun_the_catholic_shield_desc: "$hun_hungarian_reformation_intro$ Eppure, i cuori dei fedeli rimangono forti. Dio e i suoi fedeli servitori resisteranno a questa follia eretica."

 hun_realm_of_many_religions: "Regno delle Molte Religioni"
 hun_realm_of_many_religions_desc: "$hun_hungarian_reformation_intro$ Ahimè, la Riforma ha diviso le famiglie, trasformato ex amici in nemici e minacciato la stabilità stessa di molte nazioni. Tuttavia, il nostro regno sa bene che non deve cadere vittima di queste dispute teologiche. Dopotutto, siamo un popolo e un regno di molte religioni."

 hun_multi_culturalism: "Regno delle Molte Culture"
 hun_multi_culturalism_desc: "Il bacino dei Carpazi non ospita solo il popolo ungherese. Il $slovak$, il $ruthenian$, il $cuman_culture$ e il popolo del $german_carpathian$, insieme a molte altre minoranze diverse, considerano il nostro regno la loro casa. Data questa diversità, è naturale che il nostro governo assorba e adotti con competenza queste diverse culture nel nostro Stato."

 hun_revolutionized_military_tactics: "Tattiche Militari Rivoluzionarie"
 hun_revolutionized_military_tactics_desc: "Con il progresso della tecnologia militare, progrediscono anche le tattiche di battaglia. È fondamentale per la sopravvivenza del nostro Stato stare al passo con la natura in continua evoluzione della guerra terrestre."

 hun_hungarian_unity: "Unità Ungherese"
 hun_hungarian_unity_desc: "Sebbene i nostri sudditi abbiano affrontato molte minacce esterne nel corso degli anni, lo spirito e la volontà del popolo ungherese rimangono intatti. L'unione dei cuori ungheresi è di grande ispirazione per i nostri soldati patriottici, che difenderanno la nostra patria fino all'ultimo uomo."

 hun_hungarian_hussars: "$a_hungarian_hussars$"
 hun_hungarian_hussars_desc: "$a_hungarian_hussars_desc$"

 salic_law_advance: "Legge Salica"
 salic_law_advance_desc: "Il governo delle donne non è sempre rispettato, né tantomeno permesso. Pertanto, non è raro che i governi approvino leggi che vietano direttamente alle donne di ereditare, favorendo i loro fratelli o cugini maschi."

 partition_inheritance_advance: "Divisione Ereditaria"
 partition_inheritance_advance_desc: "Le rivalità tra i figli dei reali non sono rare, poiché ognuno di loro vorrebbe diventare un giorno il sovrano. Per evitare tali lotte intestine, alcuni monarchi scelgono di dividere i loro territori e titoli tra tutti i loro figli, in modo che tutti siano soddisfatti di una quota più o meno uguale dell'eredità."

 national_assemblies_advance: "Assemblee Nazionali"
 national_assemblies_advance_desc: "$national_assemblies_desc$"

 enlightenment_advance: "Illuminismo"
 enlightenment_advance_desc: "Nel secolo scorso il razionalismo e l'empirismo hanno guadagnato una popolarità sempre crescente tra le menti più brillanti dell'epoca. La luce della ragione è stata accesa e molti non si daranno pace finché non sarà portata in ogni angolo della terra."

 distribution_of_power_advance: "$distribution_of_power_law$"
 distribution_of_power_advance_desc: "$distribution_of_power_law_desc$"

 industrialization_advance: "Industrializzazione"
 industrialization_advance_desc: "La rivoluzione industriale ha portato cambiamenti permanenti, non solo al commercio e agli affari, ma anche al tessuto sociale di molte nazioni. Invenzioni come il telaio meccanico e il motore a vapore spingeranno le capacità dell'umanità al suo apice più alto mai raggiunto."

 levee_en_masse_advance: "Levée en Masse"
 levee_en_masse_advance_desc: "La guerra è un concetto in continua evoluzione, studiato e perfezionato nel corso di generazioni e generazioni. Per soddisfare il bisogno di espansione e fornire il carburante necessario a realizzare queste ambizioni, saranno redatte nuove leggi nazionali sulla coscrizione. Creeremo eserciti di giovani reclute non sposate, la cui dimensione lascerà un segno indelebile nella storia."

 griot_advance: "Griot"
 griot_advance_desc: "I #italic griots#! sono allo stesso tempo narratori, storici, consiglieri, musicisti e poeti. Salvaguardano le storie e le leggende delle generazioni passate, mediano tra le parti in conflitto e servono sia i loro governanti che la popolazione locale come consiglieri."

 west_african_caravan_stop_advance: "$caravan_stop$ Sahariana"
 west_african_caravan_stop_advance_desc: "Il commercio tra il $africa$ subsahariano e il $north_africa$ fa parte della nostra identità da secoli. Il viaggio attraverso il vasto deserto, anche con molti anni di esperienza alle spalle, è sempre faticoso e pericoloso. La chiave per garantire il commercio in questa regione è il $caravan_stop$, un luogo dove i mercanti e le loro carovane possono riposarsi e rifocillarsi durante il loro viaggio attraverso il deserto."

 sunday_schools_advance: "Scuole Domenicali"
 sunday_schools_advance_desc: "L'istruzione del popolo è una parte importante dei nostri doveri religiosi. Dovremmo istituire scuole, strettamente legate alle nostre normali funzioni religiose, per fornire un'istruzione di base al nostro gregge."

 res_publica_christiana: "Cristianesimo Universale"
 res_publica_christiana_desc: "Dobbiamo perseguire buoni rapporti con i nostri fedeli cristiani di tutte le confessioni, anche se consideriamo alcune delle loro pratiche come eretiche."

 roman_orthodoxy: "Ortodossia Romana"
 roman_orthodoxy_desc: "La rettitudine della fede romana cattolica e delle sue dottrine deve rimanere indiscussa, al fine di consolidarne l'autorità nella mente del nostro popolo."

 marian_devotion: "Devozione alla Vergine Maria"
 marian_devotion_desc: "La nostra devozione alla Vergine Maria deve rimanere un pilastro centrale del nostro culto."

 crusading_knights: "Esperienza delle Crociate Baltiche"
 crusading_knights_desc: "In questo paese abbiamo una lunga tradizione di inviare i nostri migliori cavalieri e aristocratici a diffondere la vera fede ai pagani nelle regioni del $baltic_region$ e del Mediterraneo. Adempiremo alla nostra missione nel Cristianesimo portando la fede agli ignoranti, acquisendo al contempo comandanti esperti per i nostri eserciti."

 catholic_pilgrimages: "Pellegrini cattolici"
 catholic_pilgrimages_desc: "I luoghi sacri della nostra fede dovrebbero essere visti da ogni fedele. Incoraggiare i pellegrinaggi ed elevare coloro che hanno completato il processo dovrebbe essere una priorità della nostra amministrazione."

 inquisition_advance: "Inquisizione"
 inquisition_advance_desc: "L'Inquisizione fu creata nel XII secolo come mezzo per combattere l'eresia catara, ma la sua portata crebbe in modo significativo nel tardo Medioevo come strumento principale della Chiesa cattolica per contrastare la diffusione di dottrine dissidenti."

 preaching_friars: "Frati Predicatori Itineranti"
 preaching_friars_desc: "I frati predicatori - membri del $mendicant_orders$ come i domenicani e i francescani - hanno portato il loro ministero oltre le mura del monastero per predicare direttamente tra la gente. Sostenendoli e lodandoli apertamente per questi atti di devozione, possiamo rafforzare la convinzione religiosa in tutto il regno, anche tra i contadini più remoti."

 devotio_moderna: "Devotio Moderna"
 devotio_moderna_desc: "La #italic Devotio Moderna#!, o movimento devozionale moderno, sta rapidamente guadagnando popolarità tra i membri della nostra fede. Dovremmo implementare alcuni dei loro insegnamenti nella nostra corte, in modo da apparire particolarmente devoti."

 denounce_heretics: "Denuncia degli Eretici"
 denounce_heretics_desc: "Dobbiamo garantire la supremazia dell'unica vera fede e denunciare tutte le critiche nei suoi confronti come la più amara delle eresie."

 beguins_and_beghards: "Ordini Religiosi Laici"
 beguins_and_beghards_desc: "Molti fedeli si sono dedicati a una vita di preghiera e buone opere, che di solito comporta prendere i voti o diventare monaci. Tuttavia, non hanno preso voti formali e agiscono senza l'approvazione ufficiale romana. Ciononostante, dovremmo sostenere questi sforzi popolari per compiere buone azioni e aiutare il nostro popolo."

 conquistador_advance: "Conquistadores"
 conquistador_advance_desc: "La scoperta del Nuovo Mondo attira avventurieri di ogni tipo a rischiare la fortuna e la vita in spedizioni incerte, con la promessa di ricchezze, fama e potere senza pari. Queste spedizioni sono formalizzate attraverso accordi tra i capi delle spedizioni e il governo, manifestati legalmente come 'capitazioni di conquista'."

 grand_display_of_faith: "Grandi Dimostrazioni di Fede"
 grand_display_of_faith_desc: "Per onorare Dio, dobbiamo costruire grandi monumenti in Suo nome. Questo non solo dimostrerà la nostra devozione alla fede, ma anche le magnifiche abilità dei nostri scultori e architetti."

 monastery_productions: "Frugalità Monastica"
 monastery_productions_desc: "I santi occupanti dei nostri monasteri sono bastioni di una vita sensata e frugale. Il nostro clero dovrebbe considerare l'opportunità di adattare il proprio stile di vita a quello di questi monaci e monache."

 reform_church_music: "Riforma della Musica Sacra"
 reform_church_music_desc: "Dobbiamo accettare le riforme proposte alla nostra musica liturgica. Le melodie diluite e prive di anima attualmente in voga non possono più essere considerate un modo accettabile per esprimere la gloria del divino."

 frequent_councils: "Concili Frequenti"
 frequent_councils_desc: "È stato proposto che tenere concili religiosi più frequentemente impedirebbe alle dispute teologiche e alle critiche di degenerare senza controllo. Anche se non abbiamo il pieno controllo sulla curia, possiamo almeno usare la nostra influenza per incoraggiare sinodi regolari che affrontino questioni rilevanti prima che possano diventare crisi."

 mendicant_orders: "Ordini Mendicanti"
 mendicant_orders_desc: "Gli ordini della nostra fede, che hanno fatto voto di povertà e vivono una vita itinerante, hanno portato assistenza in molte zone remote del nostro Paese. Dovremmo sostenere i loro sforzi il più possibile senza interferire con le loro sacre missioni."

 exsurge_domine: "Exsurge Domine"
 exsurge_domine_desc: "Per sradicare il male dell'eresia, il Signore Stesso si leverà e li epurerà dalle nostre terre!"

 confutatio_augustana: "Rifiutare False Confessioni"
 confutatio_augustana_desc: "In questi tempi turbolenti, dobbiamo definire chiaramente la dottrina ortodossa cristiana, confutando sistematicamente le false credenze che mettono in pericolo le anime stesse del nostro popolo."

 roman_catechism: "Catechismo Romano"
 roman_catechism_desc: "Il nostro clero deve adottare il Catechismo Romano ufficiale come guida per l'istruzione. Questo testo migliorerà la formazione sacerdotale e garantirà che solo insegnamenti coerenti e ortodossi siano trasmessi alla popolazione."

 oversea_missions: "Missioni d'Oltremare"
 oversea_missions_desc: "Il nostro clero è pronto e disposto a diffondere la nostra fede in nuovi territori oltreoceano. Grazie al loro contributo, colonizzare nuove terre sarà più facile ed economico."

 baptism_books: "Registri dei Battesimi"
 baptism_books_desc: "Dobbiamo confermare il battesimo come un importante pilastro della nostra fede tenendo registri meticolosi di chi nella nostra popolazione è stato battezzato e chi no."

 second_scholasticism: "Secondo $scholasticism$"
 second_scholasticism_desc: "Dovremo far rivivere e perfezionare il movimento filosofico della scolastica medievale."

 catholic_sunday_schools: "$sunday_schools_advance$"
 catholic_sunday_schools_desc: "$sunday_schools_advance_desc$"

 index_librorum_prohibitorum: "Indice dei Libri Proibiti"
 index_librorum_prohibitorum_desc: "Le idee pericolose della Riforma si diffonderanno come un fungo tossico nelle menti dei nostri sudditi se avranno accesso a opere scritte che propagano questi pensieri sciocchi! Dobbiamo vietare alcuni testi pericolosi e tenere un elenco completo dei libri non consentiti."

 catholic_cuius_regio_eius_religio: "Cuius Regio, Eius Religio"
 catholic_cuius_regio_eius_religio_desc: "#italic Di chi è il regno, sua è la religione.#! Dovremo accettare che altri paesi seguano altre fedi e che questo a volte sarà un fattore cruciale nella diplomazia."

 embellish_baroque_art: "Promuovere l'Arte Barocca"
 embellish_baroque_art_desc: "La nostra fede ha una lunga tradizione di sponsorizzazione e promozione di grandi opere d'arte. Lo sviluppo del nuovo e splendido stile barocco riflette magnificamente il pathos e la gloria della nostra teologia e dovrebbe ricevere un sostegno particolare."

 national_churches: "Chiesa Nazionale"
 national_churches_desc: "Lo Stato deve assumere un maggiore controllo sulla Chiesa nel nostro territorio. Non possiamo permettere che entità straniere esercitino un'influenza indebita sulla nostra amministrazione ecclesiastica; la nostra Chiesa deve servire innanzitutto il nostro regno."

 entrenched_church: "Chiesa Radicata"
 entrenched_church_desc: "Indipendentemente dal popolo che governiamo, la Chiesa offre un modo per dargli una struttura unificata."

 catholic_enlightenment: "Illuminismo Cattolico"
 catholic_enlightenment_desc: "Affinché la nostra fede resista agli attacchi dell'Illuminismo, dobbiamo adattarci e presentare nuove prospettive all'interno e riguardo alla Chiesa."

 divine_church_music: "Musica Religiosa Sacra"
 divine_church_music_desc: "Molti dei nostri compositori hanno creato le loro opere più grandi grazie all'ispirazione fornita dalla loro fede. Dovremmo cercare attivamente gli artisti più talentuosi e assumerli immediatamente, in modo da non lasciare mai che le nostre chiese e cattedrali soffrano di musica di qualità inferiore."

 continue_missionary_works: "Opere Missionarie"
 continue_missionary_works_desc: "Gli sforzi missionari per portare la nostra fede negli angoli più remoti del mondo non possono mai essere considerati conclusi. Dobbiamo sponsorizzare più missioni per portare ulteriormente la luce del Cattolicesimo a queste anime non illuminate."

 protestant_invite_persecuted: "Accogliere gli Indesiderati"
 protestant_invite_persecuted_desc: "Mentre noi abbiamo visto la luce della vera fede, molti dei nostri fratelli soffrono sotto il dominio oppressivo di pagani fuorviati. Dovremmo invitare queste persone a stabilirsi nelle nostre terre, dove potranno professare la loro fede senza ripercussioni e, cosa ancora più importante, contribuire al nostro tesoro."

 protestant_administration_tax: "Esattori Fiscali Efficienti"
 protestant_administration_tax_desc: "In passato, i chierici si facevano carico di una parte significativa del carico fiscale. Sebbene alcune di queste strutture siano state smantellate sulla scia della Riforma, la gente comune capace è ancora presente e quindi deve contribuire a compensare le entrate clericali mancanti."

 confessio_augustana: "Una Nuova Confessione"
 confessio_augustana_desc: "La Riforma ci offre l'opportunità di definire un nuovo credo per il nostro popolo e, cosa ancora più importante, di accettare le critiche e apportare le opportune modifiche."

 devotionalism: "Devotionalismo"
 devotionalism_desc: "Dobbiamo far rivivere la teologia agostiniana e riconoscere che le nostre credenze si basano sulle emozioni e sul fervore dei fedeli."

 protect_the_new_faith: "Scudo della Fede"
 protect_the_new_faith_desc: "La nostra religione è circondata da nemici su tutti i fronti. Dovremo difendere il nostro diritto alla nostra confessione contro gli oppressori cattolici."

 expulsion_of_heretics: "Espulsione degli Eretici"
 expulsion_of_heretics_desc: "I fastidiosi eretici nel nostro dominio potrebbero facilmente fomentare una ribellione contro il nostro sovrano. Sarebbe meglio se li reindirizzassimo invece verso le nostre colonie d'oltremare, dove possono causare meno problemi."

 repurposed_monasteries: "Monasteri Riadattati"
 repurposed_monasteries_desc: "Le ex proprietà religiose confiscate dallo Stato durante il processo di conversione nazionale possono ora servirci in modi nuovi, ad esempio come centri di produzione o amministrazione."

 involved_laity: "Laici Coinvolti"
 involved_laity_desc: "Con il crescente coinvolgimento dei laici nell'amministrazione quotidiana della nostra Chiesa, il nostro popolo ha trovato un legame più personale con la fede stessa."

 protestant_cuius_regio_eius_religio: "$catholic_cuius_regio_eius_religio$"
 protestant_cuius_regio_eius_religio_desc: "$catholic_cuius_regio_eius_religio_desc$"

 protestant_painters: "Arte Protestante"
 protestant_painters_desc: "La Riforma ha dato ai nostri artisti l'opportunità di esplorare nuovi temi, finalmente liberi dall'obbligo di glorificare Dio. Assumere un maggior numero di questi artisti ci farà fare bella figura e ci darà la reputazione di grandi mecenati delle arti."

 protestant_sunday_schools: "$sunday_schools_advance$"
 protestant_sunday_schools_desc: "$sunday_schools_advance_desc$"

 protestant_work_ethic: "Lavoratori Diligenti"
 protestant_work_ethic_desc: "L'influenza dei predicatori puritani e pietisti sulla Riforma è innegabile. La loro enfasi su virtù come la diligenza e la frugalità ci aiuterà a promuovere una forza lavoro laboriosa e dedita."

 embrace_romanticism: "Abbraccia il Romanticismo"
 embrace_romanticism_desc: "Sulla scia dell'enfasi posta dall'Illuminismo sulla ragione, non dobbiamo dimenticare il potere delle emozioni e dell'immaginazione. Abbracciando il Romanticismo, che celebra la natura, il folklore e il carattere nazionale, i nostri artisti produrranno opere che toccano l'anima."

 wary_of_heretic_preachers: "Difesa Contro gli Eretici"
 wary_of_heretic_preachers_desc: "Dovremo diffidare delle forze che cercano di convertire il nostro popolo o di sedurlo affinché torni alla fede precedente. Dichiarando pubblicamente che questi predicatori sono maliziosi e ostili, potremo preparare il nostro popolo a queste interazioni e rafforzare più facilmente l'ortodossia religiosa."

 protestant_innovation: "Innovazioni Protestanti"
 protestant_innovation_desc: "Fin dai primi giorni della nostra fede, abbiamo sottolineato il valore intrinseco di mettere in discussione le dottrine e le credenze consolidate. Dovremmo applicare la stessa etica ad altri campi di studio."

