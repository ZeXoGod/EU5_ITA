 power_projection_advance_6: "Ambizioni Globali"
 power_projection_advance_6_desc: "Il consolidamento dei paesi in nazioni più grandi ha portato alla formazione di grandi potenze che dominano vaste porzioni dei loro territori e hanno tutte le intenzioni di estendere ulteriormente il loro potere."

 enlightened_court: "Corte Illuminata"
 enlightened_court_desc: "I valori dell'Illuminismo sono sempre presenti in qualsiasi corte moderna e con essi arriva la presenza delle persone più intellettuali e colte. Grazie a questi cortigiani illustri e illuminati, ora è possibile ottenere molto di più con uno sforzo minore."

 government_size_revolutions: "Rappresentazione Moderna"
 government_size_revolutions_desc: "Con l'istituzione di forme ufficiali di rappresentanza popolare, il governo è in grado di affrontare questioni importanti meglio che mai."

 global_supply_limit_modifier_advance_6: "Pianificazione Logistica della Campagna"
 global_supply_limit_modifier_advance_6_desc: "La pianificazione della logistica della guerra è diventata sempre più complessa, poiché l'aumento delle dimensioni medie dell'esercito ha reso possibile schierare contemporaneamente diversi eserciti per campagne a lungo termine, coinvolgendo centinaia di migliaia di soldati per diversi anni."

 rgo_size_advance_revolutions: "Motore a Vapore"
 rgo_size_advance_revolutions_desc: "Il vapore come mezzo per alimentare una macchina è noto fin dall'antichità. Tuttavia, il suo potenziale non era mai stato pienamente realizzato fino a poco tempo fa, quando i recenti progressi nella fisica e nella matematica hanno permesso la creazione di motori a vapore più sofisticati, in grado di alimentare macchine più complesse. Ciò consente una maggiore produttività in tutti i campi."

 military_tactics_advance_6: "Artiglieria da Campo"
 military_tactics_advance_6_desc: "Con l'artiglieria abbastanza mobile da accompagnare il resto dell'esercito sul campo di battaglia, la sua influenza non è più limitata a ciò che si trova nel raggio di tiro. Formazioni di artiglieria semi-autonome guidate da ufficiali di artiglieria possono invece essere schierate dove sono più necessarie."

 road_advance_2: "Strade di Base"
 road_advance_2_desc: "Abbiamo costruito reti stradali rudimentali, ma queste ci stanno rapidamente dimostrando perché è necessario migliorare i nostri sistemi di trasporto. Espandendo la nostra rete stradale, saremo in grado di far circolare più facilmente le merci all'interno del nostro territorio."

 written_alphabet: "Alfabeto Scritto"
 written_alphabet_desc: "Che cos'è una società se non la somma della sua eredità? Un alfabeto scritto, quindi, non è che il primo passo verso l'immortalizzazione della nostra cultura, nonché il fondamento per la costruzione di una società istruita e ben funzionante."

 codified_laws: "Leggi Codificate"
 codified_laws_desc: "Gli statuti e i regolamenti sono la spina dorsale di qualsiasi società ben funzionante. Se vogliamo affinare la nostra efficienza e le nostre capacità interne, è di vitale importanza disporre di un insieme di leggi codificate solide."

 taxation_advance: "Tassazione"
 taxation_advance_desc: "Il funzionamento di una società civile implica il mantenimento di un'autorità centrale, che deve essere sostenuta attraverso una qualche forma di valuta. Riscuotendo le tasse dai nostri sudditi e cittadini, saremo più produttivi e in grado di realizzare grandi cose per il nostro popolo."

 state_administration_advance: "Amministrazione Statale"
 state_administration_advance_desc: "Tassare la nostra popolazione è fattibile solo se sappiamo chi vive dove e quali usanze e leggi locali si applicano a ciascuna persona. Dobbiamo istituire un'amministrazione completa per gestire adeguatamente il nostro regno."

 agriculture_advance: "Agricoltura"
 agriculture_advance_desc: "La terra è generosa e ci fornisce raccolti e risorse abbondanti. Ma per far progredire la nostra società e diventare una nazione prospera, dobbiamo imparare a modellare e domare la terra, e a ricavarne i migliori tesori possibili."

 city_building_advance: "Costruzione Urbana"
 city_building_advance_desc: "Lo sviluppo dei nostri centri urbani è diventato fondamentale per la prosperità nazionale ed è una pietra miliare del movimento di urbanizzazione. Costruendo sistematicamente infrastrutture ed edifici specializzati all'interno delle nostre città, alimenteremo la nostra crescita economica."

 road_building: "Costruzione Stradale"
 road_building_desc: "Il trasporto di merci, truppe e persone è vitale per la sopravvivenza della nostra nazione. Sviluppando una rete stradale di base, saremo in grado almeno di collegare la nostra popolazione e assisterla nelle sue attività quotidiane."

 ship_building_advance: "Costruzione Navale"
 ship_building_advance_desc: "I mari racchiudono molte avventure, ricchezze e opportunità commerciali, oltre che espansionistiche."

 mapmaking: "Cartografia"
 mapmaking_desc: "Disegnare con precisione i confini e i punti di riferimento di un paese è molto più che un'arte: ci aiuta a raccogliere informazioni su altre nazioni per scopi strategici. Sapendo dove si trovano esattamente i luoghi importanti, non solo possiamo coordinare meglio gli attacchi, ma anche acquisire maggiori conoscenze sul nostro territorio. Come dicono spesso gli anziani, la conoscenza è potere."

 standardized_coins: "Monete Standardizzate"
 standardized_coins_desc: "Con la creazione della ricchezza, compaiono sempre più zecche. Sebbene abbiamo convissuto per anni con molte valute diverse, è necessario stabilire standard ufficiali per evitare frodi causate dall'uso di quantità inferiori di metalli preziosi o dalla raschiatura dei bordi delle monete."

 humanism_ideas: "Umanesimo"
 humanism_ideas_desc: "Considerando l'umanità il centro di tutto, accettiamo il nostro dovere di perseguire l'ignoto e di usare l'intelligenza che ci è stata data per svelare i segreti del nostro mondo. Educando il nostro popolo, garantiamo la sua libertà, il suo libero arbitrio e la responsabilità delle proprie azioni. Useremo le conoscenze antiche per promuovere il progresso umano e impareremo sia dai successi che dai fallimenti dei nostri antenati."

 legalism_advance: "Legalismo"
 legalism_advance_desc: "Le leggi e le regole non hanno alcun significato se non vengono raccolte, standardizzate e rese comprensibili a tutti i membri della nostra società. Codificando norme giuridiche chiare e applicandole in modo uniforme, garantiremo che i principi di ordine e giustizia raggiungano gli angoli più remoti del nostro regno."

 meritocracy_advance: "Meritocrazia"
 meritocracy_advance_desc: "Il merito non è esclusivo delle classi più elevate della nostra società. Si può trovare ovunque, anche tra le persone più umili. Creando esami standardizzati che misurano il merito, l'impegno e la competenza complessiva, possiamo trovare gioielli intellettuali nascosti in bella vista e nominarli adeguatamente per il miglioramento della nostra nazione."

 cathedral_advance: "Cattedrale"
 cathedral_advance_desc: "Una cattedrale è uno dei tipi di tempio più grandi e importanti cristiani, dove il vescovo ha una #italic cathedra#!, o sede. Mentre una chiesa può essere bella e ricca di dettagli, una cattedrale è maestosa, di dimensioni enormi e adornata con i dettagli più raffinati e intricati."

 infiltrate_administration: "[infiltrate_administration|e]"
 supportrebels: "[support_rebels|e]"
 infiltrate_administration_advance: "Infiltrarsi nell'Amministrazione"
 infiltrate_administration_advance_desc: "I conflitti con altri stati non si combattono solo sul campo di battaglia, ma anche nell'ombra. Conoscere la prossima mossa del nemico è una risorsa inestimabile per vincere le guerre. Pertanto, le nostre spie saranno specializzate nell'infiltrazione dell'amministrazione di uno Stato e ci trasmetteranno qualsiasi tipo di informazione.
 newspapers_advance: "Giornali"
 newspapers_advance_desc: "Il concetto di annunci annunciati o affissi dove il pubblico può leggerli non è certamente nuovo. Tuttavia, con la crescente popolarità del $printing_press$ in tutto il mondo, aumenta anche la domanda di informazioni accessibili sulla politica, la guerra e l'economia. Il giornale, una pubblicazione periodica che descrive gli eventi attuali, soddisfa questa domanda."

 feudal_de_jure_law_advance: "$feudal_de_jure_law$"
 feudal_de_jure_law_advance_desc: "#italic De jure#! - 'per legge' - è una descrizione di pratiche legalmente riconosciute indipendentemente dalla realtà della loro applicazione. I sistemi di una società feudale si basano proprio su questo concetto."

 semi_salic_law_advance: "$semi_salic_law$"
 semi_salic_law_advance_desc: "Secondo il diritto del $salic_law$, solo gli uomini possono ereditare il trono. Questa pratica porta a una crisi di successione nei casi in cui la linea di sangue maschile si estingue e la monarchia viene gettata nel caos. Al fine di evitare tali disordini, i diritti delle donne saranno ampliati per includere l'idoneità a governare la nazione, qualora non esistano eredi maschi idonei."

 republican_foundation_law_advance: "$republican_foundation_law$"
 republican_foundation_law_advance_desc: "$republican_foundation_law_desc$"

 republican_election_law_advance: "$republican_election_law$"
 republican_election_law_advance_desc: "$republican_election_law_desc$"

 republican_electorate_law_advance: "$republican_electorate_law$"
 republican_electorate_law_advance_desc: "$republican_electorate_law_desc$"

 republican_power_law_advance: "$republican_power_law$"
 republican_power_law_advance_desc: "$republican_power_law_desc$"

 principle_of_administration_law_advance: "Principio del Diritto Amministrativo"
 principle_of_administration_law_advance_desc: "La naturale evoluzione del nostro complesso governo impone l'adozione di nuove leggi relative alla nostra amministrazione."

 monarchy_reform_traditions_advance: "Tradizioni di Riforma Monarchica"
 monarchy_reform_traditions_advance_desc: "L'autorità non può essere affidata a chiunque. Concentrare il potere e l'influenza nelle mani del sovrano aiuterà a creare ordine e stabilità in tutto il regno."

 republic_reform_traditions_advance: "Tradizioni di Riforma Repubblicana"
 republic_reform_traditions_advance_desc: "La diffusione del potere è un principio fondamentale di qualsiasi repubblica sana. Leggi solide che impongono elezioni tramite sorteggio garantiranno stabilità e ridurranno la corruzione."

 blockade_tactics: "Tattiche di Blocco"
 blockade_tactics_desc: "L'impiego di formazioni e pattuglie efficaci vicino ai porti nemici ci consentirà di interrompere più facilmente le loro linee di rifornimento, abbreviando gli assedi."

 recovery_efforts: "Sforzi di Recupero"
 recovery_efforts_desc: "La guerra è un'amante crudele che non lascia dietro di sé altro che rovine e devastazione. Concentrando i nostri sforzi sull'assistenza al nostro popolo nel ritorno alla vita normale dopo tanto orrore, potremo accelerare la ripresa in tutto il regno."

 naval_initiative_ren: "Tattiche di Dispiegamento"
 naval_initiative_ren_desc: "È vero che spesso la vittoria va a chi sferra il primo colpo. Uno studio approfondito e un'efficace attuazione delle tattiche di dispiegamento ci consentiranno di mobilitarci rapidamente e di prendere l'iniziativa nelle situazioni di combattimento, aiutandoci a raggiungere quella vittoria."

 army_initiative_ren: "Primo Colpo"
 army_initiative_ren_desc: "L'elemento sorpresa, combinato con il primo colpo sferrato, spesso determina il vincitore finale in un conflitto armato. Rafforzare la nostra iniziativa militare è un ottimo modo per mantenere un vantaggio competitivo."

 law_making_renaissance: "Controllo Giuridico"
 law_making_renaissance_desc: "I nuovi tempi comportano nuove situazioni e le leggi in vigore da generazioni potrebbero non essere applicabili a questi nuovi contesti. Dovremmo incaricare esperti legali di esaminare e rivedere continuamente le nostre leggi, in modo da poterle adattare ai tempi e alle esigenze attuali."

 subject_integration: "Consolidamento dei Titoli"
 subject_integration_desc: "Sebbene avere molti paesi al nostro servizio possa essere vantaggioso, solo riunendo i loro diversi titoli sotto il nostro potremo utilizzare al meglio le loro risorse. Alla fine, è chiaro che un sovrano con un solo titolo impallidirà al confronto con noi, con la nostra splendida serie di titoli dal suono imponente."

 rgo_construction_ren: "Iniziative Infrastrutturali"
 rgo_construction_ren_desc: "Il nostro paese non è nulla senza la sua terra e la sua gente. Migliorare le infrastrutture della nostra nazione andrà a vantaggio sia della gente comune che di noi stessi."

 naval_repair_ren: "Giunti più Resistenti"
 naval_repair_ren_desc: "Tutti sanno che un foro nello scafo di una nave ne causerà inevitabilmente l'affondamento. Con tecniche di costruzione migliori, possiamo costruire uno scafo con assi più saldamente unite, rendendo le navi meno soggette a perdite e i fori nello scafo molto più facili da riparare."

 linked_armies_advance: "Trasmissione dei Messaggi"
 linked_armies_advance_desc: "Un buon coordinamento tra le diverse unità di un esercito è fondamentale per il suo buon funzionamento. Avere un sistema organizzato per trasmettere i messaggi tra i nostri generali e i loro ufficiali di unità permette a tutte le nostre truppe di lavorare in modo più coeso e di rispondere più rapidamente a qualsiasi situazione."

 regular_levy_training: "Istruzioni Designate"
 regular_levy_training_desc: "Per definizione, le leve non sono le truppe meglio addestrate, ma ciò non significa che dobbiamo mandare in guerra un gruppo di soldati non addestrati. Assegnando loro istruttori adeguati provenienti dalle nostre unità più competenti, potranno imparare dai migliori, e un periodo di addestramento obbligatorio con loro li renderà pronti e desiderosi di combattere."

 court_accounting: "Contabilità della Corte"
 court_accounting_desc: "La corte è il simbolo del paese e la sua prosperità deve rappresentare la prosperità dello stato. Tuttavia, ciò non significa che la corte possa spendere più di quanto il paese possa sostenere, e dovrebbe esserci una contabilità adeguata che controlli le spese della corte. 
 lead_ore_dressing: "Trattamento del Piombo"
 lead_ore_dressing_desc: "Attraverso il processo di lavorazione, il minerale di piombo viene lavato e frantumato per rimuovere le impurità e separare il minerale dalle rocce, dall'argilla e da altri minerali."

 bole_smelting: "Fusione in Forno Aperto"
 bole_smelting_desc: "Metodo in cui il piombo viene fuso all'aria aperta utilizzando i forti venti costanti che soffiano in cima alle colline per soffiare aria fresca nel minerale in fusione."

 cupola_smelting: "Cubilotto"
 cupola_smelting_desc: "Utilizzando un forno a forma di cilindro, questo metodo fornisce un processo economico ed efficiente di fusione del ferro, con la capacità unica di fusione continua."

 faster_levy_recruitment: "Formazione Obbligatoria sull'Uso delle Armi"
 faster_levy_recruitment_desc: "Tutti i contadini maschi devono essere esperti nell'uso della lancia o dell'arco e allenarsi regolarmente, in modo da essere soldati competenti nel caso in cui fossero chiamati alle armi."

 merchant_power_from_maritime_discovery_advance: "Gilde dei Mercanti"
 merchant_power_from_maritime_discovery_advance_desc: "Le confraternite dei mercanti consentono ai nostri commercianti di organizzarsi, condividere informazioni sulle rotte commerciali redditizie e unire le forze quando acquistano e vendono nei mercati esteri."

 merchant_power_from_maritime_reformation_advance: "Compagnie Mercantili"
 merchant_power_from_maritime_reformation_advance_desc: "L'espansione dei mercati oltreoceano, con le relative spese e i rischi, richiede la creazione di associazioni di mercanti che condividano l'onere del commercio in queste nuove terre."

 merchant_power_from_maritime_absolutism_advance: "Camera di Commercio"
 merchant_power_from_maritime_absolutism_advance_desc: "Con l'emergere di nuove idee sul commercio e l'economia, le imprese locali si sono unite per formare una rete commerciale in grado di promuovere i loro interessi e proteggere i loro diritti contro le entità politiche e le influenze straniere."

 paper_guild_fiber_pulp_maintenance_advance: "$paper_guild_fiber_pulp_maintenance$"
 paper_guild_fiber_pulp_maintenance_advance_desc: "Grazie all'utilizzo di piante fibrose come la canapa o il gelso da carta, la produzione di carta diventerà ampiamente disponibile in tutto il mondo. Sebbene economica da produrre, questa carta è di scarsa qualità."

 paper_guild_cloth_maintenance_advance: "$paper_guild_cloth_maintenance$"
 paper_guild_cloth_maintenance_advance_desc: "La carta del $paper_guild_cloth_maintenance$, prodotta con cotone non idoneo alla lavorazione o ad altri usi, stabilisce nuovi standard di qualità e durata."

 paper_guild_wood_pulp_maintenance_advance: "$paper_guild_wood_pulp_maintenance$"
 paper_guild_wood_pulp_maintenance_advance_desc: "Utilizzando legno tenero ampiamente disponibile, la produzione della carta sarà più facile ed economica che mai.
 cannon_guild_steel_maintenance_advance: "Cannoni con Canna in Acciaio"
 cannon_guild_steel_maintenance_advance_desc: "L'uso di cannoni in acciaio conferirà alla nostra artiglieria maggiore precisione e gittata, senza comprometterne la mobilità."

 firearms_guild_steel_maintenance_advance: "Armi da Fuoco con Canna in Acciaio"
 firearms_guild_steel_maintenance_advance_desc: "L'introduzione dell'acciaio nella produzione di armi da fuoco ci consente di produrre armi più affidabili in quantità maggiori."

 grant_privilege_cost_modifier_renaissance_advance: "Privilegi e Doveri Codificati"
 grant_privilege_cost_modifier_renaissance_advance_desc: "Codificando formalmente i ruoli sociali di ciascun ceto nella legge scritta, chiariremo i loro esatti privilegi e obblighi. Quando i diritti e le responsabilità sono chiaramente definiti, ciascun ceto sa esattamente cosa gli spetta e cosa deve in cambio, e quindi sarà più facile per noi concedere nuovi privilegi senza scatenare rivalità."

 war_no_cb_cost_modifier_renaissance_advance: "Guerra Ricorrente"
 war_no_cb_cost_modifier_renaissance_advance_desc: "La natura della guerra è fortemente influenzata dagli attori coinvolti. Coloro che dispongono di capacità superiori possono condurre guerre più lunghe, e quindi le guerre tra Stati stanno diventando sempre più comuni."

 global_nobles_max_literacy_advance: "Letteratura Nobiliare"
 global_nobles_max_literacy_advance_desc: "I nobili stanno cambiando sempre più la loro funzione primaria da guerrieri a cortigiani al servizio diretto del loro sovrano, portandoli a dare più importanza alle questioni intellettuali che a quelle militari. Ciò ha creato una domanda di letteratura coinvolgente che faccia appello alla loro sensibilità aristocratica."

 global_burghers_max_literacy_advance: "Letteratura Mercantile"
 global_burghers_max_literacy_advance_desc: "I membri della nostra classe mercantile fanno affidamento sulle loro capacità per guadagnarsi da vivere, e tali capacità dipendono a loro volta dal fatto di aver ricevuto un'istruzione approfondita in determinati campi. La loro maggiore ricchezza aumenta anche la loro domanda di qualsiasi letteratura che possa ampliare la loro cultura scritta."

 global_clergy_max_literacy_advance: "Letteratura Clericale"
 global_clergy_max_literacy_advance_desc: "I chierici devono essere colti per la natura della loro professione, che ruota attorno all'apprendimento, all'interpretazione e alla diffusione della dottrina religiosa. Pertanto, la loro formazione spirituale e la loro efficacia complessiva dipendono in larga misura dal loro accesso alla dottrina e agli insegnamenti religiosi."

 land_morale_recovery_renaissance_advance: "Marcia Militare Organizzata"
 land_morale_recovery_renaissance_advance_desc: "La gestione degli eserciti diventa sempre più complessa man mano che questi ultimi dipendono meno dalle leve. Un aspetto fondamentale di questo processo è il miglioramento dell'organizzazione degli eserciti in marcia, che aiuta le truppe ad essere più preparate in caso di battaglia."

 merchant_power_from_maritime_renaissance_advance: "Partnership Commerciali"
 merchant_power_from_maritime_renaissance_advance_desc: "La crescente importanza del commercio a lunga distanza ha portato i mercanti a innovare nuovi modi per sfruttare al meglio le loro attività attraverso partnership. Il tipo più comune è quello in cui un partner investe una somma di denaro nella spedizione commerciale, mentre l'altro si occupa del viaggio e dell'approvvigionamento delle merci da vendere al loro ritorno."

 merchant_power_from_maritime_revolutions_advance: "Compagnie Limitate"
 merchant_power_from_maritime_revolutions_advance_desc: "I frequenti fallimenti delle compagnie di navigazione hanno portato allo sviluppo di un nuovo modello di business: le società a responsabilità limitata, in cui la responsabilità degli azionisti è limitata al loro investimento iniziale. Questa protezione dal debito illimitato rende tali partnership molto meno rischiose e più attraenti per i potenziali investitori."

 send_people_to_colonial_charter_advance: "Nuove Terre dell'Abbondanza"
 send_people_to_colonial_charter_advance_desc: "Nuove terre significano nuove opportunità e nuove risorse da sfruttare. Incoraggiando la nostra popolazione a stabilirsi all'estero e a sfruttare queste abbondanti risorse, otterremo enormi benefici."

 send_people_to_the_colonies_advance: "Nuove Terre di Opportunità"
 send_people_to_the_colonies_advance_desc: "Un mondo completamente nuovo si apre davanti a noi, e questo significa che la nostra gente sogna come potrebbe essere la propria vita in queste terre lontane. Dovremmo incoraggiare questi pensieri, abbellendo le storie di oro e gloria che si possono trovare nei territori inesplorati, in modo che la nostra gente sia desiderosa di colonizzare queste nuove terre per noi."

 study_institutions_advance: "Conoscenza Condivisa"
 study_institutions_advance_desc: "Non è una vergogna che gli altri sappiano ciò che noi non sappiamo, ma non è mai a nostro vantaggio non fare nulla per rimediare a tale ignoranza. Studiando attivamente e imparando dalle scoperte degli altri, possiamo migliorare la nostra conoscenza del mondo."

 reduce_inflations_advance: "Rigoroso Controllo Monetario"
 reduce_inflations_advance_desc: "Alcuni potrebbero pensare che se abbiamo bisogno di più denaro, l'unica cosa da fare sia coniarne di più, ma ciò non è né sostenibile né saggio. Mantenendo un controllo rigoroso sulla nostra industria di conio, possiamo tenere sotto controllo l'inflazione e forse persino ridurla."

 pop_promote_actions_advance: "Scala Sociale"
 pop_promote_actions_advance_desc: "Si dice che il caos sia una scala per coloro che cercano uno status più elevato. Per noi, questa scala non deriva dal caos, ma dall'ordine, poiché abbiamo sistematizzato percorsi che consentono alla nostra gente di migliorare la propria posizione sociale attraverso il merito. Non solo permettiamo tale avanzamento, ma lo incoraggiamo attivamente."

 alleviate_concerns_advance: "Allentare le Tensioni"
 alleviate_concerns_advance_desc: "Nessun paese trae vantaggio dal fatto che i suoi vicini siano costantemente vigili sui suoi movimenti. Dobbiamo impiegare una diplomazia attiva per allentare immediatamente qualsiasi tensione che possa sorgere, in modo che i nostri vicini non abbiano motivo di preoccuparsi di noi."

 counter_espionage_action_advance: "Accesso Limitato alle Informazioni"
 counter_espionage_action_advance_desc: "Non possiamo aspettarci di ottenere buoni risultati né in ambito diplomatico né in ambito militare se i nostri segreti possono essere facilmente divulgati a qualsiasi paese straniero. Dobbiamo mantenere un controllo più rigoroso sul flusso delle nostre informazioni per bloccare rapidamente qualsiasi possibile fuga di notizie."

 pacify_population_advance: "Controllo degli Agitatori"
 pacify_population_advance_desc: "A un certo punto, la popolazione potrebbe manifestare malcontento nei confronti della nostra leadership: è praticamente inevitabile. Tuttavia, queste lamentele non si trasformeranno in qualcosa di grave fintanto che non le lasciamo degenerare. Se cerchiamo attivamente coloro che alzano la voce contro di noi, possiamo stroncare sul nascere qualsiasi agitazione prima che abbiano la possibilità di radunare altri intorno a loro, mantenendo così la popolazione soddisfatta. O almeno compiacente."

 nation_state_advance: "Stato Nazione"
 nation_state_advance_desc: "Unirsi in un'unica cultura sotto un'unica bandiera è un'idea potente e commovente. Promuovendo un senso di identità nazionale, garantiremo la lealtà dei nostri sudditi e cittadini alla nostra causa."

 LIV_a_order_knights: "Cavalieri dell'Ordine di Livonia"
 LIV_a_order_knights_desc: "La nostra nazione è fondata sulle spalle forti dei coraggiosi uomini cristiani che si sono uniti al nostro ordine come cavalieri. La loro abilità marziale compenserà il nostro numero esiguo rispetto a quello dei pagani che ci circondano, così come la luce e la forza della nostra fede."

 LIV_a_order_knights_2: "Alfieri dell'Ordine di Livonia"
 LIV_a_order_knights_2_desc: "I cavalieri del nostro ordine hanno dimostrato più volte il loro valore e la loro abilità in battaglia. Promuovendo i più capaci tra loro al grado di alfiere, ci assicuriamo che i nostri eserciti siano sempre guidati dai migliori."

 wallachian_tradition: "Una Nazione Fortificata"
 wallachian_tradition_desc: "Le nostre terre sono delimitate dalle montagne e dal fiume Danubio, ma per il resto sono piuttosto pianeggianti. Il ricco suolo del nostro territorio è come un'autostrada per gli eserciti invasori una volta che hanno superato la nostra barriera naturale. Per difendere meglio il nostro popolo, costruiremo fortificazioni e castelli in tutta la regione."

 wallachian_heritage: "Una Storia di Resistenza"
 wallachian_heritage_desc: "Avendo fatto parte di diversi imperi in passato, il nostro popolo è composto da combattenti resilienti. Qualsiasi nemico che osi attaccarci pagherà con il sangue."

 khedivates: "Khedivati"
 khedivates_desc: "I grandi imperi sono solitamente formati attorno a un territorio centrale e circondati da nazioni soggette dalla lealtà piuttosto dubbia. Dovremmo adottare le misure necessarie per tenere queste nazioni sotto la nostra sorveglianza."

 french_tradition: "La Cour de $FRA$"
 french_tradition_desc: "Le nostre manovre diplomatiche sono rinomate per la loro complessità e raffinatezza, e i nostri abili inviati sono emulati in tutto il continente. Tuttavia, solo uno sciocco potrebbe adagiarsi sugli allori in questo momento: potremmo affinare ulteriormente la nostra diplomazia attraverso misure quali la creazione di reti di informatori e il perfezionamento dell'arte della negoziazione. Lasciamo che le altre nazioni si arrangino con le tecniche di ieri, mentre noi sperimentiamo quelle di domani."

 french_heritage: "Una Nobiltà Cavalleresca"
 french_heritage_desc: "Gli aristocratici della nostra nazione hanno sempre fornito i migliori soldati per i nostri eserciti. I loro combattenti ben addestrati serviranno la nostra nazione e sconfiggeranno i nostri nemici in nome della gloria giusta!"

 french_ambition: "Grande Armata"
 french_ambition_desc: "Se confrontati con i nostri avversari, la necessità di una riforma militare diventa dolorosamente evidente. Introducendo moderne tecniche di addestramento, possiamo trasformare le nostre truppe in una forza disciplinata in grado di distruggere qualsiasi nemico in combattimento."

 english_tradition: "Cuori di Leone"
 english_tradition_desc: "Il coraggio e la disciplina dei fanti inglesi sono stati testimoniati dalle mura difensive della $northumbria_area$ ai cieli oscuri della $FRA$. Ispirata dallo spirito leonino dei nostri re e dallo stoicismo della gente comune, la nostra fanteria combatte con la ferocia dei guerrieri anglosassoni che l'hanno preceduta."

 english_heritage: "La Nostra Casa sull'Isola"
 english_heritage_desc: "La nostra isola ci protegge dai nemici esterni, ma ciò non avrà importanza se non proteggeremo le acque circostanti. Essendo veri padroni dei mari che ci circondano, manterremo un controllo saldo su coloro che minacciano la nostra terra."

 english_ambition: "Sovrani delle Onde"
 english_ambition_desc: "Qualsiasi nazione che intenda dominare i mari deve disporre di una massiccia presenza navale. La nostra flotta sarà così imponente che le coste dei nostri nemici saranno sempre circondate dalle nostre navi."

 omani_tradition: "Golfo dell'$OMA$"
 omani_tradition_desc: "La nostra nazione si trova alle spalle degli ampi e ostili deserti dell'$arabia_region$, ma il mare a est ci permette di aggirarli. È via mare, non via terra, che dovremo svolgere la nostra diplomazia, il nostro commercio e la nostra espansione."

 omani_heritage: "Controllo del Golfo"
 omani_heritage_desc: "I nostri marinai sono abituati a navigare in lungo e in largo sui mari, ma è il controllo del golfo che ci circonda che rende possibili tali viaggi. Dobbiamo essere sempre pronti a difendere le nostre acque da qualsiasi minaccia straniera."

 omani_ambition: "Isolamento Territoriale"
 omani_ambition_desc: "Pur non essendo un'isola, la nostra terra è di fatto isolata dal resto dell'$arabia_region$ a causa dei deserti circostanti. Per questo motivo, abbiamo imparato quanto sia fondamentale avere accesso al mare e quanto sia utile per noi privare i nostri nemici di questa possibilità."

 breton_tradition: "Penisola del $breton$"
 breton_tradition_desc: "Da quando i nostri antenati sono arrivati dal $great_britain_region$, le nostre vaste proprietà costiere sono state animate da un'intensa attività. La nostra gente vive del mare e per il mare, e i nostri porti sono sempre pieni di navi mercantili e pescherecci."

 house_of_parliament_advance: "$house_of_parliament$"
 house_of_parliament_advance_desc: "$house_of_parliament_desc$"

 lacquerware_guild_advance: "$lacquerware_guild$"
 lacquerware_guild_advance_desc: "$lacquerware_guild_desc$"

 bur_between_two_realms: "Tra Due Regni"
 bur_between_two_realms_desc: "Possiamo considerarci membri sia delle terre tradizionali del $hre$, sia del regno della $FRA$. Sebbene ciò possa complicare i rapporti feudali, questa situazione ci ha resi abili diplomatici, capaci di giocare abilmente su entrambi i fronti a nostro vantaggio."

 bur_knightly_prowess: "Prodezza Cavalleresca"
 bur_knightly_prowess_desc: "Occupiamo una posizione prestigiosa all'interno del sistema feudale della $FRA$. Pertanto, è giusto che le nostre truppe siano viste come un riflesso dello spirito borgognone."

 bur_rich_soil_of_burgundy: "Promuovi l'Agricoltura"
 bur_rich_soil_of_burgundy_desc: "Le terre della $BUR$ sono particolarmente adatte alla coltivazione di piante e all'allevamento di animali. L'uva è particolarmente adatta alle condizioni di coltivazione locali. Con una coltivazione esperta, dovrebbe essere facile promuovere un'industria agricola."

 mos_skilled_tax_collectors: "Esattori delle Tasse"
 mos_skilled_tax_collectors_desc: "La nostra posizione di esattori dei tributi per il $GLH_horde$ ci ha permesso di acquisire molti anni di esperienza nella riscossione dei tributi... e nel trattenere parte dei profitti per noi stessi."

 mos_dynastic_ties: "Governare Attraverso i Legami Dinastici"
 mos_dynastic_ties_desc: "Le terre della $russian_region$ sono state governate da un'unica dinastia da tempo immemorabile. Dovremmo sfruttare la nostra posizione tra i nostri pari e i nostri legami di sangue per assumere un ruolo di leadership."

 mos_patrol_the_territories: "Leve Organizzate"
 mos_patrol_the_territories_desc: "Governare la vasta distesa del $russian_region$ non è un compito facile. Dovremmo istituire centri di reclutamento locali per facilitare l'arruolamento nelle nostre armate."

 russian_integration: "Tradizione $russian_group$"
 russian_integration_desc: "Il $russian_group$ è vasto e culturalmente diversificato. Per unificarlo come fecero un tempo i sovrani del passato, dovremmo promuovere la nostra storia comune e creare un legame culturale indissolubile tra i diversi gruppi."

 russian_resiliance: "Reclutamento $russian_group$"
 russian_resiliance_desc: "Le invasioni del $mongolian_group$ del passato hanno lasciato nel popolo $russian_group$ una forte determinazione a resistere al dominio straniero. Possiamo sfruttare il loro zelo per rafforzare le nostre truppe."

 land_of_the_rus: "Terra dei Rus'"
 land_of_the_rus_desc: "La riunificazione dei Rus' è un obiettivo comune tra i governanti del $russian_group$, e gli aspiranti conquistatori possono utilizzarlo come giustificazione per la conquista."

 russian_legitimization: "Legittimità Comune"
 russian_legitimization_desc: "Il popolo del $russian_group$ ha occupato e governato queste terre per secoli. È naturale che un sovrano del $russian_group$ governi il proprio popolo. Più ci presentiamo come $russian_group$, più facile sarà per il popolo accettare la nostra leadership."

 nor_seaborn_country: "Paese Marittimo"
 nor_seaborn_country_desc: "Il popolo norvegese ha sempre scelto di attraversare il paese in barca, ogni volta che era conveniente. Questo rende il nostro popolo abile nella navigazione, pronto a imbarcarsi nella nostra marina militare ogni volta che è necessario."

 nor_bounties_of_the_sea: "Mari Generosi"
 nor_bounties_of_the_sea_desc: "La terra norvegese non è in grado di fornire al nostro popolo cibo a sufficienza per sostentarsi. Ci rivolgeremo quindi al mare per nutrire la nostra gente. Fortunatamente, le acque del Mare del Nord ci offrono abbondanti zone di pesca."

 nor_merchant_tradition: "Mercanti Norvegesi"
 nor_merchant_tradition_desc: "I porti della $NOR$ sono da tempo una destinazione ambita dai mercanti di tutto l'$europe$. È giunto il momento non solo di ospitare mercanti stranieri nei nostri porti, ma anche di trarre noi stessi vantaggio dai commerci dell'$europe$ settentrionale."

