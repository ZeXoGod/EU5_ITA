 #Novgorod
 northern_center_of_arts: "Centro delle Arti del Nord"
 #northern_center_of_arts_desc: "La città di Novgorod è un importante centro culturale in Europa. Storie epiche basate su un alto livello di alfabetizzazione, splendide icone e architetture grandiosi aumentano il prestigio della nostra fiorente città e dell'intera nazione." #OLD ITA
 northern_center_of_arts_desc: "$novgorod$ is an important cultural center in $europe$. Epic tales are told of our's literate and intellectual population, intricate religious art, and grand architecture, increasing the prestige of our flourishing city and indeed the whole nation." #NEW
 #northern_center_of_arts_desc: "The city of Novgorod is an important cultural center in Europe. Epic stories based on a high level of literacy, beautiful icons, and grandiose architectures increase the prestige of our flourishing city and the whole nation." #OLD ENG
 city_of_churches: "Città delle Chiese"
 #city_of_churches_desc: "Oltre 80 chiese ortodosse a Novgorod, in particolare la Dom Svyatoy Sofii, sono tra i maggiori proprietari terrieri del principato. Grazie alla loro ricchezza e al loro prestigio religioso, le chiese influenzano la popolazione in molti settori e i nostri cittadini sono più devoti, in senso positivo." #OLD ITA
 city_of_churches_desc: "There are over eighty $orthodox_ADJ$ churches in $novgorod$, and some are the largest landholders in the principality. Their wealth and religious prestige allows the Church to significantly influence the population in many areas, and our citizens are more pious as a result — in a good way." #NEW
 #city_of_churches_desc: "Over 80 Orthodox Churches in Novgorod, especially Dom Svyatoy Sofii, are some of the largest landholders in the principality. With their wealth and religious prestige, the Churches influence the population in many areas, and our citizens are more pious, in a good way." #OLD ENG
 novgorodian_fur_trade: "Commercio di Pellicce di Novgorod"
 #novgorodian_fur_trade_desc: "La pelliccia, l'oro morbido della Russia. Mentre altri stati commerciali traggono la loro ricchezza dal commercio dell'oro e di altri metalli rari, la nostra fonte di reddito proviene dalle pellicce di alta qualità che la madrepatria ci fornisce." #OLD ITA
 novgorodian_fur_trade_desc: "$fur$, the silken gold of $RUS$! While other states gain their wealth from trading in $goods_gold$ and other rare metals, our source of income comes from the high-quality $fur$ the motherland provides us with." #NEW
 #novgorodian_fur_trade_desc: "Fur, the soft gold of Russia. While other trading states gain their wealth from trading in gold and other rare metals, our source of income comes from the high-quality furs the motherland provides us with." #OLD ENG
 grand_dukes_army: "Esercito del Granduca"
 #grand_dukes_army_desc: "Guidare le truppe è il compito più importante del Granduca, che è stato invitato a governare la Repubblica di Veche. Sotto la sua guida forte ed esperta, i nostri eserciti diventeranno più efficienti in battaglia." #OLD ITA
 grand_dukes_army_desc: "Leading troops is the most important duty for the Grand Duke, who is appointed to rule over the Veche Republic. Under such strong and experienced leadership, our armies will become far more deadly in battle." #NEW
 #grand_dukes_army_desc: "Leading troops is the most important duty for the Grand Duke, who is invited to rule over the Veche Republic. Under his strong and experienced leadership, our armies will become more efficient in battle." #OLD ENG
 ushkuiniks: "Gli Ushkuyniks"
 #ushkuiniks_desc: "I pirati Ushkuynik, simili ai Vichinghi, erano uno strumento utile per reprimere i nostri concorrenti. Purtroppo, questa attività è stata interrotta a causa dell'intervento straniero, principalmente da parte di Mosca. Dovremmo ricominciare a finanziarli e spingere queste attività piratesche verso mari più lontani, per ricordare a tutti chi è il vero padrone del nord..." #OLD ITA
 ushkuiniks_desc: "The Viking-like #italic Ushkuynik#! pirates were once a useful tool to suppress our competitors. Unfortunately, we were forced to stop using them due to foreign intervention, mainly from Moscow. We should begin funding them again, and send these pirates to plunder farther shores — that will show everyone who the true masters of the North are!" #NEW
 #ushkuiniks_desc: "The Viking-like Ushkuynik pirates were a useful tool to suppress our competitors. Unfortunately, it was stopped due to foreign intervention, mainly from Moscow. We should begin to fund them again and push these pirate activities to further seas to remind everyone who's the real master of the north..." #OLD ENG
 baltic_shipyard: "Cantiere Navale Baltico"
 #baltic_shipyard_desc: "Costruire un Grande cantiere navale sulla costa orientale del Mar Baltico e dominare il commercio d'oltremare!" #OLD ITA
 baltic_shipyard_desc: "We shall build a grand shipyard on the eastern coast of the Baltic Sea, and dominate overseas trade!" #NEW
 #baltic_shipyard_desc: "Build a Grand shipyard at the eastern coast of the Baltic Sea and dominate the overseas trade!" #OLD ENG
 veche_advance: "La Veche"
 #veche_advance_desc: "$veche_advance$ è l'assemblea popolare che affonda le sue origini nelle antiche riunioni tribali molto precedenti all'epoca dei Rus'. È la massima autorità giudiziaria e legislativa dello Stato." #OLD ITA
 veche_advance_desc: "$veche_advance$ is a popular assembly with its origins in ancient tribal councils, which themselves existed long before the time of the Rus'. It is the highest judicial and legislative authority of the state." #NEW
 #veche_advance_desc: "$veche_advance$ is the popular assembly with its origins in the ancient tribal meetings long before the time of the Rus'. It is the highest judicial and legislative authority of the state." #OLD ENG
 #birch_bark_manuscript: "Manoscritto su Corteccia di Betulla" #OLD ITA
 birch_bark_manuscript: "Birchbark Manuscripts" #NEW
 #birch_bark_manuscript: "Birch Bark Manuscript" #OLD ENG
 #birch_bark_manuscript_desc: "Scrivere e leggere è un pilastro fondamentale della nostra società. I testi religiosi, così come gli eventi della nostra storia, devono essere messi per iscritto affinché le generazioni future possano conoscere le nostre conquiste culturali." #OLD ITA
 birch_bark_manuscript_desc: "Writing and reading are fundamental pillars of our society. Religious texts, as well the details of our history, need to be written down so that future generations can learn of our cultural achievements. We have an abundant supply of birch trees in this nation, and their papery white bark will become our parchment." #NEW
 #birch_bark_manuscript_desc: "Writing and reading is a fundamental pillar of our society. Religious texts, as well as events of our history, need to be written down so that future generations can learn of our cultural achievements." #OLD ENG
 #novgorod_first_chronicle: "Prima Cronaca di Novgorod" #OLD ITA
 novgorod_first_chronicle: "$NOV$ First Chronicle" #NEW
 #novgorod_first_chronicle: "Novgorod First Chronicle" #OLD ENG
 #novgorod_first_chronicle_desc: "La #italic Prima Cronaca di Novgorod#! racconta la storia del Paese, dalle origini leggendarie del capo Varangiano Rurik fino ai giorni nostri. È un patrimonio culturale che viene tramandato con orgoglio di generazione in generazione." #OLD ITA
 novgorod_first_chronicle_desc: "The #italic Novgorod First Chronicle#! details the history of our country, from the days of the legendary Varangian chieftain Rurik up to the present. It is a cultural heirloom that is proudly handed down from one generation to another." #NEW
 #novgorod_first_chronicle_desc: "The #italic Novgorod First Chronicle#! tells the History of the country, from the legendary beginning of the Varangian chieftain Rurik to the present day. It is a cultural heirloom that is proudly transmitted from one generation to another." #OLD ENG
 #defenses_of_novgorod: "Difese di Novgorod" #OLD ITA
 defenses_of_novgorod: "Defenses of $NOV$" #NEW
 #defenses_of_novgorod: "Defenses of Novgorod" #OLD ENG
 #defenses_of_novgorod_desc: "La Repubblica di Novgorod è bersaglio di numerose minacce esterne. Che si tratti degli eretici Scandinavi a ovest, dei violenti Germani a sud-ovest o persino delle altre potenze Russe a sud, tutti dovranno affrontare le fortificazioni inespugnabili del nostro grande Stato." #OLD ITA
 defenses_of_novgorod_desc: "The Republic of $NOV$ is the target of many external threats. But be it the western heretics from $scandinavia_region$, the rampaging Germans to our southwest, or even other $RUS_ADJ$ powers to our south; they all shall all crumble at the feet of our unbreakable fortifications." #NEW
 #defenses_of_novgorod_desc: "The Republic of Novgorod is a target of many external threats. Be it the heretic Scandinavians to our west, the rampaging Germans to our southwest, or even other Russian powers to our south; they all shall face the unbreakable fortifications of our great state." #OLD ENG
 reforms_of_the_posadnichestvo: "Riforme del Posadnichestvo"
 #reforms_of_the_posadnichestvo_desc: "Il Posadnik è la più alta carica amministrativa nelle nostre città. Il Posadnik ha una posizione più importante di quella di un semplice sindaco. Man mano che la città cresce, crescono anche le responsabilità, l'influenza e il numero dei Posadnik." #OLD ITA
 reforms_of_the_posadnichestvo_desc: "The #italic Posadnik#! is the highest administrative position in our towns and cities, and is a more significant role than that of a mayor. As their city grows, so do the responsibilities, influence, and number of Posadniks in the administration." #NEW
 #reforms_of_the_posadnichestvo_desc: "The Posadnik is the highest administrative position in our towns and cities. The Posadnik has a more significant position than just the one of a mayor. As the city grows, so do the responsibilities, influence, and number of Posadniks." #OLD ENG

 #

 #cork_stoppers: "Tappi per Bottiglie in Sughero" #OLD ITA
 cork_stoppers: "Cork Stoppers" #NEW
 #cork_stoppers: "Cork Bottle Stoppers" #OLD ENG
 #cork_stoppers_desc: "Gli sviluppi nella produzione delle bottiglie hanno permesso ai produttori di vino di creare bottiglie di dimensioni più standardizzate e, di conseguenza, hanno potuto reintrodurre l'uso del tappo di sughero. Si tratta di un modo molto più efficiente per sigillare il vino rispetto ai vecchi tappi di stoffa e ha permesso di trasportare il vino su distanze molto più lontane di quanto si ritenesse possibile in precedenza. Forse stiamo assistendo alla nascita di un commercio mondiale del vino." #OLD ITA
 cork_stoppers_desc: "Developments in bottle manufacturing have allowed wine producers to create bottles in standardized sizes, and as a result, they have been able to reintroduce the use of cork bottlestoppers. This is a much more efficient way to seal in the wine than with cloth stoppers, and means that it can now be transported much farther away than was previously possible. Perhaps we are now seeing the birth of a worldwide $wine$ trade..," #NEW
 #cork_stoppers_desc: "Developments in bottle making have allowed Wine producers to create bottles in more standardized sizes and as a result have been able to reintroduce the use of the bottle cork. This is a much more efficient way to seal in the wine than the old cloth stoppers and has meant that wine can now be transported over distances much farther away than what was previously considered possible. Perhaps we are now seeing the birth of a worldwide wine trade." #OLD ENG
 colonial_policy_advance: "Politica Coloniale"
 #colonial_policy_advance_desc: "Le nuove terre e i territori di frontiera che il nostro popolo sta colonizzando richiedono nuove forme di gestione e organizzazione degli insediamenti." #OLD ITA
 colonial_policy_advance_desc: "The new lands and frontier territories that our people are colonizing require new forms of management and organization." #NEW
 #colonial_policy_advance_desc: "The new lands and frontier territories that our people are colonizing, require new forms of managing and organizing their settlements." #OLD ENG
 native_policy_advance: "Politica sui Nativi"
 #native_policy_advance_desc: "Le nuove terre scoperte dai nostri audaci esploratori sono solitamente abitate da popoli strani e primitivi. È giunto il momento di creare una regola unificata per regolamentare gli incontri tra le nostre forze e gli indigeni di quelle terre." #OLD ITA
 native_policy_advance_desc: "The new lands discovered by our daring explorers are usually inhabited by people we find strange and unsophisticated. It is time that we created an official policy to regulate encounters between our expeditionary forces and the natives of the lands they explore." #NEW
 #native_policy_advance_desc: "The new lands discovered by our daring explorers are usually inhabited by strange and unsophisticated people. It is time that we create a unified rule to regulate the encounters between our forces and the natives of those lands." #OLD ENG
 slave_raid_advance: "Incursioni Costiere"
 #slave_raid_advance_desc: "Il nostro Paese ha una lunga tradizione di incursioni lungo le coste per procurarsi ciò di cui ha bisogno: schiavi, denaro e tutti gli altri beni della vita." #OLD ITA
 slave_raid_advance_desc: "Our country has a long tradition of raiding the coastlines for slaves, money, and all the other necessary things in life." #NEW
 #slave_raid_advance_desc: "Our country has a long tradition of raiding the coastlines for what it requires in the form of slaves, money, and all other good things in life." #OLD ENG
 crown_power_advance_discovery: "Arte di Governare"
 #crown_power_advance_discovery_desc: "Man mano che i nostri governanti diventano l'unico potere nei loro domini, la necessità di una struttura governativa diventa evidente, portando alla creazione di un vero e proprio corpus burocratico per gestirla." #OLD ITA
 crown_power_advance_discovery_desc: "As our ruler's authority becomes the dominant power in our domain, it highlights the need for a comprehensive government structure, as well as a proper bureaucratic corpus to manage it." #NEW
 #crown_power_advance_discovery_desc: "As our rulers become the only power in their domains, the need for a government structure becomes apparent, leading to the creation of a proper bureaucratic corpus to manage it." #OLD ENG
 #crown_power_advance_reformation: "Cuius Regio, Eius Religio" #OLD ITA
 crown_power_advance_reformation: "'Cuius Regio, Eius Religio'" #NEW
 #crown_power_advance_reformation: "Cuius Regio, Eius Religio" #OLD ENG
 #crown_power_advance_reformation_desc: "Mentre il controllo dei nostri governanti sulle questioni mondane è forte, emerge come nuova necessità quella di controllare anche le questioni divine nel regno. La Chiesa e lo Stato devono diventare una cosa sola." #OLD ITA
 crown_power_advance_reformation_desc: "While our ruler has a firm grasp over matters mundane, it is becoming a necessity that they also take control of heavenly concerns. Church and state must become one." #NEW
 #crown_power_advance_reformation_desc: "While the grip of our rulers on mundane matters is strong, the need to control divine matters in the realm emerges as a new necessity. Church and State must become one." #OLD ENG
 crown_power_advance_absolutism: "Assolutismo"
 #crown_power_advance_absolutism_desc: "Ora che le questioni terrene e divine sono sotto il potere dei governanti, poche cose sfuggono al loro controllo. Sono diventati governanti assoluti." #OLD ITA
 crown_power_advance_absolutism_desc: "Now that earthly and divine matters are both under the authority of our ruler, few things escape their reach. Absolute rule now holds sway in our domain." #NEW
 #crown_power_advance_absolutism_desc: "Now that earthly and divine matters are under the power of the rulers, few things escape they reach. They have become absolute rulers." #OLD ENG
 crown_power_advance_revolutions: "Nazione"
 #crown_power_advance_revolutions_desc: "Con l'unificazione di tutti i Poteri sotto il pugno di ferro dei nostri monarchi, i loro sudditi in tutta la nazione acquisiscono consapevolezza del senso di appartenenza. Qualunque siano i domini governati dai nostri monarchi, essi fanno parte della Nazione e il loro popolo è lo stesso." #OLD ITA
 crown_power_advance_revolutions_desc: "After unifying all the powers under the iron fist of our leader, subjects across the nation have suddenly become aware of a sense of belonging. Whatever region our monarchs rule, they are part of the nation and its people all the same." #NEW
 #crown_power_advance_revolutions_desc: "With the unification of all the Powers under the iron fist of our monarchs, their subjects across the nation become aware of the feeling of belonging. Whatever domains our monarchs rule, they are part of the Nation and their people, the same." #OLD ENG
 sergeants_at_arms_advance: "Sergenti d'Armi"
 #sergeants_at_arms_advance_desc: "Piccolo gruppo di fedeli servitori che proteggono e servono il monarca, i sergenti d'armi sono un grado militare appena inferiore a quello di cavaliere. Possono servire il monarca non solo diventando guardie del corpo, ma anche riscuotendo prestiti, fungendo da forza di polizia o reclutando uomini e navi." #OLD ITA
 sergeants_at_arms_advance_desc: "A small band of loyal retainers who protect and serve the monarch, Sergeants-at-Arms rank just below knights. They serve the monarch not only by becoming bodyguards, but also by collecting loans, drafting men and ships, and acting as a police force." #NEW
 #sergeants_at_arms_advance_desc: "A small band of loyal retainers who protect and serve the monarch, Sergeants at Arms are a military rank just below the knight. They can serve the monarch not only by becoming bodyguards but also by collecting loans, serving as a police force or drafting men and ships." #OLD ENG

 #Genoa
 alberghi_28_advance: "$alberghi_28$"
 alberghi_28_advance_desc: "$alberghi_28_desc$"
 #genoese_banking_traditions: "Tradizioni Bancarie Genovesi" #OLD ITA
 genoese_banking_traditions: "$GEN_ADJ$ Banking Traditions" #NEW
 #genoese_banking_traditions: "Genoese Banking Traditions" #OLD ENG
 #genoese_banking_traditions_desc: "L'ascesa di Genova come uno dei principali centri commerciali dell'Italia medievale portò allo sviluppo precoce di nuove forme di credito e di alcune delle prime istituzioni bancarie al mondo." #OLD ITA
 genoese_banking_traditions_desc: "The rise of $GEN$ as a main commercial center of medieval $ITA$ led to the early development of new forms of credit and some of the world's earliest banking institutions." #NEW
 #genoese_banking_traditions_desc: "The rise of Genoa as one of the main commercial centers of medieval Italy led to the early development of new forms of credit and some of the world's earliest banking institutions." #OLD ENG
 #genoese_maritime_diplomacy: "Diplomazia Marittima Genovese" #OLD ITA
 genoese_maritime_diplomacy: "$GEN_ADJ$ Maritime Diplomacy" #NEW
 #genoese_maritime_diplomacy: "Genoese Maritime Diplomacy" #OLD ENG
 #genoese_maritime_diplomacy_desc: "Quando la città di Genova divenne una repubblica al servizio degli interessi dei propri mercanti, sviluppò una forte influenza all'estero e strinse numerosi accordi con alleati e clienti in tutto il Mediterraneo." #OLD ITA
 genoese_maritime_diplomacy_desc: "As the city of $GEN$ became a republic focused on serving the interests of its merchant class, it developed a strong influence abroad, and struck numerous deals with allies and clients across the Mediterranean." #NEW
 #genoese_maritime_diplomacy_desc: "As the city of Genoa became a republic serving the interests of its merchants, it developed a strong influence abroad and struck numerous deals with allies and clients across the Mediterranean." #OLD ENG
 bank_of_saint_george: "Banca di San Giorgio"
 #bank_of_saint_george_desc: "La Banca di San Giorgio è un istituto finanziario nato per consolidare tutti i debiti di Genova, con l'obiettivo di diventare il braccio creditizio del Paese, finanziando le sue imprese all'estero." #OLD ITA
 bank_of_saint_george_desc: "The Bank of Saint George is a financial institution founded to consolidate all the debts of $GEN$, with the aim of becoming the credit arm of the country and financing its enterprises overseas." #NEW
 #bank_of_saint_george_desc: "The Bank of Saint George is a financial institution born to consolidate all the debts of Genoa, with the aim of becoming the credit arm of the country, financing its enterprises overseas." #OLD ENG
 #the_age_of_the_genoese: "L'Era dei Genovesi" #OLD ITA
 the_age_of_the_genoese: "The Age of the $GEN_ADJ$" #NEW
 #the_age_of_the_genoese: "The Age of the Genoese" #OLD ENG
 #the_age_of_the_genoese_desc: "Lo sviluppo finanziario di Genova negli ultimi decenni ha portato i banchieri genovesi ad essere tra i più ricercati, stimolando lo splendore del nostro Paese diventando mecenati di artisti rinomati per le loro ville e i loro palazzi." #OLD ITA
 the_age_of_the_genoese_desc: "The financial development of $GEN$ in recent decades has led$GEN_ADJ$ bankers to becoming among the most sought-after, stimulating the splendor of our country by becoming patrons of renowned artists for their villas and palaces." #NEW
 #the_age_of_the_genoese_desc: "The financial development of Genoa in recent decades has led Genoese bankers to be among the most sought-after, stimulating the splendor of our country by becoming patrons of renowned artists for their villas and palaces." #OLD ENG
 hospital_advance: "Ospedali"
 #hospital_advance_desc: "Gli ospedali medievali sono istituzioni fondate durante il Medioevo per fornire assistenza ai malati, ai poveri e ai disabili. Gestiti in genere da ordini religiosi, questi ospedali offrivano una serie di servizi medici, tra cui assistenza infermieristica di base, rimedi erboristici e, in seguito, interventi chirurgici. Spesso erano situati vicino a chiese o monasteri e disponevano di reparti separati per uomini e donne. Nonostante le limitate conoscenze mediche, questi ospedali svolgevano un ruolo fondamentale nell'offrire rifugio, conforto e qualche forma di cura medica a chi ne aveva bisogno in un periodo storico difficile." #OLD ITA
 hospital_advance_desc: "Hospitals were first established during the Middle Ages to provide care for the sick, poor, and disabled. Typically run by religious orders, these hospitals offered a range of medical services, including basic nursing care, herbal remedies, and later on, surgery. They were often located near churches or monasteries and had separate wards for men and women. Despite limited medical knowledge, these hospitals played a vital role in offering sanctuary, comfort, and some form of medical treatment to those in need during a challenging period in history." #NEW
 #hospital_advance_desc: "Medieval hospitals are institutions established during the Middle Ages to provide care for the sick, poor, and disabled. Typically run by religious orders, these hospitals offered a range of medical services, including basic nursing care, herbal remedies, and later on, surgery. They were often located near churches or monasteries and had separate wards for men and women. Despite limited medical knowledge, these hospitals played a vital role in offering sanctuary, comfort, and some form of medical treatment to those in need during a challenging period in history." #OLD ENG
 banking_country_traditions: "Tradizioni Bancarie"
 #banking_country_traditions_desc: "Mentre molti cercano la ricchezza nelle opportunità offerte dal commercio, il nostro Stato si guadagna da vivere con l'offerta di prestiti a tassi accessibili." #OLD ITA
 banking_country_traditions_desc: "While many seek wealth in the opportunities of trade and commerce, our state fills its coffers by offering entirely fair and highly affordable loans." #NEW
 #banking_country_traditions_desc: "While many seek wealth in the opportunities of trade and commerce, our state makes its living with the offers of affordable loans." #OLD ENG
 genoese_crossbowmen: "$a_genoese_crossbowmen$"
 genoese_crossbowmen_desc: "$a_genoese_crossbowmen_desc$"
 genoese_galley: "$n_genoese_galley$"
 genoese_galley_desc: "$n_genoese_galley_desc$"
 italian_galleass: "$n_italian_galleass$"
 italian_galleass_desc: "$n_italian_galleass_desc$"
 #genoese_flexibility: "Flessibilità Genovese" #OLD ITA
 genoese_flexibility: "$GEN_ADJ$ Flexibility" #NEW
 #genoese_flexibility: "Genoese Flexibility" #OLD ENG
 #genoese_flexibility_desc: "A differenza dell'esercito, la marina militare dello Stato può servire a molteplici scopi invece di essere solo un'arma da guerra. Grazie alle nostre conoscenze ed esperienze, possiamo trasformare le nostre galee da guerra in galee mercantili e viceversa in pochissimo tempo." #OLD ITA
 genoese_flexibility_desc: "Our state navy can serve multiple purposes instead of just being a weapon for war. With our knowledge and experience, we can repurpose our war galleys to merchant galleys — and vice-versa, if need be — in no time." #NEW
 #genoese_flexibility_desc: "Unlike the military, the navy of the state can serve multiple purposes instead of just being a weapon for war. With our knowledge and experience, we can repurpose our war galleys to merchant galleys and vice versa in no time." #OLD ENG
 #genoese_school: "Scuola Genovese" #OLD ITA
 genoese_school: "$GEN_ADJ$ School" #NEW
 #genoese_school: "Genoese School" #OLD ENG
 #genoese_school_desc: "La pittura rinascimentale è una tradizione italiana. Non sorprende quindi che uno Stato ricco e stimato come quello di Genova abbia aperto una propria scuola d'arte genovese." #OLD ITA
 genoese_school_desc: "Painting, and the visual arts in general, has flourished in $ITA$ since the $renaissance$. It is therefore hardly surprising that a rich and esteemed state such as $GEN$ opens its own $GEN_ADJ$ School of Art." #NEW
 #genoese_school_desc: "Renaissance painting is an Italian tradition. It is to little surprise that a rich and esteemed state such as the one of Genoa opens its own Genoese School of Art." #OLD ENG

 government_size_renaissance: "Gabinetto Permanente"
 #government_size_renaissance_desc: "Tradizionalmente, i sovrani avevano un consiglio di consiglieri che li assistevano e consigliavano nelle decisioni relative alla guerra e alla pace. Oggi il governo del nostro Paese è diventato così complesso che abbiamo bisogno di alcune cariche permanenti che ci aiutino ad affrontare la governance quotidiana." #OLD ITA
 government_size_renaissance_desc: "Rulers traditionally had a council of advisors to counsel them through making important decisions. Over time, our government has grown so complex that we need to establish more permanent advisory positions to help us deal with day-to-day governance." #NEW
 #government_size_renaissance_desc: "Rulers traditionally had a council of advisors to counsel and advise them in making decisions about war and peace. Now the government of our country has become so complex that we need some more permanent positions to help us deal with its day-to-day governance." #OLD ENG
 #renaissance_court: "Corte Rinascimentale" #OLD ITA
 renaissance_court: "$renaissance$ Court" #NEW
 #renaissance_court: "Renaissance Court" #OLD ENG
 #renaissance_court_desc: "Il Rinascimento si è diffuso in lungo e in largo, e per questo la nostra corte dovrebbe ora essere piena di artisti e studiosi appassionati, alla ricerca delle opere più splendide mai realizzate." #OLD ITA
 renaissance_court_desc: "The $renaissance$ has spread far and wide, and as a result, our court is attracting dedicated artists and scholars, creating the most splendid works ever made." #NEW
 #renaissance_court_desc: "The Renaissance has spread far and wide, and as such our court should now be filled with dedicated artists and scholars, seeking the most splendid works ever made." #OLD ENG
 rgo_size_advance_renaissance: "Mulini"
 #rgo_size_advance_renaissance_desc: "I mulini sono stati utilizzati sin dalla loro scoperta nell'antichità, molti secoli fa. Tuttavia, oggi siamo in grado di sviluppare mulini a vento e ad acqua più moderni ed efficienti da utilizzare nella raccolta delle materie prime." #OLD ITA
 rgo_size_advance_renaissance_desc: "Mills have been used since ancient times. However, we are now able to develop more modern and efficient wind and water mills, which in turn improve our production." #NEW
 #rgo_size_advance_renaissance_desc: "Mills have been used since they were discovered in ancient times many centuries ago. However, we are now able to develop more modern and efficient wind and water mills for use in gathering raw materials." #OLD ENG
 food_advance_renaissance: "Agricoltura Intensiva"
 #food_advance_renaissance_desc: "L'agricoltura è alla base della maggior parte delle società da tempo immemorabile. Negli ultimi tempi sono stati compiuti numerosi progressi che hanno migliorato la produttività dei nostri campi e delle nostre fattorie, consentendo di ottenere maggiori eccedenze alimentari." #OLD ITA
 food_advance_renaissance_desc: "Agriculture is the foundation of most societies. Recent advances have improved the productivity of our fields and farms, creating valuable food surpluses." #NEW
 #food_advance_renaissance_desc: "Agriculture is the base of most societies for as long as they have records. In recent times, a series of advances are being developed, improving the productivity of our fields and farms and allowing for greater food surpluses." #OLD ENG
 crown_power_advance_renaissance: "Sovranità"
 #crown_power_advance_renaissance_desc: "I metodi tradizionali di governo si basavano sulla capacità di un sovrano di gestire i diversi ceti sociali del paese. Tuttavia, le moderne teorie di governo hanno stabilito che i sovrani sono regnanti nel proprio paese e che non ci si deve sottomettere ad alcun altro potere temporale." #OLD ITA
 crown_power_advance_renaissance_desc: "Traditional governance required rulers to negotiate with estates and balance competing powers. Modern theories of government, however, establish the ruler as supreme authority within the realm — above all other institutions, estates, and subjects, while bowing to no earthly power." #NEW
 #crown_power_advance_renaissance_desc: "The traditional ways of governing have been based on the ability of a ruler to deal with the different estates of the country. However, modern theories of government have established that rulers are sovereigns in their own country and that we will bow to no other temporal power." #OLD ENG
 global_supply_limit_modifier_advance_2: "Linee di Fornitura"
 #global_supply_limit_modifier_advance_2_desc: "La guerra terrestre dipende sempre più dall'approvvigionamento dei nostri eserciti, che diventano sempre più grandi. Pertanto, una migliore organizzazione dei carri di rifornimento significherebbe una maggiore capacità operativa per essi." #OLD ITA
 global_supply_limit_modifier_advance_2_desc: "Land warfare is becoming more dependent on supplying bigger and bigger armies. Therefore, better organization of our supply carts would lead to an increased operational capacity." #NEW
 #global_supply_limit_modifier_advance_2_desc: "Land warfare is becoming more and more dependent on the supply of our increasingly bigger armies. Therefore, a better organization of the Supply Carts would mean a greater operational capacity for them." #OLD ENG
 naval_morale_advance_1: "Navigazione Medievale"
 naval_morale_advance_1_desc: "I progressi compiuti nel campo della navigazione a vela negli ultimi decenni hanno aumentato la competenza e la sicurezza dei nostri velisti, consentendo loro di navigare con sicurezza nelle acque costiere."
 slave_trade_act_advance: "Legge sulla Tratta degli Schiavi"
 #slave_trade_act_advance_desc: "Il flusso di manodopera da e verso le nostre colonie è una questione redditizia e delicata. Pertanto, dobbiamo investire nei nostri tentativi legislativi per perfezionarlo." #OLD ITA
 slave_trade_act_advance_desc: "The flow of workers to and from our colonies is a lucrative and sensitive affair. As such, we must invest in our legislative attempts to refine it." #NEW
 #slave_trade_act_advance_desc: "The flow of workforce to and from our colonies is a lucrative and sensitive affair. As such, we must invest in our legislative attempts to refine it." #OLD ENG
 order_headquarters_advance: "$order_headquarters$"
 #order_headquarters_advance_desc: "L'istituzione di ordini fedeli contribuirà senza dubbio non solo all'aumento delle capacità difensive locali, ma anche al reclutamento di un maggior numero di uomini abili." #OLD ITA
 order_headquarters_advance_desc: "Establishing loyal Orders will undoubtedly increase our local defensive capabilities and make it easier to recruit able-bodied fighters." #NEW
 #order_headquarters_advance_desc: "The establishment of faithful orders will undoubtedly contribute to not only the increase in local defensive capabilities but also to the recruitment of more able-bodied men." #OLD ENG
 LIV_crusader_forts: "Forti Crociati Baltici"
 #LIV_crusader_forts_desc: "Le numerose fortificazioni presenti sul nostro territorio devono la loro costruzione e il loro finanziamento alle numerose bande di crociati presenti sul nostro territorio. Dotate di mura robuste, queste fortificazioni serviranno e proteggeranno il nostro popolo!" #OLD ITA
 LIV_crusader_forts_desc: "The many fortifications in our territories owe their construction and funding to our numerous Crusader bands. Flanked by sturdy walls, these fortifications will serve and protect our people for years to come!" #NEW
 #LIV_crusader_forts_desc: "The many fortifications across our lands owe their construction and funding to the many crusader bands within our lands. Armed with sturdy walls, these fortifications will serve and protect our people!" #OLD ENG
 scholasticism: "Scolasticismo Classico"
 #scholasticism_desc: "Basata sulla logica Aristotelica e sugli scritti dei primi Padri della Chiesa, lo scolasticismo mira alla diffusione della conoscenza enfatizzando le credenze dogmatiche religiose e le tradizioni." #OLD ITA
 scholasticism_desc: "Based on Aristotelian logic and the writings of the early $christian_ADJ$ Fathers, scholasticism aims to spread knowledge by emphasizing religious dogmatic beliefs and traditions." #NEW
 #scholasticism_desc: "Based on Aristotelian logic and the writings of the early Christian Fathers, scholasticism aims at the spread of knowledge by emphasizing religious dogmatic beliefs and traditions." #OLD ENG
 organized_religion: "Religione Organizzata"
 #organized_religion_desc: "La Religione svolge un ruolo fondamentale in ogni società, ma non tutte le fedi hanno la stessa struttura. Una religione organizzata ha rituali e sistemi di credenze sistematicamente stabiliti e segue dottrine definite." #OLD ITA
 organized_religion_desc: "Religion plays a major role in every society, yet not every faith has the same structure. An organized religion has its rituals and belief systems systematically arranged, and follows defined doctrines." #NEW
 #organized_religion_desc: "Religion plays a major role in every society, yet not every faith has the same structure. An organized religion has its rituals and belief systems systematically arranged and follows defined doctrines." #OLD ENG
 guilds: "Gilde"
 #guilds_desc: "Una corporazione è un'associazione di mercanti o artigiani che si sono riuniti per proteggersi e aiutarsi a vicenda e per perseguire i propri interessi. Le corporazioni stabiliscono il monopolio dei propri beni e del proprio commercio e fissano gli standard di qualità e prezzo dei propri prodotti." #OLD ITA
 guilds_desc: "A guild is an association of merchants or craftsmen who have come together for mutual protection, aid, and for the pursuit of their own interests. Guilds establish monopolies of their goods and trade, and set standards for the quality and price of trade goods." #NEW
 #guilds_desc: "A guild is an association of merchants or craftsmen who have come together for mutual protection, aid, and for the pursuit of their own interests. Guilds establish monopolies of their goods and trade and set standards for the quality and price of their goods." #OLD ENG
 colonial_tradition: "Tradizioni Coloniali"
 #colonial_tradition_desc: "Il nostro Stato è formato e modellato dalle grandi ambizioni dei padri fondatori; i primi coloni provenienti dalla madrepatria. Molte delle loro usanze e tradizioni fanno parte della nostra società in questo nuovo e strano mondo." #OLD ITA
 colonial_tradition_desc: "Our state was formed and shaped by the ambitions of the 'founding fathers,' the first colonists to come over from the old country. Many of the customs and traditions they brought with them have influenced our own society in this new and strange world." #NEW
 #colonial_tradition_desc: "Our state is formed and shaped by the great ambitions of the founding fathers; the first colonists from the motherland. Many of their customs and traditions are part of our own society in this new and strange world." #OLD ENG
 colonial_heritage: "Patrimonio Coloniale"
 #colonial_heritage_desc: "Come colonia della madrepatria, portiamo l'eredità delle sue ambizioni imperiali." #OLD ITA
 colonial_heritage_desc: "As a colony, we bear the heritage of our mother country's imperial ambitions." #NEW
 #colonial_heritage_desc: "As a colony of the motherland, we bear the heritage of its imperial ambitions." #OLD ENG
 colonial_ambition: "Ambizione Coloniale"
 colonial_ambition_desc: "Molti dei nostri popoli si sono stabiliti nel Nuovo Mondo per iniziare una nuova vita; per scoprire le meraviglie oltre il mare e fare di un continente selvaggio la loro casa. La loro ambizione è la nostra, mentre ci spingiamo sempre più verso l'ignoto."
 power_projection_advance_1: "Ambizioni Imperiali"
 #power_projection_advance_1_desc: "Con la crescita dei Paesi e il consolidamento dello Stato nell'Alto Medioevo, crebbero anche le loro ambizioni, cercando di creare e ricreare imperi nelle loro regioni." #OLD ITA
 power_projection_advance_1_desc: "As the countries grew and states consolidated during the High Middle Ages, their ambitions also grew, leading to attempts at creating and recreating empires in their regions." #NEW
 #power_projection_advance_1_desc: "As the countries grew and the state consolidated in the High Middle Ages, their ambitions also grew, trying to create and recreate empires in their regions." #OLD ENG
 trade_advance_age_of_trad: "Fiere Commerciali"
 #trade_advance_age_of_trad_desc: "Con la ripresa e la crescita delle rotte commerciali durante il Medioevo, iniziarono a comparire nuove pratiche. Le fiere commerciali erano eventi su larga scala che si tenevano annualmente nelle città, dove i mercanti provenienti da luoghi diversi potevano incontrarsi e negoziare." #OLD ITA
 trade_advance_age_of_trad_desc: "As trade routes were revived and expanded during the Middle Ages, new mercantile practices began to appear. One such were trade fairs, large-scale events held annually in towns and cities where merchants and traders from different places could meet and broker deals." #NEW
 #trade_advance_age_of_trad_desc: "As trade routes recovered and grew during the Middle Ages, new practices began to appear. Trade Fairs were large-scale events held annually in towns and cities, where merchants from different places could meet and broker deals." #OLD ENG
 colonial_assembly: "Assemblea Coloniale"
 #colonial_assembly_desc: "Gran parte del potere legislativo sulle tasse e sui bilanci governativi è stato spostato nelle colonie." #OLD ITA
 colonial_assembly_desc: "Much of the legislative power over taxes and government spending has been moved into colonial administrations." #NEW
 #colonial_assembly_desc: "Much of the legislative power over taxes and governmental budgets has been moved into the colonies." #OLD ENG
 founding_fathers: "Padri Fondatori"
 #founding_fathers_desc: "Tutti quei politici, soldati e diplomatici che hanno avuto un ruolo influente nella fondazione della loro nazione, conquistando l'indipendenza del Paese e creando un nuovo sistema di governo." #OLD ITA
 founding_fathers_desc: "This refers to all the politicians, soldiers, diplomats, and others who played an influential role in establishing their nation by winning their country's independence and creating a new system of governance." #NEW
 #founding_fathers_desc: "All those politicians, soldiers, and diplomats who played an influential role in establishing their nation, by winning their country's independence and creating a new system of governance." #OLD ENG
 colonial_militia: "Milizia Coloniale"
 #colonial_militia_desc: "In assenza di guarnigioni regolari, le milizie coloniali giocarono un ruolo importante nei conflitti locali e nelle incursioni di confine contro le tribù native e le altre colonie. Composte da cittadini maschi adulti, che spesso dovevano fornire le proprie armi e il proprio equipaggiamento." #OLD ITA
 colonial_militia_desc: "In the absence of regular garrisons, colonial militias played an important role in local conflicts and border raids against native tribes and other colonies. They were typically made up of adult male citizens who were usually expected to provide their own weapons and equipment." #NEW
 #colonial_militia_desc: "In the absence of regular garrisons, colonial militias played an important role in local conflicts and border raids against native tribes and other colonies. Made up of adult male citizens who often were expected to provide their own weapons and equipment." #OLD ENG
 new_frontiers: "Nuove Frontiere"
 new_frontiers_desc: "Il movimento di spingere la frontiera coloniale sempre più verso l'interno del Nuovo Mondo, stabilendo qualsiasi cosa, da piccole stazioni commerciali a insediamenti completi con grandi aree coltivate."
 continental_trade: "Commercio Continentale"
 #continental_trade_desc: "Mentre le colonie del Nuovo Mondo dovevano importare molti prodotti manifatturieri, divennero anche un importante fornitore di materie prime per il mercato europeo." #OLD ITA
 continental_trade_desc: "While the New World colonies had to import a lot of manufactured products, they also became a major supplier of raw materials for markets in $europe$." #NEW
 #continental_trade_desc: "While the New World colonies had to import a lot of manufactured products, they also became a major supplier of raw materials for the European market." #OLD ENG
 #manufacturing_center: "Centro di Produzione di un Impero" #OLD ITA
 manufacturing_center: "Imperial Manufacturing Center" #NEW
 #manufacturing_center: "Manufacturing Center of an Empire" #OLD ENG
 #manufacturing_center_desc: "I nostri cittadini sono la base di potere dell'impero commerciale del nostro signore. Ci vengono consegnate merci straniere che poi noi modelliamo in prodotti finiti." #OLD ITA
 manufacturing_center_desc: "Our citizens are the power base of our overlord's trade empire. Foreign goods are delivered to us, which we then mold into finished products." #NEW
 #manufacturing_center_desc: "Our citizens are the power base of our overlord's trade empire. Foreign goods are delivered to us which we then mold into finished products." #OLD ENG
 free_thinkers: "Pensatori Liberi"
 #free_thinkers_desc: "L'idea che la libertà di pensiero e di parola sia un diritto di ogni uomo era forte nelle colonie. Senza di essa non potrebbe esistere la libertà pubblica." #OLD ITA
 free_thinkers_desc: "The belief that every man is entitled to both freedom of thought and freedom of speech is widely held in our colonies. Without these rights in place, there could be no such thing as civil liberty." #NEW
 #free_thinkers_desc: "The ideas that freedom of thought and freedom of speech is the right of every man were strong in the colonies. That without it there could be no such thing as public liberty." #OLD ENG
 #liberty_heroes: "Eroi della Libertà" #OLD ITA
 liberty_heroes: "Sons of Liberty" #NEW
 #liberty_heroes: "Liberty Heroes" #OLD ENG
 #liberty_heroes_desc: "Molti dei leader delle guerre d'indipendenza del Nuovo Mondo non possedevano solo le necessarie abilità militari, ma anche il carisma necessario per incoraggiare il morale e tenere insieme l'esercito, oltre a essere una guida ispiratrice per il popolo." #OLD ITA
 liberty_heroes_desc: "Many leaders of the New World independence wars possessed not only the necessary military skills, but also the charisma needed to encourage morale, hold the army together, and be an inspiration to the people." #NEW
 #liberty_heroes_desc: "Many of the leaders of the New World independence wars did not only possess the necessary military skill, but also the charisma needed to encourage morale and hold together the army and being an inspirational leader for the people." #OLD ENG
 beat_to_windward_advance: "Battuta a Windward!"
 beat_to_windward_advance_desc: "Le caravelle armate alla Lateen sono altamente manovrabili, consentendo loro di virare facilmente contro vento. Questo rende molto più veloce la navigazione in condizioni meteorologiche sfavorevoli e in mari ostili."
 route_to_the_indies_advance: "Rotta verso le Indie"
 #route_to_the_indies_advance_desc: "Il commercio con l'Estremo Oriente è essenziale per mantenere il nostro stile di vita. Tuttavia, la via terrestre è lenta e costosa. Se riuscissimo a trovare una rotta via mare, si aprirebbero molte opportunità commerciali per i mercanti del nostro Paese." #OLD ITA
 route_to_the_indies_advance_desc: "Trade with the Far East is essential to maintaining our way of life. However, the land route is slow and costly. If we could find a route over the seas, it would open up many business opportunities for our merchants." #NEW
 #route_to_the_indies_advance_desc: "Trade with the Far East is essential to maintain our way of life. However, the land route is slow and costly. If we could find a route over the seas, it would open up many business opportunities for merchants in our country." #OLD ENG
 educated_bureaucrats: "Burocrati Istruiti"
 #educated_bureaucrats_desc: "I funzionari che gestiscono la nostra amministrazione non sono analfabeti e pigri eredi delle poltrone dei loro genitori, ma persone istruite e di talento che si sono guadagnate la loro posizione con il loro impegno e il loro merito. Un'amministrazione di questo tipo può senza dubbio funzionare in modo più fluido ed efficiente di qualsiasi altra." #OLD ITA
 educated_bureaucrats_desc: "The officials running our administration are not illiterate and lazy heirs to their parent's seats, but rather educated and talented individuals who have earned their positions through effort and merit. An administration like this will undoubtedly run more smoothly and efficiently than any other." #NEW
 #educated_bureaucrats_desc: "The officials running our administration are not illiterate and lazy heirs of their parent's seats, but instead educated and talented individuals that have earned their position with their effort and merit. Such an administration can undoubtedly run more smoothly and efficiently than any other." #OLD ENG
 efficient_bureaucracy: "Burocrazia Efficiente"
 #efficient_bureaucracy_desc: "La burocrazia è l'olio che fa funzionare correttamente le ruote della nostra amministrazione. Con la nomina di burocrati efficienti, che abbiano sia il talento che la volontà di svolgere correttamente i loro compiti, possiamo garantire il buon funzionamento delle nostre strutture governative." #OLD ITA
 efficient_bureaucracy_desc: "Bureaucracy is the oil that makes the wheels of our administration turn smoothly. With the appointment of efficient bureaucrats that have both talent and the will to properly fulfill their tasks, we will ensure the seamless operation of our government structures." #NEW
 #efficient_bureaucracy_desc: "Bureaucracy is the oil that makes the wheels of our administration work properly. With the appointment of efficient bureaucrats that have both talent and will to properly fulfill their tasks we can ensure the smooth operation of our government structures." #OLD ENG
 appointed_chain_of_command: "Catena di Comando Nominata"
 #appointed_chain_of_command_desc: "Far sì che coloro che hanno più talento guidino i nostri uomini in battaglia, invece di lasciare questo compito agli inetti figli di nobili solo in base al loro sangue, permette ai nostri eserciti di lavorare in modo più efficiente, e quindi possiamo comandarne più facilmente di più grandi." #OLD ITA
 appointed_chain_of_command_desc: "Having talented military experts leading our men into battle, rather than entrusting that duty to inept nobles who only were put in leadership roles because of their blue blood, make our armies work more efficiently. The result of that is that we can more easily command larger forces." #NEW
 #appointed_chain_of_command_desc: "Getting those with the most talent to lead our men into battle instead of leaving that duty to the inept sons of nobles just based on their blood allows our armies to work more efficiently, and thus we can more easily command bigger ones." #OLD ENG
 abacus_advance: "Abaco"
 #abacus_advance_desc: "Gli abachi vengono utilizzati da sempre in tutto il mondo, ma è proprio grazie a strumenti contabili e libri contabili adeguati che possiamo tenere un conto accurato della nostra moneta. Senza di essi e senza uomini di talento che li utilizzino, saremmo ciechi di fronte all'effettiva ricchezza del nostro Paese." #OLD ITA
 abacus_advance_desc: "Abaci may be ancient technology, but it is precisely thanks to proper accounting tools and ledgers that we are able to keep accurate accounts of our wealth. Without these tools and the talented experts who know how to use them, we would be blind to the actual richness of our country." #NEW
 #abacus_advance_desc: "Abaci have been used since ages past all over the world, but it is precisely thanks to proper accounting tools and ledgers that we can keep an accurate account of our coin. Without them and talented men to use them, we would be blind to the actual richness of our country." #OLD ENG
 temporary_appointments: "Nomine Temporanee"
 #temporary_appointments_desc: "Il fatto che i membri della nostra corte ricoprano una posizione a vita comporta il rischio intrinseco di accumulare potere e influenza quanto più a lungo rimangono in quella sede, oltre a far sì che dedichino meno impegno ai loro compiti a causa dell'eccesso di routine. Possiamo invece stabilire un sistema di incarichi temporanei, in modo che i funzionari vengano assegnati alle posizioni per cui sono più qualificati, ma che vengano cambiati non appena iniziano a compiacersi dei loro compiti." #OLD ITA
 temporary_appointments_desc: "Having our court members serve a position for life carries the inherent risk of them amassing undue power and influence. They also tend to dedicate less effort to their tasks, due to being given excessive responsibilities. To avoid this messiness, we can establish a system of temporary assignments. That way, officials are assigned to the positions they are best qualified for, but can be reassigned with ease should they grow too complacent in their roles." #NEW
 #temporary_appointments_desc: "Having our court members serve a position for life has the inherent risk of them amassing power and influence the longer they are in that seat, as well as them dedicating less effort on their tasks due to excess of routine. Instead, we can establish a system of temporary assignments, so that officials are assigned to those positions they are most qualified for, but changed to another one as soon as they start getting complacent in their tasks." #OLD ENG
 #non_inheritable_offices: "Uffici non Ereditari" #OLD ITA
 non_inheritable_offices: "Non-Hereditary Offices" #NEW
 #non_inheritable_offices: "Non-Inheritable Offices" #OLD ENG
 #non_inheritable_offices_desc: "Il fatto che i nostri funzionari di corte passino i loro uffici di padre in figlio è una piaga del nostro sistema amministrativo, che non fa altro che diffondere l'apatia e il marciume in tutti i rami della nostra autorità. Tutti gli uffici dovrebbero invece essere assegnati a coloro che sono in grado di ricoprire il ruolo, indipendentemente dalla loro ascendenza." #OLD ITA
 non_inheritable_offices_desc: "Having our court officials pass their offices from father to son is a plague on our administrative system! It does nothing but cause apathy and rot to blight every branch of our authority. All offices should from now on be assigned to those best able to fulfill the required duties, regardless of their lineage." #NEW
 #non_inheritable_offices_desc: "Having our court officials pass their offices from father to son is a plague on our administrative system which only causes apathy and rot to spread to all branches of our authority. All offices should instead be assigned to those able to fulfill the post, regardless of their ascendancy." #OLD ENG
 government_sanctioned_celebrations: "Celebrazioni Ufficiali del Governo"
 #government_sanctioned_celebrations_desc: "Il nostro popolo è sempre desideroso di celebrare qualsiasi buona notizia del nostro Paese, o qualsiasi evento rilevante del nostro calendario. Invece di farli festeggiare da soli, possiamo fare in modo che la nostra amministrazione organizzi queste celebrazioni, in modo da mostrare alla popolazione non solo che ci teniamo a loro, ma anche che creiamo un senso di unità tra di loro." #OLD ITA
 government_sanctioned_celebrations_desc: "Our people are always eager to celebrate any good tidings, be they in honor of our country or to mark days on the calendar. Instead of letting them hold these joyful gatherings on their own, we should have our administration organize grand public celebrations, so that we can show our people we care about them while fostering a greater sense of unity between them at the same time." #NEW
 #government_sanctioned_celebrations_desc: "Our people are always eager to celebrate any good tidings of our country, or any relevant events of our calendar. Instead of having them hold these celebrations on their own, we can instead make our administration organize these celebrations, so that we can not only show our populace that we care about them but also forge a sense of unity among them." #OLD ENG
 efficient_logistics: "Logistica Efficiente"
 #efficient_logistics_desc: "La logistica e le comunicazioni sono ciò che ci permette di amministrare correttamente tutto il nostro territorio. Per consentire ai messaggi di andare avanti e indietro tra le nostre province e i governatori nominati, abbiamo bisogno di una rete di strade ben consolidata per far viaggiare i nostri messaggeri." #OLD ITA
 efficient_logistics_desc: "Logistics and communications are what allow us to properly administer our entire territory. To facilitate better communication between our provincial governors and the central rulership, we need a well-established network of roads for our messengers to travel upon." #NEW
 #efficient_logistics_desc: "Logistics and communications is what allows us to properly administer all our territory. To allow messages go back and forth our provinces and appointed governors, we need a well-established net of roads for our messengers to travel." #OLD ENG
 #ledgers_double_checking: "Doppio Controllo dei Libri Contabili" #OLD ITA
 ledgers_double_checking: "Meticulous Accounting" #NEW
 #ledgers_double_checking: "Double-Checking of Ledgers" #OLD ENG
 #ledgers_double_checking_desc: "È la mancanza di rigore nella contabilità che permette alla corruzione di prosperare e di far marcire i Paesi dall'interno. Per evitare questa minaccia alla nostra amministrazione, dobbiamo assicurarci che ogni variazione del nostro tesoro sia adeguatamente contabilizzata." #OLD ITA
 ledgers_double_checking_desc: "A lack of rigor in accounting is what allows corruption to thrive, and rots countries from within! To avoid this threat to our administration, we must ensure that any changes in our treasury are fastidiously accounted for." #NEW
 #ledgers_double_checking_desc: "It is the lack of rigor in accounting what allows corruption to thrive and rot countries from within. To avoid this threat to our administration, we must ensure that any change in our treasury is properly accounted for." #OLD ENG
 #province_governors: "Governatori di Provincia" #OLD ITA
 province_governors: "Provincial Governors" #NEW
 #province_governors: "Province Governors" #OLD ENG
 #province_governors_desc: "Le nostre province non sono governate in modo autonomo o da nobili locali affamati di potere. Invece, i governatori nominati dalla nostra amministrazione centrale sono i responsabili dell'espansione della nostra autorità in tutti gli angoli del Paese." #OLD ITA
 province_governors_desc: "Our provinces are not ruled autonomously, nor by any local nobles hungry for power. Instead, governors appointed by our central administration are the ones responsible for extending our authority into every settlement in our country." #NEW
 #province_governors_desc: "Our provinces are not ruled autonomously or by any local nobles hungry for power. Instead, governors appointed by our central administration are the ones responsible to expand our authority to all corners of our country." #OLD ENG
 right_to_rule: "Diritto di Governare"
 #right_to_rule_desc: "La nostra amministrazione è organizzata sulla base della premessa che le persone di talento siano assegnate ai loro incarichi appropriati. Per questo motivo, il sovrano dovrebbe essere il più talentuoso, come si addice a chi è a capo dell'intero Paese. Nel caso sfortunato in cui il sovrano fosse carente, abbiamo bisogno di persone incaricate di 'abbellire' la realtà, sia con statue imponenti, dipinti stupefacenti o versi esaltanti." #OLD ITA
 right_to_rule_desc: "Our administration is centered around the premise that the most talented people should be assigned to appropriate posts. As such, the ruler should be the most gifted member of the realm, as befits someone who leads an entire country. In the unfortunate case that the ruler might be lacking, we will need people skilled at 'embellishing' the truth to communicate the ruler's extraordinary competence, be it through imposing statues, astonishing paintings, or exalting verses." #NEW
 #right_to_rule_desc: "Our administration is organized around the premise that talented people are assigned to their appropriate posts. As such, the ruler should be the one most talented, as befits someone in charge of the whole country. In the unfortunate case that the ruler was lacking, we need people in charge of 'embellishing' reality instead, be it with imposing statues, astonishing paintings, or exalting verses." #OLD ENG
 talented_traders: "Mercanti di Talento"
 #talented_traders_desc: "Non solo la nostra amministrazione è formata da persone di talento, ma anche le persone che muovono merci e monete attraverso il nostro Paese dovrebbero esserlo. Avere le menti più brillanti a capo delle nostre operazioni commerciali garantirà che sia i prodotti che i benefici fluiscano senza interruzioni." #OLD ITA
 talented_traders_desc: "Just as we staff our administration with talented officials, we need to ensure our commercial infrastructure is managed by skilled professionals. Having only the brightest minds overseeing our trade operations will keep products moving and revenues flowing without interruption." #NEW
 #talented_traders_desc: "Not only our administration is formed of talented individuals, but also the people moving goods and coin across our country should be too. Having the brightest minds conduct our trade operations will ensure that both products and benefits flow uninterrupted." #OLD ENG
 smooth_administration: "Amministrazione Fluida"
 #smooth_administration_desc: "Avere un'amministrazione composta dalle persone più talentuose e adatte permette al nostro Paese di funzionare senza intoppi e alla nostra autorità di fluire senza interruzioni, indipendentemente dalle circostanze esterne in cui possiamo trovarci." #OLD ITA
 smooth_administration_desc: "Having an administration composed of the most talented and suitable individuals in our realm helps our country run smoothly and our authority to flow uninterrupted, regardless of any circumstances in which we may find ourselves." #NEW
 #smooth_administration_desc: "Having an administration made of the most talented and suitable individuals allows our country to run smoothly and our authority to flow uninterrupted, regardless of the external circumstances we may find ourselves in." #OLD ENG
 ara_a_maritime_realm: "Un Regno Marittimo"
 #ara_a_maritime_realm_desc: "Il regno è saldamente ancorato alla vasta distesa del mare, dirigendo la sua attenzione verso le attività marittime. Con una visione strategica, sfrutta la potenza navale e il commercio marittimo per rafforzare la sua posizione ed espandere la sua influenza. La sua attenzione per il mare plasma le politiche, promuovendo una cultura marittima che favorisce la prosperità della nazione." #OLD ITA
 ara_a_maritime_realm_desc: "Our realm is firmly fixated on the vast expanse of the sea, its attention directed towards maritime pursuits. With a strategic outlook, it harnesses naval power and maritime trade to strengthen its position and expand its influence. Our maritime focus shapes our policies, fostering a seafaring culture that propels the nation's prosperity." #NEW
 #ara_a_maritime_realm_desc: "The realm is firmly fixated on the vast expanse of the sea, directing its attention towards maritime pursuits. With a strategic outlook, it harnesses naval power and maritime trade to strengthen its position and expand its influence. Its maritime focus shapes policies, fostering a maritime culture that propels the nation's prosperity." #OLD ENG
 ara_desperta_ferro: "Desperta Ferro!"
 #ara_desperta_ferro_desc: "#italic Desperta Ferro!#! (Svegliati ferro!) è il temibile grido di battaglia di $a_almogavars$, che invoca la presenza del ferro in combattimento. È accompagnato dal battere le lance e i dardi contro le pietre focaie per creare scintille. Tra altri gridi di guerra come #italic Aragó!#! e #italic Sant Jordi!#!, #italic Desperta Ferro!#! si distingue come il più rinomato e unico di queste forze." #OLD ITA
 ara_desperta_ferro_desc: "#italic Desperta Ferro!#! — Awake Iron! — is the fearsome battle cry of the $a_almogavars$, invoking the presence of iron in combat. It is accompanied by striking lances and darts against flints to create sparks. Among other war cries like #italic Aragó!#! and #italic Sant Jordi!#!, #italic Desperta Ferro!#! stands out as the most renowned and unique." #NEW
 #ara_desperta_ferro_desc: "#italic Desperta Ferro!#! (Awake Iron!) is the fearsome battle cry of the $a_almogavars$, invoking the presence of iron in combat. It is accompanied by striking lances and darts against flints to create sparks. Among other war cries like #italic Aragó!#! and #italic Sant Jordi!#!, #italic Desperta Ferro!#! stands out as the most renowned and unique to these forces." #OLD ENG
 ara_a_mediterranean_trade_power: "Una potenza commerciale del Mediterraneo"
 #ara_a_mediterranean_trade_power_desc: "Il dolce abbraccio del Mar Mediterraneo accarezza le nostre coste, invitando il nostro popolo a impegnarsi in generazioni di attività commerciali. Le nostre vivaci città commerciali e le postazioni commerciali strategiche sparse per il Mediterraneo giocheranno un ruolo cruciale nella realizzazione della nostra ambizione di diventare una forza dominante nel commercio." #OLD ITA
 ara_a_mediterranean_trade_power_desc: "The Mediterranean Sea's gentle embrace caresses our shores, beckoning our people to engage trade endeavors from generation to generation. Our bustling commercial centers and strategic trade posts scattered throughout the Mediterranean will play a crucial role in realizing our ambition to become a dominant force in trade." #NEW
 #ara_a_mediterranean_trade_power_desc: "The Mediterranean Sea's gentle embrace caresses our shores, beckoning our people to engage in generations of trade endeavors. Our bustling commercial cities and strategic trade posts scattered throughout the Mediterranean will play a crucial role in realizing our ambition to become a dominant force in trade." #OLD ENG
 ara_fleet_ordinances: "Ordinanze della Flotta"
 #ara_fleet_ordinances_desc: "Nel vivace Mediterraneo, si riuniscono le flotte medievali, che richiedono un sistema legale per affrontare i crimini nell'affollato ambiente terrestre e marino. #italic Le Ordinaciones sobre lo fet de la mar#! o #italic Ordinanze su ciò che accade in mare#! sono uno dei primi codici di giustizia militare, creati per governare le flotte. Questa risposta unica all'epoca successiva alla Morte Nera recluta equipaggi esterni alla Corona d'Aragona, compresi i criminali, dando vita a un codice armonizzato formato da tradizioni diverse, piuttosto che a una mera codificazione delle usanze navali esistenti." #OLD ITA
 ara_fleet_ordinances_desc: "In the bustling Mediterranean, fleets gather from around the world, prompting the need for a legal system to address crimes in the crowded land and sea. #italic Ordinacions sobre lo fet de la mar#!, or #italic Ordinances on What Happens in the Sea#!, is one of the earliest military codes of justice, created to govern fleets. This unique response to the post-Black Death era recruits crew members, including criminals, from outside $ARA$, resulting in a harmonized code formed from diverse traditions rather than a mere codification of existing naval customs." #NEW
 #ara_fleet_ordinances_desc: "In the bustling Mediterranean, medieval fleets gather, prompting the need for a legal system to address crimes in the crowded land and sea environments. #italic Ordinacions sobre lo fet de la mar#! or #italic Ordinances on What happens in the sea#! stands as one of the earliest military codes of justice, crafted to govern fleets. This unique response to the post-Black Death era recruits crews from outside the Crown of Aragon, including criminals, resulting in a harmonized code formed from diverse traditions rather than a mere codification of existing naval customs." #OLD ENG
 #ara_valencian_golden_age: "Età dell'Oro di Valencia" #OLD ITA
 ara_valencian_golden_age: "$VAL_ADJ$ Golden Age" #NEW
 #ara_valencian_golden_age: "Valencian Golden Age" #OLD ENG
 #ara_valencian_golden_age_desc: "Il regno in cui viviamo è salito ad altezze letterarie ancora non raggiunte da molte nazioni vicine, grazie ai notevoli contributi di autori stimati come Joanot Martorell, Ausiàs March e Isabel de Villena. Le loro profonde opere letterarie hanno elevato la nostra cultura a livelli ineguagliabili, instillando un senso di orgoglio nel nostro popolo. Innegabilmente, la nostra nazione si erge come un radioso faro di cultura, che risplende per tutti." #OLD ITA
 ara_valencian_golden_age_desc: "The realm we inhabit has ascended to literary heights as yet unattained by many neighboring nations, thanks to the remarkable contributions of esteemed authors such as Joanot Martorell, Ausiàs March, and Isabel de Villena. Their profound literary works have elevated our culture to unparalleled levels, instilling a sense of pride within our people. Undeniably, our nation stands as a radiant beacon of culture, shining brightly for all to behold." #NEW
 #ara_valencian_golden_age_desc: "The realm we inhabit has ascended to literary heights yet unattained by many neighboring nations, thanks to the remarkable contributions of esteemed authors such as Joanot Martorell, Ausiàs March, and Isabel de Villena. Their profound literary works have elevated our culture to unparalleled levels, instilling a sense of pride within our people. Undeniably, our nation stands as a radiant beacon of culture, shining brightly for all to behold." #OLD ENG
 ara_remenca: "Remença"
 #ara_remenca_desc: "Il sistema Remença, particolare della Catalogna, ha stretti equivalenti in altri territori della Corona, favorendo una spinta collettiva verso una maggiore produzione di materie prime. Attraverso questo quadro, i nostri territori sperimentano un'impennata nella creazione di ricchezza, accendendo il potenziale per un progresso sostanziale nella realizzazione dei nostri obiettivi. Sfruttando questi sistemi in modo armonioso, coltiviamo un ambiente in cui i nostri sforzi sono rafforzati dall'abbondanza di risorse, alimentando un percorso di crescita e prosperità all'interno del nostro regno." #OLD ITA
 ara_remenca_desc: "The #italic Remença#! system, particular to $CAT$, has close equivalents in other territories of the Crown, fostering a collective drive towards greater raw goods production. Through this framework, our lands experience a surge in wealth, igniting the potential for substantial progress towards fulfilling our objectives. By harmonizing these systems, we will cultivate an environment where our endeavors are fortified by the abundance of resources, fueling a path of growth and prosperity for our realm." #NEW
 #ara_remenca_desc: "The Remença system, particular to Catalonia, has close equivalents in other territories of the Crown, fostering a collective drive towards greater raw goods production. Through this framework, our lands experience a surge in wealth creation, igniting the potential for substantial progress in fulfilling our objectives. By harnessing these systems harmoniously, we cultivate an environment where our endeavors are fortified by the abundance of resources, fueling a path of growth and prosperity within our realm." #OLD ENG
 ara_chartered_merchant_companies: "Società Commerciali Noleggiate"
 #ara_chartered_merchant_companies_desc: "I nostri mercanti sprecano risorse per competere tra loro piuttosto che con gli altri. Questo è uno spreco, e dovremmo concentrare tutti gli sforzi per sottrarre il commercio agli altri. Fonderemo delle società che riceveranno dei monopoli temporanei sul commercio da determinate regioni e il cui rinnovo dipenderà dal fatto che la Corona riceverà il suo giusto compenso." #OLD ITA
 ara_chartered_merchant_companies_desc: "Our traders are wasting resources competing with each other. This is silly; we should focus all our efforts on taking trade from others instead! Let us charter companies who will be given temporary monopolies on trade from certain regions and whose renewal will be dependent on giving the Crown its rightful due." #NEW
 #ara_chartered_merchant_companies_desc: "Our traders are wasting resources competing with each other rather than with others. This is a waste, and we should focus all efforts on taking trade from other people. We shall charter companies who will be given temporary monopolies on trade from certain regions and whose renewal will be dependent on giving the crown its rightful due." #OLD ENG
 ara_stronger_united: "L'Unione fa la Forza"
 #ara_stronger_united_desc: "Dalla fusione del Regno di Aragona e della Contea di Barcellona nel 1164, l'Aragona ha funzionato come una Confederazione, comprendendo regni distinti sotto un governatore centrale. Queste differenze hanno favorito la prosperità e mantenuto le identità individuali, ma hanno anche dato origine a un'illusione di disunità. Ciò ha portato alla necessità di riforme amministrative per rafforzare la nostra unione, onorando al contempo le caratteristiche uniche di ciascun territorio." #OLD ITA
 ara_stronger_united_desc: "Since the merger of between us and the County of Barcelona in 1164, $ARA$ has functioned as a Confederation, comprising distinct realms under a central ruler. These differences have fostered prosperity and maintained individual identities, yet have also given rise to an illusion of disunity. This has led to the need for administrative reforms to strengthen our union while honoring the unique characteristics of each territory." #NEW
 #ara_stronger_united_desc: "Since the merger of the Kingdom of Aragon and the County of Barcelona in 1164, Aragon has functioned as a Confederation, comprising distinct realms under a central ruler. These differences have fostered prosperity and maintained individual identities, yet have also given rise to an illusion of disunity. This has led to the need for administrative reforms to strengthen our union while honoring the unique characteristics of each territory." #OLD ENG
 ara_constellation_cities: "Costellazione di Città"
 #ara_constellation_cities_desc: "Fin dalla sua nascita, la nostra nazione è composta da diversi regni, riuniti sotto un unico sovrano. Tuttavia, ogni regno conserva le proprie tradizioni e leggi uniche. Di conseguenza, numerose grandi città sono emerse come metropoli regionali, che rappresentano e governano le rispettive regioni." #OLD ITA
 ara_constellation_cities_desc: "Since its inception, our nation has consisted of diverse realms brought together under a single ruler. However, each realm retains its unique traditions and laws. Consequently, numerous major cities have emerged as regional metropolises, representing and governing their respective regions." #NEW
 #ara_constellation_cities_desc: "Since its inception, our nation has consisted of diverse realms, brought together under a single ruler. However, each realm retains its unique traditions and laws. Consequently, numerous major cities have emerged as regional metropolises, representing and governing their respective regions." #OLD ENG
 #ara_protection_of_the_little_folk: "Proteggere la Piccola Gente" #OLD ITA
 ara_protection_of_the_little_folk: "Protect the Smallfolk" #NEW
 #ara_protection_of_the_little_folk: "Protect the Little Folk" #OLD ENG
 #ara_protection_of_the_little_folk_desc: "I nostri soldati vorranno sapere che i loro cari saranno assistiti nel caso in cui cadano in battaglia. Aragona farà il suo dovere e si assicurerà che ciò avvenga attraverso un sistema di case di lavoro per gli orfani dei caduti." #OLD ITA
 ara_protection_of_the_little_folk_desc: "Our soldiers would want their loved ones to be looked after in the event they perish in battle. $ARA$ will do its duty and ensure that this is done through establishing a system of workhouses for orphans of the fallen." #NEW
 #ara_protection_of_the_little_folk_desc: "Our soldiers will want to know that their loved ones are looked after in the event they fall in battle. Aragon will do its duty and ensure that this is done through a system of workhouses for the orphans of the fallen." #OLD ENG
 ara_gunpowder_souls: "Anime di Polvere da Sparo"
 #ara_gunpowder_souls_desc: "La celebrazione delle #italic Fallas#! ha agito da catalizzatore all'interno della Corona di Aragona, stimolando i progressi nelle tecniche di artiglieria grazie all'esperienza pratica acquisita nel maneggiare la polvere da sparo per i petardi e i fuochi d'artificio. Questa tradizione festiva ha alimentato uno spirito di innovazione, che ha portato allo sviluppo di nuove strategie e conoscenze sull'artiglieria all'interno del regno." #OLD ITA
 ara_gunpowder_souls_desc: "The #italic Fallas#! celebration has acted as a catalyst within the Crown of $ARA$, spurring advancements in artillery techniques through the practical expertise gained from handling gunpowder for firecrackers and fireworks. This festive tradition has fueled a spirit of innovation, resulting in the development of new strategies and knowledge about artillery." #NEW
 #ara_gunpowder_souls_desc: "The #italic Fallas#! celebration has acted as a catalyst within the Crown of Aragon, spurring advancements in artillery techniques through the practical expertise gained from handling gunpowder for firecrackers and fireworks. This festive tradition has fueled a spirit of innovation, resulting in the development of new strategies and knowledge surrounding artillery within the realm." #OLD ENG
 ara_mossos_esquadra: "Mossos d'Esquadra"
 #ara_mossos_esquadra_desc: "Le #italic Escuadras de Paisanos#!, conosciute come #italic Esquadres de Catalunya#! o #italic Mossos d'Esquadra#!, rappresentano una milizia locale dedicata alla salvaguardia delle vie commerciali e delle fiere, sfruttando la loro intima familiarità con il territorio. Ispirati dal loro successo, ci proponiamo di istituire milizie simili in altri nostri territori, composte da abitanti locali, favorendo così una coesistenza armoniosa e garantendo la pace in queste regioni." #OLD ITA
 ara_mossos_esquadra_desc: "The #italic Escuadras de Paisanos#!, known as #italic Esquadres de Catalunya#! or #italic Mossos d'Esquadra#!, are a local militia dedicated to safeguarding trade routes and fairs, making the most of their intimate familiarity with the terrain. Inspired by their success, we aim to establish similar militias in our other territories, compOsed of local inhabitants. This should foster a harmonious coexistence and ensure peace in these regions." #NEW
 #ara_mossos_esquadra_desc: "The #italic Escuadras de Paisanos#!, known as #italic Esquadres de Catalunya#! or #italic Mossos d'Esquadra#!, represent a local militia dedicated to safeguarding trade routes and fairs, utilizing their intimate familiarity with the terrain. Inspired by their success, we aim to establish similar militias in our other territories, comprised of local inhabitants, thereby fostering a harmonious coexistence and ensuring peace in these regions." #OLD ENG

 cas_repoblaciones: "Repoblaciones"
 #cas_repoblaciones_desc: "Le conquiste fatte dai nostri antenati hanno portato ad un Paese con più terra che persone disponibili per abitarla e lavorarla. Ciò ha comportato la necessità di attirare migranti da altre regioni, soprattutto nella zona meridionale dell'Andalusia, gravemente sottopopolata dopo l'espulsione dei suoi abitanti musulmani nel 1267." #OLD ITA
 cas_repoblaciones_desc: "The extensive conquests of our ancestors have created a country with more land than people available to inhabit and work it. That has resulted in a dire need to attract migrants from other regions." #NEW
 #cas_repoblaciones_desc: "The conquests made by our ancestors resulted in a country with more land than people available to inhabit and work it. That has resulted in a dire need to attract migrants from other regions, especially to the southern area of Andalusia, severely underpopulated after the expulsion of their Muslim inhabitants in 1267." #OLD ENG
 cas_the_reconquista: "La Reconquista"
 #cas_the_reconquista_desc: "Nei molti anni trascorsi da quando il Regno Visigoto è caduto in mano agli invasori, abbiamo combattuto contro i Mori. Questo ci ha dato una disciplina robusta che non molti possono vantare. Alzatevi, uomini di Castiglia, e mostrate al mondo la vostra determinazione!" #OLD ITA
 cas_the_reconquista_desc: "In the many years since the Visigothic Kingdom fell to invaders, we have waged war against the Moors. This has given us the sort of iron discipline that not many can boast of. Arise, warriors of $CAS$, and show the world your determination!" #NEW
 #cas_the_reconquista_desc: "In the many years since the Visigothic Kingdom fell to invaders, we have waged war against the Moors. This has given us a sturdy discipline that not many can boast of. Arise men of Castile, and show the world your determination!" #OLD ENG
 #cas_castilian_navy: "Marina Militare Castigliana" #OLD ITA
 cas_castilian_navy: "$CAS_ADJ$ Navy" #NEW
 #cas_castilian_navy: "Castilian Navy" #OLD ENG
 #cas_castilian_navy_desc: "Trovandosi su una penisola, circondata dal mare in tre angoli su quattro, e con il prezioso Stretto di Gibilterra conteso da diverse potenze, dominare i mari diventa una questione di vita o di morte. Con centinaia di chilometri di costa, i nostri antenati hanno iniziato a domare le onde, rendendo la nostra nazione una potenza navale senza paura." #OLD ITA
 cas_castilian_navy_desc: "Situated as we are on a peninsula, surrounded by sea on three out of four sides, and with the valuable $strait_of_gibraltar$ bitterly fought over by different powers, dominating the seas has become a matter of life and death. From our hundreds of kilometers of coastline, our ancestors started taming the waves, evolving our nation into a fearless naval power." #NEW
 #cas_castilian_navy_desc: "Being on a peninsula, surrounded by sea in three out of four corners, and with the valuable Straits of Gibraltar contested by different powers, dominating the seas becomes a matter of life and death. With hundreds of kilometers of coast, our ancestors started taming the waves, making our nation a fearless naval power." #OLD ENG
 cas_cronicas_reales: "Crónicas Reales"
 #cas_cronicas_reales_desc: "Raccogliendo le cronache scritte dai re precedenti, siamo in grado di creare una raccolta che contiene tutti gli eventi passati del nostro regno o l'origine dei nostri governanti. Questa conoscenza ci aiuterà non solo a creare una base migliore per la nostra cultura, ma anche ad aiutare i governanti presenti e futuri a valutare meglio gli eventi attuali rispetto a quelli passati." #OLD ITA
 cas_cronicas_reales_desc: "By compiling the chronicles written by previous rulers, we are able to create a compendium that details every past event in our realm and the origins of all our rulers. This knowledge will help us not only to create better cultural foundations, but will also help present and future rulers to correctly assess present events through comparisons to past ones." #NEW
 #cas_cronicas_reales_desc: "By recollecting the chronicles written by previous kings, we are able to create a collection that holds all the past events of our realm or the origin of our rulers. This knowledge will help us not only to create a better base for our culture, but will also help present and future rulers to better value present events in comparison to past ones." #OLD ENG
 cas_masters_of_the_orders: "I Maestri degli Ordini"
 #cas_masters_of_the_orders_desc: "Poiché la Reconquista non è più il nostro obiettivo principale, l'indipendenza degli Ordini sacri non è più giustificata. Facendo in modo che i nostri governanti assumano la posizione di Maestri di questi Ordini, non solo possiamo garantire loro un potere maggiore, ma assorbiremo anche le conoscenze militari di questi crociati." #OLD ITA
 cas_masters_of_the_orders_desc: "As the Reconquista is no longer our main focus, we can no longer justify the independence of Holy Orders. By having our ruler assume the position of Master in every Order, they will not only gain significant power, but they will also have access to the military knowledge of these crusaders." #NEW
 #cas_masters_of_the_orders_desc: "With the Reconquista not being our main focus anymore, the independence of the Holy Orders is not justified anymore. By having our rulers assume the position of the Masters of these Order, we can not only ensure a bigger power for them, but we will also absorb the military knowledge of these crusaders." #OLD ENG
 cas_new_world: "Il Nuovo Mondo"
 #cas_new_world_desc: "Con le nuove scoperte, nuove terre possono essere reclamate da coraggiosi coloni e portare preziosi commerci alla Madrepatria. Invieremo alcuni coloni fedeli che costituiranno la spina dorsale delle nostre colonie." #OLD ITA
 cas_new_world_desc: "Newly-discovered lands can be claimed and settled by enterprising colonists, and will send valuable trade goods back to our realm. We will send a few loyal colonists to the New World, have them stake their claims and find ways to harness the treasures of nature, and thereby form the backbone of our colonial endeavors." #NEW
 #cas_new_world_desc: "With the new discoveries, new lands can be reclaimed by brave colonists and bring valuable trades to the Motherland. We will send a few loyal colonists that will form the backbone of our colonies." #OLD ENG
 cas_reform_of_millones: "Riforma dei Milioni"
 #cas_reform_of_millones_desc: "Con l'approvazione della Riforma dei #italic Millones#! da parte delle nostre Cortes, potremmo essere in grado di tassare il nostro popolo in modo più efficiente. Questa imposta sarà indiretta e verrà applicata ai prodotti alimentari." #OLD ITA
 cas_reform_of_millones_desc: "With the approval of the Reform of the #italic Millones#!, we might be able to tax our populace more efficiently. This will be an indirect extraction of revenue, done through a levy on food products." #NEW
 #cas_reform_of_millones_desc: "With the approval of the Reform of the #italic Millones#! by our Cortes, we might be able to tax our populace in more efficient ways. This exaction will be an indirect one that will be levied on food products." #OLD ENG
 #cas_marine_infantry: "Fanteria Marina Castigliana" #OLD ITA
 cas_marine_infantry: "$CAS_ADJ$ Marine Infantry" #NEW
 #cas_marine_infantry: "Castilian Marine Infantry" #OLD ENG
 #cas_marine_infantry_desc: "Con una marina forte, è necessario che gli equipaggi di queste navi siano in grado di combattere in ogni situazione, comprese quelle in cui combattono al di fuori delle navi. Per superare questo problema, regoleremo la nostra fanteria di marina in modo che diventi uno strumento potente." #OLD ITA
 cas_marine_infantry_desc: "With a strong navy comes the need for crew members adept at combat in any situation, including having to fight outside their vessels. In order to overcome this challenge, we will regulate our marine infantry so they become a powerful weapon no matter where they fight." #NEW
 #cas_marine_infantry_desc: "With a strong navy comes the need to have the crews of those ships able to fight in every situation, including those where they fight outside the vessels. In order to overcome that problem, we will regulate our marine infantry so they become a powerful tool." #OLD ENG
 #cas_pasos: "Pasos Castigliani" #OLD ITA
 cas_pasos: "$CAS_ADJ$ Pasos" #NEW
 #cas_pasos: "Castilian Pasos" #OLD ENG
 #cas_pasos_desc: "Sebbene i #italic Pasos#! della Settimana Santa non siano una novità in Castiglia, l'arte scultorea che li rappresenta ha raggiunto un nuovo picco negli ultimi anni. Artisti come Juan de Juni o Gregorio Fernández hanno tracciato la strada per rendere i #italic Pasos#! castigliani i più impressionanti della Penisola." #OLD ITA
 cas_pasos_desc: "While the #italic Pasos#! of the Holy Week are an old tradition in $CAS$, the sculpted artworks that accompany them have recently reached a stunning new peak. Artists such as Juan de Juni and Gregorio Fernández have started down the path of making $CAS_ADJ$ #italic Pasos#! the most impressive on the Peninsula." #NEW
 #cas_pasos_desc: "While the #italic Pasos#! of the Holy Week are nothing new in Castile, the sculpted art depicted on them has reached a new peak in recent years. Artists such as Juan de Juni or Gregorio Fernández have set the path to make Castilian #italic Pasos#! the most impressive in the Peninsula." #OLD ENG
 cas_real_academia_espanola: "Real Academia Española"
 #cas_real_academia_espanola_desc: "Come in altre parti del mondo, la necessità di regolare l'aspetto linguistico della nostra cultura diventa evidente man mano che la nostra lingua si evolve e si diffonde nel mondo. Affinché la nostra parlata conservi le sue caratteristiche, verrà creata la #italic Real Academia Española#!, che stabilirà le regole per parlare correttamente la nostra lingua." #OLD ITA
 cas_real_academia_espanola_desc: "As our language evolves and spreads across the world, the need to regulate and preserve it becomes obvious. To preserve the essential character and defining traits of our mother tongue, the #italic Real Academia Española#! will be established to set standards for how to properly speak our language." #NEW
 #cas_real_academia_espanola_desc: "As in other parts of the world, the need to regulate the linguistic aspect of our culture becomes obvious as our language evolves and spreads across the world. So that our speech preserves its traits, the #italic Real Academia Española#! will be created, and it will set the rules of how to properly speak our language." #OLD ENG
 cas_canal_de_castilla: "Canal de Castilla"
 #cas_canal_de_castilla_desc: "Ispirato ai sistemi idrici di tutta Europa, utilizzati sia per scopi commerciali che per l'irrigazione, il #italic Canal de Castilla#! porterà l'acqua dalle montagne del nord della #italic Meseta#! e irrigherà i campi di cereali della Vecchia Castiglia. Questa prodezza ingegneristica aumenterà la resa dei nostri campi, creerà un surplus con cui potremo commerciare e sarà il modo per trasportarlo ai porti di esportazione." #OLD ITA
 cas_canal_de_castilla_desc: "Inspired by other water systems across $europe$, which are used for both commercial purposes and irrigation, the #italic Canal de Castilla#! will bring water from the mountains in the north of the #italic Meseta#! and irrigate the cereal fields of Old Castile. This feat of engineering will increase our yield, create a surplus with which we can trade, and be the way to transport it for export." #NEW
 #cas_canal_de_castilla_desc: "Inspired by the water systems across Europe, used for both commercial and irrigation purposes, the #italic Canal de Castilla#! will bring water from the mountains in the north of the #italic Meseta#! and irrigate the cereal fields of Old Castile. This feat of engineering will increase our fields' yield, create a surplus with which we can trade, and be the way to transport it to the exporting ports." #OLD ENG
 cas_royal_factories: "Fabbriche reali"
 #cas_royal_factories_desc: "Nel tentativo di combattere l'esportazione di materie prime invece di quelle fabbricate, che sono più costose, svilupperemo un sistema di fabbriche sostenute dal governo che industrializzeranno la nostra nazione. Questi nuovi prodotti manifatturieri rafforzeranno l'economia della nostra nazione." #OLD ITA
 cas_royal_factories_desc: "To combat the export of raw materials instead of more valuable manufactured goods, we will develop a system of government-backed factories that will industrialize our nation. More robust domestic manufacturing will lead to a stronger national economy." #NEW
 #cas_royal_factories_desc: "As an effort to combat the export of raw materials instead of manufactured ones that are more costly, we will develop a system of government-backed factories that will industrialize our nation. These new manufactured goods will strengthen our nation's economy." #OLD ENG

 gra_banu_nasr: "Banū Naṣr"
 #gra_banu_nasr_desc: "Discendiamo dalla tribù dei Banū l-Ḫazraj e proveniamo dalla stirpe di Sa'd ibn 'Ubāda, un compagno del Profeta Maometto. Il fondatore della nostra dinastia, Maometto I, controllava un territorio che comprendeva Granada, Jaén, Almería e Malaga, anche se alcune di queste terre caddero sotto le forze cristiane. Da allora, abbiamo resistito con tenacia alle loro avances e continueremo a farlo con la forza dei nostri antenati." #OLD ITA
 gra_banu_nasr_desc: "We descend from the Banū l-Ḫazraj tribe and come from the lineage of Saʿd ibn ʿUbāda, a companion of the Prophet Muhammad. The founder of our dynasty, Muhammad I, controlled a territory that included $granada$, $jaen$, $almeria$, and $malaga$, though some of those lands fell to the $christian_ADJ$ forces. Since then, we have been resisting their advances with tenacity, and we will continue doing so with the strength of our ancestors." #NEW
 #gra_banu_nasr_desc: "We descend from the Banū l-Ḫazraj tribe and come from the lineage of Sa'd ibn 'Ubāda, a companion of Prophet Muhammad. The founder of our dynasty, Muhammad I, controlled a territory that included Granada, Jaén, Almería, and Málaga, though some of those lands fell to the Christian forces. Since then, we have been resisting their advances with tenacity, and we will continue doing so with the strength of our ancestors." #OLD ENG
 gra_nasrid_art: "Arte Nazarì"
 #gra_nasrid_art_desc: "Gli artigiani e gli architetti di Granada sono i più abili al mondo. Creano non solo cose utili, ma anche piacevoli alla vista, combinando con eccellenza entrambi gli aspetti." #OLD ITA
 gra_nasrid_art_desc: "The artisans and architects of $GRA$ are the most skillful in the world. They create things that are not only useful, but pleasing to the eye, beautifully combining form and function." #NEW
 #gra_nasrid_art_desc: "The artisans and architects of Granada are the most skillful in the world. They create not only useful things, but they are also pleasing to the eyes, combining with excellency both aspects." #OLD ENG
 gra_skillful_envoys: "Inviati abili"
 #gra_skillful_envoys_desc: "La nostra capacità di usare la diplomazia in modo efficiente è stata una questione di vita o di morte. Non possiamo rimanere inattivi, dobbiamo addestrare ulteriormente i nostri inviati per garantire la nostra sopravvivenza." #OLD ITA
 gra_skillful_envoys_desc: "Our skillful use of diplomacy has been the deciding factor between life or death many times before. But we must not let ourselves be lulled into complacency; we must train our envoys even more to ensure their success." #NEW
 #gra_skillful_envoys_desc: "Our ability to use diplomacy efficiently has been a matter of life and death. We cannot just be idle, we have to train our envoys even further to ensure our survival." #OLD ENG
 gra_razzias: "Nasrid Razzias"
 #gra_razzias_desc: "I confini dei nostri nemici sono opportunità aperte per noi, se osiamo colpire con attacchi illuminanti, possiamo coglierli di sorpresa e infliggere danni duraturi." #OLD ITA
 gra_razzias_desc: "The borders of our enemies are tantalizing opportunities for us. Should we boldly strike with lightning attacks, we can catch the enemy off-guard and inflict lasting damage." #NEW
 #gra_razzias_desc: "The borders of our enemies are open opportunities to us, should we dare to strike with lighting attacks, we can catch them off guard and inflict lasting damage." #OLD ENG
 #gra_muttavia_armies: "Eserciti di Muttavia" #OLD ITA
 gra_muttavia_armies: "Mutawwi'a Armies" #NEW
 #gra_muttavia_armies: "Muttavia Armies" #OLD ENG
 #gra_muttavia_armies_desc: "Granada ha una quantità limitata di persone e gli uomini arruolabili non sono tanti quanti ne servirebbero per difendere la nostra nazione in modo efficiente. Tuttavia, laddove mancano gli uomini, abbiamo molto denaro che può essere utilizzato per acquistare spade straniere per combattere sotto il nostro vessillo." #OLD ITA
 gra_muttavia_armies_desc: "$GRA$ has a limited number of people, and we cannot draft enough soldiers to defend our nation effectively. However, where we lack people, we do not lack gold, and that can be used to bring mercenary swords under our banners." #NEW
 #gra_muttavia_armies_desc: "Granada has a limited amount of people and the draftable men are not as many as we would need to defend our nation efficiently. However, where we lack men, we have plenty of money that can be used to buy foreign swords to fight under our banner." #OLD ENG
 gra_expand_qanahs: "Espandere il Qanāh"
 #gra_expand_qanahs_desc: "Le terre di Granada sono fertili, ma l'espansione dei canali di irrigazione farà un uso migliore dell'acqua che abbiamo, in modo che i nostri raccolti e frutti crescano più forti." #OLD ITA
 gra_expand_qanahs_desc: "The lands of $GRA$ are fertile, but expanding our irrigation canals would allow us to make better use of our water supply, and grow better-quality crops as a result." #NEW
 #gra_expand_qanahs_desc: "The lands of Granada are fertile, but the expansion of the canals irrigating them will make a better use of the water we have, so that our crops and fruits grow stronger." #OLD ENG
 gra_adaptative_trade: "Commercio Adattivo"
 #gra_adaptative_trade_desc: "La nostra posizione privilegiata di intermediari tra $christian_ADJ$ e $muslim_ADJ$ nazioni è messa in discussione. Questa minaccia può essere un'opportunità per modernizzare i nostri metodi e recuperare la nostra posizione di collegamento tra i mercati più lontani e l'Europa." #OLD ITA
 gra_adaptative_trade_desc: "Our privileged position as middlemen between $christian_ADJ$ and $muslim_ADJ$ nations is being challenged. This threat could be an opportunity to modernize our trade methods and recover our position as a link between more distant markets and $europe$." #NEW
 #gra_adaptative_trade_desc: "Our privileged position as middlemen between $christian_ADJ$ and $muslim_ADJ$ nations is being challenged. This threat can be an opportunity to modernize our methods and recover our position as a link between more distant markets and Europe." #OLD ENG
 gra_expand_the_frontier: "Espandere la Frontiera"
 #gra_expand_the_frontier_desc: "Dalla fondazione della nostra dinastia, le nostre terre si sono ridotte. Tuttavia, ora siamo in una posizione forte e possiamo sognare non solo di recuperare tutti i territori perduti, ma anche di ampliare il nostro regno." #OLD ITA
 gra_expand_the_frontier_desc: "Since the foundation of our dynasty, our territorial holdings have been shrinking. However, we are now in a stronger position, capable of not only recovering every piece of lost land, but enlarging our realm even beyond those original borders." #NEW
 #gra_expand_the_frontier_desc: "Since the foundation of our dynasty, our lands have been shrinking. However, we are now in a strong position, and we can dream of not only recovering every lost territory but also enlarging our realm." #OLD ENG
 gra_a_strong_rule: "Una Regola Forte"
 #gra_a_strong_rule_desc: "Per decenni, le generazioni della nostra famiglia regnante hanno combattuto tra loro destabilizzando la nostra nazione. È giunto il momento di unificare il potere sotto un governante potente che possa mantenere la pace e la prosperità per il nostro popolo." #OLD ITA
 gra_a_strong_rule_desc: "For decades, generations of our ruling family have fought incessantly with each other, destabilizing our nation. It is about time a powerful ruler decisively asserted their authority, proving they are the only one who can keep the peace and bring prosperity to our nation." #NEW
 #gra_a_strong_rule_desc: "For decades, generations of our ruling family have fought each other destabilizing our nation. It is about time we unified the power under a powerful ruler that can keep the peace and prosperity for our people." #OLD ENG
 gra_modernized_economy: "Economia Modernizzata"
 #gra_modernized_economy_desc: "I tempi moderni richiedono un'economia moderna, capace di prosperare in un mondo più competitivo. Aggiornando le nostre infrastrutture e aggiungendo efficienza ai nostri metodi e processi, riusciremo a produrre di più con le stesse risorse." #OLD ITA
 gra_modernized_economy_desc: "Modern times demand a modern economy, capable of thriving in a highly competitive environment. By upgrading our infrastructure and making our production methods and processes more efficient, we will maximize production using the same amount of resources." #NEW
 #gra_modernized_economy_desc: "Modern times demand a modern economy, capable of thriving in a more competitive world. By upgrading our infrastructure and adding efficiency to our methods and processes, we will manage to produce more with the same resources." #OLD ENG
 gra_ghazawat: "Nasrid Ghazawat"
 #gra_ghazawat_desc: "Come i primi guerrieri che hanno combattuto sotto il Profeta Maometto, i nostri soldati devono combattere con coraggio, quasi con fanatismo, per la difesa del nostro regno e del nostro popolo." #OLD ITA
 gra_ghazawat_desc: "As the descendants of the warriors who fought under the Prophet, we must defend our realm with similar bravery. Every battle for $GRA$ is a #italic ghazawat#! — a holy struggle to preserve $muslim$ against the onslaught of $christian$." #NEW
 #gra_ghazawat_desc: "As the first warriors that fought under the Prophet Muhammad, our soldiers need to fight bravely, almost fanatically, for the defense of our realm and our people." #OLD ENG
 gra_a_new_golden_era: "Una nuova era d'oro"
 #gra_a_new_golden_era_desc: "Al-'Andalus era un tempo un centro di apprendimento con studiosi eccezionali come 'Aḥmad Ibn Rušd, 'Abū al-Qāsim e Muḥammad bin Ṭufayl. Dovremmo continuare a mantenere questo stato d'animo dei nostri antenati." #OLD ITA
 gra_a_new_golden_era_desc: "Al-'Andalus was once a center for learning, home to exceptional scholars like 'Aḥmad Ibn Rušd, 'Abū al-Qāsim, and Muḥammad bin Ṭufayl. We should endeavor to continue this long-standing intellectual tradition." #NEW
 #gra_a_new_golden_era_desc: "Al-'Andalus was once a center for learning with exceptional scholars like 'Aḥmad Ibn Rušd, 'Abū al-Qāsim, and Muḥammad bin Ṭufayl. We should continue this state of mind of our forefathers." #OLD ENG

 nav_transatlantic_whaling: "Caccia alle Balene Transatlantica"
 #nav_transatlantic_whaling_desc: "$basque$ La caccia alle balene vanta centinaia di anni di tradizioni e i nostri specialisti sono spesso utilizzati da altri Paesi che desiderano espandere e migliorare la loro pesca. Dovremmo capitalizzare questa esperienza e diffondere le nostre imprese baleniere con avamposti in tutto l'Atlantico." #OLD ITA
 nav_transatlantic_whaling_desc: "$basque$ whaling traditions represent centuries of experience, and our specialists are often consulted by other nations looking to expand and improve their own whaling industries. We should capitalize on this expertise by establishing whaling enterprises throughout the $atlantic_ocean_continent$." #NEW
 #nav_transatlantic_whaling_desc: "$basque$ whaling has hundreds of years of traditions and our specialists are often used by other countries who would wish to expand and improve their fisheries. We should capitalize on this expertise and spread our whaling enterprises with outposts all around the Atlantic." #OLD ENG
 #nav_shipbuiling_experts: "Esperti di Cantieristica Navale" #OLD ITA
 nav_shipbuiling_experts: "Expert Shipbuilders" #NEW
 #nav_shipbuiling_experts: "Shipbuilding Experts" #OLD ENG
 #nav_shipbuiling_experts_desc: "Il mare che bacia le nostre coste è ricco di risorse che attendono coloro che osano coglierle. Per secoli, la nostra costa è stata piena di porti e cantieri navali, che costruiscono instancabilmente navi per placare la nostra sete di avventure e imprese marine." #OLD ITA
 nav_shipbuiling_experts_desc: "The sea kissing our shores teems with resources waiting for those brave enough to grab them. For centuries, our coast has been full of ports and shipyards, tirelessly building vessels with which to slake our thirst for adventure and profit on the open seas." #NEW
 #nav_shipbuiling_experts_desc: "The sea kissing our shores has plenty of resources waiting for those that dare grab them. For centuries, our coast has been full of ports and shipyards, tirelessly building ships to calm our thirst for marine adventures and endeavors." #OLD ENG
 nav_memories_reconquista: "Ricordi della Reconquista"
 #nav_memories_reconquista_desc: "Il nostro popolo partecipò attivamente alla Reconquista, contribuendo agli sforzi di $christian_ADJ$ reclamare la Penisola Iberica dal dominio di $muslim_ADJ$. Nonostante il raggiungimento di una fase in cui un'ulteriore espansione territoriale divenne irraggiungibile, la Navarra giocò comunque un ruolo significativo in questa Crociata, attraverso campagne militari e alleanze con i regni $christian_ADJ$ vicini." #OLD ITA
 nav_memories_reconquista_desc: "Our people were active participants in the Reconquista, contributing to the $christian_ADJ$ efforts to reclaim $iberia_region_ADJ $ from $muslim_ADJ$ rule. Despite reaching a stage where further territorial expansion became unattainable, $NAV$ still played a significant role in this Crusade, through military campaigns and alliances with neighboring $christian_ADJ$ kingdoms" #NEW
 #nav_memories_reconquista_desc: "Our people actively participated in the Reconquista, contributing to the $christian_ADJ$ efforts to reclaim the Iberian Peninsula from $muslim_ADJ$ rule. Despite reaching a stage where further territorial expansion became unattainable, Navarra still played a significant role in this Crusade, through military campaigns and alliances with neighboring $christian_ADJ$ kingdoms" #OLD ENG
 #nav_a_renaissance_realm: "Un Regno Rinascimentale" #OLD ITA
 nav_a_renaissance_realm: "A $renaissance$ Realm" #NEW
 #nav_a_renaissance_realm: "A Renaissance Realm" #OLD ENG
 #nav_a_renaissance_realm_desc: "Nonostante l'origine montuosa del nostro regno, nelle valli dei Pirenei, il nostro popolo ha ricevuto le influenze umanistiche sia dal Sud che dal Nord in quantità e qualità, senza mai abbandonare la sua influenza. Abbracciando questa nuova coscienza, i Navarresi non dimenticano le loro tradizioni, ma le fondono nella loro nuova identità." #OLD ITA
 nav_a_renaissance_realm_desc: "Though our realm originates in the mountain valleys of the Pyrenees, our people have been heavily influenced by humanistic ideas coming from both north and south. By embracing this new way of thinking, the people of $NAV$ are not abandoning their traditions, but merging them into their overall identity." #NEW
 #nav_a_renaissance_realm_desc: "Despite the mountainous origin of our realm, in the valleys of the Pyrenean Mountains, our people have received the humanistic influences both from the South and the North in quantity and quality, never let out of its influence. By embracing this new conscience, the Navarrese are not forgetting their traditions, but merging them into their new own identity." #OLD ENG
 #nav_fearless_seamen: "Marinai Impavidi" #OLD ITA
 nav_fearless_seamen: "Fearless Seafarers" #NEW
 #nav_fearless_seamen: "Fearless Seamen" #OLD ENG
 #nav_fearless_seamen_desc: "Il nostro popolo ha sempre guardato al mare con timore e paura, tentando di abbracciare la ricchezza che può portare. I nostri coraggiosi antenati hanno fondato comunità che avrebbero vissuto non solo vicino al mare, ma anche da esso, sviluppando abilità impressionanti sull'acqua. I marinai delle nostre coste sono ben noti in tutta la Costa Atlantica." #OLD ITA
 nav_fearless_seamen_desc: "Our people have always looked to the sea with awe and fear, well aware of both the rewards and dangers to be found in its briny embrace. Our brave forefathers founded communities that would live not only by the sea but from it, developing impressive skills on the water. Sailors from our shores are well known all across the Atlantic Coast." #NEW
 #nav_fearless_seamen_desc: "Our people have always looked to the sea with awe and fear, as it tempted them to embrace the richness it can bring. Our brave forefathers founded communities that would live not only by the sea but from it, developing impressive skills on the water. Sailors from our shores are well known all across the Atlantic Coast." #OLD ENG
 nav_always_ready: "Sempre Pronti"
 #nav_always_ready_desc: "Siamo nati come un piccolo regno, circondato da avversari formidabili da ogni direzione. Questo ha influenzato profondamente lo sviluppo del carattere della nostra nazione e il nostro approccio al rapporto con il mondo. Di conseguenza, rimaniamo sempre vigili, pronti a rispondere al minimo segnale di minaccia." #OLD ITA
 nav_always_ready_desc: "We were born as a small realm, encircled by formidable adversaries from every direction. This has profoundly influenced the development of our national character and our approach to engaging with the world. Consequently, we remain ever-watchful, poised to respond to the slightest indication of a threat." #NEW
 #nav_always_ready_desc: "We were born as a small realm, encircled by formidable adversaries from every direction. This profoundly influenced the development of our nation's character and our approach to engaging with the world. Consequently, we remain ever watchful, poised to respond at the slightest indication of a threat." #OLD ENG
 nav_chartered_councils: "Concili Organizzati"
 #nav_chartered_councils_desc: "Ogni territorio storico formerà un concilio, dipendente dal governante ed eletto dagli abitanti del luogo, che garantirà il rispetto delle loro leggi tradizionali o #italic Fueros#!. Questo passo intermedio ci darà un potere amministrativo migliore e più efficiente sulle nostre terre, senza intromettersi negli interessi dei locali." #OLD ITA
 nav_chartered_councils_desc: "Each historical territory will form a council, dependent on the ruler and elected by the locals, which will guarantee the respect of their traditional laws or #italic Fueros#!. This intermediate step will give us better and more efficient administrative power over our lands, without meddling in local interests." #NEW
 #nav_chartered_councils_desc: "Each historical territory will form a council, dependent on the ruler, and elected by the locals, which will guarantee the respect of their traditional laws or #italic Fueros#!. This intermediate step will give us a better and more efficient administrative power over our lands, without meddling in the interests of the locals." #OLD ENG
 nav_people_of_the_sea: "Gente di Mare"
 #nav_people_of_the_sea_desc: "I nostri uomini sono esperti marinai e il mondo lo sa. La nostra esperienza sarà un ovvio vantaggio per le battaglie marittime a venire." #OLD ITA
 nav_people_of_the_sea_desc: "Our people are expert mariners, and all the world knows it. Our expertise will be an obvious advantage in maritime battles to come." #NEW
 #nav_people_of_the_sea_desc: "Our people are expert mariners and the world knows about it. Our expertise will be an obvious advantage for the maritime battles to come." #OLD ENG
 nav_basque_ferocity: "Ferocia $basque$"
 #nav_basque_ferocity_desc: "Anche prima della Battaglia di Roncisvalle, per la quale $french$ piange ancora, o delle campagne della Compagnia Navarrese, il nostro popolo è sempre stato considerato un feroce combattente. Non dobbiamo mai permettere ai nostri nemici di dimenticarlo." #OLD ITA
 nav_basque_ferocity_desc: "Even before the Battle of $roncesvalles$, for which the $FRA_ADJ$ still weep, or the campaigns of the $NAV_ADJ$ Company, our people have always been considered ferocious fighters. We should never let our enemies forget it." #NEW
 #nav_basque_ferocity_desc: "Even before the Battle of Roncesvalles, for which the $french$ still weep, or the campaigns of the Navarrese Company, our people have always been considered ferocious fighters. We should never let our enemies forget it." #OLD ENG
 nav_an_industrious_folk: "Un Popolo Industrioso"
 #nav_an_industrious_folk_desc: "La terra in cui viviamo potrebbe non essere la più ricca, ma il popolo di $basque$ è un individuo industrioso, che lavora duramente per ottenere ciò di cui ha bisogno. Sia che si tratti di fondere il nostro ferro nelle ferriere, di convertire il legno delle nostre foreste in carbone o di creare le migliori navi in circolazione. Il nostro regno è ricco grazie agli sforzi della nostra comunità." #OLD ITA
 nav_an_industrious_folk_desc: "The land we live in might not be the richest, but the $basque$ people are industrious individuals, working hard to obtain what they need. Be it by smelting $iron$ in our ironworks, converting wood from our forests into charcoal, or building the finest ships, our realm is bountiful thanks to the efforts and expertise of our community." #NEW
 #nav_an_industrious_folk_desc: "The land we live in might not be the richest, but the $basque$ people are industrious individuals, working hard to obtain what they need from it. Be it by smelting our iron in the ironworks, converting the wood of our forests into charcoal, or creating the best ships around. Our realm is bountiful thanks to the efforts of our community." #OLD ENG
 nav_mercantile_expansion: "Espansione Mercantile"
 #nav_mercantile_expansion_desc: "Per secoli, la nostra società ha commerciato non solo con i nostri vicini, ma anche con terre lontane, vendendo loro i nostri prodotti e ricevendo in cambio le loro merci. Ciò ha reso i nostri mercanti non solo più bravi in quest'arte, ma anche portatori delle innovazioni delle altre nazioni circostanti." #OLD ITA
 nav_mercantile_expansion_desc: "For centuries, our society has traded not only with our neighbors, but with faraway lands. This has had the effect not only of making our merchants particularly skilled in the art of trade, but has disseminated innovations from many nations farther and wider than they would have been able to otherwise." #NEW
 #nav_mercantile_expansion_desc: "For centuries, our society has traded not only with our neighbors but with faraway lands, selling our products to them and getting their goods in return. This has made our merchants not only better at this art but also carriers of the innovations of other nations around." #OLD ENG
 #nav_navarrese_defense_force: "Forza di Difesa Navarrese" #OLD ITA
 nav_navarrese_defense_force: "$NAV_ADJ$ Defense Force" #NEW
 #nav_navarrese_defense_force: "Navarrese Defense Force" #OLD ENG
 #nav_navarrese_defense_force_desc: "Nel corso del tempo, le nazioni vicine continuano a rafforzarsi, rappresentando una minaccia crescente alla nostra sopravvivenza come nazione. Per far fronte a questo problema, istituiremo un dipartimento militare volto a rafforzare le nostre forze con un numero maggiore di soldati, senza compromettere la qualità delle reclute." #OLD ITA
 nav_navarrese_defense_force_desc: "Over time, our neighbors have gained significant strength, posing an increasing threat to our nation's survival. To address this, we will establish a military department aimed at bolstering our forces with a higher number of soldiers without compromising on the quality of recruits." #NEW
 #nav_navarrese_defense_force_desc: "Over time, our neighboring nations continue to gain strength, posing an increasing threat to our survival as a nation. To address this, we will establish a military department aimed at bolstering our forces with a higher number of soldiers without compromising on the quality of recruits." #OLD ENG
 nav_shipyards_ironworks: "Cantieri Navali e Ferriere"
 #nav_shipyards_ironworks_desc: "La tradizione della costruzione navale o della siderurgia e la lavorazione del ferro sono attività comuni nelle nostre terre da secoli. Ma con lo sviluppo di nuove tecniche, diventa evidente la necessità di adattare i nostri processi. Le nostre vecchie pratiche devono abbracciare la modernità per poter competere con successo." #OLD ITA
 nav_shipyards_ironworks_desc: "The traditions of shipbuilding, steelmaking, and ironworking have been common activities in our lands for centuries. But as new techniques develop, we must obviously update our processes correspondingly. Even the most ancient traditions must embrace modernity in order to remain valuable in the modern world." #NEW
 #nav_shipyards_ironworks_desc: "The tradition of shipbuilding or steelmaking and ironworking have been common activities in our lands for eons. But as new techniques are developed, the need to adapt our processes becomes obvious. Our old practices have to embrace modernity in order to successfully compete." #OLD ENG
 nav_adept_traders: "Mercanti Abili"
 #nav_adept_traders_desc: "La qualità delle nostre navi, la competenza dei nostri mercanti e l'efficacia dei nostri processi hanno reso le nostre attività commerciali incredibilmente redditizie. Questo porterà molta ricchezza alla nostra nazione, che servirà a rafforzarla." #OLD ITA
 nav_adept_traders_desc: "The quality of our ships, the proficiency of our merchants, and the efficacy of our production processes have made our trade incredibly lucrative. The influx of wealth into our nation will make us stronger than ever before." #NEW
 #nav_adept_traders_desc: "The quality of our ships, the proficiency of our merchants, and the effectiveness of our processes have made our trading businesses incredibly lucrative. This will bring a lot of wealth to our nation that will serve to strengthen it." #OLD ENG
 nav_the_national_military_academy: "L'Accademia Militare Nazionale"
 #nav_the_national_military_academy_desc: "Con la professionalizzazione del nostro esercito, la necessità di un centro educativo per le nostre reclute si rivela evidente. Formeremo un corpo di soldati esperti per insegnare loro i segreti della guerra e formare la punta di diamante del nostro esercito." #OLD ITA
 nav_the_national_military_academy_desc: "With the professionalization of our army, the necessity of a training center for our recruits becomes apparent. We will form a corps of experienced soldiers to teach the fundamentals of war and to forge our recruits into the spearhead of our army." #NEW
 #nav_the_national_military_academy_desc: "With the professionalization of our army, the necessity of an educational center for our recruits reveals itself apparent. We will form a body of experienced soldiers to teach the secrets of warfare to them to form the spearhead of our army." #OLD ENG
 #nav_royal_basque_society: "Società Reale Basca" #OLD ITA
 nav_royal_basque_society: "Royal $basque$ Society" #NEW
 #nav_royal_basque_society: "Royal Basque Society" #OLD ENG
 #nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, la Società Reale Basca degli Amici del Paese, è stata fondata per incoraggiare lo sviluppo dell'economia, della cultura e della scienza del sito $basque$. Ne trarrà grande beneficio il Paese negli anni a venire." #OLD ITA
 nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, the Royal $basque$ Society of Friends of the Country, has been founded to encourage the development of $basque$ economy, culture, and science. It will benefit the country greatly in the coming years." #NEW
 #nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, the Royal Basque Society of Friends of the Country is founded to encourage the development of $basque$ economy, culture, and science. It will benefit the country greatly in the coming years." #OLD ENG
 nav_efficient_bureaucracy: "Burocrazia Ffficiente"
 #nav_efficient_bureaucracy_desc: "La nostra nazione ha mantenuto una tradizione di burocrazia sin dalla fondazione del Regno. Alla luce dei tempi che cambiano, sono necessari nuovi approcci per gestire gli affari quotidiani. A questo proposito, la Navarra è ammirata per le sue pratiche innovative in questo campo." #OLD ITA
 nav_efficient_bureaucracy_desc: "Our nation has maintained bureaucratic traditions since the realm's establishment, but changing times demand new approaches. $NAV$ has drawn particular admiration for pioneering certain administrative innovations." #NEW
 #nav_efficient_bureaucracy_desc: "Our nation has maintained a tradition of bureaucracy since the establishment of the realm. In light of changing times, new approaches to handling daily affairs are needed. In this regard, Navarra is being admired for its innovative practices in this field." #OLD ENG
 nav_riflemen_march: "Marcia dei Fucilieri"
 #nav_riflemen_march_desc: "L'introduzione del fucile nell'esercito ha portato a degli adattamenti nel modo in cui i nostri soldati devono disciplinarsi nel suo utilizzo. Per gestire questo problema, i nostri comandanti hanno sviluppato un modo di marciare che è diventato famoso come prova della competenza e della concentrazione dei nostri soldati." #OLD ITA
 nav_riflemen_march_desc: "The introduction of rifles to our armies has required new approaches to military training and discipline. Our commanders have developed innovative marching formations that have become famous as proof of our military competence and focus." #NEW
 #nav_riflemen_march_desc: "The introduction of the rifle in the army has led to adaptations in the way our soldiers should discipline themselves in their use. As a way to handle this issue, our commanders have developed a way of marching that has become famous as a proof of the competency and focus of our soldiers." #OLD ENG

 #por_battle_ourique: "La Battaglia di Ourique" #OLD ITA
 por_battle_ourique: "The Battle of $ourique$" #NEW
 #por_battle_ourique: "The Battle of Ourique" #OLD ENG
 #por_battle_ourique_desc: "Nel 1139, le nostre coraggiose truppe hanno sconfitto cinque re moreschi in battaglia da sole. Questa impresa vivrà per sempre nei ricordi dei nostri soldati, in modo che possano sconfiggere qualsiasi nemico, indipendentemente da quanto sia potente o ben armato." #OLD ITA
 por_battle_ourique_desc: "In 1139, our brave troops defeated five Moorish kings in battle. This feat shall live on eternally in the memories of our soldiers, and they can use it as inspiration to defeat any enemy, no matter how powerful or well-armed they are." #NEW
 #por_battle_ourique_desc: "In 1139, our brave troops defeated five Moorish kings in battle single-handedly. This feat shall live eternally in the memories of our soldiers, so that they defeat any enemy, no matter how powerful or well-armed they are." #OLD ENG
 #por_establishment_portuguese_navy: "Istituzione della Marina Portoghese" #OLD ITA
 por_establishment_portuguese_navy: "Establishment of the $POR_ADJ$ Navy" #NEW
 #por_establishment_portuguese_navy: "Establishment of the Portuguese Navy" #OLD ENG
 #por_establishment_portuguese_navy_desc: "Re Dinis gettò le basi della Marina portoghese quando nominò il mercante genovese Manuel Pessanha (in origine Pessagno) come ammiraglio della flotta nazionale con la missione di difendere le coste portoghesi dalle incursioni dei pirati musulmani e di creare una potente flotta commerciale." #OLD ITA
 por_establishment_portuguese_navy_desc: "King Dinis laid the foundations for the $POR_ADJ$ Navy when he appointed $GEN_ADJ$ merchant Manuel Pessanha, originally Pessagno, as admiral of the national fleet. Pessanha's missions were to defend $POR_ADJ$ shores from $muslim_ADJ$ pirate raids, and to create a powerful trade fleet." #NEW
 #por_establishment_portuguese_navy_desc: "King Dinis laid the basis for the Portuguese Navy when he appointed Genoese merchant Manuel Pessanha (originally Pessagno) as admiral of the national fleet with the mission to defend the Portuguese shores from the Muslim pirate raids and create a powerful trade fleet." #OLD ENG
 por_estimulate_rural_areas: "Stimolare le Aree Rurali"
 #por_estimulate_rural_areas_desc: "Molte località del nostro Paese, soprattutto quelle rurali e remote, si stanno spopolando, con campi, foreste e miniere che cadono in disuso. Riformando i nostri sistemi legali, incoraggeremo le persone a rendere produttive le campagne e a mantenere la popolazione in queste zone." #OLD ITA
 por_estimulate_rural_areas_desc: "Many places across our country, mainly in rural and remote regions, are becoming depopulated, with fields, forests, and mines falling into disuse. By reforming relevant aspects of our legal system, we will encourage people to remain in the countryside and restore its productivity." #NEW
 #por_estimulate_rural_areas_desc: "Many places across our country, mainly in rural and remote places, are getting depopulated with fields, forests and mines falling into disuse. By reforming our legal systems, we will encourage people to make the countryside productive and retain population there." #OLD ENG
 por_pursuing_waves: "Inseguendo le Onde"
 #por_pursuing_waves_desc: "Sembra che la nostra terra non basti a gran parte della popolazione, che guarda il mare e prova #italic saudade#!, come se fosse un amante perso da tempo. I porti e i moli sono in fermento, con uomini che si arruolano nelle navi come se fossero ubriachi dal desiderio di esplorare il mondo. Faremo grande uso di questi uomini." #OLD ITA
 por_pursuing_waves_desc: "It seems the land is not enough for part of our populace. Some people look at the sea and feel #italic saudade#!, as if it was a long-lost lover. The ports and docks bustle with eager sailors, all enrolling in expeditions as if they were drunk with a desire to explore the world. We will make great use of these eager seafarers." #NEW
 #por_pursuing_waves_desc: "It seems our land is not enough to a great part of our populace, that look at the sea and feel #italic saudade#!, as if it was a long-time lost lover. The ports and docks are bustling, with men enrolling in ships as if they were drunk with a desire to explore the world. We will make great use of these men." #OLD ENG
 por_bombardeiros: "Bombardeiros"
 #por_bombardeiros_desc: "Sono state sviluppate nuove tecnologie per rendere i cannoni molto più resistenti, ma i ponti delle navi non possono sostenerli. Rinforzando questi ponti, le nostre marine saranno temute per la potenza dei loro cannoni in tutte le coste." #OLD ITA
 por_bombardeiros_desc: "Technological advancements have helped us develop much more powerful cannon, but most ships' decks cannot support their weight. By reinforcing our ships, we will be able to carry more munitions, and our navies will be feared for their awesome firepower." #NEW
 #por_bombardeiros_desc: "New technologies have been developed to make cannons much stronger, but decks in ships cannot support them. By reinforcing those decks, our navies will be feared for their cannon power in every shore." #OLD ENG
 por_feitorias: "Feitorias"
 #por_feitorias_desc: "Inviamo i nostri #italic feudatari#! in tutti gli angoli dei continenti orientali e stabiliamo il nostro Paese come forza commerciale dominante nell'Oceano Indiano. Creando una rete di forti postazioni commerciali fortificate lungo le coste dell'Africa e dell'India, possiamo dominare il commercio locale senza spendere grandi risorse." #OLD ITA
 por_feitorias_desc: "Let us send forth our #italic feitors#! to all corners of the East, and establish our country as the dominant trading force in the $indian_ocean_region$. By creating a network of strong fortified trading posts along the coasts of $africa$ and $india$, we can dominate local trade without expending too many resources." #NEW
 #por_feitorias_desc: "Let us send forth our #italic feitors#! to all corners of the eastern continents and establish our country as the dominant trading force in the Indian Ocean. By creating a network of strong fortified trading posts along the coasts of Africa and India, we can dominate the local trade without spending great resources." #OLD ENG
 por_ordenancas: "Ordenanças"
 #por_ordenancas_desc: "La nostra nazione ha bisogno di un esercito professionale che custodisca i sacri confini della nostra gloriosa nazione. Riformeremo il sistema di coscrizione e addestreremo i nostri giovani a compiere questo dovere con onore." #OLD ITA
 por_ordenancas_desc: "Our nation needs a professional army to guard the sacred borders of our glorious nation. We will reform the conscription system and train our young recruits to fulfill that duty with honor." #NEW
 #por_ordenancas_desc: "Our nation needs a professional army that would guard the sacred borders of our glorious nation. We will reform the conscription system and train our young men to fulfill that duty with honor." #OLD ENG
 por_the_bandeirantes: "Incoraggiare i Bandeirantes"
 #por_the_bandeirantes_desc: "Alcuni membri delle spedizioni nell'interno per la razzia degli schiavi si imbattevano in ritrovamenti di oro e altri metalli e pietre preziosi. Queste voci incoraggiavano le anime più coraggiose a viaggiare verso le nostre colonie." #OLD ITA
 por_the_bandeirantes_desc: "Sometimes, members of slave-raiding expeditions stumble across gold and other precious metals or stones. Spreading word of these valuable discoveries should pique the interest of hardy souls who might be willing to emigrate to our colonies in search of their fortunes." #NEW
 #por_the_bandeirantes_desc: "Some members of expeditions into the interior for slave raiding would stumble across finds of gold and other precious metals and stones. These rumors would encourage hardy souls to journey to our colonies." #OLD ENG
 por_colonial_governors: "Governatori Coloniali"
 #por_colonial_governors_desc: "Inviando i nostri uomini più capaci a governare le colonie e gli avamposti in nome dei nostri governanti, ci assicureremo che rimangano calmi e leali, mentre noi ne traiamo il massimo profitto." #OLD ITA
 por_colonial_governors_desc: "By sending our most capable administrators to govern our colonies and outposts, we will ensure that these settlements remain peaceful and loyal to their mother nation, while we sit back and watch the profits roll in." #NEW
 #por_colonial_governors_desc: "By sending the most capable of our men to govern our colonies and outposts in the name of our rulers, we will ensure that they stay calm and loyal, while we profit the most." #OLD ENG
 por_royal_absolutism: "Assolutismo Reale"
 #por_royal_absolutism_desc: "Per troppo tempo, il potere reale è stato limitato dai folli interventi della nobiltà, i cui ristretti interessi locali stanno minacciando il bene superiore del regno. Ignoreremo le Cortes e governeremo senza le loro interferenze." #OLD ITA
 por_royal_absolutism_desc: "For too long, our royal authority has been hindered by hapless meddling from the nobility, whose narrow local interests threaten the greater good of the realm. We will ignore the Cortes entirely, and rule without their interference." #NEW
 #por_royal_absolutism_desc: "For too long, royal power has been limited by the foolish interventions by the nobility, whose narrow local interests are threatening the greater good of the realm. We will ignore the Cortes and rule without their interference." #OLD ENG
 #por_royal_military_academy: "Accademia Reale di Fortificazione, Artiglieria e Disegno" #OLD ITA
 por_royal_military_academy: "Royal Academy of Fortification, Artillery, and Drawing" #NEW
 #por_royal_military_academy: "Royal Academy of Fortification, Artillery and Drawing" #OLD ENG
 por_royal_military_academy_desc: "I nostri corpi di artiglieria e le nostre fortificazioni sono stati a lungo la chiave per la difesa del nostro territorio, rendendo il nostro piccolo Paese un osso duro per gli eserciti nemici. Istituiremo un'accademia militare - l'#italic Academia Real de Fortificação, Artilharia e Desenho#! - per formare i nostri ufficiali in questi campi, affinché possano a loro volta trasformare le nostre fortificazioni e i nostri corpi di artiglieria nei migliori al mondo!"
 #por_vinho_porto: "Vinho do Porto" #OLD ITA
 por_vinho_porto: "Vinho do $porto$" #NEW
 #por_vinho_porto: "Vinho do Porto" #OLD ENG
 #por_vinho_porto_desc: "Sulle rive del fiume Douro, nel nord del Paese, l'uva viene coltivata per creare un vino che viene successivamente fortificato con alcolici per creare quello che comincia ad essere ben conosciuto come #italic Vino di Porto#!. Non dobbiamo perdere l'occasione di guadagnare molto dall'esportazione del nostro vino." #OLD ITA
 por_vinho_porto_desc: "On the banks of the Douro river, in the north of the country, grapes are cultivated to create a unique $wine$ fortified with spirits, which is famously known as #italic Port Wine#!. As we are the only nation producing this delightful intoxicant, we must not miss our chance to make scads of money from its export." #NEW
 #por_vinho_porto_desc: "In the shores of the Douro river, in the north of the country, grapes are cultivated to create a wine that is later fortified with spirits to create what it is starting to be well known as #italic Port Wine#!. We should not lose the chance to make big money from the export of our wine." #OLD ENG

 #spa_school_salamanca: "Scuola di Salamanca" #OLD ITA
 spa_school_salamanca: "School of $salamanca$" #NEW
 #spa_school_salamanca: "School of Salamanca" #OLD ENG
 #spa_school_salamanca_desc: "Con sede presso l'Università di Salamanca, gli interessi della Scuola spaziano in campi diversi come la teologia, l'economia e la filosofia politica. Essendo una delle principali scuole di pensiero del mondo cattolico, la sua presenza radicata in Spagna assicura che la nostra nazione sia sempre all'avanguardia negli affari intellettuali." #OLD ITA
 spa_school_salamanca_desc: "Based in the University of $salamanca$, the School's interests lie in fields as diverse as theology, economics, and political philosophy. As one of the leading schools of thought in the $catholic_ADJ$ world, its entrenched presence in $SPA$ ensures that our nation always remains at the forefront of intellectual affairs." #NEW
 #spa_school_salamanca_desc: "Based in the University of Salamanca, the School's interests lie in fields as diverse as theology, economics, and political philosophy. As one of the leading schools of thought in the Catholic world, its entrenched presence in Spain ensures that our nation is always at the forefront of intellectual affairs." #OLD ENG
 #spa_viceroyalties: "Vicereami Spagnoli" #OLD ITA
 spa_viceroyalties: "$SPA_ADJ$ Viceroyalties" #NEW
 #spa_viceroyalties: "Spanish Viceroyalties" #OLD ENG
 #spa_viceroyalties_desc: "Nuove terre sono pronte per essere rivendicate attraverso gli oceani. Le divideremo in terre governate da rappresentanti del nostro sovrano, che aumenteranno l'ordine in quelle zone, in modo che il nostro popolo le trovi una destinazione attraente e garantisca la nostra presenza in quelle aree." #OLD ITA
 spa_viceroyalties_desc: "New lands across the ocean are waiting for us to claim them. We will divide this territory and have each section ruled by representatives of our government, who will establish orderly settlements. The aim there is for our people to find these new lands an attractive destination, and will settle there and secure our presence." #NEW
 #spa_viceroyalties_desc: "New lands are ready to be claimed across the oceans. We will divide them it into lands ruled by representatives of our ruler, which will increase the order there so that our people find it an attractive destination and secure our presence in those areas." #OLD ENG
 spa_siglo_de_oro: "Siglo de Oro"
 #spa_siglo_de_oro_desc: "La vita culturale del nostro regno è in fermento. Se incanaliamo questa creatività nei luoghi giusti, alimentandola quando necessario con i benefattori, inizieremo un vero e proprio Secolo d'Oro delle Arti Spagnole." #OLD ITA
 spa_siglo_de_oro_desc: "Our realm bustles with cultural and artistic achievements of all kinds. Should we channel that creativity to the proper places, feeding it when needed through wealthy benefactors, we will start a truly Golden Century of $SPA_ADJ$ art." #NEW
 #spa_siglo_de_oro_desc: "The cultural life in our realm is bustling. Should we channel that creativity to the proper places, feeding it when needed with benefactors, we will start a truly Golden Century of the Spanish Arts." #OLD ENG
 spa_revival_of_ecclesiastical_discipline: "Rinascita della Disciplina Ecclesiastica"
 #spa_revival_of_ecclesiastical_discipline_desc: "Il laicismo si è diffuso tra il nostro popolo, allontanandoci da Dio. Firmeremo dei trattati con i nostri leader religiosi per incoraggiare un legame più forte tra il nostro governo e loro, e torneremo ad essere una nazione devota." #OLD ITA
 spa_revival_of_ecclesiastical_discipline_desc: "Religious laxity has become widespread among our people, turning us away from God. We will sign treaties with our religious leaders to encourage a stronger bond between them and our government, and return to being a devout nation." #NEW
 #spa_revival_of_ecclesiastical_discipline_desc: "Laity has become widespread among our people, putting us away from God. We will sign treaties with our religious leaders to encourage a stronger bond between our government and them, and go back to being a devout nation." #OLD ENG
 #spa_naval_reforms: "Riforme Navali Spagnole" #OLD ITA
 spa_naval_reforms: "$SPA_ADJ$ Naval Reforms" #NEW
 #spa_naval_reforms: "Spanish Naval Reforms" #OLD ENG
 #spa_naval_reforms_desc: "La nostra Marina è stata lasciata in disparte per troppo tempo, rimanendo indietro nella qualità rispetto ai nostri concorrenti. È necessaria una riforma che ci riporti al posto di supremazia che meritiamo." #OLD ITA
 spa_naval_reforms_desc: "We have not made our navy a priority, and as a result, we have fallen behind our competitors in terms of naval quality and performance. A reform is in order, which will re-elevate us to our rightful position of maritime supremacy." #NEW
 #spa_naval_reforms_desc: "Our navy has been left aside for too long, falling behind in quality compared to our competitors. A reform is in order, which will put us back to the place of supremacy we deserve." #OLD ENG
 #spa_spanish_enlightenment: "Illuminismo Spagnolo" #OLD ITA
 spa_spanish_enlightenment: "$SPA_ADJ$ Enlightenment" #NEW
 #spa_spanish_enlightenment: "Spanish Enlightenment" #OLD ENG
 #spa_spanish_enlightenment_desc: "Le nuove idee dell'era moderna stanno permeando le menti dei grandi uomini di Spagna, che stanno sviluppando piani per far sì che la nostra nazione si distingua tra i nostri concorrenti in tutto il mondo." #OLD ITA
 spa_spanish_enlightenment_desc: "Radical new ideas have permeated the minds of $SPA$'s leading figures, inspiring them to develop ambitious plans that will make us stand out among all the other nations of the world." #NEW
 #spa_spanish_enlightenment_desc: "The new ideas of the modern age are permeating the minds of the great men of Spain, who are developing plans to make our nation stand out among our competitors across the world." #OLD ENG

 #Iberian Shared Land
 #tercio: "Tercio" #OLD ITA
 tercio: "Tercios" #NEW
 #tercio: "Tercio" #OLD ENG
 #tercio_desc: "La fanteria Tercio fu sviluppata principalmente dal brillante generale Gonzalo Fernández de Córdoba (#italic El Gran Capitán#!), durante le guerre d'Italia. Si tratta di una formazione di fanteria mista composta da picchieri e moschettieri. Grazie a questo approccio combinato, la formazione gode contemporaneamente sia della rigidità della sua fanteria pesante che della potenza di fuoco a lungo raggio dei suoi moschettieri, rendendola una formazione difensiva e offensiva ideale." #OLD ITA
 tercio_desc: "#italic Tercio#! infantry were developed principally by the brilliant general Gonzalo Fernández de Córdoba, called #italic El Gran Capitán#!, during the Italian Wars. It is a mixed infantry formation of pikemen and musketeers. Because of this combined-arms approach, the formation simultaneously utilizes both the rigidity of its heavy infantry and the long-range firepower of its musketeers, making it an ideal defensive and offensive formation." #NEW
 #tercio_desc: "Tercio infantry were developed principally by the brilliant general Gonzalo Fernández de Córdoba (#italic El Gran Capitán#!), during the Italian Wars. It is a mixed infantry formation of pikemen and musketeers. Because of this combined-arms approach, the formation simultaneously enjoys both the rigidity of its heavy infantry and the long-range firepower of its musketeers, making it an ideal defensive and offensive formation." #OLD ENG
 #Iberian Shared Naval
 #catalan_galley: "Galea Catalana" #OLD ITA
 catalan_galley: "$CAT_ADJ$ Galleys" #NEW
 #catalan_galley: "Catalan Galley" #OLD ENG
 #catalan_galley_desc: "Evoluzione naturale delle antiche navi greche, la $n_catalan_galley$ è una versione più grande di quelle documentate prima dello sviluppo di altre navi simili nel Mar Mediterraneo." #OLD ITA
 catalan_galley_desc: "The $n_catalan_galley$ is a larger version of the ancient Greek galleys that once dominated the Mediterranean Sea." #NEW
 #catalan_galley_desc: "The natural evolution of the ancient Greek ships, the $n_catalan_galley$ is a bigger version of those that were documented before other similar ships developed in the Mediterranean Sea." #OLD ENG
 #early_iberian_caravel: "Caravella Iberica Antica" #OLD ITA
 early_iberian_caravel: "Early $iberia_region_ADJ$ Caravels" #NEW
 #early_iberian_caravel: "Early Iberian Caravel" #OLD ENG
 #early_iberian_caravel_desc: "Di origine iberica, le prime caravelle erano navi piccole ma molto veloci, utilizzate per la pesca d'altura e il commercio costiero. Il loro utilizzo nella penisola iberica è così diffuso che è proprio lì che si trovano le caravelle più avanzate." #OLD ITA
 early_iberian_caravel_desc: "Originally of $iberia_region_ADJ$ origin, the first caravels were small but very fast ships that were used for offshore fishing and coastal trade. Their use in $iberia$ is so widespread that the region can easily boast of possessing the most advanced caravels." #NEW
 #early_iberian_caravel_desc: "Originally of Iberian origin, the first caravels were small but very fast ships that were used for offshore fishing and coastal trade. Its use in the Iberian Peninsula is so widespread that the most advanced caravels are to be found there." #OLD ENG
 #iberian_caravel: "Caravella Iberica" #OLD ITA
 iberian_caravel: "$iberia_region_ADJ$ Caravels" #NEW
 #iberian_caravel: "Iberian Caravel" #OLD ENG
 #iberian_caravel_desc: "Con la necessità di caravelle più veloci e affidabili, nei porti iberici vengono progettate caravelle nuove e più grandi. Sebbene le caravelle siano diventate comuni in tutta Europa, quelle iberiche mantengono un vantaggio in termini di innovatività e velocità." #OLD ITA
 iberian_caravel_desc: "The need for faster and more reliable caravels has driven our shipbuilding experts to make improvements to their design. While caravels have become common across $europe$, the $iberia_region_ADJ$ models remain superior in both innovation and speed." #NEW
 #iberian_caravel_desc: "With the need for faster and more reliable caravels, new and bigger caravels are designed in Iberian ports. While the caravels have become common across Europe, the Iberian ones retain an edge on their innovativeness and velocity." #OLD ENG
 #early_iberian_galleon: "Galeone Iberico Antico" #OLD ITA
 early_iberian_galleon: "Early $iberia_region_ADJ$ Galleons" #NEW
 #early_iberian_galleon: "Early Iberian Galleon" #OLD ENG
 #early_iberian_galleon_desc: "Una versione primitiva di una potente imbarcazione oceanica, il $n_early_iberian_galleon$ è un'invenzione originale della penisola che presenta un castello di prua più basso e uno scafo lungo che lo rendono particolarmente stabile e resistente al vento frontale." #OLD ITA
 early_iberian_galleon_desc: "An early, but powerful ocean-going vessel, the $n_early_iberian_galleon$ is an original invention from $iberia$ that has a lower forecastle and a long hull, making them especially stable and resistant to headwinds." #NEW
 #early_iberian_galleon_desc: "An early version of a potent ocean-going vessel, the $n_early_iberian_galleon$ is an original invention from the Peninsula that has a lower forecastle and a long hull that makes it especially stable and resistant to frontal wind." #OLD ENG
 #square_rigged_caravel: "Caravella a Vela Quadra" #OLD ITA
 square_rigged_caravel: "Square-Rigged Caravels" #NEW
 #square_rigged_caravel: "Square Rigged Caravel" #OLD ENG
 #square_rigged_caravel_desc: "Combinando la $n_iberian_caravel$ e la $n_carrack$, nascerà una nuova nave: una nave veloce e robusta che ci aiuterà a dominare i mari." #OLD ITA
 square_rigged_caravel_desc: "By combining the $n_iberian_caravel$ and the $n_carrack$, a new ship hAs been born: fast, strong, and exactly what we need help us dominate the seas." #NEW
 #square_rigged_caravel_desc: "By combining the $n_iberian_caravel$ and the $n_carrack$, a new ship will be born: a fast and strong ship that will help us dominate the seas." #OLD ENG
 #iberian_galleon: "Galeone Iberico" #OLD ITA
 iberian_galleon: "$iberia_region_ADJ$ Galleons" #NEW
 #iberian_galleon: "Iberian Galleon" #OLD ENG
 #iberian_galleon_desc: "Evoluzione naturale del $n_early_iberian_galleon$, il $n_iberian_galleon$ è una versione più stilizzata del precedente che diventa una nave incredibilmente potente in grado di schiacciare i propri nemici in mare." #OLD ITA
 iberian_galleon_desc: "The $n_iberian_galleon$ is a more stylized version of the $n_early_iberian_galleon$. They are tremendously powerful vessels that absolutely crush any opposition on the high seas." #NEW
 #iberian_galleon_desc: "The natural evolution of the $n_early_iberian_galleon$, the $n_iberian_galleon$ is a more stylized version of the former that becomes a tremendously powerful vessel that crushes its enemies in the seas." #OLD ENG
