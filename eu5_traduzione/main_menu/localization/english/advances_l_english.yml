 ara_almogavars: "$a_almogavars$"
 ara_almogavars_desc: "$a_almogavars_desc$"
 ara_catalan_crossbowmen: "$a_catalan_crossbowmen$"
 ara_catalan_crossbowmen_desc: "$a_catalan_crossbowmen_desc$"
 ara_late_almogavars: "$a_late_almogavars$"
 ara_late_almogavars_desc: "$a_late_almogavars_desc$"
 cas_lanzas_de_castilla: "$a_lanzas_de_castilla$"
 cas_lanzas_de_castilla_desc: "$a_lanzas_de_castilla_desc$"
 por_cacadores: "Caçadores"
 #por_cacadores_desc: "Soprannominati #italic Galli da Combattimento#!, i Caçadores sono un'unità di fanteria leggera d'élite dell'esercito portoghese che indossa un'uniforme marrone per distinguersi dai soldati regolari." #OLD ITA
 por_cacadores_desc: "Nicknamed the #italic Fighting Cocks#!, the #italic Caçadores#! are an elite light infantry unit in the $POR_ADJ$ Army who wear brown uniforms to distinguish them from regular soldiers." #NEW
 #por_cacadores_desc: "Nicknamed the #italic Fighting Cocks#!, the Caçadores are an elite light infantry unit in the Portuguese Army who wear a brown uniform to distinguish them from regular soldiers." #OLD ENG

 #Denmark
 dan_levy_recruitment: "Affidamento sulle Leve"
 #dan_levy_recruitment_desc: "Poiché il nostro dominio immediato è incentrato sulla Penisola dello Jutland e sull'arcipelago delle isole Danesi, potremo contare su leve rapidi per difendere il nostro Paese dall'aggressione straniera." #OLD ITA
 dan_levy_recruitment_desc: "Our domain is protected by natural barriers, namely the Jutland Peninsula and the $DAN_ADJ$ archipelago. This defensive geography is extremely helpful when we are under attack, as it gives us time to raise levies before our enemies can reach our core territory." #NEW
 #dan_levy_recruitment_desc: "With our immediate domain being centered around the Jutland Peninsula and the archipelago of the Danish islands we will be able to rely on quickly raised levies to defend our country against foreign aggression." #OLD ENG
 #dan_old_naval_traditions: "Reti Marittime della Danimarca" #OLD ITA
 dan_old_naval_traditions: "$DAN_ADJ$ Sea Networks" #NEW
 #dan_old_naval_traditions: "Sea Networks of Denmark" #OLD ENG
 #dan_old_naval_traditions_desc: "Ogni parte del nostro Paese è circondata dalle acque del Mar Baltico e del Mare del Nord. Questo ci garantisce il vantaggio unico di poter utilizzare le vie d'acqua come vie di trasporto e di comunicazione, accorciando notevolmente le distanze tra le regioni del nostro Paese." #OLD ITA
 dan_old_naval_traditions_desc: "Every part of our country is surrounded by the waters of the Baltic and North Seas. This gives us the unique advantage of being able to utilize waterways for both transport and communication, considerably shortening the time it takes to travel between regions." #NEW
 #dan_old_naval_traditions_desc: "Every part of our country is surrounded by the waters of the Baltic and North Sea. This grants us a unique advantage to be able to utilize waterways as ways of transport and communication, shortening the distance between the regions of our country greatly." #OLD ENG
 dan_rulers_of_the_north: "I Veri Governanti del Nord"
 #dan_rulers_of_the_north_desc: "I governanti della Danimarca hanno rivendicato per secoli la supremazia sulle regioni Nordiche. Abbellire l'eredità di Re come Canuto 'il Grande' ci garantirà una legittimazione interna ed esterna." #OLD ITA
 dan_rulers_of_the_north_desc: "The rulers of $DAN$ have claimed overlordship over the Nordic regions for centuries. Embellishing the legacy of Kings like Canute 'the Great' will grant us the internal and external legitimacy needed to support our assertions." #NEW
 #dan_rulers_of_the_north_desc: "The Rulers of Denmark have claimed overlordship over the Nordic regions for centuries. Embellishing the legacy of Kings like Canute 'the Great' will grant us internal and external legitimacy." #OLD ENG
 dan_reliance_mercenaries: "Affidamento sui Mercenari"
 #dan_reliance_mercenaries_desc: "La Danimarca non può contare su una vasta popolazione per rifornire gli eserciti di cui il nostro Paese avrà bisogno Come attore sulla scena globale. Pertanto, dobbiamo assicurarci che le Società Mercenarie siano disposte a servire il nostro Stato, garantendo la loro fedeltà con contratti consolidati." #OLD ITA
 dan_reliance_mercenaries_desc: "4DAN$ cannot rely on a vast population to supply their armies. Therefore, we need to ensure that mercenary companies are willing to serve our state, while guaranteeing their loyalty with solid contracts." #NEW
 #dan_reliance_mercenaries_desc: "Denmark can not rely on a vast population to supply the armies our country will need as a player on a global stage. Therefore, we need to ensure that Mercenary Companies are willing to serve our State while ensuring their loyalty with solidified contracts." #OLD ENG
 dan_rentekammer_advance: "Rentekammeret"
 #dan_rentekammer_advance_desc: "Istituendo un dipartimento separato per il Tesoro, il #italic Rentekammeret#!, possiamo stabilire un maggiore controllo sulle nostre finanze e far funzionare il nostro governo in modo più efficiente. Con la documentazione di tutti i nostri registri finanziari, saremo in grado di stimare più facilmente le nostre spese future, stabilizzando le nostre finanze." #OLD ITA
 dan_rentekammer_advance_desc: "By establishing a separate department for our Treasury, the #italic Rentekammeret#!, we will have better control over our finances and be able to run the government more efficiently. With the documentation of all our financial records, we will be able to estimate our future expenditures more easily, stabilizing our finances." #NEW
 #dan_rentekammer_advance_desc: "By establishing a separate department for Treasury, the #italic Rentekammeret#!, we can establish greater control over our finances and let our government run more efficiently. With the documentation of all our financial records, we will be able to estimate our future expenditures more easily, stabilizing our finances." #OLD ENG
 #dan_royal_danish_navy: "La Marina Militare per lo Stato Danese" #OLD ITA
 dan_royal_danish_navy: "$DAN_ADJ$ State Navy" #NEW
 #dan_royal_danish_navy: "Navy for the Danish State" #OLD ENG
 #dan_royal_danish_navy_desc: "Il nostro Paese è circondato dall'acqua e quindi è aperto a essere dominato da qualsiasi potenza con una flotta suprema. Per garantire che questo non venga mai raggiunto dai nostri nemici, dovremmo finanziare una Marina Militare degna di proteggere le nostre coste e proiettare il nostro potere sul nord Dell'Europa." #OLD ITA
 dan_royal_danish_navy_desc: "Our country is surrounded by water, and therefore vulnerable to domination by any power with a large enough fleet. To ensure this will never happen, we must fund a navy capable of protecting our coastline and projecting our power over the north of $europe$." #NEW
 #dan_royal_danish_navy_desc: "Our country is surrounded by water, and therefore open to be dominated by any power with a supreme fleet. To ensure this will never be achieved by our enemies, we should fund a Navy worthy of protecting our coastline and project our power over the north of Europe." #OLD ENG
 dan_danish_orthodoxy: "Uniformità Religiosa"
 #dan_danish_orthodoxy_desc: "Nel tumultuoso panorama religioso dell'Europa, dovremo trovare la strada giusta per la Danimarca e rimanere fedeli alla dottrina della nostra Chiesa." #OLD ITA
 dan_danish_orthodoxy_desc: "In the tumultuous religious landscape of $europe$, we must set $DAN$ on the path to righteousness, and remain true to the doctrines of our church." #NEW
 #dan_danish_orthodoxy_desc: "In the tumultuous religious landscape of Europe we will need to find the righteous path for Denmark and stand true to the doctrine of our Church." #OLD ENG
 #dan_expanded_dockyards: "Il Cantiere Navale di Copenaghen" #OLD ITA
 dan_expanded_dockyards: "The $kobenhavn$ Dockyard" #NEW
 #dan_expanded_dockyards: "The Copenhagen Dockyard" #OLD ENG
 #dan_expanded_dockyards_desc: "Nel nostro Paese esiste una tradizione di lunga data nella costruzione di navi. Questi esperti costruttori navali hanno bisogno di un luogo moderno e spazioso per costruire una marina degna di chiamarsi Danese. Le acque intorno a Copenaghen ci offrono l'opportunità perfetta per costruire un cantiere navale di questo tipo." #OLD ITA
 dan_expanded_dockyards_desc: "Our country has a long and proud history of shipbuilding. Our experienced shipwrights need a modern and spacious dock in which to construct a navy worthy of calling itself $DAN_ADJ$. The waters around $kobenhavn$ are the perfect place to construct such a dockyard." #NEW
 #dan_expanded_dockyards_desc: "There is a long-standing tradition of shipbuilding in our country. These experienced Shipwrights need a modern and spacious place to construct a navy worthy of calling itself Danish. The waters around Copenhagen give us the perfect opportunity to construct such a dockyard." #OLD ENG
 #dan_danish_legislation: "Legislazione Danese" #OLD ITA
 dan_danish_legislation: "$DAN_ADJ$ Legislation" #NEW
 #dan_danish_legislation: "Danish Legislation" #OLD ENG
 #dan_danish_legislation_desc: "Le leggi regionali dello Jutland, della Zelanda E della Scania hanno servito il nostro Paese per secoli come base del nostro codice legale. Dovremmo raccogliere e unificare queste leggi in un unico codice legale coerente a beneficio di tutti, noto come #italic Danske Lov#!." #OLD ITA
 dan_danish_legislation_desc: "The regional laws of Jutland, Zealand and Scania formed the basis of our legal code for centuries. For the benefit of our realm, we should compile and unify these laws into a single comprehensive legal system, which will be known as the #italic Danske Lov#!." #NEW
 #dan_danish_legislation_desc: "The regional laws of Jutland, Zealand and Scania have served our country for centuries as the basis of our legal code. We should compile and unify these laws for one coherent legal code for the benefit of all, known as the #italic Danske Lov#!." #OLD ENG
 dan_danish_agriculture: "Focus sull'Agricoltura"
 #dan_danish_agriculture_desc: "Sebbene le terre Danesi siano povere di materiali rari da sfruttare, ci offrono molti prodotti agricoli da raccogliere. Utilizzando la terra saremo in grado di produrre più cibo e di non rischiare carestie durante i periodi più difficili." #OLD ITA
 dan_danish_agriculture_desc: "While the $DAN_ADJ$ terrain is relatively poor in terms of rare materials available to exploit, they make up for it with agricultural abundance. We shall focus on optimizing our farming and food production, safeguarding our people against future periods of famine." #NEW
 #dan_danish_agriculture_desc: "While the Danish lands are poor in rare materials to exploit, they offer us plenty of agricultural products to harvest. By utilizing the land we will be able to produce more food and not risk famines during harsh times." #OLD ENG
 dan_royal_life_guards: "Guardia Reale di Vita"
 #dan_royal_life_guards_desc: "Le Guardie Reali della vita sono un reggimento d'élite delle forze Danesi e fungono anche da guardia personale del sovrano e da forza cerimoniale del governo." #OLD ITA
 dan_royal_life_guards_desc: "The Royal Life Guards are an elite $DAN_ADJ$ regiment that also serve as the ruler's personal guard and perform ceremonial duties." #NEW
 #dan_royal_life_guards_desc: "The Royal Life Guards serve as an elite regiment of the Danish forces, while also serving as the ruler's personal guard and a ceremonial force of the government." #OLD ENG
 dan_scanian_regiment: "Reggimento Scaniano"
 dan_scanian_regiment_desc: "Il Reggimento Scaniano è un'unità militare composta da contadini arruolati, istituita per ridurre la dipendenza dalle forze mercenarie e costruire un esercito permanente più organizzato sotto la diretta autorità reale."
 dan_admiralty_college: "Collegio dell'Ammiragliato"
 #dan_admiralty_college_desc: "Con l'istituzione di una scuola centralizzata per la formazione dei nostri comandanti navali, saremo in grado di produrre leader qualificati che conoscono le acque intorno alla nostra costa. Questo servirà a proteggere le nostre acque e a garantire la sovranità della Danimarca." #OLD ITA
 dan_admiralty_college_desc: "With the establishment of a centralized college to train our naval commanders, we will be able to produce skilled leaders familiar with our coastal waters. This will improve our marine defense strategy, and ultimately better safeguard $DAN_ADJ$ sovereignty." #NEW
 #dan_admiralty_college_desc: "With the establishment of a centralized college to train our naval commanders we will be able to produce skilled leaders familiar with the waters around our coastline. This will serve the protection of our own waters and ensure the sovereignty of Denmark." #OLD ENG
 #dan_trading_economy: "Un Paese Marittimo" #OLD ITA
 dan_trading_economy: "A Maritime Nation" #NEW
 #dan_trading_economy: "A Maritime Country" #OLD ENG
 #dan_trading_economy_desc: "La nostra economia non sarà in grado di produrre tutto da sola, quindi dovremo fare affidamento su una rete commerciale stabile per esportare i nostri beni e importare tutto ciò che noi stessi non siamo in grado di produrre." #OLD ITA
 dan_trading_economy_desc: "We cannot produce everything we need to maintain economic stability on our own. We must instead rely on a stable trade network to export our goods and import everything that we ourselves are not able to produce." #NEW
 #dan_trading_economy_desc: "Our economy will not be able to produce everything on its own, therefore we will need to rely on a stable trade network to export our goods and import everything that we ourselves are not able to produce." #OLD ENG

 ven_printing_industry: "Industria della Stampa"
 #ven_printing_industry_desc: "Sin dall'invenzione della stampa, i veneziani hanno dimostrato un'attitudine al suo utilizzo. Dovremmo incoraggiare questa industria, perché i vantaggi per Venezia sono evidenti." #OLD ITA
 ven_printing_industry_desc: "Since the invention of the printing press, the people of $VEN$ have shown an aptitude for its use. We should encourage further development of our printing industry, as the potential benefits are manifold." #NEW
 #ven_printing_industry_desc: "Since the invention of the printing press the people of Venice have shown an aptitude towards its use. We should encourage this industry as the benefits to Venice are manifest." #OLD ENG
 ven_stato_da_mar: "Stato da Mar"
 #ven_stato_da_mar_desc: "Il commercio è la linfa vitale di Venezia e la gestione delle nostre stazioni commerciali all'estero è vitale per i nostri interessi commerciali. Centralizzando l'amministrazione di queste terre in un'unica unità, miglioreremo il nostro commercio." #OLD ITA
 ven_stato_da_mar_desc: "Trade is the lifeblood of $VEN$, and competent management of our overseas trade stations is vital to our trading interests. By centralizing the administration of these lands into a single unit, we will enhance our trade." #NEW
 #ven_stato_da_mar_desc: "Trade is the lifeblood of Venice and the management of our overseas trade stations is vital to our trading interests. By centralizing the administration of these lands into a single unit we will enhance our trade." #OLD ENG
 ven_state_inquisition: "l'Inquisizione di Stato"
 #ven_state_inquisition_desc: "L'Inquisizione di Stato è un gruppo di tre giudici istituito per affrontare le minacce alla sicurezza interna. Le dimensioni ridotte del gruppo consentono di affrontare rapidamente le minacce, e non ci vorrà molto per creare una rete di agenti sia in patria che all'estero per stanare i traditori." #OLD ITA
 ven_state_inquisition_desc: "The State Inquisition is a panel of three judges that was set up to handle threats to internal security. The panel's small size means they can deal quickly with threats, and it will not take them long to establish a network of agents both at home and abroad to root out the traitors." #NEW
 #ven_state_inquisition_desc: "The State Inquisition is a panel of three judges set up to deal with threats to internal security. The panel's small size means they can deal quickly with threats, and it will not take them long to establish a network of agents both at home and abroad to root out the traitors." #OLD ENG
 #venetian_arsenal_advance: "Arsenale Veneziano" #OLD ITA
 venetian_arsenal_advance: "$VEN_ADJ$ Arsenal" #NEW
 #venetian_arsenal_advance: "Venetian Arsenal" #OLD ENG
 #venetian_arsenal_advance_desc: "Risalente al XII secolo, l'Arsenale di Venezia è la base su cui poggia il nostro potere." #OLD ITA
 venetian_arsenal_advance_desc: "Dating from the 12th century, the Arsenal of $VEN$ is the foundation on which all our power rests." #NEW
 #venetian_arsenal_advance_desc: "Dating from the 12th century the Arsenal of Venice is the foundation that our power rests upon." #OLD ENG
 #ven_venetian_thalassocracy: "Talassocrazia Veneziana" #OLD ITA
 ven_venetian_thalassocracy: "$VEN_ADJ$ Thalassocracy" #NEW
 #ven_venetian_thalassocracy: "Venetian Thalassocracy" #OLD ENG
 #ven_venetian_thalassocracy_desc: "Lo Stato veneziano ha sempre avuto uno stretto legame con il mare fin dalla sua nascita, secoli fa. Il commercio e gli scambi sono profondamente radicati nella nostra amministrazione, e i mercanti veneziani hanno accesso a più risorse di qualsiasi altra amministrazione." #OLD ITA
 ven_venetian_thalassocracy_desc: "$VEN$ has always had a close connection to the sea. Trade and commerce are deeply integrated into our administration, and $VEN_ADJ$ merchants have access to more resources than in any other government." #NEW
 #ven_venetian_thalassocracy_desc: "The Venetian state has always had a close connection to the sea ever since its upcoming centuries ago. Trade and commerce are deeply ingrained in our administration, and Venetian merchants have access to more resources than any other administrative." #OLD ENG
 ven_venetian_palaces: "$venetian_palaces$"
 ven_venetian_palaces_desc: "$venetian_palaces_desc$"
 ven_gothic_architecture: "Architettura Gotica"
 #ven_gothic_architecture_desc: "Influenzato dagli edifici bizantini e con cenni di stile islamico, il $ven_gothic_architecture$ veneziano è un elemento centrale della nostra architettura e molto amato dall'alta società. Molti nobili e mercanti benestanti sostengono questo stile architettonico con il loro oro." #OLD ITA
 ven_gothic_architecture_desc: "Influenced by $BYZ_ADJ$ architecture and with nods to Islamic aesthetics, the unique $ven_gothic_architecture$ is a core element of $VEN_ADJ$ identity and highly beloved by the upper class. Many aristocrats and prosperous merchants show their support for proliferating this style of architecture with their gold." #NEW
 #ven_gothic_architecture_desc: "Influenced by the Byzantine buildings and with nods of Islamic style, the Venetian $ven_gothic_architecture$ is a core element of our architecture and highly beloved by the upper class. Many nobles and prosperous merchants support this style of architecture with their gold." #OLD ENG
 #ven_ship_mounted_gunpowder_weapons: "Armi a polvere da sparo montate sulle navi" #OLD ITA
 ven_ship_mounted_gunpowder_weapons: "Ship-Mounted Gunpowder Weapons" #NEW
 #ven_ship_mounted_gunpowder_weapons: "Ship-mounted Gunpowder Weapons" #OLD ENG
 #ven_ship_mounted_gunpowder_weapons_desc: "Per millenni, il combattimento navale è stato più simile a una battaglia terrestre su tavole galleggianti che a un vero e proprio combattimento tra navi. Con l'introduzione delle armi a polvere da sparo sulle nostre navi, siamo in grado di rompere questa guerra antiquata e di annientare le navi nemiche prima che si avvicinino all'abbordaggio delle nostre galee." #OLD ITA
 ven_ship_mounted_gunpowder_weapons_desc: "Naval combat has been more like fighting a land battle on floating planks than actual ship-to-ship combat for millennia. With the introduction of gunpowder weapons on our ships, we are able to break away from old-fashioned warfare and annihilate enemy ships before they come even close to boarding our galleys." #NEW
 #ven_ship_mounted_gunpowder_weapons_desc: "Naval combat has been more akin to a land battle on floating planks than actual ship-to-ship combat for millennia. With the introduction of gunpowder weapons on our ships, we are able to break this old-fashioned warfare and annihilate enemy ships before they come even close to boarding our galleys." #OLD ENG
 ven_magistrato_alla_sanita: "Magistrato alla Sanità"
 #ven_magistrato_alla_sanita_desc: "Il #italic $ven_magistrato_alla_sanita$#! - La Magistratura della Salute - è un ufficio cruciale del nostro Stato che si occupa della prevenzione delle malattie e delle epidemie all'interno della nostra nazione." #OLD ITA
 ven_magistrato_alla_sanita_desc: "The #italic $ven_magistrato_alla_sanita$#! — Magistracy of Health — is a crucial office in our state which oversees the prevention of diseases and epidemics." #NEW
 #ven_magistrato_alla_sanita_desc: "The #italic $ven_magistrato_alla_sanita$#! — Magistracy of Health — is a crucial office in our state which overlooks the prevention of diseases and epidemics within our nation." #OLD ENG
 #ven_venetian_painting: "Pittura Veneziana" #OLD ITA
 ven_venetian_painting: "$VEN_ADJ$ Painting" #NEW
 #ven_venetian_painting: "Venetian Painting" #OLD ENG
 #ven_venetian_painting_desc: "La regione italiana nel suo complesso è ben nota per il suo contributo alla cultura mondiale - e la pittura veneziana è uno dei suoi grandi contributori. Artisti provenienti da molto lontano vengono nelle nostre gallerie per sperimentare in prima persona il Rinascimento italiano irradiato dalla nostra grande arte." #OLD ITA
 ven_venetian_painting_desc: "$ITA$ as a whole is famous for its cultural achievements, and $VEN_ADJ$ painting is one of its greatest contributions. Artists come from far away to experience our magnificent galleries and witness our cultural rebirth firsthand." #NEW
 #ven_venetian_painting_desc: "The Italian region as a whole is well known for its contribution to the world culture — and the Venetian paintings is one of its great contributors. Artists from far away come to our galleries to experience the Italian Renaissance radiating from our great art firsthand." #OLD ENG
 #ven_venetian_school_of_music: "Scuola di Musica Veneziana" #OLD ITA
 ven_venetian_school_of_music: "$VEN_ADJ$ School of Music" #NEW
 #ven_venetian_school_of_music: "Venetian School of Music" #OLD ENG
 #ven_venetian_school_of_music_desc: "Mentre i dipinti attirano gli appassionati di arte visiva, la musica veneziana viaggia lontano e oltre per influenzare coloro che cercano l'illuminazione melodica. Molti grandi compositori provengono dalle nostre scuole di musica e viaggiano ora attraverso l'Europa per diffondere la nostra cultura." #OLD ITA
 ven_venetian_school_of_music_desc: "While our paintings attract enthusiasts of visual art, $VEN_ADJ$ music travels far and beyond, beloved by those who seek melodic enlightenment. Many great composers graduate from our conservatories and go on to find great success throughout $europe$, spreading our culture with every golden note." #NEW
 #ven_venetian_school_of_music_desc: "While paintings attract the enthusiasts of visual art, Venetian music travels far and beyond to influence those who seek melodic enlightenment. Many great composers come from our schools of music and journey now through Europe to spread our culture." #OLD ENG
 ven_mixed_naval_tactics: "Tattica Navale Mista"
 #ven_mixed_naval_tactics_desc: "I remi sono stati la spina dorsale della marina veneziana fin dalla sua nascita. Tuttavia, i tempi non sono stati fortunati per i remi, poiché ora le navi a vela assumono un ruolo sempre più dominante nei combattimenti navali nel Mar Mediterraneo. La nostra marina deve adattarsi a questa situazione, combinando la nostra risorsa più forte con le grandi galee." #OLD ITA
 ven_mixed_naval_tactics_desc: "Oar-propelled vessels have been standard since the inception of the $VEN_ADJ$ navy. However, sailing ships now play an increasingly dominant role in Mediterranean naval combat. Our navy will adapt by adopting the mighty galleass, a hybrid ship that can use both oars and sails." #NEW
 #ven_mixed_naval_tactics_desc: "The oars have been the backbone of the Venetian navy ever since its inception. However, the time has not been fortunate for the oars as now sail ships take an increasingly more dominant role in naval combat in the Mediterranean Sea. Our navy has to adapt to it by combining our strongest asset with the grand galleasses." #OLD ENG
 ven_naval_conscription: "La Coscrizione Navale"
 #ven_naval_conscription_desc: "Finché Venezia è rimasta in piedi, i nostri rematori di galea sono stati uomini liberi che lavoravano per un salario, ma una grave carenza di manodopera sta rendendo più difficile trovare uomini qualificati per svolgere il lavoro. Non abbiamo altra scelta che ricorrere alla coscrizione per le nostre galere." #OLD ITA
 ven_naval_conscription_desc: "For as long as $VEN$ has stood, our galleys have been rowed by free men who worked for a wage, but an acute manpower shortage is making it harder to find qualified oarsmen. We have no choice but to resort to conscription to staff our galleys." #NEW
 #ven_naval_conscription_desc: "For as long as Venice has stood our galley oarsmen have been free men who worked for a wage, but an acute manpower shortage is making it harder to find qualified men to do the work. We have but no choice but to resort to conscription for our Galleys." #OLD ENG
 #ven_provveditori_ai_beni_inculti: "I Provveditori ai Beni Inculti" #OLD ITA
 ven_provveditori_ai_beni_inculti: "'Provveditori ai Beni Inculti'" #NEW
 #ven_provveditori_ai_beni_inculti: "The Provveditori ai beni inculti" #OLD ENG
 #ven_provveditori_ai_beni_inculti_desc: "Il dipartimento per le risorse naturali incolte è stato istituito per assistere il drenaggio delle paludi e l'irrigazione delle terre secche. L'obiettivo è quello di migliorare l'approvvigionamento alimentare di Venezia." #OLD ITA
 ven_provveditori_ai_beni_inculti_desc: "This department for uncultivated natural resources was set up to facilitate the draining of marshes and the irrigation of arid land. The ultimate goal is to improve the supply of food to $VEN$." #NEW
 #ven_provveditori_ai_beni_inculti_desc: "The department for uncultivated natural resources was set up to assist in the draining of marshland and the irrigation of dry lands. The goal is to improve the food supply to Venice." #OLD ENG
 cunning_diplomacy: "Diplomazia Astuta"
 #cunning_diplomacy_desc: "Di fronte a nemici superiori da entrambe le parti, i governanti valacchi svilupparono un'abilità nel cambiare alleanze quando era prudente. Diversi si assicurarono il trono con il sostegno degli Ottomani, per poi stringere alleanze con l'Ungheria o con il Sacro Romano Imperatore." #OLD ITA
 cunning_diplomacy_desc: "Faced with superior enemies on both sides, $WAL_ADJ$ rulers developed a knack for shifting alliances when prudent. Several secured their throne with $TUR_ADJ$ support, then went on to form alliances with $HUN_ADJ$ or the $hre$." #NEW
 #cunning_diplomacy_desc: "Faced with superior enemies on both sides Wallachian rulers developed a knack for shifting alliances when prudent. Several secured their throne with Ottoman support and then went on to form alliances with Hungary or the Holy Roman Emperor." #OLD ENG
 boyar_regime: "Regime Boyar"
 #boyar_regime_desc: "Il Trattato di Alba Iulia cementò il potere della nobiltà valacca. Un consiglio di 12 grandi boiardi avrebbe preso parte, accanto al voivoda, al governo esecutivo del Paese." #OLD ITA
 boyar_regime_desc: "The Treaty of Alba Iulia cemented the power of the $WAL_ADJ$ nobility. A council of twelve influential Boyars now works alongside the #italic voivode#! to carry out the executive rule of the country." #NEW
 #boyar_regime_desc: "The Treaty of Alba Iulia cemented the power of the Wallachian nobility. A council of 12 great boyars was to take part alongside the voivode in the executive rule of the country." #OLD ENG
 home_of_hussars: "Casa degli Ussari"
 #home_of_hussars_desc: "Sebbene le formazioni di cavalleria leggera come concetto fossero un'antica idea romana, i primi ussari balcanici - o gusar (corsari o pirati), come erano conosciuti - apparvero come unità ausiliarie dell'Impero Bizantino, reclutati principalmente dalla Serbia controllata dai Bizantini nel X e XI secolo. Anche dopo il declino del potere bizantino, questa tradizione rimase e fu ulteriormente perfezionata nei secoli successivi." #OLD ITA
 home_of_hussars_desc: "Although light cavalry formations are an old concept, the first Balkan hussars — or #italic gusars#! — appeared as auxiliary units of $BYZ$, recruited mainly from $BYZ-ADJ$-held $serbia_region$ in the 10th and 11th centuries. Even after $BYZ-ADJ$ power dwindled, this tradition remained, and was further refined over the following centuries." #NEW
 #home_of_hussars_desc: "Although light cavalry formations as a concept were an old Roman idea, the first Balkan hussars — or gusars (corsairs or pirates) as they were known, appeared as auxiliary units of the Byzantine Empire, recruited mainly from Byzantine-held Serbia in the 10th and 11th century. Even after the Byzantine power dwindled, this tradition remained, and was further refined in the following centuries." #OLD ENG
 #serbian_mining: "Miniere Serbe" #OLD ITA
 serbian_mining: "$SER_ADJ$ Mining" #NEW
 #serbian_mining: "Serbian Mining" #OLD ENG
 #serbian_mining_desc: "Le Montagne Balcaniche contengono abbondanti minerali pronti per essere estratti da minatori esperti. Come altre regioni dell'Europa orientale, la Serbia accolse abili minatori sassoni per sviluppare la sua industria mineraria. Città come Novo Brdo si sono trasformate in vaste metropoli, alimentate dalla ricchezza estratta da queste terre." #OLD ITA
 serbian_mining_desc: "The Balkan Mountains are brimming with abundant ore, just begging to be extracted by skilled miners. As in other parts of $eastern_europe$, $SER$ welcomed experienced $SAX_ADJ$ miners to help develop its mining industry. Cities like $novo_brdo$ grew into vast metropoli, fueled by the wealth extracted from the land." #NEW
 #serbian_mining_desc: "The Balkan Mountains hold abundant ores ready for extraction by skilled miners. Similar to other Eastern European regions, Serbia welcomed skillful Saxon miners to develop its mining industry. Cities like Novo Brdo thrived into vast metropolises, fueled by the wealth extracted from these lands." #OLD ENG
 #mimic_the_phoenix: "Imitare la Fenice" #OLD ITA
 mimic_the_phoenix: "Mimicking the Phoenix" #NEW
 #mimic_the_phoenix: "Mimic the Phoenix" #OLD ENG
 #mimic_the_phoenix_desc: "Abbracciamo con entusiasmo le vie di Bisanzio, con l'obiettivo di rispecchiare le loro leggi e il loro stile generale. Attingendo dal ricco arazzo dell'influenza romana, ci sforziamo di infondere la nostra governance e il nostro sistema legale con la loro essenza, in uno sforzo consapevole di emulare la grazia e la raffinatezza dell'Impero Bizantino all'interno del nostro regno." #OLD ITA
 mimic_the_phoenix_desc: "We eagerly embrace the ways of $BYZ$, aiming to mirror their laws and overall style. Drawing from the rich tapestry of Roman influences, we strive to infuse our governance and legal system with their essence, in a conscious effort to emulate the grace and sophistication of $BYZ$ within our realm." #NEW
 #mimic_the_phoenix_desc: "We eagerly embrace the ways of Byzantium, aiming to mirror their laws and overall style. Drawing from the rich tapestry of Roman influence, we strive to infuse our governance and legal system with their essence, in a conscious effort to emulate the grace and sophistication of the Byzantine Empire within our realm." #OLD ENG
 rallying_the_troops: "Radunare le Truppe"
 #rallying_the_troops_desc: "Il nostro regno ha sviluppato dei metodi per riunire rapidamente le truppe, in modo che nessun nemico possa coglierci impreparati. Questo vantaggio ci ha permesso di resistere nonostante tutte le probabilità fossero contro di noi, e siamo pronti per la battaglia. Uniti, marciamo in avanti, risoluti nello scopo, pronti a difendere il nostro onore e la nostra patria." #OLD ITA
 rallying_the_troops_desc: "Our realm has developed various methods for swiftly amassing troops, so no enemy can catch us unprepared. This edge has helped us stand tall, despite all odds being against us, and we are prepared for battle. United, we march forward, resolute in purpose and ready to defend our honor and homeland!" #NEW
 #rallying_the_troops_desc: "Our realm has developed ways for gathering the troops together swiftly, so no enemy can catch us unprepared. This edge has made us stand despite all odds being against us, and we are prepared for battle. United, we march forward, resolute in purpose, ready to defend our honor and homeland." #OLD ENG
 keepers_of_the_gate: "Custodi della Porta"
 #keepers_of_the_gate_desc: "Il terreno accidentato della Serbia ha dato vita a una formidabile rete di difese, incarnata dall'imponente Fortezza di Smederevo. Queste fortificazioni durature proteggono la nostra nazione, rendendo l'invasione una prospettiva scoraggiante. Dalle distese di montagne alle valli fluviali strategiche, i sistemi difensivi della Serbia sono una testimonianza della nostra resilienza e del nostro spirito indomito." #OLD ITA
 keepers_of_the_gate_desc: "$SER$'s rugged terrain has birthed a formidable network of defenses, epitomized by the imposing Smederevo Fortress. These enduring fortifications safeguard our nation, making invasion a daunting prospect. From the sprawling mountain ranges to the strategic river valleys, $SER$'s defenses stand as a testament to our resilience and indomitable spirit." #NEW
 #keepers_of_the_gate_desc: "Serbia's rugged terrain has birthed a formidable network of defenses, epitomized by the imposing Smederevo Fortress. These enduring fortifications safeguard our nation, making invasion a daunting prospect. From the sprawling mountain ranges to the strategic river valleys, Serbia's defensive systems stand as a testament to our resilience and indomitable spirit." #OLD ENG
 poklisars: "Poklisars"
 #poklisars_desc: "Sin dalla nostra nascita come nazione, abbiamo sempre gettato lo sguardo oltre i nostri confini. Sia che si tratti di stabilire rotte commerciali redditizie, di placare vicini temibili e costruire alleanze, o anche di forgiare solide partnership contro avversari comuni. I Poklar sono il nome che abbiamo dato agli ambasciatori che svolgeranno questa missione in nostro nome." #OLD ITA
 poklisars_desc: "Since the earliest days of our nation, we have often cast our gaze beyond our borders, be it to establish profitable trade routes, placate formidable neighbors and build alliances, or even to forge robust partnerships against common adversaries. #italic Poklisars#! are the ambassadors who carry out these missions in our name." #NEW
 #poklisars_desc: "Since our inception as a nation, we have consistently cast our gaze beyond our borders. Be it to establish profitable trade routes, placate formidable neighbors and build alliances, or even forge robust partnerships against common adversaries. Poklisars are the name we have given to the ambassadors that will carry out this mission in our name." #OLD ENG
 the_rebirth_of_the_patriarchate: "La Rinascita del Patriarcato"
 #the_rebirth_of_the_patriarchate_desc: "Nel XIV secolo, Stefan Dušan mirava a elevare l'Arcivescovado di Serbia a Patriarcato. Da allora, il nostro clero ha cercato di essere indipendente da Costantinopoli, cementando l'unione tra il regno fisico, la nostra nazione, e quello spirituale." #OLD ITA
 the_rebirth_of_the_patriarchate_desc: "In the fourteenth century, Stefan Dušan aimed to elevate the Archbishopric of $SER$ to a Patriarchate. Since then, our clergy has tried to be independent from $constantinople$, cementing the union between the physical realm, our nation, and the spiritual one." #NEW
 #the_rebirth_of_the_patriarchate_desc: "In the fourteenth century, Stefan Dušan aimed to elevate the Archbishopric of Serbia to a Patriarchate. Since then, our clergy has tried to be independent of Constantinople, cementing the union between the physical realm, our nation, and the spiritual one." #OLD ENG
 reform_the_ecclesiastical_authorities: "Riformare le Autorità Ecclesiastiche"
 #reform_the_ecclesiastical_authorities_desc: "La Serbia si trova da tempo al crocevia delle influenze orientali e occidentali, comprese quelle della fede cristiana ortodossa e della Chiesa cattolica. È tempo di intraprendere un percorso di riforma ecclesiastica per rafforzare le nostre istituzioni religiose e garantire il benessere spirituale del nostro regno." #OLD ITA
 reform_the_ecclesiastical_authorities_desc: "$SER$ has long stood at the crossroads of Eastern and Western influences, including those of the $orthodox_ADJ$ $christian_ADJ$ faith and the $catholic_ADJ$ Church. It is time to embark on a path of ecclesiastical reform to strengthen our religious institutions and secure the spiritual well-being of our realm." #NEW
 #reform_the_ecclesiastical_authorities_desc: "Serbia has long stood at the crossroads of Eastern and Western influences, including those of the Orthodox Christian faith and the Catholic Church. It is time to embark on a path of ecclesiastical reform to strengthen our religious institutions and secure the spiritual well-being of our realm." #OLD ENG
 balkan_hajduks: "Gli Hajduk Balcanici"
 #balkan_hajduks_desc: "A differenza delle loro controparti settentrionali in Ungheria, gli Hajduk in Serbia e nelle terre balcaniche vicine si sono guadagnati una reputazione più infamante. Questi uomini vivevano la dura vita dei briganti, sempre in pericolo, sempre in movimento. Tuttavia, durante le guerre, questi uomini esperti e tenaci spesso riempivano i ranghi degli eserciti serbi, fornendo una fanteria eccellente, anche se un po' indisciplinata." #OLD ITA
 balkan_hajduks_desc: "Unlike their $HUN_ADJ$ counterparts, #italic Hajduks#! in $SER$ and neighboring Balkan territories have earned an infamous reputation. These men live the hard life of brigands, always in danger, always on the move. However, during wars these experienced, tough men often filled the ranks of $SER_ADJ$ armies, providing excellent — if slightly undisciplined — infantry." #NEW
 #balkan_hajduks_desc: "Unlike their northern counterparts in Hungary, Hajduks in Serbia and neighboring Balkan lands have earned a more infamous reputation. These men lived the hard life of brigands, always in danger, always on the move. However, during wars these experienced, tough men often filled the ranks of Serbian armies, providing excellent — if a bit undisciplined — infantry." #OLD ENG
 foreign_relations_bureau: "Ufficio Relazioni Estere"
 foreign_relations_bureau_desc: "Il nostro regno ha riconosciuto l'importanza di promuovere relazioni e alleanze amichevoli con i Paesi vicini. Per facilitare questo, istituiremo un ufficio specializzato dedicato agli affari esteri. Mantenendo un focus dedicato alla diplomazia, siamo in una posizione migliore per navigare nella complessa rete delle relazioni internazionali e garantire la prosperità della nostra nazione."
 #serbian_enlightenment: "Illuminismo Serbo" #OLD ITA
 serbian_enlightenment: "$SER_ADJ$ Enlightenment" #NEW
 #serbian_enlightenment: "Serbian Enlightenment" #OLD ENG
 #serbian_enlightenment_desc: "Ispirati da altre nazioni illuministe, gli eroi nazionali, come Dositej Obradović, hanno cercato di elevare la nostra lingua e letteratura vernacolare. Colpito dalla scarsità di opere secolari accessibili alla gente comune, Dositej Obradović ha preso l'iniziativa di colmare il divario tra il serbo scritto e quello parlato. Realizzando diligentemente grammatiche e dizionari, scrivendo tomi e traducendo opere straniere, la nostra nazione sta promuovendo una rinascita letteraria grazie al lavoro di questi visionari." #OLD ITA
 serbian_enlightenment_desc: "Inspired by other nations of the Enlightenment, our national heroes, such as Dositej Obradović, have sought to elevate our vernacular language and literature. Touched by the dearth of secular works accessible to the common folk, Dositej Obradović has taken the lead in bridging the gap between written and spoken $serbian_dialect$. By diligently crafting grammar books and dictionaries, authoring new tomes, and translating foreign works, our nation is fostering a literary revival thanks to the work of these visionaries." #NEW
 #serbian_enlightenment_desc: "Inspired by other enlightenment nations, national heroes, such as Dositej Obradović, have sought to elevate our vernacular language and literature. Touched by the dearth of secular works accessible to the common folk, Dositej Obradović has taken the lead in bridging the gap between written and spoken Serbian. By diligently crafting grammars and dictionaries, authoring tomes, and translating foreign works, our nation is fostering a literary revival thanks to the work of these visionaries." #OLD ENG
 military_modernization: "Modernizzazione Militare"
 #military_modernization_desc: "Il nostro popolo ricorda la nascita della nostra nazione, circondata da potenze formidabili, minacce sempre incombenti per la nostra sicurezza. Questa vigilanza duratura ha forgiato una cultura di incrollabile prontezza, assicurando che le nostre forze armate siano uno scudo contro le avversità. Impavidi e rispettati, i nostri soldati ci hanno trasformato da potenziali prede a potenti avversari, scoraggiando coloro che osano invadere la nostra sovranità." #OLD ITA
 military_modernization_desc: "Our people remember the birth of our nation: surrounded by formidable powers that pose permanent, looming threats to our security. This enduring vigilance has forged a culture of unwavering readiness, ensuring our armed forces stand as a shield against adversity. Fearless and respected, our soldiers have transformed us from potential prey to a mighty adversary, deterring any who dare encroach upon our sovereignty." #NEW
 #military_modernization_desc: "Our people remember the birth of our nation, surrounded by formidable powers, forever looming threats to our security. This enduring vigilance has forged a culture of unwavering readiness, ensuring our armed forces stand as a shield against adversity. Fearless and respected, our soldiers have transformed us from potential prey to a mighty adversary, deterring those who dare encroach upon our sovereignty." #OLD ENG

 seljuk_heritage: "Patrimonio Selgiuchide"
 #seljuk_heritage_desc: "Per abbracciare il futuro, dobbiamo ricordare ciò che abbiamo imparato dai Persiani e dai Grandi Selgiuchidi, e costruire uno Stato che possa unire popoli e credenze diverse in un insieme più grande." #OLD ITA
 seljuk_heritage_desc: "To embrace the future, we must remember what we learned from $IRA$ and the Great Seljuks, and build a state that can unite disparate peoples and beliefs into a greater whole." #NEW
 #seljuk_heritage_desc: "To embrace the future, we must remember what we learned from the Persians and the Great Seljuks, and build a state that can bring together disparate peoples and beliefs into a greater whole." #OLD ENG
 turkic_traditions: "Tradizioni Turche"
 #turkic_traditions_desc: "Veniamo dalle steppe, il vento, le difficoltà e il brivido della battaglia saranno sempre nel nostro sangue, e non dobbiamo mai dimenticarlo. " #OLD ITA
 turkic_traditions_desc: "We hail from the steppes. The wind, the hardships, and the thrill of battle will always be in our blood, and we must never forget them." #NEW
 #turkic_traditions_desc: "We hail from the steppes, the wind, the hardships and the thrill of battle will always be in our blood, and we must never forget it. " #OLD ENG
 millets: "Kanunnames"
 #millets_desc: "Stabilendo codici di legge unici in ciascuna delle province del nostro impero, possiamo garantire che il nostro governo sia considerato equo e giusto. Questi libri di legge, noti come Kanunname, prenderanno in considerazione le circostanze e le tradizioni locali di ciascuna delle nostre province diverse e lontane." #OLD ITA
 millets_desc: "By establishing unique codes of law in each of our empire's provinces, we can ensure that our rule will be viewed as equitable and just. These law books, known as #italic Kanunname#!, will take into consideration the local circumstances and traditions of each of our diverse and far-flung provinces." #NEW
 #millets_desc: "By establishing unique codes of law in each of our empire's provinces we can ensure that our rule will be viewed as equitable and just. These law books, known as Kanunname, will take into consideration the local circumstances and traditions of each of our diverse and far-flung provinces." #OLD ENG
 ghazi: "Ghazi"
 #ghazi_desc: "In linea con le tradizioni della steppa, i nostri nobili sono guerrieri di frontiera, e saremo impavidi nella lotta per espandere la Dimora dell'Islam." #OLD ITA
 ghazi_desc: "In keeping with steppe traditions, our nobles are warriors of the frontier, and we shall be fearless in the fight to expand the Abode of $muslim$." #NEW
 #ghazi_desc: "In keeping with steppe traditions, our nobles are warriors of the frontier, and we shall be fearless in the fight to expand the Abode of Islam." #OLD ENG
 azeb_irregulars: "Azeb Irregolari"
 azeb_irregulars_desc: "Giovani non sposati, arruolati dai segmenti più poveri della società, gli Azeb non funzioneranno solo come soldati e marinai, ma anche come costruttori, genieri e corazzieri. Attraverso un sistema di guarnigioni fortificate, ci assicureremo che vengano sempre pagati."
 bashi_bazouks: "Bashi-Bazouks"
 #bashi_bazouks_desc: "Irregolari indisciplinati, reclutati da segmenti diseredati della popolazione e a volte veri e propri vagabondi, i bashi-bazouk rappresentano un modo economico di presidiare le fortezze e gli avamposti e, con la loro propensione al brigantaggio e alle uccisioni gratuite, si può sempre contare su di loro per infastidire la frontiera del nemico." #OLD ITA
 bashi_bazouks_desc: "Unruly irregulars recruited from disenfranchised segments of the population, and sometimes outright vagabonds, the #italic bashi-bazouks#! provide an affordable way of garrisoning forts and outposts. With their proclivity for brigandage and wanton killing, they can always be relied upon to disturb the enemy's frontier." #NEW
 #bashi_bazouks_desc: "Unruly irregulars recruited from disenfranchised segments of the population, and sometimes outright vagabonds, the bashi-bazouks provide an affordable way of garrisoning forts and outposts, and with their proclivity for brigandage and wanton killing, can always be relied upon to harass the enemy's frontier." #OLD ENG
 ottoman_bureaucracy: "Birûn"
 #ottoman_bureaucracy_desc: "Il Birûn, il Servizio Esterno, comprende il gruppo di amministratori, ufficiali militari e studiosi religiosi appena fuori dalla cerchia personale del sovrano. Insieme, costituiscono un'efficiente burocrazia ereditata dall'Iran e dai Grandi Selgiuchidi, ma adattata ulteriormente da elementi provenienti da Bisanzio, rendendola di fatto unicamente ottomana." #OLD ITA
 ottoman_bureaucracy_desc: "The #italic Birûn#!, or the Exterior Service, comprises the group of administrators, military officers and religious scholars just outside the ruler's personal inner circle. Together, they make up an efficient bureaucracy inherited from $IRA$ and the Great Seljuks, but adapted further by elements from $BYZ$, making it uniquely $TUR_ADJ$ indeed." #NEW
 #ottoman_bureaucracy_desc: "The Birûn, the Exterior Service, comprises the group of administrators, military officers and religious scholars just outside the ruler's personal inner circle. Together, they make up an efficient bureaucracy inherited from Iran and the Great Seljuks, but adapted further by elements from Byzantium, making it uniquely Ottoman indeed." #OLD ENG
 ahdnames: "Ahidnâme"
 #ahdnames_desc: "Chiamate anche capitolazioni, le $ahdnames$ sono accordi contrattuali con altre nazioni, basati sia sulla $muslim$ che sulla legge secolare. Le $ahdnames$ sono più spesso utilizzate per garantire ai mercanti o ai chierici di altre nazioni protezione e diritti all'interno delle nostre terre, assicurando che la giustizia sia rispettata e che il commercio possa fluire senza ostacoli." #OLD ITA
 ahdnames_desc: "Also called capitulations, the $ahdnames$ are contractual agreements with other nations, drawing upon both $muslim_ADJ$ and secular law. $ahdnames$ are most often used for guaranteeing the protection and rights of foreign merchants and clergy within our lands, ensuring that justice is upheld and trade can flow unhampered." #NEW
 #ahdnames_desc: "Also called capitulations, the $ahdnames$ are contractual agreements with other nations, drawing upon both $muslim$ and secular law. $ahdnames$ are most often used for guaranteeing other nation's merchants or clerics protection and rights within our lands, ensuring that justice is upheld and trade can flow unhampered." #OLD ENG
 dragomans: "Dragomani"
 #dragomans_desc: "Interpreti, traduttori e guide in una sola persona, i dragomani sono funzionari qualificati che lavorano per migliorare i nostri sforzi diplomatici e commerciali con diverse comunità e Paesi. La maggior parte dei dragomani ha origini greche, anche se alcuni provengono da ambienti ebraici, armeni o da altri contesti multilingue." #OLD ITA
 dragomans_desc: "Interpreters, translators, and guides in one, the $dragomans$ are skilled officials who work to enhance our diplomatic and commercial efforts with different communities and countries. Most dragomans are of $greek_culture$ ancestry, though some hail from $jewish_ADJ$, $armenian_culture$, or other multilingual backgrounds." #NEW
 #dragomans_desc: "Interpreters, translators, and guides in one, the dragomans are skilled officials who work to enhance our diplomatic and commercial efforts with different communities and countries. Most dragomans are of Greek ancestry, though some hail from Jewish, Armenian, or other multilingual backgrounds." #OLD ENG
 kafes: "Kafes"
 kafes_desc: "Tenendo i nostri principi indisciplinati confinati in una parte speciale dell'harem, il sito $kafes$, possiamo prevenire le ribellioni selvagge e la rivalità tra fratelli che in passato affliggevano il nostro regime."
 timariots: "Timarioti"
 timariots_desc: "Offrendo sovvenzioni di terre Timar ai cavalieri Sipâhi, questi possono utilizzare questa nuova ricchezza sponsorizzata dallo Stato per rifornire se stessi e il loro seguito. Questo ci permette di schierare forze di cavalleria più formidabili."
 autonomous_pashas: "Pascià Autonomi"
 #autonomous_pashas_desc: "Bilanciare le esigenze locali rispetto agli interessi nazionali è la parte più difficile del governo. Soprattutto con il ritmo delle comunicazioni, può essere necessario molto tempo perché le direttive più basilari raggiungano anche le province relativamente vicine. Dobbiamo incoraggiare i governatori locali verso una maggiore autonomia, per garantire che gli interessi locali siano serviti." #OLD ITA
 autonomous_pashas_desc: "Balancing local needs versus national interests is one of the most difficult aspects of government. Given the slow pace of communications, it can take a long time for the most basic directives to reach even relatively close provinces. We must encourage local governors towards more autonomy to ensure that local interests are served in a timely manner." #NEW
 #autonomous_pashas_desc: "Balancing local needs versus national interests is the hardest part of government. Especially with the pace of communications, it can take a long time for the most basic directives to reach even relatively close provinces. We must encourage the local governors towards more autonomy to ensure that local interests are served." #OLD ENG
 lawcode_of_suleiman: "Il Codice Legale di Solimano"
 #lawcode_of_suleiman_desc: "Solimano è ricordato come uno dei grandi governanti della storia, un soldato, un legislatore e un riformatore. Infatti, mentre l'Occidente lo conosce come Solimano il Magnifico, nella sua patria è chiamato 'Il Legislatore'. Al centro delle sue riforme c'era il riesame della legge dinastica ottomana, il 'Kanun', al fine di allinearla con la legge islamica $sharia$." #OLD ITA
 lawcode_of_suleiman_desc: "Suleiman is remembered as one of the great rulers of history, a soldier, a lawmaker, and a reformer. In fact, while the West knows him as Suleiman the Magnificent, in his homeland, he is called 'The Lawgiver'. Central to his reforms was the re-examination of $TUR_ADJ$ dynastic law, #italic Kanun#!, in order to bring it in line with $sharia$." #NEW
 #lawcode_of_suleiman_desc: "Suleiman is remembered as one of the great rulers of history, a soldier, a lawmaker, and a reformer. In fact, while the West knows him as Suleiman the Magnificent, in his homeland, he is called 'The Lawgiver'. Central to his reforms was the re-examination of Ottoman dynastic law, 'Kanun', in order to bring it in line with the Islamic $sharia$." #OLD ENG
 ottoman_tax_farming: "Muqāta'ah"
 #ottoman_tax_farming_desc: "Un sistema di tassazione in cui i nobili acquistano il diritto di riscuotere le entrate da un appezzamento di terreno di proprietà della corona. $ottoman_tax_farming$ bilancia la distribuzione della ricchezza nell'impero e allontana i nobili dalla corruzione, dando loro un interesse personale a sostenere lo Stato." #OLD ITA
 ottoman_tax_farming_desc: "A system of tax farming where nobles purchase the right to collect revenue from parcels of land owned by the state. $ottoman_tax_farming$ balances the distribution of wealth across the empire, and turns the nobility away from corruption, giving them a vested interest in supporting the state." #NEW
 #ottoman_tax_farming_desc: "A system of tax farming where nobles buy the right to collect revenue from a parcel of land owned by the crown. $ottoman_tax_farming$ balances the distribution of wealth across the empire, and turns the nobles away from corruption, giving them a vested interest in supporting the state." #OLD ENG
 ottoman_waystations: "Menzil"
 #ottoman_waystations_desc: "Un complesso sistema di depositi di rifornimento e di alloggi per i soldati e gli ufficiali, le stazioni di passaggio di Menzil permettono ai nostri eserciti di fare meno affidamento sul saccheggio e di rimanere ben riforniti su ogni frontiera." #OLD ITA
 ottoman_waystations_desc: "A complex system of supply depots and lodgings for use by soldiers and officials, #italic menzil#! waystations allow our armies to rely less on plunder, and remain well-supplied on every frontier." #NEW
 #ottoman_waystations_desc: "A complex system of supply depots and lodgings for use by soldiers and officials, the Menzil waystations allows our armies to rely less on plunder, and remain well-supplied on every frontier." #OLD ENG
 late_ottoman_bureaucracy: "Mālīye"
 late_ottoman_bureaucracy_desc: "Una burocrazia vasta, diversificata e altamente organizzata, con il personale degli scribi più abili, il $late_ottoman_bureaucracy$ aspira ad essere un'istituzione fondamentale e incorruttibile dello Stato."
 tulip_period: "Periodo dei Tulipani"
 #tulip_period_desc: "Riformeremo le vecchie e stagnanti tradizioni, faremo fiorire i tulipani in tutti i giardini e inaugureremo una nuova età dell'oro del commercio e della connessione." #OLD ITA
 tulip_period_desc: "We will reform old and stagnant traditions, plant tulips in all gardens, and usher in a new golden age of commerce and connection." #NEW
 #tulip_period_desc: "We will reform old and stagnant traditions, have tulips bloom in all gardens and usher in a new golden age of commerce and connection." #OLD ENG
 imperial_school_of_naval_engineering: "Scuola Imperiale di Ingegneria Navale"
 #imperial_school_of_naval_engineering_desc: "Questa nuova scuola, #italic Mühendishane-i Bahr-i Hümâyûn#!, ci aiuterà a formare costruttori navali, ufficiali navali e marinai sia per la marina che per la flotta mercantile." #OLD ITA
 imperial_school_of_naval_engineering_desc: "This new school, #italic Mühendishane-i Bahr-i Hümâyûn#!, will help us train shipwrights, naval officers, and sailors for both the navy and the merchant fleet." #NEW
 #imperial_school_of_naval_engineering_desc: "This new school, #italic Mühendishane-i Bahr-i Hümâyûn#!, will help us train shipbuilders, naval officers and sailors for both the navy and the merchant fleet." #OLD ENG
 ayans: "Âyan"
 ayans_desc: "$ayans$ sono magnati provinciali di diversa estrazione che esercitano una significativa autonomia locale, ma forniscono comunque una pronta fonte di reddito agricolo fiscale e forze militari per lo Stato."
 #french_language_in_all_courts: "Lingua Francese in Tutte le Corti" #OLD ITA
 french_language_in_all_courts: "$french_language$ Language in All Courts" #NEW
 #french_language_in_all_courts: "French Language in All Courts" #OLD ENG
 #french_language_in_all_courts_desc: "Per molto tempo il latino è stato la lingua franca dell'Europa, ma ad essere onesti è una lingua morta. Dobbiamo trovare una nuova lingua franca, e niente dice lingua franca come il francese." #OLD ITA
 french_language_in_all_courts_desc: "For a long time, $latin_language$ has been the language of cultural exchange in $europe$... but to be honest, that language is nearly as dead as the ancient Romans who spoke it. We need to find a new #italic lingua franca#!, and nothing says 'lingua franca' like $french_language$." #NEW
 #french_language_in_all_courts_desc: "For a long time Latin has been the lingua franca of Europe, but to be honest it is a dead language. We need to find a new lingua franca, and nothing says lingua franca like French." #OLD ENG
 elan: "Élan!"
 #elan_desc: "Coltivare la dottrina dell'attacco è il fulcro dell'esercito. I nostri uomini devono mostrare tale slancio, in modo da avere un chiaro vantaggio sul campo di battaglia." #OLD ITA
 elan_desc: "Cultivating the doctrine of attack is the hallmark of our army. Our men must fight with #italic élan#! — spirit and vigor — giving us a clear edge on the battlefield." #NEW
 #elan_desc: "Cultivating the doctrine of attack is the centerpiece of the army. Our men must show such élan so that we have a clear edge on the battlefield." #OLD ENG
 #estates_general: "Stati Generali" #OLD ITA
 estates_general: "Estates-General" #NEW
 #estates_general: "Estates General" #OLD ENG
 #estates_general_desc: "Gli stati generali possono affermare di esistere dal 1303, ma gradualmente nel corso del tempo sono passate dall'essere un consiglio convocato dal Re all'essere eletto. Ciò ha conferito una maggiore legittimità alle tenute generali e alle imposte da esse riscosse." #OLD ITA
 estates_general_desc: "According to some, the Estates-General have existed since 1303. Over time, its form has shifted from being a council of royalty appointees to one of elected representatives. This change in structure has given the Estates-General, and the taxes levied by them, greater legitimacy." #NEW
 #estates_general_desc: "The estates general can claim to have existed since 1303, but gradually over time they have switched from being a council summoned by the King to being elected. This has given the estates general, and taxes levied by them, greater legitimacy." #OLD ENG
 fra_gendarmes: "Compagnie di Gendarmi"
 #fra_gendarmes_desc: "L'affidamento al sistema delle tasse ha esposto il nostro governo a grandi rischi, e si è dimostrato fortemente limitante. Dovremmo istituire gruppi di cavalieri pesantemente armati, con uno stipendio fisso, per servire il nostro governante come un esercito permanente." #OLD ITA
 fra_gendarmes_desc: "Reliance on a levy system has exposed our government to great risks, and has proved to be severely limiting. We should recruit heavily armed cavalrymen and pay them a fixed salary in order to create a standing army." #NEW
 #fra_gendarmes_desc: "Reliance on the system of levies has exposed our government to great risks, and it has proved to be severely limiting. We should establish groups of heavily armed cavalrymen with a fixed salary to serve our ruler as a standing army." #OLD ENG
 fra_integration_of_new_territories: "Consolidamento del Paese"
 #fra_integration_of_new_territories_desc: "La nostra influenza sugli altri Paesi è innegabile. Perché non utilizzare questa influenza per incorporarli direttamente nel nostro Paese?" #OLD ITA
 fra_integration_of_new_territories_desc: "Our influence over other states is undeniable. Why not use this persuasive power to incorporate them directly into our country?" #NEW
 #fra_integration_of_new_territories_desc: "Our influence on other countries is undeniable. Why not use this influence to incorporate those directly into our country?" #OLD ENG
 fra_reliance_on_privateers: "Affidamento sui Corsari"
 #fra_reliance_on_privateers_desc: "Una competizione diretta con altre potenze marittime potrebbe essere costosa e mettere le nostre finanze in una posizione svantaggiosa. Dovremmo invece sponsorizzare la nostra flotta mercantile per saccheggiare e sequestrare le navi mercantili dei nostri nemici. Questo non solo garantirà un reddito sano al nostro Stato, ma disturberà anche il commercio marittimo dei nostri rivali." #OLD ITA
 fra_reliance_on_privateers_desc: "Direct competition with other maritime powers could be detrimental to our finances. We should empower our mercantile fleet to plunder and seize the merchant ships of our enemies. This will not only ensure a healthy income for our state, but also disrupt the maritime economies of our rivals." #NEW
 #fra_reliance_on_privateers_desc: "A direct competition with other maritime powers could be costly and put our finances in a disadvantageous position. Instead, we should sponsor our mercantile fleet to plunder and seize the merchant ships of our enemies. This will not only ensure a healthy income for our state, but also disrupt the maritime trade of our rivals." #OLD ENG
 fra_reformation_of_taxation: "Creazione di Recettes Générales"
 #fra_reformation_of_taxation_desc: "Gli intendenti responsabili della riscossione delle tasse del popolo non saranno nominati dalle tenute, ma direttamente dal nostro sovrano. In questo modo, ci assicureremo che gli ufficiali siano fedeli solo al sovrano e raccolgano il giusto tributo dovuto." #OLD ITA
 fra_reformation_of_taxation_desc: "The intendants responsible for collecting the taxes of the people shall not be appointed by the estates, but by our ruler directly. This way, we will ensure these officers will be loyal to the ruler alone, and gather all of the rightful tribute owed." #NEW
 #fra_reformation_of_taxation_desc: "The intendants responsible for collecting the taxes of the people shall not be named by the estates, but by our ruler directly. This way, we will ensure the officers will be loyal to the ruler alone and gather the rightful tribute owed." #OLD ENG
 fra_school_of_fontainebleau: "Manierismo Settentrionale"
 #fra_school_of_fontainebleau_desc: "Come Paese orgoglioso del Rinascimento, dovremmo investire nella creazione di uno stile francese unico. Invitando artisti stranieri e sponsorizzando direttamente una scuola, saremo in grado di marcare il loro lavoro artistico come specificamente francese." #OLD ITA
 fra_school_of_fontainebleau_desc: "As a nation much enriched by the $renaissance$, we should invest in the creation of a unique, distinctively $FRA_ADJ$ aesthetic. By inviting foreign artists to our realm and sponsoring a school for artist training directly, we will be able to brand any artistic works produced as identifiably $FRA_ADJ$." #NEW
 #fra_school_of_fontainebleau_desc: "As a proud country of the Renaissance, we should invest into the creation of a unique French style. By inviting foreign artists and sponsoring a school directly, we will be able to brand their artistic work as specifically French." #OLD ENG
 vauban_fortifications: "Fortificazioni Innovative"
 #vauban_fortifications_desc: "Questo non rappresenta una svolta radicale nel design delle fortificazioni, la genialità sta nel posizionamento delle fortezze. Sfruttando al massimo le caratteristiche locali del terreno, lo stesso forte può essere molto più difficile da conquistare." #OLD ITA
 vauban_fortifications_desc: "Our genius in fortification does not represent a radical departure in their design; rather, the innovation comes from the placement of the fortresses. By taking maximum advantage of local terrain, even the most basic fort requires more effort and supplies to take." #NEW
 #vauban_fortifications_desc: "This does not represent a radical departure in the design of fortification, the genius is in the placement of the fortresses. By taking maximum advantage of local terrain features the same fort can be much harder to take." #OLD ENG
 the_philosophes: "I Filosofi"
 #the_philosophes_desc: "Vantiamo alcuni dei più grandi filosofi di questi tempi illuminati. Questi pensatori producono un flusso costante di nuove idee e pensieri, che stimolano i progressi in tutti i campi, dai più banali ai più importanti." #OLD ITA
 the_philosophes_desc: "We are proud to be the home of so many of the most renowned philosophers of these enlightened times. These thinkers produce a constant stream of groundbreaking ideas, which are stimulating advances in all fields, from the most trifling to the most vital." #NEW
 #the_philosophes_desc: "We boast some of the greatest philosophers of these enlightened times. These thinkers are producing a constant stream of new ideas and thoughts, which are stimulating advances in all fields, from the most mundane to the most important." #OLD ENG
 #fra_expansion_of_france: "Rivendicazioni di un tempo" #OLD ITA
 fra_expansion_of_france: "Historic Claims" #NEW
 #fra_expansion_of_france: "Claims of Old" #OLD ENG
 #fra_expansion_of_france_desc: "Facciamo risalire il nostro Stato all'impero di Carlo Magno e possiamo quindi rivendicare tutte queste terre come nostro territorio legittimo. Con tribunali dedicati per tracciare la storia di qualsiasi territorio con la nostra corona, saremo in grado di reclamare queste terre perdute." #OLD ITA
 fra_expansion_of_france_desc: "We trace our nation's lineage back to the empire of Charlemagne, and can therefore claim all those lands to be part of our rightful territory. With the support of dedicated courts, we will be able to identify and re-claim all of this long territory." #NEW
 #fra_expansion_of_france_desc: "We trace our state back to the empire of Charlemagne and can therefore claim all those lands to be our rightful territory. With dedicated courts to trace any territories' history with our crown, we will be able to re-claim these lost lands." #OLD ENG
 liberty_egalite_fraternity: "Liberté, Egalité, Fraternité"
 #liberty_egalite_fraternity_desc: "Poiché tutti gli uomini sono uguali secondo la legge del nostro nuovo Stato, alle persone di altre convinzioni è consentita la piena partecipazione alla macchina statale, contribuendo così al progresso della nazione." #OLD ITA
 liberty_egalite_fraternity_desc: "With all men declared to be equal under our new laws, adherents of other beliefs are finally allowed full participation in our government, and may thus now contribute to our national progress." #NEW
 #liberty_egalite_fraternity_desc: "With all men being equal under the law of our new state, people of other beliefs are allowed full participation in the state machinery, thus contributing to the progress of the nation." #OLD ENG
 fra_code_civil: "Codice Civile"
 #fra_code_civil_desc: "Dobbiamo eliminare il caotico mosaico di leggi che governano il nostro Stato e stabilire un codice di legge unificato e accessibile per tutta la popolazione. Questo #italic Codice Civile#! servirà come base per il nostro governo e stabilirà un sistema giusto per tutti." #OLD ITA
 fra_code_civil_desc: "We must replace the chaotic patchwork of laws governing our state with a single, unified legal code that applies to our entire population. This #italic Code Civil#! will serve as the foundation of our government and establish a just system for everyone in our realm." #NEW
 #fra_code_civil_desc: "We must undo the chaotic patchwork of laws governing our state and establish one unified, accessible code of law for our entire population. This #italic Code Civil#! will serve as the foundation for our government and establish a just system for all." #OLD ENG
 magna_carta_advance: "$magna_carta_reform$"
 magna_carta_advance_desc: "$magna_carta_reform_desc$"
 royal_navy: "Una Marina Reale"
 #royal_navy_desc: "A partire dal 1495 circa, la monarchia dei Tudor investì molto non solo nelle navi, ma anche nell'infrastruttura per sostenerle. Per molti questa fu la fondazione ufficiale della Royal Navy." #OLD ITA
 royal_navy_desc: "Beginning around 1495, the $tudor_dynasty$ monarchy invested heavily in not just ships, but extensive infrastructure to maintain and otherwise support them. This for many marked the official founding of the Royal Navy." #NEW
 #royal_navy_desc: "Beginning around 1495, the Tudor monarchy invested heavily in not just ships but the infrastructure to support them. This for many was the official founding of the Royal Navy." #OLD ENG
 eltham_ordinance: "L'Ordinanza di Eltham"
 #eltham_ordinance_desc: "Sebbene non siano stati approvati nell'anno 1526, rappresentarono il primo tentativo di snellire la burocrazia reale dell'Inghilterra, per renderla più reattiva ed efficiente dal punto di vista dei costi." #OLD ITA
 eltham_ordinance_desc: "The Eltham Ordinances represented $ENG$'s first attempt to streamline royal bureaucracy and make it more adaptable and cost-effective. The Ordinances attempted reform through reducing royal household expenditures and consolidating certain bureaucratic functions." #NEW
 #eltham_ordinance_desc: "Although not passed in the year 1526 they represented the first attempt to streamline the Royal Bureaucracy of England, to make it more responsive and cost-effective." #OLD ENG
 secretaries_of_state: "Segretari di Stato"
 #secretaries_of_state_desc: "Il Re ha sempre avuto un servitore reale responsabile della corrispondenza del Re. Verso la metà del XVII secolo, il numero iniziò ad aumentare e i servitori divennero parti importanti della macchina governativa, non limitandosi a trasmettere i decreti reali, ma consentendo l'autonomia amministrativa." #OLD ITA
 secretaries_of_state_desc: "The monarch has always had a secretary responsible for their royal correspondence. This position eventually evolved into that of the Secretary of State, a powerful minister who not only transmits royal decrees, but also has a high level of administrative authority." #NEW
 #secretaries_of_state_desc: "The King had always had a royal servant responsible for the King's correspondence. By the mid-17th century, the number started to rise, and they became important parts of the government machine, not just passing on Royal decrees but allowing administrative autonomy." #OLD ENG
 navigation_acts: "Gli Atti di Navigazione"
 #navigation_acts_desc: "Questi atti rappresentavano l'apice del mercantilismo. Il nostro commercio sarà trasportato sulle nostre navi e arriverà prima nei nostri porti, dove potremo tassarlo." #OLD ITA
 navigation_acts_desc: "These acts represent the apex of mercantilism. Trade must be conducted with our ships and pass through our ports first, where we will collect customs duties and any other applicable taxes." #NEW
 #navigation_acts_desc: "These acts represented the high watermark of mercantilism. Our trade will be carried on our ships and will come to our ports first where we will get to tax it." #OLD ENG
 eng_red_coats: "Giubbe Rosse"
 #eng_red_coats_desc: "La vita nell'esercito inglese è estenuante e strettamente regimentata, ma infonde in un uomo un certo carattere. La loro rigidità e l'esperienza con le armi da fuoco incutono timore nei cuori dei nostri nemici." #OLD ITA
 eng_red_coats_desc: "Life in the $ENG_ADJ$ army is grueling and strictly regimented, but it instills in one a certain character. The unflappable nature of our troops, as well as their expertise with firearms, strikes fear into the hearts of our enemies." #NEW
 #eng_red_coats_desc: "Life in the English army is grueling and strictly regimented, but it instills in a man a certain character. Their stiff upper lip, and expertise with firearms, put fear into the hearts of our enemies." #OLD ENG
 eng_experimental_riflemen: "$a_experimental_riflemen$"
 eng_experimental_riflemen_desc: "$a_experimental_riflemen_desc$"
 sick_and_hurt_board: "La Tavola dei Malati e dei Feriti"
 #sick_and_hurt_board_desc: "Fondata nel 1707, il suo ruolo era quello di garantire il benessere dei marinai ordinari arruolati nella Marina. Portò una serie di riforme che migliorarono la salute dei marinai in servizio." #OLD ITA
 sick_and_hurt_board_desc: "This institution looked after the welfare of ordinary enlisted seamen in the Navy. It brought about a series of reforms that greatly improved the health of sailors on duty." #NEW
 #sick_and_hurt_board_desc: "Founded in 1707, its role was to ensure the welfare of ordinary enlisted seamen in the Navy. It brought a series of reforms that improved the health of sailors on duty." #OLD ENG
 #british_bill_of_rights: "Carta dei Diritti Inglese" #OLD ITA
 british_bill_of_rights: "$ENG_ADJ$ Bill of Rights" #NEW
 #british_bill_of_rights: "English Bill of Rights" #OLD ENG
 #british_bill_of_rights_desc: "Una vasta serie di riforme si è concentrata sui limiti del potere reale, in particolare sul sistema giudiziario. Il monarca non può sollevare unilateralmente eserciti, prescrivere punizioni crudeli e inusuali o interferire con la libera elezione dei membri del Parlamento." #OLD ITA
 british_bill_of_rights_desc: "A sweeping series of reforms limiting royal power, particularly in judicial matters. Among other stipulations, they state that the monarch may not unilaterally raise armies, prescribe cruel and unusual punishment, or interfere with the free election of members of Parliament." #NEW
 #british_bill_of_rights_desc: "A sweeping series of reforms focused on the limits of royal power, in particular focused on the judiciary. The monarch may not unilaterally raise armies, prescribe cruel and unusual punishment, or interfere with the free election of members of Parliament." #OLD ENG
 defense_of_the_faith: "Difesa della Fede"
 #defense_of_the_faith_desc: "Siamo stati cacciati da San Giovanni d'Acri e da Cipro, ma l'Ordine dell'Ospedale di San Giovanni non si ritirerà oltre. In epoca pagana, un Colosso era di guardia al porto di Rodi, ma oggi le più grandi fortificazioni che il mondo abbia mai conosciuto hanno assunto la guardia." #OLD ITA
 defense_of_the_faith_desc: "We have been driven from $acre$ and $CYP$, but the Order of the Hospital of St. John will retreat no further. In pagan times, a Colossus stood sentinel over the harbor of Rhodes, but today, the greatest fortifications the world has ever known have taken up the guard!" #NEW
 #defense_of_the_faith_desc: "We have been driven from Acre and Cyprus, but the Order of the Hospital of St. John will retreat no further. In pagan times a Colossus stood sentinel over Rhodes' harbor, but today the greatest fortifications the world has ever known have taken up the guard." #OLD ENG
 assistance_to_the_suffering: "Assistenza ai Sofferenti"
 #assistance_to_the_suffering_desc: "L'Ordine si chiama Cavalieri Ospitalieri per un motivo: in origine eravamo la forza protettiva di un ospedale per pellegrini a Gerusalemme. Sebbene Gerusalemme sia stata persa dai Saraceni, continuiamo a fornire assistenza medica a coloro che ne hanno bisogno, compresi i nostri coraggiosi cavalieri, che tornano di cuore sul campo di battaglia molto più velocemente della maggior parte degli eserciti." #OLD ITA
 assistance_to_the_suffering_desc: "Our Order is named the Knights Hospitaller for a reason: we were originally the protective force of a pilgrims' hospital in $jerusalem$. Though $jerusalem$ is lost to the Saracens, we still provide medical aid to those in need, including our brave knights, who heartily return to the battlefield much faster than most armies." #NEW
 #assistance_to_the_suffering_desc: "The Order is named the Knights Hospitaller for a reason: we were originally the protective force of a pilgrims' hospital in Jerusalem. Though Jerusalem is lost to the Saracens, we still provide medical aid to those in need, including our brave knights, who heartily return to the battlefield much faster than most armies." #OLD ENG
 reconquista_of_the_sea: "Reconquista del Mare"
 #reconquista_of_the_sea_desc: "Nei nostri frequenti scontri con i temuti corsari delle minacce turche e barbaresche, ci è venuto in mente che i corsari potrebbero avere l'idea giusta riguardo ai saccheggi marittimi e alle razzie della costa, ma che stanno dirigendo le loro predazioni verso gli obiettivi sbagliati. La pirateria può essere un peccato ignobile in tempo di pace, ma in tempo di guerra è conosciuta come 'privateering' e questa è sicuramente un'altra cosa, giusto?" #OLD ITA
 reconquista_of_the_sea_desc: "In our frequent clashes with fierce foreign corsairs, the thought has occurred to us that these scurvy dogs might have the right idea about looting and pillaging the coast, but they are preying on the wrong targets. Piracy may be a vile sin in peacetime, but in times of war, it is known as 'privateering,' and that is another thing altogether." #NEW
 #reconquista_of_the_sea_desc: "In our frequent clashes with the dreaded corsairs of the Turkish and Barbary menaces, the thought has occurred to us that the corsairs might have the right idea about seagoing looting and pillaging of the coast, but that they are directing their predations to the wrong targets. Piracy may be a vile sin in peacetime, but in times of war it is known as 'privateering' and that's surely another thing altogether, right?" #OLD ENG
 friends_in_need: "Amici in Difficoltà"
 #friends_in_need_desc: "Il nostro Ordine è formato da persone provenienti da ogni parte della cristianità. Questo fatto e la nostra necessità di un sostegno esterno per adempiere alla nostra missione ci hanno reso molto abili nel trovare mani d'aiuto per la nostra causa. Sfrutteremo la nostra presenza ovunque in Europa per raggiungere i potenti governanti cattolici e portarli dalla nostra parte." #OLD ITA
 friends_in_need_desc: "Our Order was formed by faithful souls from every nation in Christendom. This fact, combined with our need for external support to fulfill our missions, have made us adept at recruiting helping hands for our cause. We will take advantage of our omnipresence in $europe$ to reach the ears of powerful $catholic_adj$ rulers, and sway them to our side." #NEW
 #friends_in_need_desc: "Our Order is formed by peoples that came from everywhere across Christendom. This fact and our need for external support to fulfill our mission have made us very apt at finding helping hands for our cause. We will take advantage of our presence everywhere in Europe to reach powerful Catholic rulers and bring them to our side." #OLD ENG
 scourge_of_the_corsairs: "Il Flagello dei Corsari"
 #scourge_of_the_corsairs_desc: "Il famoso corsaro turco Hayreddin Barbarossa combatté molti incontri leggendari contro i Cavalieri, ma Barbarossa non fu l'unico corsaro che abbiamo incontrato. Le razzie e i saccheggi turchi in tutta l'Europa meridionale, tollerati dagli Stati barbareschi e finanziati dai turchi, devono finire. I Cavalieri faranno il loro lavoro proteggendo i marinai innocenti ad ogni costo." #OLD ITA
 scourge_of_the_corsairs_desc: "The famed $turkish_culture$ privateer Hayreddin Barbarossa fought many legendary encounters against the Knights, but he was hardly the only corsair we have encountered. $turkish_culture$ raiding and looting of all of Southern $europe$, tolerated by the Barbary states and funded by the Turks, must end. The Knights will do their job protecting innocent sailors at any cost." #NEW
 #scourge_of_the_corsairs_desc: "The famed Turkish privateer Hayreddin Barbarossa fought many legendary encounters against the Knights, but Barbarossa was hardly the only corsair we've encountered. Turkish raiding and looting of all of Southern Europe, tolerated by the Barbary states and funded by the Turks, must end. The Knights will do their job protecting innocent sailors at any cost." #OLD ENG
 crusader_tradition: "Tradizione Crociata"
 #crusader_tradition_desc: "I Cavalieri del nostro Ordine erano presenti nelle guerre contro il Saladino e hanno combattuto in difesa dell'ultimo avamposto crociato di Outremer, San Giovanni d'Acri. Se qualcuno di noi ha bisogno di ispirazione per compiere azioni eroiche, deve guardare solo alle gesta che i Cavalieri dell'Ordine dell'Ospedale di San Giovanni hanno compiuto in passato. Il nome dei Cavalieri Ospitalieri è davvero eterno, così come il nostro famoso coraggio in battaglia." #OLD ITA
 crusader_tradition_desc: "Knights of our Order were present in the wars against Saladin and defended the last Outremer Crusader outpost, $acre$. If any among us needs inspiration to do heroic deeds, they need to look only at what the Knights of the Order of the Hospital of St. John have accomplished in the past. The name Knights Hospitaller is truly eternal, as is our famed courage in battle." #NEW
 #crusader_tradition_desc: "Knights of our Order were present in the wars against Saladin and fought in defense of the last Outremer Crusader outpost, Acre. If any among us needs inspiration to do heroic deeds, they need to look only at the deeds the Knights of the Order of the Hospital of St. John have accomplished in the past. The name Knights Hospitaller is truly eternal, as is our famed courage in battle." #OLD ENG
 ecumenical_defenders_of_christendom: "Difensori ecumenici della cristianità"
 #ecumenical_defenders_of_christendom_desc: "La Riforma ha danneggiato la nostra causa, in quanto i cavalieri tedeschi e scandinavi hanno iniziato a mormorare domande sulla natura dell'Ostia della Comunione, ma la minaccia sempre presente del Turco è in grado di far sembrare queste dispute minori. Forse dovremmo concentrarci sulla difesa del regno e discutere di teologia una volta che la minaccia saracena sarà al sicuro?" #OLD ITA
 ecumenical_defenders_of_christendom_desc: "The Reformation has harmed our cause as knights from $GER$ and $scandinavian_region$ have started murmuring questions about the nature of the Communion Host, but the always-present $turkic_group$ threat has a way of making such disputes seem minor. Perhaps we should focus on defending the realm, and debate theology once the Saracen threat is safely at bay?" #NEW
 #ecumenical_defenders_of_christendom_desc: "The Reformation has harmed our cause as German and Scandinavian knights have started murmuring questions about the nature of the Communion Host, but the always-present threat of the Turk has a way of making such disputes seem minor. Perhaps we should focus on defending the realm and debate theology once the Saracen threat is safely at bay?" #OLD ENG
 #a_neverending_crusade: "Una Crociata senza Fine" #OLD ITA
 a_neverending_crusade: "A Never-Ending Crusade" #NEW
 #a_neverending_crusade: "A Never-ending Crusade" #OLD ENG
 #a_neverending_crusade_desc: "La nostra missione non finirà mai finché un cattolico potrà essere in pericolo per motivi religiosi. Che si tratti di andare in pellegrinaggio alla Tomba del nostro Signore e Salvatore, o semplicemente di attraversare i mari senza temere i corsari, non smetteremo mai di addestrarci per essere pronti a entrare in combattimento immediatamente." #OLD ITA
 a_neverending_crusade_desc: "As long as any faithful $catholic_ADJ$ is in danger of religious persecution, our mission is not over! Be it during a pilgrimage to the Tomb of our Lord and Savior, or while crossing the seas and fending off corsair, we will never stop training and never rest, ready to leap into combat at a moment's notice." #NEW
 #a_neverending_crusade_desc: "Our mission will never finish as long as any Catholic can be in danger for religious reasons. Be it to pilgrimage to the Tomb of our Lord and Savior, or simply cross the seas without fear of the corsairs, we will never stop training to be prepared to enter combat immediately." #OLD ENG
 inspired_builders: "Costruttori Ispirati"
 #inspired_builders_desc: "Il dovere principale del nostro Ordine è quello di combattere, ma grazie al Signore, le nostre lotte non sono solo marziali. Il nostro popolo ha bisogno di comodità, ma anche di protezione per eventuali attacchi futuri, quindi da secoli abbiamo sviluppato un'ammirevole capacità di erigere edifici e roccaforti con rapidità. Utilizzeremo questa capacità non solo per rendere la nostra capitale una fortezza più impenetrabile, ma anche un centro di cultura." #OLD ITA
 inspired_builders_desc: "While our Order's principal duty is to fight, we serve our people in other ways as well. Over the centuries, we have developed the art of rapid construction, erecting buildings and fortifications with remarkable speed. We will use this expertise to make our capital into both an impregnable fortress, and a dynamic center of culture." #NEW
 #inspired_builders_desc: "The principal duty of our Order is to fight, but thanks to the Lord, our struggles are not only martial. Our people need amenities but also protection for possible future attacks, so for centuries we have developed an admirable ability to erect buildings and strongholds with swiftness. We will use this ability not only to make our capital a more impenetrable fortress but also a center of culture." #OLD ENG
 the_right_hand_pope: "La Mano Destra del Papa"
 #the_right_hand_pope_desc: "Mentre il mondo si modernizza e l'epoca dei crociati viene sempre più dimenticata dalla gente comune, la necessità di influenzare il Santo Padre per garantire il futuro del nostro popolo diventa ovvia per qualsiasi leader che possa diventare il nostro Gran Maestro. Diventeremo i migliori consiglieri e amici del Sommo Pontefice. Naturalmente, nel nostro tentativo di servirlo, possiamo ottenere qualche vantaggio per noi, giusto?" #OLD ITA
 the_right_hand_pope_desc: "As time goes on, and the Crusades start to fade from the memory of our people, the importance of having the Pope's ear increases. We ingratiate ourselves until we are the closest confidantes to the Supreme Pontiff. Naturally, our devotion to his service will benefit us enormously — and why not enjoy our hard-won privileges?" #NEW
 #the_right_hand_pope_desc: "As the world modernizes and the age of crusaders is more and more forgotten among the common folks, the need to influence the Holy Father to ensure the future of our people becomes obvious to any leader that can become our Grandmaster. We will become the best advisors and friends of the Supreme Pontiff. Of course, in our pursuit to serve him, we can still get some advantage for us, right?" #OLD ENG
 a_brand_new_world: "Un Mondo Nuovo di Zecca"
 #a_brand_new_world_desc: "Il mondo si evolve e ciò che una volta era in un modo ora è nell'altro, costringendo tutti a diventare qualcos'altro o ad essere dimenticati dalla Storia. Il nostro Ordine è vivo da più di mezzo millennio e non siamo ancora pronti a scomparire. I nostri corpi mortali alla fine si uniranno al Creatore, ma il nostro Ordine deve diventare immortale. Saremo i più moderni tra le nazioni moderne, diventando più forti dal nucleo stesso della nostra nazione." #OLD ITA
 a_brand_new_world_desc: "The world evolves, and those who fail to adapt are forgotten by history. Our Order has endured for over half a millennium, and we will not fade away now! Our mortal bodies will eventually join the Creator, but our Order must first become immortal. We will transform ourselves into the most modern nation of our age, strengthening ourselves from the very core." #NEW
 #a_brand_new_world_desc: "The World evolves and what once was one way now is the other, forcing everyone to become something else or be forgotten by History. Our Order has been alive for more than half a millennium, and we are not yet ready to just fade away. Our mortal bodies will eventually join the Creator, but our Order must become immortal. We will be the most modern among the modern nations, becoming stronger from the very core of our nation." #OLD ENG
 an_order_with_state: "Un Ordine con uno Stato"
 #an_order_with_state_desc: "Mentre alcune nazioni sono spesso descritte come un #italic Esercito con uno Stato#!, noi, invece, siamo sempre stati un Ordine con una nazione, a partire dalla nostra acquisizione di Rodi dai Greci. Tuttavia, non possiamo fare a meno di ammirare l'efficienza con cui hanno sfruttato le loro risorse per diventare una nazione formidabile. Ispirati dal loro successo, attueremo delle riforme per garantire che le nostre forze armate possano affrontare qualsiasi avversario con fiducia." #OLD ITA
 an_order_with_state_desc: "While some nations are often described as an #italic Army with a State#!, we, on the other hand, have always been an Order with a nation, ever since our acquisition of Rhodes from the Greeks. Nevertheless, we cannot help but admire how efficiently they have harnessed their resources to become a formidable nation. Inspired by their success, we will implement reforms to ensure our military can confront any adversary with confidence." #NEW
 #an_order_with_state_desc: "While some nations are often described as an #italic Army with a State#!, we, on the other hand, have always been an Order with a nation, dating back to our acquisition of Rhodes from the Greeks. Nevertheless, we cannot help but admire how efficiently they have harnessed their resources to become a formidable nation. Inspired by their success, we will implement reforms to ensure our military can confront any adversary with confidence." #OLD ENG

 local_merchant_preference: "Preferenza del Commerciante Locale"
 local_merchant_preference_desc: "In teoria, un mercante può essere cittadino del mondo e navigare da e verso qualsiasi porto desideri. Daremo dei vantaggi ai mercanti di casa, ad esempio la priorità per il carico e lo scarico del carico, per garantire che i nostri mercanti abbiano tutti gli incentivi per portare i loro prodotti a casa."
 association_with_unbelievers: "Associazione Con i non Credenti"
 #association_with_unbelievers_desc: "Ci sono persone che ritengono che non dovremmo affatto associarci con i miscredenti. Abbiamo fatto molto per reprimere questo atteggiamento, poiché solo attraverso l'associazione con i miscredenti saremo in grado di commerciare con loro." #OLD ITA
 association_with_unbelievers_desc: "There are those who feel that we should not associate with unbelievers at all. We have done much to quash this, as only through association with heathen nations will we be able to trade with them." #NEW
 #association_with_unbelievers_desc: "There are those who feel that we should not associate with the unbelievers at all. We have done much to quash this, as only through association with unbelievers will be able to trade with them." #OLD ENG
 port_security_improvement: "Miglioramenti alla Sicurezza del Porto"
 #port_security_improvement_desc: "Per guadagnare dal commercio, abbiamo bisogno che i carichi siano attraccati in modo sicuro nei nostri porti. Dobbiamo assicurarci che le aree in cui i mercanti si riuniscono siano libere dalla microcriminalità." #OLD ITA
 port_security_improvement_desc: "To reap the full financial potential from trade, we need ships and any cargo they carry to be safe when docked in our ports. We must ensure that any areas that merchants consort in are free from petty crime." #NEW
 #port_security_improvement_desc: "In order to make money from trade, we need cargoes to be safely docked in our ports. We need to ensure that the areas that merchants consort in are areas that are free from petty crime." #OLD ENG
 end_of_shipbuilding_guilds: "Fine delle Gilde di Costruttori Navali"
 #end_of_shipbuilding_guilds_desc: "Fin da quando le navi sono state costruite nella Penisola Arabica, ci sono state corporazioni che le hanno controllate. Sebbene possano aver svolto un servizio prezioso nel mantenere vive le tradizioni della costruzione navale, ora sono un ostacolo al progresso. Dobbiamo aprire la cantieristica a tutti coloro che hanno talento." #OLD ITA
 end_of_shipbuilding_guilds_desc: "As long as ships have been built in $arabia$, there have been guilds who control the production. Although they may have performed a valuable service in keeping shipbuilding traditions alive, they now stand in the way of progress. We must open up the shipbuilding industry to all with talent." #NEW
 #end_of_shipbuilding_guilds_desc: "As long as ships have been built in the Arabian Peninsula there have been guilds who control it. Although they may have performed a valuable service in keeping the ship-building traditions alive, they are now an obstacle to progress. We must open up shipbuilding to all with talent." #OLD ENG
 skilled_captains: "Capitani Esperti"
 #skilled_captains_desc: "Dobbiamo assicurarci che i nostri capitani abbiano i più alti standard di marineria e di conoscenza nautica. Assicurandoci che siano in grado di utilizzare ogni vantaggio di manovrabilità in tutte le situazioni." #OLD ITA
 skilled_captains_desc: "We must ensure that our captains meet the highest standards of seamanship and nautical knowledge, ensuring that they will be able to use every advantage in all situations." #NEW
 #skilled_captains_desc: "We must ensure that our captains have the highest standards of seamanship and nautical knowledge. Ensuring that they will be able to use every advantage in maneuverability in all situations." #OLD ENG
 expansion_of_trade_contacts: "Espansione dei Contatti Commerciali"
 #expansion_of_trade_contacts_desc: "Dobbiamo assicurarci che i nostri mercanti siano sempre i benvenuti, ovunque vadano. Pertanto, utilizzeremo tutti i mezzi possibili per assicurarci che tutti i governanti di cui abbiamo sentito parlare accolgano i nostri mercanti." #OLD ITA
 expansion_of_trade_contacts_desc: "We must ensure that our merchants are always welcome wherever they go. Thus, we will use any means possible to make sure that all rulers we know about welcome our merchants." #NEW
 #expansion_of_trade_contacts_desc: "We must ensure that our merchants are always welcome wherever they go. Thus, we will use any means possible to make sure that all rulers we have heard about welcome our merchants." #OLD ENG
 #Scottish Advances
 unlock_gallowglass_advance: "$a_gallowglass$"
 unlock_gallowglass_advance_desc: "$a_gallowglass_desc$"
 unlock_reformed_gallowglass_advance: "$a_reformed_gallowglass$"
 unlock_reformed_gallowglass_advance_desc: "$a_reformed_gallowglass_desc$"
 unlock_late_gallowglass_advance: "$a_late_gallowglass$"
 unlock_late_gallowglass_advance_desc: "$a_late_gallowglass_desc$"
 #scottish_salmon: "Conservazione del Salmone Scozzese" #OLD ITA
 scottish_salmon: "$SCO_ADJ$ Salmon Conservation" #NEW
 #scottish_salmon: "Conservation of Scottish Salmon" #OLD ENG
 #scottish_salmon_desc: "I nostri fiumi e le nostre coste sono ricchi di salmone. Solo con un'attenta cura e una legislazione rigorosa, saremo in grado di sfruttare questa risorsa e di orientare la nostra economia locale verso l'esportazione di questo pesce molto ricercato." #OLD ITA
 scottish_salmon_desc: "Our rivers and coastlines are rich in salmon. With careful attention and strict legislation, we will be able to harness this resource and shape our local economy towards export of this highly sought-after fish." #NEW
 #scottish_salmon_desc: "Our rivers and coastlines are rich in salmon. Only with careful attention and strict legislation, we will be able to harness this resource and shape our local economy towards export of this highly sought-after fish." #OLD ENG
 #scottish_morale: "Coraggio Scozzese" #OLD ITA
 scottish_morale: "$SCO_ADJ$ Courage" #NEW
 #scottish_morale: "Scottish Courage" #OLD ENG
 #scottish_morale_desc: "Dall'inizio della nostra guerra contro la tirannia inglese, abbiamo preservato la nostra indipendenza grazie all'impegno del coraggioso popolo scozzese. Il ricordo di uomini come William Wallace spingerà i nostri eserciti a difendere e proteggere l'indipendenza scozzese." #OLD ITA
 scottish_morale_desc: "Since the start of our war against $ENG_ADJ$ tyranny, we have preserved our independence through the valiant efforts of the courageous $SCO_ADJ$ people. The memory of brave men like William Wallace will motivate our armies to defend and protect $SCO_ADJ$ independence for all time!" #NEW
 #scottish_morale_desc: "Since the start of our war against the English tyranny, we have preserved our independence with the effort of the courageous Scottish people. The remembrance of men like William Wallace will drive our armies to defend and protect Scottish independence." #OLD ENG
 #scottish_longbowmen: "Arcieri lunghi Inglesi-Scozzesi" #OLD ITA
 scottish_longbowmen: "$ENG_ADJ$-$SCO_ADJ$ Longbowmen" #NEW
 #scottish_longbowmen: "English-Scottish Longbowmen" #OLD ENG
 #scottish_longbowmen_desc: "Con il rafforzamento dei nostri legami con l'Inghilterra, incorporeremo parte delle loro tattiche militari nel nostro esercito e perfezioneremo queste unità in una forza che incute paura." #OLD ITA
 scottish_longbowmen_desc: "Now that our ties to $ENG$ have been strengthened, we shall incorporate some of their military tactics, refining our units into fearsome forces." #NEW
 #scottish_longbowmen_desc: "With our ties to England strengthened, we shall incorporate part of their military tactics into our army and refine these units into a fear-instilling force." #OLD ENG
 peel_towers_advance: "Torri di Peel"
 #peel_towers_advance_desc: "Le Torri di Peel si sono sviluppate come risposta alla vita dura nelle terre di confine del nostro Paese. Servono come protezione contro le incursioni di gruppi di razziatori ostili, proteggendo sia la vita umana che il bestiame, e come modo rapido per avvisare le città vicine dell'avvicinarsi di eserciti ostili con i loro fuochi di segnalazione." #OLD ITA
 peel_towers_advance_desc: "Peel Towers were developed to mitigate the dangers of life in our borderlands. They serve as protection against incursions of hostile raiding parties, sheltering both people and valuable livestock, and are a fast way to alert neighboring towns of approaching hostile armies by being a high place to light signal fires." #NEW
 #peel_towers_advance_desc: "The Peel Towers developed as an answer to the rough life in the borderlands of our country. They serve as a protection against incursions of hostile raiding parties, protecting both human life and livestock, and as a fast way to alert neighboring towns of hostile armies approaching with their signal fires." #OLD ENG
 scottish_tenacity: "Terra Tenace"
 #scottish_tenacity_desc: "Le guerre possono essere lunghe e faticose. Se vogliamo mantenere la nostra indipendenza, dobbiamo essere pronti a sopportare tempi duri. Fortunatamente, il nostro popolo è tenace come la terra che chiama casa, e resiste agli invasori stranieri fino all'ultimo." #OLD ITA
 scottish_tenacity_desc: "War can be a long and tiring affair. If we are to defend our independence, we need to be prepared to endure hard times. Luckily, our people are as tenacious as the land they call their home, and resist foreign invaders to their last breaths." #NEW
 #scottish_tenacity_desc: "Wars can be a long and tiring affair. If we are to keep our independence, we need to be prepared to endure hard times. Luckily, our people are as tenacious as the land they call their home, and resist foreign invaders to the last." #OLD ENG
 #influx_of_english_nobles: "Amministratori Inglesi" #OLD ITA
 influx_of_english_nobles: "$ENG_ADJ$ Administrators" #NEW
 #influx_of_english_nobles: "English Administrators" #OLD ENG
 #influx_of_english_nobles_desc: "Abbiamo assicurato la pace con il nostro vicino meridionale e questo ha portato a un afflusso costante di nobili inglesi nella nostra amministrazione. Grazie a ciò, possiamo esercitare il nostro controllo sul Paese in modo più efficace." #OLD ITA
 influx_of_english_nobles_desc: "Securing peace with our southern neighbor has led to a steady influx of $ENG_ADJ$ aristocrats entering our administration. This makes it possible to exert our control over our country more effectively." #NEW
 #influx_of_english_nobles_desc: "We secured peace with our southern neighbor and this led to a steady influx of English noblemen into our administration. Due to this, we can exert our control over our country more effectively." #OLD ENG
 #scottish_trade_connections: "Collegamenti Commerciali nel Mare del Nord" #OLD ITA
 scottish_trade_connections: "$north_sea$ Trade Connections" #NEW
 #scottish_trade_connections: "North Sea Trade Connections" #OLD ENG
 #scottish_trade_connections_desc: "Il nostro Paese si trova all'estremità dell'Europa occidentale ed è povero di risorse. Se vogliamo prosperare economicamente, dobbiamo investire ed espandere i nostri collegamenti commerciali con altre regioni. Il Mare del Nord è collegato a ricchi mercati e opportunità per gli affari, se solo lo utilizzassimo." #OLD ITA
 scottish_trade_connections_desc: "Our country is situated at the far edge of $western_europe$ and is sparse in resources. If we are to thrive economically, we need to invest and expand our trade connections to further regions. The $north_sea_area$ can connect us to rich markets and business opportunities, provided we learn to harness its potential." #NEW
 #scottish_trade_connections_desc: "Our country is situated at the far edge of Western Europe and is sparse in resources. If we are to thrive economically, we should invest and expand our trade connections to further regions. The North Sea connects to rich markets and opportunities for business, if only we utilize it." #OLD ENG
 comets: "Comete?"
 #comets_desc: "Abbiamo ricevuto di recente un nuovo tomo che è una lettura molto interessante, intitolato #italic Sul vero significato delle comete contro la vanità degli astrologi#!. Abbiamo decretato che tutti i membri del Regno debbano conoscerne il contenuto." #OLD ITA
 comets_desc: "We have recently received a rather curious new tome. It is called #italic On the True Significance of Comets against the Vanity of Astrologers#!, and it is positively filled with vital information on these highly suspicious entities. We have decreed that all in the realm should be aware of its contents." #NEW
 #comets_desc: "We have received recently a new tome that is a most interesting read, it is called #italic On the True Significance of Comets against the Vanity of Astrologers#!. We have decreed that all in the realm should be aware of its contents." #OLD ENG
 modernized_royal_scots_navy: "Marina Reale Scozzese"
 #modernized_royal_scots_navy_desc: "Dopo le Guerre d'Indipendenza, stiamo cercando di costruire la nostra marina. In precedenza, abbiamo utilizzato gli obblighi feudali per rifornire le flotte, ora creeremo una flotta moderna di proprietà del Re con sede nel nostro nuovo porto di Newhaven." #OLD ITA
 modernized_royal_scots_navy_desc: "Since the Wars of Independence, we have been looking at reinforcing and updating our navy. Previously, we had used feudal obligations to bulk out our fleets with crew and ships, but we will now create a modern fleet, owned by the King and based in our port of Newhaven." #NEW
 #modernized_royal_scots_navy_desc: "Since the Wars of Independence, we have been looking at building up our navy. Previously, we have been using feudal obligations to supply fleets, we will now create a modern fleet owned by the King based at our new port of Newhaven." #OLD ENG
 #royal_revenue: "Stringere le Entrate Reali" #OLD ITA
 royal_revenue: "Assert the Royal Revenue" #NEW
 #royal_revenue: "Tighten up Royal Revenue" #OLD ENG
 #royal_revenue_desc: "Se vogliamo continuare a mantenere la Scozia libera dalla schiavitù, dobbiamo assicurarci fonti di reddito stabili. Rafforzando il nostro controllo sulle tenute reali e sui diritti feudali, possiamo aumentare le tasse che ci spettano. Grazie a questi metodi, possiamo garantire che la Corona disponga di fondi in grado di agire a suo piacimento, senza dipendere da altre fonti di denaro." #OLD ITA
 royal_revenue_desc: "If $SCO$ is to continue its independent existence, we must secure stable sources of income. By tightening our control over the obligations owed to us by royal estates and feudal properties, we can increase our rightfully received taxes. Through these methods, we can ensure the Crown has sufficient funds to enact their will without relying on other sources of money." #NEW
 #royal_revenue_desc: "If we are to continue to hold Scotland free of bondage, we must secure stable sources of income. By tightening our control over the royal estates and feudal rights we can increase our rightful received taxes. Through these methods, we can ensure the crown has able funds to act at their will without relying on other sources of money." #OLD ENG
 #scottish_education: "Università della Scozia" #OLD ITA
 scottish_education: "$SCO_ADJ$ Universities" #NEW
 #scottish_education: "Universities of Scotland" #OLD ENG
 #scottish_education_desc: "Avendo sperimentato le università e l'istruzione europee straniere, è giunto il momento di migliorare il sistema educativo in patria e di dare un posto di studio ai migliori del nostro popolo. Il nostro popolo dovrebbe essere in grado di impegnarsi per acquisire conoscenze e competenze nel proprio Paese, senza dover affrontare viaggi costosi e affidarsi a istituzioni straniere." #OLD ITA
 scottish_education_desc: "Having sent our brightest scholars to be educated in foreign universities for many years, it is time to improve our domestic education, and provide a place here in $SCO$ where the greatest minds of our nation can learn and grow. Our people should strive to acquire valuable knowledge and skills in their home country rather than wasting their money on expensive travel and their time on foreign institutions." #NEW
 #scottish_education_desc: "Having experienced foreign European universities and education, it is time to improve the education system at home and give a place for the best of our people to study. Our people should be able to strive towards acquiring knowledge and skills in their home country without the expensive travel and reliance on foreign institutions." #OLD ENG
 act_of_revocation: "Atto di Revoca"
 #act_of_revocation_desc: "Per molto tempo, è stata abitudine regalare parti del Dominio Reale alla nostra nobiltà per i loro servizi. Questo sistema non può più essere mantenuto se vogliamo garantire l'integrità del nostro dominio. D'ora in poi, insisteremo invece sull'affitto di queste terre." #OLD ITA
 act_of_revocation_desc: "It has long been the custom to gift parts of the Royal Domain to our nobility as a reward for their services, but this system cannot be sustained if we want to ensure the integrity of our domain. From now on, we will insist on renting these lands instead of outright giving them away." #NEW
 #act_of_revocation_desc: "For the longest time, it has been the custom to gift parts of the Royal Domain to our nobility for their services. This system can no longer be maintained if we want to ensure the integrity of our domain. From now on, we will insist on renting these lands instead." #OLD ENG
 #scottish_diplomacy: "Affidarsi alle Alleanze" #OLD ITA
 scottish_diplomacy: "Reliable Alliance" #NEW
 #scottish_diplomacy: "Reliance on Alliances" #OLD ENG
 #scottish_diplomacy_desc: "Per secoli, ci siamo affidati alla diplomazia e ai contatti con le potenze straniere del continente per garantire la nostra indipendenza. È giunto il momento di formalizzare questa pratica e garantire che i nostri legami durino per altri secoli." #OLD ITA
 scottish_diplomacy_desc: "For centuries, we relied on diplomacy and contact with foreign powers on the continent to ensure our independence. It is time to formalize this practice, and secure the endurance of our bonds for centuries to come." #NEW
 #scottish_diplomacy_desc: "For centuries, we relied on diplomacy and contacts with foreign powers on the continent to ensure our independence. It is time to formalize this practice and ensure our bonds endure for centuries more." #OLD ENG
 scottish_highlander_advance: "Costituire Reggimenti di Highlander"
 #scottish_highlander_advance_desc: "Reclutare Reggimenti tra le persone che popolano le Highlands scozzesi può essere una risorsa cruciale per i nostri sforzi militari." #OLD ITA
 scottish_highlander_advance_desc: "Recruiting regiments from the people who live in the $SCO_ADJ$ Highlands can be a crucial measure for our military efforts." #NEW
 #scottish_highlander_advance_desc: "Recruiting Regiments out of the people populating the Scottish Highlands can be a crucial asset in our military efforts." #OLD ENG
 scottish_whisky: "Whisky Scozzese"
 #scottish_whisky_desc: "Sebbene le distillerie esistano in Scozia da molto tempo, dovremmo fare in modo che queste industrie siano affidate alle cure dello Stato. In questo modo, potremo affermarci all'avanguardia nella produzione di liquori ed espandere la nostra industria di esportazione." #OLD ITA
 scottish_whisky_desc: "While distilleries have existed in $SCO$ for a long time, we should ensure these industries are finally put under the purview of the state. This supervision will allow us to establish ourselves at the forefront of liquor production, and expand our exports industry." #NEW
 #scottish_whisky_desc: "While distilleries have existed in Scotland for a long time, we should ensure these industries are put under the proper care of the state. With this, we can establish ourselves at the forefront of liquor production and expand our exporting industry." #OLD ENG
 #scottish_enlightenment: "Illuminismo Scozzese" #OLD ITA
 scottish_enlightenment: "$SCO_ADJ$ Enlightenment" #NEW
 #scottish_enlightenment: "Scottish Enlightenment" #OLD ENG
 #scottish_enlightenment_desc: "I rapidi progressi nel campo della filosofia, dell'economia politica e della medicina stanno portando a una pletora di risultati da parte dei nostri connazionali che proietteranno la Scozia all'avanguardia dell'innovazione globale. Questo periodo di Illuminismo scozzese può essere uno strumento molto potente per noi sulla scena mondiale." #OLD ITA
 scottish_enlightenment_desc: "Rapid advancements in philosophy, political economy, and medicine have led to a plethora of accomplishments by our fellow countrymen that will propel $SCO$ to the forefront of global innovation. This period of $SCO_ADJ$ Enlightenment can be a very powerful tool for us on the world stage." #NEW
 #scottish_enlightenment_desc: "Rapid advancements in philosophy, political economy, and medicine are leading to a plethora of accomplishments by our fellow countrymen that will propel Scotland to the forefront of global innovation. This period of Scottish Enlightenment can be a very powerful tool for us on the world stage." #OLD ENG

 #Semi generic Advances for german countries
 swabian_league_of_cities: "Lega delle Città"
 #swabian_league_of_cities_desc: "La Svevia ospita molte città ricche, il che le rende obiettivi desiderati per le ambizioni e le conquiste straniere. Per proteggere meglio le nostre terre, dovremmo unirci in tempo di guerra e combattere contro l'intervento straniero nelle nostre terre." #OLD ITA
 swabian_league_of_cities_desc: "$SWA$ is home to many wealthy cities, which are desirable targets for foreign ambition. To better protect our nation, we should come together in times of war and fight united against foreign incursions." #NEW
 #swabian_league_of_cities_desc: "Swabia is home to many wealthy cities, making them desired targets for foreign ambitions and conquests. To better protect our lands, we should come together in times of war and fight against foreign intervention on our lands." #OLD ENG

 swabian_frugal_people: "Finanze Frugali"
 #swabian_frugal_people_desc: "Molti hanno accusato il nostro popolo di avarizia e hanno deriso il nostro buon senso di attenzione economica. Fortunatamente, le loro beffe sono facili da sopportare con un tesoro solido e ampi ducati da investire nelle nostre ambizioni." #OLD ITA
 swabian_frugal_people_desc: "Many have accused our people of stinginess, and laughed at our good sense of economic caution. Fortunately, we cannot hear their mockery over the sound of all these ducats jingling in our purse." #NEW
 #swabian_frugal_people_desc: "Many have accused our people of stinginess and laughed at our good sense of economic carefulness. Fortunately, their mockery is easy to endure with a sound treasury and ample ducats to invest in our own ambitions." #OLD ENG

 franconian_proud_knights: "Cavalieri dell'Impero"
 #franconian_proud_knights_desc: "Il nostro Popolo ha contribuito a una lunga serie di fieri cavalieri al servizio dell'Impero. Rappresentano e incapsulano molti ideali cavallereschi che da allora sono diventati meno diffusi, ma sono comunque una parte essenziale di ciò che ci sforziamo di essere. Come tali, abbiamo una lunga storia a cui guardare, che ci ha insegnato molte lezioni per quanto riguarda il comportamento cavalleresco e gli aspetti più militaristici della vita. Naturalmente, questo ha anche un effetto sulla disponibilità dei nostri Nobili a contribuire con tributi nella speranza di conquistare la gloria in un combattimento onorevole." #OLD ITA
 franconian_proud_knights_desc: "Our people have committed a long line of proud knights to Imperial service. They embody knightly ideals that have become less common over time, but remain an essential part of our identity. We have a long history to look at for proper education in both chivalric conduct and military matters. This tradition of Imperial knights naturally increases the willingness of our noble class to contribute levies in hopes of winning glory in honorable combat." #NEW
 #franconian_proud_knights_desc: "Our People have contributed to a long line of proud knights in imperial service. They represent and encapsulate many knightly ideals that have since become less prevalent but are nonetheless an essential part of who we strive to be. As such, we have a long history to look back upon teaching us many a lesson when it comes to both knightly behavior and the more militaristic aspects of life. Naturally, this also has an effect on the willingness of our Nobles to contribute levies in hopes of winning glory in honorable combat." #OLD ENG

 franconian_wine_bottles: "Silvaner e Bocksbeutel"
 #franconian_wine_bottles_desc: "La Bocksbeutel è una parte importante della nostra forte e orgogliosa tradizione vinicola. Essendo molto maneggevole e facilmente riconoscibile, la forma di questa bottiglia serve come una sorta di ambasciatore degli splendidi vini prodotti nella nostra regione. Contenendo vini famosi come il Silvaner o il Riesling, sia i nostri vetrai che i viticoltori ci porteranno sicuramente fortuna economica." #OLD ITA
 franconian_wine_bottles_desc: "The #italic bocksbeutel#! is a major part of our winemaking traditions. Being easily recognizable, the shape of this bottle serves as a sort of ambassador for the beautiful wines produced in our region, such as the Silvaner or Riesling. The exemplary talents of our glassmakers and winemakers will surely bring us economic advantages." #NEW
 #franconian_wine_bottles_desc: "The Bocksbeutel is a big part of our strong and proud wine tradition. Being very handy and easily recognizable, the shape of this bottle serves as a sort of ambassador for the beautiful wines produced in our region. Containing such famous wines as the Silvaner or Riesling, both our glassmakers and winemakers will surely bring economic fortune to us." #OLD ENG

 westphalian_monastic_traditions: "La Terra dei Monasteri"
 #westphalian_monastic_traditions_desc: "Le zone settentrionali della Germania ospitano molte roccaforti cattoliche, come i vescovati di Münster e Paderborn. La vita monastica e le tradizioni religiose associate nella regione hanno un effetto generalmente positivo sull'alfabetizzazione e l'istruzione del nostro clero, in quanto vi sono molti luoghi e opportunità per l'ulteriore formazione e l'apprendimento, garantendo numerose opzioni agli ecclesiastici che cercano di unirsi alla Santa Madre Chiesa." #OLD ITA
 westphalian_monastic_traditions_desc: "$north_german_region$ is home to many $catholic_ADJ$ strongholds, such as the Bishoprics in $munster$ and $paderborn$. Monastic life and associated regional religious traditions have a generally positive effect on the literacy and education of our clergy, as there are plenty of opportunities for them to further educate themselves. This access to learning also helps the Holy Mother Church by creating an intellectual flock well-suited to priestly duties." #NEW
 #westphalian_monastic_traditions_desc: "The northern parts of Germany are home to many Catholic strongholds like the Bishoprics in Münster and Paderborn. The monastic life and the associated religious traditions in the region have a generally positive effect on the literacy and education of our Clergy as there are plenty of places and opportunities for them to further educate themselves and learn, granting plentiful options to clergymen seeking to join the Holy Mother Church." #OLD ENG

 north_german_hanseatic_traditions: "Mercanti Anseatici"
 #north_german_hanseatic_traditions_desc: "Gli abitanti delle nostre regioni nella parte settentrionale della Germania hanno raccolto per lungo tempo i benefici dell'accesso al Mar Baltico. Mentre molti dei nostri vicini più meridionali devono arrangiarsi utilizzando i fiumi per trasportare le merci, noi beneficiamo di una tradizione di lunga data di mercanti che navigano sul Baltico per fare fortuna e portare ricchezza e prosperità sulle nostre coste." #OLD ITA
 north_german_hanseatic_traditions_desc: "The people of $north_german_region$ have for a long time reaped the benefits of access to the Baltic Sea. While many of our southern neighbors must make do using rivers to transport goods, our traders have a long tradition of sailing the Baltic to make their fortunes, bringing enviable wealth back to our shores." #NEW
 #north_german_hanseatic_traditions_desc: "The people of our regions in the northern part of Germany have for a long time reaped the benefits of access to the Baltic Sea. While many of our more southern neighbors have to make due using rivers to transport goods, we benefit from a long-standing tradition of traders sailing the Baltic making their fortune and bringing wealth and prosperity to our shores." #OLD ENG

 german_baltic_sailors: "Marinai del Baltico"
 #german_baltic_sailors_desc: "I climi più rigidi rendono le persone resistenti. La vicinanza al freddo Mar Baltico ha certamente lasciato il segno sui nostri marinai, rendendoli molto abili nella loro professione ed estremamente resistenti mentalmente, perché il mare può essere una padrona molto dura." #OLD ITA
 german_baltic_sailors_desc: "Harsh climates breed hardy people. Traversing the cold Baltic Sea has certainly left its mark on our sailors, making them mentally resilient and particularly skilled at their profession. This is for their ultimate benefit, as the sea can be a merciless mistress." #NEW
 #german_baltic_sailors_desc: "Harsher climates make hardy people. Being adjacent to the cold Baltic Sea has certainly left its mark on our sailors, making them very apt at their profession and extremely resilient mentally, for the sea can be a very harsh mistress." #OLD ENG

 german_populating_the_countryside: "Attirare le Persone Giuste"
 #german_populating_the_countryside_desc: "Ripopolare più aree rurali e dare alla gente terra da coltivare sarà un'ottima base per aumentare lentamente ma inesorabilmente la ricchezza e la prosperità delle nostre terre, attualmente solo scarsamente popolate." #OLD ITA
 german_populating_the_countryside_desc: "Encouraging settlement in rural areas and giving the people land to work there will be a great foundation to slowly but surely increase the wealth and productivity of our more sparsely populated territories." #NEW
 #german_populating_the_countryside_desc: "Repopulating more rural areas and giving the people land to till will be a great foundation to slowly but surely increase the wealth and prosperity of our currently only sparsely populated lands." #OLD ENG

 german_fair_towns: "Reichsmessestädte"
 #german_fair_towns_desc: "Un grande privilegio concesso dall'Imperatore stesso solo a poche città selezionate all'interno dell'Impero, che permette a molti mercanti di riunirsi e partecipare ad alcuni dei più grandi mercati di tutta Europa, queste città sono davvero il cuore del commercio all'interno dell'Impero. La natura centralizzata di questi grandi mercati rende anche molto più facile per i mercanti pianificare e negoziare in un ambiente che offre grande libertà e varietà e quindi un maggior grado di accesso a tutti i tipi di merci." #OLD ITA
 german_fair_towns_desc: "I,perial fairs are a rare privilege granted to only a few select cities, creating some of the largest marketplaces in $europe$ and making these cities the commercial heart of the $hre$. The centralized nature of these markets allows merchants to plan and negotiate effectively in a setting where they can benefit from freedom and access to a diverse variety of goods." #NEW
 #german_fair_towns_desc: "A great privilege granted by the Emperor himself only to a select few cities within the Empire, allowing many traders to gather and participate in some of the largest marketplaces in all of Europe, these cities are truly at the heart of commerce within the Empire. The centralized nature of these large markets also makes it a lot easier for merchants to plan and negotiate in a setting that offers great freedom and variety and thus a bigger degree of access to all kinds of wares." #OLD ENG

 german_imperial_roads: "Rete Stradale Imperiale"
 #german_imperial_roads_desc: "Per secoli, le strade sono state costruite, ampliate e migliorate nel cuore dell'Europa. Dai Romani fino ad oggi, i vantaggi delle numerose strade imperiali che collegano i luoghi all'interno della Germania rendono il commercio e gli spostamenti molto più facili e accessibili per tutti, oltre a portare grandi benefici per qualsiasi esigenza logistica che possa sorgere, soprattutto quando si tratta di spostare gli eserciti." #OLD ITA
 german_imperial_roads_desc: "Since Roman times, road networks have connected places across $GER$, making trade and travel easier and more accessible. These roads also provide critical logistical advantages, particularly when moving troops." #NEW
 #german_imperial_roads_desc: "For centuries, roads have been built, expanded, and improved upon within the heart of Europe. From the Romans up until today, the benefits of the many imperial roads connecting places within Germany with each other makes trading and traveling a lot easier and more accessible for everyone, while also harboring great benefits for any logistical need that might arise, especially when it comes to moving armies around." #OLD ENG

 landsknechte: "Landsknechte"
 #landsknechte_desc: "Un nuovo tipo di organizzazione delle unità è emerso dalle ricorrenti guerre all'interno della Germania e ai suoi confini. Le $landsknechte$ sono truppe miste formate da innovativi quadrati di picchieri, con archibugieri che supportano dai fianchi, e una prima linea composta dai famigerati #italic Doppelsöldner#!, 'uomini a doppia paga' che portano spade a due mani. Questo permette di combinare tattiche di combattimento ravvicinato e a medio raggio." #OLD ITA
 landsknechte_desc: "A new type of unit organization has been born out of $GER$'s constant wars: The $landsknechte$, which takes the form of mixed troops formed by innovative pikemen squares, with arquebusiers supporting from their flanks, and a front line composed of the infamous #italic Doppelsöldner#!, 'double-pay men', carrying two-handed swords. This allows for tactics that combine close-quarters and medium-range combat." #NEW
 #landsknechte_desc: "A new type of unit organization has emerged from the recurring wars within Germany and on its borders. The $landsknechte$ are mixed troops formed by innovative pikemen squares, with arquebusiers supporting from their flanks, and a front line composed of the infamous #italic Doppelsöldner#!, 'double-pay men' carrying two-handed swords. This allows for tactics that combine close-quarters and medium-range combat." #OLD ENG

 german_biedermeier: "Biedermeier"
 #german_biedermeier_desc: "Il periodo Biedermeier segna una visione conservatrice nella nostra società, derivante dalle classi superiori e dal loro desiderio di tempi passati. Questo fa sì che molte delle attività creative e di pensiero più libere vengano svolte nell'intimità delle case, al riparo dagli sguardi del pubblico. Se da un lato questo rafforza inavvertitamente lo sviluppo di un'identità culturale all'interno della classe Burgher, dall'altro è anche la causa che spinge molti liberi pensatori a emigrare e a proseguire le loro attività all'estero." #OLD ITA
 german_biedermeier_desc: "The Biedermeier period marks a shift in social conservatism stemming from the upper classes and their nostalgia for the time when they held the most influence and power in our country. This social change has led our more free-thinking citizens to shroud their creative and intellectual pursuits in relative secrecy, well out of the public's disapproving gaze. While this inadvertently strengthens the development of a cultural identity amongst our merchants, it has also forced many valuable minds to leave our nation, seeking their lost freedoms — and taking their talents — elsewhere." #NEW
 #german_biedermeier_desc: "The Biedermeier period marks a conservative view in our society, stemming from the upper classes and their yearning for bygone times. This leads to a lot of the more free thinking and creative pursuits being engaged within the privacy of peoples homes, secluded from the public eye. While this inadvertently strengthens the development of a cultural identity within the Burgher class, it is also the cause for many Freethinkers to emigrate and continue their pursuits abroad." #OLD ENG

 custom_union_of_the_rhine: "Rheinischer Münzverein"
 #custom_union_of_the_rhine_desc: "Nel mosaico dell'Impero, per prosperare è necessario collaborare con i propri vicini nelle questioni economiche. Ci uniremo all'unione doganale del Reno e adotteremo le loro monete #italic in gulden#! per facilitare gli affari dei nostri mercanti e agevolare la diplomazia con gli altri Paesi." #OLD ITA
 custom_union_of_the_rhine_desc: "In the sprawling patchwork of our great empire, cooperation and collaboration between neighboring groups is vital to the health of our economy. We shall join the customs union of the Rhine and adopt their #italic gulden#! coins to make business transactions less complicated for our merchants, and streamline our international diplomacy." #NEW
 #custom_union_of_the_rhine_desc: "In the patchwork of the empire it is necessary to work together with one's neighbors in matters of the economy to thrive. We shall join the customs union of the Rhine and adopt their #italic gulden#! coins to ease business for our merchants and ease diplomacy with other countries." #OLD ENG
 lub_hanseatic_coins: "Wendischer Münzverein" #NEW
 lub_hanseatic_coins_desc: "A newly founded organization between cities with a strong Hanseatic presence, the Wendish Coinage Treaty will provide us with a strong basis to facilitate trade and commerce in our lands." #NEW
 hamburg_port_cities: "Port Networks" #NEW
 hamburg_port_cities_desc: "Our country survives through its strong ties to maritime trade and the constant exchange of goods. To maintain an orderly harbor, we will need to dredge fresh waterways and build more docks and warehouses, attracting new merchants and their ships." #NEW

 saiger_process: "Processo Saiger"
 saiger_process_desc: "Un nuovo e rivoluzionario processo di fusione, che arricchisce il rame contenente argento con il piombo, ci permetterà di aumentare la produttività delle nostre operazioni minerarie."
 german_river_toll_castle_advance: "$german_river_toll_castle$" #NEW
 german_river_toll_castle_advance_desc: "$german_river_toll_castle_desc$" #NEW
 german_mountain_toll_castle_advance: "$german_mountain_toll_castle$" #NEW
 german_mountain_toll_castle_advance_desc: "$german_mountain_toll_castle_desc$" #NEW

 #Austria
 austrian_tradition: "Una Casata Gloriosa"
 #austrian_tradition_desc: "La nostra ascesa al potere ha creato molta invidia e le casate rivali dell'Impero si contendono la nostra posizione di protettori del confine sud-orientale. Nonostante queste circostanze, siamo orgogliosi delle nostre manovre diplomatiche che non hanno rivali." #OLD ITA
 austrian_tradition_desc: "Our rise to power has made us the target of much envy, and the rival houses of the $hre$ vie for our position as the protectors of the south-eastern border. Despite these circumstances, we pride ourselves on executing diplomatic maneuvers unrivaled by any others." #NEW
 #austrian_tradition_desc: "Our rise to power has created much envy and the rival houses of the empire vie for our position as the protectors of the south-eastern border. Despite these circumstances, we pride ourselves with diplomatic maneuvers unrivaled by any others." #OLD ENG
 austrian_heritage: "Eredità di Rodolfo I"
 #austrian_heritage_desc: "La vittoria di Rodolfo I sui suoi rivali ha assicurato il nostro posto tra le grandi casate dell'Impero ed è oggetto di molti racconti e canzoni. Il fervore mostrato da lui e dai suoi cavalieri nella Battaglia sul Marchfeld ispirerà le nostre truppe per i secoli a venire." #OLD ITA
 austrian_heritage_desc: "The victory of Rudolf I over his rivals secured our place among the great houses of the $hre$ and is the subject of many tales and songs. The fervor displayed by him and his knights in the Battle on the Marchfeld will inspire our troops for centuries to come." #NEW
 #austrian_heritage_desc: "The victory of Rudolf I over his rivals secured our place among the great houses of the empire and is the subject of many tales and songs. The fervor displayed by him and his knights in the Battle on the Marchfeld will inspire our troops for centuries to come." #OLD ENG
 #hab_expert_mountaineers: "Una Terra di Montagne e Fiumi" #OLD ITA
 hab_expert_mountaineers: "Land of Mountains and Rivers" #NEW
 #hab_expert_mountaineers: "A Land of Mountains and Rivers" #OLD ENG
 hab_expert_mountaineers_desc: "Il nostro popolo è altamente adattato ad attraversare gli ostacoli del nostro Paese, dalle alte vette e dai passi delle nostre montagne agli ampi fiumi delle nostre valli."
 #austrian_marriage_policy: "Tu Felix Austria Nube" #OLD ITA
 austrian_marriage_policy: "'Tu Felix Austria Nube'" #NEW
 #austrian_marriage_policy: "Tu Felix Austria Nube" #OLD ENG
 #austrian_marriage_policy_desc: "Lasci che gli altri combattano le guerre, lei, felice Austria, si sposi! Perché ciò che l'altro Marte concede, Venere, la dea, lo dà a lei." #OLD ITA
 austrian_marriage_policy_desc: "'Let others wage war; you, happy $HAB$, marry! For what Mars gives to others, Venus gives to you — kingdoms.'" #NEW
 #austrian_marriage_policy_desc: "Let others fight wars, you, happy Austria, get married! Because what the other Mars grants, Venus, the goddess, gives you." #OLD ENG
 #habsburg_dominance: "Esperienza Diplomatica Austriaca" #OLD ITA
 habsburg_dominance: "$HAB_ADJ$ Diplomatic Expertise" #NEW
 #habsburg_dominance: "Austrian Diplomatic Expertise" #OLD ENG
 #habsburg_dominance_desc: "Nella nostra posizione al centro dell'Europa, dovremo adottare una posizione flessibile per quanto riguarda la nostra diplomazia esterna. Le alleanze e i rivali possono frantumarsi con la stessa rapidità con cui si sono formati, e i nostri diplomatici devono essere addestrati a coprire ogni possibile posizione." #OLD ITA
 habsburg_dominance_desc: "Given our location at the center of all $europe$, we must adopt a highly flexible attitude towards external diplomacy. Alliances and rivals can shatter as easily as they are formed, and our diplomats must be trained to cover every possible position." #NEW
 #habsburg_dominance_desc: "In our position at the center of Europe we will have to adopt a flexible position concerning our external diplomacy. Alliances and rivals can shatter just as quickly as they formed, and our diplomats have to be trained to cover every possible position." #OLD ENG
 austrian_military_flexibility: "Tattiche dei Lanzichenecchi"
 #austrian_military_flexibility_desc: "Solo una tattica ben rodata e addestrata di artiglieria d'urto, cariche di cavalleria e fanteria inflessibile reclutata dalla Landsknechte può portarci alla vittoria." #OLD ITA
 austrian_military_flexibility_desc: "Only well-rounded tactics of artillery shock, cavalry charges, and unyielding infantry recruited from the $landknechte$ can lead us to victory." #NEW
 #austrian_military_flexibility_desc: "Only a well-rounded and trained tactic of artillery shock, cavalry charges, and unyielding infantry recruited from the Landsknechte can lead us to victory." #OLD ENG
 edict_of_restitution: "Editto di Restituzione"
 #edict_of_restitution_desc: "Un piccolo atto di contabilità ci aiuterà a far fronte a qualsiasi conflitto religioso che potrebbe colpire il nostro regno. Questo editto innocuo sicuramente non scatenerà ulteriori conflitti." #OLD ITA
 edict_of_restitution_desc: "A bit of bookkeeping will help us to weather any religious strife that could befall our realm. This harmless edict will surely not spark any further conflict." #NEW
 #edict_of_restitution_desc: "A small piece of bookkeeping will help us to weather any religious strife that could befall our realm. This harmless edict will surely not spark any further conflict." #OLD ENG
 #austrian_court: "Corte Austriaca" #OLD ITA
 austrian_court: "$HAB_ADJ$ Court" #NEW
 #austrian_court: "Austrian Court" #OLD ENG
 #austrian_court_desc: "Mantenere le nostre relazioni diplomatiche richiede tempo e impegno e impegnare troppe persone in una missione diplomatica potrebbe riflettersi negativamente sulla nostra efficienza e reputazione. Razionalizzando la nostra corte, possiamo assicurarci di ottenere le informazioni necessarie per appianare i problemi quando si verificano." #OLD ITA
 austrian_court_desc: "Maintaining our diplomatic relations requires time and effort, and committing too many people to diplomatic missions could negatively affect our efficiency and damage our reputation. The $HAB_ADJ$ Court's streamlined approach ensures we deploy the right envoys at the right times and still gather the information we need without overextending our diplomatic resources." #NEW
 #austrian_court_desc: "Maintaining our diplomatic relations requires time and effort and committing too many people to diplomatic mission could reflect negatively on our own efficiency and reputation. By streamlining our court, we can ensure that we get the information we need to smooth ruffled feathers when they occur." #OLD ENG
 geheimrat: "Geheimer Rat"
 #geheimrat_desc: "Il Geheimer Rat è un organo consultivo d'élite composto da nobili e funzionari di alto rango, che serve come istituzione centrale per guidare le decisioni politiche, militari e amministrative dell'Austria." #OLD ITA
 geheimrat_desc: "The #italic Geheimer Rat#! is an elite advisory body composed of high-ranking nobles and officials, serving as the central institution for guiding our political, military, and administrative decisions." #NEW
 #geheimrat_desc: "Geheimer Rat is an elite advisory body composed of high-ranking nobles and officials, serving as the central institution for guiding Austria's political, military, and administrative decisions." #OLD ENG
 hofkriegsrat: "Hofkriegsrat"
 #hofkriegsrat_desc: "Il nostro Consiglio di Guerra può funzionare solo con una struttura burocratica adeguata. Solo quando conosceremo ogni dettaglio sulle nostre truppe e sulla logistica, potremo difendere il nostro regno da intrusi ostili." #OLD ITA
 hofkriegsrat_desc: "Our war council can only function with a proper bureaucratic structure. Only when we know every detail about our troops and logistics can we defend our realm from hostile intruders." #NEW
 #hofkriegsrat_desc: "Our War council can only function with a proper bureaucratic structure. Only when we know every detail about our troops and logistics, can we defend our realm from hostile intruders." #OLD ENG
 military_border: "Frontiera Militare"
 #military_border_desc: "La difesa delle nostre frontiere è un problema serio, soprattutto per le preoccupazioni finanziarie che potrebbe causare allo Stato. La soluzione che abbiamo trovato è quella di concedere generose concessioni di terre alle frontiere per creare una classe militare professionale. Questo garantirà una maggiore disciplina nelle nostre fonti di manodopera e faciliterà la migrazione di persone nelle regioni sottopopolate del nostro regno." #OLD ITA
 military_border_desc: "Defending our frontiers is a serious issue, and puts significant financial pressure on the state. The solution we have hit upon is to make generous grants of frontier lands in order to build up a professional military class. This will ensure more discipline overall and facilitate migration to the underpopulated regions of our realm." #NEW
 #military_border_desc: "The defense of our frontiers is a serious issue, especially the financial worries it could cause the state. The solution we have hit upon is to make generous land grants on the frontier to build up a professional military class. This will ensure a higher discipline in our manpower sources and ease the migration of people in underpopulated regions of our realm." #OLD ENG
 austrian_ambition: "Illuminazione Attraverso l'Istruzione"
 austrian_ambition_desc: "I nostri governanti devono ricevere la migliore educazione possibile per essere all'altezza dell'ideale del monarca illuminato."
 austrian_state_industrialization: "Industrializzazione dello Stato"
 #austrian_state_industrialization_desc: "La modernizzazione della nostra industria deve essere sempre in prima linea nell'attenzione del nostro Paese. Solo con fabbriche moderne possiamo competere con i nostri rivali su un palcoscenico globale." #OLD ITA
 austrian_state_industrialization_desc: "Industrial modernization must always be a priority for our administration. Only through modern manufacturing can we compete with our rivals on a global stage." #NEW
 #austrian_state_industrialization_desc: "The modernization of our industry must always be at the forefront of our country's attention. Only with modern manufactories can we compete with our rivals on a global stage." #OLD ENG
 wiener_klassik: "Wiener Klassik"
 #wiener_klassik_desc: "Il Classicismo viennese è un periodo musicale di trasformazione. Le opere dei nostri migliori compositori rivoluzioneranno la musica occidentale grazie alla loro innovazione nelle forme sinfoniche, operistiche e cameristiche." #OLD ITA
 wiener_klassik_desc: "Viennese Classicism is a transformative force in music. Our best composers' works shall revolutionize Western musical tradition through bold, trend-setting innovation of symphonic, operatic, and chamber arrangements." #NEW
 #wiener_klassik_desc: "Viennese Classicism is a transformative musical period. Our best composers' works shall revolutionize Western music through their innovation in symphonic, operatic, and chamber forms." #OLD ENG
 multicultural_empire: "Impero Multiculturale"
 #multicultural_empire_desc: "L'Austria è un regno vario e multiculturale, che fa affidamento sull'abbraccio e l'accoglienza delle sue numerose minoranze etniche per mantenere l'unità e la stabilità in mezzo alle crescenti tensioni nazionaliste." #OLD ITA
 multicultural_empire_desc: "$HAB$ is a diverse and multicultural realm, committed to embracing and accommodating its numerous ethnic minorities to maintain unity and stability amidst growing nationalist tensions." #NEW
 #multicultural_empire_desc: "Austria is a diverse and multicultural realm, relying on embracing and accommodating its numerous ethnic minorities to maintain unity and stability amidst growing nationalist tensions." #OLD ENG
 imperial_artillery: "Artiglieria Imperiale"
 #imperial_artillery_desc: "La natura in rapida evoluzione della guerra ci spinge a modernizzare le nostre truppe e le nostre tattiche. Per rimanere davanti ai nostri nemici, faremo della nostra artiglieria l'orgoglio dell'esercito imperiale." #OLD ITA
 imperial_artillery_desc: "The rapidly changing nature of warfare urges us to modernize our troops and tactics. In order to stay ahead of our foes, we shall make our artillery the pride of the Imperial army." #NEW
 #imperial_artillery_desc: "The rapidly changing nature of warfare urges us to modernize our troops and tactics. In order to stay ahead of our foes, we shall make our artillery the pride of imperial army." #OLD ENG

 alchemy_advance: "Alchimia"
 alchemy_advance_desc: "L'arte dell'alchimia prevede la creazione di pozioni ed elisir utilizzando una combinazione di erbe, minerali e altri ingredienti naturali. Anche se non sempre affidabile, l'uso dell'alchimia può talvolta produrre risultati notevoli nel trattamento di vari disturbi."
 anatomy_advance: "Anatomia"
 #anatomy_advance_desc: "I medici stanno sviluppando una comprensione più avanzata dell'anatomia umana, che porta a trattamenti più efficaci per lesioni e malattie. Questa conoscenza, in gran parte ricavata da dissezioni pratiche di cadaveri umani, sta anche aiutando a migliorare le tecniche chirurgiche e a ridurre i rischi delle procedure mediche." #OLD ITA
 anatomy_advance_desc: "Physicians are developing a more advanced understanding of the human body, which is leading to more effective treatments for injuries and diseases. This knowledge, largely gleaned from practical dissections of human cadavers, is also helping to improve surgical techniques and reduce the risks of medical procedures." #NEW
 #anatomy_advance_desc: "Physicians are developing a more advanced understanding of human anatomy, which is leading to more effective treatments for injuries and diseases. This knowledge, largely gleaned from practical dissections of human cadavers, is also helping to improve surgical techniques and reduce the risks of medical procedures." #OLD ENG
 surgery_advance: "Chirurgia"
 #surgery_advance_desc: "I chirurghi Barber stanno sviluppando tecniche più sofisticate per trattare lesioni e malattie, e lo sviluppo di nuovi strumenti chirurgici rende le procedure più sicure ed efficaci. Di conseguenza, i pazienti sopravvivono a lesioni e malattie che sarebbero state fatali solo pochi anni fa." #OLD ITA
 surgery_advance_desc: "Barber-surgeons are developing more sophisticated techniques for treating injuries and illnesses, and the invention of new surgical instruments makes procedures safer and more effective. As a result, patients are surviving injuries and illnesses that would have been fatal just a few years ago." #NEW
 #surgery_advance_desc: "Barber surgeons are developing more sophisticated techniques for treating injuries and illnesses, and the development of new surgical instruments makes procedures safer and more effective. As a result, patients are surviving injuries and illnesses that would have been fatal just a few years ago." #OLD ENG
 pharmacology_advance: "Farmacologia"
 pharmacology_advance_desc: "Alchimisti e medici stanno esplorando nuovi composti e miscele chimiche alla ricerca di rimedi. Alcuni di questi primi farmacisti hanno sviluppato trattamenti per malattie comuni come febbre, raffreddore e problemi digestivi, e i loro metodi sono promettenti per il futuro. Tuttavia, c'è ancora molto da imparare e molti di questi nuovi rimedi possono essere pericolosi se non preparati correttamente."
 sanitation_advance: "Igiene"
 sanitation_advance_desc: "Gli insediamenti stanno investendo in misure igienico-sanitarie migliori, come lo smaltimento dei rifiuti e i sistemi di acqua pulita. Questo ridurrà la diffusione delle malattie e migliorerà la salute generale della popolazione. Lo sviluppo di pratiche igienico-sanitarie moderne consentirà alle persone di vivere a stretto contatto senza contrarre malattie."
 vaccination_advance: "Vaccinazione"
 vaccination_advance_desc: "Con lo sviluppo dei vaccini, i medici sono in grado di fornire alla popolazione l'immunità contro le malattie mortali. Questi vaccini aiutano a ridurre la diffusione delle malattie e a prevenire le epidemie. Iniettando nel corpo una piccola quantità di batteri o virus indeboliti o morti, il sistema immunitario è in grado di riconoscere e combattere la malattia se la incontra di nuovo."

 vibrant_court_advance: "Corte Vibrante"
 #vibrant_court_advance_desc: "Grandi menti affollano la nostra corte da tutto il mondo conosciuto, portando con sé mode e lingue diverse. Di conseguenza, diventiamo più accomodanti nei confronti delle loro 'maniere' straniere." #OLD ITA
 vibrant_court_advance_desc: "Great minds flock to our court from across the known world, bringing with them diverse languages, fashions, and art. As a result of this exposure, we have grown more accommodating of their foreign 'manners'." #NEW
 #vibrant_court_advance_desc: "Great minds flock to our court from across the known world, bringing with them diverse fashions and tongues. Resultantly, we grow more accommodating of their foreign 'manners'." #OLD ENG

 patio_process_advance: "Processo di Patio"
 #patio_process_advance_desc: "Il $patio_process_advance$ consiste in un metodo per raffinare minerali di argento e oro di bassa qualità con una soluzione chimica a base di mercurio per catalizzare la reazione di amalgama." #OLD ITA
 patio_process_advance_desc: "The $patio_process_advance$ consists is a method of refining low quality silver and gold ores with a chemical solution based on mercury to catalyze the amalgamation reaction." #NEW
 #patio_process_advance_desc: "The $patio_process_advance$ consists on a method to refine low quality silver and gold ores with a chemical solution based on mercury to catalyze the amalgamation reaction." #OLD ENG
 pan_amalgamation_advance: "Amalgamazione in Cuve"
 #pan_amalgamation_advance_desc: "L'$pan_amalgamation_advance$ è un miglioramento del $patio_process_advance$ che consente tempi di elaborazione più rapidi." #OLD ITA
 pan_amalgamation_advance_desc: "The $pan_amalgamation_advance$ is an improvement of the $patio_process_advance$ that speeds up processing." #NEW
 #pan_amalgamation_advance_desc: "The $pan_amalgamation_advance$ is an improvement of the $patio_process_advance$ that allows faster times of processing." #OLD ENG

 #milanese_tradition: "Patrimonio lombardo" #OLD ITA
 milanese_tradition: "$lombard$ Heritage" #NEW
 #milanese_tradition: "Lombard Heritage" #OLD ENG
 #milanese_tradition_desc: "La gloria e l'influenza del Regno Longobardo si fanno sentire ancora oggi. In quanto loro chiare eredi spirituali, le famiglie nobili di Milano godono di un grado di autorità e di rispetto superiore al resto." #OLD ITA
 milanese_tradition_desc: "The glory and influence of the $lombard$ Kingdom is still felt to this day. As their clear spiritual heirs, the nobles of $MLO$ enjoy a higher degree of authority and respect than their peers." #NEW
 #milanese_tradition_desc: "The glory and influence of the Lombard Kingdom is still felt to this day. As their clear spiritual heirs, the noble families of Milan enjoy a degree of authority and respect above the rest." #OLD ENG
 milanese_heritage: "Tradizione dei Condottieri"
 #milanese_heritage_desc: "Gli abitanti di Milano sono abituati a combattere come mercenari nelle continue dispute in tutta la regione, guadagnandosi la reputazione di soldati molto capaci." #OLD ITA
 milanese_heritage_desc: "The people of $MLO# are used to fighting as mercenaries in the constant squabbles all around the region, earning a reputation for being very capable soldiers." #NEW
 #milanese_heritage_desc: "The people of Milan are used to fighting as mercenaries in the constant squabbles all around the region, earning for themselves a reputation of very capable soldiers." #OLD ENG
 #renaissance_prince: "Principe del Rinascimento" #OLD ITA
 renaissance_prince: "$renaissance$ Prince" #NEW
 #renaissance_prince: "Renaissance Prince" #OLD ENG
 #renaissance_prince_desc: "Gli altri governanti in Italia possono fare dichiarazioni a parole per sostenere la rinascita culturale che si manifesta davanti a noi; lasciamo che Milano ne sia il centro sotto il nostro patrocinio." #OLD ITA
 renaissance_prince_desc: "Other rulers in $italy_region$ may pay lip service to their support of the cultural rebirth that manifests itself before us; let $MLO$ emerge as its heart under our patronage." #NEW
 #renaissance_prince_desc: "Other rulers in Italy may pay lip service to their support of the cultural rebirth that manifests itself before us; let Milan be the center of it under our patronage." #OLD ENG
 patron_of_music: "Patrono della Musica"
 #patron_of_music_desc: "Le arti musicali sono state tristemente trascurate da altri principi. Patrociniamo la musica per la Gloria di Dio e di noi stessi, e anche Milano brillerà." #OLD ITA
 patron_of_music_desc: "The musical arts have been sadly neglected by other princes. We, by contrast, shall patronize music for the glory of God and ourselves, and $MLO$ will shine as a result." #NEW
 #patron_of_music_desc: "The Musical arts have been sadly neglected by other princes. Let us patronize music for the Glory of God, and ourselves, and Milan will also shine." #OLD ENG
 #lowered_power_of_barons: "Abbassamento del Potere dei Baroni" #OLD ITA
 lowered_power_of_barons: "Lowered Baronial Power" #NEW
 #lowered_power_of_barons: "Lowered Power of the Barons" #OLD ENG
 #lowered_power_of_barons_desc: "L'arte e la cultura possono essere una cosa, ma se vogliamo rimanere indipendenti avremo bisogno di denaro. Per questo, dobbiamo spezzare il potere della nobiltà locale e fare in modo che più denaro affluisca al centro." #OLD ITA
 lowered_power_of_barons_desc: "Art and culture are valuable things, but if we wish to remain independent, what we really need is #italic money#!. To acquire what we need, we must diminish the power of regional nobility, and ensure that more money flows into the center of our state." #NEW
 #lowered_power_of_barons_desc: "Art and culture may be one thing, but if we wish to remain independent we will need money. For this, we must break the power of the local nobility and ensure that more money flows into the center." #OLD ENG
 age_of_condottieri: "L'Età dei Condottieri"
 #age_of_condottieri_desc: "Con i mercenari che costituiscono il pilastro di molti eserciti, sarebbe saggio assicurarsi che anche noi abbiamo dei mercenari a disposizione. Facciamo in modo che i capitani mercenari di passaggio siano accolti calorosamente a Milano, in modo che si ricordino di noi quando sarà il momento." #OLD ITA
 age_of_condottieri_desc: "With mercenaries forming the mainstay of so many armies, we would be wise to ensure that we too have soldiers of fortune at our disposal. Let us ensure that passing mercenary captains are warmly welcomed in $MLO$, so they remember us fondly when our need for them arises." #NEW
 #age_of_condottieri_desc: "With mercenaries forming the mainstay of so many armies, we would be wise to ensure that we too have mercenaries at hand. Let us ensure that passing mercenary captains are warmly welcomed in Milan, so they remember us when the time comes." #OLD ENG
 encouragement_of_philosophers: "Incoraggiamento dei Filosofi"
 #encouragement_of_philosophers_desc: "Noi di Milano siamo da tempo sostenitori del pensiero rinascimentale. Dovremmo continuare questa tradizione, estendere il patrocinio e costruire strutture in modo che i migliori pensatori di tutta Europa vengano qui." #OLD ITA
 encouragement_of_philosophers_desc: "We in $MLO$ have long been supporters of $renaissance$ thought. We should continue this tradition by extending patronage to and building facilities for the finest thinkers in all of $europe$. Hopefully, that will draw them here." #NEW
 #encouragement_of_philosophers_desc: "We in Milan have long been supporters of Renaissance thought. We should continue this tradition and extend patronage and build facilities so the finest thinkers in all of Europe will come here." #OLD ENG
 merchant_princes: "Principi Mercanti"
 #merchant_princes_desc: "Le grandi città costiere d'Italia hanno da tempo grandi reti commerciali che portano ricchezza e potere alle loro porte. Milano può anche non essere sulla costa, ma non significa che anche il Ducato di Milano non possa avere la sua parte. Si sappia che gli uomini ricchi che partono e riportano le ricchezze del mondo saranno visti con favore alla corte di Milano." #OLD ITA
 merchant_princes_desc: "The great coastal cities of $ITA$ have long benefited from great trade networks bringing wealth and power to their shores. Our country may not be on the coast, but it does not mean that $MLO$ cannot get its own share of the maritime trade. Let it be known that any wealthy trades who go forth and bring back the riches of the world will be looked upon with favor at the court of $MLO$." #NEW
 #merchant_princes_desc: "The Great Coastal Cities of Italy have long had great trade networks bringing wealth and power to their doorstep. Milan may not be on the coast, but it does not mean that the Duchy of Milan cannot get its share too. Let it be known that men of wealth who go forth and bring back the riches of the world will be looked upon with favor at the court of Milan." #OLD ENG
 #rulership_of_enlightened_principals: "Governare attraverso Principi Illuminati" #OLD ITA
 rulership_of_enlightened_principals: "Rulership Through Enlightened Principals" #NEW
 #rulership_of_enlightened_principals: "Rulership through Enlightened Principals" #OLD ENG
 #rulership_of_enlightened_principals_desc: "Con l'incoraggiamento dei filosofi, hanno iniziato a emergere nuove teorie e principi. Strutturando il nostro governo secondo questi principi, godremo di un maggiore sostegno, almeno tra coloro che contano davvero." #OLD ITA
 rulership_of_enlightened_principals_desc: "Enlightenment philosophers have inspired new theories of governance. By structuring our government along those principles of merit, justice, and efficiency, we will enjoy greater support. At least, among those who actually matter..." #NEW
 #rulership_of_enlightened_principals_desc: "With the encouragement of philosophers, new theories and principles have started to emerge. By structuring our government along those principles we will enjoy greater support, at least amongst those who actually matter." #OLD ENG
 #milanese_ambition: "Un Nuovo Regno Lombardo" #OLD ITA
 milanese_ambition: "A New $lombard$ Kingdom" #NEW
 #milanese_ambition: "A New Lombard Kingdom" #OLD ENG
 #milanese_ambition_desc: "La gloria del precedente Regno Lombardo impallidisce in confronto a ciò che il popolo di Milano è riuscito ad ottenere, e a ciò che è ancora pronto ad ottenere. Tutti si inchineranno a noi." #OLD ITA
 milanese_ambition_desc: "The glory of the previous $lombard$ Kingdom pales in comparison to what the people of $MLO$ have managed to achieve, and what they are still entitled to receive. All shall bow before us!" #NEW
 #milanese_ambition_desc: "The glory of the previous Lombard Kingdom pales in comparison to what the people of Milan have managed to achieve, and what they are still prepared to get. All shall bow to us." #OLD ENG

 #Papal States
 pap_head_of_the_church: "Capo della Chiesa"
 #pap_head_of_the_church_desc: "La Curia e la Santa Sede sono strettamente intrecciate con il governo papale. I cardinali di altre nazioni e Stati possono cercare di influenzare la direzione religiosa del Cristianesimo, ma alla fine è il Papato che avrà sempre la massima influenza nella Curia." #OLD ITA
 pap_head_of_the_church_desc: "The Curia and the Holy See are tightly intertwined with the $PAP_ADJ$ government. Cardinals from other nations and states might try to influence the theological trends of 4christian$, but in the end, the $PAP$ will always have the most influence in the Curia." #NEW
 #pap_head_of_the_church_desc: "The Curia and the Holy See are tightly intertwined with the Papal government. The cardinals from other nations and states might try to influence the religious direction of Christianity, but in the end, it is the Papacy who will always have the grandest of influence in the Curia." #OLD ENG
 pap_the_word_of_the_lord: "La Parola del Signore"
 #pap_the_word_of_the_lord_desc: "In qualità di suoi servitori più fedeli, i suoi vescovi più santi, siamo noi a leggere e interpretare la Parola del Signore. Come tale, la nostra diplomazia è sostenuta dalla divinità di Dio." #OLD ITA
 pap_the_word_of_the_lord_desc: "As His most loyal servants; His holiest of bishops, it is we who read and interpret the Word of the Lord. As such, our diplomacy is backed by the divinity of God." #NEW
 #pap_the_word_of_the_lord_desc: "As his most loyal servants; his holiest of bishops, it is us who read and interpret the Word of the Lord. As such, our diplomacy is backed with the divinity of God." #OLD ENG
 ecclesiastical_primacy: "Primato Ecclesiastico"
 #ecclesiastical_primacy_desc: "Il Papa ha l'autorità sovrana di stabilire il canone e la legge religiosa nella Chiesa cattolica. Lo Stato condivide una relazione speciale con coloro che si conformano all'autorità cattolica." #OLD ITA
 ecclesiastical_primacy_desc: "The Pope has the sovereign authority to establish religious canon and law in the $catholic_ADJ$ Church. The State shares a special relationship with those who conform to the will of the $catholic_ADJ$ authority." #NEW
 #ecclesiastical_primacy_desc: "The Pope has the sovereign authority to establish religious canon and law in the Catholic Church. The State shares a special relationship with those who conform with the Catholic authority." #OLD ENG
 #papal_investiture_and_tithes: "Investitura Papale e Decime" #OLD ITA
 papal_investiture_and_tithes: "$PAP_ADJ$ Investiture and Tithes" #NEW
 #papal_investiture_and_tithes: "Papal Investiture and Tithes" #OLD ENG
 #papal_investiture_and_tithes_desc: "A Roma confluiscono le ricchezze dell'Europa cristiana." #OLD ITA
 papal_investiture_and_tithes_desc: "Into $rome$ flows the riches of $christian_ADJ$ $europe$." #NEW
 #papal_investiture_and_tithes_desc: "Into Rome flow the riches of Christian Europe." #OLD ENG
 #glory_of_rome: "Gloria di Roma" #OLD ITA
 glory_of_rome: "Glory of $rome$" #NEW
 #glory_of_rome: "Glory of Rome" #OLD ENG
 #glory_of_rome_desc: "Controlliamo la grande città e l'antica capitale dei Romani. Siamo i custodi della loro meravigliosa tradizione." #OLD ITA
 glory_of_rome_desc: "We control the great city and the ancient capital of the Romans. We are the sole keepers of their marvelous tradition!" #NEW
 #glory_of_rome_desc: "We control the great city and the ancient capital of the Romans. We are the preservers of their marvelous tradition." #OLD ENG
 donation_of_constantine: "Donazione di Costantino"
 #donation_of_constantine_desc: "La Donazione di Costantino dimostra la nostra autorità di conferire il titolo di Imperatore dei Romani a chiunque decidiamo. Può anche dimostrare che siamo piuttosto bravi a falsificare i documenti." #OLD ITA
 donation_of_constantine_desc: "The Donation of Constantine demonstrates our authority to bestow the title of the Emperor of the Romans upon whomsoever we choose. It may also prove that we are rather good at forging documents." #NEW
 #donation_of_constantine_desc: "The Donation of Constantine demonstrates our authority to bestow the title of the Emperor of the Romans upon whomsoever we choose. It may also prove that we're rather good at forging documents." #OLD ENG
 centralize_the_states: "Centralizzare gli Stati"
 #centralize_the_states_desc: "Consolideremo il nostro potere nelle province papali sottraendolo ai principi locali." #OLD ITA
 centralize_the_states_desc: "We will consolidate our power in $PAP_ADJ$ provinces by seizing authority from the local princes." #NEW
 #centralize_the_states_desc: "We will consolidate our power in Papal provinces by seizing it from the local princes." #OLD ENG
 holy_father: "Il Santo Padre"
 #holy_father_desc: "Essere il Vicario di Dio per i cattolici romani ci dà un certo margine di manovra politico. Le bolle papali, documenti che portano il sigillo ufficiale del Papa, hanno il peso della parola stessa di Dio. Con questi governanti sono stati maledetti e divisi interi continenti." #OLD ITA
 holy_father_desc: "Being the Vicar of God to the Roman $catholic_ADJ$ faithful gives us a certain amount of political leeway. The Papal Bull, documents carrying the Pope's official seal, carry the weight of the very word of God. With these, rulers have been cursed and entire continents divided." #NEW
 #holy_father_desc: "Being the Vicar of God to Roman Catholics gives us a certain amount of political leeway. The Papal Bull, documents carrying the Pope's official seal, carry the weight of the very word of God. With these rulers have been cursed and entire continents divided." #OLD ENG
 pap_legacy_of_the_military_orders: "Eredità degli Ordini Militari"
 #pap_legacy_of_the_military_orders_desc: "Sebbene l'era dell'Ordine Sacro sia terminata da tempo, la sua eredità rimane ancora una grande ispirazione per i soldati di Dio che si impegnano a difendere la Santa Sede dalle minacce eretiche e pagane." #OLD ITA
 pap_legacy_of_the_military_orders_desc: "Although the era of Holy Orders has long come to its end, its legacy still remains a major inspiration for the soldiers of God who pledge to defend the Holy See from heathens and heresy." #NEW
 #pap_legacy_of_the_military_orders_desc: "Although the era of Holy Orders has long come to its end, its legacy still remains a major inspiration for the soldiers of God who pledge to defend the Holy See from the heretic and heathen threats." #OLD ENG

 #Teutonic Order
 teu_crusader_discipline: "Disciplina dei Crociati"
 teu_crusader_discipline_desc: "Il nostro grande ordine è stato forgiato nelle fiamme e nel sangue della Terza Crociata durante l'assedio di $acre$ nel 1191. Mentre in origine curavamo i malati e i deboli, l'ordine si è trasformato in un gruppo militarizzato di cavalieri dalla devozione e dalla disciplina infrangibili."
 teu_teutonic_heavy_cavalry: "Cavalleria Pesante Teutonica"
 #teu_teutonic_heavy_cavalry_desc: "Non c'è simbolo più grande del potere e dell'abilità militare della cavalleria pesante. Mentre per molti Stati la cavalleria è composta da nobili, ogni cavaliere teutonico è anche un membro della nostra cavalleria pesante e si sottopone al rigido addestramento di un crociato." #OLD ITA
 teu_teutonic_heavy_cavalry_desc: "There is no greater symbol of power and military prowess than the heavy cavalry. While for many states the cavalry is made of nobles, every Teutonic Knight is also a member of our heavy cavalry, and undergoes the strict training of a crusader." #NEW
 #teu_teutonic_heavy_cavalry_desc: "There is no greater symbol of power and military prowess than the heavy cavalry. While for many states the cavalry is made of nobles, every Teutonic knight is also a member of our heavy cavalry and undergoes the strict training of a crusader." #OLD ENG
 teu_reformed_order_army: "Esercito dell'Ordine Riformato"
 #teu_reformed_order_army_desc: "I cavalieri tedeschi, i veterani delle crociate e delle innumerevoli guerre europee non sono abbastanza numerosi per rimanere la base dei nostri eserciti. Ora dobbiamo riorganizzare l'esercito per aprire la strada a reggimenti di leva nazionale, in grado di sostituire i cavalieri sul campo di battaglia." #OLD ITA
 teu_reformed_order_army_desc: "The $GER_ADJ$ knights, and veterans of the Crusades and other wars are simply not numerous enough to remain the base of our armies. We must reorganize the army to incorporate domestic levies, regiments capable of replacing the knights on the battlefield." #NEW
 #teu_reformed_order_army_desc: "The German knights, veterans from crusades, and countless European wars are simply not numerous enough to remain the base of our armies. Now we must reorganize the army to pave the way for domestically levied regiments, capable of replacing the knights on the battlefield." #OLD ENG
 #teu_peasants_recruitment: "Reclutamento dei Contadini" #OLD ITA
 teu_peasants_recruitment: "Peasant Recruitment" #NEW
 #teu_peasants_recruitment: "Peasants Recruitment" #OLD ENG
 #teu_peasants_recruitment_desc: "Ci è ormai chiaro che non possiamo più fare affidamento sui volontari stranieri per riempire i ranghi del nostro esercito. Non importa quanto possano essere esperti e preziosi. Dobbiamo invece sviluppare un sistema che ci permetta di prelevare i nostri sudditi, tedeschi e non." #OLD ITA
 teu_peasants_recruitment_desc: "It has become clear to us that we can no longer rely on foreign volunteers to fill up our army ranks, no matter how experienced and valuable they might be. Instead, we will develop a system that would allow us to levy our subjects, both $GER_ADJ$ and non-$GER-ADJ$ folk alike." #NEW
 #teu_peasants_recruitment_desc: "It has become clear to us that we can no longer rely on foreign volunteers to fill up our army ranks. No matter how experienced and valuable they might be. Instead, a system that would allow us to levy our subjects, Germans and non-Germans, must be developed." #OLD ENG
 teu_infantry_tactics: "Tattiche di Fanteria"
 #teu_infantry_tactics_desc: "Le battaglie europee contemporanee hanno dimostrato che l'era della fanteria sta per iniziare. È giunto il momento di sviluppare nuove tattiche, adottare la picca e riformare il nostro concetto medievale di fanteria ausiliaria, trasformandola nella forza combattente principale dei nostri eserciti futuri." #OLD ITA
 teu_infantry_tactics_desc: "Contemporary battles in $europe$ have proven that the age of infantry is about to begin. It is now time to develop new tactics, adopt use of the pike, and reform our medieval concept of auxiliary infantry into the main fighting force of our future armies." #NEW
 #teu_infantry_tactics_desc: "Contemporary European battles have proven that the age of infantry is about to begin. It is now time to develop new tactics, adopt the pike, and reform our medieval concept of auxiliary infantry into the main fighting force of our future armies." #OLD ENG
 teu_teutonic_religious_authority: "Autorità Religiosa Teutonica"
 #teu_teutonic_religious_authority_desc: "Metteremo fine alla pratica della libera autonomia religiosa dei vescovi locali all'interno del nostro regno. Tutte le questioni religiose, dalla tassazione alla conversione dei locali, saranno d'ora in poi questioni di Stato." #OLD ITA
 teu_teutonic_religious_authority_desc: "We will put an end to the loose religious autonomy local bishops hold within our realm. All religious matters, from taxation to converting the populace, will be state matters from now on." #NEW
 #teu_teutonic_religious_authority_desc: "We will put an end to the practice of loose religious autonomy of the local bishops within our realm. All religious matters, from taxation to conversion of the locals, will from now on be state matters." #OLD ENG
 teu_expanded_marches: "Marce Ampliate"
 #teu_expanded_marches_desc: "Concedere l'autonomia ai governatori locali delle nostre regioni di confine e riformare le loro terre in marce. Queste terre speciali pagheranno meno tasse allo Stato, in cambio dell'obbligo di mantenere la massima prontezza di combattimento sia in tempo di guerra che di pace. Questo dovrebbe garantirci una sostanziale flessibilità militare a costi contenuti." #OLD ITA
 teu_expanded_marches_desc: "Grant autonomy to the local governors of our border regions, and reform their holdings into marches. These special zones will pay fewer taxes to the state in return for an obligation to maintain the highest combat readiness during times of war as well as peace. This should provide us with substantial military flexibility at little cost." #NEW
 #teu_expanded_marches_desc: "Grant autonomy to the local governors of our border regions and reform their land into marches. These special lands will pay fewer taxes to the state in return for an obligation to maintain the highest combat readiness during times of war as well as peace. This should provide us with substantial military flexibility at little cost." #OLD ENG
 #teu_prussian_bishops: "Vescovi Prussiani" #OLD ITA
 teu_prussian_bishops: "$prussian$ Bishops" #NEW
 #teu_prussian_bishops: "Prussian Bishops" #OLD ENG
 #teu_prussian_bishops_desc: "Conceda ulteriori diritti e privilegi ai nostri vescovi prussiani, assicurando la loro lealtà in tutte le questioni." #OLD ITA
 teu_prussian_bishops_desc: "We shall grant further rights and privileges to our $prussian$ bishops, ensuring their loyalty in all matters." #NEW
 #teu_prussian_bishops_desc: "Grant further rights and privileges to our Prussian bishops, ensuring their loyalty in all matters." #OLD ENG
 teu_one_state_one_religion: "Uno Stato, Una Religione"
 #teu_one_state_one_religion_desc: "Riservare tutte le cariche statali solo a coloro che appartengono alla nostra religione. Gli eretici e i pagani non sono più i benvenuti nel nostro regno." #OLD ITA
 teu_one_state_one_religion_desc: "Reserve all state offices only for those who follow our religion. Heretics and heathens are no longer welcome in our realm." #NEW
 #teu_one_state_one_religion_desc: "Reserve all state offices only for those of our religion. Heretics and heathens are no longer welcome in our realm." #OLD ENG
 teu_absolute_order: "Ordine Assoluto"
 #teu_absolute_order_desc: "Tutti i poteri dello Stato sono consolidati nel nostro Ordine. Ogni azione intrapresa e ogni decisione presa passa attraverso la gerarchia dell'Ordine Teutonico prima di essere eseguita. Naturalmente, questa burocrazia non è favorevole a tutti, ma garantisce il potere assoluto dell'Hochmeister." #OLD ITA
 teu_absolute_order_desc: "All powers of the state are consolidated in our order. Every action taken and every decision made goes through the hierarchy of the Teutonic Order first before it gets executed. Of course, this bureaucracy is not in everyone's favor, but it ensures the absolute power of the #italic Hochmeister#!." #NEW
 #teu_absolute_order_desc: "All powers of the state are consolidated in our order. Every action taken; and every decision made goes through the hierarchy of the Teutonic Order first before it gets executed. Of course, this bureaucracy is not in everyone's favor, but it ensures the absolute power of the Hochmeister." #OLD ENG

 #legacy_of_breton_independence: "L'Eredità dell'Indipendenza Bretone" #OLD ITA
 legacy_of_breton_independence: "Legacy of $breton$ Independence" #NEW
 #legacy_of_breton_independence: "Legacy of Breton Independence" #OLD ENG
 #legacy_of_breton_independence_desc: "La Bretagna non ha mai fatto parte della Francia. Anche se in passato siamo stati devastati da Franchi, Vichinghi e Inglesi, finora abbiamo mantenuto la nostra identità di popolo. Facciamo in modo che tutti i nostri vicini sappiano che la Bretagna rimarrà libera, l'ultima patria delle vere tradizioni galliche." #OLD ITA
 legacy_of_breton_independence_desc: "$brittany_area$ has never truly been part of $FRA$ Though we have been ravaged by Franks, Vikings, and the $ENG_ADJ$ in the past, we have, thus far, maintained our unique identity as a people. Let all of our neighbors be aware that $BRI$ shall remain forever free, the last bastion of true Gallic traditions!" #NEW
 #legacy_of_breton_independence_desc: "Brittany has never been part of France. Though we have been ravaged by Franks, Vikings, and the English in the past, we have, thus far, maintained our identity as a people. Let all of our neighbors be aware that Brittany will remain free, the last home of true Gallic traditions." #OLD ENG
 #estates_of_brittany: "I Ceti della Bretagna" #OLD ITA
 estates_of_brittany: "The Estates of $BRI$" #NEW
 #estates_of_brittany: "The Estates of Brittany" #OLD ENG
 #estates_of_brittany_desc: "Convocati per la prima volta nel XIV secolo, i Ceti della Bretagna permettevano agli uomini liberi di tutti i livelli della società, anche del Terzo Stato, di condividere le loro lamentele e di presentare una petizione al Duca per ottenere una riparazione. Convocando i Ceti, possiamo sfogare alcune tensioni nelle nostre terre." #OLD ITA
 estates_of_brittany_desc: "First called in the 14TH century, the Estates of $BRI$ allowed free men from all rungs of society, even the Third Estate, to share their grievances and petition the ruler for redress. By calling in the Estates, we can mitigate some of the tension felt throughout our domain." #NEW
 #estates_of_brittany_desc: "First called in the 14th century, the Estates of Brittany allowed free men from all rungs of society, even the Third Estate, to share their grievances and petition the Duke for redress. By calling in the Estates, we can vent some of the tension in our lands." #OLD ENG

 dutch_education: "Educazione Olandese"
 #dutch_education_desc: "Sebbene le nostre terre abbiano sempre goduto di tassi di alfabetizzazione superiori tra tutti gli strati, questo vantaggio sta diventando sempre più evidente nel mondo che sta prendendo forma davanti a noi. Solo chi ha una comprensione limitata non approfitterebbe di questo vantaggio e non lo aumenterebbe." #OLD ITA
 dutch_education_desc: "While our people always enjoyed superior literacy rates at all levels of society, this advantage is becoming more apparent in the world taking shape before us. Only those with a limited understanding would not take advantage of and increase this edge." #NEW
 #dutch_education_desc: "While our lands have always enjoyed superior literacy rates among all strata, this advantage is becoming more apparent in the world that is taking shape in front of us. Only those with a limited understanding would not take advantage of this edge and increase it." #OLD ENG
 dutch_golden_age_art: "Arte Olandese"
 #dutch_golden_age_art_desc: "I Paesi Bassi sono storicamente all'avanguardia nei progressi tecnologici e culturali. Dobbiamo continuare a patrocinare inventori, artisti e scrittori per mantenere il nostro vantaggio sulle altre nazioni." #OLD ITA
 dutch_golden_age_art_desc: "$common_string_prefix_article$ $NED$ has historically been at the forefront of technological and cultural advancements. We must continue to patronize inventors, artists, and writers to maintain our edge over other nations." #NEW
 #dutch_golden_age_art_desc: "The Netherlands has historically been at the forefront of technological and cultural advancements. We must continue to patronize inventors, artists, and writers to maintain our edge over other nations." #OLD ENG
 a_trading_hub: "Un Polo Commerciale"
 #a_trading_hub_desc: "La nostra nazione è benedetta da un polo consolidato di città incentrate sul commercio e da marinai avventurosi disposti a riportare a casa le ricchezze provenienti da tutto il mondo. Questi uomini saranno per noi un modo per commerciare con altre nazioni e ottenere profitti significativi per le nostre casse." #OLD ITA
 a_trading_hub_desc: "Our nation is blessed with a well-established hub of cities focused on trade, and adventurous sailors willing to bring riches from all over the world back home. These seafarers will be an excellent way for us to trade with other nations and make significant profits." #NEW
 #a_trading_hub_desc: "Our nation is blessed with a well-established hub of cities focused on trade and adventurous sailors willing to bring riches from all over the world back home. These men will be a way for us to trade with other nations and make significant profits for our coffers." #OLD ENG
 platoon_fire: "Fuoco di Plotone"
 #platoon_fire_desc: "Il fuoco a raffica standard prevedeva che ogni rango sparasse la sua raffica in un colpo solo, con l'obiettivo di massimizzare la potenza di fuoco. Gli olandesi svilupparono un sistema diverso di fuoco per plotone, con l'obiettivo che una parte del reggimento sparasse sempre contro il nemico. Questo impediva al nemico di riprendersi dalle raffiche." #OLD ITA
 platoon_fire_desc: "Standard volley fire involved each rank delivering its volley in one go to maximize firepower. But we have developed a different system of firing by platoon, with the idea being that one part of the regiment would always be firing at the enemy while others reloaded and got ready for the next volley. This removed time between attacks that the enemy could use to recover or otherwise gain an advantage." #NEW
 #platoon_fire_desc: "Standard volley fire involved each rank delivering its volley in one go, with the goal of maximizing firepower. The Dutch developed a different system of firing by platoon, with the goal being that one part of the regiment would always be firing at the enemy. This prevented the enemy from recovering from the volleys." #OLD ENG
 concentration_power: "Concentrazione del Potere"
 #concentration_power_desc: "Per troppo tempo la nostra nazione è stata governata da diversi titolari di stad, anche se alcuni avevano più potere di altri e agivano come #italic primus inter pares#!. È giunto il momento di rendere la posizione ereditaria e di concentrare il potere in un'unica persona." #OLD ITA
 concentration_power_desc: "For too long, our nation has been unevenly governed by multiple #italic stadtholders#! across different provinces, with the most powerful acting as #italic primus inter pares#! among their peers. It is time to make the position hereditary and concentrate authority in a single ruler." #NEW
 #concentration_power_desc: "For too long has our nation been governed by several stadholders, even if some held more power than others and acted as #italic primus inter pares#!. It is time to make the position hereditary and concentrate power in a single person." #OLD ENG
 a_fortified_border: "Un Confine Fortificato"
 #a_fortified_border_desc: "I nostri confini non sono ben difesi da elementi naturali come quelli di altre nazioni. Tuttavia, possiamo usare il nostro ingegno per creare le difese più potenti per scoraggiare i nostri nemici e proteggere le nostre famiglie." #OLD ITA
 a_fortified_border_desc: "Our borders are not well-defended by natural features, as is the case in some other nations. However, we have wit and wisdom in abundance, enough to construct the mightiest fortifications possible to deter our enemies and protect our families." #NEW
 #a_fortified_border_desc: "Our borders are not well defended by natural features as other nations have. However, we can use our wit to create the mightiest defenses to deter our enemies and protect our families." #OLD ENG

 #Netherlandish Shared
 #netherlandish_protoindustry: "Verlagssystem Olandese" #OLD ITA
 netherlandish_protoindustry: "$NED_ADJ$ Verlagssystem" #NEW
 #netherlandish_protoindustry: "Netherlandish Verlagssystem" #OLD ENG
 #netherlandish_protoindustry_desc: "Per molto tempo, le nostre nazioni hanno ospitato città e paesi vivaci che si dedicavano all'artigianato in proporzione maggiore rispetto ai nostri vicini. Questa attenzione ci ha reso una terra molto produttiva." #OLD ITA
 netherlandish_protoindustry_desc: "For a long time, our land has been home to bustling towns and cities with a higher concentration of craftsmen than our neighbors. This focus has made us a highly productive nation." #NEW
 #netherlandish_protoindustry_desc: "For a long time, our nations have been home to bustling towns and cities that devoted themselves to crafts in a larger proportion than our neighbors. This focus has made us a very productive land." #OLD ENG
 a_dynamic_society: "Una Società Dinamica"
 #a_dynamic_society_desc: "Le nostre terre sono la casa dei coraggiosi. Coloro che cercano di migliorare la propria vita hanno un posto qui, e noi sfrutteremo le ambizioni di queste persone per rafforzare la nostra nazione." #OLD ITA
 a_dynamic_society_desc: "Our lands are a haven for the bold. Those looking to better their lives will find opportunity here, and we will in turn capitalize on the talents of these ambitious individuals to strengthen our nation." #NEW
 #a_dynamic_society_desc: "Our lands are home for the brave. Those that look for improving their lives have a place here, and we will capitalize on the ambitions of these people to strengthen our nation." #OLD ENG
 #an_early_urbanization: "Una Prima Urbanizzazione" #OLD ITA
 an_early_urbanization: "Early Urbanization" #NEW
 #an_early_urbanization: "An Early Urbanization" #OLD ENG
 #an_early_urbanization_desc: "I Paesi Bassi hanno tradizionalmente un forte tasso di urbanizzazione, che ci ha permesso di raggiungere risultati superiori alle aspettative. Dovremmo approfittare di questa tendenza e aumentarla, creando una forte rete di insediamenti che contribuirà a un futuro più ricco." #OLD ITA
 an_early_urbanization_desc: "The Low Countries have traditionally had a high rate of urbanization, which has allowed us to achieve power beyond what most might expect. We should accelerate this trend by creating a robust network of prosperous settlements that can help us create a wealthier future." #NEW
 #an_early_urbanization_desc: "The Low Countries have traditionally had a strong urbanization rate that has allowed us to punch higher than expected. We should take advantage of this trend and increase it, creating a strong network of settlements that will contribute to a wealthier future." #OLD ENG

 polders_advance: "I Bacini Idrografici"
 #polders_advance_desc: "I Paesi Bassi sono altamente suscettibili alle inondazioni e, durante il clima instabile dei secoli XI-XIV, si verificarono molteplici inondazioni che portarono alla creazione dello Zuiderzee e alla salatura del suolo delle zone costiere. Oggi disponiamo della tecnologia per bonificare i terreni, consentendo un'agricoltura più produttiva." #OLD ITA
 polders_advance_desc: "The Low Countries are highly susceptible to flooding, and the many disastrous floods that happened between the 11th and 14th centuries led to the creation of the Zuiderzee. This excessive flooding also caused coastal soils to become uselessly salinated. Thankfully, we now have the technology to reclaim this damaged land and use it productively for agriculture." #NEW
 #polders_advance_desc: "The Low Countries are highly susceptible to flooding, and in the unsettled weather of the 11th — 14th centuries, there were multiple floods leading to the creation of the Zuiderzee and salting the soil of coastal areas. We now have the technology to reclaim land, allowing more productive agriculture." #OLD ENG
 #netherlandish_ship_building: "Costruzione Navale Olandese" #OLD ITA
 netherlandish_ship_building: "$NED_ADJ$ Shipbuilding" #NEW
 #netherlandish_ship_building: "Netherlandish Shipbuilding" #OLD ENG
 #netherlandish_ship_building_desc: "Poiché i Paesi Bassi hanno alcune delle più grandi città portuali d'Europa, è giusto che abbiano alcuni dei più grandi cantieri navali d'Europa. La possibilità di utilizzare artigiani locali riduce drasticamente i costi di acquisizione di nuove flotte mercantili." #OLD ITA
 netherlandish_ship_building_desc: "As the Low Countries are home to some of $europe$'s greatest port cities, it is only fitting that they should also boast some of $europe$'s greatest shipyards. Being able to employ skilled local craftsmen dramatically reduces the costs of acquiring new merchant fleets." #NEW
 #netherlandish_ship_building_desc: "As the Low Countries have some of Europe's greatest port cities, it is only fitting that they should have some of Europe's greatest shipyards. Being able to use local craftsmen dramatically reduces the costs of acquiring new merchant fleets." #OLD ENG

 #Netherlandish Unique
 brb_the_four_quartiers: "I Quattro Quartieri"
 #brb_the_four_quartiers_desc: "I Quattro Quartieri sono le quattro province in cui è diviso il nucleo del Ducato di Brabante. Ogni quartiere è formato da un satellite di città grandi e piccole, alcune murate, altre no. Tutti lavorano in perfetta sinergia come un motore ben lubrificato, riempiendo le nostre casse di grandi ricchezze." #OLD ITA
 brb_the_four_quartiers_desc: "The Four Quartiers are the four provinces into which the core of $BRA$ is divided. Each quartier is formed by a satellite of large and smaller towns, some walled and others not. They all work in perfect synergy like a well-greased engine, filling our coffers with great riches." #NEW
 #brb_the_four_quartiers_desc: "The Four Quartiers are the four provinces in which the core of the Duchy of Brabant is divided. Each quartier is formed by a satellite of big and smaller towns, some walled, others not. They all work in perfect synergy like a well-greased engine, filling our coffers with great riches." #OLD ENG
 #fla_cloth: "Tessuto Fiammingo" #OLD ITA
 fla_cloth: "$FLA_ADJ$ $cloth$" #NEW
 #fla_cloth: "Flemish Cloth" #OLD ENG
 #fla_cloth_desc: "L'industria tessile fiamminga è invidiata da tutto il mondo. I mercanti vengono da lontano per vendere la loro lana nelle Fiandre, dove produciamo tessuti della migliore qualità." #OLD ITA
 fla_cloth_desc: "The $FLA_ADJ$ $cloth$ industry is the envy of the world. Merchants come from far away to sell their $wool$ in $FLA$, where we manufacture the best quality $cloth$." #NEW
 #fla_cloth_desc: "The Flemish cloth industry is the envy of the world. Merchants come from far away to sell their wool in Flanders, where we manufacture the best quality cloth." #OLD ENG
 frisian_trading_traditions: "Tradizioni del Commercio"
 #frisian_trading_traditions_desc: "Prima della formazione delle contee a sud di noi, che stanno iniziando a viaggiare verso altre nazioni per commerciare, i nostri antenati avevano delle rotte commerciali che coprivano tutte le coste dell'Europa, dal Baltico al Golfo di Biscaglia. Ora, questa antica conoscenza deve essere utilizzata più che mai." #OLD ITA
 frisian_trading_traditions_desc: "Long before the counties south of us developed their own routes, our ancestors dominated coastal trade in $europe$, from the Baltic to Biscay. We must revive this ancient maritime expertise to reclaim our rightful position." #NEW
 #frisian_trading_traditions_desc: "Before the formation of the counties to the south of us that are starting to travel to other nations to trade, our ancestors had trade routes that covered all the coasts in Europe, from the Baltic to the Gulf of Biscay. Now, this ancient knowledge needs to be used more than ever." #OLD ENG
 gel_warring_spirit: "Uno Spirito in Guerra"
 #gel_warring_spirit_desc: "Alcuni dicono che siamo troppo bellicosi, ma la realtà è che temono la nostra forza. Un esercito addestrato è uno dei primi passi verso il successo in questo mondo caotico. Coloro che si oppongono a noi conosceranno il nostro spirito temprato." #OLD ITA
 gel_warring_spirit_desc: "Some may call us bellicose, but that is only because they fear our might. A well-trained standing army is essential for survival in this chaotic age. Our adversaries will soon learn to respect our hardened spirit." #NEW
 #gel_warring_spirit_desc: "Some say that we are too bellicose, but the reality is that they fear our might. A trained army is one of the first steps towards success in this chaotic world. Those that oppose us will know of our hardened spirit." #OLD ENG
 hai_expert_embassadors: "Ambasciatori Esperti"
 #hai_expert_embassadors_desc: "I nostri governanti sono sempre stati abili con le parole che usano, e questo ci ha aiutato a espandere l'influenza della nostra nazione oltre i nostri confini. Con il passare del tempo, diventa sempre più evidente la necessità di stringere amicizie per proteggerci dai nostri nemici o per estendere ulteriormente i nostri tentacoli su altre nazioni." #OLD ITA
 hai_expert_embassadors_desc: "Our rulers have always been skillful with their words, and their diplomatic acumen has established their influence far beyond our national borders. As time goes on and geopolitical pressures intensify, we must start cultivating friendship with other nations for protection while expanding our sphere of influence." #NEW
 #hai_expert_embassadors_desc: "Our rulers have always been skillful with the words they use, and that has helped us expand the influence of our nation over our borders. As time goes on, the need to make friends to protect ourselves from our enemies or further extend our tentacles over other nations becomes more obvious." #OLD ENG
 hol_sailors: "Marinai Hollander"
 #hol_sailors_desc: "Essendo una terra di sabbie e terreni alluvionali, gli olandesi hanno guardato al mare come a una seconda casa naturale, dove pesci e gloria attendono coloro che sono abbastanza coraggiosi da inseguirli." #OLD ITA
 hol_sailors_desc: "A land of sands and flooded terrain, the people of $HOL$ have always looked at the sea as their natural second home, where bountiful resources and glorious adventures await those brave enough to pursue them." #NEW
 #hol_sailors_desc: "As a land of sands and flooding terrains, the Hollanders have looked at the sea as a natural second home, where fish and glory await those brave enough to pursue them." #OLD ENG
 lie_athens_north: "Atene del Nord"
 #lie_athens_north_desc: "Liegi è stata un centro di cultura per secoli, ha cresciuto alcuni degli studiosi più istruiti della regione e ha suscitato l'invidia dei nostri rivali. Le nostre istituzioni non dovrebbero mai smettere di migliorarsi." #OLD ITA
 lie_athens_north_desc: "$liege$ has been a cultural center for centuries, the home of the most celebrated scholars in the region and the envy of our rivals. But we shall not allow ourselves to become complacent; we shall never stop improving our institutions." #NEW
 #lie_athens_north_desc: "Liège has been a center of culture for centuries, raising some of the most educated scholars in the region and being the envy of our rivals. Our institutions should never stop improving themselves." #OLD ENG
 lux_destined_rule: "Destinato a Governare"
 #lux_destined_rule_desc: "La grande dinastia del Lussemburgo ha preso il nome dalla nostra grande nazione e ora è la famiglia più importante d'Europa. Questo deve essere un segno del Cielo e noi useremo questo dono divino per estendere ulteriormente la nostra influenza." #OLD ITA
 lux_destined_rule_desc: "The great Luxembourg dynasty, whose very name is derived from that of our nation, is now the most important family in $europe$. This has to be a sign from Heaven, and we will use this divine benediction to further extend our influence." #NEW
 #lux_destined_rule_desc: "The great Luxembourg dynasty took its name from our great nation and is now the most important family in Europe. This has to be a sign from Heaven, and we will use this divine gift to further extend our influence." #OLD ENG
 utr_city_churches: "La Città delle Chiese"
 #utr_city_churches_desc: "Utrecht, spesso chiamata la #italic Città delle Chiese#! per i suoi numerosi campanili, ospita l'iconica Torre Dom. Centro spirituale dei Paesi Bassi e sede del Vescovado di Utrecht, è stata un faro di luce fin dall'antichità." #OLD ITA
 utr_city_churches_desc: "$utrecht$, often called the #italic City of Churches#!, is home to the iconic Dom Tower. The spiritual center of $common_string_prefix_article$ $NED$ and the seat of the Bishopric of Utrecht, it has been a beacon of faith since antiquity." #NEW
 #utr_city_churches_desc: "Utrecht, often called the #italic City of Churches#! for its many church towers, is home to the iconic Dom Tower. Serving as the spiritual center of the Netherlands and as the seat of the Bishopric of Utrecht, it has been a beacon of light since Antiquity." #OLD ENG
 #brb_brabantine_rights: "Diritti Brabantini" #OLD ITA
 brb_brabantine_rights: "$BRB_ADJ$ Rights" #NEW
 #brb_brabantine_rights: "Brabantine Rights" #OLD ENG
 #brb_brabantine_rights_desc: "Alla maniera di altre nazioni, è giunto il momento di codificare le libertà dei nostri sudditi, affinché possano godere di una vita più prospera al servizio della nostra grande nazione." #OLD ITA
 brb_brabantine_rights_desc: "As other nations have, it is time to codify the liberties of our subjects, in order to identify and safeguard their rights and motivate them to continue working towards a better future for our country." #NEW
 #brb_brabantine_rights_desc: "In the fashion of other nations, it is time to codify the liberties of our subjects so that they can enjoy a more prosperous life in the service of our great nation." #OLD ENG
 #fla_flemish_renaissance: "Rinascimento Fiammingo" #OLD ITA
 fla_flemish_renaissance: "$FLA_ADJ$ $renaissance$" #NEW
 #fla_flemish_renaissance: "Flemish Renaissance" #OLD ENG
 #fla_flemish_renaissance_desc: "Essendo una delle terre più sviluppate del continente, è naturale che la ricchezza creata con il sudore venga alla fine dedicata alla creazione di cose meno pratiche, come l'arte. Quest'arte, tuttavia, getta luce sui giorni nuvolosi della nostra patria. Con decine di mercanti fiamminghi che fungono da mecenati, l'offerta di artisti non può smettere di crescere." #OLD ITA
 fla_flemish_renaissance_desc: "As one of the most prosperous regions on the continents, much of the wealth we have created naturally flows toward artistic patronage. $FLA_ADJ$ merchants commission master painters to create art that, while perhaps not practical, casts light over even the cloudiest of days. With dozens of our merchants actively hiring artists and commissioning new pieces, we are creating a distinctive $renaissance$ of our own." #NEW
 #fla_flemish_renaissance_desc: "As one of the most developed lands on the continent, it is natural that the wealth created with sweat is eventually devoted to the creation of less practical things, such as art. This art, however, casts light on the cloudy days of our homeland. With dozens of Flemish merchants acting as patrons, the offer of artists cannot stop growing." #OLD ENG
 frisian_resisting_invader: "Resistere all'Invasore"
 #frisian_resisting_invader_desc: "Circondato da nemici, il nostro popolo è abituato a difendere le proprie terre con aggressività, per far sì che gli invasori si ritirino e non tornino più. Con il loro sangue, la nostra terra si arricchisce!" #OLD ITA
 frisian_resisting_invader_desc: "Surrounded as we are by enemies, our people are accustomed to aggressively defending their lands, fighting so fiercely that many would-be invaders turn tail and never return. Those who cannot escape us can take comfort in the thought that their blood shall nurture the $FRI$ soil." #NEW
 #frisian_resisting_invader_desc: "Surrounded by enemies, our people are accustomed to defending their lands with aggression to make invaders retreat and never return. With their blood, our soil only gets richer!" #OLD ENG
 gel_healthy_economy: "Un'Economia Sana"
 #gel_healthy_economy_desc: "Il nostro regno non solo si è espanso a colpi di spada, ma è stato anche attento al denaro e ai risparmi, permettendoci di acquistare influenza su altri territori o di acquistarli direttamente. Dovremmo continuare questa tendenza, gestendo il nostro budget con saggezza." #OLD ITA
 gel_healthy_economy_desc: "We have expanded our borders not only by the sword, but through careful financial planning, which allowed us to purchase influence over desirable territories — or to buy them outright. With continued wise budget management, this economic trend should be sustainable." #NEW
 #gel_healthy_economy_desc: "Our realm has not only expanded by the sword, but it has also been careful with its money and savings, allowing us to buy influence over other territories or directly purchase them. We should continue this trend, managing our budget wisely." #OLD ENG
 hai_frontier_march: "Una Marcia di Frontiera"
 #hai_frontier_march_desc: "Essendo ai margini dell'Impero, l'Hainaut ha sviluppato uno spirito di frontiera che è evidente a chiunque presti attenzione. Questo spirito conferisce alle nostre terre una mentalità difensiva che possiamo sfruttare a nostro vantaggio." #OLD ITA
 hai_frontier_march_desc: "As a border province of the $hre$, $HAI$ has developed a rough-and-ready spirit, born from centuries of frontier conflict. This spirit makes our people naturally inclined towards taking defensive action, which we can exploit to our benefit." #NEW
 #hai_frontier_march_desc: "Being at the fringes of the Empire, Hainaut has developed a borderland spirit that is obvious to anyone paying attention. This spirit gives our lands a defensive mentality that we can exploit to our benefit." #OLD ENG
 hol_maritime_warfare: "Guerra Marittima"
 #hol_maritime_warfare_desc: "In quanto nazione marittima, i nostri marinai sono abituati a combattere, sia contro i rivali che contro i pirati che tentano di rubare le nostre ricchezze. In ogni caso, la nostra marina deve essere pronta ad affrontare qualsiasi nemico in qualsiasi momento." #OLD ITA
 hol_maritime_warfare_desc: "As a maritime nation, our sailors are accustomed to naval combat, whether against members of rival nations or pirates attempting to plunder our trading vessels. In any case, our navy must be prepared to face any enemy at any time." #NEW
 #hol_maritime_warfare_desc: "As a maritime nation, our sailors are accustomed to combat, whether against rivals or pirates attempting to steal our wealth. In any case, our navy must be prepared to face any enemy at any time." #OLD ENG
 lie_devoted_land: "Una Terra Devota"
 #lie_devoted_land_desc: "Facendo parte di una delle più grandi diocesi dell'area, la devozione della nostra gente è fuori discussione. Mostreremo al mondo che la nostra fede in Dio è forte quanto la fede nella nostra nazione." #OLD ITA
 lie_devoted_land_desc: "As part of one of the biggest dioceses in the area, there is no doubt as to the depth of devotion our people hold. We will show the world that our faith in God is as strong as our faith in our nation." #NEW
 #lie_devoted_land_desc: "As part of one of the biggest dioceses in the area, the devotion of our people is beyond any doubt. We will show the world that our faith in God is as strong as our faith in our nation." #OLD ENG
 #lux_fortress_europe: "La Fortezza d'Europa" #OLD ITA
 lux_fortress_europe: "The Fortress of $europe$" #NEW
 #lux_fortress_europe: "The Fortress of Europe" #OLD ENG
 #lux_fortress_europe_desc: "La posizione inespugnabile della città di Lussemburgo, con la formazione naturale del Bock come fortezza naturale, rende la nostra posizione molto forte. I nostri nemici periranno nel tentativo di conquistare le nostre posizioni. Impareremo dalla natura e faremo in modo che tutte le nostre fortezze sfruttino le formazioni terrestri a loro vantaggio." #OLD ITA
 lux_fortress_europe_desc: "The impregnable position of $LUX$, with the formation of the Bock acting as a natural fortress, is incredibly strong. Our enemies would perish in any attempt to usurp our holdings. We shall learn from nature, and construct all our fortresses so as to use the local terrain to their advantage." #NEW
 #lux_fortress_europe_desc: "The impregnable position of the city of Luxembourg, with the natural formation of the Bock as a natural fortress, makes our position very strong. Our enemies will perish in the attempt to take our positions. We shall learn from nature and make all our fortresses use land formations to their advantage." #OLD ENG
 utr_blessed_land: "Una Terra Benedetta"
 #utr_blessed_land_desc: "Il Papa stesso influenza l'elezione del nostro Principe Vescovo, sfidando la tradizionale elezione a cinque capitoli che avevamo prima. Questa è la prova evidente che la nostra terra è benedetta." #OLD ITA
 utr_blessed_land_desc: "The Pope himself influences the election of our Prince-Bishop, challenging the traditional five-chapter election format that we had before. This is clear proof that our land has been divinely blessed!" #NEW
 #utr_blessed_land_desc: "The Pope himself influences the election of our Prince-Bishop, challenging the traditional five-chapter election that we had before. This is clear proof that our land is blessed." #OLD ENG
 brb_land_culture: "Una Terra di Cultura"
 #brb_land_culture_desc: "Con la fondazione dell'Università di Lovanio, il Brabante si pone al centro della cultura dei Paesi Bassi. Studenti da tutta Europa vengono nelle nostre terre per imparare e condividere le loro conoscenze." #OLD ITA
 brb_land_culture_desc: "With the foundation of the University of $leuven$, $BRA$ has placed itself firmly at the center of culture in $common_string_prefix_article$ $NED$. Students from all over $europe$ come to our lands to study and share their knowledge." #NEW
 #brb_land_culture_desc: "With the foundation of the University of Leuven, Brabant puts itself in the center of culture in the Netherlands. Students from all over Europe come to our lands to learn and share their knowledge." #OLD ENG
 fla_prospering_agriculture: "Agricoltura Prospera"
 #fla_prospering_agriculture_desc: "Quando i nostri concorrenti iniziano a sfidare le nostre industrie dedicate ai tessuti, ai lussi o alle finanze, diventa evidente la necessità di utilizzare meglio i nostri beni fondiari. Con una preparazione adeguata, la nostra terra può diventare un granaio regionale, diversificando ulteriormente la nostra economia." #OLD ITA
 fla_prospering_agriculture_desc: "As our cloth, luxury goods, and financial industries face growing competition, it is becoming obvious that we need to manage our land use better. By creating regional granaries, we further diversify our economy, and bolster our food stores against famine or poor harvests." #NEW
 #fla_prospering_agriculture_desc: "As our competitors start to challenge our industries devoted to cloth, luxuries, or finances, the need to better use our land assets becomes obvious. With proper preparation, our land can become a regional granary, diversifying our economy even further." #OLD ENG
 frisian_legend_grutte_pier: "La Leggenda di Grutte Pier"
 #frisian_legend_grutte_pier_desc: "Nelle nostre terre si racconta di un pirata alto due metri e forte come un bue, che ispira molti ad andare per mare e a fare ciò che i nostri antenati sapevano fare meglio: saccheggiare le coste non sorvegliate." #OLD ITA
 frisian_legend_grutte_pier_desc: "There are stories in our lands about a pirate who was seven feet tall and strong as an ox. These tales inspire many to take to the seas and do what our ancestors did best: loot unguarded coasts." #NEW
 #frisian_legend_grutte_pier_desc: "There are stories in our lands about a pirate who was 7 feet high and strong as an ox that inspire many to go into the seas and do what our ancestors did best: loot unguarded coasts." #OLD ENG
 gel_expand_kwarteers: "Espandere i Kwarteers"
 #gel_expand_kwarteers_desc: "Come nel caso del Brabante, $GEL$ è stato tradizionalmente diviso in quattro quartieri. Questo sistema di province intorno a una città forte si è dimostrato un modo efficiente di governare la nostra nazione, e dovremmo sicuramente estendere questo sistema ad altri luoghi che si uniscono al nostro regno." #OLD ITA
 gel_expand_kwarteers_desc: "As in the case of $BRA$, $GEL$ has traditionally been divided into four quarters. This system of provinces arranged around a strong central city has proven to be an efficient way to govern our nation, and we should apply this system to new regions that join our realm in the future." #NEW
 #gel_expand_kwarteers_desc: "As in the case of Brabant, $GEL$ has been traditionally divided into four quarters. This system of provinces around a strong city has proven to be an efficient way to govern our nation, and we should definitely expand this system to other places that join our realm." #OLD ENG
 hai_bustling_towns: "Città Vivaci"
 #hai_bustling_towns_desc: "I nostri insediamenti urbani sono pieni di vita e di potenziale. Con una piccola spinta, possiamo rendere questi insediamenti e il loro hinterland incredibilmente ricchi, in modo da poterli tassare bene." #OLD ITA
 hai_bustling_towns_desc: "Our lively urban settlements are full of potential. With just a little effort, we can make them and their hinterlands incredibly wealthy, allowing us to thoroughly tax them." #NEW
 #hai_bustling_towns_desc: "Our urban settlements are full of life and potential. With just a small push, we can make them and their hinterland incredibly wealthy so that we can tax them well." #OLD ENG
 hol_trading_spirit: "Spirito di Commercio"
 #hol_trading_spirit_desc: "Il nostro Paese è circondato dal mare, quindi è naturale per noi affrontare queste onde alla ricerca di porti con cui commerciare e arricchirci." #OLD ITA
 hol_trading_spirit_desc: "Our country is surrounded by the sea, so it is only natural that we would brave the roiling waves in search of trading ports and enriching goods to bring back." #NEW
 #hol_trading_spirit_desc: "Our country is surrounded by the sea, so it is natural for us to face these waves in search of ports to trade with and enrich ourselves." #OLD ENG
 lie_inspiring_mecenas: "Una Mecenate Ispiratrice"
 #lie_inspiring_mecenas_desc: "La nostra terra è un'ispirazione per molti artisti che vengono nelle nostre terre per lavorare alle loro opere d'arte. Il denaro proveniente dalle nostre arche non sarà mai risparmiato per nutrire i nostri artisti e attirarne di nuovi." #OLD ITA
 lie_inspiring_mecenas_desc: "Our nation inspires artists from across $europe$, who come here to create their masterworks. We will spare no expense to support these artists and attract new talent, establishing ourselves as a hub of arts and culture." #NEW
 #lie_inspiring_mecenas_desc: "Our land is an inspiration for many artists who come to our lands to work on their works of art. Money from our arks will never be spared to feed our artists and attract new ones." #OLD ENG
 lux_heirs_john_blind: "Eredi di Giovanni il Cieco"
 #lux_heirs_john_blind_desc: "Giovanni il Cieco, Re di Boemia e Conte di Lussemburgo, nacque nel nostro umile regno e morì nella Battaglia di Crécy all'età di 50 anni, dopo aver caricato in battaglia mentre era cieco: una morte onorevole e coraggiosa che ispirerà i nostri soldati per secoli. Un vero eroe del nostro popolo." #OLD ITA
 lux_heirs_john_blind_desc: "John the Blind, the heroic King of $BOH$ and Count of $LUX$, was born in our humble realm. He died in the Battle of Crécy at fifty, having charged headlong into combat despite his blindness. His brave, honorable death will inspire our soldiers for centuries." #NEW
 #lux_heirs_john_blind_desc: "John the Blind, King of Bohemia and Count of Luxembourg, was born in our humble realm and died at the Battle of Crécy at the age of 50 after charging into the battle while being blind: an honorable and brave death that will inspire our soldiers for centuries. A true hero of our people." #OLD ENG
 utr_skilled_diplomats: "Diplomatici Esperti"
 #utr_skilled_diplomats_desc: "Con la crescente influenza dei nostri vicini, la sopravvivenza della nostra nazione dipende dalla nostra capacità di avere alleati potenti e leali che ci sosterranno nei momenti di bisogno." #OLD ITA
 utr_skilled_diplomats_desc: "Given the growing influence of our neighbors, our nation's survival depends on our ability to find loyal, powerful allies who will support us in our times of need." #NEW
 #utr_skilled_diplomats_desc: "With the growing influence of our neighbors, the survival of our nation depends on our ability to get powerful and loyal allies who will support us in our times of need." #OLD ENG

 golden_fleece: "L'Ordine del Toson d'Oro"
 #golden_fleece_desc: "L'ordine sarebbe diventato uno dei principali ordini cavallereschi d'Europa. Essere un Cavaliere del Toson d'Oro è un segno di grande status e si riflette bene su di noi." #OLD ITA
 golden_fleece_desc: "One of $europe$'s foremost chivalric orders. Being a Knight of the Golden Fleece is a mark of great status, and reflects well upon us." #NEW
 #golden_fleece_desc: "The order would go on to become one of Europe's foremost orders of chivalry. Being a Knight of the Golden Fleece is a mark of great status and reflects well upon us." #OLD ENG



 wagenburg: "Wagenburg"
 #wagenburg_desc: "Durante le guerre hussite, i nostri eserciti si affidavano ai forti di carri, che ci permettevano di vincere battaglie che avremmo dovuto perdere. Anche se non useremo sempre i carri, l'uso di tiratori scelti di fanteria da posizioni difensive diventerà la tattica di scelta per i nostri sempre invincibili eserciti cechi." #OLD ITA
 wagenburg_desc: "During the Hussite Wars, our armies relied on wagon forts called #italic Wagenburg#! to win battles against superior forces. While we may not always deploy wagons, the principle remains: infantry sharpshooters fighting from prepared defensive positions become our standard doctrine." #NEW
 #wagenburg_desc: "During the Hussite wars our armies relied on wagon forts, which would allow us to win battles we should have lost. Although we may not always use wagons, using infantry sharpshooters from defensive positions will become the tactic of choice for our ever-invincible Czech armies." #OLD ENG
 hussite_traditions: "Tradizioni $hussite_ADJ$"
 #hussite_traditions_desc: "Grazie alla lotta e alla fratellanza, la nostra fede resiste alle pressioni esterne per la conversione. Le nostre radici incrollabili, derivanti da antichi insegnamenti religiosi, risuonano nel cuore di tutti coloro che cercano di proteggere la loro fede e di vivere in pace accanto ai loro compagni cristiani." #OLD ITA
 hussite_traditions_desc: "Through struggle and brotherhood, the adherents of our faith withstand all external conversion pressures. Our unshaken religious roots, stemming from ancient teachings, ring true to the hearts of all those who seek to protect their beliefs and live in peace alongside their fellow 4christian_ADJ$ faithful." #NEW
 #hussite_traditions_desc: "Through sheer struggle and brotherhood our faith withstands the external pressures for conversion. Our unshaken roots, stemming from old religious teachings, ring true to the hearts of all those who seek to protect their faith and live in peace alongside their fellow Christians." #OLD ENG
 kutnohorian_deal: "L'Accordo di Kutnohorian"
 #kutnohorian_deal_desc: "La nobiltà rimarrà sempre sensibile alle sue prerogative, quindi dobbiamo garantire che i suoi privilegi siano garantiti per sempre." #OLD ITA
 kutnohorian_deal_desc: "The nobility will always be rather sensitive about protecting their privileges. It would go far towards winning their loyalty if said privileges were to be guaranteed forever." #NEW
 #kutnohorian_deal_desc: "The nobility will always remain sensitive regarding their prerogatives, so we need to guarantee that their privileges are guaranteed forever." #OLD ENG
 #bohemian_thaler: "Bohemien Thaler" #OLD ITA
 bohemian_thaler: "$BOH_ADJ$ Thaler" #NEW
 #bohemian_thaler: "Bohemian Thaler" #OLD ENG
 #bohemian_thaler_desc: "Per anni, la moneta standard del nostro Paese è stata il groschen, una moneta d'argento utilizzata in tutto il Sacro Romano Impero. La scoperta di nuove fonti di argento ci permette di creare un altro tipo di moneta più grande, il tallero, chiamato anche toll o daler, che diventerà abbastanza forte e influente da dominare tutti gli scambi commerciali e diventare un nuovo standard." #OLD ITA
 bohemian_thaler_desc: "For years, the standard currency in our country has been the #italic groschen#!, a coin made of silver and used all throughout the $hre$. The discovery of new sources of silver allows us to create another kind of bigger coin, the #italic thaler#!, also called 'toler' or 'daler', which will become strong and influential enough to dominate all trade and become a new standard." #NEW
 #bohemian_thaler_desc: "For years, the standard currency in our country has been the groschen, a coin made of silver and used all throughout the Holy Roman Empire. The discovery of new sources of silver allows us to create another kind of bigger coin, the thaler, also called toler or daler, which will become strong and influential enough to dominate all trade and become a new standard." #OLD ENG
 fortified_towns: "Città Fortificate"
 #fortified_towns_desc: "Attraverso le devastazioni delle $hussite_wars$ e nel tentativo di salvaguardare la nostra fede e il nostro popolo, abbiamo finanziato molte città fortificate. Da allora, abbiamo acquisito una grande esperienza nell'erigere fortificazioni e nel progettare difese impenetrabili." #OLD ITA
 fortified_towns_desc: "Through the ravages of the $hussite_wars$, and in an effort to safeguard our faith and people, we funded many fortified towns. Since then, we have gained great expertise in erecting fortifications and engineering impenetrable defenses." #NEW
 #fortified_towns_desc: "Through the ravages of the $hussite_wars$ and in an effort to safeguard our faith and people we funded many fortified towns. Since then, we have gained great expertise in erecting fortifications and engineering impenetrable defenses." #OLD ENG

 maori_ta_moko_advance: "Tā Moko"
 maori_ta_moko_advance_desc: "Con le curve e le spirali intricate di #italic Tā Moko#!, incidiamo ritualisticamente il pigmento nella nostra stessa pelle, trasformando il nostro corpo in arazzi viventi di onore e storia."
 maori_ceremonial_haka_advance: "Haka Cerimoniale"
 #maori_ceremonial_haka_advance_desc: "La terra trema quando i nostri guerrieri eseguono la #italic Haka#!, le loro grida feroci e i loro movimenti sincronizzati riecheggiano sul campo di battaglia. Questa intimidatoria danza di guerra cerimoniale rafforza il cuore di ogni guerriero, garantendo una significativa spinta al morale delle forze di terra." #OLD ITA
 maori_ceremonial_haka_advance_desc: "The ground shakes as our warriors perform the #italic Haka#!, their fierce cries and synchronized movements echoing across the battlefield. This intimidating ceremonial war dance emboldens the heart of every warrior, granting a significant morale boost to land forces." #NEW
 #maori_ceremonial_haka_advance_desc: "The ground shakes as our warriors perform the #italic Haka#!, their fierce cries and synchronized movements echoing across the battlefield. This intimidating ceremonial war dance emboldens the heart of every warrior, granting a significant morale boost to the land forces." #OLD ENG
 maori_whakapapa_advance: "Whakapapa"
 maori_whakapapa_advance_desc: "La forza e l'unità derivano dalla conoscenza del proprio #italic Whakapapa#!, l'intricata rete di connessioni genealogiche che lega un #italic iwi#!. Questa profonda comprensione dell'ascendenza collettiva favorisce un fronte unito contro tutte le avversità."
 maori_te_reo_advance: "Te Reo"
 maori_te_reo_advance_desc: "Sappiamo che preservando e coltivando #italic Te Reo#!, la nostra lingua sacra, manteniamo un legame vibrante con la nostra cultura e le nostre tradizioni."
 maori_rua_kumara_advance: "Rua Kūmara"
 #maori_rua_kumara_advance_desc: "Perfezionando l'arte di coltivare e conservare i tuberi #italic di kūmara#! in #italic rua#! (fosse di stoccaggio) appositamente costruite, possiamo assicurarci di riempire la pancia anche negli inverni più rigidi." #OLD ITA
 maori_rua_kumara_advance_desc: "By perfecting the art of growing and storing #italic kūmara#! tubers in specially-constructed #italic rua#!, or storage pits, we can ensure that our bellies are filled even in the harshest of winters." #NEW
 #maori_rua_kumara_advance_desc: "By perfecting the art of growing and storing #italic kūmara#! tubers in specially-constructed #italic rua#! (storage pits), we can ensure that our bellies are filled even in the harshest of winters." #OLD ENG
 maori_he_whakaputanga_advance: "Lui Whakaputanga"
 #maori_he_whakaputanga_advance_desc: "La cosiddetta 'Dichiarazione di Indipendenza della Nuova Zelanda' è un documento che stabilisce una volta per tutte uno Stato Māori unificato e indipendente. Con la formulazione pienamente compresa da tutte le parti, i nostri capi possono finalmente unirsi ed essere liberi da interferenze straniere." #OLD ITA
 maori_he_whakaputanga_advance_desc: "The so-called 'Declaration of the Independence of New Zealand' is a document that once and for all establishes a unified $maori_culture$ state that is independent. With the wording fully understood by all sides, our chieftains may finally unite, and be free from foreign interference." #NEW
 #maori_he_whakaputanga_advance_desc: "The so-called 'Declaration of the Independence of New Zealand' is a document that once and for all establishes a unified Māori state that is independent. With the wording fully understood by all sides, our chieftains may finally unite, and be free from foreign interference." #OLD ENG
 
 #Ethiopia
 the_ark_of_the_covenant: "L'Arca dell'Alleanza"
 #the_ark_of_the_covenant_desc: "Siamo l'unica nazione a custodire la sacra Arca dell'Alleanza, dopo che fu portata in segreto da Menelik I con l'assistenza divina migliaia di anni fa. È nascosta alla vista del pubblico, per evitare che tentino di rubare il nostro sacro tesoro nazionale. Le repliche dell'Arca sono collocate in tutte le nostre chiese, per ricordare che il nostro governo è benedetto da Dio." #OLD ITA
 the_ark_of_the_covenant_desc: "We are the only nation to house the sacred Ark of the Covenant after it was secretly taken by Menelik I with divine assistance thousands of years ago. It is hidden away from public view, lest someone attempt to steal our sacred national treasure. Replicas of the Ark are placed in every single one of our churches as a reminder that our rule is blessed by God." #NEW
 #the_ark_of_the_covenant_desc: "We are the only nation to house the sacred Ark of the Covenant after it was taken in secret by Menelik I with divine assistance thousands of years ago. It is hidden away from public view, lest they would attempt to steal our sacred, national treasure. Replicas of the Ark are placed in every single one of our churches as a reminder that our rule is blessed by God." #OLD ENG
 #roof_of_africa: "Il Tetto dell'Africa" #OLD ITA
 roof_of_africa: "The Roof of $africa$" #NEW
 #roof_of_africa: "The Roof of Africa" #OLD ENG
 roof_of_africa_desc: "Il nostro popolo abita gli altopiani da generazioni, sopportando condizioni estreme che ci hanno reso resistenti e forti. Questo ci dà un vantaggio significativo sui nostri nemici ogni volta che entriamo in conflitto."
 #solomonid_claim: "Rivendicazione di Solomonid" #OLD ITA
 solomonid_claim: "$solomonid_dynasty$ Dynastic Claim" #NEW
 #solomonid_claim: "Solomonid Claim" #OLD ENG
 #solomonid_claim_desc: "Gli antenati dei nostri governanti discendono dai monarchi di Axum, dalla linea di sangue di Re Salomone e della Regina di Saba. Abbiamo deposto i monarchi Zagwe per legittimare il nostro governo e stabilire con fermezza che il regno venga restituito alla sua legittima dinastia." #OLD ITA
 solomonid_claim_desc: "Our rulers' forefathers are descended from the monarchs of Aksum; from the bloodlines of King Solomon and the Queen of Sheba. We have deposed the $zagwe_dynasty$ monarchs in order to legitimize our rule and firmly establish the kingdom being restored to its rightful dynasty." #NEW
 #solomonid_claim_desc: "Our rulers' forefathers are descended from the monarchs of Axum, from the bloodline of King Solomon and the Queen of Sheba. We have deposed the Zagwe monarchs in order to legitimize our rule and firmly establish the kingdom being restored to its rightful dynasty." #OLD ENG
 nagusa_negast: "Nəgusä Nägäst"
 #nagusa_negast_desc: "Il nostro sovrano è il re di tutti i re, l'erede del pedigree dei re di Aksum insieme a quello del primo sovrano, Menelik I, figlio di Re Salomone e della Regina di Saba. Tutti i nostri re discendono dai Salomonidi e la linea di eredità non deve essere necessariamente di padre in figlio." #OLD ITA
 nagusa_negast_desc: "Our ruler is the king of all kings; the heir to the pedigree of the kings of Aksum along with that of the first ruler, Menelik I, the son of King Solomon and the Queen of Sheba. All of our kings are descended from the $solomonid_dynasty$ dynasty, and the line of inheritance need not be from father to son." #NEW
 #nagusa_negast_desc: "Our ruler is the king of all kings, the heir of the pedigree of the kings of Aksum along with that of the first ruler, Menelik I, the son of King Solomon and the Queen of Sheba. All of our kings are descended from the Solomonids and the line of inheritance need not be from father to son." #OLD ENG
 a_permanent_capital: "Una Capitale Permanente"
 a_permanent_capital_desc: "Per secoli, la nostra nazione è stata priva di una capitale permanente, con la corte che seguiva i governanti ovunque desiderassero. Sebbene questo approccio abbia i suoi vantaggi, per governare efficacemente la nostra vasta nazione dobbiamo stabilire una forte autorità centrale in una sede permanente adeguata."
 external_friends: "Amici Esterni"
 #external_friends_desc: "I nostri inviati a $rome$ e $iberia_region$, alla ricerca di un sostegno militare, hanno avuto un certo successo, in quanto ci hanno messo sulla mappa. Questi sforzi non dovrebbero mai fermarsi." #OLD ITA
 external_friends_desc: "Our envoys to $rome$ and $iberia_region$, looking for military support, were quite successful — in fact, they put us on the map. These endeavors to find allies should continue." #NEW
 #external_friends_desc: "Our envoys to $rome$ and $iberia_region$, looking for military support, were quite successful as they put us on the map. These endeavors should never stop." #OLD ENG
 eternal_crusade: "Una Crociata Eterna"
 eternal_crusade_desc: "Come nazione $christian_ADJ$, ci troviamo circondati da avversari $muslim_ADJ$ che colgono ogni opportunità per attaccarci. Per garantire la nostra sopravvivenza, dobbiamo essere pronti a reagire immediatamente."
 prester_john: "Prester John"
 #prester_john_desc: "Gli europei sono alla ricerca di Prester John da secoli e sono convinti che il nostro sovrano debba essere lui, in qualche modo, visto che siamo cristiani. Non c'è motivo di sottolineare che si sbagliano, perché sono felici di condividere le loro idee con noi." #OLD ITA
 prester_john_desc: "People from $europe$ have been looking for Prester John for centuries, and are convinced that our ruler has to be him, somehow, as we are fellow $christian_ADJ$ worshippers. There is no reason to point out that they are wrong, however, as they are now happy to share their ideas with us." #NEW
 #prester_john_desc: "Europeans have been looking for Prester John for centuries and are convinced that our ruler has to be him, somehow, as we are fellow Christians. There is no reason to point out that they are wrong, as they are happy to share their ideas with us." #OLD ENG
 an_iron_fist: "Un Pugno di Ferro"
 #an_iron_fist_desc: "La nostra regione è diversa per culture e religioni, e l'unica cosa che la tiene unita non è la compassione, ma un potente sovrano, capace di affrontare qualsiasi tentativo di rivolta con una rapida forza." #OLD ITA
 an_iron_fist_desc: "Our region is diverse in cultures and religions, and the only thing that keeps it united is not compassion, but a powerful ruler, capable of dealing swiftly and decisively with any attempt at revolt." #NEW
 #an_iron_fist_desc: "Our region is diverse in cultures and religions, and the only thing that keeps it united is not compassion, but a powerful ruler, capable of dealing with any attempt of revolt with swift might." #OLD ENG
 #a_true_ethiopian_church: "Una Vera Chiesa Etiope" #OLD ITA
 a_true_ethiopian_church: "A True $ETH_ADJ$ Church" #NEW
 #a_true_ethiopian_church: "A True Ethiopian Church" #OLD ENG
 #a_true_ethiopian_church_desc: "Le influenze esterne possono essere positive per alcuni aspetti, ma possono alterare la natura delle nostre credenze. Per mantenere la nostra identità, dobbiamo garantire l'esistenza della nostra Chiesa Tewahedo." #OLD ITA
 a_true_ethiopian_church_desc: "External influences have their uses, but exposure to them can alter the nature of our beliefs. In order to maintain our identity, we must secure the domestic primacy of our own Tewahedo Church." #NEW
 #a_true_ethiopian_church_desc: "External influences might be good for some aspects, but can alter the nature of our beliefs. In order to maintain our identity, we must secure the existence of our own Tewahedo Church." #OLD ENG
 #origin_of_coffee: "Origine del Caffè" #OLD ITA
 origin_of_coffee: "Origin of $coffee$" #NEW
 #origin_of_coffee: "Origin of Coffee" #OLD ENG
 #origin_of_coffee_desc: "È dalle nostre terre che proviene il caffè, poiché è il luogo ottimale. Anche se può essere coltivato in altri luoghi, il nostro è venerato per la sua qualità e viene esportato a tonnellate. Dobbiamo fare in modo che questo sia un modo per incanalare la ricchezza della nostra nazione." #OLD ITA
 origin_of_coffee_desc: "It is from our lands that $coffee$ comes, as we have the perfect growing conditions. While it can be cultivated in other places, ours is revered for its quality and exported by the ton. We have to make this a way to channel wealth into our nation." #NEW
 #origin_of_coffee_desc: "It is from our lands that the coffee comes from, as it is the optimal place. While it can be cultivated in other places, ours is revered for its quality and exported by the ton. We have to make this a way to channel richness to our nation." #OLD ENG
 a_modern_nation: "Una Nazione Moderna"
 #a_modern_nation_desc: "Nonostante il nostro apparente isolamento, siamo ben consapevoli delle innovazioni che avvengono nel mondo e non perdiamo tempo a mettere in atto queste tattiche per incutere paura ai nostri nemici." #OLD ITA
 a_modern_nation_desc: "Despite our apparent isolation, we are well aware of the innovations happening around the world, and we waste no time in implementing these modernizations in order to maintain a competitive advantage over our rivals." #NEW
 #a_modern_nation_desc: "Despite our apparent isolation, we are well aware of the innovations happening around the world, and we waste no time in implementing these tactics to instill fear in our enemies." #OLD ENG
 cawa_advance: "Reggimenti Ç̌äwa"
 #cawa_advance_desc: "I Ç̌äwa rappresentano la classe di guerrieri nobili feudali dell'Etiopia, reclutati e nominati per il servizio militare dell'Imperatore. Rappresentano una classe di soldati professionisti, rinomati per la loro ferocia." #OLD ITA
 cawa_advance_desc: "The #italic Ç̌äwa#! serve as $ETH$'s noble feudal warriors, recruited and appointed for the Emperor's army service. They are a professional soldier class, renowned for their ferocity." #NEW
 #cawa_advance_desc: "The Ç̌äwa serve as Ethiopia's feudal noble warrior class, recruited and appointed for the Emperor's army service. They represent a professional soldier class, renowned for their ferocity." #OLD ENG
 a_renaissance_cawa_advance: "$a_renaissance_cawa$"
 a_renaissance_cawa_advance_desc: "$a_renaissance_cawa_desc$"
 a_discovery_cawa_advance: "$a_discovery_cawa$"
 a_discovery_cawa_advance_desc: "$a_discovery_cawa_desc$"
 a_reformation_cawa_advance: "$a_reformation_cawa$"
 a_reformation_cawa_advance_desc: "$a_reformation_cawa_desc$"
 a_absolutism_cawa_advance: "$a_absolutism_cawa$"
 a_absolutism_cawa_advance_desc: "$a_absolutism_cawa_desc$"
 a_revolutions_cawa_advance: "$a_revolutions_cawa$"
 a_revolutions_cawa_advance_desc: "$a_revolutions_cawa_desc$"
 
 #Mali
 epic_of_sundiata: "Epopea di Sundiata"
 #epic_of_sundiata_desc: "Il sito $epic_of_sundiata$ racconta la leggendaria campagna di Sundiata Keita, fondatore dell'Impero del Mali ed eroe del nostro popolo. La sua storia viene tramandata di generazione in generazione ed è sempre stata una grande fonte di ispirazione per il nostro popolo." #OLD ITA
 epic_of_sundiata_desc: "The $epic_of_sundiata$ tells of the legendary campaign of Sundiata Keita, the founder of the $MAL_ADJ$ Empire and hero of our people. His story has passed from generation to generation, and has always been a great source of inspiration to our people." #NEW
 #epic_of_sundiata_desc: "The $epic_of_sundiata$ tells of the legendary campaign of Sundiata Keita, the founder of the Mali Empire and hero of our people. His story is passed from generation to generation and has always been a great source of inspiration to our people." #OLD ENG
 kouroukan_fouga_advance: "Kouroukan Fouga"
 #kouroukan_fouga_advance_desc: "Il $kouroukan_fouga_advance$ è la costituzione di base del Mali. Ogni aspetto della vita, dalla semplice vita familiare nei villaggi fino alla sovranità della Mansa." #OLD ITA
 kouroukan_fouga_advance_desc: "The $kouroukan_fouga_advance$ is the basic constitution of $MALI$. It covers every aspect of living, from simple family life in the villages all the way to the sovereignty of the Mansa." #NEW
 #kouroukan_fouga_advance_desc: "The $kouroukan_fouga_advance$ is the basic constitution of Mali. Every aspect of life from the simple family life in the villages all the way to the sovereignty of the Mansa." #OLD ENG
 gold_of_bure: "Oro di Bure"
 #gold_of_bure_desc: "I campi d'oro gemelli di Bambuk e Bure sono rinomati come i più grandi depositi d'oro di cui si sia mai sentito parlare, e sono i nostri. Le miniere d'oro di Bure produssero una ricchezza fantastica che notoriamente destabilizzò l'intera economia dell'Egitto attraverso l'inflazione, quando Mansa Mūsā vi fece visita. La nostra economia, tuttavia, è abituata a un afflusso costante di oro ed è più difficile da inflazionare." #OLD ITA
 gold_of_bure_desc: "The twin gold fields at Bambuk and Bure are renowned as the largest gold deposits anyone has ever heard of, and they belong to us! Bure's gold mines in particular produced fantastic wealth that famously destabilized the entire Egyptian economy through inflation when Mansa Mūsā visited there. Our economy, though, is used to a constant influx of gold, and is more difficult to inflate." #NEW
 #gold_of_bure_desc: "The twin gold fields at Bambuk and Bure are renowned as the largest gold deposits anyone has ever heard of, and they are ours. Bure's gold mines produced fantastic wealth that famously destabilized the entire economy of Egypt through inflation when Mansa Mūsā visited there. Our economy, though, is used to a constant influx of gold and is more difficult to inflate." #OLD ENG
 accounts_of_the_atlantic_voyage: "Racconti del Viaggio nell'Atlantico"
 #accounts_of_the_atlantic_voyage_desc: "Secondo la leggendaria Mansa Mūsā, il suo predecessore iniziò un viaggio attraverso il Mar Atlantico nella speranza di scoprire i limiti più remoti dell'oceano. Mentre alcuni tra la classe dirigente considerano questa impresa come una vergognosa abdicazione al proprio dovere, altri all'interno del nostro Stato la considerano una storia di ispirazione per esplorare angoli del mondo sconosciuti all'uomo." #OLD ITA
 accounts_of_the_atlantic_voyage_desc: "According to the legendary Mansa Mūsā, his predecessor started a journey across the $atlantic_ocean_continent$ in hopes of discovering the furthest limits of the ocean. While some among the ruling class consider this endeavor a shameful abdication of duty, others see this as inspiration to explore corners of the world previously unknown to man." #NEW
 #accounts_of_the_atlantic_voyage_desc: "According to the legendary Mansa Mūsā, his predecessor started a journey across the Atlantic Sea in hopes of discovering the furthest limits of the ocean. While some among the ruling class consider this endeavor as a shameful abdication of duty, others within our state see this as an inspirational story to explore corners of the world unknown to man." #OLD ENG
 reclamation_of_land: "Bonifica del Terreno"
 #reclamation_of_land_desc: "Il Sahara non rimane in un unico luogo... può crescere e diminuire a seconda delle precipitazioni, e la fascia abitabile nota come Sahel in cui risiediamo può crescere o ridursi di conseguenza. Una grande siccità potrebbe rendere gran parte del nostro regno un deserto inutile, un'aggiunta al Sahara dove non regna nessuno se non la morte. Tuttavia, nelle annate favorevoli, potremmo recuperare alcune delle terre marginali del Sahara e renderle nuovamente produttive." #OLD ITA
 reclamation_of_land_desc: "The Sahara is not static. It can wax and wane depending on rainfall, and the habitable belt known as the $sahel_region$, where we reside, can grow or shrink accordingly. A major drought could render much of our kingdom useless desert, an addition to the Sahara where no one reigns but death. However, in good years, we might reclaim some of the marginal lands from the Sahara and make it productive again." #NEW
 #reclamation_of_land_desc: "The Sahara does not stay in one place...it can wax and wane depending on rainfall, and the habitable belt known as the Sahel we reside in can grow or shrink accordingly. A major drought could render much of our kingdom useless desert, an addition to the Sahara where no one reigns but death. However, in good years, we might reclaim some of the marginal lands from the Sahara and make it productive again." #OLD ENG
 mandinka_warrior_spirit: "Spirito Guerriero Mandinka"
 #mandinka_warrior_spirit_desc: "Che siano pagani o musulmani, gli uomini Mandinka sono stati i più grandi combattenti che il Sahel abbia mai visto. Il coraggio delle nostre truppe è ammirevole, così come il loro orgoglio. Quando la Mansa crea un esercito, non solo è il più grande di tutto il Sahel, ma è anche il migliore." #OLD ITA
 mandinka_warrior_spirit_desc: "Whether pagan or $muslim_ADJ$, Mandinka men have been the greatest fighters the $sahel_region$ has ever seen. The courage of our troops is admirable, as is their pride. When the Mansa raises an army, not only is it the largest in all the $sahel_region$, it is the best!" #NEW
 #mandinka_warrior_spirit_desc: "Whether pagan or Muslim, Mandinka men have been the greatest fighters the Sahel has ever seen. The courage of our troops is admirable, as is their pride. When the Mansa raises an army, not only is it the largest in all the Sahel, it is the best." #OLD ENG
 #markets_for_salt: "Mercati per il Sale" #OLD ITA
 markets_for_salt: "Markets for $salt$" #NEW
 #markets_for_salt: "Markets for Salt" #OLD ENG
 #markets_for_salt_desc: "Nel nostro regno, il sale vale il suo prezzo in oro. A sud di noi, nelle grandi foreste degli Ashanti e degli Yoruba, il sale vale molto più dell'oro. Per nostra fortuna, abbiamo le nostre scorte di sale e abbastanza oro per ottenerne una scorta infinita. Forse potremmo trovare altri mercati di persone per le quali il sale vale più dell'oro?" #OLD ITA
 markets_for_salt_desc: "In our kingdom, $salt$ is worth its cost in gold. But south of us, in the great forests of the Ashanti and the Yoruba, salt is worth considerably #italic more#! than gold. Luckily for us, we have our own supply of $salt$, and enough gold to obtain as much as we could ever want. Perhaps we could find yet more markets of people for whom $salt$ is more valuable than gold?" #NEW
 #markets_for_salt_desc: "In our kingdom, salt is worth its price in gold. South of us, in the great forests of the Ashanti and the Yoruba, salt is worth considerably more than gold. Luckily for us, we have our own supplies of salt and enough gold to obtain an endless supply of it. Perhaps we could find yet more markets of people for whom salt is more valuable than gold?" #OLD ENG
 west_african_slave_trade: "Commercio degli Schiavi dell'Africa Occidentale"
 #west_african_slave_trade_desc: "Prima ancora che esistesse il nostro Impero, il grande Wagadou, l'Impero del Ghana che ci ha preceduto, vendeva schiavi attraverso il deserto agli Arabi, e noi abbiamo seguito l'esempio in tutti questi anni, fornendo al mondo arabo una grande quantità di schiavi. Ora gli europei chiedevano a gran voce un numero ancora maggiore di schiavi per lavorare nelle loro aziende nel cosiddetto Nuovo Mondo. Abbiamo avuto pochi resoconti, ma la quantità di schiavi che richiedono è davvero sbalorditiva, e continuano a tornare, a volte anche facendo incursioni sulle nostre coste e rapendo i nostri sudditi. È giunto il momento di imporre l'ordine sul commercio degli schiavi e di limitare gli europei a porti commerciali selezionati, dove acquisteranno, e non ruberanno, gli schiavi." #OLD ITA
 west_african_slave_trade_desc: "Even before our Empire existed, the great Wagadou, the Ghana Empire that preceded us, sold $slaves_goods$ across the desert to the Arabs. We have followed suit all these years, supplying the Arab world with a vast number of $slaves_goods$. Now the Europeans clamor for even more $slaves_goods$ to work their holdings in the so-called New World. We have had little report, but the amount of $slaves_goods$ they demand is truly stunning, and they keep coming back, sometimes even raiding our shores and abducting our subjects. The time has come to impose order on this trade and restrict the Europeans to select commercial ports where they will purchase, not steal, $slaves_goods$." #NEW
 #west_african_slave_trade_desc: "Even before our Empire existed, the great Wagadou, the Ghana Empire that preceded us, sold slaves across the desert to the Arabs, and we have followed suit all these years, supplying the Arab world with a vast amount of slaves. Now the Europeans clamored for a yet greater number of slaves to work in their holdings in the so-called New World. We have had little report, but the amount of slaves they demand is truly stunning, and they keep coming back, sometimes even raiding our shores and abducting our subjects. The time has come to impose order on the slave trade and restrict the Europeans to select commercial ports where they will purchase, not steal, slaves." #OLD ENG
 kele_koun_advance: "Il Kèlè-Koun"
 #kele_koun_advance_desc: "Il Kèlè-Koun, o 'testa di guerra', sono i comandanti dei Kèlè-Bolo, il 'braccio di guerra', fanti che combattono per l'Impero. A differenza dei Ton-Tigi, i signori feudali del Mali, i Kèlè-Koun non fanno necessariamente parte del $nobles_estate$. I Kèlè-Koun hanno Jonow, 'schiavi', che servono come portatori di armi ed equipaggiamento fino al loro inserimento nei battaglioni Sofa." #OLD ITA
 kele_koun_advance_desc: "The Kèlè-Koun, or 'war-head', are the commanders of infantry fighting for Empire, called the Kèlè-Bolo, or 'war-arm'. Unlike the Ton-Tigi, the feudal lords of $MAL$, the Kèlè-Koun are not necessarily part of the $nobles_estate$. The Kèlè-Koun have #italic jonow#!, 'slaves', serving as carriers of the weapons and equipment until their inclusion in the Sofa battalions." #NEW
 #kele_koun_advance_desc: "The Kèlè-Koun, or 'war-head', are the commanders of the Kèlè-Bolo, the 'war-arm', infantrymen fighting for the Empire. Unlike the Ton-Tigi, the feudal lords of Mali, the Kèlè-Koun are not necessarily part of the $nobles_estate$. The Kèlè-Koun have Jonow, 'slaves', serving as carriers of the weapons and equipment until their inclusion in the Sofa battalions." #OLD ENG
 sofa_levies_advance: "Contributi per i divani"
 #sofa_levies_advance_desc: "In origine, tutti i soldati delle truppe di Kèlè-Bolo sono Horon, o 'liberi', ma l'ultimo sviluppo dell'Impero del Mali impone l'inclusione di Jonow, 'schiavi', per servire nell'esercito come combattenti invece che come portatori di armi. Questi guerrieri schiavi sarebbero poi conosciuti come 'Sofa', proteggendo come forze di guarnigione le fortificazioni del Mali." #OLD ITA
 sofa_levies_advance_desc: "Originally, all soldiers in the Kèlè-Bolo levies are #italic horon#!, or 'freemen', but the latest developments in $MAL$ have forced the inclusion of #italic jonow#!, 'slaves', to serve in the army as fighters instead of weapon-bearers. These slave warriors would thereafter be known as 'Sofa', protecting fortifications as part of garrison forces." #NEW
 #sofa_levies_advance_desc: "Originally, all soldiers in the Kèlè-Bolo levies are Horon, or 'freemen', but the latest development of the Mali Empire forces the inclusion of Jonow, 'slaves', to serve in the army as fighters instead of weapon carriers. These slave warriors would then be known as 'Sofa', protecting as garrison forces the Malian fortifications." #OLD ENG
 mandekalu_levies: "Leve di Mandekalu"
 #mandekalu_levies_desc: "Le $mandekalu_levies$ sono la spina dorsale dell'esercito maliano. Gli uomini liberi dell'impero sono chiamati alle armi in tempo di guerra e per loro è un grande onore partecipare a queste battaglie con le loro stesse armi." #OLD ITA
 mandekalu_levies_desc: "The $mandekalu_levies$ are the backbone of the $MAL_ADJ$ military. Freemen of the Empire are called to arms in times of war, and it is a great honor for them to participate in these battles with their own weapons." #NEW
 #mandekalu_levies_desc: "The $mandekalu_levies$ are the backbone of the Malian military. The free men of the empire are called to arms in times of war, and it is a great honor for them to participate in these battles with their own weapons." #OLD ENG
 farari_corps_advance: "Corpo Farari"
 #farari_corps_advance_desc: "I $farari_corps_advance$ sono l'élite dell'esercito maliano. Questi uomini sono comandanti a pieno titolo e sono molto rispettati per la loro esperienza e il loro coraggio." #OLD ITA
 farari_corps_advance_desc: "The $farari_corps_advance$ are the elite of the $MAL_ADJ$ military. Commanders in their own right, they are highly respected for their experience and bravery." #NEW
 #farari_corps_advance_desc: "The $farari_corps_advance$ are the elite of the Malian military. Those men are commanders in their own right, and are highly respected for their experience and bravery." #OLD ENG
 sudano_sahelian_architecture_advance: "Architettura Sudano-Saheliana"
 #sudano_sahelian_architecture_advance_desc: "Le praterie, le savane e i deserti dell'Africa occidentale sono poveri di risorse adatte per i progetti edilizi. L'uso di mattoni di fango e di intonaco di adobe riduce il costo degli edifici in modo significativo e conferisce loro uno stile distinto e piacevole alla vista." #OLD ITA
 sudano_sahelian_architecture_advance_desc: "The grasslands, savannas, and deserts of $west_africa$ provide few resources suitable for construction projects, so we have made the best of what we can get. The usage of mudbricks and adobe plaster reduces the cost of buildings significantly while also giving them a distinct style that is pleasing to the eye." #NEW
 #sudano_sahelian_architecture_advance_desc: "The grasslands, savannas, and deserts of West Africa are poor concerning suitable resources for construction projects. The usage of mudbricks and adobe plaster reduces the cost of buildings significantly while also giving them a distinct, pleasing to the eye style." #OLD ENG

 #Songhai
 #stories_of_the_gao_empire: "Storie dell'Impero di Gao" #OLD ITA
 stories_of_the_gao_empire: "Stories of the $gao$ Empire" #NEW
 #stories_of_the_gao_empire: "Stories of the Gao Empire" #OLD ENG
 #stories_of_the_gao_empire_desc: "Prima che l'Impero del Mali dominasse l'Africa occidentale, la città di Gao era la capitale di un impero a sé stante. Sebbene non esistano quasi documenti scritti sull'impero di Gao, la sua eredità vive nelle nostre tradizioni orali, ispirando gli uomini che vogliono raggiungere la grandezza un giorno." #OLD ITA
 stories_of_the_gao_empire_desc: "Before the $MAL_ADJ$ Empire came to dominate $west_africa$, the city of $gao$ was the capital of an empire in its own right. Although there are barely any written records of the $gao$ Empire, its legacy lives on in our oral traditions, inspiring all who want to achieve greatness one day." #NEW
 #stories_of_the_gao_empire_desc: "Before the Mali Empire dominated West Africa, the city of Gao was the capital of an empire in its own right. Although there are barely any written records of the Gao empire, its legacy lives on in our oral traditions, inspiring the men who want to achieve greatness one day." #OLD ENG
 #malian_military_tactics: "Tattiche Militari Maliane" #OLD ITA
 malian_military_tactics: "$MAL_ADJ$ Military Tactics" #NEW
 #malian_military_tactics: "Malian Military Tactics" #OLD ENG
 #malian_military_tactics_desc: "Durante il periodo in cui siamo stati sudditi dell'Impero del Mali, il nostro popolo ha imparato dai loro comandi militari e dai loro modi di combattere sul campo di battaglia. Questa conoscenza aiuterà la nostra fanteria per le battaglie a venire." #OLD ITA
 malian_military_tactics_desc: "During our time as subjects of $MAL$, our people learned much from their military command and combat tactics. This knowledge shall help our own infantry in battles to come." #NEW
 #malian_military_tactics_desc: "During our time as subjects of the Mali Empire, our people learned from their military command and their ways to fight on the battlefield. This knowledge shall help our own infantry for the battles to come." #OLD ENG
 #gold_to_salt_trade: "Commercio di Oro e Sale" #OLD ITA
 gold_to_salt_trade: "$golds_goods$ to $salt$ Trade" #NEW
 #gold_to_salt_trade: "Gold To Salt Trade" #OLD ENG
 #gold_to_salt_trade_desc: "Alcuni dicono che il sale vale il suo peso in oro... forse sarebbe più corretto dire che l'oro vale il suo peso in sale. In ogni caso, scambiando queste due merci, abbiamo creato delle reti commerciali fiorenti." #OLD ITA
 gold_to_salt_trade_desc: "Some say that $salt$ is worth its weight in $golds_goods$... perhaps it would be more accurate to say that $golds_goods$ is worth its weight in $salt$. Either way, by exchanging these two commodities, we have established thriving trade networks." #NEW
 #gold_to_salt_trade_desc: "Some say that salt is worth its weight in gold... perhaps it would be more accurate to say that gold is worth its weight in salt. Either way, by exchanging these two commodities, we have set up thriving trade networks." #OLD ENG
 #independence_from_mali: "Indipendenza dal Mali" #OLD ITA
 independence_from_mali: "Independence from $MAL$" #NEW
 #independence_from_mali: "Independence from Mali" #OLD ENG
 #independence_from_mali_desc: "Per molti anni siamo stati soggetti al Sultanato del Mali. Mentre il potere del Mali si è indebolito, il nostro è cresciuto, e ora possiamo affermare di essere completamente indipendenti dalla sovranità maliana. Prendiamo provvedimenti per assicurarci di rimanere tali." #OLD ITA
 independence_from_mali_desc: "For many years, we were a subject of $MAL$. As $MAL$'s power has weakened, ours has grown, and we can now claim to be fully independent of $MAL_ADJ$ overlordship. Let us take steps to make sure we remain so." #NEW
 #independence_from_mali_desc: "For many years we were a subject of the Mali Sultanate. As Mali's power has weakened, ours has grown, and we can now claim to be fully independent of Malian overlordship. Let us take steps to make sure we remain so." #OLD ENG
 jihad_against_the_pagans: "$jihad$ Contro i Pagani"
 #jihad_against_the_pagans_desc: "Nonostante i migliori sforzi di secoli di sultanati sunniti, l'Africa occidentale è ancora afflitta dalla minaccia dei pagani animisti. Sollevando la bandiera della jihad, possiamo ripulire le nostre terre dai miscredenti ed espandere allo stesso tempo le nostre frontiere." #OLD ITA
 jihad_against_the_pagans_desc: "Despite the best efforts of centuries of Sunni sultanates, $west_africa$ is still plagued by the menace of Animistic pagans. By lifting the banner of $jihad$, we can cleanse our lands of the unbelievers and expand our frontiers at the same time." #NEW
 #jihad_against_the_pagans_desc: "Despite the best efforts of centuries of Sunni sultanates, West Africa is still plagued by the menace of Animistic pagans. By lifting the banner of jihad, we can cleanse our lands of the unbelievers and expand our frontiers at the same time." #OLD ENG
 #sankore_madrassah: "Madrasa di Sankoré" #OLD ITA
 sankore_madrassah: "Sankoré Madrasah" #NEW
 #sankore_madrassah: "Sankoré Madrasa" #OLD ENG
 #sankore_madrassah_desc: "Ci è stato detto che la scuola della Moschea di Sankoré è il più grande centro di apprendimento di tutta l'Africa. Chi potrebbe essere sorpreso se questo fosse vero, vedendo saggi provenienti dalla lontana Arabia e dal Maghreb discutere i punti più sottili della filosofia e della religione?" #OLD ITA
 sankore_madrassah_desc: "We have been told that the Sankoré Mosque's school is the greatest center for learning in the entirety of $africa$. Who could be surprised if this were true, given how many wise men from distant $arabia_region$ and the $maghreb_region$ are here right now, arguing the finer points of philosophy and religion?" #NEW
 #sankore_madrassah_desc: "We have been told that the Sankoré Mosque's school is the greatest center for learning in the entirety of Africa. Who could be surprised if this is true, seeing wise men from distant Arabia and the Maghreb here arguing the finer points of philosophy and religion?" #OLD ENG
 the_hajj: "Il Ḥajj"
 #the_hajj_desc: "Come fece Mansa Mūsā del Mali, anche i nostri governanti possono recarsi alla Mecca, adempiendo al quinto pilastro dell'Islam, portando con sé l'oro come simbolo della nostra ricchezza e del nostro potere. Come il Mali di un tempo, facciamo in modo che il mondo si stupisca della ricchezza e della grandezza di Songhai." #OLD ITA
 the_hajj_desc: "Like Mansa Mūsā of $MAL$ once did, our rulers can travel to $mecca$ on pilgrimage, fulfilling the fifth pillar of $muslim$ and bearing gold as a symbol of our wealth and power. Like the $MAL_ADJ$ pilgrims of old, the world will gasp in wonder at the wealth and grandeur of $SON$." #NEW
 #the_hajj_desc: "Like Mansa Mūsā of Mali once did, our rulers can travel to Mecca as well, fulfilling the fifth pillar of Islam bearing gold as a symbol of our wealth and power. Like Mali of old, let us have the world wonder at the wealth and grandeur of Songhai." #OLD ENG
 sharia: "Sharī'ah"
 #sharia_desc: "La Legge Santa che il Profeta usava quando governava Medina dovrebbe essere il fondamento incrollabile delle leggi che usiamo per gestire la nostra società. Riformando il nostro codice penale per riflettere gli insegnamenti del Profeta, porteremo armonia e giustizia nella nostra società." #OLD ITA
 sharia_desc: "The Holy Law that the Prophet followed when ruling $medina$ should be the unshakable foundation of the laws we use to run our society. By reforming our criminal code to reflect the teachings of the Prophet, we will bring harmony and justice to our people." #NEW
 #sharia_desc: "The Holy Law that the Prophet used when ruling Medina should be the unshakable foundation of the laws we use to run our society. By reforming our criminal code to reflect the teachings of the Prophet, we will bring harmony and justice to our society." #OLD ENG
 trans_sahara_trade: "Commercio Trans-Sahariano"
 #trans_sahara_trade_desc: "I nostri mercanti riportano spesso cose affascinanti dalle corti del Nord Africa. Forse sarebbe possibile far loro riportare altri affascinanti gingilli?" #OLD ITA
 trans_sahara_trade_desc: "Our traders frequently bring back fascinating things from the courts of $north_africa$. Perhaps they could find and bring back yet more fascinating trinkets?" #NEW
 #trans_sahara_trade_desc: "Our merchants frequently bring back fascinating things from the courts of North Africa. Perhaps it would be possible to have them bring back yet more fascinating trinkets?" #OLD ENG
 modernization_of_the_military: "Modernizzazione dell'Esercito"
 #modernization_of_the_military_desc: "Il nostro Stato vive e muore grazie alle capacità del nostro esercito. È stato il nostro esercito a garantire non solo la nostra sopravvivenza, ma anche la nostra crescita verso la grandezza. Non possiamo permetterci di rimanere indietro nei progressi militari." #OLD ITA
 modernization_of_the_military_desc: "Our state lives and dies by the capabilities of our army. Our military not only ensures our survival, but is also what has set us on the path to greatness. We cannot allow ourselves to fall behind in progress!" #NEW
 #modernization_of_the_military_desc: "Our state lives and dies by the capabilities of our army. It was our military that not only ensured our survival but also our thrive to greatness. We cannot allow ourselves to fall behind in the military advances." #OLD ENG

 #Naples
 
 #university_naples: "L'Università di Napoli" #OLD ITA
 university_naples: "The University of $NAP$" #NEW
 #university_naples: "The University of Naples" #OLD ENG
 #university_naples_desc: "Fondata nel 1224 dall'imperatore Federico II, l'Università di Napoli è una delle più antiche istituzioni pubbliche italiane. Abbracciando un'etica laica, ha fornito a generazioni di studenti un'istruzione completa e ha contribuito al progresso intellettuale in vari campi." #OLD ITA
 university_naples_desc: "Founded in 1224 by Emperor Frederick II, the University of $NAP$ is one of $ITA$'s oldest public institutions. Embracing a secular ethos, it has provided generations of students with a comprehensive education and contributed to intellectual advancements across various fields." #NEW
 #university_naples_desc: "Founded in 1224 by Emperor Frederick II, the University of Naples is one of Italy's oldest public institutions. Embracing a secular ethos, it has provided generations of students with a comprehensive education and contributed to intellectual advancements across various fields." #OLD ENG
 mercantile_spirit: "Spirito Mercantile"
 #mercantile_spirit_desc: "Il Regno di Napoli, ispirato dall'influente repubblica marinara di Amalfi, vantava un commercio molto vivace. Porti strategici, tra cui quello di Napoli stessa, fungevano da snodi vitali, collegando il regno a terre lontane e favorendo la prosperità economica attraverso gli scambi commerciali e il fiorente scambio di beni e idee." #OLD ITA
 mercantile_spirit_desc: "$NAP$, inspired by the influential maritime republic of Amalfi, boasts a vibrant culture of trade. Strategic ports, including the city of $naples$ itself, served as vital hubs, connecting the kingdom to distant lands and fostering economic prosperity through commercial exchanges and the flourishing exchange of goods and ideas." #NEW
 #mercantile_spirit_desc: "The Kingdom of Naples, inspired by the influential maritime republic of Amalfi, boasted a vibrant trade nature. Strategic ports, including Naples itself, served as vital hubs, connecting the kingdom to distant lands and fostering economic prosperity through commercial exchanges and the flourishing exchange of goods and ideas." #OLD ENG
 consolidate_the_royal_domain: "Il Dominio Reale"
 #consolidate_the_royal_domain_desc: "Abbiamo ereditato una terra ricca, ma leggi e costumi arcaici ci impediscono di prosperare. I precedenti sovrani hanno garantito l'armonia tra nobiltà e ricchezza nel nostro regno, sta a noi aggiornare le normative. Rafforzando le corti baronali e consolidando la proprietà terriera all'interno del regno, creeremo una gerarchia giuridica più chiara. Nelle terre della corona e dei borghesi, rafforzeremo le città come centri di potere e incoraggeremo la crescita del commercio e dell'artigianato." #OLD ITA
 consolidate_the_royal_domain_desc: "We have inherited a wealthy realm, but we have been stymied from achieving true prosperity by the constraints of archaic laws and customs. Previous rulers balanced noble privilege with economic power, but we must bring attitude and regulations into the modern era. By strengthening courts of the nobility and consolidating their landholdings, we will create a clearer legal hierarchy. Simultaneously, we will empower cities as centers of royal authority and encourage the proliferation of urban trade and craftsmanship." #NEW
 #consolidate_the_royal_domain_desc: "We have inherited a rich land, but we are held back from prosperity by archaic laws and customs. Previous rulers have ensured to harmonize noble birth and wealth in our kingdom, it is up to us to bring regulations up to date. By strengthening the Baronial courts and consolidating land holdings within the realm we create a clearer legal hierarchy. In the lands of the crown and burghers, we will strengthen the cities as centers of power and encourage the growth of trade and craftsmanship." #OLD ENG
 academia_pontaniana: "Accademia Pontaniana"
 #academia_pontaniana_desc: "Per molto tempo Napoli ha cercato di diventare un centro di apprendimento moderno, attirando le grandi menti dell'epoca e diffondendo la luce del Rinascimento. Sotto la guida di Giovanni Pontano, questi circoli di discussione hanno acquisito struttura e organizzazione. È quindi giusto che l'accademia prenda il nome dal suo instancabile leader." #OLD ITA
 academia_pontaniana_desc: "For a long time, $NAP$ has striven to be a center of modern learning, attracting the great minds of the age and spreading the light of the $renaissance$. Under the leadership of Giovanni Pontano, these discussion circles have been given structure and organization. It is only fitting that we name the academy after its industrious leader." #NEW
 #academia_pontaniana_desc: "For a long time Naples has strived to be a center of modern learning, attracting the great minds of the age and spreading the light of the Renaissance. Under the leadership of Giovanni Pontano, these discussion circles have been given structure and organization. It is only fitting that we name the academy after its industrious leader." #OLD ENG
 encouraged_city_living: "Vita Urbana Incentivata"
 #encouraged_city_living_desc: "Abbiamo ereditato una città meravigliosa dai nostri predecessori. Dobbiamo continuare ad abbellire e migliorare questa metropoli del Mediterraneo affinché possa continuare a crescere e prosperare. Non possiamo più accontentarci di riparare e mantenere il porto e gli edifici. Facciamo in modo di poter sostenere un numero maggiore di persone costruendo acquedotti, bonificando le zone paludose e pavimentando più strade." #OLD ITA
 encouraged_city_living_desc: "We have inherited an exquisite city from our predecessors. We must continue to beautify and improve this metropolis of the Mediterranean so that it can continue to grow and prosper. No longer can we content ourselves with merely repairing and maintaining the port and buildings; we shall make holistic improvements that better sustain our people by also building aqueducts, draining wetlands, and paving more roads." #NEW
 #encouraged_city_living_desc: "We have inherited a beautiful city from our predecessors. We must continue to beautify and improve this metropolis of the Mediterranean so that it can continue to grow and prosper. No longer can we content ourselves to repair and maintain the port and buildings. Let us ensure that we can sustain more people by building aqueducts, draining wetlands, and paving more roads." #OLD ENG
 crush_the_barons: "Potere dei Baroni Schiacciato"
 #crush_the_barons_desc: "I baroni locali esercitano ancora un grande potere sulle campagne napoletane. Se vogliamo continuare a centralizzare il nostro regno, dobbiamo schiacciare il potere di questi baroni o rischiare che cospirino contro di noi." #OLD ITA
 crush_the_barons_desc: "Local barons still exert a large degree of power over the $NAP$ countryside. If we wish to continue centralizing our kingdom, we must crush the power of these barons, or risk them conspiring against us." #NEW
 #crush_the_barons_desc: "Local barons still exert a large degree of power over the Neapolitan countryside. If we are to be able to continue centralizing our kingdom we must crush the power of these barons or risk them conspiring against us." #OLD ENG
 expanded_arsenale: "Arsenale Ampliato"
 #expanded_arsenale_desc: "Dal XIV secolo l'Arsenale di Napoli è stato il centro della nostra produzione navale e la nostra principale installazione navale. Tuttavia, l'Arsenale deve essere ampliato e modernizzato per stare al passo con le flotte ostili del Mediterraneo. Ampliamo sia la parte marittima che quella navale del nostro porto e costruiamo un Arsenale più efficiente per mantenere una flotta più grande e più forte." #OLD ITA
 expanded_arsenale_desc: "For centuries, the Arsenale of $NAP$ has been the center of our ship production and our main naval installation. However, it needs to be expanded and modernized to remain effective against hostile Mediterranean fleets. Let us expand both the commercial and military capabilities of our port, building a more efficient Arsenale to maintain a larger, more powerful fleet." #NEW
 #expanded_arsenale_desc: "Since the 14th century the Arsenale of Naples has been the center of our ship production and our main naval installation. The Arsenale needs to be expanded and modernized, however, to keep up with the hostile fleets of the Mediterranean. Let us expand the maritime and naval sides of our port alike and build a more efficient Arsenale in order to maintain a larger and stronger fleet." #OLD ENG
 city_of_artists: "Città degli Artisti"
 #city_of_artists_desc: "Grazie al patrocinio dei più grandi artisti del mondo, tutti potranno ammirare la gloria della nostra città. Tutti rimarranno stupiti dalla grandezza dei nostri pittori, poeti, cantanti e attori. Che la cultura napoletana sia il metro di paragone con cui vengono valutati gli altri centri artistici." #OLD ITA
 city_of_artists_desc: "Through patronage of the world's greatest artists, the glory of our city will become known throughout the world. All will marvel at the greatness of our painters, poets, singers, and actors. Let $NAP_ADJ$ culture be the mark by which other centers of art are measured!" #NEW
 #city_of_artists_desc: "Through the patronage of the world's greatest artists all will see the glory of our city. All will marvel at the greatness of our painters, poets, singers, and actors. Let Neapolitan culture be the mark by which other centers of art are measured." #OLD ENG
 institutional_reorganization: "Riorganizzazione Istituzionale"
 #institutional_reorganization_desc: "Con l'abolizione del Consiglio Collaterale e l'istituzione della Real Camera di Santa Chiara, attueremo importanti riforme giuridiche nel Regno di Napoli. I progetti in corso mireranno a riorganizzare il complesso legislativo, consolidare le leggi nel Codice Carolino e attuare il Catasto Onciario per la riforma fiscale." #OLD ITA
 institutional_reorganization_desc: "By abolishing the Collateral Council and establishing the #italic Real Camera di Santa Chiara#!, we will implement important legal reforms in $NAP$. Ongoing projects will aim to reorganize the legislative complex, consolidate laws into the #italic Codice Carolino#!, and implement the #italic Onciario Cadastre#! for tax reform." #NEW
 #institutional_reorganization_desc: "By abolishing the Collateral Council and establishing the Real Camera di Santa Chiara, we will implement important legal reforms in the Kingdom of Naples. Ongoing projects will aim to reorganize the legislative complex, consolidate laws into the Codice Carolino, and implement the Onciario Cadastre for tax reform." #OLD ENG
 #a_central_power: "Una Potenza Centrale nel Mediterraneo" #OLD ITA
 a_central_power: "A Central Mediterranean Power" #NEW
 #a_central_power: "A Central Power in the Mediterranean" #OLD ENG
 a_central_power_desc: "La nostra vantaggiosa posizione centrale nel Mediterraneo ci consente di raggiungere facilmente qualsiasi costa. Dovremmo sfruttare questo vantaggio per cercare alleanze, stringere nuove amicizie ed espandere i nostri confini. Con il mare come porta d'accesso, le opportunità di crescita e prosperità abbondano nella nostra ricerca di maggiore influenza e sicurezza."
 #neapolitan_industrialization: "Industrializzazione Napoletana" #OLD ITA
 neapolitan_industrialization: "$NAP_ADJ$ Industrialization" #NEW
 #neapolitan_industrialization: "Neapolitan Industrialization" #OLD ENG
 #neapolitan_industrialization_desc: "A partire dal XVIII secolo, il Regno di Napoli assistette a un graduale processo di industrializzazione. Settori chiave come quello tessile, navale e siderurgico conobbero una crescita alimentata dagli investimenti e dai progressi tecnologici. Questo passaggio all'industrializzazione avrebbe svolto un ruolo significativo nella trasformazione di Napoli in un importante centro economico." #OLD ITA
 neapolitan_industrialization_desc: "$NAP$ has witnessed a gradual industrialization process over the past decades. Key sectors such as textiles, shipbuilding, and ironworks have experienced significant growth, fueled by investments and technological advancements. This shift towards industrialization will play a significant role in transforming $NAP$ into a major economic center." #NEW
 #neapolitan_industrialization_desc: "Starting in the 18th century, the Kingdom of Naples witnessed a gradual process of industrialization. Key sectors such as textiles, shipbuilding, and ironworks experienced growth, fueled by investments and technological advancements. This shift towards industrialization will play a significant role in transforming Naples into a major economic center." #OLD ENG
 #neapolitan_army_reforms: "Riforme dell'Esercito Napoletano" #OLD ITA
 neapolitan_army_reforms: "$NAP_ADJ$ Army Reforms" #NEW
 #neapolitan_army_reforms: "Neapolitan Army Reforms" #OLD ENG
 neapolitan_army_reforms_desc: "La nostra nazione ha bisogno di intraprendere profonde riforme militari, modernizzando le proprie forze armate per affrontare le sfide di un campo di battaglia in continua evoluzione. Queste riforme rafforzeranno le capacità tattiche, snelliranno le strutture di comando e miglioreranno i programmi di addestramento, posizionandoci come una forza formidabile nella nostra regione."

 #Two Sicilies
 tws_unified_legal_code: "Codice Giuridico Unificato"
 tws_unified_legal_code_desc: "I territori che costituiscono il nostro Paese hanno subito rivolte dovute all'applicazione ingiusta delle leggi. Per evitare che tali eventi si ripetano in futuro, dovremmo uniformare il nostro codice legale e garantire che le nostre leggi siano applicate in modo equo. Ciò impedirà sicuramente che qualsiasi rivolta degeneri nel caos."
 tws_ensure_loyal_families: "Fedeltà delle Famiglie Nobili"
 tws_ensure_loyal_families_desc: "Le Nobili Famiglie di entrambe le Sicilie esercitano un grande potere al posto nostro. Assegnando loro ruoli prestigiosi ma privi di significato a corte, ci assicureremo la loro lealtà e garantiremo un governo stabile sulle nostre campagne."
 tws_revitalize_the_lands: "Attirare nuove Persone"
 tws_revitalize_the_lands_desc: "I precedenti governanti hanno prestato troppa attenzione ad alcune zone specifiche del nostro Paese. Se vogliamo mantenere il controllo di entrambe le Sicilie, dovremo investire in modo equo e paritario in entrambe le parti. Un passo verso questo obiettivo è quello di attirare persone che si stabiliscano in zone precedentemente trascurate."
 tws_capable_vicars: "Vicari Capaci"
 tws_capable_vicars_desc: "Una sfida particolare per il nostro Paese unificato è quella di governare entrambe le sponde dello Stretto di Messina. Poiché il nostro sovrano può essere presente solo su una sponda alla volta, l'altra dovrà essere affidata a un vicario, che governerà in nostro nome. Dobbiamo assicurarci di nominare solo le persone più capaci e affidabili per questo ruolo fondamentale, al fine di prevenire la corruzione."
 tws_oversea_ambitions: "Ambizioni d'Oltremare"
 tws_oversea_ambitions_desc: "Espandere i nostri territori all'interno dell'Italia è un compito difficile, che richiede di districarsi in una rete insidiosa di alleanze e rischia di attirare l'ira dello stesso Papa. Pertanto, dovremmo guardare oltreoceano, dove potenziali ricchezze ci attendono nelle terre del Nord Africa e della Grecia."
 tws_protect_the_coastline: "Aumentare le Pattuglie Marittime"
 tws_protect_the_coastline_desc: "La nostra costa è vasta e vulnerabile alle incursioni dei pirati a caccia di schiavi. Dobbiamo istituire una marina militare che pattugli, protegga e alla fine sconfigga questa vile minaccia al nostro popolo."

 #Florence & Tuscany

 arte_della_lana: "Arte della Lana"
 #arte_della_lana_desc: "Uno dei settori più influenti di Firenze, la produzione di tessuti di qualità sostenuta da una forte forza lavoro, ha costruito nel corso dei secoli la fortuna di molti mercanti intraprendenti e personaggi potenti." #OLD ITA
 arte_della_lana_desc: "The #italic Arte della Lana#! — the Wool Guild — controls one of the most important industries in $FLO$. Devoted to the production of quality $cloth$ and supported by a strong and skilled workforce, this guild has helped many traders and artisans build their fortunes across the centuries." #NEW
 #arte_della_lana_desc: "One of the most influential industries in Florence, the production of quality cloth supported by a strong workforce has built the fortunes of many prospecting merchants and powerful individuals across the centuries." #OLD ENG

 florino_d_oro: "Fiorino d'Oro"
 #florino_d_oro_desc: "Una valuta molto potente, sostenuta da un'eccellente purezza dell'oro e condivisa da molti Stati e istituzioni in tutta Europa. Adottando il #Y Fiorino#! come nostra valuta, siamo certi di avere un impatto positivo sul nostro reddito e di ridurre il deficit monetario." #OLD ITA
 florino_d_oro_desc: "A very powerful currency, backed by excellent gold purity and shared by many states and institutions across $europe$. By adopting the #Y Florin#! as our currency, we are sure to positively impact our income and cut down on monetary deficits." #NEW
 #florino_d_oro_desc: "A very powerful currency, backed by an excellent gold purity and shared by many states and institutions across Europe. By adopting the #Y Florin#! as our currency, we are sure to positively impact our income and cut down on monetary deficits." #OLD ENG

 a_land_of_banks: "Un Paese di Banche"
 #a_land_of_banks_desc: "La Toscana è il centro del settore bancario europeo, essendo sede di molte potenti istituzioni con sede nelle principali città toscane. Dalle loro sedi, i loro tentacoli si estendono in tutta la penisola italiana e persino nel resto d'Europa." #OLD ITA
 a_land_of_banks_desc: "$TUS$ is the center of banking in $europe$, with many powerful financial institutions headquartered in their major cities. From these bases, their influence extends across $italy_region$ and into northern $europe$ through extensive trade networks and lucrative partnerships." #NEW
 #a_land_of_banks_desc: "Tuscany is the center of European banking, being home to many powerful institutions based on the main Tuscan cities. From their headquarters, their tentacles extend across the Italian Peninsula and even into the rest of Europe." #OLD ENG

 #florentine_citizen_militia: "Milizia Cittadina Fiorentina" #OLD ITA
 florentine_citizen_militia: "$FLO_ADJ$ Citizen Militia" #NEW
 #florentine_citizen_militia: "Florentine Citizen Militia" #OLD ENG
 #florentine_citizen_militia_desc: "Se il nostro popolo deve resistere alla prova del tempo, deve essere pronto a mobilitarsi rapidamente per difendere i nostri ideali! La formazione di una milizia cittadina, pari per esperienza e ferocia ad altri eserciti in Europa, sarà sicuramente di aiuto nella protezione del nostro dominio." #OLD ITA
 florentine_citizen_militia_desc: "If our people are to flourish well into the future, they must be ready to mobilize and defend our ideals and homeland! Forming a citizen militia, equal in experience and ferocity to other armies in $europe$, will greatly aid us in protecting our domain." #NEW
 #florentine_citizen_militia_desc: "If our people are to stand the test of time, they must be ready to quickly mobilize in the defense of our ideals! Forming a citizen militia, equal in experience and ferocity to other armies in Europe, will surely assist in the protection of our domain." #OLD ENG

 #birthplace_of_renaissance: "Luogo di Nascita del Rinascimento" #OLD ITA
 birthplace_of_renaissance: "Birthplace of the $renaissance$" #NEW
 #birthplace_of_renaissance: "Birthplace of Renaissance" #OLD ENG
 #birthplace_of_renaissance_desc: "La nostra attenzione per le belle arti, la coltivazione dei talenti e il pensiero innovativo ci hanno portato a essere considerati come una delle avanguardie del pensiero e del progresso scientifico!" #OLD ITA
 birthplace_of_renaissance_desc: "Our dedication to fine arts, cultivating artistic talent, and innovative thought have led us to be regarded as one of the foremost leaders of cultural, philosophical, and scientific advancements worldwide!" #NEW
 #birthplace_of_renaissance_desc: "Our attention to fine arts, the cultivation of talent, and innovative thought have led us to be regarded as one of the forefronts of thought and scientific advancement!" #OLD ENG

 #florentine_school: "Scuola Fiorentina" #OLD ITA
 florentine_school: "$FLO_ADJ$ School" #NEW
 #florentine_school: "Florentine School" #OLD ENG
 #florentine_school_desc: "Una delle scuole d'arte più influenti, l'impatto delle tecniche artistiche fiorentine e l'attenzione per i dettagli ci porteranno in prima linea nelle manifestazioni culturali e di ricchezza dell'arte magnanima!" #OLD ITA
 florentine_school_desc: "As one of the most influential contemporary schools of art, $FLO_ADJ$ techniques and fine details have established us as the cultural leader of $europe$, producing masterworks that define the $renaissance$." #NEW
 #florentine_school_desc: "One of the most influential schools of art, the impact of the Florentine artistic techniques and attention to detail shall cement us at the forefront of cultural and affluent displays of magnanimous art!" #OLD ENG

 tuscan_uffizi: "Uffizi"
 #tuscan_uffizi_desc: "Originariamente destinati a consolidare l'amministrazione di diverse corporazioni e agenzie, gli Uffizi sono una preziosa fonte di potere centralizzato, mentre conservano ed espongono varie opere d'arte come segno di superiorità culturale ed esibizione di ricchezza." #OLD ITA
 tuscan_uffizi_desc: "Originally meant to consolidate the administration of several guilds and agencies, the Uffizi is a valuable source of centralized power, preserving and displaying various works of art as a sign of cultural superiority and an exhibition of affluence." #NEW
 #tuscan_uffizi_desc: "Originally meant to consolidate the administration of several guilds and agencies, the Uffizi is a valuable source of centralized power whilst preserving and displaying various works of art as a sign of cultural superiority and an exhibition of affluence." #OLD ENG

 #medici_porcelain: "Porcellana Medicea" #OLD ITA
 medici_porcelain: "Medici $porcelain$" #NEW
 #medici_porcelain: "Medici Porcelain" #OLD ENG
 #medici_porcelain_desc: "Negli ultimi decenni sono stati fatti molti tentativi per replicare le proprietà della vera porcellana, poiché si ritiene che sia un bene esotico proveniente dall'Estremo Oriente. Con l'aiuto di alchimisti esperti e la conoscenza delle scienze, siamo certi di produrre porcellana di grande qualità." #OLD ITA
 medici_porcelain_desc: "Many attempts have been made during the last few decades to replicate the properties of true $porcelain$, an exotic good from the Far East. With the help of experienced alchemists and thorough scientific knowledge, we will surely be able to produce $porcelain$ of great quality." #NEW
 #medici_porcelain_desc: "Many attempts have been made during the last few decades to replicate the properties of true porcelain, as it is counted to be an exotic good from the Far East. With the help of experienced alchemists and knowledge of the sciences, we are sure to produce porcelain of great quality." #OLD ENG

 porto_franco: "Porto Franco"
 #porto_franco_desc: "Aprendo i nostri porti agli affari dei mercanti stranieri ed eliminando le tasse di importazione, siamo sicuri di accumulare maggiori guadagni di capitale dalle nostre imprese mercantili." #OLD ITA
 porto_franco_desc: "By opening our ports for business with foreign merchants and eliminating import dues, we are sure to accumulate more capital gains from our mercantile ventures." #NEW
 #porto_franco_desc: "By opening our ports for business involving foreign merchants and eliminating import dues we are sure to accumulate more capital gains from our mercantile ventures." #OLD ENG

 accademia_cimento: "Accademia del Cimento"
 #accademia_cimento_desc: "L'Accademia del Cimento era una società scientifica fondata a Firenze nel 1657. Fu una delle prime del suo genere, fondata da studenti di Galileo e finanziata dal Principe Leopoldo e da suo fratello, il Granduca Ferdinando II.\nAnche se non fu mai un'istituzione ufficiale, fu importante per lo sviluppo dei principi scientifici della sperimentazione. La società aveva il motto 'Prova e riprova' e pubblicò i Saggi, un libro che sarebbe diventato il manuale di laboratorio standard del XVIII secolo." #OLD ITA
 accademia_cimento_desc: "The #italic Accademia del Cimento#! is a scientific society established in $FLO$ by students of Galileo. The first institution of its kind, this groundbreaking incubator of scientific development was devoted to the principles of experimentation. The society had the motto 'Try and try again' and published the #Italic Saggi#!, a book that would set contemporary standards for laboratory practice and procedure." #NEW
 #accademia_cimento_desc: "The Accademia del Cimento was a scientific society established in Florence in 1657. It was one of the first of its kind, founded by students of Galileo and funded by Prince Leopold and his brother, Grand Duke Ferdinando II.\nWhile it was never an official institution, it was important for the development of the scientific principles of experimentation. The society had the motto 'Try and try again' and published the Saggi, a book that would become the standard laboratory manual of the 18th century." #OLD ENG

 #tuscan_municipal_reforms: "Riforme Comunali Toscane" #OLD ITA
 tuscan_municipal_reforms: "$TUS_ADJ$ Municipal Reforms" #NEW
 #tuscan_municipal_reforms: "Tuscan Municipal Reforms" #OLD ENG
 #tuscan_municipal_reforms_desc: "Mentre entriamo nell'era dell'assolutismo e dell'autorità suprema centralizzata, dobbiamo rivedere la nostra amministrazione locale e riformare i nostri sistemi in modo appropriato, se vogliamo sfruttare le nostre capacità normative." #OLD ITA
 tuscan_municipal_reforms_desc: "As we enter the era of absolutism and supreme centralized authority, we must reform local administration accordingly by establishing uniform procedures and transforming  local systems into instruments of central power." #NEW
 #tuscan_municipal_reforms_desc: "As we enter the era of absolutism and supreme centralized authority, we must revisit our local administration and reform our systems appropriately if we are to harness our regulatory capabilities." #OLD ENG

 #tuscan_physiocratic_reforms: "Riforme Fisiocratiche Toscane" #OLD ITA
 tuscan_physiocratic_reforms: "$TUS_ADJ$ Physiocratic Reforms" #NEW
 #tuscan_physiocratic_reforms: "Tuscan Physiocratic Reforms" #OLD ENG
 #tuscan_physiocratic_reforms_desc: "Rafforzando i nostri settori agricoli e prendendoci cura della nostra gente, assicureremo senza dubbio una solida base per i nostri sistemi economici recentemente modernizzati." #OLD ITA
 tuscan_physiocratic_reforms_desc: "By strengthening our agricultural sectors and taking better care of our people, we will undoubtedly secure a strong foundation for our newly modernized economic systems." #NEW
 #tuscan_physiocratic_reforms_desc: "By strengthening our agricultural sectors and taking good care of our people, we will undoubtedly secure a strong foundation for our newly modernized economic systems." #OLD ENG

 #tuscan_new_trade_system: "Nuovo Sistema Commerciale Toscano" #OLD ITA
 tuscan_new_trade_system: "New $TUS_ADJ$ Trade System" #NEW
 #tuscan_new_trade_system: "New Tuscan Trade System" #OLD ENG
 #tuscan_new_trade_system_desc: "L'era delle nostre gilde commerciali sta lentamente volgendo al termine, poiché la loro influenza diminuisce di fronte a un potere centralizzato assoluto. Riformando la loro amministrazione e spostando gran parte del loro controllo ai nostri capi di Stato, siamo certi di aumentare i profitti." #OLD ITA
 tuscan_new_trade_system_desc: "The era of trade guild supremacy is slowly coming to an end as their influence wanes in the face of absolute centralized power. By reforming their administration and shifting much of their control to our heads of state, we are sure to increase profits." #NEW
 #tuscan_new_trade_system_desc: "The era of our trade guilds is slowly coming to an end as their influence wanes in the face of absolute centralized power. By reforming their administration and shifting much of their control to our heads of state, we are sure to increase profits." #OLD ENG

 pis_anziani_del_popolo: "Anziani del Popolo"
 #pis_anziani_del_popolo_desc: "Il Consiglio degli Anziani fu inizialmente fondato nel tentativo di pacificare la rivalità tra le famiglie Della Gherardesca e Visconti. Ha influenzato chi ha controllato e governato la Repubblica sin dalla sua fondazione." #OLD ITA
 pis_anziani_del_popolo_desc: "The Council of the Elders was initially founded in an effort to pacify the rivalry between the $gherardesca_dynasty$ and $visconti_dynasty$ families. It has influenced who controls and governs the republic since it was established." #NEW
 #pis_anziani_del_popolo_desc: "The Council of the Elders was initially founded in an effort to pacify the rivalry between the Della Gherardesca and Visconti families. It has influenced who controlled and governed the republic since it was established." #OLD ENG

 #pis_maritimes_legacy: "L'Eredità delle Repubbliche Marinare" #OLD ITA
 pis_maritimes_legacy: "Maritime Republic Legacy" #NEW
 #pis_maritimes_legacy: "Maritime Republics' legacy" #OLD ENG
 #pis_maritimes_legacy_desc: "Per secoli Pisa è stata una delle potenze dominanti nel Mediterraneo, controllando il commercio e diffondendo la sua influenza. Pur essendo solo l'ombra della grande potenza che fu Pisa, la sua eredità è ancora presente. Pisa ricorda." #OLD ITA
 pis_maritimes_legacy_desc: "For centuries, $PIS$ was one of the dominant powers in the Mediterranean, massively influential and in control of an impressive trading network. While we may currently be but a shadow of the great $PIS$ of the past, our legacy remains. $PIS$ remembers." #NEW
 #pis_maritimes_legacy_desc: "For centuries Pisa was one of the dominant powers in the Mediterranean, controlling the trade and spreading its influence. While only being the shadow of the great power that once Pisa was, its legacy is still there. Pisa remembers." #OLD ENG

 #pis_the_university_of_pisa: "L'Università di Pisa" #OLD ITA
 pis_the_university_of_pisa: "The University of $PIS$" #NEW
 #pis_the_university_of_pisa: "The University of Pisa" #OLD ENG
 #pis_the_university_of_pisa_desc: "Una delle università più antiche d'Italia e d'Europa, l'Università di Pisa è sempre stata una delle istituzioni più significative sia per l'insegnamento che per la ricerca." #OLD ITA
 pis_the_university_of_pisa_desc: "One of the oldest centers for higher learning in $ITA$ and indeed all of $europe$, the University of $PIS$ has a near-legendary reputation for excellence in both teaching and research." #NEW
 #pis_the_university_of_pisa_desc: "One of the most ancient universities in Italy and Europe, the University of Pisa has always been one of the most significant institution for both teaching and research." #OLD ENG

 #sie_artists: "Scuola di Pittura Senese" #OLD ITA
 sie_artists: "$SIE_ADJ$ School of Painting" #NEW
 #sie_artists: "Sienese School of Painting" #OLD ENG
 #sie_artists_desc: "L'arte pittorica fiorì in Italia durante il Rinascimento, ma nessun artista può eguagliare la pura abilità e la qualità raggiunta da quelli di Siena. L'arte senese è uno stile ultraterreno ed elegante, con una forte attenzione ai miracoli compiuti dalle figure bibliche e dai Santi. Mentre altri artisti possono apparire belli al momento, lo stile più sottile della scuola senese lo farà sicuramente durare nel tempo." #OLD ITA
 sie_artists_desc: "The art of painting has flourished in $ITA$ since the beginning of the $renaissance$, but no artists can match the sheer skill and quality of those from $SIE$. $SIE_ADJ$ art is otherworldly and elegant, with a heavy focus on the miracles performed by Biblical figures and Saints. While other artists may create works considered beautiful for the moment, the subtler style of the $SIE_ADJ$ school will ensure its works are admired for centuries to come." #NEW
 #sie_artists_desc: "The art of painting flourished in Italy during the renaissance, but no artists can match the sheer skill and quality achieved by those from Siena. Sienese art is a style that is otherworldly and elegant, with a heavy focus on the miracles performed by biblical figures and Saints. While other artists may appear beautiful at the moment, the subtler style of the Sienese school will surely make it stand the test of time." #OLD ENG

 sie_studium_senese: "Studium Senese"
 #sie_studium_senese_desc: "Considerata la prima università finanziata con fondi pubblici, l'Università di Siena è l'orgoglio della città, e forma i nostri cittadini affinché servano la nostra nazione nel modo migliore." #OLD ITA
 sie_studium_senese_desc: "Considered the first publicly funded university, the University of $siena$ is the pride of the city, educating our citizens so that all may serve the nation with strength and skill." #NEW
 #sie_studium_senese_desc: "Considered the first university being publicly funded, the University of Siena is the pride of the city, educating our citizens so that they all serve our nation the best way." #OLD ENG

 sie_council_priori: "Il Consiglio dei Priori"
 #sie_council_priori_desc: "Dopo una serie di governi repubblicani e reali falliti, abbiamo istituito un Consiglio per il Popolo di Siena, che speriamo non cada nell'aristocrazia e nella corruzione come tanti altri prima di lui. Anche se il numero esatto di rappresentanti nel Consiglio e le modalità di elezione sono in fase di evoluzione, il decentramento del nostro governo in questo modo non porterà mai Siena a cadere in un altro governo aristocratico." #OLD ITA
 sie_council_priori_desc: "Following a series of failed republican and royal governments, we have established a Council for the People of $SIE$, one which hopefully shall not fall to highborn maneuverings and corruption like so many before it have. Though the exact number of representatives in the Council and how they are elected is somewhat in flux, decentralizing our government in this way will prevent $SIE$ from sinking into aristocratic control ever again." #NEW
 #sie_council_priori_desc: "Following a series of failed republican and royal governments, we have established a Council for the People of Siena, one which hopefully shall not fall to aristocracy and corruption like so many before it have. Though the exact number of representatives in the Council and how they are elected is in something of a state of flux, decentralizing our government in this way will surely never lead to Siena falling into another aristocratic government." #OLD ENG

 #Generic Advances
 republican_assembly_advance: "Republican Assembly"
 #republican_assembly_advance_desc: "The heart of our republic, the $republican_assembly$ is an incredibly vital institution should we wish for our country to be governed by noble virtue and excellence." #OLD ITA
 republican_assembly_advance_desc: "The heart of our republic, the $republican_assembly$ is an incredibly vital institution, allowing us to be governed by noble virtue and excellence." #NEW
 #republican_assembly_advance_desc: "The heart of our republic, the $republican_assembly$ is an incredibly vital institution should we wish for our country to be governed by noble virtue and excellence." #OLD ENG

 #Kanem Bornu Advances 
 kbo_iron_helmet_musketeers: "$a_iron_helmet_musketeers$"
 #kbo_iron_helmet_musketeers_desc: "As warfare tactics advance, so must our ways advance as well. By adapting foreign concepts regarding formations, lines of fire, and new gunpowder techniques, we will surely be victorious!" #OLD ITA
 kbo_iron_helmet_musketeers_desc: "As warfare tactics advance, so must our strategy. By adapting foreign innovations and techniques like formations, lines of fire, and new gunpowder recipes, we will surely be victorious!" #NEW
 #kbo_iron_helmet_musketeers_desc: "As warfare tactics advance, so must our ways advance as well. By adapting foreign concepts regarding formations, lines of fire, and new gunpowder techniques, we will surely be victorious!" #OLD ENG
 
 kbo_fixed_military_camps: "Fixed Military Camps"
 #kbo_fixed_military_camps_desc: "By employing a set system of camps around our domain, we will ensure that our army suffers fewer casualties from attrition and is reinforced as quickly as possible." #OLD ITA
 kbo_fixed_military_camps_desc: "By establishing permanent military camps at strategic locations throughout our domain, we will ensure our army suffers fewer casualties from attrition and can be mobilized quickly when needed." #NEW
 #kbo_fixed_military_camps_desc: "By employing a set system of camps around our domain, we will ensure that our army suffers fewer casualties from attrition and is reinforced as quickly as possible." #OLD ENG

 kbo_permanent_sieges: "Kanem Siege Tactics"
 #kbo_permanent_sieges_desc: "The construction of elaborate machines to tear down the enemy's walls is a familiar sight to our armies. However, innovating our path to mobile artillery that can withstand days of siege while firing is a new advance that will surely lead us to victory!" #OLD ITA
 kbo_permanent_sieges_desc: "Our armies are experienced with siege machinery, but adopting mobile artillery that can maintain sustained fire would secure our victory whenever we attack an enemy's walls!" #NEW
 #kbo_permanent_sieges_desc: "The construction of elaborate machines to tear down the enemy's walls is a familiar sight to our armies. However, innovating our path to mobile artillery that can withstand days of siege while firing is a new advance that will surely lead us to victory!" #OLD ENG

 kbo_council_clan_heads: "Council of Clan Heads"
 #kbo_council_clan_heads_desc: "Delegating administrative duties to local clan heads may relinquish some of our central authority, but our advisors insist that we shall reap great benefits in return." #OLD ITA
 kbo_council_clan_heads_desc: "Delegating administrative duties to local clan heads may mean relinquishing some of our central authority, but our advisors insist that we shall reap great benefits in return." #NEW
 #kbo_council_clan_heads_desc: "Delegating administrative duties to local clan heads may relinquish some of our central authority, but our advisors insist that we shall reap great benefits in return." #OLD ENG
 
 # Saxon advances
 meissen_lion: "Il Leone di Meißen"
 #meissen_lion_desc: "Il Leone di Meißen, noto anche come Markmeißnische Löwe, occupa un posto speciale nell'araldica. Rappresentando il simbolo di potere della dinastia Wettin, il leone nero e corazzato con una lingua rossa guarda a sinistra in un campo dorato. La sua immagine appare in varie forme, tra cui su lapidi dipinte, insegne, elmi, monete e sigilli, simboleggiando l'appartenenza della città di Meißen al Mark Meißen e adornando gli stemmi di numerose città e comunità. Alcuni lo collegano al leone di Turingia ricolorato." #OLD ITA
 meissen_lion_desc: "The Meißen Lion, also known as the #italic Markmeißnische Löwe#!, holds a special place in heraldry. Representing the $wettin_dynasty$ dynasty's symbol of power, an armored black lion with a red tongue gazes to the left on a golden field. Its image appears in various forms, including on painted tombstones, ensigns, helmets, coins, and seals, symbolizing the affiliation of the city of $meissen$ to the #italic Mark Meißen#! and adorning the coats of arms of numerous towns and communities. Some link it to the recolored Thuringian lion." #NEW
 #meissen_lion_desc: "The Meißen Lion, also known as the Markmeißnische Löwe, holds a special place in heraldry. Representing the Wettin dynasty's symbol of power, the black, armored lion with a red tongue gazes to the left in a golden field. Its image appears in various forms, including on painted tombstones, ensigns, helmets, coins, and seals, symbolizing the affiliation of the city of Meißen to the Mark Meißen and adorning the coats of arms of numerous towns and communities. Some link it to the recolored Thuringian lion." #OLD ENG
 a_mining_heritage: "Un Patrimonio Minerario"
 #a_mining_heritage_desc: "Per secoli, l'attività mineraria ha plasmato il paesaggio, l'economia e la cultura della regione, con importanti scoperte di argento alla fine del XII secolo che hanno attirato minatori e mercanti da diverse regioni, favorendo la crescita dei Monti Metalliferi e l'importanza e lo sviluppo del nostro regno." #OLD ITA
 a_mining_heritage_desc: "For centuries, mining has shaped our landscape, economy, and culture. Significant $silver$ discoveries in the region have attracted miners and traders from diverse regions, fostering the Ore Mountains' growth and expanding our realm's significance and development." #NEW
 #a_mining_heritage_desc: "For centuries, mining has shaped the region's landscape, economy, and culture, with significant silver discoveries in the late 12th century attracting miners and traders from diverse regions, fostering the Ore Mountains' growth and our realm's significance and development." #OLD ENG
 meissner_groschen: "Meißner Groschen"
 #meissner_groschen_desc: "Il Meißner groschen servirà come moneta regionale della nostra nazione. Questa moneta si basa sul groschen di Praga, che sostituiremo. Questo nuovo groschen di grandi dimensioni segnerà l'inizio di una nuova era nella storia della nostra moneta e ci permetterà di controllare molto meglio i suoi afflussi." #OLD ITA
 meissner_groschen_desc: "The #italic Meißner groschen#! will serve as our national currency. This coin is based on the #italic Prague groschen#!, which we will replace. This new large groschen will mark the beginning of a new era in the history of our coinage and will let us better control its influxes." #NEW
 #meissner_groschen_desc: "The Meißner groschen will serve as the regional currency of our nation. This coin is based on the Prague groschen, which we will replace. This new large groschen will mark the beginning of a new era in the history of our coinage and will let us control its influxes much better." #OLD ENG
 a_resilient_soul: "Un'Anima Resiliente"
 #a_resilient_soul_desc: "Nella nostra nazione, le persone sono veramente resilienti, incarnando una determinazione incrollabile di fronte alle sfide. Affronta le avversità con spirito incrollabile, trovando forza nell'unità e nell'impegno costante verso i valori condivisi. La loro indomita resilienza ci spinge in avanti, permettendoci di superare qualsiasi ostacolo si presenti sulla nostra strada, e ne usciremo sempre più forti e determinati che mai." #OLD ITA
 a_resilient_soul_desc: "Our people are truly resilient, embodying unwavering determination in the face of challenges. They weather adversity with unwavering spirit, finding strength in unity and a steadfast commitment to their shared values. Their indomitable resilience propels us forward, enabling us to overcome any obstacle that comes our way. We will always emerge stronger and more determined than ever before." #NEW
 #a_resilient_soul_desc: "In our nation, the people are truly resilient, embodying unwavering determination in the face of challenges. They weather adversity with unwavering spirit, finding strength in unity and a steadfast commitment to their shared values. Their indomitable resilience propels us forward, enabling us to overcome any obstacle that comes our way, we will always emerge stronger and more determined than ever before." #OLD ENG
 #saxon_court: "La Corte Sassone" #OLD ITA
 saxon_court: "The $SAX_ADJ$ Court" #NEW
 #saxon_court: "The Saxon Court" #OLD ENG
 #saxon_court_desc: "La Corte sassone rimane un pilastro dei compiti pubblici nel governo della Sassonia Elettorale, accanto agli Stati civili e militari. I regolamenti della Corte regolano la routine quotidiana e le responsabilità dei funzionari all'interno dei loro uffici, mentre la composizione della Corte comprende nobili e popolani che servono la famiglia regnante e contribuiscono al governo e all'amministrazione del dominio. Mentre ogni membro adulto della famiglia regnante mantiene la propria corte, noi ne creeremo uno grande e permanente nella nostra capitale, attirando le migliori menti del regno." #OLD ITA
 saxon_court_desc: "The $SAX_ADJ$ Court is a pillar of Electoral $SAX$'s government, alongside civil and military administration. Court regulations define the responsibilities and daily routines of officials, while the court itself is composed of both nobles and peasants serving the ruling family in governance and administration. Traditionally, each adult member of the ruling family maintained their own household court, but we will now create a single, permanent court in our capital, attracting the finest minds in the realm." #NEW
 #saxon_court_desc: "The Saxon Court remains a pillar of public tasks in Electoral Saxony's government, alongside the civil and military states. Court regulations govern the daily routine and responsibilities of officials within their offices, while the court's composition includes nobles and commoners who serve the ruling family and contribute to the government and administration of the dominion. While each adult member of the ruling family maintains their own court, we will create a big permanent one in our capital, attracting the best minds in the realm." #OLD ENG
 a_tolerant_society: "Una Società Tollerante"
 #a_tolerant_society_desc: "Di fronte all'inimicizia che affligge altre terre, noi restiamo fermi per evitare che la sua morsa prenda piede nel nostro regno. Indipendentemente dalle diverse fedi dei nostri sudditi, la nostra nazione sarà costruita sui solidi pilastri della tolleranza e della fratellanza, favorendo una coesistenza armoniosa tra tutte le comunità. Uniti da una visione comune, forgeremo una nazione dove il rispetto e la comprensione fioriscono, aprendo la strada a un futuro prospero." #OLD ITA
 a_tolerant_society_desc: "Religious infighting and intolerance plagues other lands, but we stand firm against allowing such strife to fester in our realm. Regardless of the diverse faiths our subjects hold, this nation shall be built on the strong pillars of tolerance and brotherhood, fostering a harmonious coexistence among all communities. United by a common vision, we will be forging a nation where respect and understanding flourish, paving the way for a prosperous future." #NEW
 #a_tolerant_society_desc: "In the face of enmity that plagues other lands, we stand firm to prevent its grip from taking hold in our realm. Regardless of the diverse faiths held by our subjects, our nation shall be built on the strong pillars of tolerance and brotherhood, fostering a harmonious coexistence among all communities. United by a common vision, we will be forging a nation where respect and understanding flourish, paving the way for a prosperous future." #OLD ENG
 furstenschule: "Fürstenschule"
 #furstenschule_desc: "Quando la Riforma prende piede e lo Stato assume l'amministrazione della Chiesa, sorge una nuova responsabilità per lo Stato emergente: l'istruzione, che prima apparteneva alla Chiesa. Per prepararsi alle università di nuova fondazione, nasceranno tre scuole sassoni per i principi, utilizzando proprietà monastiche secolarizzate. Verranno creati i consigli scolastici di Pforta, Grimma e Meißen, che supervisioneranno e manterranno queste tre scuole statali e principesche. In questo modo, lo Stato assumerà un ruolo significativo nel plasmare il paesaggio educativo, favorendo la conoscenza e la crescita intellettuale dei futuri leader della Sassonia." #OLD ITA
 furstenschule_desc: "As the Reformation takes hold and the state assumes control over religious administration, a new responsibility arises for the emerging state: education, which was previously the duty of the Church. We will found princely schools at Pforta, $grimma$, and $meissen$ using former monastic properties. Thus, the state will take on a significant role in shaping the educational landscape, fostering knowledge and intellectual growth for the future leaders of $SAX$." #NEW
 #furstenschule_desc: "As the Reformation takes hold and the state assumes Church administration, a new responsibility arises for the emerging state: education, which previously belonged to the Church. To prepare for the newly founded universities, three Saxon schools for princes will come into being, utilizing secularized monastic property. The school boards of Pforta, Grimma, and Meißen will be formed, overseeing and maintaining these three state and princely schools. Thus, the state will take on a significant role in shaping the educational landscape, fostering knowledge and intellectual growth for the future leaders of Saxony." #OLD ENG
 bonded_by_loyalty: "Legati dalla Fedeltà"
 #bonded_by_loyalty_desc: "Che si tratti dei nostri connazionali o dei nostri solidi alleati, i nostri valorosi eserciti non vacilleranno mai nella loro incrollabile convinzione di trionfare. Con spirito indomito, si impegneranno coraggiosamente in battaglia, decisi a perseverare fino all'ultimo soldato. Insieme, uniti nello scopo e nella lealtà, andremo avanti, senza lasciare nulla di intentato nella nostra ricerca della vittoria." #OLD ITA
 bonded_by_loyalty_desc: "Our valiant armies never waver! They demonstrate exceptional morale and loyalty, standing firm whether defending our realm or supporting allies. With indomitable spirits, they will press forward even in desperate circumstances, refusing defeat until physically unable to continue." #NEW
 #bonded_by_loyalty_desc: "Whether it be to our fellow countrymen or our steadfast allies, our valiant armies will never waver in their unwavering belief in triumph. With indomitable spirits, they will courageously engage in battle, resolute to persevere until the very last soldier stands. Together, united in purpose and loyalty, we shall forge ahead, leaving no stone unturned in our pursuit of victory." #OLD ENG
 #meissner_porcelain: "Porcellana Meissner" #OLD ITA
 meissner_porcelain: "Meissner $porcelain$" #NEW
 #meissner_porcelain: "Meissner Porcelain" #OLD ENG
 #meissner_porcelain_desc: "La Sassonia è il primo produttore europeo di porcellana, che porterà ricchezza e prestigio alla corte dei Wettin." #OLD ITA
 meissner_porcelain_desc: "$SAX$ is the first country in $europe$ to produce $porcelain$, which will bring wealth and prestige to the $wettin_dynasty$ court." #NEW
 #meissner_porcelain_desc: "Saxony is the first European producer of porcelain, which will bring wealth and prestige to the Wettin court." #OLD ENG
 #saxon_baroque: "Barocco Sassone" #OLD ITA
 saxon_baroque: "$SAX_ADJ$ Baroque" #NEW
 #saxon_baroque: "Saxon Baroque" #OLD ENG
 #saxon_baroque_desc: "Dresda e Lipsia, insieme a piccole case ufficiali e padronali, promuovono maniere raffinate in quest'epoca, ottenendo un riconoscimento internazionale. Edifici rappresentativi come il Dresdner Hof incarnano la grandezza della Sassonia, mentre l'opera di Johann Sebastian Bach trasforma Lipsia in una città della musica, sostenendo una fiorente cultura elevata. La regione vanta forme culturali uniche, tra cui l'artigianato dei Monti Metalliferi e le tradizioni culinarie come il Dresdner Christstollen." #OLD ITA
 saxon_baroque_desc: "$dresden$ and $leipzig$, among other locales, have gained international recognition for being centers of $SAX_ADJ$ Baroque culture. Magnificent architecture, like the Dresdner Hof, epitomize the grandeur of $SAX$, while Johann Sebastian Bach's work has transformed $leipzig$ into a city of music and thriving highbrow culture. The region boasts unique expressions of culture, including handicrafts from the Ore Mountains and culinary traditions like the #italic Dresdner Christstollen#!." #NEW
 #saxon_baroque_desc: "Dresden and Leipzig, along with smaller official and manor houses, foster refined manners in this era, gaining international recognition. Representative buildings like the Dresdner Hof epitomize the grandeur of Saxony, while Johann Sebastian Bach's work turns Leipzig into a city of music, supporting a thriving high culture. The region boasts unique cultural forms, including handicrafts from the Ore Mountains and culinary traditions like the Dresdner Christstollen." #OLD ENG
 retablissement: "Stabilimento"
 #retablissement_desc: "Dopo guerre tumultuose, una nuova era si affaccia sulla Sassonia: lo straordinario #italic Stabilimento#! Sassone. Tra le rovine, la nazione risorgerà come una fenice, ricostruendo la sua economia distrutta e tracciando un percorso verso la prosperità. Guidata da una miscela di riforme statali visionarie e di spesa disciplinata, la nostra nazione emergerà come l'ambito hub del commercio in Germania. Grazie a un'abilità amministrativa senza pari e a un'attenzione strategica alla crescita economica, questa trasformazione risoluta segnerà un momento cruciale nella storia della Germania, plasmando il destino della Sassonia anche in futuro." #OLD ITA
 retablissement_desc: "After tumultuous wars, a new era dawns upon $SAX$ — the remarkable $SAX_ADJ$ #italic Rétablissement#!. Amidst the ruins of our past, our nation will rise like a phoenix, rebuilding its shattered economy and charting a path toward prosperity. Driven by a blend of visionary state reforms and disciplined spending, our nation will emerge as a commercial hub.\n\nWith unparalleled administrative prowess and a strategic focus on economic growth, this resolute transformation will mark a pivotal moment in history, shaping the destiny of $SAX$ well into the future." #NEW
 #retablissement_desc: "After tumultuous wars, a new era dawns upon Saxony — the remarkable Saxon #italic Rétablissement#!. Amidst the ruins, the nation will rise like a phoenix, rebuilding its shattered economy and charting a path toward prosperity. Driven by a blend of visionary state reforms and disciplined spending, our nation will emerge as the coveted hub of commerce in Germany. With unparalleled administrative prowess and a strategic focus on economic growth, this resolute transformation will mark a pivotal moment in German history, shaping the destiny of Saxony well into the future." #OLD ENG
 #saxon_industrialization: "Industrializzazione Sassone" #OLD ITA
 saxon_industrialization: "$SAX_ADJ$ Industrialization" #NEW
 #saxon_industrialization: "Saxon Industrialization" #OLD ENG
 #saxon_industrialization_desc: "L'industrializzazione precoce della Sassonia è evidente, con un settore industriale molto sviluppato rispetto ad altre regioni. Il sistema manifatturiero, che produce principalmente per l'esportazione, è fiorito e farà della Sassonia uno Stato leader nel processo di industrializzazione della Germania. L'emergere di paesaggi commerciali più piccoli e il commercio saranno fondamentali per promuovere la crescita economica della regione e i collegamenti con altri mercati europei." #OLD ITA
 saxon_industrialization_desc: "$SAX$'s successful early industrialization is evident, with a highly developed industrial sector compared to other regions. The manufactory system, producing mainly for export, has flourished and will make $SAX$ a leading state in $GER$'s industrialization process. The emergence of smaller commercial landscapes and trade will be instrumental in promoting the region's economic growth and connections to other markets in $europe$." #NEW
 #saxon_industrialization_desc: "Saxony's early industrialization is evident, with a highly developed industrial sector compared to other regions. The manufactory system, producing mainly for export, has flourished and will make Saxony a leading state in Germany's industrialization process. The emergence of smaller commercial landscapes and trade will be instrumental in promoting the region's economic growth and connections to other European markets." #OLD ENG

 
 # Lithuanian
  land_of_many_religions: "Il Paese delle Molte Religioni"
 #land_of_many_religions_desc: "Il nostro popolo ha l'opportunità di coesistere con uomini e donne di molte fedi. Questa diversa composizione sociale è impressa nei nostri quadri giuridici e nelle nostre convinzioni. Insieme, siamo più forti!" #OLD ITA
 land_of_many_religions_desc: "Our people coexist with fellow men and women of many faiths. This diverse social composition is embedded in our legal frameworks and beliefs. Together, we are stronger!" #NEW
 #land_of_many_religions_desc: "Our people have the opportunity to coexist with fellow men and women of many faiths. This diverse social composition is imprinted in our legal frameworks and beliefs. Together, we are stronger!" #OLD ENG

 ukrainian_farmlands: "Terreni Agricoli Ucraini"
 #ukrainian_farmlands_desc: "L'Ucraina, o terre di confine in lingua slava, è una regione che si estende alle estremità meridionali del nostro grande dominio. È sede di ricche fattorie di cereali, che sono vitali per la nostra esistenza e prosperità, in quanto forniscono molto grano per il nostro magazzino e per i mercanti di tutto il $europe$." #OLD ITA
 ukrainian_farmlands_desc: "Ukraine, or the 'borderlands' in $slavic$ language, is a region that spreads across the southern end of our great domain. It is home to highly productive grain farms, which are vital to our continued existence and prosperity, as they supply much grain for our storage and to merchants across all of $europe$." #NEW
 #ukrainian_farmlands_desc: "Ukraine, or the borderlands in Slavic language, is a region that spreads across the southern ends of our great domain. It is home to rich grain farms, making them vital for our continued existence and prosperity as they supply much grain for our storage and to merchants across all of $europe$." #OLD ENG

 migrant_opportunities: "Opportunità per i Migranti"
 #migrant_opportunities_desc: "Le opportunità mercantili e la promessa di una vita migliore sono alcune delle ragioni per cui le nostre città e i nostri insediamenti tendono a ricevere diverse ondate di migranti. Molti uomini e donne decidono di trasferirsi nelle nostre terre in cerca di fortuna, che a sua volta accresce la nostra." #OLD ITA
 migrant_opportunities_desc: "Mercantile opportunities and the promise of a better life are some of the reasons as to why our towns and settlements tend to receive constant waves of immigration. Many men and women relocate to our lands seeking their fortune, and their presence and contributions increase our fortune in turn." #NEW
 #migrant_opportunities_desc: "Mercantile opportunities and the promise of a better life are some of the reasons as to why our towns and settlements tend to receive several waves of migrants. Many men and woman decide to relocate themselves to our lands seeking their fortune, which in turn increases ours." #OLD ENG

 two_realms: "Due Regni"
 #two_realms_desc: "A causa delle dimensioni del nostro regno, la nostra giurisdizione rientra in due ambiti distinti. A nord si trova il nucleo dei nostri territori, che abbraccia con orgoglio le nostre tradizioni culturali e la nostra condotta. Tuttavia, il sud e l'est includono spesso un certo grado di divergenza dalle nostre norme centrali. Rispettare questa diversità non farà altro che rafforzare la nostra posizione geopolitica." #OLD ITA
 two_realms_desc: "Due to the size of our realm, our jurisdiction falls under two distinct frameworks: To the north lies the core of our territories, proudly embracing our cultural traditions and social mores. However, our southern and eastern regions often diverge to a certain degree from our central norms. To respect such diversity will strengthen our nation as well as our position on the geopolitical stage." #NEW
 #two_realms_desc: "Due to the size of our realm, our jurisdiction falls under two distinct frameworks. To the north lies the core of our territories, proudly embracing our cultural traditions and conduct. However, our south and east often include certain degree of divergence from our central norms. To respect such diversity will only strengthen our geopolitical position." #OLD ENG

 chacery_slavonic: "Cancelleria Slava"
 #chacery_slavonic_desc: "Per unire la vastità del nostro regno, è necessaria una lingua unificata e l'impiego di molti membri del clero alfabetizzati per diffonderla. Lo sviluppo di tale lingua per registrare la nostra storia e mantenere il nostro apparato amministrativo non è solo un segno di orgoglio e prestigio, ma anche un mezzo per creare un governo distinto, separandoci linguisticamente e culturalmente dai nostri vicini orientali." #OLD ITA
 chacery_slavonic_desc: "To help connect our people across our vast realm, we need a unified language, and require many literate members of the clergy to spread it. The development of such a language to record our history and maintain our administrative apparatus is not only a sign of national pride and prestige, but also a means of creating a distinct government, separating us linguistically and culturally from our neighbors to the east." #NEW
 #chacery_slavonic_desc: "To bridge together the vastness of our realm, there is need for a unified language and the use of many literate members of the clergy to spread it. The development of such a language to record our history and maintain our administrative apparatus is not only a sign of pride and prestige but also a means to create a distinct government, separating us linguistically and culturally from our eastern neighbors." #OLD ENG

 #supremus_dux_lithuaniae: "Supremus Dux Lithuaniae" #OLD ITA
 supremus_dux_lithuaniae: "'Supremus Dux Lithuaniae'" #NEW
 #supremus_dux_lithuaniae: "Supremus Dux Lithuaniae" #OLD ENG
 #supremus_dux_lithuaniae_desc: "Se vogliamo difenderci dagli aggressori attraverso i nostri $polish$ e $russian_group$ nemici, dobbiamo proiettare forza! Il titolo di #italic Duca Supremo di Lituania#! mira a garantire la nostra presa sul potere, soprattutto contro il crescente potere dei nostri nobili e di coloro che cercano di violare la nostra sovranità." #OLD ITA
 supremus_dux_lithuaniae_desc: "If we are to defend ourselves against our aggressive $polish$ and $russian_group$ foes, we must project strength! Establishing the title of #italic Supreme Duke of Lithuania#! will decisively assert our authority, especially against the growing power of our nobility and others who seek to violate our sovereignty." #NEW
 #supremus_dux_lithuaniae_desc: "If we are to defend ourselves against the aggressors across our $polish$ and $russian_group$ foes, we must project strength! The title of #italic Supreme Duke of Lithuania#! aims at securing our grip to power, especially against the growing power of our nobles and those who seek to violate our sovereignty." #OLD ENG

 ties_with_the_holy_see: "Legami con la Santa Sede"
 #ties_with_the_holy_see_desc: "Anni di negoziati con il Santo Padre ci hanno portato ad abbracciare $catholic$, con la benedizione dei nostri vicini di $polish$ e del Papa stesso, durante un processo di cristianizzazione turbolento e unico. Dopo che la lotta per la ricerca della nostra identità spirituale si è placata, è chiaro che siamo diventati un faro del cattolicesimo, uno scudo contro i pagani e gli eretici che permeano i nostri confini." #OLD ITA
 ties_with_the_holy_see_desc: "Years of negotiations with the Holy Father have resulted in our embracing $catholic$, with the blessing of our $polish$ neighbors and the Pope himself, during a turbulent and unique Christianization process. After our struggle to seek our spiritual identity subsided, it is clear that we have become a beacon of $catholic$, a shield against the heathens and heretics that threaten our society." #NEW
 #ties_with_the_holy_see_desc: "Years of negotiations with the Holy Father have resulted in us embracing $catholic$, with the blessing of our $polish$ neighbors and the Pope himself, during a turbulent and unique Christianization process. After our struggle to seek our spiritual identity subsided, it is clear that we have become a beacon of Catholicism, a shield against the heathens and heretics that permeate our borders." #OLD ENG

 #patriarchate_of_lithuania: "Patriarcato di Lituania" #OLD ITA
 patriarchate_of_lithuania: "Patriarchate of $LIT$" #NEW
 #patriarchate_of_lithuania: "Patriarchate of Lithuania" #OLD ENG
 #patriarchate_of_lithuania_desc: "L'abolizione di $romuva$, una fede abbracciata dai nostri antenati, ha scosso il tessuto sociale del popolo di $LIT_ADJ$. Per garantire il nostro futuro, abbiamo scelto il cammino di $orthodox$, celebrando la nostra nuova identità. Le autorità religiose della nostra ritrovata fede $orthodox$ devono mantenere l'autonomia dai patriarcati stranieri, per evitare interferenze esterne." #OLD ITA
 patriarchate_of_lithuania_desc: "The abolition of $romuva$, a faith embraced by our ancestors, has shaken the very foundations of $LIT_ADJ$ society. Yet, in order to secure a brighter future, we have chosen the path of $orthodox$ and fully celebrate our new identity. But if we are to be successful in that, the religious authorities of our newfound $orthodox_ADJ$ faith must maintain autonomy from foreign patriarchates in order to avoid external interference." #NEW
 #patriarchate_of_lithuania_desc: "The abolition of $romuva$, a faith embraced by our ancestors, shook the social fabric of the $LIT_ADJ$ people. In order to secure our future, we have chosen the path of $orthodox$, celebrating our new identity. The religious authorities of our newfound $orthodox$ faith must maintain autonomy from foreign patriarchates in order to avoid external interference." #OLD ENG

 #columns_of_gediminids: "Colonne di Gediminidi" #OLD ITA
 columns_of_gediminids: "Columns of $gediminid_dynasty$s" #NEW
 #columns_of_gediminids: "Columns of Gediminids" #OLD ENG
 #columns_of_gediminids_desc: "L'orgoglio del nostro popolo e lo stemma che campeggia sui nostri stendardi trae origine da una delle nostre dinastie più celebri e di successo, i Gediminidi. Molti dei loro più brillanti hanno guidato la nostra nazione attraverso tempi turbolenti e verso un'ampia prosperità, grazie a un'attenta politica e a una guida capace. Le colonne di questi grandi leader simboleggiano le solide fondamenta e la tenacia del nostro Paese e dei nostri concittadini." #OLD ITA
 columns_of_gediminids_desc: "The coat of arms that hangs on our banners originates from one of our most celebrated dynasties, the $gediminid_dynasty$ family. Many of their brightest have led our nation through turbulent times into ample prosperity with careful statesmanship and capable guidance. The columns of such great leaders symbolize the strong foundation and tenacity of our country and our fellow men and women." #NEW
 #columns_of_gediminids_desc: "The pride of our people and the coat of arms that hangs on our banners originates from one of our most celebrated and successful dynasties, the Gediminids. Many of their brightest led our nation through turbulent times into ample prosperity with careful statesmanship and capable guidance. The columns of such great leaders symbolize the strong foundation and tenacity of our country and our fellow men and women." #OLD ENG

 warlord_dukes: "Duchi Guerrieri"
 #warlord_dukes_desc: "In due secoli di guerra feroce, i duchi signori della guerra lituani riuscirono a unificare in un vero e proprio Stato guerriero un Paese che prima non era altro che una libera federazione di tribù, a opporre resistenza all'aggressione degli ordini sacri cattolici e a conquistare vaste porzioni di territorio a est. I nostri leader militari si ispirano a questi successi." #OLD ITA
 warlord_dukes_desc: "Over two remarkable centuries of warfare, $LIT_ADJ$ warlord dukes transformed a loose federation of tribes into a unified warrior state. They mounted fierce resistance against the aggression of $catholic_ADJ$ holy orders, while simultaneously conquering vast territories in the East. These legendary achievements continue to inspire our military leaders today." #NEW
 #warlord_dukes_desc: "In remarkable two centuries of fierce warfare, Lithuanian warlord dukes managed to unify into a proper warrior state a country that was nothing more than a loose federation of tribes before, mount resistance against the aggression of the Catholic holy orders and conquer vast swaths of land in the East. Our military leaders are inspired by those achievements." #OLD ENG
 auksine_laisve: "Auksinė Laisvė"
 #auksine_laisve_desc: "Auksinė Laisvė, in lituano Libertà Dorata, è un insieme di leggi e privilegi che pongono i nobili del Paese al di sopra delle altre classi e spesso anche del potere del monarca e del Parlamento. Arrivando in Lituania dalla Polonia, questo sistema unico aumenterà la loro fedeltà alla corona, a patto che il monarca non tenti di rinnegare la promessa di mantenere lo stato d'oro della libertà per la nobiltà." #OLD ITA
 auksine_laisve_desc: "#italic Auksinė Laisvė#!, or 'Golden Liberty', is a set of laws and privileges that set the nobles of our country above other classes, and often even above the power of the Crown or the Council. This unique system spread to $LIT$ via $POL$, and is intended to increase the loyalty of the aristocracy to the Crown, as long as the monarch does not attempt to renege on their promise to uphold this extraordinary state of liberty for the nobles." #NEW
 #auksine_laisve_desc: "Auksinė Laisvė, Lithuanian for Golden Liberty, is a set of laws and privileges that put the nobles of the country above other classes, and often even above monarch's and parliament's power. Arriving in Lithuania from Poland, this unique system will increase their loyalty to the crown, as long as the monarch does not attempt to renege on the promise of maintaining the golden state of liberty for the nobility." #OLD ENG
 magdeburg_laws: "Leggi di Magdeburgo"
 #magdeburg_laws_desc: "Una delle conseguenze della deriva della Lituania verso ovest è l'introduzione delle leggi tedesche sulle città in molte aree urbane del Paese. Le Leggi di Magdeburgo, nella loro forma locale personalizzata, regoleranno molti aspetti economici e politici dell'urbanizzazione del Paese, dalla pianificazione urbana al commercio e alla tassazione." #OLD ITA
 magdeburg_laws_desc: "One consequence of $LIT$'s drift towards the West is the introduction of 4GER_ADJ$ city laws to many urban areas of the country. Magdeburg Laws in their unique local form govern many different economic and political aspects of national urbanization, from city planning to trade and taxation." #NEW
 #magdeburg_laws_desc: "One of the consequences of Lithuania's drift towards the west is the introduction of German city laws to many urban areas of the country. Magdeburg Laws in their custom local form will govern many different economic and political aspects of urbanization of the country, from city planning to trade and taxation." #OLD ENG
 magnate_estates: "Complessi Magnatizi"
 #magnate_estates_desc: "I magnati della Lituania sono chiamati 'piccoli re' per le loro vaste proprietà e gli eserciti privati. Difendendo l'indivisibilità dei loro domini e cercando di massimizzare i profitti da essi, svilupperanno un sistema che per molti aspetti assomiglia a quello degli antichi latifondi romani." #OLD ITA
 magnate_estates_desc: "Magnates in $LIT$ are called 'little kings' for their vast estates and private armies. Defending the indivisibility of their domains and trying to maximize the profits from them, they will develop a system in many regards resembling that of ancient Roman #italic latifundia#!, wherein wealthy individuals hold large estates, often worked by slaves or tenant farmers." #NEW
 #magnate_estates_desc: "Magnates of Lithuania are called 'little kings' for their vast estates and private armies. Defending the indivisibility of their domains and trying to maximize the profits from them, they will develop a system in many regards resembling that of ancient Roman latifundia." #OLD ENG
 #lithuanian_hussars: "Ussari Lituani" #OLD ITA
 lithuanian_hussars: "$LIT_ADJ$ Hussars" #NEW
 #lithuanian_hussars: "Lithuanian Hussars" #OLD ENG
 #lithuanian_hussars_desc: "Gli Ussari alati sono la cavalleria pesante della Lituania e della Polonia. Introdotti in entrambi i Paesi dalle riforme di Stefano Batory, Re di Polonia e Granduca di Lituania, rimarranno imbattuti sui campi di battaglia dell'Europa orientale per oltre un secolo." #OLD ITA
 lithuanian_hussars_desc: "Winged Hussars are the heavy cavalry of $LIT$, just as they are in $POL$. Introduced in both countries by reforms of Stephen Batory, King of $POL$ and Grand Duke of $LIT$, they will remain undefeated on the battlefields of $eastern_europe$ for more than a century." #NEW
 #lithuanian_hussars_desc: "Winged Hussars are the heavy cavalry of Lithuania as much as of Poland. Introduced in both countries by reforms of Stephen Batory, King of Poland and Grand Duke of Lithuania, they will remain undefeated on the battlefields of Eastern Europe for more than a century." #OLD ENG
 #statutes_of_lithuania: "Statuti della Lituania" #OLD ITA
 statutes_of_lithuania: "Statutes of $LIT$" #NEW
 #statutes_of_lithuania: "Statutes of Lithuania" #OLD ENG
 #statutes_of_lithuania_desc: "Gli Statuti della Lituania sono un insieme di tre diverse riforme legali che raccolgono, unificano e aggiornano le leggi del regno. Noti per le loro pene severe e per l'introduzione della pena di morte, sono in linea con molti codici penali occidentali contemporanei. Ogni crimine dovrebbe essere punito allo stesso modo, indipendentemente dal ceto sociale della persona che lo commette, ma in pratica verranno mantenuti molti svantaggi per i contadini. Lo Statuto lituano ispirerà in seguito una riforma simile in Russia." #OLD ITA
 statutes_of_lithuania_desc: "Statutes of $LIT$ are a set of three different legal reforms which aggregate, unify, and update the laws of the realm. Known for harsh punishments and the introduction of the death penalty, these statutes are in line with many contemporary Western penal codes. Each crime is supposed to be punished the same regardless of the class of the person committing it, but in practice, the peasants were often at a disadvantage compared to how members of other estates were treated." #NEW
 #statutes_of_lithuania_desc: "Statutes of Lithuania are a set of three different legal reforms which gather, unify and update the laws of the realm. Known for their harsh punishments and the introduction of the death penalty, they are in line with many contemporary Western penal codes. Each crime is supposed to be punished the same regardless of the class of the person committing it, but in practice, many disadvantages for the peasantry will be maintained. Lithuanian Statutes will later inspire a similar reform in Russia." #OLD ENG
 #lithuanian_renaissance: "Rinascimento Lituano" #OLD ITA
 lithuanian_renaissance: "$LIT_ADJ$ $renaissance$" #NEW
 #lithuanian_renaissance: "Lithuanian Renaissance" #OLD ENG
 #lithuanian_renaissance_desc: "La Lituania ha vissuto un Rinascimento alla fine del XV e all'inizio del XVI secolo. Ispirati dalle idee della Riforma e dalle influenze italiane, in quest'epoca fiorirono l'istruzione, le arti, l'architettura e la letteratura. La lingua lituana verrà formulata nella sua forma scritta e verranno create le prime opere di letteratura lituana." #OLD ITA
 lithuanian_renaissance_desc: "$LIT$ experienced a $renaissance$ in the late 15th and early 16th centuries. Inspired by the ideas of the Reformation and influenced by the $ITA_ADJ$ $renaissance$, there was a prolific flourishing of education, arts, architecture, and literature during this era. This period will also see the creation of a written form of $lithuanian_dialect$ and, subsequently, the first works of $lithuanian_dialect$ literature." #NEW
 #lithuanian_renaissance_desc: "Lithuania experienced a Renaissance in the late 15th and early 16th centuries. Inspired by the ideas of Reformation and Italian influences, education, arts, architecture and literature flourished in this era. Lithuanian language will be formulated in its written form and first works of Lithuanian literature will be created." #OLD ENG


 #bavarian_legitimacy: "Ducato Bavarese" #OLD ITA
 bavarian_legitimacy: "$BAV_ADJ$ Dukedom" #NEW
 #bavarian_legitimacy: "Bavarian Dukedom" #OLD ENG
 #bavarian_legitimacy_desc: "Ci è stato concesso il titolo di Duca di Baviera dall'Imperatore in persona, e impreziosendoci come veri protettori del Ducato bavarese, ci assicureremo che la nostra legittimità non possa essere messa in discussione." #OLD ITA
 bavarian_legitimacy_desc: "We have been granted the rulership of $BAV$ directly by the Emperor! By embellishing ourselves as the divinely-appointed protectors of $BAV$, we will ensure our legitimacy cannot be questioned." #NEW
 #bavarian_legitimacy_desc: "We have been granted the title of Duke of Bavaria by the Emperor himself, and by embellishing ourselves as the true protectors of the Bavarian Duchy, we will ensure our legitimacy can not be questioned." #OLD ENG
 #bavarian_imperial_knights: "Cavalieri Imperiali Bavaresi" #OLD ITA
 bavarian_imperial_knights: "$BAV_ADJ$ Imperial Knights" #NEW
 #bavarian_imperial_knights: "Bavarian Imperial Knights" #OLD ENG
 #bavarian_imperial_knights_desc: "La nostra Nobiltà si è distinta come formidabili cavalieri al servizio del Sacro Romano Impero. Dobbiamo promuovere queste truppe per garantire la sopravvivenza della nostra integrità ducale." #OLD ITA
 bavarian_imperial_knights_desc: "Our nobles have distinguished themselves as formidable knights in the service of the $hre$. We should nurture and scrupulously maintain these troops to ensure the survival of our ducal integrity." #NEW
 #bavarian_imperial_knights_desc: "Our Nobility has distinguished itself as formidable knights in the service of the Holy Roman Empire. We need to foster these troops to ensure the survival of our ducal integrity." #OLD ENG
 #exploit_the_alpine_trade: "I Poli Commerciali della Baviera" #OLD ITA
 exploit_the_alpine_trade: "Trading Hubs of $BAV$" #NEW
 #exploit_the_alpine_trade: "Trading Hubs of Bavaria" #OLD ENG
 #exploit_the_alpine_trade_desc: "Le nostre terre sono frequentate dai mercanti che commerciano sale, argento e bestiame verso le ricche terre a sud. Dovremmo essere degli sciocchi per non sfruttare la loro presenza e fare in modo che queste rotte commerciali portino ricchi benefici ai nostri insediamenti urbani." #OLD ITA
 exploit_the_alpine_trade_desc: "Our lands are frequently crossed by merchants wishing to trade $salt$, $silver$, and $livestock$ in the rich lands to our south. We would be foolish not to take advantage of their presence, and therefore will establish bustling trade hubs in our own lands to attract their business." #NEW
 #exploit_the_alpine_trade_desc: "Our lands are frequented by the merchants trading salt, silver, and livestock towards the rich lands to our south. We would have to be fools to not exploit their presence and ensure these trade routes bring rich benefits to our urban settlements." #OLD ENG
 bavarian_brewing_expertise: "Birrai Esperti"
 #bavarian_brewing_expertise_desc: "Le nostre terre sono ricche di materiali necessari per la produzione di birra e la nostra gente sfrutta prontamente questo fatto. Molti dei piccoli birrifici potrebbero diventare aziende di successo con il giusto supporto." #OLD ITA
 bavarian_brewing_expertise_desc: "Our lands are rich in the crops and fresh water required to brew beer, and our people readily enjoy this abundance. Many small breweries could grow into successful businesses, with the right support." #NEW
 #bavarian_brewing_expertise_desc: "Our lands are rich in the materials required to brew beer and our people readily exploit this fact. Many of the small breweries could grow into successful businesses with the right support." #OLD ENG
 #bavarian_culture_buildings: "Istituzioni Culturali Bavaresi" #OLD ITA
 bavarian_culture_buildings: "$BAV_ADJ$ Cultural Institutions" #NEW
 #bavarian_culture_buildings: "Bavarian Cultural Institutions" #OLD ENG
 #bavarian_culture_buildings_desc: "Con la nostra patria ai piedi delle splendide Alpi, siamo una meta di ispirazione per gli artisti di tutta Europa. Se costruissimo e sostenessimo le istituzioni culturali, potremmo trasformare la nostra corte in un centro di cultura e prendere il nostro posto tra le prestigiose potenze europee." #OLD ITA
 bavarian_culture_buildings_desc: "With our homeland at the feet of the beautiful Alps, we are a destination for artists from all over $europe$, who seek inspiration in our incredible landscape. If we were to construct and support the appropriate cultural institutions, we could refine our court into a center of refinement and elegance, one that could rival even the most prestigious powers of $europe$." #NEW
 #bavarian_culture_buildings_desc: "With our homeland at the feet of the beautiful Alps, we are a destination for inspiration for artist from all over Europe. If we were to construct and support cultural institutions, we could refine our court into a center of culture and take our place among the prestigious powers of Europe." #OLD ENG
 bavarian_stem_duchy: "Sogni di Unificazione"
 #bavarian_stem_duchy_desc: "Il popolo bavarese e la sua cultura un tempo erano governati dal Regno di Baviera sotto un'unica bandiera. Dobbiamo puntare a creare uno Stato altrettanto forte e garantire una casa al popolo bavarese." #OLD ITA
 bavarian_stem_duchy_desc: "We once were ruled by $BAV$, unified in culture and allied under a single banner. We must ensure that the new $BAV_ADJ$ state is equally mighty, a home worthy of its strong and proud people." #NEW
 #bavarian_stem_duchy_desc: "The Bavarian people and their culture once were ruled by the Kingdom of Bavaria under one banner. We should aim to establish a state equally strong and ensure a home for the Bavarian people." #OLD ENG
 #bavarian_zelousness: "Una Fede per la Baviera" #OLD ITA
 bavarian_zelousness: "One Faith for $BAV$" #NEW
 #bavarian_zelousness: "One Faith for Bavaria" #OLD ENG
 #bavarian_zelousness_desc: "Dobbiamo fare in modo che la fede del nostro popolo rimanga unita e non venga divisa da pensieri eretici." #OLD ITA
 bavarian_zelousness_desc: "We must ensure our people remain united in their faith, and that they will not be divided by heretical thoughts." #NEW
 #bavarian_zelousness_desc: "We must ensure the faith of our people stays united and will not be split by heretical thoughts." #OLD ENG
 #bavarian_hofkriegsrat: "Hofkriegsrat Bavarese" #OLD ITA
 bavarian_hofkriegsrat: "$BAV_ADJ$ Hofkriegsrat" #NEW
 #bavarian_hofkriegsrat: "Bavarian Hofkriegsrat" #OLD ENG
 #bavarian_hofkriegsrat_desc: "L'istituzione di un Consiglio con l'unico compito di consigliare il nostro sovrano nei momenti di conflitto aiuterà a creare una forza combattente più capace per lo Stato bavarese." #OLD ITA
 bavarian_hofkriegsrat_desc: "Establishing a council with the sole duty of advising our ruler during times of conflict will help us develop a more capable fighting force." #NEW
 #bavarian_hofkriegsrat_desc: "Establishing a Council with the sole duty to advise our ruler during times of conflict will help in the creation of a more capable fighting force for the Bavarian state." #OLD ENG
 bavarian_flexible_diplomats: "Diplomazia Pratica"
 #bavarian_flexible_diplomats_desc: "Non importa se stiamo rispondendo a un signore imperiale o a un potenziale alleato straniero, i nostri diplomatici devono essere preparati a tutto. Solo se consideriamo attentamente gli interessi bavaresi e diamo loro la massima priorità, possiamo avere successo." #OLD ITA
 bavarian_flexible_diplomats_desc: "No matter if we are answering to an Imperial overlord or cozying up to a potential foreign ally, our diplomats must be prepared for everything. But only if they keep $BAV_ADJ$ interests first and foremost in their efforts will we be able to claim true success in our diplomatic maneuverings." #NEW
 #bavarian_flexible_diplomats_desc: "No matter if we are answering to an imperial overlord or a potential foreign ally, our diplomats must be prepared for everything. Only if we consider Bavarian interests carefully and prioritize them the highest can we succeed." #OLD ENG
 #foundation_of_bavarian_army: "Un Esercito per la Baviera" #OLD ITA
 foundation_of_bavarian_army: "An Army for $BAV$" #NEW
 #foundation_of_bavarian_army: "An Army for Bavaria" #OLD ENG
 #foundation_of_bavarian_army_desc: "Solo con un esercito permanente formidabile possiamo rivendicare le nostre ambizioni. Con una giusta concentrazione, possiamo espanderlo senza un impatto rovinoso sulle finanze del nostro Stato." #OLD ITA
 foundation_of_bavarian_army_desc: "Only with a formidable standing army will we have the military might necessary to match our ambitions. With careful focus, we can expand it without having a ruinous impact on our state's finances." #NEW
 #foundation_of_bavarian_army_desc: "Only with a formidable standing army can we claim our own ambitions. With a proper focus, we can expand it without a ruinous impact on our state's finances." #OLD ENG
 #bavarian_coinage: "Moneta Bavarese" #OLD ITA
 bavarian_coinage: "$BAV$ Coin" #NEW
 #bavarian_coinage: "Bavarian Coin" #OLD ENG
 #bavarian_coinage_desc: "Il nostro regno ha bisogno di una nuova moneta standardizzata che funga da valuta unificata per il popolo bavarese. L'istituzione di una zecca di proprietà dello Stato nella nostra capitale garantirebbe il nostro controllo totale su questa nuova moneta." #OLD ITA
 bavarian_coinage_desc: "Our realm needs a new standardized coin to serve as our national unified currency. Establishing a state-owned mint in our capital would ensure our total control over this new coinage." #NEW
 #bavarian_coinage_desc: "Our realm needs a new standardized coin to serve as the unified currency for the Bavarian people. Establishing a state-owned mint in our capital would ensure our total control over this new currency." #OLD ENG
 #bavarian_purity_law: "Legge di Purezza Bavarese" #OLD ITA
 bavarian_purity_law: "$BAV_ADJ$ Purity Law" #NEW
 #bavarian_purity_law: "Bavarian Purity Law" #OLD ENG
 #bavarian_purity_law_desc: "La qualità della nostra birra è riconosciuta da secoli, ma per raggiungere la vera fama dobbiamo garantire il suo status di prestigio per l'eternità. Diversi governanti del passato hanno cercato di istituire delle norme sulla produzione di questa meravigliosa sostanza, e noi potremmo utilizzare questo fatto come sigillo di qualità per i nostri birrifici." #OLD ITA
 bavarian_purity_law_desc: "The excellent quality of our beer has been celebrated for centuries, but for our brews to achieve legendary status, we must ensure their continued prestige and superiority for all time. Several rulers in the past have created regulations and standards for the brewing of this wonderful substance; and we could use this fact as a stamp of our breweries' quality." #NEW
 #bavarian_purity_law_desc: "The quality of our beer has been recognized for centuries, but to reach true fame we need to ensure its prestigious status for all eternity. Several rulers of the past tried to instate some regulations on the brewing of this wonderful substance, and we could use this fact as a sigil of quality for our breweries." #OLD ENG


 hsa_holpfennige: "Hohlpfennig"
 hsa_holpfennige_desc: "Originariamente coniato tra le città di $LUB$ e $HAM$, l'#italic Hohlpfennig#! era una moneta vuota sviluppata come contromisura allo svilimento dilagante, durante un'epoca in cui ogni zecca aveva standard diversi per quanto riguarda la concentrazione di argento su ogni moneta. Come mezzo per condurre le transazioni, la moneta faciliterà le nostre attività commerciali e colmerà il divario tra i mercati esteri e i nostri mercanti."
 hsa_the_cog: "La $n_hanseatic_cog$"
 hsa_the_cog_desc: "$n_hanseatic_cog_desc$"
 #hsa_hanseatic_ties: "Legami Anseatici" #OLD ITA
 hsa_hanseatic_ties: "$HSA_ADJ$ Ties" #NEW
 #hsa_hanseatic_ties: "Hanseatic Ties" #OLD ENG
 #hsa_hanseatic_ties_desc: "La nostra Lega ospita moltissime città e gilde mercantili, tutte con i propri programmi e sforzi. Per mantenere la nostra prosperità ed espandere il nostro raggio d'azione, dobbiamo prestare grande attenzione agli sforzi diplomatici." #OLD ITA
 hsa_hanseatic_ties_desc: "Our League is home to a great many cities and merchant guilds, all with their own agendas and endeavors. In order to maintain our prosperity and expand our reach, we must take a keen interest in diplomatic efforts." #NEW
 #hsa_hanseatic_ties_desc: "Our League is home to great many cities and merchant guilds, all with their own agendas and endeavors. In order to maintain our prosperity and expand our reach, we must take a keen interest in diplomatic efforts." #OLD ENG
 #hsa_seal_of_the_hansa: "Sigillo dell'Ansa" #OLD ITA
 hsa_seal_of_the_hansa: "Seal of the $HSA$" #NEW
 #hsa_seal_of_the_hansa: "Seal of the Hansa" #OLD ENG
 #hsa_seal_of_the_hansa_desc: "Nei mercati di $europe$, da $london$ a $novgorod$, i nostri mercanti sono famosi per la loro ricchezza. La nostra capacità di mobilitare grandi flotte commerciali e di unire decine di città in una perfetta sinfonia di profitto e scambio di merci non è seconda a nessuno." #OLD ITA
 hsa_seal_of_the_hansa_desc: "In markets across $europe$, from $london$ to $novgorod$, our merchants are famed for their affluence. Our ability to mobilize great trade fleets and bring dozens of cities into a perfect symphony of profit and exchange of commodities is second to none." #NEW
 #hsa_seal_of_the_hansa_desc: "In markets across $europe$ from $london$ to $novgorod$, our merchants are famed for their affluence. Our ability to mobilize great trade fleets and bring dozens of cities into a perfect symphony of profit and exchange of commodities is second to none." #OLD ENG
 #hsa_hanseatic_shipwrights: "I Maestri d'Ascia Anseatici" #OLD ITA
 hsa_hanseatic_shipwrights: "$HSA_ADJ$ Shipwrights" #NEW
 #hsa_hanseatic_shipwrights: "Hanseatic Shipwrights" #OLD ENG
 #hsa_hanseatic_shipwrights_desc: "In un momento in cui $europe$ si avvolge di guerre, con i governanti che avanzano pretese nel tentativo di espandere il loro dominio, si rivolgono a noi per costruire grandi flotte che consentano loro di realizzare le loro ambizioni. Armati di secoli di conoscenze sulla costruzione navale e di alcuni dei migliori legni del continente, il nostro processo di costruzione navale è impareggiabile!" #OLD ITA
 hsa_hanseatic_shipwrights_desc: "At a time when $europe$ is enveloped in war, with rulers desperate for expansion pressing claims in all directions, they look to us to build grand fleets that will allow them to fulfill their ambitions. Armed with centuries of accumulated shipwrighting knowledge, and some of the best timber on the continent, our ship-building process is unparalleled!" #NEW
 #hsa_hanseatic_shipwrights_desc: "At a time when $europe$ envelops itself in wars, with rulers pressing claims in an attempt to expand their domain, they look to us to build grand fleets that will allow them to fulfill their ambitions. Armed with centuries of knowledge on shipwrighting and some of the best timber in the continent, our ship-building process is unparalleled!" #OLD ENG
 hsa_draft_merchant_privileges: "Privilegi del Commerciante di Bozze"
 #hsa_draft_merchant_privileges_desc: "I mercanti che conducono affari sotto il nostro sigillo hanno un'influenza e una moneta enorme. Pertanto, consolidare i loro privilegi nei mercati esteri e nazionali non farà altro che aumentare ulteriormente la nostra capacità di fare affari redditizi." #OLD ITA
 hsa_draft_merchant_privileges_desc: "The merchants who conduct business under our seal carry with them tremendous influence and purses brimming with coin. As such, solidifying their privileges in foreign and domestic markets will only further increase our capacity for profitable business." #NEW
 #hsa_draft_merchant_privileges_desc: "The merchants that conduct business under our seal carry with them tremendous influence and coin. As such, solidifying their privileges in foreign and domestic markets will only further to increase our capacity for profitable business." #OLD ENG
 hsa_mastery_of_the_sea: "Padronanza del Mare"
 #hsa_mastery_of_the_sea_desc: "Le nostre tradizioni marittime hanno legato la nostra fortuna a quella del potente mare. Sfruttare il suo potere e rispettarlo non potrebbe che produrre enormi benefici per le nostre attività mercantili..." #OLD ITA
 hsa_mastery_of_the_sea_desc: "Our maritime traditions have linked our fortunes to the mighty sea. To reap all the benefits we possibly can from our marine resources, we must learn to harness the awesome power of the sea — and to treat it with the proper deference. This will have tremendous effects on our trade activities." #NEW
 #hsa_mastery_of_the_sea_desc: "Our maritime traditions have linked our fortunes with that of the mighty sea. To harness its power and respect it would only yield tremendous benefits for our merchant activities..." #OLD ENG
 hsa_exchange_of_ideas: "Scambio di Idee"
 #hsa_exchange_of_ideas_desc: "I mercanti itineranti che portano i nostri affari all'estero sono grandi fari che introducono le conoscenze straniere sulle nostre coste!" #OLD ITA
 hsa_exchange_of_ideas_desc: "Our traveling merchants who carry our business abroad are excellent resources of foreign knowledge. Whenever they return to our shores, they bring innovation and inspiration in their wake." #NEW
 #hsa_exchange_of_ideas_desc: "Traveling merchants that carry our business abroad are great beacons of introducing foreign knowledge to our shores!" #OLD ENG
 hsa_global_reach: "Raggiungi il Mondo"
 #hsa_global_reach_desc: "L'introduzione del commercio su scala globale ha scosso il mondo mercantile. Gli affari regolari con i mercanti stranieri provenienti da angoli lontani sono in piena espansione e, di conseguenza, il nostro tesoro ne beneficia." #OLD ITA
 hsa_global_reach_desc: "The widespread adoption of trade on a global scale has shaken the mercantile world to its core. It is now customary to do regular business with foreign traders from all corners of the world, and our treasury has benefited as a result." #NEW
 #hsa_global_reach_desc: "The introduction of trade on a global scale has shaken the mercantile world. Regular business with foreign merchants from faraway corners is booming and as such, our treasury benefits." #OLD ENG
 #hsa_hanseatic_treasury: "Tesoro Anseatico" #OLD ITA
 hsa_hanseatic_treasury: "$HSA_ADJ$ Treasury" #NEW
 #hsa_hanseatic_treasury: "Hanseatic Treasury" #OLD ENG
 #hsa_hanseatic_treasury_desc: "Un'economia forte e sana è solo uno dei risultati della nostra continua prosperità. Con una moneta ampia e un tesoro soddisfatto, ci siamo affermati come creditori solidi e affidabili." #OLD ITA
 hsa_hanseatic_treasury_desc: "A strong economy is but one result of our prosperity. With ample coin and overflowing coffers, we have established ourselves as robust and dependable creditors." #NEW
 #hsa_hanseatic_treasury_desc: "A strong and healthy economy are but one of the results of our continued prosperity. With ample coin and a satisfied treasury, we have established ourselves as robust and dependable creditors." #OLD ENG
 #hsa_regularized_contributions: "Contributi regolarizzati" #OLD ITA
 hsa_regularized_contributions: "Standardized Contributions" #NEW
 #hsa_regularized_contributions: "Regularized Contributions" #OLD ENG
 hsa_regularized_contributions_desc: "Le numerose entità all'interno della nostra Lega devono essere poste sotto il nostro fermo controllo, nel tentativo di standardizzare i loro contributi mensili e annuali alla nostra tesoreria."
 hsa_reform_the_hanstag: "Riforma l'Hanstag"
 #hsa_reform_the_hanstag_desc: "In tempi di problemi e di evoluzione del pensiero, le nostre istituzioni centrali per l'assemblea e la deliberazione devono essere adattate per affrontare le questioni della nostra epoca." #OLD ITA
 hsa_reform_the_hanstag_desc: "In times of troubles and evolving thought, our central institutions for assembly and deliberation must adapt to deal with emerging challenges and new paradigms." #NEW
 #hsa_reform_the_hanstag_desc: "In times of troubles and evolving thought, our central institutions for assembly and deliberation must be adjusted to deal with the issues of our era." #OLD ENG
 hsa_concept_of_mercantilism: "Concetto di Mercantilismo"
 #hsa_concept_of_mercantilism_desc: "Negli ultimi secoli abbiamo lavorato instancabilmente per integrare i nostri affari nella scala globale del commercio. Ora, più che mai, dobbiamo proteggere i nostri mercanti, per evitare di cadere vittima di faziosità e concorrenza esterna." #OLD ITA
 hsa_concept_of_mercantilism_desc: "Over the past centuries, we have worked tirelessly to integrate our dealings into the global scale of trade. Now, more than ever, we must protect our own merchants, lest we fall victim to factionalism and external competition." #NEW
 #hsa_concept_of_mercantilism_desc: "For the past centuries we have worked tirelessly to integrate our deals in the global scale of trade. Now, more than ever, we must protect our own merchants lest we fall victim to factionalism and external competition." #OLD ENG
 #the_hansa_bank: "La Banca Hansa" #OLD ITA
 the_hansa_bank: "The $HSA$ Bank" #NEW
 #the_hansa_bank: "The Hansa Bank" #OLD ENG
 #the_hansa_bank_desc: "Utilizzando il nuovo sistema di contributi, possiamo sottoscrivere una banca a disposizione dei soci. Sostenuta dalle risorse della Lega, una lettera di credito della banca varrà quanto i contanti. Questo, così come altri strumenti finanziari, darà ai nostri mercanti un vantaggio rispetto agli altri Paesi." #OLD ITA
 the_hansa_bank_desc: "Following our new system of contributions, we can underwrite a bank for members to use. Backed by the resources of the League, a letter of credit from the bank will be as good as cash. This, as well as other financial instruments, will give our merchants an edge over those in other countries." #NEW
 #the_hansa_bank_desc: "Using the new system of contribution, we can underwrite a bank for members to use. Backed by the resources of the league, a letter of credit from the bank will be as good as cash. This, as well as other financial instruments, will give our merchants an edge over other countries." #OLD ENG
 pal_palatine_lion: "Palatine Lion" #NEW
 pal_palatine_lion_desc: "Originating from the dynastic coat of arms of the Wittelsbach family, the Palatine Lion is the centerpiece of our legitimacy. Displayed with a red crown, it signifies our role as the Imperial Vicar and Arch-Steward of the Holy Roman Empire. As long as the Palatine Lion is proudly displayed on our crest, our legitimacy will not come into question." #NEW

 
 pal_castles_on_rhine: "Castelli sul Reno"
 #pal_castles_on_rhine_desc: "Costruendo più castelli in posizioni chiave lungo il Reno, saremo in grado di esercitare ed espandere il nostro controllo sul fiume e sul commercio che lo attraversa." #OLD ITA
 pal_castles_on_rhine_desc: "By erecting multiple castles in key positions along the Rhine, we will be able to exert and expand our control over both the river and the trade flowing through it." #NEW
 #pal_castles_on_rhine_desc: "By erecting multiple castles in key positions along the Rhine, we will be able to exert and expand our control over the river and the trade flowing through it." #OLD ENG
 pal_cultivate_vineyards: "Vigneti e Frutteti del Reno"
 #pal_cultivate_vineyards_desc: "Sebbene il nostro territorio sia piccolo, le rive soleggiate del Reno sono perfettamente adatte a coltivare vigneti e frutteti. Con un po' di impegno, questi potrebbero sostenere la nostra economia locale del vino." #OLD ITA
 pal_cultivate_vineyards_desc: "Although our territory is small, the sunny banks of the Rhine are perfectly suited to cultivate vineyards and orchards. With some effort, these could sustain our local economy by producing wine." #NEW
 #pal_cultivate_vineyards_desc: "Although our territory is small, the sunny banks of the Rhine are perfectly suited to cultivate vineyards and orchards. With some effort, these could sustain our local economy for wine." #OLD ENG
 pal_protection_of_exclaves: "Local Fortification" #NEW
 pal_protection_of_exclaves_desc: "By virtue of having our territories disperse, we are vunerable to attacks from several foreign powers. Constructing many fortified outposts within our lands will buy us time to raise an army and repel any attempt to take over one of our many disconnected territories." #NEW
 pal_fractured_territory: "Consolidare i Territori"
 #pal_fractured_territory_desc: "La nostra amministrazione è esperta nel gestire più territori scollegati senza perdere la presa su di essi. Con questo, possiamo costruire una burocrazia forte, in grado di gestire anche i compiti più difficili." #OLD ITA
 pal_fractured_territory_desc: "Our administration is skilled in handling multiple disconnected territories without losing our grasp on them. With that, we can build a strong bureaucracy capable of handling even the most difficult tasks." #NEW
 #pal_fractured_territory_desc: "Our administration is skilled in handling multiple disconnected territories without losing our grasp on them. With that, we can build a strong bureaucracy that is capable of handling even most difficult tasks." #OLD ENG
 pal_a_just_ruler: "Un Governante Mite e Calmo"
 #pal_a_just_ruler_desc: "L'unico effetto dello spargimento di sangue è quello di provocare ulteriori spargimenti di sangue. Pertanto, dobbiamo essere un governante che perdona e riconciliarsi con i nostri nemici per stabilire una pace duratura nei nostri territori." #OLD ITA
 pal_a_just_ruler_desc: "The only effect of bloodshed is to cause further bloodshed. Therefore, we need to be a forgiving ruler, and reconcile with our enemies to establish a lasting peace in our territories." #NEW
 #pal_a_just_ruler_desc: "The only effect of bloodshed is to cause further bloodshed. Therefore, we need to be a forgiving ruler and reconcile with our enemies to establish a lasting peace in our territories." #OLD ENG
 pal_heaven_of_tolerance: "Tolleranza del Palatinato"
 #pal_heaven_of_tolerance_desc: "A prescindere dalla loro denominazione, tutti i cristiani devono essere accolti nelle città dei nostri Paesi. Mentre altri decidono di sopprimere le loro minoranze religiose, la nostra tolleranza garantirà un flusso costante di migranti nelle nostre terre." #OLD ITA
 pal_heaven_of_tolerance_desc: "No matter their denominations, all $christian_ADJ$ people must be welcomed in the towns and cities of our lands. While others may decide to suppress their religious minorities, our tolerance will ensure a steady stream of immigrants into our territory, and we shall benefit from their presence." #NEW
 #pal_heaven_of_tolerance_desc: "No matter their denominations, all Christians must be welcome in the towns and cities of our lands. While others decide to suppress their religious minorities, our tolerance will ensure a steady stream of migrants into our lands." #OLD ENG
 pal_mildness_to_the_commoners: "Forgiveness for Peasants" #NEW
 pal_mildness_to_the_commoners_desc: "When our peasantry rises up against our nobility, they unmistakably rise up against our own rule. However, we should not excessively punish those who revolt. With mild consequences, everyone will be more in alignment with our authority." #NEW
 pal_humanist_court: "Humanist Education" #NEW
 pal_humanist_court_desc: "To govern well, our rulers must receive a comprehensive education in humanist ideas. To this effect, we must hire renowned humanists for the education of our rulers and heirs, while also focusing our court on these principles." #NEW
 pal_heidelberg_catechism: "Heidelberg Catechism" #NEW
 pal_heidelberg_catechism_desc: "The Reformation has created many discussions around the nature of our faith. We should invest into a comprehensive catechism, to which our people will be able to adhere." #NEW
 pal_bilbiotheca_palatina: "Protect the #italic Bibliotheca Palatina#!" #NEW
 pal_bilbiotheca_palatina_desc: "Rich in theological scriptures of several $christian_ADJ$ denominations, the #italic Bibliotheca Palatina#! is one of our most prized possessions. Protection of the knowledge and the cultural value contained within must be a high priority, so that we are able to keep relying on its documents." #NEW
 palatinate_romanticism: "Sostenere il Movimento Romantico"
 #palatinate_romanticism_desc: "Una parte significativa del movimento romantico ha scelto la zona di Heidelberg come residenza. Dovremmo capitalizzare questo fenomeno e sostenere questi e altri artisti per portare gloria al nostro Paese." #OLD ITA
 palatinate_romanticism_desc: "A significant part of the Romantic movement is centered around $heidelberg$. We should capitalize on this phenomenon, and support these and other artists in order to bolster our global recognition." #NEW
 #palatinate_romanticism_desc: "A significant part of the romantic movement has selected the area around Heidelberg as their residence. We should capitalize on this phenomenon and support these and other artists to bring glory to our country." #OLD ENG

 amazigh_slave_raids: "Raid di Schiavi Amazigh"
 #amazigh_slave_raids_desc: "Le coste che popolano la nostra regione sono ben attrezzate per facilitare un afflusso costante di servi e prigionieri da tutta Europa. Questa manodopera giocherà certamente un ruolo chiave nell'elevare la nostra grandezza e nell'aumentare i nostri profitti." #OLD ITA
 amazigh_slave_raids_desc: "Our coastal raiders provide our nation with a constant influx of captives from $europe$ through maritime raids and coastal incursions. This steady supply of enslaved labor is key to expanding our workforce and increasing our economic success." #NEW
 #amazigh_slave_raids_desc: "The coasts that populate our region are well-equipped to facilitate a constant influx of indentured servants and captives from across Europe. This manpower will certainly play a key role in elevating our greatness and increasing our profit." #OLD ENG
 zenata_roots: "Radici di Zenata"
 #zenata_roots_desc: "Il nostro popolo discende dagli Zenata, una tribù nota soprattutto per la produzione di lana, umile ma vitale, e per l'affinità nell'amministrare grandi mandrie di montoni." #OLD ITA
 zenata_roots_desc: "Our people are descendants of the Zenata, a tribe best known for its vital wool production and skill at shepherding great herds of rams." #NEW
 #zenata_roots_desc: "Our people are descendants of the Zenata, a tribe most well known for its humble, yet vital, wool production and affinity for administrating great herds of rams." #OLD ENG
 mor_marabouts: "Ṣūfī Marabouts"
 mor_marabouts_desc: "Diversi gruppi di insegnanti Ṣūfī hanno fatto del Marocco la loro casa. Dobbiamo assicurarci di accogliere questi santi uomini e di prendere a cuore i loro insegnamenti."
 trans_saharan_trade: "Commercio Trans-Sahariano"
 #trans_saharan_trade_desc: "Le carovane delle grandi rotte sahariane scambiavano sale e altri beni dal Nord Africa con schiavi e oro dai regni subsahariani. Attraverso queste preziose vie di scambio costruiremo la nostra grande eredità." #OLD ITA
 trans_saharan_trade_desc: "The caravans of the great Saharan routes trade $salt$ and other goods from $north_africa$ for $slaves_goods$ and $goods_gold$ from the Sub-Saharan kingdoms. Through these valuable avenues of coin, we will build our great legacy." #NEW
 #trans_saharan_trade_desc: "The caravans of the great Saharan routes traded salt and other goods from North Africa for slaves and gold from the Sub-Saharan Kingdoms. Through these valuable avenues of coin we will build our great legacy." #OLD ENG
 first_fleet_of_the_med: "Prima Flotta del Mediterraneo"
 #first_fleet_of_the_med_desc: "Gli al-Muwaḥḥidūn, un tempo grandiosi, si vantavano di possedere una delle marine più formidabili dell'intero Mar Mediterraneo. Il nostro popolo possiede la tradizione e l'esperienza per riaccendere quella passione e ripristinare la nostra grandezza attraverso i mari." #OLD ITA
 first_fleet_of_the_med_desc: "The great al-Muwaḥḥidūn once prided themselves upon owning one of the most formidable navies in the entire Mediterranean Sea. Our people today still possess the traditions and expertise to reignite that passion and restore our greatness across the oceans." #NEW
 #first_fleet_of_the_med_desc: "The once great al-Muwaḥḥidūn once prided themselves the owners of one of the most formidable navies in the entire Mediterranean Sea. Our people possess the tradition and expertise to reignite that passion and restore our greatness across the seas." #OLD ENG
 slave_soldiers: "Soldati Schiavi"
 #slave_soldiers_desc: "Per garantire un corpo fedele di truppe permanenti ben addestrate, impiegheremo e faremo affidamento su soldati schiavi disciplinati provenienti dalla nostra società." #OLD ITA
 slave_soldiers_desc: "To ensure a loyal corps of well-trained standing troops, we will employ disciplined slave soldiers from within our society." #NEW
 #slave_soldiers_desc: "To ensure a loyal corps of well-trained standing troops, we will employ and rely on disciplined slave soldiers from within our society." #OLD ENG
 desert_power: "Potenza del Deserto"
 #desert_power_desc: "La nostra regione è abitata da molti contadini e tribù che costituiscono la demografia vitale delle classi inferiori. Nonostante il loro stato di indigenza, hanno una grande influenza nelle aride rotte commerciali del deserto tra le nostre città. Imbrigliarli e assicurarsi la loro fedeltà contribuirà a consolidare ulteriormente il nostro potere nel deserto." #OLD ITA
 desert_power_desc: "Our region is inhabited by many peasants and tribal groups, who represent the lower classes of our society. Despite their relative poverty, they command great influence over trade routes that cross the barren deserts between our cities. Bringing these people under our jurisdiction, and ensuring their allegiance, will help us establish ourselves as powerful scions of the desert." #NEW
 #desert_power_desc: "Our region is inhabited by many peasants and tribes that make up the vital demographics of the lower classes. Despite their destitute state, they command great influence in the barren desert trade routes between our cities. Harnessing them and ensuring their allegiance will only help to further establish our power in the desert." #OLD ENG
 atlantic_trade_routes: "Rotte commerciali Atlantiche"
 #atlantic_trade_routes_desc: "Navigate con cura dagli europei contemporanei, queste nuove rotte marittime hanno aperto le porte a merci e monete provenienti sia dal Nuovo Mondo che dall'Estremo Oriente." #OLD ITA
 atlantic_trade_routes_desc: "Successfully navigated by sailors starting from $europe$, these new maritime routes have opened the floodgates to goods and coin from both the New World and the Far East." #NEW
 #atlantic_trade_routes_desc: "Carefully navigated by contemporary Europeans, these new maritime routes have opened the floodgates to goods and coin from both the New World and the Far East." #OLD ENG
 foreign_politics: "Politica Estera"
 #foreign_politics_desc: "Per sconfiggere e prevalere sui nostri nemici, dobbiamo garantire canali diplomatici e cooperazione adeguati con i Paesi che condividono l'animosità nei loro confronti." #OLD ITA
 foreign_politics_desc: "To prevail over our foes, we must establish proper diplomatic channels and official cooperation with countries that share our animosity towards them." #NEW
 #foreign_politics_desc: "To vanquish and prevail over our foes, we must ensure proper diplomatic channels and cooperation with countries that share animosity towards them." #OLD ENG
 #saharan_gold_trade: "Commercio dell'Oro del Sahara" #OLD ITA
 saharan_gold_trade: "Saharan $goods_gold$ Trade" #NEW
 #saharan_gold_trade: "Saharan Gold Trade" #OLD ENG
 #saharan_gold_trade_desc: "L'oro estratto localmente all'interno del nostro territorio è di grande qualità e rappresenta un ottimo strumento per diffondere ulteriormente la nostra influenza commerciale oltre i nostri porti." #OLD ITA
 saharan_gold_trade_desc: "The $goods_gold$ mined within our territory is of superior quality, and an excellent tool with which to further spread our influence over trade routes with foreign ports." #NEW
 #saharan_gold_trade_desc: "The gold mined locally within our territory is of great quality and a great tool to further spread our trade influence beyond our ports." #OLD ENG
 jaysh_armies_advance: "Eserciti di Jaysh"
 #jaysh_armies_advance_desc: "L'alba di una nuova era nella guerra ha portato alla necessità di una nuova forza di tribù locali, fedeli solo a noi. Attraverso di loro, sfrutteremo le risorse del nostro vasto dominio." #OLD ITA
 jaysh_armies_advance_desc: "A new era in warfare is dawning, and with it comes the need for a new regiment of loyal forces. Jaysh fighters, recruited from our tribal population, provide disciplined soldiers familiar with regional warfare and the local terrain." #NEW
 #jaysh_armies_advance_desc: "The dawn of a new era in warfare has ushered in the need for a new force of local tribesmen, loyal only to us. Through them, we will harness the resources of our vast domain." #OLD ENG
 black_guard: "$a_black_guard$"
 black_guard_desc: "$a_black_guard_desc$"
 shurfa_status: "Stato di Shurfā'"
 #shurfa_status_desc: "Orgogliosi e prestigiosi tra tutti coloro che abitano il mondo islamico, pochi hanno una legittimità come la nostra di proclamarsi discendenti della famiglia del Grande Profeta." #OLD ITA
 shurfa_status_desc: "The most revered and prestigious amongst all those who inhabit the $muslim_ADJ$ world, there are not many who can proclaim themselves descendants of the Great Prophet. We, of course, are among these blessed few." #NEW
 #shurfa_status_desc: "Proudest and most prestigious amongst all those who inhabit the Islamic world, few have legitimacy such as ours to proclaim themselves descendants of the family of the Great Prophet." #OLD ENG
 maghrebi_administration: "Amministrazione Magrebina"
 #maghrebi_administration_desc: "Secoli di autonomia e la durezza del nostro ambiente hanno dato origine a tendenze separatiste all'interno dei nostri confini. Se desideriamo stabilire una presenza sana nella nostra regione, dobbiamo assicurarci che ogni tribù all'interno dei nostri confini sappia chi è il suo vero padrone." #OLD ITA
 maghrebi_administration_desc: "Centuries of autonomy and our harsh environment have bred separatist tendencies among regional tribes within our borders. Maghrebi administration addresses this through creating a network of regional governors, who enforce central authority and the ruler's will while respecting local customs." #NEW
 #maghrebi_administration_desc: "Centuries of autonomy and the harshness of our environment have given way to separatist tendencies within our borders. If we wish to establish a healthy presence across our region, we must ensure that every tribe within our borders knows who their true master is." #OLD ENG


 barid: "Barīd"
 #barid_desc: "Un servizio postale che attraversa gli angoli più remoti del nostro Impero, questa istituzione è responsabile della comunicazione tra la nostra capitale e i governatori di tutta la nostra terra." #OLD ITA
 barid_desc: "A postal service that extends even to the farthest corners of our Empire, this institution is responsible for all communication between our capital and centers of local authority across the land." #NEW
 #barid_desc: "A postal service that runs throughout the far corners of our Empire, this institution is responsible for the communication between our capital and governors across our land." #OLD ENG
 karimi_merchants: "Mercanti di Kārimī"
 #karimi_merchants_desc: "Potenti mercanti che si occupano principalmente di spezie, questi giganti marittimi hanno tratto grande profitto dal flusso di merci esotiche che si spingono fino alle coste di Aden, dell'India e oltre!" #OLD ITA
 karimi_merchants_desc: "Formidable traders that primarily deal in spices, these maritime giants have profited greatly from the flow of exotic goods that trail their origin as far as the shores of $india$ — and beyond." #NEW
 #karimi_merchants_desc: "Powerful merchants that primarily deal in spice, these maritime giants have profited greatly from the flow of exotic goods that trail their origin as far as the shores of Aden, India, and beyond!" #OLD ENG
 mamluk_soldiers: "$a_mamluk_unit_traditions$"
 mamluk_soldiers_desc: "$a_mamluk_unit_traditions_desc$"
 royal_mamluks: "I Mamelucchi Reali"
 royal_mamluks_desc: "I Mamelucchi Reali sono il nucleo d'élite dell'esercito mamelucco e fungono da guardia personale del Sultano. Selezionati a mano e rigorosamente addestrati, sono rinomati per la loro lealtà, le eccezionali capacità di combattimento e la dedizione incrollabile."
 red_sea_trade: "Commercio nel Mar Rosso"
 #red_sea_trade_desc: "Poiché il commercio di spezie che risale il Mar Rosso è una fonte chiave della nostra ricchezza, dobbiamo assicurarci di controllare il commercio. Utilizzando una politica aggressiva, minacciando di bruciare i porti del Mar Rosso che non controlliamo se accettano i mercanti di spezie, possiamo assicurarci di fare la parte del leone." #OLD ITA
 red_sea_trade_desc: "The spice trade flowing through the Red Sea is a key source of our wealth, and we must seize full control of it. By threatening to burn down any Red Sea ports outside our authority that accept spice traders, we can capture the lion's share of this lucrative commerce. We may not win many friendships with our aggression, but we shall have gold enough to comfort us." #NEW
 #red_sea_trade_desc: "With the spice trade flowing up the Red Sea being a key source of our wealth, we must ensure that we control the trade. Using an aggressive policy of threatening to burn down Red Sea ports that we do not control if they accept the spice traders, we can ensure that we take the lion's share." #OLD ENG
 mamluk_halqah: "$a_halqah_unit$"
 mamluk_halqah_desc: "$a_halqah_unit_desc$"
 reform_the_mamluk_corps: "$a_mamluk_unit_renaissance$"
 reform_the_mamluk_corps_desc: "$a_mamluk_unit_renaissance_desc$"
 kashif: "Kāshif"
 #kashif_desc: "Il nostro Sultanato è vasto e come tale dobbiamo essere saggi nell'amministrarlo. Impiegare uomini di conoscenza e saggezza come governatori locali è una mossa brillante, che potrebbe far pendere la bilancia a nostro favore." #OLD ITA
 kashif_desc: "Our Sultanate is enormous, and therefore we must make wise, careful choices about its administration. To employ particularly learned individuals as local governors is a brilliant move, one that should eventually tip the geopolitical scales in our favor." #NEW
 #kashif_desc: "Our Sultanate is vast and as such we must be wise in administering it. To employ men of knowledge and wisdom as local governors is a brilliant move, one that may eventually tip the scales in our favor." #OLD ENG
 port_customs: "Dogana del porto"
 #port_customs_desc: "La designazione dei nostri porti come zone mercantili ufficiali dei carichi in arrivo è una mossa che sicuramente aumenterà l'importanza mercantile del nostro territorio a spese dei nostri vicini e nemici." #OLD ITA
 port_customs_desc: "Designating our ports as official merchant zones for incoming cargo is a move that will certainly increase the mercantile significance of our territory, albeit at the expense of our neighbors and foes alike." #NEW
 #port_customs_desc: "The designation of our ports as the official merchant zones of incoming cargo is a move that will certainly increase the mercantile importance of our territory at the expense of our neighbors and foes." #OLD ENG
 masters_of_the_nile: "I Maestri del Nilo"
 #masters_of_the_nile_desc: "La linfa vitale del nostro Sultanato non è altro che il fiume Nilo. Viaggiando attraverso le nostre terre più fertili, le acque salvifiche del fiume ci garantiscono ampia prosperità e ricchezza in tutto il nostro dominio." #OLD ITA
 masters_of_the_nile_desc: "The heart-vein of our Sultanate is the river Nile. Traversing our nation, its touch creates our most fertile lands, and its life-bringing waters of the river channel prosperity and ample wealth throughout our domain." #NEW
 #masters_of_the_nile_desc: "The lifeblood of our Sultanate is none other than the river Nile. Traveling across our most fertile lands, the life-saving waters of the river grant us ample prosperity and wealth across our domain." #OLD ENG
 indian_networks: "Reti Indiane"
 #indian_networks_desc: "I nostri mercanti trattano merci dai mercati di Alessandria, alle coste di Aden e fino all'India stessa. Le nostre grandi reti di contatti, affari e monete ci hanno posizionato all'avanguardia del commercio marittimo." #OLD ITA
 indian_networks_desc: "Our merchants deal in goods from the markets of $alexandria$, to the shores of Aden, and as far away as $india$ itself. These extensive networks of contacts, business, and capital have positioned us at the forefront of maritime commerce." #NEW
 #indian_networks_desc: "Our merchants deal in goods from the markets of Alexandria, to the shores of Aden and as far as India herself. Our grand networks of contacts, business, and coin have positioned us at the forefront of maritime trade." #OLD ENG
 study_foreign_gunpowder_techniques: "Polvere da sparo straniera"
 #study_foreign_gunpowder_techniques_desc: "I grandi Imperi dell'Europa e dell'Oriente hanno facilitato grandi progressi nell'uso della polvere da sparo e delle sue applicazioni militari. Studiare e migliorare i loro metodi non farebbe altro che rafforzare le nostre truppe." #OLD ITA
 study_foreign_gunpowder_techniques_desc: "The great empires of $europe$ and the East have made groundbreaking advances in the use of gunpowder and its military applications. To study their ways and make the according improvements to our own armaments would greatly strengthen our own military." #NEW
 #study_foreign_gunpowder_techniques_desc: "The great Empires of Europe and the East have facilitated great progress in regard to the use of gunpowder and its military applications. To study and improve their ways would only strengthen our own troops." #OLD ENG
 secure_mediterranean_ports: "Porti sicuri nel Mediterraneo"
 #secure_mediterranean_ports_desc: "I nostri porti sul Mar Mediterraneo sono tra i più ricchi dell'intera regione. Mercanti da ogni angolo del mondo conosciuto si recano ad Alessandria e al Cairo per commerciare spezie, seta e pietre preziose. La creazione di una marina mercantile per facilitare e proteggere le nostre vie marittime sarebbe una mossa saggia." #OLD ITA
 secure_mediterranean_ports_desc: "Our ports across the Mediterranean Sea are some of the most affluent in the entire region. Merchants from every corner of the known world travel to $alexandria$ and Cairo to deal in spices, $silk$, and precious stones. The creation of a merchant navy to facilitate and protect our maritime avenues would therefore be a wise idea." #NEW
 #secure_mediterranean_ports_desc: "Our ports across the Mediterranean Sea are some of the most affluent in the entire region. Merchants from every corner of the known world travel to Alexandria and Cairo to deal in spices, silk, and precious stones. The creation of a merchant navy to facilitate and protect our maritime avenues would be a wise move." #OLD ENG

 #bohemian_imperial_standing: "Boemia Imperiale in Piedi" #OLD ITA
 bohemian_imperial_standing: "$BOH_ADJ$ $HRE_ADJ$ Standing" #NEW
 #bohemian_imperial_standing: "Bohemian Imperial Standing" #OLD ENG
 #bohemian_imperial_standing_desc: "Il nostro posto all'interno dell'Impero è di prestigio, grandezza e autorità. Pochi membri esercitano un potere morbido come noi, grazie ai nostri abili diplomatici e alle reti di alleanze." #OLD ITA
 bohemian_imperial_standing_desc: "Our place within the $hre$ is one of prestige, grandeur, and authority. Few members wield as much soft power as us, due to our capable diplomats and alliance networks." #NEW
 #bohemian_imperial_standing_desc: "Our place within the Empire is one of prestige, grandeur, and authority. Few members wield as much soft power as us, due to our capable diplomats and alliance networks." #OLD ENG

 #bohemian_crystal: "Cristallo di Boemia" #OLD ITA
 bohemian_crystal: "$BOH_ADJ$ Crystal" #NEW
 #bohemian_crystal: "Bohemian Crystal" #OLD ENG
 #bohemian_crystal_desc: "Pochi laboratori nel mondo conosciuto hanno la capacità di lavorare il vetro e il cristallo con la qualità e la chiarezza necessarie per competere con la nostra produzione." #OLD ITA
 bohemian_crystal_desc: "There are very few workshops in the known world with the capacity to craft glass and crystal with the same quality and clarity as ours, let alone rival our superior production techniques." #NEW
 #bohemian_crystal_desc: "Few workshops around the known world have the capacity to craft glass and crystal with the quality and clarity necessary to rival our production." #OLD ENG

 students_of_foreign_courts: "Studenti di Corti Straniere"
 #students_of_foreign_courts_desc: "Le nostre linee reali non sono estranee ai viaggi all'estero, diventando studenti di corti illustri lontane da casa, nella gloriosa ricerca della conoscenza e della corretta educazione in materia di statistica." #OLD ITA
 students_of_foreign_courts_desc: "Members of our royal dynasties are accustomed to journeys abroad. They have spent much of their upbringing as students of illustrious courts far away from home, in the pursuit of a thorough education in matters of statesmanship." #NEW
 #students_of_foreign_courts_desc: "Our royal lines are no strangers to journeys abroad, becoming students of illustrious courts far away from home, in the glorious pursuit of knowledge and proper education in matters of statesmanship." #OLD ENG

 urbanization_decrees: "Decreti di Urbanizzazione"
 #urbanization_decrees_desc: "Nel tentativo di modernizzare $prague$, daremo istruzioni e sovvenzioni ai personaggi di spicco della città, affinché dirigano i loro affari nella capitale, attraggano la gente straniera e offrano loro la possibilità di migliorare la loro posizione sociale nella nostra bella metropoli." #OLD ITA
 urbanization_decrees_desc: "As part of our efforts to modernize $prague$, we will issue grants encouraging prominent figures to relocate their business to the capital while offering privileges to attract skilled and wealthy foreign immigrants. This influx of talent and capital will transform our $prague$ into a thriving, cosmopolitan metropolis." #NEW
 #urbanization_decrees_desc: "In an effort to modernize $prague$, we shall issue instructions and grants for prominent figures of the city to direct their business at the capital, attract foreign folk, and offer them a chance at improving their social standing in our beautiful metropolis." #OLD ENG



 #seat_of_metropolitan_bishop: "Sede del Vescovo Metropolitano" #OLD ITA
 seat_of_metropolitan_bishop: "Seat of the Metropolitan Bishop" #NEW
 #seat_of_metropolitan_bishop: "Seat of Metropolitan Bishop" #OLD ENG
 #seat_of_metropolitan_bishop_desc: "Il popolo russo ha bisogno di una solida guida religiosa. Storicamente abbiamo avuto una buona collaborazione con la Chiesa, e questa è un'amicizia che potremmo ampliare. Se riusciamo a far trasferire la sede del Vescovo metropolitano a Mosca, saremo in grado di rafforzare ulteriormente i legami tra la fede ortodossa russa e il nostro Stato." #OLD ITA
 seat_of_metropolitan_bishop_desc: "The $RUS_ADJ$ people need firm religious guidance. We have historically cooperated well with the Church, and expanding this relationship would benefit us all. If we can move the seat of the Metropolitan Bishop to $moscow$, we will be able to strengthen the bonds between our faith and our state." #NEW
 #seat_of_metropolitan_bishop_desc: "The Russian people need firm religious guidance. We have historically had good cooperation with the Church, and this is a friendship we could both gain from expanding. If we can get the seat of the Metropolitan Bishop to move to Moscow, we will be able to further strengthen the bonds between the Russian Orthodox faith and our state." #OLD ENG
 pomestnoe_voisko: "Pomestnoe Voisko"
 #pomestnoe_voisko_desc: "Ridistribuendo appezzamenti di terre confiscate a nobili cavallerizzi, possiamo costruire una nuova classe di soldati per sostenere il nostro principato." #OLD ITA
 pomestnoe_voisko_desc: "By redistributing plots of confiscated lands to noble cavalrymen, we can build a new class of soldiers to defend our principality." #NEW
 #pomestnoe_voisko_desc: "By redistributing plots of confiscated lands to noble cavalrymen we can build a new class of soldiers to support our principality." #OLD ENG
 strength_of_the_boyars: "La Forza dei Boiardi"
 #strength_of_the_boyars_desc: "La classe dei boiardi è per molti versi il fondamento dell'impresa imperiale russa, ma così come dobbiamo rafforzare i boiardi, dobbiamo controllarli. Dobbiamo sia proteggere i seggi per i boiardi nella Duma, sia assicurarci che debbano fare affidamento su di noi per promuovere la loro influenza." #OLD ITA
 strength_of_the_boyars_desc: "The Boyar class is in many ways the foundation of $RUS$, but just as we need to strengthen the Boyars, we also need to control them. We must protect seats for the Boyars in the Duma, but also to make sure that they are dependent on us to further their influence." #NEW
 #strength_of_the_boyars_desc: "The Boyar class is in many ways the foundation of the Russian Imperial enterprise but just as we need to strengthen the Boyars, we need to control them. We must both protect seats for the Boyars in the Duma and make sure that they need to rely on us to further their influence." #OLD ENG
 zasechnaya_cherta: "Zasechnaya Cherta"
 #zasechnaya_cherta_desc: "Per resistere alle incursioni dei Tartari, i nostri antenati hanno sempre mantenuto una linea di fortezze ben posizionate e ben difese. Man mano che il nostro Stato si espande, dovremmo continuare ad ampliare questa 'linea di Abatis' per assicurarci di poter sempre proteggere il nostro popolo da attacchi lontani." #OLD ITA
 zasechnaya_cherta_desc: "In order to withstand the constant threat of Tatar raids, our ancestors have built a line of tightly positioned and well-defended forts. As our state grows larger, we should keep expanding this 'Abatis Line' to ensure our people are always protected from foreign attacks." #NEW
 #zasechnaya_cherta_desc: "In order to withstand the Tatar raids our ancestors have always kept a line of tightly positioned and well-defended forts. As our state expands, we should keep expanding this 'Abatis Line' to ensure that we can always protect our people against far-flung attacks." #OLD ENG

 #russian_artillery_yard: "Cantiere di Artiglieria Russo" #OLD ITA
 russian_artillery_yard: "$RUS_ADJ$ Artillery Yard" #NEW
 #russian_artillery_yard: "Russian Artillery Yard" #OLD ENG
 #russian_artillery_yard_desc: "Una potenza di fuoco superiore è ciò che determina gli assedi di oggi e le battaglie campali di domani. Dobbiamo costruire un cantiere di artiglieria all'avanguardia nel cuore del nostro Paese, per garantire che i nostri eserciti non rimangano mai senza cannoni né munizioni." #OLD ITA
 russian_artillery_yard_desc: "Superior firepower is what determines who wins the sieges of today as well as the pitched battles of tomorrow. We must build a state-of-the-art artillery yard in the heart of our country, to ensure our armies are never without cannons nor ammunition." #NEW
 #russian_artillery_yard_desc: "Superior firepower is what determines the sieges of today as well as the pitched battles of tomorrow. We must build a state-of-the-art artillery yard in the heart of our country, to ensure our armies are never without cannons nor ammunition." #OLD ENG
 life_long_conscription: "Coscrizione a Vita"
 #life_long_conscription_desc: "Per alimentare i nostri eserciti in continua crescita, dovremmo ampliare i termini del servizio militare in modo che diventi un impegno a vita. Questo offrirà mobilità sociale a coloro che altrimenti condurrebbero una vita in occupazioni minori, e ci darà una fonte affidabile di soldati per i nostri sforzi imperiali." #OLD ITA
 life_long_conscription_desc: "In order to feed our ever-growing armies, we should expand the terms of military service so that it becomes a lifelong commitment. This will offer social mobility to those that would otherwise lead lives in lesser occupations, and it will give us a reliable source of soldiers for our imperial endeavors." #NEW
 #life_long_conscription_desc: "In order to feed our ever-growing armies we should expand the terms of military service so that it becomes a lifelong commitment. This will offer social mobility to those that would otherwise lead lives in lesser occupations, and it will give us a reliable source of soldiers for our imperial endeavors." #OLD ENG
 the_mestnichestvo_advance: "$the_mestnichestvo$"
 the_mestnichestvo_advance_desc: "$the_mestnichestvo_desc$"
 table_of_ranks: "La Tabella dei Ranghi"
 #table_of_ranks_desc: "L'abolizione del Mestnichestvo fu la prima mossa per rendere la burocrazia statale più meritocratica. La tabella dei ranghi codificò questo aspetto e rese il servizio e la promozione nell'esercito subordinati al servizio nei ranghi inferiori." #OLD ITA
 table_of_ranks_desc: "The abolishment of the Mestnichestvo was the first step toward creating a more meritocratic state bureaucracy. The Table of Ranks further codified this principle, making military advancement conditional on performance rather than noble birth." #NEW
 #table_of_ranks_desc: "The abolishment of the Mestnichestvo was the first move to make the state bureaucracy more meritocratic. The table of ranks codified this and made service and promotion in the army conditional on service in lower ranks." #OLD ENG
 voivode_advance: "Voivoda"
 #voivode_advance_desc: "Il Voivoda è un leader militare responsabile del mantenimento dell'ordine, della difesa del territorio dalle minacce esterne e della conduzione di campagne militari. La posizione di un voivoda può essere utile per superare le sfide amministrative dovute ai mezzi di comunicazione limitati disponibili in quest'epoca." #OLD ITA
 voivode_advance_desc: "The #italic voivode#! is a military leader with regional administrative authority, defending territory and maintaining order. A voivode can be useful in overcoming the challenges posed by the limited means of communication available, as they have the authority to make crucial decisions without waiting for approval." #NEW
 #voivode_advance_desc: "The Voivode is a military leader responsible for maintaining order, defending territory against external threats, and leading military campaigns. The position of a voivode can be useful in overcoming the administrative challenges due to the limited means of communication available during this age." #OLD ENG

 
 haudenosaunee_tradition: "L'Eredità di Hiawatha"
 #haudenosaunee_tradition_desc: "Il leggendario Hiawatha, noto tra gli Haudenosaunee come grande oratore e leader, ci ha lasciato un precedente di ciò che è un diplomatico. Lo onoreremo seguendo il suo esempio nelle nostre relazioni diplomatiche." #OLD ITA
 haudenosaunee_tradition_desc: "The legendary Hiawatha, renowned among the $IRO_ADJ$ people as a great speaker and leader, has set a very high precedent for what a diplomat should be. We will honor him by following his example in our diplomatic relations." #NEW
 #haudenosaunee_tradition_desc: "The legendary Hiawatha, renowned among the Haudenosaunee as a great speaker and leader, left us a precedent of what a diplomat is. We will honor him by following his example in our diplomatic relations." #OLD ENG
 haudenosaunee_heritage: "Guerrieri Feroci"
 #haudenosaunee_heritage_desc: "Sarebbe un errore per i nostri nemici considerarci deboli in base alle nostre capacità diplomatiche. I nostri guerrieri sono comunque feroci e orgogliosi, e sottovalutarli significa cadere sotto le loro armi." #OLD ITA
 haudenosaunee_heritage_desc: "It would be a mistake for our enemies to regard us as weak based on our diplomatic strength. Our warriors are as fierce and proud as those from any militaristic society, and underestimating them is the leading cause of death among our rivals." #NEW
 #haudenosaunee_heritage_desc: "It would be a mistake for our enemies to regard us as weak based on our diplomatic abilities. Our warriors are nonetheless fierce and proud, and to underestimate them is to fall to their weapons." #OLD ENG
 tree_of_peace: "Albero della Pace"
 #tree_of_peace_desc: "L'Albero della Pace è l'eredità del Grande Costruttore di Pace e serve come simbolo del nostro impegno per l'unità tra le diverse tribù, oltre che come rappresentazione dei capi stessi." #OLD ITA
 tree_of_peace_desc: "The Tree of Peace is the legacy of the Great Peacemaker, and is a symbol of our commitment to unity among the different tribes, as well as a representation of the chiefs themselves." #NEW
 #tree_of_peace_desc: "The Tree of Peace is the legacy of Great Peacemaker, and serves as a symbol of our commitment to unity among the different tribes, as well as a representation of the chiefs themselves." #OLD ENG
 kainerekowa: "Kaianere'kó:wa"
 #kainerekowa_desc: "Dobbiamo sempre onorare il grande dono di Hiawatha e del Grande Pacificatore, la Grande Legge della Pace, che ha unito le nostre cinque nazioni sotto un unico scopo e ci ha dato le nostre regole di governo." #OLD ITA
 kainerekowa_desc: "We must always honor the work of Hiawatha and the Great Peacemaker, the Great Law of Peace, which united our five nations under a single purpose, and gave us our rules of governance." #NEW
 #kainerekowa_desc: "We must always honor the great gift of Hiawatha and the Great Peacemaker, the Great Law of Peace, which united our five nations under a single purpose, and gave us our rules of governance." #OLD ENG
 mourning_wars: "Guerre in Lutto"
 #mourning_wars_desc: "È una tradizione consolidata del nostro popolo quella di adottare nella tribù i guerrieri catturati. Ma per rimpolpare i nostri numeri e garantire la nostra capacità di conquista, dovremmo cercare di adottare non solo singoli guerrieri, ma intere tribù tra gli Haudenosaunee." #OLD ITA
 mourning_wars_desc: "It is a long-established tradition of our people to adopt captured warriors into our tribe. But to replenish our numbers and ensure our defensive and offensive strength, we should seek to adopt entire tribes into the $IRO$, not just individual fighters." #NEW
 #mourning_wars_desc: "It is a long-established tradition of our people to adopt captured warriors in the tribe. But to replenish our numbers and ensure our ability to conquer, we should seek to adopt not only individual warriors but entire tribes among the Haudenosaunee." #OLD ENG
 warriors_unity: "Unità dei Guerrieri"
 #warriors_unity_desc: "Forse non siamo la tribù più grande in termini numerici, ma le nostre forti strutture tribali ci garantiscono qualcosa che agli altri manca: l'unità! I nostri guerrieri combattono come fratelli e sono uniti sul campo di battaglia. Finché manteniamo questa tradizione, non possiamo perdere!" #OLD ITA
 warriors_unity_desc: "We may not be the largest tribe in terms of sheer number, but our tribal nature gives us something that others lack: unity! Our warriors fight as brothers and stand together on the field of battle. So long as we maintain this tradition, we cannot lose!" #NEW
 #warriors_unity_desc: "We may not be the largest tribe in terms of numbers, but our strong tribal structures grant us something others lack: unity! Our warriors fight as brothers and stand together on the field of battle. So long as we maintain this tradition, we cannot lose!" #OLD ENG
 haudenosaunee_ambition: "Modello di Confederazione"
 #haudenosaunee_ambition_desc: "La Confederazione Haudenosaunee ha dimostrato di essere un modello di successo. Tutte le nazioni circostanti ci guardano con ammirazione per il nostro modo di governare." #OLD ITA
 haudenosaunee_ambition_desc: "The $IRO$ Confederacy has become a model for success. All nations around us are awestruck by our excellent rulership!" #NEW
 #haudenosaunee_ambition_desc: "The Haudenosaunee Confederacy has proved to be a model for success. All nations around look at us in admiration of our way of rulership." #OLD ENG
 three_sisters: "Agricoltura delle Tre Sorelle"
 #three_sisters_desc: "La nostra terra è ricca di molte colture. L'uso combinato di mais, fagioli e zucca, coltivati insieme, consente di ottenere una produzione migliore rispetto a quella che si otterrebbe separatamente." #OLD ITA
 three_sisters_desc: "Our land is plentiful, with many crops, but the method of cultivating maize, beans, and squash together is one of our greatest agricultural achievements. Grown together, these crops have a better output than they do when planted separately." #NEW
 #three_sisters_desc: "Our land is plentiful with many crops. The combined use of maize, beans, and squash cultivated together allows for better output from them than what they would do separated." #OLD ENG
 maple_syrup: "Sciroppo d'Acero"
 #maple_syrup_desc: "I numerosi alberi di acero del nostro Paese sono ricchi di linfa, che può essere raccolta e bollita per essere trasformata in delizioso sciroppo e zucchero." #OLD ITA
 maple_syrup_desc: "The many maple trees in our country produce great quantities of sap, which can be collected and boiled to create a delicious sweet syrup and other confections." #NEW
 #maple_syrup_desc: "The many maple trees in our country are bountiful in sap, and can be collected and boiled to be processed in delicious syrup and sugar." #OLD ENG
 stickball_game: "Gioco Stickball"
 #stickball_game_desc: "L'antica tradizione del gioco dello stickball viene praticata nelle nostre terre da secoli. Utilizzata per scopi rituali o per risolvere dispute, centinaia di guerrieri si riuniscono in un campo con bastoni di legno e una palla che deve essere indirizzata verso un obiettivo segnato. Questa pratica non solo unisce il nostro popolo, ma mantiene i nostri guerrieri in ottime condizioni." #OLD ITA
 stickball_game_desc: "The ancient tradition of playing the stickball game has been part of our culture for ages. Used for ritual purposes or to settle disputes, hundreds of warriors gather in a field with wooden sticks and a single ball, which must be directed towards a marked goal. This practice not only brings our people together, but keeps our warriors in prime condition." #NEW
 #stickball_game_desc: "The ancient tradition of the stickball game has been played in our lands for ages. Used for ritual purposes or to settle disputes, hundreds of warriors gather in a field with wooden sticks and a ball that has to be directed towards a marked goal. This practice not only brings our people together but keeps our warriors in prime condition." #OLD ENG
 wampum: "Wampum"
 #wampum_desc: "Un mix di perline bianche e viola ricavate da diversi tipi di conchiglie, le wampum sono utilizzate per molti scopi. Dalla registrazione di storie e trattati all'utilizzo come sistema di scambio nel commercio, le perline di wampum sono presenti ovunque il nostro popolo cammini." #OLD ITA
 wampum_desc: "A mix of white and purple beads made from different kinds of shells, wampum are used for many purposes, such as recording treaties and oral histories, facilitating diplomacy, and functioning as a system of exchange in trade. Wampum appears wherever our people tread." #NEW
 #wampum_desc: "A mix of white and purple beads made from different kinds of shells, wampum are used for many purposes. From the recording of stories and treaties to being used as a system of exchange in trade, wampum beads are present everywhere our people tread." #OLD ENG
 shared_brotherhood: "Fratellanza Condivisa"
 #shared_brotherhood_desc: "Unito negli insegnamenti della Grande Legge della Pace, il nostro popolo, nonostante le diverse origini tribali, mantiene un forte senso di fratellanza e unità." #OLD ITA
 shared_brotherhood_desc: "United in the teachings of the Great Law of Peace, our people maintain a strong sense of brotherhood and unity, despite their disparate tribal background." #NEW
 #shared_brotherhood_desc: "United in the teachings of the Great Law of Peace, our people despite varying tribal background maintain a strong sense of brotherhood and unity." #OLD ENG
 captives_in_war: "Prigionieri in Guerra"
 #captives_in_war_desc: "Combattiamo le guerre soprattutto per ottenere prigionieri per sostituire le nostre perdite. Tuttavia, non tutti i prigionieri devono essere adottati nella nostra tribù, e possiamo invece utilizzarli come manodopera." #OLD ITA
 captives_in_war_desc: "We fight wars mainly to take captives, which replace our own losses. However, not all those captives need to be adopted into our tribe, and some can be used for labor instead." #NEW
 #captives_in_war_desc: "We fight wars mainly to get captives to replace our own losses. However, not all those captives need to be adopted into our tribe, and we can use them for labor instead." #OLD ENG
 #haudenosaunee_present_giving: "Regali Haudenosaunee" #OLD ITA
 haudenosaunee_present_giving: "$IRO_ADJ$ Gift-Giving" #NEW
 #haudenosaunee_present_giving: "Haudenosaunee Present Giving" #OLD ENG
 haudenosaunee_present_giving_desc: "La base delle nostre interazioni commerciali è rappresentata dalla forma dello scambio di doni. Poiché i nostri popoli si uniscono e lavorano per il beneficio dell'insieme, l'atto del dono è garantito per essere seguito da un altro dono in cambio."

 pochtecayotl: "Pōchtēcayōtl"
 #pochtecayotl_desc: "I mercanti viaggiano lontano, verso province che non sono nemmeno alla portata della nostra autorità e verso governanti che ci sfidano. Se questi mercanti ci servissero, forse, anche come occhi e orecchie, quali segreti potremmo scoprire?" #OLD ITA
 pochtecayotl_desc: "Traders travel far afield, to provinces well beyond the reach of our authority, and even to the territories of our rivals. If these traders were to, perhaps, also serve as our eyes and ears, what secrets might we learn?" #NEW
 #pochtecayotl_desc: "Traders travel far afield, to provinces beyond even the reach of our authority, and to rulers who defy us. If these traders were to, perhaps, also serve us as eyes and ears, what secrets might we learn?" #OLD ENG
 warrior_societies: "Società di Guerrieri"
 #warrior_societies_desc: "La nostra società è straordinariamente dinamica e offre ai cittadini comuni, noti anche come #italic mācēhualtin#!, il percorso per diventare #italic pīpiltin#!, o nobili, grazie a un servizio militare eccezionale attraverso il sistema di rango dell'abito d'onore #italic tlahuiztli#!. Questa opportunità unica di mobilità verso l'alto ci garantisce un netto vantaggio rispetto alle società vicine." #OLD ITA
 warrior_societies_desc: "Our society is remarkably dynamic, offering commoners, also known as #italic mācēhualtin#!, the path to become #italic pīpiltin#!, or noble, by exceptional military service through the #italic tlahuiztli#! honor dress rank system. This unique opportunity for upward mobility grants our people a distinct advantage over those in neighboring societies." #NEW
 #warrior_societies_desc: "Our society is remarkably dynamic, offering commoners, also known as #italic mācēhualtin#!, the path to become #italic pīpiltin#!, or noble by exceptional military service through the #italic tlahuiztli#! honor dress rank system. This unique opportunity for upward mobility grants us a distinct advantage over neighboring societies." #OLD ENG
 chinampas: "Chinampas"
 chinampas_desc: "Abile nel terrazzamento delle colline per la coltivazione e abile nel creare terreni coltivabili su porzioni di lago poco profonde grazie a ingegnosi #italic chinampa#!, le notevoli capacità agricole della nostra popolazione gioveranno in modo significativo alla nostra società."
 people_of_war: "Gente di Guerra"
 #people_of_war_desc: "Che si tratti di cercare prigionieri da sacrificare, di guadagnare prestigio, di instillare paura nei nemici o semplicemente di acquisire ricchezza, il nostro popolo è abituato a un continuo stato di guerra, sopportando le sue difficoltà meglio di altri." #OLD ITA
 people_of_war_desc: "Whether we take up arms on a search for prestige, to instill fear in our foes, to take captives for sacrifice,  or simply to acquire wealth, our people are accustomed to a continuous state of warfare, enduring its hardships with more resilience than members of other nations." #NEW
 #people_of_war_desc: "Whether seeking captives for sacrifice, gaining prestige, instilling fear in foes, or simply acquiring wealth, our populace is accustomed to a continuous state of warfare, enduring its hardships better than others." #OLD ENG
 tlahtocayotl: "Tlahtohcāyōtl"
 #tlahtocayotl_desc: "Creeremo un sistema di province per quelle città-stato che sono integrate nel nostro regno, nel tentativo di centralizzare il nostro potere." #OLD ITA
 tlahtocayotl_desc: "We will create a system of provinces for the city-states that are integrated into our realm in an effort to centralize our power." #NEW
 #tlahtocayotl_desc: "We will create a system of provinces for those city-states that are integrated into our realm in an effort to centralize our power." #OLD ENG
 calpixcayotl: "Calpixcāyōtl"
 #calpixcayotl_desc: "Le nostre regioni tributarie riceveranno degli esattori di tributi nominati, chiamati #italic calpixqueh#!, che avranno il compito di assicurare che il flusso di tributi non si fermi mai. Ci sarà un #italic calpixqui#! nella regione e un altro nella capitale della nostra nazione per ogni Stato tributario." #OLD ITA
 calpixcayotl_desc: "Our tributary regions will receive appointed tribute collectors, called #italic calpixqueh#!, who will be in charge of ensuring the flow of tribute never stops. There will be a #italic calpixqui#! in the region, and another in the capital of our nation, for each tributary state." #NEW
 #calpixcayotl_desc: "Our tributary regions will receive appointed tribute collectors, called #italic calpixqueh#!, that will be in charge of ensuring the flow of tributes is never stopped. There will be a #italic calpixqui#! in the region and another in the capital of our nation for each tributary state." #OLD ENG
 reformed_telpochcalli: "Tēlpōchcalli Riformato"
 reformed_telpochcalli_desc: "Quando affrontiamo nuovi nemici, è necessario sviluppare o imparare nuove tattiche militari. Queste preziose conoscenze saranno insegnate nei nostri #italic Tēlpōchcalli#!."
 #nahuatl_domination: "Dominazione Nahua" #OLD ITA
 nahuatl_domination: "$nahua_culture$ Domination" #NEW
 #nahuatl_domination: "Nahua Domination" #OLD ENG
 #nahuatl_domination_desc: "La nostra cultura è chiaramente superiore ad altre intorno a noi e sempre più persone la stanno adattando come propria. L'influenza che possiamo avere sui nostri confini è qualcosa di cui dobbiamo approfittare." #OLD ITA
 nahuatl_domination_desc: "The superiority of $nahua_culture$ culture is very clear, as neighboring peoples increasingly adopt it as their own. This cultural diffusion and spread of influence creates opportunities for us to extend our political control well beyond our borders." #NEW
 #nahuatl_domination_desc: "Our culture is clearly superior to others around us and more and more people are adapting it as its own. The influence we can have over our borders is something we have to take advantage of." #OLD ENG
 the_return_of_quetzalcoatl: "Il Ritorno di Quetzalcōtl"
 #the_return_of_quetzalcoatl_desc: "Il contatto con gli stranieri di altri continenti ha portato nuove idee interessanti sui nostri dei. La profezia di #italic Quetzalcōātl#! svela una realtà al di là del mito, uno scorcio di verità. #italic Quetzalcōātl#!, 'il Serpente Piumato', tornerà presto e annuncerà un'era di trasformazione, sconfiggendo l'oscurità per l'illuminazione. Simboleggiando la fusione cosmica, farà da ponte tra la materia e lo spirito, ristabilendo l'equilibrio ed elevando la coscienza umana." #OLD ITA
 the_return_of_quetzalcoatl_desc: "Contact with foreigners from other continents has given us interesting new ideas about our gods. The #italic Quetzalcōātl#! prophecy unveils a reality beyond myth — a glimpse of truth. #italic Quetzalcōātl#!, 'the Feathered Serpent', will soon return and herald a transformative era, vanquishing darkness for enlightenment. Symbolizing cosmic fusion, he will bridge matter and spirit, restoring balance and elevating human consciousness." #NEW
 #the_return_of_quetzalcoatl_desc: "Contact with foreigners from other continents has brought interesting new ideas about our gods. The #italic Quetzalcōātl#! prophecy unveils a reality beyond myth — a glimpse of truth. #italic Quetzalcōātl#!, 'the Feathered Serpent', will soon return and herald a transformative era, vanquishing darkness for enlightenment. Symbolizing cosmic fusion, he will bridge matter and spirit, restoring balance and elevating human consciousness." #OLD ENG
 brave_as_hummingbird: "Coraggioso come un Colibrì"
 #brave_as_hummingbird_desc: "Il colibrì ha un ruolo cruciale nella nostra mitologia, legato al dio della guerra, Huītzilōpōchtli. Incarna la reincarnazione dei guerrieri caduti e viene onorato per il suo coraggio. Il colibrì diventerà un nuovo simbolo per i nostri stendardi, che ispirerà i nostri soldati a combattere fino alla morte." #OLD ITA
 brave_as_hummingbird_desc: "The hummingbird holds a crucial role in our mythology. Linked to the god of war, Huītzilōpōchtli, it embodies fallen warriors' reincarnation and is honored for its bravery. The hummingbird will be made a new symbol for our banners, one that will inspire our soldiers to fight unto their deaths!" #NEW
 #brave_as_hummingbird_desc: "The hummingbird holds a crucial role in our mythology, linked to the god of war, Huītzilōpōchtli. It embodies fallen warriors' reincarnation and is honored for its bravery. The hummingbird will be made a new symbol for our banners that will inspire our soldiers to fight to death." #OLD ENG
 new_trade_opportunities: "Nuove Opportunità Commerciali"
 #new_trade_opportunities_desc: "Le esigenze del nostro popolo si sono adattate ai nuovi mercati aperti ai nostri mercanti. Abbiamo formato i nostri mercanti in modo da consentire loro di massimizzare i profitti che avremmo guadagnato." #OLD ITA
 new_trade_opportunities_desc: "The needs of our people have been adapting to the new markets that have opened to our traders, and we have been training our merchants in methods to maximize our earnings." #NEW
 #new_trade_opportunities_desc: "The needs of our people have been adapting to the new markets that are opened for our traders. We have been training our merchants in ways that will let them maximize the profits that we would earn." #OLD ENG
 aztec_chargers: "Carica $AZT_ADJ$"
 #aztec_chargers_desc: "L'aggressività dei nostri guerrieri è nota oltre i nostri confini. Quando inizia una battaglia, i nostri nemici tremano di paura alla vista dei nostri combattenti che li caricano con frenesia, come se gli araldi della morte stessero andando direttamente verso di loro." #OLD ITA
 aztec_chargers_desc: "The aggressive nature of our warriors is known — and feared — beyond our borders. When battle starts, our enemies shiver in fear at the sight of our combatants charging at them with frenzy, as if they were about to be run down by the heralds of Death itself." #NEW
 #aztec_chargers_desc: "The aggressiveness of our warriors is known beyond our borders. When a battle starts, our enemies shiver in fear at the sight of our combatants charging at them with frenzy, as if heralds of death were going directly towards them." #OLD ENG

 chasqui: "Chasqui"
 #chasqui_desc: "I chasquis sono i messaggeri del nostro Stato. Scelti tra i corridori più forti e resistenti del nostro Paese, questi uomini agili trasportano quipus, messaggi, regali e altri tipi di informazioni e li consegnano al destinatario. La diffusione delle idee e la maggior parte della nostra diplomazia sono sulle loro spalle." #OLD ITA
 chasqui_desc: "The #italic chasquis#! are the messengers of our state. Chosen from the fittest and most durable runners of our country, these agile men carry $quipu$ strings, messages, gifts, and other kinds of information, and deliver them to the target recipient. The spread of ideas, as well as the bulk of our diplomacy, rests on their shoulders." #NEW
 #chasqui_desc: "The chasquis are the messengers of our state. Picked from the fittest and most durable runners of our country, these agile men carry quipus, messages, gifts and other kinds of information and deliver them to the target recipient. The spread of ideas as well as the bulk of our diplomacy lies on their shoulders." #OLD ENG
 military_mita: "Mit'a mMilitare"
 #military_mita_desc: "Il mit'a è un servizio obbligatorio per la società incaica. Questo sistema non solo copre gli aspetti comunitari dello Stato, ma è anche la spina dorsale del servizio militare. Ogni ayllu all'interno del nostro Paese deve fornire all'esercito uomini capaci e adatti al combattimento negli altopiani." #OLD ITA
 military_mita_desc: "The #italic mit'a#! is a mandatory public service system fundamental to Incan society, and forms the backbone of the military service. Every #italic ayllu#! must contribute capable men, adapted to combat in the highlands, to provide labor for state projects and military service." #NEW
 #military_mita_desc: "The mit'a is a mandatory service for the Incan society. This system not only covers the communal aspects of the state but is also the backbone of the military service. Every ayllu within our country has to provide the army with capable men who are adapted to the combat in the highlands." #OLD ENG
 warachikuy: "Warachikuy"
 #warachikuy_desc: "Il Warachikuy è una cerimonia sacra in cui i giovani uomini vengono messi alla prova per quanto riguarda le loro abilità, il valore e l'ingegno, oltre alle loro capacità fisiche come la corsa, la mira, il combattimento e la resistenza a lunghi periodi di privazione del sonno. Coloro che superano queste prove con eccellenza vengono promossi al grado di ufficiali per il nostro esercito in continua crescita." #OLD ITA
 warachikuy_desc: "The #italic warachikuy#! is a holy ceremony where young men are tested in their skills, valor, and wits, as well as their physical abilities like racing, marksmanship, combat, and durability for extended lengths of sleep deprivation. Those who pass these tests with excellence are promoted to the rank of officers for our ever-growing army." #NEW
 #warachikuy_desc: "The Warachikuy is a holy ceremony where young men are tested in their skills, valor, and wits, as well as their physical abilities like racing, marksmanship, combat, and durability for extended lengths of sleep deprivation. Those who pass these tests with excellence are promoted to the rank of officers for our ever-growing army." #OLD ENG
 mitma: "Obblighi di Mitma"
 #mitma_desc: "Per intraprendere grandi progetti edilizi, in passato i nostri governanti hanno dovuto rispettare le antiche tradizioni, invitando ogni singolo piccolo capo del nostro impero nella capitale, per inondarli di doni e organizzare feste sontuose. Con la crescita del nostro Stato, tuttavia, questo è tutt'altro che un modo ideale per intraprendere questi progetti. Fornire manodopera e materiali per la costruzione dovrebbe essere un dovere di ogni singolo capo delle nostre terre." #OLD ITA
 mitma_desc: "In order to undertake great building projects in the past, our rulers had to fulfill ancient traditions by inviting every single petty chief in our empire to the capital, showering them with gifts, and holding lavish feasts. As our state grows, however, this is far from an ideal way to undertake these projects. Supplying labor and materials for construction should be the duty of each and every chief in our lands." #NEW
 #mitma_desc: "In order to undertake great building projects in the past our rulers have had to fulfill ancient traditions by inviting every single petty chief in our empire to the capital in order to shower them with gifts and hold lavish feasts. As our state grows, however, this is far from an ideal way to undertake these projects. Supplying labor and materials for construction should be a duty of each and every chief in our lands." #OLD ENG
 quipu: "Quipu"
 #quipu_desc: "È un sistema che utilizza i nodi su una stringa per memorizzare le informazioni. I nodi rappresentano un numero da zero a nove, che può essere utilizzato per memorizzare quantità o per la contabilità. I nodi possono anche essere utilizzati per fare riferimento a logogrammi sulla stessa stringa. I nodi indicano quale sillaba del logogramma utilizzare e, combinando più stringhe, si possono creare frasi." #OLD ITA
 quipu_desc: "A system which uses knots on a string to store information, do accounting, and perform other informational tasks. Each knot represents a number from zero to nine. The knots can also be used to refer to logograms on the same string. The knots show which syllable in the logogram to use, and by combining more strings, sentences can be formed." #NEW
 #quipu_desc: "Is a system which uses knots on a string to store information. The knots represent a number from zero to nine which can be used to store quantities or for accounting. The knots can also be used to refer to logograms on the same string. The knots show which syllable in the logogram to use and by combining more strings you can then make sentences." #OLD ENG
 drafted_hatun_runas: "Redazione di Hatun Runas"
 #drafted_hatun_runas_desc: "Gli Hatun Runas sono gli uomini comuni dell'impero. Un uomo su cinquanta sarà scelto per servire nell'esercito a partire dal suo venticinquesimo compleanno e per i sette anni successivi. Questo fornisce un esercito numeroso e professionale, più disciplinato dei nostri avversari." #OLD ITA
 drafted_hatun_runas_desc: "The #italic Hatun Runas#! are the peasant class of our empire. One in fifty men are chosen for military service on their twenty-fifth birthdays, and conscripted for the next seven years. This conscription system helps us maintain a substantial professional army with superior discipline than the troops of our adversaries." #NEW
 #drafted_hatun_runas_desc: "Hatun Runas being the common men of the empire. One in fifty men will be chosen to serve in the army from their twenty-fifth birthday and the following seven years. This provides a large and professional army which is more disciplined than our adversaries." #OLD ENG
 llama_michis: "Lama Michis"
 #llama_michis_desc: "I lama hanno molte funzioni nella nostra società. Agiscono come bestie da soma, come sacrifici, forniscono carne e lana, e il loro sterco viene utilizzato come fertilizzante. Controllando l'allevamento e l'uso dei lama attraverso i michis o i pastori del governo, ci assicuriamo che la popolazione di lama sia strettamente monitorata. Ciò consentirà un aumento della popolazione di lama." #OLD ITA
 llama_michis_desc: "Llamas have many functions in our society. They act as beasts of burden, as sacrifices, provide meat and wool, and even give us fertilizer for our crops with their dung. Controlling the breeding and use of llamas through government #italic michis#!, or herders, we ensure that the llama population is strictly monitored. This will provide an opportunity for the llama population to increase" #NEW
 #llama_michis_desc: "Llamas have many functions in our society. They act as beasts of burden, as sacrifices, provide meat, and wool, and their dung is used as fertilizer. Controlling the breeding and use of llama through government michis or herders we ensure that the llama population is strictly monitored. This will allow for an increase in the population of llamas." #OLD ENG
 inc_tambo: "Stazioni Migliorate di Tambo Way"
 #inc_tambo_desc: "Il nostro sistema stradale è la spina dorsale del nostro impero. A ulteriore beneficio dei nostri militari e della nostra amministrazione, costruiremo delle stazioni di passaggio Tambo lungo tutte le strade principali. Queste stazioni di passaggio saranno costruite a un giorno di marcia l'una dall'altra e forniranno riparo e rifornimenti ai viaggiatori." #OLD ITA
 inc_tambo_desc: "Our road system is one of our empire's most valuable assets. To further benefit our military and administration, we will erect #italic tambo#! way stations along all the main roads. These stations will be built within a day's march of each other, and will provide shelter and carry supplies for travelers." #NEW
 #inc_tambo_desc: "Our road system is the backbone of our empire. For further benefit of our military and administration, we will erect Tambo way stations along all main roads. These way stations will be built within a day's march of each other and will provide shelter and carry supplies for the traveling." #OLD ENG
 #adapted_incan_army: "Esercito Inca Adattato" #OLD ITA
 adapted_incan_army: "Adaptable Incan Army" #NEW
 #adapted_incan_army: "Adapted Incan Army" #OLD ENG
 #adapted_incan_army_desc: "Invasori provenienti da terre sconosciute hanno messo piede sul nostro territorio e minacciano la nostra stessa esistenza. Ma i nostri eserciti sono adattivi; si adattano alle nuove tattiche dei nemici, imparano a brandire le loro stesse armi contro di loro e combattono con una determinazione infrangibile ispirata dai loro nemici." #OLD ITA
 adapted_incan_army_desc: "Invaders from strange lands have set foot in our territory, and threaten our very existence. But our armies are adaptive; they adjust to new enemy tactics, learn to wield their very own weapons against them, and fight with an unbreakable resolve inspired by their foes." #NEW
 #adapted_incan_army_desc: "Invaders from strange land have set their foot on our land and threaten our very existence. But our armies are adaptive; they adjust to the new enemy tactics, learn to wield their very own weapons against them, and fight with an unbreakable resolve inspired by their foes." #OLD ENG
 pukara_advance: "$pukara_building$"
 pukara_advance_desc: "$pukara_building_desc$"
 terraces_advance: "$terraces$"
 terraces_advance_desc: "$terraces_desc$"
 tambo_advance: "$tambo$"
 tambo_advance_desc: "$tambo_desc$"
 incamisana_advance: "$incamisana$"
 incamisana_advance_desc: "$incamisana_desc$"

 kor_fortresses_of_goguryeo: "Fortezze di Goguryeo"
 #kor_fortresses_of_goguryeo_desc: "La penisola coreana ha ospitato molti regni in passato. Tuttavia, l'influenza di uno di questi regni è ancora percepibile: Goguryeo, il predecessore di Goryeo. Sebbene Goguryeo ci abbia lasciato molte eredità, le sue fortificazioni e le tecniche in pietra per la costruzione di questi castelli ci servono ancora oggi." #OLD ITA
 kor_fortresses_of_goguryeo_desc: "$korea_region$ was home to many kingdoms in the past. However, the influence of one kingdom in particular is still felt today: Goguryeo, the precursor to Goryeo. Goguryeo has left us many legacies, including its stone fortifications and castle-building techniques, which are still in use to this day." #NEW
 #kor_fortresses_of_goguryeo_desc: "The Korean Peninsula was home to many kingdoms in the past. However, the influence of one such kingdom can still be felt, which is Goguryeo, the predecessor of Goryeo. While Goguryeo has left many legacies to us, its fortifications and the stone techniques for building such castles serve us to this very day." #OLD ENG
 #kor_korean_artisanry: "Artigianato Coreano" #OLD ITA
 kor_korean_artisanry: "$korean_culture$ Artisanry" #NEW
 #kor_korean_artisanry: "Korean Artisanry" #OLD ENG
 #kor_korean_artisanry_desc: "L'arte ha una lunga tradizione nel nostro Paese, che dalla #italic vera unificazione nazionale#! sta vivendo un'epoca d'oro e tra tutte queste meraviglie, l'artigianato della Penisola coreana è una delle parti più onorate." #OLD ITA
 kor_korean_artisanry_desc: "$korea_region$ has always had artistic traditions, but art has truly blossomed since our national unification, thrusting us into a golden era of cultural achievement. Among our many accomplishments, the artisanry of our people shines as a beacon of skill and refinement." #NEW
 #kor_korean_artisanry_desc: "Art has a long tradition in our state, since the #italic true national unification#! it has been enjoying a golden era and between all those marvels, the artisanry of the Korean Peninsula is one of the most honored parts." #OLD ENG
 kor_korean_barracks_advance: "$korean_barracks$"
 kor_korean_barracks_advance_desc: "$korean_barracks_desc$"
 kor_court_poetry: "Poesia del Tribunale"
 #kor_court_poetry_desc: "La nostra aristocrazia pone grande enfasi sullo sviluppo culturale del proprio spirito e della propria mente. La letteratura, come la poesia in cinese classico e altre forme di coinvolgimento con i testi, sono considerate di grande valore all'interno della corte; sia la nobiltà che i membri della corte sono entusiasti dell'impatto culturale della parola scritta." #OLD ITA
 kor_court_poetry_desc: "Our aristocracy puts great emphasis on the cultural development of their spirit and mind. Literature, such as poetry in $classical_chinese_language$, is seen as greatly valuable by the court. The nobility and ruling class alike are enthusiastic about the cultural impact of the written word." #NEW
 #kor_court_poetry_desc: "Our aristocracy puts great emphasis on the cultural development of their spirit and mind. Literature such as poetry in Classical Chinese and other forms of engagement with texts are seen as greatly valuable within the court, both the nobility and members of the court alike are enthusiastic about the cultural impact of the written word." #OLD ENG
 kor_metal_movable_type: "Tipo Mobile in Metallo"
 #kor_metal_movable_type_desc: "La stampa a caratteri mobili è un'antica tecnologia di stampa che fu utilizzata per la prima volta dai cinesi molti secoli fa. Ma è la dinastia di Goryeo che ha sviluppato la stampa a caratteri mobili in metallo e ha ottimizzato il processo e ora possiede la capacità di stampare libri con un'efficienza senza precedenti." #OLD ITA
 kor_metal_movable_type_desc: "Movable type is an ancient printing technology first used by the $CHI_ADJ$ people many centuries ago. But it is the Goryeo dynasty who developed the metal form of movable type, streamlining the printing process. We can now print books with unparalleled efficiency." #NEW
 #kor_metal_movable_type_desc: "The movable type is an ancient technology of printing which was used by the Chinese for the first time many centuries ago. But it is the dynasty of Goryeo that developed the metal movable type and streamlined the process and now possesses the ability to print books at an unparalleled efficiency." #OLD ENG
 kor_gunpowder_engines: "Motori a Polvere da Sparo"
 #kor_gunpowder_engines_desc: "Le nostre forze armate conoscono l'utilità tattica della polvere da sparo fin dall'inizio del 12° secolo. Grazie all'ingegneria inversa della polvere da sparo cinese e al lavoro scientifico di Choe Museon, dovremmo essere in grado di creare la nostra polvere da sparo per le nostre forze armate." #OLD ITA
 kor_gunpowder_engines_desc: "Our forces have been aware of gunpowder's tactical value for centuries. Through reverse-engineering $CHI_ADJ$ designs and the innovations of Choe Museon, we have mastered both gunpowder production and the construction of machines that employ it for military use." #NEW
 #kor_gunpowder_engines_desc: "Our military has been aware of the tactical usefulness of gunpowder since the early 12th century. Due to the reverse engineering of the Chinese gunpowder and the scientific work of Choe Museon, we should be capable of crafting our very own gunpowder for our military." #OLD ENG
 kor_hwachas_advance: "$a_hwacha$"
 kor_hwachas_advance_desc: "$a_hwacha_desc$"
 kor_early_turtle_ship_advance: "$n_early_turtle_ship$"
 kor_early_turtle_ship_advance_desc: "$n_early_turtle_ship_desc$"
 kor_korean_gunnery: "$korean_gunnery$"
 #kor_korean_gunnery_desc: "Con il progredire della tecnologia della polvere da sparo, progredisce anche il nostro ingegno per la difesa del nostro Paese. Anche se semplice nel concetto e nell'esecuzione, l'installazione di cannoni nelle nostre fortificazioni aumenterà enormemente le loro capacità di difesa." #OLD ITA
 kor_korean_gunnery_desc: "As gunpowder technology advances, so does our ingenuity, and as a result we have devised a new defensive system. Although simple in concept and execution, installing cannons in our fortifications will increase their defensive capabilities tremendously." #NEW
 #kor_korean_gunnery_desc: "As the gunpowder technology advances, so progresses our ingenuity for the defense of our home country. Although simple in concept and execution, installing cannons into our fortifications will increase their defense capabilities tremendously." #OLD ENG
 kor_hangeul_alphabet: "L'Alfabeto Hangeul"
 #kor_hangeul_alphabet_desc: "La lingua coreana è così fondamentalmente diversa dal cinese che l'uso dei caratteri cinesi rende analfabeti tutti, tranne le persone più istruite. Il nostro nuovo alfabeto permetterà a tutti i nostri cittadini di leggere e scrivere." #OLD ITA
 kor_hangeul_alphabet_desc: "The $korean_language$ language is so fundamentally different from any form of $chinese_language_family$ that the use of $chinese_language_family$ characters renders all except the most highly educated people illiterate. Our new alphabet is more scientific, and will allow all our people to be able to read and write in their own language." #NEW
 #kor_hangeul_alphabet_desc: "The Korean language is so fundamentally different from Chinese that the use of Chinese characters renders all, but the most highly educated, illiterate. Our new alphabet will allow all our people to be able to read and write." #OLD ENG
 kor_grand_code: "Grande Codice per l'Amministrazione dello Stato "
 #kor_grand_code_desc: "Per garantire un governo adeguato e stabile, codificheremo esattamente il funzionamento del governo. Questa sarà la prima Costituzione scritta della Corea." #OLD ITA
 kor_grand_code_desc: "To ensure proper, stable governance, we must first codify exactly how the government will work. This will be the basis for our nation's first written constitution." #NEW
 #kor_grand_code_desc: "To ensure proper, stable government we will codify exactly how the government will work. This will be Korea's first written constitution." #OLD ENG
 kor_border_defense_council: "Consiglio di Difesa dei Confini"
 #kor_border_defense_council_desc: "I nostri confini sono costantemente minacciati, sia dai barbari del nord che dai pirati d'oltremare. Terremo un consiglio di ufficiali dedicato al controllo e alla sicurezza dei nostri confini, in modo che i nostri eserciti siano sempre pronti ad affrontare qualsiasi minaccia." #OLD ITA
 kor_border_defense_council_desc: "Our borders are constantly threatened, both by barbarians from the north and pirates from beyond the seas. To ensure our armies are always ready to meet every threat with swiftness, we will establish a council of officers dedicated to controlling and securing our borders." #NEW
 #kor_border_defense_council_desc: "Our borders are constantly threatened, both by the barbarians on the north and from pirates beyond the seas. We will keep a council of officers dedicated to controlling and securing our borders, so that our armies are always ready to face any threat." #OLD ENG
 kor_panokseon_advance: "$n_panokseon$"
 kor_panokseon_advance_desc: "$n_panokseon_desc$"
 #kor_korean_cannon: "Il Cannone Coreano" #OLD ITA
 kor_korean_cannon: "The $korean_culture$ Cannon" #NEW
 #kor_korean_cannon: "The Korean Cannon" #OLD ENG
 #kor_korean_cannon_desc: "Abbiamo una lunga storia di utilizzo della polvere da sparo e dei cannoni per le nostre forze armate, ma non possiamo ancora fermarci con i nostri progressi. Sviluppando cannoni più piccoli ma più resistenti, nonché metodi di ricarica più efficienti, l'artiglieria coreana vivrà una rivoluzione tecnologica di cui beneficeranno sia il nostro esercito che la nostra marina." #OLD ITA
 kor_korean_cannon_desc: "Although we are already quite experienced at using gunpowder and cannon, we should not stop making technological advancements. By developing smaller, but more durable cannons, as well as inventing more efficient methods of reloading, we will revolutionize our artillery and greatly benefit both our army and our navy." #NEW
 #kor_korean_cannon_desc: "We have a long history of using gunpowder and cannons for our military, but we cannot stop yet with our advances. By developing smaller but more withstanding cannons as well as more efficient methods of reloading, the Korean artillery will go through a technological revolution which will benefit both our army and our navy." #OLD ENG
 #hyanyak_system: "Sistema Hyangyak " #OLD ITA
 hyanyak_system: "Hyangyak System" #NEW
 #hyanyak_system: "Hyangyak System " #OLD ENG
 #hyanyak_system_desc: "Essendo l'agricoltura il fondamento della nostra economia, la gestione dei villaggi è la cosa più importante. Creeremo un sistema di autogoverno per i villaggi, per incoraggiare un senso di comunità." #OLD ITA
 hyanyak_system_desc: "Agriculture is the bedrock of our economy, and therefore efficient village management is paramount. To this end, we will implement the #italic hyangyak#! system, which establishes self-governance for villages. These agreements establish behavioral standards, dispute resolution regulations, and other civil procedures aimed at creating stable, self-reliant communities." #NEW
 #hyanyak_system_desc: "With agriculture being the bedrock of our economy, the management of villages is the most important thing. We will set up a system of self-government for the villages to encourage a sense of community." #OLD ENG
 kor_geobukseon: "Geobukseon"
 #kor_geobukseon_desc: "La necessità di difendere le nostre coste è importante e, a tal fine, abbiamo sviluppato la nave Tartaruga. Questi bestioni pesantemente corazzati garantiranno che le nostre flotte siano in grado di proteggere le nostre coste." #OLD ITA
 kor_geobukseon_desc: "Defending our coastlines is vital to our survival, and as a result of this vigilance, we have developed the ingenious 'turtle ship'. These heavily armored behemoths will ensure that no enemy ship penetrates our coastal holdings." #NEW
 #kor_geobukseon_desc: "The need to defend our coastline is important, and to this end, we have developed the Turtle ship. These heavily armored behemoths will ensure that our fleets are able to protect our coastlines." #OLD ENG
 kor_hopae_system: "Il Sistema Hopae"
 #kor_hopae_system_desc: "Il Sistema Hopae è un sistema di etichette di identità che richiede a tutti i coreani di portare con sé un'etichetta con il proprio nome, luogo di nascita, stato e luogo di residenza. In questo modo sarà più facile sapere chi sono le persone e dove si trovano." #OLD ITA
 kor_hopae_system_desc: "The #italic hopae#! is an identity tag system requiring all $korean_culture$ people to carry proof of their name, birthplace, status, and residence. This allows authorities to quickly verify identities, and to track a person's movement, if needed." #NEW
 #kor_hopae_system_desc: "The Hopae System is an identity tag system that requires all Koreans to carry a tag with their name, place of birth, status and place of residence. This will make it easier to know who people are and where they are." #OLD ENG
 kor_daedongbeop: "Daedongbeop"
 #kor_daedongbeop_desc: "Una nuova serie di riforme proposte dal Consigliere di Stato Yi Won-ik introdurrà gradualmente dei miglioramenti nel sistema fiscale, precedentemente ignorati. L'imposta sui tributi applicata alle famiglie sarà sostituita da un'imposta unificata sui terreni coltivabili. L'imposta sui beni sarà limitata a una quota che consentirà ai contadini intraprendenti e ai grossisti di produrre e vendere beni in eccesso. Questo comporterà sicuramente una riduzione delle tasse per i contadini, un aumento delle entrate per lo Stato e un incremento del commercio." #OLD ITA
 kor_daedongbeop_desc: "A new set of reforms that will gradually introduce previously ignored improvements into the tax system. The tribute tax levied against households will be replaced with a unified tax on arable land, and the tax on goods will be limited to a quota which lets enterprising peasants and wholesalers make and sell surplus goods. This will result in lower taxes for the peasantry, increased revenues for the state, and an overall rise in commerce." #NEW
 #kor_daedongbeop_desc: "A new set of reforms proposed by Chief State Councilor Yi Won-ik will gradually introduce previously ignored improvements in the tax system. The tribute tax levied against households will be replaced with a unified tax on arable land. The tax on goods will be limited to a quota which lets enterprising peasants and wholesalers make and sell surplus goods. This will surely result in lower taxes for peasants, increased revenues for the state and a rise in commerce." #OLD ENG

 natural_seamanship: "Abilità Marinaresca Naturale"
 #natural_seamanship_desc: "Con la crescita della pesca, abbiamo assistito anche a un aumento del numero di marinai nel nostro regno. Dovremmo approfittarne per la nostra marina, perché l'abilità marinaresca è importante quanto la nave stessa." #OLD ITA
 natural_seamanship_desc: "With the growth of our fishing industry, we have also seen a corresponding expansion in the number of sailors in our realm. We should take advantage of this and recruit some of them to our navy, as seamanship is just as important as the ship itself." #NEW
 #natural_seamanship_desc: "With the growth of fishing we have also seen a growth in the number of sailors in our realm. We should take advantage of this for our navy as seamanship is just as important as the ship itself." #OLD ENG
 call_of_our_forefathers: "La Chiamata dei nostri Antenati"
 #call_of_our_forefathers_desc: "Molto tempo fa, i nostri illustri antenati navigarono e fondarono delle colonie nel Nord. Le nostre saghe ci raccontano persino che raggiunsero un nuovo mondo e fondarono Vinland. Dobbiamo seguire le loro orme." #OLD ITA
 call_of_our_forefathers_desc: "Long ago, our illustrious forefathers sailed forth and established colonies in the North. Our sagas even tell us that they reached a new world and established Vinland. We must follow in their footsteps." #NEW
 #call_of_our_forefathers_desc: "Long ago our illustrious forefathers sailed forth and established colonies in the North. Our sagas even tell us that they reached a new world and established Vinland. We must follow in their footsteps." #OLD ENG
 pioneer_spirit: "Spirito Pionieristico"
 #pioneer_spirit_desc: "Nei tempi passati, il nostro popolo affrontava l'alto mare per fondare colonie su coste lontane. Riaccendiamo questo spirito nel nostro popolo, affinché lo faccia di nuovo." #OLD ITA
 pioneer_spirit_desc: "In days gone by, our people would brave the high seas to establish colonies on distant shores. Let us rekindle this adventurous spirit in our people so that they sail forth again!" #NEW
 #pioneer_spirit_desc: "In days gone by our people would brave the high seas to establish colonies on distant shores. Let us rekindle this spirit in our people so they do so again." #OLD ENG
 nor_shipbuilding: "Costruzione Navale Militare"
 #nor_shipbuilding_desc: "L'espansione dell'industria della pesca ha portato anche a un'espansione della cantieristica navale. Abbiamo a disposizione un pool pronto di maestri d'ascia qualificati per espandere la nostra cantieristica." #OLD ITA
 nor_shipbuilding_desc: "The expansion of our fishing industry has also led to an expansion in shipbuilding. We have a ready pool of trained shipwrights at hand to expand our own production process." #NEW
 #nor_shipbuilding_desc: "The expansion of the fishing industry has also led to an expansion in shipbuilding. We have a ready pool of trained shipwrights at hand to expand our own shipbuilding." #OLD ENG
 write_new_sagas: "Scrivere Nuove Saghe"
 #write_new_sagas_desc: "Le menti acute conservano la conoscenza\nConosciuta da secoli\nCantata al tramonto\nLe saghe sono la nostra eredità\nIncoraggiata dall'establishment\nOgni Paese avrà la sua." #OLD ITA
 write_new_sagas_desc: "Keen minds preserve knowledge\nKnown from ages past\nSung in the sundown\nSagas are our inheritance\nEncouraged by the establishment\nEach country will have its own" #NEW
 #write_new_sagas_desc: "Keen minds preserve knowledge\nKnown from ages past\nSung in the sundown\nSagas are our inheritance\nEncouraged by the establishment\nEach country will have its own." #OLD ENG

 expansive_policies: "Politiche Espansive"
 #expansive_policies_desc: "Le terre del Brandeburgo, per lo più terreni sabbiosi, sono povere e considerate il #italic recinto di sabbia#! del Sacro Romano Impero. I nostri leader hanno sempre sentito la necessità che il Margraviato si espandesse in ogni direzione, spesso rivendicando i troni vicini come quello della Pomerania. Questo ha fatto sì che il nostro Paese fosse composto da diverse culture, formando un melting pot all'interno dell'Impero." #OLD ITA
 expansive_policies_desc: "$brandenburg_area$'s infertile, sandy soil has earned it the unflattering nickname 'Sandbox of the $hre$.' Such poverty spurred the margraves to aggressively expand, pursuing claims to neighboring territories. These conquests have made our country much more culturally diverse than the rest of the Empire." #NEW
 #expansive_policies_desc: "The lands of Brandenburg, mostly sandy soils, are poor and considered the #italic sandbox#! of the Holy Roman Empire. Our leaders have always felt the need for the Margraviate to expand in every direction, often claiming neighboring thrones as Pomerania's. This led to our country being composed of several cultures, forming a melting pot within the empire." #OLD ENG
 northern_march: "La Marcia del Nord"
 #northern_march_desc: "Nei primi tempi dell'Impero, l'area di Brandeburgo fu colonizzata e governata da tribù slave, fino a quando l'Imperatore creò la Marca Settentrionale per sottomettere e fortificare l'area. Nel corso del tempo, questa Marca Settentrionale si è evoluta nel Brandeburgo, diventando una delle regioni più importanti dell'Impero." #OLD ITA
 northern_march_desc: "In the early days of the $hre$, the $brandenburg_area$ area was settled and governed by $slavic_group$ tribes, until the Emperor created the Northern March to subjugate and fortify the area. Over time, this Northern March evolved into $brandenburg_area$, becoming one of the most important regions in the $hre$." #NEW
 #northern_march_desc: "In the early days of the Empire, the Brandenburg area was settled and governed by Slavic tribes, until the Emperor created the Northern March to subjugate and fortify the area. Over time, this Northern March evolved into Brandenburg, becoming one of the most important regions in the Empire." #OLD ENG
 divide_estates: "Dividere le Proprietà"
 #divide_estates_desc: "Uniti, i tre ceti formano un blocco efficace al potere del sovrano. Per consolidare il nostro controllo, dobbiamo far leva sistematicamente sulla nobiltà contro le altre proprietà." #OLD ITA
 divide_estates_desc: "United, the three estates form an effective block against the power of the ruler. To consolidate our control, we must systematically leverage the nobility against the other estates." #NEW
 #divide_estates_desc: "United, the three estates form an effective block on the power of the ruler. To consolidate our control, we must systematically leverage the nobility against the other estates." #OLD ENG
 soldiers_fortune: "Soldati della Fortuna"
 #soldiers_fortune_desc: "Le nostre terre sono scarsamente popolate per la maggior parte e circondate da nemici. La necessità di una difesa solida ci spinge ad assumere soldati da terre straniere, pronti a combattere sotto la nostra bandiera." #OLD ITA
 soldiers_fortune_desc: "Our lands are sparsely populated, for the most part, and surrounded by enemies. The necessity for more robust defenses has prompted us to hire soldiers from foreign lands, who will fight under our banner for a price." #NEW
 #soldiers_fortune_desc: "Our lands are sparsely populated for the most part and surrounded by enemies. The necessity for robust defense prompts us to hire soldiers from foreign lands, ready to fight under our banner." #OLD ENG
 iron_tooth: "Dente di Ferro"
 #iron_tooth_desc: "Il rafforzamento del controllo della nostra corte sulle terre del Margraviato farà guadagnare al nostro sovrano il soprannome di #italic Dente di Ferro#!, come se lo avessimo morso come un cane da guardia. Il nostro governo lascerà un segno sulla nostra nazione, un segno che instillerà un senso di orgoglio e di lealtà anche nel più umile contadino del Brandeburgo." #OLD ITA
 iron_tooth_desc: "Enhancing our court's control over the Margraviate's lands will earn our ruler the moniker #italic Iron Tooth#!, as if we bit it like an attack dog. Our rule will leave a mark on our nation, a mark which will instill a sense of pride and loyalty in even the lowliest peasant in $brandenburg_area$." #NEW
 #iron_tooth_desc: "Enhancing our court's control over the Margraviate's lands will earn our ruler the moniker #italic Iron Tooth#!, as if we bit it like an attack dog. Our rule will leave a mark on our nation, a mark which will instill a sense of pride and loyalty in even the lowliest peasant in Brandenburg." #OLD ENG
 kammergericht: "Fondare il Kammergericht"
 #kammergericht_desc: "Per regolarizzare il controllo della Marca di Brandeburgo, sostituiremo il diritto comune locale con il diritto romano. Regoleremo ulteriormente la giustizia spostando la Corte Suprema dal tribunale dell'Elettore (che è incline a spostarsi) a una sede fissa e centrale. Questo migliorerà contemporaneamente la giustizia e frenerà il potere dei magnati locali." #OLD ITA
 kammergericht_desc: "In order to regularize control of the Mark of Brandenburg, we will replace local common law with Roman law. We will further regulate justice by moving the Supreme Court from the court of the Elector, who is prone to moving around, to a fixed central location. This will simultaneously improve justice and curb the power of local magnates." #NEW
 #kammergericht_desc: "In order to regularize control of the Mark of Brandenburg we will replace local common law with Roman law. We will further regulate justice by moving the Supreme Court from the court of the Elector (who is prone to moving around) to a fixed and central location. This will simultaneously improve justice and curb the power of local magnates." #OLD ENG
 margrave_council: "Geheimer Rat für die Kurmark"
 #margrave_council_desc: "Il potere del Margravio è fortemente minacciato dal potere sempre crescente dei nostri Estati. Gli Estati sono di grande beneficio per la nostra nazione, ma la minaccia reale che rappresentano per la nostra base di potere richiede la creazione di un nuovo Consiglio, che riduca il potere reale che gli Estati detengono sulla nostra nazione in una posizione più consultiva per il Margravio. In questo modo, potremo continuare a godere dei benefici dei nostri Estati, pur avendo meno preoccupazioni per le loro esigenze." #OLD ITA
 margrave_council_desc: "The authority of the Margrave is greatly threatened by the ever-increasing power of our Estates. The Estates are of great benefit to our nation, but the threat they represent to our base of power necessitates the creation of a new council, one which reduces the very real power that the estates hold over our nation into more of an advisory position for the Margrave. This way, we may continue to enjoy the benefits of our Estates while having fewer concerns about their needs." #NEW
 #margrave_council_desc: "The power of the Margrave is greatly threatened by the ever-increasing power of our Estates. The Estates are of great benefit to our nation, but the very real threat they represent to our base of power necessitates the creation of a new council, one which reduces the very real power that the estates hold over our nation into more of an advisory position for the Margrave. This way, we may continue to enjoy the benefits of our Estates while having fewer concerns about their needs." #OLD ENG
 religious_toleration: "Tolleranza Religiosa"
 #religious_toleration_desc: "La stabilità in patria è la chiave del nostro successo. Espandendoci verso l'esterno e promuovendo la tolleranza religiosa, non solo miglioriamo la stabilità in patria, ma rendiamo anche il nostro regno un rifugio per coloro che fuggono dalle persecuzioni altrove." #OLD ITA
 religious_toleration_desc: "Stability in our home regions is the key to our success elsewhere. Expanding outwards while fostering religious tolerance, we not only improve stability at home, but we also make our realm a haven for those fleeing persecution elsewhere." #NEW
 #religious_toleration_desc: "Stability at home is the key to our success. Expanding outwards while fostering religious tolerance, we not only improve stability at home, but we also make our realm a haven for those fleeing persecution elsewhere." #OLD ENG
 army_professionalism: "Professionalità dell'Esercito"
 #army_professionalism_desc: "Tornando indietro fino all'invasione persiana della Grecia, un esercito più piccolo e disciplinato poteva sconfiggere un esercito più grande se era meglio disciplinato e addestrato. Per prosperare, dobbiamo elevare il nostro esercito agli stessi standard." #OLD ITA
 army_professionalism_desc: "As we learned from the Persian invasion of Greece so long ago, a small army can defeat a larger one — as long as they have iron discipline and the proper training. We must elevate our own army to meet these extraordinary standards." #NEW
 #army_professionalism_desc: "Going all the way back to the Persian invasion of Greece, a smaller disciplined army could defeat a larger one if it was better disciplined and trained. To prosper, we must elevate our army to the same standards." #OLD ENG
 #soldier_king: "Il Re Soldato di Prussia" #OLD ITA
 soldier_king: "The Soldier-King of $PRU$" #NEW
 #soldier_king: "The Soldier-King of Prussia" #OLD ENG
 #soldier_king_desc: "La maggior parte degli Stati sono Paesi che hanno un esercito, la Prussia invece è un esercito che ha un Paese. I numerosi Re di Prussia erano soldati tanto quanto monarchi; ognuno ha concluso il proprio regno non solo riformando lo Stato, ma anche lasciando un impatto duraturo sull'esercito." #OLD ITA
 soldier_king_desc: "Most states are countries that have an army. $PRU$, on the other hand, is an army that has a country! The many Kings of $PRU$ were soldiers as much as monarchs; each concluded their reign not only by reforming the state but also leaving a lasting impact on the army." #NEW
 #soldier_king_desc: "Most states are countries that have an army, Prussia on the other hand is an army that has a country. The many Kings of Prussia were soldiers as much as monarchs; each concluded their reign not only by reforming the state but also leaving a lasting impact on the army." #OLD ENG
 auftragstaktik: "Auftragstaktik"
 #auftragstaktik_desc: "L'Auftragstaktik o #italic Tattica della Missione#! è un sistema in cui i nostri leader subordinati ricevono dai loro comandanti informazioni sufficienti sugli obiettivi della battaglia o della guerra, e poi possono agire di propria iniziativa. Questo sistema consente ai nostri battaglioni di sviluppare un rapporto più stretto con i loro leader, ottenendo risultati migliori." #OLD ITA
 auftragstaktik_desc: "#italic Auftragstaktik#!, or 'Mission Tactics'. is a system by which our subordinate leaders are informed about the objectives of the battle or the war by their commanders, and then are allowed to act on their personal initiative. This system allows our battalions to develop a tighter relationship with their leaders, yielding better results." #NEW
 #auftragstaktik_desc: "Auftragstaktik or #italic Mission Tactics#! is a system by which our subordinate leaders are given enough information about the objectives of the battle or the war by their commanders, and then are allowed to act at their personal initiative. This system allows our battalions to develop a tighter relationship with their leaders, yielding better results." #OLD ENG
 goose_step: "Il Passo dell'Oca"
 #goose_step_desc: "Sebbene abbia un aspetto piuttosto strano, il passo dell'oca è stato sviluppato appositamente per garantire che i nostri uomini aiutino a mantenere la linea mentre avanzano verso il nemico. Questo fornisce ai nostri eserciti un vantaggio tangibile sul campo di battaglia." #OLD ITA
 goose_step_desc: "Although it looks rather odd, the 'goose step' is specifically designed to facilitate our men holding their line as they advance towards the enemy. This provides our armies with a tangible advantage on the battlefield." #NEW
 #goose_step_desc: "Although looking rather odd, the goose step is specifically developed to ensure that our men help hold their line as they advance towards the enemy. This provides our armies with a tangible advantage on the battlefield." #OLD ENG


 mounted_people: "Persone a Cavallo"
 #mounted_people_desc: "Il nostro popolo ha prosperato a lungo sul dorso dei cavalli, parte integrante della nostra cultura e del nostro potere. Siamo immensamente orgogliosi di allevare queste maestose creature e delle nostre impareggiabili abilità nel tiro con l'arco a cavallo. Sfrutteremo questi vantaggi per garantire la nostra supremazia sul campo di battaglia." #OLD ITA
 mounted_people_desc: "Our people have thrived on horseback for centuries, and these majestic creatures are an integral part of our culture and power. We take immense pride in our unrivalled skills in our equine husbandry and talent for mounted archery, both of which contribute to our supremacy on the battlefield." #NEW
 #mounted_people_desc: "Our people have long thrived on the back of horses, an integral part of our culture and power. We take immense pride in breeding these majestic creatures and our unrivaled skills in horseback archery. We will harness these advantages to ensure our supremacy on the battlefield." #OLD ENG
 falconry_mastery: "Maestria nella Falconeria"
 #falconry_mastery_desc: "Profondamente radicata nella nostra cultura, la falconeria rappresenta un legame forgiato tra il nostro popolo e questi magnifici uccelli da preda. Abbiamo affinato le nostre abilità nell'antica arte della falconeria e i nostri falconieri sono venerati per la loro capacità di catturare, addestrare e cacciare con questi maestosi rapaci." #OLD ITA
 falconry_mastery_desc: "Deeply rooted in our culture, falconry represents a bond forged between our people and these magnificent birds of prey, and we have finely honed our skill in this ancient art. Our falconers are renowned for their ability to train these majestic raptors to hunt and capture prey." #NEW
 #falconry_mastery_desc: "Deeply rooted in our culture, falconry represents a bond forged between our people and these magnificent birds of prey. We have honed our skills in the ancient art of falconry and our falconers are revered for their ability to capture, train, and hunt with these majestic raptors." #OLD ENG
 rich_lands: "Terre Ricche"
 #rich_lands_desc: "Le nostre terre sono ricche, dalle praterie alle fitte foreste, pronte per essere utilizzate dai nostri uomini e donne coraggiosi. Utilizzeremo tutte le risorse a nostra disposizione per portare prosperità a ogni famiglia della nostra grande nazione, gestendo saggiamente la terra che ci è stata donata." #OLD ITA
 rich_lands_desc: "Our lands are rich with fertile soil and abundant resources from the prairies to the dense forests, ready to be transformed by our hardy men and women. We will use every tool at our disposal to wisely manage the land we have been gifted, and thereby bring prosperity to every household." #NEW
 #rich_lands_desc: "Our lands are wealthy, from the prairies to the thick forests, ready to be used by our hardy men and women. We will use all resources at our disposal to bring prosperity to every household in our grand nation by wisely managing the land we have been gifted." #OLD ENG
 jurchen_honor: "Jurchen Honor"
 #jurchen_honor_desc: "Il nostro popolo è entusiasta delle prove di forza e di altre dimostrazioni di valore, poiché ogni Jurchen ritiene che, mostrando le proprie capacità, si guadagna il rispetto dei suoi pari. Questo rispetto ben guadagnato rende i nostri guerrieri immensamente coraggiosi, pronti a combattere contro chiunque." #OLD ITA
 jurchen_honor_desc: "Our people are enthusiastic about feats of strength and other demonstrations of skill, as each Jurchen feels that by showing off their abilities they earn the respect of their peers. This well-earned self-respect makes our warriors immensely brave, ready to fight anyone." #NEW
 #jurchen_honor_desc: "Our people are enthusiastic about feats of strength and other demonstrations of worth, as each Jurchen feels that by showing off their abilities they earn the respect of their peers. This well-earned self-respect makes our warriors immensely brave, ready to fight anyone." #OLD ENG
 unite_the_tribes: "Unire le Tribù"
 #unite_the_tribes_desc: "Dalla nascita della nostra nazione, i Jurchen sono stati unificati e divisi in molteplici tribù e alleanze, non sempre amichevoli. Questa dinamica è una costante da sempre, così come il desiderio di diversi leader di unificare tutte le tribù sotto un'unica bandiera." #OLD ITA
 unite_the_tribes_desc: "Since the birth of our nation, the Jurchen people have been unified and divided into multiple tribes and alliances, and not always friendly ones. This dynamic has been constant for as long as we can remember — as has the urge to unify all our tribes under a single banner. The time has come to satisfy this long-cherished desire!" #NEW
 #unite_the_tribes_desc: "Since the birth of our nation, the Jurchens have been unified and divided into multiple tribes and alliances, not always friendly. This dynamic has been a constant since forever, and so has been the desire of multiple leaders to unify all the tribes under a single banner." #OLD ENG
 leader_under_sky: "Un Leader sotto il Cielo"
 #leader_under_sky_desc: "Il nostro popolo è stato diviso per troppo tempo e abbiamo bisogno di qualcuno abbastanza forte da unirlo e far tremare il mondo. Il Cielo dirigerà gli atti e i pensieri di questo leader e ci guiderà verso un futuro luminoso." #OLD ITA
 leader_under_sky_desc: "Our people have been divided for too long, and we need someone strong enough to unite them and make the world tremble at our feet. The Sky will direct the acts and thoughts of this leader, and guide us to a bright future." #NEW
 #leader_under_sky_desc: "Our people have been divided for too long, and we need someone strong enough to unite them and make the world tremble. The Sky will direct the acts and thoughts of this leader and guide us to a bright future." #OLD ENG
 foraging_our_way: "Foraggiare a modo Nostro"
 #foraging_our_way_desc: "Siamo cacciatori e viviamo in comunione con la natura, anche quelli di noi che vivono in città. Abbiamo nel sangue la capacità di sentire dove si trova la strada giusta e quali sono i doni delle foreste che ci fanno bene. Questa saggezza ci permette di sopravvivere ovunque senza difficoltà." #OLD ITA
 foraging_our_way_desc: "We are hunters and live in communion with nature, even those of us dwelling in cities. It is in our blood to find the correct path in a dark forest; to know which of Nature's gifts to take with us. This wisdom lets us survive everywhere without difficulty." #NEW
 #foraging_our_way_desc: "We are hunters and live in communion with nature, even those of us living in cities. It is in our blood to feel where the correct path lies and which gifts from the forests are good for us. This wisdom let us survive everywhere without difficulty." #OLD ENG
 deliberative_council: "Consiglio Deliberativo dei Principi e dei Ministri"
 #deliberative_council_desc: "Originariamente chiamato #italic Consiglio di Deliberazione#!, trae origine da istituzioni informali che promuovevano la governance collaborativa tra i leader del regno. La struttura del Consiglio è stata trasformata, concentrandosi sulla governance collettiva aristocratica e sulle deliberazioni politiche, principalmente negli affari esteri e militari. L'adesione è limitata ai leader militari del nostro popolo al di fuori del clan imperiale, rafforzando il potere del sovrano." #OLD ITA
 deliberative_council_desc: "Originally called the 'Council of Deliberation', this body evolved from informal institutions that promoted collaborative governance among the leaders of the realm. The Council's structure has been transformed, focusing on collective aristocratic governance and policy deliberations, mainly in foreign and military affairs. Membership is restricted to military leaders from outside the imperial clan, ensuring elite participation while maintaining the ultimate authority of the ruler." #NEW
 #deliberative_council_desc: "Originally named #italic Council of Deliberation#!, it originates from informal institutions that promoted collaborative governance among the leaders of the realm. The Council's structure has been transformed, focusing on collective aristocratic governance and policy deliberations, mainly in foreign and military affairs. Membership is restricted to our people's military leaders outside the imperial clan, enhancing the ruler's power." #OLD ENG
 manchu_script: "Scrittura Manciù"
 #manchu_script_desc: "L'alfabeto Manciù è emerso combinando i caratteri mongoli classici con la fonetica Jurchen. Questo sistema di scrittura unico facilita la scrittura a colonna verticale da sinistra a destra. Con diverse forme di lettere e l'adattabilità contestuale per le posizioni iniziali, mediali, finali e isolate, conserva le sfumature linguistiche della nostra lingua." #OLD ITA
 manchu_script_desc: "The Manchu alphabet has emerged, combining Classical $mongolian_language$ characters with Jurchen phonetics. This unique writing system facilitates left-to-right vertical column writing. With diverse letter forms and contextual adaptability for initial, medial, final, and isolated positions, it preserves the most subtle nuances of our language." #NEW
 #manchu_script_desc: "The Manchu alphabet has emerged combining Classical Mongolian characters with Jurchen phonetics. This unique writing system facilitates left-to-right vertical column writing. With diverse letter forms and contextual adaptability for initial, medial, final, and isolated positions, it preserves the linguistic nuances of our language." #OLD ENG
 the_eight_banners: "Gli Otto Stendardi"
 #the_eight_banners_desc: "Il Sistema degli Otto Stendardi costituisce il nucleo della nostra società e della nostra potenza militare. Con l'appartenenza ereditaria e le ricompense in terre e redditi, gli Stendardi sono i guardiani d'élite del nostro regno. Dalla conquista dei nostri vicini alle campagne future, il nostro dominio dipende dalla forza degli Stendardi." #OLD ITA
 the_eight_banners_desc: "The Eight Banner System is the core of our society and military. Through hereditary membership and grants of land and income, the Banners are granted elite status, and for good reason — from the conquest of our neighbors to future campaigns, our dominance depends on their might." #NEW
 #the_eight_banners_desc: "The Eight Banner System forms the core of our society and military might. With hereditary membership and rewards of land and income, the banners stand as the elite guardians of our realm. From the conquest of our neighbors to future campaigns, our dominance depends on the might of the Banners." #OLD ENG
 a_new_dawn: "Una Nuova Alba"
 #a_new_dawn_desc: "La nostra nazione è rinata. Le nostre origini tribali sono scomparse come vecchi sogni che non torneranno mai più. La modernizzazione della nostra nazione è un dato di fatto, ed è ora di mostrarlo al mondo." #OLD ITA
 a_new_dawn_desc: "Our nation has been reborn. The old ways of living are gone, like dreams melting into the morning light. It is time for us to face the world as a fully modernized nation." #NEW
 #a_new_dawn_desc: "Our nation has been reborn. Our tribal origins are gone as old dreams that are never going to come back. The modernization of our nation is a fact, and it is time to show it to the world." #OLD ENG
 manchu_reborn: "Rinascita Manciù"
 #manchu_reborn_desc: "Come la nostra nazione ha subito gravi trasformazioni nel suo nucleo, anche il nostro esercito lo farà. Il mondo sta diventando più aperto per noi e nuove sfide appariranno all'orizzonte. Se vogliamo sopravvivere, dobbiamo essere pronti ad agire." #OLD ITA
 manchu_reborn_desc: "As our nation has undergone fundamental transformations, so will our army. The world has opened itself to us, and new challenges will appear on the horizon. If we want to survive in this new paradigm, we have to be ready to act." #NEW
 #manchu_reborn_desc: "As our nation has suffered severe transformations in its core, so will our army. The world is becoming more open for us and new challenges will appear on the horizon. If we want to survive, we have to be ready to act." #OLD ENG

 #inigo_architecture: "Architettura Inigo" #OLD ITA
 inigo_architecture: "Palladian Architecture" #NEW
 #inigo_architecture: "Inigo Architecture" #OLD ENG
 #inigo_architecture_desc: "Si prevede che il lavoro di Inigo Jones avrà un impatto significativo sulle future generazioni di architetti. La sua promozione dell'architettura classica e la sua priorità sulle proporzioni e l'armonia lasceranno sicuramente un segno duraturo nell'architettura britannica. I suoi contributi sono considerati fondamentali per il movimento neoclassico in Inghilterra." #OLD ITA
 inigo_architecture_desc: "The architectural innovations made by Inigo Jones will undoubtedly have a significant impact on future generations of architects. His promotion of classical architecture and his priority on proportion and harmony are considered hallmarks of the neoclassical movement in $ENG$." #NEW
 #inigo_architecture_desc: "Inigo Jones's work is predicted to have a significant impact on future generations of architects. His promotion of classical architecture and his priority on proportion and harmony will surely leave a lasting mark on British architecture. His contributions are considered vital for the neoclassical movement in England." #OLD ENG
 sailing_and_fighting_instructions: "Istruzioni di Blake per la navigazione e il combattimento"
 #sailing_and_fighting_instructions_desc: "Robert Blake ha scritto diverse serie di norme e regolamenti che hanno portato a riforme radicali della Marina. Queste includono nuove tattiche per i blocchi e gli sbarchi, e l'adozione della formazione di battaglia a linea singola." #OLD ITA
 sailing_and_fighting_instructions_desc: "Robert Blake has written several sets of rules and regulations that resulted in sweeping naval reforms. These include new tactics for blockades and landings, as well as adoption of the single line ahead battle formation." #NEW
 #sailing_and_fighting_instructions_desc: "Robert Blake has written several sets of rules and regulations that resulted in sweeping reforms to the Navy. The aforementioned include new tactics for blockades and landings, and adopting the single line ahead battle formation." #OLD ENG
 coke_smelting: "Fusione di Coke"
 #coke_smelting_desc: "L'invenzione della fusione a coke, in particolare la sua applicazione nella produzione di ferro e acciaio, è strettamente legata alla Rivoluzione Industriale. Attualmente, il ferro e l'acciaio vengono prodotti con metodi tradizionali come la fusione a carbone, mentre questo nuovo metodo consentirà di migliorare la produzione e ridurre i costi di manutenzione." #OLD ITA
 coke_smelting_desc: "The invention of coke smelting, specifically its application in $iron$ and $steel$ production, is closely tied to the Industrial Revolution. $iron$ and $steel$ are currently produced using traditional methods like charcoal smelting, whereas this new method will result in improved output and reduced maintenance costs." #NEW
 #coke_smelting_desc: "The invention of coke smelting, specifically its application in iron and steel production, is closely tied to the Industrial Revolution. Iron and steel are currently produced using traditional methods like charcoal smelting, whereas this new method will result in improved output and reduced maintenance costs." #OLD ENG
 water_frame: "Cornice d'Acqua"
 water_frame_desc: "Il telaio ad acqua è un filatoio utilizzato nell'industria tessile per produrre filo di cotone. Questa innovazione contribuirà alla creazione di grandi fabbriche tessili alimentate da ruote idrauliche."

 fortress_church_advance: "$fortress_church$"
 fortress_church_advance_desc: "$fortress_church_desc$"
 saquiyah: "Sāqiyah"
 saquiyah_desc: "La $saquiyah$ è un dispositivo meccanico progettato per facilitare il trasporto dell'acqua verso le altezze più elevate. Conosciuta anche come #italic ruota persiana#!, #italic tablia#!, #italic rehat#! e #italic timpano#!, la ruota è fondamentale per i sistemi di irrigazione nelle aree con poca o nessuna acqua corrente."
 sepak_takraw: "Sepak Takraw"
 sepak_takraw_desc: "È stato praticato in tutto il mondo $south_east_asia$ per molto tempo, sin dal suo adattamento dall'antico $chinese_group$ #italic Cùjū#!, e conosciuto anche come #italic Sepak Raga#!, #italic Takraw#!, #italic Chinlone#! o #italic Sipa#!, a seconda del Paese, #italic $sepak_takraw$#! non è solo un gioco. Sebbene l'obiettivo sia calciare una palla tra i giocatori e mantenerla in aria, è anche un modo per fare esercizio fisico regolare, e quindi non si gioca solo per intrattenimento ma anche come addestramento militare per l'esercito."
 three_teachings: "Tre Insegnamenti"
 three_teachings_desc: "$three_teachings$ è una filosofia originata da $CHI$ che combina gli insegnamenti di $SECT_CONFUCIANISM_NAME$, $SECT_DAOISM_NAME$ e $buddhist$ in un insegnamento armonioso e singolare. $SECT_CONFUCIANISM_NAME$ rappresenta l'ideologia della legge, mentre $SECT_DAOISM_NAME$ è la visione del mondo degli intellettuali radicali. Queste due estremità opposte dello spettro filosofico sarebbero quindi collegate alle filosofie di $buddhist$."
 #INDIAN ADVANCES
 #dlh_origin_of_hindustani: "Origine di Hindustani" #OLD ITA
 dlh_origin_of_hindustani: "Origin of $hindustani_language$" #NEW
 #dlh_origin_of_hindustani: "Origin of Hindustani" #OLD ENG
 dlh_origin_of_hindustani_desc: "La lingua $hindustani_language$ si è sviluppata da Apabhramsa - una lingua indo-ariana media - ed è emersa come lingua di contatto di $DLH$. Poiché $hindustani_language$ ha influenze da $persian_language$, $arabic_language$, e dal turco, ma anche dall'hindi antico, la diplomazia con il mondo $muslim_ADJ$ e il mondo $hindu_ADJ$ diventa un compito non complicato."
 dlh_indo_persian_culture: "Cultura Indo-Persiana"
 #dlh_indo_persian_culture_desc: "$persian_language$ è stata la lingua dominante della corte fin dalla nascita del Sultanato di $DLH_ADJ$ nel 1290. Come tale, l'influenza di $persian_language$ ha creato una sintesi con le culture indiane locali." #OLD ITA
 dlh_indo_persian_culture_desc: "$persian_language$ has been the dominant language of the court ever since the first inception of the $DLH_ADJ$ Sultanate. As such, the influence of $persian_language$ has synthesized with local Indian cultures." #NEW
 #dlh_indo_persian_culture_desc: "$persian_language$ has been the dominant language of the court ever since the first inception of the $DLH_ADJ$ Sultanate in 1290. As such, $persian_language$ influence has created a synthesis with the local Indian cultures." #OLD ENG
 dlh_turkic_conqueror_roots: "$turkic_group$ Radici di Conquistatore"
 dlh_turkic_conqueror_roots_desc: "Sebbene chiamiamo $india$ la nostra casa, gli antenati del nostro Stato avevano origini $turkic_group$. I loro primi successi come conquistatori e governanti dai tempi della dinastia $mamluk$, così come i successi della successiva dinastia Khalji, ispirano i nostri militari e diplomatici a spingere i confini di $DLH$ in ogni angolo di $india$."
 dlh_revert_ghiyath_reforms: "Ripristino delle Riforme di Ghiyath"
 dlh_revert_ghiyath_reforms_desc: "Le folli decisioni economiche di Ghiyath al-Din non hanno portato altro che la rovina finanziaria allo Stato di $DLH$. Dobbiamo tornare alla sua follia e ripristinare l'uso dell'oro e dell'argento per le nostre monete."
 dlh_restore_the_delhi_empire: "Ripristinare la Grandezza di $DLH$"
 dlh_restore_the_delhi_empire_desc: "Il Sultanato di $DLH_ADJ$ un tempo comprendeva quasi tutta $india$. Deve risorgere!"
 dlh_reintegrate_former_provinces: "Reintegrare le Ex Province"
 dlh_reintegrate_former_provinces_desc: "Il Sultanato di $DLH_ADJ$, un tempo vasto, ha perso la maggior parte dei suoi possedimenti di un tempo, ma non abbiamo dimenticato i mezzi per amministrarli. Mentre lavoriamo per ripristinare la nostra gloria passata, ricorderemo ai governanti locali i loro doveri nei confronti del Sultano."
 dlh_textile_innovation: "Produzione Tessile Innovativa"
 #dlh_textile_innovation_desc: "La fiorente industria tessile di $DLH$ rende la nostra nazione un centro di innovazione tecnologica per il settore. Essendo stati i primi ad adottare il filatoio di cotone e il rullo a vite senza fine, sappiamo quanto sia importante essere all'avanguardia in questi settori. Ora dobbiamo fare in modo che il filatoio venga adottato nel modo più ampio possibile." #OLD ITA
 dlh_textile_innovation_desc: "The thriving textile industry in $DLH$ makes our nation a hotspot for related technological innovations. As early adopters of the cotton gin and worm gear roller, we know the importance of staying ahead of the curve in these matters. We must now ensure that the spinning wheel is adopted as widely as possible." #NEW
 #dlh_textile_innovation_desc: "The thriving textile industry in $DLH$ makes our nation a center of technological innovation for the industry. As early adopters of the cotton gin and worm gear roller, we know the importance of staying ahead of the curve in these matters. We must now ensure that the spinning wheel is adopted as widely as possible." #OLD ENG
 dlh_afghan_nobility: "Nobiltà $afghan_culture$"
 dlh_afghan_nobility_desc: "Gran parte della nobiltà $DLH_ADJ$ proviene dai ranghi della comunità $afghan_culture$, un popolo con una lunga storia di conquista e dominio nel nord di $india$. Anche se a volte rappresentano un ostacolo politico, le loro abilità marziali sono fuori discussione."
 dlh_grand_trunk: "Proteggere la Grande Strada Maestra"
 #dlh_grand_trunk_desc: "La Grande Strada Maestra va da $kabul$ in Afghanistan alla costa del $bengal_area$. Molte delle città commerciali più importanti lungo il suo percorso fanno parte del nostro Impero, e quindi spetta a noi garantire che la strada sia ben mantenuta e libera dal banditismo." #OLD ITA
 dlh_grand_trunk_desc: "The Grand Trunk Road runs from $kabul$ in Afghanistan to the coast of $bengal_area$. Many of the most important trading cities along its route are part of our empire, and so it falls to us to ensure that the road is well maintained and free of banditry." #NEW
 #dlh_grand_trunk_desc: "The Grand Trunk Road runs from $kabul$ in Afghanistan to the coast of $bengal_area$. Many of the most important trading cities along its route are part of our Empire, and so it falls to us to ensure that the Road is well maintained and free of banditry." #OLD ENG
 dlh_cosmopolitan_religions: "Religioni cosmopolite"
 #dlh_cosmopolitan_religions_desc: "$india$ è un enorme subcontinente con diverse religioni presenti. Per garantire la stabilità all'interno del nostro regno, dovremmo ampliare i diritti delle diverse confessioni e assicurarci la loro fedeltà." #OLD ITA
 dlh_cosmopolitan_religions_desc: "$india$ is a massive subcontinent with several religions present. In order to ensure stability within our realm, we should expand the rights of the different faiths, and secure the loyalty of their worshippers." #NEW
 #dlh_cosmopolitan_religions_desc: "$india$ is a massive subcontinent with several religions present. In order to ensure stability within our realm we should expand the rights of the different confessions and secure their loyalty." #OLD ENG
 #dlh_revive_the_tughlaq_architecture: "Rivitalizzare  l'Architettura Tughlaq" #OLD ITA
 dlh_revive_the_tughlaq_architecture: "Tughlaq Architectural Revival" #NEW
 #dlh_revive_the_tughlaq_architecture: "Revive the Tughlaq Architecture" #OLD ENG
 #dlh_revive_the_tughlaq_architecture_desc: "Durante l'apice della dinastia Tughlaq e il periodo di stabilità del nostro Stato, grandi architetti e artisti di grande visione costruirono moschee e tombe nell'esclusivo stile Tughlaq. Con il passare dei decenni e con la sfida del nostro potere a causa di problemi interni, le risorse per mantenere questa architettura si sono affievolite. È giunto il momento di farla rivivere e di ristabilire $DLH$ come impero dell'arte e delle meraviglie." #OLD ITA
 dlh_revive_the_tughlaq_architecture_desc: "During the height of the $tughlaq$ dynasty and the most stable period of our state, great architects and artists of grand vision constructed mosques and tombs in the unique Tughlaq style. As the decades went on and our power was challenged by internal issues, the resources for maintaining this architecture faded. It is time to revive it, and re-establish $DLH$ as an empire of art and wonders." #NEW
 #dlh_revive_the_tughlaq_architecture_desc: "During the height of the Tughlaq dynasty and the stable period of our state, great architects and artists of grand vision constructed mosques and tombs in the unique Tughlaq style. As the decades went on and our power was challenged by internal issues, the resources for maintaining this architecture faded. It is time to revive it, and re-establish $DLH$ as the empire of art and wonders." #OLD ENG
 dlh_throne_of_india: "Trono Indiano"
 dlh_throne_of_india_desc: "Per secoli, ogni grande impero indiano è stato governato da $delhi$. È la sede dei conquistatori e il nostro diritto di nascita. Tutti devono sapere che $delhi$ è di nuovo la patria del legittimo sovrano di tutti $india$!"
 dlh_hindustani_identity: "$HIN_ADJ$ Identità"
 #dlh_hindustani_identity_desc: "Le idee straniere di nazionalismo e identità culturale hanno raggiunto il subcontinente indiano. Mentre la diversità culturale di $india$ rimarrà scontata, è chiaro che la geografia del subcontinente e i valori di $muslim$ danno a tutti noi un senso di unità sotto forma di identità $HIN_ADJ$." #OLD ITA
 dlh_hindustani_identity_desc: "Foreign ideas of nationalism and cultural identity have reached $india$. While the cultural diversity of $india$ will remain high, it is clear that our geography, as well as the values of $muslim$, give us all a sense of unity in the form of a $HIN_ADJ$ identity." #NEW
 #dlh_hindustani_identity_desc: "Foreign ideas of nationalism and cultural identities have reached the Indian subcontinent. While the cultural diversity of $india$ will remain as granted, it is clear that the geography of the subcontinent as well as the values of $muslim$ give us all a sense of unity in the form of a $HIN_ADJ$ identity." #OLD ENG

 vij_city_of_victory: "Città di Vittoria"
 #vij_city_of_victory_desc: "Vijayanagar - la #italic Città della Vittoria#! - è il cuore del nostro Stato e un giorno diventerà il cuore dell'impero $hindu_ADJ$ di $india$ che respinge gli invasori $muslim_ADJ$. Che sia il faro della nostra cultura e delle nostre tradizioni!" #OLD ITA
 vij_city_of_victory_desc: "$vijayanagar$ — the 'City of Victory' — is the heart of our state, and will one day become the heart of the entire $hindu_ADJ$. Let it shine as a beacon of culture and tradition even as it fends off the $muslim_ADJ$ invaders!" #NEW
 #vij_city_of_victory_desc: "Vijayanagar — the #italic City of Victory#! — is the heart of our state, and will become one day the heart of the $hindu_ADJ$ empire of $india$ which fends off the $muslim_ADJ$ invaders. Let it be the beacon of our culture and traditions!" #OLD ENG
 vij_an_army_for_city_of_victory: "Un Esercito per la Città della Vittoria"
 #vij_an_army_for_city_of_victory_desc: "Affinché la Città della Vittoria sia degna del suo nome, dobbiamo assicurarci di avere un esercito che ci porti vittorie. Facciamo in modo che le nostre truppe siano addestrate e siano orgogliose del loro ruolo." #OLD ITA
 vij_an_army_for_city_of_victory_desc: "For the City of Victory to be worthy of its name, we must have an army that can bring about these namesake triumphs. We will ensure our troops are well-trained and take great pride in their service." #NEW
 #vij_an_army_for_city_of_victory_desc: "For the City of Victory to be worthy of its name we must ensure we have an army that brings us victories. Let us ensure our troops are trained and take pride in their role." #OLD ENG
 #vij_arab_horses: "Cavalli Arabi" #OLD ITA
 vij_arab_horses: "Arabian Horses" #NEW
 #vij_arab_horses: "Arab Horses" #OLD ENG
 #vij_arab_horses_desc: "I cavalli della Penisola Arabica sono di gran lunga superiori alle razze locali. Utilizzeremo i nostri legami commerciali per assicurarci una fornitura costante di questi cavalli per le nostre truppe." #OLD ITA
 vij_arab_horses_desc: "Horses from $arabia_region$ are far superior to our local breeds. We will use our trade connections to ensure that we have a steady supply for our military." #NEW
 #vij_arab_horses_desc: "The horses from the Arabian Peninsula are far superior to the local breeds. We will use our trade connections to ensure that we have a steady supply of these horses for our troops." #OLD ENG
 vij_first_indian_artillery: "Prima Artiglieria Indiana"
 #vij_first_indian_artillery_desc: "L'uso della polvere da sparo in campo militare non è ancora diffuso, ma mostra un grande potenziale per plasmare il futuro della guerra. Dobbiamo esplorare l'utilità e il potere della polvere da sparo." #OLD ITA
 vij_first_indian_artillery_desc: "The military application of gunpowder is not yet widespread, but it has the potential to mold the future of warfare. We must explore the utility and benefits of gunpowder." #NEW
 #vij_first_indian_artillery_desc: "The usage of gunpowder on the military field is not widespread yet, but it shows great potential to mold the future of warfare. We must explore the utility and power of gunpowder." #OLD ENG
 vij_the_bunds: "I Bund"
 #vij_the_bunds_desc: "La nostra società si basa sull'agricoltura nell'area piuttosto arida di $karnakassala_area$. I #italic fasci#! (chiamati anche #italic anecut#!) forniscono alle nostre città e ai nostri campi l'acqua tanto necessaria." #OLD ITA
 vij_the_bunds_desc: "Our society is built on agriculture in the rather arid $karnakassala_area$ area. The #italic bunds#!, also called #italic anecut#!, provide our cities and fields alike with much-needed fresh water." #NEW
 #vij_the_bunds_desc: "Our society is built on agriculture in the rather arid $karnakassala_area$ area. The #italic bunds#! (also called #italic anecut#!) provide our cities and fields alike with the much-needed water." #OLD ENG
 vij_adroit_diplomacy: "Diplomazia Abile"
 #vij_adroit_diplomacy_desc: "I numerosi invasori del nostro popolo $hindu_ADJ$ hanno mostrato più volte la stessa debolezza, la tendenza a combattere tra di loro. Dobbiamo essere sempre pronti a sfruttarla per i nostri scopi." #OLD ITA
 vij_adroit_diplomacy_desc: "The numerous invaders of our $hindu_ADJ$ people have shown time and time again the same weakness: the tendency to fight amongst themselves. We must be ready at all times to exploit this to our own ends." #NEW
 #vij_adroit_diplomacy_desc: "The numerous invaders of our $hindu_ADJ$ people have displayed time and time again the same weakness, the tendency to fight amongst themselves. We must be ready at all times to exploit this to our own ends." #OLD ENG
 vij_promotion_of_trade: "Promozione del Commercio"
 #vij_promotion_of_trade_desc: "Le nostre terre si trovano su una delle rotte commerciali chiave da Est a Ovest. Dobbiamo assicurarci che le nostre aree portuali siano sicure e protette, in modo che i capitani in visita si fermino nelle nostre terre, e quindi possiamo tassarli." #OLD ITA
 vij_promotion_of_trade_desc: "Our territory is situated on one of the key trade routes from East to West. We must ensure that our ports are safe and secure so that visiting captains will land there... giving us the opportunity to tax them." #NEW
 #vij_promotion_of_trade_desc: "Our lands sit on one of the key trade routes from East to West. We must ensure that our port areas are safe and secure so that visiting captains will stop in our lands, and thus we can tax them." #OLD ENG
 vij_carnatic_music: "Musica Carnatica"
 #vij_carnatic_music_desc: "Dobbiamo resistere all'invasione di $muslim_ADJ$ su tutti i fronti. Le tradizioni musicali degli Stati del Nord stanno già mostrando segni di influenze straniere. Questa è una blasfemia, perché tutti sappiamo che la musica è una forma d'arte divina che ha avuto origine con i Deva e i Devis stessi. Mostreremo alle persone di $hindu_ADJ$ che le difendono." #OLD ITA
 vij_carnatic_music_desc: "We must resist the $muslim_ADJ$ invasion on all fronts. The musical traditions of the Northern States are already showing signs of foreign influence. This is blasphemy, because we all know that music is a divine art form that originated with the Devas and Devis themselves. We will show the $hindu_ADJ$ people that we are committed to defending this holy art form." #NEW
 #vij_carnatic_music_desc: "We must resist the $muslim_ADJ$ invasion on all fronts. The musical traditions of the Northern States are already showing signs of foreign influences. This is blasphemy because we all know that music is a divine art form that originated with the Devas and Devis themselves. We will show the $hindu_ADJ$ People who defend them." #OLD ENG
 vij_cultural_integration: "Integrazione Culturale"
 #vij_cultural_integration_desc: "La diversità culturale del subcontinente indiano è evidente. Permettendo agli abitanti locali di governare secondo le loro usanze, possiamo assicurare la loro lealtà e la loro integrazione nella nostra società." #OLD ITA
 vij_cultural_integration_desc: "The cultural diversity of $india$ is one of our defining traits. By allowing our various settlements to rule by their own customs, we will assure their loyalty and integration into our society." #NEW
 #vij_cultural_integration_desc: "The cultural diversity of the Indian subcontinent is self-evident. By allowing the local inhabitants to rule by their own customs we can assure their loyalty and integration into our society." #OLD ENG
 #vij_rule_in_accord_with_dharma: "Regola in accordo con il Dharma" #OLD ITA
 vij_rule_in_accord_with_dharma: "Rule According to Dharma" #NEW
 #vij_rule_in_accord_with_dharma: "Rule in accord with Dharma" #OLD ENG
 #vij_rule_in_accord_with_dharma_desc: "Il Dharma è un pilastro importante dei nostri valori religiosi e sociali. Il nostro Stato può essere giusto e virtuoso solo se i nostri governanti stessi incarnano e vivono in accordo con il Dharma." #OLD ITA
 vij_rule_in_accord_with_dharma_desc: "#Italic Dharma#! is a major pillar of our religious and social values. Our state can only be just and virtuous if our rulers themselves embody and live in accord with dharma." #NEW
 #vij_rule_in_accord_with_dharma_desc: "Dharma is a major pillar of our religious and societal values. Our state can only be just and virtuous if our rulers themselves embody and live in accord with Dharma." #OLD ENG
 vij_harsh_penal_code: "Codice Penale Severo"
 #vij_harsh_penal_code_desc: "Il governante mantiene la legge uccidendo. Stabiliamo un nuovo codice penale severo e, soprattutto, assicuriamoci che venga applicato, in modo che il nostro popolo possa sentirsi al sicuro all'interno del nostro Paese." #OLD ITA
 vij_harsh_penal_code_desc: "Harsh punishments — including being put to death — are how we uphold law and order in this society. By establishing and strictly enforcing a harsh penal code, we ensure criminals fear the consequences of their actions, creating stability through the certainty of punishment." #NEW
 #vij_harsh_penal_code_desc: "The ruler maintains the law by killing. Let us establish a new harsh penal code and more importantly make sure it is enforced so that our people can feel safe inside our country." #OLD ENG
 vij_decentralized_rule: "Regola Decentralizzata"
 #vij_decentralized_rule_desc: "Con la crescita dello Stato, aumentano anche gli oneri amministrativi per il governo e i rischi potenziali di rivolte. Per contrastare questo fenomeno, è necessaria una regola decentralizzata in cui i locali possano gestire le questioni minori per conto proprio, mentre solo i problemi più importanti raggiungono la corte per essere gestiti." #OLD ITA
 vij_decentralized_rule_desc: "As our state grows, so do our administrative burdens on the government and the risk of revolt. To counteract this, we shall establish a system of decentralized rule, where settlements can manage their own minor issues, only seeking intervention from the central court for severe matters." #NEW
 #vij_decentralized_rule_desc: "As the state grows, so do the administrative burdens on the government and the potential risks of revolts. To counteract this, a decentralized rule is necessary where the locals can manage the minor issues of their own while only the significant problems reach the court to be managed." #OLD ENG
 vij_indian_throne: "Trono Indiano"
 #vij_indian_throne_desc: "$india$ è stata soggetta alle minacce di $muslim_ADJ$ per troppo tempo. Gli imperi pagani rivendicano il loro dominio da $delhi$ nel nord, ma il loro credo e il loro governo sono in diretta opposizione a ciò che gli Indiani desiderano veramente. No, è necessario stabilire una nuova sede di potere - e $vijayanagar$ sarà il nuovo Trono di $india$!" #OLD ITA
 vij_indian_throne_desc: "$india$ has been subject to $muslim_ADJ$ threats for far too long. Heathen empires claim their rule from $delhi$ in the north, yet their beliefs and government are in direct opposition to what our people want. No, a new seat of power must be established — and $vijayanagar$ shall be the new Throne of $india$!" #NEW
 #vij_indian_throne_desc: "$india$ has been subject to the $muslim_ADJ$ threats for far too long. Heathen empires claim their rule from $delhi$ in the north, yet their belief and government are in direct opposition to what the Indians really wish. No, a new seat of power must be established — and $vijayanagar$ shall be the new Throne of $india$!" #OLD ENG
 #pandya advances
 tnk_legitimate_rule: "Radici Antiche"
 #tnk_legitimate_rule_desc: "I nostri antenati hanno governato le terre di $tamil_land_area$ per secoli. In questi tempi dominati da invasori stranieri, dovremmo fare affidamento sui nostri antichi legami con la terra per giustificare il nostro dominio." #OLD ITA
 tnk_legitimate_rule_desc: "Our ancestors ruled the lands of $tamil_land_area$ for centuries. In these times when we are dominated by foreign invaders, we should rely on our ancient connections to this land to justify our rule." #NEW
 #tnk_legitimate_rule_desc: "Our ancestors have ruled the lands of $tamil_land_area$ for centuries. In these times dominated by foreign invaders, we should rely on our ancient connections to the land to justify our rule." #OLD ENG
 tnk_resist_invaders: "Resistenza Esperta"
 #tnk_resist_invaders_desc: "La nostra storia travagliata riporta sia vittorie che sconfitte quasi schiaccianti. Se vogliamo resistere e dominare ancora una volta come dinastia, dobbiamo utilizzare i terreni accidentati per ritardare e bloccare gli eserciti ostili fino a quando non possiamo opporre una resistenza diretta." #OLD ITA
 tnk_resist_invaders_desc: "Our troubled history records both victories and crushing defeats. If we want to endure and dominate as a significant power once more, we must develop a thorough understanding of how to best utilize our native terrain to delay and stall hostile armies until we can mount a direct resistance." #NEW
 #tnk_resist_invaders_desc: "Our troubled history tracks both victories and nearly crushing defeats. If we want to endure and dominate as a dynasty once more, we need to utilize rough terrain to delay and stall hostile armies until we can mount a direct resistance." #OLD ENG
 #tnk_pearls_of_india: "Competenza nella Pesca delle Perle" #OLD ITA
 tnk_pearls_of_india: "Pearl-Diving Expertise" #NEW
 #tnk_pearls_of_india: "Expertise in Pearl Diving" #OLD ENG
 #tnk_pearls_of_india_desc: "Gli abitanti della nostra terra hanno sviluppato un'eccezionale abilità nell'immersione e nella raccolta di perle al largo della nostra costa. Se da un lato questo ci garantisce un chiaro vantaggio economico, dall'altro la loro naturale affinità con le acque faciliterà la loro formazione come marinai, garantendoci un vantaggio militare contro i nostri nemici." #OLD ITA
 tnk_pearls_of_india_desc: "Our people have developed an outstanding skill for diving for and harvesting pearls along our coasts. While this has clear economic benefits, the natural affinity our people have for water makes them excellent and easily-trained sailors, granting us an edge against our seafaring foes." #NEW
 #tnk_pearls_of_india_desc: "The people of our land developed an outstanding skill for diving and harvesting pearls off our coastline. While this grants us a clear economic benefit, their natural affinity for the waters will also ease their training as sailors, granting us a military edge against our foes." #OLD ENG
 tnk_expertise_in_conflicts: "Temprato dalla Guerra"
 #tnk_expertise_in_conflicts_desc: "Nel corso della nostra storia turbolenta, non abbiamo mai vacillato di fronte al conflitto e alle probabilità insormontabili. Dobbiamo sfruttare questo aspetto e instillare nel nostro popolo un senso di fervore per combattere per la stabilità del regno." #OLD ITA
 tnk_expertise_in_conflicts_desc: "Throughout our turbulent history, we never wavered in the face of conflict and insurmountable odds. We need to weaponize this determination, and use it to instill a sense of fervor into our people that will inspire them to fight harder than ever." #NEW
 #tnk_expertise_in_conflicts_desc: "Throughout our turbulent history, we never wavered in the face of conflict and insurmountable odds. We need to utilize this and instill a sense of fervor into our people to fight for the stability of the realm." #OLD ENG
 tnk_imperial_legacy: "Eredità Imperiale Pandyan"
 #tnk_imperial_legacy_desc: "Le terre del sud di $india$ hanno sopportato a lungo le sofferenze di invasori stranieri e signori della guerra emergenti, che volevano stabilire il proprio dominio. Dobbiamo sfruttare la nostra posizione unica di antica dinastia e rivendicare le terre e riportare la stabilità e la pace nelle terre che ci spettano." #OLD ITA
 tnk_imperial_legacy_desc: "The lands of southern $india$ have long endured the incursions of foreign invaders and upstart warlords looking to establish their own domains. We must use the grand history of our ancient dynasty to lay claim to this land, as only we can bring stability and peace back to our rightful territory." #NEW
 #tnk_imperial_legacy_desc: "The lands of southern $india$ have long endured suffering under foreign invaders and upstart warlords, who would establish their own domain. We need to utilize our unique position as an ancient dynasty and lay claim to the lands and bring stability and peace back to our rightful lands." #OLD ENG

