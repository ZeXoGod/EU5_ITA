 northern_center_of_arts: "Centro delle Arti del Nord"
 northern_center_of_arts_desc: "Il $novgorod$ è un importante centro culturale dell'$europe$. Si narrano storie epiche sulla nostra popolazione colta e intellettuale, sulla complessa arte religiosa e sulla grandiosa architettura, che aumentano il prestigio della nostra fiorente città e dell'intera nazione."

 city_of_churches: "Città delle Chiese"
 city_of_churches_desc: "Ci sono oltre ottanta chiese ortodosse in $novgorod$, alcune delle quali sono i maggiori proprietari terrieri del principato. La loro ricchezza e il loro prestigio religioso consentono alla Chiesa di influenzare in modo significativo la popolazione in molte aree e, di conseguenza, i nostri cittadini sono più devoti, in senso positivo."

 novgorodian_fur_trade: "Commercio di Pellicce di Novgorod"
 novgorodian_fur_trade_desc: "$fur$, l'oro setoso della $RUS$! Mentre altri Stati traggono la loro ricchezza dal commercio di $goods_gold$ e altri metalli rari, la nostra fonte di reddito proviene dall'alta qualità del $fur$ che la madrepatria ci fornisce."

 grand_dukes_army: "Esercito del Granduca"
 grand_dukes_army_desc: "Guidare le truppe è il compito più importante del Granduca, che è stato nominato per governare la Repubblica di Veche. Sotto una leadership così forte ed esperta, i nostri eserciti diventeranno molto più letali in battaglia."

 ushkuiniks: "Gli Ushkuyniks"
 ushkuiniks_desc: "I pirati #italic Ushkuynik#!, simili ai vichinghi, erano un tempo uno strumento utile per reprimere i nostri concorrenti. Purtroppo, siamo stati costretti a smettere di usarli a causa dell'intervento straniero, principalmente da parte di Mosca. Dovremmo ricominciare a finanziarli e inviare questi pirati a saccheggiare coste più lontane: questo mostrerà a tutti chi sono i veri padroni del Nord!"

 baltic_shipyard: "Cantiere Navale Baltico"
 baltic_shipyard_desc: "Costruiremo un grande cantiere navale sulla costa orientale del Mar Baltico e domineremo il commercio d'oltremare!"

 veche_advance: "La Veche"
 veche_advance_desc: "Il $veche_advance$ è un'assemblea popolare che affonda le sue origini negli antichi consigli tribali, esistenti già molto prima dell'epoca dei Rus'. È la massima autorità giudiziaria e legislativa dello Stato."

 birch_bark_manuscript: "Manoscritti su Corteccia di Betulla"
 birch_bark_manuscript_desc: "La scrittura e la lettura sono pilastri fondamentali della nostra società. I testi religiosi, così come i dettagli della nostra storia, devono essere trascritti affinché le generazioni future possano conoscere le nostre conquiste culturali. In questa nazione abbiamo una grande abbondanza di betulle e la loro corteccia bianca e cartacea diventerà la nostra pergamena."

 novgorod_first_chronicle: "Prima Cronaca di $NOV$"
 novgorod_first_chronicle_desc: "La #italic Prima Cronaca di Novgorod#! descrive in dettaglio la storia del nostro Paese, dai tempi del leggendario capo varangiano Rurik fino ai giorni nostri. È un patrimonio culturale che viene tramandato con orgoglio di generazione in generazione."

 defenses_of_novgorod: "Difese di $NOV$"
 defenses_of_novgorod_desc: "La Repubblica di $NOV$ è bersaglio di molte minacce esterne. Ma che si tratti degli eretici occidentali del $scandinavia_region$, dei tedeschi scatenati a sud-ovest o persino delle altre potenze russe a sud, tutti crolleranno ai piedi delle nostre fortificazioni inespugnabili."

 reforms_of_the_posadnichestvo: "Riforme del Posadnichestvo"
 reforms_of_the_posadnichestvo_desc: "Il #italic Posadnik#! è la più alta carica amministrativa nelle nostre città ed è un ruolo più significativo di quello di un sindaco. Man mano che la loro città cresce, crescono anche le responsabilità, l'influenza e il numero dei Posadnik nell'amministrazione."

 cork_stoppers: "Tappi di Sughero"
 cork_stoppers_desc: "Gli sviluppi nella produzione di bottiglie hanno permesso ai produttori di vino di creare bottiglie di dimensioni standardizzate e, di conseguenza, hanno potuto reintrodurre l'uso dei tappi di sughero. Si tratta di un metodo molto più efficiente per sigillare il vino rispetto ai tappi di stoffa e significa che ora può essere trasportato molto più lontano di quanto fosse possibile in precedenza. Forse stiamo assistendo alla nascita di un commercio mondiale del $wine$..."

 colonial_policy_advance: "Politica Coloniale"
 colonial_policy_advance_desc: "Le nuove terre e i territori di frontiera che il nostro popolo sta colonizzando richiedono nuove forme di gestione e organizzazione."

 native_policy_advance: "Politica sui Nativi"
 native_policy_advance_desc: "Le nuove terre scoperte dai nostri audaci esploratori sono solitamente abitate da popoli che troviamo strani e primitivi. È giunto il momento di creare una politica ufficiale per regolamentare gli incontri tra le nostre forze di spedizione e gli indigeni delle terre che esplorano."

 slave_raid_advance: "Incursioni Costiere"
 slave_raid_advance_desc: "Il nostro Paese ha una lunga tradizione di incursioni lungo le coste alla ricerca di schiavi, denaro e tutte le altre cose necessarie alla vita."

 crown_power_advance_discovery: "Arte di Governare"
 crown_power_advance_discovery_desc: "Man mano che l'autorità del nostro sovrano diventa il potere dominante nel nostro dominio, emerge la necessità di una struttura governativa completa e di un adeguato corpus burocratico per gestirla."

 crown_power_advance_reformation: ""Cuius Regio, Eius Religio""
 crown_power_advance_reformation_desc: "Sebbene il nostro sovrano abbia una salda presa sulle questioni mondane, sta diventando necessario che assuma anche il controllo delle questioni celesti. La Chiesa e lo Stato devono diventare una cosa sola."

 crown_power_advance_absolutism: "Assolutismo"
 crown_power_advance_absolutism_desc: "Ora che le questioni terrene e divine sono entrambe sotto l'autorità del nostro sovrano, poche cose sfuggono al suo controllo. Il dominio assoluto ora regna sovrano nel nostro dominio."

 crown_power_advance_revolutions: "Nazione"
 crown_power_advance_revolutions_desc: "Dopo aver unificato tutti i poteri sotto il pugno di ferro del nostro leader, i sudditi di tutta la nazione hanno improvvisamente acquisito un senso di appartenenza. Qualunque sia la regione governata dai nostri monarchi, essi fanno parte della nazione e del suo popolo allo stesso modo."

 sergeants_at_arms_advance: "Sergenti d'Armi"
 sergeants_at_arms_advance_desc: "Piccolo gruppo di fedeli servitori che proteggono e servono il monarca, i Sergenti d'Armi hanno un rango appena inferiore a quello dei cavalieri. Servono il monarca non solo come guardie del corpo, ma anche riscuotendo prestiti, reclutando uomini e navi e fungendo da forza di polizia."

 alberghi_28_advance: "$alberghi_28$"
 alberghi_28_advance_desc: "$alberghi_28_desc$"

 genoese_banking_traditions: "Tradizioni Bancarie Genovesi"
 genoese_banking_traditions_desc: "L'ascesa della $GEN$ come principale centro commerciale dell'$ITA$ medievale portò allo sviluppo precoce di nuove forme di credito e di alcune delle prime istituzioni bancarie al mondo."

 genoese_maritime_diplomacy: "Diplomazia Marittima Genovese"
 genoese_maritime_diplomacy_desc: "Quando la città della $GEN$ divenne una repubblica incentrata sul servizio degli interessi della sua classe mercantile, sviluppò una forte influenza all'estero e strinse numerosi accordi con alleati e clienti in tutto il Mediterraneo."

 bank_of_saint_george: "Banca di San Giorgio"
 bank_of_saint_george_desc: "La Banca di San Giorgio è un istituto finanziario fondato per consolidare tutti i debiti della $GEN$, con l'obiettivo di diventare il braccio creditizio del paese e finanziare le sue imprese all'estero."

 the_age_of_the_genoese: "L'Età Genovese"
 the_age_of_the_genoese_desc: "Lo sviluppo finanziario di $GEN$ negli ultimi decenni ha portato i banchieri genovesi a diventare tra i più ricercati, stimolando lo splendore del nostro Paese diventando mecenati di artisti rinomati per le loro ville e i loro palazzi."

 hospital_advance: "Ospedali"
 hospital_advance_desc: "Gli ospedali furono istituiti per la prima volta durante il Medioevo per fornire assistenza ai malati, ai poveri e ai disabili. Gestiti tipicamente da ordini religiosi, questi ospedali offrivano una serie di servizi medici, tra cui assistenza infermieristica di base, rimedi erboristici e, in seguito, chirurgia. Spesso erano situati vicino a chiese o monasteri e avevano reparti separati per uomini e donne. Nonostante le limitate conoscenze mediche, questi ospedali svolsero un ruolo fondamentale nell'offrire rifugio, conforto e qualche forma di cura medica a chi ne aveva bisogno in un periodo storico difficile."

 banking_country_traditions: "Tradizioni Bancarie"
 banking_country_traditions_desc: "Mentre molti cercano la ricchezza nelle opportunità offerte dal commercio, il nostro Stato riempie le proprie casse offrendo prestiti assolutamente equi e altamente accessibili."

 genoese_crossbowmen: "$a_genoese_crossbowmen$"
 genoese_crossbowmen_desc: "$a_genoese_crossbowmen_desc$"

 genoese_galley: "$n_genoese_galley$"
 genoese_galley_desc: "$n_genoese_galley_desc$"

 italian_galleass: "$n_italian_galleass$"
 italian_galleass_desc: "$n_italian_galleass_desc$"

 genoese_flexibility: "Flessibilità Genovese"
 genoese_flexibility_desc: "La nostra marina militare può servire a molteplici scopi invece di essere solo un'arma da guerra. Grazie alle nostre conoscenze ed esperienze, possiamo trasformare le nostre galee da guerra in galee mercantili - e viceversa, se necessario - in pochissimo tempo."

 genoese_school: "Scuola Genovese"
 genoese_school_desc: "La pittura, e le arti visive in generale, hanno prosperato in $ITA$ sin dai tempi del $renaissance$. Non sorprende quindi che uno Stato ricco e stimato come $GEN$ abbia aperto una propria Scuola d'Arte Genovese."

 government_size_renaissance: "Gabinetto Permanente"
 government_size_renaissance_desc: "Tradizionalmente, i sovrani avevano un consiglio di consiglieri che li assisteva nelle decisioni importanti. Nel corso del tempo, il nostro governo è diventato così complesso che abbiamo bisogno di istituire cariche consultive più permanenti che ci aiutino a gestire la governance quotidiana."

 renaissance_court: "Corte del $renaissance$"
 renaissance_court_desc: "Il $renaissance$ si è diffuso in lungo e in largo e, di conseguenza, la nostra corte sta attirando artisti e studiosi dedicati, creando le opere più splendide mai realizzate."

 rgo_size_advance_renaissance: "Mulini"
 rgo_size_advance_renaissance_desc: "I mulini sono utilizzati fin dall'antichità. Tuttavia, ora siamo in grado di sviluppare mulini a vento e ad acqua più moderni ed efficienti, che a loro volta migliorano la nostra produzione."

 food_advance_renaissance: "Agricoltura Intensiva"
 food_advance_renaissance_desc: "L'agricoltura è il fondamento della maggior parte delle società. I recenti progressi hanno migliorato la produttività dei nostri campi e delle nostre fattorie, creando preziose eccedenze alimentari."

 crown_power_advance_renaissance: "Sovranità"
 crown_power_advance_renaissance_desc: "Il governo tradizionale richiedeva ai sovrani di negoziare con i ceti sociali e di bilanciare i poteri in competizione tra loro. Le moderne teorie di governo, tuttavia, stabiliscono il sovrano come autorità suprema all'interno del regno, al di sopra di tutte le altre istituzioni, ceti sociali e sudditi, senza sottostare ad alcun potere terreno."

 global_supply_limit_modifier_advance_2: "Linee di Fornitura"
 global_supply_limit_modifier_advance_2_desc: "La guerra terrestre sta diventando sempre più dipendente dall'approvvigionamento di eserciti sempre più grandi. Pertanto, una migliore organizzazione dei nostri carri di rifornimento porterebbe ad un aumento della capacità operativa."

 naval_morale_advance_1: "Navigazione Medievale"
 naval_morale_advance_1_desc: "I progressi compiuti nel campo della navigazione a vela negli ultimi decenni hanno aumentato la competenza e la sicurezza dei nostri velisti, consentendo loro di navigare con sicurezza nelle acque costiere."

 slave_trade_act_advance: "Legge sulla Tratta degli Schiavi"
 slave_trade_act_advance_desc: "Il flusso di lavoratori da e verso le nostre colonie è una questione redditizia e delicata. Pertanto, dobbiamo investire nei nostri tentativi legislativi per perfezionarlo."

 order_headquarters_advance: "$order_headquarters$"
 order_headquarters_advance_desc: "L'istituzione di ordini fedeli aumenterà senza dubbio le nostre capacità difensive locali e renderà più facile reclutare combattenti abili."

 LIV_crusader_forts: "Forti Crociati Baltici"
 LIV_crusader_forts_desc: "Le numerose fortificazioni presenti nei nostri territori devono la loro costruzione e il loro finanziamento alle nostre numerose bande di crociati. Circondate da robuste mura, queste fortificazioni serviranno e proteggeranno il nostro popolo per molti anni a venire!"

 scholasticism: "Scolasticismo Classico"
 scholasticism_desc: "Basato sulla logica aristotelica e sugli scritti dei primi Padri cristiani, lo scolasticismo mira a diffondere la conoscenza enfatizzando le credenze dogmatiche religiose e le tradizioni."

 organized_religion: "Religione Organizzata"
 organized_religion_desc: "La religione svolge un ruolo fondamentale in ogni società, ma non tutte le fedi hanno la stessa struttura. Una religione organizzata ha rituali e sistemi di credenze sistematicamente organizzati e segue dottrine definite."

 guilds: "Gilde"
 guilds_desc: "Una gilda è un'associazione di mercanti o artigiani che si sono riuniti per proteggersi e aiutarsi a vicenda e per perseguire i propri interessi. Le gilde stabiliscono monopoli sui propri beni e sul proprio commercio e fissano standard di qualità e prezzo per i beni commerciali."

 colonial_tradition: "Tradizioni Coloniali"
 colonial_tradition_desc: "Il nostro Stato è stato formato e plasmato dalle ambizioni dei "padri fondatori", i primi coloni giunti dal vecchio continente. Molti dei costumi e delle tradizioni che hanno portato con sé hanno influenzato la nostra società in questo mondo nuovo e sconosciuto."

 colonial_heritage: "Patrimonio Coloniale"
 colonial_heritage_desc: "In quanto colonia, portiamo con noi l'eredità delle ambizioni imperiali della nostra madrepatria."

 colonial_ambition: "Ambizione Coloniale"
 colonial_ambition_desc: "Molti dei nostri popoli si sono stabiliti nel Nuovo Mondo per iniziare una nuova vita; per scoprire le meraviglie oltre il mare e fare di un continente selvaggio la loro casa. La loro ambizione è la nostra, mentre ci spingiamo sempre più verso l'ignoto."

 power_projection_advance_1: "Ambizioni Imperiali"
 power_projection_advance_1_desc: "Con la crescita dei paesi e il consolidamento degli stati durante l'Alto Medioevo, anche le loro ambizioni crebbero, portando a tentativi di creare e ricreare imperi nelle loro regioni."

 trade_advance_age_of_trad: "Fiere Commerciali"
 trade_advance_age_of_trad_desc: "Con la rinascita e l'espansione delle rotte commerciali durante il Medioevo, cominciarono ad apparire nuove pratiche mercantili. Una di queste erano le fiere commerciali, grandi eventi che si tenevano ogni anno nelle città e nei paesi, dove mercanti e commercianti provenienti da luoghi diversi potevano incontrarsi e concludere affari."

 colonial_assembly: "Assemblea Coloniale"
 colonial_assembly_desc: "Gran parte del potere legislativo in materia di tasse e spesa pubblica è stato trasferito alle amministrazioni coloniali."

 founding_fathers: "Padri Fondatori"
 founding_fathers_desc: "Si riferisce a tutti i politici, soldati, diplomatici e altri personaggi che hanno svolto un ruolo influente nella fondazione della loro nazione, conquistando l'indipendenza del loro paese e creando un nuovo sistema di governo."

 colonial_militia: "Milizia Coloniale"
 colonial_militia_desc: "In assenza di guarnigioni regolari, le milizie coloniali hanno svolto un ruolo importante nei conflitti locali e nelle incursioni di confine contro le tribù native e altre colonie. Erano tipicamente composte da cittadini maschi adulti che di solito dovevano fornire le proprie armi e attrezzature."

 new_frontiers: "Nuove Frontiere"
 new_frontiers_desc: "Il movimento di spingere la frontiera coloniale sempre più verso l'interno del Nuovo Mondo, stabilendo qualsiasi cosa, da piccole stazioni commerciali a insediamenti completi con grandi aree coltivate."

 continental_trade: "Commercio Continentale"
 continental_trade_desc: "Sebbene le colonie del Nuovo Mondo dovessero importare molti prodotti manifatturieri, divennero anche un importante fornitore di materie prime per i mercati dell'$europe$."

 manufacturing_center: "Centro Manifatturiero Imperiale"
 manufacturing_center_desc: "I nostri cittadini sono la base di potere dell'impero commerciale del nostro signore. Le merci straniere ci vengono consegnate e noi le trasformiamo in prodotti finiti."

 free_thinkers: "Pensatori Liberi"
 free_thinkers_desc: "La convinzione che ogni uomo abbia diritto sia alla libertà di pensiero che alla libertà di parola è ampiamente diffusa nelle nostre colonie. Senza questi diritti, non potrebbe esistere alcuna libertà civile."

 liberty_heroes: "Figli della Libertà"
 liberty_heroes_desc: "Molti leader delle guerre di indipendenza del Nuovo Mondo possedevano non solo le necessarie capacità militari, ma anche il carisma necessario per incoraggiare il morale, tenere unito l'esercito ed essere fonte di ispirazione per il popolo."

 beat_to_windward_advance: "Battuta a Windward!"
 beat_to_windward_advance_desc: "Le caravelle armate alla Lateen sono altamente manovrabili, consentendo loro di virare facilmente contro vento. Questo rende molto più veloce la navigazione in condizioni meteorologiche sfavorevoli e in mari ostili."

 route_to_the_indies_advance: "Rotta Verso le Indie"
 route_to_the_indies_advance_desc: "Il commercio con l'Estremo Oriente è essenziale per mantenere il nostro stile di vita. Tuttavia, la via terrestre è lenta e costosa. Se riuscissimo a trovare una rotta marittima, si aprirebbero molte opportunità commerciali per i nostri mercanti."

 educated_bureaucrats: "Burocrati Istruiti"
 educated_bureaucrats_desc: "I funzionari che gestiscono la nostra amministrazione non sono eredi analfabeti e pigri dei loro genitori, ma piuttosto individui istruiti e di talento che si sono guadagnati la loro posizione con l'impegno e il merito. Un'amministrazione come questa funzionerà senza dubbio in modo più fluido ed efficiente di qualsiasi altra."

 efficient_bureaucracy: "Burocrazia Efficiente"
 efficient_bureaucracy_desc: "La burocrazia è l'olio che fa girare senza intoppi gli ingranaggi della nostra amministrazione. Con la nomina di burocrati efficienti che hanno sia il talento che la volontà di svolgere correttamente i loro compiti, garantiremo il funzionamento senza intoppi delle nostre strutture governative."

 appointed_chain_of_command: "Catena di Comando Nominata"
 appointed_chain_of_command_desc: "Avere esperti militari di talento che guidano i nostri uomini in battaglia, piuttosto che affidare questo compito a nobili incapaci che sono stati messi in ruoli di comando solo per il loro sangue blu, rende i nostri eserciti più efficienti. Il risultato è che possiamo comandare più facilmente forze più grandi."

 abacus_advance: "Abaco"
 abacus_advance_desc: "Gli abachi possono essere una tecnologia antica, ma è proprio grazie a strumenti contabili e registri adeguati che siamo in grado di tenere una contabilità accurata della nostra ricchezza. Senza questi strumenti e senza esperti di talento che sappiano usarli, saremmo all'oscuro della reale ricchezza del nostro Paese."

 temporary_appointments: "Nomine Temporanee"
 temporary_appointments_desc: "Il fatto che i membri della nostra corte ricoprano una carica a vita comporta il rischio intrinseco che essi accumulino potere e influenza indebiti. Inoltre, tendono a dedicarsi meno ai loro compiti, a causa delle responsabilità eccessive che vengono loro assegnate. Per evitare questa confusione, possiamo istituire un sistema di incarichi temporanei. In questo modo, i funzionari vengono assegnati alle posizioni per cui sono più qualificati, ma possono essere riassegnati con facilità se diventano troppo compiacenti nei loro ruoli."

 non_inheritable_offices: "Cariche non Ereditarie"
 non_inheritable_offices_desc: "Il fatto che i nostri funzionari di corte trasmettano le loro cariche di padre in figlio è una piaga per il nostro sistema amministrativo! Non fa altro che causare apatia e marciume che affliggono ogni ramo della nostra autorità. d'ora in poi tutte le cariche dovrebbero essere assegnate a coloro che sono più in grado di svolgere i compiti richiesti, indipendentemente dal loro lignaggio."

 government_sanctioned_celebrations: "Celebrazioni Ufficiali del Governo"
 government_sanctioned_celebrations_desc: "Il nostro popolo è sempre desideroso di celebrare qualsiasi buona notizia, sia che si tratti di onorare il nostro Paese o di festeggiare giorni speciali del calendario. Invece di lasciare che siano loro stessi a organizzare questi gioiosi raduni, dovremmo incaricare la nostra amministrazione di organizzare grandi celebrazioni pubbliche, in modo da dimostrare al nostro popolo che teniamo a loro e allo stesso tempo promuovere un maggiore senso di unità tra loro."

 efficient_logistics: "Logistica Efficiente"
 efficient_logistics_desc: "La logistica e le comunicazioni sono ciò che ci permette di amministrare correttamente l'intero territorio. Per facilitare una migliore comunicazione tra i nostri governatori provinciali e il governo centrale, abbiamo bisogno di una rete stradale ben consolidata su cui possano viaggiare i nostri messaggeri."

 ledgers_double_checking: "Contabilità Meticolosa"
 ledgers_double_checking_desc: "La mancanza di rigore nella contabilità è ciò che permette alla corruzione di prosperare e marcisce i paesi dall'interno! Per evitare questa minaccia alla nostra amministrazione, dobbiamo garantire che qualsiasi cambiamento nel nostro tesoro sia meticolosamente contabilizzato."

 province_governors: "Governatori Provinciali"
 province_governors_desc: "Le nostre province non sono governate in modo autonomo, né da nobili locali assetati di potere. Sono invece i governatori nominati dalla nostra amministrazione centrale ad essere responsabili dell'estensione della nostra autorità in ogni insediamento del nostro paese."

 right_to_rule: "Diritto di Governare"
 right_to_rule_desc: "La nostra amministrazione si basa sul presupposto che le persone più talentuose debbano essere assegnate a incarichi adeguati. Pertanto, il sovrano dovrebbe essere il membro più dotato del regno, come si addice a chi guida un intero paese. Nel malaugurato caso in cui il sovrano fosse carente, avremo bisogno di persone abili nell'«abbellire» la verità per comunicare la straordinaria competenza del sovrano, sia attraverso statue imponenti, dipinti sorprendenti o versi esaltanti."

 talented_traders: "Mercanti di Talento"
 talented_traders_desc: "Proprio come affidiamo la nostra amministrazione a funzionari di talento, dobbiamo garantire che la nostra infrastruttura commerciale sia gestita da professionisti qualificati. Affidando la supervisione delle nostre operazioni commerciali solo alle menti più brillanti, potremo garantire la continuità dei flussi di prodotti e ricavi."

 smooth_administration: "Amministrazione Fluida"
 smooth_administration_desc: "Avere un'amministrazione composta dalle persone più talentuose e adatte del nostro regno aiuta il nostro paese a funzionare senza intoppi e la nostra autorità a fluire senza interruzioni, indipendentemente dalle circostanze in cui ci troviamo."

 ara_a_maritime_realm: "Un Regno Marittimo"
 ara_a_maritime_realm_desc: "Il nostro regno è saldamente fissato sulla vasta distesa del mare, con l'attenzione rivolta alle attività marittime. Con una visione strategica, sfrutta la potenza navale e il commercio marittimo per rafforzare la sua posizione ed espandere la sua influenza. La nostra attenzione al mare plasma le nostre politiche, promuovendo una cultura marinara che alimenta la prosperità della nazione."

 ara_desperta_ferro: "Desperta Ferro!"
 ara_desperta_ferro_desc: "#italic Desperta Ferro!#! — Risvegliati, ferro! — è il temibile grido di battaglia degli $a_almogavars$, che invoca la presenza del ferro in combattimento. È accompagnato da lance e dardi che colpiscono la selce per creare scintille. Tra gli altri gridi di guerra come #italic Aragó!#! e #italic Sant Jordi!#!, #italic Desperta Ferro!#! spicca come il più famoso e unico."

 ara_a_mediterranean_trade_power: "Una Potenza Commerciale del Mediterraneo"
 ara_a_mediterranean_trade_power_desc: "Il dolce abbraccio del Mar Mediterraneo accarezza le nostre coste, invitando il nostro popolo a intraprendere attività commerciali di generazione in generazione. I nostri vivaci centri commerciali e le nostre strategiche stazioni commerciali sparse in tutto il Mediterraneo svolgeranno un ruolo cruciale nella realizzazione della nostra ambizione di diventare una forza dominante nel commercio."

 ara_fleet_ordinances: "Ordinanze della Flotta"
 ara_fleet_ordinances_desc: "Nel vivace Mediterraneo si radunano flotte provenienti da tutto il mondo, rendendo necessario un sistema giuridico che affronti i crimini commessi in terra e in mare. #italic Ordinacions sobre lo fet de la mar#!, ovvero #italic Ordinanze su ciò che accade in mare#!, è uno dei primi codici di giustizia militare, creato per governare le flotte. Questa risposta unica all'era post-Peste Nera recluta membri dell'equipaggio, compresi criminali, provenienti da fuori dall'$ARA$, dando vita a un codice armonizzato formato da tradizioni diverse piuttosto che una semplice codificazione delle consuetudini navali esistenti."

 ara_valencian_golden_age: "L'Età dell'Oro Valenciana"
 ara_valencian_golden_age_desc: "Il regno in cui viviamo ha raggiunto vette letterarie ancora inaccessibili a molte nazioni vicine, grazie al notevole contributo di autori stimati come Joanot Martorell, Ausiàs March e Isabel de Villena. Le loro profonde opere letterarie hanno elevato la nostra cultura a livelli i senza pari, instillando un senso di orgoglio nel nostro popolo. Indubbiamente, la nostra nazione è un faro radioso di cultura, che brilla luminoso agli occhi di tutti."

 ara_remenca: "Remença"
 ara_remenca_desc: "Il sistema #italic Remença#!, peculiare della $CAT$, ha stretti equivalenti in altri territori della Corona, favorendo una spinta collettiva verso una maggiore produzione di materie prime. Attraverso questo quadro, le nostre terre registrano un aumento della ricchezza, accendendo il potenziale per un progresso sostanziale verso il raggiungimento dei nostri obiettivi. Armonizzando questi sistemi, coltiveremo un ambiente in cui i nostri sforzi saranno rafforzati dall'abbondanza di risorse, alimentando un percorso di crescita e prosperità per il nostro regno."

 ara_chartered_merchant_companies: "Società Commerciali Noleggiate"
 ara_chartered_merchant_companies_desc: "I nostri commercianti stanno sprecando risorse competendo tra loro. È assurdo; dovremmo invece concentrare tutti i nostri sforzi sul sottrarre il commercio agli altri! Istituamo delle compagnie a cui saranno concessi monopoli temporanei sul commercio di determinate regioni e il cui rinnovo dipenderà dal versamento alla Corona di quanto le è dovuto."

 ara_stronger_united: "L'Unione fa la Forza"
 ara_stronger_united_desc: "Dalla fusione tra noi e la contea di Barcellona nel 1164, l'$ARA$ ha funzionato come una confederazione, comprendente regni distinti sotto un sovrano centrale. Queste differenze hanno favorito la prosperità e mantenuto le identità individuali, ma hanno anche dato origine a un'illusione di disunione. Ciò ha portato alla necessità di riforme amministrative per rafforzare la nostra unione, pur onorando le caratteristiche uniche di ciascun territorio."

 ara_constellation_cities: "Costellazione di Città"
 ara_constellation_cities_desc: "Fin dalla sua nascita, la nostra nazione è stata costituita da regni diversi riuniti sotto un unico sovrano. Tuttavia, ogni regno conserva le proprie tradizioni e leggi uniche. Di conseguenza, numerose città importanti sono emerse come metropoli regionali, rappresentando e governando le rispettive regioni."

 ara_protection_of_the_little_folk: "Proteggere la Gente Comune"
 ara_protection_of_the_little_folk_desc: "I nostri soldati vorrebbero che i loro cari fossero accuditi nel caso in cui perdessero la vita in battaglia. $ARA$ farà il suo dovere e garantirà che ciò avvenga istituendo un sistema di case di lavoro per gli orfani dei caduti."

 ara_gunpowder_souls: "Anime di Polvere da Sparo"
 ara_gunpowder_souls_desc: "La celebrazione delle #italic Fallas#! ha agito da catalizzatore all'interno della Corona dell'$ARA$, stimolando i progressi nelle tecniche di artiglieria grazie all'esperienza pratica acquisita nella manipolazione della polvere da sparo per petardi e fuochi d'artificio. Questa tradizione festiva ha alimentato uno spirito di innovazione, portando allo sviluppo di nuove strategie e conoscenze sull'artiglieria."

 ara_mossos_esquadra: "Mossos d'Esquadra"
 ara_mossos_esquadra_desc: "Le #italic Escuadras de Paisanos#!, note come #italic Esquadres de Catalunya#! o #italic Mossos d'Esquadra#!, sono una milizia locale dedicata alla salvaguardia delle rotte commerciali e delle fiere, sfruttando al massimo la loro profonda conoscenza del territorio. Ispirati dal loro successo, miriamo a istituire milizie simili nei nostri altri territori, composte da abitanti locali. Ciò dovrebbe favorire una convivenza armoniosa e garantire la pace in queste regioni."

 cas_repoblaciones: "Ripopolamenti"
 cas_repoblaciones_desc: "Le vaste conquiste dei nostri antenati hanno creato un paese con più terra che persone disponibili ad abitarla e lavorarla. Ciò ha portato alla necessità urgente di attirare migranti da altre regioni."

 cas_the_reconquista: "La Reconquista"
 cas_the_reconquista_desc: "Nei molti anni trascorsi dalla caduta del Regno visigoto per mano degli invasori, abbiamo combattuto una guerra contro i Mori. Questo ci ha dato una disciplina ferrea che pochi possono vantare. Alzatevi, guerrieri della $CAS$, e mostrate al mondo la vostra determinazione!"

 cas_castilian_navy: "Marina Castigliana"
 cas_castilian_navy_desc: "Situati come siamo su una penisola, circondati dal mare su tre lati su quattro, e con il prezioso $strait_of_gibraltar$ conteso aspramente da diverse potenze, dominare i mari è diventata una questione di vita o di morte. Dai nostri centinaia di chilometri di costa, i nostri antenati hanno iniziato a domare le onde, trasformando la nostra nazione in una potenza navale senza paura."

 cas_cronicas_reales: "Crónicas Reales"
 cas_cronicas_reales_desc: "Compilando le cronache scritte dai precedenti sovrani, siamo in grado di creare un compendio che descrive in dettaglio ogni evento passato nel nostro regno e le origini di tutti i nostri sovrani. Questa conoscenza ci aiuterà non solo a creare migliori fondamenta culturali, ma aiuterà anche i sovrani presenti e futuri a valutare correttamente gli eventi attuali attraverso il confronto con quelli passati."

 cas_masters_of_the_orders: "I Maestri degli Ordini"
 cas_masters_of_the_orders_desc: "Poiché la Reconquista non è più il nostro obiettivo principale, non possiamo più giustificare l'indipendenza degli Ordini Sacri. Assegnando al nostro sovrano la carica di Maestro in ogni Ordine, non solo acquisirà un potere significativo, ma avrà anche accesso alle conoscenze militari di questi crociati."

 cas_new_world: "Il Nuovo Mondo"
 cas_new_world_desc: "Le terre appena scoperte possono essere rivendicate e colonizzate da coloni intraprendenti e invieranno preziosi beni commerciali al nostro regno. Invieremo alcuni coloni fedeli nel Nuovo Mondo, li faremo rivendicare i loro diritti e trovare il modo di sfruttare i tesori della natura, formando così la spina dorsale dei nostri sforzi coloniali."

 cas_reform_of_millones: "Riforma dei Milioni"
 cas_reform_of_millones_desc: "Con l'approvazione della Riforma dei #italic Millones#!, potremmo essere in grado di tassare la nostra popolazione in modo più efficiente. Si tratterà di un prelievo indiretto di entrate, effettuato attraverso un'imposta sui prodotti alimentari."

 cas_marine_infantry: "Fanteria di Marina Castigliana"
 cas_marine_infantry_desc: "Una marina forte richiede membri dell'equipaggio esperti nel combattimento in qualsiasi situazione, compreso il combattimento fuori dalle navi. Per superare questa sfida, regolamenteremo la nostra fanteria marina in modo che diventi un'arma potente indipendentemente dal luogo in cui combatte."

 cas_pasos: "Pasos Castigliani"
 cas_pasos_desc: "Sebbene i #italic Pasos#! della Settimana Santa siano una tradizione antica in $CAS$, le opere d'arte scolpite che li accompagnano hanno recentemente raggiunto un nuovo straordinario apice. Artisti come Juan de Juni e Gregorio Fernández hanno intrapreso il percorso per rendere i #italic Pasos#! castigliano i più impressionanti della penisola."

 cas_real_academia_espanola: "Real Academia Española"
 cas_real_academia_espanola_desc: "Man mano che la nostra lingua si evolve e si diffonde in tutto il mondo, diventa evidente la necessità di regolamentarla e preservarla. Per preservare il carattere essenziale e i tratti distintivi della nostra lingua madre, verrà istituita la #italic Real Academia Española#! con il compito di stabilire le norme per un uso corretto della nostra lingua."

 cas_canal_de_castilla: "Canale di Castiglia"
 cas_canal_de_castilla_desc: "Ispirato ad altri sistemi idrici presenti in $europe$, utilizzati sia per scopi commerciali che per l'irrigazione, il #italic Canal de Castilla#! porterà l'acqua dalle montagne del nord della #italic Meseta#! e irrigherà i campi di cereali della Vecchia Castiglia. Questa impresa ingegneristica aumenterà la nostra resa, creerà un surplus con cui potremo commerciare e sarà il mezzo per trasportarlo per l'esportazione."

 cas_royal_factories: "Fabbriche Reali"
 cas_royal_factories_desc: "Per combattere l'esportazione di materie prime invece di manufatti di maggior valore, svilupperemo un sistema di fabbriche sostenute dal governo che industrializzeranno la nostra nazione. Una produzione interna più solida porterà a un'economia nazionale più forte."

 gra_banu_nasr: "Banū Naṣr"
 gra_banu_nasr_desc: "Discendiamo dalla tribù dei Banū l-Ḫazraj e proveniamo dal lignaggio di Saʿd ibn ʿUbāda, un compagno del profeta Maometto. Il fondatore della nostra dinastia, Muhammad I, controllava un territorio che comprendeva $granada$, $jaen$, $almeria$ e $malaga$, anche se alcune di queste terre caddero nelle mani delle forze cristiane. Da allora, abbiamo resistito con tenacia alle loro avanzate e continueremo a farlo con la forza dei nostri antenati."

 gra_nasrid_art: "Arte Nazarì"
 gra_nasrid_art_desc: "Gli artigiani e gli architetti della $GRA$ sono i più abili al mondo. Creano oggetti che non sono solo utili, ma anche piacevoli alla vista, combinando magnificamente forma e funzione."

 gra_skillful_envoys: "Inviati Abili"
 gra_skillful_envoys_desc: "Il nostro abile uso della diplomazia è stato molte volte il fattore decisivo tra la vita e la morte. Ma non dobbiamo lasciarci cullare dall'autocompiacimento; dobbiamo addestrare ancora di più i nostri inviati per garantire il loro successo."

 gra_razzias: "Incursioni Nasride"
 gra_razzias_desc: "I confini dei nostri nemici rappresentano per noi opportunità allettanti. Se attacchiamo con audacia e rapidità, possiamo cogliere il nemico alla sprovvista e infliggergli danni duraturi."

 gra_muttavia_armies: "Eserciti Mutawwi'a"
 gra_muttavia_armies_desc: "La $GRA$ ha un numero limitato di abitanti e non possiamo reclutare abbastanza soldati per difendere efficacemente la nostra nazione. Tuttavia, se ci manca la popolazione, non ci manca l'oro, che può essere utilizzato per portare le spade dei mercenari sotto le nostre bandiere."

 gra_expand_qanahs: "Espandere il Qanāh"
 gra_expand_qanahs_desc: "Le terre della $GRA$ sono fertili, ma espandere i nostri canali di irrigazione ci consentirebbe di sfruttare meglio le nostre risorse idriche e, di conseguenza, di coltivare prodotti di migliore qualità."

 gra_adaptative_trade: "Commercio Adattivo"
 gra_adaptative_trade_desc: "La nostra posizione privilegiata di intermediari tra i cristiani e le nazioni musulmane è messa in discussione. Questa minaccia potrebbe essere un'opportunità per modernizzare i nostri metodi commerciali e recuperare la nostra posizione di collegamento tra i mercati più lontani e l'$europe$."

 gra_expand_the_frontier: "Espandere la Frontiera"
 gra_expand_the_frontier_desc: "Dalla fondazione della nostra dinastia, i nostri possedimenti territoriali si sono ridotti. Tuttavia, ora siamo in una posizione più forte, in grado non solo di recuperare ogni pezzo di terra perduta, ma anche di ampliare il nostro regno oltre i confini originali."

 gra_a_strong_rule: "Una Regola Forte"
 gra_a_strong_rule_desc: "Per decenni, generazioni della nostra famiglia regnante hanno combattuto incessantemente tra loro, destabilizzando la nostra nazione. È giunto il momento che un sovrano potente affermi con decisione la propria autorità, dimostrando di essere l'unico in grado di mantenere la pace e portare prosperità alla nostra nazione."

 gra_modernized_economy: "Economia Modernizzata"
 gra_modernized_economy_desc: "I tempi moderni richiedono un'economia moderna, in grado di prosperare in un ambiente altamente competitivo. Migliorando le nostre infrastrutture e rendendo più efficienti i nostri metodi e processi di produzione, massimizzeremo la produzione utilizzando la stessa quantità di risorse."

 gra_ghazawat: "Nasrid Ghazawat"
 gra_ghazawat_desc: "Come discendenti dei guerrieri che hanno combattuto sotto il Profeta, dobbiamo difendere il nostro regno con lo stesso coraggio. Ogni battaglia per la $GRA$ è una #italic ghazawat#! — una lotta sacra per preservare l'Islam dall'assalto del Cristianesimo."

 gra_a_new_golden_era: "Una Nuova Era d'Oro"
 gra_a_new_golden_era_desc: "Al-'Andalus era un tempo un centro di apprendimento, patria di studiosi eccezionali come 'Aḥmad Ibn Rušd, 'Abū al-Qāsim e Muḥammad bin Ṭufayl. Dobbiamo impegnarci a continuare questa lunga tradizione intellettuale."

 nav_transatlantic_whaling: "Caccia alle Balene Transatlantica"
 nav_transatlantic_whaling_desc: "Le tradizioni baleniere del $basque$ rappresentano secoli di esperienza e i nostri specialisti sono spesso consultati da altre nazioni che desiderano espandere e migliorare le proprie industrie baleniere. Dovremmo sfruttare questa competenza creando imprese baleniere in tutto il $atlantic_ocean_continent$."

 nav_shipbuiling_experts: "Esperti Costruttori Navali"
 nav_shipbuiling_experts_desc: "Il mare che bacia le nostre coste pullula di risorse che aspettano solo di essere raccolte da chi ha il coraggio di farlo. Per secoli, la nostra costa è stata ricca di porti e cantieri navali, che hanno costruito instancabilmente imbarcazioni con cui soddisfare la nostra sete di avventura e di profitto in mare aperto."

 nav_memories_reconquista: "Ricordi della Reconquista"
 nav_memories_reconquista_desc: "Il nostro popolo ha partecipato attivamente alla Reconquista, contribuendo agli sforzi cristiani per riconquistare l'iberia dal dominio musulmano. Nonostante avesse raggiunto una fase in cui un'ulteriore espansione territoriale era ormai irraggiungibile, la $NAV$ ha comunque svolto un ruolo significativo in questa crociata, attraverso campagne militari e alleanze con i regni vicini cristiana."

 nav_a_renaissance_realm: "Un Regno del $renaissance$"
 nav_a_renaissance_realm_desc: "Sebbene il nostro regno abbia origine nelle valli montane dei Pirenei, il nostro popolo è stato fortemente influenzato dalle idee umanistiche provenienti sia dal nord che dal sud. Abbracciando questo nuovo modo di penser , il popolo della $NAV$ non sta abbandonando le proprie tradizioni, ma le sta fondendo nella propria identità complessiva."

 nav_fearless_seamen: "Marinai Senza Paura"
 nav_fearless_seamen_desc: "Il nostro popolo ha sempre guardato al mare con stupore e timore, ben consapevole sia dei vantaggi che dei pericoli che si possono trovare nel suo abbraccio salato. I nostri coraggiosi antenati fondarono comunità che vivevano non solo vicino al mare, ma anche grazie ad esso, sviluppando abilità impressionanti in acqua. I marinai delle nostre coste sono ben noti in tutta la costa atlantica."

 nav_always_ready: "Sempre Pronti"
 nav_always_ready_desc: "Siamo nati come un piccolo regno, circondato da formidabili avversari provenienti da ogni direzione. Ciò ha influenzato profondamente lo sviluppo del nostro carattere nazionale e il nostro approccio al mondo. Di conseguenza, restiamo sempre vigili, pronti a rispondere al minimo segno di minaccia."

 nav_chartered_councils: "Concili Organizzati"
 nav_chartered_councils_desc: "Ogni territorio storico formerà un consiglio, dipendente dal sovrano ed eletto dalla popolazione locale, che garantirà il rispetto delle leggi tradizionali o #italic Fueros#!. Questo passo intermedio ci darà un potere amministrativo migliore e più efficiente sulle nostre terre, senza interferire con gli interessi locali."

 nav_people_of_the_sea: "Gente di Mare"
 nav_people_of_the_sea_desc: "Il nostro popolo è composto da esperti marinai, e tutto il mondo lo sa. La nostra esperienza sarà un evidente vantaggio nelle battaglie marittime future."

 nav_basque_ferocity: "Ferocia $basque$"
 nav_basque_ferocity_desc: "Anche prima della battaglia del $roncesvalles$, per la quale i Francesi piangono ancora, o delle campagne della Compagnia navarrese, il nostro popolo è sempre stato considerato un feroce combattente. Non dovremmo mai permettere ai nostri nemici di dimenticarlo."

 nav_an_industrious_folk: "Un Popolo Industrioso"
 nav_an_industrious_folk_desc: "La terra in cui viviamo non sarà la più ricca, ma il popolo del $basque$ è composto da individui industriosi, che lavorano duramente per ottenere ciò di cui hanno bisogno. Che si tratti di fondere il $iron$ nelle nostre ferriere, di convertire il legno delle nostre foreste in carbone o di costruire le navi più belle, il nostro regno è ricco grazie agli sforzi e alla competenza della nostra comunità."

 nav_mercantile_expansion: "Espansione Mercantile"
 nav_mercantile_expansion_desc: "Per secoli, la nostra società ha intrattenuto rapporti commerciali non solo con i paesi vicini, ma anche con terre lontane. Ciò ha permesso non solo ai nostri mercanti di acquisire una particolare abilità nell'arte del commercio, ma anche di diffondere le innovazioni provenienti da molte nazioni in modo più ampio e capillare di quanto sarebbe stato possibile altrimenti."

 nav_navarrese_defense_force: "Forza di Difesa Navarrese"
 nav_navarrese_defense_force_desc: "Nel corso del tempo, i nostri vicini hanno acquisito una forza significativa, rappresentando una minaccia crescente per la sopravvivenza della nostra nazione. Per affrontare questo problema, istituiremo un dipartimento militare volto a rafforzare le nostre forze con un numero maggiore di soldati senza compromettere la qualità delle reclute."

 nav_shipyards_ironworks: "Cantieri Navali e Ferriere"
 nav_shipyards_ironworks_desc: "Le tradizioni della costruzione navale, della produzione di acciaio e della lavorazione del ferro sono attività comuni nelle nostre terre da secoli. Ma con lo sviluppo di nuove tecniche, dobbiamo ovviamente aggiornare i nostri processi di conseguenza. Anche le tradizioni più antiche devono abbracciare la modernità per mantenere il loro valore nel mondo contemporaneo."

 nav_adept_traders: "Mercanti Abili"
 nav_adept_traders_desc: "La qualità delle nostre navi, la competenza dei nostri mercanti e l'efficacia dei nostri processi produttivi hanno reso il nostro commercio incredibilmente redditizio. L'afflusso di ricchezza nella nostra nazione ci renderà più forti che mai."

 nav_the_national_military_academy: "L'Accademia Militare Nazionale"
 nav_the_national_military_academy_desc: "Con la professionalizzazione del nostro esercito, diventa evidente la necessità di un centro di addestramento per le nostre reclute. Formeremo un corpo di soldati esperti per insegnare i fondamenti della guerra e forgiare le nostre reclute affinché diventino la punta di diamante del nostro esercito."

 nav_royal_basque_society: "Royal $basque$ Society"
 nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, la Royal $basque$ Society of Friends of the Country, è stata fondata per incoraggiare lo sviluppo dell'economia, della cultura e della scienza del $basque$. Nei prossimi anni porterà grandi benefici al Paese."

 nav_efficient_bureaucracy: "Burocrazia Ffficiente"
 nav_efficient_bureaucracy_desc: "La nostra nazione ha mantenuto le tradizioni burocratiche sin dalla fondazione del regno, ma i tempi che cambiano richiedono nuovi approcci. La $NAV$ ha suscitato particolare ammirazione per aver introdotto alcune innovazioni amministrative."

 nav_riflemen_march: "Marcia dei Fucilieri"
 nav_riflemen_march_desc: "L'introduzione dei fucili nei nostri eserciti ha richiesto nuovi approcci all'addestramento militare e alla disciplina. I nostri comandanti hanno sviluppato formazioni di marcia innovative che sono diventate famose come prova della nostra competenza e concentrazione militare."

 por_battle_ourique: "La Battaglia del $ourique$"
 por_battle_ourique_desc: "Nel 1139, le nostre coraggiose truppe sconfissero in battaglia cinque re mori. Questa impresa vivrà per sempre nella memoria dei nostri soldati, che potranno usarla come fonte di ispirazione per sconfiggere qualsiasi nemico, non importa quanto potente o ben armato."

 por_establishment_portuguese_navy: "Istituzione della Marina Portoghese"
 por_establishment_portuguese_navy_desc: "Re Dinis gettò le basi per la Marina portoghese quando nominò il mercante genovese Manuel Pessanha, originariamente Pessagno, ammiraglio della flotta nazionale. Le missioni di Pessanha erano quelle di difendere le coste Portoghesi dalle incursioni dei pirati musulmani e di creare una potente flotta mercantile."

 por_estimulate_rural_areas: "Stimolare le Aree Rurali"
 por_estimulate_rural_areas_desc: "Molti luoghi del nostro Paese, soprattutto nelle regioni rurali e remote, si stanno spopolando, con campi, foreste e miniere che cadono in disuso. Riformando gli aspetti rilevanti del nostro sistema giuridico, incoraggeremo le persone a rimanere nelle campagne e ne ripristineremo la produttività."

 por_pursuing_waves: "Inseguendo le Onde"
 por_pursuing_waves_desc: "Sembra che la terra non sia sufficiente per una parte della nostra popolazione. Alcuni guardano il mare e provano #italic saudade#!, come se fosse un amore perduto da tempo. I porti e le banchine pullulano di marinai entusiasti, tutti che si arruolano nelle spedizioni come se fossero ubriachi dal desiderio di esplorare il mondo. Faremo grande uso di questi entusiasti marinai."

 por_bombardeiros: "Bombardeiros"
 por_bombardeiros_desc: "I progressi tecnologici ci hanno aiutato a sviluppare cannoni molto più potenti, ma la maggior parte dei ponti delle navi non è in grado di sostenerne il peso. Rinforzando le nostre navi, saremo in grado di trasportare più munizioni e le nostre marine saranno temute per la loro impressionante potenza di fuoco."

 por_feitorias: "Feitorias"
 por_feitorias_desc: "Mandiamo i nostri #italic feitors#! in tutti gli angoli dell'Oriente e affermiamo il nostro Paese come forza commerciale dominante in $indian_ocean_region$. Creando una rete di forti stazioni commerciali fortificate lungo le coste del $africa$ e dell'$india$, potremo dominare il commercio locale senza spendere troppe risorse."

 por_ordenancas: "Ordenanças"
 por_ordenancas_desc: "La nostra nazione ha bisogno di un esercito professionale per proteggere i sacri confini della nostra gloriosa nazione. Riformiamo il sistema di coscrizione e addestriamo le nostre giovani reclute ad adempiere a questo dovere con onore."

 por_the_bandeirantes: "Incoraggiare i Bandeirantes"
 por_the_bandeirantes_desc: "A volte, i membri delle spedizioni di caccia agli schiavi si imbattono in oro e altri metalli o pietre preziose. Diffondere la notizia di queste preziose scoperte dovrebbe suscitare l'interesse di anime coraggiose che potrebbero essere disposte a emigrare nelle nostre colonie in cerca di fortuna."

 por_colonial_governors: "Governatori Coloniali"
 por_colonial_governors_desc: "Inviando i nostri amministratori più capaci a governare le nostre colonie e gli avamposti, garantiremo che questi insediamenti rimangano pacifici e fedeli alla madrepatria, mentre noi ci rilassiamo e guardiamo i profitti che arrivano."

 por_royal_absolutism: "Assolutismo Reale"
 por_royal_absolutism_desc: "Per troppo tempo, la nostra autorità reale è stata ostacolata dalle sfortunate interferenze della nobiltà, i cui interessi locali limitati minacciano il bene superiore del regno. Ignoreremo completamente le Cortes e governeremo senza la loro interferenza."

 por_royal_military_academy: "Accademia Reale di Fortificazione, Artiglieria e Disegno"
 por_royal_military_academy_desc: "I nostri corpi di artiglieria e le nostre fortificazioni sono stati a lungo la chiave per la difesa del nostro territorio, rendendo il nostro piccolo Paese un osso duro per gli eserciti nemici. Istituiremo un'accademia militare - l'#italic Academia Real de Fortificação, Artilharia e Desenho#! - per formare i nostri ufficiali in questi campi, affinché possano a loro volta trasformare le nostre fortificazioni e i nostri corpi di artiglieria nei migliori al mondo!"

 por_vinho_porto: "Vinho do $porto$"
 por_vinho_porto_desc: "Sulle rive del fiume Douro, nel nord del Paese, si coltiva l'uva per creare un vino fortificato unico nel $wine$, famoso con il nome di #italic Porto#!. Essendo l'unica nazione a produrre questo delizioso intossicante, non dobbiamo perdere l'occasione di guadagnare un sacco di soldi dalla sua esportazione."

 spa_school_salamanca: "Scuola di $salamanca$"
 spa_school_salamanca_desc: "Con sede presso l'Università di $salamanca$, la Scuola si occupa di materie diverse come teologia, economia e filosofia politica. Essendo una delle principali scuole di pensiero del mondo cattolico, la sua presenza radicata in $SPA$ garantisce che la nostra nazione rimanga sempre all'avanguardia nel campo intellettuale."

 spa_viceroyalties: "Vicereami Spagnoli"
 spa_viceroyalties_desc: "Nuove terre oltreoceano ci aspettano per essere rivendicate. Divideremo questo territorio e ogni sezione sarà governata da rappresentanti del nostro governo, che stabiliranno insediamenti ordinati. L'obiettivo è che il nostro popolo trovi queste nuove terre una destinazione attraente, vi si stabilisca e assicuri la nostra presenza."

 spa_siglo_de_oro: "Siglo de Oro"
 spa_siglo_de_oro_desc: "Il nostro regno pullula di conquiste culturali e artistiche di ogni tipo. Se incanaleremo questa creatività nei luoghi appropriati, alimentandola quando necessario attraverso ricchi benefattori, daremo inizio a un vero e proprio Secolo d'oro dell'arte Spagnola."

 spa_revival_of_ecclesiastical_discipline: "Rinascita della Disciplina Ecclesiastica"
 spa_revival_of_ecclesiastical_discipline_desc: "Il lassismo religioso si è diffuso tra il nostro popolo, allontanandoci da Dio. Firmeremo trattati con i nostri leader religiosi per incoraggiare un legame più forte tra loro e il nostro governo e tornare ad essere una nazione devota."

 spa_naval_reforms: "Riforme della Marina Spagnola"
 spa_naval_reforms_desc: "Non abbiamo dato priorità alla nostra marina militare e, di conseguenza, siamo rimasti indietro rispetto ai nostri concorrenti in termini di qualità e prestazioni navali. È necessaria una riforma che ci riporti alla nostra legittima posizione di supremazia marittima."

 spa_spanish_enlightenment: "Illuminismo Spagnolo"
 spa_spanish_enlightenment_desc: "Idee radicalmente nuove hanno permeato le menti delle figure di spicco della $SPA$, ispirandole a sviluppare piani ambiziosi che ci distingueranno da tutte le altre nazioni del mondo."

 tercio: "Tercios"
 tercio_desc: "#italic Tercio#! La fanteria fu sviluppata principalmente dal brillante generale Gonzalo Fernández de Córdoba, chiamato #italic El Gran Capitán#!, durante le guerre d'Italia. Si tratta di una formazione di fanteria mista composta da picchieri e moschettieri. Grazie a questo approccio combinato, la formazione sfrutta contemporaneamente sia la rigidità della fanteria pesante che la potenza di fuoco a lungo raggio dei moschettieri, rendendola una formazione ideale sia in difesa che in attacco."

 catalan_galley: "Galee Catalane"
 catalan_galley_desc: "La $n_catalan_galley$ è una versione più grande delle antiche galee greche che un tempo dominavano il Mar Mediterraneo."

 early_iberian_caravel: "Prime Caravelle Iberiche"
 early_iberian_caravel_desc: "Originariamente di origine iberica, le prime caravelle erano navi piccole ma molto veloci, utilizzate per la pesca d'altura e il commercio costiero. Il loro uso in $iberia$ è così diffuso che la regione può facilmente vantarsi di possedere le caravelle più avanzate."

 iberian_caravel: "Caravelle Iberiche"
 iberian_caravel_desc: "La necessità di caravelle più veloci e affidabili ha spinto i nostri esperti di costruzione navale a migliorare il loro design. Sebbene le caravelle siano diventate comuni in tutto l'$europe$, i modelli iberici rimangono superiori sia in termini di innovazione che di velocità."

 early_iberian_galleon: "Primi Galeoni Iberici"
 early_iberian_galleon_desc: "Imbarcazione oceanica primitiva ma potente, la $n_early_iberian_galleon$ è un'invenzione originale del $iberia$ che presenta un castello di prua più basso e uno scafo lungo, che la rendono particolarmente stabile e resistente ai venti contrari."

 square_rigged_caravel: "Caravelle a Vele Quadre"
 square_rigged_caravel_desc: "Combinando il $n_iberian_caravel$ e il $n_carrack$, è nata una nuova nave: veloce, forte e perfetta per aiutarci a dominare i mari."

 iberian_galleon: "Galeoni Iberici"
 iberian_galleon_desc: "Il $n_iberian_galleon$ è una versione più stilizzata del $n_early_iberian_galleon$. Si tratta di navi estremamente potenti in grado di schiacciare qualsiasi opposizione in alto mare."

 ara_almogavars: "$a_almogavars$"
 ara_almogavars_desc: "$a_almogavars_desc$"

 ara_catalan_crossbowmen: "$a_catalan_crossbowmen$"
 ara_catalan_crossbowmen_desc: "$a_catalan_crossbowmen_desc$"

 ara_late_almogavars: "$a_late_almogavars$"
 ara_late_almogavars_desc: "$a_late_almogavars_desc$"

 cas_lanzas_de_castilla: "$a_lanzas_de_castilla$"
 cas_lanzas_de_castilla_desc: "$a_lanzas_de_castilla_desc$"

 por_cacadores: "Caçadores"
 por_cacadores_desc: "Soprannominati i #italic Galli Combattenti#!, i #italic Caçadores#! sono un'unità di fanteria leggera d'élite dell'esercito portoghese che indossa uniformi marroni per distinguersi dai soldati regolari."

 dan_levy_recruitment: "Affidamento sulle Leve"
 dan_levy_recruitment_desc: "Il nostro dominio è protetto da barriere naturali, ovvero la penisola dello Jutland e l'arcipelago danese. Questa conformazione geografica difensiva è estremamente utile quando siamo sotto attacco, poiché ci dà il tempo di radunare le truppe prima che i nostri nemici possano raggiungere il nostro territorio centrale."

 dan_old_naval_traditions: "Reti Marittime Danese"
 dan_old_naval_traditions_desc: "Ogni parte del nostro paese è circondata dalle acque del Mar Baltico e del Mare del Nord. Questo ci offre il vantaggio unico di poter utilizzare le vie navigabili sia per il trasporto che per le comunicazioni, riducendo notevolmente il tempo necessario per viaggiare tra le regioni."

 dan_rulers_of_the_north: "I Veri Governanti del Nord"
 dan_rulers_of_the_north_desc: "I governanti della $DAN$ rivendicano da secoli la supremazia sulle regioni nordiche. Impreziosire l'eredità di re come Canuto il Grande ci garantirà la legittimità interna ed esterna necessaria per sostenere le nostre affermazioni."

 dan_reliance_mercenaries: "Affidamento sui Mercenari"
 dan_reliance_mercenaries_desc: "4DAN$ non può contare su una vasta popolazione per rifornire i propri eserciti. Pertanto, dobbiamo assicurarci che le compagnie mercenarie siano disposte a servire il nostro Stato, garantendo la loro lealtà con contratti solidi."

 dan_rentekammer_advance: "Rentekammeret"
 dan_rentekammer_advance_desc: "Istituendo un dipartimento separato per il nostro Tesoro, il #italic Rentekammeret#!, avremo un migliore controllo delle nostre finanze e saremo in grado di gestire il governo in modo più efficiente. Con la documentazione di tutti i nostri registri finanziari, saremo in grado di stimare più facilmente le nostre spese future, stabilizzando le nostre finanze."

 dan_royal_danish_navy: "Marina Militare dello Stato Danese"
 dan_royal_danish_navy_desc: "Il nostro Paese è circondato dall'acqua e quindi vulnerabile al dominio di qualsiasi potenza con una flotta sufficientemente grande. Per garantire che ciò non accada mai, dobbiamo finanziare una marina militare in grado di proteggere le nostre coste e proiettare il nostro potere sul nord dell'$europe$."

 dan_danish_orthodoxy: "Uniformità Religiosa"
 dan_danish_orthodoxy_desc: "Nel tumultuoso panorama religioso dell'$europe$, dobbiamo mettere la $DAN$ sulla via della rettitudine e rimanere fedeli alle dottrine della nostra chiesa."

 dan_expanded_dockyards: "Il Cantiere Navale del $kobenhavn$"
 dan_expanded_dockyards_desc: "Il nostro Paese vanta una lunga e gloriosa tradizione nella costruzione navale. I nostri esperti costruttori navali hanno bisogno di un cantiere moderno e spazioso in cui costruire una marina degna di chiamarsi danese. Le acque che circondano il $kobenhavn$ sono il luogo perfetto per costruire un cantiere navale di questo tipo."

 dan_danish_legislation: "Legislazione Danese"
 dan_danish_legislation_desc: "Le leggi regionali dello Jutland, della Zelanda e della Scania hanno costituito per secoli la base del nostro codice legale. A beneficio del nostro regno, dovremmo compilare e unificare queste leggi in un unico sistema giuridico completo, che sarà conosciuto come #italic Danske Lov#!."

 dan_danish_agriculture: "Focus sull'Agricoltura"
 dan_danish_agriculture_desc: "Sebbene il territorio danese sia relativamente povero in termini di materie prime rare da sfruttare, ciò è compensato dall'abbondanza agricola. Ci concentreremo sull'ottimizzazione della nostra agricoltura e produzione alimentare, salvaguardando la nostra popolazione da futuri periodi di carestia."

 dan_royal_life_guards: "Guardia Reale di Vita"
 dan_royal_life_guards_desc: "La Guardia Reale di Vita è un reggimento d'élite danese che funge anche da guardia personale del sovrano e svolge compiti cerimoniali."

 dan_scanian_regiment: "Reggimento Scaniano"
 dan_scanian_regiment_desc: "Il Reggimento Scaniano è un'unità militare composta da contadini arruolati, istituita per ridurre la dipendenza dalle forze mercenarie e costruire un esercito permanente più organizzato sotto la diretta autorità reale."

 dan_admiralty_college: "Collegio dell'Ammiragliato"
 dan_admiralty_college_desc: "Con l'istituzione di un collegio centralizzato per la formazione dei nostri comandanti navali, saremo in grado di formare leader competenti che conoscono bene le nostre acque costiere. Ciò migliorerà la nostra strategia di difesa marittima e, in ultima analisi, salvaguarderà meglio la sovranità danese."

 dan_trading_economy: "Una Nazione Marittima"
 dan_trading_economy_desc: "Non possiamo produrre da soli tutto ciò di cui abbiamo bisogno per mantenere la stabilità economica. Dobbiamo invece affidarci a una rete commerciale stabile per esportare i nostri beni e importare tutto ciò che non siamo in grado di produrre."

 ven_printing_industry: "Industria della Stampa"
 ven_printing_industry_desc: "Fin dall'invenzione della stampa, il popolo della $VEN$ ha dimostrato una spiccata attitudine al suo utilizzo. Dovremmo incoraggiare un ulteriore sviluppo della nostra industria tipografica, poiché i potenziali benefici sono molteplici."

 ven_stato_da_mar: "Stato da Mar"
 ven_stato_da_mar_desc: "Il commercio è la linfa vitale della $VEN$ e una gestione competente delle nostre stazioni commerciali all'estero è fondamentale per i nostri interessi commerciali. Centralizzando l'amministrazione di questi territori in un'unica unità, potremo migliorare il nostro commercio."

 ven_state_inquisition: "L'Inquisizione di Stato"
 ven_state_inquisition_desc: "L'Inquisizione di Stato è un collegio di tre giudici istituito per gestire le minacce alla sicurezza interna. Le dimensioni ridotte del collegio consentono di affrontare rapidamente le minacce e non ci vorrà molto per creare una rete di agenti sia in patria che all'estero per sradicare i traditori."

 venetian_arsenal_advance: "Arsenale Veneziano"
 venetian_arsenal_advance_desc: "Risalente al XII secolo, l'Arsenale della $VEN$ è il fondamento su cui poggia tutto il nostro potere."

 ven_venetian_thalassocracy: "Talassocrazia Veneziana"
 ven_venetian_thalassocracy_desc: "La $VEN$ ha sempre avuto uno stretto legame con il mare. Il commercio e gli scambi sono profondamente integrati nella nostra amministrazione e i mercanti veneziani hanno accesso a più risorse rispetto a qualsiasi altro governo."

 ven_venetian_palaces: "$venetian_palaces$"
 ven_venetian_palaces_desc: "$venetian_palaces_desc$"

 ven_gothic_architecture: "Architettura Gotica"
 ven_gothic_architecture_desc: "Influenzato dall'architettura bizantina e con richiami all'estetica islamica, lo stile unico dell'$ven_gothic_architecture$ è un elemento fondamentale dell'identità veneziana ed è molto amato dalla classe alta. Molti aristocratici e ricchi mercanti dimostrano il loro sostegno alla diffusione di questo stile architettonico con il loro oro."

 ven_ship_mounted_gunpowder_weapons: "Armi da Fuoco Montate sulle Navi"
 ven_ship_mounted_gunpowder_weapons_desc: "Per millenni, il combattimento navale è stato più simile a una battaglia terrestre su assi galleggianti che a un vero e proprio combattimento tra navi. Con l'introduzione delle armi da fuoco sulle nostre navi, siamo in grado di rompere con la guerra tradizionale e annientare le navi nemiche prima ancora che si avvicinino alle nostre galee."

 ven_magistrato_alla_sanita: "Magistrato alla Sanità"
 ven_magistrato_alla_sanita_desc: "Il #italic $ven_magistrato_alla_sanita$#! — Magistratura della Sanità — è un ufficio cruciale nel nostro Stato che sovrintende alla prevenzione delle malattie e delle epidemie."

 ven_venetian_painting: "Pittura Veneziana"
 ven_venetian_painting_desc: "L'$ITA$ nel suo complesso è famoso per le sue conquiste culturali, e la pittura veneziana è uno dei suoi più grandi contributi. Gli artisti vengono da lontano per ammirare le nostre magnifiche gallerie e assistere in prima persona alla nostra rinascita culturale."

 ven_venetian_school_of_music: "Scuola di Musica Veneziana"
 ven_venetian_school_of_music_desc: "Mentre i nostri dipinti attraggono gli appassionati di arte visiva, la musica veneziana viaggia lontano ed è amata da coloro che cercano l'illuminazione melodica. Molti grandi compositori si diplomano nei nostri conservatori e ottengono un grande successo in tutto l'$europe$, diffondendo la nostra cultura con ogni nota dorata."

 ven_mixed_naval_tactics: "Tattica Navale Mista"
 ven_mixed_naval_tactics_desc: "Le imbarcazioni a remi sono state lo standard sin dalla nascita della marina militare veneziana. Tuttavia, le navi a vela svolgono ora un ruolo sempre più dominante nei combattimenti navali nel Mediterraneo. La nostra marina militare si adatterà adottando la potente galeassa, una nave ibrida che può utilizzare sia i remi che le vele."

 ven_naval_conscription: "La Coscrizione Navale"
 ven_naval_conscription_desc: "Da quando esiste la $VEN$, le nostre galee sono state remate da uomini liberi che lavoravano per un salario, ma una grave carenza di manodopera sta rendendo più difficile trovare rematori qualificati. Non abbiamo altra scelta che ricorrere alla coscrizione per equipaggiare le nostre galee."

 ven_provveditori_ai_beni_inculti: ""Provveditori ai Beni Inculti""
 ven_provveditori_ai_beni_inculti_desc: "Questo dipartimento per le risorse naturali non coltivate è stato istituito per facilitare il drenaggio delle paludi e l'irrigazione dei terreni aridi. L'obiettivo finale è quello di migliorare l'approvvigionamento alimentare della $VEN$."

 cunning_diplomacy: "Diplomazia Astuta"
 cunning_diplomacy_desc: "Di fronte a nemici superiori su entrambi i fronti, i governanti valacchi hanno sviluppato l'abilità di cambiare alleanze quando prudente. Molti hanno assicurato il proprio trono con il sostegno ottomano, per poi stringere alleanze con l'ungheria o con il $hre$."

 boyar_regime: "Regime Boiardo"
 boyar_regime_desc: "Il trattato di Alba Iulia consolidò il potere della nobiltà valacca. Un consiglio di dodici influenti boiardi lavora ora a fianco del #italic voivoda#! per esercitare il potere esecutivo del paese."

 home_of_hussars: "Casa degli Ussari"
 home_of_hussars_desc: "Sebbene le formazioni di cavalleria leggera siano un concetto antico, i primi ussari balcanici - o #italic gusari#! - apparvero come unità ausiliarie del $BYZ$, reclutati principalmente dal $BYZ-ADJ$ controllato dal $serbia_region$ nel X e XI secolo. Anche dopo il declino del potere del $BYZ-ADJ$, questa tradizione rimase e fu ulteriormente perfezionata nei secoli successivi."

 serbian_mining: "Industria Mineraria Serba"
 serbian_mining_desc: "Le montagne balcaniche sono ricche di minerali, che aspettano solo di essere estratti da minatori esperti. Come in altre parti dell'$eastern_europe$, la $SER$ ha accolto minatori sassoni esperti per aiutare a sviluppare la sua industria mineraria. Città come $novo_brdo$ sono cresciute fino a diventare vaste metropoli, alimentate dalla ricchezza estratta dalla terra."

 mimic_the_phoenix: "Imitare la Fenice"
 mimic_the_phoenix_desc: "Abbracciamo con entusiasmo i costumi del $BYZ$, con l'obiettivo di rispecchiarne le leggi e lo stile generale. Attingendo dal ricco mosaico di influenze romane, ci sforziamo di infondere la loro essenza nel nostro sistema di governo e nel nostro ordinamento giuridico, in uno sforzo consapevole di emulare la grazia e la raffinatezza del $BYZ$ all'interno del nostro regno."

 rallying_the_troops: "Radunare le Truppe"
 rallying_the_troops_desc: "Il nostro regno ha sviluppato vari metodi per radunare rapidamente le truppe, in modo che nessun nemico possa coglierci impreparati. Questo vantaggio ci ha aiutato a rimanere saldi, nonostante tutte le avversità, e siamo pronti per la battaglia. Uniti, marciamo avanti, risoluti nel nostro intento e pronti a difendere il nostro onore e la nostra patria!"

 keepers_of_the_gate: "Custodi della Porta"
 keepers_of_the_gate_desc: "Il terreno accidentato della $SER$ ha dato vita a una formidabile rete di difese, incarnata dall'imponente fortezza di Smederevo. Queste fortificazioni resistenti proteggono la nostra nazione, rendendo l'invasione una prospettiva scoraggiante. Dalle vaste catene montuose alle strategiche valli fluviali, le difese della $SER$ testimoniano la nostra resilienza e il nostro spirito indomito."

 poklisars: "Poklisars"
 poklisars_desc: "Sin dai primi giorni della nostra nazione, abbiamo spesso rivolto lo sguardo oltre i nostri confini, sia per stabilire rotte commerciali redditizie, placare vicini formidabili e stringere alleanze, sia per forgiare solide partnership contro avversari comuni. I #italic Poklisars#! sono gli ambasciatori che svolgono queste missioni a nostro nome."

 the_rebirth_of_the_patriarchate: "La Rinascita del Patriarcato"
 the_rebirth_of_the_patriarchate_desc: "Nel XIV secolo, Stefan Dušan mirò a elevare l'arcivescovado di $SER$ a patriarcato. Da allora, il nostro clero ha cercato di rendersi indipendente da $constantinople$, cementando l'unione tra il regno fisico, la nostra nazione e quello spirituale."

 reform_the_ecclesiastical_authorities: "Riformare le Autorità Ecclesiastiche"
 reform_the_ecclesiastical_authorities_desc: "La $SER$ si trova da tempo al crocevia delle influenze orientali e occidentali, comprese quelle della fede ortodossa cristiana e della Chiesa cattolica. È tempo di intraprendere un percorso di riforma ecclesiastica per rafforzare le nostre istituzioni religiose e garantire il benessere spirituale del nostro regno."

 balkan_hajduks: "Gli Hajduk Balcanici"
 balkan_hajduks_desc: "A differenza dei loro omologhi ungheresi, gli #italic Hajduk#! della $SER$ e dei territori balcanici limitrofi si sono guadagnati una reputazione infame. Questi uomini vivono la dura vita dei briganti, sempre in pericolo, sempre in movimento. Tuttavia, durante le guerre questi uomini esperti e duri spesso riempivano i ranghi degli eserciti serbi, fornendo una fanteria eccellente, anche se leggermente indisciplinata."

 foreign_relations_bureau: "Ufficio Relazioni Estere"
 foreign_relations_bureau_desc: "Il nostro regno ha riconosciuto l'importanza di promuovere relazioni e alleanze amichevoli con i Paesi vicini. Per facilitare questo, istituiremo un ufficio specializzato dedicato agli affari esteri. Mantenendo un focus dedicato alla diplomazia, siamo in una posizione migliore per navigare nella complessa rete delle relazioni internazionali e garantire la prosperità della nostra nazione."

 serbian_enlightenment: "Illuminismo Serbo"
 serbian_enlightenment_desc: "Ispirati da altre nazioni dell'Illuminismo, i nostri eroi nazionali, come Dositej Obradović, hanno cercato di elevare la nostra lingua e letteratura vernacolari. Toccato dalla scarsità di opere secolari accessibili alla gente comune, Dositej Obradović ha assunto un ruolo guida nel colmare il divario tra il $serbian_dialect$ scritto e quello parlato. Grazie alla diligente redazione di libri di grammatica e dizionari, alla stesura di nuovi tomi e alla traduzione di opere straniere, la nostra nazione sta promuovendo una rinascita letteraria grazie al lavoro di questi visionari."

 military_modernization: "Modernizzazione Militare"
 military_modernization_desc: "Il nostro popolo ricorda la nascita della nostra nazione: circondata da potenze formidabili che rappresentano minacce permanenti e incombenti alla nostra sicurezza. Questa vigilanza costante ha forgiato una cultura di pronta reattività, garantendo che le nostre forze armate fungano da scudo contro le avversità. Impavidi e rispettati, i nostri soldati ci hanno trasformato da potenziali prede a potenti avversari, scoraggiando chiunque osi violare la nostra sovranità."

 seljuk_heritage: "Patrimonio Selgiuchide"
 seljuk_heritage_desc: "Per abbracciare il futuro, dobbiamo ricordare ciò che abbiamo imparato dalla $IRA$ e dai Grandi Selgiuchidi e costruire uno Stato in grado di unire popoli e credenze disparate in un insieme più grande."

 turkic_traditions: "Tradizioni Turche"
 turkic_traditions_desc: "Proveniamo dalle steppe. Il vento, le difficoltà e il brivido della battaglia saranno sempre nel nostro sangue e non dobbiamo mai dimenticarli."

 millets: "Kanunnames"
 millets_desc: "Stabilendo codici di legge unici in ciascuna delle province del nostro impero, possiamo garantire che il nostro governo sia considerato equo e giusto. Questi libri di legge, noti come #italic Kanunname#!, terranno conto delle circostanze e delle tradizioni locali di ciascuna delle nostre province diverse e lontane tra loro."

 ghazi: "Ghazi"
 ghazi_desc: "In linea con le tradizioni della steppa, i nostri nobili sono guerrieri di frontiera e noi saremo impavidi nella lotta per espandere la Dimora dell'Islam."

 azeb_irregulars: "Azeb Irregolari"
 azeb_irregulars_desc: "Giovani non sposati, arruolati dai segmenti più poveri della società, gli Azeb non funzioneranno solo come soldati e marinai, ma anche come costruttori, genieri e corazzieri. Attraverso un sistema di guarnigioni fortificate, ci assicureremo che vengano sempre pagati."

 bashi_bazouks: "Bashi-Bazouks"
 bashi_bazouks_desc: "Irregolari indisciplinati reclutati tra i segmenti emarginati della popolazione, e talvolta veri e propri vagabondi, i #italic bashi-bazouks#! rappresentano un modo economico per presidiare fortezze e avamposti. Con la loro propensione al brigantaggio e alle uccisioni gratuite, si può sempre contare su di loro per disturbare la frontiera nemica."

 ottoman_bureaucracy: "Birûn"
 ottoman_bureaucracy_desc: "Il #italic Birûn#!, o Servizio Esterno, comprende il gruppo di amministratori, ufficiali militari e studiosi religiosi appena al di fuori della cerchia ristretta del sovrano. Insieme, costituiscono un'efficiente burocrazia ereditata dalla $IRA$ e dal Sultanato Selgiuchide, ma ulteriormente adattata da elementi provenienti da $BYZ$, rendendolo davvero unicamente ottomano."

 ahdnames: "Ahidnâme"
 ahdnames_desc: "Chiamati anche capitolazioni, i $ahdnames$ sono accordi contrattuali con altre nazioni, che attingono sia al diritto musulmano che a quello secolare. I $ahdnames$ sono spesso utilizzati per garantire la protezione e i diritti dei mercanti e del clero stranieri all'interno dei nostri territori, assicurando che la giustizia sia rispettata e che il commercio possa fluire senza ostacoli."

 dragomans: "Dragomani"
 dragomans_desc: "Interpreti, traduttori e guide in uno, i $dragomans$ sono funzionari qualificati che lavorano per migliorare i nostri sforzi diplomatici e commerciali con diverse comunità e paesi. La maggior parte dei dragomani è di origine $greek_culture$, anche se alcuni provengono dal $jewish_ADJ$, dal $armenian_culture$ o da altri contesti multilingue."

 kafes: "Kafes"
 kafes_desc: "Tenendo i nostri principi indisciplinati confinati in una parte speciale dell'harem, il sito $kafes$, possiamo prevenire le ribellioni selvagge e la rivalità tra fratelli che in passato affliggevano il nostro regime."

 timariots: "Timarioti"
 timariots_desc: "Offrendo sovvenzioni di terre Timar ai cavalieri Sipâhi, questi possono utilizzare questa nuova ricchezza sponsorizzata dallo Stato per rifornire se stessi e il loro seguito. Questo ci permette di schierare forze di cavalleria più formidabili."

 autonomous_pashas: "Pascià Autonomi"
 autonomous_pashas_desc: "Bilanciare le esigenze locali con gli interessi nazionali è uno degli aspetti più difficili del governo. Data la lentezza delle comunicazioni, può volerci molto tempo prima che le direttive più elementari raggiungano anche le province relativamente vicine. Dobbiamo incoraggiare i governatori locali a una maggiore autonomia per garantire che gli interessi locali siano soddisfatti in modo tempestivo."

 lawcode_of_suleiman: "Il Codice Legale di Solimano"
 lawcode_of_suleiman_desc: "Solimano è ricordato come uno dei grandi sovrani della storia, un soldato, un legislatore e un riformatore. Infatti, mentre l'Occidente lo conosce come Solimano il Magnifico, nella sua patria è chiamato "Il Legislatore". Al centro delle sue riforme c'era il riesame della legge dinastica ottomana, #italic Kanun#!, al fine di allinearla al $sharia$."

 ottoman_tax_farming: "Muqāta'ah"
 ottoman_tax_farming_desc: "Un sistema di riscossione delle imposte in cui i nobili acquistano il diritto di riscuotere le entrate dai terreni di proprietà dello Stato. Il $ottoman_tax_farming$ bilancia la distribuzione della ricchezza in tutto l'impero e allontana la nobiltà dalla corruzione, dandole un interesse acquisito nel sostenere lo Stato."

 ottoman_waystations: "Menzil"
 ottoman_waystations_desc: "Un complesso sistema di depositi di rifornimenti e alloggi ad uso dei soldati e dei funzionari, #italic menzil#! Le stazioni di sosta consentono ai nostri eserciti di dipendere meno dal saccheggio e di rimanere ben riforniti su ogni frontiera."

 late_ottoman_bureaucracy: "Mālīye"
 late_ottoman_bureaucracy_desc: "Una burocrazia vasta, diversificata e altamente organizzata, con il personale degli scribi più abili, il $late_ottoman_bureaucracy$ aspira ad essere un'istituzione fondamentale e incorruttibile dello Stato."

 tulip_period: "Periodo dei Tulipani"
 tulip_period_desc: "Riformiamo le tradizioni obsolete e stagnanti, piantiamo tulipani in tutti i giardini e inauguriamo una nuova età dell'oro del commercio e delle relazioni."

 imperial_school_of_naval_engineering: "Scuola Imperiale di Ingegneria Navale"
 imperial_school_of_naval_engineering_desc: "Questa nuova scuola, #italic Mühendishane-i Bahr-i Hümâyûn#!, ci aiuterà a formare carpentieri navali, ufficiali di marina e marinai sia per la marina militare che per la flotta mercantile."

 ayans: "Âyan"
 ayans_desc: "I $ayans$ sono magnati provinciali di diversa estrazione che esercitano una significativa autonomia locale, ma forniscono comunque una pronta fonte di reddito agricolo fiscale e forze militari per lo Stato."

 french_language_in_all_courts: "Lingua $french_language$ in Tutti i Tribunali"
 french_language_in_all_courts_desc: "Per molto tempo, il $latin_language$ è stato la lingua dello scambio culturale in $europe$... ma ad essere onesti, quella lingua è quasi morta come gli antichi romani che la parlavano. Dobbiamo trovare una nuova #italic lingua franca#!, e niente dice 'lingua franca' come il $french_language$."

 elan: "Élan!"
 elan_desc: "Coltivare la dottrina dell'attacco è il segno distintivo del nostro esercito. I nostri uomini devono combattere con #italic élan#! — spirito e vigore — dandoci un chiaro vantaggio sul campo di battaglia."

 estates_general: "Stati Generali"
 estates_general_desc: "Secondo alcuni, gli Stati Generali esistono dal 1303. Nel corso del tempo, la loro forma è cambiata da consiglio di membri nominati dalla corona a consiglio di rappresentanti eletti. Questo cambiamento nella struttura ha conferito agli Stati Generali, e alle tasse da essi riscosse, una maggiore legittimità."

 fra_gendarmes: "Compagnie di Gendarmi"
 fra_gendarmes_desc: "Il ricorso al sistema di leva ha esposto il nostro governo a grandi rischi e si è rivelato fortemente limitante. Dovremmo reclutare cavalieri pesantemente armati e pagare loro uno stipendio fisso per creare un esercito permanente."

 fra_integration_of_new_territories: "Consolidamento del Paese"
 fra_integration_of_new_territories_desc: "La nostra influenza sugli altri Stati è innegabile. Perché non usare questo potere persuasivo per incorporarli direttamente nel nostro Paese?"

 fra_reliance_on_privateers: "Affidamento sui Corsari"
 fra_reliance_on_privateers_desc: "La concorrenza diretta con altre potenze marittime potrebbe essere dannosa per le nostre finanze. Dovremmo autorizzare la nostra flotta mercantile a saccheggiare e sequestrare le navi mercantili dei nostri nemici. Ciò non solo garantirebbe un reddito consistente al nostro Stato, ma comprometterebbe anche le economie marittime dei nostri rivali."

 fra_reformation_of_taxation: "Creazione di Recettes Générales"
 fra_reformation_of_taxation_desc: "Gli intendenti responsabili della riscossione delle tasse del popolo non saranno nominati dagli stati, ma direttamente dal nostro sovrano. In questo modo, garantiremo che questi funzionari siano fedeli solo al sovrano e raccolgano tutti i tributi dovuti."

 fra_school_of_fontainebleau: "Manierismo Settentrionale"
 fra_school_of_fontainebleau_desc: "Essendo una nazione molto arricchita dal $renaissance$, dovremmo investire nella creazione di un'estetica unica e distintiva francese. Invitando artisti stranieri nel nostro regno e sponsorizzando direttamente una scuola per la formazione degli artisti, saremo in grado di marcare qualsiasi opera artistica prodotta come identificabile con lo stile francese."

 vauban_fortifications: "Fortificazioni Innovative"
 vauban_fortifications_desc: "La nostra genialità nelle fortificazioni non rappresenta un cambiamento radicale nel loro design; piuttosto, l'innovazione deriva dalla collocazione delle fortezze. Sfruttando al massimo il terreno locale, anche la fortezza più semplice richiede più sforzi e rifornimenti per essere conquistata."

 the_philosophes: "I Filosofi"
 the_philosophes_desc: "Siamo orgogliosi di essere la patria di molti dei filosofi più rinomati di questi tempi illuminati. Questi pensatori producono un flusso costante di idee rivoluzionarie, che stimolano progressi in tutti i campi, dai più insignificanti ai più vitali."

 fra_expansion_of_france: "Rivendicazioni Storiche"
 fra_expansion_of_france_desc: "Facciamo risalire le origini della nostra nazione all'impero di Carlo Magno e possiamo quindi rivendicare tutte quelle terre come parte del nostro territorio legittimo. Con il sostegno di tribunali dedicati, saremo in grado di identificare e rivendicare tutto questo lungo territorio."

 liberty_egalite_fraternity: "Liberté, Egalité, Fraternité"
 liberty_egalite_fraternity_desc: "Con tutti gli uomini dichiarati uguali secondo le nostre nuove leggi, i seguaci di altre credenze sono finalmente autorizzati a partecipare pienamente al nostro governo e possono quindi contribuire al progresso nazionale."

 fra_code_civil: "Codice Civile"
 fra_code_civil_desc: "Dobbiamo sostituire il caotico mosaico di leggi che regolano il nostro Stato con un unico codice legale unificato che si applichi a tutta la nostra popolazione. Questo #italic Codice Civile#! servirà come fondamento del nostro governo e stabilirà un sistema giusto per tutti nel nostro regno."

 magna_carta_advance: "$magna_carta_reform$"
 magna_carta_advance_desc: "$magna_carta_reform_desc$"

 royal_navy: "Una Marina Reale"
 royal_navy_desc: "A partire dal 1495 circa, la monarchia del $tudor_dynasty$ investì ingenti somme non solo nelle navi, ma anche in vaste infrastrutture per la loro manutenzione e il loro supporto. Questo evento segnò per molti la fondazione ufficiale della Royal Navy."

 eltham_ordinance: "L'Ordinanza di Eltham"
 eltham_ordinance_desc: "Le Ordinanze di Eltham rappresentarono il primo tentativo dell'$ENG$ di snellire la burocrazia reale e renderla più flessibile ed efficiente in termini di costi. Le Ordinanze tentarono una riforma attraverso la riduzione delle spese della casa reale e il consolidamento di alcune funzioni burocratiche."

 secretaries_of_state: "Segretari di Stato"
 secretaries_of_state_desc: "Il monarca ha sempre avuto un segretario responsabile della corrispondenza reale. Questa posizione si è poi evoluta in quella di Segretario di Stato, un potente ministro che non solo trasmette i decreti reali, ma ha anche un alto livello di autorità amministrativa."

 navigation_acts: "Gli Atti di Navigazione"
 navigation_acts_desc: "Questi atti rappresentano l'apice del mercantilismo. Il commercio deve essere condotto con le nostre navi e passare prima attraverso i nostri porti, dove riscuoteremo i dazi doganali e qualsiasi altra tassa applicabile."

 eng_red_coats: "Giubbe Rosse"
 eng_red_coats_desc: "La vita nell'esercito inglese è estenuante e rigorosamente disciplinata, ma infonde in chi la vive un certo carattere. La natura imperturbabile delle nostre truppe, così come la loro competenza nell'uso delle armi da fuoco, incute timore nei cuori dei nostri nemici."

 eng_experimental_riflemen: "$a_experimental_riflemen$"
 eng_experimental_riflemen_desc: "$a_experimental_riflemen_desc$"

 sick_and_hurt_board: "La Tavola dei Malati e dei Feriti"
 sick_and_hurt_board_desc: "Questa istituzione si occupava del benessere dei marinai semplici arruolati nella Marina. Ha portato avanti una serie di riforme che hanno migliorato notevolmente la salute dei marinai in servizio."

 british_bill_of_rights: "Dichiarazione dei Diritti Inglesi"
 british_bill_of_rights_desc: "Una serie di riforme radicali che limitavano il potere reale, in particolare in materia giudiziaria. Tra le altre disposizioni, stabilivano che il monarca non potesse costituire eserciti in modo unilaterale, prescrivere pene crudeli e inusuali o interferire con la libera elezione dei membri del Parlamento."

 defense_of_the_faith: "Difesa della Fede"
 defense_of_the_faith_desc: "Siamo stati cacciati dal $acre$ e dal $CYP$, ma l'Ordine dell'Ospedale di San Giovanni non si ritirerà ulteriormente. In epoca pagana, un colosso faceva la guardia al porto di Rodi, ma oggi le più grandi fortificazioni che il mondo abbia mai conosciuto hanno preso il suo posto!"

 assistance_to_the_suffering: "Assistenza ai Sofferenti"
 assistance_to_the_suffering_desc: "Il nostro Ordine si chiama Cavalieri Ospedalieri per un motivo: in origine eravamo la forza protettiva di un ospedale per pellegrini in $jerusalem$. Sebbene il $jerusalem$ sia stato conquistato dai Saraceni, continuiamo a fornire assistenza medica a chi ne ha bisogno, compresi i nostri coraggiosi cavalieri, che tornano sul campo di battaglia molto più rapidamente della maggior parte degli eserciti."

 reconquista_of_the_sea: "Reconquista del Mare"
 reconquista_of_the_sea_desc: "Nei nostri frequenti scontri con feroci corsari stranieri, ci è venuto in mente che questi cani rognosi potrebbero avere ragione a saccheggiare e depredare la costa, ma stanno prendendo di mira gli obiettivi sbagliati. La pirateria può essere un peccato vile in tempo di pace, ma in tempo di guerra è conosciuta come "corsareria", e questa è tutta un'altra cosa."

 friends_in_need: "Amici in Difficoltà"
 friends_in_need_desc: "Il nostro Ordine è stato fondato da anime fedeli provenienti da ogni nazione della cristianità. Questo fatto, unito alla nostra necessità di sostegno esterno per portare a termine le nostre missioni, ci ha resi abili nel reclutare aiutanti per la nostra causa. Sfrutteremo la nostra onnipresenza in $europe$ per raggiungere le orecchie dei potenti governanti cattolici e convincerli a schierarsi dalla nostra parte."

 scourge_of_the_corsairs: "Il Flagello dei Corsari"
 scourge_of_the_corsairs_desc: "Il famoso corsaro turco Hayreddin Barbarossa ha combattuto molte battaglie leggendarie contro i Cavalieri, ma non è stato l'unico corsaro che abbiamo incontrato. Le incursioni e i saccheggi turchi in tutto il sud $europe$, tollerati dagli Stati barbareschi e finanziati dai turchi, devono finire. I Cavalieri faranno il loro dovere proteggendo i marinai innocenti a qualsiasi costo."

 crusader_tradition: "Tradizione Crociata"
 crusader_tradition_desc: "I Cavalieri del nostro Ordine furono presenti nelle guerre contro Saladino e difesero l'ultimo avamposto crociato d'Oltremare, il $acre$. Se qualcuno di noi ha bisogno di ispirazione per compiere azioni eroiche, deve solo guardare a ciò che i Cavalieri dell'Ordine Ospedaliero di San Giovanni hanno realizzato in passato. Il nome Cavalieri Ospedalieri è davvero eterno, così come il nostro famoso coraggio in battaglia."

 ecumenical_defenders_of_christendom: "Difensori Ecumenici della Cristianità"
 ecumenical_defenders_of_christendom_desc: "La Riforma ha danneggiato la nostra causa, poiché i cavalieri della $GER$ e del $scandinavian_region$ hanno iniziato a sollevare dubbi sulla natura dell'Ostia della Comunione, ma la minaccia sempre presente del $turkic_group$ fa sembrare tali dispute di minore importanza. Forse dovremmo concentrarci sulla difesa del regno e discutere di teologia una volta che la minaccia saracena sarà stata messa in sicurezza?"

 a_neverending_crusade: "Una Crociata Senza Fine"
 a_neverending_crusade_desc: "Finché qualsiasi fedele cattolico sarà in pericolo di persecuzione religiosa, la nostra missione non sarà finita! Che sia durante un pellegrinaggio alla Tomba del nostro Signore e Salvatore, o mentre attraversiamo i mari e respingiamo i corsari, non smetteremo mai di addestrarci e non riposeremo mai, pronti a lanciarci in combattimento in qualsiasi momento."

 inspired_builders: "Costruttori Ispirati"
 inspired_builders_desc: "Sebbene il compito principale del nostro Ordine sia combattere, serviamo il nostro popolo anche in altri modi. Nel corso dei secoli, abbiamo sviluppato l'arte della costruzione rapida, erigendo edifici e fortificazioni con notevole velocità. Useremo questa competenza per rendere la nostra capitale sia una fortezza inespugnabile, sia un dinamico centro culturale."

 the_right_hand_pope: "La Mano Destra del Papa"
 the_right_hand_pope_desc: "Con il passare del tempo e il progressivo svanire dei ricordi delle Crociate dalla memoria del nostro popolo, aumenta l'importanza di avere l'attenzione del Papa. Ci ingraziamo fino a diventare i confidenti più stretti del Sommo Pontefice. Naturalmente, la nostra devozione al suo servizio ci porterà enormi benefici: perché non godere dei privilegi conquistati con tanta fatica?"

 a_brand_new_world: "Un Mondo Nuovo di Zecca"
 a_brand_new_world_desc: "Il mondo evolve e chi non riesce ad adattarsi viene dimenticato dalla storia. Il nostro Ordine è sopravvissuto per oltre mezzo millennio e non scomparirà ora! I nostri corpi mortali finiranno per ricongiungersi al Creatore, ma il nostro Ordine deve prima diventare immortale. Ci trasformeremo nella nazione più moderna della nostra epoca, rafforzandoci dal profondo."

 an_order_with_state: "Un Ordine con uno Stato"
 an_order_with_state_desc: "Mentre alcune nazioni sono spesso descritte come un #italic Esercito con uno Stato#!, noi, d'altra parte, siamo sempre stati un Ordine con una nazione, sin dalla nostra acquisizione di Rodi dai Greci. Tuttavia, non possiamo fare a meno di ammirare l'efficienza con cui hanno sfruttato le loro risorse per diventare una nazione formidabile. Ispirati dal loro successo, attueremo delle riforme per garantire che il nostro esercito possa affrontare qualsiasi avversario con fiducia."

 local_merchant_preference: "Preferenza del Commerciante Locale"
 local_merchant_preference_desc: "In teoria, un mercante può essere cittadino del mondo e navigare da e verso qualsiasi porto desideri. Daremo dei vantaggi ai mercanti di casa, ad esempio la priorità per il carico e lo scarico del carico, per garantire che i nostri mercanti abbiano tutti gli incentivi per portare i loro prodotti a casa."

 association_with_unbelievers: "Associazione con i non Credenti"
 association_with_unbelievers_desc: "C'è chi ritiene che non dovremmo avere alcun rapporto con i non credenti. Abbiamo fatto molto per contrastare questa idea, poiché solo attraverso l'associazione con le nazioni pagane potremo commerciare con loro."

 port_security_improvement: "Miglioramenti alla Sicurezza del Porto"
 port_security_improvement_desc: "Per sfruttare appieno il potenziale finanziario del commercio, abbiamo bisogno che le navi e i loro carichi siano al sicuro quando attraccano nei nostri porti. Dobbiamo garantire che tutte le aree frequentate dai mercanti siano libere da piccoli reati."

 end_of_shipbuilding_guilds: "Fine delle Gilde di Costruttori Navali"
 end_of_shipbuilding_guilds_desc: "Da quando in $arabia$ si costruiscono navi, esistono corporazioni che ne controllano la produzione. Sebbene abbiano svolto un servizio prezioso nel mantenere vive le tradizioni della cantieristica navale, ora ostacolano il progresso. Dobbiamo aprire l'industria cantieristica navale a tutti coloro che hanno talento."

 skilled_captains: "Capitani Esperti"
 skilled_captains_desc: "Dobbiamo garantire che i nostri capitani soddisfino i più elevati standard di abilità marinaresca e conoscenza nautica, assicurandoci che siano in grado di sfruttare ogni vantaggio in tutte le situazioni."

 expansion_of_trade_contacts: "Espansione dei Contatti Commerciali"
 expansion_of_trade_contacts_desc: "Dobbiamo garantire che i nostri mercanti siano sempre i benvenuti ovunque vadano. Pertanto, useremo ogni mezzo possibile per assicurarci che tutti i governanti di cui siamo a conoscenza accolgano i nostri mercanti."

 unlock_gallowglass_advance: "$a_gallowglass$"
 unlock_gallowglass_advance_desc: "$a_gallowglass_desc$"

 unlock_reformed_gallowglass_advance: "$a_reformed_gallowglass$"
 unlock_reformed_gallowglass_advance_desc: "$a_reformed_gallowglass_desc$"

 unlock_late_gallowglass_advance: "$a_late_gallowglass$"
 unlock_late_gallowglass_advance_desc: "$a_late_gallowglass_desc$"

 scottish_salmon: "Conservazione del Salmone Scozzese"
 scottish_salmon_desc: "I nostri fiumi e le nostre coste sono ricchi di salmone. Con un'attenzione particolare e una legislazione rigorosa, saremo in grado di sfruttare questa risorsa e orientare la nostra economia locale verso l'esportazione di questo pesce molto ricercato."

 scottish_morale: "Il Coraggio Scozzese"
 scottish_morale_desc: "Dall'inizio della nostra guerra contro la tirannia inglese, abbiamo preservato la nostra indipendenza grazie agli sforzi coraggiosi del valoroso popolo scozzese. Il ricordo di uomini coraggiosi come William Wallace motiverà i nostri eserciti a difendere e proteggere l'indipendenza scozzese per sempre!"

 scottish_longbowmen: "Arcieri Anglo-Scozzesi"
 scottish_longbowmen_desc: "Ora che i nostri legami con l'$ENG$ sono stati rafforzati, incorporeremo alcune delle loro tattiche militari, trasformando le nostre unità in forze temibili."

 peel_towers_advance: "Torri di Peel"
 peel_towers_advance_desc: "Le Torri di Peel sono state sviluppate per mitigare i pericoli della vita nelle nostre zone di confine. Servono come protezione contro le incursioni di bande ostili, proteggendo sia le persone che il bestiame di valore, e sono un modo veloce per avvisare le città vicine dell'avvicinarsi di eserciti ostili, essendo un luogo elevato da cui accendere fuochi di segnalazione."

 scottish_tenacity: "Terra Tenace"
 scottish_tenacity_desc: "La guerra può essere un affare lungo e faticoso. Se vogliamo difendere la nostra indipendenza, dobbiamo essere pronti a sopportare tempi difficili. Fortunatamente, il nostro popolo è tenace come la terra che chiama casa e resiste agli invasori stranieri fino all'ultimo respiro."

 influx_of_english_nobles: "Amministratori Inglesi"
 influx_of_english_nobles_desc: "La pace con il nostro vicino meridionale ha portato a un costante afflusso di aristocratici inglesi nella nostra amministrazione. Questo ci permette di esercitare un controllo più efficace sul nostro paese."

 scottish_trade_connections: "Connessioni Commerciali del $north_sea$"
 scottish_trade_connections_desc: "Il nostro Paese è situato all'estremità del $western_europe$ ed è povero di risorse. Se vogliamo prosperare economicamente, dobbiamo investire ed espandere i nostri collegamenti commerciali verso regioni più lontane. Il $north_sea_area$ può collegarci a mercati ricchi e opportunità commerciali, a condizione che impariamo a sfruttarne il potenziale."

 comets: "Comete?"
 comets_desc: "Recentemente abbiamo ricevuto un nuovo tomo piuttosto curioso. Si intitola #italic Sul vero significato delle comete contro la vanità degli astrologi#! ed è pieno di informazioni fondamentali su queste entità altamente sospette. Abbiamo decretato che tutti nel regno debbano essere a conoscenza del suo contenuto."

 modernized_royal_scots_navy: "Marina Reale Scozzese"
 modernized_royal_scots_navy_desc: "Sin dalle Guerre d'Indipendenza, abbiamo cercato di rafforzare e modernizzare la nostra marina. In precedenza, avevamo utilizzato gli obblighi feudali per potenziare le nostre flotte con equipaggi e navi, ma ora creeremo una flotta moderna, di proprietà del Re e con base nel nostro porto di Newhaven."

 royal_revenue: "Affermare le Entrate Reali"
 royal_revenue_desc: "Se la $SCO$ vuole continuare a esistere in modo indipendente, dobbiamo garantirci fonti di reddito stabili. Rafforzando il nostro controllo sugli obblighi che ci spettano dai possedimenti reali e dalle proprietà feudali, possiamo aumentare le tasse che ci spettano di diritto. Attraverso questi metodi, possiamo garantire che la Corona disponga di fondi sufficienti per attuare la propria volontà senza dover fare affidamento su altre fonti di denaro."

 scottish_education: "Università Scozzese"
 scottish_education_desc: "Dopo aver inviato i nostri studiosi più brillanti a studiare nelle università straniere per molti anni, è giunto il momento di migliorare la nostra istruzione interna e di fornire un luogo qui in $SCO$ dove le menti più brillanti della nostra nazione possano imparare e crescere. Il nostro popolo dovrebbe sforzarsi di acquisire conoscenze e competenze preziose nel proprio paese, piuttosto che sprecare denaro in viaggi costosi e tempo in istituzioni straniere."

 act_of_revocation: "Atto di Revoca"
 act_of_revocation_desc: "È da tempo consuetudine donare parti del dominio reale alla nostra nobiltà come ricompensa per i loro servizi, ma questo sistema non può essere sostenuto se vogliamo garantire l'integrità del nostro dominio. d'ora in poi, insisteremo per affittare queste terre invece di cederle a titolo gratuito."

 scottish_diplomacy: "Alleanza Affidabile"
 scottish_diplomacy_desc: "Per secoli abbiamo fatto affidamento sulla diplomazia e sui contatti con le potenze straniere del continente per garantire la nostra indipendenza. È giunto il momento di formalizzare questa pratica e garantire la durata dei nostri legami per i secoli a venire."

 scottish_highlander_advance: "Costituire Reggimenti di Highlander"
 scottish_highlander_advance_desc: "Il reclutamento di reggimenti tra le popolazioni che vivono negli altopiani scozzesi può essere una misura cruciale per i nostri sforzi militari."

 scottish_whisky: "Whisky Scozzese"
 scottish_whisky_desc: "Sebbene le distillerie esistano in $SCO$ da molto tempo, dovremmo garantire che queste industrie siano finalmente poste sotto il controllo dello Stato. Questa supervisione ci consentirà di affermarci all'avanguardia nella produzione di alcolici e di espandere la nostra industria di esportazione."

 scottish_enlightenment: "Illuminismo Scozzese"
 scottish_enlightenment_desc: "I rapidi progressi nella filosofia, nell'economia politica e nella medicina hanno portato a una miriade di risultati raggiunti dai nostri connazionali che proietteranno la $SCO$ all'avanguardia dell'innovazione globale. Questo periodo di illuminismo scozzese può essere uno strumento molto potente per noi sulla scena mondiale."

 swabian_league_of_cities: "Lega delle Città"
 swabian_league_of_cities_desc: "La $SWA$ ospita molte città ricche, che sono obiettivi ambiti per le ambizioni straniere. Per proteggere meglio la nostra nazione, dovremmo unirci in tempo di guerra e combattere insieme contro le incursioni straniere."

 swabian_frugal_people: "Finanze Frugali"
 swabian_frugal_people_desc: "Molti hanno accusato il nostro popolo di avarizia e hanno riso del nostro buon senso di cautela economica. Fortunatamente, non possiamo sentire le loro derisioni sopra il suono di tutti questi ducati che tintinnano nella nostra borsa."

 franconian_proud_knights: "Cavalieri dell'impero"
 franconian_proud_knights_desc: "Il nostro popolo ha dedicato una lunga stirpe di fieri cavalieri al servizio dell'Impero. Essi incarnano ideali cavallereschi che sono diventati meno comuni nel corso del tempo, ma che rimangono una parte essenziale della nostra identità. Abbiamo una lunga storia a cui attingere per una corretta educazione sia nella condotta cavalleresca che nelle questioni militari. Questa tradizione dei cavalieri imperiali aumenta naturalmente la disponibilità della nostra classe nobiliare a contribuire con le leve militari nella speranza di conquistare la gloria in combattimenti onorevoli."

 franconian_wine_bottles: "Silvaner e Bocksbeutel"
 franconian_wine_bottles_desc: "La #italic bocksbeutel#! è una parte importante delle nostre tradizioni vinicole. Facilmente riconoscibile, la forma di questa bottiglia funge da ambasciatrice dei meravigliosi vini prodotti nella nostra regione, come il Silvaner o il Riesling. Il talento esemplare dei nostri vetrai e viticoltori ci porterà sicuramente vantaggi economici."

 westphalian_monastic_traditions: "La Terra dei Monasteri"
 westphalian_monastic_traditions_desc: "Il $north_german_region$ ospita molte roccaforti cattoliche, come i vescovadi di $munster$ e $paderborn$. La vita monastica e le tradizioni religiose regionali ad essa associate hanno un effetto generalmente positivo sull'alfabetizzazione e l'istruzione del nostro clero, poiché vi sono molte opportunità per loro di approfondire la propria formazione. Questo accesso all'istruzione aiuta anche la Santa Madre Chiesa, creando un gregge intellettuale ben adatto ai doveri sacerdotali."

 north_german_hanseatic_traditions: "Mercanti Anseatici"
 north_german_hanseatic_traditions_desc: "Il popolo del $north_german_region$ ha a lungo goduto dei vantaggi derivanti dall'accesso al Mar Baltico. Mentre molti dei nostri vicini meridionali devono accontentarsi di utilizzare i fiumi per il trasporto delle merci, i nostri commercianti hanno una lunga tradizione di navigazione nel Baltico per fare fortuna, riportando sulle nostre coste ricchezze invidiabili."

 german_baltic_sailors: "Marinai del Baltico"
 german_baltic_sailors_desc: "I climi rigidi generano persone resistenti. Attraversare il freddo Mar Baltico ha sicuramente lasciato il segno sui nostri marinai, rendendoli mentalmente resistenti e particolarmente abili nella loro professione. Questo è a loro vantaggio, poiché il mare può essere una padrona spietata."

 german_populating_the_countryside: "Attirare le Persone Giuste"
 german_populating_the_countryside_desc: "Incoraggiare l'insediamento nelle zone rurali e dare alla gente la terra da lavorare sarà un'ottima base per aumentare lentamente ma inesorabilmente la ricchezza e la produttività dei nostri territori meno popolati."

 german_fair_towns: "Reichsmessestädte"
 german_fair_towns_desc: "Le fiere imperiali sono un privilegio raro concesso solo ad alcune città selezionate, che danno vita ad alcuni dei più grandi mercati d'$europe$ e rendono queste città il cuore commerciale del $hre$. La natura centralizzata di questi mercati consente ai commercianti di pianificare e negoziare in modo efficace in un contesto in cui possono beneficiare della libertà e dell'accesso a una grande varietà di merci."

 german_imperial_roads: "Rete Stradale Imperiale"
 german_imperial_roads_desc: "Sin dall'epoca romana, le reti stradali hanno collegato luoghi in tutta la $GER$, rendendo il commercio e i viaggi più facili e accessibili. Queste strade offrono anche vantaggi logistici fondamentali, in particolare per lo spostamento delle truppe."

 landsknechte: "Landsknechte"
 landsknechte_desc: "Le continue guerre della $GER$ hanno dato vita a un nuovo tipo di organizzazione militare: il $landsknechte$, che assume la forma di truppe miste composte da innovativi quadrati di picchieri, con archibugieri a supporto sui fianchi e una linea frontale composta dai famigerati #italic Doppelsöldner#!, "uomini a doppia paga", armati di spade a due mani. Ciò consente tattiche che combinano combattimenti ravvicinati e a media distanza."

 german_biedermeier: "Biedermeier"
 german_biedermeier_desc: "Il periodo Biedermeier segna un cambiamento nel conservatorismo sociale derivante dalle classi superiori e dalla loro nostalgia per il tempo in cui detenevano la maggiore influenza e il potere nel nostro paese. Questo cambiamento sociale ha portato i nostri cittadini più liberi di pensiero a nascondere le loro attività creative e intellettuali in relativa segretezza, ben lontane dallo sguardo disapprovante dell'opinione pubblica. Sebbene ciò rafforzi inavvertitamente lo sviluppo di un'identità culturale tra i nostri mercanti, ha anche costretto molte menti preziose a lasciare la nostra nazione, alla ricerca delle loro libertà perdute e portando con sé il loro talento altrove."

 custom_union_of_the_rhine: "Rheinischer Münzverein"
 custom_union_of_the_rhine_desc: "Nel vasto mosaico del nostro grande impero, la cooperazione e la collaborazione tra gruppi vicini è fondamentale per la salute della nostra economia. Aderiremo all'unione doganale del Reno e adotteremo le loro monete #italic gulden#! per rendere meno complicate le transazioni commerciali per i nostri mercanti e semplificare la nostra diplomazia internazionale."

 lub_hanseatic_coins: "Wendischer Münzverein"
 lub_hanseatic_coins_desc: "Organizzazione di recente fondazione tra città con una forte presenza anseatica, il Trattato monetario wendico ci fornirà una solida base per facilitare il commercio e gli scambi nelle nostre terre."

 hamburg_port_cities: "Reti Portuali"
 hamburg_port_cities_desc: "Il nostro paese sopravvive grazie ai suoi forti legami con il commercio marittimo e al costante scambio di merci. Per mantenere un porto ordinato, dovremo dragare nuovi corsi d'acqua e costruire più banchine e magazzini, attirando nuovi mercanti e le loro navi."

 saiger_process: "Processo Saiger"
 saiger_process_desc: "Un nuovo e rivoluzionario processo di fusione, che arricchisce il rame contenente argento con il piombo, ci permetterà di aumentare la produttività delle nostre operazioni minerarie."

 german_river_toll_castle_advance: "$german_river_toll_castle$"
 german_river_toll_castle_advance_desc: "$german_river_toll_castle_desc$"

 german_mountain_toll_castle_advance: "$german_mountain_toll_castle$"
 german_mountain_toll_castle_advance_desc: "$german_mountain_toll_castle_desc$"

 austrian_tradition: "Una Casata Gloriosa"
 austrian_tradition_desc: "La nostra ascesa al potere ci ha resi oggetto di grande invidia e le casate rivali del $hre$ competono per la nostra posizione di protettori del confine sud-orientale. Nonostante queste circostanze, siamo orgogliosi di eseguire manovre diplomatiche che non hanno eguali."

 austrian_heritage: "Eredità di Rodolfo I"
 austrian_heritage_desc: "La vittoria di Rodolfo I sui suoi rivali ha assicurato il nostro posto tra le grandi casate del $hre$ ed è oggetto di molti racconti e canzoni. Il fervore dimostrato da lui e dai suoi cavalieri nella battaglia sul Marchfeld ispirerà le nostre truppe per secoli a venire."

 hab_expert_mountaineers: "Terra di Montagne e Fiumi"
 hab_expert_mountaineers_desc: "Il nostro popolo è altamente adattato ad attraversare gli ostacoli del nostro Paese, dalle alte vette e dai passi delle nostre montagne agli ampi fiumi delle nostre valli."

 austrian_marriage_policy: ""Tu Felix Austria Nube""
 austrian_marriage_policy_desc: ""Lascia che gli altri facciano la guerra; tu, felice $HAB$, sposati! Perché ciò che Marte dà agli altri, Venere lo dà a te: regni"."

 habsburg_dominance: "Competenza Diplomatica Austriaco"
 habsburg_dominance_desc: "Data la nostra posizione al centro di tutto l'$europe$, dobbiamo adottare un atteggiamento altamente flessibile nei confronti della diplomazia estera. Le alleanze e le rivalità possono frantumarsi con la stessa facilità con cui si formano, e i nostri diplomatici devono essere addestrati a coprire ogni possibile posizione."

 austrian_military_flexibility: "Tattiche dei Lanzichenecchi"
 austrian_military_flexibility_desc: "Solo tattiche ben equilibrate di shock dell'artiglieria, cariche di cavalleria e fanteria inflessibile reclutata dal $landknechte$ possono condurci alla vittoria."

 edict_of_restitution: "Editto di Restituzione"
 edict_of_restitution_desc: "Un po' di contabilità ci aiuterà a superare qualsiasi conflitto religioso che potrebbe colpire il nostro regno. Questo innocuo editto non scatenerà sicuramente ulteriori conflitti."

 austrian_court: "Corte Austriaca"
 austrian_court_desc: "Mantenere le nostre relazioni diplomatiche richiede tempo e impegno, e dedicare troppe persone alle missioni diplomatiche potrebbe influire negativamente sulla nostra efficienza e danneggiare la nostra reputazione. L'approccio snello della corte austriaca ci assicura di inviare gli inviati giusti al momento giusto e di raccogliere comunque le informazioni di cui abbiamo bisogno senza sovraccaricare le nostre risorse diplomatiche."

 geheimrat: "Geheimer Rat"
 geheimrat_desc: "Il #italic Geheimer Rat#! è un organo consultivo d'élite composto da nobili e funzionari di alto rango, che funge da istituzione centrale per guidare le nostre decisioni politiche, militari e amministrative."

 hofkriegsrat: "Hofkriegsrat"
 hofkriegsrat_desc: "Il nostro consiglio di guerra può funzionare solo con una struttura burocratica adeguata. Solo quando conosciamo ogni dettaglio delle nostre truppe e della nostra logistica possiamo difendere il nostro regno dagli invasori ostili."

 military_border: "Frontiera Militare"
 military_border_desc: "La difesa delle nostre frontiere è una questione seria e comporta una notevole pressione finanziaria sullo Stato. La soluzione che abbiamo trovato è quella di concedere generose sovvenzioni sui terreni di frontiera al fine di costituire una classe militare professionale. Ciò garantirà una maggiore disciplina generale e faciliterà la migrazione verso le regioni sottopolulate del nostro regno."

 austrian_ambition: "Illuminazione Attraverso l'Istruzione"
 austrian_ambition_desc: "I nostri governanti devono ricevere la migliore educazione possibile per essere all'altezza dell'ideale del monarca illuminato."

 austrian_state_industrialization: "Industrializzazione dello Stato"
 austrian_state_industrialization_desc: "La modernizzazione industriale deve sempre essere una priorità per la nostra amministrazione. Solo attraverso la produzione moderna possiamo competere con i nostri rivali sulla scena globale."

 wiener_klassik: "Wiener Klassik"
 wiener_klassik_desc: "Il classicismo viennese è una forza trasformativa nella musica. Le opere dei nostri migliori compositori rivoluzioneranno la tradizione musicale occidentale attraverso innovazioni audaci e all'avanguardia negli arrangiamenti sinfonici, operistici e da camera."

 multicultural_empire: "Impero Multiculturale"
 multicultural_empire_desc: "L'$HAB$ è un regno diversificato e multiculturale, impegnato ad accogliere e integrare le sue numerose minoranze etniche per mantenere l'unità e la stabilità in un contesto di crescenti tensioni nazionalistiche."

 imperial_artillery: "Artiglieria Imperiale"
 imperial_artillery_desc: "La natura in rapida evoluzione della guerra ci spinge a modernizzare le nostre truppe e le nostre tattiche. Per stare al passo con i nostri nemici, faremo della nostra artiglieria l'orgoglio dell'esercito imperiale."

 alchemy_advance: "Alchimia"
 alchemy_advance_desc: "L'arte dell'alchimia prevede la creazione di pozioni ed elisir utilizzando una combinazione di erbe, minerali e altri ingredienti naturali. Anche se non sempre affidabile, l'uso dell'alchimia può talvolta produrre risultati notevoli nel trattamento di vari disturbi."

 anatomy_advance: "Anatomia"
 anatomy_advance_desc: "I medici stanno sviluppando una comprensione più avanzata del corpo umano, che sta portando a trattamenti più efficaci per lesioni e malattie. Questa conoscenza, in gran parte ricavata da dissezioni pratiche di cadaveri umani, sta anche contribuendo a migliorare le tecniche chirurgiche e a ridurre i rischi delle procedure mediche."

 surgery_advance: "Chirurgia"
 surgery_advance_desc: "I barbieri-chirurghi stanno sviluppando tecniche più sofisticate per il trattamento di lesioni e malattie, e l'invenzione di nuovi strumenti chirurgici rende le procedure più sicure ed efficaci. Di conseguenza, i pazienti sopravvivono a lesioni e malattie che solo pochi anni fa sarebbero state fatali."

 pharmacology_advance: "Farmacologia"
 pharmacology_advance_desc: "Alchimisti e medici stanno esplorando nuovi composti e miscele chimiche alla ricerca di rimedi. Alcuni di questi primi farmacisti hanno sviluppato trattamenti per malattie comuni come febbre, raffreddore e problemi digestivi, e i loro metodi sono promettenti per il futuro. Tuttavia, c'è ancora molto da imparare e molti di questi nuovi rimedi possono essere pericolosi se non preparati correttamente."

 sanitation_advance: "Igiene"
 sanitation_advance_desc: "Gli insediamenti stanno investendo in misure igienico-sanitarie migliori, come lo smaltimento dei rifiuti e i sistemi di acqua pulita. Questo ridurrà la diffusione delle malattie e migliorerà la salute generale della popolazione. Lo sviluppo di pratiche igienico-sanitarie moderne consentirà alle persone di vivere a stretto contatto senza contrarre malattie."

 vaccination_advance: "Vaccinazione"
 vaccination_advance_desc: "Con lo sviluppo dei vaccini, i medici sono in grado di fornire alla popolazione l'immunità contro le malattie mortali. Questi vaccini aiutano a ridurre la diffusione delle malattie e a prevenire le epidemie. Iniettando nel corpo una piccola quantità di batteri o virus indeboliti o morti, il sistema immunitario è in grado di riconoscere e combattere la malattia se la incontra di nuovo."

 vibrant_court_advance: "Corte Vibrante"
 vibrant_court_advance_desc: "Grandi menti affollano la nostra corte da tutto il mondo conosciuto, portando con sé lingue, mode e arte diverse. Come risultato di questa esposizione, siamo diventati più accoglienti nei confronti dei loro 'costumi' stranieri."

 patio_process_advance: "Processo di Patio"
 patio_process_advance_desc: "Il $patio_process_advance$ consiste in un metodo di raffinazione di minerali di argento e oro di bassa qualità con una soluzione chimica a base di mercurio per catalizzare la reazione di amalgamazione."

 pan_amalgamation_advance: "Amalgamazione in Cuve"
 pan_amalgamation_advance_desc: "Il $pan_amalgamation_advance$ è un miglioramento del $patio_process_advance$ che accelera la lavorazione."

 milanese_tradition: "Patrimonio del $lombard$"
 milanese_tradition_desc: "La gloria e l'influenza del Regno del $lombard$ sono ancora oggi tangibili. In quanto loro chiari eredi spirituali, i nobili del $MLO$ godono di un grado di autorità e rispetto superiore rispetto ai loro pari."

 milanese_heritage: "Tradizione dei Condottieri"
 milanese_heritage_desc: "Il popolo di $MLO# è abituato a combattere come mercenari nelle continue dispute che affliggono la regione, guadagnandosi la reputazione di soldati molto abili."

 renaissance_prince: "Principe del $renaissance$"
 renaissance_prince_desc: "Altri sovrani dell'$italy_region$ possono professare a parole il loro sostegno alla rinascita culturale che si manifesta davanti ai nostri occhi; lasciamo che il $MLO$ emerga come suo cuore sotto il nostro patrocinio."

 patron_of_music: "Patrono della Musica"
 patron_of_music_desc: "Le arti musicali sono state tristemente trascurate dagli altri principi. Noi, al contrario, proteggeremo la musica per la gloria di Dio e nostra, e il $MLO$ risplenderà di conseguenza."

 lowered_power_of_barons: "Potere Baronale Ridotto"
 lowered_power_of_barons_desc: "L'arte e la cultura sono cose preziose, ma se vogliamo rimanere indipendenti, ciò di cui abbiamo davvero bisogno è #italic denaro#!. Per ottenere ciò di cui abbiamo bisogno, dobbiamo diminuire il potere della nobiltà regionale e garantire che più denaro affluisca al centro del nostro Stato."

 age_of_condottieri: "L'Età dei Condottieri"
 age_of_condottieri_desc: "Con i mercenari che costituiscono il pilastro di così tanti eserciti, sarebbe saggio assicurarci di avere anche noi soldati di ventura a nostra disposizione. Facciamo in modo che i capitani mercenari di passaggio siano accolti calorosamente in $MLO$, così che si ricordino di noi con affetto quando avremo bisogno di loro."

 encouragement_of_philosophers: "Incoraggiamento dei Filosofi"
 encouragement_of_philosophers_desc: "Noi in $MLO$ siamo da tempo sostenitori del pensiero $renaissance$. Dovremmo continuare questa tradizione estendendo il nostro patrocinio e costruendo strutture per i migliori pensatori di tutto l'$europe$. Si spera che questo li attiri qui."

 merchant_princes: "Principi Mercanti"
 merchant_princes_desc: "Le grandi città costiere dell'$ITA$ hanno beneficiato a lungo di grandi reti commerciali che hanno portato ricchezza e potere alle loro coste. Il nostro Paese non si trova sulla costa, ma ciò non significa che il $MLO$ non possa ottenere la sua parte del commercio marittimo. Si sappia che qualsiasi commerciante facoltoso che si avventuri e riporti le ricchezze del mondo sarà guardato con favore alla corte del $MLO$."

 rulership_of_enlightened_principals: "Il Governo Attraverso Principi Illuminati"
 rulership_of_enlightened_principals_desc: "I filosofi illuministi hanno ispirato nuove teorie di governo. Strutturando il nostro governo secondo i principi del merito, della giustizia e dell'efficienza, godremo di un maggiore sostegno. Almeno tra coloro che contano davvero..."

 milanese_ambition: "Un Nuovo Regno Lombardo"
 milanese_ambition_desc: "La gloria del precedente Regno Lombardo impallidisce se paragonata a ciò che il popolo di $MLO$ è riuscito a ottenere e a ciò che ha ancora diritto di ricevere. Tutti si inchineranno davanti a noi!"

 pap_head_of_the_church: "Capo della Chiesa"
 pap_head_of_the_church_desc: "La Curia e la Santa Sede sono strettamente intrecciate con il governo romano. I cardinali di altre nazioni e stati potrebbero cercare di influenzare le tendenze teologiche del Cristianesimo, ma alla fine, è $PAP$ che avrà sempre la massima influenza nella Curia."

 pap_the_word_of_the_lord: "La Parola del Signore"
 pap_the_word_of_the_lord_desc: "In qualità di suoi servitori più fedeli, i suoi vescovi più santi, siamo noi a leggere e interpretare la Parola del Signore. In quanto tali, la nostra diplomazia è sostenuta dalla divinità di Dio."

 ecclesiastical_primacy: "Primato Ecclesiastico"
 ecclesiastical_primacy_desc: "Il Papa ha l'autorità sovrana di stabilire il canone religioso e la legge nella Chiesa cattolica. Lo Stato condivide un rapporto speciale con coloro che si conformano alla volontà dell'autorità cattolica."

 papal_investiture_and_tithes: "Investitura e Decime Romane"
 papal_investiture_and_tithes_desc: "A $rome$ affluiscono le ricchezze dell'$europe$ cristiana."

 glory_of_rome: "Gloria del $rome$"
 glory_of_rome_desc: "Noi controlliamo la grande città e l'antica capitale dei Romani. Siamo gli unici custodi della loro meravigliosa tradizione!"

 donation_of_constantine: "Donazione di Costantino"
 donation_of_constantine_desc: "La Donazione di Costantino dimostra la nostra autorità di conferire il titolo di Imperatore dei Romani a chiunque scegliamo. Potrebbe anche dimostrare che siamo piuttosto bravi a falsificare documenti."

 centralize_the_states: "Centralizzare gli Stati"
 centralize_the_states_desc: "Consolideremo il nostro potere nelle province romane sottraendo l'autorità ai principi locali."

 holy_father: "Il Santo Padre"
 holy_father_desc: "Essere il vicario di Dio per i fedeli cattolici romani, ci garantisce un certo margine di manovra politico. Le bolle papali, documenti recanti il sigillo ufficiale del Papa, hanno il peso della parola stessa di Dio. Con esse sono stati maledetti sovrani e divisi interi continenti."

 pap_legacy_of_the_military_orders: "Eredità degli Ordini Militari"
 pap_legacy_of_the_military_orders_desc: "Sebbene l'era degli Ordini Sacri sia giunta da tempo al termine, la sua eredità rimane ancora una fonte di ispirazione importante per i soldati di Dio che giurano di difendere la Santa Sede dai pagani e dall'eresia."

 teu_crusader_discipline: "Disciplina dei Crociati"
 teu_crusader_discipline_desc: "Il nostro grande ordine è stato forgiato nelle fiamme e nel sangue della Terza Crociata durante l'assedio di $acre$ nel 1191. Mentre in origine curavamo i malati e i deboli, l'ordine si è trasformato in un gruppo militarizzato di cavalieri dalla devozione e dalla disciplina infrangibili."

 teu_teutonic_heavy_cavalry: "Cavalleria Pesante Teutonica"
 teu_teutonic_heavy_cavalry_desc: "Non c'è simbolo più grande di potere e abilità militare della cavalleria pesante. Mentre per molti stati la cavalleria è composta da nobili, ogni cavaliere teutonico è anche membro della nostra cavalleria pesante e viene sottoposto al rigoroso addestramento di un crociato."

 teu_reformed_order_army: "Esercito dell'Ordine Riformato"
 teu_reformed_order_army_desc: "I cavalieri Tedeschi e i veterani delle crociate e di altre guerre non sono semplicemente abbastanza numerosi da rimanere la base dei nostri eserciti. Dobbiamo riorganizzare l'esercito per incorporare le leve nazionali, reggimenti in grado di sostituire i cavalieri sul campo di battaglia."

 teu_peasants_recruitment: "Reclutamento dei Contadini"
 teu_peasants_recruitment_desc: "Ci è ormai chiaro che non possiamo più fare affidamento sui volontari stranieri per riempire i ranghi del nostro esercito, per quanto esperti e preziosi possano essere. Svilupperemo invece un sistema che ci consentirà di reclutare i nostri sudditi, sia Tedeschi che non $GER-ADJ$."

 teu_infantry_tactics: "Tattiche di Fanteria"
 teu_infantry_tactics_desc: "Le battaglie contemporanee in $europe$ hanno dimostrato che l'era della fanteria sta per iniziare. È giunto il momento di sviluppare nuove tattiche, adottare l'uso della picca e riformare il nostro concetto medievale di fanteria ausiliaria trasformandola nella principale forza combattente dei nostri eserciti futuri."

 teu_teutonic_religious_authority: "Autorità Religiosa Teutonica"
 teu_teutonic_religious_authority_desc: "Metteremo fine alla debole autonomia religiosa dei vescovi locali all'interno del nostro regno. Tutte le questioni religiose, dalla tassazione alla conversione della popolazione, saranno d'ora in poi di competenza dello Stato."

 teu_expanded_marches: "Marce Ampliate"
 teu_expanded_marches_desc: "Concedere autonomia ai governatori locali delle nostre regioni di confine e riformare i loro possedimenti in marche. Queste zone speciali pagheranno meno tasse allo Stato in cambio dell'obbligo di mantenere la massima prontezza al combattimento sia in tempo di guerra che in tempo di pace. Ciò dovrebbe garantirci una notevole flessibilità militare a costi contenuti."

 teu_prussian_bishops: "Vescovi del $prussian$"
 teu_prussian_bishops_desc: "Concederemo ulteriori diritti e privilegi ai nostri vescovi del $prussian$, assicurandoci la loro lealtà in tutte le questioni."

 teu_one_state_one_religion: "Uno Stato, Una Religione"
 teu_one_state_one_religion_desc: "Riservare tutte le cariche statali solo a coloro che seguono la nostra religione. Gli eretici e i pagani non sono più i benvenuti nel nostro regno."

 teu_absolute_order: "Ordine Assoluto"
 teu_absolute_order_desc: "Tutti i poteri dello Stato sono consolidati nel nostro ordine. Ogni azione intrapresa e ogni decisione presa passa prima attraverso la gerarchia dell'Ordine Teutonico prima di essere eseguita. Naturalmente, questa burocrazia non è gradita a tutti, ma garantisce il potere assoluto dell'#italic Hochmeister#!."

 legacy_of_breton_independence: "L'eredità dell'indipendenza del $breton$"
 legacy_of_breton_independence_desc: "Il $brittany_area$ non ha mai fatto veramente parte della $FRA$ Sebbene in passato siamo stati devastati dai Franchi, dai Vichinghi e dagli Inglesi, finora abbiamo mantenuto la nostra identità unica come popolo. Che tutti i nostri vicini sappiano che la $BRI$ rimarrà per sempre libero, l'ultimo baluardo delle vere tradizioni galliche!"

 estates_of_brittany: "Gli Stati della $BRI$"
 estates_of_brittany_desc: "Convocati per la prima volta nel XIV secolo, gli Stati della $BRI$ consentivano agli uomini liberi di tutti i ceti sociali, compreso il Terzo Stato, di condividere le loro lamentele e presentare petizioni al sovrano per ottenere riparazione. Convocando gli Stati, possiamo mitigare alcune delle tensioni che si avvertono in tutto il nostro dominio."

 dutch_education: "Educazione Olandese"
 dutch_education_desc: "Sebbene il nostro popolo abbia sempre goduto di tassi di alfabetizzazione superiori a tutti i livelli della società, questo vantaggio sta diventando sempre più evidente nel mondo che sta prendendo forma davanti ai nostri occhi. Solo chi ha una comprensione limitata non approfitterebbe di questo vantaggio per aumentarlo."

 dutch_golden_age_art: "Arte Olandese"
 dutch_golden_age_art_desc: "$common_string_prefix_article$ I $NED$ è stato storicamente all'avanguardia nel progresso tecnologico e culturale. Dobbiamo continuare a patrocinare inventori, artisti e scrittori per mantenere il nostro vantaggio sulle altre nazioni."

 a_trading_hub: "Un Polo Commerciale"
 a_trading_hub_desc: "La nostra nazione ha la fortuna di avere un centro ben consolidato di città incentrate sul commercio e marinai avventurosi disposti a portare a casa ricchezze da tutto il mondo. Questi navigatori saranno un ottimo modo per commerciare con altre nazioni e realizzare profitti significativi."

 platoon_fire: "Fuoco di Plotone"
 platoon_fire_desc: "Il fuoco di fila standard prevedeva che ogni fila sparasse in una sola volta per massimizzare la potenza di fuoco. Ma noi abbiamo sviluppato un sistema diverso di fuoco a plotoni, con l'idea che una parte del reggimento sparasse sempre al nemico mentre gli altri ricaricavano e si preparavano per la salva successiva. Questo eliminava il tempo tra un attacco e l'altro che il nemico poteva usare per riprendersi o ottenere un vantaggio."

 concentration_power: "Concentrazione del Potere"
 concentration_power_desc: "Per troppo tempo la nostra nazione è stata governata in modo diseguale da più #italic statthalter#! in diverse province, con il più potente che agiva come #italic primus inter pares#! tra i suoi pari. È ora di rendere la carica ereditaria e concentrare l'autorità in un unico sovrano."

 a_fortified_border: "Un Confine Fortificato"
 a_fortified_border_desc: "I nostri confini non sono ben difesi da caratteristiche naturali, come nel caso di altre nazioni. Tuttavia, abbiamo intelligenza e saggezza in abbondanza, sufficienti per costruire le fortificazioni più potenti possibili per scoraggiare i nostri nemici e proteggere le nostre famiglie."

 netherlandish_protoindustry: "Verlagssystem Olandese"
 netherlandish_protoindustry_desc: "Da molto tempo, la nostra terra ospita città e paesi vivaci con una concentrazione di artigiani superiore a quella dei nostri vicini. Questa caratteristica ci ha resi una nazione altamente produttiva."

 a_dynamic_society: "Una Società Dinamica"
 a_dynamic_society_desc: "Le nostre terre sono un paradiso per gli audaci. Coloro che cercano di migliorare la propria vita troveranno qui delle opportunità e noi, a nostra volta, sfrutteremo il talento di questi individui ambiziosi per rafforzare la nostra nazione."

 an_early_urbanization: "Urbanizzazione Precoce"
 an_early_urbanization_desc: "I Paesi Bassi hanno tradizionalmente avuto un alto tasso di urbanizzazione, che ci ha permesso di raggiungere un potere superiore a quello che molti potrebbero aspettarsi. Dovremmo accelerare questa tendenza creando una solida rete di insediamenti prosperi che possano aiutarci a creare un futuro più ricco."

 polders_advance: "I Bacini Idrografici"
 polders_advance_desc: "I Paesi Bassi sono altamente soggetti alle inondazioni e le numerose alluvioni disastrose verificatesi tra l'XI e il XIV secolo hanno portato alla creazione dello Zuiderzee. Queste inondazioni eccessive hanno anche causato l'insalinizazione dei terreni costieri, rendendoli inutilizzabili. Fortunatamente, ora disponiamo della tecnologia per bonificare questi terreni danneggiati e utilizzarli in modo produttivo per l'agricoltura."

 netherlandish_ship_building: "Costruzione Navale Olandese"
 netherlandish_ship_building_desc: "Poiché i Paesi Bassi ospitano alcune delle più grandi città portuali d'$europe$, è logico che vantino anche alcuni dei più grandi cantieri navali. La possibilità di impiegare artigiani locali qualificati riduce drasticamente i costi di acquisto di nuove flotte mercantili."

 brb_the_four_quartiers: "I Quattro Quartieri"
 brb_the_four_quartiers_desc: "I Quattro Quartieri sono le quattro province in cui è diviso il cuore del $BRA$. Ogni quartiere è formato da un satellite di città grandi e piccole, alcune fortificate e altre no. Tutte lavorano in perfetta sinergia come un motore ben oliato, riempiendo le nostre casse di grandi ricchezze."

 fla_cloth: "$cloth$ Fiamminghi"
 fla_cloth_desc: "L'industria fiamminga dei $cloth$ è invidiata dal resto del mondo. I mercanti vengono da lontano per vendere il loro $wool$ in $FLA$, dove produciamo $cloth$ della migliore qualità."

 frisian_trading_traditions: "Tradizioni del Commercio"
 frisian_trading_traditions_desc: "Molto prima che le contee a sud di noi sviluppassero le proprie rotte, i nostri antenati dominavano il commercio costiero in $europe$, dal Baltico al Golfo di Biscaglia. Dobbiamo far rivivere questa antica competenza marittima per riconquistare la posizione che ci spetta."

 gel_warring_spirit: "Uno Spirito in Guerra"
 gel_warring_spirit_desc: "Alcuni potrebbero definirci bellicosi, ma solo perché temono la nostra potenza. Un esercito permanente ben addestrato è essenziale per sopravvivere in quest'epoca caotica. I nostri avversari impareranno presto a rispettare il nostro spirito temprato."

 hai_expert_embassadors: "Ambasciatori Esperti"
 hai_expert_embassadors_desc: "I nostri governanti sono sempre stati abili con le parole e la loro abilità diplomatica ha stabilito la loro influenza ben oltre i confini nazionali. Con il passare del tempo e l'intensificarsi delle pressioni geopolitiche, dobbiamo iniziare a coltivare l'amicizia con altre nazioni per proteggerci, espandendo al contempo la nostra sfera di influenza."

 hol_sailors: "Marinai Olandesi"
 hol_sailors_desc: "Terra di sabbie e terreni allagati, il popolo dell'$HOL$ ha sempre considerato il mare come la sua seconda casa naturale, dove risorse abbondanti e avventure gloriose attendono coloro che hanno il coraggio di perseguire i propri obiettivi."

 lie_athens_north: "Atene del Nord"
 lie_athens_north_desc: "Il $liege$ è stato per secoli un centro culturale, patria dei più celebri studiosi della regione e invidiato dai nostri rivali. Ma non dobbiamo permetterci di adagiarci sugli allori; non dobbiamo mai smettere di migliorare le nostre istituzioni."

 lux_destined_rule: "Destinato a Governare"
 lux_destined_rule_desc: "La grande dinastia lussemburghese, il cui nome deriva proprio da quello della nostra nazione, è ora la famiglia più importante dell'$europe$. Questo deve essere un segno del Cielo e useremo questa benedizione divina per estendere ulteriormente la nostra influenza."

 utr_city_churches: "La Città delle Chiese"
 utr_city_churches_desc: "$utrecht$, spesso chiamato la #italic Città delle Chiese#!, ospita l'iconica Torre del Duomo. Centro spirituale dei $NED$ e sede del vescovado di Utrecht, è stato un faro di fede fin dall'antichità."

 brb_brabantine_rights: "Diritti Brabantini"
 brb_brabantine_rights_desc: "Come hanno fatto altre nazioni, è giunto il momento di codificare le libertà dei nostri sudditi, al fine di identificare e salvaguardare i loro diritti e motivarli a continuare a lavorare per un futuro migliore per il nostro Paese."

 fla_flemish_renaissance: "$renaissance$ Fiammingo"
 fla_flemish_renaissance_desc: "Essendo una delle regioni più prospere del continente, gran parte della ricchezza che abbiamo creato confluisce naturalmente nel mecenatismo artistico. I mercanti fiamminghi commissionano a maestri pittori la creazione di opere d'arte che, sebbene forse non pratiche, illuminano anche le giornate più nuvolose. Con decine di nostri mercanti che assumono attivamente artisti e commissionano nuove opere, stiamo creando un $renaissance$ distintivo tutto nostro."

 frisian_resisting_invader: "Resistere all'Invasore"
 frisian_resisting_invader_desc: "Circondati dai nemici, il nostro popolo è abituato a difendere aggressivamente le proprie terre, combattendo così ferocemente che molti potenziali invasori voltano le spalle e non tornano più. Coloro che non riescono a sfuggirci possono trovare conforto nel pensiero che il loro sangue nutrirà il suolo del $FRI$."

 gel_healthy_economy: "Un'Economia Sana"
 gel_healthy_economy_desc: "Abbiamo ampliato i nostri confini non solo con la spada, ma anche attraverso un'attenta pianificazione finanziaria, che ci ha permesso di acquistare influenza sui territori desiderabili o di acquistarli direttamente. Con una gestione oculata del bilancio, questa tendenza economica dovrebbe essere sostenibile."

 hai_frontier_march: "Una Marcia di Frontiera"
 hai_frontier_march_desc: "Essendo una provincia di confine del $hre$, l'$HAI$ ha sviluppato uno spirito rude e pronto all'azione, nato da secoli di conflitti di frontiera. Questo spirito rende il nostro popolo naturalmente incline ad azioni difensive, che possiamo sfruttare a nostro vantaggio."

 hol_maritime_warfare: "Guerra Marittima"
 hol_maritime_warfare_desc: "Essendo una nazione marittima, i nostri marinai sono abituati al combattimento navale, sia contro membri di nazioni rivali che contro pirati che tentano di saccheggiare le nostre navi mercantili. In ogni caso, la nostra marina deve essere pronta ad affrontare qualsiasi nemico in qualsiasi momento."

 lie_devoted_land: "Una Terra Devota"
 lie_devoted_land_desc: "Essendo parte di una delle più grandi diocesi della zona, non c'è dubbio sulla profondità della devozione del nostro popolo. Mostreremo al mondo che la nostra fede in Dio è forte quanto la nostra fede nella nostra nazione."

 lux_fortress_europe: "La Fortezza d'$europe$"
 lux_fortress_europe_desc: "La posizione inespugnabile del $LUX$, con la formazione del Bock che funge da fortezza naturale, è incredibilmente forte. I nostri nemici perirebbero in qualsiasi tentativo di usurpare i nostri possedimenti. Impareremo dalla natura e costruiremo tutte le nostre fortezze in modo da sfruttare il terreno locale a nostro vantaggio."

 utr_blessed_land: "Una Terra Benedetta"
 utr_blessed_land_desc: "Il Papa stesso influenza l'elezione del nostro Principe-Vescovo, sfidando il tradizionale formato elettorale a cinque capitoli che avevamo prima. Questa è una chiara prova che la nostra terra è stata benedetta da Dio!"

 brb_land_culture: "Una Terra di Cultura"
 brb_land_culture_desc: "Con la fondazione dell'Università del $leuven$, $BRA$ si è posto saldamente al centro della cultura dei $NED$. Studenti provenienti da tutta $europe$ vengono nelle nostre terre per studiare e condividere le loro conoscenze."

 fla_prospering_agriculture: "Agricoltura Prospera"
 fla_prospering_agriculture_desc: "Poiché i nostri settori tessile, dei beni di lusso e finanziario devono affrontare una concorrenza sempre più agguerrita, è ormai evidente che dobbiamo gestire meglio l'uso del nostro territorio. Creando granai regionali, diversifichiamo ulteriormente la nostra economia e rafforziamo le nostre riserve alimentari contro la carestia o i cattivi raccolti."

 frisian_legend_grutte_pier: "La Leggenda di Grutte Pier"
 frisian_legend_grutte_pier_desc: "Nelle nostre terre circolano storie su un pirata alto due metri e forte come un bue. Questi racconti ispirano molti a prendere il mare e fare ciò che i nostri antenati sapevano fare meglio: saccheggiare le coste incustodite."

 gel_expand_kwarteers: "Espandere i Kwarteers"
 gel_expand_kwarteers_desc: "Come nel caso del $BRA$, la $GEL$ è stato tradizionalmente diviso in quattro quartieri. Questo sistema di province disposte attorno a una forte città centrale si è dimostrato un modo efficiente per governare la nostra nazione e dovremmo applicare questo sistema alle nuove regioni che si uniranno al nostro regno in futuro."

 hai_bustling_towns: "Città Vivaci"
 hai_bustling_towns_desc: "I nostri vivaci insediamenti urbani sono pieni di potenziale. Con un piccolo sforzo, possiamo rendere incredibilmente ricchi sia essi che i loro hinterland, consentendoci di tassarli in modo approfondito."

 hol_trading_spirit: "Spirito di Commercio"
 hol_trading_spirit_desc: "Il nostro paese è circondato dal mare, quindi è naturale che sfidiamo le onde agitate alla ricerca di porti commerciali e merci ricche da riportare indietro."

 lie_inspiring_mecenas: "Una Mecenate Ispiratrice"
 lie_inspiring_mecenas_desc: "La nostra nazione ispira artisti provenienti da tutto l'$europe$, che vengono qui per creare i loro capolavori. Non baderemo a spese per sostenere questi artisti e attrarre nuovi talenti, affermandoci come centro nevralgico dell'arte e della cultura."

 lux_heirs_john_blind: "Eredi di Giovanni il Cieco"
 lux_heirs_john_blind_desc: "Giovanni il Cieco, eroico Re $BOH$ e conte di $LUX$, nacque nel nostro umile regno. Morì nella battaglia di Crécy all'età di cinquant'anni, dopo essersi lanciato a capofitto in combattimento nonostante la sua cecità. La sua morte coraggiosa e onorevole ispirerà i nostri soldati per secoli."

 utr_skilled_diplomats: "Diplomatici Esperti"
 utr_skilled_diplomats_desc: "Data la crescente influenza dei nostri vicini, la sopravvivenza della nostra nazione dipende dalla nostra capacità di trovare alleati leali e potenti che ci sostengano nei momenti di bisogno."

 golden_fleece: "L'Ordine del Toson d'Oro"
 golden_fleece_desc: "Uno dei più importanti ordini cavallereschi dell'$europe$. Essere un Cavaliere del Toson d'Oro è un segno di grande prestigio e si riflette positivamente su di noi."

 wagenburg: "Wagenburg"
 wagenburg_desc: "Durante le guerre hussite, i nostri eserciti facevano affidamento su fortificazioni mobili chiamate #italic Wagenburg#! per vincere le battaglie contro forze superiori. Anche se non sempre possiamo schierare carri, il principio rimane: i tiratori scelti della fanteria che combattono da posizioni difensive preparate diventano la nostra dottrina standard."

 hussite_traditions: "Tradizioni ussite"
 hussite_traditions_desc: "Attraverso la lotta e la fratellanza, i seguaci della nostra fede resistono a tutte le pressioni esterne di conversione. Le nostre radici religiose incrollabili, che derivano da antichi insegnamenti, risuonano vere nei cuori di tutti coloro che cercano di proteggere le loro credenze e di vivere in pace insieme ai loro compagni fedeli 4christian_ADJ$."

 kutnohorian_deal: "L'Accordo di Kutnohorian"
 kutnohorian_deal_desc: "La nobiltà sarà sempre piuttosto sensibile alla tutela dei propri privilegi. Garantire tali privilegi per sempre contribuirebbe notevolmente a conquistarne la lealtà."

 bohemian_thaler: "Tallero Boemo"
 bohemian_thaler_desc: "Per anni, la valuta standard nel nostro paese è stata il #italic groschen#!, una moneta d'argento utilizzata in tutto il $hre$. La scoperta di nuove fonti d'argento ci permette di creare un altro tipo di moneta più grande, il #italic thaler#!, chiamato anche 'toler' o 'daler', che diventerà abbastanza forte e influente da dominare tutto il commercio e diventare un nuovo standard."

 fortified_towns: "Città Fortificate"
 fortified_towns_desc: "A causa delle devastazioni del $hussite_wars$ e nel tentativo di salvaguardare la nostra fede e il nostro popolo, abbiamo finanziato la costruzione di molte città fortificate. Da allora, abbiamo acquisito una grande esperienza nella costruzione di fortificazioni e nella progettazione di difese impenetrabili."

 maori_ta_moko_advance: "Tā Moko"
 maori_ta_moko_advance_desc: "Con le curve e le spirali intricate di #italic Tā Moko#!, incidiamo ritualisticamente il pigmento nella nostra stessa pelle, trasformando il nostro corpo in arazzi viventi di onore e storia."

 maori_ceremonial_haka_advance: "Cerimonia Haka"
 maori_ceremonial_haka_advance_desc: "Il terreno trema mentre i nostri guerrieri eseguono l'#italic Haka#!, con le loro grida feroci e i movimenti sincronizzati che echeggiano sul campo di battaglia. Questa intimidatoria danza cerimoniale di guerra infonde coraggio nel cuore di ogni guerriero, garantendo un significativo aumento del morale alle forze di terra."

 maori_whakapapa_advance: "Whakapapa"
 maori_whakapapa_advance_desc: "La forza e l'unità derivano dalla conoscenza del proprio #italic Whakapapa#!, l'intricata rete di connessioni genealogiche che lega un #italic iwi#!. Questa profonda comprensione dell'ascendenza collettiva favorisce un fronte unito contro tutte le avversità."

 maori_te_reo_advance: "Te Reo"
 maori_te_reo_advance_desc: "Sappiamo che preservando e coltivando #italic Te Reo#!, la nostra lingua sacra, manteniamo un legame vibrante con la nostra cultura e le nostre tradizioni."

 maori_rua_kumara_advance: "Rua Kūmara"
 maori_rua_kumara_advance_desc: "Perfezionando l'arte di coltivare e conservare i tuberi #italic kūmara#! in appositi #italic rua#!, ovvero fosse di conservazione, possiamo assicurarci di avere lo stomaco pieno anche durante gli inverni più rigidi."

 maori_he_whakaputanga_advance: "Lui Whakaputanga"
 maori_he_whakaputanga_advance_desc: "La cosiddetta 'Dichiarazione di Indipendenza della Nuova Zelanda' è un documento che sancisce una volta per tutte l'indipendenza dello Stato unificato del $maori_culture$. Con una formulazione pienamente comprensibile a tutte le parti, i nostri capi tribù potranno finalmente unirsi ed essere liberi da interferenze straniere."

 the_ark_of_the_covenant: "L'Arca dell'Alleanza"
 the_ark_of_the_covenant_desc: "Siamo l'unica nazione ad ospitare la sacra Arca dell'Alleanza dopo che fu segretamente portata via da Menelik I con l'aiuto divino migliaia di anni fa. È nascosta alla vista del pubblico, per evitare che qualcuno tenti di rubare il nostro sacro tesoro nazionale. Repliche dell'Arca sono collocate in ogni nostra chiesa per ricordare che il nostro governo è benedetto da Dio."

 roof_of_africa: "Il Tetto del $africa$"
 roof_of_africa_desc: "Il nostro popolo abita gli altopiani da generazioni, sopportando condizioni estreme che ci hanno reso resistenti e forti. Questo ci dà un vantaggio significativo sui nostri nemici ogni volta che entriamo in conflitto."

 solomonid_claim: "La Rivendicazione Dinastica dei $solomonid_dynasty$"
 solomonid_claim_desc: "Gli antenati dei nostri governanti discendono dai monarchi di Aksum, dalla stirpe di Re Salomone e della Regina di Saba. Abbiamo deposto i monarchi del $zagwe_dynasty$ per legittimare il nostro dominio e stabilire saldamente il regno, riportandolo alla dinastia legittima."

 nagusa_negast: "Nəgusä Nägäst"
 nagusa_negast_desc: "Il nostro sovrano è il re di tutti i re; l'erede del pedigree dei re di Aksum insieme a quello del primo sovrano, Menelik I, figlio del re Salomone e della regina di Saba. Tutti i nostri re discendono dalla dinastia del $solomonid_dynasty$ e la linea di successione non deve necessariamente essere da padre in figlio."

 a_permanent_capital: "Una Capitale Permanente"
 a_permanent_capital_desc: "Per secoli, la nostra nazione è stata priva di una capitale permanente, con la corte che seguiva i governanti ovunque desiderassero. Sebbene questo approccio abbia i suoi vantaggi, per governare efficacemente la nostra vasta nazione dobbiamo stabilire una forte autorità centrale in una sede permanente adeguata."

 external_friends: "Amici Esterni"
 external_friends_desc: "I nostri inviati in $rome$ e $iberia_region$, alla ricerca di sostegno militare, hanno avuto un discreto successo: infatti, ci hanno fatto conoscere al mondo. Questi sforzi per trovare alleati dovrebbero continuare."

 eternal_crusade: "Una Crociata Eterna"
 eternal_crusade_desc: "Come nazione cristiana, ci troviamo circondati da avversari musulmani che colgono ogni opportunità per attaccarci. Per garantire la nostra sopravvivenza, dobbiamo essere pronti a reagire immediatamente."

 prester_john: "Prester John"
 prester_john_desc: "Il popolo dell'$europe$ cerca il Prester John da secoli ed è convinto che il nostro sovrano debba essere lui, in qualche modo, poiché siamo compagni di culto cristiano. Non c'è motivo di sottolineare che si sbagliano, tuttavia, poiché ora sono felici di condividere le loro idee con noi."

 an_iron_fist: "Un Pugno di Ferro"
 an_iron_fist_desc: "La nostra regione è caratterizzata da una grande diversità culturale e religiosa, e l'unica cosa che la tiene unita non è la compassione, ma un sovrano potente, capace di affrontare con rapidità e determinazione qualsiasi tentativo di rivolta."

 a_true_ethiopian_church: "Una Vera Chiesa Etiope"
 a_true_ethiopian_church_desc: "Le influenze esterne hanno la loro utilità, ma l'esposizione ad esse può alterare la natura delle nostre credenze. Per mantenere la nostra identità, dobbiamo garantire la supremazia interna della nostra Chiesa Tewahedo."

 origin_of_coffee: "Origine del $coffee$"
 origin_of_coffee_desc: "Il $coffee$ proviene dalle nostre terre, poiché abbiamo le condizioni perfette per la sua coltivazione. Sebbene possa essere coltivato anche in altri luoghi, il nostro è apprezzato per la sua qualità ed esportato a tonnellate. Dobbiamo fare in modo che questo diventi un modo per convogliare ricchezza nella nostra nazione."

 a_modern_nation: "Una Nazione Moderna"
 a_modern_nation_desc: "Nonostante il nostro apparente isolamento, siamo ben consapevoli delle innovazioni che avvengono in tutto il mondo e non perdiamo tempo nell'implementare queste modernizzazioni al fine di mantenere un vantaggio competitivo sui nostri rivali."

 cawa_advance: "Reggimenti Ç̌äwa"
 cawa_advance_desc: "I #italic Ç̌äwa#! sono i nobili guerrieri feudali dell'$ETH$, reclutati e nominati per servire nell'esercito dell'Imperatore. Sono una classe di soldati professionisti, rinomati per la loro ferocia."

 a_renaissance_cawa_advance: "$a_renaissance_cawa$"
 a_renaissance_cawa_advance_desc: "$a_renaissance_cawa_desc$"

 a_discovery_cawa_advance: "$a_discovery_cawa$"
 a_discovery_cawa_advance_desc: "$a_discovery_cawa_desc$"

 a_reformation_cawa_advance: "$a_reformation_cawa$"
 a_reformation_cawa_advance_desc: "$a_reformation_cawa_desc$"

 a_absolutism_cawa_advance: "$a_absolutism_cawa$"
 a_absolutism_cawa_advance_desc: "$a_absolutism_cawa_desc$"

 a_revolutions_cawa_advance: "$a_revolutions_cawa$"
 a_revolutions_cawa_advance_desc: "$a_revolutions_cawa_desc$"

 epic_of_sundiata: "Epopea di Sundiata"
 epic_of_sundiata_desc: "Il $epic_of_sundiata$ racconta la leggendaria campagna di Sundiata Keita, fondatore dell'Impero maliano ed eroe del nostro popolo. La sua storia è stata tramandata di generazione in generazione ed è sempre stata una grande fonte di ispirazione per il nostro popolo."

 kouroukan_fouga_advance: "Kouroukan Fouga"
 kouroukan_fouga_advance_desc: "Il $kouroukan_fouga_advance$ è la costituzione fondamentale del $MALI$. Copre ogni aspetto della vita, dalla semplice vita familiare nei villaggi fino alla sovranità del Mansa."

 gold_of_bure: "Oro di Bure"
 gold_of_bure_desc: "I giacimenti gemelli di oro a Bambuk e Bure sono rinomati come i più grandi depositi auriferi mai conosciuti e appartengono a noi! Le miniere d'oro di Bure, in particolare, hanno prodotto una ricchezza fantastica che ha destabilizzato l'intera economia egiziana attraverso l'inflazione quando Mansa Mūsā vi fece visita. La nostra economia, tuttavia, è abituata a un afflusso costante di oro ed è più difficile da inflazionare."

 accounts_of_the_atlantic_voyage: "Racconti del Viaggio nell'Atlantico"
 accounts_of_the_atlantic_voyage_desc: "Secondo il leggendario Mansa Mūsā, il suo predecessore intraprese un viaggio attraverso il $atlantic_ocean_continent$ nella speranza di scoprire i confini più remoti dell'oceano. Mentre alcuni membri della classe dirigente considerano questa impresa una vergognosa abdicazione al proprio dovere, altri la vedono come fonte di ispirazione per esplorare angoli del mondo precedentemente sconosciuti all'uomo."

 reclamation_of_land: "Bonifica del Terreno"
 reclamation_of_land_desc: "Il Sahara non è statico. Può crescere e diminuire a seconda delle precipitazioni, e la fascia abitabile conosciuta come $sahel_region$, dove risiediamo, può espandersi o restringersi di conseguenza. Una grave siccità potrebbe rendere gran parte del nostro regno un deserto inutilizzabile, un'aggiunta al Sahara dove non regna altro che la morte. Tuttavia, negli anni buoni, potremmo recuperare alcune delle terre marginali dal Sahara e renderle nuovamente produttive."

 mandinka_warrior_spirit: "Spirito Guerriero Mandinka"
 mandinka_warrior_spirit_desc: "Che siano pagani o musulmani, gli uomini Mandinka sono stati i più grandi combattenti che il $sahel_region$ abbia mai visto. Il coraggio delle nostre truppe è ammirevole, così come il loro orgoglio. Quando il Mansa raduna un esercito, non solo è il più grande di tutto il $sahel_region$, ma è anche il migliore!"

 markets_for_salt: "Mercati per il $salt$"
 markets_for_salt_desc: "Nel nostro regno, il $salt$ vale il suo costo in oro. Ma a sud di noi, nelle grandi foreste degli Ashanti e degli Yoruba, il sale vale molto #italic di più#! dell'oro. Fortunatamente per noi, abbiamo la nostra scorta di $salt$ e abbastanza oro per ottenerne quanto ne vorremmo. Forse potremmo trovare altri mercati di persone per le quali il $salt$ è più prezioso dell'oro?"

 west_african_slave_trade: "Commercio degli Schiavi dell'Africa Occidentale"
 west_african_slave_trade_desc: "Anche prima che il nostro Impero esistesse, il grande Wagadou, l'Impero del Ghana che ci ha preceduto, vendeva gli $slaves_goods$ attraverso il deserto agli arabi. Abbiamo seguito l'esempio in tutti questi anni, fornendo al mondo arabo una grande quantità di $slaves_goods$. Ora gli europei chiedono a gran voce ancora più $slaves_goods$ per lavorare nelle loro proprietà nel cosiddetto Nuovo Mondo. Abbiamo ricevuto poche notizie, ma la quantità di $slaves_goods$ che richiedono è davvero sbalorditiva, e continuano a tornare, a volte persino saccheggiando le nostre coste e rapendo i nostri sudditi. È giunto il momento di imporre ordine su questo commercio e di limitare gli europei a selezionare porti commerciali dove acquistare, e non rubare, gli $slaves_goods$."

 kele_koun_advance: "Il Kèlè-Koun"
 kele_koun_advance_desc: "I Kèlè-Koun, o "teste di guerra", sono i comandanti della fanteria che combatte per l'Impero, chiamata Kèlè-Bolo, o "braccio di guerra". A differenza dei Ton-Tigi, i signori feudali del $MAL$, i Kèlè-Koun non fanno necessariamente parte del $nobles_estate$. I Kèlè-Koun hanno #italic jonow#!, "schiavi", che fungono da portatori di armi e attrezzature fino alla loro inclusione nei battaglioni Sofa."

 sofa_levies_advance: "Contributi per i Divani"
 sofa_levies_advance_desc: "In origine, tutti i soldati delle leve Kèlè-Bolo erano #italic horon#!, ovvero 'uomini liberi', ma gli ultimi sviluppi in $MAL$ hanno costretto a includere anche gli #italic jonow#!, ovvero 'schiavi', affinché prestassero servizio nell'esercito come combattenti anziché come portatori d'armi. Questi guerrieri schiavi sarebbero stati in seguito conosciuti come 'Sofa' e avrebbero protetto le fortificazioni come parte delle forze di guarnigione."

 mandekalu_levies: "Leve di Mandekalu"
 mandekalu_levies_desc: "I $mandekalu_levies$ sono la spina dorsale dell'esercito maliano. Gli uomini liberi dell'Impero sono chiamati alle armi in tempo di guerra ed è un grande onore per loro partecipare a queste battaglie con le proprie armi."

 farari_corps_advance: "Corpo Farari"
 farari_corps_advance_desc: "I $farari_corps_advance$ sono l'élite dell'esercito maliano. Comandanti a pieno titolo, sono molto rispettati per la loro esperienza e il loro coraggio."

 sudano_sahelian_architecture_advance: "Architettura Sudano-Saheliana"
 sudano_sahelian_architecture_advance_desc: "Le praterie, le savane e i deserti del $west_africa$ offrono poche risorse adatte ai progetti di costruzione, quindi abbiamo sfruttato al meglio ciò che avevamo a disposizione. L'uso di mattoni di fango e intonaco di adobe riduce significativamente il costo degli edifici, conferendo loro allo stesso tempo uno stile distintivo e piacevole alla vista."

 stories_of_the_gao_empire: "Storie dell'Impero di $gao$"
 stories_of_the_gao_empire_desc: "Prima che l'Impero maliano arrivasse a dominare il $west_africa$, la città di $gao$ era la capitale di un impero a sé stante. Sebbene non esistano quasi documenti scritti sull'Impero del $gao$, la sua eredità vive nelle nostre tradizioni orali, ispirando tutti coloro che desiderano raggiungere un giorno la grandezza."

 malian_military_tactics: "Tattiche Militari Maliane"
 malian_military_tactics_desc: "Durante il periodo in cui eravamo sudditi del $MAL$, il nostro popolo ha imparato molto dal loro comando militare e dalle loro tattiche di combattimento. Questa conoscenza aiuterà la nostra fanteria nelle battaglie future."

 gold_to_salt_trade: "Commercio tra $golds_goods$ e $salt$"
 gold_to_salt_trade_desc: "Alcuni dicono che il $salt$ vale il suo peso in $golds_goods$... forse sarebbe più accurato dire che il $golds_goods$ vale il suo peso in $salt$. In ogni caso, grazie allo scambio di queste due merci, abbiamo creato fiorenti reti commerciali."

 independence_from_mali: "Indipendenza dal $MAL$"
 independence_from_mali_desc: "Per molti anni siamo stati sudditi del $MAL$. Con l'indebolimento del potere del $MAL$, il nostro è cresciuto e ora possiamo affermare di essere completamente indipendenti dalla supremazia maliana. Facciamo in modo che ciò rimanga così."

 jihad_against_the_pagans: "$jihad$ Contro i Pagani"
 jihad_against_the_pagans_desc: "Nonostante i migliori sforzi compiuti nei secoli dai sultanati sunniti, il $west_africa$ è ancora afflitto dalla minaccia dei pagani animisti. Alzando la bandiera del $jihad$, possiamo ripulire le nostre terre dai miscredenti e allo stesso tempo espandere i nostri confini."

 sankore_madrassah: "Madrasa di Sankoré"
 sankore_madrassah_desc: "Ci è stato detto che la scuola della moschea di Sankoré è il più grande centro di apprendimento dell'intero $africa$. Chi potrebbe sorprendersi se fosse vero, dato il numero di saggi provenienti dal lontano $arabia_region$ e dal $maghreb_region$ che si trovano qui in questo momento, a discutere dei punti più delicati della filosofia e della religione?"

 the_hajj: "Il Ḥajj"
 the_hajj_desc: "Come fece un tempo Mansa Mūsā del $MAL$, i nostri governanti possono recarsi in pellegrinaggio in $mecca$, adempiendo al quinto pilastro dell'Islam e portando con sé oro come simbolo della nostra ricchezza e del nostro potere. Come i pellegrini maliani di un tempo, il mondo rimarrà senza fiato di fronte alla ricchezza e alla grandezza del $SON$."

 sharia: "Sharī'ah"
 sharia_desc: "La Legge Sacra che il Profeta seguiva quando governava il $medina$ dovrebbe essere il fondamento incrollabile delle leggi che utilizziamo per governare la nostra società. Riformando il nostro codice penale per riflettere gli insegnamenti del Profeta, porteremo armonia e giustizia al nostro popolo."

 trans_sahara_trade: "Commercio Trans-Sahariano"
 trans_sahara_trade_desc: "I nostri commercianti riportano spesso oggetti affascinanti dalle corti del $north_africa$. Forse potrebbero trovare e riportare oggetti ancora più affascinanti?"

 modernization_of_the_military: "Modernizzazione dell'Esercito"
 modernization_of_the_military_desc: "Il nostro Stato vive e muore in base alle capacità del nostro esercito. Le nostre forze armate non solo garantiscono la nostra sopravvivenza, ma sono anche ciò che ci ha avviato sulla strada della grandezza. Non possiamo permetterci di rimanere indietro nel progresso!"

 university_naples: "L'Università di $NAP$"
 university_naples_desc: "Fondata nel 1224 dall'imperatore Federico II, l'Università di $NAP$ è una delle più antiche istituzioni pubbliche d'$ITA$. Abbracciando un'etica laica, ha fornito a generazioni di studenti un'istruzione completa e ha contribuito al progresso intellettuale in vari campi."

 mercantile_spirit: "Spirito Mercantile"
 mercantile_spirit_desc: "Il $NAP$, ispirato dall'influente repubblica marittima di Amalfi, vanta una vivace cultura commerciale. Porti strategici, tra cui la stessa città di $naples$, fungevano da snodi vitali, collegando il regno a terre lontane e favorendo la prosperità economica attraverso gli scambi commerciali e il fiorente scambio di beni e idee."

 consolidate_the_royal_domain: "Il Dominio Reale"
 consolidate_the_royal_domain_desc: "Abbiamo ereditato un regno ricco, ma siamo stati ostacolati nel raggiungimento della vera prosperità dai vincoli di leggi e costumi arcaici. I precedenti governanti hanno bilanciato i privilegi nobiliari con il potere economico, ma dobbiamo portare l'atteggiamento e le normative nell'era moderna. Rafforzando le corti della nobiltà e consolidando le loro proprietà terriere, creeremo una gerarchia legale più chiara. Allo stesso tempo, daremo potere alle città come centri dell'autorità reale e incoraggeremo la proliferazione del commercio urbano e dell'artigianato."

 academia_pontaniana: "Accademia Pontaniana"
 academia_pontaniana_desc: "Per molto tempo, il $NAP$ ha cercato di diventare un centro di apprendimento moderno, attirando le grandi menti dell'epoca e diffondendo la luce del $renaissance$. Sotto la guida di Giovanni Pontano, questi circoli di discussione hanno acquisito struttura e organizzazione. È giusto che l'accademia prenda il nome dal suo laborioso leader."

 encouraged_city_living: "Vita Urbana Incentivata"
 encouraged_city_living_desc: "Abbiamo ereditato una città meravigliosa dai nostri predecessori. Dobbiamo continuare ad abbellire e migliorare questa metropoli del Mediterraneo affinché possa continuare a crescere e prosperare. Non possiamo più accontentarci di riparare e mantenere il porto e gli edifici; dobbiamo apportare miglioramenti olistici che sostengano meglio la nostra popolazione, costruendo anche acquedotti, bonificando le zone umide e pavimentando più strade."

 crush_the_barons: "Potere dei Baroni Schiacciato"
 crush_the_barons_desc: "I baroni locali esercitano ancora un grande potere sulle campagne del $NAP$. Se vogliamo continuare a centralizzare il nostro regno, dobbiamo schiacciare il potere di questi baroni, altrimenti rischiamo che cospirino contro di noi."

 expanded_arsenale: "Arsenale Ampliato"
 expanded_arsenale_desc: "Per secoli, l'Arsenale del $NAP$ è stato il centro della nostra produzione navale e la nostra principale installazione navale. Tuttavia, deve essere ampliato e modernizzato per rimanere efficace contro le flotte ostili del Mediterraneo. Ampliamo le capacità commerciali e militari del nostro porto, costruendo un Arsenale più efficiente per mantenere una flotta più grande e potente."

 city_of_artists: "Città degli Artisti"
 city_of_artists_desc: "Grazie al mecenatismo dei più grandi artisti del mondo, la gloria della nostra città sarà conosciuta in tutto il mondo. Tutti ammireranno la grandezza dei nostri pittori, poeti, cantanti e attori. Che la cultura napoletana sia il punto di riferimento per gli altri centri d'arte!"

 institutional_reorganization: "Riorganizzazione Istituzionale"
 institutional_reorganization_desc: "Abolendo il Consiglio Collaterale e istituendo la #italic Real Camera di Santa Chiara#!, attueremo importanti riforme legali in $NAP$. I progetti in corso mireranno a riorganizzare il complesso legislativo, consolidare le leggi nel #italic Codice Carolino#! e attuare il #italic Catasto Onciario#! per la riforma fiscale."

 a_central_power: "Una Potenza del Mediterraneo Centrale"
 a_central_power_desc: "La nostra vantaggiosa posizione centrale nel Mediterraneo ci consente di raggiungere facilmente qualsiasi costa. Dovremmo sfruttare questo vantaggio per cercare alleanze, stringere nuove amicizie ed espandere i nostri confini. Con il mare come porta d'accesso, le opportunità di crescita e prosperità abbondano nella nostra ricerca di maggiore influenza e sicurezza."

 neapolitan_industrialization: "Industrializzazione Napoletana"
 neapolitan_industrialization_desc: "Il $NAP$ ha assistito a un graduale processo di industrializzazione negli ultimi decenni. Settori chiave come il tessile, la cantieristica navale e la siderurgia hanno registrato una crescita significativa, alimentata dagli investimenti e dai progressi tecnologici. Questo passaggio all'industrializzazione avrà un ruolo significativo nella trasformazione del $NAP$ in un importante centro economico."

 neapolitan_army_reforms: "Riforme dell'Esercito Napoletano"
 neapolitan_army_reforms_desc: "La nostra nazione ha bisogno di intraprendere profonde riforme militari, modernizzando le proprie forze armate per affrontare le sfide di un campo di battaglia in continua evoluzione. Queste riforme rafforzeranno le capacità tattiche, snelliranno le strutture di comando e miglioreranno i programmi di addestramento, posizionandoci come una forza formidabile nella nostra regione."

 tws_unified_legal_code: "Codice Giuridico Unificato"
 tws_unified_legal_code_desc: "I territori che costituiscono il nostro Paese hanno subito rivolte dovute all'applicazione ingiusta delle leggi. Per evitare che tali eventi si ripetano in futuro, dovremmo uniformare il nostro codice legale e garantire che le nostre leggi siano applicate in modo equo. Ciò impedirà sicuramente che qualsiasi rivolta degeneri nel caos."

 tws_ensure_loyal_families: "Fedeltà delle Famiglie Nobili"
 tws_ensure_loyal_families_desc: "Le Nobili Famiglie di entrambe le Sicilie esercitano un grande potere al posto nostro. Assegnando loro ruoli prestigiosi ma privi di significato a corte, ci assicureremo la loro lealtà e garantiremo un governo stabile sulle nostre campagne."

 tws_revitalize_the_lands: "Attirare Nuove Persone"
 tws_revitalize_the_lands_desc: "I precedenti governanti hanno prestato troppa attenzione ad alcune zone specifiche del nostro Paese. Se vogliamo mantenere il controllo di entrambe le Sicilie, dovremo investire in modo equo e paritario in entrambe le parti. Un passo verso questo obiettivo è quello di attirare persone che si stabiliscano in zone precedentemente trascurate."

 tws_capable_vicars: "Vicari Capaci"
 tws_capable_vicars_desc: "Una sfida particolare per il nostro Paese unificato è quella di governare entrambe le sponde dello Stretto di Messina. Poiché il nostro sovrano può essere presente solo su una sponda alla volta, l'altra dovrà essere affidata a un vicario, che governerà in nostro nome. Dobbiamo assicurarci di nominare solo le persone più capaci e affidabili per questo ruolo fondamentale, al fine di prevenire la corruzione."

 tws_oversea_ambitions: "Ambizioni d'Oltremare"
 tws_oversea_ambitions_desc: "Espandere i nostri territori all'interno dell'Italia è un compito difficile, che richiede di districarsi in una rete insidiosa di alleanze e rischia di attirare l'ira dello stesso Papa. Pertanto, dovremmo guardare oltreoceano, dove potenziali ricchezze ci attendono nelle terre del Nord Africa e della Grecia."

 tws_protect_the_coastline: "Aumentare le Pattuglie Marittime"
 tws_protect_the_coastline_desc: "La nostra costa è vasta e vulnerabile alle incursioni dei pirati a caccia di schiavi. Dobbiamo istituire una marina militare che pattugli, protegga e alla fine sconfigga questa vile minaccia al nostro popolo."

 arte_della_lana: "Arte della Lana"
 arte_della_lana_desc: "L'#italic Arte della Lana#! — la Gilda della Lana — controlla una delle industrie più importanti di $FLO$. Dedita alla produzione di $cloth$ di qualità e supportata da una forza lavoro forte e qualificata, questa gilda ha aiutato molti commercianti e artigiani a costruire le loro fortune nel corso dei secoli."

 florino_d_oro: "Fiorino d'Oro"
 florino_d_oro_desc: "Una valuta molto potente, sostenuta da un'eccellente purezza dell'oro e condivisa da molti stati e istituzioni in tutto l'$europe$. Adottando il #Y Florin#! come nostra valuta, siamo sicuri di avere un impatto positivo sul nostro reddito e di ridurre i deficit monetari."

 a_land_of_banks: "Un Paese di Banche"
 a_land_of_banks_desc: "La $TUS$ è il centro bancario dell'$europe$, con molte potenti istituzioni finanziarie con sede nelle principali città. Da queste basi, la loro influenza si estende in tutta l'$italy_region$ e nel nord dell'$europe$ attraverso vaste reti commerciali e partnership redditizie."

 florentine_citizen_militia: "Milizia Cittadina Fiorentina"
 florentine_citizen_militia_desc: "Se il nostro popolo vuole prosperare anche in futuro, deve essere pronto a mobilitarsi e difendere i nostri ideali e la nostra patria! La formazione di una milizia cittadina, pari per esperienza e ferocia agli altri eserciti dell'$europe$, ci aiuterà notevolmente a proteggere il nostro territorio."

 birthplace_of_renaissance: "Luogo di Nascita del $renaissance$"
 birthplace_of_renaissance_desc: "La nostra dedizione alle belle arti, alla coltivazione del talento artistico e al pensiero innovativo ci ha portato ad essere considerati uno dei principali leader mondiali nel campo dei progressi culturali, filosofici e scientifici!"

 florentine_school: "Scuola Fiorentina"
 florentine_school_desc: "Essendo una delle scuole d'arte contemporanee più influenti, le tecniche e i dettagli raffinati fiorentini ci hanno consacrato come leader culturali dell'$europe$, producendo capolavori che definiscono il $renaissance$."

 tuscan_uffizi: "Uffizi"
 tuscan_uffizi_desc: "Originariamente concepiti per consolidare l'amministrazione di diverse corporazioni e agenzie, gli Uffizi sono una preziosa fonte di potere centralizzato, che conserva ed espone varie opere d'arte come segno di superiorità culturale e dimostrazione di ricchezza."

 medici_porcelain: "$porcelain$ dei Medici"
 medici_porcelain_desc: "Negli ultimi decenni sono stati fatti molti tentativi per replicare le proprietà del vero $porcelain$, un prodotto esotico proveniente dall'Estremo Oriente. Con l'aiuto di alchimisti esperti e di approfondite conoscenze scientifiche, saremo sicuramente in grado di produrre un $porcelain$ di grande qualità."

 porto_franco: "Porto Franco"
 porto_franco_desc: "Aprendo i nostri porti al commercio con i mercanti stranieri ed eliminando i dazi all'importazione, siamo sicuri di accumulare maggiori guadagni in conto capitale dalle nostre iniziative mercantili."

 accademia_cimento: "Accademia del Cimento"
 accademia_cimento_desc: "L'#italic Accademia del Cimento#! è una società scientifica fondata in $FLO$ dagli studenti di Galileo. Prima istituzione di questo tipo, questo innovativo incubatore di sviluppo scientifico era dedicato ai principi della sperimentazione. La società aveva come motto 'Prova e riprova' e pubblicò i #italic Saggi#!, un libro che avrebbe stabilito gli standard contemporanei per la pratica e la procedura di laboratorio."

 tuscan_municipal_reforms: "Riforme Comunali Toscane"
 tuscan_municipal_reforms_desc: "Entrando nell'era dell'assolutismo e dell'autorità centralizzata suprema, dobbiamo riformare l'amministrazione locale di conseguenza, stabilendo procedure uniformi e trasformando i sistemi locali in strumenti del potere centrale."

 tuscan_physiocratic_reforms: "Riforme Fisiocratiche Toscane"
 tuscan_physiocratic_reforms_desc: "Rafforzando i nostri settori agricoli e prendendoci più cura della nostra gente, garantiremo senza dubbio una solida base per i nostri sistemi economici recentemente modernizzati."

 tuscan_new_trade_system: "Nuovo Sistema Commerciale Toscano"
 tuscan_new_trade_system_desc: "L'era della supremazia delle corporazioni commerciali sta lentamente volgendo al termine, poiché la loro influenza diminuisce di fronte al potere centralizzato assoluto. Riformando la loro amministrazione e trasferendo gran parte del loro controllo ai nostri capi di Stato, siamo sicuri di aumentare i profitti."

 pis_anziani_del_popolo: "Anziani del Popolo"
 pis_anziani_del_popolo_desc: "Il Consiglio degli Anziani è stato inizialmente fondato nel tentativo di placare la rivalità tra le famiglie $gherardesca_dynasty$ e $visconti_dynasty$. Fin dalla sua istituzione, ha influenzato chi controlla e governa la repubblica."

 pis_maritimes_legacy: "L'eredità della Repubblica Marittima"
 pis_maritimes_legacy_desc: "Per secoli, la $PIS$ è stato una delle potenze dominanti nel Mediterraneo, con un'enorme influenza e il controllo di un'impressionante rete commerciale. Anche se attualmente siamo solo l'ombra del grande $PIS$ del passato, la nostra eredità rimane. La $PIS$ ricorda."

 pis_the_university_of_pisa: "L'Università di $PIS$"
 pis_the_university_of_pisa_desc: "Uno dei più antichi centri di istruzione superiore d'$ITA$ e di tutta $europe$, l'Università di $PIS$ gode di una reputazione quasi leggendaria per l'eccellenza sia nell'insegnamento che nella ricerca."

 sie_artists: "Scuola di Pittura Sienese"
 sie_artists_desc: "L'arte della pittura è fiorita in $ITA$ sin dagli albori del $renaissance$, ma nessun artista può eguagliare l'abilità e la qualità di quelli della $SIE$. L'arte sienese è ultraterrena ed elegante, con una forte attenzione ai miracoli compiuti dai personaggi biblici e dai santi. Mentre altri artisti possono creare opere considerate belle per il momento, lo stile più sottile della scuola sienese garantirà che le sue opere siano ammirate per secoli a venire."

 sie_studium_senese: "Studium Senese"
 sie_studium_senese_desc: "Considerata la prima università finanziata con fondi pubblici, l'Università del $siena$ è l'orgoglio della città e forma i nostri cittadini affinché tutti possano servire la nazione con forza e competenza."

 sie_council_priori: "Il Consiglio dei Priori"
 sie_council_priori_desc: "Dopo una serie di governi repubblicani e monarchici falliti, abbiamo istituito un Consiglio per il Popolo della $SIE$, che si spera non cadrà vittima delle manovre e della corruzione dell'alta nobiltà come molti altri prima di esso. Sebbene il numero esatto dei rappresentanti nel Consiglio e le modalità di elezione siano ancora in fase di definizione, il decentramento del nostro governo in questo modo impedirà alla $SIE$ di sprofondare nuovamente nel controllo aristocratico."

 republican_assembly_advance: "Assemblea Repubblicana"
 republican_assembly_advance_desc: "Cuore della nostra repubblica, il $republican_assembly$ è un'istituzione incredibilmente vitale, che ci permette di essere governati dalla virtù nobile e dall'eccellenza."

 kbo_iron_helmet_musketeers: "$a_iron_helmet_musketeers$"
 kbo_iron_helmet_musketeers_desc: "Con l'evolversi delle tattiche di guerra, anche la nostra strategia deve evolversi. Adattando innovazioni e tecniche straniere come formazioni, linee di fuoco e nuove ricette per la polvere da sparo, otterremo sicuramente la vittoria!"

 kbo_fixed_military_camps: "Accampamenti Militari Fissi"
 kbo_fixed_military_camps_desc: "Istituendo accampamenti militari permanenti in posizioni strategiche in tutto il nostro dominio, garantiremo che il nostro esercito subisca meno perdite per logoramento e possa essere mobilitato rapidamente quando necessario."

 kbo_permanent_sieges: "Tattiche d'assedio di Kanem"
 kbo_permanent_sieges_desc: "I nostri eserciti hanno esperienza con le macchine d'assedio, ma l'adozione di artiglieria mobile in grado di mantenere un fuoco sostenuto garantirebbe la nostra vittoria ogni volta che attacchiamo le mura nemiche!"

 kbo_council_clan_heads: "Consiglio dei Capi Clan"
 kbo_council_clan_heads_desc: "Delegare i compiti amministrativi ai capi clan locali potrebbe significare rinunciare a parte della nostra autorità centrale, ma i nostri consiglieri insistono sul fatto che ne trarremo grandi benefici in cambio."

 meissen_lion: "Il Leone di Meißen"
 meissen_lion_desc: "Il Leone di Meißen, noto anche come #italic Markmeißnische Löwe#!, occupa un posto speciale nell'araldica. Rappresentando il simbolo del potere della dinastia $wettin_dynasty$, un leone nero corazzato con la lingua rossa guarda a sinistra su uno sfondo dorato. La sua immagine appare in varie forme, tra cui lapidi dipinte, insegne, elmi, monete e sigilli, a simboleggiare l'affiliazione della città di $meissen$ al #italic Mark Meißen#! e ad adornare gli stemmi di numerose città e comunità. Alcuni lo collegano al leone della Turingia ricolorato."

 a_mining_heritage: "Un Patrimonio Minerario"
 a_mining_heritage_desc: "Per secoli, l'attività mineraria ha plasmato il nostro paesaggio, la nostra economia e la nostra cultura. Importanti scoperte di $silver$ nella regione hanno attirato minatori e commercianti da diverse zone, favorendo la crescita dei Monti Metalliferi e ampliando l'importanza e lo sviluppo del nostro regno."

 meissner_groschen: "Groschen di Meißen"
 meissner_groschen_desc: "Il #italic Groschen di Meißen#! sarà la nostra moneta nazionale. Questa moneta si basa sul #italic Groschen di Praga#!, che sostituiremo. Questo nuovo groschen di grande taglio segnerà l'inizio di una nuova era nella storia della nostra monetazione e ci consentirà di controllarne meglio l'afflusso."

 a_resilient_soul: "Un'Anima Resiliente"
 a_resilient_soul_desc: "Il nostro popolo è davvero resiliente e incarna una determinazione incrollabile di fronte alle sfide. Affronta le avversità con spirito indomito, trovando forza nell'unità e nell'impegno costante nei confronti dei valori condivisi. La sua indomabile resilienza ci spinge avanti, consentendoci di superare qualsiasi ostacolo che si presenti sul nostro cammino. Ne usciremo sempre più forti e determinati che mai."

 saxon_court: "La Corte Sassone"
 saxon_court_desc: "La Corte sassone è un pilastro del governo elettorale della $SAX$, insieme all'amministrazione civile e militare. I regolamenti della Corte definiscono le responsabilità e le routine quotidiane dei funzionari, mentre la Corte stessa è composta da nobili e contadini al servizio della famiglia regnante nel governo e nell'amministrazione. Tradizionalmente, ogni membro adulto della famiglia regnante manteneva la propria corte domestica, ma ora creeremo un'unica corte permanente nella nostra capitale, attirando le menti più brillanti del regno."

 a_tolerant_society: "Una Società Tollerante"
 a_tolerant_society_desc: "Le lotte religiose interne e l'intolleranza affliggono altre terre, ma noi siamo fermamente determinati a non permettere che tali conflitti si diffondano nel nostro regno. Indipendentemente dalle diverse fedi dei nostri sudditi, questa nazione sarà costruita sui solidi pilastri della tolleranza e della fratellanza, promuovendo una convivenza armoniosa tra tutte le comunità. Uniti da una visione comune, forgeremo una nazione in cui fioriranno il rispetto e la comprensione, aprendo la strada a un futuro prospero."

 furstenschule: "Fürstenschule"
 furstenschule_desc: "Con l'affermarsi della Riforma e l'assunzione del controllo dell'amministrazione religiosa da parte dello Stato, emerge una nuova responsabilità per lo Stato emergente: l'istruzione, che in precedenza era compito della Chiesa. Fonderemo scuole principesche a Pforta, $grimma$ e $meissen$ utilizzando le ex proprietà monastiche. In questo modo, lo Stato assumerà un ruolo significativo nel plasmare il panorama educativo, promuovendo la conoscenza e la crescita intellettuale dei futuri leader della $SAX$."

 bonded_by_loyalty: "Legati dalla Fedeltà"
 bonded_by_loyalty_desc: "I nostri valorosi eserciti non vacillano mai! Dimostrano un morale e una lealtà eccezionali, rimanendo saldi sia nella difesa del nostro regno che nel sostegno agli alleati. Con spirito indomito, avanzano anche in circostanze disperate, rifiutando la sconfitta fino a quando non sono fisicamente incapaci di continuare."

 meissner_porcelain: "$porcelain$ Meissner"
 meissner_porcelain_desc: "La $SAX$ è il primo paese in $europe$ a produrre $porcelain$, che porterà ricchezza e prestigio alla corte del $wettin_dynasty$."

 saxon_baroque: "Barocco Sassone"
 saxon_baroque_desc: "Il $dresden$ e il $leipzig$, tra le altre località, hanno ottenuto il riconoscimento internazionale come centri della cultura barocca sassone. Magnifiche architetture, come il Dresdner Hof, incarnano la grandiosità della $SAX$, mentre l'opera di Johann Sebastian Bach ha trasformato il $leipzig$ in una città della musica e di una fiorente cultura intellettuale. La regione vanta espressioni culturali uniche, tra cui l'artigianato dei Monti Metalliferi e tradizioni culinarie come il #italic Dresdner Christstollen#!."

 retablissement: "Stabilimento"
 retablissement_desc: "Dopo guerre tumultuose, una nuova era sorge sulla $SAX$: il notevole #italic Rétablissement#! sassone. Tra le rovine del nostro passato, la nostra nazione risorgerà come una fenice, ricostruendo la sua economia in frantumi e tracciando un percorso verso la prosperità. Spinta da una combinazione di riforme statali visionarie e spesa disciplinata, la nostra nazione emergerà come un centro commerciale.\n\nCon una competenza amministrativa senza pari e un'attenzione strategica alla crescita economica, questa risoluta trasformazione segnerà un momento cruciale nella storia, plasmando il destino della $SAX$ nel futuro."

 saxon_industrialization: "Industrializzazione Sassone"
 saxon_industrialization_desc: "Il successo dell'industrializzazione precoce della $SAX$ è evidente, con un settore industriale altamente sviluppato rispetto ad altre regioni. Il sistema manifatturiero, che produce principalmente per l'esportazione, ha prosperato e renderà la $SAX$ uno Stato leader nel processo di industrializzazione in $GER$. L'emergere di paesaggi commerciali più piccoli e del commercio sarà fondamentale per promuovere la crescita economica della regione e i collegamenti con altri mercati d'$europe$."

 land_of_many_religions: "Il Paese delle Molte Religioni"
 land_of_many_religions_desc: "Il nostro popolo convive con uomini e donne di molte fedi diverse. Questa composizione sociale diversificata è radicata nei nostri quadri giuridici e nelle nostre credenze. Insieme siamo più forti!"

 ukrainian_farmlands: "Terreni Agricoli Ucraini"
 ukrainian_farmlands_desc: "L'Ucraina, o "terre di confine" nella lingua del $slavic$, è una regione che si estende all'estremità meridionale del nostro grande dominio. È sede di aziende agricole altamente produttive, fondamentali per la nostra sopravvivenza e prosperità, poiché forniscono gran parte del grano per i nostri magazzini e per i commercianti di tutto l'$europe$."

 migrant_opportunities: "Opportunità per i Migranti"
 migrant_opportunities_desc: "Le opportunità commerciali e la promessa di una vita migliore sono alcuni dei motivi per cui le nostre città e i nostri insediamenti tendono a ricevere ondate costanti di immigrazione. Molti uomini e donne si trasferiscono nelle nostre terre in cerca di fortuna, e la loro presenza e il loro contributo aumentano a loro volta la nostra fortuna."

 two_realms: "Due Regni"
 two_realms_desc: "A causa delle dimensioni del nostro regno, la nostra giurisdizione ricade sotto due distinti quadri normativi: a nord si trova il cuore dei nostri territori, che abbraccia con orgoglio le nostre tradizioni culturali e i nostri costumi sociali. Tuttavia, le nostre regioni meridionali e orientali spesso divergono in una certa misura dalle nostre norme centrali. Il rispetto di tale diversità rafforzerà la nostra nazione e la nostra posizione sulla scena geopolitica."

 chacery_slavonic: "Cancelleria Slava"
 chacery_slavonic_desc: "Per aiutare a collegare il nostro popolo attraverso il nostro vasto regno, abbiamo bisogno di una lingua unificata e richiediamo che molti membri colti del clero la diffondano. Lo sviluppo di una tale lingua per registrare la nostra storia e mantenere il nostro apparato amministrativo non è solo un segno di orgoglio e prestigio nazionale, ma anche un mezzo per creare un governo distinto, separandoci linguisticamente e culturalmente dai nostri vicini a est."

 supremus_dux_lithuaniae: ""Supremus Dux Lithuaniae""
 supremus_dux_lithuaniae_desc: "Se vogliamo difenderci dai nostri aggressivi nemici del $polish$ e del $russian_group$, dobbiamo mostrare la nostra forza! Istituire il titolo di #italic Duca Supremo di Lituania#! affermerà in modo decisivo la nostra autorità, soprattutto contro il potere crescente della nostra nobiltà e di altri che cercano di violare la nostra sovranità."

 ties_with_the_holy_see: "Legami con la Santa Sede"
 ties_with_the_holy_see_desc: "Anni di negoziati con il Santo Padre hanno portato al nostro abbraccio del Cattolicesimo, con la benedizione dei nostri vicini del $polish$ e dello stesso Papa, durante un processo di cristianizzazione turbolento e unico. Dopo che la nostra lotta per cercare la nostra identità spirituale si è placata, è chiaro che siamo diventati un faro del Cattolicesimo, uno scudo contro i pagani e gli eretici che minacciano la nostra società."

 patriarchate_of_lithuania: "Patriarcato della $LIT$"
 patriarchate_of_lithuania_desc: "L'abolizione del Romuva, una fede abbracciata dai nostri antenati, ha scosso le fondamenta stesse della società Lituana. Tuttavia, al fine di garantire un futuro più luminoso, abbiamo scelto la via dell'Ortodossia e celebriamo pienamente la nostra nuova identità. Ma se vogliamo avere successo in questo, le autorità religiose della nostra nuova fede ortodossa devono mantenere l'autonomia dai patriarcati stranieri al fine di evitare interferenze esterne."

 columns_of_gediminids: "Colonne del $gediminid_dynasty$"
 columns_of_gediminids_desc: "Lo stemma che campeggia sui nostri vessilli ha origine da una delle nostre dinastie più celebrate, la famiglia $gediminid_dynasty$. Molti dei suoi membri più illustri hanno guidato la nostra nazione attraverso tempi turbolenti verso una prosperità abbondante con un'attenta abilità politica e una guida capace. Le colonne di questi grandi leader simboleggiano le solide fondamenta e la tenacia del nostro Paese e dei nostri concittadini."

 warlord_dukes: "Duchi Guerrieri"
 warlord_dukes_desc: "Nel corso di due secoli di guerre straordinarie, i duchi signori della guerra lituani trasformarono una federazione di tribù poco coesa in uno Stato guerriero unificato. Opposero una feroce resistenza all'aggressione degli ordini sacri cattolici, conquistando contemporaneamente vasti territori nell'est. Queste imprese leggendarie continuano a ispirare i nostri leader militari ancora oggi."

 auksine_laisve: "Auksinė Laisvė"
 auksine_laisve_desc: "#italic Auksinė Laisvė#!, o 'Libertà Dorata', è un insieme di leggi e privilegi che pongono i nobili del nostro Paese al di sopra delle altre classi e spesso anche al di sopra del potere della Corona o del Consiglio. Questo sistema unico si è diffuso in $LIT$ attraverso la $POL$ e ha lo scopo di aumentare la lealtà dell'aristocrazia alla Corona, a condizione che il monarca non tenti di rinnegare la sua promessa di mantenere questo straordinario stato di libertà per i nobili."

 magdeburg_laws: "Leggi di Magdeburgo"
 magdeburg_laws_desc: "Una conseguenza della deriva della $LIT$ verso l'Occidente è l'introduzione delle leggi cittadine tedesche in molte aree urbane del Paese. Le leggi di Magdeburgo, nella loro forma locale unica, regolano molti aspetti economici e politici dell'urbanizzazione nazionale, dalla pianificazione urbana al commercio e alla tassazione."

 magnate_estates: "Complessi Magnatizi"
 magnate_estates_desc: "I magnati in $LIT$ sono chiamati "piccoli re" per le loro vaste proprietà e i loro eserciti privati. Difendendo l'indivisibilità dei loro domini e cercando di massimizzarne i profitti, svilupperanno un sistema che per molti aspetti assomiglia a quello dell'antico #italic latifundia#! romano, in cui individui facoltosi possiedono grandi proprietà, spesso lavorate da schiavi o mezzadri."

 lithuanian_hussars: "Ussari Lituani"
 lithuanian_hussars_desc: "Gli ussari alati sono la cavalleria pesante della $LIT$, proprio come lo sono in $POL$. Introdotti in entrambi i paesi dalle riforme di Stefano Batory, re della $POL$ e granduca della $LIT$, rimarranno imbattuti sui campi di battaglia del $eastern_europe$ per più di un secolo."

 statutes_of_lithuania: "Statuti di $LIT$"
 statutes_of_lithuania_desc: "Gli Statuti di $LIT$ sono un insieme di tre diverse riforme legali che aggregano, unificano e aggiornano le leggi del regno. Noti per le punizioni severe e l'introduzione della pena di morte, questi statuti sono in linea con molti codici penali occidentali contemporanei. Ogni crimine dovrebbe essere punito allo stesso modo indipendentemente dalla classe sociale di chi lo commette, ma in pratica i contadini erano spesso svantaggiati rispetto al trattamento riservato ai membri di altri ceti sociali."

 lithuanian_renaissance: "$renaissance$ Lituano"
 lithuanian_renaissance_desc: "La $LIT$ ha vissuto un $renaissance$ tra la fine del XV e l'inizio del XVI secolo. Ispirato dalle idee della Riforma e influenzato dal $renaissance$ italiana, durante questo periodo si assistette a un prolifico fiorire dell'istruzione, delle arti, dell'architettura e della letteratura. Questo periodo vedrà anche la creazione di una forma scritta del $lithuanian_dialect$ e, successivamente, delle prime opere della letteratura $lithuanian_dialect$."

 bavarian_legitimacy: "Ducato Bavarese"
 bavarian_legitimacy_desc: "Ci è stato concesso il dominio della $BAV$ direttamente dall'Imperatore! Presentandoci come i protettori della $BAV$ designati da Dio, garantiremo che la nostra legittimità non possa essere messa in discussione."

 bavarian_imperial_knights: "Cavalieri Imperiali Bavaresi"
 bavarian_imperial_knights_desc: "I nostri nobili si sono distinti come formidabili cavalieri al servizio del $hre$. Dobbiamo coltivare e mantenere scrupolosamente queste truppe per garantire la sopravvivenza dell'integrità del nostro ducato."

 exploit_the_alpine_trade: "Centri Commerciali di $BAV$"
 exploit_the_alpine_trade_desc: "Le nostre terre sono spesso attraversate da mercanti che desiderano commerciare $salt$, $silver$ e $livestock$ nelle ricche terre a sud. Sarebbe sciocco non approfittare della loro presenza, pertanto istituiremo vivaci centri commerciali nelle nostre terre per attirare i loro affari."

 bavarian_brewing_expertise: "Birrai Esperti"
 bavarian_brewing_expertise_desc: "Le nostre terre sono ricche dei raccolti e dell'acqua fresca necessari per produrre la birra, e la nostra gente gode volentieri di questa abbondanza. Molti piccoli birrifici potrebbero diventare attività di successo, con il giusto sostegno."

 bavarian_culture_buildings: "Istituzioni Culturali Bavaresi"
 bavarian_culture_buildings_desc: "Con la nostra patria ai piedi delle splendide Alpi, siamo una meta per artisti provenienti da tutto l'$europe$, che cercano ispirazione nel nostro incredibile paesaggio. Se costruissimo e sostenessimo le istituzioni culturali appropriate, potremmo trasformare la nostra corte in un centro di raffinatezza ed eleganza, in grado di rivaleggiare anche con le potenze più prestigiose dell'$europe$."

 bavarian_stem_duchy: "Sogni di Unificazione"
 bavarian_stem_duchy_desc: "Un tempo eravamo governati dalla $BAV$, unificati nella cultura e alleati sotto un'unica bandiera. Dobbiamo garantire che il nuovo Stato bavarese sia altrettanto potente, una patria degna del suo popolo forte e orgoglioso."

 bavarian_zelousness: "Un'Unica Fede per la $BAV$"
 bavarian_zelousness_desc: "Dobbiamo garantire che il nostro popolo rimanga unito nella fede e che non venga diviso da pensieri eretici."

 bavarian_hofkriegsrat: "Hofkriegsrat Bavarese"
 bavarian_hofkriegsrat_desc: "Istituire un consiglio con il solo compito di consigliare il nostro sovrano in tempi di conflitto ci aiuterà a sviluppare una forza combattente più capace."

 bavarian_flexible_diplomats: "Diplomazia Pratica"
 bavarian_flexible_diplomats_desc: "Che si tratti di rispondere a un sovrano imperiale o di ingraziarsi un potenziale alleato straniero, i nostri diplomatici devono essere preparati a tutto. Ma solo se metteranno al primo posto gli interessi bavaresi nei loro sforzi potremo vantare un vero successo nelle nostre manovre diplomatiche."

 foundation_of_bavarian_army: "Un Esercito per la $BAV$"
 foundation_of_bavarian_army_desc: "Solo con un esercito permanente formidabile avremo la potenza militare necessaria per soddisfare le nostre ambizioni. Con un'attenzione particolare, possiamo espanderlo senza avere un impatto rovinoso sulle finanze del nostro Stato."

 bavarian_coinage: "Moneta della $BAV$"
 bavarian_coinage_desc: "Il nostro regno ha bisogno di una nuova moneta standardizzata che funga da valuta nazionale unificata. La creazione di una zecca di proprietà dello Stato nella nostra capitale garantirebbe il nostro controllo totale su questa nuova moneta."

 bavarian_purity_law: "Legge sulla Purezza Bavarese"
 bavarian_purity_law_desc: "L'eccellente qualità della nostra birra è celebrata da secoli, ma affinché le nostre birre raggiungano uno status leggendario, dobbiamo garantire il loro prestigio e la loro superiorità per sempre. Diversi sovrani in passato hanno creato regolamenti e standard per la produzione di questa meravigliosa bevanda; potremmo usare questo fatto come marchio di qualità dei nostri birrifici."

 hsa_holpfennige: "Hohlpfennig"
 hsa_holpfennige_desc: "Originariamente coniato tra le città di $LUB$ e $HAM$, l'#italic Hohlpfennig#! era una moneta vuota sviluppata come contromisura allo svilimento dilagante, durante un'epoca in cui ogni zecca aveva standard diversi per quanto riguarda la concentrazione di argento su ogni moneta. Come mezzo per condurre le transazioni, la moneta faciliterà le nostre attività commerciali e colmerà il divario tra i mercati esteri e i nostri mercanti."

 hsa_the_cog: "$n_hanseatic_cog$"
 hsa_the_cog_desc: "$n_hanseatic_cog_desc$"

 hsa_hanseatic_ties: "Legami Anseatici"
 hsa_hanseatic_ties_desc: "La nostra Lega ospita un gran numero di città e corporazioni mercantili, tutte con i propri programmi e le proprie iniziative. Al fine di mantenere la nostra prosperità ed espandere la nostra influenza, dobbiamo prestare grande attenzione agli sforzi diplomatici."

 hsa_seal_of_the_hansa: "Sigillo dell'$HSA$"
 hsa_seal_of_the_hansa_desc: "Nei mercati di tutto l'$europe$, dal $london$ al $novgorod$, i nostri mercanti sono famosi per la loro ricchezza. La nostra capacità di mobilitare grandi flotte commerciali e di riunire decine di città in una perfetta sinfonia di profitti e scambi di merci non è seconda a nessuno."

 hsa_hanseatic_shipwrights: "Carpentieri Navali Anseatici"
 hsa_hanseatic_shipwrights_desc: "In un momento in cui l'$europe$ è avvolto dalla guerra, con governanti desiderosi di espansione che avanzano pretese in tutte le direzioni, essi si rivolgono a noi per costruire grandi flotte che consentano loro di realizzare le loro ambizioni. Forti di secoli di conoscenza accumulata nella costruzione navale e di alcuni dei migliori legni del continente, il nostro processo di costruzione navale non ha eguali!"

 hsa_draft_merchant_privileges: "Privilegi dei Reclutatori Commerciali"
 hsa_draft_merchant_privileges_desc: "I mercanti che conducono affari sotto il nostro sigillo esercitano un'enorme influenza e dispongono di ingenti risorse finanziarie. Pertanto, consolidare i loro privilegi nei mercati esteri e nazionali non potrà che aumentare ulteriormente la nostra capacità di intraprendere attività redditizie."

 hsa_mastery_of_the_sea: "Padronanza del Mare"
 hsa_mastery_of_the_sea_desc: "Le nostre tradizioni marittime hanno legato le nostre fortune al potente mare. Per trarre tutti i benefici possibili dalle nostre risorse marine, dobbiamo imparare a sfruttare l'incredibile potere del mare e a trattarlo con il dovuto rispetto. Ciò avrà effetti straordinari sulle nostre attività commerciali."

 hsa_exchange_of_ideas: "Scambio di Idee"
 hsa_exchange_of_ideas_desc: "I nostri mercanti itineranti che portano i nostri affari all'estero sono eccellenti fonti di conoscenza straniera. Ogni volta che tornano sulle nostre coste, portano con sé innovazione e ispirazione."

 hsa_global_reach: "Raggiungi il Mondo"
 hsa_global_reach_desc: "La diffusione del commercio su scala globale ha scosso profondamente il mondo mercantile. Ora è consuetudine intrattenere rapporti commerciali regolari con commercianti stranieri provenienti da ogni angolo del mondo, e il nostro tesoro ne ha tratto beneficio."

 hsa_hanseatic_treasury: "Tesoro Anseatico"
 hsa_hanseatic_treasury_desc: "Un'economia forte è solo uno dei risultati della nostra prosperità. Con monete in abbondanza e casse traboccanti, ci siamo affermati come creditori solidi e affidabili."

 hsa_regularized_contributions: "Contributi Standardizzati"
 hsa_regularized_contributions_desc: "Le numerose entità all'interno della nostra Lega devono essere poste sotto il nostro fermo controllo, nel tentativo di standardizzare i loro contributi mensili e annuali alla nostra tesoreria."

 hsa_reform_the_hanstag: "Riforma l'Hanstag"
 hsa_reform_the_hanstag_desc: "In tempi di difficoltà e di evoluzione del pensiero, le nostre istituzioni centrali di assemblea e deliberazione devono adattarsi per affrontare le sfide emergenti e i nuovi paradigmi."

 hsa_concept_of_mercantilism: "Concetto di Mercantilismo"
 hsa_concept_of_mercantilism_desc: "Nel corso dei secoli passati, abbiamo lavorato instancabilmente per integrare i nostri affari nella scala globale del commercio. Ora, più che mai, dobbiamo proteggere i nostri mercanti, per non cadere vittime del fazionalismo e della concorrenza esterna."

 the_hansa_bank: "La Banca dell'$HSA$"
 the_hansa_bank_desc: "Seguendo il nostro nuovo sistema di contributi, possiamo garantire una banca che i membri possono utilizzare. Sostenuta dalle risorse della Lega, una lettera di credito della banca avrà lo stesso valore del contante. Questo, insieme ad altri strumenti finanziari, darà ai nostri mercanti un vantaggio rispetto a quelli di altri paesi."

 pal_palatine_lion: "Leone Palatino"
 pal_palatine_lion_desc: "Originario dello stemma dinastico della famiglia Wittelsbach, il Leone Palatino è il fulcro della nostra legittimità. Raffigurato con una corona rossa, simboleggia il nostro ruolo di Vicario Imperiale e Arciamministratore del Sacro Romano Impero. Finché il Leone Palatino sarà orgogliosamente raffigurato sul nostro stemma, la nostra legittimità non sarà messa in discussione."

 pal_castles_on_rhine: "Castelli sul Reno"
 pal_castles_on_rhine_desc: "Costruendo diversi castelli in posizioni strategiche lungo il Reno, saremo in grado di esercitare ed espandere il nostro controllo sia sul fiume che sul commercio che lo attraversa."

 pal_cultivate_vineyards: "Vigneti e Frutteti del Reno"
 pal_cultivate_vineyards_desc: "Sebbene il nostro territorio sia piccolo, le rive soleggiate del Reno sono perfette per la coltivazione di vigneti e frutteti. Con un po' di impegno, questi potrebbero sostenere la nostra economia locale grazie alla produzione di vino."

 pal_protection_of_exclaves: "Fortificazioni Locali"
 pal_protection_of_exclaves_desc: "A causa della dispersione dei nostri territori, siamo vulnerabili agli attacchi di diverse potenze straniere. La costruzione di numerosi avamposti fortificati all'interno dei nostri confini ci consentirà di guadagnare tempo per radunare un esercito e respingere qualsiasi tentativo di conquistare uno dei nostri numerosi territori scollegati."

 pal_fractured_territory: "Consolidare i Territori"
 pal_fractured_territory_desc: "La nostra amministrazione è abile nel gestire più territori disconnessi senza perdere il controllo su di essi. In questo modo, possiamo costruire una burocrazia forte in grado di gestire anche i compiti più difficili."

 pal_a_just_ruler: "Un Governante Mite e Calmo"
 pal_a_just_ruler_desc: "L'unico effetto dello spargimento di sangue è causare ulteriore spargimento di sangue. Pertanto, dobbiamo essere un sovrano clemente e riconciliarci con i nostri nemici per stabilire una pace duratura nei nostri territori."

 pal_heaven_of_tolerance: "Tolleranza del Palatinato"
 pal_heaven_of_tolerance_desc: "Indipendentemente dalla loro confessione religiosa, tutti i cittadini cristiani devono essere accolti nelle città e nei paesi delle nostre terre. Mentre altri potrebbero decidere di reprimere le minoranze religiose, la nostra tolleranza garantirà un flusso costante di immigrati nel nostro territorio e noi trarremo beneficio dalla loro presenza."

 pal_mildness_to_the_commoners: "Perdono per i Contadini"
 pal_mildness_to_the_commoners_desc: "Quando i nostri contadini si ribellano contro la nostra nobiltà, si ribellano inequivocabilmente contro il nostro stesso governo. Tuttavia, non dovremmo punire eccessivamente coloro che si ribellano. Con conseguenze lievi, tutti saranno più in linea con la nostra autorità."

 pal_humanist_court: "Educazione Umanistica"
 pal_humanist_court_desc: "Per governare bene, i nostri governanti devono ricevere un'istruzione completa nelle idee umanistiche. A tal fine, dobbiamo assumere umanisti di fama per l'istruzione dei nostri governanti e dei nostri eredi, concentrando al contempo la nostra corte su questi principi."

 pal_heidelberg_catechism: "Catechismo di Heidelberg"
 pal_heidelberg_catechism_desc: "La Riforma ha dato vita a molte discussioni sulla natura della nostra fede. Dovremmo investire in un catechismo completo, al quale il nostro popolo potrà aderire."

 pal_bilbiotheca_palatina: "Proteggiamo la #italic Bibliotheca Palatina#!"
 pal_bilbiotheca_palatina_desc: "Ricca di scritti teologici di diverse confessioni cristiane, la #italic Bibliotheca Palatina#! è uno dei nostri beni più preziosi. La protezione della conoscenza e del valore culturale in essa contenuti deve essere una priorità assoluta, affinché possiamo continuare ad affidarci ai suoi documenti."

 palatinate_romanticism: "Sostenere il Movimento Romantico"
 palatinate_romanticism_desc: "Una parte significativa del movimento romantico è incentrata sul $heidelberg$. Dovremmo sfruttare questo fenomeno e sostenere questi e altri artisti al fine di rafforzare il nostro riconoscimento globale."

 amazigh_slave_raids: "Raid Amazigh per gli Schiavi"
 amazigh_slave_raids_desc: "I nostri predoni costieri forniscono alla nostra nazione un afflusso costante di prigionieri dall'$europe$ attraverso incursioni marittime e incursioni costiere. Questo approvvigionamento costante di manodopera schiavizzata è fondamentale per espandere la nostra forza lavoro e aumentare il nostro successo economico."

 zenata_roots: "Radici di Zenata"
 zenata_roots_desc: "Il nostro popolo discende dagli Zenata, una tribù nota soprattutto per la sua importante produzione di lana e per la sua abilità nel pascolare grandi greggi di montoni."

 mor_marabouts: "Marabutti Sufi"
 mor_marabouts_desc: "Diversi gruppi di insegnanti Ṣūfī hanno fatto del Marocco la loro casa. Dobbiamo assicurarci di accogliere questi santi uomini e di prendere a cuore i loro insegnamenti."

 trans_saharan_trade: "Commercio Trans-Sahariano"
 trans_saharan_trade_desc: "Le carovane delle grandi rotte sahariane commerciano $salt$ e altre merci provenienti dal $north_africa$ in cambio di $slaves_goods$ e $goods_gold$ provenienti dai regni subsahariani. Attraverso queste preziose vie commerciali, costruiremo la nostra grande eredità."

 first_fleet_of_the_med: "Prima Flotta del Mediterraneo"
 first_fleet_of_the_med_desc: "I grandi al-Muwaḥḥidūn un tempo erano orgogliosi di possedere una delle marine più formidabili dell'intero Mar Mediterraneo. Il nostro popolo possiede ancora oggi le tradizioni e le competenze necessarie per riaccendere quella passione e riportare la nostra grandezza attraverso gli oceani."

 slave_soldiers: "Soldati Schiavi"
 slave_soldiers_desc: "Per garantire un corpo leale di truppe permanenti ben addestrate, impiegheremo soldati schiavi disciplinati provenienti dalla nostra società."

 desert_power: "Potenza del Deserto"
 desert_power_desc: "La nostra regione è abitata da molti contadini e gruppi tribali, che rappresentano le classi inferiori della nostra società. Nonostante la loro relativa povertà, essi esercitano una grande influenza sulle rotte commerciali che attraversano i deserti aridi tra le nostre città. Portare queste persone sotto la nostra giurisdizione e assicurarci la loro fedeltà ci aiuterà ad affermarci come potenti rampolli del deserto."

 atlantic_trade_routes: "Rotte Commerciali Atlantiche"
 atlantic_trade_routes_desc: "Navigate con successo dai marinai partendo dall'$europe$, queste nuove rotte marittime hanno aperto le porte al flusso di merci e monete provenienti sia dal Nuovo Mondo che dall'Estremo Oriente."

 foreign_politics: "Politica Estera"
 foreign_politics_desc: "Per prevalere sui nostri nemici, dobbiamo stabilire canali diplomatici adeguati e una cooperazione ufficiale con i paesi che condividono la nostra animosità nei loro confronti."

 saharan_gold_trade: "Commercio tra il Sahara e l'$goods_gold$"
 saharan_gold_trade_desc: "L'$goods_gold$ estratto dal nostro territorio è di qualità superiore ed è uno strumento eccellente per diffondere ulteriormente la nostra influenza sulle rotte commerciali con i porti stranieri."

 jaysh_armies_advance: "Eserciti di Jaysh"
 jaysh_armies_advance_desc: "Si sta aprendo una nuova era nella guerra e con essa nasce l'esigenza di un nuovo reggimento di forze leali. I combattenti Jaysh, reclutati dalla nostra popolazione tribale, forniscono soldati disciplinati che conoscono bene la guerra regionale e il terreno locale."

 black_guard: "$a_black_guard$"
 black_guard_desc: "$a_black_guard_desc$"

 shurfa_status: "Stato di Shurfā'"
 shurfa_status_desc: "Tra tutti gli abitanti del mondo musulmano, pochi possono vantarsi di essere discendenti del Grande Profeta, la figura più venerata e prestigiosa. Noi, ovviamente, siamo tra questi pochi eletti."

 maghrebi_administration: "Amministrazione Magrebina"
 maghrebi_administration_desc: "Secoli di autonomia e il nostro ambiente ostile hanno alimentato tendenze separatiste tra le tribù regionali all'interno dei nostri confini. L'amministrazione magrebina affronta questo problema creando una rete di governatori regionali, che applicano l'autorità centrale e la volontà del sovrano nel rispetto delle usanze locali."

 barid: "Barīd"
 barid_desc: "Servizio postale che si estende fino agli angoli più remoti del nostro Impero, questa istituzione è responsabile di tutte le comunicazioni tra la nostra capitale e i centri dell'autorità locale in tutto il territorio."

 karimi_merchants: "Mercanti di Kārimī"
 karimi_merchants_desc: "Formidabili commercianti che trattano principalmente spezie, questi giganti marittimi hanno tratto grandi profitti dal flusso di merci esotiche che provengono dalle coste dell'$india$ e oltre."

 mamluk_soldiers: "$a_mamluk_unit_traditions$"
 mamluk_soldiers_desc: "$a_mamluk_unit_traditions_desc$"

 royal_mamluks: "I Mamelucchi Reali"
 royal_mamluks_desc: "I Mamelucchi Reali sono il nucleo d'élite dell'esercito mamelucco e fungono da guardia personale del Sultano. Selezionati a mano e rigorosamente addestrati, sono rinomati per la loro lealtà, le eccezionali capacità di combattimento e la dedizione incrollabile."

 red_sea_trade: "Commercio nel Mar Rosso"
 red_sea_trade_desc: "Il commercio delle spezie che attraversa il Mar Rosso è una fonte fondamentale della nostra ricchezza e dobbiamo assumerne il pieno controllo. Minacciando di bruciare tutti i porti del Mar Rosso al di fuori della nostra autorità che accettano commercianti di spezie, possiamo conquistare la parte più consistente di questo lucroso commercio. Forse non ci guadagneremo molte amicizie con la nostra aggressività, ma avremo abbastanza oro per consolarci."

 mamluk_halqah: "$a_halqah_unit$"
 mamluk_halqah_desc: "$a_halqah_unit_desc$"

 reform_the_mamluk_corps: "$a_mamluk_unit_renaissance$"
 reform_the_mamluk_corps_desc: "$a_mamluk_unit_renaissance_desc$"

 kashif: "Kāshif"
 kashif_desc: "Il nostro Sultanato è enorme, quindi dobbiamo fare scelte sagge e attente riguardo alla sua amministrazione. Assumere persone particolarmente colte come governatori locali è una mossa brillante, che alla fine dovrebbe far pendere la bilancia geopolitica a nostro favore."

 port_customs: "Dogana del Porto"
 port_customs_desc: "Designare i nostri porti come zone commerciali ufficiali per le merci in arrivo è una mossa che aumenterà sicuramente l'importanza mercantile del nostro territorio, anche se a spese dei nostri vicini e nemici."

 masters_of_the_nile: "I Maestri del Nilo"
 masters_of_the_nile_desc: "Il cuore pulsante del nostro Sultanato è il fiume Nilo. Attraversando la nostra nazione, il suo tocco crea le nostre terre più fertili e le sue acque portatrici di vita canalizzano prosperità e ricchezza in tutto il nostro dominio."

 indian_networks: "Reti Indiane"
 indian_networks_desc: "I nostri mercanti commerciano merci dai mercati del $alexandria$ alle coste di Aden e fino all'$india$ stesso. Queste vaste reti di contatti, affari e capitali ci hanno posizionato all'avanguardia del commercio marittimo."

 study_foreign_gunpowder_techniques: "Polvere da Sparo Straniera"
 study_foreign_gunpowder_techniques_desc: "I grandi imperi dell'$europe$ e dell'Oriente hanno compiuto progressi rivoluzionari nell'uso della polvere da sparo e nelle sue applicazioni militari. Studiare i loro metodi e apportare i relativi miglioramenti ai nostri armamenti rafforzerebbe notevolmente il nostro esercito."

 secure_mediterranean_ports: "Porti Sicuri nel Mediterraneo"
 secure_mediterranean_ports_desc: "I nostri porti sul Mar Mediterraneo sono tra i più ricchi dell'intera regione. Mercanti provenienti da ogni angolo del mondo conosciuto viaggiano verso il $alexandria$ e il Cairo per commerciare spezie, $silk$ e pietre preziose. La creazione di una marina mercantile per facilitare e proteggere le nostre vie marittime sarebbe quindi un'idea saggia."

 bohemian_imperial_standing: "Posizione Boema nel Sacro Romano Impero"
 bohemian_imperial_standing_desc: "La nostra posizione all'interno del $hre$ è di prestigio, grandezza e autorità. Pochi membri esercitano un soft power pari al nostro, grazie ai nostri abili diplomatici e alle nostre reti di alleanze."

 bohemian_crystal: "Cristallo Boemo"
 bohemian_crystal_desc: "Nel mondo conosciuto esistono pochissimi laboratori in grado di produrre vetro e cristallo con la stessa qualità e trasparenza dei nostri, per non parlare delle nostre tecniche di produzione superiori."

 students_of_foreign_courts: "Studenti di Corti Straniere"
 students_of_foreign_courts_desc: "I membri delle nostre dinastie reali sono abituati ai viaggi all'estero. Hanno trascorso gran parte della loro formazione come studenti di illustri corti lontane da casa, alla ricerca di un'istruzione approfondita in materia di arte di governo."

 urbanization_decrees: "Decreti di Urbanizzazione"
 urbanization_decrees_desc: "Nell'ambito dei nostri sforzi per modernizzare il $prague$, erigeremo sovvenzioni per incoraggiare personalità di spicco a trasferire le loro attività nella capitale, offrendo al contempo privilegi per attrarre immigrati stranieri qualificati e facoltosi. Questo afflusso di talenti e capitali trasformerà il nostro $prague$ in una metropoli cosmopolita e fiorente."

 seat_of_metropolitan_bishop: "Sede del Vescovo Metropolita"
 seat_of_metropolitan_bishop_desc: "Il popolo russo ha bisogno di una guida religiosa salda. Abbiamo storicamente collaborato bene con la Chiesa e l'espansione di questo rapporto sarebbe vantaggiosa per tutti noi. Se riusciremo a trasferire la sede del vescovo metropolita in $moscow$, potremo rafforzare i legami tra la nostra fede e il nostro Stato."

 pomestnoe_voisko: "Pomestnoe Voisko"
 pomestnoe_voisko_desc: "Ridistribuendo appezzamenti di terreni confiscati ai nobili cavalieri, potremo creare una nuova classe di soldati per difendere il nostro principato."

 strength_of_the_boyars: "La Forza dei Boiardi"
 strength_of_the_boyars_desc: "La classe dei boiardi è per molti versi il fondamento della $RUS$, ma proprio come abbiamo bisogno di rafforzare i boiardi, abbiamo anche bisogno di controllarli. Dobbiamo proteggere i seggi dei boiardi nella Duma, ma anche assicurarci che dipendano da noi per aumentare la loro influenza."

 zasechnaya_cherta: "Zasechnaya Cherta"
 zasechnaya_cherta_desc: "Per resistere alla costante minaccia delle incursioni tartare, i nostri antenati hanno costruito una linea di forti ben posizionati e ben difesi. Man mano che il nostro Stato cresce, dovremmo continuare ad espandere questa "Linea Abatis" per garantire che il nostro popolo sia sempre protetto dagli attacchi stranieri."

 russian_artillery_yard: "Arsenale di Artiglieria Russo"
 russian_artillery_yard_desc: "Una potenza di fuoco superiore è ciò che determina chi vince gli assedi di oggi e le battaglie campali di domani. Dobbiamo costruire un deposito di artiglieria all'avanguardia nel cuore del nostro paese, per garantire che i nostri eserciti non siano mai privi di cannoni o munizioni."

 life_long_conscription: "Coscrizione a Vita"
 life_long_conscription_desc: "Per sfamare i nostri eserciti in continua crescita, dovremmo estendere la durata del servizio militare affinché diventi un impegno a vita. Ciò offrirà mobilità sociale a coloro che altrimenti condurrebbero una vita in occupazioni di livello inferiore e ci fornirà una fonte affidabile di soldati per le nostre imprese imperiali."

 the_mestnichestvo_advance: "$the_mestnichestvo$"
 the_mestnichestvo_advance_desc: "$the_mestnichestvo_desc$"

 table_of_ranks: "La Tabella dei Ranghi"
 table_of_ranks_desc: "L'abolizione del Mestnichestvo fu il primo passo verso la creazione di una burocrazia statale più meritocratica. La Tabella dei Ranghi codificò ulteriormente questo principio, subordinando l'avanzamento militare al rendimento piuttosto che alla nascita nobile."

 voivode_advance: "Voivoda"
 voivode_advance_desc: "Il #italic voivoda#! è un capo militare con autorità amministrativa regionale, che difende il territorio e mantiene l'ordine. Un voivoda può essere utile per superare le sfide poste dai mezzi di comunicazione limitati disponibili, poiché ha l'autorità di prendere decisioni cruciali senza attendere l'approvazione."

 haudenosaunee_tradition: "L'eredità di Hiawatha"
 haudenosaunee_tradition_desc: "Il leggendario Hiawatha, famoso tra il popolo Haudenosaunee come grande oratore e leader, ha stabilito un precedente molto alto per ciò che dovrebbe essere un diplomatico. Lo onoreremo seguendo il suo esempio nelle nostre relazioni diplomatiche."

 haudenosaunee_heritage: "Guerrieri Feroci"
 haudenosaunee_heritage_desc: "Sarebbe un errore da parte dei nostri nemici considerarci deboli sulla base della nostra forza diplomatica. I nostri guerrieri sono feroci e orgogliosi come quelli di qualsiasi società militarista, e sottovalutarli è la principale causa di morte tra i nostri rivali."

 tree_of_peace: "Albero della Pace"
 tree_of_peace_desc: "L'Albero della Pace è l'eredità del Grande Pacificatore ed è un simbolo del nostro impegno per l'unità tra le diverse tribù, nonché una rappresentazione degli stessi capi."

 kainerekowa: "Kaianere'kó:wa"
 kainerekowa_desc: "Dobbiamo sempre onorare l'opera di Hiawatha e del Grande Pacificatore, la Grande Legge della Pace, che ha unito le nostre cinque nazioni sotto un unico scopo e ci ha dato le nostre regole di governo."

 mourning_wars: "Guerre in Lutto"
 mourning_wars_desc: "È una tradizione consolidata del nostro popolo adottare i guerrieri catturati nella nostra tribù. Ma per ricostituire i nostri ranghi e garantire la nostra forza difensiva e offensiva, dovremmo cercare di adottare intere tribù nell'$IRO$, non solo singoli combattenti."

 warriors_unity: "Unità dei Guerrieri"
 warriors_unity_desc: "Forse non siamo la tribù più numerosa in termini di effettivi, ma la nostra natura tribale ci dà qualcosa che agli altri manca: l'unità! I nostri guerrieri combattono come fratelli e restano uniti sul campo di battaglia. Finché manterremo questa tradizione, non potremo perdere!"

 haudenosaunee_ambition: "Modello di Confederazione"
 haudenosaunee_ambition_desc: "La Confederazione dell'$IRO$ è diventata un modello di successo. Tutte le nazioni che ci circondano sono stupite dalla nostra eccellente leadership!"

 three_sisters: "Agricoltura delle Tre Sorelle"
 three_sisters_desc: "La nostra terra è ricca e produce molti raccolti, ma il metodo di coltivare insieme mais, fagioli e zucca è uno dei nostri più grandi successi agricoli. Coltivati insieme, questi raccolti hanno una resa migliore rispetto a quando vengono piantati separatamente."

 maple_syrup: "Sciroppo d'Acero"
 maple_syrup_desc: "I numerosi aceri del nostro paese producono grandi quantità di linfa, che può essere raccolta e bollita per creare un delizioso sciroppo dolce e altri dolciumi."

 stickball_game: "Gioco Stickball"
 stickball_game_desc: "L'antica tradizione del gioco dello stickball fa parte della nostra cultura da secoli. Utilizzato per scopi rituali o per risolvere controversie, centinaia di guerrieri si riuniscono in un campo con bastoni di legno e una sola palla, che deve essere diretta verso una porta segnata. Questa pratica non solo unisce il nostro popolo, ma mantiene i nostri guerrieri in ottima forma."

 wampum: "Wampum"
 wampum_desc: "Un mix di perline bianche e viola realizzate con diversi tipi di conchiglie, i wampum sono utilizzati per molti scopi, come registrare trattati e storie orali, facilitare la diplomazia e fungere da sistema di scambio nel commercio. I wampum compaiono ovunque il nostro popolo metta piede."

 shared_brotherhood: "Fratellanza Condivisa"
 shared_brotherhood_desc: "Uniti dagli insegnamenti della Grande Legge della Pace, il nostro popolo mantiene un forte senso di fratellanza e unità, nonostante le diverse origini tribali."

 captives_in_war: "Prigionieri in Guerra"
 captives_in_war_desc: "Combattiamo le guerre principalmente per catturare prigionieri, che sostituiscono le nostre perdite. Tuttavia, non tutti questi prigionieri devono essere adottati dalla nostra tribù, alcuni possono invece essere utilizzati come manodopera."

 haudenosaunee_present_giving: "Scambio di Doni $IRO_ADJ$"
 haudenosaunee_present_giving_desc: "La base delle nostre interazioni commerciali è rappresentata dalla forma dello scambio di doni. Poiché i nostri popoli si uniscono e lavorano per il beneficio dell'insieme, l'atto del dono è garantito per essere seguito da un altro dono in cambio."

 pochtecayotl: "Pōchtēcayōtl"
 pochtecayotl_desc: "I commercianti viaggiano lontano, in province ben oltre la portata della nostra autorità e persino nei territori dei nostri rivali. Se questi commercianti fungessero anche da nostri occhi e orecchie, quali segreti potremmo scoprire?"

 warrior_societies: "Società di Guerrieri"
 warrior_societies_desc: "La nostra società è straordinariamente dinamica e offre ai cittadini comuni, noti anche come #italic mācēhualtin#!, la possibilità di diventare #italic pīpiltin#!, ovvero nobili, grazie a un servizio militare eccezionale attraverso il sistema di gradi onorifici #italic tlahuiztli#! Questa opportunità unica di mobilità sociale garantisce al nostro popolo un netto vantaggio rispetto alle società vicine."

 chinampas: "Chinampas"
 chinampas_desc: "Abile nel terrazzamento delle colline per la coltivazione e abile nel creare terreni coltivabili su porzioni di lago poco profonde grazie a ingegnosi #italic chinampa#!, le notevoli capacità agricole della nostra popolazione gioveranno in modo significativo alla nostra società."

 people_of_war: "Gente di Guerra"
 people_of_war_desc: "Che prendiamo le armi per cercare prestigio, per incutere timore nei nostri nemici, per catturare prigionieri da sacrificare o semplicemente per acquisire ricchezze, il nostro popolo è abituato a uno stato di guerra continuo e ne sopporta le difficoltà con maggiore resilienza rispetto ai membri di altre nazioni."

 tlahtocayotl: "Tlahtohcāyōtl"
 tlahtocayotl_desc: "Creeremo un sistema di province per le città-stato integrate nel nostro regno, nel tentativo di centralizzare il nostro potere."

 calpixcayotl: "Calpixcāyōtl"
 calpixcayotl_desc: "Le nostre regioni tributarie riceveranno dei collettori di tributi nominati, chiamati #italic calpixqueh#!, che avranno il compito di garantire che il flusso dei tributi non si interrompa mai. Ci sarà un #italic calpixqui#! nella regione e un altro nella capitale della nostra nazione, per ogni stato tributario."

 reformed_telpochcalli: "Tēlpōchcalli Riformato"
 reformed_telpochcalli_desc: "Quando affrontiamo nuovi nemici, è necessario sviluppare o imparare nuove tattiche militari. Queste preziose conoscenze saranno insegnate nei nostri #italic Tēlpōchcalli#!."

 nahuatl_domination: "Dominio del $nahua_culture$"
 nahuatl_domination_desc: "La superiorità della cultura del $nahua_culture$ è molto evidente, poiché i popoli vicini la adottano sempre più come propria. Questa diffusione culturale e questa espansione dell'influenza ci offrono l'opportunità di estendere il nostro controllo politico ben oltre i nostri confini."

 the_return_of_quetzalcoatl: "Il Ritorno di Quetzalcōtl"
 the_return_of_quetzalcoatl_desc: "Il contatto con stranieri provenienti da altri continenti ci ha fornito nuove interessanti idee sui nostri dei. La profezia di #italic Quetzalcōātl#! svela una realtà al di là del mito: un barlume di verità. #italic Quetzalcōātl#!, "il Serpente Piumato", tornerà presto e annuncerà un'era di trasformazione, sconfiggendo l'oscurità per portare l'illuminazione. Simbolo della fusione cosmica, egli collegherà la materia e lo spirito, ripristinando l'equilibrio ed elevando la coscienza umana."

 brave_as_hummingbird: "Coraggioso come un Colibrì"
 brave_as_hummingbird_desc: "Il colibrì ricopre un ruolo cruciale nella nostra mitologia. Legato al dio della guerra, Huītzilōpōchtli, incarna la reincarnazione dei guerrieri caduti ed è onorato per il suo coraggio. Il colibrì diventerà un nuovo simbolo per i nostri stendardi, che ispirerà i nostri soldati a combattere fino alla morte!"

 new_trade_opportunities: "Nuove Opportunità Commerciali"
 new_trade_opportunities_desc: "Le esigenze del nostro popolo si sono adattate ai nuovi mercati che si sono aperti ai nostri commercianti e abbiamo formato i nostri mercanti sui metodi per massimizzare i nostri guadagni."

 aztec_chargers: "Carica Azteca"
 aztec_chargers_desc: "La natura aggressiva dei nostri guerrieri è nota - e temuta - oltre i nostri confini. Quando inizia la battaglia, i nostri nemici tremano di paura alla vista dei nostri combattenti che li caricano con frenesia, come se stessero per essere travolti dagli araldi della Morte stessa."

 chasqui: "Chasqui"
 chasqui_desc: "Gli #italic chasquis#! sono i messaggeri del nostro Stato. Scelti tra i corridori più in forma e resistenti del nostro Paese, questi uomini agili trasportano lettere, messaggi, doni e altri tipi di informazioni dal $quipu$ e li consegnano al destinatario. La diffusione delle idee, così come gran parte della nostra diplomazia, poggia sulle loro spalle."

 military_mita: "Mit'a Militare"
 military_mita_desc: "Il #italic mit'a#! è un sistema di servizio pubblico obbligatorio fondamentale per la società Inca e costituisce la spina dorsale del servizio militare. Ogni #italic ayllu#! deve fornire uomini capaci, adatti al combattimento in alta montagna, per fornire manodopera per i progetti statali e il servizio militare."

 warachikuy: "Warachikuy"
 warachikuy_desc: "Il #italic warachikuy#! è una cerimonia sacra in cui i giovani vengono messi alla prova per dimostrare le loro abilità, il loro coraggio e la loro intelligenza, nonché le loro capacità fisiche come la corsa, il tiro, il combattimento e la resistenza alla privazione del sonno per lunghi periodi. Coloro che superano queste prove con eccellenza vengono promossi al grado di ufficiali del nostro esercito in continua crescita."

 mitma: "Obblighi di Mitma"
 mitma_desc: "In passato, per intraprendere grandi progetti di costruzione, i nostri governanti dovevano rispettare le antiche tradizioni invitando nella capitale tutti i piccoli capi del nostro impero, ricoprendoli di doni e organizzando banchetti sontuosi. Tuttavia, con la crescita del nostro Stato, questo è ben lungi dall'essere il modo ideale per intraprendere tali progetti. Fornire manodopera e materiali per la costruzione dovrebbe essere compito di ogni singolo capo delle nostre terre."

 quipu: "Quipu"
 quipu_desc: "Un sistema che utilizza nodi su una corda per memorizzare informazioni, tenere la contabilità e svolgere altre attività informative. Ogni nodo rappresenta un numero da zero a nove. I nodi possono anche essere utilizzati per fare riferimento a logogrammi sulla stessa corda. I nodi indicano quale sillaba del logogramma utilizzare e, combinando più corde, è possibile formare delle frasi."

 drafted_hatun_runas: "Redazione di Hatun Runas"
 drafted_hatun_runas_desc: "Gli #italic Hatun Runas#! sono la classe contadina del nostro impero. Uno su cinquanta uomini viene scelto per il servizio militare al compimento del venticinquesimo anno di età e arruolato per i successivi sette anni. Questo sistema di coscrizione ci aiuta a mantenere un esercito professionale consistente con una disciplina superiore a quella delle truppe dei nostri avversari."

 llama_michis: "Lama Michis"
 llama_michis_desc: "I lama hanno molte funzioni nella nostra società. Fungono da bestie da soma, da sacrifici, forniscono carne e lana e ci danno persino il fertilizzante per i nostri raccolti con il loro sterco. Controllando l'allevamento e l'uso dei lama attraverso i #italic michis#!, o pastori, garantiamo che la popolazione di lama sia rigorosamente monitorata. Ciò fornirà un'opportunità per aumentare la popolazione di lama"

 inc_tambo: "Stazioni Migliorate di Tambo Way"
 inc_tambo_desc: "La nostra rete stradale è una delle risorse più preziose del nostro impero. Per avvantaggiare ulteriormente il nostro esercito e la nostra amministrazione, erigeremo delle stazioni di posta #italic tambo#! lungo tutte le strade principali. Queste stazioni saranno costruite a una giornata di marcia l'una dall'altra e forniranno riparo e rifornimenti ai viaggiatori."

 adapted_incan_army: "Esercito Inca Adattabile"
 adapted_incan_army_desc: "Invasori provenienti da terre straniere hanno messo piede nel nostro territorio e minacciano la nostra stessa esistenza. Ma i nostri eserciti sono adattabili; si adeguano alle nuove tattiche nemiche, imparano a usare le loro stesse armi contro di loro e combattono con una determinazione incrollabile ispirata dai loro nemici."

 pukara_advance: "$pukara_building$"
 pukara_advance_desc: "$pukara_building_desc$"

 terraces_advance: "$terraces$"
 terraces_advance_desc: "$terraces_desc$"

 tambo_advance: "$tambo$"
 tambo_advance_desc: "$tambo_desc$"

 incamisana_advance: "$incamisana$"
 incamisana_advance_desc: "$incamisana_desc$"

 kor_fortresses_of_goguryeo: "Fortezze di Goguryeo"
 kor_fortresses_of_goguryeo_desc: "Il $korea_region$ è stato sede di numerosi regni nel corso della storia. Tuttavia, l'influenza di un regno in particolare è ancora oggi tangibile: il Goguryeo, precursore del Goryeo. Il Goguryeo ci ha lasciato numerose eredità, tra cui le fortificazioni in pietra e le tecniche di costruzione dei castelli, ancora oggi in uso."

 kor_korean_artisanry: "Artigianato del $korean_culture$"
 kor_korean_artisanry_desc: "Il $korea_region$ ha sempre avuto tradizioni artistiche, ma l'arte è davvero fiorita dopo la nostra unificazione nazionale, proiettandoci in un'epoca d'oro di conquiste culturali. Tra i nostri numerosi successi, l'artigianato del nostro popolo brilla come un faro di abilità e raffinatezza."

 kor_korean_barracks_advance: "$korean_barracks$"
 kor_korean_barracks_advance_desc: "$korean_barracks_desc$"

 kor_court_poetry: "Poesia del Tribunale"
 kor_court_poetry_desc: "La nostra aristocrazia attribuisce grande importanza allo sviluppo culturale dello spirito e della mente. La letteratura, come la poesia in $classical_chinese_language$, è considerata di grande valore dalla corte. Sia la nobiltà che la classe dirigente sono entusiaste dell'impatto culturale della parola scritta."

 kor_metal_movable_type: "Tipo Mobile in Metallo"
 kor_metal_movable_type_desc: "I caratteri mobili sono un'antica tecnologia di stampa utilizzata per la prima volta dal popolo cinese molti secoli fa. Ma è stata la dinastia Goryeo a sviluppare la forma metallica dei caratteri mobili, semplificando il processo di stampa. Ora possiamo stampare libri con un'efficienza senza pari."

 kor_gunpowder_engines: "Armi a Polvere da Sparo"
 kor_gunpowder_engines_desc: "Le nostre forze armate conoscono da secoli il valore tattico della polvere da sparo. Grazie alla progettazione inversa dei progetti Cinesi e alle innovazioni di Choe Museon, abbiamo imparato a produrre la polvere da sparo e a costruire macchine che la utilizzano per scopi militari."

 kor_hwachas_advance: "$a_hwacha$"
 kor_hwachas_advance_desc: "$a_hwacha_desc$"

 kor_early_turtle_ship_advance: "$n_early_turtle_ship$"
 kor_early_turtle_ship_advance_desc: "$n_early_turtle_ship_desc$"

 kor_korean_gunnery: "$korean_gunnery$"
 kor_korean_gunnery_desc: "Con il progresso della tecnologia della polvere da sparo, progredisce anche la nostra ingegnosità e, di conseguenza, abbiamo ideato un nuovo sistema difensivo. Sebbene semplice nel concetto e nell'esecuzione, l'installazione di cannoni nelle nostre fortificazioni aumenterà enormemente le loro capacità difensive."

 kor_hangeul_alphabet: "L'alfabeto Hangeul"
 kor_hangeul_alphabet_desc: "La lingua $korean_language$ è così fondamentalmente diversa da qualsiasi forma di $chinese_language_family$ che l'uso dei caratteri $chinese_language_family$ rende analfabeti tutti tranne le persone più istruite. Il nostro nuovo alfabeto è più scientifico e consentirà a tutto il nostro popolo di leggere e scrivere nella propria lingua."

 kor_grand_code: "Grande Codice per l'Amministrazione dello Stato"
 kor_grand_code_desc: "Per garantire un governo adeguato e stabile, dobbiamo prima codificare esattamente il funzionamento del governo. Questa sarà la base della prima costituzione scritta della nostra nazione."

 kor_border_defense_council: "Consiglio di Difesa dei Confini"
 kor_border_defense_council_desc: "I nostri confini sono costantemente minacciati, sia dai barbari del nord che dai pirati provenienti da oltre mare. Per garantire che i nostri eserciti siano sempre pronti a rispondere con rapidità a ogni minaccia, istituiremo un consiglio di ufficiali dedicato al controllo e alla sicurezza dei nostri confini."

 kor_panokseon_advance: "$n_panokseon$"
 kor_panokseon_advance_desc: "$n_panokseon_desc$"

 kor_korean_cannon: "Il Cannone Coreano"
 kor_korean_cannon_desc: "Sebbene abbiamo già una notevole esperienza nell'uso della polvere da sparo e dei cannoni, non dobbiamo smettere di compiere progressi tecnologici. Sviluppando cannoni più piccoli ma più resistenti e inventando metodi di ricarica più efficienti, rivoluzioneremo la nostra artiglieria e porteremo grandi benefici sia al nostro esercito che alla nostra marina."

 hyanyak_system: "Sistema Hyangyak"
 hyanyak_system_desc: "L'agricoltura è il fondamento della nostra economia e quindi una gestione efficiente dei villaggi è fondamentale. A tal fine, implementeremo il sistema #italic hyangyak#!, che stabilisce l'autogoverno dei villaggi. Questi accordi stabiliscono norme di comportamento, regolamenti per la risoluzione delle controversie e altre procedure civili volte a creare comunità stabili e autosufficienti."

 kor_geobukseon: "Geobukseon"
 kor_geobukseon_desc: "La difesa delle nostre coste è fondamentale per la nostra sopravvivenza e, grazie a questa vigilanza, abbiamo sviluppato l'ingegnosa "nave tartaruga". Questi colossi pesantemente corazzati garantiranno che nessuna nave nemica penetri nelle nostre proprietà costiere."

 kor_hopae_system: "Il Sistema Hopae"
 kor_hopae_system_desc: "L'#italic hopae#! è un sistema di identificazione che richiede a tutti i cittadini del $korean_culture$ di portare con sé un documento che attesti il loro nome, luogo di nascita, status e residenza. Ciò consente alle autorità di verificare rapidamente l'identità delle persone e, se necessario, di tracciare i loro spostamenti."

 kor_daedongbeop: "Daedongbeop"
 kor_daedongbeop_desc: "Una nuova serie di riforme che introdurrà gradualmente miglioramenti precedentemente ignorati nel sistema fiscale. L'imposta tributaria applicata alle famiglie sarà sostituita da un'imposta unificata sui terreni coltivabili, mentre l'imposta sui beni sarà limitata a una quota che consentirà ai contadini intraprendenti e ai grossisti di produrre e vendere beni in eccedenza. Ciò comporterà una riduzione delle imposte per i contadini, un aumento delle entrate per lo Stato e un aumento complessivo del commercio."

 natural_seamanship: "Abilità Marinaresca Naturale"
 natural_seamanship_desc: "Con la crescita della nostra industria ittica, abbiamo assistito anche a una corrispondente espansione del numero di marinai nel nostro regno. Dovremmo approfittarne e reclutarne alcuni nella nostra marina, poiché l'abilità marinaresca è importante quanto la nave stessa."

 call_of_our_forefathers: "La Chiamata dei Nostri Antenati"
 call_of_our_forefathers_desc: "Molto tempo fa, i nostri illustri antenati salparono e fondarono colonie nel nord. Le nostre saghe ci raccontano addirittura che raggiunsero un nuovo mondo e fondarono Vinland. Dobbiamo seguire le loro orme."

 pioneer_spirit: "Spirito Pionieristico"
 pioneer_spirit_desc: "In passato, il nostro popolo sfidava i mari per fondare colonie su coste lontane. Riaccendiamo questo spirito avventuroso nel nostro popolo affinché possa salpare di nuovo!"

 nor_shipbuilding: "Costruzione Navale Militare"
 nor_shipbuilding_desc: "L'espansione della nostra industria ittica ha portato anche a un'espansione della cantieristica navale. Abbiamo a disposizione un gruppo di carpentieri navali qualificati per espandere il nostro processo di produzione."

 write_new_sagas: "Scrivere Nuove Saghe"
 write_new_sagas_desc: "Menti acute preservano la conoscenza\nConosciuta da secoli\nCantata al tramonto\nLe saghe sono la nostra eredità\nIncoraggiate dall'establishment\nOgni paese avrà la propria"

 expansive_policies: "Politiche Espansive"
 expansive_policies_desc: "Il suolo sabbioso e sterile del $brandenburg_area$ gli è valso il poco lusinghiero soprannome di "Sandbox del $hre$". Tale povertà ha spinto i margravi a espandersi in modo aggressivo, rivendicando i territori confinanti. Queste conquiste hanno reso il nostro paese molto più diversificato dal punto di vista culturale rispetto al resto dell'Impero."

 northern_march: "La Marcia del Nord"
 northern_march_desc: "Nei primi tempi del $hre$, l'area del $brandenburg_area$ era colonizzata e governata dalle tribù del $slavic_group$, fino a quando l'Imperatore creò la Marca Settentrionale per soggiogare e fortificare l'area. Nel corso del tempo, questa Marca Settentrionale si è evoluta nel $brandenburg_area$, diventando una delle regioni più importanti del $hre$."

 divide_estates: "Dividere le Proprietà"
 divide_estates_desc: "Unite, le tre classi sociali formano un blocco efficace contro il potere del sovrano. Per consolidare il nostro controllo, dobbiamo sistematicamente sfruttare la nobiltà contro le altre classi sociali."

 soldiers_fortune: "Soldati della Fortuna"
 soldiers_fortune_desc: "Le nostre terre sono per lo più scarsamente popolate e circondate da nemici. La necessità di difese più robuste ci ha spinto ad assumere soldati provenienti da terre straniere, che combatteranno sotto la nostra bandiera in cambio di un compenso."

 iron_tooth: "Dente di Ferro"
 iron_tooth_desc: "Rafforzando il controllo della nostra corte sulle terre del Margraviato, il nostro sovrano si guadagnerà il soprannome di #italic Dente di Ferro#!, come se lo mordessimo come un cane da guardia. Il nostro governo lascerà un segno nella nostra nazione, un segno che infonderà un senso di orgoglio e lealtà anche nel più umile contadino del $brandenburg_area$."

 kammergericht: "Fondare il Kammergericht"
 kammergericht_desc: "Al fine di regolarizzare il controllo sul Margraviato di Brandeburgo, sostituiremo il diritto comune locale con il diritto romano. Regoleremo ulteriormente la giustizia trasferendo la Corte Suprema dalla corte dell'Elettore, che è incline a spostarsi, a una sede centrale fissa. Ciò migliorerà contemporaneamente la giustizia e limiterà il potere dei magnati locali."

 margrave_council: "Geheimer Rat für die Kurmark"
 margrave_council_desc: "L'autorità del Margravio è fortemente minacciata dal potere sempre crescente dei nostri Stati. Gli Stati sono di grande beneficio per la nostra nazione, ma la minaccia che rappresentano per la nostra base di potere richiede la creazione di un nuovo consiglio, che riduca il potere reale che gli Stati detengono sulla nostra nazione a una posizione più consultiva per il Margravio. In questo modo, potremo continuare a godere dei benefici dei nostri Stati, avendo meno preoccupazioni riguardo alle loro esigenze."

 religious_toleration: "Tolleranza Religiosa"
 religious_toleration_desc: "La stabilità nelle nostre regioni d'origine è la chiave del nostro successo altrove. Espandendoci verso l'esterno e promuovendo la tolleranza religiosa, non solo miglioriamo la stabilità interna, ma rendiamo anche il nostro regno un rifugio per coloro che fuggono dalle persecuzioni altrove."

 army_professionalism: "Professionalità dell'Esercito"
 army_professionalism_desc: "Come abbiamo imparato dall'invasione persiana della Grecia tanto tempo fa, un piccolo esercito può sconfiggere uno più grande, purché abbia una disciplina ferrea e un addestramento adeguato. Dobbiamo elevare il nostro esercito per soddisfare questi standard straordinari."

 soldier_king: "Il Re-Soldato della $PRU$"
 soldier_king_desc: "La maggior parte degli Stati sono paesi che hanno un esercito. La $PRU$, invece, è un esercito che ha un paese! I numerosi re della $PRU$ erano soldati tanto quanto monarchi; ciascuno di essi concluse il proprio regno non solo riformando lo Stato, ma anche lasciando un'impronta indelebile sull'esercito."

 auftragstaktik: "Auftragstaktik"
 auftragstaktik_desc: "#italic Auftragstaktik#!, o "Tattica di missione". È un sistema in base al quale i nostri leader subordinati vengono informati dagli stessi comandanti sugli obiettivi della battaglia o della guerra e poi possono agire di propria iniziativa. Questo sistema permette ai nostri battaglioni di sviluppare un rapporto più stretto con i loro leader, ottenendo risultati migliori."

 goose_step: "Il Passo dell'Oca"
 goose_step_desc: "Anche se sembra piuttosto strano, il "passo dell'oca" è stato specificamente progettato per facilitare ai nostri uomini il mantenimento della linea mentre avanzano verso il nemico. Ciò fornisce ai nostri eserciti un vantaggio tangibile sul campo di battaglia."

 mounted_people: "Persone a Cavallo"
 mounted_people_desc: "Il nostro popolo ha prosperato a cavallo per secoli e queste maestose creature sono parte integrante della nostra cultura e del nostro potere. Siamo immensamente orgogliosi delle nostre impareggiabili abilità nell'allevamento dei cavalli e del nostro talento nel tiro con l'arco a cavallo, entrambi fattori che contribuiscono alla nostra supremazia sul campo di battaglia."

 falconry_mastery: "Maestria nella Falconeria"
 falconry_mastery_desc: "Profondamente radicata nella nostra cultura, la falconeria rappresenta un legame forgiato tra il nostro popolo e questi magnifici rapaci, e abbiamo affinato la nostra abilità in questa antica arte. I nostri falconieri sono rinomati per la loro capacità di addestrare questi maestosi rapaci a cacciare e catturare le prede."

 rich_lands: "Terre Ricche"
 rich_lands_desc: "Le nostre terre sono ricche di suolo fertile e risorse abbondanti, dalle praterie alle fitte foreste, pronte per essere trasformate dai nostri uomini e donne coraggiosi. Useremo ogni strumento a nostra disposizione per gestire saggiamente la terra che ci è stata donata e portare così prosperità a ogni famiglia."

 jurchen_honor: "L'onore dei Jurchen"
 jurchen_honor_desc: "Il nostro popolo è entusiasta delle prove di forza e di altre dimostrazioni di abilità, poiché ogni Jurchen ritiene che mostrando le proprie capacità si guadagni il rispetto dei propri pari. Questo meritato rispetto di sé rende i nostri guerrieri immensamente coraggiosi, pronti a combattere chiunque."

 unite_the_tribes: "Unire le Tribù"
 unite_the_tribes_desc: "Fin dalla nascita della nostra nazione, il popolo Jurchen è stato unificato e diviso in più tribù e alleanze, non sempre amichevoli tra loro. Questa dinamica è rimasta costante da tempo immemorabile, così come il desiderio di unificare tutte le nostre tribù sotto un'unica bandiera. È giunto il momento di soddisfare questo desiderio a lungo coltivato!"

 leader_under_sky: "Un Leader Sotto il Cielo"
 leader_under_sky_desc: "Il nostro popolo è stato diviso per troppo tempo e abbiamo bisogno di qualcuno abbastanza forte da unirlo e far tremare il mondo ai nostri piedi. Il Cielo guiderà le azioni e i pensieri di questo leader e ci condurrà verso un futuro luminoso."

 foraging_our_way: "Foraggiare a Modo Nostro"
 foraging_our_way_desc: "Siamo cacciatori e viviamo in comunione con la natura, anche quelli di noi che abitano nelle città. È nel nostro sangue trovare la strada giusta in una foresta oscura, sapere quali doni della Natura portare con noi. Questa saggezza ci permette di sopravvivere ovunque senza difficoltà."

 deliberative_council: "Consiglio Deliberativo dei Principi e dei Ministri"
 deliberative_council_desc: "Originariamente chiamato "Consiglio di Deliberazione", questo organo si è evoluto da istituzioni informali che promuovevano la governance collaborativa tra i leader del regno. La struttura del Consiglio è stata trasformata, concentrandosi sulla governance aristocratica collettiva e sulle deliberazioni politiche, principalmente in materia di affari esteri e militari. L'adesione è limitata ai leader militari esterni al clan imperiale, garantendo la partecipazione dell'élite e mantenendo l'autorità suprema del sovrano."

 manchu_script: "Scrittura Manciù"
 manchu_script_desc: "È nato l'alfabeto manciù, che combina i caratteri classici $mongolian_language$ con la fonetica jurchen. Questo sistema di scrittura unico nel suo genere facilita la scrittura verticale da sinistra a destra. Con forme di lettere diverse e adattabilità contestuale per le posizioni iniziali, mediane, finali e isolate, preserva le sfumature più sottili della nostra lingua."

 the_eight_banners: "Gli Otto Stendardi"
 the_eight_banners_desc: "Il sistema degli Otto Stendardi è il fulcro della nostra società e del nostro esercito. Attraverso l'appartenenza ereditaria e la concessione di terre e redditi, agli Stendardi viene concesso uno status d'élite, e per una buona ragione: dalla conquista dei nostri vicini alle future campagne, il nostro dominio dipende dalla loro potenza."

 a_new_dawn: "Una Nuova Alba"
 a_new_dawn_desc: "La nostra nazione è rinata. I vecchi modi di vivere sono scomparsi, come sogni che si dissolvono nella luce del mattino. È tempo per noi di affrontare il mondo come una nazione completamente modernizzata."

 manchu_reborn: "Rinascita Manciù"
 manchu_reborn_desc: "Come la nostra nazione ha subito trasformazioni fondamentali, così farà il nostro esercito. Il mondo si è aperto a noi e nuove sfide appariranno all'orizzonte. Se vogliamo sopravvivere in questo nuovo paradigma, dobbiamo essere pronti ad agire."

 inigo_architecture: "Architettura Palladiana"
 inigo_architecture_desc: "Le innovazioni architettoniche di Inigo Jones avranno senza dubbio un impatto significativo sulle future generazioni di architetti. La sua promozione dell'architettura classica e la sua priorità alla proporzione e all'armonia sono considerate i tratti distintivi del movimento neoclassico in $ENG$."

 sailing_and_fighting_instructions: "Istruzioni di Blake per la Navigazione e il Combattimento"
 sailing_and_fighting_instructions_desc: "Robert Blake ha scritto diverse serie di regole e regolamenti che hanno portato a radicali riforme navali. Queste includono nuove tattiche per i blocchi e gli sbarchi, nonché l'adozione della formazione di battaglia in linea singola."

 coke_smelting: "Fusione del Coke"
 coke_smelting_desc: "L'invenzione della fusione del coke, in particolare la sua applicazione in $iron$ e la produzione in $steel$, è strettamente legata alla rivoluzione industriale. Il $iron$ e il $steel$ sono attualmente prodotti utilizzando metodi tradizionali come la fusione del carbone, mentre questo nuovo metodo porterà a un miglioramento della produzione e a una riduzione dei costi di manutenzione."

 water_frame: "Cornice d'Acqua"
 water_frame_desc: "Il telaio ad acqua è un filatoio utilizzato nell'industria tessile per produrre filo di cotone. Questa innovazione contribuirà alla creazione di grandi fabbriche tessili alimentate da ruote idrauliche."

 fortress_church_advance: "$fortress_church$"
 fortress_church_advance_desc: "$fortress_church_desc$"

 saquiyah: "Sāqiyah"
 saquiyah_desc: "La $saquiyah$ è un dispositivo meccanico progettato per facilitare il trasporto dell'acqua verso le altezze più elevate. Conosciuta anche come #italic ruota persiana#!, #italic tablia#!, #italic rehat#! e #italic timpano#!, la ruota è fondamentale per i sistemi di irrigazione nelle aree con poca o nessuna acqua corrente."

 sepak_takraw: "Sepak Takraw"
 sepak_takraw_desc: "È stato praticato in tutto il $south_east_asia$ per molto tempo, sin dal suo adattamento dall'antico $chinese_group$ #italic Cùjū#!, e conosciuto anche come #italic Sepak Raga#!, #italic Takraw#!, #italic Chinlone#! o #italic Sipa#!, a seconda del Paese, #italic $sepak_takraw$#! non è solo un gioco. Sebbene l'obiettivo sia calciare una palla tra i giocatori e mantenerla in aria, è anche un modo per fare esercizio fisico regolare, e quindi non si gioca solo per intrattenimento ma anche come addestramento militare per l'esercito."

 three_teachings: "Tre Insegnamenti"
 three_teachings_desc: "Il $three_teachings$ è una filosofia originaria della $CHI$ che combina gli insegnamenti del $SECT_CONFUCIANISM_NAME$, del $SECT_DAOISM_NAME$ e del Buddismo in un insegnamento armonioso e singolare. Il $SECT_CONFUCIANISM_NAME$ rappresenta l'ideologia della legge, mentre il $SECT_DAOISM_NAME$ è la visione del mondo degli intellettuali radicali. Questi due estremi opposti dello spettro filosofico sarebbero quindi collegati alle filosofie del Buddismo."

 dlh_origin_of_hindustani: "Origine del $hindustani_language$"
 dlh_origin_of_hindustani_desc: "La lingua $hindustani_language$ si è sviluppata dall'Apabhramsa, una lingua indo-ariana media, ed è emersa come lingua di contatto del $DLH$. Poiché il $hindustani_language$ ha influenze dal $persian_language$, dal $arabic_language$ e dal turco, ma anche dall'hindi antico, la diplomazia con il mondo musulmano e il mondo indù diventa un compito non complicato."

 dlh_indo_persian_culture: "Cultura Indo-Persiana"
 dlh_indo_persian_culture_desc: "Il $persian_language$ è stata la lingua dominante della corte sin dalla prima istituzione del Sultanato dehlavi. In quanto tale, l'influenza del $persian_language$ si è sintetizzata con le culture indiane locali."

 dlh_turkic_conqueror_roots: "Radici Conquistatrici Turche"
 dlh_turkic_conqueror_roots_desc: "Sebbene chiamiamo $india$ la nostra casa, gli antenati del nostro Stato avevano origini $turkic_group$. I loro primi successi come conquistatori e governanti dai tempi della dinastia $mamluk$, così come i successi della successiva dinastia Khalji, ispirano i nostri militari e diplomatici a spingere i confini del $DLH$ in ogni angolo dell'$india$."

 dlh_revert_ghiyath_reforms: "Ripristino delle Riforme di Ghiyath"
 dlh_revert_ghiyath_reforms_desc: "Le folli decisioni economiche di Ghiyath al-Din non hanno portato altro che la rovina finanziaria allo Stato del $DLH$. Dobbiamo tornare alla sua follia e ripristinare l'uso dell'oro e dell'argento per le nostre monete."

 dlh_restore_the_delhi_empire: "Ripristinare la Grandezza del $DLH$"
 dlh_restore_the_delhi_empire_desc: "Il Sultanato dehlavi un tempo comprendeva quasi tutto l'$india$. Deve risorgere!"

 dlh_reintegrate_former_provinces: "Reintegrare le Province Perdute"
 dlh_reintegrate_former_provinces_desc: "Il Sultanato dehlavi, un tempo vasto, ha perso la maggior parte dei suoi possedimenti di un tempo, ma non abbiamo dimenticato i mezzi per amministrarli. Mentre lavoriamo per ripristinare la nostra gloria passata, ricorderemo ai governanti locali i loro doveri nei confronti del Sultano."

 dlh_textile_innovation: "Produzione Tessile Innovativa"
 dlh_textile_innovation_desc: "La fiorente industria tessile in $DLH$ rende la nostra nazione un punto di riferimento per le innovazioni tecnologiche correlate. Essendo stati tra i primi ad adottare la sgranatrice di cotone e il rullo a vite senza fine, conosciamo l'importanza di rimanere all'avanguardia in questi settori. Ora dobbiamo garantire che il filatoio venga adottato il più possibile."

 dlh_afghan_nobility: "Nobiltà del $afghan_culture$"
 dlh_afghan_nobility_desc: "Gran parte della nobiltà dehlavi proviene dai ranghi della comunità $afghan_culture$, un popolo con una lunga storia di conquiste e dominio nel nord dell'$india$. Anche se a volte rappresentano un ostacolo politico, le loro abilità marziali sono fuori discussione."

 dlh_grand_trunk: "Proteggere la Grande Strada Maestra"
 dlh_grand_trunk_desc: "La Grande Strada Maestra va dal $kabul$ in Afghanistan alla costa del $bengal_area$. Molte delle città commerciali più importanti lungo il suo percorso fanno parte del nostro impero, quindi spetta a noi garantire che la strada sia ben mantenuta e libera dal banditismo."

 dlh_cosmopolitan_religions: "Religioni Cosmopolite"
 dlh_cosmopolitan_religions_desc: "L'$india$ è un enorme subcontinente in cui sono presenti diverse religioni. Al fine di garantire la stabilità all'interno del nostro regno, dovremmo ampliare i diritti delle diverse fedi e assicurarci la lealtà dei loro fedeli."

 dlh_revive_the_tughlaq_architecture: "Rinascita Architettonica Tughlaq"
 dlh_revive_the_tughlaq_architecture_desc: "Durante il periodo di massimo splendore della dinastia $tughlaq$ e il periodo più stabile del nostro Stato, grandi architetti e artisti dalla visione grandiosa costruirono moschee e tombe nello stile unico di Tughlaq. Con il passare dei decenni e il nostro potere messo in discussione da questioni interne, le risorse per mantenere questa architettura sono diminuite. È tempo di farla rivivere e ristabilire il $DLH$ come impero dell'arte e delle meraviglie."

 dlh_throne_of_india: "Trono Indiano"
 dlh_throne_of_india_desc: "Per secoli, ogni grande impero indiano è stato governato dal $delhi$. È la sede dei conquistatori e il nostro diritto di nascita. Tutti devono sapere che il $delhi$ è di nuovo la patria del legittimo sovrano di tutto l'$india$!"

 dlh_hindustani_identity: "Identità Hindustana"
 dlh_hindustani_identity_desc: "Idee straniere di nazionalismo e identità culturale hanno raggiunto l'$india$. Sebbene la diversità culturale dell'$india$ rimarrà elevata, è chiaro che la nostra geografia, così come i valori dell'Islam, ci danno tutti un senso di unità sotto forma di identità hindustana."

 vij_city_of_victory: "Città di Vittoria"
 vij_city_of_victory_desc: "Il $vijayanagar$ — la "Città della Vittoria" — è il cuore del nostro Stato e un giorno diventerà il cuore dell'intero Induismo. Che risplenda come un faro di cultura e tradizione anche mentre respinge gli invasori musulmani!"

 vij_an_army_for_city_of_victory: "Un Esercito per la Città della Vittoria"
 vij_an_army_for_city_of_victory_desc: "Affinché la Città della Vittoria sia degna del suo nome, dobbiamo avere un esercito in grado di portare a termine questi trionfi omonimi. Faremo in modo che le nostre truppe siano ben addestrate e orgogliose del loro servizio."

 vij_arab_horses: "Cavalli Arabi"
 vij_arab_horses_desc: "I cavalli provenienti dall'$arabia_region$ sono di gran lunga superiori alle nostre razze locali. Utilizzeremo i nostri contatti commerciali per garantire un approvvigionamento costante alle nostre forze armate."

 vij_first_indian_artillery: "Prima Artiglieria Indiana"
 vij_first_indian_artillery_desc: "L'uso militare della polvere da sparo non è ancora molto diffuso, ma ha il potenziale per plasmare il futuro della guerra. Dobbiamo esplorare l'utilità e i vantaggi della polvere da sparo."

 vij_the_bunds: "I Bund"
 vij_the_bunds_desc: "La nostra società si basa sull'agricoltura nella zona piuttosto arida del $karnakassala_area$. I #italic bund#!, chiamati anche #italic anecut#!, forniscono alle nostre città e ai nostri campi l'acqua dolce di cui hanno tanto bisogno."

 vij_adroit_diplomacy: "Diplomazia Abile"
 vij_adroit_diplomacy_desc: "I numerosi invasori del nostro popolo indù hanno dimostrato più volte la stessa debolezza: la tendenza a combattere tra loro. Dobbiamo essere sempre pronti a sfruttare questa debolezza a nostro vantaggio."

 vij_promotion_of_trade: "Promozione del Commercio"
 vij_promotion_of_trade_desc: "Il nostro territorio è situato su una delle principali rotte commerciali da est a ovest. Dobbiamo garantire che i nostri porti siano sicuri e protetti, in modo che i capitani in visita vi approdino... dandoci l'opportunità di tassarli."

 vij_carnatic_music: "Musica Carnatica"
 vij_carnatic_music_desc: "Dobbiamo resistere all'invasione musulmana su tutti i fronti. Le tradizioni musicali degli Stati settentrionali stanno già mostrando segni di influenza straniera. Questa è blasfemia, perché sappiamo tutti che la musica è una forma d'arte divina che ha avuto origine dagli stessi Deva e Devi. Mostreremo al popolo indù che siamo impegnati a difendere questa sacra forma d'arte."

 vij_cultural_integration: "Integrazione Culturale"
 vij_cultural_integration_desc: "La diversità culturale dell'$india$ è uno dei nostri tratti distintivi. Consentendo ai nostri vari insediamenti di governarsi secondo le proprie usanze, garantiremo la loro lealtà e integrazione nella nostra società."

 vij_rule_in_accord_with_dharma: "Governare secondo il Dharma"
 vij_rule_in_accord_with_dharma_desc: "#Italic Dharma#! è uno dei pilastri fondamentali dei nostri valori religiosi e sociali. Il nostro Stato può essere giusto e virtuoso solo se i nostri governanti incarnano e vivono in accordo con il dharma."

 vij_harsh_penal_code: "Codice Penale Severo"
 vij_harsh_penal_code_desc: "Pene severe, compresa la pena di morte, sono il modo in cui manteniamo l'ordine pubblico in questa società. Stabilendo e applicando rigorosamente un codice penale severo, garantiamo che i criminali temano le conseguenze delle loro azioni, creando stabilità attraverso la certezza della punizione."

 vij_decentralized_rule: "Regola Decentralizzata"
 vij_decentralized_rule_desc: "Man mano che il nostro Stato cresce, aumentano anche gli oneri amministrativi per il governo e il rischio di rivolte. Per contrastare questo fenomeno, istituiremo un sistema di governo decentralizzato, in cui gli insediamenti potranno gestire autonomamente le questioni minori, ricorrendo all'intervento della corte centrale solo per le questioni più gravi."

 vij_indian_throne: "Trono Indiano"
 vij_indian_throne_desc: "L'$india$ è stato soggetto alle minacce musulmane per troppo tempo. Gli imperi pagani rivendicano il loro dominio dal $delhi$ nel nord, ma le loro credenze e il loro governo sono in diretta opposizione a ciò che il nostro popolo desidera. No, deve essere istituita una nuova sede del potere e il $vijayanagar$ sarà il nuovo Trono dell'$india$!"

 tnk_legitimate_rule: "Radici Antiche"
 tnk_legitimate_rule_desc: "I nostri antenati hanno governato le terre del $tamil_land_area$ per secoli. In questi tempi in cui siamo dominati da invasori stranieri, dovremmo fare affidamento sui nostri antichi legami con questa terra per giustificare il nostro dominio."

 tnk_resist_invaders: "Resistenza Esperta"
 tnk_resist_invaders_desc: "La nostra travagliata storia registra sia vittorie che sconfitte schiaccianti. Se vogliamo resistere e dominare ancora una volta come potenza significativa, dobbiamo sviluppare una comprensione approfondita di come utilizzare al meglio il nostro territorio natale per ritardare e bloccare gli eserciti ostili fino a quando non saremo in grado di organizzare una resistenza diretta."

 tnk_pearls_of_india: "Competenza nella Pesca delle Perle"
 tnk_pearls_of_india_desc: "Il nostro popolo ha sviluppato un'abilità eccezionale nell'immersione e nella raccolta delle perle lungo le nostre coste. Sebbene ciò comporti evidenti vantaggi economici, la naturale affinità del nostro popolo con l'acqua lo rende eccellente e facilmente addestrabile alla navigazione, garantendoci un vantaggio sui nostri nemici marittimi."

 tnk_expertise_in_conflicts: "Temprato dalla Guerra"
 tnk_expertise_in_conflicts_desc: "Nel corso della nostra storia turbolenta, non abbiamo mai vacillato di fronte ai conflitti e alle difficoltà insormontabili. Dobbiamo trasformare questa determinazione in un'arma e usarla per infondere nel nostro popolo un senso di fervore che lo ispiri a combattere più duramente che mai."

 tnk_imperial_legacy: "Eredità Imperiale Pandyan"
 tnk_imperial_legacy_desc: "Le terre dell'$india$ meridionale hanno a lungo subito le incursioni di invasori stranieri e signori della guerra arrivisti che cercavano di stabilire i propri domini. Dobbiamo usare la grande storia della nostra antica dinastia per rivendicare questa terra, poiché solo noi possiamo riportare la stabilità e la pace nel nostro legittimo territorio."

 paik_system_advance: "$paik_system$"
 paik_system_advance_desc: "$paik_system_desc$"

 paik_regiments_advance: "$a_paik_infantry$"
 paik_regiments_advance_desc: "$a_paik_desc$"

 advanced_paik_system_advance: "Paik Avanzati"
 advanced_paik_system_advance_desc: "$a_late_paik_infantry_desc$"

 baghlah_advance: "$n_baghlah$"
 baghlah_advance_desc: "$n_baghlah_desc$"

 bng_bengali_vassal_system: "Sistema di Vassallaggio Bengalese"
 bng_bengali_vassal_system_desc: "Durante il regno del $DLH$, il popolo del $bengali$ serviva il proprio signore come vassalli produttivi. Il sistema dehlavi servirà da base per i nostri sistemi vassalli negli anni a venire della sovranità del $bengali$."

 bng_bengali_paik: "Paik Bengalese"
 bng_bengali_paik_desc: "I #italic paik#! sono la spina dorsale del nostro esercito. Mentre altri stati hanno il sistema Paik attivo e utilizzano i paik come soldati di leva, il nostro stato mantiene paik più piccoli, ma molto ben organizzati, e fornisce loro un sostegno militare sufficiente."

 bng_bengali_architecture: "Architettura $bengali$"
 bng_bengali_architecture_desc: "Un mix di architettura urbana antica, influenze ingegneristiche musulmane e tecniche tradizionali di costruzione dei tetti del $bengali$, lo stile architettonico unico del $bengali$ è utilizzato per edifici religiosi e culturali di ogni tipo. Grazie alla nostra esperienza in questo stile, la costruzione di tali edifici è significativamente più facile e conveniente per noi rispetto ad altre nazioni."

 bng_habshi_generals: "Generali Habshi"
 bng_habshi_generals_desc: "I soldati schiavi abissini svolgono un ruolo significativo nel nostro esercito come fanteria d'élite. Coloro che eccellono come leader riceveranno livelli di comando più elevati, mentre coloro che dimostrano una lealtà eccezionale costituiranno la guardia del palazzo."

 bng_war_elephants: "Elefanti da Guerra"
 bng_war_elephants_desc: "Sebbene lenti, la manovrabilità degli elefanti nel terreno fluviale del nostro paese è fondamentale per rifornire rapidamente il nostro esercito. Inoltre, gli elefanti da guerra aiuteranno le nostre truppe sul campo di battaglia con la loro statura imponente e la loro forza terrificante."

 bng_rupees: "Coniazione delle Rupie"
 bng_rupees_desc: "La mancanza di una moneta standardizzata ampiamente adottata sta frenando il nostro sviluppo commerciale. Essendo una delle principali potenze economiche del subcontinente, siamo in una buona posizione per iniziare a coniare una nuova moneta d'argento con pesi standard, che chiameremo #italic rupie#!"

 bng_bengali_traders: "Mercanti $bengali$"
 bng_bengali_traders_desc: "Il $indian_ocean_region$ collega i nostri mercati locali con quelli del $south_east_asia$ e della $china$. Dobbiamo quindi porre grande enfasi sulla massimizzazione della nostra presenza in questi mercati attraverso le rotte marittime e, in questo modo, aumentare i nostri profitti commerciali."

 bng_bengali_poetry: "Poesia $bengali$"
 bng_bengali_poetry_desc: "La parola scritta è una delle forme d'arte più influenti e durature. La poesia del $bengali$ racconterà le storie di conquistatori epici, drammi coinvolgenti e interessanti questioni filosofiche, che contribuiranno alla diffusione e alla reputazione della cultura del $bengali$."

 bng_religious_pluralism: "Pluralismo Religioso"
 bng_religious_pluralism_desc: "L'$india$ è sede di molte religioni: l'Induismo per la maggioranza, l'Islam come fede preferita delle classi dominanti e alcune religioni minori degne di nota come il Buddismo e il Giainismo tra le minoranze lavoratrici. Promuovere una religione rispetto a un'altra causerà inevitabilmente caos e disordini. Pertanto, dovremmo puntare al pluralismo religioso e non favorire né discriminare alcuna religione nel nostro Stato."

 bng_artillery_corps: "Corpo d'Artiglieria"
 bng_artillery_corps_desc: "I cannoni sono una risorsa importante nelle campagne militari. Dobbiamo garantire un corpo di artiglieria efficiente, specializzato nell'infliggere danni alle file nemiche prima ancora che queste entrino in contatto con i nostri soldati sul campo."

 bng_bengali_trade_fleet: "Flotta Commerciale Bengalese"
 bng_bengali_trade_fleet_desc: "La flotta mercantile del $bengali$ porta merci esotiche provenienti da terre straniere, oltre a prezioso $goods_gold$ e $silver$, nei mercati del delta del Gange. I nostri mercanti sono rinomati in ogni angolo del mondo grazie alla nostra imponente flotta mercantile."

 bng_shipbuilding_industry: "Industria Cantieristica"
 bng_shipbuilding_industry_desc: "Il commercio marittimo è vitale per il nostro Stato. Il commercio e le nostre navi da guerra sono alcuni degli aspetti più importanti della nostra economia e pertanto ci concentriamo fortemente sul sostegno all'industria cantieristica."

 bng_bengali_industrialization: "Produzione Industrializzata di Mussola"
 bng_bengali_industrialization_desc: "Il $BNG$ gode di una posizione unica in $india$ per avviare una rivoluzione senza precedenti. La mussola, il tessuto di cotone speciale per cui sono famosi i filatori $bengali$, è un bene commerciale fondamentale per l'industrializzazione. Siamo pronti a sfruttare i nuovi sviluppi nella nostra industria tessile, già di livello mondiale. Diamo inizio a una rivoluzione industriale!"

 raj_militaristic_society: "Società Militaristica"
 raj_militaristic_society_desc: "Tra i Rajput non esiste quasi alcuna divisione tra società civile e militare. La nostra nazione è un ospite, definita dal suo popolo piuttosto che dalla terra che controlliamo, e il suo popolo è composto da guerrieri. Dobbiamo garantire che le divisioni militari soddisfino adeguatamente le nostre esigenze amministrative man mano che l'ospite si espande."

 raj_combat_training: "Addestramento al Combattimento"
 raj_combat_training_desc: "Ogni soldato è addestrato per la battaglia, ma il nostro popolo inizia l'addestramento al combattimento in età molto più giovane, acquisendo abilità che superano quelle di altri soldati inesperti."

 raj_clan_loyalties: "Lealtà di Clan"
 raj_clan_loyalties_desc: "L'influenza del nostro clan si estende ben oltre i nostri confini. Siamo in grado di attingere da altri gruppi Rajput provenienti da tutto il nord dell'$india$ quando riempiamo i ranghi dei nostri eserciti."

 raj_monumental_architecture: "Architettura Monumentale"
 raj_monumental_architecture_desc: "A cosa serve la vittoria se non c'è nulla che immortali le nostre conquiste? Monumenti, come l'imponente Torre della Vittoria, saranno eretti affinché le generazioni future possano conoscere le nostre più grandi battaglie e trarne ispirazione."

 raj_marwari_horses: "Cavalli Marwari"
 raj_marwari_horses_desc: "Come i loro padroni, i cavalli della cavalleria Rajput sono addestrati meticolosamente per combattere sul campo di battaglia. Si dice che un cavallo Marwari lasci il campo di battaglia solo in una delle tre condizioni seguenti: vittoria, morte o quando trasporta un padrone ferito in un luogo sicuro. Prendendoci cura di questi esseri divini, garantiremo il dominio eterno dei nostri cavalieri sui campi di battaglia dell'$india$."

 raj_reorganized_rajput_regiments: "Reggimenti Rajput Riorganizzati"
 raj_reorganized_rajput_regiments_desc: "Le strutture claniche tradizionali sono un'eccellente base per un sistema di reggimenti modernizzato. Le gerarchie esistenti, fondate sulla parentela e sulla lealtà incondizionata, possono essere facilmente tradotte in una catena di comando formale e organizzata."

 raj_martial_smiths: "Fabbri Marziali"
 raj_martial_smiths_desc: "Le guerre non si vincono solo con la tattica e il coraggio, ma anche con le armi. I nostri fabbri forgeranno le migliori armi marziali che i nostri guerrieri potranno brandire in difesa del popolo Rajput."

 raj_fortress_architecture: "Architettura di Fortezze"
 raj_fortress_architecture_desc: "L'ascesa del $DLH$ e le invasioni dei guerrieri musulmani del passato sono stati un campanello d'allarme. Dobbiamo essere sempre pronti ad affrontare invasori stranieri e, pertanto, dobbiamo assumere gli architetti più abili per progettare fortezze inespugnabili in tutto il nostro regno. Le mura immensamente lunghe che saranno necessarie per proteggere la nostra terra rendono questo progetto ambizioso, ma la nostra determinazione a difendere il nostro popolo garantirà che venga portato a termine."

 raj_expanded_artillery_arm: "Corpo d'Artiglieria Ampliato"
 raj_expanded_artillery_arm_desc: "Gli assedi sono ciò che fa vincere le guerre. Dobbiamo sperimentare modi per creare cannoni più grandi e migliori per abbattere le numerose fortezze dei nostri nemici, sia all'interno che all'esterno dell'$india$."

 raj_the_purbias: "I Purbia"
 raj_the_purbias_desc: "I Rajput si sono diffusi in tutto il nord dell'$india$ alla ricerca della gloria. I #italic Purbias#!, soldati d'élite Rajput che si avventurano come mercenari, sono rinomati per la loro abilità in combattimento e, come tali, diffondono la nostra temibile reputazione."

 raj_mandatory_firearm_drilling: "Addestramento Obbligatorio alle Armi da Fuoco"
 raj_mandatory_firearm_drilling_desc: "Molti soldati Rajput sono esperti nell'uso delle armi da fuoco personali. Dovremmo mettere questi veterani temprati al lavoro per addestrare la prossima generazione di soldati, piuttosto che rischiare di perdere la loro esperienza in battaglia. Tutti i nostri soldati devono essere addestrati alle tattiche con le armi da fuoco prima di affrontare i nostri nemici in prima linea."

 raj_painting_school: "Scuola Pittorica Rajput"
 raj_painting_school_desc: "I pittori Rajput godono già di un'ottima reputazione, ma potrebbero fare ancora meglio. Dobbiamo incoraggiare i nostri artisti a sviluppare le loro abilità e ad accrescere la gloria della nostra dinastia creando una scuola di pittura specifica per il nostro stato."

 raj_rajput_resistance: "Resistenza Rajput"
 raj_rajput_resistance_desc: "I poeti-musicisti Rajput raccontano le storie delle numerose battaglie del nostro popolo contro gli invasori stranieri e di come i nostri antenati preferissero morire piuttosto che ammettere la sconfitta. Dobbiamo incoraggiare questo spirito di unità e dare ai nostri musicisti un motivo per scrivere nuove ballate sul coraggio di fronte alla morte."

 raj_martial_ethos: "Etica Marziale"
 raj_martial_ethos_desc: "L'educazione e le tradizioni dei guerrieri Rajput garantiscono un'ampia base per il reclutamento di ufficiali che guidino i nostri eserciti. Per trarne vantaggio, dovremmo formalizzare le opportunità di carriera e i percorsi di avanzamento per incoraggiare questi promettenti giovani combattenti a servire come ufficiali nelle nostre forze armate."

 npl_the_divya_upadesh: "Il Divya Upadesh"
 npl_the_divya_upadesh_desc: "Il #italic Divya Upadesh#! espone nove principi che costituiscono il nucleo della vita politica e nazionale in $nepal_area$, nonché le linee guida per una politica estera di successo. Esso racchiude secoli di pensiero $nepali_group$ sulla governance, la guerra e la pace. Seguendo questi principi, il $nepal_area$ sarà in grado di evitare la sovversione degli imperi vicini e le incursioni straniere."

 npl_gurkhas: "$a_gurkha$"
 npl_gurkhas_desc: "$a_gurkha_desc$
 ori_bulwark_of_the_hindu: "Baluardo dell'Induismo"
 ori_bulwark_of_the_hindu_desc: "I fedeli musulmani hanno invaso l'$india$ e soggiogato molti residenti indù sotto il loro regno crudele. Tuttavia, l'$ORI$ resiste senza esitazione ai guerrieri dell'Islam. Noi siamo il baluardo dell'Induismo e difenderemo le nostre tradizioni e la nostra cultura da qualsiasi invasore straniero!"

 ori_anka_year_system: "Sistema dell'Anno Anka"
 ori_anka_year_system_desc: "Il sistema #italic Anka#! è il nostro metodo per documentare gli anni di regno dei nostri sovrani. Gli anni che terminano con 6 o 0 vengono saltati, ad eccezione dell'anno 10, che viene mantenuto. Il conteggio inizia dall'anno 2, non dall'anno 1, e inizia sempre il #italic Sunia#!, il nostro nuovo anno fiscale."

 ori_lord_of_elephants: "Gajapati"
 ori_lord_of_elephants_desc: "I cavalli non sono originari dell'$ORI$ e le terre qui non sono adatte al loro allevamento. Le nostre giungle, tuttavia, sono famose per essere brulicanti di elefanti. Nelle fitte giungle dell'$india$ orientale, una cooperazione tattica ben eseguita tra elefanti e fanteria può essere letale quanto una cavalleria. , aumentiamo ulteriormente le dimensioni del nostro corpo di elefanti e perfezioniamo le loro tattiche, in modo da essere conosciuti come veri #italic Gajapati#!, "Signori degli elefanti"."

 ori_servitor_of_jagganath: "Servitore di Jagannath"
 ori_servitor_of_jagganath_desc: "Il culto di Jagannath, il Signore dell'Universo, è ciò che unisce il nostro popolo. I precedenti sovrani dell'$ORI$ erano addirittura considerati i discendenti di Jagannath. Il nostro attuale sovrano potrebbe non essere uno dei suoi discendenti, ma dobbiamo imprimere nella mente di tutti che il nostro leader è il servitore di Jagannath e che qualsiasi disobbedienza nei suoi confronti equivale a un tradimento nei confronti dello stesso Signore Jagannath."

 ori_parikshas: "Parikshas"
 ori_parikshas_desc: "L'$ORI$ è stato a lungo diviso tra molti principi diversi, ma il loro tempo è finito! Prenderemo il controllo di queste terre e nomineremo governatori regionali — #italic parikshas#! — invece di permettere a questi piccoli principi di indebolire la nostra autorità imperiale."

 ori_odia_militarization: "Militarizzazione Odia"
 ori_odia_militarization_desc: "La minaccia musulmana non cessa mai, né si placa mai. Dobbiamo assicurarci che il nostro esercito sia pronto ad affrontare e combattere gli invasori in qualsiasi momento."

 ori_refined_cloth_production: "Produzione di $cloth$ Raffinati"
 ori_refined_cloth_production_desc: "L'$ORI$ è famoso fin dall'antichità per i suoi tessuti di alta qualità. Incoraggiamo ulteriormente le corporazioni tessili dell'$ORI$ a perfezionare i loro metodi di produzione del pregiato Kalinga $cloth$."

 ori_patronize_temple_construction: "Costruzione Patrocinata di Templi"
 ori_patronize_temple_construction_desc: "La gloria delle dinastie passate si riflette nella grandiosità dei templi che hanno lasciato. Dovremmo migliorare i nostri numerosi e magnifici complessi templari e costruirne di nuovi per promuovere lo sviluppo dell'architettura Kalinga."

 ori_encourage_salt_trade: "Commercio del $salt$"
 ori_encourage_salt_trade_desc: "Il $salt$ di alta qualità di $ORI$ è molto richiesto in tutto l'$india$. Facciamo tutto il possibile per incoraggiare il commercio del $salt$, in modo da poterne trarre profitto."

 ori_expansion_of_infrastructure: "Espansione delle Infrastrutture"
 ori_expansion_of_infrastructure_desc: "Con il progresso tecnologico, cresce anche il numero di persone nel nostro regno. L'industrializzazione ha determinato una significativa crescita demografica e, di conseguenza, dobbiamo espandere le nostre infrastrutture per accogliere queste comunità in espansione."

 bah_arabian_horses: "Cavalli Arabi"
 bah_arabian_horses_desc: "Il clima dell'$india$ non è ottimale per l'allevamento e l'addestramento dei cavalli. Tuttavia, i cavalli dell'$arabia_region$ sono montature eccellenti che superano di gran lunga le nostre razze locali. Useremo i nostri contatti commerciali per garantire un approvvigionamento costante di questi cavalli per le nostre truppe."

 bah_amir_rebellion: "Ribellione dell'Amir"
 bah_amir_rebellion_desc: "Il nostro Stato è nato dalla ribellione dell'Amir Hasan Gangu contro il patetico dominio del $DLH$. La vittoria contro il Sultanato dehlavi vive ancora oggi nella mente della nostra nobiltà e dei nostri militari."

 bah_nobility_hindu_expansion: "Integrazione dell'Elite Indù"
 bah_nobility_hindu_expansion_desc: "Sebbene a volte rappresenti una sfida alla sovranità del sovrano, la classe nobile è comunque utile al nostro governo, poiché è fondamentale nell'amministrazione delle nostre vaste proprietà. Con la conquista dell'indipendenza dal $DLH$, abbiamo ottenuto il dominio su sudditi quasi esclusivamente indù, mentre i nostri nobili musulmani sono una piccola minoranza, incapace di gestire le masse. Dobbiamo espandere e stabilizzare la nostra aristocrazia promuovendo candidati indù promettenti nelle loro file."

 bah_gharbians: "Gharbiani"
 bah_gharbians_desc: "Il taglio dei legami con $DLH$ per fondare il nostro regno ha allentato il nostro legame con le regioni settentrionali dell'$india$ a maggioranza musulmana. Poiché il nostro Stato non ha alcuna forma di aristocrazia musulmana radicata, ci troviamo in una situazione precaria e potremmo finire completamente alla mercé dei nobili indù locali. Fortunatamente, la nostra reputazione ci precede. Le storie sulle ricchezze del $deccan_region$ vengono raccontate e ripetute in tutto il mondo musulmano e molti ambiziosi cercatori di fortuna intraprendono il viaggio via mare verso i nostri porti. Utilizzando le vaste ricchezze dell'$india$ per attirare alla nostra corte occidentali di talento, o #italic Gharbiani#!, possiamo garantire che il nostro paese non mancherà mai di menti capaci per guidare i nostri eserciti, riscuotere le nostre tasse e governare i nostri sudditi."

 bah_legacy_of_gisu_daraz: "Eredità di Gisu Daraz"
 bah_legacy_of_gisu_daraz_desc: "L'$india$ in generale, e il nostro Stato in particolare, ha una storia come centro di insegnamenti sufi. Gli sforzi dei nostri governanti per attrarre e patrocinare sceicchi sufi da tutto il mondo sono una testimonianza della pietà e della grande forza spirituale dei nostri monarchi e della nostra corte. L'adozione da parte dello Stato dei concetti sufi di sovranità spirituale e della natura inclusiva degli insegnamenti sufi stessi contribuirà a creare un ambiente in cui le diverse fedi religiose del $bah_gharbians$ e gli indigeni del $decca_region$ possano mescolarsi e prosperare senza scontri o litigi improduttivi."

 bah_meltpot_of_languages: "Crogiolo Linguistico"
 bah_meltpot_of_languages_desc: "Il $decca_region$ è una regione con molte lingue e culture; il grande afflusso di persone di origine $iranian_group$, $turkic_group$, $afghan_culture$ e $arabian_group$ in queste terre ha accentuato la natura cosmopolita del nostro Stato. Mentre storicamente la lingua $persian_language$ soddisfaceva le esigenze dei nostri predecessori, un nuovo mix di lingue locali - oltre al $persian_language$ e al $arabic_language$ - è diventato sempre più comune. Questo mix di lingue è persino diventato una fonte di ispirazione culturale per gli artisti emergenti."

 bah_karimis: "Kārimī"
 bah_karimis_desc: "Per secoli, il commercio indo-egiziano è stato dominato da gruppi di commercianti e capitani con sede in $egypt_region$, noti come $bah_karimis$. Fondamentale nell'attività quotidiana del commercio del $indian_ocean_region$, questa organizzazione mercantile è ora ricca e potente. Dalle coste del $tamil$ e dai porti delle città commerciali del $swahili_culture$ alle città portuali del $lower_egyptian_culture$ oltre il $gulf_aden_province$, sultani, nobili e popolani vengono ad acquistare merci esotiche o a chiedere prestiti per i loro progetti ai $bah_karimis$. Negli ultimi tempi questa organizzazione ha mostrato un interesse molto attivo per il nostro Stato, e noi non possiamo che trarre vantaggio dall'approfondimento dei nostri rapporti con loro."

 bah_takht_e_firoza: "Takht-e-Fīrozā"
 bah_takht_e_firoza_desc: "La prima cosa che qualsiasi ospite nella nostra sala delle udienze reali nota è il Trono di Turchese della nostra dinastia. Questo pezzo unico di arredamento reale ci è stato originariamente donato dal Raja Kapaya del $telugu$ sconfitto, ed è per molti versi il simbolo supremo della nostra dinastia. Squisito e splendidamente unico, incarna le ricchezze del $deccan_region$ e l'insolita combinazione di stili che è il segno distintivo del nostro Stato cosmopolita."

 bah_bahmani_primogeniture: "Primogenitura Bahmani"
 bah_bahmani_primogeniture_desc: "La nostra insolita pratica di trasmettere sempre il trono al figlio maggiore del sovrano in carica ha talvolta creato una certa instabilità nel nostro regno, poiché i reggenti assetati di potere e i nobili opportunisti inizialmente non esitavano a cercare di approfittare di un sovrano bambino o a sostenere le pretese al trono di un parente invidioso. Ormai, tuttavia, questa pratica è diventata saldamente istituzionalizzata e, quando arriva il momento della successione, sono pochissimi quelli che si oppongono al vero erede della nostra dinastia."

 bah_madrasa_of_mahmud_gawan: "Grande Madrasa del $deccan_region$"
 bah_madrasa_of_mahmud_gawan_desc: "Da molti anni ormai, il nostro Stato ha attirato uomini capaci dal mondo musulmano, incorporando anche il meglio degli Stati che ci hanno preceduto. Ciò ha creato una ricca cultura cosmopolita che non è interamente $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$, né $kannadiga$ nella sua natura. La creazione di una grande madrasa nella nostra capitale servirebbe a promuovere lo sviluppo dell'apprendimento di questa moltitudine di culture e consentirebbe anche al mondo di vedere la grandezza del nostro Stato."

 guj_hub_of_the_indian_ocean_trade: "Fulcro del Commercio dell'$indian_ocean_region$"
 guj_hub_of_the_indian_ocean_trade_desc: "Grazie alla natura dei venti monsonici e alla sua posizione specifica, il $GUJ$ è stato a lungo il fulcro del commercio est-ovest nel $indian_ocean_region$, collegando il $red_sea_area$, il $egypt_region$ e Malacca. Per questo motivo, i mercanti del $GUJ$ erano importanti intermediari che importavano merci preziose come le spezie dalle isole Molucche e dal $silk$ da 4CHI$, per poi venderle ai mercanti provenienti dall'ovest."

 guj_garba: "Garba!"
 guj_garba_desc: "Originariamente danza di culto eseguita dalle donne in onore della dea indù Ambaji, il nostro popolo ha perfezionato una nuova e graziosa forma di danza chiamata Garba. Le basi della danza consistono nel cantare e battere le mani ritmicamente in formazione circolare. Oggi, i nostri uomini e le nostre donne usano questa danza per celebrare con grande fervore ogni occasione, riunendosi come comunità e indossando abiti ricamati in modo raffinato. Tutti noi insieme, giovani e anziani, contadini e principi, musulmani e indù, danziamo in un cerchio sempre più grande."

 guj_jain_routes: "Connessioni giainisti"
 guj_jain_routes_desc: "Il Giainismo è un antico stile di vita, modellato nella sua forma attuale da Mahavira. Per mille anni, il $GUJ$ è stato la roccaforte della comunità e della fede giainista, con molti luoghi sacri e templi. Le dinastie reali hanno patrocinato la religione, formando una comunità con il popolo indù. Le invasioni musulmane dall'ovest da parte di Mahmud Ghazni e Mohammad Ghori hanno oppresso la comunità giainiste, vandalizzando i templi o convertendoli in moschee, oltre a bruciare le biblioteche gianiste. Tuttavia, il popolo giainista del $GUJ$ è sopravvissuto, si è adattato e ha prosperato, utilizzando i suoi legami con le comunità del $GUJ$ in tutto il mondo per fungere da centro sia per la fede che per il commercio."

 guj_gujarati_lipi: "Lipi Gujarato"
 guj_gujarati_lipi_desc: "Il Lipi gujarato è un nuovo sistema di scrittura sviluppato da interessi mercantili. Conosciuto anche come #italic saraphi#! (banchieri), #italic vaniasai#! (mercanti) o #italic mahajani#! (commercianti) per la sua associazione con il commercio, il suo uso si è rapidamente diffuso in tutto il $GUJ$, $KUT$ e $SND$ per scrivere le lingue regionali e studiare il $sanskrit_language$. La comunità dello $zoroastrian$ lo ha adottato anche come sistema di scrittura per l'avestico. Questo sistema di scrittura comune unisce comunità diverse, facilitando sia la comunicazione pratica che l'identità comune."

 guj_gujarati_merchant_diaspora: "Diaspora Mercantile Gujarata"
 guj_gujarati_merchant_diaspora_desc: "Il nostro popolo commercia su ogni costa, perseguendo il commercio e seguendo i venti alisei. Le nostre flotte navigano costantemente alla ricerca di nuove opportunità e i nostri mercanti comprendono sia l'arte della costruzione navale sia il valore di costruire navi buone e resistenti con un budget limitato."

 mug_zamindar_system: "Sistema degli Zamindar"
 mug_zamindar_system_desc: "Gli Zamindar sono governanti feudali che governano i nostri territori in modo autonomo o semi-autonomo. Sebbene siano proprietari delle terre che amministrano e facciano parte della nostra nobiltà, alla fine fungono da vassalli interni della Corona stessa."

 mug_mughal_ibadat_khana: "$ibadat_khana$"
 mug_mughal_ibadat_khana_desc: "$ibadat_khana_desc$"

 mug_an_indian_padshah: "Padishah dell'India"
 mug_an_indian_padshah_desc: "Sebbene siamo giunti in $india$ come stranieri, ora governiamo come Padishah indiani, abbracciando le tradizioni locali e superando le divisioni di casta e credo. Poiché il nostro regno è caratterizzato da molte fedi e culture, la nostra amministrazione attingerà talenti da tutte le comunità, offrendo a tutti, indipendentemente dalla casta, dalla religione o dalla cultura, pari opportunità di servire la nostra grande casata e il nostro glorioso regno."

 mug_mughal_architecture: "Architettura Mughal"
 mug_mughal_architecture_desc: "Un grande impero richiede edifici altrettanto monumentali. Nel nostro regno cosmopolita, gli architetti stanno già creando meravigliosi edifici che stupiranno le generazioni future. La nostra dinastia dovrebbe essere in prima linea in questo movimento, creando grandi opere architettoniche come il mondo non ha mai visto."

 mug_fatawa_e_alamgiri: "Fatawa-i-Alamgiri"
 mug_fatawa_e_alamgiri_desc: "Il $mug_fatawa_e_alamgiri$ è una raccolta basata sulla sharia, che funge da codice legale principale regolando vari aspetti della vita nel nostro impero. È una delle raccolte più complete di leggi, etica, strategie militari, politiche economiche, giustizia e principi musulmani."

 samanta_advance: "Feudalesimo Sāmanta"
 samanta_advance_desc: "Sāmanta — #italic neighbor#! — è un termine che indica sia i vassalli che i capi tributari. Si tratta di un sistema feudale che per secoli ha costituito uno dei pilastri della nostra società. Sebbene questo sistema stia attualmente perdendo importanza, rimane comunque uno dei fondamenti della nostra struttura politica."

 kalaripayattu_advance: "Kalaripayattu"
 kalaripayattu_advance_desc: "Il Kalaripayattu — la #italic Pratica nelle Arti del Campo di Battaglia#! — è un'antica arte marziale indiana con origine nel $malabar_area$. I guerrieri del nostro stato saranno addestrati nelle arti del Kalaripayattu per garantire abilità superiori nel combattimento corpo a corpo e nelle armi da mischia."

 nair_military_advance: "Milizia Nair"
 nair_military_advance_desc: "I Nair sono un gruppo eterogeneo di caste indù del $malabar_area$ e hanno una lunga storia di coinvolgimento nell'esercito. La loro esperienza, così come il loro ruolo per il $kalari$, saranno di grande valore nei nostri attuali conflitti."

 mhr_ashta_pradhan_advance: "$mhr_ashta_pradhan$"
 mhr_ashta_pradhan_advance_desc: "$mhr_ashta_pradhan_desc$"

 mhr_tradition_of_military_service: "Tradizione di Servizio Militare"
 mhr_tradition_of_military_service_desc: "I cavalieri del $marathi_culture$ hanno una lunga tradizione di servizio come "Bargir" per i sultanati del Deccan. L'aumentata militarizzazione del Deccan, dovuta alle numerose guerre combattute nell'area, ha reso la nostra cavalleria una delle forze più pericolose dell'$india$."

 mhr_forts_of_maharashtra: "Fortezze del Maharashtra"
 mhr_forts_of_maharashtra_desc: "In queste terre collinari e densamente boscose, mantenere una serie di fortezze è una necessità sia offensiva che difensiva. La manutenzione meticolosa delle nostre fortificazioni dovrebbe quindi essere una priorità assoluta."

 mhr_peasant_soldiers: "Soldati Contadini"
 mhr_peasant_soldiers_desc: "I villaggi del Desh sono pieni di uomini abili che sarebbero più che disposti a servire nei nostri eserciti. Reclutiamo nella nostra armata i membri della nostra popolazione che parlano la lingua del $marathi_language$."

 mhr_office_of_the_peshwa: "Ufficio del Peshwa"
 mhr_office_of_the_peshwa_desc: "Il #italic Peshwa#! Sarà il nostro primo ministro, interamente dedicato sia all'amministrazione civile che alla supervisione delle operazioni militari. Questo consolidamento del potere ci renderà abbastanza versatili da espanderci in modo rapido ed efficiente."

 mhr_encourage_brahmin_ties: "Rafforzare i Legami con i Brāhmaṇa"
 mhr_encourage_brahmin_ties_desc: "Il nostro settore finanziario è dominato dalle famiglie di banchieri Brāhmaṇa. Integriamoli ulteriormente nella nostra amministrazione assumendoli come esattori delle tasse e creando regolamenti per rafforzare i loro diritti e proteggere le loro tradizioni. Otterremo il favore dei nostri finanziatori e l'accesso ad amministratori colti e capaci."

 pun_breadbasket_of_india: "Granaio dell'$india$"
 pun_breadbasket_of_india_desc: "I cinque grandi fiumi - Indo, Jhelum, Chenab, Ravi e Sutley - attraversano le terre dell'area del $punjab_area$, conferendo al suolo una fertilità senza pari. Oltre a permetterci di esportare cibo e cotone ai nostri vicini, questo permette anche alle nostre numerose città di crescere e incoraggia ogni tipo di produzione specializzata. Dobbiamo fare tutto il possibile per incoraggiare la crescita dell'agricoltura e difendere i nostri contadini dai banditi e dai briganti delle zone limitrofe."

 pun_encourage_indo_persian_trade: "Promuovere il Commercio Indo-Persiano"
 pun_encourage_indo_persian_trade_desc: "Situato al confine occidentale dell'$india$, il $PUN$ è sempre stato al crocevia degli scambi economici e culturali tra l'$india$ e la $persia_region$. L'antica Grand Trunk Road, che collega l'$india$ orientale al mondo del $farsi_culture$, attraversa le nostre terre prima di dirigersi verso i passi montani afghani. Questi passi sono tuttavia infestati da predoni tribali e banditi. Dovremmo incoraggiare il traffico lungo questa antica e vivace rotta e fare tutto il possibile per garantire il benessere di questi commercianti costruendo caravanserragli e sorvegliando queste strade."

 pun_punjabi_textile_industry: "Industria Tessile Panjabi"
 pun_punjabi_textile_industry_desc: "Il $PUN$ è un importante centro di produzione tessile. I $cloth$ dei nostri tessitori sono realizzati appositamente per i mercati di tutto l'$asia$ e l'$europe$, e i nostri tessitori sono tra i più produttivi dell'$india$."

 pun_foundation_of_the_khalsa: "La Khalsa"
 pun_foundation_of_the_khalsa_desc: "Il $sikhism$, una religione originaria del $PUN$, si sta diffondendo rapidamente nelle nostre terre. I membri di questa fede provengono da tutte le caste e da tutti i ceti sociali e difenderanno il loro stato indipendentemente dalle loro precedenti professioni."

 pun_gurmukhi_script: "Scrittura Gurmukhī"
 pun_gurmukhi_script_desc: "La scrittura Gurmukhī è un #italic abugida#! sviluppato nelle terre del $PUN$ ed è molto apprezzato dai nostri guru del $sikhism_ADJ$. Il nostro clero utilizza questa scrittura per registrare i testi del $sikhism_ADJ$."

 pun_strength_of_the_misls: "Forza dei Misl"
 pun_strength_of_the_misls_desc: "Il sistema amministrativo degli stati Misl del $PUN$ consente loro di schierare imponenti forze di cavalleria. In caso di necessità, possiamo ricorrere a queste forze per combattere un nemico comune."

 pun_reforming_the_punjabi_army: "Riforma dell'Esercito Panjabi"
 pun_reforming_the_punjabi_army_desc: "Le vie dei nostri antenati erano valide e ci hanno servito bene nel corso degli anni. Ma affinché i nostri eserciti continuino a trionfare sui campi di battaglia, dobbiamo creare un esercito più professionale. Studiando il modo in cui altri paesi organizzano i loro eserciti e adattando i loro metodi quando è prudente farlo, potremo creare un esercito Panjabi più efficiente, pur conservando le qualità uniche del nostro attuale sistema militare."

 religious_melting_pot: "Melting Pot Religioso"
 religious_melting_pot_desc: "Molte religioni diverse hanno influenzato il nostro popolo, dalle credenze popolari tradizionali all'Induismo e al Buddismo, sia dall'$india$ che dalla $china$. Nel corso del tempo, il nostro popolo ha sviluppato un certo grado di sincretismo religioso, mescolando alcune credenze con altre e senza ignorarne completamente nessuna."

 akson_thai: "Akson Thai"
 akson_thai_desc: "Originariamente basata sull'antica scrittura $khmer_language$, la scrittura $thai_culture$ si è evoluta fino a diventare piuttosto distinta dalla sua forma originale per adattarsi alla complessa fonologia della nostra lingua. Avere una lingua scritta unica ha sicuramente contribuito allo sviluppo della nostra cultura unica."

 father_governs_children: "Il Padre Governa i Figli"
 father_governs_children_desc: "I nostri governanti sono famosi per il loro stretto legame con la gente comune. Possa il nostro popolo vivere sempre libero e felice sotto la guida dei suoi maestosi e celestiali governanti!"

 thai_war_elephants: "Elefanti da Guerra"
 thai_war_elephants_desc: "Gli elefanti da guerra sono stati utilizzati in $indochina_region$ per generazioni, sia come cavalleria che come cavalcature personali per i re, che poi si impegnavano in duelli con elefanti con il leader della parte avversaria."

 thai_royal_poets: "Poeti Reali"
 thai_royal_poets_desc: "Che senso ha vincere le guerre se non si cantano canzoni sulle nostre vittorie? La nostra corte sarà un rifugio per i poeti e la nostra storia sarà la loro fonte di ispirazione."

 trading_links: "Legami Commerciali"
 trading_links_desc: "Il nostro paese è stato un crocevia commerciale sin dai tempi antichi. La nostra vicinanza all'$india$ e alla $china$ ha permesso al commercio di fluire attraverso le nostre terre e, con esso, le relazioni e le interazioni con i molti paesi diversi che ci circondano."

 foreign_mercenaries: "Mercenari Stranieri"
 foreign_mercenaries_desc: "Recentemente abbiamo ricevuto un afflusso di barbari provenienti da terre straniere. Alcuni sono mercanti, ma altri sono guerrieri. Facciamo uso di loro nei nostri eserciti."

 toi_muay: "Toi Muay"
 toi_muay_desc: "Insegnata ai nostri soldati per l'uso in combattimento, è un'arte marziale a mani nude che comprende pugni, prese e tecniche di lotta a terra. La padronanza di quest'arte permette alle nostre truppe di rimanere letali in battaglia anche se perdono le armi."

 trading_embassies: "Ambasciate Commerciali"
 trading_embassies_desc: "Le numerose navi mercantili che entrano ed escono dalle nostre acque ci hanno familiarizzato con molti regni lontani. Istituendo ambasciate commerciali permanenti con questi luoghi lontani, possiamo trasformare il commercio occasionale in relazioni formali."

 photduang: "Photduang"
 photduang_desc: "La nostra valuta può sembrare strana agli stranieri, ma i #italic $photduang$#! ci hanno servito bene per secoli. Grumoli d'argento tondeggianti e timbrati con marchi ufficiali, costituiscono la base della nostra economia."

 personal_executions: "Esecuzioni Personali"
 personal_executions_desc: "D'ora in poi, i criminali più efferati saranno giustiziati personalmente dal sovrano. In questo modo, la gente saprà che siamo una nazione ordinata e impegnata nella giustizia, e mostrerà la dovuta obbedienza alla legge."

 close_subjects: "Soggetti Vicini"
 close_subjects_desc: "Per noi, i nostri sudditi non sono qualcosa di separato dalla nazione, ma piuttosto parte integrante di essa. Manteniamo stretti legami con loro, che sono pienamente integrati nella nostra burocrazia e amministrazione."

 ayu_prestigious_cavalry: "Cavalleria Prestigiosa"
 ayu_prestigious_cavalry_desc: "Sia a cavallo che a dorso di elefante, possiamo vantare una cavalleria impressionante, solitamente composta dai discendenti delle famiglie più prestigiose. Il loro contributo nel supportare la nostra fanteria è inestimabile."

 ayu_white_elephant: "Elefante Bianco"
 ayu_white_elephant_desc: "L'elefante bianco simboleggia la sacra regalità nella tradizione buddista ed è anche l'emblema del nostro sovrano. Possedere un elefante bianco legittima la nostra autorità, dimostrando ai nostri sudditi che governiamo con la benedizione del divino."

 ayu_ayutthaya_literature: "Letteratura Ayutthaya"
 ayu_ayutthaya_literature_desc: "Il nostro Paese ha una tradizione letteraria ricca e complessa, dai poemi epici #italic Lilit#! che narrano famosi conflitti militari, alla poesia #italic Nirat#! sui viaggi e gli amori perduti; dalle leggende popolari degli eroi locali ai panegirici che lodano le gesta dei nostri sovrani più gloriosi."

 ayu_phrai_luang: "Phrai Luang"
 ayu_phrai_luang_desc: "Tutti gli uomini liberi soggetti al servizio #italic phrai#! non solo prestano servizio in guerra — il #italic $ayu_phrai_thaan$#! — ma assistono anche nella costruzione di opere pubbliche, a discrezione dei governatori locali."

 ayu_phrai_thaan: "Phrai Thaan"
 ayu_phrai_thaan_desc: "Tutti i maschi all'età di diciotto anni devono essere registrati presso l'esercito e le loro informazioni devono essere trasmesse alla burocrazia governativa. Ogni cittadino maschio è idoneo ad essere arruolato e costretto a prestare servizio nell'esercito in guerra, e noi faremo in modo che lo facciano se necessario."

 ayu_floating_rice: "Riso Galleggiante"
 ayu_floating_rice_desc: "Il riso è coltivato nel nostro Paese da secoli, ma le continue inondazioni dei nostri fiumi hanno sempre rappresentato un problema per la sua corretta coltivazione. Questa nuova varietà di riso, abituata a crescere in condizioni di allagamento, ci fornirà una fonte stabile di cibo anche quando i fiumi straripano."

 ayu_sakdina: "Sakdina"
 ayu_sakdina_desc: "La nostra società è rigorosamente organizzata secondo il sistema $ayu_sakdina$. Ogni persona conosce il proprio posto nella società e sa a quanta ricchezza e proprietà ha diritto. Questa organizzazione rende molto più efficiente la riscossione delle tasse."

 ayu_cosmopolitan_trade: "Commercio Cosmopolita"
 ayu_cosmopolitan_trade_desc: "Il nostro Paese ospita molte persone provenienti da lontano, che sono venute qui nella speranza di trarre profitto dalla ricchezza della nostra terra. Il fatto che così tante persone e merci attraversino i nostri confini ci porta numerosi vantaggi."

 suk_breaker_of_chains: "Spezzacatene"
 suk_breaker_of_chains_desc: "Non molto tempo fa eravamo sotto l'autorità Khmer, ma da allora abbiamo conquistato la nostra libertà e abbiamo assunto il posto che ci spetta come potenza indipendente. Ci siamo guadagnati l'ammirazione dei nostri pari e il loro rispetto."

 suk_birthplace_of_a_culture: "Culla di una Cultura"
 suk_birthplace_of_a_culture_desc: "Siamo considerati il primo regno indipendente del $thai_culture$, poiché siamo stati i primi a ribellarci all'autorità Khmer e a liberarci dalla sua influenza. Per questo motivo, tutto il popolo del $thai_culture$ ci guarda con ammirazione."

 suk_ram_khamhaeng_stele: "Stele di $name_ram_khamhaeng$"
 suk_ram_khamhaeng_stele_desc: "La maggior parte della storia dei primi regni Sukhothai proviene dalle iscrizioni sul $suk_ram_khamhaeng_stele$, commissionate dal grande re per lasciare una testimonianza del suo glorioso regno. Il $suk_ram_khamhaeng_stele$ è un pezzo sacro del nostro patrimonio che dimostra senza dubbio il nostro posto nella storia."

 suk_akson_sukhothai: "Akson $SUK$"
 suk_akson_sukhothai_desc: "Sebbene la scrittura del $thai_culture$ sia già comune a tutto il popolo del $thai_culture$, non va dimenticato che è stata sviluppata nel nostro paese e sotto la nostra guida. Pertanto, la scrittura del $thai_culture$ non è solo una forza unificante per la nostra cultura, ma anche la prova della nostra individualità e unicità."

 suk_wat_si_sawai: "Wat Si Sawai"
 suk_wat_si_sawai_desc: "Siamo famosi per i nostri numerosi templi meravigliosi, come il $suk_wat_si_sawai$, uno dei più antichi del $sukhothai$. Costruito sotto l'autorità Khmer come tempio indù, il suo successivo riutilizzo lo ha trasformato in un simbolo della nostra identità. La fede del nostro popolo è forte."

 suk_sukhothai_ceramics: "Ceramiche $SUK$"
 suk_sukhothai_ceramics_desc: "Le ceramiche sono state create dal popolo del $thai_culture$ fin dall'antichità, influenzate dalle ceramiche del $chinese_group$ ma conservando sempre il proprio stile distintivo. Tuttavia, le ceramiche prodotte nel nostro paese sono le più apprezzate e vengono spesso commercializzate a grandi distanze all'estero."

 suk_military_history: "Storia Militare"
 suk_military_history_desc: "I nostri eserciti hanno una lunga storia di vittorie in battaglia. Di conseguenza, una posizione nelle nostre forze armate è considerata un incarico d'onore e di prestigio, e molti sono disposti a prestare servizio."

 suk_unstoppable_army: "Esercito Inarrestabile"
 suk_unstoppable_army_desc: "Molti hanno cercato in passato di fermare il nostro progresso e la nostra espansione, ma tutti hanno fallito di fronte al nostro esercito. Esso ha dimostrato di essere una forza inarrestabile, pronta a schiacciare qualsiasi ostacolo sul nostro cammino."

 sia_experienced_ambassadors: "Ambasciatori Esperti"
 sia_experienced_ambassadors_desc: "Abbiamo una vasta esperienza politica. La nascita del nostro Paese non è stata ottenuta solo con la forza delle nostre forze armate, dopotutto. Sicuramente la nostra reputazione diplomatica si rivelerà una fonte della nostra influenza sulla scena mondiale."

 sia_rise_to_equal_heights: "Ascesa a Pari Altezze"
 sia_rise_to_equal_heights_desc: "Ci sono molte parti del nostro Paese con una popolazione molto bassa. Dovremmo migliorare le condizioni in queste regioni per garantire che nessuna parte del nostro Paese sia vista come poco brillante, ma che tutto risplenda allo stesso modo."

 sia_advanced_elephant_warfare: "Guerra Avanzata con Elefanti"
 sia_advanced_elephant_warfare_desc: "Non è raro che le nostre più grandi poesie dedichino versi per elencare e onorare singolarmente i nostri elefanti da guerra. Mostriamo ai nostri nemici il perché!"

 sia_consolidation_of_state: "Consolidamento dello Stato"
 sia_consolidation_of_state_desc: "Un sistema decentralizzato potrebbe farci perdere il controllo sulle nostre province più lontane. Se vogliamo essere il vero regno unificatore per il popolo $thai_culture$, anche le nostre province devono essere unificate."

 sia_education_reform: "Riforme dell'Istruzione"
 sia_education_reform_desc: "Come disse il nostro Signore Buddha, non dobbiamo accettare qualcosa solo perché viene detto spesso, ma dobbiamo sperimentarlo noi stessi. L'istruzione è la base della conoscenza e, se vogliamo eccellere nella tecnologia, dobbiamo prima eccellere nell'istruzione."

 sia_royal_absolutism: "Assolutismo Reale"
 sia_royal_absolutism_desc: "Secondo solo al Cielo: questo è ciò che dovrebbe essere un sovrano. Onorati e venerati, i nostri leader governano la Terra come gli dei governano il Cielo."

 sia_thai_unity: "Unità $thai_culture$"
 sia_thai_unity_desc: "Siamo senza dubbio i leader di tutto il popolo del $thai_culture$. Le nostre truppe sono orgogliose di servire come difensori della nostra cultura e della nostra identità stessa, e combattono ferocemente per questo privilegio."

 rom_spqr: "S.P.Q.R."
 rom_spqr_desc: "Il Senato e il popolo di Roma sono le fondamenta eterne del nostro Stato. Invocando questa antica autorità, ricordiamo a tutti che Roma governa non solo con la forza delle armi, ma anche con la volontà dei suoi cittadini e delle sue istituzioni."

 rom_pax_romana: "Pax Romana"
 rom_pax_romana_desc: "La pace sotto Roma non significa assenza di guerra, ma trionfo dell'ordine. Attraverso l'applicazione delle nostre leggi e la costruzione di estese reti stradali, nonché la potenza dei nostri eserciti, porteremo stabilità e prosperità in ogni angolo dell'Impero."

 rom_restore_the_legions: "Restaurare le Legioni"
 rom_restore_the_legions_desc: "Le legioni erano un tempo l'orgoglio di Roma, temute e rispettate in tutto il mondo. Restaurarle significa anche far rivivere la disciplina, l'organizzazione e lo spirito indomito su cui si fonda il nostro grande impero."

 rom_revival_of_arts_and_culture: "Rinascita delle Arti e della Cultura"
 rom_revival_of_arts_and_culture_desc: "Roma era tanto un centro culturale quanto un impero di conquista. Sponsorizzando poeti, studiosi e architetti, riaccenderemo la fiamma creativa che un tempo illuminava il mondo antico."

 rom_new_corpus_juris_civilis: "Novus Corpus Juris Civilis"
 rom_new_corpus_juris_civilis_desc: "I nostri giuristi compileranno e perfezioneranno le nostre leggi in un corpus completo, attingendo alla saggezza di Giustiniano e della Repubblica. In questo modo, garantiremo giustizia a tutti i cittadini romani."

 rom_bread_and_circuses: "Panem et Circenses"
 rom_bread_and_circuses_desc: "Il popolo deve essere mantenuto felice e sazio, poiché il malcontento genera rivolta. Mettendo il grano sulle loro tavole e offrendo loro attività divertenti come giochi e feste pubbliche, conquisteremo la loro lealtà e rafforzeremo lo Stato attraverso il loro patriottismo."

 rom_citizenship: "Cittadinanza Romana"
 rom_citizenship_desc: "La cittadinanza è la linfa vitale di Roma, che unisce i popoli di ogni provincia in un unico corpo politico. Estendere questi diritti garantisce l'integrazione e la promessa di avanzamento per tutti coloro che servono l'impero."

 rom_all_roads_lead_to_rome: "Tutte le Strade Portano a Roma"
 rom_all_roads_lead_to_rome_desc: "Il sistema stradale romano è l'invidia del mondo. Unisce il nostro impero, velocizzando il trasporto di mercanti, messaggeri e soldati, con tutti i percorsi che convergono nella Città Eterna."

 rom_provincial_governors: "Governatori Provinciali"
 rom_provincial_governors_desc: "Le nostre province più remote non possono essere governate efficacemente solo da Roma. Inserendo governatori competenti nelle regioni periferiche, garantiremo che le nostre leggi siano rispettate e le tasse pagate tempestivamente anche nelle terre più lontane dell'impero."

 rom_imperium_sine_fine: "Imperium Sine Fine"
 rom_imperium_sine_fine_desc: "Il destino di Roma non conosce limiti. Dalle Colonne d'Ercole ai confini della terra, espanderemo il nostro dominio senza fine, portando la civiltà ovunque voli l'aquila imperiale."

 rom_triumphs: "Trionfi Romani"
 rom_triumphs_desc: "Un trionfo è più di una semplice processione. È infatti il ricordo vivente della conquista, sfilato per le strade delle nostre città più grandi. Tali cerimonie ispirano lealtà, soggezione, timore e ambizione in egual misura."

 rom_roman_architecture: "Architettura Romana"
 rom_roman_architecture_desc: "Dagli acquedotti agli anfiteatri, l'ingegneria romana lascia monumenti che resistono per secoli. La nostra maestria nella lavorazione della pietra e nella costruzione di archi mostrerà al mondo intero che la grandezza di Roma è eterna."

 byz_heart_of_orthodoxy_advance: "Cuore dell'Ortodossia"
 byz_heart_of_orthodoxy_advance_desc: "Il $constantinople$ è il cuore pulsante di una fede vibrante. Siamo molto orgogliosi di essere la patria dell'Ortodossia, detentori del Patriarcato ecumenico e difensori della cristianità contro i nostri nemici pagani."

 byz_akritai_advance: "Akritai"
 byz_akritai_advance_desc: "Concentrate principalmente sulla difesa dei confini, queste truppe leggere ricevono anche terre da coltivare oltre che da proteggere. Gli Akritai sono molto abili nella guerra difensiva, specialmente contro la cavalleria, e sono spesso la prima risposta contro le minacce esterne."

 byz_cataphracts_advance: "Cataphratti Tardivi"
 byz_cataphracts_advance_desc: "Sebbene la guerra si sia evoluta in modo significativo dalla prima incarnazione del nostro impero, compresa l'introduzione della polvere da sparo, le tattiche di battaglia perfezionate dai nostri antenati secoli fa sono spesso ancora efficaci. I nostri catafratti incarnano il meglio della nostra saggezza militare antica e moderna."

 byz_historiography_advance: "Storiografia Bizantina"
 byz_historiography_advance_desc: "Il nostro popolo poggia sulle spalle di giganti; è nostra responsabilità lasciare testimonianze complete della gloria del nostro impero per ispirare e istruire le generazioni future. Documentando accuratamente le vite dei nostri straordinari antenati, tracciando i nostri prestigiosi lignaggi e descrivendo nei dettagli le nostre intricate tradizioni, supereremo i semplici documenti storici e diventeremo davvero leggendari."

 men_of_letters_advance: "Uomini di Lettere"
 men_of_letters_advance_desc: "Non è un segreto che le altre nazioni invidino i nostri successi letterari e il nostro passato illuminato. Cercano di assumere tutori dalla nostra corte, desiderosi di mettere le mani sulle conoscenze che hanno dato origine a potenti imperi e scolpito il panorama culturale dell'intero continente. È attraverso questi uomini di lettere che i nostri vicini si innamoreranno della nostra storia e impareranno i nostri costumi."

 byz_shield_of_the_west: "Scudo dell'Occidente"
 byz_shield_of_the_west_desc: "Ci troviamo tra l'$europe$ e un mare di pagani, uno scudo contro le minacce straniere. La nostra spada sarà per sempre alzata contro coloro che cercano di sradicare la nostra fede, pronta a colpire chiunque manchi di rispetto alle nostre tradizioni."

 byz_court_of_languages: "Corte delle Lingue"
 byz_court_of_languages_desc: "La corte del $constantinople$ attira diplomatici e dignitari da ogni angolo del mondo conosciuto. Di conseguenza, garantiamo che tutte le lingue ricevano uguale rispetto e accoglienza, una necessità pratica per un impero al crocevia delle civiltà."

 byz_poikilia: "Poikilia"
 byz_poikilia_desc: "La cultura bizantina ha conquistato l'$europe$, in particolare la #italic poikilia#! — la nostra estetica unica. Enfatizzando la varietà visiva e una gamma vertiginosa di tonalità vivaci, la poikilia crea una sinfonia di colori ed elementi sia nella nostra arte che nella nostra architettura."

 byz_crossroads_of_continents: "Crocevia Intercontinentale"
 byz_crossroads_of_continents_desc: "$BYZ$ si trova tra l'$europe$ e l'$asia$, il che lo rende per molti versi il collegamento tra Oriente e Occidente. La nostra posizione vantaggiosa è altamente redditizia e ci ha anche permesso di espandere in modo significativo la nostra influenza marittima."

 byz_the_new_helepolis: "Il Conquistatore delle Città"
 byz_the_new_helepolis_desc: "Abbiamo già familiarità con l'impiego e il perfezionamento di potenti macchine d'assedio. Tuttavia, adattando i nostri progetti all'uso della polvere da sparo, saremo in grado di dominare completamente i nostri nemici con i nostri cannoni."

 byz_reaffirm_synod_powers: "Riforma dei Procedimenti Sinodali"
 byz_reaffirm_synod_powers_desc: "La burocrazia è un incubo per un paese delle nostre dimensioni. Per perfezionare le procedure religiose richieste ogni volta che invochiamo il $orthodox_synod$, ridurremo la burocrazia e rivedremo la legislazione associata."

 byz_byzantine_inquisition: "Inquisizione Bizantina"
 byz_byzantine_inquisition_desc: "l'$europe$ è travolto da disordini religiosi. Dobbiamo essere pronti a sradicare le erbacce nocive dell'eresia che appaiono nel giardino del nostro Impero, affinché non venga invaso dai pagani. La nostra devota difesa contro l'incursione eretica ci impedirà di sprofondare nell'instabilità."

 byz_autokratoria_rhomaion: "Autokratoría Rhōmaíōn"
 byz_autokratoria_rhomaion_desc: "La nostra grande nazione è l'erede indiscussa dello splendore e del prestigio di Roma, e la riconquista di quel territorio perduto da tempo è la nostra motivazione principale."

 byz_modernized_strategikon: "Stratēgikon Modernizzato"
 byz_modernized_strategikon_desc: "Lo #italic Strategikon#! — l'antico manuale di tattiche di cavalleria, logistica e dottrina di battaglia — ci è stato molto utile in tempo di guerra. Tuttavia, poiché la guerra cambia, anche noi dobbiamo cambiare. Le nostre tattiche e i nostri reggimenti si sono adattati al combattimento moderno, impiegando armi di tale distruzione che lo stesso Maurizio non avrebbe mai potuto prevederne la devastazione."

 byz_ancient_greek_studies: "Studi sull'antica $greek_culture$"
 byz_ancient_greek_studies_desc: "La riscoperta e la rinascita delle antiche arti del $greek_culture$ ci hanno fornito una meravigliosa opportunità per educare meglio le masse e preservare i nostri elevati ideali scientifici e culturali. Studieremo con diligenza la saggezza dei nostri antenati."

 byz_the_new_imperial_army: "Il Nuovo Esercito Imperiale"
 byz_the_new_imperial_army_desc: "Il nostro esercito è rimasto indietro rispetto agli altri in $europe$ per troppo tempo. Attraverso una profonda riforma militare e l'ampliamento degli sforzi di coscrizione, speriamo di costruire un esercito moderno degno della fenice risorgente e splendente che simboleggia il nostro impero."

 expand_varangian_guard_advance: "Espandere la Guardia Variaga"
 expand_varangian_guard_advance_desc: "I Varanghi hanno servito il nostro Paese per secoli con onore e fede incrollabile. Espandendo i loro ranghi, garantiremo ulteriormente la stabilità e la protezione del $BYZ$."

 imperatorskiy_moskovskiy_universitet: "Imperatorskiy Moskovskiy Universitet"
 imperatorskiy_moskovskiy_universitet_desc: "L'Università Imperiale è dedicata allo studio della filosofia, della medicina e del diritto e svolge un ruolo significativo nell'istruzione e nella ricerca russa. È stata fondata nell'ambito delle riforme educative ideate dal poliedrico Mikhail Lomonosov, che sottolineava l'importanza della ricerca scientifica e dell'innovazione."

 hurricane_hardy: "Hurricane Hardy"
 hurricane_hardy_desc: "I progetti di Feodor Apraksin sono robusti e resistenti, in grado di consentire alle navi di sopravvivere alla maggior parte delle tempeste generate da Madre Natura. La costruzione innovativa contribuisce notevolmente a qualsiasi ambizione marittima nascente."

 preobrazhensky_semyonovsky_imperial_guard: "Guardia Imperiale Preobrazhensky-Semyonovsky"
 preobrazhensky_semyonovsky_imperial_guard_desc: "L'"Esercito dei giocattoli" è organizzato in compagnie d'élite che formano la Guardia Imperiale che protegge gli interessi della monarchia. Sono spesso coinvolti in cerimonie di corte, parate e altri eventi significativi, dimostrando la loro importanza al di là dei loro doveri militari."

 kasztelanowie: "Kasztelanowie"
 kasztelanowie_desc: "I castellani rappresentano la voce del monarca in tutto il nostro dominio. Sono incaricati di riscuotere le tasse e di far rispettare la legge, e possono persino eseguire la giustizia in nome della Corona."

 land_of_promise: "Terra Promessa"
 land_of_promise_desc: "Le fertili terre del nostro dominio sono una meta ambita da molti migranti, soprattutto quelli di ceto sociale inferiore, alla ricerca di una vita migliore e più prospera."

 statute_of_kalisz: "Statuto di Kalisz"
 statute_of_kalisz_desc: "Conosciuto come Carta Generale delle Libertà ebraiche, questo statuto contiene articoli che garantiscono a tutti gli ebrei del nostro regno la libertà di culto, di commercio e di viaggio. Lo statuto cerca anche di ridurre il numero di accuse di omicidio rituale contro gli ebrei propagate dalla Chiesa cattolica."

 corona_regni_poloniae: "Corona Regni Poloniae"
 corona_regni_poloniae_desc: "Questa legislazione stabilisce che il regno è un'entità collettiva indivisibile, di proprietà non di una singola dinastia o monarca, ma dell'intera classe nobiliare. I sovrani servono il regno, non lo #italic possiedono#!. Questo concetto di collettività è profondamente radicato nella nostra società."

 krakow_grosz: "Grosz di Cracovia"
 krakow_grosz_desc: "Nel tentativo di riformare il nostro sistema monetario, introdurremo una nuova valuta, il #italic Kraków Grosz#!. Coniate in argento, queste monete sono destinate a sfidare il potere boemo #italic Prague Groschen#! e a contribuire a rendere il nostro regno pioniere della tassazione centralizzata."

 stone_and_brick: "Pietra e Mattone"
 stone_and_brick_desc: "Per secoli abbiamo utilizzato il legno per costruire le nostre città e le nostre difese, ma ora miglioreremo sistematicamente le nostre infrastrutture sostituendo le strutture in legno più vulnerabili con altre più resistenti. Abbiamo ereditato città in legno, ma le lasceremo fortificate con pietra e mattoni."

 council_of_three_lands_advance: "Consiglio delle Tre Terre"
 council_of_three_lands_advance_desc: "Il nostro paese ha una lunga tradizione di accoglienza dei cittadini ebraici indigenti e perseguitati. A tal fine, un consiglio che si occuperà delle loro esigenze e difenderà i loro diritti contribuirà alla stabilità e alla forza spirituale di questo regno."

 polish_renaissance: "$polish_group$ $renaissance$"
 polish_renaissance_desc: "Ispirati dagli ideali del $renaissance$ italiano, stiamo vivendo un'età dell'oro culturale. I nostri successi letterari, gli splendori architettonici e l'atmosfera colta di tolleranza religiosa hanno portato a una fioritura della cultura in tutto il nostro territorio."

 granary_of_europe: "Il Granaio dell'$europe$"
 granary_of_europe_desc: "I fertili campi del nostro dominio ospitano i raccolti di grano più ricchi dell'$europe$, in parte grazie al $folwark_system$. Grazie alla nostra generosità, riforniamo i mercati oltre i nostri confini, garantendo che il nostro popolo continui a prosperare e non soffra mai la fame."

 komisja_edukacji_narodowej: "Commissione per l'Istruzione Nazionale"
 komisja_edukacji_narodowej_desc: "La necessità del nostro governo di amministratori capaci ha portato a una riforma sistematica dell'istruzione. Istituiremo il primo ministero dell'istruzione in $europe$, dedicato alla diffusione dell'alfabetizzazione tra la nostra popolazione, che si spera porterà a un aumento dei candidati qualificati per il nostro personale amministrativo in espansione."

 szkola_rycerska: "Scuola dei Cavalieri"
 szkola_rycerska_desc: "Con l'istituzione della "Scuola dei Cavalieri" per formare i giovani nobili nelle scienze militari e nel loro dovere patriottico, formeremo generazioni di personale militare e civile capace e dedicato."

 great_sejm_reforms: "Riforme del Grande Sejm"
 great_sejm_reforms_desc: "Se vogliamo sopravvivere e continuare a prosperare, il nostro meccanismo di governo deve funzionare in modo efficiente e basarsi su fondamenta solide. Il parlamento adotterà procedure modernizzate e rafforzerà la propria autorità. Gli obiettivi di questa evoluzione sono limitare il potere della nobiltà e mitigare gli abusi crescenti della servitù della gleba."

 late_winged_hussars_advance: "Ultimi Ussari Alati"
 late_winged_hussars_advance_desc: "L'evoluzione degli ussari Polacchi comportò l'adozione di armature più pesanti con colori rosso e bianco. Essi utilizzavano lance più lunghe, di circa sei metri, che rendevano la loro carica incredibilmente devastante, spesso demoralizzando i nemici e causandone la fuga."

 winged_hussars_advance: "Ussari Alati"
 winged_hussars_advance_desc: "Gli ussari erano originariamente truppe di cavalleria leggera utilizzate per la ricognizione, ma con il declino del vecchio esercito feudale, siamo passati a reggimenti professionali, il cui nucleo sarà costituito da questi ussari più pesanti e corazzati. La paura di questi guerrieri alati farà tremare i nostri nemici nella notte come bambini!"

 wojsko_komputoe: "Wojsko Komputowe"
 wojsko_komputoe_desc: "L'"Esercito informatico" era basato su un bilancio annuale calcolato e approvato dal Sejm. L'idea alla base era quella di fornire al Commonwealth un esercito permanente stabile per la difesa."

 folwark_system: "Sistema Folwark"
 folwark_system_desc: "Il sistema Folwark era un sistema di produzione che enfatizzava la creazione di surplus agricoli. I contadini erano incoraggiati a lavorare attraverso l'uso di affitti o attraverso la coercizione. Questo sistema costituiva il fondamento della nostra economia."

 baihua: "Báihuàwén"
 baihua_desc: "Il nostro dominio si estende ben oltre l'orizzonte. L'emergere di una lingua scritta comune tra i nostri sudditi colmerà sicuramente i divari tra di noi, eleverà la nostra cultura e ridurrà i conflitti basati su incomprensioni e differenze linguistiche."

 zaju: "Zájù"
 zaju_desc: "Composto tipicamente da quattro atti, questo brillante spettacolo di danza e musica è un'espressione colorata delle vette artistiche raggiunte dalla nostra società."

 successors_of_genghis_khan: "Successori del $genghis_khan_name_no_tooltip$"
 successors_of_genghis_khan_desc: "Dai giorni della conquista totale alle vaste distese del grande Impero del $genghis_khan_name_no_tooltip$, il nostro popolo discende da generazioni di rivoluzionari. Il nostro popolo è destinato a scrivere la storia."

 confucian_influences: "Influenze Confuciane"
 confucian_influences_desc: "Se vogliamo gestire correttamente il nostro regno, i nostri consiglieri troveranno grande saggezza in materia di amministrazione negli insegnamenti confuciani, che enfatizzano la selezione meritocratica dei funzionari, l'attenzione ai dettagli amministrativi e altri consigli fondamentali per creare un governo sano e prospero."

 extensive_canal_works: "Lavori Estesi sui Canali"
 extensive_canal_works_desc: "I numerosi fiumi che attraversano il nostro dominio hanno un enorme potenziale economico. Costruendo vaste reti di canali, possiamo collegare le vie navigabili agli insediamenti dell'entroterra, facilitando i trasporti e fornendo al contempo un approvvigionamento idrico affidabile al nostro popolo."

 zhongshu_sheng: "Zhōngshū Shěng"
 zhongshu_sheng_desc: "Uno dei rami più importanti dei #italic Tre Dipartimenti e Sei Ministeri#!, il segretariato centrale è responsabile della stesura e della codificazione di molte riforme e decreti imperiali."

 lijia_system: "Sistema Lǐ Jiǎ"
 lijia_system_desc: "Grazie al sistema #italic Lǐ Jiǎ#!, siamo in grado di esercitare il controllo sulle nostre zone di confine attraverso l'assegnazione di eserciti stazionari. Concedendo diritti fondiari e agricoli alle nostre truppe di stanza, i nostri confini saranno più sicuri e la nostra autorità sarà affermata."

 yulin_tuce: "Yúlín Túcè"
 yulin_tuce_desc: "L'evasione fiscale è un problema senza tempo che affliggeva anche i nostri antenati, ma potremmo aver trovato una soluzione: compilando i registri dei distretti e delle province, potremo tenere traccia delle imposte dovute al governo centrale da ogni appezzamento. Questa tassazione è determinata in gran parte in base alla resa di grano di ogni appezzamento sottoposto a rilevamento."

 weisuo_system: "Wèi Suǒ"
 weisuo_system_desc: "Molti aspiranti conquistatori guardano alle nostre terre con intento avido. Se vogliamo difendere il nostro territorio, dobbiamo istituire un sistema di guarnigioni, volto a rispondere rapidamente alle invasioni ostili. Attraverso il reclutamento di truppe locali, la nostra capacità difensiva sarà integrata da rifornimenti e da una logistica più efficiente."

 grand_coordinators: "Grandi Coordinatori"
 grand_coordinators_desc: "Mantenere il controllo sui nostri territori, l'elaborazione delle politiche e le operazioni militari è fondamentale per la continuità della nostra dinastia. Attraverso la creazione dei Grandi Coordinatori, un corpo di funzionari di alto rango in grado di coordinare il governo del nostro vasto impero, riusciremo a consolidare la nostra posizione attraverso un'efficace stabilizzazione delle questioni interne ed esterne."

 the_censorate: "Il Censorato"
 the_censorate_desc: "Parallelamente ad altri istituti amministrativi, questo ramo del governo è incaricato di prevenire la corruzione. I censori controllano intrighi palaziali e malversazioni, essendo spesso considerati gli occhi e le orecchie dell'Imperatore."

 the_tea_trade: "Il Commercio di $tea$"
 the_tea_trade_desc: "Bevanda fondamentale nella nostra società, il $tea$ ha conquistato un ruolo dominante nei ritrovi sociali, diventando la bevanda preferita da molti. Ciò porterà senza dubbio non solo alla coltivazione di nuove varietà, ma anche a un boom della produzione."

 tu_bing: "Tǔ Bīng"
 tu_bing_desc: "Nel nostro intento di rafforzare le difese dei confini, è diventato evidente che dobbiamo creare un sistema di reclutamento incentrato sui soldati e sui fedelissimi locali. Questi combattenti saranno una preziosa aggiunta alle nostre capacità militari e saranno tenuti separati dal sistema #italic Wèi Suǒ#!"

 tusi_titles: "Titoli Tǔsī"
 tusi_titles_desc: "Titoli concessi a signori della guerra e potenti locali: queste posizioni amministrative servono a sedare disordini e mantenere la popolazione rurale sotto il controllo centrale."

 salt_monopoly: "Ripristinare il Monopolio del $salt$"
 salt_monopoly_desc: "Il monopolio del $salt$ era un tempo la nostra fonte di reddito più importante, ma gli imperatori precedenti lo hanno abolito per incoraggiare il libero scambio. È ora di riportare il commercio del $salt$ sotto il controllo dello Stato."

 reform_the_grand_secretariat: "Riforma della Gran Segreteria"
 reform_the_grand_secretariat_desc: "Considerata la #italic de facto#! istituzione più alta della nostra nazione, la #italic Gran Segreteria#! ha servito i nostri governanti per secoli. Esercitando un'immensa influenza sugli affari amministrativi, questo organo di ministri del gabinetto deve essere sottoposto a una riforma per aumentarne ulteriormente l'efficacia."

 grand_military_parades: "Grandi Parate Militari"
 grand_military_parades_desc: "La nostra illustre storia militare è fonte di grande ispirazione e orgoglio per il nostro popolo. Con l'organizzazione di elaborate parate per mostrare i nostri eserciti, dimostreremo in modo deciso la nostra esperienza marziale e la nostra forza senza pari."

 silver_standard: "Standard d'Argento"
 silver_standard_desc: "Trasformando la maggior parte degli obblighi nei confronti del governo centrale - dalle tasse pro capite agli obblighi di lavoro dei contadini o ai tributi dei funzionari locali - in un unico pagamento in argento, il cui importo è basato sulla popolazione e sui terreni coltivati in ciascuna prefettura, la riscossione delle tasse diventerà più facile e le nostre entrate aumenteranno."

 nine_garrisons_of_the_great_wall: "Nove Guarnigioni della Grande Muraglia"
 nine_garrisons_of_the_great_wall_desc: "Per difenderci dal feroce assalto dei barbari, non basta semplicemente riparare la Grande Muraglia. Le Nove Guarnigioni sono città di guarnigione militarizzate lungo la Muraglia che non solo contribuiranno a difendere i passi più importanti, ma miglioreranno anche la situazione logistica complessiva al nostro confine settentrionale."

 the_red_cannon: "Il Cannone Rosso"
 the_red_cannon_desc: "I barbari dai capelli rossi dell'$europe$ saranno anche incivili e maleducati, ma sanno come fabbricare artiglieria e armi da fuoco di buona qualità. Importare e duplicare le loro armi darà al nostro esercito un vantaggio significativo contro tutti gli invasori."

 woodblock_printing: "Xilografia"
 woodblock_printing_desc: "La produzione di eleganti illustrazioni, opere d'arte e libri utilizzando questo metodo di stampa ha catturato l'attenzione del nostro popolo, e i nostri maestri stampatori si sforzano costantemente di perfezionare le loro tecniche di . La stampa su blocchi di legno è diventata parte della nostra cultura e, con i recenti miglioramenti e l'espansione della nostra produzione letteraria, aumenterà ulteriormente il nostro prestigio."

 green_standard_army: "Esercito dello Stendardo Verde"
 green_standard_army_desc: "L'Esercito dello Stendardo Verde, una forza militare composta principalmente da soldati di etnia Hàn, coesiste con i nostri eserciti delle Otto Bandiere. Originariamente formato da truppe che si sono arrese e reclutate su base volontaria e a lungo termine, attira individui provenienti da contesti sociali svantaggiati. Utilizzato come forza di polizia dopo il consolidamento, svolgerà un ruolo cruciale nel governo militare locale, mentre i Bannermen saranno riservati alle emergenze e alla resistenza prolungata."

 great_tax_reform: "Grande Riforma Fiscale"
 great_tax_reform_desc: "La nostra ricca nazione dispone di abbondanti risorse monetarie e di campi fertili, ma tutta questa abbondanza richiede una tassazione completa. La Grande Riforma Fiscale consente una gestione più efficiente delle entrate, che dovrebbe garantire un bilancio più sano per il nostro regno."

 junji_chu: "Jūnjī Chù"
 junji_chu_desc: "Conosciuto anche come il Gran Consiglio, il #italic Jūnjī Chù#! ha il compito di supervisionare gli affari militari. Essendo il consiglio privato più importante, ha finito per mettere in ombra il Gran Segretariato che dominava le dinastie precedenti. Nonostante il suo ruolo cruciale, questo consiglio manterrà una natura informale all'interno della corte interna, con i suoi membri che ricoprono altri ruoli ufficiali oltre a quello di consiglieri."

 jingdezhen_porcelain: "Jǐngdézhèn $porcelain$"
 jingdezhen_porcelain_desc: "La nostra industria del $porcelain$ è emblematica della prosperità e della tradizione di eccellenza artigianale che caratterizzano il nostro Impero. Perfezionando le già superiori tecniche di produzione del $porcelain$ di Jǐngdézhèn, diffonderemo la nostra influenza culturale in lungo e in largo."

 sanxitang: "Sānxītáng"
 sanxitang_desc: "La Sala delle Tre Rarità è il nostro più splendido deposito di oggetti rari e preziosi e di opere d'arte. Grazie al generoso patrocinio del nostro sovrano, è diventata un luogo di discussioni accademiche, conferenze e persino eventi culturali, promuovendo lo scambio intellettuale e le attività accademiche."

 monuments_to_greatness: "Monumenti alla Grandezza"
 monuments_to_greatness_desc: "Nei millenni di esistenza del nostro popolo su questo pianeta, esso ha sopportato migliaia di catastrofi grazie alla sua tenacia. Questa innata forza d'acciaio è stata riconosciuta come una caratteristica distintiva della nostra società. Mostriamo la nostra resilienza nella forza del nostro esercito e nella bellezza divina della nostra arte."

 ten_great_campaigns: "Dieci Grandi Campagne"
 ten_great_campaigns_desc: "Le Dieci Grandi Campagne mirano ad espandere la nostra influenza sia all'interno che all'esterno dei nostri confini. Per raggiungere questo obiettivo, recluteremo un enorme esercito per schiacciare qualsiasi resistenza che potremmo incontrare sul nostro cammino. Soffocheremo sul nascere qualsiasi ribellione prima che abbia la possibilità di alzare la testa, e la nostra gloria sarà eterna."

 tributary_system: "Sistema Tributario"
 tributary_system_desc: "Un sistema di signori della guerra locali sottomessi e altri governanti che ci inviano regolarmente doni di fedeltà in riconoscimento della nostra supremazia. Perfezionare e centralizzare questo sistema ci aiuterebbe a rafforzare il nostro controllo e a ottenere di più da loro."

 timurid_cavalry: "Cavalleria Timuride"
 timurid_cavalry_desc: "Come il grande $genghis_khan_name_no_tooltip$ dominava le steppe con la potenza della sua cavalleria, così noi trionferemo grazie ai nostri cavalli incomparabili. allevati per i combattimenti più rigorosi e montati dai soldati meglio addestrati al mondo, la nostra cavalleria incuterà timore nei cuori dei nostri nemici."

 timurid_architecture: "Architettura Timuride"
 timurid_architecture_desc: "L'architettura della $persia_region$ è stata per secoli l'invidia del mondo conosciuto. Dobbiamo promuovere una nuova forma di architettura, che superi qualsiasi cosa vista prima, in modo da poter rivendicare il nostro diritto di nascita come maestri di quest'arte."

 the_mantle_of_the_great_khan: "Il Mantello del Grande $rank_kingdom_horde_ruler_suffix_male$"
 the_mantle_of_the_great_khan_desc: "La morte di $genghis_khan_name_no_tooltip$ ha creato un vuoto di potere che ha portato persone che avrebbero dovuto saperne di più a contendersi il suo posto. Tuttavia, attraverso matrimoni strategici, abbiamo consolidato la nostra rivendicazione di discendenza dallo stesso Grande $rank_kingdom_horde_ruler_suffix_male$, e i guerrieri delle steppe dichiareranno la loro fedeltà nei nostri confronti."

 turco_persian_tradition: "Tradizione Turco-Persiana"
 turco_persian_tradition_desc: "La $IRA$ è sempre stato il centro indiscusso della cultura e della lingua nella regione, influenzando i diversi popoli del $turkic_group$ che esistono da secoli. Abbracciamo questa fusione di culture per creare la nostra tradizione unica."

 tamerlane_chess: "Scacchi di Tamerlano"
 tamerlane_chess_desc: "Questa nuova variante degli scacchi, inventata dal nostro grande fondatore omonimo, migliora le versioni precedenti. Il suo utilizzo aiuterà i nostri generali a migliorare le loro abilità strategiche e tattiche."

 chagatai_literature: "Letteratura in $karluk_language$"
 chagatai_literature_desc: "La lingua $karluk_language$ delle steppe orientali è molto più degna di trasmettere i pensieri e le idee della nostra grande stirpe di quanto potrebbero mai esserlo il $persian_language$ o il $arabic_language$. Dobbiamo promuovere l'uso della nostra lingua ancestrale e creare una nuova tradizione letteraria."

 nambardar_levy: "Reclutamento Nambardar"
 nambardar_levy_desc: "Il $nambardar_levy$, o #italic čerig-i nambardar#!, si riferisce alle nostre truppe che non provengono dal $mongolian_culture$ o da origini $turkic_group$, ma provengono invece dalla popolazione nativa del $iranian_group$. Grazie a loro, possiamo costruire eserciti più grandi di quanto sarebbe stato possibile in precedenza."

 timurid_renaissance: "$renaissance$ Timuride"
 timurid_renaissance_desc: "Sin dall'espansione iniziale timuride, il nostro regno ha attirato i più grandi artigiani e saggi dell'epoca. Attraverso il nostro continuo mecenatismo nell'arte, nella scienza e nella letteratura, abbiamo reso le città del $herat$ e del $samarkand$ i gioielli più splendenti del mondo."

 riches_of_the_silk_road: "Controllo della Via della Seta"
 riches_of_the_silk_road_desc: "Finché i nostri mercanti controlleranno il commercio attraverso le terre del $transoxiana_area$ e del $samarkand$, il traffico della Via della Seta scorrerà indisturbato e la ricchezza della nostra dinastia continuerà a crescere."

 reform_the_diwan: "Riformare il Dīwān"
 reform_the_diwan_desc: "Abbiamo la fortuna di essere serviti da amministratori del $farsi_culture$ leali e ben istruiti, che hanno perfezionato l'arte del governo per generazioni. Purtroppo, però, una carica ereditaria è una carica che nel tempo potrebbe stagnare e mancare di innovazione. Riducendo il numero di cariche ereditarie ad ogni generazione, possiamo assicurarci di premiare non solo la lealtà, ma anche l'abilità. Gli amministratori capaci devono raggiungere posizioni elevate indipendentemente dalla famiglia da cui provengono."

 conquerors_legacy: "Eredità dei Conquistatori"
 conquerors_legacy_desc: "Il nostro glorioso impero è nato dall'eredità di grandi conquistatori. È stata la ferocia delle truppe del $genghis_khan_name_no_tooltip$ a permettergli di conquistare dall'$europe$ alla $china$. Come suoi successori, le nostre truppe saranno temibili quanto quelle del suo esercito."

 glh_kipchak_khanate: "Khanato Kipchak"
 glh_kipchak_khanate_desc: "Il nostro grande paese è chiamato anche Khanato Kipchak, governando su tutti i territori della Confederazione Cumano-Kipchak. Con tali distese di terra sotto il nostro comando, gli eserciti che possiamo radunare saranno innumerevoli."

 glh_legacy_of_jochi: "Eredità di Jochi"
 glh_legacy_of_jochi_desc: "Dopo la morte di $genghis_khan_name_no_tooltip$, anche suo figlio Jochi morì poco dopo. Tuttavia, la sua presenza e la sua eredità sono ancora sentite nel nostro paese, al punto che siamo ancora conosciuti come l'Ulus di Jochi. I guerrieri accorrono sotto le nostre bandiere per sostenere quell'eredità."

 glh_legacy_of_the_golden_horde: "Eredità dell'Orda d'Oro"
 glh_legacy_of_the_golden_horde_desc: "Eravamo una delle principali parti costituenti dell'impero di $genghis_khan_name_no_tooltip$ e rappresentiamo la principale forza politica in $eastern_europe$ e nelle steppe. Il mondo tremerà davanti a noi!"

 glh_perso_mongol_administration: "Amministrazione Perso-Mongola"
 glh_perso_mongol_administration_desc: "I nostri antenati hanno perfezionato il nostro sistema amministrativo nel corso dei secoli e non hanno esitato a incorporare le idee e i metodi delle culture che hanno sottomesso. Il nostro attuale sistema amministrativo si basa in parte su tradizioni che risalgono al Grande $genghis_khan_name_no_tooltip$ stesso e in parte su ciò che abbiamo adottato persiano e dai burocrati musulmane nelle terre conquistate."

 glh_tatar_traditions: "Tradizioni Tatare"
 glh_tatar_traditions_desc: "Il nostro impero non è più governato a cavallo, ma i nostri eserciti rimangono maestri della monta. Nel corso dei secoli, siamo rimasti fedeli alle nostre origini, assicurandoci che pochi potessero eguagliare l'abilità dei nostri cavalieri. Mentre andiamo avanti e adottiamo nuove tecnologie e tattiche quando necessario, costruiamo sulla solida organizzazione e sulle tradizioni marziali dell'Impero mongolo."

 glh_secure_the_trade_routes: "Mettere in Sicurezza le Rotte Commerciali"
 glh_secure_the_trade_routes_desc: "Non tutte le ricchezze di questo mondo provengono dal nostro territorio. Il commercio è la fonte di ogni ricchezza e l'Orda d'Oro ha sempre protetto i mercanti. Garantendo la sicurezza di chiunque desideri trasportare merci attraverso il nostro paese, possiamo assicurare un flusso costante di pellicce, seta, spezie e altri beni di prima necessità alle nostre città. Che decidano di venderci le loro merci o meno, la loro semplice presenza genererà ricchezza per il nostro popolo."

 glh_religious_pragmatism: "Pragmatismo Religioso"
 glh_religious_pragmatism_desc: "Una dottrina vincolante e inflessibile non ha mai conquistato molti ammiratori tra le orde tartare. Quando il Grande $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ adottò l'Islam, fu la fede di uno sceicco sufi o di un zelante qāḍī che egli invitò nelle sue terre.\n\nSecoli di tradizione e lealtà sono ciò su cui preferiremmo costruire l' e del nostro Stato. La religione ha un ruolo da svolgere, ma preferiremmo vedere il nostro Paese prosperare piuttosto che cadere nel caos di un'omogeneità religiosa forzata."

 glh_modernization_of_steppes: "Modernizzazione delle Steppe"
 glh_modernization_of_steppes_desc: "È passato molto tempo da quando le armate del $genghis_khan_name_no_tooltip$ hanno conquistato per la prima volta il controllo delle steppe. Da allora il nostro Paese ha superato ogni aspettativa dei nostri antenati e ora siamo una potenza globale per merito nostro. Ora inizieremo il processo di modernizzazione dei nostri territori, affinché un giorno possiamo diventare il faro di tutto il mondo."

 cri_genghisid_legacy: "Eredità Genghiside"
 cri_genghisid_legacy_desc: "I nostri antenati hanno cavalcato al fianco di $genghis_khan_name_no_tooltip$ mentre devastava il mondo conosciuto. Abbiamo mantenuto vive le nostre tradizioni militari e abbiamo continuato a essere governati dai $rank_kingdom_horde_ruler_suffix_male$ che rivendicano la discendenza dalla stirpe di Gengis."

 cri_slavers: "Schiavisti delle Steppe"
 cri_slavers_desc: "Il commercio di $slaves_goods$ è una fonte di ricchezza; gli ignari fedeli cristiani che cadono nelle nostre mani raggiungono prezzi elevati nei mercati del $turkish_culture$, arabi e italiani."

 cri_free_cattle_grazing: "Pascienza Libera"
 cri_free_cattle_grazing_desc: "Non imponiamo restrizioni ai pastori per il pascolo delle loro vaste mandrie di cavalli e bovini. Gli allevatori possono muoversi liberamente per le steppe, commerciare e condurre le loro attività senza ostacoli."

 cri_steppe_commanders: "Comandanti delle Steppe"
 cri_steppe_commanders_desc: "I comandanti della cavalleria crimeana hanno imparato l'arte della mobilità nella guerra delle steppe, usando la velocità, i fiancheggiamenti e gli agguati per superare gli eserciti europei più lenti."

 cri_devshirme_of_the_steppes: "Il Devshirme delle Steppe"
 cri_devshirme_of_the_steppes_desc: "Le élite crimeane hanno imitato alcuni aspetti delle pratiche militari-amministrative ottomano, fondendo i sistemi del $turkic_group$ e musulmani per gestire la manodopera e l'efficienza militare."

 chg_legacy_of_chagatai: "Eredità di Chagatai"
 chg_legacy_of_chagatai_desc: "L'eredità del $genghis_khan_name_no_tooltip$ è nostra attraverso suo figlio Chagatai. Tutti tremeranno davanti a noi mentre rivendichiamo la sua gloria!"

 chg_chagatai_riders: "Cavalieri di Chagatai"
 chg_chagatai_riders_desc: "I cavalli del $genghis_khan_name_no_tooltip$ calpestarono e conquistarono territori che si estendevano dall'$europe$ alla $china$. Come suoi eredi e successori, la nostra cavalleria instillerà nei nostri nemici il timore che la stessa cosa possa accadere."

 chg_the_mountain_khanate: "Il Khanato delle Montagne"
 chg_the_mountain_khanate_desc: "Viviamo al riparo tra il $balkhash_lake$ e i monti Tiānshān. È una terra aspra e inospitale, che il nostro popolo sa usare come arma contro i potenziali invasori."

 chg_border_wars: "Guerre di Confine Incessanti"
 chg_border_wars_desc: "Circondati da popoli che ci osteggiano, dobbiamo lottare costantemente per difendere i nostri confini. I nostri soldati, sempre vigili, hanno numerose opportunità di affinare le loro abilità in battaglia, dando vita a un popolo di guerrieri temprati dal combattimento e pronti a rivendicare l'eredità del Grande $rank_kingdom_horde_ruler_suffix_male$."

 chg_sons_of_chagatai: "Figli di Chagatai $rank_kingdom_horde_ruler_suffix_male$"
 chg_sons_of_chagatai_desc: "Possiamo far risalire la nostra discendenza a Chagatai $rank_kingdom_horde_ruler_suffix_male$, il secondo figlio di $genghis_khan_name_no_tooltip$, che un tempo governò queste terre e fondò un potente stato mongolo successore. Sebbene sia passato molto tempo da allora, possiamo ancora rivendicare una notevole legittimità facendo appello all'eredità del nostro feroce antenato."

 chg_tradition_of_conquest: "Tradizione di Conquista"
 chg_tradition_of_conquest_desc: "Conquistare popoli può essere un'impresa difficile; non tutti sono pronti ad accettare il nostro governo illuminato. Tuttavia, abbiamo scoperto che esistono modi più semplici per portare le persone nel nostro impero piuttosto che costruire una montagna di teschi, cosa che i nostri antenati non hanno mai imparato."

 chg_scheming_court: "Corte Intrigante"
 chg_scheming_court_desc: "Le continue lotte di potere tra i vari principi, nobili, città e tribù del Khanato di Chagatai hanno prodotto una nazione di abili intriganti. Se riuscissimo a mettere da parte le nostre dispute e a incanalare questa energia per superare in astuzia i nostri nemici, sarebbe un grande vantaggio per il nostro popolo."

 chg_glory_of_conquest: "La Gloria della Conquista"
 chg_glory_of_conquest_desc: "Sia noto che un ragazzo non può diventare uomo se non ha cavalcato con il nostro esercito invincibile; che non può prendere moglie finché non ha preso la moglie di un altro uomo; che non è degno di una capanna finché non ne ha bruciata una altrui. Che il servizio nel nostro esercito sia l'unica via verso la virilità."

 chg_unrelenting_horde: "Orda Incessante"
 chg_unrelenting_horde_desc: "I nostri eserciti marceranno come le grandi orde del $genghis_khan_name_no_tooltip$. Le nostre truppe calpesteranno i nemici come fili d'erba delle nostre steppe. Tutti temeranno la potenza delle nostre armate!"

 mge_pax_mongolica: "Pax Mongolica"
 mge_pax_mongolica_desc: "Dopo aver unificato tutti i territori del $mongolian_culture$ sotto la nostra bandiera, il nostro popolo potrà godere di una stabilità e prosperità che non si vedevano dai tempi del grande $genghis_khan_name_no_tooltip$."

 mge_all_under_a_khan: "Tutti sotto un $rank_kingdom_horde_ruler_suffix_male$"
 mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ ha unificato grandi porzioni di territorio sotto la sua bandiera. Dopo aver unificato nuovamente quei territori sotto l'autorità di un unico $rank_kingdom_horde_ruler_suffix_male$, tutti i popoli del nostro impero giureranno fedeltà a noi."

 mge_ghostly_horses_of_the_plain: "Cavalli Spettrali della Steppa"
 mge_ghostly_horses_of_the_plain_desc: "L'abilità dei cavalieri del $mongolian_culture$ è rinomata in tutto il mondo. I nostri nemici tremano di terrore alla vista di una nuvola di polvere in lontananza, temendo che possa significare l'avvicinarsi della nostra cavalleria!"

 mge_yeke_mongol_ulus: "Yeke Mongol Ulus"
 mge_yeke_mongol_ulus_desc: "Come mongoli originari, abbiamo restaurato lo #italic Yeke Mongol Ulus#!, il Grande Stato Mongolo, riportando in vita la gloria del grande impero del $genghis_khan_name_no_tooltip$. Alla minima occasione, il nostro popolo emulerà le gesta del Grande $rank_kingdom_horde_ruler_suffix_male$ e rivendicherà la sua eredità, riunificando i territori un tempo vastissimi del Khanato mongolo."

 mge_life_of_steppe_warrior: "La Vita di un Guerriero della Steppa"
 mge_life_of_steppe_warrior_desc: "La steppa è un luogo minaccioso e spietato per chi non è preparato. Noi siamo abituati a vivere in questo ambiente ostile e, di conseguenza, il nostro popolo è robusto e ha un talento naturale per la sopravvivenza. Noi faremo in modo che tutti i nostri soldati acquisiscano queste abilità, in modo da poter sopravvivere più facilmente a situazioni estreme."

 mge_multicultural_empire: "Impero Multiculturale"
 mge_multicultural_empire_desc: "I territori del grande Impero mongolo ospitano molti popoli diversi, tutti uniti sotto la gloria del potente $rank_kingdom_horde_ruler_suffix_male$."

 mge_improved_yam_system: "Sistema Yam Migliorato"
 mge_improved_yam_system_desc: "Il sistema di #italic yam#! presenti in tutto il nostro impero ha facilitato la comunicazione e la logistica sin dai tempi del grande $genghis_khan_name_no_tooltip$. Dopo aver ristabilito e migliorato questo sistema, i nostri messaggeri possono attraversare la vasta distesa del nostro impero a velocità che prima non erano nemmeno immaginabili."

 mge_mongolian_mobility: "Mobilità Mongola"
 mge_mongolian_mobility_desc: "Ciascuno dei nostri soldati possiede in genere tre o quattro cavalli, il che gli consente di cambiare ogni volta che il suo destriero è stanco e quindi di viaggiare ad alta velocità per giorni senza fermarsi. Inoltre, le loro cavalcature extra forniscono loro riserve di cibo attraverso il latte di cavalla e la carne di cavallo, rendendo i nostri eserciti molto meno vulnerabili alla fame rispetto agli eserciti delle altre nazioni cosiddette civilizzate. Questo ci permette di superare facilmente i nostri nemici, coprendo una quantità impressionante di territorio in periodi di tempo più brevi di quanto essi ritenessero possibile."

 mge_kheshig: "I Kheshig"
 mge_kheshig_desc: "I #italic Kheshig#! un tempo costituivano la formidabile guardia del corpo del Grande Khan mongolo $rank_kingdom_horde_ruler_suffix_male$. I loro discendenti continueranno a proteggere il $rank_kingdom_horde_ruler_suffix_male$ della $MGE$ mentre cavalcano in battaglia."

 mge_glory_of_the_khan: "Gloria del $rank_kingdom_horde_ruler_suffix_male$"
 mge_glory_of_the_khan_desc: "Lo straordinario $genghis_khan_name_no_tooltip$ ha raccolto un esercito enorme come mai visto prima. Noi siamo gli eredi della sua gloria e quindi il nostro esercito supererà anche le più grandi orde mongole del passato."

 horse_lords: "Signori dei Cavalli delle Steppe"
 horse_lords_desc: "Il nostro popolo e i nostri cavalli condividono un legame indissolubile. I bambini crescono insieme ai puledri, imparando l'arte dell'equitazione fin dalla più tenera età. L'allevamento accurato e l'addestramento rigoroso di questi destrieri sono il nostro più grande orgoglio e siamo riconosciuti in lungo e in largo come i più grandi signori dei cavalli del mondo."

 kurultai_advance: "Kurultai"
 kurultai_advance_desc: "Dopo aver riunito i capi di ogni banda di guerrieri sotto un unico tendone, eleggeremo il $rank_empire_horde_ruler_suffix_male$ che guiderà le nostre orde alla vittoria. In questo #italic kurultai#!, si deciderà il destino del nostro popolo e i capi saranno scelti tra coloro che si ritengono degni di guidarci."

 beyond_the_sun: "Oltre il Sole"
 beyond_the_sun_desc: "L'epoca delle Grandi Orde non è ancora finita. Abbiamo imparato dagli errori dei nostri nemici e ora risorgeremo più saggi e più forti. Tutte le terre dove il sole nasce e muore devono essere nostre."

 steppe_slave_raiding: "Razziatori di Schiavi delle Steppe"
 steppe_slave_raiding_desc: "Le nostre bande di predoni si muovono veloci come il vento, colpendo e scappando quasi prima che qualcuno si accorga della nostra presenza. Saccheggiare gli insediamenti che attacchiamo è di per sé redditizio, ma anche i prigionieri che catturiamo possono essere venduti a caro prezzo."

 caravanserai_advance: "$caravanserai$"
 caravanserai_advance_desc: "Nel corso dell'ultimo millennio, in $central_asia$ sono comparse delle rotte commerciali che hanno dato vita alla rete conosciuta come la Via della Seta. Fondamentale per questo sviluppo è stata la fioritura del $caravanserai$, luogo dove i mercanti e le loro carovane potevano fermarsi e riposare lungo il percorso."

 borjigin_blood: "Sangue del $borjigin_dynasty$"
 borjigin_blood_desc: "Condividiamo il sangue del $borjigin_dynasty$, dello stesso $genghis_khan_name_no_tooltip$. Tutti i paesi si inchinano in segno di riconoscimento della nostra eredità e tutti i territori delle steppe ci riconosceranno come loro."

 turco_mongol_tradition: "Tradizione Turco-Mongola"
 turco_mongol_tradition_desc: "Sebbene la dinastia $borjigin_dynasty$ abbia origini $mongolian_culture$, i territori conquistati dal $genghis_khan_name_no_tooltip$ in $central_asia$ erano principalmente abitati da popolazioni $turkic_group$. Di conseguenza, tra questi due gruppi è emersa una cultura mista distinta."

 yams_of_the_great_khan: "Yam del Grande $rank_kingdom_horde_ruler_suffix_male$"
 yams_of_the_great_khan_desc: "Al fine di garantire che i messaggeri potessero viaggiare abbastanza velocemente da stare al passo con gli eserciti mongoli, il $genghis_khan_name_no_tooltip$ istituì un sistema di stazioni di posta o #italic yams#!, che venivano allestite ogni 30-60 km per fornire cibo, riparo e cavalli di ricambio ai messaggeri dell'esercito mongolo. Ciò consentiva ai messaggi di viaggiare alla velocità di un cavallo al galoppo, senza che la fatica rallentasse la velocità di viaggio dei messaggeri. In questo modo, il nostro impero riuscì a superare i problemi logistici causati dalla vasta portata della Pax Mongolica, almeno temporaneamente."

 mandate_of_the_khan: "Mandato del $rank_kingdom_horde_ruler_suffix_male$"
 mandate_of_the_khan_desc: "Come comanda il $rank_kingdom_horde_ruler_suffix_male$, così fanno gli dei. L'unità del nostro popolo deriva dalla sua lealtà al nostro grande leader. Solo chi è in grado di piegare la volontà di coloro che sono fedeli al sovrano è degno della nostra devozione."

 there_shall_be_no_grass: "Non Crescerà più Erba"
 there_shall_be_no_grass_desc: "Dove è passata la nostra orda, l'erba non crescerà mai più; la terra non nutrirà più i nostri nemici. Il giorno e la notte passeranno, e il terreno rimarrà silenzioso, senza raccolti da mietere. Alcune fame non si possono sfuggire."

 slavery_before_death: "La Schiavitù Prima della Morte"
 slavery_before_death_desc: "La devastazione e la distruzione delle città fanno parte della guerra. In passato, i nostri guerrieri si scatenavano, distruggendo e saccheggiando ogni oggetto che trovavano e uccidendo chiunque si mettesse sulla loro strada. Sebbene ciò rafforzasse il loro morale, le loro azioni erano tutt'altro che economiche. Con questo nuovo approccio, possiamo almeno assicurarci di ridurre in schiavitù coloro che sono in grado di lavorare, invece di decapitarli ciecamente per il trono dei teschi."

 horde_loyalty: "Lealtà dell'Orda"
 horde_loyalty_desc: "La lealtà del nostro popolo è indiscutibile. Nessuno che abbia vissuto sotto il prospero dominio del $rank_kingdom_horde_ruler_suffix_male$ penserebbe mai di abbandonarlo."

 horde_loot_discovery_advance: "Profitti delle Scorrerie"
 horde_loot_discovery_advance_desc: "Le incursioni sono sempre state parte della nostra identità. Saccheggiare e depredare è il modo in cui il nostro popolo impara a combattere e ottiene gran parte della propria fortuna personale. Non c'è nulla di male nel fomentare ancora più incursioni, almeno non per noi."

 trampling_horde: "Orda Travolgente"
 trampling_horde_desc: "Il $genghis_khan_name_no_tooltip$ ha fatto tremare il mondo con le sue conquiste e noi faremo lo stesso. Il mondo imparerà a temere il rumore degli zoccoli al galoppo dei nostri cavalieri che si avvicinano!"

 watchers_of_the_silk_road: "Guardiani della Via della Seta"
 watchers_of_the_silk_road_desc: "Noi non costruiamo, non commerciamo. Prendiamo ciò di cui abbiamo bisogno... e a volte anche di più. I nostri guerrieri hanno tenuto sotto stretta sorveglianza i mercanti stranieri e i loro spostamenti, e ora conosciamo i percorsi più sicuri per trasportare le nostre merci."

 logistics_of_khan: "Logistica del $rank_kingdom_horde_ruler_suffix_male$"
 logistics_of_khan_desc: "La gente dimentica che le conquiste del Grande $rank_kingdom_horde_ruler_suffix_male$ furono dovute tanto alla superiorità logistica quanto alla forza militare. Dobbiamo emulare le tecniche del Grande $rank_kingdom_horde_ruler_suffix_male$, aggiornandole con le conoscenze moderne. Questo ci darà maggiori possibilità di conquista."

 populating_the_steppes: "Popolare le Steppe"
 populating_the_steppes_desc: "Proprio come portiamo distruzione ai nostri nemici, dobbiamo portare pace ai molti che risiedono entro i nostri confini. Mantenendo la stabilità interna e incoraggiando uomini e donne di talento provenienti da tutto il nostro impero a progettare e popolare nuove e grandi città, domeremo le steppe."

 a_magnanimous_empire: "Un Impero Magnanimo"
 a_magnanimous_empire_desc: "Il Grande $rank_kingdom_horde_ruler_suffix_male$ non era famoso solo per la sua spada temibile, ma anche per l'eccezionale generosità verso coloro che saggiamente si inginocchiavano davanti a lui. Coloro che accolgono il dominio del nostro impero tollerante saranno trattati come parte di esso."

 horde_ardor: "Ardore dell'Orda"
 horde_ardor_desc: "I nostri cavalli sono feroci e terrificanti per i nostri nemici quasi quanto i loro cavalieri. La vista della nostra cavalleria che marcia verso la guerra è come assistere all'avanzata di una forza inarrestabile di demoni infernali."

 ira_sasanian_heritage: "Eredità Sasanide"
 ira_sasanian_heritage_desc: "Prima della conquista islamica della $persia_region$, la regione era sede dell'Impero Sasanide, che un tempo governava dal Caucaso a ovest fino alla catena montuosa del Kirthar a est. Molti dei suoi grandi successi culturali hanno plasmato la nostra identità culturale e artistica."

 ira_islamized_persia: "Islam Persiano"
 ira_islamized_persia_desc: "L'islamizzazione della $IRA$ è stato un processo lungo. Non è ancora completamente terminato, ma la nostra religione è comunque diventata uno dei pilastri principali della nostra identità nazionale. Molte delle nostre antiche tradizioni sono state combinate con gli insegnamenti dell'Islam e ora costituiscono il nucleo della nostra cultura attuale."

 ira_shahnameh: "$shahnameh$"
 ira_shahnameh_desc: "Il #italic $shahnameh$#! - il Libro dei Re - è un poema epico e un tesoro nazionale del popolo del $farsi_culture$. Descrivendo il passato storico e mitico degli imperi che un tempo occupavano la Grande $persia_region$, le sue storie contribuiscono alla cultura del $farsi_culture$ in innumerevoli dimensioni."

 ira_restoration_of_cities: "Restauro delle Città"
 ira_restoration_of_cities_desc: "L'invasione mongola della $IRA$ fu catastrofica per l'intera regione. Centri abitati di dimensioni magnifiche furono ridotti a semplici macerie. Ma è finalmente giunto il momento di ricostruire ciò che un tempo fu distrutto e di restaurare il maestoso impero della $IRA$."

 ira_improved_silk_road: "Migliorare la Via della Seta"
 ira_improved_silk_road_desc: "Un sistema di miglioramenti alle strade e ai ponti, un sistema di guardie per proteggere le strade - a un costo minimo - e una catena di $caravanserai$ per il riposo e il ristoro. Tutti questi miglioramenti aiuteranno i mercanti che attraversano la Via della Seta e forniranno anche entrate allo Stato."

 ira_promotion_of_irrigation: "Promozione dell'Irrigazione"
 ira_promotion_of_irrigation_desc: "A seguito dell'invasione mongola del passato, la $IRA$ è in qualche modo spopolato rispetto ai precedenti imperi che rivendicavano queste terre come proprie. Promuovere la pratica dell'irrigazione dovrebbe aiutare la nostra popolazione a sviluppare l'agricoltura necessaria per aumentare la popolazione locale e aiutarci a riprenderci dal bilancio delle vittime dei conflitti passati."

 ira_persian_horses: "Cavalli Persiani"
 ira_persian_horses_desc: "I cavalli svolgono un ruolo fondamentale nella nostra società. Molti dei nostri cittadini crescono insieme ai loro destrieri, il che si riflette sia nella cura che i nostri allevatori di cavalli dedicano loro, sia nella resistenza della nostra cavalleria."

 ira_spread_of_persian_influence: "Influenza Persiana"
 ira_spread_of_persian_influence_desc: "Il $persian_language$ è una lingua antica con una storia più lunga della durata di molti imperi. Nemmeno la conquista musulmana è riuscita a intaccare il nucleo dell'identità persiana, e molti altri Stati cercano di imitare la nostra cultura."

 ira_persian_rug_production: "Produzione di Tappeti Persiana"
 ira_persian_rug_production_desc: "La $IRA$ è famosa da tempo per i suoi splendidi tappeti e arazzi. Tuttavia, quando i mongoli devastarono l'impero, gran parte di questo patrimonio culturale andò perduto. Affinché la $IRA$ possa recuperare pienamente il suo splendore perduto, dobbiamo riconquistare la nostra forza economica, e il ripristino di questa leggendaria industria antica è il primo passo in questa direzione."

 ira_safaviyya_order_hall: "$safaviyya_order_hall$"
 ira_safaviyya_order_hall_desc: "$safaviyya_order_hall_desc$"

 ira_the_qizilbash: "Io $qizilbash$"
 ira_the_qizilbash_desc: "I #italic $qizilbash$#! - i Teste Rosse - sono un movimento militare sciita fondato dagli Ṣafawiyya. Guidati dalle loro convinzioni religiose e dai profondi legami con il sufismo, questi guerrieri sono pronti a combattere per il nostro Stato e a formare il nucleo del nostro esercito."

 ira_the_qurchi: "I Qurchi"
 ira_the_qurchi_desc: "Mentre i $qizilbash$ sono la spina dorsale dell'esercito persiano, i #italic Qurchi#! sono le guardie del corpo reali reclutate tra le loro file. Invece di ricevere terre, questi soldati sono pagati dal tesoro reale."

 ira_religious_state: "Stato Religioso"
 ira_religious_state_desc: "Indipendentemente dalla fede ufficiale del nostro Stato, la $IRA$ sarà sempre un Paese intrinsecamente religioso. Ogni aspetto della nostra vita è guidato da principi religiosi e persino il governo stesso agisce tenendo conto delle nostre convinzioni fondamentali quando si occupa di questioni di moralità e giustizia."

 ira_the_ghilman: "I $a_ghilman$"
 ira_the_ghilman_desc: "I $a_ghilman$ sono un'unità militare composta da ex schiavi cristiani di origine caucasica. I $a_ghilman$ seguono un addestramento militare rigoroso e sono esperti nell'uso delle armi da fuoco, il che li rende una parte essenziale dell'esercito nazionale. Servono da contrappeso ad altri rami influenti dell'esercito."

 ira_encouraged_art: "Promuovere l'Arte"
 ira_encouraged_art_desc: "L'arte persiana è molto richiesta. Collezionisti provenienti da vicino e da lontano viaggiano qui in massa per acquistare le nostre squisite creazioni. Dovremmo offrire sostegno statale ai nostri artisti di talento, poiché questo commercio di beni estetici è estremamente redditizio."

 ira_nazir: "Nāẓir di Corte"
 ira_nazir_desc: "I #italic Nāẓir#!, o sovrintendenti, sono amministratori territoriali e rappresentano gli occhi e le orecchie dello Šâhanšâh. Tutte le azioni della corte sono supervisionate dai Nāẓir e i cortigiani vengono promossi su loro comando. Anche il Gran Visir deve lavorare in collaborazione con i Nāẓir."

 ira_the_tofangchi: "I $a_tofangchi$"
 ira_the_tofangchi_desc: "I $a_tofangchi$ sono il nostro corpo di moschettieri. Sebbene le armi da fuoco siano in uso da tempo, la loro presenza nelle nostre file è molto irregolare, poiché molti dei nostri combattenti preferiscono usare le loro armi tradizionali, arco e frecce. I reggimenti dei $a_tofangchi$ mirano a cambiare questa situazione, poiché sono addestrati all'uso delle armi moderne."

 ira_the_tupchi: "I $a_tupchi$"
 ira_the_tupchi_desc: "$a_tupchi_desc$"

 ira_religious_unity_policy: "Politica di Unità Religiosa"
 ira_religious_unity_policy_desc: "Il tempo delle grandi divisioni religiose è giunto al termine. In questi tempi turbolenti, l'Islam non può permettersi ulteriori lotte intestine. Sosterremo una politica di unità religiosa interna ed esterna e faremo pace con ciò che un tempo consideravamo eresia."

 ira_afsharid_navy: "Difesa Costiera del $persian_gulf$"
 ira_afsharid_navy_desc: "Sebbene le nostre terre si trovino principalmente sugli altopiani dei monti Zagros, la $IRA$ possiede anche dei territori costieri. Mentre le dinastie del passato potrebbero aver prestato poca attenzione alla protezione marittima dell'impero, il nostro popolo è più consapevole del mare e i nostri marinai sono desiderosi di difendere le nostre coste."

 ira_jazayerchi: "Il Corpo di Fanteria del $a_jazayerchi$"
 ira_jazayerchi_desc: "$a_jazayerchi_desc$"

 uc_bey_advance: "$uc_bey$"
 uc_bey_advance_desc: "$uc_bey_desc$"

 seljuk_roots: "Radici Selgiuchidi"
 seljuk_roots_desc: "Siamo circondati da nemici su tutti i fronti, quindi è assolutamente necessario avere un esercito forte. Fortunatamente, non siamo un popolo debole. Dai guerrieri irregolari Ġuzāt e dai predoni Akıncılar ai Sipâhi degli $TUR$, il mondo ha imparato a temere e rispettare la nostra potenza militare. Costruiamo un esercito degno di un impero, ispirato alle nostre gloriose tradizioni e alla nostra storia, affinando la nostra potenza attraverso i secoli."

 heirs_of_rum: "Discendenti di Rûm"
 heirs_of_rum_desc: "Dopo aver superato un periodo turbolento e aver vinto la lotta per il dominio sui vicini Beylik, è finalmente giunto il momento di ripristinare i confini dell'antico e glorioso Sultanato di Rûm!"

 splendor_of_anatolia: "Lo Splendore dell'$anatolia_region$"
 splendor_of_anatolia_desc: "La nostra regione ospita alcune delle madrasse e delle moschee più imponenti dell'intero mondo musulmano. Con la loro meticolosa attenzione ai dettagli e il loro abbondante talento, i nostri artigiani brillano per la loro abilità senza pari."

 persian_in_the_court: "Il Persiano a Corte"
 persian_in_the_court_desc: "Il persiano è stato per molto tempo la nostra lingua amministrativa, un'eredità che deriva dalle nostre antiche radici. Questo ci ha aiutato a superare le barriere sociali e culturali che spesso sorgono in nazioni altamente diversificate come la nostra."

 akinji_cavalry: "Akıncılar"
 akinji_cavalry_desc: "I nostri reggimenti di cavalleria leggera spesso compiono incursioni e talvolta si insediano nei territori confinanti. Noti per il loro coraggio in battaglia, vivevano e operavano come predoni di frontiera, spesso in prima linea nella risposta alle incursioni dei nostri rivali e in posizione perfetta per attaccare e distruggere le rotte commerciali nemiche."

 crossroads_of_commerce: "Crocevia del Commercio"
 crossroads_of_commerce_desc: "I nostri $caravanserais$ sostengono il flusso di commercio, informazioni e persone dalla $china$ al $europe$ attraverso le nostre terre. Questa vicinanza a importanti rotte commerciali ha scatenato un'ondata di ricchezza in tutta la nostra nazione."

 fratricide_succesion_advance: "$fratricide_succesion$"
 fratricide_succesion_advance_desc: "$fratricide_succesion_desc$"

 flexible_loyalty: "Lealtà Flessibile"
 flexible_loyalty_desc: "La nostra nazione è intrappolata in un conflitto tra le religioni in guerra dell'$europe$ e una serie di minacce straniere. L'unico modo per garantire la nostra sopravvivenza in questa tempesta è assumere una posizione flessibile nei confronti della cooperazione con le bande mercenarie locali."

 heritage_of_the_rus: "L'Eredità della Rus'"
 heritage_of_the_rus_desc: "Le terre della Rus' si sono frammentate in stati separati molto tempo fa, ma il ricordo del nostro impero un tempo grande, governato dal $kyiv$, arde vivace in tutti noi. Se ci ispiriamo alle antiche tradizioni e mettiamo in risalto il nostro legame con gli antenati, saremo in grado di creare un insieme di tradizioni distintive per il nostro popolo."

 mother_of_russian_cities: "La Madre degli Stati della Rus'"
 mother_of_russian_cities_desc: "$kyiv$ era un tempo la splendida capitale di un grande impero che si estendeva dalle foreste settentrionali del $novgorod$ alle coste meridionali del Mar Nero. Dopo aver subito la dissoluzione della Rus' e le invasioni dei Mongoli, ne è rimasto ben poco. Ma è giunto il momento della nostra rinascita e, indipendentemente da ciò che le nostre città hanno dovuto sopportare, giuriamo che si riprenderanno e prospereranno per i secoli a venire!"

 international_influences: "Influenze Straniere"
 international_influences_desc: "Molti mercanti e viaggiatori stranieri frequentano le nostre strade, portando grande ricchezza alla nostra terra. Potremmo convincere alcuni di questi avidi commercianti a stabilirsi in modo permanente nelle nostre città, se garantissimo loro che non subiranno persecuzioni per le loro credenze."

 reuniting_rus: "Riunificare la Rus'"
 reuniting_rus_desc: "Noi siamo i veri eredi della Rus' di Kiev e quelle terre devono essere riunificate sotto la nostra bandiera!"

 united_faith: "Una Fede Unita"
 united_faith_desc: "Indipendentemente dalla nostra situazione, dobbiamo garantire l'unità della nostra fede. Solo se il nostro clero è allineato e non esistono discordie tra le fazioni dei fedeli, essi saranno in grado di concentrarsi sulla loro funzione primaria di guidare e aiutare la nostra popolazione."

 east_and_west: "Tra Oriente e Occidente"
 east_and_west_desc: "La nostra posizione strategica tra gli imperi orientali e occidentali ha dato ai nostri mercanti l'opportunità di agire come intermediari essenziali per le redditizie rotte commerciali regionali."

 ruthenian_state_advance: "Uno Stato Ruteno"
 ruthenian_state_advance_desc: "In passato, ci siamo piegati alle influenze straniere e siamo stati costretti ad adattarci ai loro costumi per garantire relazioni amichevoli. Ma i tempi sono cambiati e ora dobbiamo affermare i nostri costumi, o rischiamo di cadere nuovamente nella sfera delle influenze straniere."

 ruthenian_rural_buildings: "Villaggi Ruteni"
 ruthenian_rural_buildings_desc: "Gran parte del $ruthenia_region$ è costituita da terre rurali e deserte. Sebbene le nostre grandi città come $kyiv$ svolgano molte funzioni importanti, non possiamo trascurare le terre remote o i piccoli villaggi che ci forniscono rifornimenti cruciali di cibo e materie prime."

 ruthenia_commoner_education: "Istruzione per Tutto il Popolo Ruteno"
 ruthenia_commoner_education_desc: "Con la creazione di scuole locali, garantiremo che la nostra popolazione riceva un'istruzione adeguata a tutti i livelli della società."

 cossack_raids: "Razzie dei Cosacchi"
 cossack_raids_desc: "I nostri cosacchi vivono in uno stato di guerra quasi permanente e hanno adottato tattiche di saccheggio e incursione simili a quelle delle orde mongole. Anche se questo sicuramente non ci farà guadagnare molti amici, arricchirà decisamente le nostre casse."

 tamed_steppes: "Steppe Domate"
 tamed_steppes_desc: "Sebbene la maggior parte delle persone consideri le steppe come terre inospitali e persino inutili, i nostri cosacchi si sono adattati all'ambiente ostile e sono in grado non solo di sopravvivere, ma anche di prosperare nella natura selvaggia. Grazie alla loro esperienza, siamo in grado di sfruttare quelle terre e trarne beneficio."

 cossacks_recruitment: "Reclutamento dei Cosacchi"
 cossacks_recruitment_desc: "I cosacchi sono guerrieri temibili e la loro abilità nel sopravvivere nella natura selvaggia e spietata delle steppe è quasi impareggiabile. C'è posto per loro nel nostro Stato e nel nostro esercito, come forza d'élite che rafforzerà il nostro dominio sulle steppe."

 cossacks_escaped_serfs: "Servi Fuggiti"
 cossacks_escaped_serfs_desc: "Molti cosacchi sono nati in schiavitù. Stanchi dell'oppressione feudale, sono fuggiti dai loro padroni e hanno cercato una vita di libertà nelle steppe. Dobbiamo continuare ad accogliere questi servi fuggiti nella nostra società."

 cossacks_hetmanate: "Etmanato Cosacco"
 cossacks_hetmanate_desc: "Non ci sono re o khan tra i cosacchi. Sono guidati dall'#italic ataman#!, che è il loro comandante militare supremo, ma in materia di Stato e società è semplicemente il primo tra pari. Il potere politico risiede nella Rada, l'assemblea legislativa e militare, in cui tutti i cosacchi possono esprimere la propria opinione."

 cossack_administration: "Amministrazione Cosacca"
 cossack_administration_desc: "Concedendo ai nostri capi cosacchi il doppio ruolo di generali e amministratori, saremo in grado di snellire il reclutamento dell'esercito e garantire un elevato standard di addestramento."

 steppe_riders: "Cavalieri delle Steppe"
 steppe_riders_desc: "Le steppe sono un luogo particolare e insidioso in cui vivere. Quando si entra nel Mare Infinito d'Erba, il cavallo smette di essere un animale o un bene di proprietà e diventa davvero parte di te. Proprio come il tuo corpo non può sopravvivere senza cuore o fegato, nelle steppe non sopravvivrà certamente senza un cavallo. Ma la buona notizia è che chi si trova in quella situazione troverà innumerevoli modi interessanti per morire..."

 cossacks_exploration_advance: "Esplorazione Cosacca"
 cossacks_exploration_advance_desc: "I nostri cosacchi vivono ai confini del nostro paese, il che li rende candidati eccellenti per servire come esploratori e andare oltre i nostri confini fino all'ultima frontiera, per esplorare nuove terre sconosciute, cercare nuovi paesi e nuove civiltà, andare coraggiosamente dove nessuno è mai giunto prima..."

 cossacks_military_society: "Società Militare"
 cossacks_military_society_desc: "Non c'è quasi nessuna divisione tra società civile e militare tra i cosacchi. Sono un ospite, definito dal suo popolo piuttosto che dalla terra che controlla, e il suo popolo è composto da guerrieri. Dobbiamo garantire che le divisioni militari soddisfino adeguatamente le nostre esigenze amministrative man mano che l'ospite si espande."

 cossacks_serf_autonomy: "Autonomia dei Servi Cosacchi"
 cossacks_serf_autonomy_desc: "Nessun uomo dovrebbe subire la tirannia tra i cosacchi. Quando conquisteremo nuovi territori, i servi, i contadini e gli schiavi che vi abitano saranno trattati alla pari del nostro popolo."

 cossacks_colonization_advance: "Colonizzazione Cosacca"
 cossacks_colonization_advance_desc: "I nostri cosacchi sono già abituati a vagare liberamente e ad andare oltre i nostri confini. Possiamo usarli per promuovere un ulteriore insediamento e quindi espandere la nostra influenza su quelle terre non rivendicate."

 cossacks_registered: "Registri dei Cosacchi"
 cossacks_registered_desc: "Man mano che le file dei nostri cosacchi si ingrossano, dobbiamo tenere conto della forza di ogni reggimento, del loro numero e di quanto siano ben riforniti. Un registro centralizzato ci consentirà di soddisfare le esigenze di tutti i cosacchi."

 cossack_reputation: "Reputazione Temibile"
 cossack_reputation_desc: "I nostri cosacchi si sono già costruiti una reputazione di guerrieri feroci. Questo basta a instillare paura nei cuori dei nostri nemici quando devono affrontarli in battaglia."

 geo_georgian_highlands: "Altopiani Georgiani"
 geo_georgian_highlands_desc: "Le terre della $GEO$ sono incastonate tra le montagne del Caucaso e nessuna potenza straniera ha mai trovato facile penetrare nel nostro territorio. La nostra tenacia e resilienza sono leggendarie."

 geo_georgian_script: "Scrittura $georgian_culture$"
 geo_georgian_script_desc: "L'alfabeto $georgian_culture$, creato secoli fa, non è un unico alfabeto, ma ne comprende tre. #italic Mkhedruli#! è la scrittura utilizzata dall'amministrazione civile, mentre #italic Asomtavruli#! e #italic Nuskhuri#! sono utilizzate dalla nostra chiesa. In questo modo, le nostre Sacre Scritture rimangono immuni dall'influenza della lingua profana, mentre il nostro popolo può continuare a sentirsi legato ad esse."

 geo_georgian_isolation: "Isolamento Georgiano"
 geo_georgian_isolation_desc: "Circondati da paesi potenti con religioni e culture molto diverse dalla nostra, siamo costretti a ricorrere a una diplomazia opportunistica e spesso a cambiare alleanze per placare tutti e preservare la pace il più a lungo possibile."

 geo_legacy_of_saint_nino: "Eredità di Santa Nino"
 geo_legacy_of_saint_nino_desc: "La $GEO$ ha una delle più antiche chiese cristiane al mondo, le cui radici risalgono alla conversione della regione da parte di Santa Nino oltre un millennio fa. Nel corso dei secoli, la Chiesa georgiana ha svolto un ruolo sempre più unificante in tutti gli stati georgiani ed è stata un elemento centrale nella cultura georgiana di fronte all'influenza bizantina, mongola e musulmana. Con pochi altri regni cristiana rimasti in questa regione e data la frammentazione delle alleanze all'interno della $GEO$, la Chiesa svolge ancora un ruolo importante come forza unificante contro gli stranieri."

 geo_restoration_of_fortresses_and_churches: "Restauro di Fortezze e Chiese"
 geo_restoration_of_fortresses_and_churches_desc: "Le nostre numerose fortezze e chiese hanno aiutato il nostro paese a resistere e a continuare a sopravvivere tra le influenze straniere invasive. Le nostre fortezze proteggono la terra mentre le nostre chiese proteggono il nostro spirito, e dobbiamo mantenere entrambi in condizioni ottimali se vogliamo prosperare."

 geo_sadrosho_districts: "Distretti Sadrosho"
 geo_sadrosho_districts_desc: "#italic Sadrosho#!, gli stendardi, sono distretti militari speciali utilizzati a fini di mobilitazione. Dividendo il nostro territorio in diversi sadrosho, ciascuno sotto il comando di un proprio ufficiale militare dedicato, possiamo organizzare meglio il reclutamento e la distribuzione di tutte le nostre truppe."

 geo_dasturlamali: "Dasturlamali"
 geo_dasturlamali_desc: "La $GEO$ ha vissuto secoli tumultuosi dall'invasione mongola, caratterizzati da divisioni periodiche, pressioni esterne mutevoli e crescente influenza della nobiltà locale. Il vecchio sistema feudale georgiano è stato reso obsoleto, o almeno parzialmente abbandonato. Il $geo_dasturlamali$, un insieme completo di regole e linee guida che descrivono in dettaglio gli obblighi dei sudditi e dei nobili nei confronti del re e dello Stato, rafforza l'ordine interno e costituisce il fondamento del quadro giuridico del nostro regno."

 geo_georgian_embassies: "Ambasciate Georgiane"
 geo_georgian_embassies_desc: "Abbiamo una tradizione di instaurazione di forti legami diplomatici con tutte le nazioni che ci circondano, indipendentemente dalle nostre possibili differenze. Di conseguenza, i nostri diplomatici sono sempre ben accolti e rispettati."

 geo_georgian_unification: "Unificazione Georgiana"
 geo_georgian_unification_desc: "La $GEO$ è stato diviso in passato, sia da influenze straniere che da cause interne. Ma il patriottico popolo georgiano è più che disposto a combattere per garantire che la $GEO$ non venga mai più diviso."

 geo_legacy_of_saint_george: "Eredità di San Giorgio"
 geo_legacy_of_saint_george_desc: "Il nostro legame con il leggendario San Giorgio è ben noto sia nel mondo cristiano che in quello musulmano. Come lui ha affrontato coraggiosamente e ucciso il temibile drago, così i nostri soldati affronteranno i nostri nemici in battaglia."

 geo_bagrationi_dynasty: "Dinastia $Bagrationi$"
 geo_bagrationi_dynasty_desc: "Una dinastia così antica che le sue origini sono avvolte nel mistero; re e regine della casa dei $Bagrationi$ hanno governato la $GEO$ sin dal IX secolo, prima come principi e poi come monarchi."

 geo_georgian_golden_age: "Età dell'Oro Georgiana"
 geo_georgian_golden_age_desc: "La $GEO$ ha goduto di un'età dell'oro culturale e religiosa che è stata bruscamente interrotta dalle invasioni mongole. Quel periodo ha visto l'apice delle nostre conquiste culturali, ma ora torneremo a esso e raggiungeremo vette ancora più elevate."

 geo_legacy_of_tamar: "L'eredità di Tamar"
 geo_legacy_of_tamar_desc: "Tamar è stata una delle più grandi sovrane che la nostra nazione abbia mai avuto. I suoi successi militari e culturali sono leggendari e il solo pronunciare il suo nome suscita ancora riverenza in tutti i cuori georgiani."

 geo_david_the_builder: "Davit il Costruttore"
 geo_david_the_builder_desc: "Considerato il più grande sovrano della storia del nostro Paese, il re Davit il Costruttore portò la $GEO$ al suo apice. Costruì un regno potente e culturalmente influente, un faro per il Cristianesimo e il popolo georgiano."

 geo_georgian_titles: "Titoli Georgiani"
 geo_georgian_titles_desc: ""Re dei re, forte e invincibile, maestoso e protettore del sacro regno degli Abkhaziani, Iberici, Ranis, Kakheti, Armeni, Shahanshah e Shirvanshah, dell'Est e dell'Ovest, del Sud e del Nord, di entrambi i paesi, di due troni e corone, il sovrano divino e il sovrano del trono". I titoli del nostro sovrano sono numerosi e tutti a corte devono rispettarli!"

 geo_georgian_numismatics: "Numismatica Georgiana"
 geo_georgian_numismatics_desc: "Il nostro paese ha una ricca tradizione nella coniazione di monete, che vengono incise non solo in $georgian_language$, ma anche in $arabic_language$ e $persian_language$, poiché fungono da valuta per il commercio nel nostro paese e in quelli confinanti."

 geo_beacon_of_christianity: "Faro del Cristianesimo"
 geo_beacon_of_christianity_desc: "La $GEO$ è stato per secoli un rifugio per il Cristianesimo nel Caucaso, anche dopo essere stato circondato e isolato dai seguaci dell'Islam. La fede ardente del nostro popolo è fonte di ispirazione per tutti i nostri fratelli religiosi."

 geo_georgian_principalities: "Principati Georgiani"
 geo_georgian_principalities_desc: "La nostra amministrazione regionale è suddivisa in molti principati e territori diversi. Delegare l'autorità in questo modo ci permette di esercitare il nostro governo in modo più efficace."

 geo_georgian_resilience: "Resilienza Georgiana"
 geo_georgian_resilience_desc: "Il nostro Paese è stato lacerato, da influenze esterne e interne, più di una volta nella sua lunga storia. Tuttavia, come la fenice della leggenda, è risorto dalle ceneri e si è affermato come una presenza da non sottovalutare ogni volta. La resilienza del nostro popolo è encomiabile."

 sme_jaqeli_dynasty: "Dinastia dei $jaqeli_dynasty$"
 sme_jaqeli_dynasty_desc: "Nonostante le sue umili origini, la dinastia del $jaqeli_dynasty$ è stata in grado di stabilire molte relazioni di successo, stringendo forti legami con i governanti degli Stati circostanti. Di conseguenza, godiamo di una reputazione positiva in ambito diplomatico."

 sme_atabegs_of_samtskhe: "Atabeg di $SME$"
 sme_atabegs_of_samtskhe_desc: "Non siamo solo una parte del Regno della $GEO$, poiché molto tempo fa abbiamo ricevuto il riconoscimento reale e, con esso, il titolo di Atabeg. Questo titolo era stato precedentemente concesso solo ai vassalli armeni e quindi la sua concessione è un segno di distinzione e del rispetto che il monarca georgiano ha per noi."

 sme_proactive_diplomacy: "Diplomazia Proattiva"
 sme_proactive_diplomacy_desc: "Pur facendo ancora parte della $GEO$, il $SME$ opera con una sostanziale indipendenza. Questa posizione privilegiata richiede una costante consapevolezza diplomatica e una politica di diplomazia attiva, che ci assicuri di avere sempre un canale diretto con chi detiene il potere. Facciamo tutto questo mentre ci impegniamo attivamente nella nostra politica interna, interferendo con la successione e stringendo alleanze dinastiche nel modo più vantaggioso per noi. La sopravvivenza del nostro Stato relativamente piccolo dipende dal mantenimento di queste tradizioni diplomatiche. Che non si dica mai che abbiamo fatto troppo poco o agito senza sufficiente saggezza!"

 sme_fortresses_of_samtskhe: "Fortezze del $SME$"
 sme_fortresses_of_samtskhe_desc: "Il nostro territorio montuoso ha agito molte volte da scudo contro gli invasori stranieri. Per questo motivo, abbiamo imparato a costruire fortezze solide e ad essere sempre pronti alla guerra difensiva. Questa eredità di forza e prontezza è qualcosa che dobbiamo sforzarci di mantenere a tutti i costi: le fortezze del $SME$ devono essere costantemente ben mantenute, presidiate e rifornite, poiché gli invasori stranieri non sono una possibilità, ma una certezza."

 sme_independent_ambitions: "Ambizioni di Indipendenza"
 sme_independent_ambitions_desc: "Il $SME$ è stato spesso costretto a piegarsi ai governanti stranieri, che fossero musulmani o cristiani; $georgian_culture$, $turkic_group$ o $iranian_group$. Per costruire uno Stato duraturo che sopravviva come entità indipendente e possa resistere agli avidi stranieri, dobbiamo istituire istituzioni indipendenti: coniare la nostra moneta, creare le nostre leggi e patrocinare i nostri teologi e scrittori."

 sme_protect_trade_routes: "Proteggi le Vie Commerciali"
 sme_protect_trade_routes_desc: "La nostra posizione al crocevia tra $georgia_area$, $anatolia_region$, $armenia_area$ e $azerbaijan_area$ significa anche che un gran numero di commercianti cerca di attraversare le nostre terre. Tuttavia, la costante minaccia di essere saccheggiati dalle tribù nomadi fa sì che alcuni abbiano iniziato a dubitare della sicurezza dei viaggi sulle nostre strade. Dobbiamo difendere adeguatamente tutte le strade e le locande dei mercanti della nostra nazione, affinché le entrate commerciali possano affluire senza ostacoli nelle casse dello Stato."

 sme_frontier_warriors: "Guerrieri di Frontiera"
 sme_frontier_warriors_desc: "Il Caucaso è stato plasmato da imperatori nomadi da tempo immemorabile, ma i pascoli rigogliosi del $SME$ hanno convinto molte tribù a stabilirsi. Non dobbiamo permettere che questo influenzi la stabilità del nostro regno, ma dobbiamo invece stringere accordi con queste tribù che si sono stabilite qui, affinché contribuiscano alle nostre ambizioni militari in cambio delle terre che rivendicano."

 sme_sacred_land: "Terra Sacra"
 sme_sacred_land_desc: "Le terre del $SME$ ospitano luoghi sacri e venerati dal popolo $georgian_culture$. Il monastero rupestre di Vardzia, l'antica chiesa di Atskuri con la sua miracolosa icona della Vergine Maria e il monastero di Ancha con la sua icona di Anchiskhati sono alcuni dei luoghi sacri più significativi del nostro regno. Proteggendo e curando la chiesa del $SME$, distinguendola da quella della $GEO$, garantiamo che il nostro popolo rimanga unito anche di fronte alle avversità."

 sme_bridge_between_worlds: "Ponte tra i Mondi"
 sme_bridge_between_worlds_desc: "Il nostro Paese ha sempre fatto da ponte tra il mondo cristiano e quello musulmano. Di conseguenza, le persone di entrambe le fedi all'interno dei nostri confini si sono abituate a interagire tra loro."

 arm_legacy_of_hayk: "Eredità di Hayk"
 arm_legacy_of_hayk_desc: "Hayk, discendente di Noè, fondò il nostro regno ai piedi del monte Ararat dopo aver sconfitto i Babilonesi, diventando così il patriarca della nostra nazione. Tutto il nostro popolo conosce questa storia ed è orgoglioso di appartenere a un lignaggio così antico."

 arm_mount_ararat: "Monte Ararat"
 arm_mount_ararat_desc: "Il Monte Ararat, dove l'Arca di Noè si fermò dopo il Diluvio Universale, è il luogo in cui si formò la nostra nazione. Di conseguenza, il nostro popolo resiste con un fervore particolarmente sacro quando la santità del nostro territorio è minacciata."

 arm_apostolic_church: "Chiesa Apostolica Armena"
 arm_apostolic_church_desc: "L'$ARM$ è stata la prima nazione a dichiarare il Cristianesimo religione di Stato. Pertanto, le nostre tradizioni religiose, in particolare quelle del nostro clero, sono una componente fondamentale della nostra identità."

 arm_land_reclamation: "Territorio Riconquistato"
 arm_land_reclamation_desc: "L'$ARM$ è stata devastato dalla guerra per secoli. Recuperando le terre perdute in queste lotte, rendendole adatte all'abitazione e restaurando chiese e fortezze in rovina, possiamo migliorare la vita del nostro popolo e assumere un controllo più saldo sul nostro territorio."

 arm_border_nation: "Nazione di Confine"
 arm_border_nation_desc: "Sin dai tempi antichi, l'$ARM$ è stata il riluttante campo di battaglia tra nazioni più grandi. Anche dopo aver riconquistato la nostra sovranità, rimanere neutrali è estremamente difficile: non è impossibile accontentare tutti, ma non è nemmeno facile."

 arm_melikdom_organization: "Organizzazione dei Melikati"
 arm_melikdom_organization_desc: "Essendo uno dei pochi bastioni di uno Stato armeno indipendente, l'$ARM$ è governata da signori feudali chiamati #italic meliks#!, poiché il vecchio sistema dei $arm_nakharar_titles$ è crollato dopo le invasioni mongole. Il rapporto tra i meliks e i loro subordinati è quello tra un ufficiale militare comandante e un ufficiale subalterno, e non quello tra un signore feudale e un servo della gleba."

 arm_mountain_armies: "Armate di Montagna"
 arm_mountain_armies_desc: "L'$ARM$ è un paese montuoso. Il nostro popolo si è adattato a questo terreno nel corso dei secoli e abbiamo sviluppato molti modi per sfruttare queste montagne a nostro vantaggio. I nostri eserciti si raduneranno prontamente quando chiamati, fiduciosi nella protezione aggiuntiva che il nostro ambiente unico offre."

 arm_nakharar_titles: "Titoli dei Nakharar"
 arm_nakharar_titles_desc: "Il sistema di titoli #italic Nakharar#! è stato in uso continuo in $ARM$ dalla sua nascita fino al periodo delle invasioni mongole, quando è crollato. Sebbene i titoli stessi non siano più in uso, alcune caratteristiche di quel sistema persistono, migliorando le capacità sia dei nostri nobili che dei nostri eserciti."

 arm_greater_armenia: "Grande $ARM$"
 arm_greater_armenia_desc: "Nella nostra lunga e illustre storia, i regni degli armeni si sono estesi su un vasto territorio, così come il loro popolo. Emulando questi regni del passato, diventiamo un faro per tutte le genti armene, che si uniranno felicemente sotto la nostra guida."

 arm_highland_fortresses: "Fortezze degli Altipiani"
 arm_highland_fortresses_desc: "Le nostre fortezze sono un brillante emblema della nostra resilienza e forza d'animo, costruite per resistere non solo al difficile clima locale, ma anche a qualsiasi invasore straniero abbastanza folle da sferrare un attacco al nostro territorio spietato."

 swiss_oath_of_rutli: "Il Giuramento di Rütli"
 swiss_oath_of_rutli_desc: "Recitiamo il giuramento di questa nuova unione: saremo una nazione di fratelli e nessun problema o pericolo ci separerà. Nessun tiranno straniero potrà mai governare il nostro regno!"

 swiss_halberd_infantry: "Eredità di Morgarten"
 swiss_halberd_infantry_desc: "Quando abbiamo difeso la nostra libertà nella battaglia di Morgarten, avevamo un vantaggio molto importante sugli invasori maledetti del $habsburg_dynasty$: l'alabarda, un'arma semplice ma letale in grado di respingere facilmente qualsiasi nemico. Addestrare le nostre truppe all'uso delle alabarde con abilità ci darà un vantaggio sui nostri nemici, anche se questi sono in superiorità numerica."

 swiss_eternal_alliance: "Alleanza Eterna dei Cantoni Forestali"
 swiss_eternal_alliance_desc: "Abbiamo stretto un'alleanza eterna con i nostri amici dei Cantoni vicini. Se non fosse stato per questo trattato, avremmo sicuramente ceduto agli invasori del $habsburg_dynasty$ e saremmo caduti ancora una volta sotto il dominio di tiranni stranieri. Queste alleanze garantiranno la nostra sopravvivenza per i secoli a venire."

 swiss_mercenaries: "Mercenari Svizzeri"
 swiss_mercenaries_desc: "Le nostre truppe sono ampiamente riconosciute come combattenti eccezionali. Fortunatamente per noi, non abbiamo bisogno permanente dei loro servizi, il che ci permette di affittarli a potenze straniere, guadagnando entrate extra e fornendo loro una preziosa esperienza di combattimento."

 the_swiss_confederation: "Principi della Confederazione"
 the_swiss_confederation_desc: "Ogni membro della nostra confederazione contribuisce con risorse preziose alla nostra causa. Il nostro approccio decentralizzato al governo di questa alleanza di Stati serve a uno scopo più grande, quindi non possiamo scatenare una guerra civile quando sorgono disaccordi tra paesi, città o cantoni."

 swiss_reislaufer: "I Reisläufer"
 swiss_reislaufer_desc: "$a_reislaufer_desc$ Dovremmo formare reggimenti da questi veterani e impiegarli nei nostri stessi eserciti."

 swiss_recovery_and_prosperity: "Un Regno Tormentato"
 swiss_recovery_and_prosperity_desc: "I conflitti passati hanno dimostrato che respingere gli invasori non è la nostra unica preoccupazione. Le valli dei nostri cantoni vengono devastate da ogni battaglia; occorre agire con cautela per riportare la prosperità nella nostra terra."

 alpine_defensiveness: "Difesa Alpina"
 alpine_defensiveness_desc: "Il paesaggio svizzero è dominato da terreni accidentati, montagne e valli. Dobbiamo trovare un modo per superare le sfide che il nostro ambiente ci pone e per utilizzarlo come arma contro potenziali invasori."

 swiss_religious_refuge: "Rifugio per i Rifugiati"
 swiss_religious_refuge_desc: "Mentre altri esiliano le minoranze religiose e le figure di disturbo, noi saremo lieti di offrire loro una casa. In $SWI$ potranno costruirsi una nuova vita e, di conseguenza, saranno inclini a lodare il nostro governo."

 swiss_tolerance: "Tolleranza Svizzera"
 swiss_tolerance_desc: "Perché dobbiamo ucciderci a vicenda per oscure questioni di transustanziazione e predestinazione, quando potremmo spendere quell'energia per trasformare la nostra casa di montagna in un regno nuovamente unito?\n\nPer questo motivo, ogni cantone della $SWI$ avrà la giurisdizione suprema sulle questioni religiose nella propria regione. Anche se questo non eliminerà tutti i conflitti religiosi nel nostro Paese, almeno garantirà che, indipendentemente dal credo di ciascuno, il nostro popolo potrà trovare un luogo dove non essere perseguitato."

 swiss_clockwork: "Maestri dell'Orologeria"
 swiss_clockwork_desc: "Alcuni sciocchi pensano che il meccanismo di un orologio serva solo a misurare il tempo, ma quando si assiste alla potenza degli ingranaggi rotanti, è ovvio che il meccanismo di un orologio può fare praticamente tutto ciò che si desidera. Forse il Creatore dell'Universo stesso ha caricato l'esistenza come un orologio e ha lasciato che gli ingranaggi girassero da soli, scandendo il passare dei secoli. Comunque sia, gli orologiai svizzero sono i più grandi maestri di quest'arte, a parte Dio stesso, ovviamente."

 swiss_ambition: "Illuminismo Svizzero"
 swiss_ambition_desc: "Non abbiamo bisogno di costruire un'identità unica per il nostro Paese, poiché il nostro popolo si riunisce prontamente attorno alle bandiere dei propri cantoni e agli ideali della nostra confederazione. Ma finanziando i nostri studiosi più illuminati del nostro tempo, saremo in grado di plasmare una nuova era per il popolo svizzero e consolidare le caratteristiche uniche della nostra #italic Eidgenossenschaft#!. Questo elvetismo costituisce il fondamento del nostro Illuminismo."

 swiss_banking: "Sistema Bancario Svizzero"
 swiss_banking_desc: "Siamo un rifugio non solo per le persone perseguitate di altri paesi, ma anche per le loro ricchezze. Nei nostri grandi caveau, nascosti dietro mura possenti e protetti dai nostri soldati più fidati, saremo il luogo ideale dove ogni cittadino dei paesi poveri e devastati dalla guerra potrà custodire i propri beni di valore."

 zmw_experienced_cattle_herder: "Allevatori Esperti"
 zmw_experienced_cattle_herder_desc: "L'allevamento degli animali richiede una certa abilità ed è fondamentale per la nostra sopravvivenza. Se vogliamo stabilizzare ed espandere il nostro dominio, dovremmo espandere anche i nostri pascoli e i nostri terreni da pascolo."

 zmw_stone_builders: "Costruttori del $ZMW$"
 zmw_stone_builders_desc: "Gli straordinari edifici in pietra del $ZMW$ impressionano molti visitatori del nostro grande Paese. Continuare le nostre tradizioni architettoniche ci consentirà di espandere le nostre grandi città di pietra, che rimarranno in piedi per secoli."

 zmw_encourage_new_settlements: "Nuove Terre per le Risorse"
 zmw_encourage_new_settlements_desc: "Oltre i nostri confini si estendono vaste distese di terra, ricche di risorse e pascoli che attendono con impazienza di essere rivendicate dal nostro popolo. Dobbiamo incoraggiare l'insediamento in questi territori e fondare nuove città."

 zmw_rekindling_the_royal_fires: "Riaccendere i Fuochi Reali"
 zmw_rekindling_the_royal_fires_desc: "I nostri capi subordinati devono dimostrare la loro lealtà verso di noi e gli dei recandosi nella capitale una volta all'anno e utilizzando le nostre fiamme per riaccendere il loro fuoco locale. Una volta trascorso un anno, il nostro esercito spegnerà il loro fuoco e loro dovranno intraprendere un nuovo viaggio."

 zmw_strict_gold_regulations: "Restrizioni Commerciali sull'$goods_gold$"
 zmw_strict_gold_regulations_desc: "La terra ci fornisce abbondanti beni che suscitano grande interesse nei mercanti stranieri, ma le nostre ricche riserve di $goods_gold$ brillano più di qualsiasi altra cosa. Sebbene tali ricchezze siano una benedizione, lo Stato deve regolamentare rigorosamente tutto il commercio e la proprietà dell'$goods_gold$ al fine di impedire che gli effetti distruttivi dell'avidità umana e degli inganni influenzino i nostri profitti."

 zmw_spokesman_before_the_dead: "Portavoce Davanti ai Morti"
 zmw_spokesman_before_the_dead_desc: "Il nostro sovrano non è solo il nostro leader in senso temporale, ma è anche tenuto a parlare a nostro nome davanti agli spiriti dei morti. Prima di qualsiasi campagna o raccolto, comunicherà il nostro rispetto e le nostre esigenze agli spiriti dei nostri antenati attraverso cerimonie o danze. Senza un sovrano diligente che mantenga le tombe reali e mantenga uno stretto contatto con i nostri morti, le cose potrebbero andare storte molto rapidamente."

 zmw_elected_administrators: "Amministratori Provinciali"
 zmw_elected_administrators_desc: "Tradizionalmente, tutti i nostri amministratori, anche a livello locale, sono stati parenti diretti del nostro sovrano. Tuttavia, con la crescita e la maturazione del nostro impero, è giunto il momento di mostrare deferenza verso la conoscenza locale dei nostri sudditi e consentire loro di scegliere i propri amministratori."

 zmw_discipline_and_traning: "Addestramento Regolare"
 zmw_discipline_and_traning_desc: "Disciplina, preparazione e addestramento sono i fattori che determinano la vittoria in battaglia. Tenendo presente questo, i nostri comandanti hanno sperimentato con successo nuove tattiche elaborate e miglioramenti organizzativi. Facciamo buon uso di queste innovazioni dividendo i nostri guerrieri in reggimenti e facendoli addestrare regolarmente con archi, assegai, pugnali e asce. La pratica consentirà loro anche di combattere in formazione senza paura, sconfiggendo nemici molto più numerosi."

 zmw_merchant_taxes: "Tasse Mercantili"
 zmw_merchant_taxes_desc: "Con l'arrivo di nuovi commercianti nella zona dello Zambesi, è emersa la necessità di affermare la nostra autorità. Chiunque desideri commerciare qui e trasportare i nostri preziosi $goods_gold$ e $ivory$ verso altre coste, deve prima essere approvato dal nostro sovrano e pagare una tassa per ottenere l'accesso. In caso di mancato pagamento, tutte le merci straniere saranno confiscate dal nostro Stato."

 zmw_controlling_the_mutapan_riches: "Controllare le Ricchezze"
 zmw_controlling_the_mutapan_riches_desc: "I viaggiatori occidentali hanno chiamato la nostra terra "Ophir" e le ricchezze delle nostre miniere d'oro e del commercio dello Zambesi hanno reso molti visitatori invidiosi di noi nel corso dei secoli. Sfruttiamo il nostro controllo su queste ricchezze e costruiamo stazioni commerciali permanenti che possano trasformarsi in città tentacolari."

 zmw_empowering_the_rozwi: "Dare Potere ai Rozwi"
 zmw_empowering_the_rozwi_desc: "Le nostre terre ospitano molti guerrieri abili. Tra questi ci sono i Rozwi, combattenti disciplinati pronti a difendere il nostro popolo da chiunque osi tentare di sottrarci le terre che ci spettano di diritto."

 zmw_cow_horn_tactics: "Formazioni a Corna di Bue"
 zmw_cow_horn_tactics_desc: "Adattarsi alle tattiche di guerra in continua evoluzione non è un compito facile. Contro nemici potenzialmente superiori, dovremmo fare affidamento sulla nostra mobilità più che su qualsiasi altra cosa. Se riusciremo a bloccare i nostri nemici in un combattimento corpo a corpo e a inviare un reggimento per aggirare e circondare le loro truppe, saremo in grado di infliggere perdite devastanti."

 khm_religious_flexibility: "Una Fede per il $KHM$"
 khm_religious_flexibility_desc: "Il nostro Paese ha vissuto tempi tumultuosi, con il patrocinio reale che è passato dall'Induismo a vari rami del Buddismo. Dobbiamo promuovere la fede scelta in tutto il Paese per favorire la stabilità e confidare che il nostro sovrano abbia scelto la vera via per il nostro popolo."

 khm_royal_procession: "Processioni Reali Khmer"
 khm_royal_procession_desc: "I nostri sovrani eccellono nella creazione di processioni sfarzose, eventi di glorioso splendore che pochissimi altri possono eguagliare. Queste stravaganti dimostrazioni della nostra ricchezza nazionale confermano il potere e la brillantezza del sovrano e le incredibili ricchezze della nostra nazione. La scintillante processione di elefanti, tesori e guardie reali incuterà timore e rispetto nei cuori del nostro popolo, conquistando la sua fedeltà e ammirazione incondizionate."

 khm_ballista_elephants: "Elefanti con Balista"
 khm_ballista_elephants_desc: "Gli elefanti sono creature impressionanti e torreggiano su qualsiasi altro animale che abbiamo visto. È tempo di utilizzare queste qualità per incutere paura nei nostri nemici usando questi maestosi animali in guerra. Gli elefanti sono anche in grado di trasportare grandi pesi, permettendoci di montare macchine da guerra su di essi. Costruire balestre a doppia corda ed equipaggiare i nostri elefanti con esse creerà uno strumento che ci permetterà di dominare i campi di battaglia meglio che mai."

 khm_great_builders: "Città Idrauliche"
 khm_great_builders_desc: "Le nostre grandi città ospitano molti #italic barays#! e canali, predisposti per immagazzinare e distribuire l'acqua in tutta l'area. Costruire e mantenere con competenza questa rete di corsi d'acqua garantirà il benessere della nostra popolazione anche durante le instabili stagioni monsoniche."

 khm_recruitment_of_peasants: "Reclutare i Contadini"
 khm_recruitment_of_peasants_desc: "Avremo bisogno di rinforzare il nostro esercito con nuove reclute, che si trovano facilmente tra la classe contadina. Con un po' di addestramento, saremo in grado di garantire che i ranghi possano essere riempiti in qualsiasi momento da soldati capaci."

 khm_foreign_production_skills: "Invitare Esperti Stranieri"
 khm_foreign_production_skills_desc: "Sebbene la nostra gente non abbia familiarità con la tessitura della seta e preferisca altri tessuti, siamo fortunati che artigiani stranieri si siano stabiliti nelle nostre città e abbiano fondato le loro officine di tessitura. Dovremmo adottare questo approccio anche per altri settori, invitando direttamente artigiani stranieri a portare qui le loro competenze e ampliando così la nostra produzione a livello globale."

 khm_utilize_the_rivers: "La Linfa Vitale del $KHM$"
 khm_utilize_the_rivers_desc: "I nostri fiumi costituiscono un ottimo mezzo per trasportare le merci raccolte e prodotte nei nostri territori interni ai nostri porti, che sono collegati alle rotte commerciali estere. L'utilizzo di questa rete di trasporti collegherà anche le nostre città e renderà più veloce la comunicazione tra di esse."

 khm_champa_mercenaries: "Leader Mercenari Cinesi"
 khm_champa_mercenaries_desc: "In passato abbiamo combattuto sia contro che a fianco dei feroci guerrieri della $CHA$. Se riusciremo ad assicurarci i servizi dei loro leader più capaci in tempi di conflitto, potremo garantire che le nostre forze siano addestrate e ben riposate, pronte a lanciarsi in battaglia come rinforzi freschi."

 khm_restore_angkor: "Restauro di $angkor$"
 khm_restore_angkor_desc: "La grande città del $angkor$ era un tempo un brillante esempio del nostro genio architettonico. A causa di pressioni esterne, abbiamo dovuto abbandonare i nostri sforzi di costruzione, ma dovremmo ricollegarci alle radici della nostra società e iniziare a costruire nuovi monumenti al nostro splendore."

 khm_modern_navy: "Una Marina Moderna per il $KHM$"
 khm_modern_navy_desc: "Non possiamo permettere che altri dominino i mari e controllino il commercio da cui dipende il nostro Stato. Creiamo una nuova forza navale moderna in grado di affrontare qualsiasi pirata o marina rivale nrl $south_east_asia$."

 khm_invest_in_irrigation: "Espandere i Baray"
 khm_invest_in_irrigation_desc: "Sebbene i nostri attuali bacini idrici soddisfino le nostre attuali esigenze agricole, potremmo facilmente sostenere più persone se scavassimo nuovi #italic barays#! in altre parti del nostro paese, creando le basi per nuovi centri urbani."

 khm_protection_from_raids: "Proteggere i Confini"
 khm_protection_from_raids_desc: "Le nostre terre sono spesso minacciate da invasioni e il nostro prezioso $angkor$ è particolarmente vulnerabile agli assedi. Dobbiamo investire in un sistema completo di fortificazioni, con guarnigioni sufficienti a resistere a qualsiasi forza invasiva, in modo da poter proteggere il nostro popolo e i nostri tesori nazionali dalla conquista straniera."

 khm_old_grudges: "Guidati dalla Rivalità"
 khm_old_grudges_desc: "In passato il nostro popolo è stato umiliato, costretto a inchinarsi agli invasori stranieri. Sebbene non tutte le sconfitte possano essere evitate, utilizziamo queste antiche rivalità per spronare il nostro popolo a combattere con più forza e più a lungo sul campo di battaglia, desideroso di cancellare la vergogna di queste antiche umiliazioni."

 peasant_connections_advance: "Connessioni Contadine"
 peasant_connections_advance_desc: "I nostri mercanti hanno stabilito connessioni con gli insediamenti rurali all'interno e oltre i nostri confini. Di conseguenza, sono in grado di garantire prezzi migliori per il cibo rispetto a quanto ci si potrebbe aspettare."

 settle_the_frontier_advance: "Richiamo della Frontiera"
 settle_the_frontier_advance_desc: "Siamo circondati da territori debolmente difesi e pronti per essere conquistati! Mandiamo alcuni cortigiani avventurosi a far valere la nostra autorità in queste terre non rivendicate."

 tre_pontic_trail_mastery: "Padronanza dei Sentieri $pontic_greek_culture$"
 tre_pontic_trail_mastery_desc: "La nostra terra è come la nostra casa; le sue foreste, il nostro giardino. Ne conosciamo ogni angolo meglio di chiunque altro. Conosciamo ogni sentiero e ogni tracciato che la attraversa e faremo uso di questa conoscenza se qualcuno oserà invaderci."

 tre_komnenos_legacy: "Eredità dei $komnenos_dynasty$"
 tre_komnenos_legacy_desc: "Che nessuno dimentichi che siamo i discendenti dei $komnenos_dynasty$ che governavano l'Impero Bizantino. Anche se ora governiamo uno Stato diverso, l'eredità e il prestigio della nostra dinastia rimangono innegabili."

 tre_princes_of_the_lazes: "Principi dei $laz_culture$"
 tre_princes_of_the_lazes_desc: "I $laz_culture$ hanno abitato queste terre per secoli. Sebbene il nostro Impero sia stato forgiato dal popolo $greek_culture$, molti $laz_culture$ rimangono comunque all'interno dei nostri confini. Questo ha portato alcuni dei nostri nemici a chiamarci $tre_princes_of_the_lazes$ in modo beffardo, considerandovi inferiori. Tuttavia, indipendentemente da ciò che dicono, ciò non sminuisce la nostra eredità e noi porteremo questo titolo con orgoglio."

 tre_strategic_marriages: "Matrimoni Strategici"
 tre_strategic_marriages_desc: "I regni non vengono conquistati solo con la spada. Stringendo alleanze matrimoniali con le nazioni circostanti, creiamo opportunità per ereditare i loro troni e, come minimo, estendere su di loro un'influenza più forte."

 tre_grand_komnenoi: "Grandi Comneni"
 tre_grand_komnenoi_desc: "La dinastia $komnenos_dynasty$ sarà anche stata espulsa dal trono bizantino molto tempo fa, ma la sua gloria non è mai svanita. Ai membri del nostro lignaggio viene ancora mostrata la dovuta deferenza, e questo rispetto e ammirazione si estendono ben oltre i nostri confini."

 tre_pontic_mountains: "Montagne $pontic_greek_culture$"
 tre_pontic_mountains_desc: "Proprio come le Alpi separano i francesi dagli italiani, i Monti del Ponto separano la nostra ultima roccaforte $greek_culture$ in $anatolia_region$ dagli invasori turchi che hanno conquistato l'altopiano anatolico. Il Ponto è sempre stato più greco rispetto al resto dell'$anatolia_region$; forse l'eredità del grande Mitridate ispirerà i nostri guerrieri e incuterà ai turchi lo stesso timore che egli incuteva ai Romani?"

 tre_byzantine_birthright: "Diritto di Nascita Bizantino"
 tre_byzantine_birthright_desc: "Il grande Impero Bizantino, sotto il dominio dei nostri antenati, era davvero qualcosa di straordinario. L'inganno e il tradimento possono aver rovesciato il loro regime, ma il $BYZ$ è risorto come una fenice per reclamare il suo antico splendore, e ora nessuno potrà più mettere in dubbio la nostra autorità!"

 tre_trapezuntine_monasteries: "Monasteri Trebisondesi"
 tre_trapezuntine_monasteries_desc: "È la nostra fede che salva le anime del nostro popolo, e il nostro clero è colui che ne garantisce la salvezza. Cosa sono, allora, i nostri monasteri, se non la fonte e l'origine di tale salvezza?"

 tre_greek_stronghold: "Roccaforte $greek_language$"
 tre_greek_stronghold_desc: "Sin dai tempi antichi, il $greek_language$ è stato la lingua dell'istruzione e della scienza. Quando i nostri antenati arrivarono qui, portarono con sé non solo la loro determinazione, ma anche la loro cultura e la loro lingua madre. Pertanto, la tradizione dello studio del $greek_language$ è molto viva nel nostro Paese."

 tre_komnenoi_princesses: "Principesse Comnene"
 tre_komnenoi_princesses_desc: "Alcune donne straordinarie sono emerse lungo il $komnenos_dynasty$ e molti tra i governanti dell'$europe$ e persino gli infedeli hanno chiesto la loro mano in matrimonio. La nostra stirpe è molto rispettata, e le nostre principesse lo sono doppiamente, poiché sono loro che consentono ai paesi stranieri di rivendicare la legittimità attraverso la nostra stirpe e a noi di mantenere l'influenza nelle corti straniere."

 tre_terminus_of_the_silk_road: "Termine della Via della Seta"
 tre_terminus_of_the_silk_road_desc: "Anche quando era chiamata Trapezous nella notte dei tempi, la nostra nazione era il punto in cui la via terrestre attraverso il $asia$ incontrava la via marittima che conduceva al Mediterraneo. Siamo diventati famosi come punto terminale della grande Via della Seta, la ricchezza della $china$ e dell'$india$ che attraversava le nostre terre diretta verso l'$europe$. Poiché la nostra nazione si trova ancora in questa posizione cruciale, non c'è motivo per noi di non continuare e incoraggiare questo flusso costante di commercio intercontinentale."

 tre_lessons_of_the_fourth_crusade: "Lezioni della Quarta Crociata"
 tre_lessons_of_the_fourth_crusade_desc: "Isaakios Angelos, che secoli fa depose la nostra dinastia, fu a sua volta deposto e accecato. Con il pretesto di riportare sul trono il vecchio cieco e sciocco, le truppe veneziane saccheggiarono il $constantinople$. Se c'è qualcosa da imparare da questo episodio, è che il tradimento e l'inganno sono onnipresenti nella lotta per il potere, ma possono anche salvaguardare la vittoria."

 tre_trapezuntine_endurance: "Resistenza Trebisondese"
 tre_trapezuntine_endurance_desc: "Banditi dal nostro paese, la nostra stirpe è sopravvissuta. Costretti a vivere in una landa montuosa circondata dai nemici, il nostro popolo ha prosperato. Siamo un popolo intraprendente, determinato a sfruttare al meglio ciò che abbiamo e ad affrontare al meglio qualsiasi situazione ci si presenti."

 palm_tree_masters: "Maestri delle Palme"
 palm_tree_masters_desc: "Forse non abbiamo un'industria manifatturiera molto solida, ma una cosa che abbiamo in abbondanza sono le palme. Abbastanza robuste da sostenere l'edilizia e la costruzione navale, ma abbastanza flessibili da essere modellate dai nostri artigiani, padroneggiare l'uso di questo legno unico ci aiuterà ad espandere le nostre attività marittime, migliorare la produzione e, in ultima analisi, riempire le nostre tasche."

 kilwan_trade_network: "Reti Commerciali Kilwane"
 kilwan_trade_network_desc: "Attirando mercanti da luoghi lontani come la $persia_region$ e il $arabia_region$, la nostra capitale è diventata un vivace centro commerciale, facilitando gli affari dal Corno del $africa$ fino alle coste della $china$."

 the_dhow: "$n_kilwan_dhow$"
 the_dhow_desc: "$n_kilwan_dhow_desc$"

 the_kilwan_zambuc: "$n_kilwan_zambuc$"
 the_kilwan_zambuc_desc: "$n_kilwan_zambuc_desc$"

 bantu_and_perso_arabian: "$bantu_language_family$ e Perso-Arabo"
 bantu_and_perso_arabian_desc: "Sin dalla nostra discesa dall'$arabia_region$ e dalla $persia_region$, abbiamo creato comunità in tutto il $swahili_coast_region$ che integrano il $bantu_language_family$ locale nel tentativo di mantenere l'ordine sociale e aprire la strada al sorgere di nuovi progressi architettonici e culturali."

 zanj_taxation: "Tassazione Zanj"
 zanj_taxation_desc: "Originariamente un termine usato per descrivere gli abitanti dell'interno del $africa$, in particolare quelli di origine $bantu_language_family$, queste persone costituiscono una parte consistente della nostra popolazione. Pur godendo di molte libertà e responsabilità, sono soggetti a tassazione al fine di preservare tali privilegi. La loro posizione pacifica e relativamente autonoma all'interno del nostro quadro giuridico ha portato allo sviluppo organico di fenomeni linguistici e nuove tradizioni culturali."

 zan_food_imports: "Importazioni Alimentari"
 zan_food_imports_desc: "L'alba di una nuova era nella navigazione ci ha offerto nuove opportunità per cercare sostentamento per il nostro popolo. Mentre un tempo commerciavamo solo con l'interno del $africa$ per procurarci rifornimenti cruciali di $millet$, $livestock$ e $rice$, ora possiamo accedere a nuovi porti dove il cibo può essere più economico e più facilmente reperibile."

 zan_kilwan_latitude_staves: "Bastoni di Latitudine"
 zan_kilwan_latitude_staves_desc: "La nostra tecnologia navale superiore ci consente di navigare più lontano e più a lungo di qualsiasi nostro concorrente, dandoci un vantaggio significativo in qualsiasi attività marittima."

 shirazi_legacy: "Eredità di Shirazi"
 shirazi_legacy_desc: "Il nostro antenato fondatore proveniva dal $shiraz$, figlio dell'Amīr della $persia_region$, il che rende innegabile il nostro diritto di governare."

 zan_gold_trade_of_africa: "Commercio dell'$goods_gold$ in $africa$"
 zan_gold_trade_of_africa_desc: "Le nostre abbondanti riserve di $goods_gold$ provenienti da molte fonti in tutta l'$east_africa$ sono la pietra angolare della nostra economia. Dobbiamo sfruttare appieno le nostre riserve e utilizzare la nostra ricchezza per sostenere e diffondere una valuta forte. Questo ci aiuterà a svilupparci come centro commerciale."

 zan_diplomacy_through_trade: "Diplomazia Attraverso il Commercio"
 zan_diplomacy_through_trade_desc: "Siamo in una posizione unica alla confluenza delle ricchezze provenienti dalla $china$, dall'$india$ e dall'$europe$. Questo non solo ci avvantaggia finanziariamente, ma ci dà anche una grande influenza nel gioco diplomatico tra imperi e potenze straniere..."

 cha_matrilineal_heritage: "Eredità Matrilineare"
 cha_matrilineal_heritage_desc: "Le donne nella nostra società ricevono più rispetto e apprezzamento che in molti dei nostri paesi vicini. Il diritto di nascita di ogni bambino deriva dal lato materno e le donne godono di un'ampia gamma di libertà e responsabilità sociali."

 cha_religious_tolerance: "Tolleranza Religiosa"
 cha_religious_tolerance_desc: "La nostra società è un crogiolo di diverse influenze religiose. Le idee buddiste provenienti dalla $china$, le pratiche indù provenienti dall'$india$ e la diffusione dell'Islam nel $south_east_asia$ creano un ambiente unico in cui la tolleranza religiosa è fondamentale per mantenere unita la nostra società."

 cha_dharmic_presence: "Presenza dharmica"
 cha_dharmic_presence_desc: "Gli dei dharmici ci benedicono con la loro presenza. Possa la loro forza guidarci attraverso i momenti più difficili."

 cha_kshatriya: "Kṣatriya"
 cha_kshatriya_desc: "Il termine $cha_kshatriya$ è stato adottato dalle società indù e descrive i nobili dell'élite del nostro Stato. Data l'origine di questo termine, ne consegue che la nostra nobiltà ricopre ruoli simili in ambito militare e cortese rispetto alle loro controparti in $india$."

 cha_veteran_shipbuilders: "Costruttori Navali Veterani"
 cha_veteran_shipbuilders_desc: "Il nostro Stato fa affidamento sul dominio marittimo per garantire la propria presenza politica, militare ed economica in $indochina_region$. Pertanto, essere in grado di costruire navi rapidamente è di grande importanza per la nostra sopravvivenza."

 cha_haluwbilau: "Haluwbilau"
 cha_haluwbilau_desc: "I $cha_haluwbilau$ sono guerrieri d'élite che occupano posizioni chiave sia nelle nostre forze terrestri che in quelle navali. Selezionati per il loro talento e il loro coraggio, questi uomini guidano eserciti e navi in battaglia contro minacce esterne e mediano anche nelle controversie nelle comunità locali."

 cha_commercial_state: "Stato Commerciale"
 cha_commercial_state_desc: "Gran parte della nostra ricchezza proviene dal commercio. Dovremmo concentrarci sull'espansione e il perfezionamento delle nostre pratiche di scambio, con l'obiettivo finale di creare uno stato commerciale."

 cha_boarding_tactics: "Tattiche di Abbordaggio"
 cha_boarding_tactics_desc: "A causa del nostro terreno difficile, gli aspiranti conquistatori devono fare affidamento sulle loro capacità navali quando tentano di invaderci. Decenni di pirateria nei mari circostanti ci hanno insegnato preziose tattiche di abbordaggio, che ci consentono di usare le navi degli avversari contro di loro."

 cha_towers_on_water: "Torri sull'Acqua"
 cha_towers_on_water_desc: "In quanto potenza marittima, gran parte della nostra ricchezza e del nostro potere proviene dal mare e dal nostro dominio su di esso. Al fine di garantire questa supremazia, i nostri costruttori navali hanno progettato speciali navi da guerra di grandi dimensioni, note come #italic Torri sull'Acqua#!, creazioni ibride tra una nave pesante e una galea."

 cha_cham_cultural_influence: "Influenza Culturale $cham_culture$"
 cha_cham_cultural_influence_desc: "Sebbene alcuni dei nostri vicini considerino la nostra cultura inferiore, si tratta solo di un rifiuto della realtà, poiché molti aspetti della nostra cultura si fanno strada nelle loro corti autoproclamatesi "civilizzate". I tamburi, i canti, le danze e la poesia del $cham_culture$... tutte queste forme d'arte hanno lasciato un segno chiaro e duraturo in ciò che altre nazioni considerano un risultato artistico!"

 dai_vietnamese_architecture: "Architettura $vietnamese_culture$"
 dai_vietnamese_architecture_desc: "Sebbene influenzata dai $chinese_group$, la nostra architettura rimane distinta e unica per il nostro stato. Pur seguendo ancora i concetti del Fēng Shuǐ, molti elementi tipici dei $chinese_group$ sono stati tralasciati o adattati al nostro ambiente unico."

 dai_tran_hung_dao: "Trần Hưng Đạo"
 dai_hung_dao_trans_military_feats: "Tattiche del $dai_tran_hung_dao$"
 dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ era un principe imperiale del $DAI$ molto tempo fa. Ha servito come ufficiale durante la prima invasione mongola nel 1258 e come comandante in capo durante la seconda guerra nel 1285 e il loro terzo tentativo nel 1287. Durante questi sanguinosi conflitti, $dai_tran_hung_dao$ è riuscito a sviluppare tattiche che hanno respinto in modo affidabile l'imminente assalto della cavalleria."

 dai_nha_nhac: "Nhã Nhạc"
 dai_nha_nhac_desc: "Il $dai_nha_nhac$ è la musica tradizionale suonata nelle nostre corti e eseguita durante le cerimonie annuali. È un aspetto importante della nostra cultura e un pilastro delle nostre tradizioni."

 dai_confucian_administration: "Amministrazione Confuciana"
 dai_confucian_administration_desc: "La nostra burocrazia statale è ovviamente della massima importanza e, come tale, selezioniamo solo gli amministratori più capaci per ricoprire cariche governative. Istruiti nei testi confuciani della $CHI$, questi burocrati garantiscono un funzionamento burocratico fluido e stabile."

 dai_giao_chi_arquebus: "Archibugio Giao Chỉ"
 dai_giao_chi_arquebus_desc: "Il $dai_giao_chi_arquebus$ è un elemento fondamentale del nostro esercito. Prodotto internamente e adattato alle esigenze specifiche delle nostre truppe, questo tipo di archibugio è apprezzato non solo dal popolo del $chinese_group$, ma anche dagli osservatori occidentali."

 dai_ca_tru: "Ca Trù"
 dai_ca_tru_desc: "Il $dai_ca_tru$ è un genere musicale narrativo del $vietnamese_culture$ che ha sia scopi di intrattenimento che religiosi."

 dai_trade_advance: "Contratti Commerciali"
 dai_trade_advance_desc: "La nostra esistenza è stata plasmata dalla $CHI$ per troppo tempo. Per lasciare il nostro segno nel mondo, dobbiamo espandere la nostra influenza oltre la sfera d'influenza del $chinese_group$."

 dai_literary_reform: "Riforma Letteraria"
 dai_literary_reform_desc: "Per secoli abbiamo usato il $classical_chinese_language$ per scrivere i nostri documenti. Tuttavia, la scrittura utilizzata per scrivere la nostra lingua è il Chữ Nôm, una scrittura nativa basata sul Chữ Hán, la scrittura del $classical_chinese_language$. Il Chữ Nôm non era standardizzato e non era usato abbastanza spesso rispetto al $classical_chinese_language$, quindi c'è stata una certa pressione per riformare la scrittura e renderla più adatta ai nostri scopi amministrativi."

 dai_don_dien: "Đôn Điên"
 dai_don_dien_desc: "Il $dai_don_dien$ è un sistema che utilizza colonie militari, in cui soldati e contadini senza terra bonificano l'area per la creazione di nuovi villaggi. Questi villaggi vengono poi incorporati nel nostro sistema amministrativo dopo tre anni, e le persone che hanno bonificato la terra possono quindi rivendicarla e lavorarla."

 dai_thuan_thien: "Thuận Thiên"
 dai_thuan_thien_desc: "$dai_thuan_thien$, o Volontà del Cielo, è il nome della leggendaria spada brandita dal nostro liberatore, Lê Lợi. Secondo le leggende, la spada gli conferì la forza di mille uomini, sufficiente per liberarsi finalmente dal giogo del dominio cinese. Molti nel nostro paese considerano Lê Lợi la perfetta incarnazione del leader ideale."

 foreign_architectural_influence: "Influenza Architettonica Straniera"
 foreign_architectural_influence_desc: "Nelle nostre numerose conquiste in $indonesia_region$, abbiamo incontrato molte forme d'arte nuove e incredibili, che potrebbero essere adottate e perfezionate dal nostro popolo per promuovere la nostra eredità. Introducendo nuove tecniche e sponsorizzando artisti, la nostra cultura diventerà un esempio dei risultati artistici della nostra regione."

 maj_home_of_the_sea_nomads: "Casa dei Nomadi del Mare"
 maj_home_of_the_sea_nomads_desc: "$n_kabang_desc$"

 maj_jong_advance: "$n_jong$"
 maj_jong_advance_desc: "$n_jong_desc$"

 maj_bajang_ratu: "La Porta del $bajang_ratu$"
 maj_bajang_ratu_desc: "$bajang_ratu_desc$"

 maj_late_karambit_warriors: "$a_late_karambit_warrior$"
 maj_late_karambit_warriors_desc: "$a_late_karambit_warrior_desc$"

 maj_sumpah_palapa: "Sumpah Palapa"
 maj_sumpah_palapa_desc: "Il capo delle nostre forze armate risponde direttamente al nostro sovrano e detiene influenza e potere sufficienti per plasmare il futuro del nostro regno. Per assicurarsi che comprenda l'importanza del ruolo che gli è stato affidato, è tenuto a prestare un giuramento speciale, che sottolinea i nostri sogni di conquista e rafforza il nostro spirito."

 maj_bubu_and_jala: "Bubu e Jala"
 maj_bubu_and_jala_desc: "$bubu_building_desc$"

 maj_the_magic_arrow: "La Freccia Magica"
 maj_the_magic_arrow_desc: "$a_cetbang_cannon_desc$"

 maj_maritime_silk_road: "Via della Seta Marittima"
 maj_maritime_silk_road_desc: "La nostra posizione geografica, integrata dalla nostra crescente influenza, ci ha portato a presiedere la vasta e redditizia rete commerciale che collega il $silk$ e il $spices$ da est a ovest."

 maj_restore_candi_shrines: "Restaurare i Santuari Candi"
 maj_restore_candi_shrines_desc: "Sparsi per tutta la Nusantara si trovano una serie di templi conosciuti come #italic candi#!. Dovremmo restaurare questi templi ovunque li troviamo per rinnovare la fede del nostro popolo."

 maj_the_ghali: "$n_madurese_gali$"
 maj_the_ghali_desc: "$n_madurese_gali_desc$"

 maj_island_colonies: "Colonie Insulari"
 maj_island_colonies_desc: "I contatti con i nostri vicini nell'arcipelago ci hanno dimostrato chiaramente che le risorse grezze e le terre non rivendicate sono pronte per essere prese, promettendo di diventare sicure e prospere sotto il nostro controllo."

 maj_preservation_of_javanese_history: "Preservazione della Storia $javanese_culture$"
 maj_preservation_of_javanese_history_desc: "La storia del popolo del $javanese_culture$ è parte integrante della nostra identità culturale. Per proteggere questa identità, dobbiamo preservare le tradizioni su cui abbiamo costruito il nostro grande Paese."

 heian_kyo: "Heian-Kyō"
 heian_kyo_desc: "La città di Heian-Kyō è stata per secoli la residenza dell'Imperatore ed è un centro di arte e cultura. È lì che fiorì la sontuosa corte del $fujiwara_dynasty$, e tutto il popolo del $JAP$ la guardava con stupore e ispirazione. Abbracciamo il suo ruolo tradizionale e, con il nostro patrocinio, facciamo rifiorire la cultura della nostra capitale."

 matsuri: "Matsuri"
 matsuri_desc: "Ogni santuario e tempio locale ha le proprie feste e celebrazioni. La gente è sempre desiderosa di partecipare, poiché è l'occasione per offrire devozione e gratitudine al proprio protettore locale #italic Kami#!."

 onmyodo: "Onmyōdō"
 onmyodo_desc: "Provenienti dalla $china$ secoli fa, le teorie dello Yīn e dello Yáng si sono evolute in $JAP$ nell'$onmyodo$. Esperti praticanti, chiamati #italic onmyōji#!, si occupano della purificazione e dell'esorcismo degli spiriti maligni e vendicativi, nonché della divinazione, dell'astronomia e dello studio della natura."

 sumo: "Sumō"
 sumo_desc: "Derivato da un antico rituale agricolo, in cui le danze servivano come preghiere per un buon raccolto, la pratica del $sumo$ è sfuggita ai confini della corte ed è ora una pratica popolare tra la gente comune. Serve anche come forma di addestramento al combattimento."

 nanto_rokushuu: "Nanto Rokushū"
 nanto_rokushuu_desc: "I templi di $nara$ hanno avuto un'influenza significativa sin da quando il buddismo è arrivato dalla $china$. Le sei scuole che si sono formate attorno a questi templi sono un rinomato deposito di conoscenza, in particolare per quanto riguarda gli insegnamenti del Buddha e i vari modi per raggiungere l'illuminazione. Tuttavia, insegnano anche materie più mondane, ma ugualmente preziose, come ad esempio come amministrare correttamente un monastero."

 shinbutsu_shuugou: "Shinbutsu-Shūgō"
 shinbutsu_shuugou_desc: "Da quando il Buddismo è arrivato in $japan_region$, i suoi insegnamenti hanno coesistito con il culto dei Kami locali #italic Kami#!. Ciò ha portato entrambi a fondersi in un unico insieme di credenze, sebbene con pratiche rituali distinte."

 honji_suijaku: "Honji Suijaku"
 honji_suijaku_desc: "Una delle pratiche chiave in $shinbutsu_shuugou$ è quella di identificare i #italic Kami#! locali come manifestazioni dei diversi Buddha e i Buddha come manifestazioni dei diversi #italic Kami#!. Alla fine, essi sono la stessa cosa, con forme fondamentali o #italic Honji#! che assumono aspetti diversi, o #italic suijaku#!."

 hachiman_worship: "Culto di Hachiman"
 hachiman_worship_desc: "Hachiman è una delle divinità più venerate. Originariamente una deificazione di Ōjin Tennō, dopo l'introduzione del Buddismo fu successivamente identificato anche come Bodhisattva. È il protettore della linea imperiale e il dio tutelare della classe guerriera."

 gozan_jissetsu: "Gozan Jissetsu"
 gozan_jissetsu_desc: "Il "Sistema delle Cinque Montagne" ha avuto origine in $china$ dai monasteri Chán buddisti sponsorizzati dallo Stato, in cima alle montagne sacre che hanno dato il nome al sistema. In $japan_region$, la pratica è continuata nel periodo $kamakura$ grazie al patrocinio dei templi Zen, delle Cinque Montagne del $kyoto$ e delle Cinque Montagne del $kamakura$. Mantenendo il nostro patrocinio di tali istituzioni, possiamo utilizzarle per contribuire a stabilizzare il nostro governo."

 bodaiji: "Bodaiji"
 bodaiji_desc: "Sin dall'antichità, il nostro popolo ha venerato i propri antenati. I nostri sovrani più influenti erigono interi templi, dove saranno sepolti e poi venerati dopo la morte, e dove le loro azioni e parole saranno ricordate per sempre."

 kagura: "Kagura"
 kagura_desc: "Originariamente danze rituali sacre eseguite davanti alla corte dalle #italic miko#!, le sacerdotesse del santuario, il $kagura$ ha anche ispirato l'esecuzione di danze rituali popolari in tutto il $japan_region$. Queste danze si sono evolute in una miriade di forme, ma tutte conservano la tradizione e il rituale da cui provengono."

 obon: "Obon"
 obon_desc: "Una delle feste più importanti della nostra cultura, l'$obon$ è il momento in cui si onorano i defunti, in particolare i nostri antenati. Durante le celebrazioni vengono offerte offerte di cibo e si eseguono danze rituali. La gente accende anche fuochi e lanterne per guidare le anime dei defunti verso casa per le celebrazioni e poi di nuovo verso la terra dei morti."

 neo_confucianism: "Neo-$SECT_CONFUCIANISM_NAME$"
 neo_confucianism_desc: "Il $SECT_CONFUCIANISM_NAME$ ha una storia millenaria e il Neo-$SECT_CONFUCIANISM_NAME$ esiste già da secoli in $japan_region$. Tuttavia, il coinvolgimento attivo dello Stato e il sostegno alla fede rafforzeranno la nostra autorità."

 danka_system: "Sistema Danka"
 danka_system_desc: "Per secoli, le famiglie del $japan_region$ hanno avuto stretti rapporti con i templi buddisti locali, offrendo loro sostegno finanziario in cambio della cura dei loro bisogni spirituali. L'applicazione formale di questo sistema manterrà il nostro popolo devoto alla fede e garantirà il ruolo vitale che la nostra religione svolge nella società."

 harae: "Harae"
 harae_desc: "Nella nostra fede, la pratica del #italic $harae$#!, o purificazione rituale, è fondamentale per rimuovere tutti i #italic tsumi#!, peccati, e #italic kegare#!, impurità spirituali. Imporre alla nostra popolazione di eseguire correttamente e frequentemente i rituali del $harae$ garantisce che il nostro Paese rimanga spiritualmente puro."

 jisha_bugyou: "Jisha-Bugyō"
 jisha_bugyou_desc: "Amministratore e supervisore di tutti i templi e i santuari, il $jisha_bugyou$ sovrintende anche alle attività svolte da queste istituzioni religiose, assicurandosi che i loro interessi siano in linea con quelli del governo."

 kokugaku: "Kokugaku"
 kokugaku_desc: "Quasi sin dalla sua nascita come nazione, il $japan_region$ e il $shinto$ sono stati influenzati da idee straniere provenienti dalla $china$ e dal Buddismo. Si sta affermando un nuovo movimento che sostiene che il nostro spirito nazionale è naturalmente puro e che la nostra società deve essere purificata da qualsiasi influenza straniera."

 home_shrines: "Santuari Domestici"
 home_shrines_desc: "I rituali e le pratiche religiose sono stati tradizionalmente relegati ai santuari e ai templi. Tuttavia, sempre più persone stanno collocando nelle loro case sia altari familiari locali, chiamati #italic kamidana#!, per venerare i Kami, sia #italic butsudan#!, altari buddisti per i loro antenati."

 fukko_shinto: "Fukko $shinto$"
 fukko_shinto_desc: "Poiché le persone rifiutano l'influenza straniera nella nostra cultura, stanno anche iniziando a rifiutare gli insegnamenti buddisti e l'interferenza del $SECT_CONFUCIANISM_NAME$ nella nostra fede. Data questa emergente richiesta di purezza dottrinale, potrebbe essere saggio procedere a una formale rivitalizzazione del $shinto$."

 jap_bushido: "Bushidō"
 jap_bushido_desc: "Sebbene non sia mai stato formalmente codificato in regole specifiche, il modo in cui un guerriero dovrebbe comportarsi è chiaro: il dovere di un guerriero è combattere e vincere in battaglia, ed espandere la gloria del proprio clan, indipendentemente dai metodi necessari per raggiungere tale obiettivo."

 jap_land_of_the_rising_sun: "Terra del Sol Levante"
 jap_land_of_the_rising_sun_desc: "Il $japan_region$ ha una storia lunga e gloriosa. Le nostre tradizioni culturali uniche, i nostri soldati coraggiosi e la nostra geografia invincibile ci rendono più forti di molti altri Stati della nostra regione. È giunto il momento che la Terra del Sol Levante prenda il suo posto tra le grandi nazioni di questo mondo!"

 jap_ancestral_legacy: "Eredità Ancestrale"
 jap_ancestral_legacy_desc: "Il lignaggio ancestrale del nostro clan è ben noto e la nostra reputazione è un pilastro della nostra identità, che ci sforziamo di mantenere a tutti i costi, poiché la nostra storia ci definisce e garantisce il nostro diritto di governare."

 jap_shinobi: "Shinobi no Mono"
 jap_shinobi_desc: "Le informazioni sono fondamentali per ottenere un vantaggio in qualsiasi situazione. A tal fine, da tempo utilizziamo spie e infiltrati per raccogliere informazioni. Questi $jap_shinobi$ provengono solitamente dalla classe dei samurai, anche se possono essere reclutati anche tra la popolazione contadina locale, e vengono inviati in territorio nemico, dove si mescolano alla popolazione e creano reti di informatori."

 jap_head_hunting: "Caccia alle Teste"
 jap_head_hunting_desc: "Le imprese di un guerriero in battaglia sono davvero degne di nota solo se possono essere provate. A tal fine, i samurai raccolgono le teste decapitate dei nemici che hanno ucciso per presentarle in seguito al loro generale. Più numerose e importanti sono le teste che un samurai prende, migliori saranno le ricompense che riceverà."

 jap_ichiban_yari: "Ichiban Yari"
 jap_ichiban_yari_desc: "Versare il primo sangue in battaglia è un onore e un buon auspicio, quindi i nostri guerrieri sono desiderosi di sferrare il primo colpo ogni volta che ne hanno l'opportunità."

 jap_ashigaru: "Ashigaru"
 jap_ashigaru_desc: "La guerra è sempre stata appannaggio dei potenti samurai. Tuttavia, i recenti sviluppi hanno dimostrato la necessità di rinforzi più consistenti, e quindi i nostri campi di battaglia ora includono anche truppe di contadini. Questi #italic ashigaru#! non saranno però semplici soldati di ventura, poiché il loro rigoroso addestramento e la loro vasta esperienza in battaglia li rendono combattenti formidabili, alla pari dei samurai."

 jap_daiku_construction: "Costruzione Daiku"
 jap_daiku_construction_desc: "Le tecniche tradizionali di falegnameria, o #italic daiku#!, sono utilizzate in $japan_region$ sin dai tempi più antichi. I nostri edifici in legno sono resistenti ma flessibili, e ammirati da molti per la loro bellezza e la loro abile costruzione. Dalla capanna più umile al palazzo più elaborato, il legno è la nostra risorsa edilizia più universale."

 jap_wandering_ronin: "Rōnin Erranti"
 jap_wandering_ronin_desc: "È piuttosto comune che i samurai vaghino per il paese alla ricerca delle migliori opportunità di lavoro, passando dalla parte di chi li paga di più. Questi guerrieri vanno e vengono come onde vaganti, ma possiamo sempre fare uso di loro."

 jap_reformed_land_holding: "Riforma della Proprietà Terriera"
 jap_reformed_land_holding_desc: "Tradizionalmente, valutavamo il valore della terra in base alle dimensioni, ma questo non teneva conto del fatto che non tutte le terre sono uguali. d'ora in poi, il valore sarà determinato in base alla quantità di $rice$ che può essere coltivata. Ciò semplificherà le azioni economiche correlate e renderà più facile ottenere i migliori risultati dalle nostre iniziative agricole."

 jap_jokamachi: "Jōkamachi"
 jap_jokamachi_desc: "I periodi di turbolenza sono molto pericolosi per la nostra gente, quindi per motivi di sicurezza tendono a stabilirsi in luoghi fortificati. Questi insediamenti finiscono per trasformarsi in città, che ovviamente forniscono un e risorsa commerciale e culturale oltre alla protezione fisica per coloro che si rifugiano dietro le mura."

 jap_terakoya: "Terakoya"
 jap_terakoya_desc: "Queste scuole private forniscono un'istruzione di base ai cittadini comuni, promuovendo l'alfabetizzazione, la matematica e i valori morali. #italic Terakoya#! svolgono un ruolo fondamentale nel promuovere una popolazione più istruita e socialmente consapevole, contribuendo alla stabilità e al progresso nazionale."

 jap_codified_bushido: "Bushidō Codificato"
 jap_codified_bushido_desc: "Il comportamento che ci si aspetta da un guerriero sta diventando sempre più idealizzato, con valori come l'onore e la lealtà che assumono maggiore importanza rispetto alla loro effettiva utilità in battaglia. Questa versione romantica e codificata del #italic Bushidō#!, tuttavia, migliorerà la percezione dei nostri eserciti, anche se non corrisponde al loro comportamento reale."

 kgk_omi_genji: "Ōmi-Genji"
 kgk_omi_genji_desc: "Noi siamo gli Ōmi-Genji, discendenti del ramo Uda Genji della famiglia Minamoto, che hanno governato Ōmi come #italic Shugo#! ereditario per generazioni. La nostra posizione consolidata ci conferisce una legittimità indiscussa per difendere e governare il nostro dominio ancestrale."

 kgk_emerging_clan: "Clan Emergente"
 kgk_emerging_clan_desc: "Nonostante la nostra impressionante discendenza, il nostro clan è molto giovane, poiché la nostra separazione dal clan Sasaki è relativamente recente. Il nostro popolo è desideroso di dimostrare il proprio valore come discendenti di un nome indipendente."

 akt_march_of_akita: "Marcia del $akita$"
 akt_march_of_akita_desc: "Il $akita$, il nostro feudo nella provincia settentrionale di Dewa, era un'antica zona di conflitto contro i "barbari" del nord. Il confine del $JAP$ si è espanso molto a nord, ma lo spirito dei nostri antenati vive ancora nel nostro sangue: che chiunque osi ostacolarci provi a farlo!"

 akt_ezo_kanrei: "$ezo_area$ Kanrei"
 akt_ezo_kanrei_desc: "La posizione di $ezo_area$ #italic Kanrei#!, ovvero amministratore del $ezo_area$, è stata assegnata al nostro clan sin dai tempi dello Shogunato del $kamakura$. Siamo incaricati di gestire l'isola come luogo di esilio per i criminali, il che richiede una comunicazione costante attraverso lo stretto."

 akt_ainu_trade: "Commercio $ainu_culture$"
 akt_ainu_trade_desc: "Siamo tra i primi $japanese_group$ ad aver stabilito scambi commerciali permanenti con il $ainu_culture$. Le nostre navi fanno la spola tra le loro terre e le nostre, con grande beneficio per entrambe le comunità."

 asa_legacy_of_emperor_keitai: "Eredità dell'Imperatore Keitai"
 asa_legacy_of_emperor_keitai_desc: "Molti secoli fa, l'imperatore Keitai lanciò la sua campagna per strappare il trono imperiale al $echizen_province$. Come lui, non dobbiamo esitare a proiettare il nostro potere oltre i nostri confini e a lanciare invasioni nei regni vicini quando la situazione lo richiede."

 asa_control_of_buddhist_sects: "Controllo delle Sette Buddiste"
 asa_control_of_buddhist_sects_desc: "Il $echizen_province$ ospita molti templi importanti che rappresentano diverse sette, come l'Eiheiji della tradizione Sōtō e l'Heisenji della tradizione Tendai, tra gli altri. Se riuscissimo a portarli tutti sotto il nostro controllo e a stabilire la pace religiosa in tutta la provincia, ciò costituirebbe la base di una politica religiosa ideale per l'intera nazione."

 ask_defender_of_the_imperial_court: "Difensori della Corte Imperiale"
 ask_defender_of_the_imperial_court_desc: "Quando lo Shogunato del $kamakura$ cadde, fummo noi a proteggere l'Imperatore e la Corte Imperiale. Questo ci ha permesso di conquistare una posizione di primo piano tra tutti i clan del $JAP$, come veri protettori dell'Impero e delle sue tradizioni di corte."

 ask_bugyoshu_and_hokushu: "Bugyōshū e Hōkōshū"
 ask_bugyoshu_and_hokushu_desc: "Dobbiamo rafforzare l'autorità dei nostri funzionari amministrativi, come i magistrati Bugyōshū e i comandanti Hōkōshū. Una burocrazia forte a volte può essere l'unica cosa che si frappone tra noi e una guerra civile aperta."

 ask_higashiyama_culture: "Cultura Higashiyama"
 ask_higashiyama_culture_desc: "Costruita attorno agli asceti dello Zen $buddhism$, la cultura Higashiyama vede la bellezza nella semplicità. Ha promosso lo sviluppo della cerimonia formale del tè, dell'#italic ikebana#!, delle composizioni floreali, del teatro e dell'arte. Questo fiorire della cultura ha portato grande prestigio a coloro che praticano le arti e si rifletterà positivamente sul nostro regno."

 ask_shugo_system: "Sistema Shugo"
 ask_shugo_system_desc: "Gli #italic Shugo#! sono importanti vassalli dello Shogunato, che amministrano le terre in nome del $JAPANESE_SHOGUNATE_LEADER_MALE$. Grazie a loro, possiamo amministrare le nostre terre in modo migliore e più efficiente."

 cba_lineage_of_taira: "Discendenza $taira_dynasty$"
 cba_lineage_of_taira_desc: "Il clan $chiba_dynasty$ è un antico ramo dei $taira_dynasty$, da cui si è separato alla fine del periodo Heian. Questo ci conferisce più potere e influenza di quanto la nostra situazione politica potrebbe far supporre."

 cba_katori_jingu: "$katori_shrine$"
 cba_katori_jingu_desc: "Il $katori_shrine$ è dedicato a Futsunushi no Kami, un dio protettore delle arti marziali venerato da tutti i guerrieri del $japan_region$. Diventando i principali mecenati del santuario e incoraggiando i nostri samurai ad allenarsi lì, affermeremo la nostra legittimità rafforzando al contempo il morale e le abilità dei nostri guerrieri."

 cba_dream_of_masakado: "Sogno di Masakado"
 cba_dream_of_masakado_desc: "$taira_dynasty$ no Masakado, un grande guerriero e parente stretto del nostro clan, una volta cercò di diventare Imperatore del $japan_region$ orientale. Purtroppo, Masakado non riuscì a realizzare la sua ambizione, ma il suo sogno di fondare una nuova nazione di samurai dovrebbe essere la nostra stella polare."

 cba_irrigation_of_southern_kanto: "Irrigazione del Kantō Meridionale"
 cba_irrigation_of_southern_kanto_desc: "Gran parte del nostro dominio è costituito da paludi che non possono sostenere un'agricoltura intensiva. Tuttavia, i recenti sviluppi nella tecnologia dell'irrigazione rendono possibile il drenaggio delle paludi e la coltivazione di nuovi terreni arabili. Intraprendiamo un grande progetto di sviluppo di queste terre altrimenti inutili; ne trarremo enormi profitti."

 csk_clans_of_tosa: "Clan del $tosa_province$"
 csk_clans_of_tosa_desc: "La nostra provincia natale, il $tosa_province$, è sempre stata divisa tra potenti clan. Se desideriamo espandere i nostri possedimenti, dobbiamo unire le forze con questi altri clan: essi ci aiuteranno a crescere e, in cambio, noi aumenteremo il loro potere."

 csk_god_of_arts: "Il Dio delle Arti"
 csk_god_of_arts_desc: "Il fondatore ancestrale del nostro clan, Hata no Kawakatsu, era molto ammirato come dio protettore di tutte le arti, dalle danze tradizionali al teatro. Il nostro clan deve essere all'altezza della sua eredità se vogliamo guadagnarci il rispetto che meritiamo."

 csk_unification_of_shikoku: "Unificazione di Shikoku"
 csk_unification_of_shikoku_desc: "Shikoku è vista dal resto del $japan_region$ come una terra povera e isolata, dove non accade nulla di importante. Lasciamo che continuino a pensarla così e sottovalutino la nostra unificazione dell'isola finché non sarà troppo tardi."

 csk_expand_the_navy: "Espandere la Marina"
 csk_expand_the_navy_desc: "Il $japan_region$ è una nazione di isole e, di conseguenza, una marina forte è una necessità assoluta. Il $tosa_province$ è il luogo ideale per iniziare a costruire una nostra flotta."

 dte_fujiwara_hokke: "$fujiwara_dynasty$ Hokke"
 dte_fujiwara_hokke_desc: "Essendo uno dei rami della casata settentrionale del $fujiwara_dynasty$, la legittimità del nostro governo è contestabile."

 dte_oshu_shugo: "Ōshū Shugo"
 dte_oshu_shugo_desc: "In quanto clan onorevole risalente al primo periodo del $kamakura$, abbiamo un forte diritto di governare l'intera provincia di Ōshū. Fortunatamente per noi, i confini esatti del territorio di Ōshū non sono ben definiti."

 dte_dragon_of_oshu: "Drago di Ōshū"
 dte_dragon_of_oshu_desc: "La nostra potenza e il nostro potere saranno l'invidia dei nostri nemici. Il nostro nome sarà per sempre associato al Drago di Ōshū."

 dte_intensive_domain_development: "Sviluppo Intensivo del Dominio"
 dte_intensive_domain_development_desc: "Molti considerano il $ou_area$ un paese povero a causa del clima rigido e delle montagne, ma la regione ha un grande potenziale. Attraverso investimenti nelle infrastrutture (nuove città, vie navigabili, espansione delle coltivazioni) e l'abolizione di pedaggi e tasse opprimenti, possiamo migliorare notevolmente il nostro cuore e rendere ricchi i nostri sudditi."

 htk_hatakeyama_heritage: "Eredità Hatakeyama"
 htk_hatakeyama_heritage_desc: "Alcuni considerano i capi del nostro clan dei ribelli e dei piantagrane a causa dello stigma associato al nome del nostro clan. Tuttavia, questa inimicizia non è altro che un simbolo della nostra resilienza. Siamo rinati; non ci arrenderemo mai e lotteremo per ciò che è nostro, indipendentemente da chi si opporrà a noi!"

 htk_shogunate_ties: "Legami con lo Shogunato"
 htk_shogunate_ties_desc: "Essendo un clan discendente da uno dei rami dei $ashikaga_dynasty$, abbiamo legami particolarmente forti con l'autorità dello Shogunato. Finché manterremo questa associazione, il nostro clan continuerà ad essere tenuto in grande considerazione."

 htk_clan_spread: "Diffusione del Clan"
 htk_clan_spread_desc: "Il nostro clan non si accontenta di occupare un unico territorio e facciamo del nostro meglio per estendere la nostra influenza su tutto il paese. Non importa quanto lontano possa diffondersi, l'autorità del nostro clan deve essere indiscutibile in tutti i nostri possedimenti."

 hsk_rising_clan: "Clan in Ascesa"
 hsk_rising_clan_desc: "Sebbene le nostre origini siano relativamente umili, anche rispetto ad altri clan discendenti dal $ashikaga_dynasty$, siamo comunque riusciti ad accrescere notevolmente la nostra influenza. Il nostro clan è decisamente in ascesa e la nostra ascesa non deve essere ostacolata!"

 hsk_control_of_izumi_sea: "Controllo del Mare del $izumi$"
 hsk_control_of_izumi_sea_desc: "Il territorio del nostro clan è tradizionalmente situato intorno al Canale di Kii. Assumere il controllo del commercio che entra nella terraferma attraverso quel punto ci porterà enormi profitti e ci consentirà di prosperare immensamente."

 hsk_branches_and_retainers: "Rami e Vassalli"
 hsk_branches_and_retainers_desc: "Il nostro clan, molto esteso, controlla ricchi territori attraverso una rete di parenti e servitori fedeli. Mantenendo l'armonia interna alla nostra dinastia, il nostro clan diventerà uno dei più potenti del $JAP$."

 img_claim_to_shogunate: "Pretesa allo Shogunato"
 img_claim_to_shogunate_desc: "Poiché il nostro clan discende dalla famiglia $ashikaga_dynasty$, abbiamo un forte diritto alla posizione di $JAPANESE_SHOGUNATE_LEADER_MALE$, qualora la linea principale dovesse estinguersi. Anche se il Bakufu non fosse minacciato, sarebbe comunque nel nostro interesse ricordare a tutti la nostra legittimità. Nel caso in cui dovesse diventare rilevante..."

 img_supreme_ruler_of_tokaido: "Controllo del Tōkaidō"
 img_supreme_ruler_of_tokaido_desc: "Il Tōkaidō è la rotta commerciale più importante tra il $japan_region$ centrale e quello orientale. Poiché le nostre terre ancestrali si trovano al centro di tutto questo commercio, sarebbe opportuno assumere il controllo dell'intera regione, in modo da trarre il massimo beneficio dall'attività commerciale locale."

 img_unlikely_alliances: "Alleanze Improbabili"
 img_unlikely_alliances_desc: "A volte, il modo migliore per sconfiggere un nemico è renderlo tuo amico. Assicurare il nostro dominio attraverso matrimoni strategici non solo pacificherà i nostri nemici e ci farà guadagnare nuovi alleati, ma ci garantirà anche di poter dominare i nostri rivali attraverso il sangue."

 img_march_to_kyoto: "Marcia su $kyoto$"
 img_march_to_kyoto_desc: "In questi tempi pericolosi in cui il $japan_region$ e il $kyoto$ sono impantanati nel caos politico, chiunque potrebbe marciare sulla capitale e prendere il potere. In quanto parenti stretti del $ashikaga_dynasty$, è nostro dovere - e nostro diritto - garantire la stabilità del Paese."

 isk_sanindo_gate: "Porta di $sanindou_area$"
 isk_sanindo_gate_desc: "La provincia di $tango_province$ è la porta d'accesso al $kyoto$ in $sanindou_area$ e un luogo di cruciale importanza economica. Consolidando e ampliando la nostra presenza in quella zona, potremo trarre vantaggio da tale prosperità."

 isk_minister_of_samurai_dokoro: "Ministro del Samurai-Dokoro"
 isk_minister_of_samurai_dokoro_desc: "Siamo uno dei quattro potenti clan tradizionalmente nominati capi dell'esercito e della polizia nel Samurai-Dokoro. È quindi nostra responsabilità, e nostro privilegio, mantenere la pace nella capitale e in altri luoghi importanti."

 ito_gokenin_family: "Famiglia Gokenin"
 ito_gokenin_family_desc: "I nostri antenati aiutarono Minamoto no Yoritomo durante la fondazione dello Shogunato del $kamakura$. Come ricompensa per questo contributo, fummo classificati come suoi #italic Gokenin#! e ci fu assegnato un feudo nella provincia del $hyuuga_province$. Questo è un onore di cui godono poche famiglie a Kyūshū."

 ito_sympathy_to_foreign_faiths: "Simpatia per le Nuove Fedi"
 ito_sympathy_to_foreign_faiths_desc: "Gli stranieri che arrivano nella nostra terra portano con sé credenze straniere. Ovviamente dobbiamo assicurarci che queste non siano dannose per i nostri sistemi di credenze tradizionali, ma finché non rappresentano un rischio per noi, non vediamo alcun motivo per impedire alle persone di scegliere la propria fede."

 kkc_disinguished_family_in_kyushu: "Famiglia Distinta"
 kkc_disinguished_family_in_kyushu_desc: "A differenza di altri potenti clan di Kyūshū, la nostra famiglia si è stabilita qui prima dell'istituzione dello Shogunato di $kamakura$. I nostri successi sono ben noti e il nostro nome è rispettato."

 kkc_resistance_against_foreign_intervention: "Resistenza Contro le Invasioni"
 kkc_resistance_against_foreign_intervention_desc: "Il nostro contributo alla difesa del paese contro le invasioni mongole è ben noto. Le imprese di Kikuchi Takefusa nel respingere gli invasori sono ampiamente lodate e tutte le nostre truppe mirano a combattere con lo stesso coraggio."

 ktb_southern_court: "Sostenitori dell'Imperatore"
 ktb_southern_court_desc: "Abbiamo sostenuto la Corte Meridionale durante lo scisma imperiale, dimostrando lealtà al Trono del Crisantemo nonostante le loro difficoltà. Questa reputazione di fedeltà ci garantisce più prestigio e autorità morale rispetto a molte delle casate minori che ora dominano il $japan_region$."

 ktb_control_of_ise: "Controllo del $ise_province$"
 ktb_control_of_ise_desc: "Dal ricco sud al nord urbano densamente popolato, abbiamo esteso il nostro controllo su tutta la provincia del $ise_province$. Questo ci consentirà di sfruttare appieno le risorse provinciali per promuovere la crescita dell'influenza del nostro clan."

 ktb_blessing_of_amaterasu: "Benedizione di Amaterasu"
 ktb_blessing_of_amaterasu_desc: "In qualità di custodi del santuario più sacro del $japan_region$ a $ise_province$, siamo benedetti da Amaterasu, dea del sole e dell'universo. Dobbiamo elevarci per essere degni del compito di mantenere e prendersi cura di questo tesoro nazionale, che ci farà guadagnare il rispetto del popolo giapponese."

 ktb_the_march_of_kitabatake_akiee: "Marcia di Kitabatake Akiie"
 ktb_the_march_of_kitabatake_akiee_desc: "Il nostro onorevole antenato Kitabatake Akiie ha dimostrato che anche la lunga marcia dal $ou_area$ al $japan_region$ centrale può essere intrapresa rapidamente se si ha abbastanza determinazione. Dobbiamo imparare da questa impresa e addestrare i nostri eserciti a manovre rapide, in modo da poter passare rapidamente da un fronte all'altro secondo necessità."

 kno_shugo_of_iyo: "Shugo di $iyo_province$"
 kno_shugo_of_iyo_desc: "Fin dalla fine del periodo Heian, siamo stati la più grande potenza navale del Mare Interno di Seto. Infatti, è grazie alla nostra marina militare che siamo diventati #italic Shugo#! di questa provincia."

 kno_ruler_of_inland_sea: "Governo del Mare Interno"
 kno_ruler_of_inland_sea_desc: "Il Mare Interno di Seto ha un'importanza speciale per le rotte commerciali del $japan_region$, e mantenere il dominio navale in questa zona potrebbe determinare il successo o il fallimento del nostro clan. Dobbiamo assicurarci di avere sempre una marina forte con cui controllare il commercio marittimo."

 kno_murakami_suigun: "Murakami Suigun"
 kno_murakami_suigun_desc: "Il clan Murakami è ben noto per aver commesso atti di pirateria nel Mare Interno di Seto. Integriamoli completamente nel nostro clan e inviamo questi temibili corsari contro i nostri nemici!"

 mri_descendant_of_oe_hiromoto: "Discendenti di Ōe no Hiromoto"

 mri_descendant_of_oe_hiromoto_desc: "Ōe no Hiromoto, studioso e politico che ha dato un grande contributo alla fondazione dello Shogunato del $kamakura$, era l'antenato del nostro clan. Ancora oggi, il suo spirito è incarnato nel nostro popolo e siamo orgogliosi di amministrare efficacemente le terre che egli ha conquistato per noi."

 mri_munakata_three_goddesses: "Tre Dee di Munakata"
 mri_munakata_three_goddesses_desc: "Le tre figlie di Susanoo-no-Mikoto sono le dee protettrici del mare e della navigazione. Le loro benedizioni renderanno le nostre flotte inarrestabili."

 nbu_genji_in_the_north: "Ōshū Genji"
 nbu_genji_in_the_north_desc: "In origine siamo un ramo cadetto dei Kai Genji; al nostro fondatore fu concesso un feudo nella provincia di Ōshū come ricompensa per i suoi fedeli servizi allo Shogunato del $kamakura$. Nel corso del tempo, ci siamo abituati a questa regione dai rigidi inverni e sappiamo come sfruttare queste condizioni a nostro vantaggio strategico e tattico."

 nbu_fight_against_famines: "Combattere la Carestia"
 nbu_fight_against_famines_desc: "A causa dei venti freddi nel tardo autunno e delle forti nevicate fino alla prima primavera, il nostro popolo soffre spesso di gravi carestie e fame. Dobbiamo costruire riserve di cibo e indagare su come possiamo migliorare le terre sotto il nostro controllo per contrastare future catastrofi."

 nbu_northern_horses: "Cavalli del Nord"
 nbu_northern_horses_desc: "Mutsu possiede allevamenti da cui, in tempi antichi, venivano inviati cavalli in $kyoto$. La tradizione dell'allevamento dei cavalli continua ancora oggi ed è una tradizione che dovremmo coltivare, poiché ci permette di allevare cavalleria più facilmente rispetto a molti dei nostri vicini."

 oda_uninspiring_clan: "Clan Poco Ispirante"
 oda_uninspiring_clan_desc: "Nonostante abbia un lignaggio illustre, il nostro clan non è considerato particolarmente rilevante, minaccioso o interessante dagli estranei. La loro sottovalutazione della nostra forza e astuzia si rivelerà presto la loro rovina..."

 oda_generals: "Generali $ODA$"
 oda_generals_desc: "L'ossessione per la nascita e i privilegi ha reso questo paese debole, e l'ascesa di potenti clan che si sono fatti da soli in tutto il regno ha chiaramente dimostrato quanto possano essere inutili tali nozioni. Prendiamo a cuore questa lezione e lasciamo che il successo e l'abilità siano i principi guida per decidere chi dovrebbe salire al comando dei nostri eserciti. Una leadership forte è un requisito indispensabile per una rapida espansione."

 oda_tenka_fubu: "Tenka Fubu"
 oda_tenka_fubu_desc: "È chiaramente il nostro destino tenere tutto il paese nella nostra presa. Nessuno resisterà alla nostra autorità, e tutti sotto il Cielo si piegheranno alla nostra potenza militare."

 oda_triple_firing: "Fuoco Triplo"
 oda_triple_firing_desc: "L'avvento delle armi da fuoco ha rivoluzionato e continuerà a rivoluzionare la guerra in $japan_region$, e padroneggiando queste nuove armi potremo dominare qualsiasi campo di battaglia. Per aumentare la cadenza di fuoco, i nostri archibugieri formeranno dei ranghi, consentendo a una linea di sparare mentre le altre due ricaricano."

 oda_influential_strongholds: "Roccaforti Influenti"
 oda_influential_strongholds_desc: "Il $japan_region$ è una terra di castelli e fortificazioni. È attraverso la costruzione di forti posizioni difensive che si può affermare la propria influenza sia sul regno politico che sulle rotte vitali per le campagne militari. Questo insegnamento è qualcosa che dobbiamo prendere a cuore. È anche attraverso i nostri castelli che imponiamo la nostra presenza e il nostro potere sulla gente comune. In ogni momento, dobbiamo dare la priorità alla riduzione delle fortificazioni nemiche e alla costruzione delle nostre in luoghi strategici."

 oda_patronization_of_the_west: "Patrocinio dell'Occidente"
 oda_patronization_of_the_west_desc: "I missionari occidentali hanno portato molte idee e tecniche nella nostra terra e, a differenza delle antiche sette buddiste, non hanno legami precedenti con proprietari terrieri corrotti o città ribelli. Dovremmo accogliere questi stranieri nelle nostre città e vedere quali benefici potrebbero portare alla nostra corte."

 ogs_ogasawara_ryu: "Ogasawara-Ryū"
 ogs_ogasawara_ryu_desc: "Le forme tradizionali di molte cose sono molto apprezzate nella nostra società. Abbiamo formalizzato il sistema ufficiale delle arti marziali e del galateo per i samurai da quando il fondatore del nostro clan, Ogasawara Nagakiyo, ha originariamente sviluppato una scuola speciale, dove tutti i samurai dovrebbero andare per imparare le tecniche appropriate."

 ogs_shinano_shugo: "Shugo di $shinano_province$"
 ogs_shinano_shugo_desc: "Il nostro clan appartiene a un ramo secondario dei Minamoto e governa la provincia del $shinano_province$ come suo #italic Shugo#!. La nostra terra è montuosa e poco accogliente per molti. Per il nostro popolo, tuttavia, è stata a lungo parte integrante delle nostre difese contro gli estranei. Portiamo con noi questa esperienza ovunque vadano i nostri eserciti e assicuriamoci di ottenere sempre informazioni complete sul terreno in qualsiasi regione in cui combattiamo."

 ogs_kiso_uma: "Kiso-Uma"
 ogs_kiso_uma_desc: "I cavalli della zona di Kiso sono la nostra razza preferita. Non sono alti né veloci come altre razze, ma compensano con una grande resistenza e sono abbastanza robusti da sopravvivere in montagna."

 ogs_improvment_of_nakasendo: "Migliorare il Nakasendō"
 ogs_improvment_of_nakasendo_desc: "La Nakasendō è una delle rotte più importanti tra il $japan_region$ centrale e quello orientale. Controllarla significa anche controllare il commercio che vi transita."

 suw_suwa_taisha: "Suwa Taisha"
 suw_suwa_taisha_desc: "Suwa Taisha, sul lago Suwa, è uno dei santuari più antichi del $japan_region$ ed è molto venerato in tutto il paese. La sua festa più importante, #italic Onbashira-matsuri#!, dimostra il coraggio del nostro popolo che trasporta i tronchi sacri dalla montagna al santuario."

 otm_lord_of_bungo: "Signore di Bungo"
 otm_lord_of_bungo_desc: "Siamo stati gli #italic Shugo#! di Bungo sin dall'era del $kamakura$. Queste terre sono note per il loro terreno altamente fertile e i ricchi raccolti di questa regione ci consentono di sfamare eserciti più grandi di quelli che molti altri $daimyo$ possono sostenere."

 otm_domination_of_kyushu: "Dominazione del Kyūshū"
 otm_domination_of_kyushu_desc: "Siamo stati designati #italic Shugo#! di $bungo_province$, $hizen_province$ e $hyuuga_province$. Questo ci pone in una posizione perfetta per rivendicare tutto il Kyūshū per noi stessi!"

 otm_nanban_trade: "Accogliere il Commercio Nanban"
 otm_nanban_trade_desc: "Altri possono denunciare gli stranieri come barbari, ma noi riconosciamo i benefici e i vantaggi del commercio con loro. Sappiate che saranno sempre i benvenuti nei nostri porti e che saremo in grado di espandere la nostra rete commerciale oltre quella dei nostri rivali."

 otm_christian_conversion: "Convertiti Cristiani"
 otm_christian_conversion_desc: "Le nostre crescenti interazioni con gli stranieri hanno suscitato l'interesse di molti membri del nostro clan nei confronti del Cristianesimo. Il popolo cristiano ha molti potenti sostenitori tra i nostri signori e vassalli, e pochi sono zelanti quanto i recenti convertiti. Facciamo buon uso di questi convertiti cristiani, indipendentemente dalla strada che prenderà il nostro clan, e utilizziamo la loro influenza e il loro zelo per promuovere i nostri obiettivi."

 ouc_descendant_of_baekje: "Discendenti di Baekje"

 ouc_descendant_of_baekje_desc: "La nostra cronaca dice che siamo discendenti del principe Imseong della casa reale dell'antico regno di Baekje, che un tempo governava in $korea_region$. Questo legame leggendario ci conferisce una posizione di prestigio in $east_asia$."

 ouc_korea_trade: "Commercio con il $korea_region$"
 ouc_korea_trade_desc: "Grazie alla nostra posizione, siamo il clan che commercia più attivamente con il $korea_region$ e, di conseguenza, abbiamo il quasi monopolio su molti beni esotici. Dobbiamo fare tutto il possibile per mantenere questa posizione favorevole e sfruttarla per superare qualsiasi nuovo concorrente che possa sfidarci."

 ouc_fight_against_wokou: "Contrastare la Pirateria"
 ouc_fight_against_wokou_desc: "Al fine di mantenere buoni rapporti con le nazioni del continente per il bene dei nostri commercianti, dobbiamo organizzare pattugliamenti marittimi costanti. Finché pirati e contrabbandieri saranno comuni nelle nostre acque, gli stranieri non si fideranno di noi e potrebbero persino agire contro di noi."

 ouc_welcome_missionaries: "Accogliere gli Occidentali"
 ouc_welcome_missionaries_desc: "Con l'espansione della nostra rete commerciale, entriamo sempre più spesso in contatto con gli stranieri e le loro strane abitudini e credenze. Indipendentemente da ciò in cui credono, la loro moneta è abbastanza buona; se vogliamo assicurarci un commercio continuativo, dovremmo mostrarci aperti alle loro idee così come lo siamo ai loro affari."

 stk_hitachi_genji: "Genji di $hitachi_province$"
 stk_hitachi_genji_desc: "Siamo una delle più antiche stirpi Minamoto della regione di Kantō e abbiamo combattuto per la gloria del nostro clan nel $japan_region$ orientale sin da prima che Minamoto no Yoritomo fondasse lo Shogunato del $kamakura$. La nostra posizione di #italic Shugo#! del $hitachi_province$ non è quindi mai stata messa in discussione."

 stk_kashima_jingu: "$kashima_shrine$"
 stk_kashima_jingu_desc: "Il $kashima_shrine$ è uno dei tre santuari più importanti della regione di Kantō. Questo santuario è dedicato a Takemikazuchi-no-O-no-Kami, dio del tuono e delle spade, nonché dio protettore della lotta libera del $sumo$. La nostra custodia di questo santuario rafforza la determinazione dei nostri eserciti."

 stk_eastern_coalitions: "Coalizioni Orientali"
 stk_eastern_coalitions_desc: "Indipendentemente dai clan ostili che ci circondano, ci siamo sempre presentati come una terza parte ragionevole a cui gli altri clan possono affidarsi per proteggersi dagli invasori. Questa tradizione delle coalizioni orientali ci sarà utile, purché ci assicuriamo che i clan che si affidano a noi non debbano mai preoccuparsi della protezione."

 sba_multiple_shugo: "Shugo Multipli"
 sba_multiple_shugo_desc: "Siamo stati nominati #italic Shugo#! di più province. Amministrare tutte queste terre ci renderà ricchi grazie alle entrate generate dalle nostre fertili risaie e dalle botteghe degli artigiani più abili della regione."

 sba_access_to_northern_japan: "Legami con Ōshū"
 sba_access_to_northern_japan_desc: "La provincia di Ōshū è la nostra seconda casa e il luogo in cui ha avuto origine il nostro clan. Dobbiamo sfruttare i nostri legami con Ōshū per procurarci alcuni dei robusti cavalli da guerra originari di quella regione."

 sba_shiba_retainers: "Vassalli $SBA$"
 sba_shiba_retainers_desc: "Nel nostro clan abbiamo vassalli talentuosi ma ambiziosi. Sono spesso causa di attriti familiari e sarebbe saggio tenerli sotto controllo. d'altra parte, una stretta supervisione e ricompense generose ma strategiche potrebbero trasformare queste potenti famiglie nelle risorse più preziose del nostro dominio."

 smz_satsuma_shugo: "Shugo di $satsuma_province$"
 smz_satsuma_shugo_desc: "Abbiamo sempre detenuto tradizionalmente il titolo di #italic Shugo#! del $satsuma_province$; il suo nome è diventato sinonimo del nostro clan. I nostri guerrieri ne sono orgogliosi e quindi sempre pronti a difendere il nostro territorio."

 smz_tsurinobuse: "Tsurinobuse"
 smz_tsurinobuse_desc: "#italic Tsurinobuse#!, "esca e imboscata", è la nostra tattica più efficace. Questa strategia ci permette di sconfiggere nemici quando siamo in netta inferiorità numerica, il che è ovviamente un'abilità molto preziosa. Dobbiamo renderla una tattica centrale dei nostri eserciti e dare una piccola sorpresa ai comandanti ottusi dei clan rivali."

 smz_shimazu_charge: "Carica $SMZ$"
 smz_shimazu_charge_desc: "Anche quando sono circondati e in inferiorità numerica, i nostri soldati continueranno ad avanzare fino a raggiungere l'altro lato delle linee nemiche. La carica delle nostre truppe sarà leggendaria!"

 smz_tanegashima: "Tanegashima Teppō"
 smz_tanegashima_desc: "Gli occidentali che sbarcarono per primi a Tanegashima portarono con sé armi nuove e interessanti. Questi archibugi stanno diventando sempre più comuni in tutto il $japan_region$, ma in nessun altro luogo sono disponibili da così tanto tempo come qui."

 smz_early_westernization: "Occidentalizzazione Precoce"
 smz_early_westernization_desc: "Grazie ai frequenti contatti con i paesi occidentali, abbiamo imparato molto sulla tecnologia straniera e altre innovazioni. Utilizzando queste conoscenze, possiamo attuare riforme nell'economia, nell'industria e nell'istruzione che ci aiuteranno a ottenere un vantaggio sugli altri clan."

 shn_vice_minister_of_dazaifu: "Vice-Ministro di Dazaifu"
 shn_vice_minister_of_dazaifu_desc: "Come indica il nome del nostro clan, discendiamo dal vice ministro nominato del Dazaifu nella provincia del $chikuzen_province$. Questa istituzione è stata fin dall'antichità il centro diplomatico e militare della regione e tradizionalmente governiamo il Kyūshū settentrionale in qualità di rappresentanti dell'Imperatore."

 shn_defender_against_mongols: "Difensore del $JAP$"
 shn_defender_against_mongols_desc: "In quanto importante famiglia di samurai del Kyūshū settentrionale, abbiamo combattuto coraggiosamente contro entrambe le invasioni mongole. Se necessario, ci mobiliteremo ancora una volta per difendere sia il Kyūshū che l'intero regno dagli invasori esterni."

 shn_diplomacy_through_tsushima: "Diplomazia Attraverso Tsushima"
 shn_diplomacy_through_tsushima_desc: "Grazie alla nostra presenza in $tsushima_province$, abbiamo una vasta esperienza nei negoziati con la $korea_region$. In questo modo, siamo sempre stati in grado di mantenere un canale aperto con il mondo esterno, anche nei periodi in cui le relazioni ufficiali erano proibite."

 soo_tradition_of_wakou: "Tradizione Wakō"
 soo_tradition_of_wakou_desc: "Pur apprezzando il commercio legale e pacifico, dobbiamo anche essere preparati a situazioni militari di tensione. Fortunatamente, la tradizione locale della pirateria potrebbe aiutarci a risolvere alcune questioni relative al combattimento."

 soo_fight_for_tsushima: "Combattere per Tsushima"
 soo_fight_for_tsushima_desc: "Situata tra il $asia$ e le isole del $japan_region$, la nostra patria di $tsushima_province$ e le acque circostanti sono teatro di scontri e lotte tra i vari paesi. Che le nostre flotte siano forti, così da poter non solo difendere il nostro paese, ma anche espanderlo!"

 soo_bahan_ship: "Nave Bahan"
 soo_bahan_ship_desc: "Le nostre navi corsare battono la bandiera di Hachiman, seminando il terrore ovunque vadano. Nessuno oserebbe attaccare una flotta protetta dal dio della guerra in persona!"

 tkd_kai_shugo: "Shugo di $kai_province$"
 tkd_kai_shugo_desc: "Siamo discendenti dei Genji del $kai_province$ e siamo stati tradizionalmente nominati suoi #italic Shugo#!. In quanto tali, siamo intrinsecamente associati ad esso, e i famosi cavalli della provincia sono già sinonimo della nostra cavalleria."

 tkd_takeda_ryu: "Takeda-Ryū"
 tkd_takeda_ryu_desc: "Le forme tradizionali di arti marziali sono praticate nella nostra famiglia da generazioni. Tra queste, particolare enfasi è data all'equitazione e al tiro con l'arco a cavallo, rendendo le nostre truppe a cavallo soldati molto più efficaci di quelli degli altri clan."

 tkd_tiger_of_kai: "Tigre di Kai"
 tkd_tiger_of_kai_desc: "I leader forti sono più bravi a salvaguardare i loro domini di qualsiasi numero di imponenti castelli. I nostri generali devono allenarsi duramente e guadagnarsi il diritto di essere chiamati "Tigri di Kai"."

 tkd_fuurinkazan: "Fūrinkazan"
 tkd_fuurinkazan_desc: ""Veloce come il vento, gentile come la foresta, aggressivo come il fuoco, immobile come una montagna". Le parole del grande maestro di guerra Sun Tzu saranno incise per sempre nella storia della nostra famiglia e fungeranno da nostro motto."

 tki_genji_in_mino: "Genji di $mino_province$"
 tki_genji_in_mino_desc: "In qualità di capo dei Genji in $mino_province$ e di #italic Shugo#! nominato, abbiamo guidato altri samurai locali per generazioni. Il nostro dominio occupa una posizione vantaggiosa da cui controllare le regioni vicine."

 tki_banner_of_bellflower: "Stendardo della Campanula"
 tki_banner_of_bellflower_desc: "Essendo stati i suoi Shugo per generazioni, il nostro emblema è già sinonimo di $mino_province$. Tutti coloro che vivono lì combatteranno sotto il nostro vessillo."

 tki_flood_control_of_three_rivers: "Controllo delle Inondazioni"
 tki_flood_control_of_three_rivers_desc: "Nella nostra provincia natale, i tre grandi fiumi Kiso, Nagara e Ibi causano spesso gravi inondazioni nelle nostre risaie. Dovremmo controllare queste inondazioni e utilizzarle per aumentare la resa in tutte le province sotto il nostro dominio."

 ues_strong_dynastic_ties: "Forti Legami Dinastici"
 ues_strong_dynastic_ties_desc: "La nostra famiglia discende dalla prestigiosa stirpe dei $fujiwara_dynasty$ e abbiamo anche forti legami con i $ashikaga_dynasty$, poiché la madre di $ashikaga_dynasty$ Takauji era un membro del nostro clan. Questi legami dinastici si riveleranno preziosi per la nostra prosperità."

 ues_double_shugo: "Doppio Shugo"
 ues_double_shugo_desc: "Siamo stati nominati #italic Shugo#! sia della provincia di $kouzuke_province$ che di quella di $tango_province$. Le loro terre fertili sono il punto di partenza perfetto per la nostra espansione."

 ues_eastern_power: "Potenza Orientale"
 ues_eastern_power_desc: "Sebbene ci siano stati concessi territori sia nella parte orientale che in quella occidentale del $japan_region$, è nella parte orientale che potremo davvero prosperare. I nostri territori lì sono ricchi e possiamo attirare molti abili guerrieri locali che combatteranno per la nostra causa."

 ues_dragon_of_echigo: "Drago di Echigo"
 ues_dragon_of_echigo_desc: "Il nostro clan ha coltivato uno straordinario spirito di coraggio e giustizia che intimorisce i nostri avversari sul campo di battaglia. Dichiareremo la forza dei nostri leader al mondo intero e tutti tremeranno di terrore al solo pensiero del Drago di Echigo!"

 utn_fujiwara_descendant: "Discendenti del $fujiwara_dynasty$"

 utn_fujiwara_descendant_desc: "La nostra genealogia dimostra che gli antenati del nostro clan erano originariamente membri della famiglia $fujiwara_dynasty$ del $kyoto$. Questa parentela con una dinastia così antica e venerata è molto utile per stringere relazioni diplomatiche con la Corte Imperiale e con gli altri clan."

 utn_legacy_of_nasu_no_yoichi: "Eredità di Nasu no Yoichi"
 utn_legacy_of_nasu_no_yoichi_desc: "Il $shimotsuke_province$ era un tempo la patria di Nasu no Yoichi, famoso per le sue abilità di arciere durante la guerra Genpei. Ancora oggi, i guerrieri del $shimotsuke_province$ lo tengono in grande considerazione; siamo orgogliosi di essere chiamati "i migliori arcieri del Kantō" e di portare avanti l'eredità di Nasu no Yoichi."

 utn_mediator_of_kanto: "Mediatore del Kantō"
 utn_mediator_of_kanto_desc: "Essendo uno dei clan più antichi del Kantō, abbiamo una profonda conoscenza della politica regionale e abbiamo spesso svolto il ruolo di mediatori tra le diverse fazioni. Questa stessa comprensione approfondita della nostra regione ci consente di espandere il nostro territorio in modo efficace senza provocare gli altri."

 ymn_descendant_of_nitta: "Discendenti dei $nitta_dynasty$"

 ymn_descendant_of_nitta_desc: "Siamo i discendenti del clan $nitta_dynasty$, antichi rivali della famiglia $ashikaga_dynasty$. Per alcuni questo è la prova della nostra profonda lealtà, mentre per altri ci rende nemici naturali. Dobbiamo utilizzare abilmente il nostro lignaggio come arma diplomatica."

 ymn_mediate_succession_disputes: "Mediazione nelle Dispute di Successione"
 ymn_mediate_succession_disputes_desc: "Poiché molti altri clan litigano al loro interno su chi sia il legittimo erede di chi, si rivolgono a noi per mediare le loro dispute. Questo ci pone in una posizione unica di potere e fiducia, rendendoci facile stringere nuove alleanze e contatti, e destabilizzare i nostri rivali."

 ymn_leader_of_western_army: "L'Armata Occidentale"
 ymn_leader_of_western_army_desc: "Creiamo un grande esercito occidentale per unire gli Stati litigiosi del $japan_region$. Generali abili, soldati ben addestrati e un coraggio incrollabile costringeranno facilmente gli orientali in ginocchio!"

 ymn_isolated_heartland: "Cuore Isolato"
 ymn_isolated_heartland_desc: "La nostra patria è montuosa e isolata. Fortunatamente, questo significa anche che qualsiasi potenziale conquistatore troverebbe il nostro territorio quasi impossibile da raggiungere! Costruiamo le nostre difese in modo che completino la forza protettiva naturale della nostra geografia: qualsiasi invasore rimpiangerà amaramente il giorno in cui ha rivolto i suoi occhi avidi alle nostre proprietà."

 dahomey_amazons: "Amazzoni del Dahomey"
 dahomey_amazons_desc: "Un corpo di guerriere, reclutate tra le mogli del re. Si sono guadagnate la reputazione di mitiche Amazzoni grazie alla loro ferocia in battaglia e al terrore che incutono nelle file dei loro avversari. Queste $dahomey_amazons$ sono completamente devote al $DAH$ e ai suoi interessi."

 dah_children_of_the_panther: "Figli della Pantera"
 dah_children_of_the_panther_desc: "Le nostre antiche leggende narrano che la nostra stirpe reale discenda dall'unione tra una principessa e una pantera. Questo antico e mistico racconto accrescerà il nostro prestigio e la nostra fama."

 dah_slave_hunts: "Cacce agli Schiavi"
 dah_slave_hunts_desc: "Durante le incursioni nei territori circostanti, otteniamo schiavi che non solo possono essere impiegati economicamente o barattati con i nostri vicini, ma che possono anche servire nei nostri eserciti. In questo modo, aumenteremo il numero di combattenti che possono essere chiamati alle armi."

 dah_migan_mehu: "Migan e Mehu"
 dah_migan_mehu_desc: "Il Migan e il Mehu sono i due ministri principali del sovrano. Uno sovrintende al nord, l'altro al sud; uno sovrintende alla giustizia, l'altro al commercio. Insieme, portano stabilità e prosperità."

 dah_lagredis: "Lagredis"
 dah_lagredis_desc: "Inserendo segretamente cortigiani maschi travestiti da mogli reali nell'harem, essi potranno agire invisibili come occhi e orecchie del re, specialmente nelle questioni relative agli intrighi di palazzo."

 dah_yovogan: "Lo Yovogan"
 dah_yovogan_desc: "Poiché sempre più stranieri stanno arrivando sulle nostre coste, dovremmo istituire un nuovo ufficio nel nostro governo per studiare e imparare dai loro costumi, in modo da poter trarre beneficio da questo scambio di culture."

 dah_dahomey_palaces: "Palazzi di Abomey"
 dah_dahomey_palaces_desc: "Costruire un vasto complesso palaziale nella nostra capitale sarebbe una dimostrazione elegante ma imponente del nostro potere. Chiunque pensasse di alzare le armi contro di noi sarebbe sicuramente scoraggiato dalla vista dei nostri sontuosi palazzi."

 kbo_ribat_fortifications: "Fortificazioni Ribāṭ"
 kbo_ribat_fortifications_desc: "Utilizzate in tutto il mondo musulmano, queste piccole fortificazioni hanno fornito protezione alle carovane, ai centri commerciali e alle comunità isolate."

 people_of_allah: "Popolo di $muslim_god_name$"
 people_of_allah_desc: "Siamo i seguaci di $muslim_god_name$, l'unico vero Dio, e rispettiamo la Sua Parola. Tutti coloro che credono in Lui sono nostri fratelli e sorelle ai Suoi occhi."

 holy_revelation: "Sacra Rivelazione"
 holy_revelation_desc: "La Parola di $muslim_god_name$ fu rivelata al suo Profeta Muḥammad, pace su di lui, e trascritta nel Santo $common_string_quran$. Attraverso i suoi versetti, la volontà di $muslim_god_name$ è trasmessa ai Suoi fedeli, e tutti i credenti musulmani dovrebbero avere familiarità con i suoi passaggi."

 islamic_calligraphy: "Calligrafia Islamica"
 islamic_calligraphy_desc: "L'Islam non è solo una religione di pace, ma anche delle arti. La calligrafia utilizzata per scrivere i versetti del $common_string_quran$ e i nomi dei profeti spesso si colloca a cavallo tra la scrittura sacra e l'arte."

 islamic_prayer: "Aṣ-Ṣalāh Farḍ"
 islamic_prayer_desc: "Uno dei cinque pilastri dell'Islam, Aṣ-Ṣalāh è l'obbligo per un fedele musulmano di eseguire le preghiere quotidiane. Sebbene il numero di volte in cui si deve pregare ogni giorno e i movimenti specifici da compiere possano variare da scuola a scuola, l'atto della preghiera quotidiana è comune a tutti gli Islam."

 zakah: "Al-Zakāh Wājib"
 zakah_desc: "Uno dei Cinque Pilastri dell'Islam, Al-Zakāh è una forma di elemosina considerata un obbligo religioso per ogni fedele musulmano. Dare denaro per aiutare i bisognosi è una carità obbligatoria per chiunque possa permetterselo, ed è considerata una tassa."

 muslim_lineage: "Discendenza musulmana"
 muslim_lineage_desc: "Sin dai tempi di Maometto, la pace sia con lui, l'Islam è stato intrinsecamente legato alle strutture di governo. In quanto tale, la nostra linea dinastica è legittimata anche dalla fede stessa."

 muslim_caravans: "Carovane musulmane"
 muslim_caravans_desc: "Dai numerosi percorsi della Via della Seta alle rotte del sale attraverso il Sahara, il nostro popolo ha una tradizione di intraprendere iniziative commerciali in terre lontane, fornendo a noi e al resto del mondo musulmano un'ampia selezione di beni disponibili."

 islamic_golden_age: "Età dell'Oro Islamica"
 islamic_golden_age_desc: "L'impatto che il $islamic_golden_age$ ha avuto sul mondo intero, non solo sui paesi musulmani, è assolutamente innegabile. Alcune di queste nazioni infedeli stanno solo ora emergendo dal loro buio Medioevo di ignoranza, compiendo i primi tentativi di "scoperte" artistiche e scientifiche che noi abbiamo inventato - e perfezionato - molto tempo fa."

 ramadan: "Ramaḍān"
 ramadan_desc: "Commemorazione della prima rivelazione al Profeta Maometto, la pace sia con lui, il mese di $ramadan$ è il mese più sacro in Islam. Durante questo mese, tutti i fedeli musulmani sono tenuti a praticare il Ṣawm - digiuno e astinenza - durante le ore diurne, oltre alla preghiera e alla riflessione."

 sunnah: "Sunnah"
 sunnah_desc: "Costituita dalle tradizioni e dalle pratiche attribuite a Maometto, la pace sia con lui, la $sunnah$ detta come ogni fedele musulmano deve comportarsi ed è anche ciò che dà il nome al Sunnismo. Sebbene le diverse scuole di giurisprudenza possano variare nei dettagli, tutte hanno la loro base nella $sunnah$."

 imamate: "Imamato"
 imamate_desc: "La base della fede sciita è che Maometto, la pace sia su di lui, designò 'Alī ibn Abī Ṭālib come suo successore. Per questo, la figura dell'Imām è quella di un leader spirituale proveniente dalla linea di Maometto, la pace sia su di lui, per guidare tutti i fedeli musulmani."

 indian_sea_trade: "Commercio nell'Oceano Indiano"
 indian_sea_trade_desc: "I commercianti musulmani hanno solcato le acque del $indian_ocean_region$ per generazioni, viaggiando per distanze incredibili alla ricerca di merci rare e preziose. Dalle coste orientali del $africa$, alle rive dell'$india$, e persino fino alle isole delle spezie del $indonesia_region$, le acque sono attraversate dalle navi dei fedeli musulmani."

 muslim_trade_communities: "Comunità Commerciali Musulmane"
 muslim_trade_communities_desc: "La presenza dei commercianti musulmani in terre lontane li mette in contatto con molti popoli e credenze diverse. La creazione di comunità commerciali tra loro permette un certo grado di fusione e sincretismo delle loro credenze con la vera Parola del $muslim_god_name$."

 expansionist_faith: "Fede Espansionista"
 expansionist_faith_desc: "Dalle sue origini in $arabia_region$, l'Islam si è espanso rapidamente e in modo capillare. In poche generazioni, i suoi fedeli si sono diffusi dal $iberia_region$ all'$india$, la più rapida espansione religiosa che il mondo abbia mai visto. Tuttavia, ci sono nuove terre che aspettano di essere toccate dalla nostra luce: forse è giunto il momento di una seconda espansione musulmana."

 blend_of_influences: "Mescolanza di Influenze"
 blend_of_influences_desc: "L'Islam si è espanso in molti nuovi luoghi dalle sue origini in $arabia_region$ e, con questa diffusione, è entrato in contatto con molti popoli e stili di vita diversi. Durante questo processo si sono verificati molti scambi di influenze, al punto che molte caratteristiche che originariamente non facevano parte dell'Islam sono diventate intrinsecamente associate alla fede."

 islamic_schoolars: "Scuole Islamiche"
 islamic_schoolars_desc: "L'Islam ha sempre incoraggiato lo studio e l'analisi delle sue scritture, al punto che abbiamo sviluppato scuole di pensiero completamente diverse su come interpretarle. I nostri studiosi sono quindi estremamente eruditi nel $common_string_quran$ e nei nostri altri testi sacri, capaci di avere le discussioni teologiche più approfondite."

 gunpowder_empires: "Imperi della Polvere da Sparo"
 gunpowder_empires_desc: "La polvere da sparo sarà anche stata inventata in Estremo Oriente, ma è stato attraverso l'Islam che ha trovato ampio utilizzo in tutto il mondo. Le armi da fuoco sono state un elemento fondamentale dei nostri eserciti per generazioni, e la loro produzione e utilizzo è una delle nostre caratteristiche distintive."

 established_holy_sites: "Luoghi Sacri Consolidati"
 established_holy_sites_desc: "Mentre altre religioni hanno opinioni piuttosto permissive e incoerenti riguardo all'uso dei propri luoghi sacri, le regole dell'Islam in materia sono piuttosto chiare. Il nostro popolo compirà senza dubbio i propri pellegrinaggi con il dovuto rispetto e dignità."

 islamic_courts: "Corti Islamiche"
 islamic_courts_desc: "Le corti reali dei paesi musulmani sono sempre state tra le più ammirate al mondo. Lodate per la nostra cultura raffinata e gli arredi lussuosi, le storie sulla magnificenza delle nostre corti si sono diffuse in lungo e in largo, e il nostro popolo è molto orgoglioso di questa reputazione."

 schools_of_thought: "Scuole di Pensiero"
 schools_of_thought_desc: "La tradizione dell'Islam ha sempre dato grande importanza alla ricerca della conoscenza e dell'istruzione. Dalle scuole di giurisprudenza e teologia alle grandi biblioteche e istituzioni di apprendimento fondate da vari sovrani, la cultura musulmana ha guadagnato l'ammirazione di tutto il mondo musulmano e ben oltre."

 distant_trade_ventures: "Imprese Commerciali Lontane"
 distant_trade_ventures_desc: "È dai luoghi più lontani che provengono le merci commerciali più redditizie. Per molti anni, i commercianti musulmani hanno percorso enormi distanze sia via terra che via mare alla ricerca di opportunità commerciali redditizie."

 resilient_merchants: "Commercianti Resilienti"
 resilient_merchants_desc: "I commercianti musulmani sopportano le condizioni più difficili durante le loro spedizioni. Dall'attraversamento delle sabbie roventi del Sahara e del deserto del Gobi, al coraggio di affrontare le acque tormentate dai monsoni del $indian_ocean_region$, hanno dimostrato più volte che sono disposti a sopportare qualsiasi difficoltà pur di portare a termine con successo i loro scambi commerciali."

 jewels_of_the_desert: "Gioielli del Deserto"
 jewels_of_the_desert_desc: "L'Islam è sorto dalle sabbie dell'$arabia_region$ e si è diffuso in una regione in gran parte arida. Eppure alcune città musulmane sono diventate come gioielli prosperi che brillano nel duro deserto, oasi letterali e figurative rese ricche dal commercio, dall'architettura e dall'irrigazione. Con investimenti e pianificazioni oculati, qualsiasi insediamento nel deserto può raggiungere uno status simile."

 comprehensive_land_survey: "Rilevamento Completo delle Terre"
 comprehensive_land_survey_desc: "Per sapere chi deve pagare le tasse, dobbiamo prima sapere chi possiede cosa. È quindi essenziale effettuare un rilevamento completo delle terre e aggiornarlo regolarmente. Otterremo sempre ciò che ci spetta!"

 counting_the_people: "Contare le Persone"
 counting_the_people_desc: "Ora che sappiamo chi possiede cosa, il passo logico successivo è quello di avere un'idea più chiara di chi vive dove. Questo ci dirà dove cercare quando avremo bisogno di nuove reclute per i nostri eserciti."

 cosmopolitan_court: "Corte Cosmopolita"
 cosmopolitan_court_desc: "Persone provenienti da ogni parte del mondo ammirano la bellezza e la raffinatezza della nostra corte musulmana. Siamo quindi diventati una destinazione attraente per luminari di talento di ogni tipo, il che non fa che aumentare il dinamismo e il prestigio della nostra corte."

 caliphate: "Ḵilāfa"
 caliphate_desc: "Il #italic Ḵilāfa#!, o Califfato, è l'unione di tutti i fedeli musulmani sotto un unico sovrano nella forma del $rank_empire_muslim_ruler_male$, che è il successore politico e spirituale di Maometto, la pace sia con lui. Sebbene ci siano idee diverse su chi sia idoneo a diventare $rank_empire_muslim_ruler_male$, l'idea di tutti gli Islam uniti sotto un'unica bandiera è sempre stata l'obiettivo principale di questo processo."

 ibadi_imamate: "Imamato Ibadi"
 ibadi_imamate_desc: "A differenza del $caliphate$ o di un Imām sciita nominato divinamente, un Imām ibadi non governa l'intero mondo musulmano, ma governa a livello locale. Ogni comunità può essere governata in modo indipendente dal proprio Imām."

 contacts_network: "Rete di Contatti"
 contacts_network_desc: "L'ampia portata dell'Islam ha portato i paesi musulmani a entrare in contatto con molte terre straniere diverse. Mantenere una ricca rete di contatti internazionali come la nostra è sempre vantaggioso per la diplomazia."

 infiltration_tactics: "Tattiche di Infiltrazione"
 infiltration_tactics_desc: "Sebbene l'antico ordine $nizari_school$ sciita degli #italic Ḥashshāshīyīn#! sia stato in gran parte mitizzato oltre il suo scopo originale, le loro tattiche di sotterfugio e assassinio erano innegabilmente efficaci. Se impieghiamo noi stessi tali tattiche di infiltrazione, dovremmo trarne lo stesso successo."

 unified_armies: "Eserciti Unificati"
 unified_armies_desc: "Non si può negare che l'Islam si sia diffuso in molte culture e popoli diversi dalla sua comparsa in $arabia_region$. Finché credono nel $muslim_god_name$, chiunque dovrebbe poter combattere in suo nome, indipendentemente dalla propria origine."

 harsh_environments: "Ambienti Ostili"
 harsh_environments_desc: "Fin dalla sua nascita, l'Islam ha trovato la sua strada verso civiltà in alcuni degli ambienti più ostili del mondo. Se qualcuno al di fuori della nostra regione tentasse di invadere i nostri territori, lo troverebbe diabolicamente difficile, come è giusto che sia!"

 four_noble_truths: "Quattro Nobili Verità"
 four_noble_truths_desc: "Gli insegnamenti fondamentali del Buddha, il $four_noble_truths$, spiegano la realtà dell'essere. Nulla è permanente, il che causa dolore allo spirito, a causa del suo attaccamento a questa esistenza transitoria. Questo dolore spirituale può essere alleviato solo liberandosi dal desiderio e lasciando andare questi attaccamenti, cosa che si ottiene seguendo il $noble_eightfold_path$."

 noble_eightfold_path: "Nobile Ottuplice Sentiero"
 noble_eightfold_path_desc: "Il percorso per liberarsi dal Saṃsāra e raggiungere il Nirvāṇa, il $noble_eightfold_path$ è la più pura distillazione delle pratiche buddiste. Dettando sia lo stato mentale che le azioni fisiche, determina il comportamento corretto per ogni seguace del Buddismo."

 middle_way: "Via di Mezzo"
 middle_way_desc: "Il Buddha ci insegna che dovremmo evitare gli estremi, poiché né con l'indulgenza sensuale né con l'ascetismo estremo si può raggiungere l'illuminazione."

 three_jewels: "Tre Gioielli"
 three_jewels_desc: "Il $three_jewels$, o Tre Rifugi, sono i tre pilastri in cui un seguace del Buddismo trova rifugio. Questi rifugi sono il #italic Buddha#!, l'illuminato; il #italic Dharma#!, gli insegnamenti del Buddha; e il #italic Saṃgha#!, la comunità monastica che preserva il Dharma."

 buddhist_syncretism: "Sincretismo buddista"
 buddhist_syncretism_desc: "Il Buddismo ha le sue origini in $india$, ma da allora si è diffuso in lungo e in largo, entrando in contatto con molte credenze diverse. Come tale, contiene molto sincretismo non solo con le precedenti tradizioni indù, ma anche con le molte altre divinità a cui è stato esposto."

 sutra: "Sūtra"
 sutra_desc: "Un tipo di testo sacro sia nella religione dharmica che in quella buddista, che varia per formato e contenuto. Indipendentemente da ciò, sono sempre considerati fonti valide di conoscenza e il loro studio approfondito è necessario per sviluppare il proprio spirito."

 buddhist_councils: "Concili buddisti"
 buddhist_councils_desc: "Nel corso della storia buddista, i concili monastici hanno discusso i testi canonici delle diverse scuole. Sebbene la forma specifica, i risultati e le registrazioni dei concili possano variare da scuola a scuola, il potere unificante di tali concili, che portano al dialogo tradizioni diverse, non deve essere sottovalutato."

 buddhist_canon: "Canone buddista"
 buddhist_canon_desc: "Chiamato con nomi diversi e contenente anche testi diversi, a seconda del ramo del Buddismo, il $buddhist_canon$ è una raccolta di testi sacri buddisti. Contenente tutto, dalle regole monastiche ai #italic Sūtra#!, o insegnamenti del Buddha, chiunque si dedichi al Buddismo dovrebbe averne familiarità."

 pali_canon: "Canone $pali_language$"
 pali_canon_desc: "Sebbene esistano molti canoni diversi nel Buddismo, a seconda della scuola, il theravāda $pali_canon$ è il più antico e prestigioso. Altre scuole hanno creato i loro canoni da un mix di testi con varie fonti, ma il $pali_canon$ è rimasto invariato dai tempi di Ashoka "il Grande" e contiene le parole dello stesso Buddha. È stato anche alla base di molte altre scuole."

 buddhist_universities: "Università buddiste"
 buddhist_universities_desc: "Sin dall'antichità, i centri buddisti sono stati anche centri di apprendimento e conoscenza, attirando persone da ogni parte del mondo per studiare nelle nostre istituzioni. Nālandā era il più grande di questi centri in passato, ma molti altri hanno seguito le sue orme da allora."

 xuanzang_travels: "Viaggi di Xuánzàng"
 xuanzang_travels_desc: "Xuánzàng, un monaco buddista $chinese_group$ vissuto durante la dinastia Táng nel VII secolo, intraprese un viaggio via terra di diciassette anni in $india$ per visitare i suoi centri di apprendimento e raccogliere un gran numero di testi buddisti. Tra gli altri luoghi visitò Nālandā, dove imparò dai migliori maestri, e al suo ritorno in $china$ portò con sé più di mille documenti, che diedero un grande contributo al Buddismo Orientale. Il suo viaggio e i suoi appunti servirono da base per il racconto #italic Viaggio in Occidente#!, in cui un monaco viene incaricato dal Buddha di recarsi in $india$ alla ricerca di alcuni testi sacri, accompagnato tra gli altri dal Re Scimmia, Sūn Wùkōng."

 silk_road_transmission: "Trasmissione della Via della Seta"
 silk_road_transmission_desc: "È innegabile l'effetto che la Via della Seta ha avuto sulla diffusione del Buddismo. Sia via terra che via mare, il commercio ha permesso al Buddismo di diffondersi lontano dalle sue origini in $india$."

 bodhisattva: "Bodhisattva"
 bodhisattva_desc: "Indipendentemente dalla scuola di Buddismo a cui si aderisce, un $bodhisattva$ è una figura importante, anche se le sue caratteristiche e la sua importanza variano a seconda delle diverse tradizioni. In tutti i casi, tuttavia, meritano riverenza e ammirazione."

 avalokitesvara: "Avalokiteśvara"
 avalokitesvara_desc: "Conosciuto anche come Guānyīn o Kannon, il $avalokitesvara$ è uno dei Bodhisattva più venerati. Rappresentato come maschio o femmina a seconda della scuola, e in alcune addirittura considerato l'origine di tutte le divinità indù, il $avalokitesvara$ è il $bodhisattva$ della compassione ed è associato al mantra #italic Oṃ maṇi padme hūm̐#!."

 maitreya: "Maitreya"
 maitreya_desc: "$maitreya$ è attualmente un $bodhisattva$, profetizzato per essere il futuro e ultimo Buddha dell'era attuale. Il suo destino è ristabilire gli insegnamenti del Dharma nel mondo dopo che sono stati dimenticati dall'umanità, e per questo è il successore di Siddhārtha Gautama."

 mount_meru: "Monte Meru"
 mount_meru_desc: "Il $mount_meru$ è la montagna sacra al centro dell'universo sia in senso fisico che spirituale per l'Induismo, il Buddismo e il Giainismo. Come è il centro attorno al quale ruota tutto il resto, così il nostro intero paese ruota attorno al nostro sovrano."

 naraka: "Naraka"
 naraka_desc: "Chiamato anche #italic Niraya#!, il $naraka$ si riferisce ai regni della sofferenza dove il karma negativo di una persona viene purificato prima della reincarnazione. Esistono molti regni del $naraka$, e sia il tempo che un individuo deve trascorrere in essi sia le punizioni che riceverà durante tale permanenza dipendono da quanto karma deve guadagnare prima di rinascere in uno dei regni superiori."

 four_heavenly_kings: "Quattro Re Celesti"
 four_heavenly_kings_desc: "Ciascuno presiede uno dei punti cardinali, i $four_heavenly_kings$ hanno il compito di proteggere il regno dei Deva dagli Asura. Sono anche responsabili di valutare la virtù e la moralità dei mortali."

 vegetarianism: "Vegetarianismo"
 vegetarianism_desc: "Sebbene dipenda dalla scuola, nel Dharma esistono alcune regole riguardanti l'astinenza dal consumo di carne. Ogni scuola ha opinioni diverse sulla severità di questa astinenza e anche sul fatto che debba applicarsi solo alla comunità monastica o alla popolazione in generale."

 edicts_of_ashoka: "Editti di Ashoka"
 edicts_of_ashoka_desc: "Codice legale pubblicato dall'imperatore Ashoka "il Grande" nel III secolo a.C., questi editti includono restrizioni che promuovono il Buddismo. Sebbene questo codice risalga a molti secoli fa, merita ancora rispetto e riverenza da parte di tutti i fedeli buddisti."

 five_precepts: "Cinque Precetti"
 five_precepts_desc: "Codice fondamentale dell'etica e della moralità del buddismo, i $five_precepts$ rappresentano le regole più basilari che i credenti devono seguire il Buddismo, sia che facciano parte della comunità monastica ordinata o meno. Essi insegnano alle persone ad astenersi dall'uccidere, rubare, commettere atti sessuali illeciti, mentire e intossicarsi."

 monastic_communities: "Comunità Monastiche"
 monastic_communities_desc: "La vita buddista è incentrata sulle comunità di monaci e monache, chiamate #italic Saṃgha#!. Sono governate dal #italic Vinaya#!, le regole e i precetti che regolano il funzionamento di qualsiasi comunità religiosa buddista."

 prestigious_schools: "Scuole Prestigiose"
 prestigious_schools_desc: "Il Buddismo ha sviluppato una miriade di scuole, ciascuna incentrata su un tipo di comunità monastica e che dichiara una preferenza per determinati testi. Tuttavia, alcune di queste scuole hanno ottenuto riconoscimento, mentre altre sono state relegate nell'oscurità. Associarsi alle scuole più prestigiose conferisce anche a queste persone un po' di prestigio."

 offerings: "Offerte"
 offerings_desc: "È un precetto del Buddismo fare offerte al $three_jewels$ per accumulare meriti. Queste offerte possono essere materiali o immateriali, e alcune comunità monastiche dipendono completamente dal cibo donato dai loro seguaci per la loro sopravvivenza."

 incense_burning: "Bruciare Incenso"
 incense_burning_desc: "La pratica di bruciare incenso è un elemento fondamentale di qualsiasi rituale o offerta nel Buddismo. Di forme e dimensioni diverse, è comune sia per i laici che per i monaci e le monache ordinati accendere incenso prima di eseguire qualsiasi rituale o meditazione. Per questo motivo, l'odore dell'incenso permea costantemente qualsiasi tempio buddista."

 ascetic_practices: "Pratiche Ascetiche"
 ascetic_practices_desc: "Sebbene il Buddha ci abbia messo in guardia dai pericoli dell'ascetismo estremo, alcuni membri della comunità monastica continuano a praticare queste rigide pratiche. Limitare il tipo di abiti che possono indossare, il cibo che possono mangiare o il luogo in cui possono vivere sono alcune delle restrizioni adottate da coloro che desiderano seguire questa strada. Sebbene un comportamento così sobrio non sia un requisito per ottenere meriti, esso ha i suoi vantaggi per chi lo pratica."

 mindfulness: "Consapevolezza"
 mindfulness_desc: "Parte essenziale della pratica buddista, $mindfulness$ significa essere consapevoli dei fenomeni sia del corpo che della mente, mantenendo sempre presenti nella mente gli insegnamenti del Buddha. In questo modo, si può evitare il sorgere di stati indesiderati e sviluppare quelli desiderati."

 dana: "Dāna"
 dana_desc: "Denotando generosità, $dana$ è definito come l'atto di dare senza nulla in cambio, ed è una virtù chiave in tutte le religioni legate al Dharma. Aiutare gli altri disinteressatamente, sia individualmente che comunitariamente, è uno dei modi chiave per accumulare karma."

 ahimsa: "Ahiṃsā"
 ahimsa_desc: "Il concetto di $ahimsa$, o non violenza, è una virtù fondamentale in tutte le religioni che seguono il Dharma. Qualsiasi conflitto è incoraggiato a essere risolto pacificamente attraverso il dialogo, piuttosto che con l'uso della forza. Sfortunatamente, questo non è sempre possibile, ma la violenza dovrebbe sempre essere l'ultima risorsa e il suo uso deve essere giusto."

 resistance_to_persecution: "Resistenza alla Persecuzione"
 resistance_to_persecution_desc: "Sebbene si sia diffuso ampiamente in tutto il mondo, il Buddismo ha anche subito la sua parte di persecuzioni nel corso dei secoli. I suoi templi e le sue immagini possono essere stati distrutti, i suoi seguaci massacrati o costretti a nascondersi, ma ciononostante i suoi fedeli hanno perseverato."

 buddhist_meditation: "Meditazione buddista"
 buddhist_meditation_desc: "La meditazione è una pratica comune tra tutti i seguaci buddisti, indipendentemente dalla loro scuola. L'obiettivo è quello di allenare la mente e lo spirito a sviluppare consapevolezza, tranquillità e intuizione, e quindi raggiungere infine l'illuminazione."

 sruti: "Śruti"
 sruti_desc: "Significa "ciò che si ascolta", i $sruti$ sono i testi più sacri e antichi dell'Induismo. Sono considerati una rivelazione divina e quindi non attribuiti ad autori umani, anche se alcuni negano la loro origine divina pur accettandone l'autorità."

 vedah: "Vēdaḥ"
 vedah_desc: "I testi principali tra i $sruti$ sono i $vedah$, che sono i testi $sanskrit_language$ più antichi. La loro paternità è attribuita a Brahmā nel $mahabarata$, e sono il Ṛgveda, lo Yajurveda, il Sāmaveda e l'Atharvaveda."

 smrti: "Smṛti"
 smrti_desc: "Significa "ciò che viene ricordato"; i testi $smrti$ sono ispirati o hanno origine dal $vedah$ e sono quindi considerati meno autorevoli rispetto al $sruti$ poiché da esso derivano. Tuttavia, a differenza del $sruti$, i testi $smrti$ hanno un autore attribuito e vengono tramandati attraverso manoscritti."

 mahabarata: "Mahābhārata"
 mahabarata_desc: "Uno dei due maggiori testi $smrti$ insieme al $ramayana$, il $mahabarata$ è un'epica dell'antica $india$. È il poema epico più lungo mai scritto, circa dieci volte più grande dell'#italic Iliade#! e dell'#italic Odissea#! in $greek_language$ combinate, e narra la storia di una lotta dinastica per il trono dell'antico regno $indian_group$ di Kuru culminante nella Guerra di Kurukshetra, chiamata anche Guerra del $mahabarata$. La storia termina con la morte di $krishna_avatar$ e la fine della sua dinastia."

 ramayana: "Rāmāyaṇa"
 ramayana_desc: "Uno dei due testi $smrti$ più importanti insieme al $mahabarata$, il $ramayana$ è un'epopea dell'antica $india$. Narra la vita di $rama_avatar$, avatar di $vishnu_god$, come principe del regno di Kosala. Enfatizza l'importanza della virtù in tutti gli aspetti della vita di una persona."

 purana: "Purāṇa"
 purana_desc: "Considerati parte del $smrti$, i $purana$ sono testi con una varietà di contenuti. Cosmologia, genealogie divine, astronomia, grammatica, storie d'amore... quasi tutto può essere trovato al loro interno. In quanto tali, anche se non fanno parte dei $sruti$, la loro influenza sulle credenze e sulla società indù è forte, poiché combinano diverse credenze e tradizioni locali nella narrazione comune del $vedah$."

 atman: "Ātman"
 atman_desc: "Indica il Sé vero, eterno e immutabile, l'essenza della coscienza di ogni individuo. Secondo le scuole $astika$, questo $atman$ è distinto dalla mente e dal corpo, ed è anche diverso dal Jivātman che persiste attraverso più vite. Al contrario, le scuole $nastika$ interpretano il concetto in modo diverso, o lo rifiutano completamente."

 nastika_schools: "Scuole Nāstika"
 nastika_schools_desc: "Alcune scuole di pensiero in Induismo si discostano dalla corrente principale, rifiutando l'autorità del $vedah$ e l'esistenza del $atman$. Queste scuole, come il Giainismo e il Buddismo, sono quindi eterodosse, sebbene contengano ancora molte delle credenze fondamentali condivise dall'Induismo."

 astika_schools: "Scuole Āstika"
 astika_schools_desc: "Chiamate scuole ortodosse dell'Induismo, accettano l'autorità del $vedah$ e l'esistenza del $atman$. Sebbene siano costituite da molti rami diversi, questa comunanza di accettazione conferisce al $astika_schools$ molti punti in comune."

 diversity_of_beliefs: "Diversità di Credenze"
 diversity_of_beliefs_desc: "Le credenze del popolo dell'$india$ ruotano attorno al concetto di Dharma e al testo del $vedah$, ma si manifestano in una miriade di forme e pratiche. Anche gli dei riconosciuti e venerati non sono gli stessi per tutti, ma è presente un filo conduttore di concetti comuni."

 ishvara: "Īśvara"
 ishvara_desc: "Interpretato in modo diverso a seconda della scuola o del ramo dell'Induismo, il $ishvara$ si riferisce all'Essere Supremo o a Dio. Pertanto, può riferirsi al $shiva_god$ per il $shaivism$, al $vishnu_god$ per il $vaishnavism$ o a qualsiasi dio personale dell'individuo."

 sanskritization: "Sanskritizzazione"
 sanskritization_desc: "L'Induismo si è diffuso molto oltre le sue origini in $india$, e molte altre culture e paesi hanno adottato i concetti e i titoli del $sanskrit_language$ per riferirsi alla propria identità. In quanto tale, i concetti dell'Induismo si sono permeati e fusi senza soluzione di continuità nelle credenze straniere."

 bhakti_movement: "Movimento Bhakti"
 bhakti_movement_desc: "Nato nel VI secolo, questo movimento promuove l'amore e la devozione verso il proprio dio personale o verso un individuo illuminato. Attira la popolazione laica parlandole direttamente nei suoi termini. Si tratta di un movimento molto influente, che sta cambiando il modo in cui la religione e le credenze sono comprese dalla nostra gente."

 yoga: "Yoga"
 yoga_desc: "Importante scuola e filosofia indù, lo $yoga$ è un insieme di pratiche sia fisiche che spirituali, con lo scopo di controllare la mente e il corpo. Praticata da millenni, è diventata quasi sinonimo del percorso verso l'illuminazione."

 diwali: "Diwali"
 diwali_desc: "Chiamata la festa della luce, il $diwali$ è il momento in cui celebriamo il trionfo del Dharma, la vittoria del bene sul male e della luce sulle tenebre. Accendiamo candele e lanterne per simboleggiare questa vittoria e onoriamo i nostri antenati."

 holi: "Holi"
 holi_desc: "Tenuto all'inizio della primavera per celebrare il suo arrivo, il $holi$ è la festa dei colori e dell'amore. Commemoriamo l'agricoltura e i buoni raccolti, e allo stesso tempo godiamo della miriade di colori che la primavera offre. È anche il momento di divertirsi e risolvere i conflitti, rimuovendo le proprie impurità emotive."

 holy_rivers: "Fiumi Sacri"
 holy_rivers_desc: "I fiumi e la loro venerazione sono sempre stati una parte importante dell'Induismo. Dall'Indo al Gange, ci sono molti fiumi considerati sacri, sulle cui rive si svolgono molti rituali. Le loro acque sono considerate sacre e sono un luogo comune per i rituali di purificazione."

 advaita_vedanta: "Advaita Vedānta"
 advaita_vedanta_desc: "Rifiutando il dualismo tra coscienza e materia, l'$advaita_vedanta$ afferma che l'$atman$, o sé interiore o coscienza, è uno e lo stesso della realtà suprema o coscienza dell'universo, Brahman. In questo senso, il mondo materiale fisico è solo un'illusione che nasconde la realtà ultima del Brahman."

 hindu_muslim_relations: "Relazioni indù-Musulmane"
 hindu_muslim_relations_desc: "In passato ci sono state molte interazioni tra Induismo e Islam, e continueranno ad essercene. I nostri popoli hanno imparato a convivere pacificamente e c'è stato persino un certo grado di sincretismo tra le due fedi."

 hindu_unification: "Unificazione indù"
 hindu_unification_desc: "Nonostante le differenze di credenze e pratiche in tutto l'Induismo, ci sono più punti in comune che differenze tra noi. Ha iniziato a emergere una visione comune e unificata dell'Induismo, e il nostro popolo può acquisire un grande senso di unità attraverso di essa."

 hindu_architecture: "Architettura indù"
 hindu_architecture_desc: "Indipendentemente dallo stile di costruzione, che si tratti di Śikhara, Vimāna o Prāṅg, i templi indù sono riconoscibili ovunque per le loro torri alte e decorate. Rappresentazione del $mount_meru$, più o meno enfatizzata a seconda della regione, queste guglie fungono sia da segno di fede che da dimostrazione di potere."

 varna_system: "Sistema Varṇa"
 varna_system_desc: "Sin dai tempi del $vedah$, esiste il concetto secondo cui il Dharma di una persona può essere classificato in uno dei quattro possibili: #italic Brāhmaṇa#!, studiosi o sacerdoti; #italic Kṣatriya#!, governanti o guerrieri; #italic Vaiśya#!, agricoltori o mercanti; o #italic Śūdra#!, artigiani o servitori. Queste classificazioni non sono rigide, ma rappresentano piuttosto l'ideale della vocazione di un individuo e hanno avuto una grande influenza sulla società indù."

 extreme_pacifism: "Pacifismo Estremo"
 extreme_pacifism_desc: "Basandosi sul concetto di $ahimsa$, l'Induismo sostiene sempre il pacifismo e la non violenza. Tuttavia, i nostri nemici dovrebbero comunque stare attenti a non provocarci, per non rischiare che, una volta spinti alla guerra, finiamo per rappresentare l'estremo opposto."

 hindu_empires: "Impero indù"
 hindu_empires_desc: "Nel passato ci sono stati molti imperi che hanno seguito l'Induismo. Dagli imperi Maurya e Gupta in $india$, all'impero Śrīvijaya in $indonesia_region$, alla longeva dinastia Chola, l'Induismo è sempre stato la forza spirituale dietro il trono di potenti sovrani."

 sacred_cattle: "Bestiame Sacro"
 sacred_cattle_desc: "Come parte del $ahimsa$, è proibito macellare il bestiame. Gli animali sono invece rispettati e venerati come figure materne e sono simboli di provvidenza e sacrificio altruistico. Adorati fin dai tempi del $vedah$, godono ancora di enorme rispetto e attenzione."

 riches_of_asia: "Ricchezze del $asia$"
 riches_of_asia_desc: "Il $asia$ è famoso in tutto il mondo per le sue ricchezze. Dalle ricche città della $persia_region$ e dell'$india$, ai ricercatissimi articoli di lusso prodotti in $china$, alle quasi mitiche Isole delle Spezie in $indonesia_region$, i beni di lusso provenienti dal $asia$ sono molto apprezzati in tutto il mondo."

 silk_road: "Via della Seta"
 silk_road_desc: "Che si tratti della via terrestre che attraversa il deserto del Gobi e la $persia_region$, o della sua controparte oceanica attraverso il $indian_ocean_region$ e il $indonesia_region$, le terre del $asia$ sono state per secoli attraversate da mercanti in cerca di profitto sulla famosa Via della Seta."

 exchange_of_ideas: "Scambio di Idee"
 exchange_of_ideas_desc: "Non solo monete e profitti circolano lungo il $silk_road$, ma anche idee e conoscenze seguono il flusso e riflusso dei mercanti che viaggiano lungo il suo percorso."

 legacy_of_great_empires: "Eredità di Grandi Imperi"
 legacy_of_great_empires_desc: "Dal Trono del Drago della $china$, ai vari imperi della $persia_region$, alle potenti dinastie indù e buddiste di $india$ e $south_east_asia$, l'$india$ è stata sede di molti potenti imperi nel corso della storia."

 arduous_terrain: "Terreno Impervio"
 arduous_terrain_desc: "Il $asia$ ospita alcune terre molto inospitali, dalle alte vette dell'Himalaya, all'arida distesa del deserto del Gobi, alle fitte giungle dell'$india$ e del $south_east_asia$. E questo senza contare le stagioni dei monsoni e dei tifoni e la presenza quasi costante dei terremoti! La sua popolazione ha imparato a vivere in un ambiente così ostile, ma gli invasori non lo troveranno affatto facile."

 fertile_lands: "Terre Fertili"
 fertile_lands_desc: "In generale, le terre del $asia$ sono benedette da piogge abbondanti e molti fiumi attraversano i suoi territori anche nelle zone con precipitazioni minori. Ad eccezione di alcune delle zone più aride del deserto, la nostra terra fornisce cibo in abbondanza alla nostra popolazione. Anche nelle regioni in cui ciò non avviene, le persone che vi abitano sono in grado di fare molto con ciò che hanno."

 crossroads_of_religions: "Crocevia di Religioni"
 crossroads_of_religions_desc: "L'Induismo, il Buddismo, l'Islam e persino il $tengri$ sono religioni che si sono espanse in parti del mondo molto lontane dai loro luoghi di origine. Il $asia$ ha assistito per secoli a questo scambio di credenze e, in molti casi, alla fusione e al sincretismo che si è verificato tra di esse."

 religious_syncretism: "Sincretismo Religioso"
 religious_syncretism_desc: "L'interazione tra le credenze a volte porta alla sintesi piuttosto che al rifiuto. I pensieri e le pratiche straniere non dovrebbero quindi essere visti come minacce ostili, ma come opportunità per imparare e possibilmente incorporare elementi preziosi nelle nostre tradizioni."

 source_of_knowledge: "Fonte di Conoscenza"
 source_of_knowledge_desc: "Mentre le nazioni straniere si vantano di essere all'avanguardia nella conoscenza e nello sviluppo, alcune delle loro recenti "invenzioni" sono note in $asia$ da secoli. Dalle prodezze tecnologiche della $china$ all'antica letteratura dell'$india$, non c'è nulla che l'Oriente debba invidiare all'Occidente."

 structured_society: "Società Strutturata"
 structured_society_desc: "Le tradizioni religiose e filosofiche, in particolare quelle dell'Induismo e del $SECT_CONFUCIANISM_NAME$, hanno storicamente influenzato l'organizzazione sociale in alcune parti del $asia$, sottolineando l'importanza dell'adempimento dei ruoli prescritti all'interno delle gerarchie sociali. La rigidità della vita all'interno di questi sistemi è compensata dalla relativa facilità con cui viene mantenuto l'ordine sociale."

 incense_preeminence: "Preminenza del $incense$"
 incense_preeminence_desc: "Il $incense$ è stato un elemento fondamentale della vita in $asia$ per secoli, forse più che in qualsiasi altra parte del mondo. Sebbene anche altre religioni lo utilizzino per i loro rituali, la sua quasi onnipresenza nelle cerimonie indù e buddista, così come il suo uso quotidiano da parte del popolo dell'Islam, gli conferiscono una presenza costante in qualsiasi parte del $asia$."

 incense_trade_route: "La Rotta Commerciale dell'$incense$"
 incense_trade_route_desc: "L'elevata domanda di $incense$, non solo in $asia$ ma anche oltre i suoi confini, richiede la creazione di molte rotte commerciali dedicate al suo commercio. Simile al più famoso $silk_road$, questo commercio del $incense$ collega l'Oriente con l'Occidente."

 wake_of_the_mongol_horde: "Scia dell'Orda Mongola"
 wake_of_the_mongol_horde_desc: "Non c'è quasi nessun luogo in $asia$ che non abbia subito l'influenza delle conquiste mongole. Dopo la caduta del grande impero un tempo forgiato dal $genghis_khan_name_no_tooltip$, la terra si sta finalmente riprendendo dall'essere stata calpestata dai suoi cavalli."

 cultural_melting_pot: "Crogiolo Culturale"
 cultural_melting_pot_desc: "Il $asia$ è una regione altamente diversificata, sede di un'ampia varietà di culture. Questa diversità, e lo scambio culturale e le influenze miste che ne derivano, hanno dato forza ai nostri paesi e hanno permesso loro di prosperare in ogni campo, dall'architettura alla musica, all'orticoltura e oltre."

 rise_of_great_individuals: "Ascesa di Grandi Individui"
 rise_of_great_individuals_desc: "La storia dimostra che gli individui più straordinari sono quelli che raggiungono la notorietà e realizzano grandi cose. Più volte gli imperi sono stati forgiati o distrutti dalla mano di un singolo sovrano, e tali risultati devono essere rispettati e ammirati."

 the_pentarchy: "La Pentarchia"
 the_pentarchy_desc: "La vecchia struttura della Chiesa formulata dall'imperatore Giustiniano è ancora in vigore nell'Ortodossia. Sebbene il patriarca del $rome$ si consideri al di sopra di tutto, per la Chiesa #italic autentica#! le città di $constantinople$, $alexandria$, $antioch$ e $jerusalem$ rimangono molto più importanti."

 imperial_creed: "Credo Imperiale"
 imperial_creed_desc: "L'Ortodossia è stata la fede ufficiale dell'Impero Romano sin dalla sua adozione del Cristianesimo. Le eresie dell'Occidente e i loro falsi "imperatori" non saranno in grado di screditare la nostra legittimità."

 filioque_issue: "Questione del Filioque"
 filioque_issue_desc: "L'aggiunta eretica della clausola #italic Filioque#!, che afferma che lo Spirito Santo procede dal Padre "e dal Figlio", è stata fatta senza convocare il concilio ecumenico appropriato, e quindi è illegittima. Noi siamo i custodi della vera preghiera, e il $rome$ sarà dannato per la sua eresia!"

 septuagint: "Settanta"
 septuagint_desc: "Il nostro Antico Testamento è codificato in $greek_language$, utilizzando la versione conosciuta come $septuagint$, che è una traduzione dal $hebrew_language$ realizzata nel III secolo a.C. È stato scritto da settantadue traduttori isolati, che hanno tutti elaborato le stesse identiche traduzioni in modo indipendente. È quindi sicuramente di ispirazione divina e parola diretta di Dio."

 anagignoskomena: "Anagignoskomena"
 anagignoskomena_desc: "La nostra Bibbia contiene tutti i libri degni di venerazione e studio, anche se alcuni possono avere meno importanza di altri. I $anagignoskomena$ non sono presenti nella Bibbia del $hebrew_language$, quindi ricevono meno attenzione rispetto ad altri testi, ma sono comunque degni di essere letti e non dovrebbero essere ignorati."

 church_guidance: "Guida della Chiesa"
 church_guidance_desc: "Le Scritture sono la Parola di Dio, ma solo la Chiesa è in grado di interpretarne il significato corretto e di trasmetterlo accuratamente al gregge. Qualsiasi lettura o interpretazione indipendente delle Scritture al di fuori della guida della Chiesa porterebbe solo a perdersi nelle falsità e sulla via dell'eresia."

 unchanging_tradition: "Tradizione Immutabile"
 unchanging_tradition_desc: "La tradizione tramandataci da Gesù Cristo e dagli apostoli è coerente, senza alcuna modifica, aggiunta o sottrazione. La nostra fede è innegabile nelle sue verità, e ciò che è fondamentalmente vero su questo mondo non può essere cambiato da mani mortali."

 church_councils: "Concili della Chiesa"
 church_councils_desc: "Poiché la Chiesa deve essere unita nei suoi giudizi, qualsiasi questione troppo complessa per essere risolta da un singolo vescovo richiede la convocazione di un concilio, in cui i vescovi consulteranno la mente della Chiesa stessa. Le decisioni del concilio rifletteranno quindi il consenso della Chiesa nel suo insieme."

 greek_rite: "Rito $greek_culture$"
 greek_rite_desc: "I nostri riti e le nostre pratiche canoniche sono stati per secoli ben definiti seguendo i riti greci di $constantinople$. Sebbene possano esserci alcune piccole variazioni in certi luoghi, c'è una notevole omogeneità nei riti celebrati in tutta la tradizione ortodossa."

 physical_body_of_christ: "Corpo Fisico di Cristo"
 physical_body_of_christ_desc: "La nostra Chiesa è la manifestazione fisica del Corpo di Cristo sulla Terra, senza alcuna differenza da quello in Cielo. In quanto tale, la Chiesa è l'incarnazione fisica del Signore Salvatore, inviato per il bene del Suo popolo."

 sight_veneration: "Venerazione delle Icone"
 sight_veneration_desc: "L'aspetto più importante della venerazione è che i fedeli ricordino le grandi opere, i miracoli e le figure attraverso i loro sensi naturali. In quanto tale, le nostre chiese sono adornate con immagini e colori vivaci, risuonano di musica e sono dolcemente profumate dal nostro incenso sacro, in modo che la presenza di Cristo sulla Terra possa essere immediatamente percepita da tutti all'interno."

 theotokos: "Theotokos"
 theotokos_desc: "La Vergine Maria è una figura chiave nella nostra fede, poiché ha adempiuto l'Antica Alleanza portando in grembo la Nuova Alleanza nella figura di Cristo. In quanto tale, essendo la portatrice di Cristo Dio incarnato, era letteralmente la Madre di Dio e occupa un posto di rilievo al di sopra di tutti gli altri santi."

 heavenly_architecture: "Architettura Celeste"
 heavenly_architecture_desc: "Gli edifici religiosi ortodossi sono progettati a imitazione del cielo. La loro costruzione è incentrata sulla basilica, la cupola centrale che funge da tetto e simboleggia i cieli. Riccamente decorati con bellissime immagini e icone dorate scintillanti, sono una meraviglia da vedere."

 iconostasis: "Iconostasi"
 iconostasis_desc: "Una caratteristica fondamentale di ogni chiesa ortodossa è l'$iconostasis$, una parete di icone che separa il corpo principale dell'edificio dall'altare. Le icone che contiene servono a visualizzare il legame tra i fedeli e il Santo dei Santi, e quindi il legame tra il cielo e il popolo, fungendo da guida per il popolo verso il cielo."

 julian_calendar: "Calendario Giuliano"
 julian_calendar_desc: "Il tempo del nostro paese e della nostra Chiesa è stato per secoli misurato dal $julian_calendar$, promulgato da Giulio Cesare nel 46 a.C. Non solo unifica tutte le nazioni cristiane orientali, ma serve anche a dettare quando le feste e le celebrazioni importanti devono essere tenute."

 paschal_cycle: "Ciclo Pasquale"
 paschal_cycle_desc: "L'Ortodossia contiene alcune feste mobili intorno alla #italic Pasqua#!, organizzate nel $paschal_cycle$. Le dieci settimane prima della Pasqua sono chiamate #italic Triodion#!, mentre i cinquanta giorni dopo la Pasqua sono chiamati #italic Pentekostárion#!. Questo ciclo segna le celebrazioni più importanti dell'anno liturgico."

 oktoechos: "Oktōēchos"
 oktoechos_desc: "Un sistema a otto modi di scrivere musica, il $oktoechos$ è stato il sistema usato per scrivere canti e musica religiosa per la Chiesa per secoli. È il fondamento del canto ortodosso, sebbene con alcune variazioni tra le culture."

 prestigious_monasticism: "Monachesimo Prestigioso"
 prestigious_monasticism_desc: "In Ortodossia, il monachesimo e l'ascetismo sono molto apprezzati e quasi un requisito. Qualsiasi vescovo deve essere prima un monaco e deve diventare monaco prima di essere consacrato se non lo è già. Per questo motivo, i monasteri e i centri di monachesimo hanno un grande impatto sulla nostra vita clericale."

 national_rites: "Riti Nazionali"
 national_rites_desc: "La presenza di diversi patriarcati autocefali nella nostra Chiesa consente alcune variazioni tra i riti nazionali di ciascun paese. Tuttavia, l'unità del messaggio rimane e la Chiesa come entità unica non viene compromessa."

 heirs_of_rome: "Eredi di Roma"
 heirs_of_rome_desc: "Molti hanno affermato di essere gli eredi di Roma e dell'intero Impero Romano. Tuttavia, solo la nostra religione è la vera fede dell'antico Impero e quindi solo noi possiamo legittimamente affermare di esserne i diretti discendenti."

 legacy_of_saint_andrew: "Eredità di Sant'Andrea"
 legacy_of_saint_andrew_desc: "Secondo la leggenda, Sant'Andrea stesso visitò la Scizia e le coste settentrionali del $black_sea_area$, profetizzando un grande fiorire del Cristianesimo una volta raggiunto il futuro sito del $kyiv$."

 christianization_of_the_slavs: "Cristianizzazione degli Slavi"
 christianization_of_the_slavs_desc: "Il popolo della Rus' di Kiev fu tra i primi popoli slavi orientali ad accettare la luce di Cristo e a convertirsi all'ortodossia. Da lì, la fede si diffuse in tutta la regione."

 cyril_and_methodius: "Cirillo e Metodio"
 cyril_and_methodius_desc: "Due teologi bizantini del IX secolo, questi uomini furono determinanti per l'evangelizzazione degli slavi. A loro si deve lo sviluppo dell'alfabeto glagolitico, il primo mai utilizzato per trascrivere la lingua $church_slavonic_language$, e i loro seguaci svilupparono in seguito l'alfabeto cirillico, chiamandolo così in onore di Cirillo."

 interaction_between_church_and_state: "Interazione tra Chiesa e Stato"
 interaction_between_church_and_state_desc: "I patriarcati hanno autorità assoluta sulle proprie giurisdizioni e su coloro che le occupano. Legando la loro autorità a quella del sovrano, possiamo sfruttare le risorse della Chiesa e utilizzarle per rafforzare l'autorità dello Stato."

 outwards_expansion: "Espansione Verso l'Esterno"
 outwards_expansion_desc: "È sacro dovere della Chiesa portare la luce di Cristo ai pagani e agli infedeli. Dobbiamo andare oltre i nostri confini per portare la salvezza a ogni anima perduta!"

 justified_holy_wars: "Guerre Sante Giustificate"
 justified_holy_wars_desc: "Non possiamo permettere che i pagani e gli eretici dettino le nostre azioni. È nostro sacro dovere purificare la terra dalla loro impurità affinché il vero regno di Dio possa manifestarsi sulla Terra."

 resistance_to_the_infidels: "Resistenza agli Infedeli"
 resistance_to_the_infidels_desc: "I nostri fratelli ortodossi si sono trovati a volte sotto il giogo di infedeli stranieri. Tuttavia, abbiamo imparato a sopportare tale oppressione e persino a vivere in pace accanto a questi infedeli."

 eastern_ecumenism: "Ecumenismo Orientale"
 eastern_ecumenism_desc: "Le denominazioni cristiane appartenenti all'Ortodossia orientale sono spesso confuse con l'Ortodossia orientale da chi non è esperto in materia. Sebbene siano diverse da noi su molte questioni fondamentali, sono comunque parte cristiana e le nostre numerose affinità potrebbero essere utilizzate per riportarle alla fede corretta."

 structured_patriarchates: "Patriarcati Strutturati"
 structured_patriarchates_desc: "I nostri patriarcati sono sempre stati ben organizzati e strutturati, ciascuno con le proprie attribuzioni e delimitazioni. Ciò consente un miglior funzionamento della Chiesa, che porta a un miglior funzionamento dello Stato."

 second_council_of_ephesus: "Secondo Concilio di Efeso"
 second_council_of_ephesus_desc: "Il $second_council_of_ephesus$, convocato nel 449 su richiesta di papa Dioscoro di $alexandria$, fu un legittimo concilio cristiano nonostante la sua denuncia da parte della Chiesa Cattolica e Ortodossa. In questo concilio fu ufficialmente accettata la formula di Cirillo di Alessandria, secondo cui Cristo è una sola natura incarnata, sia umana che divina."

 rejection_of_chalcedon: "Rifiuto di Calcedonia"
 rejection_of_chalcedon_desc: "Poiché non accettarono il $second_council_of_ephesus$, il Concilio di Calcedonia fu convocato su richiesta di Papa Leone I, che chiese l'annullamento del $second_council_of_ephesus$. Noi rifiutiamo questo falso concilio e sosteniamo le decisioni prese in quello originale."

 monophysite_vs_miaphysite: "Monofisita vs miafisiti"
 monophysite_vs_miaphysite_desc: "Sebbene il Miafisismo proclami anche che la figura di Cristo ha solo una singola natura, differisce sostanzialmente dalla visione Monofisita Eutichiana che proclama che l'umanità di Cristo fu assorbita nella sua divinità. Anche se ci possono essere alcuni che ci chiamano anche seguaci del Monofisismo, è solo un accordo nelle parole, poiché nella sostanza le nostre opinioni sono chiaramente diverse."

 original_christianity: "Cristianesimo Originale"
 original_christianity_desc: "Ci sono state molte scissioni e divisioni nel mondo cristiano, ma il nostro credo affonda le sue radici nel vero Cristianesimo originale formulato dal Primo Concilio di Nicea. Ogni scissione dal ramo principale dopo questo è mera eresia."

 beyond_the_borders: "Oltre i Confini"
 beyond_the_borders_desc: "Il Cristianesimo ha indubbiamente avuto origine all'interno della culla dell'Impero Romano, e molti dei suoi rami si sono accontentati di rimanere in quella regione. Il Miafisismo, tuttavia, si trovava ai margini dell'Impero dopo essere stato denunciato dai Calcedoniani, e si è diffuso ben oltre il suo luogo di nascita, portando la luce di Dio nei luoghi più remoti."

 isolated_reaches: "Estensioni Isolate"
 isolated_reaches_desc: "Il Miafisismo è riuscito a diffondersi in luoghi molto lontani. Anche se circondata da nemici ed eretici, la nostra fede è rimasta forte."

 independent_leaders: "Leader Indipendenti"
 independent_leaders_desc: "A causa dell'isolamento del Miafisismo, a volte è stato difficile contattare altri patriarcati. Pertanto, i nostri leader hanno imparato ad agire in modo indipendente, pur mantenendo il più possibile i contatti con il resto del mondo cristiano."

 jerusalem_focus: "Focus sul $jerusalem$"
 jerusalem_focus_desc: "Teniamo sempre nella nostra mente la città santa del $jerusalem$, poiché non solo è stato il luogo in cui Gesù ha predicato ed è morto, ma anche dove tornerà nella sua seconda venuta. Per questo motivo, preghiamo sempre rivolti verso il $jerusalem$, indipendentemente da dove ci troviamo."

 acceptance_of_old_testament: "Accettazione dell'Antico Testamento"
 acceptance_of_old_testament_desc: "Alcune denominazioni cristiane hanno deciso di ridurre l'importanza dell'Antico Testamento, sostenendo che l'arrivo di Gesù lo sostituisce completamente. Noi, tuttavia, riteniamo che sia ancora rilevante e che alcune istruzioni in esso contenute siano valide come lo erano quando furono scritte."

 primacy_of_alexandria: "Primato del $alexandria$"
 primacy_of_alexandria_desc: "Sebbene il Miafisismo abbia molte filiali e leader indipendenti, riconosciamo il $alexandria$ e la sua sede come nostro leader spirituale. Tuttavia, questo è un segno di rispetto per il Trono Apostolico e un modo per onorarlo, piuttosto che un conferimento di prerogative speciali."

 school_of_alexandria: "Scuola di $alexandria$"
 school_of_alexandria_desc: "La Catechetica $school_of_alexandria$, presumibilmente fondata dallo stesso apostolo Marco, è la più antica scuola di catechismo al mondo. Qui si insegnano studi biblici e teologici sin dalla fondazione dello stesso Cristianesimo. Sebbene la scuola sia stata distrutta quando il vescovo di $rome$ è stato dichiarato superiore al patriarca di $alexandria$, la sua tradizione è sopravvissuta."

 preserving_of_local_languages: "Conservazione delle Lingue Locali"
 preserving_of_local_languages_desc: "Nonostante l'importanza del $greek_language$ e del $latin_language$ nel Cristianesimo antico, il Miafisismo ha conservato la sua liturgia in lingue vernacolari più locali, come il $coptic_language$, il $aramaic_language$ e il $armenian_language$. Lingue venerabili a pieno titolo, ogni ramo miafisiti conserva la propria lingua storica."

 double_patriarchate: "Doppio Patriarcato"
 double_patriarchate_desc: "Sia il $alexandria$ che il $antioch$ si considerano come due patriarcati diversi, uno per il Miafisismo e l'altro per l'Ortodossia. Sebbene entrambi possano rivendicare la legittimità, solo il Miafisismo conserva i veri patriarcati."

 eastern_christianity: "Cristianesimo Orientale"
 eastern_christianity_desc: "Noi facciamo parte del ramo del cosiddetto $eastern_christianity$, che amalgama molte denominazioni diverse con tradizioni teologiche e liturgiche diverse, ma anche con molti aspetti culturali comuni."

 life_among_infidels: "La Vita tra i Pagani"
 life_among_infidels_desc: "Le terre dei fedeli sono state spesso contaminate dalla presenza dei miscredenti, ma è per questo che i nostri ecclesiastici si sono avventurati verso l'ignoto per portare la luce di Gesù in terre lontane. Abbiamo così influenzato queste anime perdute in modi più di quanto ci si potesse aspettare, anche se non siamo stati in grado di far loro comprendere l'errore delle loro credenze."

 gradual_departure: "Partenza Graduale"
 gradual_departure_desc: "Sebbene ci abbiano rapidamente bollati come eretici, il Miafisismo non ha tagliato immediatamente i ponti con il resto del mondo cristiano. Abbiamo mantenuto i contatti con gli altri patriarcati e abbiamo partecipato ai concili, ma è diventato gradualmente chiaro che il Miafisismo è troppo diverso da quelle credenze eretiche."

 thrive_under_persecution: "Prosperare Sotto la Persecuzione"
 thrive_under_persecution_desc: "Sebbene i nostri fedeli siano stati perseguitati dagli eretici per secoli, le nostre credenze hanno resistito. Non importa quante volte ci abbatteranno, noi risorgeremo!"

 preserver_of_national_identity: "Preservare l'identità Nazionale"
 preserver_of_national_identity_desc: "È proprio a causa della nostra storia di persecuzioni e oppressioni che la nostra Chiesa si è assunta la responsabilità di preservare la nostra identità. È nel seno della Chiesa che le nostre lingue e tradizioni sono state custodite, e per questo abbiamo una fede incrollabile in questa istituzione."

 defense_against_heretics: "Difesa Contro gli Eretici"
 defense_against_heretics_desc: "Da quando ci siamo separati dalle altre fedi cristiane, gli eretici ci hanno accusato e condannato molte volte. Possono anche definirsi cristiane, ma le loro opinioni sono ovviamente offuscate, mentre la nostra visione è chiarita dalla luce di Dio."

 remote_patriarchates: "Patriarcati Remoti"
 remote_patriarchates_desc: "Le conquiste e le persecuzioni hanno costretto ripetutamente i nostri patriarcati a trasferirsi dopo che le loro sedi sono cadute sotto il controllo dei conquistatori pagani. Anche se ora operiamo da nuove sedi, quelle originali rimangono spiritualmente venerate nella nostra tradizione, sebbene da lontano."

 further_reaches: "Ulteriori Estensioni"
 further_reaches_desc: "Nonostante i numerosi tentativi dei non credenti di impedire la diffusione della nostra fede, essa è comunque giunta a molti popoli e culture diverse, portando luce ovunque si diffonda."

 internal_communion: "Comunione Interna"
 internal_communion_desc: "Nonostante abbiano patriarchi indipendenti, tutti i rami del Miafisismo mantengono una comunione reciproca. Questo li aiuta a costruire relazioni tra loro e promuove l'unità nella Chiesa."

 cradle_of_monasticism: "Culla del Monachesimo"
 cradle_of_monasticism_desc: "Il monachesimo in Cristianesimo è nato in $egypt_region$, quando i fedeli cristiani si ritirarono nel deserto per pregare e dedicare la loro vita a Dio. Il Miafisismo può quindi rivendicare questa storia come propria attraverso la tradizione alessandrina."

 unique_architecture: "Architettura Unica"
 unique_architecture_desc: "Il relativo isolamento dei nostri patriarcati ha portato allo sviluppo di stili architettonici unici per i nostri luoghi sacri. Sebbene altre denominazioni cristiane possano essere più importanti, la nostra affascinante architettura è fonte di ispirazione per i fedeli."

 medicinal_infusions: "Infusi Medicinali"
 medicinal_infusions_desc: "Le proprietà curative di alcune piante hanno aiutato il nostro popolo a superare diverse malattie per secoli. Si dice addirittura che gli infusi di alcune foglie allunghino la vita della nostra gente."

 canoe_travels: "Canoa"
 canoe_travels_desc: "Le canoe leggere sono perfettamente adatte ai corsi d'acqua del $north_america$. Queste imbarcazioni possono navigare su fiumi poco profondi e sono abbastanza leggere da poter essere trasportate via terra, quando necessario. In questo modo, possiamo trasformare corsi d'acqua scollegati in vere e proprie rotte commerciali, rendendo molto più facile dirigere il flusso del commercio e delle persone."

 seasonal_economy: "Economia Stagionale"
 seasonal_economy_desc: "In tempi difficili, dobbiamo imparare a sopportare la vita, e la vita è sinonimo di natura. Il cambiamento delle stagioni richiede un cambiamento nel nostro stile di vita; i villaggi devono essere adattabili e mobili."

 fishing_habits: "Abitudini di Pesca"
 fishing_habits_desc: "A volte è difficile credere che alcuni dei nostri siano nati sulla terraferma e non nell'acqua, poiché i loro corpi nuotano con tale agilità che è quasi impossibile distinguerli dalla corrente del fiume. Di conseguenza, siamo esperti nella pesca."

 whale_hunters: "Cacciatori di Balene"
 whale_hunters_desc: "Balene, focene, trichechi, foche... cacciamo tutto ciò che il mare ci offre."

 moundbuilding_advance: "Costruttori di Tumuli"
 moundbuilding_advance_desc: "I tumuli cerimoniali costruiti dai nostri antenati sono monumenti alla loro sofisticata abilità ingegneristica nel campo dei lavori di sterro. Incorporando questi tumuli nella pianificazione delle nostre infrastrutture, preserveremo una tradizione fondamentale della nostra civiltà."

 bison_hunters: "Cacciatori di Bisonti"
 bison_hunters_desc: "I bisonti sono una risorsa fondamentale per il nostro popolo. Utilizziamo ogni parte dell'animale come tributo al suo sacrificio. Nutriamo il nostro popolo con la sua carne, utilizziamo le sue ossa per fabbricare utensili, usiamo la sua pelliccia per proteggerci dal freddo e le sue pelli per i nostri vestiti. Anche l'anima dell'animale ha un significato simbolico per noi. L'importanza del bisonte nella nostra cultura è tale che senza di lui ci sentiremmo persi."

 federal_constitution: "Costruttori di Federazioni"
 federal_constitution_desc: "Dovremmo unirci ad altri gruppi della nostra stirpe per formare una federazione, che metterà al primo posto la fiducia reciproca e lo sviluppo."

 shared_knowledge: "Conoscenza Condivisa"
 shared_knowledge_desc: "L'innovazione può assumere molte forme e, se vogliamo stare al passo con le tribù rivali, dovremo esplorare ogni vantaggio possibile."

 slash_and_burn: "Agricoltura Taglia e Brucia"
 slash_and_burn_desc: "Una tecnica agricola che prevede il taglio e la combustione strategici della vegetazione per ottenere uno strato di cenere ricco di sostanze nutritive che fertilizza il terreno sottostante, rendendolo eccellente per la coltivazione. Abbiamo imparato che la terra diventa più forte dopo questo metodo, proprio come un osso diventa più forte dopo essere stato rotto."

 council_of_elders: "Consiglio degli Anziani"
 council_of_elders_desc: "Il nostro governo tribale garantisce che tutti i membri abbiano voce in capitolo e pari diritti nelle decisioni cruciali. Questa amministrazione collaborativa ci incoraggia a considerare nuove prospettive."

 experienced_fur_hunters: "Commercio con il $fur$"
 experienced_fur_hunters_desc: "Il commercio del $fur$ con altre tribù e stranieri è una parte essenziale della nostra economia. Siamo molto orgogliosi delle nostre abilità di caccia e quindi siamo in grado di fornire pelli della migliore qualità."

 pyramid_architecture: "Architettura Piramidale"
 pyramid_architecture_desc: "I nostri antenati costruirono imponenti piramidi di pietra nei tempi remoti di Teōtīhuacān, Tik'al, Copan e Palenque. Non abbiamo dimenticato l'arte della costruzione delle piramidi e possiamo portare avanti questa tradizione."

 ball_game: "Tlachtli"
 ball_game_desc: "Il cuore della vita sociale nella nostra società è il gioco della palla, in cui i giocatori cercano di mantenere la palla all'interno del campo da gioco colpendola con i fianchi. È sia un rituale alternativo alla guerra che una parte importante della vita religiosa."

 war_bonfires: "Falò di Guerra"
 war_bonfires_desc: "Una rete di insediamenti di frontiera collegati tra loro da immensi falò, visibili da grande distanza quando accesi, ci consentirà di allertare rapidamente più insediamenti contemporaneamente in caso di minacce e quindi di reagire molto più rapidamente."

 merchant_officials: "Funzionari-Mercanti"
 merchant_officials_desc: "I mercanti e il loro commercio contribuiscono in modo sostanziale al nostro reddito nazionale. Tuttavia, i mercanti sono anche ottime fonti di informazione, poiché spesso si trovano nella posizione di osservare in prima persona le condizioni in cui versano i nostri vicini. Assegnando loro ruoli ufficiali nel governo, possiamo sfruttare le loro conoscenze e la loro mobilità a nostro vantaggio."

 copperworking: "Lavorazione del Rame"
 copperworking_desc: "I nostri artigiani hanno iniziato a realizzare utensili in $copper$, un metallo prezioso che si trova in tutto il nostro territorio. Se riuscissimo a padroneggiare quest'arte, otterremmo un enorme vantaggio sui nostri vicini."

 system_of_tributaries: "Sistema Tributario"
 system_of_tributaries_desc: "Il governo diretto comporta ingenti investimenti per sottomettere e pacificare i gruppi rivali. Invece, nominando un funzionario fedele per governare a livello locale e richiedendo il pagamento di un tributo annuale, eliminiamo le minacce dei $altepetl$ rivali e allo stesso tempo riempiamo le nostre casse."

 refined_obsidian_weaponry: "Armamenti di Ossidiana"
 refined_obsidian_weaponry_desc: "L'ossidiana è un materiale eccellente per la fabbricazione di tutti i tipi di strumenti e armi. Questa roccia dura e simile al vetro mantiene perfettamente il filo, rendendo facile la creazione di lame, punte di lancia o punte di freccia in grado di infliggere ferite mortali a qualsiasi nemico."

 precious_stones_art: "Intaglio di Pietre Preziose"
 precious_stones_art_desc: "La nostra zona è ricca di pietre preziose, eccellenti per aggiungere colore, dettagli e brillantezza sia alle opere d'arte che agli oggetti di uso quotidiano. I nostri artigiani immortaleranno se stessi attraverso questi gioielli scintillanti e creeranno grandi monumenti alla nostra cultura."

 cultivate_the_land: "Coltivare la Terra"
 cultivate_the_land_desc: "La giungla è un ambiente difficile in cui vivere, soprattutto per le culture agricole. Sgomberare porzioni di giungla per creare terreni coltivabili è quindi uno dei nostri compiti più importanti. Dobbiamo organizzare la nostra gente in modo tale da poter impiegare grandi forze di lavoro per svolgere questi lavori ogni volta che se ne presenta la necessità."

 feathered_serpent: "Il Serpente Piumato"
 feathered_serpent_desc: "La leggenda del Serpente Piumato è ben nota in tutte le nostre terre. Sebbene questa figura rappresenti molte cose per molte persone, come Quetzalcōātl tra i $nahua_group$, K'uk'ulkan tra i $maya_language$ o Q'uq'umatz tra i $kiche_culture$, è una figura unificante per tutti loro."

 ritual_bloodletting: "Rituale del Salasso"
 ritual_bloodletting_desc: "Molte culture di questa regione considerano il sacrificio rituale e il salasso da parte del sovrano come un modo per rendere omaggio agli dei. Mantenere questa tradizione soddisfa gli dei e afferma il nostro diritto di governare attraverso il tributo divino."

 valley_irrigation: "Irrigazione Inter-Valle"
 valley_irrigation_desc: "Costruendo vaste reti di canali e collegando i corsi d'acqua delle valli della nostra patria, possiamo migliorare notevolmente le nostre tecniche di irrigazione e la produttività dei nostri terreni agricoli."

 artisan_migration: "Trasferimento degli Artigiani"
 artisan_migration_desc: "Non è giusto che i territori che abbiamo conquistato abbiano artigiani migliori e consiglieri più saggi rispetto alla nostra capitale. Le menti e le mani più abili dell'impero devono essere portate nella capitale per servirci direttamente."

 terrace_farming: "Agricoltura a Terrazzamenti"
 terrace_farming_desc: "Per sfruttare al massimo lo spazio limitato dei nostri altipiani, abbiamo sviluppato l'agricoltura a terrazzamenti, una serie di campi a gradini sui fianchi delle montagne, nonché tecniche di irrigazione migliori."

 mountain_cities: "Fortezze di Vetta"
 mountain_cities_desc: "Le nostre città e fortezze occupano le cime di immense montagne, ben oltre le nuvole. Rappresentano un ostacolo formidabile per chiunque tenti di invaderci."

 river_trade: "Commercio Fluviale"
 river_trade_desc: "La generosità dei nostri grandi fiumi e mari ha sempre nutrito il nostro popolo. Abbracciamo il commercio fluviale e facciamo tutto il possibile per proteggere i numerosi mercanti che viaggiano lungo la costa fino alla foce del possente fiume, affinché non ci manchino mai i beni pregiati che ci portano."

 rainforests_and_mountaintops: "Foreste Pluviali e Cime Montuose"
 rainforests_and_mountaintops_desc: "Le foreste pluviali e le montagne della nostra terra pullulano di vita. Oltre agli spiriti delle foreste, tra noi vivono giaguari, anaconde, tarantole e una miriade di altri animali che, per chi li conosce, non rappresentano un pericolo diretto. Per un nemico invasore, tuttavia, queste terre potrebbero sembrare una fortezza e gli animali selvatici i suoi difensori."

 knot_system: "Nodi Parlanti"
 knot_system_desc: "Utilizzando combinazioni di corde e nodi per registrare le informazioni, possiamo facilitare notevolmente l'amministrazione delle nostre terre e conservare registrazioni accurate delle informazioni vitali."

 llama_farming: "Allevamento di Lama"
 llama_farming_desc: "Le nostre vaste mandrie di lama ci forniscono tessuti per vestirci, carne per nutrirci e animali da soma per trasportare i nostri carichi. Sono davvero inestimabili."

 mountain_roads: "Rete di Strade Montane"
 mountain_roads_desc: "Per facilitare la distribuzione delle merci, è necessaria una grande rete di strade di montagna che colleghi valli lontane e attraversi gole profonde. Costruiamola."

 tears_of_the_sun: "Lacrime del Sole"
 tears_of_the_sun_desc: "Sebbene avventurieri da terre lontane sognino di trovare oro segreto sui sentieri di montagna in alto nelle Ande, per noi il metallo giallo ha più importanza artistica e sacra che semplice valore economico."

 hidden_cities: "Città Nascoste"
 hidden_cities_desc: "In una terra di picchi immensi e foreste pluviali impenetrabili, molte delle nostre città sono quasi inaccessibili agli estranei. Potrebbero facilmente rimanere nascoste per secoli, dimenticate dal mondo."

 potato_production: "Produzione di Patate"
 potato_production_desc: "Poiché il mais cresce male negli altipiani della nostra terra, abbiamo imparato a fare affidamento sulle radici altamente nutrienti di una pianta locale. Con l'aumento della produzione, possiamo nutrire la nostra gente e i nostri guerrieri con questo raccolto di facile manutenzione."

 head_hunters: "Cacciatori di Teste"
 head_hunters_desc: "Conquistare territori da popoli più deboli è un male necessario nel nostro stato. Queste circostanze hanno creato un codice guerriero unico, secondo il quale catturare e non uccidere il nemico è la massima dimostrazione di coraggio e valore. Questo ha reso il nostro popolo famoso per la sua maestria nel catturare persone vive."

 border_raiders: "Incursori Abili"
 border_raiders_desc: "I nostri incursori sono famosi per la loro capacità di sferrare attacchi fulminei contro nemici ignari. La loro velocità e la loro abilità nell'eludere la rappresaglia nemica dovrebbero essere studiate e impiegate anche dalle nostre truppe regolari."

 lva_baltic_forestry: "Silvicoltura Baltica"
 lva_baltic_forestry_desc: "Le nostre foreste sono una risorsa vitale, che fornisce legname per l'edilizia e combustibile per i nostri fuochi. Dobbiamo gestirle con saggezza per garantirne la continua abbondanza."

 lva_baltic_forts: "Forti Baltici"
 lva_baltic_forts_desc: "La nostra rete di fortezze e castelli sparsi sul territorio costituisce la prima linea di difesa contro gli invasori. Queste roccaforti ci consentono di monitorare e controllare le rotte chiave attraverso il Baltico."

 irish_travelling_bards_advance: "Bardi Viaggianti"
 irish_travelling_bards_advance_desc: "Poeti tradizionali addestrati nelle maniere di corte attraversano le nostre terre in cerca di qualche signore probabile che li assuma."

 irish_booleying_advance: "Transumanza del Bestiame"
 irish_booleying_advance_desc: "In $IRE$, l'allevamento del bestiame è il nostro stile di vita. Il nobile bovino non è solo una fonte di cibo, ma anche un simbolo di ricchezza. Grazie al #italic booleying#!, un sistema che consiste nel trasferire le nostre mandrie da un pascolo lontano all'altro, possiamo aumentare tale ricchezza."

 irish_monastacism_advance: "Monachesimo Insulare"
 irish_monastacism_advance_desc: "Sebbene ora siamo allineati con le pratiche romane cattoliche in linea di principio, la vita religiosa nelle nostre isole pone ancora grande enfasi sul clero laico."

 guards_of_the_shannon_advance: "Guardie dello Shannon"
 guards_of_the_shannon_advance_desc: "La fortezza di Athlone, che sorge a cavallo del possente fiume Shannon, è la chiave per controllare il cuore dell'$IRE$. Gli O'Kelly del $HYM$, signori di lunga data di queste terre, hanno combattuto ferocemente per difendere i loro possedimenti dalle incursioni del $norman$."

 hiberno_norman_keeps_advance: "Torri Iberno-Normanne"
 hiberno_norman_keeps_advance_desc: "I nostri antenati normanni costruirono splendide torri per mantenere il controllo sull'ostile entroterra dell'$IRE$."

 irish_frontier_settlement_advance: "Insediamenti di Frontiera Irlandesi"
 irish_frontier_settlement_advance_desc: "La terra che abbiamo sottratto agli Irlandesi è pronta per essere sfruttata. Dobbiamo solo assicurarci che solo le persone giuste migrino qui per insediarsi in questi piccoli appezzamenti a basso costo."

 celtic_raiders_advance: "Furor Celtica"
 celtic_raiders_advance_desc: "Per millenni, la nostra feroce e agile guerriglia ha tormentato i nostri nemici, sconfiggendoli con una devastante serie di schermaglie evasive e cariche agghiaccianti."

 ple_pale_defenseworks_advance: "Opere del Pale"
 ple_pale_defenseworks_advance_desc: "Il nostro confine è definito da leggere opere difensive costituite da dighe e palizzate progettate per dissuadere i nostri vicini indisciplinati dal lanciare le loro fastidiose incursioni."

 ple_irish_viking_towns_advance: "Antiche Città Vichinghe"
 ple_irish_viking_towns_advance_desc: "Gli antichi porti commerciali fondati dagli Ostmen sono ancora alveari brulicanti di attività mercantile dove gli scaltri possono arricchirsi."

 cel_defensive: "Le Colline Parlano Celtico"
 cel_defensive_desc: "Secoli di vita all'ombra delle conquiste hanno insegnato ai nostri guerrieri l'arte della pazienza e della resilienza. Possiamo lanciarci a capofitto nel pericolo, ma possiamo anche resistere, difenderci e colpire solo quando è il momento giusto."

 cel_western_shore: "La Costa Occidentale"
 cel_western_shore_desc: "Per millenni abbiamo pescato, commerciato e combattuto lungo le selvagge coste atlantiche. Da queste acque ostili abbiamo imparato un'arte marinaresca che non ha rivali."

 cel_the_wests_awake: "L'Ovest si Risveglia"
 cel_the_wests_awake_desc: "Dopo lunghi secoli di silenzio, l'antico spirito dei popoli celtici si muove ancora una volta, pronto a riconquistare il suo posto tra le grandi civiltà del mondo."

 cel_celtic_nations: "Nazioni Celtiche"
 cel_celtic_nations_desc: "La nostra unione è fondata sull'ideale di unire i diversi popoli del mondo celtico sotto uno stendardo condiviso. Attraverso la cooperazione, miriamo a preservare il nostro patrimonio, promuovere i nostri valori e assicurare che le nazioni celtiche prosperino insieme di fronte alle pressioni esterne e ai tempi che cambiano."

 cel_celtic_diaspora: "Diaspora Celtica"
 cel_celtic_diaspora_desc: "Dal contadino al capotribù, molti hanno lasciato le nostre coste attraverso difficoltà o speranza, tessendo una rete lontana di parentela che porta la nostra lingua, costumi e orgoglio a terre lontane."

 cel_pan_celtic_nationalism: "Pan-Celtismo"
 cel_pan_celtic_nationalism_desc: "La nostra visione di un mondo celtico unito è più di un ideale: è una chiamata alle armi per tutti coloro che condividono il nostro patrimonio. Insieme, forgiamo legami che vanno oltre i confini, rendendo la nostra identità duratura come le colline e i mari che chiamiamo casa."

 ire_grand_jury_system: "Sistema della Grand Jury"
 ire_grand_jury_system_desc: "Le Grand Jury di contea riscuotono le tasse per strade, ponti e tribunali. Con i giudici che presiedono le assise, la supervisione si stringe in ogni contea."

 ire_irish_establishment: "Istituzione Irlandese"
 ire_irish_establishment_desc: "Un esercito permanente in $IRE$ — e controllato #italic da#! Irlanda — mantiene le guarnigioni pronte e i costi bassi. Per i nostri soldati regolari, questo significa una paga regolare. Per i nostri logisti e quartiermastri, significa una rete crescente di caserme che mantiene i costi sotto controllo."

 ire_irish_volunteers: "Volontari Irlandesi"
 ire_irish_volunteers_desc: "I corpi cittadini sono organizzati per la difesa nazionale e la sorveglianza costiera. Addestrandosi a proprie spese, suscitano lo spirito pubblico e irrigidiscono la linea."

 legacy_of_the_normans: "Eredità dei Normanni"
 legacy_of_the_normans_desc: "Forgiato nel crogiolo della conquista, l'esercito normanno siciliano ha unito la carica inarrestabile dei cavalieri normanni alla sofisticatezza strategica della guerra bizantina, araba e lombarda. Maestri sia della ferocia sul campo di battaglia che della flessibilità tattica, hanno scolpito un regno al crocevia delle civiltà."

 sic_constitions_of_melfi: "Costituzioni di Melfi"
 sic_constitions_of_melfi_desc: "L'imperatore Federico II, re Hohenstaufen della $SIC$, redasse un codice legale per la $SIC$ noto come Costituzioni di Melfi, o #italic Liber Augustalis#!. Ancora in uso secoli dopo, esso rappresenta una solida base per il governo del nostro Stato, regolando il diritto pubblico, la procedura giudiziaria e il diritto feudale, privato e penale."

 sic_studium_generale: "Studium Generale"
 sic_studium_generale_desc: "Fondata dal re Alfonso V dell'$ARA$, l'Università del $catania$ era la più antica della $SIC$ e una delle poche istituzioni meridionali a cui era stato concesso lo status di #italic Studium Generale#! Unica per la sua carta reale e la combinazione di istruzione scolastica e giuridica, ha formato giuristi, teologi e scienziati che hanno servito sia la Chiesa che la Corona in una regione culturalmente diversificata."

 sic_naval_vigilance: "Vigilanza Navale"
 sic_naval_vigilance_desc: "Le continue incursioni dei pirati barbareschi e delle navi ottomane hanno costretto la $SIC$ a mantenere una difesa costiera vigile. Le sue galee e i suoi forti divennero fondamentali per proteggere il sud dell'$europe$."

 sic_sicilian_silk: "$silk$ Siciliana"
 sic_sicilian_silk_desc: "Al tempo di Federico II, il $silk$ era il principale prodotto di esportazione della $SIC$. Sebbene la nostra industria del $silk$ sia declinata nei secoli successivi, con la produzione della $SIC$ superata da quella degli stati settentrionali italiani, non c'è motivo per cui non possa risorgere. Investendo nella nostra produzione del $silk$, possiamo vedere i nostri tessitori e artigiani rifiorire."

 sic_sicilian_enlightenment: "Illuminismo Siciliano"
 sic_sicilian_enlightenment_desc: "Sebbene lontano dai grandi salotti di $paris$ o $vienna$, la $SIC$ ha promosso la propria Illuminismo. Gli intellettuali hanno sfidato i privilegi feudali, promosso la scienza e sostenuto le riforme legali, spesso nel quadro dell'umanesimo cattolico. Queste idee hanno gettato le basi per la modernità all'ombra della monarchia e della tradizione."

 sic_sicilian_reforms: "Riforme Siciliane"
 sic_sicilian_reforms_desc: "Con il passare del tempo, le nostre istituzioni diventano obsolete o semplicemente inefficienti. Le riforme sono necessarie se vogliamo che la nostra nazione prosperi e fiorisca. Le nostre menti migliori lavoreranno duramente per garantire che non vi siano sprechi e che i nostri processi siano il più efficienti possibile."

 nomadic_tendencies: "Tendenze Nomadi"
 nomadic_tendencies_desc: "Molti dei nostri cittadini hanno vissuto la loro vita come nomadi, poiché la nostra usanza è stata quella di viaggiare da un luogo abitabile all'altro. Anche ora, mentre tutto cambia e costruiamo una città per il nostro popolo, alcuni mantengono le loro tradizioni nomadi e continuano a vagare."

 skilled_cavalry_raids: "Incursioni di Cavalleria"
 skilled_cavalry_raids_desc: "Sin dai tempi dei nostri antenati, i cavalieri sono stati gli artefici delle nostre conquiste. Il fragore dei loro zoccoli che risuonava nelle praterie del $sahel_region$ incuteva timore nei nostri nemici e ci ha portato molte vittorie."

 land_of_the_ancestors: "Terra degli Antenati"
 land_of_the_ancestors_desc: "La terra non è una proprietà, né è semplice polvere; è il nostro legame con i nostri grandi antenati. Da terre migliori oltre il confine, essi vegliano su di noi. Non dobbiamo mai permettere che il legame tra noi venga spezzato e dobbiamo prenderci cura di queste terre in onore di coloro che per primi le hanno colonizzate."

 wandering_scholars: "Studiosi Erranti"
 wandering_scholars_desc: "Comunità di studiosi eruditi di molte fedi vivono nelle nostre terre, offrendo istruzione religiosa a tutti coloro che vogliono ascoltare."

 community_of_the_faithful: "Dominio di Molte Lingue"
 community_of_the_faithful_desc: "Il nostro Impero ospita persone provenienti da centinaia di contesti diversi. Parlano una moltitudine di lingue e provengono da tutte le direzioni dell'orizzonte, ma ognuno nella propria lingua rende omaggio al nostro sovrano, unendoci insieme."

 bound_by_service: "Legati dal Servizio"
 bound_by_service_desc: "Siamo un unico popolo e abbiamo un unico esercito. Riunendo le truppe provenienti da tutti i nostri territori e arruolando i popoli conquistati nel servizio militare, possiamo integrarli meglio nella nostra società e aumentare la loro accettazione del nostro dominio."

 regnal_chronicles: "Cronache Regali"
 regnal_chronicles_desc: "Dovremmo registrare la storia dei nostri splendidi sovrani e delle loro illustri gesta in grandi cronache, affinché possano essere tramandate di generazione in generazione e ricordate per sempre."

 expanded_slave_trade: "Controllare la Tratta degli Schiavi"
 expanded_slave_trade_desc: "La domanda di $slaves_goods$ da parte dei commercianti esterni cresce di giorno in giorno. La nostra posizione in $africa$ ci rende gli intermediari ideali per questo commercio. Incoraggiamo coloro che cercano mercati di schiavi a farlo nelle nostre terre e a svolgere la loro attività nei nostri mercati."

 gifts_and_hostages: "Doni e Ostaggi"
 gifts_and_hostages_desc: "Sebbene il nostro popolo sia ora unito, l'atto di inginocchiarsi davanti a un signore comune non è stato facile per loro. Convocando tutti i sovrani sottomessi nella capitale, possiamo impiegarli come prestigiosi inviati reali. Alcuni definirebbero questa politica come una presa di ostaggi; noi la vediamo semplicemente come un modo per ricordare ai nostri sudditi più indipendenti la loro lealtà."

 people_of_ornaments: "Popolo dell'ornamento"
 people_of_ornaments_desc: "I nostri artigiani sono rinomati in lungo e in largo e si dice che non riescano a lasciare una superficie senza decorazioni. Sfruttiamo al massimo questa reputazione e promuoviamo il più possibile le loro creazioni."

 courtly_competition: "Competizione di Corte"
 courtly_competition_desc: "Un nobile preoccupato è un nobile ben educato. Ci sono così tanti titoli nobiliari nei nostri regni che alcuni dicono che metà dei nostri uomini ne possiede uno. Facciamo in modo che i nostri cortigiani passino il loro tempo a competere tra loro per ottenere attenzione e visibilità; saranno troppo occupati per complottare contro il nostro dominio."

 overnight_army: "Un Esercito a Riposo"
 overnight_army_desc: "La nostra capitale e le altre città sono costruite sul modello degli accampamenti militari. Hanno ali, avanguardie e fronti. Assicurando che il pensiero militare permei la vita quotidiana, miglioreremo la nostra prontezza al combattimento complessiva."

 mining_tradition: "Tradizione Mineraria"
 mining_tradition_desc: "La nostra terra è ricca di materiali rari, pronti per essere estratti dal sottosuolo e venduti a mercanti stranieri con grandi profitti. Saremmo sciocchi a non sfruttare questa opportunità."

 intercontinental_trade: "Commercio di Ampio Respiro"
 intercontinental_trade_desc: "I nostri mercanti riportano spesso cose affascinanti dalle corti di paesi lontani. Forse sarebbe possibile raggiungere lidi ancora più lontani?"

 expanded_grazing_grounds: "Terreni di Pascolo Espansi"
 expanded_grazing_grounds_desc: "Il nostro territorio ha un sacco di terra che è perfetta per far pascolare le mandrie, rendendo facile per noi espandere la nostra produzione di $livestock$."

 african_sturdy_grains_advance: "Agricoltura di Cereali Robusti"
 african_sturdy_grains_advance_desc: "Una maggiore attenzione alla produzione agricola aiuterà il nostro popolo a prosperare. Fortunatamente, disponiamo dello spazio ampio e del terreno fertile necessari per coltivare una serie di prodotti agricoli."

 legacy_of_ivan_asen_ii: "Eredità di Ivan Asen II"
 legacy_of_ivan_asen_ii_desc: "Il regno di Ivan Asen II segnò un nuovo apice del potere, della diplomazia e dell'espansione economica bulgara. La sua eredità perdura come fondamento di uno Stato forte e centralizzato."

 bulgarian_orthodox_patriarchate: "Patriarcato Ortodosso Bulgaro"
 bulgarian_orthodox_patriarchate_desc: "L'elevazione della Chiesa bulgara a patriarcato ha riaffermato $tarnovo$ come rivale spirituale di $constantinople$, rafforzando la nostra unità nazionale attraverso la fede."

 expansionist_ambitions: "Ambizioni Espansionistiche"
 expansionist_ambitions_desc: "Con la frammentazione dei Balcani, molte potenze emergenti guardarono al di fuori dei propri confini. Sovrani ambiziosi perseguirono l'integrazione di terre diverse sotto un'unica corona più forte, approfittando della debolezza bizantina."

 fortress_of_the_balkans: "Fortezza dei Balcani"
 fortress_of_the_balkans_desc: "Di fronte alle continue minacce dei crociati, del $BYZ$ e dei mongoli, la $BUL$ sviluppò una vasta rete di città fortificate e difese montane."

 revival_of_the_literary_schools: "Rinascita delle Scuole Letterarie"
 revival_of_the_literary_schools_desc: "Ispirati dal rinascimento culturale sotto Ivan Alexander, gli scriptoria e le scuole bulgare divennero i custodi dell'identità slava ortodossa"

 reformation_of_the_bulgarian_patriarchate: "Riforma del Patriarcato Bulgaro"
 reformation_of_the_bulgarian_patriarchate_desc: "Il ripristino dell'indipendenza del Patriarcato bulgaro rafforzò sia l'influenza religiosa che l'autorità morale dello Stato."

 promote_estates_general: "Promuovere gli États Généraux"
 promote_estates_general_desc: "La $BUR$ è una creazione feudale con varie parti unite in condizioni diverse, che ha dato vita a forti identità locali. Promuovendo un'assemblea centrale, diamo voce a questi interessi, favorendo un governo pacifico e incontrastato."

 reform_the_feudal_army: "Riformare l'Esercito Feudale"
 reform_the_feudal_army_desc: "Il sistema di leva feudale si è dimostrato lento e inaffidabile in questa nuova era di guerra professionale. Ispirandoci al modello francese, sostituiremo i nostri eserciti vassalli dispersi con compagnie salariate, ufficiali qualificati ed eserciti integrati. Un nucleo disciplinato di soldati professionisti costituirà la spina dorsale di un esercito moderno e adattabile."

 influence_of_the_burgundian_towns: "Influenza delle Città Borgognoni"
 influence_of_the_burgundian_towns_desc: "Gli Stati Generali tradizionali favoriscono il clero e la nobiltà, ma la crescente ricchezza e importanza politica delle città non può più essere ignorata. Affinando la sua struttura per riflettere la crescente forza della classe mercantile, garantiamo un governo più equilibrato, preservando al contempo i privilegi degli altri stati. Una voce urbana più forte migliorerà anche le nostre capacità amministrative e accelererà il tasso di urbanizzazione."

 compagnie_d_ordonnance: "Compagnies d'Ordonnance"
 compagnie_d_ordonnance_desc: "La nostra dipendenza dalle leve feudali si è dimostrata inadeguata alle esigenze della guerra moderna. La creazione di unità di cavalleria a contratto permanente, le #italic $compagnie_d_ordonnance$#!, ci fornisce una forza militare affidabile e professionale direttamente fedele alla Corona."

 create_the_regimental_system: "Creare il Sistema Reggimentale"
 create_the_regimental_system_desc: "Per garantire un reclutamento costante e una fornitura sufficiente di combattenti, dobbiamo istituire un sistema reggimentale formale. Questa riforma ci consentirà di organizzare la manodopera in modo più efficace, centralizzare le strutture di comando e ridurre la dipendenza dai nobili locali e dai mercenari stranieri."

 heirs_of_rollo: "Eredi di Rollo"
 heirs_of_rollo_desc: "L'eredità di Rollo, il vichingo fondatore della $NRM$, continua a definire la nostra casata regnante. Una discendenza così prestigiosa ha portato a un rafforzamento della legittimità e del rispetto da parte dei nostri pari."

 trade_ports_in_the_channel: "Porti Commerciali del Canale"
 trade_ports_in_the_channel_desc: "La nostra posizione lungo la Manica ci permette di prosperare come porta commerciale. Investendo nelle nostre città portuali e nell'infrastruttura mercantile, possiamo dominare il commercio regionale minimizzando il costo delle operazioni oltremare."

 norman_law: "Legge Normanna"
 norman_law_desc: "Il nostro stato è governato dal proprio codice legale consuetudinario, il $couteume_de_normaundie$. Consacrando il privilegio nobile, il potere decentrato e i diritti di proprietà, questa tradizione legale assicura la stabilità locale affermando la nostra identità distinta."

 the_exchequer: "Lo Scacchiere"
 the_exchequer_desc: "Il nostro organo legislativo deve rimanere distinto da qualsiasi influenza esterna, in uno sforzo per preservare la nostra identità culturale e indipendenza. Ispirate dalle istituzioni fiscali anglo-normanne, le nostre procedure parlamentari sosterranno sicuramente le entrate della corona e miglioreranno la supervisione amministrativa."

 frontline_in_the_caroline_war: "Prima Linea della Guerra di Caroline"
 frontline_in_the_caroline_war_desc: "Durante i lunghi conflitti tra $FRA$ e $ENG$, siamo stati un campo di battaglia strategico. Le pressioni della guerra hanno forgiato un corpo di ufficiali temprato e tradizioni di eccellenza sul campo di battaglia che perdurano ancora oggi."

 tunisian_corsairs: "Corsari Tunisini"
 tunisian_corsairs_desc: "Dalle loro roccaforti in $TUN$ e La Goulette, i nostri corsari dominano il Mediterraneo. Con galee veloci e il potere dello Stato alle loro spalle, incutono timore nei mercanti stranieri e rafforzano la nostra potenza navale con spietata efficienza."

 tamazight: "Tamazight"
 tamazight_desc: "Il popolo berbero dell'interno è una parte vitale della nostra società. Riconoscendo la loro identità culturale e promuovendo l'alfabetizzazione, espandiamo la nostra capacità di governare regioni diverse senza perdere coesione o una presa ferma sul potere."

 guardians_of_ifriqiya: "Guardiani dell'Ifrīqya"
 guardians_of_ifriqiya_desc: "Come successori delle antiche città di Cartagine e Kairouan, portiamo il mantello della tutela sul cuore del $maghreb_region$. Il nostro governo porta stabilità e sarà accolto con favore da tutti in una regione un tempo contesa."

 saharan_trade: "Commercio Sahariano"
 saharan_trade_desc: "Dalle oasi del $ghadames$ alle carovane del $sahel_region$, i nostri mercanti garantiscono e raccolgono le entrate dalle rotte trans-sahariane che ci collegano alle ricchezze dell'interno. L'$goods_gold$, il $salt$ e gli $slaves_goods$ scorrono verso nord sotto la nostra protezione e supervisione."

 al_caid: "Al-Qā'id"
 al_caid_desc: "Nominando un fedele #italic Qā'id#! per supervisionare le province e regolamentare il commercio per conto dello Stato, diamo potere ai mercanti urbani garantendo al contempo il governo provinciale. Garantire transazioni eque e mercati regolamentati rafforzerà notevolmente la nostra base economica."

 connections_with_the_christian_world: "Collegamenti con il Mondo Cristiano"
 connections_with_the_christian_world_desc: "I trattati e gli accordi commerciali con gli stati cristiani garantiscono che la diplomazia e il pragmatismo servano i nostri interessi a lungo termine. Anche se la nostra fede è diversa dalla loro, non dovremmo chiudere la porta alle opportunità."

 attract_foreign_pirates: "Attirare Pirati Stranieri"
 attract_foreign_pirates_desc: "I nostri porti sono stati a lungo un rifugio per coloro che cercano fortuna in alto mare. Accogliendo questi marinai esperti indipendentemente dalla loro fede o origine, possiamo rafforzare ulteriormente le nostre flotte corsare ed espandere la nostra forza marittima."

 rais_of_the_navy: "Ra'īs della Marina"
 rais_of_the_navy_desc: "I nostri capitani corsari, i #italic Ra'īs#!, sono più che semplici pirati. Sono in realtà comandanti navali esperti e la loro esperienza in mare alimenta una profonda tradizione marittima che rafforza l'orgogliosa eredità della nostra marina."

 export_monopolies: "Monopoli di Esportazione"
 export_monopolies_desc: "Controllando le esportazioni chiave come l'olio d'oliva, i tessuti e il $dyes$, garantiamo sia la prosperità interna che il potere all'estero. Tali pratiche protezionistiche ci consentono di proiettare il nostro potere attraverso il commercio tanto quanto attraverso la conquista, assicurando che i nostri mercanti mantengano il dominio sugli stranieri nei nostri mercati."

 beacon_of_maghrebi_trade: "Faro del Commercio Maghrebino"
 beacon_of_maghrebi_trade_desc: "Il $TLE$ si trova al crocevia delle carovane sahariane, del commercio mediterraneo e dell'eminenza andalusa. Mentre il commercio fiorisce attraverso i suoi mercati e porti, dobbiamo sforzarci di continuare ad espandere le nostre reti commerciali, affermando la nostra influenza sul commercio regionale."

 qalat_al_mashwar_advance: "$qalat_al_mashwar$"
 qalat_al_mashwar_advance_desc: "Il complesso fortificato del $qalat_al_mashwar$ è sia un bastione militare che un simbolo dell'autorità dinastica. Grazie agli investimenti nella sua espansione, la difesa del $TLE$ è stata rafforzata, garantendo al contempo il controllo amministrativo sulle terre circostanti."

 hispano_moresque_style: "Stile Ispano-Moresco"
 hispano_moresque_style_desc: "Le nostre città riflettono una miscela unica di eleganza andalusa e architettura maghrebina. Lo stile ispano-moresco, tramandato da artigiani e nobili stranieri, ispira una nuova fioritura culturale ed eleva il prestigio della nostra corte."

 city_of_scholars: "Città degli Studiosi"
 city_of_scholars_desc: "Il $TLE$ è da tempo un centro di apprendimento islamico e di scambio intellettuale. Le nostre madrasa attraggono studiosi da tutto il $maghreb_region$ e dall'Al-'Andalus, favorendo il progresso scientifico e teologico per le generazioni future."

 entrepot_connections: "Connessioni di Emporio"
 entrepot_connections_desc: "Per prosperare come hub commerciale, le nostre città devono essere collegate da solide infrastrutture. Dando potere alla classe nobile di costruire e mantenere strade strategiche, miglioriamo il commercio interno e rafforziamo le arterie del nostro regno."

 perpetual_general_captain_of_the_people: "Capitano Generale Perpetuo del Popolo"
 perpetual_general_captain_of_the_people_desc: "Nella mutevole politica della $VER$ medievale, il titolo di "Capitano del Popolo" finì per incarnare più di una carica cerimoniale: divenne una rivendicazione duratura della leadership. Radicato nella tradizione civica e rivendicato dagli Scaligeri per legittimare il loro potere, conferì permanenza al loro dominio in una città dove la lealtà era difficile da conquistare."

 scaligers_military_ambitions: "Ambizioni Militari degli Scaligeri"
 scaligers_military_ambitions_desc: "Gli Scaligeri non sognavano solo di governare $VER$, ma anche di trasformarlA in una potenza lombarda. Le loro campagne militari si spinsero attraverso la Pianura Padana, scontrandosi con Milano, $VEN$, and Padova. Questa ambizione lasciò il segno sotto forma di città fortificate, imposte più pesanti e una corte che respirava riforme militari."

 court_of_great_refugees: "Corte dei Grandi Rifugiati"
 court_of_great_refugees_desc: "La nostra grande capitale è diventata un rifugio per artisti, esiliati e pensatori, sfollati dalla guerra, dalla fede o dalla politica in altre parti dell'$ITA$. Questi rifugiati sono destinati ad arricchire le corti della città con nuove tecniche, idee audaci e correnti culturali incrociate, rendendo la $VER$ un raro santuario di innovazione in tempi turbolenti."

 consolidate_italian_holdings: "Consolidare le Proprietà Italiane"
 consolidate_italian_holdings_desc: "Gli Scaligeri governavano non solo $VER$, ma una rete crescente di città nel nord $italy_region$. Mantenere unito un regno di tale portata richiede un'attenta diplomazia, una delegazione intelligente e eserciti professionisti ben pagati. Solo attraverso il consolidamento $VER$ può diventare un vero rivale delle altre grandi potenze della penisola."

 the_adige: "L'Adige"
 the_adige_desc: "Il fiume Adige è la linfa vitale di $VER$, un canale per il commercio, l'agricoltura e la prosperità. Come le sue acque scorrono dalle Alpi all'Adriatico, così anche la ricchezza scorre attraverso i nostri mercati e campi, nutrendo sia le città che le campagne."

 marmorina: "Marmorina"
 marmorina_desc: "In questi tempi di pace, $VER$ ha prosperato sotto governanti che apprezzano la bellezza tanto quanto il potere. La città si guadagnerà il nome di 'Marmorina' per la sua abbondanza di marmo romano, statue e architettura elegante. Un nuovo ponte sull'Adige, il Ponte Navi, si erge come un capolavoro di ingegneria, mentre la torre Gardello, il primo orologio ad acqua dell'$ITA$, scandiva le ore in silenzioso ascendente. Questa eredità di raffinatezza plasmerà senza dubbio non solo il nostro paesaggio urbano, ma anche il modo in cui saremo ricordati negli annali della storia."

 diocese_of_smolensk: "Diocesi di $SMO$"
 diocese_of_smolensk_desc: "Un tempo roccaforte spirituale del Cristianesimo ortodosso e sede di uno dei più antichi vescovadi della regione, la diocesi di $SMO$ incarna la fede incrollabile del nostro popolo."

 smolenskian_resolve: "Determinazione Smolenskiana"
 smolenskian_resolve_desc: "Per secoli, $SMO$ è stato una terra divisa da stranieri: duchi, duchi lituani, re polacchi, e pricipi moscoviti. Per sopravvivere, ci siamo aggrappati a ciò che ci univa: la nostra fede e la nostra forza d'animo. Se vogliamo risorgere, dobbiamo abbandonare le divisioni e riunirci attorno all'idea sacra che, al di sopra di tutto, esiste solo $SMO$."

 link_the_steppes_trade: "Collegare il Commercio delle Steppe"
 link_the_steppes_trade_desc: "Situato tra la foresta e la steppa, $SMO$ è stata a lungo un crocevia di guerre e commerci. Migliorando le infrastrutture terrestri e mettendo in sicurezza le arterie di viaggio delle carovane, possiamo riforgiare il nostro ruolo di snodo vitale tra la Rus' settentrionale, il Baltico e le rotte commerciali meridionali delle steppe."

 hub_of_militarism: "Centro di Militarismo"
 hub_of_militarism_desc: "La guerra ha definito a lungo il nostro destino, ma ora definirà la nostra forza. Dall'abbraccio rovinoso della guerra e dell'assedio, il $SMO$ sorge come centro di produzione militare: cannoni, armi da fuoco, polvere da sparo e dottrina fluiscono dalle nostre armerie. Che il mondo non ci veda come un bottino da conquistare, ma come un martello da temere, pronto a colpire l'incudine dei conquistatori stranieri."

 armories_of_smolensk: "Le Armerie di $SMO$"
 armories_of_smolensk_desc: "Dopo decenni di guerra su ogni confine, abbiamo imparato a combattere con armi sia orientali che occidentali. Unendo la grinta moscovita alla precisione occidentale, le nostre armerie ora producono artiglieria d'élite e tattiche senza pari rispetto ai nostri rivali. Dalle nostre fucine proviene la potenza di fuoco e dalla potenza di fuoco provengono il dominio e la perseveranza."

 capetian_house_of_anjou: "Casa Capetingia d'$ANJ$"
 capetian_house_of_anjou_desc: "Un potente mix di dignità capetingia e ambizione angioina scorre nelle nostre vene. Anche se non indossiamo più la corona di Gerusalemme, rimaniamo eredi di un'eredità di regalità che un tempo si estendeva dall'$ANJ$ all'$ALB$. Con un'attenta diplomazia e pianificazione, potremmo ancora far rivivere la grandezza dei nostri antenati e rivendicare ciò che ci è stato ingiustamente sottratto."

 lords_of_the_rhone_corridor: "Signori del Corridoio del Rodano"
 lords_of_the_rhone_corridor_desc: "La Valle del Rodano è sempre stata la nostra arteria di potere e i nostri castelli la sorvegliano come sentinelle di pietra. Queste fortificazioni sono tra le più robuste di tutto l'$europe$, un segno indelebile della nostra abilità militare e ingegneristica, che veglia per sempre sul nostro dominio."

 angevin_heraldry: "Araldica Angioina"
 angevin_heraldry_desc: "I gigli dorati e le aquile bicipiti dei nostri stendardi testimoniano antichi diritti e ambizioni reali. Le rivendicazioni che si estendono attraverso l'$italy_region$, raggiungendo l'$ALB$ e $jerusalem$, risuonano ancora nei nostri cuori. Che la Casa di Valois-Angiò si elevi più in alto che mai!"

 le_livre_des_tournois: "Le Livre des Tournois"
 le_livre_des_tournois_desc: "Scritto dalla regalità, il "Libro dei Tornei" è più di un manuale: è una dichiarazione di orgoglio cortese e identità cavalleresca. La nostra nobiltà si addestra non solo per la guerra ma anche per lo spettacolo, e così facendo preserva la disciplina marziale e il prestigio in tutto il regno."

 statutes_of_aix: "Statuti di Aix"
 statutes_of_aix_desc: "Una serie di leggi e statuti vagamente consolidati costituiscono la spina dorsale legale del nostro governo. Questi statuti mescolano la giurisprudenza romana con i costumi locali e la tradizione angioina, consentendoci di gestire un mosaico di regioni come un unico dominio coeso: una vera monarchia composita, dove le parti sono diverse, ma la corona è indivisibile."

 rade_of_toulon: "Rada del $toulon$"
 rade_of_toulon_desc: "Il porto naturale del $toulon$ offre il terreno ideale per le nostre ambizioni navali. Mentre il $marseille$ prospera come nostro gioiello commerciale, il $toulon$ sarà l'armeria della $PRO$ e il punto di lancio di una futura potenza marittima."

 piqure_de_marseilles: "Piqûre de $marseille$"
 piqure_de_marseilles_desc: "Nei laboratori del $marseille$, gli artigiani cuciono delicati #italic boutis#! trapunte in stile provenzale, apprezzate in tutto l'$europe$ per la loro qualità e il loro fascino. Proprio come il nostro ducato, le opere d'arte create nel nostro regno sono composte da molte parti cucite insieme in un insieme unificato: una terra trapuntata, ricca di texture e cultura."

 orm_a_vast_emporium: "Un Vasto Emporio"
 orm_a_vast_emporium_desc: "Si dice che l'$ORM$ sia "un vasto emporio dove si trovano persone e merci di ogni tipo provenienti da tutte le parti del mondo" o che "se il mondo fosse un anello d'oro, l'$ORM$ sarebbe la gemma incastonata al suo interno". L'identità del nostro regno è inseparabile dal commercio. Infatti, navi provenienti dal $gujarat_area$, dall'$arabia_region$ e persino dalla $CHI$ attraccano nei nostri porti, scambiando spezie, $gems$, $silk$ e storie."

 hormuz_toll: "Pedaggio di $ORM$"
 hormuz_toll_desc: "Nel punto più stretto del $persian_gulf$ si trova $ORM$, il guardiano del commercio marittimo est-ovest. Nessuna nave passa senza che noi lo sappiamo o senza pagare la nostra tassa. Per secoli, questo pedaggio non solo ci ha resi più ricchi, ma ha anche plasmato la nostra diplomazia e il modo in cui proiettiamo il nostro potere attraverso i vasti mari."

 gate_of_the_persian_gulf: "Porta del $persian_gulf$"
 gate_of_the_persian_gulf_desc: "L'$ORM$ controlla lo stretto che collega il $indian_ocean_continent$ all'interno del $asia$. Chiunque controlli questo passaggio vitale detta il ritmo del traffico marittimo. Il nostro dominio su queste acque deve essere assoluto, per non rischiare di vedere diminuita la nostra influenza."

 moqarrariya: "Istituzionalizzare la Moqarrariya"
 moqarrariya_desc: "Per generazioni, il nostro regno ha mantenuto la pace con la terraferma attraverso l'antico sistema di tributi noto come #italic Moqarrariya#!. Piuttosto che dipendere da consuetudini e negoziazioni, codifichiamo questi tributi in patti formali, garantendo acqua potabile, sicurezza terrestre e stabilità a lungo termine attraverso una diplomazia affidabile."

 develop_qeshm_and_ormuz: "Investire in Qeshm e $ORM$"
 develop_qeshm_and_ormuz_desc: "Sebbene aride e rocciose, le isole di Qeshm e $ORM$ hanno sostenuto la vita urbana grazie a un approvvigionamento accurato e a un ricco commercio. Con investimenti adeguati, i loro porti e le loro officine possono prosperare ulteriormente, trasformandoli da hub logistici a centri di innovazione e produttività."

 ormuzi_navy: "La Marina Ormuzi"
 ormuzi_navy_desc: "Il $persian_gulf$ è attraversato quotidianamente dalle nostre flotte, siano esse mercantili, pattuglie o scorte armate. Ma per stare al passo con le ambizioni di coloro che invidiano la nostra posizione, dobbiamo espanderci e modernizzarci. Facciamo in modo che l'$ORM$ diventi più di un semplice avamposto commerciale: un arsenale marittimo."

 mint_of_the_gulf: "Zecca del Golfo"
 mint_of_the_gulf_desc: "La moneta di Ormuzi circola dal $basra_al_hamra$ al $bengal_area$, apprezzata per la sua purezza e il suo peso. Istituzionalizzando la nostra zecca ed espandendo la nostra emissione, rafforziamo la nostra sovranità finanziaria e rivendichiamo la supremazia fiscale sul $indian_ocean_region$."

 sav_savoyard_flexibility: "Diplomazia Savoiarda"
 sav_savoyard_flexibility_desc: "Data la nostra precaria posizione tra potenze più grandi, dobbiamo affidarci alle nostre capacità diplomatiche per sopravvivere. Mantenendo relazioni diplomatiche anche con i nostri nemici più pericolosi, saremo in grado di modificare le nostre alleanze per garantire la sopravvivenza del nostro Paese."

 sav_house_of_savoy: "Una Casa Unita"
 sav_house_of_savoy_desc: "La $SAV$ è stato governato da una linea stabile di conti dinastici sin dalla sua creazione. Garantendo l'unità della nostra famiglia regnante e mantenendo un forte legame con i rappresentanti locali, impediamo che il nostro territorio venga frammentato."

 sav_fight_the_vaudois: "Resistere all'Eresia"
 sav_fight_the_vaudois_desc: "Le nostre terre hanno sofferto a lungo sotto la predicazione eretica dei valdesi. Con la forza della nostra volontà e con il sostegno del divino, siamo stati in grado di contenere la loro influenza e continueremo a difendere l'unica vera fede da queste idee pericolose."

 sav_embrace_the_vaudois: "Una Luce nelle Tenebre"
 sav_embrace_the_vaudois_desc: "Abbiamo abbracciato gli insegnamenti del movimento valdese e ci dedichiamo a proteggere questa fede dalla malvagia Chiesa cattolica, che cerca di sradicare le sue idee."

 sav_alpine_pass_control: "Controllo sui Passi"
 sav_alpine_pass_control_desc: "Il passaggio sulle Alpi è difficile anche nelle condizioni migliori e può essere del tutto impossibile con carrozze o un seguito numeroso. Mantenendo buoni sentieri, rifugi e stazioni di sosta, saremo in grado di dominare il terreno difficile e garantire uno scambio costante di mercanti in tutto il nostro territorio."

 sav_the_shroud_of_turin: "Pellegrinaggio alla Sacra Sindone"
 sav_the_shroud_of_turin_desc: "Il nostro regno è in possesso di un manufatto sacro, un pezzo di stoffa che reca il volto di Gesù di Nazareth. Naturalmente, ha attirato numerosi pellegrini, tutti desiderosi di vedere e venerare questa reliquia straordinaria e . Questo flusso costante di pellegrinaggi porta una grande ricchezza nel nostro territorio, il che è molto vantaggioso per noi."

 sav_repopulate_the_valleys: "Popolare le Valli Alpine"
 sav_repopulate_the_valleys_desc: "Molte persone nel nostro regno lasciano le valli alpine in cui sono nate per stabilirsi nelle aree urbane su entrambi i versanti della catena montuosa. Questo spopolamento lascia i piccoli villaggi delle valli minori in una posizione precaria e politicamente instabile. Dobbiamo garantire che le terre della valle siano sufficientemente popolate e possano essere adeguatamente mantenute."

 mai_diadema_regni: "Diadema Regni"
 mai_diadema_regni_desc: "La nostra amata città è stata descritta come "Diadema Regni", la Corona dell'Impero, un appellativo che ci sforziamo con tutte le nostre forze di mantenere. Mantenere questa distinzione ci aiuterà a rimanere al di sopra delle altre città imperiali in termini di prestigio e influenza politica."

 mai_city_and_archbishop: "Diritti della Città"
 mai_city_and_archbishop_desc: "I cittadini della $MAI$ hanno prosperato grazie agli ampi diritti concessi loro da Adalberto della $MAI$ all'inizio del XII secolo. Questi diritti, incisi sulla porta di bronzo della Cattedrale, serviranno a ricordare la cooperazione tra i diversi poteri all'interno della città, sia il clero che i cittadini."

 mai_leader_rheinish_league: "Lega Renana"
 mai_leader_rheinish_league_desc: "Quando la Lega Renana era attiva, abbiamo naturalmente assunto una posizione di leadership e guida per gli altri membri. Sebbene la Lega stessa si sia sciolta, dobbiamo fare tutto il possibile per mantenere la nostra influenza sui nostri ex associati."

 mai_zealous_fight_against_heretics: "Proteggere la Nostra Fede"
 mai_zealous_fight_against_heretics_desc: "L'unità religiosa del nostro Paese deve essere difesa da qualsiasi minaccia. Se forniamo ai nostri eserciti una guida morale sotto forma di cappellani militari, essi saranno molto più motivati a difendere le nostre credenze."

 mai_vicar_of_mainz: "Governo del Vicario"
 mai_vicar_of_mainz_desc: "Per garantire che le nostre terre siano governate in modo affidabile, anche in assenza del nostro sovrano, dovremmo istituire un vicario. Dotato di ampi poteri, il vicario potrà governare secondo le nostre migliori intenzioni e ricordare al popolo la nostra presenza in ogni momento."

 mai_mainz_kingdom: "Regno di Magonza"
 mai_mainz_kingdom_desc: "Sebbene le celebrazioni del Mercoledì delle Ceneri siano un evento comune, nel nostro paese hanno radici particolarmente profonde. Mentre il pubblico celebra il #italic Fastnacht#!, o carnevale, con mascherate e banchetti sfrenati, la nostra corte organizzerà un evento speciale. Durante i festeggiamenti del carnevale, ridistribuiremo i ruoli della nostra corte tramite lotteria, alla quale dovrà partecipare anche il sovrano. Questa usanza di scambiare i ruoli, chiamata #italic Mainzer Königreich#!, si diffonderà ben oltre i nostri confini e contribuirà ad espandere la nostra eredità culturale."

 mai_center_of_printing: "Tipografie del $mainz$"
 mai_center_of_printing_desc: "Espandendo la nostra industria tipografica già in crescita, potremo diventare il principale produttore di libri in $europe$."

 mai_garrison_of_the_rhine: "Guarnigione del Reno"
 mai_garrison_of_the_rhine_desc: "Difendere i nostri confini può essere un compito difficile, soprattutto considerando il fiume che divide in due il nostro territorio. Dobbiamo costruire una vasta rete di guarnigioni e fortificazioni in grado di resistere ai nostri nemici."

 cro_maritime_connections: "Viaggi Marittimi"
 cro_maritime_connections_desc: "A causa della nostra costa frammentata, collegare i nostri insediamenti costieri tramite strade è quasi impossibile. Per questo motivo, dovremo stabilire collegamenti permanenti via mare, assicurando che sia le merci che le persone non debbano subire lunghi viaggi via terra."

 cro_reliance_on_adriatic: "Ricchezze dell'Adriatico"
 cro_reliance_on_adriatic_desc: "I mari ricchi ci danno accesso a un sacco di $fish$ e $salt$, che possono sfamare la nostra gente, sostenere la nostra economia locale e fornirci un sacco di beni da esportare."

 cro_trade_posts: "Posti Commerciali Croati"
 cro_trade_posts_desc: "La nostra terra è situata tra molte destinazioni attraenti per i commercianti. Invece di lasciarli passare e ospitarli solo come intermediari, dovremmo sponsorizzare noi stessi parte di questo business e prendere la nostra giusta quota del commercio mediterraneo."

 cro_influx_of_foreign_knowledge: "Afflusso di Conoscenza Straniera"
 cro_influx_of_foreign_knowledge_desc: "Molti artisti e studiosi stranieri hanno attraversato le nostre terre, ma dovremmo dare loro un incentivo a rimanere. La creazione di una comunità interna di creativi di talento favorirà decisamente i nostri risultati culturali."

 cro_antemurale_christianitatis: "Antemurale Christianitatis"
 cro_antemurale_christianitatis_desc: "Ci consideriamo difensori del Cristianesimo e baluardo contro eretici e pagani."

 cro_pandurs_recruitment: "Coscrizione dei Panduri"
 cro_pandurs_recruitment_desc: "Istituiremo reggimenti di fanteria leggera, che serviranno come forze dell'ordine e protezione contro i predoni in tempo di pace. Questi uomini potranno anche facilmente integrare il nostro esercito, rafforzando le nostre forze armate quando se ne presenterà la necessità."

 arabia_felix: "Arabia Felix"
 arabia_felix_desc: "Sin dall'antichità, il $YEM$ è conosciuto come "Arabia Felix", l'Arabia Fortunata. Benedetta da un clima temperato di alta montagna e da un terreno fertile in un mare di deserto, rimane una delle regioni più naturalmente prospere della penisola. Coltiviamo questa prosperità e usiamola come fondamento di un regno fiorente."

 coffea_arabica: "Coffea Arabica"
 coffea_arabica_desc: "Sebbene altri abbiano tentato di trapiantare il nostro amato chicco, il $coffee$ dell'$arabia_region$ rimane ineguagliabile per sapore e fama. Dal vivace porto di Mocha alle corti di sovrani lontani, il desiderio del mondo per la nostra bevanda è insaziabile."

 zaydi_scholarly_traditions: "Tradizioni Accademiche $zaidi_school$"
 zaydi_scholarly_traditions_desc: "Gli altopiani del $YEM$ sono stati a lungo la sede dell'imamato del $zaidi_school$, un centro di apprendimento e pietà. Radicati nella giurisprudenza islamica, nella teologia e nel razionalismo, i nostri studiosi hanno garantito per secoli lo stato di diritto e l'integrità morale del nostro governo."

 rasulid_bureaucracy: "Burocrazia del $rasulid_dynasty$"
 rasulid_bureaucracy_desc: "La dinastia del $rasulid_dynasty$ ha portato un ordine amministrativo senza precedenti nelle nostre terre. Con i registri del censimento, i sistemi fiscali e una solida struttura di governo, hanno trasformato lo Yemen in uno dei regni governati in modo più efficiente della regione."

 control_of_the_red_sea: "Controllo del Mar Rosso"
 control_of_the_red_sea_desc: "Tutti i commerci da e verso l'$india$ e l'$africa$ devono passare attraverso lo stretto chiamato Porta del Dolore. Facciamo valere il nostro dominio su questo punto nevralgico marittimo e trasformiamo ogni nave di passaggio in un'opportunità."

 yem_unite_the_tribes: "Unire le Tribù Yemenite"
 yem_unite_the_tribes_desc: "Dalla costa di Tihāmah alle montagne di Ḥarāz, il nostro regno ospita innumerevoli tribù fieramente indipendenti. Sebbene abbiano a lungo resistito all'autorità centralizzata, esse sono anche la nostra forza. Unendole sotto un'unica causa, potremo sfruttarle meglio come forza lavoro."

 port_of_aden: "Porto di Aden"
 port_of_aden_desc: "Il porto di Aden è stato un centro nevralgico del commercio per millenni: il suo porto naturale accoglieva navi provenienti dall'$india$, dal $egypt_region$ e dal $east_africa$. Se adeguatamente sostenuto, può tornare a essere la pietra angolare della nostra economia marittima e l'orgoglio del Mar Rosso."

 sons_of_the_salur_tribe: "Figli della Tribù Salur"
 sons_of_the_salur_tribe_desc: "I $KAR$ fanno risalire le loro origini ai Salur, una delle principali tribù Oghuz. Noti sia per la loro leadership che per il loro valore, l'eredità dei Salur plasma l'identità del nostro Stato e la nostra pretesa di rappresentare il $turkmen_culture$ del $anatolia_region$."

 mehmed_beys_firman: "Firmano di Meḥmed Bey"
 mehmed_beys_firman_desc: "Meḥmed I emanò un decreto che imponeva l'uso esclusivo della lingua turca nei tribunali, nei conventi dei dervisci, nelle assemblee e nelle piazze pubbliche. Questo atto ha respinto il predominio della lingua $persian_language$ e della lingua $arabic_language$ nei circoli dell'élite e gettava le basi per una politica culturale tipicamente $turkmen_culture$."

 karamanid_cavalry: "Cavalleria dei $KAR$"
 karamanid_cavalry_desc: "La cavalleria è sempre stata la pietra angolare della guerra in $turkmen_culture$. I nostri cavalieri, addestrati fin da giovani e in sella a robusti cavalli anatolici, mantengono le orgogliose tradizioni della guerra nella steppa con disciplina e forza d'urto."

 home_of_the_whirling_dervishes: "Casa dei Dervisci Rotanti"
 home_of_the_whirling_dervishes_desc: "Il $konya$, il nostro centro spirituale, è la patria dei seguaci di Mevlânâ Jalāl al-Dīn Muḥammad Rūmī. La loro pratica sacra, il #italic sema#!, simboleggia il viaggio dell'anima verso la verità divina. La loro presenza approfondisce le tradizioni mistiche del nostro regno e rafforza le nostre radici sufi."

 sakya_hegemony: "Egemonia Sakya"
 sakya_hegemony_desc: "Nell'ultimo secolo, la scuola Sakya ha detenuto l'autorità temporale sul $TIB$, agendo come amministratore spirituale e politico sotto il patrocinio mongolo. Il loro dominio ha inaugurato un'era di governo centralizzato e consolidamento scolastico. Sebbene il loro dominio sia ormai tramontato, la loro eredità continua a plasmare il nostro approccio all'autorità e all'ordine."

 monastic_dominance: "Dominanza Monastica"
 monastic_dominance_desc: "Una fusione di governo spirituale e temporale definisce il nostro panorama politico. Dal più piccolo villaggio alle sale del potere a Sakya, le istituzioni monastiche sono centrali in ogni ambito della vita. La loro autorità morale e la loro abilità organizzativa garantiscono lealtà, unità e resilienza culturale."

 the_yak: "Lo Yak"
 the_yak_desc: "Addomesticato da secoli, lo yak è la spina dorsale della vita pastorale tibetana. Fornisce carne, latte, lana, mezzi di trasporto e combustibile: persino il suo sterco essiccato è una fonte vitale di combustibile sull'altopiano privo di alberi. Nei momenti di bisogno o di festa, il burro di yak riempie le nostre lampade e le nostre tazze."

 drokpa: "Drokpa"
 drokpa_desc: "I nomadi Drokpa spesso lavorano come pastori e commercianti, facchini che collegano insediamenti lontani. Grazie alle loro tradizioni e alla loro impareggiabile conoscenza del territorio, attraversano le rotte ad alta quota tra $TIB$, Bhutan, Ladakh e $NPL$. Le loro carovane stagionali trasportano $salt$, $wool$ e carne essiccata in cambio di cereali e manufatti. Queste reti intrecciano le nostre montagne in un vivace reticolo di commercio e diplomazia."

 tibetan_monastic_education: "Sistema Educativo Monastico"
 tibetan_monastic_education_desc: "Le nostre istituzioni monastiche sono da tempo centri di apprendimento, dibattito e disciplina spirituale. Grazie a una formazione rigorosa e a un approccio strutturato all'istruzione, i nostri ecclesiastici mantengono un elevato standard di integrità intellettuale e morale. Queste fondamenta sosterranno un governo saggio e la fioritura culturale in tutto il nostro regno illuminato."

 tanye_guanxi: "Tányuè Guānxì"
 tanye_guanxi_desc: "Per secoli, la nostra influenza spirituale in $CHI$ ha costituito il fondamento delle nostre relazioni diplomatiche. Il patrocinio imperiale, gli scambi di tributi e i rituali sacri come il #italic Tányuè#! garantiscono sia il rispetto che i guadagni materiali."

 great_three: "Le Tre Grandi Sedi"
 great_three_desc: "Sera, Ganden e Drepung, queste imponenti università monastiche costituiscono il cuore intellettuale del $TIB$. I loro studiosi formano una generazione dopo l'altra di monaci, diplomatici e governanti. Con la loro ascesa, il nostro regno è diventato non solo un baluardo della fede, ma anche una culla del pensiero rigoroso e del progresso istituzionale."

 dai_lang: "Villaggi Autonomi Viet"
 dai_lang_desc: "La campagna vietnamita è costruita sulla forza duratura dei #italic làng#!, villaggi autonomi che incarnano il principio: "le usanze del villaggio superano le leggi del re". In una terra di aspre montagne e fiumi tortuosi, queste comunità si governano da sole, organizzano milizie locali, riscuotono le tasse in modo efficiente e sostengono l'autorità reale alla base."

 nghia_quan: "I Nghĩa Quân"
 nghia_quan_desc: "Nel corso della nostra storia, i #italic Nghĩa Quân#! — "milizie giuste" — si sono sollevati in difesa della nostra terra nei momenti di grande pericolo. Composti da contadini, studiosi e patrioti locali, hanno combattuto sia contro gli invasori stranieri che contro la tirannia interna. Sebbene di natura irregolare, il loro valore e la loro devozione al Paese li hanno resi una forza formidabile quando mobilitati."

 cha_go_tram_huong: "Gỗ Trầm Hương"
 cha_go_tram_huong_desc: "Il durame resinoso dei nostri alberi autoctoni, noto come legno di agar o #italic Trầm Hương#!, è apprezzato non solo per il suo aroma incantevole, ma anche per le sue proprietà spirituali e medicinali. In tutto il mondo, nobili e monaci lo desiderano per incensi, profumi e offerte. Proteggendo le nostre foreste e perfezionando i nostri metodi di raccolta, possiamo trasformare questo raro dono della natura in uno dei nostri prodotti di esportazione più pregiati."

 my_son_sanctuary: "Santuario di Mỹ Sơn"
 my_son_sanctuary_desc: "Nelle rigogliose valli della $CHA$ centrale si trova il complesso sacro di Mỹ Sơn, dove per generazioni i nostri re e sacerdoti hanno celebrato solenni riti in onore di $shiva_god$, protettore del nostro regno. Queste torri sono scolpite con devozione e adornate con simboli sacri, che ci collegano ai nostri antenati e al divino. Finché l'incenso brucerà nei loro santuari, l'anima della $CHA$ continuerà a vivere."

 lor_mining_tradition: "Miniere della $LOR$"
 lor_mining_tradition_desc: "Le nostre terre sono ricche di minerali e carbone. L'estrazione di queste risorse potrebbe renderci un paese ricco e gettare le basi per le nostre grandi ambizioni."

 lor_cultural_diversity: "Terra di Molte Culture"
 lor_cultural_diversity_desc: "Il nostro territorio ospita molti popoli e culture diverse. Istituire un unico Stato per governare questa popolazione eterogenea non sarà facile, ma dobbiamo farlo. Solo allora saremo degni successori dello Stato loreno da cui discendiamo."

 lor_three_bishoprics: "Terra dei Vescovi"
 lor_three_bishoprics_desc: "La $LOR$ ospita molti vescovi con potenti sostenitori all'estero e all'interno della Chiesa stessa. Cooperare con loro sarà utile per far sentire la nostra voce all'interno della Chiesa in generale. Avere il sostegno dei vescovi ci aiuterà anche a pacificare più facilmente la popolazione."

 lor_between_great_powers: "Eredità di Antichi Re"
 lor_between_great_powers_desc: "Le nostre terre furono un tempo una parte importante della Lotaringia, uno dei regni franchi. Se non vogliamo cadere nell'irrilevanza, dovremo assicurare la nostra posizione diplomatica e stabilire alleanze durature."

 lor_fortified_cities: "Città Fortificate della $LOR$"
 lor_fortified_cities_desc: "Occupiamo punti di passaggio vitali su diversi fiumi, che dobbiamo difendere a tutti i costi se vogliamo garantire la nostra indipendenza. A tal fine, dobbiamo modernizzare i grandi castelli sui ponti delle nostre città e costruire grandi cittadelle in punti strategici."

 bos_land_of_many_churches: "Le Molte Chiese della $BOS$"
 bos_land_of_many_churches_desc: "La $BOS$ è sede di diverse fedi religiose. La nostra terra non solo è condivisa tra la Chiesa ortodossa e quella cattolica, ma è anche sede dei fedeli del $south_slavic_group$ cristiani, i #italic Krstjani#!. Isolati dalla supervisione centrale, dovremo promuovere la comprensione e l'armonia a livello locale tra questi diversi gruppi per mantenere la nostra stabilità."

 bos_cultural_customs: "Stećci della $BOS$"
 bos_cultural_customs_desc: "Il nostro popolo pratica usanze uniche che trascendono le differenze religiose. La costruzione di #italic stećci#!, lapidi riccamente decorate, è una tradizione condivisa da tutti noi, indipendentemente dalla fede. Questi monumenti distintivi contraddistinguono le nostre terre come unicamente bosniache."

 bos_katun_communities: "Katun Valacchi"
 bos_katun_communities_desc: "Parte della nostra popolazione è organizzata in comunità pastorali autogovernate. Invece di sottometterle alla volontà del governo centrale, dovremmo cooperare con loro e, così facendo, cercare di estrarre più risorse dalle nostre aree più remote."

 bos_influence_of_the_stanak: "Riunioni dello Stanak"
 bos_influence_of_the_stanak_desc: "La nostra nobiltà si riunisce regolarmente per discutere le questioni più urgenti per il nostro Paese. Questi incontri assicurano che i nostri nobili signori siano allineati nelle loro politiche e mostrino unità durante le sessioni parlamentari."

 bos_defiant_terrain: "Terreno Ribelle"
 bos_defiant_terrain_desc: "La $BOS$ è una terra di colline e montagne boscose, attraversate da valli fluviali. Questo terreno si presta naturalmente a ritardare e stancare gli eserciti invasori, e dovremmo sfruttarlo a nostro vantaggio. Impegnare il nemico solo quando ci è vantaggioso e lasciare che il terreno ostile stesso si appropri dei loro rifornimenti e delle loro truppe ci consentirà di preservare le nostre forze."

 bos_kingly_ambitions: "Ambizioni Regie"
 bos_kingly_ambitions_desc: "I risultati e il duro lavoro del nostro popolo meritano riconoscimento e protezione. Istituiremo un titolo prestigioso per noi stessi e in tal modo ci assicureremo il riconoscimento dei sovrani vicini, formalizzando il nostro status attraverso legami diplomatici."

 cir_tribal_elections: "Elezioni Tribali"
 cir_tribal_elections_desc: "Eleggiamo un leader nominale del nostro popolo, che agirà come nostro rappresentante ma non interferirà con la supervisione dei signori locali."

 cir_mercenary_employment: "Mercenari Circassi"
 cir_mercenary_employment_desc: "Le nostre terre sono state ripetutamente saccheggiate da potenze straniere e il nostro popolo ridotto in schiavitù. Alcuni di questi schiavi, utilizzati come soldati, hanno fatto carriera nella loro nuova vita, accumulando potere e ricchezza. Con un po' di persuasione, potremmo convincerli a tornare nelle nostre terre e a proteggerle da future invasioni."

 cir_horsemen_of_the_steppe: "Cavalieri Esperti"
 cir_horsemen_of_the_steppe_desc: "La nostra posizione ai margini delle steppe ha portato a numerose invasioni a cavallo delle nostre terre. Se vogliamo garantire la nostra indipendenza, dovremo radunare un grande esercito ed espandere la nostra influenza sulle steppe, proteggendo il nostro cuore."

 cir_city_and_fortress: "Città Fortificate"
 cir_city_and_fortress_desc: "I nostri insediamenti sono privi di protezione e sono facile preda di qualsiasi invasore. Tuttavia, man mano che questi insediamenti crescono, possiamo incorporare direttamente il terreno collinare nelle nostre linee difensive, migliorandone la protezione. Se necessario, possiamo persino creare noi stessi il terreno elevato necessario."

 cir_grand_prince_of_circassia: "Gran Principato"
 cir_grand_prince_of_circassia_desc: "Per unificare il nostro popolo, eleggeremo il più grande dei nostri signori come Gran Principe, che fungerà da leader ispiratore per le nostre truppe."

 cir_multireligious_society: "Convivenza Religiosa"
 cir_multireligious_society_desc: "Le nostre terre sono frequentate da molti popoli cattolici, musulmani e ortodossi, che intrattengono frequenti rapporti commerciali con la nostra popolazione. Dovremmo promuovere una tolleranza collettiva tra tutti i nostri sudditi, al fine di favorire la pace e la stabilità."

 seren_taun: "Sérén Taun"
 seren_taun_desc: "Celebrata dopo il raccolto, la festa #italic Sérén Taun#! è una cerimonia annuale di ringraziamento che celebra l'abbondanza agricola. Caratterizzata da rituali, offerte e musica, rafforza i legami comunitari dei nostri #italic kampung-kampung#! e ricorda a tutti il sacro equilibrio tra le persone, il riso e la natura."

 pepper_of_the_parahyangan: "Pepe del Parahyangan"
 pepper_of_the_parahyangan_desc: "Il fertile suolo vulcanico degli altopiani sundanesi è perfetto per la coltivazione della pregiata spezia, il pepe nero. I commercianti di tutto il mondo ricercano i nostri grani di pepe per la loro potenza e il loro aroma. Dobbiamo sfruttare questo tesoro naturale per espandere la nostra influenza attraverso le spezie."

 pan_asian_trade: "Commercio Panasiatico"
 pan_asian_trade_desc: "La Sunda si trova al crocevia di grandi imperi: $india$, $CHI$ e il mondo islamico. Posizionandoci come nodo indispensabile in questa rete, ci assicuriamo l'accesso a beni, idee e partner in tutto il $asia$, trasformando i nostri porti in porte d'accesso alla prosperità."

 extend_kampung_kampung: "Estendere i Kampung-Kampung"
 extend_kampung_kampung_desc: "Il fondamento della società sundanese risiede in ogni #italic kampung#!, comunità rurali che costellano il paesaggio. Investire nelle infrastrutture di questi villaggi garantisce una crescita sostenibile, una forte leadership locale e la resilienza sia contro la carestia che contro le invasioni."

 sca_unified_scandinavia: "$SCA$ Unificata"
 sca_unified_scandinavia_desc: "L'unione di $DAN$, $NOR$, $SWE$ e $FIN$ sotto un'unica corona ha trasformato il nord da un campo di battaglia di re rivali in un potere centralizzato. Con un'amministrazione unificata e una maggiore cooperazione tra le proprietà, possiamo affermare un controllo più forte sul regno."

 sca_legacy_kalmar_union: "Eredità dell'Unione di Kalmar"
 sca_legacy_kalmar_union_desc: "Sebbene l'Unione di Kalmar si sia dissolta nel conflitto, stabilì un precedente per la sovranità nordica condivisa. Attingendo a questa eredità, riaffermiamo la nostra autorità e ricordiamo ai nostri sudditi che l'unità porta forza, non soggiogazione."

 sca_sound_toll: "Il Pedaggio del Sund"
 sca_sound_toll_desc: "Il controllo sull'Øresund ci garantisce il diritto di imporre il pedaggio del Sund a tutte le navi straniere che attraversano lo stretto danese. Questo antico privilegio trasforma il vantaggio geografico in ricchezza tangibile, rafforzando il nostro dominio sul commercio settentrionale."

 norwegian_heritage: "Patrimonio Marittimo Norvegese"
 norwegian_heritage_desc: "Le coste frastagliate e le tradizioni marittime della $NOR$ hanno plasmato un popolo esperto nella navigazione, nella pesca e nella navigazione. L'eredità dei pescatori e dei costruttori navali norvegese alimenta le nostre imprese navali e rafforza la linfa vitale delle nostre comunità costiere."

 danish_heritage: "Eredità dei Cantieri Navali Danesi"
 danish_heritage_desc: "La lunga tradizione navale della $DAN$ e la sua maestria nella logistica marittima hanno portato alla creazione di importanti cantieri navali come quelli presenti in $kobenhavn$. Come $SCA$, ereditiamo queste potenti infrastrutture e tradizioni, rafforzando la nostra posizione diplomatica e la nostra preparazione navale."

 swedish_roots: "Le Radici Militari Svedesi"
 swedish_roots_desc: "Dalle disciplinate file carolingie ai forti contadini liberi, la potenza militare della $SWE$ è un pilastro essenziale della Scandinavia. Integrando le istituzioni e i sistemi di reclutamento svedesi, rafforziamo la manodopera e la forza del nostro impero."

 finnish_heritage: "Cavalleria di Frontiera Finlandese"
 finnish_heritage_desc: "La cavalleria finlandese — #italic Hakkapeliitta#! — si è guadagnata una reputazione temibile nelle guerre in $europe$. Questi cavalieri, cresciuti nelle selvagge foreste e pianure del $finland_area$, apportano esperienza, adattabilità e resistenza ai nostri ranghi. Formalizzando il loro ruolo, creeremo una forza d'élite permanente all'interno dei nostri eserciti."

 symbol_of_catholicism: "Simbolo del Cattolicesimo"
 symbol_of_catholicism_desc: "$jerusalem$ è la città più sacra della cristianità, il luogo stesso della Passione e della Resurrezione di Cristo. Affermando la supremazia cattolica su questi luoghi sacri, diventiamo il faro spirituale del mondo latino e un pilastro della vera fede."

 protectors_of_jerusalem: "Protettori della $KOJ$"
 protectors_of_jerusalem_desc: "Ci erigiamo in prima linea della Cristianità, circondati dall'incredulità. È nostro sacro dovere proteggere la Città Santa e incutere paura nei cuori dei pagani che oserebbero usurparla."

 latin_patriarch: "Patriarca Latino"
 latin_patriarch_desc: "$PAP$ ha reintegrato il Patriarca Latino della $KOJ$, un tempo esiliato e dimenticato. Ora reintegrato, il Patriarca rafforzerà la nostra influenza a Roma e consoliderà il nostro ruolo di guardiani degli interessi della Chiesa in Oriente."

 rites_holy_sepulchre: "Riti del Santo Sepolcro"
 rites_holy_sepulchre_desc: "Nella Chiesa del Santo Sepolcro, gli antichi riti latini vengono nuovamente celebrati in tutto il loro splendore. Questi solenni rituali, che onorano la morte e la resurrezione di Cristo, rafforzano il nostro mandato divino di governare questa terra e diffondere gli insegnamenti della nostra fede."

 latinate_integration: "Integrazione Latina"
 latinate_integration_desc: "Il nostro regno è un crogiolo di sangue nobile proveniente da tutto l'$europe$, di pellegrini zelanti e di antiche stirpi levantine. Attraverso un governo attento, intrecceremo questo patrimonio diversificato in una società latina cristiana, dove fede e cultura vanno di pari passo."

 chinese_siege_engineers: "Assedi Pianificati"
 chinese_siege_engineers_desc: "Le nostre fortificazioni spesse e robuste rappresentano generazioni di esperienza ingegneristica difensiva. Al contrario, la nostra profonda comprensione dei punti deboli delle fortificazioni, appresa dalla costruzione di mura inespugnabili, ci aiuta a sviluppare tattiche e strategie di assedio particolarmente efficaci."

 chi_legitimate_claimant: "Pretesa al Mandato"
 chi_legitimate_claimant_desc: "Le nostre origini possono essere umili, ma abbiamo dimostrato la nostra capacità di guidare e abbiamo ispirato e conquistato la lealtà di molti sudditi fedeli. Ora siamo considerati degni pretendenti al Mandato del Cielo e al Regno di Mezzo."

 chi_great_rivers_of_china: "Fiumi Fertili"
 chi_great_rivers_of_china_desc: "Sebbene i grandi fiumi che attraversano le nostre terre comportino alcuni rischi per gli insediamenti vicini, essi sono anche uno strumento prezioso per la produzione agricola."

 arabian_horsemanship: "Equitazione Araba"
 arabian_horsemanship_desc: "I cavalli del $horses$ che alleviamo sono molto richiesti in molti paesi stranieri per la loro bellezza e forza. Concentrandoci sul loro allevamento e sulla loro esportazione, trarremo grandi benefici dalla loro fama."

 arabian_desert_warfare: "Forza del Deserto"
 arabian_desert_warfare_desc: "I deserti inospitali dell'$AIA$ hanno reso i nostri guerrieri più forti, in grado di logorare il nemico prima di sferrare il colpo mortale."

 arabia_cradle_of_islam: "Culla dell'Islam"
 arabia_cradle_of_islam_desc: "Le nostre terre ospitano alcuni dei luoghi più sacri della nostra fede. Questa vicinanza divina rende il nostro popolo profondamente legato alle proprie credenze, ispirandolo a raggiungere livelli di grandezza sempre maggiori."

 arabia_red_sea_trade: "Commercio del Mar Rosso"
 arabia_red_sea_trade_desc: "Lungo la nostra costa ci sono molti avamposti commerciali che trattano merci preziose provenienti sia dalle nostre terre che da coste straniere. È ora che rivendichiamo la nostra giusta parte di questa ricchezza."

 indonesia_outer_islands_archipelago: "Arcipelago Indonesiano"
 indonesia_outer_islands_archipelago_desc: "Le connessioni marittime giocano naturalmente un ruolo enorme all'interno della nostra società, poiché siamo circondati da acque. La nostra dipendenza dal commercio e dal trasporto marittimo rende l'attraversamento dei mari un compito banale per il nostro popolo."

 indonesia_naval_supremacy: "Abilità Navale"
 indonesia_naval_supremacy_desc: "La nostra rilevanza politica all'interno dell'arcipelago dipende quasi esclusivamente dalla forza delle nostre forze navali. Migliorando le nostre tecniche di costruzione navale e l'addestramento dell'equipaggio, garantiremo il nostro dominio sugli stati minori del $indonesia_region$."

 indonesia_trading_hub_of_the_east: "Centro Commerciale dell'Est"
 indonesia_trading_hub_of_the_east_desc: "Indipendentemente dalla loro origine o destinazione, tutti i commercianti del $asia$ dovranno alla fine attraversare le nostre terre, portando con sé sia merci preziose che racconti dei loro viaggi."

 indonesia_archipelago_of_many_faiths: "Terra di Molti Popoli"
 indonesia_archipelago_of_many_faiths_desc: "Le nostre isole ospitano molti popoli diversi, che parlano lingue diverse e credono in molti dei diversi. Solo se stabiliamo una comprensione comune e tolleranza tra loro possiamo assicurare un paese prospero."

 italian_universities: "Università della Penisola"
 italian_universities_desc: "L'$ITA$ ospita molte grandi università e studiosi. Se vogliamo mantenere viva la fiamma del $renaissance$, dobbiamo continuare a sostenere queste grandi istituzioni."

 italy_great_families: "Le Grandi Famiglie d'$ITA$"
 italy_great_families_desc: "Dopo la fondazione del nostro Stato unificato italiano, abbiamo assorbito molte grandi famiglie nobili nel nostro Paese. Dovremmo utilizzare il loro prestigio e la loro reputazione per migliorare la nostra, mantenendo occupate queste persone capaci."

 italian_innovativeness: "Adattabilità Italiano"
 italian_innovativeness_desc: "Con il fiorire del $renaissance$ è arrivata una comprensione più profonda di quali grandi progressi possano compiere le conquiste umane. Se desideriamo essere veramente una nazione in progresso, dobbiamo adattarci a queste nuove idee senza paura e non permettere mai che l'innovazione venga ostacolata."

 italian_condottieri: "Grandi Capitani Condottieri"
 italian_condottieri_desc: "La nostra nazione è rinomata per aver prodotto grandi menti militari, sia che servano i propri interessi o che abbiano giurato fedeltà allo Stato. Dovremmo assicurarci che questi intelletti abili siano disposti a servire noi prima di tutto."

 usa_mayflower_compact: "Patto del Mayflower"
 usa_mayflower_compact_desc: "Legati insieme da pericolo e scopo condivisi, i primi coloni redassero un patto di autogoverno. Anche nella wilderness, i semi della società e del compromesso trovarono terreno."

 usa_empowered_assemblies: "Assemblee Potenziate"
 usa_empowered_assemblies_desc: "In tutte le colonie sorsero assemblee elettive che conferivano ai proprietari terrieri il potere di autogovernarsi. Le umili origini della libertà risiedono nelle sale di queste istituzioni."

 usa_great_awakening: "Grande Risveglio"
 usa_great_awakening_desc: "Un'ondata di revival religioso spazza la terra, sfidando le vecchie autorità e smuovendo la coscienza morale di un popolo in ascesa."

 usa_declaration_of_independence: "Dichiarazione d'Indipendenza"
 usa_declaration_of_independence_desc: "#italic Riteniamo che queste verità siano evidenti di per sé, che tutti gli uomini sono creati uguali.#!\n\nCon questa audace dichiarazione, spezzeremo le catene della sottomissione e abbracceremo il nostro destino comune!"

 usa_bill_of_rights: "Carta dei Diritti"
 usa_bill_of_rights_desc: "#italic ...o limitando la libertà di parola, o della stampa; o il diritto del popolo di riunirsi pacificamente, e di presentare petizioni al Governo per la riparazione di lamentele.#!"

 usa_recognized_sovereignty: "Sovranità Riconosciuta"
 usa_recognized_sovereignty_desc: "I trattati e la diplomazia hanno confermato ciò che le nostre lotte hanno conquistato. Il nostro posto sulla scena diplomatica non è più messo in discussione, ma rispettato."

 usa_era_good_feelings: "Era dei Buoni Sentimenti"
 usa_era_good_feelings_desc: "Sulla scia delle difficoltà, la pace e l'unità hanno portato un raro momento di armonia nazionale. Il popolo prospera con ottimismo e ordine."

 kon_bakongo_confederation: "Confederazione Bakongo"
 kon_bakongo_confederation_desc: "Prima dell'ascesa del nostro regno, gli abitanti di questa regione si governavano attraverso consigli di clan e alleanze provinciali. Quello che oggi chiamiamo $KON$ è il risultato di secoli di relazioni intrecciate, in cui la lealtà alla terra e alla famiglia prevaleva su quella ai confini. Unire questo mosaico in un regno centralizzato non è stata un'impresa da poco, ma ci siamo riusciti e continueremo a mantenerlo unito."

 kon_lineage_lukeni_lua_nimi: "Discendenza di Lukeni lua Nimi"
 kon_lineage_lukeni_lua_nimi_desc: "Tutte le cose devono iniziare da qualche parte, e per il nostro regno, quell'inizio risiede in Lukeni lua Nimi. Fu più di un conquistatore. Infatti, fu un fondatore, il padre del nostro regno. La sua stirpe , comandava rispetto, non solo per la sua ascendenza, ma perché ricorda al popolo chi per primo osò sognare un $KON$ unificato."

 kon_european_contact: "Contatti con l'$europe$"
 kon_european_contact_desc: "Gli stranieri arrivarono dal mare con barbe, libri e barili di vino. Portarono con sé strani dei, lingue ancora più strane e un intero oceano di opportunità. I nostri emissari hanno imparato i loro costumi, le loro intenzioni e, cosa più importante, come trasformare il loro bisogno di alleati in un vantaggio per noi."

 kon_cultural_syncreticism: "Sincretismo Culturale"
 kon_cultural_syncreticism_desc: "L'afflusso di stranieri e gli scambi culturali hanno avuto un impatto sulla nostra società. Tuttavia, non abbiamo abbandonato i nostri costumi. Invochiamo le divinità con nomi kikongo, indossiamo con orgoglio i nostri simboli religiosi e le nostre cerimonie risuonano di tamburi e inni. Questo è un esempio vivace della nostra chiarezza, e gli dei sembrano essere d'accordo."

 kon_study_european_firearms: "Studiare le Armi da Fuoco Europee"
 kon_study_european_firearms_desc: "Il moschetto forse non rende un uomo coraggioso, ma lo rende sicuramente temibile. Lasciamo che quelli dell'$europe$ si vantino della loro superiorità; noi compreremo le loro armi, impareremo le loro tecniche e ben presto l'unica cosa che distinguerà i nostri soldati dai loro sarà il colore delle loro bandiere."

 kon_transatlantic_slave_trade: "Commercio Transatlantico di $slaves_goods$"
 kon_transatlantic_slave_trade_desc: "Abbiamo bisogno di prigionieri e lavoratori all'estero per gestire i nostri numerosi cantieri, piantagioni e miniere. Sebbene si tratti di un'impresa tutt'altro che nobile, nessuno può negare la natura redditizia di queste attività."

 ilk_restore_yam: "Restaurare lo Yäm"
 ilk_restore_yam_desc: "Lo Yäm, il nostro antico sistema di stazioni di trasmissione e messaggeri, un tempo collegava gli angoli più remoti del mondo mongolo. Ripristinando questa vasta rete in tutto la $persia_region$ e oltre, garantiamo che i nostri ordini siano rapidi, i nostri inviati al sicuro e il nostro dominio reattivo, proprio come ai tempi d'oro dei Khan."

 ilk_ilkhanate_resurgent: "$ILK$ Risorto"
 ilk_ilkhanate_resurgent_desc: "Ciò che un tempo era distrutto ora rinasce. I nostri stendardi sventolano ancora una volta in tutto la $persia_region$, suscitando timore e soggezione in egual misura. Man mano che la notizia della nostra crescente potenza si diffonde, il mondo ricorderà cosa significa essere governati da un vero $ILKHANATE_LEADER_MALE$."

 ilk_persian_arts_and_architecture: "Arti e Architettura Persiane"
 ilk_persian_arts_and_architecture_desc: "I nostri antenati governavano con la spada, ma la loro grandezza fu misurata in palazzi, biblioteche e minareti. Seguiamo il loro esempio e finanziamo non solo mura e strade, ma moschee, giardini e scuole come testimonianze della grandezza del $ilkhanate$."

 ilk_descendants_of_genghis_khan: "Discendenti del $genghis_khan_name_no_tooltip$"

 ilk_descendants_of_genghis_khan_desc: "Il sangue del $rank_empire_horde_ruler_suffix_male$ scorre nelle nostre vene. Che nessun uomo dimentichi che il nostro governo fu ordinato nelle steppe e sigillato dalla conquista. I nostri cavalieri rimangono ineguagliati, e i nostri stendardi portano non solo un nome, ma un diritto di nascita."

 ilk_new_roots: "Nuove Radici"
 ilk_new_roots_desc: "I giorni della pura conquista delle steppe sono ormai alle nostre spalle. Abbiamo seminato noi stessi nel terreno del progresso e della riforma. Da quel terreno crescerà uno Stato più stabile e sofisticato. Anche se i nostri cuori dell' e possono ancora battere al ritmo dei campi aperti, il nostro futuro risiede in istituzioni durature, non in incursioni fugaci."

 hin_sepahi: "Sipâhi"
 hin_sepahi_desc: "Trascurare l'importanza della fanteria è stata la rovina di molti aspiranti conquistatori. Dobbiamo assicurarci che le nostre truppe siano equipaggiate con le armi da fuoco più efficaci e addestrate con tattiche in grado di adattarsi a qualsiasi nemico."

 hin_united_india: "$india$ Unita"
 hin_united_india_desc: "I numerosi popoli, culture, lingue e nazioni che compongono l'$india$ saranno finalmente uniti sotto un'unica bandiera. Solo con una comprensione comune e un'unità attentamente coltivata tra tutti i nostri popoli potremo lottare per raggiungere obiettivi più ambiziosi."

 hin_ganga: "Gaṅgā"
 hin_ganga_desc: "Molti fedeli indù venerano il fiume Gange come una dea che porta purezza e redenzione ai fedeli. Imploriamo i pellegrini di visitare le rive del fiume per bagnarsi nelle acque sacre. Attraverso Gaṅgā, la nostra nazione è resa pura."

 hin_persianate_court: "Cultura di Corte Persianizzata"
 hin_persianate_court_desc: "Le lingue straniere e i costumi nobili hanno influenzato profondamente le corti dell'$india$ per molto tempo. Dovremmo utilizzare queste connessioni per invitare i consiglieri più capaci a servire sotto la nostra guida."

 hin_gunpowder_empire: "Impero della Polvere da Sparo"
 hin_gunpowder_empire_desc: "La nostra maestria nella guerra con la polvere da sparo ci ha portato gloria e ci ha aiutato a fondare il nostro grande Stato. Questo dominio sarebbe impossibile senza promuovere la produzione di armi da fuoco per le nostre truppe."

 hin_sufism: "Attirare Missionari Sufi"
 hin_sufism_desc: "I principi musulmani di tutto il mondo competono per attirare i più saggi maestri Sufi. Man mano che la nostra fama è cresciuta, sempre più Sufi si sono uniti a noi. Ovunque si stabiliscano, spesso in regioni precedentemente inospitali, vengono fondate delle città e la popolazione locale è ispirata a convertirsi grazie alla saggezza dei Sufi."

 hin_administration_of_india: "Amministrazione Indiana"
 hin_administration_of_india_desc: "Governare uno stato grande quanto un intero subcontinente non è un compito facile. Dovremo sviluppare un solido sistema amministrativo in collaborazione con i principi locali per ottenere il massimo dalla nostra produzione e garantire una stabilità diffusa."

 hin_indian_empire: "$india$ Imperiale"
 hin_indian_empire_desc: "Nessun sovrano, che sia musulmani, indù, buddisti o giainisti, è mai riuscito a conquistare l'intero subcontinente. Noi saremo i primi sovrani universali dell'$india$!"

 hin_rocketry: "Sviluppare la Tecnologia dei Razzi"
 hin_rocketry_desc: "I razzi con rivestimento in ferro devono ancora essere ampiamente adattati per scopi militari, eppure il loro potere esplosivo ha sicuramente applicazioni tattiche. Dovremmo sperimentare con questa tecnologia e testarla sul campo di battaglia."

 hin_industrialization: "Industrializzazione dell'$india$"
 hin_industrialization_desc: "Le condizioni della nostra economia sono ideali per una rapida crescita industriale. Con le nuove tecnologie possiamo garantire condizioni migliori per la nostra produzione locale, in particolare nell'industria tessile. La nostra attenzione ai nuovi metodi significa che il nostro Stato può garantire una costante espansione industriale."

 cth_merchant_legacy: "Eredità Mercantile"
 cth_merchant_legacy_desc: "Le flotte commerciali fenicie hanno solcato il Mediterraneo per secoli. Questa eredità economica ci rende più efficienti - e spietati - quando si tratta di commercio. Torneremo a presiedere il flusso e riflusso delle merci!"

 cth_breadbasket_of_rome: "Granaio di Roma"
 cth_breadbasket_of_rome_desc: "Secoli fa, i nostri progressi nell'irrigazione e nella coltivazione dell'olivo valsero alla $CTH$ il soprannome di "granaio di Roma". Ora attingeremo alle nostre antiche conoscenze agricole e combatteremo ancora una volta contro il deserto per piantare i nostri uliveti, proprio come nell'antichità."

 cth_mercenary_army: "Esercito di Mercenari"
 cth_mercenary_army_desc: "Il nostro impero ancestrale non aveva una popolazione numerosa, quindi per secoli abbiamo fatto affidamento sui mercenari durante le guerre. Dopo la riforma della $CTH$ abbiamo continuato questa tradizione per salvare la nostra popolazione dai pericoli del campo di battaglia."

 cth_cothons: "Cothon"
 cth_cothons_desc: "L'antico #italic cothon#! cartaginese era una meraviglia tecnologica che contribuiva a facilitare la costruzione efficiente delle navi. Ora, questa grande eredità servirà da modello per tutto il nostro Paese. Lo studio delle antiche tecniche di costruzione navale ci permette di eccellere nuovamente in questo settore e la marina cartaginese dominerà presto il Mediterraneo."

 cth_phoenician_sailors: "Marinai Fenici"
 cth_phoenician_sailors_desc: "Dopo aver restaurato il nostro antico regno, abbiamo iniziato a contattare i nostri fratelli fenici in Libia. Di conseguenza, abbiamo un afflusso costante di volontari che vogliono partecipare al restauro dell'antico regno fenicio della $CTH$. Sembra che ora potremo mantenere una marina molto più grande..."

 cth_legacy_of_hannon: "Eredità di Annone"
 cth_legacy_of_hannon_desc: "Hannon il Marinaio fu un leggendario esploratore antico che si avventurò lontano, nel sud della costa africana. Seguiremo il suo esempio e organizzeremo viaggi di esplorazione per ripristinare il nostro impero commerciale perduto. Questa volta spingeremo le nostre spedizioni ancora più lontano, alla ricerca di nuove opportunità commerciali in tutto il mondo."

 cth_beyond_the_pillars: "Oltre le Colonne"
 cth_beyond_the_pillars_desc: "È giunto il momento che le nostre fabbriche commerciali si spingano oltre le mitiche colonne d'Ercole. Combinando le antiche conoscenze coloniali con le moderne scoperte, potremo insediarci in modo più efficiente rispetto alle nazioni più giovani, che sono ancora alle prime armi in questo campo. Presto le colonie cartaginesi saranno presenti in tutto il mondo!"

 cth_wine_traders: "Commercio Punico del $wine$"
 cth_wine_traders_desc: "Nell'antichità, abbiamo creato una filiera commerciale del $wine$ producendo grandi quantità di $wine$ di bassa qualità da commerciare e importando quello di buona qualità per noi stessi. Basandoci su questa tradizione, stiamo cercando di espandere le nostre capacità produttive del $wine$: #italic domineremo#! il commercio del $wine$ nel Mediterraneo!"

 cth_punic_global_trade: "Commercio Globale Punico"
 cth_punic_global_trade_desc: "Per secoli, la nostra nazione ha dominato il commercio nel Mediterraneo. Ora, con tutte le nuove scoperte fatte nei secoli successivi, siamo pronti a dominare il mondo. Presto ci sarà una nave mercantile cartaginese in ogni porto del mondo!"

 cth_sufet_rule: "Governo dello Šūfeṭ"
 cth_sufet_rule_desc: "Il nostro antico regno era guidato da un capo di Stato eletto chiamato #italic Šūfeṭ#!. In questa nuova era moderna, riorganizzeremo il nostro governo, attingendo dall'esperienza dell'antichità e combinandola con le teorie moderne per creare un potente sistema repubblicano, che eclisserà ogni repubblica creata fino ad oggi!"

 network_of_cities: "Rete di Città"
 network_of_cities_desc: "Attraverso laghi e valli, le nostre città si legano tra loro grazie a strade, mercati e obiettivi comuni, rafforzando la nostra influenza."

 status_by_merit: "Stato Basato sul Merito"
 status_by_merit_desc: "I guerrieri e i nobili si distinguono per il loro valore e il loro servizio, assicurando che l'autorità appartenga a coloro che se la sono veramente guadagnata."

 expansion_merchant_guilds: "Espansione delle Gilde dei Mercanti"
 expansion_merchant_guilds_desc: "I mercanti Pochtēcah estendono le loro rotte ben oltre i nostri confini, arricchendo ogni mercato fedele ai Mexihcah."

 centralized_city_governance: "Governance Urbana Centralizzata"
 centralized_city_governance_desc: "La riforma del nostro governo, nel tentativo di sostenere l'espansione dei nostri territori urbani di recente acquisizione, sarà unificata sotto una supervisione rigorosa, creando un'amministrazione più ordinata e affidabile."

 wealth_of_mesoamerica: "Ricchezza della Mesoamerica"
 wealth_of_mesoamerica_desc: "I fertili terreni, le foreste e le miniere di Ānāhuac producono immense ricchezze, sostenendo la nostra crescita e le nostre ambizioni imperiali. Un uso corretto di queste risorse rafforzerà la nostra prosperità."

 study_european_colonizers: "Studiare i Colonizzatori Europei"
 study_european_colonizers_desc: "Degli sconosciuti hanno contattato la nostra gente. Le loro navi e le loro armi sconosciute incutono timore e soggezione. Comprendere i loro metodi potrebbe essere la chiave per la sopravvivenza."

 new_fire_ceremonies: "Nuove Cerimonie del Fuoco"
 new_fire_ceremonies_desc: "Una volta ogni cinquantadue anni, il mondo viene rinnovato dalle fiamme, unendo le persone nella fede e nell'equilibrio cosmico."

 sun_must_rise: "Il Sole Deve Sorgere"
 sun_must_rise_desc: "Attraverso la devozione e i rituali, manteniamo vivo il viaggio del sole, alleviando i cuori e rafforzando lo spirito del nostro popolo. La conservazione dell'equilibrio, e persino del mondo, poggia sulle nostre spalle."

 krs_kurdish_tribes: "Lealtà Tribale"
 krs_kurdish_tribes_desc: "Dopo aver affermato la nostra autorità su tutte le tribù di cultura $kurdish_culture$, potremo contare sui loro guerrieri esperti e temprati per difendere il nostro Paese."

 krs_legacy_of_the_kurdish_dynasties: "L'eredità delle Dinastie Curde"
 krs_legacy_of_the_kurdish_dynasties_desc: "Il nostro popolo ha fondato diverse grandi dinastie, governando territori che vanno dal $egypt_region$ all'Iran. Legare il nostro Stato alla gloria dei sovrani del passato ci consentirà di diventare un simbolo di unificazione per la popolazione $kurdish_culture$ e renderà il nostro governo più legittimo agli occhi dei nostri sudditi."

 krs_kurdish_quarters: "I Prosperi Quartieri Curdi"
 krs_kurdish_quarters_desc: "Durante il periodo di dominio straniero, molti dei nostri cittadini hanno creato quartieri prevalentemente curdi nelle città. Sebbene queste aree abbiano prosperato anche sotto governanti lontani, ora possiamo sfruttare direttamente la loro ricchezza e garantire un futuro più prospero al nostro popolo."

 krs_kurdish_horses: "Cavalleria Adattabile"
 krs_kurdish_horses_desc: "Le nostre terre natali sono circondate da molti aspiranti conquistatori, desiderosi di soggiogare il nostro popolo. Sebbene il nostro territorio possa rallentare gli eserciti nemici, rende anche difficile alle nostre truppe rispondere rapidamente alle minacce. Una cavalleria forte, tuttavia, ci consentirà di reagire rapidamente a qualsiasi minaccia, indipendentemente dal numero dei nemici."

 krs_kurdish_mercenaries: "Esperienza Mercenaria"
 krs_kurdish_mercenaries_desc: "Il nostro popolo ha a lungo prestato servizio come mercenario per signori stranieri, acquisendo una preziosa esperienza di combattimento al loro servizio. Ora che il nostro Paese è stato fondato, è giunto il momento di chiamare quei combattenti esperti sotto la nostra bandiera."

 krs_kurdish_warrior_poets: "Poeti Guerrieri"
 krs_kurdish_warrior_poets_desc: "I nostri governanti non devono essere solo guerrieri capaci, ma devono anche essere istruiti nelle belle arti e nell'amministrazione efficace. Scrivendo testi e documentando i loro regni, i nostri leader trasmetteranno le conoscenze e la storia del nostro popolo alle generazioni future, assicurando che nessuna preziosa intuizione vada perduta."

 mohe_ancestry: "Discendenza dei Mohe"
 mohe_ancestry_desc: "Il nostro popolo discende dalle tribù Mohe delle foreste dell'Amur. Le loro tradizioni di caccia, pastorizia e vita di frontiera modellano la nostra società."

 warka_ties: "Legami Warka"
 warka_ties_desc: "I nostri legami con i Warka ci hanno permesso di acquisire una grande conoscenza nella caccia e nella raccolta di cibo. Grazie a queste pratiche, garantiamo il sostentamento del nostro popolo anche durante i lunghi inverni."

 shadow_of_ambition: "Ombra dell'Ambizione"
 shadow_of_ambition_desc: "L'unificazione delle tribù Jurchen è solo il primo passo della nostra ambiziosa ascesa al potere. Presto il nostro nome incuterà timore e soggezione in tutto il continente."

 niyamniyan: "Niyamniyan"
 niyamniyan_desc: "La tradizione dei Cinque Nobili Talenti comprende l'equitazione, il tiro con l'arco, il comando militare, la lealtà e la disciplina. Questi aspetti della nostra società marziale costituiscono la spina dorsale della nostra orgogliosa cultura."

 southern_campaigns: "Campagne Meridionali"
 southern_campaigns_desc: "La $CHI$ è sede di ricchezze, prestigio e conoscenze incommensurabili. Sotto il dominio di una dinastia debole, spetta a noi conquistare il potere e riportare la prosperità e lo splendore di queste terre."

 foreign_learning: "Istruzione Straniera"
 foreign_learning_desc: "Da studiosi e testi stranieri adotteremo nuove pratiche amministrative, militari e accademiche, accelerando il ritmo del nostro sviluppo tecnologico."

 melaka_tree: "L'Albero di Melaka"
 melaka_tree_desc: "Secondo la leggenda, il timido cervo topo cercò rifugio in quello che sarebbe poi diventato il nostro dominio. Le nostre origini sono umili, poco più che un villaggio di pescatori raggruppato all'ombra dell'albero di Melaka. Da queste radici sarebbe nato un popolo che un giorno avrebbe plasmato l'intera regione."

 orang_laut: "Orang Laut"
 orang_laut_desc: "Molto prima della nostra ascesa, gli Orang Laut vagavano per gli stretti come padroni del vento e delle maree. Ora, imparando i loro metodi e assumendo alcuni di loro, guidiamo i commercianti attraverso le acque strette e proteggiamo la nostra costa dai pirati. Tale vigilanza garantisce che tutti coloro che navigano verso il $malacca$ arrivino sani e salvi."

 congregation_of_merchants: "Congregazione dei Mercanti"
 congregation_of_merchants_desc: "Dall'$arabia_region$ alla Cina e alle coste del $south_asia$, mercanti provenienti da ogni dove convergono sul $malacca$. Attratti da leggi eque, acque sicure e mercati vivaci, formeranno una grande comunità che arricchirà i nostri porti e porterà il nostro nome oltre i mari."

 connections_with_china: "Collegamenti con la Cina"
 connections_with_china_desc: "I nostri inviati hanno ottenuto il riconoscimento dai sovrani più prestigiosi della Cina. Tributi e buona volontà fluiscono tra noi, garantendoci prestigio, protezione e un posto privilegiato nella vasta rete dei loro scambi commerciali."

 control_the_malacca_strait: "Controllare lo Stretto di Malacca"
 control_the_malacca_strait_desc: "Lo stretto $inner_strait_malacca$ è la spina dorsale del nostro commercio marittimo. Controllando questo stretto vitale, convogliamo la ricchezza delle nazioni nei nostri porti e ci affermiamo come guardiani senza rivali del commercio est-ovest."

 shahbandar: "Il Sistema Shāhbandar"
 shahbandar_desc: "Per gestire il vasto flusso di mercanti che arrivano nei nostri porti, nominiamo uno Shāhbandar come autorità incaricata di supervisionare le dogane, risolvere le controversie e organizzare i quartieri stranieri. Questo ufficio porta ordine nel nostro vivace centro commerciale e rafforzerà il nostro ruolo di crocevia dei mari."

 settle_the_islands: "Colonizza le Isole"
 settle_the_islands_desc: "Tra le isole sparse della nostra patria si trovano innumerevoli coste che attendono il nostro tocco. Rafforzando la nostra presenza tra queste isole, assicuriamo la ricchezza del nostro popolo: nuovi scambi commerciali, nuovi raccolti e nuove comunità legate dalle onde che ci uniscono."

 people_of_the_sea: "Il Popolo del Mare"
 people_of_the_sea_desc: "Siamo un popolo plasmato dal vento e dalle maree. Fin dall'infanzia impariamo a conoscere i monsoni, il ritmo dello stretto e il richiamo dell'oceano aperto. I nostri marinai portano con sé questa conoscenza in ogni viaggio, guadagnandosi la fama in tutto l'arcipelago per il loro coraggio e la loro maestria."

 expert_hagglers: "Esperti Negoziatori"
 expert_hagglers_desc: "Ovunque i nostri commercianti approdino, che siano le coste del $south_asia$ o i mercati della lontana Cina, sono rispettati per la loro lingua tagliente e il loro acuto giudizio. Navigando con uguale abilità sia i mari che i negoziati, garantiscono che i nostri scambi commerciali non siano mai svantaggiosi."

 malay_merchants_in_every_port: "Mercanti Malesi in Ogni Porto"
 malay_merchants_in_every_port_desc: "Dai bazar dell'$arabia_region$ ai porti dell'$east_asia$, i nostri mercanti sono una presenza familiare. La loro presenza forma una vasta rete di cooperazione, facilitando la creazione delle nostre enclavi all'estero ed estendendo la nostra influenza in tutti i grandi centri commerciali del mondo."

 agreements_sea_nomads: "Accordi con i Nomadi del Mare"
 agreements_sea_nomads_desc: "I $sama_culture$ e altri popoli nomadi del mare vivono da tempo sull'acqua stessa, navigando tra le isole con abilità senza pari. Attraverso la condivisione delle conoscenze o accordi di reciproco rispetto e opportunità condivise, garantiremo un passaggio sicuro e riparazioni rapide."

 masters_of_spice: "Maestri delle Spezie"
 masters_of_spice_desc: "Il commercio dei chiodi di garofano è fonte di grande ricchezza per noi e per il nostro popolo. Proteggendo le terre e i mari da cui provengono queste spezie, siamo al centro di un commercio che abbraccia il mondo intero, e nessun mercante può ignorare il fascino di questi prodotti."

 sko_fulani_expansion: "Espansione di Sokoto"
 sko_fulani_expansion_desc: "Per troppo tempo il popolo del $west_africa$ ha lavorato sotto governanti che, pur professandosi giusti, si abbandonavano al sincretismo. Ora basta! La nostra bandiera sventolerà sempre sopra quella dei regni mondani!"

 sko_recruit_the_faithful: "Recluta i Fedeli"
 sko_recruit_the_faithful_desc: "Chiunque sia pronto a servire sotto i nostri leader giusti deve essere accolto, indipendentemente dalla propria origine."

 sko_education_for_all: "Studiosi Eruditi"
 sko_education_for_all_desc: "Incoraggiando la diffusione dell'alfabetizzazione e dell'istruzione sia tra gli uomini che tra le donne, possiamo far progredire la nostra società e rafforzare il nostro controllo sulle nostre terre. La famiglia dei nostri governanti deve occupare un posto speciale in questi sforzi, fungendo da modello da emulare."

 sko_religious_court: "Corte più Religiosa"
 sko_religious_court_desc: "Anziché ostentare lo sfarzo mondano del nostro potere, la nostra corte dovrebbe concentrarsi sulle questioni spirituali. Invitando eminenti personalità religiose a insegnare nella nostra capitale, potremo dimostrare il nostro sincero impegno nei confronti della fede."

 sko_recruit_fulani_generals: "Recluta Comandanti $fulbe$"
 sko_recruit_fulani_generals_desc: "Il popolo del $fulbe$ è composto da guerrieri illustri, che ricoprono ruoli di comando in ogni angolo del $west_africa$. Dovremmo affermarci come datore di lavoro permanente per i loro comandanti più capaci."

 sko_one_people_in_faith: "Unificazione nella Fede"
 sko_one_people_in_faith_desc: "Le nostre terre ospitano molte persone di culture e lingue diverse. Dobbiamo sottolineare la nostra fede come forza unificante, che riunisce tutte le persone sotto un'unica bandiera."

 ita_birthplace_of_the_renaissance: "Continuazione del Rinascimento"
 ita_birthplace_of_the_renaissance_desc: "L'$italy_region$ ha visto un grande afflusso di menti brillanti. Che si tratti di artisti itineranti che vengono qui per fare fortuna o della nostra gente ispirata a partecipare a questa grande rinascita delle arti, le nostre città sembrano traboccare di intelletti capaci. Con il nostro patrocinio, continueremo sicuramente ad attrarre persone di talento nella nostra cultura."

 ita_connect_the_interior: "Collegare l'interno"
 ita_connect_the_interior_desc: "Mentre il terreno delle nostre terre consente trasporti rapidi e spostamenti lungo la costa, l'interno della penisola italiana è molto più difficile da attraversare in molti punti. Collegare non solo le località interne, ma anche le coste tra loro, garantirà operazioni commerciali più agevoli e una maggiore manovrabilità delle nostre truppe."

 ita_increased_recruitment: "Un Bene Prezioso"
 ita_increased_recruitment_desc: "L'$italy_region$ è un bene ambito da molti sovrani stranieri. Se vogliamo difendere il nostro Paese, dobbiamo ampliare il reclutamento sia per le nostre forze terrestri che per quelle marittime. Poiché l'$italy_region$ è vulnerabile alle invasioni sia attraverso i passi alpini che lungo la nostra vasta costa, dobbiamo garantire che l'esercito e la marina siano ben preparati ad affrontare qualsiasi conquistatore che cerchi di turbare la pace della penisola."

 ita_influence_over_the_clergy: "Clero Influente"
 ita_influence_over_the_clergy_desc: "Grazie alla sua vicinanza al $papacy_reform$, L'$italy_region$ vanta una lunga tradizione di ecclesiastici potenti e di talento al servizio della fede. Indipendentemente da dove ci porteranno le questioni religiose, dovremmo mantenere buoni rapporti con il nostro clero."

 ita_enduring_hardship: "Le Difficoltà della Guerra"
 ita_enduring_hardship_desc: "Gli interessi stranieri in $italy_region$ hanno più volte trasformato le nostre terre nel campo di battaglia di paesi più potenti. Sostenere la nostra popolazione in questi momenti di difficoltà è un compito arduo. Creare luoghi sicuri dove rifugiare la popolazione durante i conflitti garantirà il loro sostegno anche durante le guerre più terribili."

 ita_flourishing_urban_centers: "Città Fiorenti"
 ita_flourishing_urban_centers_desc: "Le nostre terre sono benedette da molte aree altamente urbanizzate. Questo non solo ci offre ampie opportunità per la produzione di beni, ma i loro collegamenti commerciali ci consentono anche di spedirli sui mercati esteri a nostro vantaggio. Eliminare qualsiasi ostacolo all'espansione di queste industrie garantirà il loro continuo successo."

 ita_attractive_migration: "Paesaggio Affascinante"
 ita_attractive_migration_desc: "La terra fertile e mite della nostra penisola è una meta molto ambita dalle persone provenienti dai paesi confinanti che cercano fortuna. Sebbene molte delle nostre città facciano già affidamento sulla manodopera dei migranti stagionali, dovremmo intensificare i nostri sforzi per far sì che queste persone si stabiliscano definitivamente nelle nostre terre."

 kol_peace_in_the_city: "Pace nella Città"
 kol_peace_in_the_city_desc: "Non molto tempo fa, la nostra città è stata quasi distrutta dalla lotta tra i nostri borghesi e il nostro clero. Dobbiamo garantire che questo conflitto non si ripeta e che tutti i membri della nostra corte e del consiglio comunale collaborino per preservare Colonia come centro nevralgico sul Reno."

 kol_school_of_painting: "Scuola di Pittura di Colonia"
 kol_school_of_painting_desc: "La nostra città ospita molti pittori e artigiani capaci, abili nell'arte di dare vita alle immagini attraverso il legno, la pietra e soprattutto il vetro. Con il sostegno di una corporazione di artisti fortemente radicata, essi prospereranno sotto la nostra sponsorizzazione e illumineranno la nostra città di nuova gloria."

 tri_balance_the_landstande: "Bilanciare il Landstände"
 tri_balance_the_landstande_desc: "Il nostro territorio ospita sia numerose aree urbane che castelli di molti cavalieri imperiali. Bilanciare loro e i loro interessi spesso contrastanti non è un compito facile. Solo se cooperano con noi e con il capitolo della cattedrale, possiamo garantire la funzionalità del nostro governo."

 hes_form_the_militia_army: "Nucleo dell'Esercito Professionale"
 hes_form_the_militia_army_desc: "La nostra posizione strategica all'interno dell'Impero ci rende un punto di appoggio interessante per gli eserciti degli altri principi ogni volta che sorgono minacce esterne. Tuttavia, ospitare truppe straniere danneggia le nostre finanze. Per evitare questo onere costoso, dobbiamo reclutare le nostre truppe e metterle al servizio dell'Impero."

 noble_society_baden_palatine: "Società con l'Asino"
 noble_society_baden_palatine_desc: "Fondata per proteggere gli interessi dei cavalieri all'interno dell'Impero, la #italic Gesellschaft mit dem Esel#! si è radicata nelle terre circostanti il $heidelberg$. La loro esperienza nel governo, così come la loro capacità di sponsorizzare tornei, migliorerà la nostra posizione culturale."

 noble_society_nassau: "Società con il Leone"
 noble_society_nassau_desc: "Fondata nelle difficoltà del $western_schism$, la #italic Löwenbund#! ha giurato di proteggere le nostre terre dalle rivolte eretiche. Dovremmo concedere loro il nostro patrocinio ufficiale e incorporarle nella nostra corte per promuovere la nostra causa."

 noble_society_mainz: "Società Bengler"
 noble_society_mainz_desc: "La #italic Klüppelgesellschaft#! è stata fondata da un gruppo di cavalieri preoccupati per l'erosione del nostro potere all'interno del Sacro Romano Impero. Sarebbe saggio da parte nostra sponsorizzare coloro che sono disposti a lottare per il nostro status."

 noble_society_franconia: "Società Fürspang"
 noble_society_franconia_desc: "La #italic Gesellschaft mit dem Fürspang#! è un ordine di cavalieri formato per difendere i propri interessi e fornire assistenza a coloro che li sponsorizzano. Fornire loro ingenti fondi ci garantirà un potere politico significativamente maggiore all'interno della nostra regione e del Sacro Romano Impero."

 noble_society_tyrol: "Elefantenbund"
 noble_society_tyrol_desc: "Le nostre terre sono a rischio di invasione da parte di vicini ostili, che desiderano le ricchezze delle nostre valli. Creare e finanziare un ordine cavalleresco, pronto a difendere le nostre terre, ci permette di attingere a forze maggiori in caso di necessità."

 noble_society_cologne: "Ordine di Sant'Uberto"
 noble_society_cologne_desc: "L'#italic Hubertusorden#! servirà come glorioso ricordo della potenza dei nostri cavalieri in combattimento! L'ordine sarà una ricompensa per i nostri fedeli cavalieri e i suoi membri mostreranno la nostra gloria agli occhi di tutti."

