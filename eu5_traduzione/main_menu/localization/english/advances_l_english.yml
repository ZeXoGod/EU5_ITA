 bng_bengali_vassal_system: "Sistema di Vassallaggio $BNG_ADJ$"
 #bng_bengali_vassal_system_desc: "Durante il regno del $DLH$, il popolo $bengali$ ha servito il suo sovrano come vassallo redditizio. Il sistema del $DLH_ADJ$ ci servirà come fondamento per il nostro stesso sistema vassallatico negli anni della sovranità $bengali$ a venire." #OLD ITA
 bng_bengali_vassal_system_desc: "During the reign of $DLH$, the $bengali$ people served their overlord as productive vassals. The $DLH_ADJ$ system shall serve as the foundation for our own vassal systems for the years of $bengali$ sovereignty to come." #NEW
 #bng_bengali_vassal_system_desc: "During the reign of $DLH$, the $bengali$ people have served their overlord as profitable vassals. The $DLH_ADJ$ system shall serve us as the foundation for our own vassal systems for the years of $bengali$ sovereignty to come." #OLD ENG
 bng_bengali_paik: "Paik $BNG_ADJ$"
 #bng_bengali_paik_desc: "I paik sono la spina dorsale del nostro esercito. Mentre altri stati utilizzano il Sistema Paik per i loro contingenti generali, il nostro regno si concentra su meno paik, ma meglio organizzati e con adeguato supporto militare." #OLD ITA
 bng_bengali_paik_desc: "The #italic paiks#! are the backbone of our military. While other states have the Paik System active and use paiks as their general levies, our state maintains smaller, but very well-organized paiks, and provides them with sufficient military support." #NEW
 #bng_bengali_paik_desc: "The paiks are the backbone of our military. While other states have the Paik System active and use paiks as their general levies, our state focuses on less, but well-organized paiks with sufficient military support." #OLD ENG
 bng_bengali_architecture: "Architettura $bengali$"
 #bng_bengali_architecture_desc: "Una mescolanza di antica architettura urbana, influenze dell'ingegneria $muslim_ADJ$ e dei classici tetti $bengali$, lo stile $bengali$ è unico per edifici religiosi e culturali di ogni tipo. Grazie alla nostra competenza, costruire tali edifici è molto più semplice e meno costoso." #OLD ITA
 bng_bengali_architecture_desc: "A mixture of ancient urban architecture, $muslim_ADJ$ engineering influences, and traditional $bengali$ roof-building techniques, the unique $bengali$ architectural style is used for religious and cultural buildings of all kinds. Due to our expertise in this style, constructing such buildings is significantly easier and more affordable for us than other nations." #NEW
 #bng_bengali_architecture_desc: "A mixture of ancient urban architecture, influences of $muslim_ADJ$ engineering and the classic $bengali$ roofs, the $bengali$ style is a unique style used for religious and cultural buildings of all kinds. Due to our expertise in it, constructing such buildings is significantly simpler to afford." #OLD ENG
 bng_habshi_generals: "Generali Habshi"
 #bng_habshi_generals_desc: "I soldati-schiavi abissini acquistati nei mercati arabi svolgono un ruolo importante come fanteria d'élite. Coloro che eccellono come comandanti riceveranno maggiori responsabilità, mentre quelli che dimostrano eccezionale lealtà comporranno la guardia del palazzo." #OLD ITA
 bng_habshi_generals_desc: "Abyssinian slave-soldiers play a significant role in our military as elite infantry. Those who excel as leaders shall be given greater levels of command, while those who demonstrate exceptional loyalty shall make up the palace guard." #NEW
 #bng_habshi_generals_desc: "Abyssinian slave-soldiers purchased in Arab markets play a significant role as elite infantry soldiers. Those that excel as leaders shall be given greater levels of command, while those who demonstrate exceptional loyalty shall make up the palace guard." #OLD ENG
 bng_war_elephants: "Elefanti da Guerra"
 #bng_war_elephants_desc: "Sebbene lenti, gli elefanti sono estremamente manovrabili nel terreno fluviale del nostro paese, facilitando il trasporto di materiali bellici. Inoltre, gli Elefanti da Guerra supporteranno le nostre truppe in battaglia con la loro imponente presenza." #OLD ITA
 bng_war_elephants_desc: "Although slow, the maneuverability of elephants in the riverine terrain of our country is crucial to quickly resupplying our military. Additionally, war elephants will aid our troops on the battlefield with their imposing stature and terrifying strength." #NEW
 #bng_war_elephants_desc: "Although slow, the maneuverability of the elephants in the riverine terrain of our country is a great boon in the transport of war materials for our military. Additionally, War Elephants will aid our troops on the battlefield with their imposing stature." #OLD ENG
 bng_rupees: "Coniazione delle Rupie"
 #bng_rupees_desc: "La mancanza di una valuta standardizzata sta ostacolando lo sviluppo del commercio indiano. Come una delle principali potenze economiche del subcontinente, siamo in una posizione ideale per iniziare la coniazione di una nuova moneta d'argento con pesi standardizzati, che chiameremo rupia." #OLD ITA
 bng_rupees_desc: "The lack of a widely adopted standardized currency is stunting our commercial development. As one of the foremost economic powers on the subcontinent, we are in a good position to begin minting a new silver coinage with standard weights, which we shall call the #italic rupee#!." #NEW
 #bng_rupees_desc: "The lack of a widely adopted standardized currency is stunting the development of Indian commerce. As one of the foremost economic powers in the subcontinent, we are in a good position to begin the minting of a new silver coinage with standard weights, which we shall call the rupee." #OLD ENG
 bng_bengali_traders: "Mercanti $bengali$"
 #bng_bengali_traders_desc: "L'$indian_ocean_region$ collega il mercato indiano a quelli del $south_east_asia$ e della $china$. Dobbiamo pertanto massimizzare la nostra presenza su queste rotte marittime e aumentare i profitti dal commercio." #OLD ITA
 bng_bengali_traders_desc: "The $indian_ocean_region$ connects our local markets with those of $south_east_asia$ and $china$. We shall therefore greatly emphasize maximizing our presence in these markets via sea routes, and through this increase our trade profits." #NEW
 #bng_bengali_traders_desc: "The $indian_ocean_region$ connects the Indian market with the ones of $south_east_asia$ and $china$. Thus, we shall put great emphasis on maximizing our presence in these markets via sea routes and increase our profits from trade." #OLD ENG
 bng_bengali_poetry: "Poesia $bengali$"
 #bng_bengali_poetry_desc: "La parola scritta è una delle forme d'arte più influenti. La poesia $bengali$ narrerà storie di conquistatori epici, drammi coinvolgenti e profonde domande filosofiche, portando gloria alla cultura $bengali$." #OLD ITA
 bng_bengali_poetry_desc: "The written word is one of the most influential and enduring forms of art. $bengali$ poetry shall tell the tales of epic conquerors, relatable dramas, and engaging philosophical questions, all of which shall further the spread and reputation of $bengali$ culture." #NEW
 #bng_bengali_poetry_desc: "The written word is one of the most influential art forms. $bengali$ poetry shall tell the tales of epic conquerors, relatable dramas and engaging philosophical questions which shall bring glory to the $bengali$ culture." #OLD ENG
 bng_religious_pluralism: "Pluralismo Religioso"
 #bng_religious_pluralism_desc: "L'$india$ ospita molte religioni: l'$hindu$ presso la maggioranza, il $muslim$ presso le classi dirigenti, e minoranze come $buddhist$ e $jain$. Promuovere una religione a scapito delle altre causerebbe caos e disordini. Dobbiamo perseguire il pluralismo religioso, senza favorire né discriminare alcuna fede." #OLD ITA
 bng_religious_pluralism_desc: "$india$ is home to many religions: $hindu$ for the majority, $muslim$ as the preferred faith of the ruling classes, and a few remarkable minor religions such as $buddhist$ and $jain$ amongst the working minorities. Promoting one religion over another will cause inevitable chaos and unrest. Thus, we should aim for religious pluralism, and neither favor nor discriminate against any religion in our state." #NEW
 #bng_religious_pluralism_desc: "$india$ is home to many religions: $hindu$ throughout the major populace, $muslim$ as the preferred one of the ruling classes, and a few remarkable minor religions such as $buddhist$ and $jain$ amongst the working minorities. Promoting a single religion over another will cause inevitable chaos and unrest. Thus, we should aim for religious pluralism and neither favor nor discriminate any religion in our state." #OLD ENG
 bng_artillery_corps: "Corpo d'Artiglieria"
 #bng_artillery_corps_desc: "I cannoni sono ormai una risorsa decisiva nelle campagne militari. Dobbiamo garantire un efficiente corpo d'artiglieria specializzato nel colpire le linee nemiche prima che possano scontrarsi con la nostra fanteria." #OLD ITA
 bng_artillery_corps_desc: "Cannons are an impactful asset to military campaigns. We must ensure an efficient artillery corps that specializes in dealing damage to the enemy's rows before they even start to clash with our soldiers on the field." #NEW
 #bng_artillery_corps_desc: "Cannons have become undeniably an impactful asset to military campaigns. We must ensure an efficient artillery corps that specializes in dealing damage to the enemy rows before they can clash with our footmen on the field." #OLD ENG
 bng_bengali_trade_fleet: "Flotta Commerciale $BNG_ADJ$"
 #bng_bengali_trade_fleet_desc: "La flotta commerciale del popolo $bengali$ porta beni esotici da terre lontane, oltre a preziosi $goods_gold$ e $silver$ ai mercati del Delta del Gange. I nostri mercanti sono rinomati in molte parti del mondo grazie alla nostra grandiosa flotta commerciale." #OLD ITA
 bng_bengali_trade_fleet_desc: "The $bengali$ trade fleet brings exotic goods from foreign lands, as well as precious $goods_gold$ and $silver$, to the markets of the Ganges Delta. Our merchants are well renowned in far-flung parts of the world, thanks to our impressive trade fleet." #NEW
 #bng_bengali_trade_fleet_desc: "The trade fleet of the $bengali$ people bring exotic goods from foreign lands, as well as precious $goods_gold$ and $silver$ to the markets of the Ganges Delta. Our merchants are well renowned in far parts of the world thanks to our grand trade fleet." #OLD ENG
 bng_shipbuilding_industry: "Industria Cantieristica"
 #bng_shipbuilding_industry_desc: "Il commercio marittimo è l'essenza vitale del nostro stato. Le nostre navi commerciali e da guerra sono fondamentali per l'economia, e gran parte dei nostri sforzi si concentrano nel sostenere l'industria cantieristica." #OLD ITA
 bng_shipbuilding_industry_desc: "Maritime trade is vital to our state. Our trade and our warships are some of the most important aspects of our economy, and therefore we focus heavily on supporting the shipbuilding industry." #NEW
 #bng_shipbuilding_industry_desc: "The maritime trade is the life essence of our state. Thus, our trade and warships are one of the most important aspects of our economy, and our focus lies heavily on supporting the shipbuilding industry." #OLD ENG
 #bng_bengali_industrialization: "Industrializzazione del Muslin" #OLD ITA
 bng_bengali_industrialization: "Industrialized Muslin Production" #NEW
 #bng_bengali_industrialization: "Muslin Industrialization" #OLD ENG
 #bng_bengali_industrialization_desc: "$BNG$ è in una posizione unica nell'$india$ per iniziare una rivoluzione senza precedenti. Il muslin — il tessuto di cotone fine per cui i filatori $bengali$ sono famosi — è un bene ideale per l'industrializzazione. Sfrutteremo le nuove tecnologie nella nostra già eccellente produzione tessile. Che abbia inizio una rivoluzione industriale!" #OLD ITA
 bng_bengali_industrialization_desc: "$BNG$ is uniquely situated in $india$ to start a revolution unlike any seen before. Muslin — the special cotton fabric $bengali$ spinners are famous for — is a prime trade good for industrialization. We stand poised to exploit new developments in our already world-class textile industry. Let us begin an industrial revolution!" #NEW
 #bng_bengali_industrialization_desc: "$BNG$ is uniquely situated in $india$ to begin a revolution unlike any seen before. Muslin — the special cotton fabric the $bengali$ spinners are famous for — is a prime trade good for industrialization. We stand poised to exploit new developments in our already world-class textile. Let us begin an industrial revolution!" #OLD ENG

 raj_militaristic_society: "Società Militaristica"
 #raj_militaristic_society_desc: "Tra i Rajput quasi non esiste distinzione tra società civile e militare. La nostra nazione è un'Armata, definita dal suo popolo più che dalle terre che controlla, e il suo popolo è composto da guerrieri. Dobbiamo assicurarci che le divisioni militari soddisfino adeguatamente le nostre esigenze amministrative man mano che l'Armata si espande." #OLD ITA
 raj_militaristic_society_desc: "There is almost no division between civil and military society among the Rajputs. Our nation is a host, defined by its people rather than by the land we control, and its people are warriors. We must ensure that military divisions properly meet our administrative needs as the host expands." #NEW
 #raj_militaristic_society_desc: "There is almost no division between civil and military society among the Rajputs. Our nation is a Host, defined by its people rather than by the land we control, and its people are warriors. We must ensure that military divisions properly meet our administrative needs as the Host expands." #OLD ENG
 raj_combat_training: "Addestramento al Combattimento"
 #raj_combat_training_desc: "Ogni soldato viene addestrato alla guerra. Tuttavia la nostra gente si prepara al combattimento fin da un'età molto giovane, il che le permette di superare qualsiasi altra recluta alle prime armi." #OLD ITA
 raj_combat_training_desc: "Every soldier is trained for battle, but our people start combat training at a much younger age, granting them skills surpassing those of other green soldiers." #NEW
 #raj_combat_training_desc: "Every soldier is trained for battle. However, our people train for combat from a much younger age, allowing them to surpass any other fresh soldier." #OLD ENG
 raj_clan_loyalties: "Lealtà di Clan"
 #raj_clan_loyalties_desc: "L'influenza del nostro clan si estende ben oltre i nostri confini. Possiamo richiamare i Rajput del nostro lignaggio da tutto il nord dell'$india$ per riempire le file dei nostri eserciti." #OLD ITA
 raj_clan_loyalties_desc: "The influence of our clan extends far beyond our own borders. We are able to draw from other Rajput groups from all over northern $india$ when filling the ranks of our armies." #NEW
 #raj_clan_loyalties_desc: "The influence of our clan extends far beyond our own borders. We are able to draw upon the Rajputs of our clan from all over northern $india$ when filling the ranks of our armies." #OLD ENG
 raj_monumental_architecture: "Architettura Monumentale"
 #raj_monumental_architecture_desc: "A cosa servono le vittorie se non c'è alcun edificio a immortalare le nostre imprese? Eredicheremo monumenti, come una torre della vittoria mozzafiato, affinché le generazioni future conoscano le nostre battaglie più gloriose." #OLD ITA
 raj_monumental_architecture_desc: "What purpose does victory serve if there is nothing to immortalize our achievements? Monuments, such as an awe-inspiring Tower of Victory, shall be erected, so future generations will know of our greatest battles and be appropriately inspired." #NEW
 #raj_monumental_architecture_desc: "What purpose serves victories if there is no building to immortalize our achievements? Monuments such as an awe-inspiring Tower of Victory shall be erected so future generations will know of our greatest battles." #OLD ENG
 raj_marwari_horses: "Cavalli Marwari"
 #raj_marwari_horses_desc: "Come i loro padroni, i cavalli della cavalleria rajput sono addestrati con estrema cura per rendere al meglio sul campo di battaglia. Si dice che un cavallo Marwari possa lasciare il campo di battaglia solo in tre condizioni: vittoria, morte oppure portando in salvo il proprio padrone ferito. Prendendoci cura di queste creature divine, garantiremo il dominio eterno dei nostri cavalieri sui campi di battaglia dell'$india$." #OLD ITA
 raj_marwari_horses_desc: "Like their masters, Rajput cavalry horses are meticulously trained to perform on the field of battle. It is said that a Marwari horse will only leave the battlefield under one of three conditions - victory, death, or when carrying a wounded master to safety. By taking good care of these divine beings, we will ensure the everlasting dominance of our horsemen on the battlefields of $india$." #NEW
 #raj_marwari_horses_desc: "Like their masters, the Rajput cavalry horses are meticulously trained to perform on the field of battle. It is said that a Marwari horse may only leave the battlefield under one of three conditions - victory, death, or carrying a wounded master to safety. By taking good care of these divine beings, we ensure the everlasting dominance of our horsemen on the battlefields of $india$." #OLD ENG
 raj_reorganized_rajput_regiments: "Reggimenti Rajput Riorganizzati"
 raj_reorganized_rajput_regiments_desc: "Le strutture claniche tradizionali sono un'eccellente base per un sistema di reggimenti modernizzato. Le gerarchie esistenti, fondate sulla parentela e sulla lealtà incondizionata, possono essere facilmente tradotte in una catena di comando formale e organizzata."
 raj_martial_smiths: "Fabbri Marziali"
 #raj_martial_smiths_desc: "Le guerre non si vincono solo con la tattica e il coraggio, ma anche con le armi. I nostri fabbri forgeranno le migliori armi da guerra affinché i nostri guerrieri possano difendere il popolo rajput da qualsiasi minaccia straniera." #OLD ITA
 raj_martial_smiths_desc: "Wars are not only won through tactics and bravery, but also through weaponry. Our blacksmiths shall forge the finest martial weapons for our warriors to wield in defense of the Rajput people." #NEW
 #raj_martial_smiths_desc: "Wars are not only won through tactics and bravery but also through weaponry. Our blacksmiths shall forge the finest martial weapons for our warriors to wield in defense of the Rajput people from any foreign threat." #OLD ENG
 raj_fortress_architecture: "Architettura di Fortezze"
 #raj_fortress_architecture_desc: "L'ascesa di $DLH$ e gli invasori $muslim_ADJ$ del passato sono stati un campanello d'allarme per il nostro popolo. Dobbiamo sempre prepararci a nuovi invasori e, per farlo, dobbiamo assumere i più abili architetti per progettare fortezze inespugnabili in tutto il nostro reame. Le lunghissime mura necessarie a proteggere la nostra terra rendono questo un progetto ambizioso, ma la nostra determinazione a difendere il nostro popolo farà sì che venga portato a termine." #OLD ITA
 raj_fortress_architecture_desc: "The rise of $DLH$, and the invading $muslim_ADJ$ warriors of the past, were wake-up calls. We must always be prepared for foreign invaders, and thus, we must hire the most skilled architects to design impregnable forts throughout our realm. The immensely long walls that will be needed to protect our land make this an ambitious project, but our determination to defend our people shall ensure that it is done." #NEW
 #raj_fortress_architecture_desc: "The rise of $DLH$ and the invading $muslim_ADJ$ warriors of the past were a wake-up call for our people. We must always prepare for foreign invaders, and thus, we must hire the most skilled architects to design impregnable forts throughout our realm. The immensely long walls that will be needed to protect our land make this an ambitious project, but our determination to defend our people shall ensure that it is done." #OLD ENG
 raj_expanded_artillery_arm: "Corpo d'Artiglieria Ampliato"
 #raj_expanded_artillery_arm_desc: "Sono gli assedi a decidere le guerre. Dobbiamo sperimentare nuovi modi per costruire cannoni sempre più grandi ed efficaci, così da abbattere le numerose fortezze dei nostri nemici, dentro e fuori dall'$india$." #OLD ITA
 raj_expanded_artillery_arm_desc: "Sieges are what win wars. We must experiment with ways of creating bigger and better cannons to bring down the many forts of our enemies, both within $india$ and outside it." #NEW
 #raj_expanded_artillery_arm_desc: "Sieges are what wins wars. We must experiment with ways of creating bigger and better cannons to bring down the many forts of our enemies within $india$ and outside it." #OLD ENG
 raj_the_purbias: "I Purbia"
 #raj_the_purbias_desc: "I Rajput si sono diffusi in tutto il nord dell'$india$ nella loro ricerca di gloria per il proprio clan. I #italic Purbias#!, gli élitari soldati rajput che partono come mercenari, sono famosi per la loro abilità in combattimento e, così facendo, diffondono la nostra temibile reputazione." #OLD ITA
 raj_the_purbias_desc: "The Rajputs have spread themselves throughout northern $india$ in their pursuit of glory. The #italic Purbias#!, elite Rajput soldiers who venture as mercenaries, are renowned for their combat ability, and as such spread our fearsome reputation." #NEW
 #raj_the_purbias_desc: "The Rajputs have spread themselves throughout northern $india$ in their pursuit of glory for their clan. The #italic Purbias#!, the elite Rajput soldiers who venture as mercenaries, are renowned for their combat ability, and as such spread our fearsome reputation." #OLD ENG
 raj_mandatory_firearm_drilling: "Addestramento Obbligatorio alle Armi da Fuoco"
 #raj_mandatory_firearm_drilling_desc: "Molti soldati rajput sono diventati esperti nell'uso delle armi da fuoco personali. Dobbiamo mettere questi veterani temprati al lavoro nell'addestrare la prossima generazione di soldati, invece di rischiare di perdere la loro esperienza sul campo. Tutti i nostri soldati dovranno essere istruiti nelle tattiche con le armi da fuoco prima di affrontare i nostri nemici in prima linea." #OLD ITA
 raj_mandatory_firearm_drilling_desc: "Many Rajput soldiers are experts in the use of personal firearms. We should put these hardened veterans to work training the next generation of soldiers, rather than risking the loss of their expertise in battle. All of our soldiers must be drilled in firearms tactics before they are expected to meet our enemies on the front line." #NEW
 #raj_mandatory_firearm_drilling_desc: "Many Rajput soldiers have become experts in the use of personal firearms. We must put these hardened veterans to work training the next generation of soldiers rather than risking the loss of their expertise in battle. All of our soldiers must be drilled in firearms tactics before they are expected to meet our enemies on the front line." #OLD ENG
 raj_painting_school: "Scuola Pittorica Rajput"
 #raj_painting_school_desc: "I pittori rajput godono già di un'eccellente reputazione. Dobbiamo incoraggiare i nostri artisti a perfezionare le loro abilità e ad accrescere la gloria della nostra dinastia, creando una scuola pittorica specifica del nostro stato." #OLD ITA
 raj_painting_school_desc: "Rajput painters already have an excellent reputation, but it could be even better. We must encourage our artists to develop their skills and add to the glory of our dynasty by creating a school of painting particular to our state." #NEW
 #raj_painting_school_desc: "Rajput painters already have an excellent reputation. We must encourage our artists to develop their skills and add to the glory of our dynasty by creating a school of painting particular to our state." #OLD ENG
 raj_rajput_resistance: "Resistenza Rajput"
 #raj_rajput_resistance_desc: "I bardi rajput narrano le nostre innumerevoli battaglie contro gli invasori stranieri e come i nostri antenati abbiano preferito morire piuttosto che dichiararsi sconfitti. Dobbiamo alimentare questo spirito di unità e offrire nuovi motivi ai bardi per comporre ballate di coraggio di fronte alla morte." #OLD ITA
 raj_rajput_resistance_desc: "Rajput poet-musicians tell stories of our people's many battles against foreign invaders, and how our ancestors would rather die than admit themselves defeated. We must encourage this spirit of unity, and give our musicians reason to write new ballads of bravery in the face of death." #NEW
 #raj_rajput_resistance_desc: "Rajput bards tell stories of our people's many battles against foreign invaders and how our ancestors would rather die than admit themselves defeated. We must encourage this spirit of unity and give the bards reason to write new ballads of bravery in the face of death." #OLD ENG
 raj_martial_ethos: "Etica Marziale"
 #raj_martial_ethos_desc: "L'educazione e le tradizioni dei guerrieri rajput assicurano una vasta base da cui reclutare ufficiali per guidare i nostri eserciti. Per sfruttare appieno questo potenziale, dobbiamo garantire ampie opportunità di carriera, così da incoraggiare questi giovani promettenti a servire come ufficiali sia nei nostri eserciti sia all'estero." #OLD ITA
 raj_martial_ethos_desc: "The upbringing and traditions of Rajput warriors ensure a wide base for recruiting officers to lead our armies. In order to capitalize on this, we should formalize career opportunities and advancement paths to encourage these promising young fighters to serve as officers in our forces." #NEW
 #raj_martial_ethos_desc: "The upbringing and traditions of Rajput warriors ensure a wide base for recruiting officers to lead our armies. In order to capitalize on this, we should ensure that career opportunities abound to encourage all these promising young men to serve as officers both in our own armies and abroad." #OLD ENG
 
 npl_the_divya_upadesh: "Il Divya Upadesh"
 #npl_the_divya_upadesh_desc: "Il Divya Upadesh enuncia nove principi che formano il cuore della vita politica e nazionale nepalese, oltre a fornire linee guida per una politica estera di successo. Riassume secoli di pensiero nepalese su governo, guerra e pace. Seguendo questi principi, il Nepal sarà in grado di evitare la sovversione dei vicini imperi e dei predoni stranieri." #OLD ITA
 npl_the_divya_upadesh_desc: "The #italic Divya Upadesh#! lays out nine principles that form the core of political and national life in $nepal_area$, as well as guidelines for successful foreign policy. It encapsulates centuries of $nepali_group$ thought on governance, war, and peace. Following these principles, $nepal_area$ shall be able to avoid the subversion of nearby empires and marauding foreigners." #NEW
 #npl_the_divya_upadesh_desc: "The Divya Upadesh lays out nine principles that form the core of Nepali political and national life as well as guidelines for successful foreign policy. It encapsulates centuries of Nepali thoughts on governance, war, and peace. Following these principles, Nepal shall be able to avoid the subversion of nearby Empires and the marauding foreigners." #OLD ENG
 npl_gurkhas: "$a_gurkha$"
 npl_gurkhas_desc: "$a_gurkha_desc$

 ori_bulwark_of_the_hindu: "Baluardo dell'$hindu$"
 #ori_bulwark_of_the_hindu_desc: "I credenti $muslim_ADJ$ hanno invaso il subcontinente indiano e sottomesso molti residenti $hindu_ADJ$ sotto il loro crudele dominio. Eppure, $ORI$ resiste ai guerrieri del $muslim$. Siamo il baluardo dell'$hindu$, e proteggeremo le nostre tradizioni e la nostra cultura da qualsiasi invasore straniero!" #OLD ITA
 ori_bulwark_of_the_hindu_desc: "The $muslim_ADJ$ faithful have invaded $india$ and subjugated many $hindu_ADJ$ residents under their gruesome rule. Yet, $ORI$ stands unflinching against the warriors of $muslim$. We are the bulwark of $hindu$, and we shall defend our traditions and culture against any foreign invader!" #NEW
 #ori_bulwark_of_the_hindu_desc: "The $muslim_ADJ$ believers have invaded the Indian subcontinent and subjugated many $hindu_ADJ$ residents under their gruesome rule. Yet, $ORI$ stands against the warriors of $muslim$. We are the bulwark of $hindu$, and we shall protect our traditions and culture against any foreign invader!" #OLD ENG
 ori_anka_year_system: "Sistema dell'Anno Anka"
 #ori_anka_year_system_desc: "L'Anno Anka è il nostro modo di documentare l'anno di regno dei nostri sovrani. Gli anni che terminano con 6 e 0, eccetto il 10, vengono saltati e l'Anka inizia sempre nel #italic Sunia#!, il nuovo anno fiscale odia." #OLD ITA
 ori_anka_year_system_desc: "The #italic Anka#! system is our method of documenting the regnal years of our rulers. Years ending in 6 or 0 are skipped, except for year 10, which is retained. The count begins at year 2, not year 1, and always starts on the #italic Sunia#!, our fiscal new year." #NEW
 #ori_anka_year_system_desc: "The Anka year is our way to document the regnal year of our rulers. Years ending with 6 and 0 except for 10 are skipped and the Anka always starts on the #italic Sunia#!, the Odia fiscal new year." #OLD ENG
 ori_lord_of_elephants: "Gajapati"
 #ori_lord_of_elephants_desc: "I cavalli sono estranei a $ORI$ e queste terre non sono adatte ad allevarli. Le nostre giungle, invece, pullulano di elefanti. Nelle fitte selve dell'India orientale, una cooperazione tattica ben eseguita tra elefanti e fanteria può essere letale quanto un esercito di cavalleria. Aumentiamo quindi il numero del nostro corpo elefanti e affiniamone le tattiche, così da essere riconosciuti come un vero #italic Gajapati#!, il Signore degli Elefanti." #OLD ITA
 ori_lord_of_elephants_desc: "Horses are not native to $ORI$, and the lands here are unsuitable for raising them. Our jungles are, however, famously teeming with elephants. In the dense jungles of Eastern $india$, well-executed tactical cooperation between elephants and infantry can be just as deadly as a cavalry. Let us further increase the size of our elephant corps and refine their tactics, so that we will be known as a true #italic Gajapati#!, 'Lord of the Elephants'." #NEW
 #ori_lord_of_elephants_desc: "Horses are alien to $ORI$ and the lands here are unsuited to raise them. Our jungles are, however, famously teeming with elephants. In the dense jungles of Eastern $india$, well-executed tactical cooperation between elephants and infantry can be just as deadly as a cavalry army. Let us further increase the size of our elephant corps and refine their tactics, so that we can be known as a true #italic Gajapati#!, the Lord of the Elephants." #OLD ENG
 ori_servitor_of_jagganath: "Servitore di Jagannath"
 #ori_servitor_of_jagganath_desc: "Il culto di Jagannath, il signore dell'universo, unisce queste terre. Gli antichi sovrani di $ORI$ erano considerati figli di Jagannath. Il nostro attuale sovrano potrebbe non discendere da lui, ma dobbiamo assicurarci che tutti comprendano che egli è il servitore di Jagannath, e che la disobbedienza verso di lui equivale a tradire il Signore Jagannath stesso." #OLD ITA
 ori_servitor_of_jagganath_desc: "Worship of Jagannath, the Lord of the Universe, is what unites our people. Previous rulers of $ORI$ were even considered to be the scions of Jagannath. Our current ruler might not be one of his descendants, but we must imprint on all that our leader is the servitor of Jagannath, and that any disobedience to them equals treason against Lord Jagannath himself." #NEW
 #ori_servitor_of_jagganath_desc: "Worship of Jagannath, the lord of the universe, is what unites these lands. Older rulers of $ORI$ have been considered to be the sons of Jagannath. Our current ruler might not be his descendants, but we must certainly make sure to imprint on all that our leader is the servitor of Jagannath and that any disobedience to them equals treason against lord Jagannath himself." #OLD ENG
 ori_parikshas: "Parikshas"
 #ori_parikshas_desc: "Le terre di $ORI$ sono state a lungo divise tra numerosi piccoli principi. Ma l'era dei Mandaleshvara è finita! Dobbiamo prendere il controllo diretto di queste terre e nominare governatori regionali, i Parikshas, invece di permettere che questi piccoli principi indeboliscano la nostra autorità imperiale." #OLD ITA
 ori_parikshas_desc: "$ORI$ has long been divided among many different princes, but their time is over! We will take control of these lands, and appoint regional governors — #italic parikshas#! — instead of allowing these petty princelings to dilute our imperial authority." #NEW
 #ori_parikshas_desc: "The lands of $ORI$ have long been divided among many different princelings. However, the time of these Mandaleshvaras is over! We must take control of these lands and appoint regional governors, Parikshas, instead of allowing these petty princelings to dilute our imperial authority." #OLD ENG
 ori_odia_militarization: "Militarizzazione Odia"
 #ori_odia_militarization_desc: "La minaccia $muslim_ADJ$ non cessa mai, né si arresta. Dobbiamo garantire che il nostro esercito sia pronto ad affrontare e combattere gli invasori in qualsiasi momento." #OLD ITA
 ori_odia_militarization_desc: "The $muslim_ADJ$ threat never ceases, nor does it ever rest. We must ensure our military is ready to face and combat invaders at any and all times." #NEW
 #ori_odia_militarization_desc: "The $muslim_ADJ$ threat never ceases, nor does it ever halt. We must ensure our military is ready to face and combat the invaders at any point." #OLD ENG
 #ori_refined_cloth_production: "Produzione Raffinata di Tessuti" #OLD ITA
 ori_refined_cloth_production: "Refined $cloth$ Production" #NEW
 #ori_refined_cloth_production: "Refined Cloth Production" #OLD ENG
 #ori_refined_cloth_production_desc: "$ORI$ è famosa sin dall'antichità per i suoi tessuti di alta qualità. Incoraggiamo ulteriormente le corporazioni tessili di $ORI$ a perfezionare i loro metodi di produzione del fine tessuto Kalinga." #OLD ITA
 ori_refined_cloth_production_desc: "$ORI$ has been famous for its high-quality textiles since ancient times. Let us further encourage the textile guilds of $ORI$ to refine their methods of producing their fine Kalinga $cloth$." #NEW
 #ori_refined_cloth_production_desc: "$ORI$ is famous for its high-quality textiles since ancient times. Let us further encourage the textile guilds of $ORI$ to refine their methods of production of the fine Kalinga cloth." #OLD ENG
 #ori_patronize_temple_construction: "Costruzione Patronata di Templi" #OLD ITA
 ori_patronize_temple_construction: "Patronized Temple Construction" #NEW
 #ori_patronize_temple_construction: "Patronized Temple Constructions" #OLD ENG
 #ori_patronize_temple_construction_desc: "La gloria delle dinastie del passato si riflette nella grandezza dei templi che hanno lasciato dietro di sé. Dobbiamo impegnarci a migliorare i numerosi complessi templari delle nostre terre e a ingaggiare architetti per costruirne di nuovi, favorendo lo sviluppo dell'architettura di Kalinga." #OLD ITA
 ori_patronize_temple_construction_desc: "The glory of past dynasties is reflected by the grandeur of the temples they left behind. We should improve our many magnificent temple complexes, and construct new ones to further the development of Kalinga architecture." #NEW
 #ori_patronize_temple_construction_desc: "The glory of past dynasties is reflected by the greatness of the temples they left behind. We should strive to improve on the many great temple complexes in our lands and hire architects to construct new ones to further the development of Kalinga architecture." #OLD ENG
 #ori_encourage_salt_trade: "Commercio del Sale" #OLD ITA
 ori_encourage_salt_trade: "$salt$ Trade" #NEW
 #ori_encourage_salt_trade: "Salt Trade" #OLD ENG
 #ori_encourage_salt_trade_desc: "Il $salt$ di alta qualità di $ORI$ è richiesto in tutta $india$. Facciamo il possibile per incoraggiare il commercio del $salt$, così da arricchirci tramite esso." #OLD ITA
 ori_encourage_salt_trade_desc: "The high-quality $salt$ of $ORI$ is in demand all over $india$. Let us do whatever we can to encourage the $salt$ trade so that we may grow rich from it." #NEW
 #ori_encourage_salt_trade_desc: "The high-quality $salt$ of $ORI$ is in demand all over $india$. Let us do what we can to encourage the $salt$ trade so that we may grow rich from it." #OLD ENG
 ori_expansion_of_infrastructure: "Espansione delle Infrastrutture"
 #ori_expansion_of_infrastructure_desc: "Con l'avanzare della tecnologia cresce anche la popolazione del nostro stato. È ormai evidente che l'industrializzazione ha portato la nostra gente a un nuovo livello. Pertanto, dobbiamo ampliare le nostre infrastrutture per adattarci a questa nuova realtà." #OLD ITA
 ori_expansion_of_infrastructure_desc: "As technology advances, so does the number of people in our realm. Industrialization has driven significant population growth, and as such, we must expand our infrastructure to accommodate these growing communities." #NEW
 #ori_expansion_of_infrastructure_desc: "As technology advances, so does the population of our state. It is more than apparent that industrialization has led to the growth of our people to a new height. As such, we must expand our infrastructure to accommodate this new situation." #OLD ENG

 #bah_arabian_horses: "Cavalli Arabi" #OLD ITA
 bah_arabian_horses: "Arabian Horses" #NEW
 #bah_arabian_horses: "Arab Horses" #OLD ENG
 #bah_arabian_horses_desc: "Il clima dell'$india$ è tutt'al più subottimale per allevare e crescere cavalli. I cavalli della Penisola Arabica, tuttavia, sono destrieri superbi che surclassano le razze locali. Useremo le nostre connessioni commerciali per garantire un flusso costante di questi cavalli per le nostre truppe." #OLD ITA
 bah_arabian_horses_desc: "The climate of $india$ is suboptimal at best for breeding and raising horses. The horses of $arabia_region$, however, are superb mounts that outclass our local breeds. We will use our trade connections to ensure that we have a steady supply of these horses for our troops." #NEW
 #bah_arabian_horses_desc: "The climate of $india$ is suboptimal at best for breeding and raising horses. The horses of the Arab Peninsula, however, are superb mounts that outclass the local horses. We will use our trade connections to ensure that we have a steady supply of these horses for our troops." #OLD ENG
 bah_amir_rebellion: "Ribellione dell'Amir"
 #bah_amir_rebellion_desc: "Il nostro stato nasce dalla ribellione dell'Amir contro la patetica reggenza di $DLH$. La vittoria contro il Sultanato $DLH_ADJ$ vive ancora nella memoria della nostra nobiltà e del nostro esercito." #OLD ITA
 bah_amir_rebellion_desc: "Our state was born from the rebellion of Amir Hasan Gangu against the pathetic rule of $DLH$. The victory against the $DLH_ADJ$ Sultanate still lives on in the minds of our own nobility and military to this day." #NEW
 #bah_amir_rebellion_desc: "Our state is born in the rebellion of the Amir against the pathetic rule of $DLH$. The victory against the $DLH_ADJ$ Sultanate still lives on in the minds of our own nobility and military to this day." #OLD ENG
 #bah_nobility_hindu_expansion: "Espansione della Nobiltà Indù" #OLD ITA
 bah_nobility_hindu_expansion: "Hindu Elite Integration" #NEW
 #bah_nobility_hindu_expansion: "Hindu-Nobility Expansion" #OLD ENG
 #bah_nobility_hindu_expansion_desc: "Benché talvolta una maledizione per la sovranità del sovrano, il $nobles_estate$ resta un elemento essenziale del governo per amministrare le vaste terre dello stato. Con la nostra indipendenza da $DLH$, abbiamo ereditato quasi esclusivamente sudditi $hindu_ADJ$, mentre i nostri nobili $muslim_ADJ$ sono una piccola minoranza incapace di gestire le masse. Dobbiamo ampliare la nostra nobiltà promuovendo promettenti candidati $hindu_ADJ$." #OLD ITA
 bah_nobility_hindu_expansion_desc: "Although at times a challenge to the sovereignty of the ruler, the noble class is nonetheless useful to our government, as they are crucial in administrating our vast properties. With winning our independence from $DLH$, we gained rulership over almost exclusively $hindu_ADJ$ subjects, while our $muslim_ADJ$ nobles are a small minority, unable to manage the masses. We must expand and stabilize our aristocracy by promoting promising $hindu_ADJ$ candidates into their ranks." #NEW
 #bah_nobility_hindu_expansion_desc: "Although at times a curse to the sovereignty of the ruler, the $nobles_estate$ is nonetheless one of the important aspects of the government in order to administrate the vast lands of the state. With our independence from $DLH$, we gained ownership over almost exclusive $hindu_ADJ$ subjects while our $muslim_ADJ$ nobles are a small minority, unable to manage the masses. We must expand our nobility by promoting promising $hindu_ADJ$ candidates." #OLD ENG
 bah_gharbians: "Gharbiani"
 #bah_gharbians_desc: "Recidere i legami con $DLH$ per fondare il nostro regno quasi un secolo fa ha allentato i rapporti con le regioni settentrionali di $india$ dominate dai $muslim_ADJ$. Poiché il nostro stato manca di un'aristocrazia $muslim_ADJ$ radicata, ci troviamo in una posizione precaria e potremmo finire completamente alla mercé dei nobili locali $hindu_ADJ$.\nFortunatamente, la nostra reputazione ci precede. Le ricchezze del Deccan sono narrate in tutto il mondo $muslim_ADJ$ e molti ambiziosi costruttori di fortuna desiderano raggiungere i nostri porti. Usando le vaste ricchezze dell'$india$ per attrarre talentuosi occidentali, i Gharbiani, alla nostra corte, garantiremo che il nostro paese non mancherà mai di uomini capaci di guidare i nostri eserciti, riscuotere le tasse e governare i sudditi." #OLD ITA
 bah_gharbians_desc: "Cutting ties with $DLH$ to found our own kingdom has loosened our connection with the $muslim_ADJ$-dominated northern parts of $india$. As our state lacks any form of entrenched $muslim_ADJ$ aristocracy, we are in a precarious situation, and we could end up entirely at the mercy of local $hindu_ADJ$ nobles.\nFortunately, our reputation precedes us. Tales of the riches of the $deccan_region$ are told and retold all over the $muslim_ADJ$ world, and many ambitious fortune-seekers make the sea voyage to our ports. By using the vast riches of $india$ to attract talented westerners, or #italic Gharbians#!, to our court, we can ensure that our country shall never lack able minds to lead our armies, collect our taxes, and rule our subjects." #NEW
 #bah_gharbians_desc: "Cutting ties with $DLH$ to found our own kingdom almost one hundred years ago loosened our ties with the $muslim_ADJ$-dominated northern parts of $india$. As our state lacks any form of entrenched $muslim_ADJ$ aristocracy, we are in a precarious situation, and we could end up entirely at the mercy of local $hindu_ADJ$ nobles.\nFortunately, our reputation precedes us. Tales of the riches of the Deccan are told and retold all over the $muslim_ADJ$ world and many ambitious fortune builders seek to make the sea voyage to our ports. By using the vast riches of $india$ to attract talented westerners, Gharbians, to our court, we can ensure that our country shall never lack able men to lead our armies, collect our taxes, and rule our subjects." #OLD ENG
 bah_legacy_of_gisu_daraz: "Eredità di Gisu Daraz"
 #bah_legacy_of_gisu_daraz_desc: "$india$ in generale, e il nostro stato in particolare, hanno una storia come centri di insegnamento sufico. Gli sforzi dei nostri sovrani nel patrocinare e attirare sceicchi sufi da tutto il mondo testimoniano la pietà e la forza spirituale dei nostri monarchi e della nostra corte.\nL'adozione da parte dello stato dei concetti sufi di sovranità spirituale e della natura inclusiva degli insegnamenti sufi contribuirà a creare un ambiente in cui le diverse fedi dei Gharbiani e dei nativi del Deccan possano mescolarsi e prosperare senza conflitti né dispute improduttive." #OLD ITA
 bah_legacy_of_gisu_daraz_desc: "$india$ in general, and our state in particular, has a history as a center of Sufi teachings. The efforts of our rulers to attract and patronize Sufi sheiks from all over the world are a testament to the piety and the great spiritual strength of our monarchs and our court.\nThe state adopting the Sufi concepts of spiritual sovereignty and the inclusive nature of the Sufi teachings themselves will help create an environment where the diverse religious faiths of $bah_gharbians$ and the natives of $decca_region$ alike can mix and thrive without clashes or unproductive quarrels." #NEW
 #bah_legacy_of_gisu_daraz_desc: "$india$ in general, and our state, in particular, has a history as a center of Sufi teachings. The efforts of our rulers to attract and patronize Sufi sheiks from all over the world are a testament to the piety and the great spiritual strength of our monarchs and our court.\nThe state adopting the Sufi concepts of spiritual sovereignty and the inclusive nature of the Sufi teachings themselves will help create an environment where the diverse religious faiths of Gharbians and the Deccani natives alike can mix and thrive without clashes or unproductive quarrels." #OLD ENG
 #bah_meltpot_of_languages: "Crogiolo di Lingue" #OLD ITA
 bah_meltpot_of_languages: "Linguistic Melting Pot" #NEW
 #bah_meltpot_of_languages: "Melting Pot of Languages" #OLD ENG
 #bah_meltpot_of_languages_desc: "Il $deccan_region$ è una regione ricca di lingue e culture. Il grande afflusso di persone di ascendenza $iranian_group$, $turkic_group$, $afghan_culture$ e $arabian_group$ ha ulteriormente accentuato il carattere cosmopolita del nostro stato. Sebbene storicamente il $persian_language$ abbia soddisfatto i bisogni dei nostri predecessori, una nuova miscela di lingue locali, $persian_language$ e $arabic_language$ è diventata sempre più comune. Questo miscuglio linguistico alimenta l'ispirazione culturale per gli artisti emergenti." #OLD ITA
 bah_meltpot_of_languages_desc: "$decca_region$ is a region of many languages and cultures; the great influx of people of $iranian_group$, $turkic_group$, $afghan_culture$, and $arabian_group$ descent into these lands has accentuated the cosmopolitan nature of our state. While historically the $persian_language$ language fulfilled the needs of our predecessors, a new mix of local languages — as well as $persian_language$ and $arabic_language$ — has grown increasingly common. This mixture of languages has even become a source of cultural inspiration for emerging artists." #NEW
 #bah_meltpot_of_languages_desc: "The $deccan_region$ is a region of many languages and cultures. The great influx of people of $iranian_group$, $turkic_group$, $afghan_culture$, and $arabian_group$ descent into these lands has gone even further to accentuate the cosmopolitan nature of our state. While historically the $persian_language$ language has fulfilled the needs of our predecessors, a new mix of local languages as well as $persian_language$ and $arabic_language$ has grown increasingly common. This mixture of languages blend into a source of cultural inspiration for upcoming artists." #OLD ENG
 bah_karimis: "Kārimī"
 #bah_karimis_desc: "Per secoli, il commercio indo-egiziano è stato gestito da gruppi di mercanti e capitani egiziani noti come i $bah_karimis$. Strumentali al commercio quotidiano nel $indian_ocean_region$, questa organizzazione mercantile è ora ricca e potente. Dalle coste $tamil$ ai porti delle città mercantili $swahili_culture$, fino alle città portuali $lower_egyptian_culture$ oltre il $gulf_aden_province$, sultani, nobili e popolani vengono a comprare merci esotiche o prendere in prestito denaro dai $bah_karimis$.\nQuesta organizzazione ha recentemente mostrato un forte interesse per il nostro stato, e coltivare ulteriormente questa relazione non potrà che avvantaggiarci." #OLD ITA
 bah_karimis_desc: "For centuries, the Indo-Egyptian trade has been dominated by $egypt_region$-based groups of traders and captains known as the $bah_karimis$. Instrumental in the day-to-day business of $indian_ocean_region$ trade, this merchant organization is now both wealthy and powerful. From the $tamil$ coasts and the ports of the $swahili_culture$ trading cities to the $lower_egyptian_culture$ port cities past the $gulf_aden_province$, sultans, nobles, and commoners alike come to buy exotic goods or borrow money for their projects from the $bah_karimis$.\nThis organization has lately taken a very active interest in our state, and we only stand to gain from cultivating our relationship with them further." #NEW
 #bah_karimis_desc: "For centuries, the Indo-Egyptian trade has been handled by Egyptian-based groups of traders and captains known as the $bah_karimis$. Instrumental in the day-to-day business of the $indian_ocean_region$ trade, this merchant organization is now both wealthy and powerful. From the $tamil$ coasts and the ports of the $swahili_culture$ trading cities to the $lower_egyptian_culture$ port cities past the $gulf_aden_province$, Sultans, nobles, and commoners alike come to buy exotic goods or borrow money for their projects from the $bah_karimis$.\nThis organization has lately come to take a very active interest in our state, and we only stand to gain from cultivating our relationship with it further." #OLD ENG
 bah_takht_e_firoza: "Takht-e-Fīrozā"
 #bah_takht_e_firoza_desc: "La prima cosa che ogni ospite nota nella sala del nostro trono è il Trono Turchese della nostra dinastia. Questo pezzo unico di mobilio reale fu originariamente donato dal Raja Telugu Kapaya sconfitto, ed è a tutti gli effetti il simbolo supremo della nostra dinastia. Raffinato e splendidamente unico, incarna le ricchezze del Deccan e l'eccezionale fusione di stili che contraddistingue il nostro stato cosmopolita." #OLD ITA
 bah_takht_e_firoza_desc: "The first thing any guest in our royal audience chamber notices is the Turquoise Throne of our dynasty. This unique piece of royal furniture was originally donated to us by the defeated $telugu$ Raja Kapaya, and it is in many ways the ultimate symbol of our dynasty. Exquisite and splendidly unique, it embodies the riches of the $deccan_region$ and the unusual combination of styles that is the hallmark of our cosmopolitan state." #NEW
 #bah_takht_e_firoza_desc: "The first thing any guest in our royal audience chamber notices is the Turquoise Throne of our dynasty. This unique piece of royal furniture was originally donated to us by the defeated Telugu Raja Kapaya, and it is in many ways the ultimate symbol of our dynasty. Exquisite and splendidly unique, it embodies the riches of the Deccan and the unusual combination of styles that is the hallmark of our cosmopolitan state." #OLD ENG
 bah_bahmani_primogeniture: "Primogenitura Bahmani"
 #bah_bahmani_primogeniture_desc: "La nostra pratica insolita di trasmettere sempre il trono al figlio maggiore del sovrano ha talvolta creato instabilità, poiché reggenti ambiziosi e nobili opportunisti non esitavano a sfruttare un erede bambino o a sostenere il pretendente invidioso. Ormai, tuttavia, la pratica è pienamente istituzionalizzata, e quando arriva il momento della successione ben pochi osano opporsi al vero erede della dinastia." #OLD ITA
 bah_bahmani_primogeniture_desc: "Our unusual practice of always passing the throne to the eldest son of the current ruler has at times created some instability in our realm, as power-hungry regents and opportunistic nobles initially showed little hesitation in trying to take advantage of a child ruler or in supporting an envious relative's claim to the throne. By now, however, the practice has become firmly institutionalized, and when the time for succession comes there are very few who would oppose the true heir of our dynasty." #NEW
 #bah_bahmani_primogeniture_desc: "Our unusual practice of always passing the throne to the eldest son of the current ruler has at times created some instability in our realm as power-hungry regents and opportunistic nobles initially showed little hesitation in trying to take advantage of a child ruler or in supporting an envious relative's claim to the throne. By now, however, the practice has become firmly institutionalized and when the time for succession comes there are very few who would oppose the true heir of our dynasty." #OLD ENG
 #bah_madrasa_of_mahmud_gawan: "Grande Madrasa del Deccan" #OLD ITA
 bah_madrasa_of_mahmud_gawan: "Great Madrasa of the $deccan_region$" #NEW
 #bah_madrasa_of_mahmud_gawan: "Great Madrasa of the Deccan" #OLD ENG
 #bah_madrasa_of_mahmud_gawan_desc: "Da molti anni il nostro stato attira uomini capaci da tutto il mondo $muslim_ADJ$, incorporando al contempo il meglio degli stati che ci hanno preceduto. Questo ha creato una ricca cultura cosmopolita, non interamente $farsi_culture$, né $arabian_group$, né $marathi_culture$, $telugu$ o $kannadiga$. Fondare una grande madrasa nella nostra capitale favorirebbe ulteriormente lo sviluppo di questa molteplicità culturale e mostrerebbe al mondo la grandezza del nostro stato." #OLD ITA
 bah_madrasa_of_mahmud_gawan_desc: "For many years now, our state has drained able men from the greater $muslim_ADJ$ world, while also incorporating the best of the states that came before us. This has created a rich cosmopolitan culture that is not entirely $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$, nor $kannadiga$ in nature. Creating a major madrasa in our capital would serve to further the development of learning this multitude of cultures and also allow the world to see the greatness of our state." #NEW
 #bah_madrasa_of_mahmud_gawan_desc: "For many years now our state has drained able men from the greater $muslim_ADJ$ world while also incorporating the best of the states that came before us. This has created a rich cosmopolitan culture that is not entirely $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$ nor $kannadiga$ in nature. Creating a major Madrasa in our capital would serve to further the development of learning this multitude of cultures and would allow the world to see the greatness of our state." #OLD ENG

 guj_hub_of_the_indian_ocean_trade: "Fulcro del Commercio del $indian_ocean_region$"
 #guj_hub_of_the_indian_ocean_trade_desc: "Per via della natura dei venti monsonici e della sua posizione geografica, $GUJ$ ha a lungo servito come fulcro del commercio est-ovest nel $indian_ocean_region$, collegando il $red_sea_area$, l'$egypt_region$ e Malacca. Per questo motivo, i mercanti di $GUJ$ erano importanti intermediari che portavano beni preziosi come spezie dalle isole Maluku e seta dalla Cina, per poi venderli ai mercanti provenienti da occidente." #OLD ITA
 guj_hub_of_the_indian_ocean_trade_desc: "Due to the nature of the monsoon tradewinds and its specific location, $GUJ$ has long served as the hub of the East-West trade in the $indian_ocean_region$, connecting the $red_sea_area$, $egypt_region$, and Malacca. Due to this, $GUJ$ merchants were important middlemen bringing such precious goods as spices from the Maluku Islands and $silk$ from 4CHI$, and then selling them to the merchants coming from the west." #NEW
 #guj_hub_of_the_indian_ocean_trade_desc: "Due to the nature of the monsoon trade winds and its geographic location, $GUJ$ has long served as the hub of the east-west trade in the $indian_ocean_region$, connecting the $red_sea_area$, $egypt_region$, and Malacca. Due to this, $GUJ$ merchants were important middlemen bringing such precious goods as spices from the Maluku Islands and silk from China, and then selling them to the merchants coming from the west." #OLD ENG
 guj_garba: "Garba!"
 #guj_garba_desc: "Originata dal culto della dea $hindu_ADJ$ Ambaji da parte delle donne attraverso la danza, la nostra gente ha raffinato una nuova e molto aggraziata forma di danza chiamata Garba. Gli elementi essenziali sono canti e battiti di mani ritmici in formazione circolare. Oggi uomini e donne si riuniscono per celebrare qualsiasi occasione con grande fervore, uniti come comunità e indossando abiti magnificamente ricamati. Tutti insieme, giovani e anziani, contadini e principi, $muslim_ADJ$ e $hindu_ADJ$, danzano in un cerchio sempre più ampio." #OLD ITA
 guj_garba_desc: "Originating out of the worship dances done by women in praise of the $hindu_ADJ$ goddess Ambaji, our people have refined a new and very graceful form of dance called the Garba. The basics of the dance are singing and clapping rhythmically in a circular formation. Today, our men and women use this dance to celebrate any occasion with great fervor, coming together as a community and wearing exquisitely embroidered outfits. All of us together, young and old, peasant and prince, $muslim_ADJ$ and $hindu_ADJ$, dancing in an ever-growing circle." #NEW
 #guj_garba_desc: "Originating out of the worship of the $hindu_ADJ$ Goddess Ambaji by women through dance, our people have refined a new and very graceful form of dance called the Garba. The basics of the dance are singing and clapping rhythmically in a circular formation. Today, our men and women gather together to use this dance to celebrate any occasion with great fervor, coming together as a community and wearing exquisitely embroidered outfits. All of us together, young and old, peasant and prince, $muslim_ADJ$ and $hindu_ADJ$, dancing in an ever-growing circle." #OLD ENG
 guj_jain_routes: "Connessioni $jain_ADJ$"
 #guj_jain_routes_desc: "$jain$ è un antico modo di vita, formato nella sua struttura attuale da Mahāvīra. Per mille anni, $GUJ$ è stato il baluardo della comunità e della fede $jain_ADJ$, con molti luoghi sacri e templi. Dinastie reali hanno patrocinato la religione, formando una comunità comune con il popolo $hindu_ADJ$. Le invasioni $muslim_ADJ$ dall'ovest, da parte di Mahmud Ghazni e Mohammad Ghori, hanno oppresso la comunità $jain_ADJ$, vandalizzando templi o convertendoli in moschee e bruciando biblioteche $jain_ADJ$. Tuttavia, il popolo $jain_ADJ$ di $GUJ$ è sopravvissuto, si è adattato e ha prosperato, utilizzando le sue connessioni con le comunità $jain_ADJ$ nel mondo per fungere da fulcro sia della fede che del commercio." #OLD ITA
 guj_jain_routes_desc: "$jain$ is an ancient way of life, shaped into its current form by Mahavira. For a thousand years, $GUJ$ has been the stronghold of the $jain_ADJ$ community and faith, with many holy sites and temples. Royal dynasties have patronized the religion, forming a community with the $hindu_ADJ$ people. $muslim_ADJ$ invasions from the west by Mahmud Ghazni and Mohammad Ghori, oppressed the $jain_ADJ$ community, vandalizing temples or converting them into mosques, as well as burning $jain_ADJ$ libraries. However, the $jain_ADJ$ people of $GUJ$ have survived, adapted, and prospered, using their connections with $jain_ADJ$ communities across the world to serve as a hub for both faith and commerce." #NEW
 #guj_jain_routes_desc: "$jain$ is an ancient way of life, put into its current form by Mahāvīra. For a thousand years, $GUJ$ has been the stronghold of the $jain_ADJ$ community and faith, with many holy sites and temples. Royal dynasties have patronized the religion, forming a common community with the $hindu_ADJ$ people. $muslim_ADJ$ invasions from the west, by Mahmud Ghazni and Mohammad Ghori, oppressed the $jain_ADJ$ community, vandalizing temples or converting them into mosques, as well as burning $jain_ADJ$ libraries. However, the $jain_ADJ$ people of $GUJ$ have survived, adapted, and prospered, using their connections with $jain_ADJ$ communities across the world to serve as a hub for both the faith and commerce." #OLD ENG
 guj_gujarati_lipi: "$GUJ_ADJ$ Lipi"
 #guj_gujarati_lipi_desc: "La $GUJ_ADJ$ Lipi è un nuovo sistema di scrittura sviluppato da interessi mercantili. È anche conosciuta come saraphi (banchieri), vaniasai (mercanti) o mahajani (mercanti), per la sua associazione con il commercio. Il suo uso si diffonde rapidamente in $GUJ$, $KUT$ e $SND$ per rappresentare queste lingue e studiare il $sanskrit_language$, ed è adottato dalla comunità $zoroastrian$ per scrivere l'avestico. Fornisce un sistema di scrittura comune per molte comunità diverse, unendole e facilitando un senso di identità condivisa." #OLD ITA
 guj_gujarati_lipi_desc: "The $GUJ_ADJ$ Lipi is a new script and writing system developed by mercantile interests. Also known as the #italic saraphi#! (bankers), #italic vaniasai#! (merchants), or #italic mahajani#! (traders) script due to its association with commerce, its use has rapidly become widespread throughout $GUJ$, $KUT$, and $SND$ for writing regional languages and studying $sanskrit_language$. The $zoroastrian$ community has also adopted it as a writing system for Avestan. This common writing system unites diverse communities, facilitating both practical communication and a common identity." #NEW
 #guj_gujarati_lipi_desc: "The $GUJ_ADJ$ Lipi is a new script and writing system developed by mercantile interests. It is also known as the saraphi (bankers), vaniasai (merchants) or mahajani (traders) script, due to its association with commerce. Its use is widespread rapidly throughout $GUJ$, $KUT$, and $SND$ to represent those languages and study $sanskrit_language$, and is adopted by the $zoroastrian$ community to write Avestan. It provides a common writing system for many different communities, binding them together as well as facilitating unity and a common identity." #OLD ENG
 guj_gujarati_merchant_diaspora: "Diaspora Mercantile $GUJ_ADJ$"
 #guj_gujarati_merchant_diaspora_desc: "Non c'è luogo dove il nostro popolo non commerci! Su ogni costa, i nostri mercanti inseguono il commercio seguendo i venti monsonici. Le nostre flotte navigano avanti e indietro alla ricerca di nuove opportunità. I nostri mercanti conoscono l'arte e il valore di costruire navi robuste e adatte al commercio." #OLD ITA
 guj_gujarati_merchant_diaspora_desc: "Our people trade on every shore, pursuing commerce and following the trade winds. Our fleets sail constantly in pursuit of new opportunities, and our merchants understand both the craft of shipbuilding and the value of building good, hardy ships on a limited budget." #NEW
 #guj_gujarati_merchant_diaspora_desc: "There is nowhere our people do not trade! On every shore, our people pursue commerce, following the trade winds. Our fleets sail to and fro, seeking new opportunities. Our merchants know the craft and value of making good and hardy ships on a merchant's budget." #OLD ENG
 
 mug_zamindar_system: "Sistema dei Zamindar"
 #mug_zamindar_system_desc: "Gli Zamindar sono signori feudali che governano in modo autonomo o semi-autonomo sui nostri territori. Pur essendo proprietari delle terre che amministrano e parte della nostra nobiltà, alla fine servono come vassalli interni della corona." #OLD ITA
 mug_zamindar_system_desc: "The Zamindar are feudal rulers who govern our territories autonomously or semi-autonomously. While they are owners of the land they administrate and part of our nobility, in the end, they serve as internal vassals to the Crown itself." #NEW
 #mug_zamindar_system_desc: "The Zamindar are feudal rulers who rule autonomously or semi-autonomously over our territories. While they are owners of the land they administrate and part of our nobility, in the end, they serve as internal vassals to the crown itself." #OLD ENG
 mug_mughal_ibadat_khana: "$ibadat_khana$"
 mug_mughal_ibadat_khana_desc: "$ibadat_khana_desc$"
 mug_an_indian_padshah: "Padishah dell'India"
 #mug_an_indian_padshah_desc: "Il nostro regno è diventato una terra di molte fedi e culture e, pur essendo stranieri, le tradizioni e i valori di $india$ ci parlano profondamente. Nonostante la loro ricca cultura, questi popoli sembrano mancare di uno scopo comune. Dobbiamo assicurarci che, indipendentemente da casta, religione o cultura, tutti i nostri sudditi abbiano pari opportunità di servire la nostra grande casa." #OLD ITA
 mug_an_indian_padshah_desc: "Though we came to $india$ as foreigners, we now rule as Indian Padishah, embracing local traditions while transcending divisions of caste and creed. As our realm is one of many faiths and cultures, our administration will draw talent from all communities, giving everyone — regardless of caste, religion, or culture — an equal opportunity to serve our great house and glorious realm." #NEW
 #mug_an_indian_padshah_desc: "Our realm has become one of many faiths and cultures and while we are foreigners to these lands the traditions and values of $india$ speak to us. Despite their rich culture, these people seem to lack a common purpose. We must strive to ensure that regardless of caste, religion, or culture all our subjects are given equal opportunities to serve our great house." #OLD ENG
 mug_mughal_architecture: "Architettura $MUG_ADJ$"
 #mug_mughal_architecture_desc: "Un grande impero richiede edifici monumentali. Nel nostro impero cosmopolita, gli architetti stanno già creando opere straordinarie che stupiranno le generazioni future. La nostra dinastia deve essere alla guida di questo movimento, creando opere magnifiche come il mondo non ha mai visto." #OLD ITA
 mug_mughal_architecture_desc: "A great empire demands equally monumental buildings. In our cosmopolitan realm, architects are already creating marvelous edifices that will awe generations to come. Our dynasty should be at the forefront of this movement, creating great architectural works such as the world has never seen." #NEW
 #mug_mughal_architecture_desc: "A great empire demands monumental buildings. In our cosmopolitan empire, architects are already creating marvelous buildings that will awe generations to come. Our dynasty should be at the forefront of this movement, creating great works of a kind the world has never seen." #OLD ENG
 mug_fatawa_e_alamgiri: "Fatawa-i-Alamgiri"
 mug_fatawa_e_alamgiri_desc: "Il $mug_fatawa_e_alamgiri$ è una raccolta basata sulla sharia, che funge da codice legale principale regolando vari aspetti della vita nel nostro impero. È una delle più complete raccolte di leggi, etica, strategie militari, politiche economiche, giustizia e principi $muslim_ADJ$."

 samanta_advance: "Feudalesimo Sāmanta"
 #samanta_advance_desc: "Sāmanta — #italic vicino#! — è il termine che indica tanto i vassalli quanto i tributari. È un sistema feudale che è durato a lungo e, pur perdendo rilevanza in quest'epoca, rimane uno dei pilastri su cui la nostra società si è fondata per secoli." #OLD ITA
 samanta_advance_desc: "Sāmanta — #italic neighbor#! — is a term denoting vassals and tributary chiefs alike. It is a feudal system that has for centuries acted as one of the pillars of our society. While this arrangement is currently losing prominence, it remains a foundation of our political structure." #NEW
 #samanta_advance_desc: "Sāmanta — #italic neighbor#! — is the term denoting vassals and tributaries alike. It is a feudal system that has lasted for a long time, and while it is losing prominence in the current age, it is one of the pillars our society has been built for centuries." #OLD ENG
 kalaripayattu_advance: "Kalaripayattu"
 kalaripayattu_advance_desc: "Il Kalaripayattu — la #italic Pratica nelle Arti del Campo di Battaglia#! — è un'antica arte marziale indiana con origine nel $malabar_area$. I guerrieri del nostro stato saranno addestrati nelle arti del Kalaripayattu per garantire abilità superiori nel combattimento corpo a corpo e nelle armi da mischia."
 nair_military_advance: "Milizia Nair"
 #nair_military_advance_desc: "I Nair costituiscono un gruppo diversificato di caste hindu del $malabar_area$ con una lunga storia di coinvolgimento militare. La loro esperienza, così come il loro ruolo nei $kalari$, sarà di grande valore nei conflitti che ci attendono." #OLD ITA
 nair_military_advance_desc: "The Nairs are a diverse group of $hindu_ADJ$ castes from $malabar_area$ and have a long history of involvement with the military. Their experience, as well as their role for the $kalari$, will be of great value in our current conflicts." #NEW
 #nair_military_advance_desc: "The Nairs are a diverse group of Hindu castes from $malabar_area$ and have a long history of involvement with the military. Their experience, as well as their role for the $kalari$, will be of great value for the conflicts at hand." #OLD ENG
 
 mhr_ashta_pradhan_advance: "$mhr_ashta_pradhan$"
 mhr_ashta_pradhan_advance_desc: "$mhr_ashta_pradhan_desc$"
 mhr_tradition_of_military_service: "Tradizione di Servizio Militare"
 mhr_tradition_of_military_service_desc: "I cavalieri del $marathi_culture$ hanno una lunga tradizione di servizio come ‘Bargir' per i sultanati del Deccan. L'aumentata militarizzazione del Deccan, dovuta alle numerose guerre combattute nell'area, ha reso la nostra cavalleria una delle forze più pericolose dell'$india$."
 mhr_forts_of_maharashtra: "Fortezze del Maharashtra"
 #mhr_forts_of_maharashtra_desc: "In queste terre collinari e densamente boscose mantenere numerose fortezze in buono stato è una necessità sia offensiva sia difensiva. La manutenzione delle nostre molte fortezze deve essere una priorità assoluta." #OLD ITA
 mhr_forts_of_maharashtra_desc: "In these hilly and densely forested lands, maintaining a series of forts is an offensive necessity as well as a defensive one. Meticulous maintenance of our fortifications should therefore be a top priority." #NEW
 #mhr_forts_of_maharashtra_desc: "In these hilly and densely forested lands keeping many and well-maintained forts is a necessity for offense as well as defense. Keeping our many forts well maintained should be a top priority." #OLD ENG
 mhr_peasant_soldiers: "Soldati Contadini"
 #mhr_peasant_soldiers_desc: "I villaggi del Desh sono pieni di uomini capaci che sarebbero più che disposti a servire nei nostri eserciti. Addestriamo e reclutiamo tutti i parlanti $marathi_language$ affinché servano nelle nostre armate." #OLD ITA
 mhr_peasant_soldiers_desc: "The villages of the Desh are full of able men who would be more than willing to serve in our armies. Let us recruit the $marathi_language$-speaking members of our population into our military." #NEW
 #mhr_peasant_soldiers_desc: "The villages of the Desh are full of able men who would be more than willing to serve in our armies. Let us train and recruit all $marathi_language$ speakers to serve in our armies." #OLD ENG
 mhr_office_of_the_peshwa: "Ufficio del Peshwa"
 #mhr_office_of_the_peshwa_desc: "Istituiamo un ufficio interamente dedicato alla gestione dello stato e dei suoi eserciti. Con un abile ministro incaricato, il Peshwa, il nostro paese sarà abbastanza versatile da espandersi rapidamente ed efficacemente." #OLD ITA
 mhr_office_of_the_peshwa_desc: "The #italic Peshwa#! Shall be our chief minister, entirely devoted to both civil administration and overseeing military operations. This consolidation of power will make us versatile enough to expand quickly and efficiently." #NEW
 #mhr_office_of_the_peshwa_desc: "Let us create an office entirely devoted to the running of our state and its armies. With a skillful minister in charge, the Peshwa, our country will be versatile enough to expand quickly and efficiently." #OLD ENG
 mhr_encourage_brahmin_ties: "Rafforzare i Legami con i Brāhmaṇa"
 #mhr_encourage_brahmin_ties_desc: "Il settore finanziario del nostro stato è dominato da famiglie bancarie Brāhmaṇa. Integraiamole ulteriormente nel nostro stato assumendole come esattori delle tasse e creando regolamenti per rafforzare i loro diritti e proteggere le loro tradizioni. Otterremo così il favore dei nostri finanziatori e l'accesso ad amministratori preparati e competenti." #OLD ITA
 mhr_encourage_brahmin_ties_desc: "Our financial sector is dominated by Brāhmaṇa banking families. Let us integrate them further in our administration by hiring them as tax collectors, and creating regulations to strengthen their rights and protect their traditions. We will have gained the favor of our financiers as well as access to learned and able administrators." #NEW
 #mhr_encourage_brahmin_ties_desc: "The financial sector of our state is dominated by Brāhmaṇa banking families. Let us integrate them further in our state by hiring them as tax collectors, and creating regulations to strengthen their rights and protect their traditions. We will have gained the favor of our financiers as well as access to learned and able administrators." #OLD ENG

 pun_breadbasket_of_india: "Granaio dell'$india$"
 #pun_breadbasket_of_india_desc: "I cinque grandi fiumi — Indo, Jhelum, Chenab, Ravi e Sutlej — attraversano le terre del $punjab_area$, donando al suolo una fertilità senza pari. Oltre a permetterci di esportare cibo e cotone ai nostri vicini, questa ricchezza consente alle nostre città di crescere e incoraggia ogni tipo di produzione specializzata. Dobbiamo fare tutto il possibile per favorire la crescita agricola e difendere i nostri contadini da banditi e briganti delle zone limitrofe." #OLD ITA
 pun_breadbasket_of_india_desc: "The five great rivers — Indus, Jhelum, Chenab, Ravi, and Sutley — penetrate the lands of the $punjab_area$ area, granting the soil the blessing of unmatched fertility. Apart from allowing us to export food and cotton to our neighbors, this also allows our many cities to grow and encourages all sorts of specialized production. We must do our utmost to encourage the growth of agriculture and to defend our farmers from the bandits and brigands in the adjoining areas." #NEW
 #pun_breadbasket_of_india_desc: "The great five rivers — Indus, Jhelum, Chenab, Ravi, and Sutley — penetrate the lands of the $punjab_area$ area, granting the soil the blessing of unmatched fertility. Apart from allowing us to export food and cotton to our neighbors, this also allows our many cities to grow and encourages all sorts of specialized production. We must do our utmost to encourage the growth of agriculture and to defend our farmers from the bandits and brigands of the adjoining areas." #OLD ENG
 pun_encourage_indo_persian_trade: "Promuovere il Commercio Indo-Persiano"
 #pun_encourage_indo_persian_trade_desc: "Situato al confine più occidentale dell'$india$, il $PUN$ è sempre stato un crocevia di scambi economici e culturali tra l'$india$ e la $persia_region$. L'antica Grand Trunk Road, che collega l'$india$ orientale al mondo del $farsi_culture$, attraversa le nostre terre prima di salire verso i passi montani afghani. Questi passi sono tuttavia infestati da razziatori tribali e briganti. Dobbiamo favorire il traffico lungo questa vitale via e fare tutto il possibile per garantire la sicurezza dei mercanti costruendo caravanserragli e pattugliando le strade." #OLD ITA
 pun_encourage_indo_persian_trade_desc: "Situated on the westernmost border of $india$, the $PUN$ has always been at the crossroads of economic and cultural exchange between $india$ and $persia_region$. The ancient Grand Trunk Road, which connects eastern $india$ to the $farsi_culture$ world, runs right through our lands before heading up into the Afghan mountain passes. These passes are, however, plagued by tribal raiders and bandits. We should encourage the traffic along this ancient and vibrant route and do everything in our power to look after the wellbeing of these traders by constructing caravanserais and policing these roads." #NEW
 #pun_encourage_indo_persian_trade_desc: "Situated at India's westernmost border, the $PUN$ has always been at the crossroads of economic and cultural exchange between $india$ and $persia_region$. The ancient Grand Trunk Road, which connects eastern $india$ to the $farsi_culture$ world, runs right through our lands before heading up into the Afghan mountain passes. These passes are, however, plagued by tribal raiders and bandits. We should encourage the traffic along this ancient and vibrant route and do everything in our power to look after the wellbeing of these traders by constructing caravanserais and policing these roads." #OLD ENG
 pun_punjabi_textile_industry: "Industria Tessile $PUN_ADJ$"
 #pun_punjabi_textile_industry_desc: "Il $PUN$ è un importante centro di produzione tessile. I tessuti dei nostri tessitori sono fabbricati appositamente per i mercati di tutta l'Asia e l'Europa, e i nostri artigiani sono tra i più produttivi dell'$india$." #OLD ITA
 pun_punjabi_textile_industry_desc: "The $PUN$ is a major center for textile production. $cloth$ from our weavers is specially made for markets all over $asia$ and $europe$, and our weavers are among the most productive in $india$." #NEW
 #pun_punjabi_textile_industry_desc: "The $PUN$ is a major center for textile production. Cloth from our weavers is specially made for markets all over Asia and Europe and our weavers are among the most productive in $india$." #OLD ENG
 pun_foundation_of_the_khalsa: "La Khalsa"
 #pun_foundation_of_the_khalsa_desc: "Il $sikhism$, religione originaria del $PUN$, sta crescendo rapidamente nelle nostre terre. I membri di questa fede provengono da tutte le caste e condizioni sociali e difenderanno il loro stato indipendentemente dalla professione precedente." #OLD ITA
 pun_foundation_of_the_khalsa_desc: "$sikhism$, a religion native to the $PUN$, is spreading rapidly in our lands. Members of this faith come from all castes and backgrounds, and will defend their state regardless of their former professions." #NEW
 #pun_foundation_of_the_khalsa_desc: "$sikhism$, a religion native to the $PUN$, is growing rapidly in our lands. Members of this faith come from all castes and backgrounds and will defend their state regardless of their former professions." #OLD ENG
 pun_gurmukhi_script: "Scrittura Gurmukhī"
 #pun_gurmukhi_script_desc: "La scrittura Gurmukhī è un'abugida sviluppata nelle terre del $PUN$ ed è particolarmente favorita dai nostri guru $sikhism_ADJ$. Il nostro clero utilizza questo sistema di scrittura per registrare i testi $sikhism_ADJ$." #OLD ITA
 pun_gurmukhi_script_desc: "The Gurmukhī script is an #italic abugida#! developed in the lands of $PUN$, and is highly favored by our $sikhism_ADJ$ gurus. Our clergy is using this script in order to record $sikhism_ADJ$ texts." #NEW
 #pun_gurmukhi_script_desc: "The Gurmukhī script is an abugida developed in the lands of $PUN$ and is highly favored by our $sikhism_ADJ$ gurus. Our clergy is using this script in order to record $sikhism_ADJ$ texts." #OLD ENG
 pun_strength_of_the_misls: "Forza dei Misls"
 #pun_strength_of_the_misls_desc: "Il sistema amministrativo degli stati Misl del $PUN$ permette loro di schierare impressionanti forze di cavalleria. Nei momenti di necessità, possiamo richiamare queste forze per combattere un nemico comune." #OLD ITA
 pun_strength_of_the_misls_desc: "The administrative system of the Misl states of $PUN$ allows them to field impressive cavalry forces. In times of need, we may call upon these forces to fight a common enemy." #NEW
 #pun_strength_of_the_misls_desc: "The administrative system of the Misl states of $PUN$ allow them to field impressive cavalry forces. In times of need, we may call upon these forces to fight a common enemy." #OLD ENG
 pun_reforming_the_punjabi_army: "Riforma dell'Esercito $PUN_ADJ$"
 #pun_reforming_the_punjabi_army_desc: "Le vie dei nostri antenati erano solide e ci hanno servito bene nel corso degli anni. Tuttavia, affinché i nostri eserciti continuino a prevalere sui campi di battaglia, dobbiamo puntare a creare una forza più professionale. Studiando come i paesi lontani organizzano i loro eserciti e adattandone i metodi quando appropriato, potremo creare un esercito $PUN_ADJ$ più efficiente, pur conservando le qualità uniche del nostro attuale sistema militare." #OLD ITA
 pun_reforming_the_punjabi_army_desc: "The ways of our forefathers were sound, and have served us well over the years. But in order for our armies to continue to triumph on the battlefields, we must create a more professional military. By studying the way other countries organize their armies and adapting their methods when prudent, we may create a more efficient $PUN_ADJ$ army while still retaining the unique qualities of our current military system." #NEW
 #pun_reforming_the_punjabi_army_desc: "The ways of our forefathers were sound and have served us well over the years. In order for our armies to continue to triumph on the battlefields we must, however, aim to create a more professional force. By studying the way far away countries organize their armies and adapting their methods when prudent we may create a more efficient $PUN_ADJ$ army while still retaining the unique qualities of our current military system." #OLD ENG

 #Thai Culture
 religious_melting_pot: "Melting Pot Religioso"
 #religious_melting_pot_desc: "Molte religioni diverse hanno influenzato il nostro popolo, dalle credenze popolari tradizionali all'$hindu$ e al $buddhist$ provenienti sia da $india$ che da $china$. Con il tempo, la nostra gente ha iniziato un certo grado di sincretismo, mescolando credenze diverse senza mai abbandonarne completamente nessuna." #OLD ITA
 religious_melting_pot_desc: "Many different religions have influenced our people, from their traditional folk beliefs to $hindu$ and $buddhist$, both from $india$ and $china$. Over time, our people have developed some degree of religious syncretism, mixing some beliefs with others and not fully disregarding any." #NEW
 #religious_melting_pot_desc: "Many different religions have influenced our people, from their traditional folk beliefs to $hindu$ and $buddhist$ both from $india$ and $china$. Over time, our people have started some degree of syncretism, mixing some beliefs with others and not fully disregarding any." #OLD ENG
 akson_thai: "Akson Thai"
 #akson_thai_desc: "Originariamente basata sull'antico script in $khmer_language$, la scrittura del $thai_culture$ si è evoluta in una forma distinta per adattarsi alla fonologia della nostra lingua. Avere un sistema di scrittura unico ha aiutato il nostro popolo a svilupparsi come cultura unica." #OLD ITA
 akson_thai_desc: "Originally based on ancient $khmer_language$ script, $thai_culture$ writing has evolved to be quite distinct from its original form to accommodate the complex phonology of our language. Having a unique written language has certainly contributed to the development of our unique culture." #NEW
 #akson_thai_desc: "Originally based on the old $khmer_language$ script, the $thai_culture$ has been developed as distinct from it to accommodate to the phonology of our language. Having a unique written language has helped our people develop as a unique culture." #OLD ENG
 father_governs_children: "Il Padre Governa i Figli"
 #father_governs_children_desc: "I nostri sovrani sono celebri per il loro stretto legame con la gente comune. Possa il nostro popolo vivere libero e felice sotto la guida luminosa dei loro maestosi e celesti governanti." #OLD ITA
 father_governs_children_desc: "Our rulers are famed for their close connection to the common man. May our people always live free and happily under the guiding light of their majestic, heavenly rulers!" #NEW
 #father_governs_children_desc: "Our rulers are famed for their close connection with the common man. May our people live free and happily under the guiding light of their majestic, heavenly rulers." #OLD ENG
 thai_war_elephants: "Elefanti da Guerra"
 #thai_war_elephants_desc: "Gli elefanti da guerra sono stati usati nell'$indochina_region$ per generazioni, sia come cavalleria di supporto alla fanteria, sia come montatura personale dei re, che li usavano per duelli elefantini contro il comandante nemico." #OLD ITA
 thai_war_elephants_desc: "War elephants have been used in $indochina_region$ for generations, both for cavalry and as personal mounts for the kings, who would then engage in elephant duels with the opposing side's leader." #NEW
 #thai_war_elephants_desc: "War Elephants have been used in $indochina_region$ for generations, both as a cavalry supporting the infantry and as personal mount for the kings, who would then engage in elephant duels with the opposing leader." #OLD ENG
 thai_royal_poets: "Poeti Reali"
 #thai_royal_poets_desc: "A cosa servono le vittorie se non c'è nessuno che le canti? La nostra corte sarà un luogo sicuro per i poeti, e la nostra storia sarà la loro fonte d'ispirazione." #OLD ITA
 thai_royal_poets_desc: "What is the point of winning wars if no songs are sung about our victories? Our court shall be a haven for poets, and our history shall be their source of inspiration." #NEW
 #thai_royal_poets_desc: "What is the point of winning wars if there is no one to sing about it? Our court shall be a safe place for poets and our history shall be their source of inspiration." #OLD ENG
 trading_links: "Legami Commerciali"
 #trading_links_desc: "Il nostro paese si trova su un antico crocevia commerciale. La nostra vicinanza sia all'$india$ che alla $china$ ha permesso al commercio di attraversare le nostre terre, e con esso relazioni e interazioni con numerosi paesi vicini." #OLD ITA
 trading_links_desc: "Our country has been a crossroads of trade since ancient times. Our proximity to $india$ and $china$ has allowed trade to flow through our lands, and with it relationships and interactions with the many different countries around us." #NEW
 #trading_links_desc: "Our country lays in a crossroads of trade since ancient times. Our closeness to both $india$ and $china$ has allowed trade to flow through our lands and with it relations and interactions with the many different countries around us." #OLD ENG
 foreign_mercenaries: "Mercenari Stranieri"
 #foreign_mercenaries_desc: "Abbiamo recentemente visto un afflusso di barbari da terre straniere: alcuni sono mercanti, altri uomini d'armi. Facciamo uso di loro nei nostri eserciti." #OLD ITA
 foreign_mercenaries_desc: "We have recently received an influx of barbarians from foreign lands. Some are merchants but some are fighting men. Let us make use of them in our armies." #NEW
 #foreign_mercenaries_desc: "We have recently seen an influx of barbarians from foreign lands, some are merchants but some are fighting men. Let us make use of them in our armies." #OLD ENG
 toi_muay: "Toi Muay"
 #toi_muay_desc: "Insegnata ai nostri soldati per l'uso in guerra, è un'arte marziale senz'armi che comprende pugni, lotta e tecniche da terra. Essere esperti in essa rende le nostre truppe più letali in battaglia, anche qualora perdano le armi." #OLD ITA
 toi_muay_desc: "Taught to our soldiers for use in combat, it is an unarmed martial art featuring punches, grappling, and ground-fighting techniques. Proficiency in this art allows our troops to remain deadly in battle even if they lose their weapons." #NEW
 #toi_muay_desc: "Taught to our soldiers for use in war, it is an unarmed martial art including punches, grappling, and ground fighting techniques. Being proficient in it allows our troops to be more deadly in battle, even if they lose their weapons." #OLD ENG
 trading_embassies: "Ambasciate Commerciali"
 #trading_embassies_desc: "Molti mercanti solcano le acque vicino alle nostre terre. Per questo conosciamo molti regni lontani con i quali possiamo stabilire ambasciate permanenti e nuove relazioni." #OLD ITA
 trading_embassies_desc: "The numerous trade ships coming in and out of our waters have familiarized us with many distant realms. By establishing permanent trading embassies with these far-off places, we can transform casual commerce into formal relationships." #NEW
 #trading_embassies_desc: "Many traders ply their trade in the waters near our lands. Thus, we know of many distant realms, with whom we may establish permanent embassies and relations." #OLD ENG
 photduang: "Photduang"
 photduang_desc: "La nostra valuta può sembrare strana agli stranieri, ma i #italic $photduang$#! ci hanno servito bene per secoli. Grumoli d'argento tondeggianti e timbrati con marchi ufficiali, costituiscono la base della nostra economia."
 personal_executions: "Esecuzioni Personali"
 #personal_executions_desc: "È giusto che la gente veda il nostro impegno verso la giustizia. D'ora in avanti, i criminali più efferati saranno giustiziati personalmente dal sovrano. In questo modo, il popolo capirà che il nostro paese è ordinato e sarà richiamato all'obbedienza della legge." #OLD ITA
 personal_executions_desc: "From now on, the most heinous criminals will be executed personally by the ruler. With this, people will know that we are an orderly nation committed to justice, and they will show the appropriate obedience to the law." #NEW
 #personal_executions_desc: "It is only fitting that people see our commitment to justice. From now on, the most heinous criminals will be executed personally by the ruler. With this, people will know that our country is orderly, and they will be called to obey the law." #OLD ENG
 close_subjects: "Soggetti Vicini"
 #close_subjects_desc: "Per noi, i nostri sudditi non sono qualcosa di separato dalla nazione, ma una sua parte integrante. Manteniamo legami stretti con loro, e sono inseriti nella nostra burocrazia e amministrazione." #OLD ITA
 close_subjects_desc: "For us, our subjects are not something separate from the nation, but rather an integral part of it. We keep close ties with them, and they are fully integrated into our bureaucracy and administration." #NEW
 #close_subjects_desc: "For us, our subjects are not something separated from our own nation, but instead an integral part of it. We keep close ties with them, and they are integrated in our bureaucracy and administration." #OLD ENG

 #Ayutthaya
 ayu_prestigious_cavalry: "Cavalleria Prestigiosa"
 #ayu_prestigious_cavalry_desc: "Che sia a cavallo o sul dorso di un elefante, la nostra cavalleria è composta da truppe fiere, spesso discendenti dalle famiglie più prestigiose. La loro efficacia nel supporto della nostra fanteria è indiscutibile." #OLD ITA
 ayu_prestigious_cavalry_desc: "Whether on horseback or atop an elephant, we can boast of an impressive cavalry, usually made up of descendants from the most prestigious families. Their contributions through supporting our infantry are invaluable." #NEW
 #ayu_prestigious_cavalry_desc: "Whereas it is on horse or on the top of an elephant, our cavalry are proud troops, usually descending from the most prestigious families. Their effectiveness in supporting of our infantry is unquestionable." #OLD ENG
 ayu_white_elephant: "Elefante Bianco"
 #ayu_white_elephant_desc: "L'elefante bianco è il simbolo del potere del nostro sovrano, un presagio estremamente propizio che sfrutteremo a nostro vantaggio. Quando il nostro sovrano cavalca l'elefante bianco, nessuno oserà mettere in dubbio il nostro diritto a governare." #OLD ITA
 ayu_white_elephant_desc: "The white elephant symbolizes sacred kingship in $buddhist$ tradition, and is also the emblem of our ruler. Possessing a white elephant legitimizes our authority, proving to our subjects that we rule with the blessing of the divine." #NEW
 #ayu_white_elephant_desc: "The white elephant is the symbol of the power of our ruler, a very auspicious omen that we will use to our advantage. When our ruler rides on top of the white elephant, none shall question our right to rule." #OLD ENG
 ayu_ayutthaya_literature: "Letteratura $AYU_ADJ$"
 #ayu_ayutthaya_literature_desc: "La letteratura prodotta nel nostro paese è ricca: dagli epici poemi #italic Lilit#! che narrano celebri conflitti militari, alla poesia #italic Nirat#! su viaggi e amori perduti; dalle leggende popolari su eroi locali ai panegirici che celebrano le imprese dei nostri più gloriosi sovrani." #OLD ITA
 ayu_ayutthaya_literature_desc: "Our country has a rich and complex literary tradition, from the epic #italic Lilit#! poems narrating famous military conflicts, to the #italic Nirat#! poetry of travels and lost lovers; from folk legend of local heroes to panegyrics praising the feats of our most glorious rulers." #NEW
 #ayu_ayutthaya_literature_desc: "Literature produced in our country is rich, from the epic #italic Lilit#! poems narrating famous military conflicts, to the #italic Nirat#! poetry of travels and lost lovers; from folk legend of local heroes to panegyrics praising the feats of our most glorious rulers." #OLD ENG
 ayu_phrai_luang: "Phrai Luang"
 #ayu_phrai_luang_desc: "Tutti gli uomini liberi soggetti al servizio phrai servono non solo in guerra (#italic $ayu_phrai_thaan$#!), ma anche nei lavori pubblici, a discrezione dei governatori locali." #OLD ITA
 ayu_phrai_luang_desc: "All freemen subject to #italic phrai#! service not only serve in war — the #italic $ayu_phrai_thaan$#! — but also assist in the construction of public works, at the discretion of local governors." #NEW
 #ayu_phrai_luang_desc: "All freemen subject to phrai service not only serve in war (#italic $ayu_phrai_thaan$#!) but also in public construction, at the discretion of the local governors." #OLD ENG
 ayu_phrai_thaan: "Phrai Thaan"
 #ayu_phrai_thaan_desc: "Tutti i maschi all'età di 18 anni devono essere registrati, e le loro informazioni trasmesse alla burocrazia di governo. Ogni cittadino maschio è idoneo alla leva e al servizio nell'esercito in tempo di guerra, e noi ci assicureremo che ciò avvenga quando necessario." #OLD ITA
 ayu_phrai_thaan_desc: "All males at the age of eighteen are to be registered with the military, and their information passed on to the government bureaucracy. Every male citizen is eligible to be conscripted and made to serve in the army in war, and we will make sure that they do so if needed." #NEW
 #ayu_phrai_thaan_desc: "All males at the age 18 are to be registered, and their information passed onto the government bureaucracy. Every male citizen is eligible to be conscripted and made to serve in the army in war, and we will make sure that they do if needed." #OLD ENG
 ayu_floating_rice: "Riso Galleggiante"
 #ayu_floating_rice_desc: "Il riso è coltivato nel nostro paese da secoli, ma le continue inondazioni dei fiumi hanno sempre rappresentato un problema. Questa nuova varietà, capace di crescere in condizioni di sommersione, ci garantirà una fonte di cibo più stabile anche durante le piene." #OLD ITA
 ayu_floating_rice_desc: "Rice has been grown in our country for centuries, but the constant flooding of our rivers has always been an issue for its proper cultivation. This new variety of rice, used to growing in flooded conditions, will provide us with a stable source of food even when the rivers overflow." #NEW
 #ayu_floating_rice_desc: "Rice has been cultivated in our country for centuries, but the constant flooding of our rivers has always been an issue for its proper cultivation. This new variety of rice, used to grow in flooded conditions, will allow us to have a more stable source of food even when the rivers flood." #OLD ENG
 ayu_sakdina: "Sakdina"
 #ayu_sakdina_desc: "La nostra società è rigidamente organizzata secondo il sistema $ayu_sakdina$, e ciascuno conosce il proprio posto, così come la ricchezza e le proprietà cui ha diritto. Di conseguenza, la nostra capacità di riscuotere le tasse risulta più efficiente." #OLD ITA
 ayu_sakdina_desc: "Our society is strictly organized along the $ayu_sakdina$ system. Each person knows their proper place in society and how much wealth and property they are entitled to have. This organization makes it much more efficient to extract taxes from them." #NEW
 #ayu_sakdina_desc: "Our society is strictly organized following the $ayu_sakdina$ system, and each person knows what is their place in it and how much wealth and property they are entitled to have. As such, our ability to extract taxes from them is more efficient." #OLD ENG
 ayu_cosmopolitan_trade: "Commercio Cosmopolita"
 #ayu_cosmopolitan_trade_desc: "Il nostro paese è dimora di molte genti venute da lontano alla ricerca di profitto dalle ricchezze delle nostre terre. L'afflusso di così tanti popoli e merci attraverso i nostri confini è qualcosa da cui possiamo trarre grande beneficio." #OLD ITA
 ayu_cosmopolitan_trade_desc: "Our country is home to many people from afar, who came here hoping to profit from the richness of our land. Having so many people and goods flowing through our borders is something we derive numerous benefits from." #NEW
 #ayu_cosmopolitan_trade_desc: "Our country is home to many people from afar, coming to us in search of profit from the richness of our land. Having so many people and goods flowing through our borders is something we can also get great benefit from." #OLD ENG

 #Sukhothai
 suk_breaker_of_chains: "Spezzacatene"
 #suk_breaker_of_chains_desc: "Non molto tempo fa eravamo sotto l'autorità dei $KHM_ADJ$, finché non abbiamo riconquistato la libertà e il nostro legittimo posto come potenza indipendente degna di attenzione. Ci siamo guadagnati l'ammirazione e il rispetto dei nostri pari." #OLD ITA
 suk_breaker_of_chains_desc: "It was not so long ago that we saw ourselves under the $KHM_ADJ$ authority, but we have since gained our freedom, and have taken our rightful place as an independent power. We have earned the admiration of our peers, and their respect." #NEW
 #suk_breaker_of_chains_desc: "It is not long ago that we saw ourselves under the $KHM_ADJ$ authority, until we gained our freedom and our rightful place as an independent power worthy of attention. We have earned the admiration of our peers, and their respect." #OLD ENG
 suk_birthplace_of_a_culture: "Culla di una Cultura"
 #suk_birthplace_of_a_culture_desc: "Siamo considerati il primo regno indipendente della cultura $thai_culture$, poiché fummo i primi a ribellarci all'autorità dei $KHM_ADJ$ e a liberarci dalla loro influenza. Per questo, tutti i popoli della cultura $thai_culture$ guardano a noi con ammirazione." #OLD ITA
 suk_birthplace_of_a_culture_desc: "We are called the first independent $thai_culture$ kingdom, as we were the first ones to rebel against $KHM_ADJ$ authority and establish ourselves as free from their influence. As such, all $thai_culture$ people look at us in admiration." #NEW
 #suk_birthplace_of_a_culture_desc: "We are called the first independent $thai_culture$ kingdom, as we were the ones to first rebel against the $KHM_ADJ$ authority and establish ourselves free from their influence. As such, all $thai_culture$ people look at us in admiration." #OLD ENG
 suk_ram_khamhaeng_stele: "Stele di $name_ram_khamhaeng$"
 #suk_ram_khamhaeng_stele_desc: "La maggior parte della storia dell'antico regno $SUK_ADJ$ proviene dalle iscrizioni sulla $suk_ram_khamhaeng_stele$, commissionata dal grande re per tramandare il resoconto del suo glorioso regno. La $suk_ram_khamhaeng_stele$ è un pezzo sacro del nostro patrimonio e prova indiscutibile del nostro ruolo nella storia." #OLD ITA
 suk_ram_khamhaeng_stele_desc: "Most of the history of the early $SUK_ADJ$ kingdom comes from inscriptions on the $suk_ram_khamhaeng_stele$, commissioned by the great king to give a record of his glorious reign. The $suk_ram_khamhaeng_stele$ is a sacred piece of heritage and one that surely proves our place in history." #NEW
 #suk_ram_khamhaeng_stele_desc: "Most of the history of the early $SUK_ADJ$ kingdom comes from inscriptions on the $suk_ram_khamhaeng_stele$, commissioned by the great king to give a record of his glorious reign. The $suk_ram_khamhaeng_stele$ is a sacred peace of heritage and one that surely proves our place in history." #OLD ENG
 suk_akson_sukhothai: "Akson $SUK$"
 #suk_akson_sukhothai_desc: "Sebbene la scrittura della cultura $thai_culture$ si sia ormai diffusa tra tutti i popoli $thai_culture$, non bisogna dimenticare che fu nel nostro paese e sotto la nostra guida che nacque, adattata dallo script dei nostri precedenti oppressori $KHM_ADJ$. Essa rappresenta non solo un fattore unificante, ma anche una prova della nostra individualità e unicità." #OLD ITA
 suk_akson_sukhothai_desc: "Although the $thai_culture$ script is already common to all $thai_culture$ people, it should not be forgotten that it was in our country and under our guidance that it was developed. As such, $thai_culture$ script is not only a unifying force for our culture, but also proof of our individuality and distinctiveness." #NEW
 #suk_akson_sukhothai_desc: "Although the $thai_culture$ script has already spread among all $thai_culture$ people, it should not be forgotten that it was in our country and under our guidance that it was developed by adapting it from the script of our previous $KHM_ADJ$ oppressors. As such, it is not only a unifying force for our culture, but also a proof of our individuality and distinctiveness." #OLD ENG
 suk_wat_si_sawai: "Wat Si Sawai"
 #suk_wat_si_sawai_desc: "Siamo rinomati per i nostri magnifici templi, come il $suk_wat_si_sawai$, uno dei più antichi di $sukhothai$. Costruito sotto l'autorità $KHM_ADJ$ come tempio $hindu_ADJ$, la sua successiva conversione lo ha reso un simbolo della nostra identità. La fede del nostro popolo è forte." #OLD ITA
 suk_wat_si_sawai_desc: "We are known for our many gorgeous temples, such as the $suk_wat_si_sawai$, one of the oldest in $sukhothai$. Built under the $KHM_ADJ$ authority as a $hindu_ADJ$ temple, its ensuing repurposing has turned it into a symbol of our identity. The faith of our people is strong." #NEW
 #suk_wat_si_sawai_desc: "We are known for our many grand temples, such as the $suk_wat_si_sawai$, one of the oldest ones in $sukhothai$. Built under the $KHM_ADJ$ authority as a $hindu_ADJ$ temple, its ensuing repurposing has turned it into a symbol of our identity. The faith of our people is strong." #OLD ENG
 suk_sukhothai_ceramics: "Ceramiche $SUK$"
 #suk_sukhothai_ceramics_desc: "La ceramica è prodotta dai popoli della cultura $thai_culture$ fin dall'antichità, influenzata da quella del gruppo $chinese_group$ ma sempre con un proprio stile distintivo. Tuttavia, sono le ceramiche prodotte nel nostro paese a essere più ricercate, spesso esportate verso terre lontane." #OLD ITA
 suk_sukhothai_ceramics_desc: "Ceramics have been created by the $thai_culture$ people since antiquity, influenced by $chinese_group$ ceramics but always retaining their own distinct style. However, the ceramics produced in our country are most valued, and they are often traded at great distances overseas." #NEW
 #suk_sukhothai_ceramics_desc: "Ceramics have been created by the $thai_culture$ people since antiquity, influenced by $chinese_group$ ceramics but always retaining their own distinct style. However, it is the ceramics produced in our country that are most valued, and they are often traded to great distances overseas." #OLD ENG
 suk_military_history: "Storia Militare"
 #suk_military_history_desc: "I nostri eserciti vantano una lunga storia di successi e grandi vittorie. Di conseguenza, una posizione nelle nostre forze armate è considerata un incarico di onore e prestigio, e molti desiderano servire." #OLD ITA
 suk_military_history_desc: "Our armies have a long history of victory in combat. As a result, a position in our military is seen as a post of honor and prestige, and there are many willing to serve." #NEW
 #suk_military_history_desc: "Our armies have a long history of successes and great victories. As a result, a position in our military is seen as a post of honor and prestige, and there are many willing to serve in it." #OLD ENG
 suk_unstoppable_army: "Esercito Inarrestabile"
 #suk_unstoppable_army_desc: "Molti hanno tentato in passato di fermare il nostro progresso e la nostra espansione, ma tutti sono falliti di fronte al nostro esercito. Esso si è dimostrato una forza inarrestabile, capace di spazzare via ogni ostacolo dal nostro cammino." #OLD ITA
 suk_unstoppable_army_desc: "Many have tried in the past to stop our progress and expansion, but all have failed in the face of our army. It has proved to be an unstoppable force, one that readily crushes any obstacles in our way." #NEW
 #suk_unstoppable_army_desc: "Many have tried in the past to stop our progress and expansion, but all have failed in the face of our army. It has proved to be an unstoppable force in front of which all the obstacles that stand in our way are washed aside." #OLD ENG

 #Siam
 sia_experienced_ambassadors: "Ambasciatori Esperti"
 #sia_experienced_ambassadors_desc: "Abbiamo grande esperienza nella politica, e l'alba del nostro paese è stata ottenuta non solo grazie al potere del nostro esercito. La nostra reputazione diplomatica saprà certamente garantirci maggiore influenza." #OLD ITA
 sia_experienced_ambassadors_desc: "We have extensive political experience. The birth of our country was something achieved not only with the power of our military, after all. Surely our diplomatic reputation will prove to be a source of our influence on the world stage." #NEW
 #sia_experienced_ambassadors_desc: "We have great experience in politics and the dawn of our country was something achieved not only on the power of our military alone. Surely our diplomatic reputation can gain us some influence." #OLD ENG
 sia_rise_to_equal_heights: "Ascesa a Pari Altezze"
 #sia_rise_to_equal_heights_desc: "Molte parti del nostro paese sono piuttosto spopolate. Dobbiamo migliorarne le condizioni affinché nessuna area sia percepita come arretrata e tutte possano splendere con uguale magnificenza." #OLD ITA
 sia_rise_to_equal_heights_desc: "There are many parts of our country with very low population. We should improve conditions in these regions to ensure that no part of our country is seen as lackluster, and all of it shines equally." #NEW
 #sia_rise_to_equal_heights_desc: "There are many parts of our country that are fairly depopulated. We should improve their conditions to ensure that no part of our country is seen as lackluster, and all of it can equally shine gloriously." #OLD ENG
 sia_advanced_elephant_warfare: "Guerra Avanzata con Elefanti"
 #sia_advanced_elephant_warfare_desc: "Non è raro che i nostri più grandi poemi dedicano versi a elencare e onorare individualmente i nostri elefanti da guerra. Mostriamo ai nostri nemici il perché." #OLD ITA
 sia_advanced_elephant_warfare_desc: "It is not uncommon for our greatest poems to dedicate lines of text to list and honor our war elephants individually. Let us show our enemies why!" #NEW
 #sia_advanced_elephant_warfare_desc: "It is not uncommon for our greatest poems to dedicate lines of text to list and honor our war elephants individually. Let us show our enemies why." #OLD ENG
 sia_consolidation_of_state: "Consolidamento dello Stato"
 #sia_consolidation_of_state_desc: "Un sistema decentralizzato può farci perdere controllo nelle province più lontane. Se vogliamo essere il vero regno unificatore del popolo $thai_culture$, dobbiamo assicurare che anche le province siano unite." #OLD ITA
 sia_consolidation_of_state_desc: "A decentralized system may cause us to lose control over our more distant provinces. If we are to be the true unifying realm for the $thai_culture$ people, our provinces must be unified as well." #NEW
 #sia_consolidation_of_state_desc: "A decentralized system may cause us to lose some power in our distant provinces. If we are to be the true unifying realm for the $thai_culture$ people, we need to have our provinces also unified." #OLD ENG
 sia_education_reform: "Riforme dell'Istruzione"
 #sia_education_reform_desc: "Come disse il nostro Signore Buddha, non dobbiamo accettare qualcosa solo perché viene spesso ripetuto, ma perché lo abbiamo sperimentato. L'istruzione è la base della conoscenza, e se vogliamo eccellere nella tecnologia, dobbiamo eccellere nell'istruzione." #OLD ITA
 sia_education_reform_desc: "As our Lord Buddha said, we shall not accept something because it is often said, but we need to experience it ourselves. Education is the basis of knowledge, and if we want to excel at technology, we need to excel at education first." #NEW
 #sia_education_reform_desc: "As our Lord Buddha said, we shall not accept something because it is often said, but we need to experience it ourselves. Education is the base of knowledge, and if we want to excel at technology, we need to excel at education." #OLD ENG
 sia_royal_absolutism: "Assolutismo Reale"
 #sia_royal_absolutism_desc: "Secondi solo al Cielo, così devono essere i sovrani. Onorati e venerati, i nostri leader governano la Terra come gli Dei governano il Cielo." #OLD ITA
 sia_royal_absolutism_desc: "Second only to Heaven — that is what a ruler should be. Honored and worshipped, our leaders rule over the Earth as the Gods rule over Heaven." #NEW
 #sia_royal_absolutism_desc: "Second only to Heavens, that is what a ruler should be. Honored and worshiped, our leaders rule over the Earth as the Gods rule over Heaven." #OLD ENG
 sia_thai_unity: "Unità $thai_culture$"
 #sia_thai_unity_desc: "Siamo senza dubbio i leader di tutto il popolo $thai_culture$. Le nostre truppe sono orgogliose di servire non solo il nostro paese, ma di difendere la nostra cultura e identità stessa, e combattono con ferocia per essa." #OLD ITA
 sia_thai_unity_desc: "We are undoubtedly the leaders of all $thai_culture$ people. Our troops are proud to serve as defenders of our culture and identity itself, and they fight fiercely for the privilege." #NEW
 #sia_thai_unity_desc: "We are undoubtedly the leaders of all $thai_culture$ people. Our troops are proud to serve not only our country but as defenders of our culture and identity itself, and they fight fiercely for it." #OLD ENG

#Rome
 rom_spqr: "S.P.Q.R."
 #rom_spqr_desc: "Il Senato e il Popolo di Roma costituiscono le fondamenta eterne del nostro stato. Invocando questa antica autorità ricordiamo a tutti che Roma governa non solo con la forza delle armi, ma con la volontà dei suoi cittadini e delle sue istituzioni." #OLD ITA
 rom_spqr_desc: "The Senate and the people of Rome are the eternal foundations of our state. By invoking this ancient authority, we remind all that Rome rules not merely by force of arms, but by the will of its citizens and its institutions." #NEW
 #rom_spqr_desc: "The Senate and People of Rome stand as the eternal foundation of our state. By invoking this ancient authority, we remind all that Rome rules not merely by force of arms, but by the will of its citizens and its institutions." #OLD ENG
 
 rom_pax_romana: "Pax Romana"
 #rom_pax_romana_desc: "La pace sotto Roma non significa assenza di guerra, ma trionfo dell'ordine. Attraverso la legge, le strade e la potenza dei nostri eserciti, portiamo stabilità e prosperità in ogni angolo dell'Impero." #OLD ITA
 rom_pax_romana_desc: "Peace under Rome does not mean the absence of war, but the triumph of order. Through enforcing our laws and building extensive road systems, as well as the might of our armies, we will bring stability and prosperity to every corner of the Empire." #NEW
 #rom_pax_romana_desc: "Peace under Rome does not mean the absence of war, but the triumph of order. Through law, roads, and the might of our armies, we bring stability and prosperity to every corner of our Empire." #OLD ENG

 rom_restore_the_legions: "Restaurare le Legioni"
 #rom_restore_the_legions_desc: "Le legioni furono un tempo l'orgoglio di Roma, temute e rispettate ovunque. Ripristinarle significa far rinascere la disciplina, l'organizzazione e lo spirito indomito che costruirono le nostre fondamenta." #OLD ITA
 rom_restore_the_legions_desc: "The Legions were once the pride of Rome, feared and respected across the world. To restore them is to also revive the discipline, organization, and indomitable spirit that our great empire is built upon." #NEW
 #rom_restore_the_legions_desc: "The legions were once the pride of Rome, feared and respected across the world. To restore them is to revive the discipline, organization, and indomitable spirit that built our great foundations." #OLD ENG

 rom_revival_of_arts_and_culture: "Rinascita delle Arti e della Cultura"
 #rom_revival_of_arts_and_culture_desc: "Roma fu un faro di cultura tanto quanto di conquista. Finanziare poeti, studiosi e architetti significa riaccendere quella fiamma creativa che un tempo illuminò il mondo antico." #OLD ITA
 rom_revival_of_arts_and_culture_desc: "Rome was as much a center of culture as it was an Empire of conquest. By sponsoring poets, scholars, and architects, we will rekindle the creative flame that once illuminated the ancient world." #NEW
 #rom_revival_of_arts_and_culture_desc: "Rome was as much a beacon of culture as of conquest. By sponsoring poets, scholars, and architects, we rekindle the creative flame that once illuminated the ancient world." #OLD ENG

 rom_new_corpus_juris_civilis: "Novus Corpus Juris Civilis"
 #rom_new_corpus_juris_civilis_desc: "I nostri giuristi compileranno e perfezioneranno le leggi in un corpo coerente, attingendo alla saggezza di Giustiniano e della Repubblica. Così garantiremo giustizia a tutti i cittadini sotto il dominio romano." #OLD ITA
 rom_new_corpus_juris_civilis_desc: "Our jurists shall compile and refine our laws into a comprehensive body, drawing on the wisdom of Justinian and the Republic alike. In doing so, we will assure justice for all Roman citizens." #NEW
 #rom_new_corpus_juris_civilis_desc: "Our jurists shall compile and refine the laws into a coherent body, drawing on the wisdom of Justinian and the Republic alike. In doing so, we ensure justice for all citizens under Roman rule." #OLD ENG

 rom_bread_and_circuses: "Panem et Circenses"
 #rom_bread_and_circuses_desc: "Il popolo deve essere mantenuto soddisfatto, poiché il malcontento genera rivolta. Garantendo il grano per le loro tavole e spettacoli per i loro occhi, otteniamo la loro lealtà e rafforziamo lo stato." #OLD ITA
 rom_bread_and_circuses_desc: "The people must be kept happy and sated, for discontent breeds revolt. By putting grain on their tables and providing diverting activities such as games and public festivals, we shall win their loyalty and strengthen the state through their patriotism." #NEW
 #rom_bread_and_circuses_desc: "The people must be kept content, for discontent breeds revolt. By ensuring grain for their tables and games for their eyes, we win their loyalty and strengthen the state." #OLD ENG

 rom_citizenship: "Cittadinanza Romana"
 #rom_citizenship_desc: "La cittadinanza è il sangue che scorre nelle vene di Roma, unendo popoli di ogni provincia in un unico corpo politico. Estendere questi diritti assicura integrazione e la promessa di avanzamento a chiunque serva l'Impero." #OLD ITA
 rom_citizenship_desc: "Citizenship is the lifeblood of Rome, binding peoples of every province into a single political body. Extending these rights ensures integration and the promise of advancement for all who serve the empire." #NEW
 #rom_citizenship_desc: "Citizenship is the lifeblood of Rome, binding peoples of every province into a single political body. Extending these rights ensures integration, and the promise of advancement for all who serve the empire." #OLD ENG

 rom_all_roads_lead_to_rome: "Tutte le Strade Portano a Roma"
 #rom_all_roads_lead_to_rome_desc: "Il sistema stradale romano è l'invidia del mondo. Tiene unito il nostro impero, accelerando il passaggio di mercanti, messaggeri e soldati, mentre tutti i cammini convergono verso la Città Eterna." #OLD ITA
 rom_all_roads_lead_to_rome_desc: "The Roman road system is the envy of the world. It binds our empire together, speeding merchants, messengers, and soldiers alike, with all paths converging in the Eternal City." #NEW
 #rom_all_roads_lead_to_rome_desc: "The Roman road system is the envy of the world. It binds our empire together, speeding merchants, messengers, and soldiers alike, all paths converging upon the Eternal City." #OLD ENG

 rom_provincial_governors: "Governatori Provinciali"
 #rom_provincial_governors_desc: "Le province non possono essere governate da Roma soltanto. Conferendo potere a governatori competenti, garantiamo che le nostre leggi e le nostre tasse raggiungano anche le terre più lontane dell'Impero." #OLD ITA
 rom_provincial_governors_desc: "Our more remote provinces cannot effectively be ruled from Rome only. By placing competent governors in the outlying regions, we will guarantee that our laws are followed and taxes paid promptly in even the most distant lands of the empire." #NEW
 #rom_provincial_governors_desc: "The provinces cannot be ruled from Rome alone. By empowering competent governors, we ensure that our laws and taxes reach even the most distant lands of the empire." #OLD ENG

 rom_imperium_sine_fine: "Imperium Sine Fine"
 #rom_imperium_sine_fine_desc: "Il destino di Roma non conosce confini. Dalle Colonne d'Ercole ai margini della terra, siamo destinati ad espandere il nostro dominio senza fine, portando la civiltà ovunque marci il nostro aquila." #OLD ITA
 rom_imperium_sine_fine_desc: "Rome's destiny knows no bounds. From the Pillars of Hercules to the edges of the earth, we will expand our dominion without end, bringing civilization wherever the Imperial Eagle soars." #NEW
 #rom_imperium_sine_fine_desc: "Rome's destiny knows no bounds. From the Pillars of Hercules to the edges of the earth, we are fated to expand our dominion without end, carrying civilization wherever our eagles march." #OLD ENG

 rom_triumphs: "Trionfi Romani"
 #rom_triumphs_desc: "Un trionfo è molto più di una processione. È la memoria vivente della conquista, sfilata per le strade delle nostre città più grandi. Tali cerimonie ispirano lealtà, stupore e ambizione." #OLD ITA
 rom_triumphs_desc: "A triumph is more than a mere procession. Indeed, it is the living memory of conquest, paraded through the streets of our greatest cities. Such ceremonies inspire loyalty, awe, fear, and ambition in equal measure." #NEW
 #rom_triumphs_desc: "A triumph is more than a procession. Indeed, it is the living memory of conquest, paraded through the streets of our greatest cities. Such ceremonies inspire loyalty, awe, and ambition in equal measure." #OLD ENG

 rom_roman_architecture: "Architettura Romana"
 #rom_roman_architecture_desc: "Dagli acquedotti agli anfiteatri, l'ingegneria romana crea monumenti destinati a durare secoli. La nostra maestria nella pietra e nell'arco dimostra al mondo che la grandezza di Roma è eterna." #OLD ITA
 rom_roman_architecture_desc: "From aqueducts to amphitheaters, Roman engineering leaves behind monuments that endure for centuries. Our mastery of stone and arch will show the entire world that Rome's greatness is eternal." #NEW
 #rom_roman_architecture_desc: "From aqueducts to amphitheaters, Roman engineering leaves monuments that endure for centuries. Our mastery of stone and arch declares to the world that Rome's greatness is eternal." #OLD ENG

#Byzantium
 byz_heart_of_orthodoxy_advance: "Cuore dell'$orthodox$"
 #byz_heart_of_orthodoxy_advance_desc: "$constantinople$ si trova nel cuore di una fede antica e vibrante. Siamo orgogliosamente i capi dell'$orthodox$, detentori del Patriarcato Ecumenico del nostro impero e difensori della Cristianità contro i nostri nemici infedeli." #OLD ITA
 byz_heart_of_orthodoxy_advance_desc: "$constantinople$ is the beating heart of vibrant faith. We take great pride in being the home of $orthodox$, holders of the Ecumenical Patriarchate, and defenders of Christendom against our heathen enemies." #NEW
 #byz_heart_of_orthodoxy_advance_desc: "$constantinople$ lies in the heart of a vibrant and old faith. We are proudly the heads of $orthodox$, holders of the Ecumenical Patriarchate of our empire and defenders of Christendom against our heathen enemies." #OLD ENG
 byz_akritai_advance: "Akritai"
 #byz_akritai_advance_desc: "Orgogliosi difensori dei nostri confini contro le minacce esterne, queste truppe leggere ricevono terre da coltivare e proteggere. Gli Akritai eccellono nella guerra difensiva, in particolare contro la cavalleria, e spesso costituiscono la prima risposta contro i pericoli provenienti dall'esterno." #OLD ITA
 byz_akritai_advance_desc: "Primarily focused on border defense, these light troops are also given lands to farm as well as protect. Akritai are most adept at defensive warfare, especially against cavalry, and are often the first response against external threats." #NEW
 #byz_akritai_advance_desc: "Proud defenders of our borders against external threats, these light troops are given lands to nurture and protect. Akritai are most adept at defensive warfare, especially against cavalry and often operate as the first response against external threats." #OLD ENG
 byz_cataphracts_advance: "Cataphratti Tardivi"
 #byz_cataphracts_advance_desc: "Nonostante i cambiamenti introdotti dalla polvere da sparo e l'evoluzione dell'arte bellica, possiamo sempre contare sulle tattiche affinate dai nostri antenati secoli fa." #OLD ITA
 byz_cataphracts_advance_desc: "Although warfare has evolved significantly since the first incarnation of our empire, including the introduction of gunpowder, the battle tactics refined by our forebears centuries ago are often still effective. Our cataphracts shall embody the best of both our ancient and modern combat wisdom." #NEW
 #byz_cataphracts_advance_desc: "Despite the changes introduced by gunpowder and the evolution of warfare, we can always rely on the tactics that were refined by our forefathers centuries ago." #OLD ENG
 #byz_historiography_advance: "Storiografia Bizantina" #OLD ITA
 byz_historiography_advance: "$BYZ_ADJ$ Historiography" #NEW
 #byz_historiography_advance: "Byzantine Historiography" #OLD ENG
 #byz_historiography_advance_desc: "Il nostro popolo si erge sulle spalle dei giganti. La corretta documentazione dei nostri antenati, la tracciatura delle nostre prestigiose linee dinastiche e la preservazione delle grandi tradizioni sono responsabilità imponenti che derivano dal nostro ruolo nella storia." #OLD ITA
 byz_historiography_advance_desc: "Our people stand on the shoulders of giants; it is our responsibility to leave comprehensive records of our empire's glory to inspire and instruct future generations. By thoroughly documenting the lives of our extraordinary ancestors, tracing our prestigious lineages, and detailing our intricate traditions, we will surpass mere historical records and become truly legendary." #NEW
 #byz_historiography_advance_desc: "Our people stand on the shoulders of giants. The proper documentation of our ancestors, the tracing of our prestigious lineages and the proper preservation of our great traditions are awe-inspiring responsibilities that derive from our great place in history." #OLD ENG
 men_of_letters_advance: "Uomini di Lettere"
 #men_of_letters_advance_desc: "Non è un segreto che l'Occidente invidi i nostri successi letterari e il nostro glorioso passato. Per questo cercano di assumere tutori dalla nostra corte, desiderosi di appropriarsi del sapere che diede origine a potenti imperi e plasmò il paesaggio culturale del continente. È tramite questi uomini di lettere che i nostri vicini occidentali finiranno per innamorarsi della nostra storia e saranno educati secondo i nostri modi." #OLD ITA
 men_of_letters_advance_desc: "It is no secret that other nations envy our literary accomplishments and enlightened past. They seek to hire tutors from our court, eager to sink their claws into the knowledge that gave rise to powerful empires and carved the cultural landscape of the entire continent. It is through these men of letters that our neighbors will come to fall in love with our history and become educated in our ways." #NEW
 #men_of_letters_advance_desc: "It is no secret that the West envies our literary accomplishments and enlightened past. To that end, they seek to hire tutors from our court, eager to sink their claws into the knowledge that gave rise to powerful empires and carved the cultural landscape of the entire continent. It is through these men of letters that our western neighbors will come to fall in love with our history and become educated by our ways." #OLD ENG
 byz_shield_of_the_west: "Scudo dell'Occidente"
 #byz_shield_of_the_west_desc: "Siamo il baluardo tra l'$europe$ e un mare di infedeli, i fieri protettori e lo scudo contro le minacce straniere. La nostra spada sarà sempre levata in difesa contro coloro che cercano di sradicare la nostra fede, un colpo potente contro chi desidera la fine delle nostre tradizioni." #OLD ITA
 byz_shield_of_the_west_desc: "We stand between $europe$ and a sea of heathens, a shield against foreign threats. Our sword will forever be raised against those who seek to eradicate our faith, ready to strike against any who disrespect our traditions." #NEW
 #byz_shield_of_the_west_desc: "We stand between $europe$ and a sea of heathens, as the proud protectors and the shield against foreign threats. Our sword will forever be in defense against those who seek to uproot our ways of faith, a powerful strike against those who desire the end of our traditions." #OLD ENG
 byz_court_of_languages: "Corte delle Lingue"
 #byz_court_of_languages_desc: "La corte di $constantinople$ accoglie diplomatici e dignitari da ogni angolo del mondo conosciuto. Per questo motivo, ogni lingua è ascoltata e rispettata, come segno di prosperità e progresso per un popolo la cui storia e lingua hanno modellato il mondo." #OLD ITA
 byz_court_of_languages_desc: "The court of $constantinople$ attracts diplomats and dignitaries from every corner of the known world. As a result, we ensure all languages receive equal respect and accommodation — a practical necessity for an empire at the crossroads of civilizations." #NEW
 #byz_court_of_languages_desc: "The court of $constantinople$ is home to diplomats and dignitaries from every corner of the known world. As a result, every language is heard and respected, as a sign of prosperity and progress on the behest of a people whose history and language have shaped the world." #OLD ENG
 byz_poikilia: "Poikilia"
 #byz_poikilia_desc: "La cultura bizantina ha conquistato l'$europe$. Elegantemente espressa in una vasta gamma di tonalità, è il nuovo modo di rappresentare la sinfonia di colori ed elementi nell'arte e nell'architettura." #OLD ITA
 byz_poikilia_desc: "Byzantine culture has taken $europe$ by storm, particularly #italic poikilia#! — our unique aesthetic. Emphasizing visual variety and a dizzying array of vibrant hues, poikilia creates a symphony of colors and elements in our art and architecture alike." #NEW
 #byz_poikilia_desc: "The Byzantine culture has taken $europe$ by storm. Elegantly displayed in a vast array of hues, it is the latest way of expressing the symphony of colors and elements in art and architecture." #OLD ENG
 #byz_crossroads_of_continents: "Crocevia dei Continenti" #OLD ITA
 byz_crossroads_of_continents: "Intercontinental Crossroads" #NEW
 #byz_crossroads_of_continents: "Crossroads of Continents" #OLD ENG
 #byz_crossroads_of_continents_desc: "Bisanzio si trova al crocevia tra l'$europe$ e l'$asia$. Questa posizione lucrativa ha portato enorme influenza sull'importanza marittima della città." #OLD ITA
 byz_crossroads_of_continents_desc: "$BYZ$ is located between $europe$ and $asia$, making it in many ways the connection between East and West. Our advantageous position is highly lucrative, and has also allowed us to significantly expand our maritime influence." #NEW
 #byz_crossroads_of_continents_desc: "Byzantium stands at the crossroads between $europe$ and $asia$. This lucrative position has led to great influence in the maritime importance of the city." #OLD ENG
 byz_the_new_helepolis: "La Prendi-Città"
 #byz_the_new_helepolis_desc: "La tradizione di schierare e perfezionare le più potenti e imponenti macchine d'assedio è una componente familiare della nostra arte militare. Adottando e perfezionando la polvere da sparo nei nostri progetti, i nostri cannoni domineranno i nostri nemici." #OLD ITA
 byz_the_new_helepolis_desc: "We are already familiar with deploying and refining powerful siege engines. However, by adapting our designs to use gunpowder, we will be able to completely dominate our foes with our cannons." #NEW
 #byz_the_new_helepolis_desc: "The tradition of deploying and refining the most powerful and impressive siege engines is an aspect of our warfare that we are intimately familiar with. By adopting and refining gunpowder into our designs, our cannons will dominate our foes." #OLD ENG
 byz_reaffirm_synod_powers: "Riforma dei Procedimenti Sinodali"
 #byz_reaffirm_synod_powers_desc: "La burocrazia è una fatica immane per un paese delle nostre dimensioni. Per semplificare le procedure religiose riguardanti ogni $orthodox_synod$, ridurremo la burocrazia e rivedremo la legislazione in materia." #OLD ITA
 byz_reaffirm_synod_powers_desc: "Bureaucracy is a nightmarish endeavor for a country our size. To better refine the religious proceedings required every time we call the $orthodox_synod$, we will cut down on the red tape, and revisit the associated legislation." #NEW
 #byz_reaffirm_synod_powers_desc: "Bureaucracy is a nightmarish endeavor for a country with our size. To better refine the religious proceedings around calling every $orthodox_synod$, we will cut down on the red tape and revisit the legislation about it." #OLD ENG
 #byz_byzantine_inquisition: "Inquisizione Bizantina" #OLD ITA
 byz_byzantine_inquisition: "$BYZ_ADJ$ Inquisition" #NEW
 #byz_byzantine_inquisition: "Byzantine Inquisition" #OLD ENG
 #byz_byzantine_inquisition_desc: "Mentre l'$europe$ è travolta dal tumulto religioso, dobbiamo prepararci a difendere la nostra fede contro le erbacce che potrebbero germogliare nel nostro giardino, per non cadere vittime dell'eresia e dell'instabilità." #OLD ITA
 byz_byzantine_inquisition_desc: "$europe$ is engulfed in religious turmoil. We must be prepared to rip up noxious weeds of heresy that appear in the garden of our Empire, lest it become overgrown with heathens. Our pious defense against heretic incursion will prevent us from sinking into instability." #NEW
 #byz_byzantine_inquisition_desc: "As $europe$ is engulfed in religious turmoil, we must prepare our pious defenses against weeds that may appear in our garden, lest we risk falling victims of heresy and instability." #OLD ENG
 byz_autokratoria_rhomaion: "Autokratoría Rhōmaíōn"
 #byz_autokratoria_rhomaion_desc: "La nostra grande nazione è l'indiscussa continuazione dello splendore e del prestigio romano. Riconquistare quelle terre perdute è il nostro primo e più grande obiettivo." #OLD ITA
 byz_autokratoria_rhomaion_desc: "Our great nation is the undisputed heir to the splendor and prestige of Rome, and reclaiming that long-lost territory is our primary motivation." #NEW
 #byz_autokratoria_rhomaion_desc: "Our great nation is the undisputed continuation of Roman splendor and prestige. To regain these long-lost lands is our primary goal and drive." #OLD ENG
 byz_modernized_strategikon: "Stratēgikon Modernizzato"
 #byz_modernized_strategikon_desc: "Il manuale militare scritto da Maurizio tempo fa ha servito il nostro popolo in molte guerre. Tuttavia, poiché la guerra cambia, dobbiamo cambiarla con essa. Le nostre tattiche si sono adattate e i nostri reggimenti si sono conformati a nuovi metodi e nuove armi, ben più devastanti per chi ci si oppone." #OLD ITA
 byz_modernized_strategikon_desc: "The #italic Strategikon#! — the ancient manual of cavalry tactics, logistics, and battlefield doctrine — has served us well in times of war. However, as war changes, so must we. Our tactics and regiments have adapted to modern combat, employing weapons of such destruction that Maurice himself could never have anticipated their devastation." #NEW
 #byz_modernized_strategikon_desc: "The manual of warfare written by Maurice long ago, has served our people in times of war. However, as war changes, so must we. Our tactics have adapted, and our regiments have conformed to new ways of warfare and new weapons that are far more devastating against those who seek to oppose us." #OLD ENG
 byz_ancient_greek_studies: "Studi sull'Antica $greek_culture$"
 #byz_ancient_greek_studies_desc: "La riscoperta dei classici e l'abbraccio delle arti dell'antica $greek_culture$ hanno offerto all'Occidente un'eccellente opportunità per educare le masse e preservare i grandi ideali nei campi culturali e scientifici." #OLD ITA
 byz_ancient_greek_studies_desc: "The rediscovery and revival of ancient $greek_culture$ arts has provided us with a wonderful opportunity to better educate the masses and to preserve our lofty scientific and cultural ideals. We shall make a diligent study of the wisdom of our ancestors." #NEW
 #byz_ancient_greek_studies_desc: "The rediscovery of the classics and the embracement of ancient $greek_culture$ arts has given the West a wonderful opportunity towards the education of the masses and the preservation of great ideals in various cultural and scientific domains." #OLD ENG
 byz_the_new_imperial_army: "Il Nuovo Esercito Imperiale"
 #byz_the_new_imperial_army_desc: "Per troppo tempo il nostro esercito è rimasto indietro rispetto ai suoi omologhi europei. Dobbiamo riformarlo e ampliare i nostri sforzi di coscrizione al fine di forgiare un esercito degno della fenice risorta e potente." #OLD ITA
 byz_the_new_imperial_army_desc: "Our army has lagged behind others in $europe$ for far too long. By enacting sweeping military reform and expanding our conscription efforts, we hope to build a modern army befitting the resurgent and resplendent phoenix that symbolizes our empire." #NEW
 #byz_the_new_imperial_army_desc: "For far too long has our army lagged behind our European counterparts. We must reform our army and expand our conscription efforts in the hopes of establishing an army that fits the resurgent and powerful phoenix." #OLD ENG
 expand_varangian_guard_advance: "Espandere la Guardia Variaga"
 #expand_varangian_guard_advance_desc: "I Variaghi hanno servito il nostro paese per secoli con onore e fede incrollabile. Espandendo i loro ranghi, garantirà maggiore stabilità e protezione a Bisanzio." #OLD ITA
 expand_varangian_guard_advance_desc: "The Varangians have served our country for centuries with distinguished honor and unwavering faith. By expanding their ranks, we will further secure the stability and protection of $BYZ$." #NEW
 #expand_varangian_guard_advance_desc: "The Varangians have served our country for centuries with distinguished honor and unwavering faith. By expanding their ranks we will only further secure our stability and protection of Byzantium." #OLD ENG
 imperatorskiy_moskovskiy_universitet: "Imperatorskiy Moskovskiy Universitet"
 #imperatorskiy_moskovskiy_universitet_desc: "L'Università Imperiale è dedicata allo studio e all'insegnamento della filosofia, della medicina e del diritto e svolge un ruolo significativo nella formazione e nella ricerca russa. Fondata come parte delle riforme educative ideate dal polimata Mikhail Lomonosov, enfatizza l'importanza dell'indagine scientifica e dell'innovazione." #OLD ITA
 imperatorskiy_moskovskiy_universitet_desc: "The Imperial University is dedicated to the study of philosophy, medicine, and law, and plays a significant role in $RUS_ADJ$ education and research. It is established as part of educational reforms conceived by polymath Mikhail Lomonosov, emphasizing the importance of scientific inquiry and innovation." #NEW
 #imperatorskiy_moskovskiy_universitet_desc: "The Imperial University is dedicated to the study and teaching of philosophy, medicine, and law and plays a significant role in Russian education and research. It is established as part of the reforms in Russian education conceived by polymath Mikhail Lomonosov, emphasizing the importance of scientific inquiry and innovation." #OLD ENG
 hurricane_hardy: "Hurricane Hardy"
 hurricane_hardy_desc: "I progetti di Feodor Apraksin sono robusti e resistenti, capaci di permettere alle navi di sopravvivere alla maggior parte delle tempeste generate da Madre Natura. La costruzione innovativa contribuisce notevolmente a qualsiasi ambizione marittima nascente."
 preobrazhensky_semyonovsky_imperial_guard: "Guardia Imperiale Preobrazhensky-Semyonovsky"
 #preobrazhensky_semyonovsky_imperial_guard_desc: "L'Esercito dei Balocchi è stato organizzato in compagnie d'élite, formando la Guardia Imperiale a protezione degli interessi della monarchia. Sono spesso coinvolti in cerimonie di corte, parate e altri eventi significativi, mostrando la loro importanza oltre i doveri strettamente militari." #OLD ITA
 preobrazhensky_semyonovsky_imperial_guard_desc: "The 'Toy Army' is organized into elite companies, forming the Imperial Guard which protects the interests of the monarchy. They are frequently involved in court ceremonies, parades, and other significant events, showcasing their importance beyond their military duties." #NEW
 #preobrazhensky_semyonovsky_imperial_guard_desc: "The Toy Army is organized into elite companies, forming the Imperial Guard to protect the interests of the monarchy. They are frequently involved in court ceremonies, parades, and other significant events, showcasing their importance beyond their military duties." #OLD ENG

#Poland
 kasztelanowie: "Kasztelanowie"
 #kasztelanowie_desc: "Incaricati di essere la voce del monarca, i castellani sono i rappresentanti ufficiali in tutto il dominio del sovrano. Sono responsabili della riscossione delle tasse e dell'applicazione della legge, arrivando persino ad amministrare giustizia e garantire la conformità in nome della corona." #OLD ITA
 kasztelanowie_desc: "Castellans represent the voice of the monarch across our domain. They are in charge of gathering taxes and enforcing the rule of law, and may even execute justice in the name of the Crown." #NEW
 #kasztelanowie_desc: "Tasked with being the voice of the monarch, castellans are the official representatives across the ruler's domain. They are in charge of gathering taxes and ensuring the rule of law, even executing justice and conformity in the name of the crown." #OLD ENG
 land_of_promise: "Terra Promessa"
 #land_of_promise_desc: "Le terre fertili del nostro dominio sono una meta ambita per molti migranti degli strati più bassi della società, alla ricerca di una vita migliore e più prospera." #OLD ITA
 land_of_promise_desc: "The fertile lands of our domain are a coveted destination for many migrants, primarily those of lower status, seeking a better and more prosperous life." #NEW
 #land_of_promise_desc: "The fertile lands of our domain are a coveted destination for many migrants of the lower strata that seek a better and more prosperous life." #OLD ENG
 statute_of_kalisz: "Statuto di Kalisz"
 #statute_of_kalisz_desc: "Conosciuto come la Carta Generale delle Libertà Ebraiche, questo statuto contiene articoli che garantiscono a tutti gli ebrei libertà di culto, commercio e movimento. Il testo tenta inoltre di ridurre il numero di accuse di omicidio rituale propagate dalla Chiesa Cattolica." #OLD ITA
 statute_of_kalisz_desc: "Known as the General Charter of $judaism_ADJ$ Liberties, this legislation contains articles that allow all Jews in our realm the freedom to worship, trade, and travel. The statute also attempts to reduce the number of blood libel accusations against Jews propagated by the $catholic_ADJ$ Church." #NEW
 #statute_of_kalisz_desc: "Known as the General Charter of Jewish Liberties, this legislation contains articles that allow all Jews the freedom to worship, trade, and travel. The statute also attempts to reduce the amount of accusations of blood libel against Jews propagated by the Catholic Church." #OLD ENG
 corona_regni_poloniae: "Corona Regni Poloniae"
 #corona_regni_poloniae_desc: "L'idea che il regno sia indivisibile e posseduto collettivamente, non da una sola dinastia o monarca, ma da tutta la comunità politica del nostro dominio, è un principio profondamente radicato sia in noi sia nei vari duchi sotto il nostro vessillo." #OLD ITA
 corona_regni_poloniae_desc: "This legislation establishes the kingdom as an indivisible, collective entity, owned not by any single dynasty or monarch but by the entire noble class. Rulers serve the realm, they do not #italic own#! it. This concept of collectivity is deeply entrenched in our society." #NEW
 #corona_regni_poloniae_desc: "The idea that the kingdom is indivisible and commonly owned, not by one dynasty or monarch, but by the entirety of the political community within our domain, is an entrenched idea between us and the various dukes under our banner." #OLD ENG
 krakow_grosz: "Grosz di Cracovia"
 #krakow_grosz_desc: "Nel tentativo di riformare il sistema monetario, introdurremo una nuova valuta: il Grosz di Cracovia. Coniate in argento, queste monete sono destinate a sfidare il potere del Grosso di Praga boemo e a porre il nostro regno all'avanguardia della tassazione centralizzata." #OLD ITA
 krakow_grosz_desc: "In an attempt to reform our monetary system, we will introduce a new currency, the #italic Kraków Grosz#!. Minted from silver, these coins are destined to challenge the power of the $BOH_ADJ$ #italic Prague Groschen#! and help establish our realm as pioneers of centralized taxation." #NEW
 #krakow_grosz_desc: "In an attempt to reform the monetary system, we will introduce a new currency, the Kraków Grosz. Minted from silver, these coins are destined to challenge the power of the Bohemian Prague Groschen and establish our realm as the forefront of centralized taxation." #OLD ENG
 stone_and_brick: "Pietra e Mattone"
 #stone_and_brick_desc: "Per secoli abbiamo fatto affidamento sulla debolezza del legno per costruire comunità e difese contro i nostri nemici. Utilizzando il nostro tesoro e la nostra influenza politica, avvieremo un piano per ampliare le infrastrutture del dominio. Abbiamo ereditato città di legno e le lasceremo fortificate di pietra e mattoni." #OLD ITA
 stone_and_brick_desc: "For centuries, we have used wood to build our towns and defenses, but we will now  systematically upgrade our infrastructure by replacing more vulnerable wooden structures with stronger ones. We have inherited wooden towns, but we shall leave them fortified with stone and brick." #NEW
 #stone_and_brick_desc: "For centuries, we have depended on the weakness of wood to erect communities and defenses against our foes. Using our treasury and political power, the plan to expand the infrastructure of our domain will be set in motion. We have inherited wooden towns, and we will leave them fortified with stone and brick." #OLD ENG
 council_of_three_lands_advance: "Consiglio delle Tre Terre"
 #council_of_three_lands_advance_desc: "Il nostro paese ha una lunga tradizione di accoglienza per gli ebrei impoveriti o perseguitati. La creazione di un consiglio incaricato di tutelare i loro bisogni e i loro diritti non potrà che rafforzare la nostra stabilità e la nostra forza spirituale." #OLD ITA
 council_of_three_lands_advance_desc: "Our country has a long-standing history of accepting destitute, persecuted $judaism_ADJ$ people. To that end, a council that will look after their needs and advocate for their rights will benefit the stability and spiritual strength of this realm." #NEW
 #council_of_three_lands_advance_desc: "Our country has a long-standing history of accepting destitute and persecuted Jews. To that end, a council that will care for their needs and shield their rights will only benefit our stability and spiritual strength." #OLD ENG
 #polish_renaissance: "Rinascimento Polacco" #OLD ITA
 polish_renaissance: "$polish_group$ $renaissance$" #NEW
 #polish_renaissance: "Polish Renaissance" #OLD ENG
 #polish_renaissance_desc: "Ispirato alle correnti rinascimentali italiane, il fiorire delle arti e della cultura sboccerà nelle nostre sale artistiche." #OLD ITA
 polish_renaissance_desc: "Inspired by the ideals of the $ITA_ADJ$ $renaissance$, we are experiencing a cultural golden age. Our literary achievements, architectural splendors, and cultivated atmosphere of religious tolerance have all led to a blossoming of culture across our land." #NEW
 #polish_renaissance_desc: "Inspired by the Italian currents of Renaissance, the blooming of the arts and culture will blossom across our artistic halls." #OLD ENG
 #granary_of_europe: "Granaio d'Europa" #OLD ITA
 granary_of_europe: "Granary of $europe$" #NEW
 #granary_of_europe: "Granary of Europe" #OLD ENG
 #granary_of_europe_desc: "I fertili campi del nostro dominio ospitano i raccolti di grano più ricchi d'Europa, grazie anche al sistema del Folwark. Attraverso la nostra benevolenza riforniremo i mercati oltre i nostri confini, assicurando prosperità al nostro popolo e garantendo che non soffra mai la fame." #OLD ITA
 granary_of_europe_desc: "The fertile fields of our domain are home to $europe$'s richest grain crops, in part thanks to the $folwark_system$. Through our grace, we supply the markets beyond our borders, ensuring our people continue to prosper and never go hungry." #NEW
 #granary_of_europe_desc: "The fertile fields of our domain are home to Europe's richest grain crops, in part thanks to the Folwark system. Through our grace we supply the markets beyond our borders, ensuring our people continue to prosper and never go hungry." #OLD ENG
 komisja_edukacji_narodowej: "Komisja Edukacji Narodowej"
 #komisja_edukacji_narodowej_desc: "Rispondendo alla necessità del governo di ottenere amministratori competenti e garantire la corretta gestione degli affari pubblici, finanzieremo e creeremo il primo ministero dell'istruzione d'Europa, focalizzato sulla diffusione dell'alfabetizzazione tra la popolazione." #OLD ITA
 komisja_edukacji_narodowej_desc: "Our government's need for capable administrators has led to systematic education reform. We will establish the first education ministry in $europe$, devoted to spreading literacy throughout our population, which will hopefully lead to an increase in qualified candidates to staff our expanding administration." #NEW
 #komisja_edukacji_narodowej_desc: "In response to the need for our government to garner capable administrators, and in order to ensure the smooth operation of the relevant proceedings, we will fund and create Europe's first education ministry, focused on the spread of literacy amongst our population." #OLD ENG
 szkola_rycerska: "Szkoła Rycerska"
 #szkola_rycerska_desc: "Formando e instillando orgoglio nazionale nelle menti della prossima generazione di nobili, riusciremo a forgiare generazioni di valorosi militari e funzionari civili." #OLD ITA
 szkola_rycerska_desc: "By establishing the 'Knight's School' to train noble youth in military science and their patriotic duty, we will forge generations of capable, dedicated military and civil personnel." #NEW
 #szkola_rycerska_desc: "By training and instilling national pride to the minds of the next generation of nobles, we will succeed in forging generations of worthwhile military and civic personnel." #OLD ENG
 great_sejm_reforms: "Riforme del Grande Sejm"
 #great_sejm_reforms_desc: "Se vogliamo sopravvivere e continuare a prosperare, dobbiamo garantire che il nostro apparato governativo funzioni bene e si fondi su basi solide. Il parlamento adotterà procedure modernizzate e deleghe di nuova autorità. L'obiettivo di questa evoluzione è indebolire il potere della nobiltà e mitigare gli abusi sempre più diffusi della servitù." #OLD ITA
 great_sejm_reforms_desc: "If we are to survive and continue to prosper, our governmental mechanism must run efficiently and be based on robust foundations. The parliament shall adopt modernized procedures and strengthen its authority. The goals of this evolution are to curtail the power of the nobility and mitigate the escalating abuses of serfdom." #NEW
 #great_sejm_reforms_desc: "If we are to survive and continue to prosper, we must ensure our governmental mechanism runs well and is based on robust foundations. The parliament shall adopt modernized procedures and delegate its newly adopted authority. The goals of this evolution are to undermine the power of the nobles as well as to mitigate the growing abuses under the institution of serfdom." #OLD ENG
 late_winged_hussars_advance: "Ultimi Ussari Alati"
 #late_winged_hussars_advance_desc: "L'evoluzione degli ussari polacchi nel XVII secolo comportò l'adozione di un'armatura più pesante nei colori rosso e bianco. Armati di lance più lunghe, attorno ai sei metri, la loro carica era devastante, capace di spezzare il morale dei nemici e provocarne la rotta." #OLD ITA
 late_winged_hussars_advance_desc: "The evolution of $POL_ADJ$ hussars entailed the adoption of heavier armor with red and white colors. They used a longer lance of around six meters, which made their charge incredibly devastating, often breaking the morale of their foes and causing them to rout." #NEW
 #late_winged_hussars_advance_desc: "The evolution of the Polish hussars into the 17th century entailed the adoption of heavier armor in red and white colors. They used a longer lance of around six meters and their charge was incredibly devastating, often breaking the morale of their foes and causing them to rout." #OLD ENG
 winged_hussars_advance: "Ussari Alati"
 #winged_hussars_advance_desc: "Gli ussari erano originariamente cavalleria leggera destinata all'esplorazione, ma con il declino dell'esercito feudale tradizionale siamo passati a reggimenti professionali. I nuovi ussari pesanti ne costituiranno il nucleo. Ben presto il mondo temerà gli Ussari Alati della Polonia." #OLD ITA
 winged_hussars_advance_desc: "The hussars were originally light cavalry troops used for scouting, but with the decline of the old feudal army, we have switched over to professional regiments, the core of which shall be made up of these heavier, armored hussars. The fear of these winged warriors shall make our enemies tremble in the night like children!" #NEW
 #winged_hussars_advance_desc: "The hussars were originally light cavalry troops used for scouting, but with the decline of the old feudal army we have switched over to professional regiments. The new heavier hussars will form the core of it. People will soon fear Poland's winged Hussars." #OLD ENG
 wojsko_komputoe: "Wojsko Komputowe"
 #wojsko_komputoe_desc: "L'Esercito Computato (Wojsko Komputowe) era basato su un bilancio annuale calcolato (computato) e approvato dal Sejm. Lo scopo era dare alla Confederazione un esercito permanente stabile per la difesa." #OLD ITA
 wojsko_komputoe_desc: "The 'Compute Army' was based around an annual budget calculated and approved by the Sejm. The idea behind this was to provide the Commonwealth with a stable standing army for defense." #NEW
 #wojsko_komputoe_desc: "The Compute Army (Wojsko Komputowe), was based around an annual budget calculated (computed) and approved by the Sejm. The idea was to give the Commonwealth a stable standing army for the defense." #OLD ENG
 #folwark_system: "Sistema del Folwark" #OLD ITA
 folwark_system: "Folwark System" #NEW
 #folwark_system: "The Folwark System" #OLD ENG
 #folwark_system_desc: "Il sistema del Folwark incoraggiava la produzione di surplus agricoli. I contadini venivano incoraggiati a lavorare nei Folwark attraverso rendite o costrizione. Questo sistema sarebbe diventato la base dell'economia polacca." #OLD ITA
 folwark_system_desc: "The Folwark System was a system of production that emphasized creating agricultural surpluses. Peasants were encouraged to work through either the use of rents or through compulsion. This system formed the bedrock of our economy." #NEW
 #folwark_system_desc: "The Folwark system was a system of production that encouraged the production of agricultural surpluses. Peasants were encouraged to work in them through either the use of rents or compulsion. It would form the bedrock of the Polish economy." #OLD ENG

 #China & Variations
 baihua: "Báihuàwén"
 baihua_desc: "Il nostro dominio si estende ben oltre l'orizzonte. L'emergere di una lingua scritta comune tra i nostri sudditi colmerà sicuramente i divari tra di noi, eleverà la nostra cultura e ridurrà i conflitti basati su incomprensioni e differenze linguistiche."
 zaju: "Zájù"
 zaju_desc: "Composto tipicamente da quattro atti, questo brillante spettacolo di danza e musica è un'espressione colorata delle vette artistiche raggiunte dalla nostra società."
 successors_of_genghis_khan: "Successori di $genghis_khan_name_no_tooltip$"
 #successors_of_genghis_khan_desc: "Dai giorni della conquista totale alle vaste distese del grande impero di $genghis_khan_name_no_tooltip$, la nostra gente discende da generazioni di plasmatori della terra e da coloro che sono destinati a scrivere la storia." #OLD ITA
 successors_of_genghis_khan_desc: "From the days of total conquest to the vast expanses of $genghis_khan_name_no_tooltip$'s great Empire, our people descend from generations of earthshakers. Our people are the ones destined to author history." #NEW
 #successors_of_genghis_khan_desc: "From the days of total conquest to the vast expanses of $genghis_khan_name_no_tooltip$'s great Empire, our people descent from generations of earthshakers, and those who are destined to write history." #OLD ENG
 confucian_influences: "Influenze Confuciane"
 #confucian_influences_desc: "Per amministrare correttamente il nostro reame, i nostri consiglieri troveranno grande saggezza negli insegnamenti di Confucio, nell'attenzione al dettaglio e nella meritocrazia, base di un governo sano e prospero." #OLD ITA
 confucian_influences_desc: "If we are to manage our realm properly, our advisors shall find great wisdom about administration in Confucian teachings, which emphasize meritocratic selection of officials, attention to administrative detail, and other foundational advice for creating a healthy and prosperous government." #NEW
 #confucian_influences_desc: "If we are to manage our realm properly, our advisors shall find great wisdom in the teachings of Confucius, the attention to detail and meritocracy for a healthy and prosperous government." #OLD ENG
 extensive_canal_works: "Lavori Estesi sui Canali"
 #extensive_canal_works_desc: "I molti fiumi che attraversano il nostro dominio sono più spesso portatori di prosperità che di sventura. Nel tentativo di sfruttarne la ricchezza, costruiremo reti infrastrutturali per fornire acqua e collegamenti di trasporto tra i fiumi e gli insediamenti interni." #OLD ITA
 extensive_canal_works_desc: "The many rivers that cross our domain have tremendous economic potential. By constructing extensive canal networks, we can connect waterways to inland settlements, making transportation easier while also providing a reliable water supply to our people." #NEW
 #extensive_canal_works_desc: "The many rivers that traverse our domain are the heralds of prosperity more often than not. In an attempt to harness their affluence, we will construct infrastructure networks in order to provide water and transportations between the rivers and our inland settlements." #OLD ENG
 zhongshu_sheng: "Zhōngshū Shěng"
 #zhongshu_sheng_desc: "Uno dei rami più vitali dei #italic Tre Dipartimenti e Sei Ministeri#!, la segreteria centrale è responsabile della redazione e codificazione di molte riforme e decreti imperiali." #OLD ITA
 zhongshu_sheng_desc: "One of the most vital branches of the #italic Three Departments and Six Ministries#!, the central secretariat is responsible for the drafting and codification of many Imperial reforms and decrees." #NEW
 #zhongshu_sheng_desc: "One of the most vital branches of the #italic Three Departments and Six Ministries#!, the central secretariat is responsible for the drafting codification of many imperial reforms and decrees." #OLD ENG
 lijia_system: "Sistema Lǐ Jiǎ"
 #lijia_system_desc: "Sotto il sistema Lǐ Jiǎ possiamo esercitare il nostro controllo sulle terre di frontiera attraverso l'assegnazione di eserciti insediati. Concedendo diritti di terra e agricoltura alle nostre truppe di stanza, i nostri confini saranno sicuri e il nostro controllo crescerà." #OLD ITA
 lijia_system_desc: "Under the #italic Lǐ Jiǎ#! system, we are able to exercise control over our borderlands through the allocation of settled armies. By granting land and agricultural rights to our stationed troops, our borders will be safer and our authority shall be affirmed." #NEW
 #lijia_system_desc: "Under the Lǐ Jiǎ system, we are able to operate and exercise our control over our borderlands, through the allocation of settled armies. By granting land and agricultural rights to our stationed troops, our borders will be safe, and our control shall soar." #OLD ENG
 yulin_tuce: "Yúlín Túcè"
 #yulin_tuce_desc: "L'evasione fiscale è un problema generale che ha tormentato i nostri antenati. Compilando registri per distretti e province, terremo miglior traccia delle tasse dovute al governo centrale da ogni appezzamento, determinate principalmente sulla resa del grano per ogni terreno censito." #OLD ITA
 yulin_tuce_desc: "Tax evasion is a timeless problem that even plagued our ancestors, but we may have found a solution: By compiling registers for districts and provinces, we will keep better track of the taxes owed to the central government by every plot. This taxation is largely determined based on the grain yield of every plot that undergoes survey." #NEW
 #yulin_tuce_desc: "Tax evasion is a general problem that has plagued our ancestors. By compiling registers for districts and provinces, we will keep better track of the taxes owed to the central government by every plot. This taxation is largely determined based on the grain yield of every plot that undergoes survey." #OLD ENG
 weisuo_system: "Wèi Suǒ"
 #weisuo_system_desc: "Le nostre terre sono ambite da molti conquistatori stranieri. Per difenderle, dobbiamo stabilire un sistema di guarnigioni mirato a rispondere rapidamente alle invasioni ostili. Attraverso il reclutamento di truppe locali, la nostra capacità difensiva sarà migliorata grazie a rifornimenti e logistica più efficiente." #OLD ITA
 weisuo_system_desc: "Many would-be conquerors eye our lands with covetous intent. If we are to defend our territory, we must set up a garrison system, aimed at rapidly responding to hostile invasions. Through the recruitment of local troops, our defensive prowess will be supplemented through supplies and more efficient logistics." #NEW
 #weisuo_system_desc: "Our lands are coveted by many foreign conquerors. If we are to defend them, we must set up a garrison system aimed at rapid response against hostile invasions. Through the recruitment of local troops, our defensive prowess will be supplemented through supplies and more efficient logistics." #OLD ENG
 grand_coordinators: "Grandi Coordinatori"
 #grand_coordinators_desc: "Mantenere il controllo sui nostri territori, elaborare politiche e dirigere operazioni militari è vitale per la continuità della nostra dinastia. Creando un corpo di alti funzionari, riusciremo a consolidare ulteriormente la nostra posizione stabilizzando le questioni interne ed esterne." #OLD ITA
 grand_coordinators_desc: "Maintaining control over our territories, policymaking, and military operations is vital for the continuation of our dynasty. Through the creation of Grand Coordinators, a body of high-ranking officials who can coordinate governance across our vast empire, we will succeed in cementing our position through effective stabilization of internal and external matters." #NEW
 #grand_coordinators_desc: "Maintaining control over our territories, policymaking, and military operations are vital for the continuation of our dynasty. Through the creation of a body of high-ranking officials, we will succeed in further cementing our position through the stabilization of internal and external matters." #OLD ENG
 the_censorate: "Il Censorato"
 the_censorate_desc: "Parallelamente ad altri istituti amministrativi, questo ramo del governo è incaricato di prevenire la corruzione. I censori controllano intrighi palaziali e malversazioni, essendo spesso considerati gli occhi e le orecchie dell'Imperatore."
 #the_tea_trade: "Il Commercio del Tè" #OLD ITA
 the_tea_trade: "The $tea$ Trade" #NEW
 #the_tea_trade: "The Tea Trade" #OLD ENG
 #the_tea_trade_desc: "Bevanda fondamentale della nostra società, il tè è diventato dominante negli incontri sociali, divenendo la scelta preferita di molti. Questo porterà inevitabilmente non solo a nuove varietà coltivate, ma anche a un boom produttivo." #OLD ITA
 the_tea_trade_desc: "A staple beverage of our society, $tea$ has come to dominate social gatherings, becoming the choice drink of many. This will undoubtedly lead to not only new varieties being cultivated, but a production boom as well." #NEW
 #the_tea_trade_desc: "A staple beverage of our society, tea has come to dominate social gatherings, becoming the choice drink of many. This will undoubtedly lead to not only new varieties being cultivated, but a certain production boom, as well." #OLD ENG
 tu_bing: "Tǔ Bīng"
 #tu_bing_desc: "Per difendere adeguatamente i nostri confini, è diventato chiaro che dobbiamo creare un sistema di reclutamento centrato su soldati e valorosi locali. Questi uomini sono una grande aggiunta alle nostre capacità militari e distinti dal sistema #italic Wèi Suǒ#!." #OLD ITA
 tu_bing_desc: "In our quest to shore up our border defenses, it has become apparent that we must create a system of recruitment centered around local soldiers and stalwarts. These fighters will be a valuable addition to our military capabilities, and shall be kept separate from the #italic Wèi Suǒ#! system." #NEW
 #tu_bing_desc: "As we strive to properly defend our borders, it has become apparent that we must create a system of recruitment centered around local soldiers and stalwarts. These men are a grand addition to our military capabilities and separate from the #italic Wèi Suǒ#! system." #OLD ENG
 tusi_titles: "Titoli Tǔsī"
 tusi_titles_desc: "Titoli concessi a signori della guerra e potenti locali: queste posizioni amministrative servono a sedare disordini e mantenere la popolazione rurale sotto il controllo centrale."
 #salt_monopoly: "Ripristina il Monopolio del Sale" #OLD ITA
 salt_monopoly: "Restore the $salt$ Monopoly" #NEW
 #salt_monopoly: "Restore the Salt Monopoly" #OLD ENG
 #salt_monopoly_desc: "Un tempo il monopolio del sale era una delle maggiori entrate dello stato. Eppure imperatori passati hanno scelto di abolirlo in nome del libero commercio. È giunto il momento di riportare il controllo del sale allo stato." #OLD ITA
 salt_monopoly_desc: "The $salt$ monopoly was once our most important revenue source, but previous Emperors abolished it to encourage free trade. It is time to return the $salt$ trade to state control." #NEW
 #salt_monopoly_desc: "The salt monopoly used to be one of the greatest revenues for the state. Yet previous Emperors saw fit to end it in the name of trade. It is time to return the trade of salt back to the control of the state." #OLD ENG
 reform_the_grand_secretariat: "Riforma della Gran Segreteria"
 #reform_the_grand_secretariat_desc: "Considerata la più alta istituzione del nostro impero, la #italic Gran Segreteria#! ha assistito i nostri sovrani durante il loro regno. Dotata di immensa influenza nell'amministrazione, essa sarà riformata per accrescerne l'efficacia." #OLD ITA
 reform_the_grand_secretariat_desc: "Considered the #italic de facto#! highest institution in our nation, the #italic Grand Secretariat#! has served our rulers for centuries. Wielding immense influence over administrative affairs, this body of cabinet ministers must undergo a reform to further increase its effectiveness." #NEW
 #reform_the_grand_secretariat_desc: "Considered the de facto highest institution across our lands, the #italic Grand Secretariat#! has accompanied our rulers during their tenures. Granted immense influence in conducting administrative affairs, this body of cabinet ministers will undergo a reform, to further increase its effectiveness." #OLD ENG
 grand_military_parades: "Grandi Parate Militari"
 #grand_military_parades_desc: "La gloriosa storia militare del nostro popolo sarà mostrata apertamente affinché tutti possano ammirarla. Parando i nostri eserciti, metteremo in mostra esperienza marziale e una forza ineguagliata." #OLD ITA
 grand_military_parades_desc: "Our illustrious military history of our people is a great source of inspiration and pride for our people. By conducting elaborate parades to showcase our armies, we will decisively demonstrate our martial experience and unparalleled strength." #NEW
 #grand_military_parades_desc: "The illustrious military history of our people shall lay bare for all to witness with awe. By parading our armies, we will showcase martial experience and an unchallenged strength." #OLD ENG
 silver_standard: "Standard d'Argento"
 #silver_standard_desc: "Convertendo la maggior parte delle obbligazioni verso il governo centrale — dalle tasse personali ai lavori forzati dei contadini, fino ai tributi dei funzionari locali — in un unico pagamento in argento calcolato sulla popolazione e sulle terre coltivate di ogni prefettura, ridurremo lo sforzo della riscossione e aumenteremo le entrate." #OLD ITA
 silver_standard_desc: "By turning most obligations towards the central government - from poll taxes to the labor obligations of the peasants or the tributes of local officials - into a single silver payment, the amount of which is based on the population and cultivated land in each prefecture, tax collection will become easier and our income will increase." #NEW
 #silver_standard_desc: "By turning most obligations towards the central government - from poll taxes to the labor obligations of the peasantry or the tributes of local officials - into a single silver payment at a level based on the population and cultivated land in each prefecture, the effort needed for tax collection is reduced, and our income will increase." #OLD ENG
 #nine_garrisons_of_the_great_wall: "Nove Guarnigioni della Grande Muraglia" #OLD ITA
 nine_garrisons_of_the_great_wall: "Nine Garrisons of the Great Wall" #NEW
 #nine_garrisons_of_the_great_wall: "Nine Garrisons of The Great Wall" #OLD ENG
 #nine_garrisons_of_the_great_wall_desc: "Per difenderci dai feroci barbari, limitarsi a riparare la Grande Muraglia non basterà. Le Nove Guarnigioni sono città fortificate militarizzate che non solo difenderanno i passi più importanti, ma miglioreranno anche la situazione logistica lungo il confine nord." #OLD ITA
 nine_garrisons_of_the_great_wall_desc: "In order to defend against the vicious barbarian onslaught, we must do more than simply repair the Great Wall. The Nine Garrisons are militarized garrison towns along the Wall that will not only help to defend the most important passes, but also improve the overall logistical situation on our northern border." #NEW
 #nine_garrisons_of_the_great_wall_desc: "In order to defend against the vicious barbarians, simply repairing the Great Wall itself will not be enough. The Nine Garrisons are militarized garrison towns along the Wall that will not only help to defend the important passes but also improve the overall logistic situation of the northern border" #OLD ENG
 the_red_cannon: "Il Cannone Rosso"
 #the_red_cannon_desc: "I barbari dai capelli rossi d'Europa possono essere rozzi e maleducati, ma sanno costruire artiglieria e armi da fuoco di buona qualità. Importare e replicare le loro armi migliorerà il nostro esercito rendendolo molto più efficace contro ogni invasore." #OLD ITA
 the_red_cannon_desc: "The red-haired barbarians from $europe$ may be uncivilized and ill-mannered, but they do know how to make artillery and firearms of good quality. Importing and duplicating their weapons will give our army a significant advantage against all invaders." #NEW
 #the_red_cannon_desc: "The red-haired barbarians from Europe may be uncivilized and ill-mannered, but they do know how to make artillery and firearms of good quality. Importing and duplicating their weapons will improve our army and make it much more effective against all invaders." #OLD ENG
 woodblock_printing: "Xilografia"
 #woodblock_printing_desc: "La produzione di eleganti illustrazioni, opere d'arte e libri con questo metodo di stampa ha catturato l'attenzione della nostra gente. Con i recenti miglioramenti, l'introduzione di nuove opere letterarie eleverà ulteriormente il nostro prestigio." #OLD ITA
 woodblock_printing_desc: "The production of elegant illustrations, artworks, and books using this printing method has captivated our people's attention, and our master printers constantly strive to perfect their techniques. Woodblock printing has become part of our culture and, with recent improvements to and expansion of our literary production, will further elevate our prestige." #NEW
 #woodblock_printing_desc: "The production of elegant illustrations, artworks, and books using this printing method has captivated the attention of our people, as they strive to perfect their technique. Woodblock printing has come to be a part of our culture and with recent improvement, the introduction of literary work will only serve to elevate our prestige further!" #OLD ENG
 green_standard_army: "Esercito dello Stendardo Verde"
 #green_standard_army_desc: "L'Esercito dello Stendardo Verde, principalmente composto da soldati etnici Hàn, coesiste con i nostri eserciti degli Otto Stendardi. Originariamente formato da truppe arruolate volontariamente a lungo termine tra le classi svantaggiate, esso servirà come forza di polizia e di governo locale, mentre i Bannermen saranno riservati alle emergenze." #OLD ITA
 green_standard_army_desc: "The Green Standard Army, a military force mainly composed of ethnic Hàn soldiers, coexists with our Eight Banner armies. Originally formed by surrendered troops and recruited on a voluntary, long-term basis, they attract individuals from socially disadvantaged backgrounds. Used as a police force post-consolidation, they will play a crucial role in local military governance, while Bannermen will be reserved for emergencies and sustained resistance." #NEW
 #green_standard_army_desc: "The Green Standard Army, a military force mainly composed of ethnic Hàn soldiers, coexists with our Eight Banner armies. Originally formed by surrendered troops, recruited on a voluntary, long-term basis, they attract individuals from socially disadvantaged backgrounds. Used as a police force post-consolidation, they will play a crucial role in local military governance, while Bannermen will be reserved for emergencies and sustained resistance." #OLD ENG
 great_tax_reform: "Grande Riforma Fiscale"
 #great_tax_reform_desc: "La nostra grande nazione è ricca di monete e campi fertili. Se vogliamo amministrarla correttamente, dobbiamo applicare una nuova forma di tassazione che garantisca un bilancio più sano." #OLD ITA
 great_tax_reform_desc: "Our wealthy nation has ample coin and bounteous, fertile fields, but all this abundance requires comprehensive taxation. The Great Tax Reform enables more efficient revenue management, which should guarantee a healthier budget for our realm." #NEW
 #great_tax_reform_desc: "Our great nation is home to ample coin and effluent fields. Given that we wish to administrate it properly, we shall strive to apply a new form of taxation that allows for a healthier budget." #OLD ENG
 junji_chu: "Jūnjī Chù"
 #junji_chu_desc: "Conosciuto anche come il Gran Consiglio, il #italic Jūnjī Chù#! si occupa degli affari militari. Pur essendo il massimo consiglio privato, ha superato la Gran Segreteria delle dinastie precedenti. Nonostante il ruolo cruciale, rimarrà un organo informale dell'inner court." #OLD ITA
 junji_chu_desc: "Also known as the Grand Council, the #italic Jūnjī Chù#! is tasked with overseeing military affairs. As the most important privy council, it has come to overshadow the Grand Secretariat that held sway over previous dynasties. Despite its crucial role, this council will retain an informal nature within the inner court, with its members holding other official roles besides their councilorship." #NEW
 #junji_chu_desc: "Also known as the Grand Council, the #italic Jūnjī Chù#! is tasked with military affairs. As it is the paramount privy council, it has come to overshadow the Grand Secretariat installed by previous dynasties. Despite its crucial role, this council will retain an informal nature within the inner court, operating alongside other roles held by its members." #OLD ENG
 #jingdezhen_porcelain: "Porcellana Jǐngdézhèn" #OLD ITA
 jingdezhen_porcelain: "Jǐngdézhèn $porcelain$" #NEW
 #jingdezhen_porcelain: "Jǐngdézhèn Porcelain" #OLD ENG
 #jingdezhen_porcelain_desc: "Simbolo di una società prospera e vertice dell'arte, la perfezione della porcellana, con l'introduzione della nuova varietà superiore #italic Jǐngdézhèn#!, diffonderà la nostra influenza culturale ancora più lontano." #OLD ITA
 jingdezhen_porcelain_desc: "Our $porcelain$ industry is emblematic of the prosperity and tradition of artisanal excellence alive in our Empire. By perfecting the already-superior $porcelain$ production techniques of Jǐngdézhèn, we will spread our cultural influence far and wide." #NEW
 #jingdezhen_porcelain_desc: "The mark of a prosperous society, and the zenith of art, are but a few of the established aspects of our people. By perfecting the manufacturing of porcelain and introducing a new superior variety, called #italic Jǐngdézhèn#!, will certainly spread our cultural reach to new lengths." #OLD ENG
 sanxitang: "Sānxītáng"
 #sanxitang_desc: "La Sala delle Tre Rarità ospita i nostri oggetti più rari e preziosi, oltre a opere d'arte. Grazie al generoso patrocinio del sovrano, è divenuta un luogo di discussioni accademiche, conferenze ed eventi culturali." #OLD ITA
 sanxitang_desc: "The Hall of Three Rarities is our most splendid repository of rare, valuable objects and works of art. Through the generous patronage of our ruler, it has flowered into a venue for academic discussions, lectures, and even cultural events, promoting intellectual exchange and scholarly pursuits." #NEW
 #sanxitang_desc: "The Hall of Three Rarities serves as our most valuable repository of rare and valuable objects as well as art. Through the generous patronage of our ruler, it has come to be a venue of academic discussions, lectures, and even cultural events, promoting intellectual exchange and scholarly pursuits." #OLD ENG
 monuments_to_greatness: "Monumenti alla Grandezza"
 #monuments_to_greatness_desc: "La nostra storia risale a migliaia di anni e il nostro popolo ha superato grandi catastrofi grazie a pura tenacia. Questa forza è divenuta una caratteristica della nostra società, mostrata tanto nel nostro esercito quanto nel nostro splendore artistico." #OLD ITA
 monuments_to_greatness_desc: "In our people's many millennia of existence on this planet, they have endured thousands of catastrophes through sheer tenacity. This innate steely strength has come to be recognized as a defining feature of our society. We showcase our resilience in the strength of our army and the divine beauty of our art." #NEW
 #monuments_to_greatness_desc: "Our history dates back thousands of years and our people have weathered through great catastrophes out of sheer tenacity. The strength recognized has come to be a feature of our society, our resilience showcased in the strength of our army and the glamour of our art." #OLD ENG
 ten_great_campaigns: "Dieci Grandi Campagne"
 #ten_great_campaigns_desc: "Le Dieci Grandi Campagne mirano ad espandere la nostra influenza dentro e fuori i nostri confini. Recluteremo un enorme esercito per annientare ogni resistenza e soffocare le ribellioni prima ancora che sorgano. La nostra gloria sarà eterna." #OLD ITA
 ten_great_campaigns_desc: "The Ten Great Campaigns are aimed at expanding our influence both inside and outside our borders. To achieve that, we will draft a huge army to crush any resistance that we might find in our way. We shall choke the life out of any rebellion before it has the chance to raise its head, and our glory will be eternal." #NEW
 #ten_great_campaigns_desc: "The Ten Great Campaigns are aimed at expanding our influence both inside and outside our borders. To achieve that, we will draft a huge army to crush the resistance that we might find in our way and will also make rebellions die before being even conceived. Our glory will be eternal." #OLD ENG
 tributary_system: "Sistema Tributario"
 #tributary_system_desc: "Un sistema di signori locali e governanti sottomessi che ci inviano doni come simbolo della nostra sovranità. Raffinarlo e centralizzarlo rafforzerà ulteriormente la nostra presa su di loro." #OLD ITA
 tributary_system_desc: "A system of subjugated local warlords and other rulers who send us regular gifts of allegiance in recognition of our overlordship. To refine and centralize this system would help us tighten our grip and squeeze more out of them." #NEW
 #tributary_system_desc: "A system of subjugated local warlords and rulers, they send us gifts of allegiance as a sign of our overlordship. To refine and centralize this system would only tighten our grip over them." #OLD ENG

#Timurids
 timurid_cavalry: "Cavalleria $TIM_ADJ$"
 #timurid_cavalry_desc: "Così come il grande $genghis_khan_name_no_tooltip$ dominò le steppe grazie alla potenza della sua cavalleria, così noi trionferemo grazie alla forza dei nostri cavalli. Allevati per le guerre più dure e montati dai soldati meglio addestrati, i nostri cavalieri instilleranno paura nei cuori dei nostri nemici." #OLD ITA
 timurid_cavalry_desc: "As the great $genghis_khan_name_no_tooltip$ dominated the steppes with the power of his cavalry, so will we triumph through our incomparable horses. Bred for the most rigorous combat, and mounted by the best-trained soldiers in the world, our cavalry will instill fear in the hearts of our enemies." #NEW
 #timurid_cavalry_desc: "As the great $genghis_khan_name_no_tooltip$ dominated the steppes with the power of his cavalry, so will we triumph with the power of our horses. Bred for the most rigorous war and mounted by the best-trained soldiers, our cavalry will instill fear in the hearts of our enemies." #OLD ENG
 timurid_architecture: "Architettura $TIM_ADJ$"
 #timurid_architecture_desc: "L'architettura del $persia_region$ è stata per secoli l'invidia del mondo conosciuto. Dobbiamo promuovere un nuovo stile architettonico affinché possiamo occupare quel posto che è certamente nostro per diritto di nascita." #OLD ITA
 timurid_architecture_desc: "The architecture of $persia_region$ has been the envy of the known world for centuries. We must promote a new form of architecture, one that surpasses anything seen before, so that we may claim our birthright as the master of this art." #NEW
 #timurid_architecture_desc: "The architecture of $persia_region$ has been the envy of the known world for centuries. We must promote a new type of architecture so that we can occupy that spot as it is certainly our birthright." #OLD ENG
 the_mantle_of_the_great_khan: "Il Mantello del Grande $rank_kingdom_horde_ruler_suffix_male$"
 #the_mantle_of_the_great_khan_desc: "La morte di $genghis_khan_name_no_tooltip$ creò un vuoto di potere che spinse individui che avrebbero dovuto sapere meglio a cercare il potere. Tuttavia, attraverso matrimoni abbiamo consolidato la nostra pretesa di discendere dal Grande $rank_kingdom_horde_ruler_suffix_male$ stesso, e i guerrieri della steppa sanno bene chi devono seguire." #OLD ITA
 the_mantle_of_the_great_khan_desc: "The death of $genghis_khan_name_no_tooltip$ created a power vacuum that led to people who should have known better vying to replace him. However, through strategic marriages, we have consolidated our claim to descent from the Great $rank_kingdom_horde_ruler_suffix_male$ himself, and the warriors of the steppes will declare their loyalty to us accordingly." #NEW
 #the_mantle_of_the_great_khan_desc: "The death of $genghis_khan_name_no_tooltip$ created a power vacuum that led to people who should have known better aiming for power. However, through marriages, we consolidated our claim to descent from the Great $rank_kingdom_horde_ruler_suffix_male$ himself, and the steppe warriors know whom to follow." #OLD ENG
 turco_persian_tradition: "Tradizione Turco-Persiana"
 #turco_persian_tradition_desc: "È innegabile che il $persia_region$ sia sempre stato il centro della cultura e della lingua nell'area, influenzando i vari popoli del $turkic_group$ presenti da secoli. Promuoveremo questa fusione per creare una nostra tradizione culturale." #OLD ITA
 turco_persian_tradition_desc: "$IRA$ has always been the undeniable center of culture and language in the region, influencing the different $turkic_group$ peoples that have been around for centuries. We will embrace this blend of cultures to create our own unique tradition." #NEW
 #turco_persian_tradition_desc: "It is undeniable that $persia_region$ has always been the center of culture and language in the area, influencing the different $turkic_group$ peoples that have been around for centuries. We will promote this blend to create our own cultural tradition." #OLD ENG
 tamerlane_chess: "Scacchi di Tamerlano"
 #tamerlane_chess_desc: "Questa nuova variante degli scacchi, inventata dal nostro grande fondatore eponimo, migliora le versioni precedenti e il suo utilizzo permetterà ai nostri generali di perfezionare strategia e tattica." #OLD ITA
 tamerlane_chess_desc: "This new variety of chess, invented by our great eponymous founder, improves upon previous versions. Using it will help our generals to improve their strategic and tactical skills." #NEW
 #tamerlane_chess_desc: "This new chess variant, invented by our great eponymous founder, improves upon previous versions and its use will allow our generals to improve in their strategy and tactics." #OLD ENG
 chagatai_literature: "Letteratura in $karluk_language$"
 #chagatai_literature_desc: "La lingua $karluk_language$ delle steppe orientali è molto più degna di portare i pensieri e le idee della nostra grande stirpe rispetto al $persian_language$ o all'$arabic_language$. Dobbiamo promuovere l'uso della nostra lingua ancestrale e creare una nuova tradizione letteraria." #OLD ITA
 chagatai_literature_desc: "The $karluk_language$ language of the eastern steppes is far more worthy to carry the thoughts and ideas of our great lineage than $persian_language$ or $arabic_language$ ever could be. We must promote the use of our ancestral language, and create a new literary tradition." #NEW
 #chagatai_literature_desc: "The $karluk_language$ language of the eastern steppes is far more worthy to be the carrier of the thoughts and ideas of our great lineage than $persian_language$ or $arabic_language$ ever could be. We must promote the use of our ancestral language and create a new literary tradition." #OLD ENG
 nambardar_levy: "Reclutamento Nambardar"
 #nambardar_levy_desc: "Il $nambardar_levy$, o #italic čerig-i nambardar#!, si riferisce a quelle truppe che non  provengono da $mongolian_culture$ o dal $turkic_group$, ma dalla popolazione nativa dell'$iranian_group$. Grazie a loro, i nostri eserciti possono essere più numerosi di quanto sarebbero altrimenti." #OLD ITA
 nambardar_levy_desc: "The $nambardar_levy$, or #italic čerig-i nambardar#!, refers to our troops that do not come from $mongolian_culture$ or $turkic_group$ origins, but instead come from the native $iranian_group$ population. Thanks to them, we can build larger armies than would have been possible before." #NEW
 #nambardar_levy_desc: "The $nambardar_levy$, or #italic čerig-i nambardar#!, refers to those of our troops that do not come from $mongolian_culture$ or $turkic_group$ origin, but instead are made from the native $iranian_group$ population. Thanks to them, our armies can be bigger than they would otherwise." #OLD ENG
 #timurid_renaissance: "Rinascimento $TIM_ADJ$" #OLD ITA
 timurid_renaissance: "$TIM_ADJ$ $renaissance$" #NEW
 #timurid_renaissance: "$TIM_ADJ$ Renaissance" #OLD ENG
 #timurid_renaissance_desc: "Sin dai tempi dell'espansione iniziale dei $TIM_ADJ$, le nostre terre hanno attratto i migliori artigiani e sapienti dell'epoca. Attraverso il continuo mecenatismo verso arte, scienza e letteratura, abbiamo reso le città di $herat$ e $samarkand$ i gioielli più splendenti del mondo." #OLD ITA
 timurid_renaissance_desc: "Ever since the initial $TIM_ADJ$ expansion, our realm has attracted the greatest artisans and wise men of the age. Through our continued patronage of art, science, and literature, we have made the cities of $herat$ and $samarkand$ the brightest jewels in the world." #NEW
 #timurid_renaissance_desc: "Ever since the time of the initial $TIM_ADJ$ expansion, our lands have attracted the greatest artisans and wise men of the age. Through continued patronizing of art, science, and literature, we have made the cities of $herat$ and $samarkand$ the brightest jewels in the world." #OLD ENG
 riches_of_the_silk_road: "Controllo della Via della Seta"
 riches_of_the_silk_road_desc: "Finché i nostri mercanti controlleranno il commercio attraverso le terre del $transoxiana_area$ e di $samarkand$, il traffico della Via della Seta scorrerà indisturbato e la ricchezza della nostra dinastia continuerà a crescere."
 reform_the_diwan: "Riformare il Dīwān"
 #reform_the_diwan_desc: "Siamo fortunati a essere serviti da leali e istruiti amministratori del $farsi_culture$ che hanno perfezionato l'arte del governo per generazioni. Tuttavia, un ufficio ereditario tende col tempo a stagnare e mancare di innovazione. Riducendo il numero di cariche ereditate per ogni generazione, ci assicureremo di premiare non solo la lealtà ma anche il merito. Gli amministratori capaci devono poter ascendere alle alte posizioni indipendentemente dalla famiglia di provenienza." #OLD ITA
 reform_the_diwan_desc: "We are fortunate to be served by loyal and well-educated $farsi_culture$ administrators, who have perfected the art of governance for generations. Sadly, however, a hereditary office is one that over time might stagnate and lack innovation. By reducing the number of inherited offices with each generation, we can make sure that we reward not only loyalty, but also ability. Able administrators must rise to high positions regardless of which family they come from." #NEW
 #reform_the_diwan_desc: "We are fortunate to be served by loyal and well-educated $farsi_culture$ administrators that have perfected the art of governance for generations. Sadly, however, a hereditary office is one that over time might stagnate and lack innovation. By reducing the number of inherited offices with each generation, we can make sure that we reward not only loyalty but also ability. Able administrators must rise to high positions regardless of which family they come from." #OLD ENG
 conquerors_legacy: "Eredità dei Conquistatori"
 #conquerors_legacy_desc: "Il nostro glorioso impero è sorto sull'eredità dei grandi conquistatori. Fu la ferocia delle truppe di $genghis_khan_name_no_tooltip$ a permettergli di conquistare dal $europe$ alla $china$. Come suoi successori, le nostre truppe saranno temibili quanto le sue." #OLD ITA
 conquerors_legacy_desc: "Our glorious empire emerged from the legacy of great conquerors. It was the ferocity of $genghis_khan_name_no_tooltip$'s troops that allowed him to conquer from $europe$ to $china$. As his successors, our troops will be as fearsome as the ones in his army." #NEW
 #conquerors_legacy_desc: "Our glorious empire emerged from the legacy of great conquerors. It was the ferocity of $genghis_khan_name_no_tooltip$'s troops what allowed him to conquer from $europe$ to $china$. As his successors, our troops will be as fearsome as the ones in his army." #OLD ENG

#Golden Horde
 glh_kipchak_khanate: "Khanato Kipchak"
 glh_kipchak_khanate_desc: "Il nostro grande paese è chiamato anche Khanato Kipchak, governando su tutti i territori della Confederazione Cumano-Kipchak. Con tali distese di terra sotto il nostro comando, gli eserciti che possiamo radunare saranno innumerevoli."
 glh_legacy_of_jochi: "Eredità di Jochi"
 #glh_legacy_of_jochi_desc: "Dopo $genghis_khan_name_no_tooltip$, suo figlio Jochi morì poco dopo. Tuttavia, la sua presenza e la sua eredità sono ancora vive nel nostro paese, al punto che siamo ancora conosciuti come l'Ulus di Jochi. I guerrieri accorrono ai nostri stendardi per onorare tale eredità." #OLD ITA
 glh_legacy_of_jochi_desc: "After $genghis_khan_name_no_tooltip$ died, his son Jochi also passed not long after. However, his presence and legacy are still felt in our country, to the point that we are still known as the Ulus of Jochi. Warriors flock to our banners to uphold that legacy." #NEW
 #glh_legacy_of_jochi_desc: "After $genghis_khan_name_no_tooltip$, his son Jochi died not long after. However, his presence and legacy are still felt in our country, to the point that we are still known as the Ulus of Jochi. Warriors flock to our banners to uphold that legacy." #OLD ENG
 glh_legacy_of_the_golden_horde: "Eredità dell'Orda d'Oro"
 #glh_legacy_of_the_golden_horde_desc: "Il mondo tremerà davanti a noi! Fummo una delle principali parti costitutive dell'impero di $genghis_khan_name_no_tooltip$, e rappresentiamo la principale forza politica dell'Europa Orientale e delle Steppe." #OLD ITA
 glh_legacy_of_the_golden_horde_desc: "We were one of the main constituent parts of $genghis_khan_name_no_tooltip$'s empire, and we represent the main political force in $eastern_europe$ and the Steppes. The world shall tremble before us!" #NEW
 #glh_legacy_of_the_golden_horde_desc: "The world shall tremble before us! We were one of the main constituent parts of $genghis_khan_name_no_tooltip$'s empire, and we represent the main political force in Eastern Europe and the Steppes." #OLD ENG
 #glh_perso_mongol_administration: "Amministrazione Perso-Mongola" #OLD ITA
 glh_perso_mongol_administration: "Perso-$MGE_ADJ$ Administration" #NEW
 #glh_perso_mongol_administration: "Perso-Mongol Administration" #OLD ENG
 #glh_perso_mongol_administration_desc: "I nostri antenati perfezionarono il sistema amministrativo mongolo nei secoli, ma non esitarono a incorporare idee e metodi delle culture soggiogate. Il nostro sistema di amministrazione si basa in parte sulle tradizioni che risalgono al grande $genghis_khan_name_no_tooltip$, e in parte su ciò che abbiamo adottato dai burocrati persiani e musulmani nelle terre conquistate." #OLD ITA
 glh_perso_mongol_administration_desc: "Our ancestors refined our administrative system over the centuries, and they were not shy about incorporating the ideas and methods of the cultures they subdued. Our current system of administration is in part based on traditions dating back to the Great $genghis_khan_name_no_tooltip$ himself, and in part on what we have adopted from $IRA_ADJ$ and $muslim_ADJ$ bureaucrats in the lands conquered." #NEW
 #glh_perso_mongol_administration_desc: "Our ancestors refined the Mongol administrative system over the centuries, but they were not shy of incorporating the ideas and methods of the cultures they subdued. Our system of administration is in part based on traditions dating back to the Great $genghis_khan_name_no_tooltip$ himself and in part on what we have adopted from Persian and Muslim bureaucrats in the lands conquered." #OLD ENG
 glh_tatar_traditions: "Tradizioni Tatare"
 #glh_tatar_traditions_desc: "Il nostro impero potrebbe non essere più governato da cavallo, ma i nostri eserciti lo sono eccome. Nei secoli siamo rimasti fedeli alle nostre origini, assicurandoci che pochi possano eguagliare l'abilità dei nostri cavalieri. Avanzando e adottando nuove tecnologie e tattiche quando necessario, costruiamo sulla forte organizzazione e tradizione marziale dell'Impero Mongolo." #OLD ITA
 glh_tatar_traditions_desc: "Our empire may no longer be ruled from horseback, but our armies remain masters of the mount. Over the centuries, we have stayed true to our origins, ensuring that few can match the skill of our riders. As we go forward and adopt new technology and tactics when needed, we build on the strong organization and martial traditions of the $MGE_ADJ$ Empire." #NEW
 #glh_tatar_traditions_desc: "Our empire may no longer be ruled from horseback, but our armies still very much are. Over the centuries, we have stayed true to our origins ensuring that few can match the skill of our riders. As we go forward and adopt new technology and tactics when needed, we build on the strong organization and martial tradition of the Mongol Empire." #OLD ENG
 glh_secure_the_trade_routes: "Mettere in Sicurezza le Rotte Commerciali"
 #glh_secure_the_trade_routes_desc: "Non tutte le ricchezze del mondo nascono nelle terre sotto il nostro dominio. Il commercio è la fonte di ogni ricchezza e l'Orda d'Oro ha sempre protetto i mercanti. Garantendo la sicurezza di chiunque desideri muovere merci attraverso il nostro paese, assicureremo un flusso costante di pellicce, manufatti cinesi, seta, spezie e altre necessità nelle nostre città. Che scelgano di vendere a noi o meno, la loro semplice presenza genererà ricchezza per il nostro popolo." #OLD ITA
 glh_secure_the_trade_routes_desc: "Not all riches in this world originate in our territory. Trade is the source of all wealth, and the Golden Horde has always protected merchants. By ensuring the safety of anyone who wishes to move goods through our country, we can ensure a steady stream of furs, silk, spices, and other necessities to our cities. Whether they choose to sell their goods to us or not, their mere presence will generate wealth for our people." #NEW
 #glh_secure_the_trade_routes_desc: "Not all riches in this world originate in the lands under our rule. Trade is the source of all wealth and the Golden Horde has always protected merchants. By ensuring the safety of anyone who wishes to move goods through our country, we can ensure a steady stream of furs, Chinese craftsmanship, silk, spices, and other necessities to our cities. Whether they choose to sell their goods to us or not their mere presence will generate wealth for our people." #OLD ENG
 glh_religious_pragmatism: "Pragmatismo Religioso"
 #glh_religious_pragmatism_desc: "Una dottrina rigida e inflessibile non ha mai ottenuto molti seguaci tra le orde tatare. Quando il Grande $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ adottò l'Islam, fu l'Islam di uno Shaykh sufi o di un Qāḍī zelante quello che accolse nelle sue terre. Secoli di tradizione e lealtà sono ciò su cui costruiremo il nostro stato. La religione ha un ruolo, certo, ma preferiamo vedere il nostro paese prosperare piuttosto che cadere nella lotta per imporre una fede comune." #OLD ITA
 glh_religious_pragmatism_desc: "Constraining, inflexible doctrine has never won many admirers among the Tatar hordes. When the Great $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ adopted $muslim$, it was the faith of a Sufi Shaykh or a zealous Qāḍī that he invited into his lands.\n\nCenturies of tradition and loyalty are what we would rather build our state upon. Religion has a part to play, but we would prefer to see our country thrive than to fall apart in the chaos of forced religious homogeneity." #NEW
 #glh_religious_pragmatism_desc: "Restraining and inflexible doctrine has never managed to win many followers among the Tatar hordes. When the Great $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ adopted Islam, it was the Islam of a Sufi Shaykh or a zealous Qāḍī that he invited into his lands. Centuries of tradition and loyalty are what we would build our state upon. Religion has a part to play, but we would rather see our country thrive than fall apart in the struggle to ensure that all share a common faith." #OLD ENG
 glh_modernization_of_steppes: "Modernizzazione delle Steppe"
 #glh_modernization_of_steppes_desc: "Sono passati molti secoli da quando gli eserciti di $genghis_khan_name_no_tooltip$ dominarono le steppe. Il nostro paese ha superato i sogni dei nostri antenati, e ora siamo una potenza con merito proprio. Modernizzeremo i nostri territori affinché possiamo diventare il faro del mondo." #OLD ITA
 glh_modernization_of_steppes_desc: "It was long ago that $genghis_khan_name_no_tooltip$'s armies first seized control of the steppes. Our country has since surpassed our ancestor's every expectation, and now we stand as a global power on our own merit. We shall now begin the process of modernizing our territories, so that one day we shall be the beacon of all the world." #NEW
 #glh_modernization_of_steppes_desc: "It is a long time ago that $genghis_khan_name_no_tooltip$'s armies dominated the steppes. Our country has gone beyond our ancestor's dreams, and now we stand as a power in our own merit. We shall modernize our territories so that we can become the beacon of the world." #OLD ENG

 #Crimea
 cri_genghisid_legacy: "Eredità Genghiside"
 #cri_genghisid_legacy_desc: "I nostri antenati cavalcarono con $genghis_khan_name_no_tooltip$ mentre devastava il mondo conosciuto. Abbiamo mantenuto vive le nostre tradizioni militari e continuiamo a essere guidati da Khan che rivendicano la discendenza dalla linea genghiside." #OLD ITA
 cri_genghisid_legacy_desc: "Our forefathers rode with $genghis_khan_name_no_tooltip$ as he ravaged the known world. We have kept our military traditions alive, and continued to be ruled by $rank_kingdom_horde_ruler_suffix_male$s who claim descent from the Genghisid line." #NEW
 #cri_genghisid_legacy_desc: "Our forefathers rode with $genghis_khan_name_no_tooltip$ as he ravaged the known world. We have kept our military traditions alive and continued to be ruled by Khans who claim descent from the Genghisid line." #OLD ENG
 cri_slavers: "Schiavisti delle Steppe"
 #cri_slavers_desc: "C'è una fortuna da fare nel commercio degli schiavi: gli ignari cristiani che cadono nelle nostre mani ottengono un prezzo elevato nei mercati turchi, arabi e persiani." #OLD ITA
 cri_slavers_desc: "There is a fortune to be made from the $slaves_goods$ trade; unwitting $christian_ADJ$ believers who fall into our grasp fetch a high price in $turkish_culture$, $AIA_ADJ$, and $ITA_ADJ$ markets." #NEW
 #cri_slavers_desc: "There is a fortune to be made from the slave trade; unwitting Christians who fall into our grasp fetch a high price in Turkish, Arabian, and Persian markets." #OLD ENG
 cri_free_cattle_grazing: "Pascienza Libera"
 cri_free_cattle_grazing_desc: "Non imponiamo restrizioni ai pastori per il pascolo delle loro vaste mandrie di cavalli e bovini. Gli allevatori possono muoversi liberamente per le steppe, commerciare e condurre le loro attività senza ostacoli."
 cri_steppe_commanders: "Comandanti delle Steppe"
 #cri_steppe_commanders_desc: "I comandanti della cavalleria crimeana hanno padroneggiato la mobilità della guerra delle steppe, usando velocità, accerchiamenti e imboscate per surclassare gli eserciti europei più lenti." #OLD ITA
 cri_steppe_commanders_desc: "$CRI_ADJ$ cavalry commanders have mastered the art of mobility in steppes warfare, using speed, flanking, and ambush to outmatch slower European armies." #NEW
 #cri_steppe_commanders_desc: "Crimean cavalry commanders mastered the mobility of steppe warfare, using speed, flanking, and ambush to outmatch slower European armies" #OLD ENG
 cri_devshirme_of_the_steppes: "Il Devshirme delle Steppe"
 #cri_devshirme_of_the_steppes_desc: "Le élite crimeane imitarono aspetti delle pratiche militari-amministrative ottomane, fondendo sistemi turchi e islamici per gestire la manodopera e migliorare l'efficienza militare." #OLD ITA
 cri_devshirme_of_the_steppes_desc: "$CRI_ADJ$ elites mimicked aspects of $TUR_ADJ$ military-administrative practices, blending $turkic_group$ and $muslim_ADJ$ systems to manage manpower and military efficiency." #NEW
 #cri_devshirme_of_the_steppes_desc: "Crimean elites mimicked aspects of Ottoman military-administrative practices, blending Turkic and Islamic systems to manage manpower and military efficiency. " #OLD ENG




#Chagatai
 chg_legacy_of_chagatai: "Eredità di Chagatai"
 #chg_legacy_of_chagatai_desc: "L'eredità di $genghis_khan_name_no_tooltip$ è nostra attraverso suo figlio Chagatai. Tutti tremeranno davanti a noi mentre riconquistiamo la sua gloria." #OLD ITA
 chg_legacy_of_chagatai_desc: "The legacy of $genghis_khan_name_no_tooltip$ is ours through his son Chagatai. All shall tremble before us as we reclaim his glory!" #NEW
 #chg_legacy_of_chagatai_desc: "The legacy of $genghis_khan_name_no_tooltip$ is ours through his son Chagatai. All shall tremble before us as we reclaim his glory." #OLD ENG
 chg_chagatai_riders: "Cavalieri di Chagatai"
 #chg_chagatai_riders_desc: "I cavalli di $genghis_khan_name_no_tooltip$ calpestarono ogni territorio dall'Europa alla Cina. Come suoi eredi e successori, la nostra cavalleria instillerà lo stesso terrore nei nostri nemici." #OLD ITA
 chg_chagatai_riders_desc: "The horses of $genghis_khan_name_no_tooltip$ trampled and conquered territories stretching from $europe$ to $china$. As his heirs and successors, our cavalry will instill fear of the same thing happening into our enemies." #NEW
 #chg_chagatai_riders_desc: "The horses of $genghis_khan_name_no_tooltip$ trampled all territory from Europe to China. As his heirs and successors, our cavalry will instill the same fear into our enemies." #OLD ENG
 chg_the_mountain_khanate: "Il Khanato delle Montagne"
 #chg_the_mountain_khanate_desc: "Siamo protetti tra il Lago Balkhash e le Montagne Tiānshān. Una terra dura e inospitale, che il nostro popolo può sfruttare come arma contro eventuali invasori." #OLD ITA
 chg_the_mountain_khanate_desc: "We lie sheltered between $balkhash_lake$ and the Tiānshān Mountains. It is a harsh and unforgiving land, one which our people know how to use as a weapon against would-be invaders." #NEW
 #chg_the_mountain_khanate_desc: "We lie sheltered between Lake Balkhash and the Tiānshān Mountains. It is a harsh and unforgiving land, one which our people can harness to use as a weapon against would-be invaders." #OLD ENG
 chg_border_wars: "Guerre di Confine Incessanti"
 #chg_border_wars_desc: "Circondati da popoli che ci osteggiano, affrontiamo una lotta costante per mantenere i nostri confini. I nostri soldati sempre vigili hanno innumerevoli occasioni per affinare le loro abilità, dando vita a un popolo guerriero temprato dalla battaglia, pronto a reclamare l'eredità del Grande $rank_kingdom_horde_ruler_suffix_male$." #OLD ITA
 chg_border_wars_desc: "Surrounded by people that would oppose us, we face a constant struggle to maintain our borders. Our ever-vigilant soldiers have plentiful opportunities to hone their skills in battle, giving birth to a combat-hardened warrior people ready to reclaim the legacy of the Great $rank_kingdom_horde_ruler_suffix_male$." #NEW
 #chg_border_wars_desc: "Surrounded by people that would oppose us, we face a constant struggle to maintain our borders. Our ever-vigilant soldiers have plentiful opportunities to hone their skills in battle, giving birth to a battle-hardened warrior people ready to reclaim the legacy of the Great $rank_kingdom_horde_ruler_suffix_male$." #OLD ENG
 chg_sons_of_chagatai: "Figli di Chagatai $rank_kingdom_horde_ruler_suffix_male$"
 #chg_sons_of_chagatai_desc: "Possiamo far risalire la nostra linea a Chagatai $rank_kingdom_horde_ruler_suffix_male$, secondo figlio di $genghis_khan_name_no_tooltip$, che un tempo governò queste terre e fondò un potente stato successore mongolo. Nonostante il tempo trascorso, possiamo ancora rivendicare una forte legittimità appellandoci alla sua eredità." #OLD ITA
 chg_sons_of_chagatai_desc: "We can trace our line back to Chagatai $rank_kingdom_horde_ruler_suffix_male$, the second son of $genghis_khan_name_no_tooltip$, who once ruled these lands and established a powerful Mongolian successor state. Although a long time has passed since then, we can still claim considerable legitimacy by appealing to the legacy of our fierce ancestor." #NEW
 #chg_sons_of_chagatai_desc: "We can trace our line back to Chagatai $rank_kingdom_horde_ruler_suffix_male$, the second son of $genghis_khan_name_no_tooltip$, who once ruled these lands and established a powerful Mongol successor state. Although a long time has passed since that, we can still claim considerable legitimacy by appealing to the legacy of our ancestor." #OLD ENG
 chg_tradition_of_conquest: "Tradizione di Conquista"
 #chg_tradition_of_conquest_desc: "Conquistare popoli può essere difficile: non tutti sono pronti per il nostro governo illuminato. Tuttavia, abbiamo scoperto che esistono modi più semplici che costruire una montagna di crani per integrare nuovi popoli nel nostro impero. Una lezione che i nostri antenati non appresero." #OLD ITA
 chg_tradition_of_conquest_desc: "Conquering people can be a tricky business; not everyone is ready to accept our enlightened government. Still, we have discovered that there are easier ways to bring people into our empire than building a mountain of skulls — something that our ancestors never learned." #NEW
 #chg_tradition_of_conquest_desc: "Conquering people can be a tricky business, not everyone is ready for our enlightened government. Still, we have discovered that there are easier ways than building a mountain of skulls to bring people into our empire. It is something that our ancestors never learned." #OLD ENG
 chg_scheming_court: "Corte Intrigante"
 #chg_scheming_court_desc: "Le costanti lotte di potere tra principi, nobili locali, città e tribù del Khanato di Chagatai hanno prodotto una nazione di abili cospiratori. Se riusciremo a mettere da parte le nostre rivalità e incanalare questa energia per superare i nostri nemici, ne trarremo immenso vantaggio." #OLD ITA
 chg_scheming_court_desc: "The constant power struggles between the various princes, nobles, cities, and tribes in the Chagatai Khanate have produced a nation of highly adept schemers. If we can put aside our quarrels and channel this energy towards outsmarting our enemies, it would be a great boon to our people." #NEW
 #chg_scheming_court_desc: "The constant power struggles between the various princes, local noblemen, cities, and tribes in the Chagatai Khanate have produced a nation of highly adept schemers. If we can put aside our quarrels and channel this energy towards outsmarting our enemies, it would be a great boon to our people." #OLD ENG
 chg_glory_of_conquest: "La Gloria della Conquista"
 chg_glory_of_conquest_desc: "Sia noto che un ragazzo non può diventare uomo se non ha cavalcato con il nostro esercito invincibile; che non può prendere moglie finché non ha preso la moglie di un altro uomo; che non è degno di una capanna finché non ne ha bruciata una altrui. Che il servizio nel nostro esercito sia l'unica via verso la virilità."
 chg_unrelenting_horde: "Orda Incessante"
 chg_unrelenting_horde_desc: "I nostri eserciti marceranno come le grandi orde di $genghis_khan_name_no_tooltip$. Le nostre truppe calpesteranno i nemici come fili d'erba delle nostre steppe. Tutti temeranno la potenza delle nostre armate!"

#Mongol Empire
 mge_pax_mongolica: "Pax Mongolica"
 #mge_pax_mongolica_desc: "Avendo unificato tutti i territori mongoli sotto il nostro vessillo, la stabilità e prosperità che il nostro popolo potrà godere non si vedevano dai tempi del grande $genghis_khan_name_no_tooltip$." #OLD ITA
 mge_pax_mongolica_desc: "Having unified all $mongolian_culture$ territories under our banner, the stability and prosperity our people will be able to enjoy has not been seen since the times of the great $genghis_khan_name_no_tooltip$." #NEW
 #mge_pax_mongolica_desc: "Having unified all Mongolian territories under our banner, the stability and prosperity our people will be able to enjoy has not been seen since the times of the great $genghis_khan_name_no_tooltip$." #OLD ENG
 mge_all_under_a_khan: "Tutti Sotto un $rank_kingdom_horde_ruler_suffix_male$"
 #mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ unificò vastissime terre sotto il proprio stendardo. Ora che abbiamo riunificato quei territori sotto l'autorità di un unico $rank_kingdom_horde_ruler_suffix_male$, tutti i popoli del nostro impero giureranno fedeltà alle nostre insegne." #OLD ITA
 mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ unified great swathes of territory under his banner. Having unified those territories again under the authority of a single $rank_kingdom_horde_ruler_suffix_male$, all people in our empire shall swear allegiance to us." #NEW
 #mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ unified great swathes of territory under his banner. Having we unified once again those territories under the authority of a single $rank_kingdom_horde_ruler_suffix_male$, all people in our empire shall swear allegiance to our banners." #OLD ENG
 mge_ghostly_horses_of_the_plain: "Cavalli Spettrali della Steppa"
 #mge_ghostly_horses_of_the_plain_desc: "Il valore dei cavalieri mongoli è famoso in tutto il mondo. I nostri nemici tremeranno alla vista di una nuvola di polvere in lontananza, temendo che significhi l'arrivo della nostra cavalleria!" #OLD ITA
 mge_ghostly_horses_of_the_plain_desc: "The prowess of $mongolian_culture$ horsemen is renowned across the entire world. Our enemies shake in terror at the sight of a dust cloud in the distance, fearing that it might signify our cavalry's approach!" #NEW
 #mge_ghostly_horses_of_the_plain_desc: "The prowess of the Mongolian horsemen is renowned across the entire world. Our enemies will tremble with fear at the sight of a dust cloud in the distance, fearing that it might signify our cavalry's approach!" #OLD ENG
 mge_yeke_mongol_ulus: "Yeke Mongol Ulus"
 #mge_yeke_mongol_ulus_desc: "Come Mongoli originali, abbiamo restaurato lo #italic Yeke Mongol Ulus#!, il Grande Stato Mongolo, recuperando la gloria dell'impero di $genghis_khan_name_no_tooltip$. Alla minima occasione, il nostro popolo cercherà di emulare le sue imprese e riconquistare i vasti territori del Khanato Mongolo." #OLD ITA
 mge_yeke_mongol_ulus_desc: "As the original Mongols, we restored the #italic Yeke Mongol Ulus#!, the Great Mongolian State, resurrecting the glory of $genghis_khan_name_no_tooltip$'s great empire. Given the slightest chance, our people will emulate the exploits of the Great $rank_kingdom_horde_ruler_suffix_male$ and reclaim his legacy, reuniting the once-vast territories of the $MGE_ADJ$ Khanate." #NEW
 #mge_yeke_mongol_ulus_desc: "As the original Mongols, we restored the #italic Yeke Mongol Ulus#!, the Great Mongolian State, recovering the glory of $genghis_khan_name_no_tooltip$'s great empire. Given the slightest chance, our people would seek to emulate the exploits of the Great $rank_kingdom_horde_ruler_suffix_male$ and reclaim his legacy, reuniting the once-vast territories of the Mongol Khanate." #OLD ENG
 mge_life_of_steppe_warrior: "La Vita di un Guerriero della Steppa"
 #mge_life_of_steppe_warrior_desc: "La steppa è un luogo duro e implacabile per gli impreparati. Il nostro popolo è abituato a vivere negli ambienti più ostili e da ciò trae resistenza e capacità di sopravvivenza. Faremo sì che tutti i nostri soldati condividano queste esperienze." #OLD ITA
 mge_life_of_steppe_warrior_desc: "The steppe is a foreboding and unforgiving place for the unprepared. We are accustomed to living in this harsh environment, and as such our people are sturdy and have a knack for survival. We will ensure that all of our soldiers share these skills, and are thus able to more easily survive extreme situations." #NEW
 #mge_life_of_steppe_warrior_desc: "The steppe is a foreboding and unforgiving place for the unprepared. We as a people are used to living in the harshest of environments and as such our people are sturdy and have a knack for survival. We will ensure that all of our soldiers share these experiences and are thus able to survive much better." #OLD ENG
 mge_multicultural_empire: "Impero Multiculturale"
 #mge_multicultural_empire_desc: "Le terre del grande Impero Mongolo comprendono molti popoli e culture differenti, tutti unificati sotto la gloria del grande $rank_kingdom_horde_ruler_suffix_male$." #OLD ITA
 mge_multicultural_empire_desc: "The territories of the great $MGE_ADJ$ Empire are home to many different peoples, all unified under the glory of the mighty $rank_kingdom_horde_ruler_suffix_male$." #NEW
 #mge_multicultural_empire_desc: "The territories under the great Mongol Empire cover many different lands and peoples, all unified under the glory of the great $rank_kingdom_horde_ruler_suffix_male$." #OLD ENG
 mge_improved_yam_system: "Sistema Yam Migliorato"
 #mge_improved_yam_system_desc: "Il sistema di stazioni yam in tutto il nostro impero consentiva comunicazioni e logistica eccezionali ai tempi del grande $genghis_khan_name_no_tooltip$. Con la nostra restaurazione e il suo miglioramento, i nostri messaggeri potranno attraversare le enormi distanze del nostro impero a velocità un tempo impensabili." #OLD ITA
 mge_improved_yam_system_desc: "The system of #italic yam#! posts all over our empire have facilitated communication and logistics since the times of the great $genghis_khan_name_no_tooltip$. After re-establishing and improving this system, our messengers can cross the massive expanse of our empire at speeds that were not even thought possible before." #NEW
 #mge_improved_yam_system_desc: "The system of yam posts all over our empire allowed great communication and logistics since the times of the great $genghis_khan_name_no_tooltip$. With our reestablishing and improvement of the system, our messengers can cross the great distances of our empire at such speeds that were not even thought possible before." #OLD ENG
 mge_mongolian_mobility: "Mobilità Mongola"
 #mge_mongolian_mobility_desc: "Ogni nostro soldato mantiene tipicamente 3 o 4 cavalli, permettendogli di cambiarli quando uno si stanca e di viaggiare rapidamente per giorni senza fermarsi. Inoltre, le cavalcature extra forniscono latte di giumenta e carne, rendendo i nostri eserciti molto meno vulnerabili alla fame rispetto alle armate delle cosiddette nazioni civilizzate. Ciò ci consente di manovrare attorno ai nostri nemici con facilità." #OLD ITA
 mge_mongolian_mobility_desc: "Each of our soldiers typically maintains three or four horses, allowing them to change each time their mount becomes tired, and thereby travel at high speed for days without stopping. Furthermore, their extra mounts provide them with food reserves through mare's milk as well as horse meat, making our armies far less vulnerable to starvation than other, so-called civilized nations' armies. This allows us to outmaneuver our enemies with ease, covering a staggering amount of territory in shorter periods than they had believed to be possible." #NEW
 #mge_mongolian_mobility_desc: "Each of our soldiers typically maintains 3 or 4 horses, allowing them to change horse each time their mount becomes tired and so travel at high speed for days without stopping. Furthermore, their extra mounts provide them with food reserves through mare's milk as well as horse meat, making our armies far less vulnerable to starvation than other, so-called civilized nations' armies. This allows us to outmaneuver our enemies with ease, covering a staggering amount of territory in shorter periods than they had believed to be possible." #OLD ENG
 mge_kheshig: "I Kheshig"
 #mge_kheshig_desc: "I Kheshig furono un tempo la formidabile guardia del corpo del Grande Mongol $rank_kingdom_horde_ruler_suffix_male$. I loro discendenti continueranno a proteggere il $rank_kingdom_horde_ruler_suffix_male$ di Mongolia mentre cavalca in battaglia contro i nemici del nostro popolo!" #OLD ITA
 mge_kheshig_desc: "The #italic Kheshig#! once formed the formidable bodyguard of the Great $MGE_ADJ$ $rank_kingdom_horde_ruler_suffix_male$. Their descendants will continue to protect the $rank_kingdom_horde_ruler_suffix_male$ of $MGE$ as they ride into battle." #NEW
 #mge_kheshig_desc: "The Kheshig once formed the formidable bodyguard of the Great Mongol $rank_kingdom_horde_ruler_suffix_male$. Their descendants will continue to protect the $rank_kingdom_horde_ruler_suffix_male$ of Mongolia as they ride into battle against their people's foes!" #OLD ENG
 mge_glory_of_the_khan: "Gloria del $rank_kingdom_horde_ruler_suffix_male$"
 #mge_glory_of_the_khan_desc: "Il grande $genghis_khan_name_no_tooltip$ riunì sotto di sé un esercito immenso come mai visto prima. Noi siamo gli eredi della sua gloria e il nostro esercito supererà persino le grandi orde mongole del passato." #OLD ITA
 mge_glory_of_the_khan_desc: "The extraordinary $genghis_khan_name_no_tooltip$ amassed a huge army like never before seen. We are heirs to his glory, and therefore our army will outstrip even the greatest $MGE_ADJ$ hordes of the past." #NEW
 #mge_glory_of_the_khan_desc: "The great $genghis_khan_name_no_tooltip$ amassed under him a vast army like never before seen. We are heirs of his glory, and our army will even surpass the great Mongol hordes of the past." #OLD ENG

#Steppe Hordes
 #horse_lords: "Signori dei Cavalli delle Steppe" #OLD ITA
 horse_lords: "Horse-Lords of the Steppes" #NEW
 #horse_lords: "Horse-lords of the Steppes" #OLD ENG
 #horse_lords_desc: "L'unica vera bestia è la natura umana. I cavalli sono nati e cresciuti accanto ai nostri bambini, e hanno imparato a essere nobili e feroci quanto il nostro popolo. Ne riconosciamo il duro addestramento come nostro più grande orgoglio, ed essi riconoscono noi come i loro più grandi signori." #OLD ITA
 horse_lords_desc: "Our people and horses share an inseparable bond. Children grow up alongside foals, learning horsemanship from infancy. The careful breeding and exhaustive training of these mounts is our greatest pride, and we are recognized far and wide as the greatest horse-lords in the world." #NEW
 #horse_lords_desc: "The only true beast is of human nature. Horses have been born and raised among our children, and they have learned to be as noble and as ferocious as our own people. We recognize their harsh taming as our greatest pride, and they recognize us as their greatest lords." #OLD ENG
 kurultai_advance: "Kurultai"
 #kurultai_advance_desc: "Riunendo tutti i capi di ogni banda di guerrieri, possiamo eleggere il $rank_empire_horde_ruler_suffix_male$ che guiderà le nostre orde alla Vittoria. Sotto una tenda, il destino del nostro popolo sarà deciso ed emergeranno leader tra i candidati che si ritengono degni di guidarci." #OLD ITA
 kurultai_advance_desc: "Upon gathering leaders from each warrior band beneath one tent, we will elect the $rank_empire_horde_ruler_suffix_male$ who will lead our hordes to victory. In this #italic kurultai#!, the fate of our people is decided, and leaders will be chosen from among those who think themselves worthy of leading us." #NEW
 #kurultai_advance_desc: "By gathering all the leaders from each band of warriors, we can elect the $rank_empire_horde_ruler_suffix_male$ that will lead our hordes to Victory. Under a tent, the fate of our people will be decided and leaders will be elected among those candidates that think of themselves as worthy to lead us." #OLD ENG
 beyond_the_sun: "Oltre il Sole"
 beyond_the_sun_desc: "L'epoca delle Grandi Orde non è ancora finita. Abbiamo imparato dagli errori dei nostri nemici e ora risorgeremo più saggi e più forti. Tutte le terre dove il sole nasce e muore devono essere nostre."
 steppe_slave_raiding: "Razziatori di Schiavi delle Steppe"
 #steppe_slave_raiding_desc: "Le nostre incursioni si muovono veloci come il vento, colpendo e svanendo prima che qualcuno si accorga della nostra presenza. Saccheggiare gli insediamenti non è l'unico modo per guadagnare molto: possiamo anche catturare prigionieri da vendere a buon prezzo." #OLD ITA
 steppe_slave_raiding_desc: "Our raiding parties move as fast as the wind, hitting and running almost before anyone is aware of our presence. Looting the settlements we attack is in itself lucrative, but any prisoners we capture can be sold for a high price as well." #NEW
 #steppe_slave_raiding_desc: "Our raiding parties move as fast as the wind, hitting and running almost before anyone is aware of our presence. Looting the settlements we attack is not the only way to make big money, but we can also capture prisoners that we can sell for good money." #OLD ENG
 caravanserai_advance: "$caravanserai$"
 #caravanserai_advance_desc: "Le rotte commerciali sorsero in Asia Centrale nel corso dell'ultimo millennio, creando la rete nota come Via della Seta. Fondamentali per questo sviluppo furono i $caravanserai$, luoghi dove mercanti e carovane potevano fermarsi e riposare lungo il viaggio." #OLD ITA
 caravanserai_advance_desc: "Trade routes appeared in $central_asia$ over the last millennium, creating the network known as the Silk Road. Key to this was the flourishing of $caravanserai$, places where merchants and their caravans could stop and rest along the way." #NEW
 #caravanserai_advance_desc: "Trade routes arose in Central Asia during the last millennium, creating the network known as the Silk Road. Key to this was the flourishing of $caravanserai$, the places where merchants and their caravans could stop and rest along the way." #OLD ENG
 #borjigin_blood: "Sangue dei $Borjigin$" #OLD ITA
 borjigin_blood: "$borjigin_dynasty$ Blood" #NEW
 #borjigin_blood: "$Borjigin$ Blood" #OLD ENG
 #borjigin_blood_desc: "Condividiamo il sangue dei $Borjigin$, di $genghis_khan_name_no_tooltip$ stesso. Tutti i paesi dovranno inchinarsi alla nostra eredità, e tutti i territori delle steppe dovranno riconoscerci come loro legittimi signori." #OLD ITA
 borjigin_blood_desc: "We share the blood of the $borjigin_dynasty$, of $genghis_khan_name_no_tooltip$ himself. All countries bow in recognition of our heritage, and all territories of the steppes shall recognize us as their own." #NEW
 #borjigin_blood_desc: "We share the blood of the $Borjigin$, of $genghis_khan_name_no_tooltip$ himself. All countries shall bow to our heritage, and all territories of the steppes shall recognize us as their own." #OLD ENG
 turco_mongol_tradition: "Tradizione Turco-Mongola"
 #turco_mongol_tradition_desc: "Sebbene la dinastia $Borjigin$ abbia origine nella $mongolian_culture$, i territori conquistati da $genghis_khan_name_no_tooltip$ nel $central_asia$ erano abitati principalmente da popolazioni del $turkic_group$. Da ciò nacque una fusione culturale unica tra questi due gruppi." #OLD ITA
 turco_mongol_tradition_desc: "Although the $borjigin_dynasty$ dynasty has a $mongolian_culture$ origin, the territories conquered by $genghis_khan_name_no_tooltip$ in $central_asia$ were mainly hose of $turkic_group$ populations. As a result, a distinct blended culture emerged between those two groups." #NEW
 #turco_mongol_tradition_desc: "Although the $Borjigin$ dynasty stems from a $mongolian_culture$ origin, the territories conquered by $genghis_khan_name_no_tooltip$ in $central_asia$ were mainly of $turkic_group$ population. As a result, a distinct blend of culture emerged between those two groups." #OLD ENG
 yams_of_the_great_khan: "Yam del Grande $rank_kingdom_horde_ruler_suffix_male$"
 #yams_of_the_great_khan_desc: "Per garantire che i messaggeri potessero viaggiare abbastanza velocemente da tenere il passo con gli eserciti mongoli, $genghis_khan_name_no_tooltip$ istituì un sistema di stazioni di posta, o 'yam', situate ogni 30–60 km per fornire cibo, riparo e cavalli di ricambio. Questo permetteva ai messaggi di viaggiare alla massima velocità di un cavallo, senza che la fatica rallentasse i messaggeri. Così il nostro impero superò temporaneamente i problemi logistici posti dall'immensa scala della Pax Mongolica." #OLD ITA
 yams_of_the_great_khan_desc: "In order to ensure that messengers could travel fast enough to keep up with Mongol armies, $genghis_khan_name_no_tooltip$ instituted a system of relay stations or #italic yams#!, which were set up every 30-60 km to provide food, shelter and spare horses for Mongol army messengers. This allowed messages to travel as fast as a horse can gallop, with fatigue no longer slowing the speed a messenger could travel. By these means, our empire was able to overcome the logistical problems caused by the vast scale of the Pax Mongolica - at least temporarily." #NEW
 #yams_of_the_great_khan_desc: "In order to ensure that messengers could travel fast enough to keep up with Mongol armies, $genghis_khan_name_no_tooltip$ instituted a system of relay stations or 'yams', which were set up every 30-60 km to provide food, shelter and spare horses for Mongol army messengers. This allowed messages to travel as fast as a horse can gallop, with fatigue no longer slowing the speed a messenger could travel. By these means, our empire was able to overcome the logistical problems caused by the vast scale of the Pax Mongolica - at least temporarily." #OLD ENG
 mandate_of_the_khan: "Mandato del $rank_kingdom_horde_ruler_suffix_male$"
 #mandate_of_the_khan_desc: "Come comanda il $rank_kingdom_horde_ruler_suffix_male$, così fanno gli dei. L'unità del nostro popolo deriva dalla lealtà verso il nostro grande leader. Solo un uomo capace di piegare la volontà di coloro che si piegano alla corona è degno della nostra devozione." #OLD ITA
 mandate_of_the_khan_desc: "As the $rank_kingdom_horde_ruler_suffix_male$ commands, gods do. The unity of our people comes from their loyalty to our great leader. Only someone capable of bending the will of those loyal to the ruler is worthy of our devotion." #NEW
 #mandate_of_the_khan_desc: "As the $rank_kingdom_horde_ruler_suffix_male$ commands, gods do. The unity of our people comes from the loyalty to our great leader. Only a man capable of bending the will of those bending to the crown is worthy of our devotion." #OLD ENG
 there_shall_be_no_grass: "Non Crescerà Più Erba"
 #there_shall_be_no_grass_desc: "Là dove passa la nostra orda, l'erba non crescerà mai più; la terra non nutrirà i nostri nemici; il giorno e la notte passeranno, e il suolo rimarrà silenzioso, senza raccolti da mietere. Ci sono fame dalle quali non si può fuggire." #OLD ITA
 there_shall_be_no_grass_desc: "Where our horde has passed, the grass will never grow again; the land will no longer feed our enemies. Day and night will pass, and the ground will stay silent, no crops to be collected. Some hungers you cannot escape." #NEW
 #there_shall_be_no_grass_desc: "There, where our horde has passed, the grass will never grow again, the land will no longer feed our enemies, day and night will pass, and the ground will stay silent, no crops to be recollected. Some hungers you cannot escape." #OLD ENG
 #slavery_before_death: "Schiavitù Prima della Morte" #OLD ITA
 slavery_before_death: "Slavery Before Death" #NEW
 #slavery_before_death: "Slavery before Death" #OLD ENG
 #slavery_before_death_desc: "Radere al suolo e distruggere le città è parte della guerra. In passato, i nostri guerrieri si abbandonavano al massacro, distruggendo e saccheggiando tutto e uccidendo chiunque si opponesse. Sebbene ciò rafforzasse il morale, non era una pratica economica. Con questo nuovo approccio, almeno potremo ridurre in schiavitù i capaci di lavorare invece di decapitarli ciecamente per il trono dei teschi." #OLD ITA
 slavery_before_death_desc: "Razing and the destruction of cities are part of warfare. In the past, our warriors would go on a rampage, destroying and looting every item they could find, and killing those who stood in their way. While it strengthened their morale, their actions were far from economical. With this new approach, we can ensure to at least enslave those capable of work instead of blindly beheading them for the skull throne." #NEW
 #slavery_before_death_desc: "Razing and destruction of cities are part of warfare. In the past, our warriors would go on a rampage, destroying and looting every item they could find, and killing those who stood in their way. While it strengthened their morale, their actions were far from being economical. With this new approach, we can ensure to at least enslave those capable of work instead of blindly beheading them for the skull throne." #OLD ENG
 horde_loyalty: "Lealtà dell'Orda"
 horde_loyalty_desc: "La lealtà del nostro popolo è indiscutibile. Nessuno che abbia vissuto sotto il prospero dominio del $rank_kingdom_horde_ruler_suffix_male$ penserebbe mai di abbandonarlo."
 horde_loot_discovery_advance: "Profitti delle Scorrerie"
 #horde_loot_discovery_advance_desc: "Il saccheggio è sempre stato parte della nostra identità. Razziare e depredare fornisce addestramento ai nostri uomini e gran parte della loro ricchezza. Non c'è alcun male nell'incoraggiare ulteriormente le scorrerie — almeno, non per noi." #OLD ITA
 horde_loot_discovery_advance_desc: "Raiding has always been part of our identity. Pillaging and plundering are how our people learn to fight and obtain much of their personal fortune. There is no harm in fomenting even more raids — at least, no harm for us." #NEW
 #horde_loot_discovery_advance_desc: "Raiding has always been part of our identity. Pillaging and plundering is how our people get both their training and a great part of their wealth. There is no harm in fomenting raids even further, at least no harm for us." #OLD ENG
 trampling_horde: "Orda Travolgente"
 #trampling_horde_desc: "$genghis_khan_name_no_tooltip$ fece tremare il mondo con le sue conquiste; faremo lo stesso. Il mondo imparerà a temere il galoppo dei nostri cavalli." #OLD ITA
 trampling_horde_desc: "$genghis_khan_name_no_tooltip$ made the world tremble with his conquests, and we will do the same. The world will learn to fear the sound of galloping hoofbeats as our riders approach!" #NEW
 #trampling_horde_desc: "$genghis_khan_name_no_tooltip$ made the world tremble with his conquests, we will do the same. The world will learn to fear the gallop of our horses." #OLD ENG
 watchers_of_the_silk_road: "Guardiani della Via della Seta"
 #watchers_of_the_silk_road_desc: "Non costruiamo, non commerciamo. Prendiamo ciò di cui abbiamo bisogno… e talvolta di più. I nostri guerrieri hanno osservato con attenzione i mercanti stranieri e le loro pratiche, e ora conosciamo i percorsi più sicuri per trasportare le nostre merci." #OLD ITA
 watchers_of_the_silk_road_desc: "We do not build, we do not trade. We take what we need... and sometimes more. Our warriors have kept an attentive watch upon foreign merchants and their passage, and we now know the safest paths for transporting our goods." #NEW
 #watchers_of_the_silk_road_desc: "We do not build, we do not trade. We take what we need... and sometimes more. Our warriors have kept an attentive watch upon foreign merchants and their techniques, and we now know the safest paths to transport our goods." #OLD ENG
 logistics_of_khan: "Logistica del $rank_kingdom_horde_ruler_suffix_male$"
 #logistics_of_khan_desc: "La gente dimentica che le conquiste del Grande $rank_kingdom_horde_ruler_suffix_male$ furono rese possibili non solo dalla sua forza militare, ma anche dalla superiorità logistica. Dobbiamo emulare tali tecniche, aggiornandole ai tempi moderni. Ciò aumenterà enormemente le nostre possibilità di conquista." #OLD ITA
 logistics_of_khan_desc: "People forget that the conquests of the Great $rank_kingdom_horde_ruler_suffix_male$ were as much due to superior logistics as military strength. We must emulate the techniques of the Great $rank_kingdom_horde_ruler_suffix_male$ while updating them with modern knowledge. This will give us greater scope for conquest." #NEW
 #logistics_of_khan_desc: "People forget that the conquests of the Great $rank_kingdom_horde_ruler_suffix_male$ were as much by superior logistics as by superior military strength. We must emulate the techniques of the Great $rank_kingdom_horde_ruler_suffix_male$ while making them current with the times. This will give us greater scope for conquest." #OLD ENG
 populating_the_steppes: "Popolare le Steppe"
 #populating_the_steppes_desc: "Come portiamo distruzione ai nostri nemici, dobbiamo anche portare pace a coloro che vivono entro i nostri confini. Mantenendo la pace interna e incoraggiando uomini e donne talentuosi da tutto il nostro impero a progettare e fondare nuove grandi città, renderemo le steppe un luogo prospero e ordinato." #OLD ITA
 populating_the_steppes_desc: "Just as we bring destruction to our enemies, we must bring peace to the many who reside within our borders. By upholding internal stability and encouraging talented men and women from all over our empire to plan and populate new and great cities, we will tame the steppes." #NEW
 #populating_the_steppes_desc: "Just as we bring destruction to our enemies, we must bring peace to the many who reside within our borders. By upholding the internal peace and encouraging talented men and women from all over our empire to plan and populate new and great cities, we will tame the steppes." #OLD ENG
 a_magnanimous_empire: "Un Impero Magnanimo"
 #a_magnanimous_empire_desc: "Il prospero regno del Grande $rank_kingdom_horde_ruler_suffix_male$ era noto non solo per la sua spada temibile, ma anche per la sua magnanimità verso coloro che saggiamente gli giuravano fedeltà. Coloro che accolgono il nostro impero tollerante saranno trattati come parte di esso." #OLD ITA
 a_magnanimous_empire_desc: "The Great $rank_kingdom_horde_ruler_suffix_male$ was not only known for his fearsome sword, but also for the exceptional generosity towards those who wisely bent the knee to him. Those who welcome the rule of our tolerant empire shall be treated as part of it." #NEW
 #a_magnanimous_empire_desc: "The prosperous reign of the Great $rank_kingdom_horde_ruler_suffix_male$ was not only known for his fearful sword but also for his exceptional piety towards those who wisely bent the knee to him. Those who welcome our tolerant empire shall be treated as part of it." #OLD ENG
 horde_ardor: "Ardore dell'Orda"
 #horde_ardor_desc: "I nostri cavalli sono quasi feroci e terrificanti quanto i loro cavalieri. La vista della nostra cavalleria che marcia verso la guerra è come una forza inarrestabile di demoni infernali." #OLD ITA
 horde_ardor_desc: "Our horses are almost as fierce and terrifying to our enemies as their riders are. The sight of our cavalry marching to war is like watching an unstoppable force of demons from hell." #NEW
 #horde_ardor_desc: "Our horses are almost as fierce and terrifying for our enemies as their riders are. The sight of our cavalry marching to war is like an unstoppable force of demons from hell." #OLD ENG

#Persia
 ira_sasanian_heritage: "Eredità Sasanide"
 #ira_sasanian_heritage_desc: "Prima della conquista islamica del $persia_region$, la regione era sede dell'Impero sasanide, un dominio che si estendeva dal Caucaso a ovest fino alla catena dei Kirthar a est. Molte delle sue grandi realizzazioni culturali hanno plasmato l'arte persiana e l'identità culturale attuale." #OLD ITA
 ira_sasanian_heritage_desc: "Before the Islamic Conquest of $persia_region$, the region was home to the Sasanian Empire, which once ruled from Caucasia in the West to the Kirthar Range in the East. Many of its great cultural accomplishments have shaped our cultural and artistic identity." #NEW
 #ira_sasanian_heritage_desc: "Before the Islamic Conquest of $persia_region$, the region was once home to the Sasanian Empire, a realm which once ruled from Caucasia in the West to the Kirthar Range in the East. Many of its great cultural accomplishments have shaped the Persian artistic work and culture identity." #OLD ENG
 #ira_islamized_persia: "Islam Persiano" #OLD ITA
 ira_islamized_persia: "$IRA_ADJ$ $muslim$" #NEW
 #ira_islamized_persia: "Persian Islam" #OLD ENG
 #ira_islamized_persia_desc: "L'islamizzazione della Persia è stata un processo lungo e non ancora del tutto concluso, ma rappresenta comunque uno dei pilastri centrali della sua identità. Molte delle nostre antiche tradizioni si sono fuse con gli insegnamenti dell'Islam, formando così i nostri valori fondamentali." #OLD ITA
 ira_islamized_persia_desc: "The Islamization of $IRA$ has been a lengthy process. It is not yet completely finished, but our religion has still become one of the major pillars of our national identity. Many of our ancient traditions have been combined with the teachings of $muslim$, and now make up our current core culture." #NEW
 #ira_islamized_persia_desc: "The Islamization of Persia has been a lengthy process, not yet completely finished, but still being one of the major pillars of its identity. Many of our ancient traditions have been combined with the teachings of Islam, and now make up our current core values." #OLD ENG
 ira_shahnameh: "$shahnameh$"
 #ira_shahnameh_desc: "Lo #italic $shahnameh$#! – il Libro dei Re – è un poema epico e l'epopea nazionale del popolo $farsi_culture$. Descrivendo il passato storico e mitico degli imperi che abitarono la Grande $persia_region$, le sue storie contribuiscono in modo incalcolabile alla cultura $farsi_culture$." #OLD ITA
 ira_shahnameh_desc: "The #italic $shahnameh$#! - the Book of Kings - is an epic poem, and a national treasure of the $farsi_culture$ people. Describing the historical and mythical past of the empires which once occupied Greater $persia_region$, its stories contribute to the $farsi_culture$ culture in uncountable dimensions." #NEW
 #ira_shahnameh_desc: "The #italic $shahnameh$#! - the Book of Kings - is an epic poem and a national epic of the $farsi_culture$ people. Describing the historical and mythical past of the empires which resided in Greater $persia_region$, its stories contribute to the $farsi_culture$ culture in uncountable dimensions." #OLD ENG
 ira_restoration_of_cities: "Restauro delle Città"
 #ira_restoration_of_cities_desc: "L'invasione mongola della Persia tra il 1219 e il 1221 fu una catastrofe per l'intera regione. Centri urbani di dimensioni magnifiche furono ridotti a cumuli di macerie. È giunto il momento di ricostruire ciò che venne distrutto e riportare in vita le maestose metropoli della Persia." #OLD ITA
 ira_restoration_of_cities_desc: "The Mongol invasion of $IRA$ was catastrophic for the entire region. Population centers of magnificent size were reduced to mere rubble. But it is finally time to rebuild what was once destroyed, and restore the awe-inspiring empire of $IRA$." #NEW
 #ira_restoration_of_cities_desc: "The Mongol invasion of Persia between 1219 and 1221 was a catastrophe to the entirety of the region. Population centers of magnificent sizes were reduced to mere rubble. It is time to rebuild what was once destroyed, and restore the awe-inspiring metropolis of Persia." #OLD ENG
 ira_improved_silk_road: "Migliorare la Via della Seta"
 #ira_improved_silk_road_desc: "Un sistema di miglioramenti a strade e ponti, guardie per proteggere i percorsi (dietro piccolo tributo), e una rete di caravanserragli per i viaggiatori. Tutto ciò aiuterà i mercanti lungo la Via della Seta e aumenterà le entrate dello stato." #OLD ITA
 ira_improved_silk_road_desc: "A system of upgrades to roads and bridges, a system of guards to protect the roads — for a small fee — and a chain of $caravanserai$ for rest and refreshment. All these improvements will help the merchants as they traverse the Silk Road, and also provide revenue for the state." #NEW
 #ira_improved_silk_road_desc: "A system of upgrades to roads and bridges, a system of guards to protect the roads (for a small tax), and a chain of Caravanserai to provide rest stops. All help the merchants as they traverse the Silk Road and also provide increased revenues for the state." #OLD ENG
 ira_promotion_of_irrigation: "Promozione dell'Irrigazione"
 #ira_promotion_of_irrigation_desc: "A causa dell'invasione mongola del passato, la regione persiana è oggi meno popolata rispetto agli antichi imperi che rivendicavano queste terre come loro casa. Promuovere sistemi di irrigazione migliorerà l'agricoltura necessaria a sostenere un nuovo aumento demografico, recuperando dal pesante tributo di vite perdute." #OLD ITA
 ira_promotion_of_irrigation_desc: "As a consequence of the Mongol invasion of the past, $IRA$ is somewhat depopulated compared to the earlier empires which claimed these lands as their own. Promoting the practice of irrigation should help our people develop the agriculture needed to boost the local population and help us recover from the death toll of past conflicts." #NEW
 #ira_promotion_of_irrigation_desc: "As a consequence of the Mongolian Invasion of the past, the Persian region is rather depopulated compared to the past empires which claimed these lands as their own home. The promotion of irrigation should improve the needed agriculture to support a new population boost to recover from the past death toll." #OLD ENG
 #ira_persian_horses: "Cavalli Persiani" #OLD ITA
 ira_persian_horses: "$IRA_ADJ$ Horses" #NEW
 #ira_persian_horses: "Persian Horses" #OLD ENG
 #ira_persian_horses_desc: "I cavalli svolgono un ruolo fondamentale nella nostra società. Molti dei nostri uomini crescono insieme alle loro cavalcature, e ciò si riflette nella cura degli allevatori e nell'eccellente resistenza della nostra cavalleria." #OLD ITA
 ira_persian_horses_desc: "Horses play a fundamental role in our society. Many of our people are raised alongside their steeds, which is reflected in both the care our horse breeders take and the durability of our cavalry." #NEW
 #ira_persian_horses_desc: "Horses play a fundamental role in our society. Many of our people are grown alongside their steeds, which reflects in both the care of horse breeders and the excellent durability of our cavalry." #OLD ENG
 #ira_spread_of_persian_influence: "L'influenza Persiana" #OLD ITA
 ira_spread_of_persian_influence: "$IRA_ADJ$ Influence" #NEW
 #ira_spread_of_persian_influence: "The Persian Influence" #OLD ENG
 #ira_spread_of_persian_influence_desc: "Il persiano è una lingua antica con una storia più lunga della durata della maggior parte degli imperi. Nemmeno la conquista musulmana riuscì a cancellare il nucleo dell'identità persiana, e molti stati tentano ancora oggi di imitare la nostra cultura." #OLD ITA
 ira_spread_of_persian_influence_desc: "$persian_language$ is an ancient language with a history longer than the lifespan of many empires. Even the $muslim_ADJ$ conquest could not diminish the core of the $IRA_ADJ$ identity, and many other states try to imitate our culture." #NEW
 #ira_spread_of_persian_influence_desc: "Persian is an ancient language with a history longer than the life span of many empires combined. Even the Muslim conquest could not diminish the cores of the Persian identity, and many other states try to imitate our culture." #OLD ENG
 #ira_persian_rug_production: "Produzione di Tappeti Persiani" #OLD ITA
 ira_persian_rug_production: "$IRA_ADJ$ Rug Production" #NEW
 #ira_persian_rug_production: "Persian Rug Production" #OLD ENG
 #ira_persian_rug_production_desc: "La Persia è famosa da secoli per la produzione di tappeti. Tuttavia, quando i Mongoli attraversarono le nostre terre, causarono enormi distruzioni. Per permettere alla Persia di risollevarsi, dobbiamo recuperare anche la nostra forza economica. È tempo di rilanciare questa antica eccellenza." #OLD ITA
 ira_persian_rug_production_desc: "$IRA$ has long been famous for its beautiful carpets and rugs. However, when the Mongols devastated the empire, much of this cultural heritage was lost. For $IRA$ to fully recover its tumbled glory, we must regain our economic strength, and restoring this legendary ancient industry is the first step in that direction." #NEW
 #ira_persian_rug_production_desc: "Persia has long been famous for its rug and carpet manufacture. However, when the Mongols swept through our lands there was great destruction and devastation. For Persia to recover, we must regain our economic strength as well. It is time to encourage the rebirth of our ancient strengths." #OLD ENG
 ira_safaviyya_order_hall: "$safaviyya_order_hall$"
 ira_safaviyya_order_hall_desc: "$safaviyya_order_hall_desc$"
 ira_the_qizilbash: "I $qizilbash$"
 #ira_the_qizilbash_desc: "I #italic $qizilbash$#! – le Teste Rosse – sono un movimento militare sciita fondato dalla Ṣafawiyya. Guidati dalle loro convinzioni religiose e da profondi legami con il sufismo, questi guerrieri sono pronti a sostenere il nostro stato e potrebbero costituire il nucleo della nostra armata." #OLD ITA
 ira_the_qizilbash_desc: "The #italic $qizilbash$#! - the Red Heads - are a Shia military movement founded by the Ṣafawiyya. Guided by their religious convictions and deep ties to Sufism, these warriors are primed to fight for our state and to form the core of our army." #NEW
 #ira_the_qizilbash_desc: "The #italic $qizilbash$#! - the Red Heads - are a Shia military movement founded by the Ṣafawiyya. Guided by their religious convictions and deep ties to Sufism, these warriors are ready to support our state and could form the nucleolus of our army." #OLD ENG
 ira_the_qurchi: "I Qurchi"
 #ira_the_qurchi_desc: "Mentre i $qizilbash$ costituiscono la spina dorsale dell'esercito persiano, i #italic Qurchi#! sono la guardia reale scelta tra i $qizilbash$. Invece di terre, questi soldati ricevono un salario diretto dal tesoro reale." #OLD ITA
 ira_the_qurchi_desc: "While the $qizilbash$ are the backbone of the $IRA_ADJ$ military, the #italic Qurchi#! are the royal bodyguards enlisted from their ranks. Instead of being given land, these soldiers are paid from the royal treasury." #NEW
 #ira_the_qurchi_desc: "While the $qizilbash$ are the backbone of the Persian military, the #italic Qurchi#! are the royal bodyguard enlisted from the $qizilbash$. Instead of land, these soldiers are paid from the royal treasury." #OLD ENG
 ira_religious_state: "Stato Religioso"
 #ira_religious_state_desc: "Qualunque sia la nostra fede di stato, la Persia sarà sempre una nazione intrinsecamente religiosa. Ogni aspetto della nostra vita è guidato da principi sacri, e persino lo stato agisce secondo i nostri valori fondamentali come fonte di moralità e giustizia." #OLD ITA
 ira_religious_state_desc: "No matter what the official faith of our state is, $IRA$ will always be an inherently religious country. Every aspect of our life is guided by religious principles, and even the government itself acts with our core beliefs in mind when dealing with matters of morality and justice." #NEW
 #ira_religious_state_desc: "No matter the faith of our state, Persia will always be an inherently religious country. Every aspect of our life is guided by religious principles, and even the state itself acts with our core beliefs as an instance of morality and justice." #OLD ENG
 ira_the_ghilman: "Gli $a_ghilman$"
 #ira_the_ghilman_desc: "Gli $a_ghilman$ sono schiavi militari di origine caucasica. Solitamente ex cristiani, attraversano un rigido addestramento e sono molto esperti nell'uso delle armi da fuoco, diventando una parte essenziale dell'esercito. Essi fungono da contrappeso ad altri rami influenti dell'apparato militare." #OLD ITA
 ira_the_ghilman_desc: "The $a_ghilman$ are a military unit made up of formerly $christian_ADJ$ slaves with Caucasian origins. The $a_ghilman$ undergo strict military training and are well-practiced in the usage of firearms, making them an essential part of the national army. They serve as a counterbalance to other influential branches of the military." #NEW
 #ira_the_ghilman_desc: "The $a_ghilman$ are a unit of military slaves with Caucasian origins. Usually former Christians, the $a_ghilman$ undergo strict military training and are well-practiced in the usage of firearms, making them an essential part of the state's army. They serve as the counterbalance to other influential branches of the military." #OLD ENG
 ira_encouraged_art: "Promuovere l'Arte"
 #ira_encouraged_art_desc: "Le arti persiane sono ricercatissime. Collezionisti da ogni luogo viaggiano fino alle nostre terre per acquistare le nostre creazioni più raffinate. Dovremmo sostenere questo commercio e incoraggiare gli artisti emergenti." #OLD ITA
 ira_encouraged_art_desc: "$IRA_ADJ$ art is highly in demand. Collectors from near and far travel here in droves to purchase our exquisite creations. We should offer state support for our talented artists, as this trade in aesthetic goods is extremely lucrative." #NEW
 #ira_encouraged_art_desc: "The arts of Persia are well sought after. Art collectors from near and far travel to our land to purchase some of our finest artistic creations. We should support this commerce and support aspiring artists." #OLD ENG
 ira_nazir: "Nāẓir di Corte"
 #ira_nazir_desc: "I Nāẓir, o sovrintendenti, sono amministratori dei nostri territori e rappresentano gli occhi e le orecchie dello Šâhanšâh. Ogni azione della corte è supervisionata da loro, e le cariche vengono assegnate secondo il loro giudizio. Persino il Gran Vizir deve collaborare con i Nāẓir." #OLD ITA
 ira_nazir_desc: "The #italic Nāẓir#!, or overseers, are territorial administrators, and represent the eyes and ears of the Šâhanšâh. All actions of the court are supervised by the Nāẓir, and courtiers are promoted on their command. Even the Grand Vizier must work in association with the Nāẓir." #NEW
 #ira_nazir_desc: "The Nāẓir or overseers are administrators of our territories and represent the eyes and ears of the Šâhanšâh. All actions of the court are supervised by the Nāẓir, and members of the court are promoted on their command. Even the Grand Vizier has to work in association with the Nāẓir." #OLD ENG
 ira_the_tofangchi: "I $a_tofangchi$"
 #ira_the_tofangchi_desc: "Gli $a_tofangchi$ sono i moschettieri dell'impero. Sebbene le armi da fuoco fossero già presenti, il loro uso era irregolare poiché molti soldati persiani preferivano arco e frecce. I reggimenti dei $a_tofangchi$ mirano a cambiare questo, essendo addestrati all'uso delle armi moderne." #OLD ITA
 ira_the_tofangchi_desc: "The $a_tofangchi$ are our musket corps. Although firearms have been in use for a while, their presence in our ranks is highly irregular, as many of our fighters prefer to use their traditional weapon of bow and arrow. The regiments of the $a_tofangchi$ aim to change this, as they are trained in the use of modern weaponry." #NEW
 #ira_the_tofangchi_desc: "The $a_tofangchi$ are the musketeers of the empire. Although firearms have been in use before already, their presence has been highly irregular as many of the Persian military prefer to use their traditional weapon of bow and arrow. The regiments of the $a_tofangchi$ aim to change this as they are trained in the usage of the modern weaponry." #OLD ENG
 ira_the_tupchi: "I $a_tupchi$"
 ira_the_tupchi_desc: "$a_tupchi_desc$"
 #ira_religious_unity_policy: "Politica di Unità Religiosa" #OLD ITA
 ira_religious_unity_policy: "Religious Unity Policy" #NEW
 #ira_religious_unity_policy: "Policy of Religious Unity" #OLD ENG
 #ira_religious_unity_policy_desc: "L'era delle grandi divisioni religiose è giunta al termine. In quest'epoca moderna, l'Islam non può permettersi ulteriori conflitti interni. Promuoveremo una politica di unità religiosa, interna ed esterna, e porremo fine all'ostilità verso ciò che un tempo consideravamo eresia." #OLD ITA
 ira_religious_unity_policy_desc: "The time of great religious divides has come to its end. In these turbulent times, $muslim$ cannot afford any more in-fighting. We shall advocate for a policy of internal and external religious unity, and come to peace with what we used to consider heresy." #NEW
 #ira_religious_unity_policy_desc: "The time of great religious divides has come to its end. In this modern era, Islam cannot afford to continue any infighting anymore. We shall advocate for a policy of internal and external religious unity, and come at peace with what we used to consider heretic." #OLD ENG
 #ira_afsharid_navy: "Difesa Costiera del Golfo Persico" #OLD ITA
 ira_afsharid_navy: "$persian_gulf$ Coastal Defense" #NEW
 #ira_afsharid_navy: "Persian Gulf Coastal Defense" #OLD ENG
 #ira_afsharid_navy_desc: "Sebbene le nostre terre siano perlopiù montuose, la Persia possiede comunque territori costieri. Se le dinastie del passato prestarono poca attenzione alla protezione marittima, noi non dimentichiamo il mare: i nostri marinai sono pronti a difendere le nostre coste." #OLD ITA
 ira_afsharid_navy_desc: "Although our lands are located mostly in the highlands of the Zagros Mountains, $IRA$ does have coastal possessions. While past dynasties might have paid little attention to the maritime protection of the empire, our people are more aware of the sea, and our sailors are eager to defend our coasts." #NEW
 #ira_afsharid_navy_desc: "Although our lands are mostly in the mountains and highlands of the Zagros Mountains, the Persian state is not without its own coastal possessions. While past dynasties might have paid little attention to the maritime protection of the empire, our people do not forget the sea, and our sailors are eager to defend our coasts." #OLD ENG
 ira_jazayerchi: "Il Corpo di Fanteria $a_jazayerchi$"
 ira_jazayerchi_desc: "$a_jazayerchi_desc$"

#Beyliks and Rum
 uc_bey_advance: "$uc_bey$"
 uc_bey_advance_desc: "$uc_bey_desc$"
 seljuk_roots: "Radici Selgiuchidi"
 #seljuk_roots_desc: "Abbiamo nemici in ogni direzione, rendendo un esercito forte una necessità per uno stato come il nostro. Fortunatamente, non siamo un popolo debole. Dai Ġuzāt irregolari agli Akıncılar razziatori fino ai Sipâhi dell'Impero Ottomano, il mondo ha imparato a conoscere la potenza militare del popolo turco. Costruiamo un esercito degno di un Impero, traendo ispirazione dalle nostre gloriose tradizioni e dalla nostra storia, perfezionando la nostra forza attraverso i secoli." #OLD ITA
 seljuk_roots_desc: "We are surrounded by enemies on all sides, making a strong military an absolute necessity. Fortunately, we are not weak people. From the irregular Ġuzāt and the Akıncılar raiders to the Sipâhi of the $TUR$, the world has come to fear and respect our military might. Let us build an army worthy of an empire, inspired by our glorious traditions and history, honing our might through the ages." #NEW
 #seljuk_roots_desc: "We have enemies in all directions, making a strong army a necessity for a state such as ours. Fortunately, we are not a weak people. From the irregular Ġuzāt and the Akıncılar raiders to the Sipâhi of the Ottoman Empire, the world has come to know the military might of the Turkish people. Let us build an army for an Empire, taking inspiration from our glorious traditions and history, refining our might through the ages." #OLD ENG
 #heirs_of_rum: "Eredi di Rûm" #OLD ITA
 heirs_of_rum: "Scions of Rûm" #NEW
 #heirs_of_rum: "Heirs of Rûm" #OLD ENG
 #heirs_of_rum_desc: "Dopo un periodo turbolento e la lotta per prevalere sugli altri Beylik confinanti, è giunto il momento di assumerci il compito di restaurare i confini dell'antico e glorioso Sultanato di Rûm." #OLD ITA
 heirs_of_rum_desc: "After surviving a turbulent period, and winning the struggle to dominate our neighboring Beyliks, the time has finally come for us to restore the borders of the once-great Sultanate of Rûm!" #NEW
 #heirs_of_rum_desc: "After a turbulent period and the struggle to overpower our neighbor Beyliks, the time has come for us to take on the mantle of restoring the borders of the once-great Sultanate of Rûm." #OLD ENG
 #splendor_of_anatolia: "Splendore dell'Anatolia" #OLD ITA
 splendor_of_anatolia: "Splendor of $anatolia_region$" #NEW
 #splendor_of_anatolia: "Splendor of Anatolia" #OLD ENG
 #splendor_of_anatolia_desc: "La nostra regione ospita alcune delle madrase e moschee più impressionanti di tutto il mondo islamico. Con attenzione ai dettagli e abbondante talento, la nostra abilità artistica non conosce rivali." #OLD ITA
 splendor_of_anatolia_desc: "Our region is home to some of the most impressive madrasas and mosques in the entire $muslim_ADJ$ world. With their meticulous attention to detail and abundant talent, our artisans shine with unmatched prowess." #NEW
 #splendor_of_anatolia_desc: "Our region is home to some of the most impressive madrasas and mosques in the whole Islamic world. With attention to detail and abundant talent, our artistic prowess knows no match." #OLD ENG
 #persian_in_the_court: "Il Persiano nella Corte" #OLD ITA
 persian_in_the_court: "$IRA_ADJ$ in the Court" #NEW
 #persian_in_the_court: "Persian in the Court" #OLD ENG
 #persian_in_the_court_desc: "Provenendo dalle nostre radici, gran parte della nostra amministrazione si è basata per lungo tempo sulla lingua persiana. Unita alla varietà culturale della regione, ciò ha portato a una cooperazione rinnovata che trascende ogni barriera." #OLD ITA
 persian_in_the_court_desc: "Persian has served as our administrative language for quite some time, a legacy stemming from our ancient roots. This has helped us transcend the social and cultural barriers that often arise in highly diverse nations like ours." #NEW
 #persian_in_the_court_desc: "Hailing from our roots, much of our administration relied on the Persian language for quite some time. Combined with the cultural variety of the region, this has led to newfound cooperation that transcends barriers." #OLD ENG
 akinji_cavalry: "Akıncılar"
 #akinji_cavalry_desc: "La nostra cavalleria leggera spesso effettuava razzie nelle terre vicine e talvolta vi si stabiliva. Storicamente erano tra le prime unità a fronteggiare il nemico e colpivano le rotte commerciali per interrompere i rifornimenti e le comunicazioni. Noti per il loro coraggio, vivevano e operavano come razziatori sulle frontiere." #OLD ITA
 akinji_cavalry_desc: "Our light cavalry regiments often raid and sometimes even settle in neighboring territories. Known for their courage in battle, they lived and operated as raiders on the frontier, often the first line of response against incursions from our rivals and perfectly positioned to attack and rout enemy trade routes. " #NEW
 #akinji_cavalry_desc: "Our light cavalry would often go raid the neighboring lands and would sometimes even settle them. Historically, they were one of the first units to face the opposing military and would attack trading routes to cut the enemy's supply and transportation. Known for their courage in battle, they lived and operated as raiders on the frontiers." #OLD ENG
 crossroads_of_commerce: "Crocevia del Commercio"
 #crossroads_of_commerce_desc: "I nostri caravanserragli sostengono il flusso di commercio, informazioni e persone dalla Cina all'Europa attraverso le nostre terre. La ricchezza che attraversa i nostri territori costituisce un'attività estremamente redditizia." #OLD ITA
 crossroads_of_commerce_desc: "Our $caravanserais$ support the flow of commerce, information, and people from $china$ to $europe$ across our lands. This proximity to important trade routes has unleashed a flood of affluence throughout our nation." #NEW
 #crossroads_of_commerce_desc: "Our caravanserais are supporting the flow of commerce, information, and people from China to Europe across our lands. The coin and affluence that passes through our lands is a tremendously lucrative business." #OLD ENG
 fratricide_succesion_advance: "$fratricide_succesion$"
 fratricide_succesion_advance_desc: "$fratricide_succesion_desc$"
#Ruthenia
 flexible_loyalty: "Lealtà Flessibile"
 #flexible_loyalty_desc: "Il nostro Paese si trova a un crocevia tra le varie religioni d'Europa e tra molte forze che potrebbero minacciare il nostro popolo. Solo con un atteggiamento flessibile verso la cooperazione con le numerose bande mercenarie della regione potremo garantire la nostra sopravvivenza." #OLD ITA
 flexible_loyalty_desc: "Our nation is caught in a conflux between the warring religions of $europe$ and a variety of foreign threats. The only way we can ensure our survival in this storm is to take a flexible stance towards cooperating with local mercenary bands." #NEW
 #flexible_loyalty_desc: "Our Country lies at a crossroads between the various religions of Europe and plenty of forces who could endanger our people. Only with a flexible attitude to cooperation with the various mercenary bands of the region can we ensure our survival." #OLD ENG
 heritage_of_the_rus: "L'Eredità della Rus'"
 #heritage_of_the_rus_desc: "Le terre della Rus' si frantumarono in diversi stati, ma il ricordo dell'antico grande regno governato da Kyiv rimane forte nella nostra memoria. Se ci presenteremo come i sovrani di un tempo e metteremo in risalto il nostro legame con essi, costruiremo una tradizione solida per il nostro popolo." #OLD ITA
 heritage_of_the_rus_desc: "The lands of the Rus' shattered into fragmented states long ago, but the memory of our once-great empire, ruled from $kyiv$, burns brightly in us all. If we style ourselves in the old fashion, and highlight our connection to our ancestors, we will be able to carve out a distinctive set of traditions for our people." #NEW
 #heritage_of_the_rus_desc: "The lands of the Rus' shattered into several states, but the memory of the once great state ruled from Kyiv remains strong in our mind. If we similarly style ourselves in the fashion of the rulers of old and highlight our connection to them, we will carve a strong tradition for our people." #OLD ENG
 mother_of_russian_cities: "La Madre degli Stati della Rus'"
 #mother_of_russian_cities_desc: "Kyiv fu un tempo la splendida capitale di uno stato che si estendeva dalle foreste del nord di Novgorod fino alle rive del Mar Nero. Dopo le divisioni della Rus' e le invasioni mongole, di essa rimase ben poco. Qualunque cosa accada alle nostre città, ci assicureremo che si riprendano e prosperino per i secoli a venire." #OLD ITA
 mother_of_russian_cities_desc: "$kyiv$ was once the shining capital of a great empire spanning from the northern forests of $novgorod$ to the southern shores of the Black Sea. After suffering the dissolution of the Rus' and the invasions of the Mongols, little remained of it. But the time has come for our revival, and no matter what our cities have endured, we vow that they will recover and prosper for centuries to come!" #NEW
 #mother_of_russian_cities_desc: "Kyiv was once the shining capital of a great state spanning from the northern forests of Novgorod to the southern shores of the Black Sea. After suffering in the dissolution of the Rus' and the invasions of the Mongols, little remained of it. No matter what our cities will endure, we will ensure that they recover and prosper for centuries to come." #OLD ENG
 international_influences: "Influenze Straniere"
 #international_influences_desc: "Molti mercanti e viaggiatori stranieri percorrono le nostre strade, portando prosperità e ricchezza nelle nostre terre. Potremmo convincerne alcuni a stabilirsi permanentemente nelle nostre città se garantiamo protezione alla loro fede." #OLD ITA
 international_influences_desc: "Many foreign merchants and travelers frequent our roads, bringing vast wealth to our land. We could convince some of these avid traders to permanently settle in our towns and cities, if we assure them they will not face persecution for their beliefs." #NEW
 #international_influences_desc: "Many foreign merchants and travelers frequent our roads, bringing prosperity and wealth to our lands. We could convince some of these to permanently settle in our towns and cities if we grant their faith protection." #OLD ENG
 reuniting_rus: "Riunificare la Rus'"
 #reuniting_rus_desc: "Siamo i veri eredi della Rus' di Kyiv e queste terre devono essere riunite sotto il nostro vessillo!" #OLD ITA
 reuniting_rus_desc: "We are the true heir of the Kievan Rus', and those lands must be reunited under our banner!" #NEW
 #reuniting_rus_desc: "We are the true heir of the Kievan Rus' and the lands must be reunited under our banner!" #OLD ENG
 united_faith: "Una Fede Unita"
 #united_faith_desc: "Qualunque sia la nostra situazione, dobbiamo garantire l'unità della nostra fede. Solo se il nostro clero sarà allineato e non esisteranno discordie tra le fazioni dei fedeli, potranno concentrarsi sul loro ruolo primario: guidare e sostenere il nostro popolo." #OLD ITA
 united_faith_desc: "No matter our situation, we must ensure the unity of our faith. Only if our clergy is aligned, and no discord exists between factions of the faithful, will they be able to focus on their primary function of guiding and aiding our population." #NEW
 #united_faith_desc: "No matter our situation, we must ensure the unity of our faith. Only if our clergy is aligned and no discord exists between factions of the faithful, they will be able to focus on their primary functions to guide and assure our population." #OLD ENG
 east_and_west: "Tra Oriente e Occidente"
 #east_and_west_desc: "La nostra posizione geografica tra gli stati dell'est e dell'ovest ha offerto ai nostri mercanti l'opportunità di essere intermediari nelle rotte commerciali estremamente redditizie della regione." #OLD ITA
 east_and_west_desc: "Our strategic position between eastern and western empires has given our merchants the opportunity to act as essential middlemen for lucrative regional trade routes." #NEW
 #east_and_west_desc: "Our geographic location between the states of the east and the west provided our merchants with an opportunity to be the middlemen in the extremely lucrative trade routes of the region." #OLD ENG
 #ruthenian_state_advance: "Uno Stato Ruteno" #OLD ITA
 ruthenian_state_advance: "A $UKR_ADJ$ State" #NEW
 #ruthenian_state_advance: "A Ruthenian State" #OLD ENG
 #ruthenian_state_advance_desc: "In passato ci siamo piegati a influenze straniere e abbiamo dovuto adattarci alle usanze altrui per mantenere rapporti amichevoli. Ma con i tempi che cambiano, dobbiamo riaffermare le nostre tradizioni, per non rischiare di cadere nuovamente nella sfera d'interesse degli altri." #OLD ITA
 ruthenian_state_advance_desc: "In the past, we bowed to foreign influences, and were obliged to adapt to their customs to ensure friendly relations. But times have changed, and now we must affirm our own customs, or risk falling into the sphere of foreign influences again." #NEW
 #ruthenian_state_advance_desc: "In the past, we bowed to foreign influences and had to adapt to the customs of others to ensure friendly relations. But with the changing times, we will have to affirm our own customs to not risk falling into the sphere of the interests of others again." #OLD ENG
 #ruthenian_rural_buildings: "I Villaggi Ruteni" #OLD ITA
 ruthenian_rural_buildings: "$UKR_ADJ$ Villages" #NEW
 #ruthenian_rural_buildings: "The Ruthenian Villages" #OLD ENG
 #ruthenian_rural_buildings_desc: "La Rutenia è una terra vasta e rurale. E mentre le nostre grandi città come Kyiv svolgono un ruolo essenziale, non possiamo trascurare le zone remote dei piccoli villaggi che forniscono cibo e materie prime vitali per la nostra economia." #OLD ITA
 ruthenian_rural_buildings_desc: "Much of $ruthenia_region$ is rural, empty land. While our great cities like $kyiv$ serve many important purposes, we cannot neglect the remote lands or small villages that provide us with crucial supplies of food and raw materials." #NEW
 #ruthenian_rural_buildings_desc: "Ruthenia is a vast and rural land. And while our great cities in the like of Kyiv serve an important purpose, we can not neglect the remote lands of small villages that provide our economy with the vital supply of food and raw materials." #OLD ENG
 #ruthenia_commoner_education: "Istruzione per Tutti i Ruteni" #OLD ITA
 ruthenia_commoner_education: "Education for All $UKR_ADJ$ People" #NEW
 #ruthenia_commoner_education: "Education For All Ruthenians" #OLD ENG
 #ruthenia_commoner_education_desc: "Fondando scuole locali, garantiremo che la popolazione sia istruita attraverso tutti i ceti sociali." #OLD ITA
 ruthenia_commoner_education_desc: "By establishing local schools, we will ensure that our population is well-educated at all levels of society." #NEW
 #ruthenia_commoner_education_desc: "By establishing local schools, we will ensure that our population will be well-educated through all social ranks." #OLD ENG

 #Cossacks
 cossack_raids: "Razzi dei Cosacchi"
 #cossack_raids_desc: "I nostri cosacchi vivono in uno stato di guerra quasi permanente e hanno adottato tattiche di razzia e saccheggio simili a quelle delle orde. Sebbene ciò non procuri loro molti amici, è certamente un modo efficace per arricchire ulteriormente le nostre casse." #OLD ITA
 cossack_raids_desc: "Our Cossacks live in a near-permanent state of war, and have adopted pillaging and raiding tactics similar to those of the $MGE_ADJ$ hordes. Although that will surely not earn us many friends, it will decidedly enrich our coffers." #NEW
 #cossack_raids_desc: "Our cossacks are people that live in an almost-permanent state of war, and have adopted tactics of raiding and pillaging similar to those of the hordes. Although that will surely not earn them many friends, it is a certain way to further enrich our coffers." #OLD ENG
 tamed_steppes: "Steppe Domate"
 #tamed_steppes_desc: "Sebbene molti ritengano le steppe terre inospitali e poco redditizie, i nostri cosacchi si sono adattati a questo ambiente duro, riuscendo non solo a sopravvivere ma persino a prosperare. Grazie a loro, possiamo sfruttare queste terre e trarne beneficio." #OLD ITA
 tamed_steppes_desc: "Although most people would qualify the steppes as inhospitable and even worthless land, our Cossacks have adapted to the harsh environment, and are able not only to survive but to thrive in the wilderness. Thanks to their expertise, we are able to exploit those lands and benefit from them." #NEW
 #tamed_steppes_desc: "Although most people would qualify the steppes as inhospitable and unprofitable land, our cossacks have adapted to such harsh environment and are able not only to survive but to thrive in. Thanks to them, we are able to exploit those lands and benefit from them." #OLD ENG
 #cossacks_recruitment: "Reclutamento dei Cosacchi" #OLD ITA
 cossacks_recruitment: "Cossack Recruitment" #NEW
 #cossacks_recruitment: "Cossacks Recruitment" #OLD ENG
 #cossacks_recruitment_desc: "I cosacchi sono guerrieri formidabili e la loro abilità nel sopravvivere nelle dure terre delle steppe è quasi imparagonabile. Nel nostro stato e nel nostro esercito possono costituire una forza d'élite che garantirà il nostro dominio sulle steppe." #OLD ITA
 cossacks_recruitment_desc: "The Cossacks are fearsome warriors, and their skill in surviving in the unforgiving wilderness of the steppes is almost unmatched. There is a place for them in our state as well as our military, as an elite force that will enforce our lordship over the steppes." #NEW
 #cossacks_recruitment_desc: "The Cossacks are fearsome warriors and their skill in surviving in the harsh lands of the steppes is almost unmatched. In our state and army, they can find a place as an elite force that will ensure our overlordship over the steppes." #OLD ENG
 cossacks_escaped_serfs: "Servi Fuggiti"
 #cossacks_escaped_serfs_desc: "Molti cosacchi erano nati come servi della gleba. Stanchi dell'oppressione feudale, fuggirono dai loro padroni in cerca di una vita libera nelle steppe. Dobbiamo continuare ad accogliere i servi fuggitivi nella nostra società." #OLD ITA
 cossacks_escaped_serfs_desc: "Many Cossacks were born into serfdom. Tired of feudal oppression, they fled their masters, and sought lives of freedom on the steppes. We must continue to welcome these escaped serfs into our society." #NEW
 #cossacks_escaped_serfs_desc: "Many among the Cossacks were born into serfdom. Tired of feudal oppression, they fled their masters and sought lives of freedom on the steppes. We must continue to welcome escaped serfs into our society." #OLD ENG
 cossacks_hetmanate: "Etmanato Cosacco"
 #cossacks_hetmanate_desc: "Tra i cosacchi non vi sono re né khan. Sono guidati dall'atamano, il loro più alto comandante militare, ma negli affari dello stato egli è semplicemente il primo tra pari. Il potere politico risiede nella Rada, l'assemblea legislativa e militare in cui ogni cosacco può esprimersi." #OLD ITA
 cossacks_hetmanate_desc: "There are no kings or khans among the Cossacks. They are led by the #italic ataman#!, who is their highest military commander, but in matters of state and society simply the first among equals. Political power lies in the Rada, the legislative and military assembly, in which all Cossacks can have their say." #NEW
 #cossacks_hetmanate_desc: "There are no kings or khans among the Cossacks. They are led by the ataman, which is their highest military commander, but in matters of state and society simply the first among equals. Political power lies in the Rada, the legislative and military assembly, in which all Cossacks can have their say." #OLD ENG
 cossack_administration: "Amministrazione Cosacca"
 #cossack_administration_desc: "Concedendo ai nostri leader cosacchi un duplice ruolo di generali e amministratori, potremo rendere più efficiente il reclutamento nell'esercito e garantire standard elevati per l'addestramento." #OLD ITA
 cossack_administration_desc: "By granting our Cossack leaders dual roles as both generals and administrators, we will be able to streamline army recruitment, and ensure a high training standard." #NEW
 #cossack_administration_desc: "By granting our Cossack leaders a dual role of generals and administrators we will be able to streamline the recruitment of men into our army and ensure a high standard for their training." #OLD ENG
 steppe_riders: "Cavalieri delle Steppe"
 #steppe_riders_desc: "Le steppe sono un luogo peculiare e insidioso, e quando arriva il momento di morire, le possibilità sono infinite se si è senza cavallo. Nell'Oceano di Erba Infinito, il cavallo cessa di essere un semplice animale o una proprietà e diventa davvero parte del proprio corpo. Così come non si può vivere senza cuore o fegato, nelle steppe non si sopravvive senza un cavallo." #OLD ITA
 steppe_riders_desc: "The steppes are a peculiar and treacherous place to live. When you enter the Endless Sea of Grass, your horse stops being an animal or piece of property, and truly becomes a part of you. Just as your body cannot survive without a heart or a liver, in the steppes it certainly will not survive without a horse. But the good news is that those who find themselves in that situation will find countless interesting ways to perish..." #NEW
 #steppe_riders_desc: "The Steppe is a peculiar and treacherous place to live and when it comes to dying, the variety of choices is endless when you are horseless. When you enter the Endless Sea of Grass, your horse stops being an animal or piece of property, and truly becomes a part of you. Just as your body cannot survive without a heart or a liver, in the steppes it certainly will not survive without a horse." #OLD ENG
 cossacks_exploration_advance: "Esplorazione Cosacca"
 #cossacks_exploration_advance_desc: "I nostri cosacchi vivono ai confini del nostro paese. Ciò li rende ottimi candidati come esploratori, in grado di spingersi oltre i nostri confini, esplorare terre sconosciute, cercare nuovi paesi e nuove civiltà, osando andare dove nessuno è mai giunto prima." #OLD ITA
 cossacks_exploration_advance_desc: "Our Cossacks live at the edges of our country, making them excellent candidates to serve as explorers and go beyond our borders to the final frontier, to explore strange new lands, to seek out new countries and new civilizations, to boldly go where no one has gone before..." #NEW
 #cossacks_exploration_advance_desc: "Our Cossacks live at the edges of our country. This makes them excellent candidates to serve as explorers and go beyond our borders to the final frontier, to explore strange new lands, to seek out new countries and new civilizations, to boldly go where no one has gone before." #OLD ENG
 cossacks_military_society: "Società Militare"
 #cossacks_military_society_desc: "Tra i cosacchi quasi non esiste distinzione tra società civile e militare. Essi costituiscono un'Ospitalità (Host), definita dal suo popolo più che dalle sue terre, e questo popolo è fatto di guerrieri. Dobbiamo assicurarci che le divisioni militari rispondano adeguatamente alle nostre necessità amministrative man mano che l'Host si espande." #OLD ITA
 cossacks_military_society_desc: "There is almost no division between civil and military society among the Cossacks. They are a host, defined by their people rather than by the land they control, and their people are warriors. We must ensure that military divisions properly meet our administrative needs as the host expands." #NEW
 #cossacks_military_society_desc: "There is almost no division between civil and military society among the Cossacks. They are a Host, defined by their people rather than by the land they control, and their people are warriors. We must ensure that military divisions properly meet our administrative needs as the Host expands." #OLD ENG
 #cossacks_serf_autonomy: "Autonomia dei Servi Cosacchi" #OLD ITA
 cossacks_serf_autonomy: "Cossack Serf Autonomy" #NEW
 #cossacks_serf_autonomy: "Cossacks Serf Autonomy" #OLD ENG
 #cossacks_serf_autonomy_desc: "Nessun uomo deve subire tirannia tra i cosacchi. Quando conquistiamo nuovi territori, i servi, i contadini e gli schiavi che vi abitano possono essere trattati come pari ai nostri cosacchi." #OLD ITA
 cossacks_serf_autonomy_desc: "No man should suffer tyranny among the Cossacks. When we conquer new territories, the serfs, peasants, and slaves there will be treated as equals to our own people." #NEW
 #cossacks_serf_autonomy_desc: "No man should suffer tyranny among the Cossacks. When we conquer new territories, the serfs, peasants, and slaves there can be treated as equals to our own Cossacks." #OLD ENG
 cossacks_colonization_advance: "Colonizzazione Cosacca"
 #cossacks_colonization_advance_desc: "I nostri cosacchi sono già abituati a muoversi liberamente oltre i nostri confini. Possiamo impiegarli per avanzare nuovi insediamenti e così espandere la nostra influenza su terre ancora non rivendicate." #OLD ITA
 cossacks_colonization_advance_desc: "Our Cossacks are already used to roaming freely and going beyond our borders. We can use them to advance further settlement, and thus expand our influence to those unclaimed lands." #NEW
 #cossacks_colonization_advance_desc: "Our Cossacks are already used to roaming freely and going beyond our borders. We can use them to advance further settlements and thus expand our influence to those unclaimed lands." #OLD ENG
 cossacks_registered: "Registri dei Cosacchi"
 #cossacks_registered_desc: "Con l'aumento delle file cosacche, dobbiamo tenere traccia della forza di ciascun reggimento, dei suoi numeri e del suo equipaggiamento. Un registro centralizzato ci permetterà di sostenere adeguatamente tutti i cosacchi." #OLD ITA
 cossacks_registered_desc: "As the ranks of our Cossacks swell, we must keep account of the strength of each regiment, their numbers, and how well they are supplied. A centralized registry will allow us to support the needs of all Cossacks." #NEW
 #cossacks_registered_desc: "As the ranks of our Cossacks swell, we must keep account of the strength of each regiment, their numbers and how well they are supplied. A centralized registry will allow us to support the needs of all Cossacks." #OLD ENG
 #cossack_reputation: "Reputazione Cosacca" #OLD ITA
 cossack_reputation: "Fearsome Reputation" #NEW
 #cossack_reputation: "Cossack Reputation" #OLD ENG
 #cossack_reputation_desc: "I nostri cosacchi si sono già costruiti una reputazione di guerrieri feroci. Questo, da solo, basta a instillare il terrore nei cuori dei nostri nemici quando si trovano ad affrontarli in battaglia." #OLD ITA
 cossack_reputation_desc: "Our Cossacks have already built for themselves a reputation of fierce warriors. That in itself is enough to instill fear in the hearts of our enemies when they have to face them in battle." #NEW
 #cossack_reputation_desc: "Our Cossacks have already built for themselves a reputation of fierce warriors. That in on itself is enough to instill fear in the hearts of our enemies when they have to face them in battle." #OLD ENG

 #Georgian culture
 geo_georgian_highlands: "Altopiani $GEO_IT_ADJ_MP$"
 #geo_georgian_highlands_desc: "Le terre della $GEO$ sono incastonate tra le montagne del Caucaso, e nessuna potenza straniera ha mai trovato semplice penetrare nei nostri territori. La nostra tenacia e resilienza sono leggendarie." #OLD ITA
 geo_georgian_highlands_desc: "The lands of $GEO$ are nestled among the Caucasus Mountains, and no foreign power has ever found it easy to penetrate our territory. Our tenacity and resilience are legendary." #NEW
 #geo_georgian_highlands_desc: "The lands of $GEO$ are nestled among the Caucasus Mountains, and no foreign power has found it ever easy to penetrate into our lands. Our tenacity and resilience are legendary." #OLD ENG
 geo_georgian_script: "Scrittura $georgian_culture$"
 #geo_georgian_script_desc: "L'alfabeto $georgian_culture$, creato secoli fa, non è uno solo, bensì tre: il Mkhedruli, usato dall'amministrazione civile, e l'Asomtavruli e Nuskhuri, utilizzati dalla nostra Chiesa. In questo modo le Sacre Scritture restano indipendenti dalla lingua laica, pur rimanendo accessibili al nostro popolo." #OLD ITA
 geo_georgian_script_desc: "The '$georgian_culture$ alphabet', created centuries ago, is not just one alphabet, but in fact three. #italic Mkhedruli#! is the script used by the civil administration, while #italic Asomtavruli#! and #italic Nuskhuri#! is used by our church. As such, our Holy Scriptures can remain uninfluenced by the lay language, while our people can still feel connected to them." #NEW
 #geo_georgian_script_desc: "The $georgian_culture$ alphabet, created centuries ago, is not just one alphabet, but in fact three. Mkhedruli is the one used by the civil administration, while Asomtavruli and Nuskhuri is used by our Church. As such, our Holy Scriptures can remain uninfluenced by the lay language, while our people can still feel connected to them." #OLD ENG
 geo_georgian_isolation: "Isolamento $GEO_ADJ$"
 #geo_georgian_isolation_desc: "Circondati da potenti stati di diverse religioni e culture, siamo costretti a praticare una diplomazia opportunistica e a cambiare spesso alleanze per compiacere tutti e preservare la pace il più a lungo possibile." #OLD ITA
 geo_georgian_isolation_desc: "Surrounded by powerful countries with vastly different religions and cultures from ours, we are forced to use opportunistic diplomacy, and often change allegiances in order to appease everyone and preserve peace for as long as possible." #NEW
 #geo_georgian_isolation_desc: "Surrounded by powerful countries of different religion and culture, we are forced to use opportunistic diplomacy and often change allegiances in order to appease everyone and preserve peace for as long as it is possible." #OLD ENG
 geo_legacy_of_saint_nino: "Eredità di Santa Nino"
 #geo_legacy_of_saint_nino_desc: "$GEO$ possiede una delle più antiche chiese cristiane del mondo, risalente alla cristianizzazione della regione da parte di Santa Nino oltre mille anni fa. Nei secoli la Chiesa $GEO_ADJ$ è stata una forza unificante contro influenze bizantine, mongole e musulmane. Con pochi altri regni cristiani nella regione e con le divisioni interne del $GEO$, essa continua ad avere un ruolo centrale." #OLD ITA
 geo_legacy_of_saint_nino_desc: "$GEO$ has one of the oldest $christian_ADJ$ churches in the world, tracing its roots back to the conversion of the region by Saint Nino over a millennium ago. Through the centuries, the $GEO_ADJ$ Church has served as an increasingly unifying force in all $GEO_ADJ$ states, and has served as a central element in $GEO_ADJ$ culture in the face of $BYZ_ADJ$, $MGE_ADJ$, and $muslim_ADJ$ influence. With few other $christian_ADJ$ kingdoms left in this region, and given the splintered loyalties within $GEO$, the Church still plays an important role as a unifying force against outsiders." #NEW
 #geo_legacy_of_saint_nino_desc: "$GEO$ has one of the oldest Christian churches in the world, tracing its roots back to the Christianization of the region by Saint Nino, over a millennium ago. Through the centuries, the $GEO_ADJ$ Church has served as an increasingly unifying force in all $GEO_ADJ$ state, and it has served as a central element in $GEO_ADJ$ culture, in the face of $BYZ_ADJ$ as well as Mongol or Muslim influence. With few other Christian kingdoms left in this region and with the splintered loyalties within $GEO$, the Church still has an important role to play as a unifying force against outsiders." #OLD ENG
 geo_restoration_of_fortresses_and_churches: "Restauro di Fortezze e Chiese"
 #geo_restoration_of_fortresses_and_churches_desc: "Le nostre numerose fortezze e chiese hanno permesso al nostro paese di resistere e sopravvivere a molte influenze straniere. Le fortezze proteggono le nostre terre, mentre le chiese proteggono il nostro spirito. Dobbiamo mantenerle in condizioni eccellenti." #OLD ITA
 geo_restoration_of_fortresses_and_churches_desc: "Our many fortresses and churches have helped our country to resist and continue to survive among encroaching foreign influences. Our fortresses protect the land while our churches protect our spirit, and we must keep both in prime condition if we are to thrive." #NEW
 #geo_restoration_of_fortresses_and_churches_desc: "Our many fortresses and churches is what has allowed our country to resist and continue to survive among many foreign influences. Our fortresses protect our lands while our churches protect our spirit. We need to keep both in prime condition if we are to succeed." #OLD ENG
 geo_sadrosho_districts: "Distretti Sadrosho"
 #geo_sadrosho_districts_desc: "I Sadrosho (stendardi) sono distretti militari speciali usati per la mobilitazione. Dividendo il territorio in più Sadrosho, ciascuno sotto un proprio ufficiale militare, potremo organizzare meglio il reclutamento e la distribuzione delle truppe." #OLD ITA
 geo_sadrosho_districts_desc: "#italic Sadrosho#!, banners, are special military districts used for mobilization purposes. By dividing our territory into several sadrosho, each under the command of their own dedicated military official, we can better organize the recruitment and distribution of all our troops." #NEW
 #geo_sadrosho_districts_desc: "Sadrosho (banners) are special military districts used for mobilization purposes. By dividing our territory in several Sadrosho, each under the command of their own specific military official, we can better organize the recruitment and distribution of troops for all our army." #OLD ENG
 geo_dasturlamali: "Dasturlamali"
 #geo_dasturlamali_desc: "$GEO$ ha vissuto un periodo tumultuoso negli ultimi secoli dall'invasione mongola. A volte diviso e con un crescente potere dei nobili locali, il vecchio sistema feudale $GEO_ADJ$ è stato in parte superato. Il $geo_dasturlamali$, un solido corpus di regole e obblighi tra sudditi, nobili, re e stato, funge da base per i nostri organi legali e migliora l'ordine interno." #OLD ITA
 geo_dasturlamali_desc: "$GEO$ has experienced tumultuous centuries since the $MGE_ADJ$ invasion, marked by periodic division, shifting external pressures, and the rising influence of the local nobility. The old $GEO_ADJ$ feudal system has been made obsolete, or at least partially discarded. The $geo_dasturlamali$, a comprehensive set of rules and guidelines detailing the obligations of subjects and nobles toward king and state, strengthens internal order and serves as the foundation for our kingdom's legal framework." #NEW
 #geo_dasturlamali_desc: "$GEO$ has gone through a tumultuous time over the last centuries since the Mongol invasion. At times divided and with an increasing influence of local nobles, and changing outside pressure, the old $GEO_ADJ$ Feudal system has been de facto made obsolete in some ways, or at least been partially discarded. The $geo_dasturlamali$, a solid work of rules, guidelines, and regulations, detailing the obligations of subjects and nobles towards the king and the state, serves as a foundation for the legal bodies of our kingdom and improves internal order." #OLD ENG
 geo_georgian_embassies: "Ambasciate $GEO_IT_ADJ_FP$"
 #geo_georgian_embassies_desc: "Abbiamo una tradizione consolidata nell'instaurare frequenti e solide relazioni diplomatiche con tutte le nazioni vicine, a prescindere dalle differenze. I nostri diplomatici sono quindi sempre ben accolti e rispettati." #OLD ITA
 geo_georgian_embassies_desc: "We have a tradition of establishing strong diplomatic ties with all nations around us, regardless of our possible differences. As a result, our diplomats are always well received and respected." #NEW
 #geo_georgian_embassies_desc: "We have a tradition of establishing frequent and powerful diplomatic ties with all nations around us, regardless of our possible differences. As such, our diplomats are always well received and respected." #OLD ENG
 geo_georgian_unification: "Unificazione $GEO_ADJ$"
 #geo_georgian_unification_desc: "$GEO$ è stato diviso in passato, sia da influenze straniere che da cause interne. Ma il nostro popolo $GEO_ADJ$, orgoglioso e determinato, è pronto a combattere affinché $GEO$ non sia mai più diviso." #OLD ITA
 geo_georgian_unification_desc: "$GEO$ has been divided in the past, both by foreign influences and internal causes. But the patriotic $GEO_ADJ$ people are more than willing to fight to ensure that $GEO$ is never divided again." #NEW
 #geo_georgian_unification_desc: "$GEO$ has seen itself divided in the past, both by foreign influences and internal causes. But our proud $GEO_ADJ$ people are more than willing to fight to ensure that $GEO$ is never divided again." #OLD ENG

 #Georgia Specific
 geo_legacy_of_saint_george: "Eredità di San Giorgio"
 #geo_legacy_of_saint_george_desc: "La nostra associazione con il leggendario San Giorgio è ben nota sia nel mondo cristiano che in quello musulmano. Così come egli affrontò coraggiosamente e uccise il terribile drago, così i nostri soldati affronteranno i nostri nemici in battaglia." #OLD ITA
 geo_legacy_of_saint_george_desc: "Our association with the legendary Saint George is well known through both the $christian_ADJ$ and $muslim_ADJ$ worlds. As he bravely faced and slew the fearsome dragon, so will our soldiers face our enemies in battle." #NEW
 #geo_legacy_of_saint_george_desc: "Our association with the legendary Saint George is well known through both the Christian and Muslim worlds. As he bravely faced and slew the fearsome dragon, so will our soldiers face our enemies in battle." #OLD ENG
 geo_bagrationi_dynasty: "Dinastia $Bagrationi$"
 geo_bagrationi_dynasty_desc: "Una dinastia così antica che le sue origini sono avvolte nel mistero; re e regine della casa dei $Bagrationi$ hanno governato $GEO$ sin dal IX secolo, prima come principi e poi come monarchi."
 geo_georgian_golden_age: "Età d'Oro $GEO_IT_ADJ_FS$"
 #geo_georgian_golden_age_desc: "$GEO$ conobbe un'Età d'Oro culturale e religiosa che fu interrotta bruscamente dalle invasioni mongole. Quel periodo ci consegnò i migliori esempi delle realizzazioni culturali della nostra nazione, e ora lo rivivremo, raggiungendo traguardi ancora maggiori." #OLD ITA
 geo_georgian_golden_age_desc: "$GEO$ enjoyed a cultural and religious Golden Age that was brought to a sudden stop, due to the $MGE_ADJ$ invasions. That period witnessed the peak of our cultural achievements, but we will now return to it, and achieve even greater heights." #NEW
 #geo_georgian_golden_age_desc: "$GEO$ enjoyed a cultural and religious Golden Age that was brought to a sudden stop due to the invasions of the Mongols. That period gave us the best examples of cultural achievements of our nation, and now we will relieve it and even achieve greater heights." #OLD ENG
 geo_legacy_of_tamar: "Eredità di Tamar"
 #geo_legacy_of_tamar_desc: "Tamar fu una delle più grandi sovrane che la nostra nazione abbia mai avuto. I suoi successi militari e culturali divennero leggendari, e il solo pronunciamento del suo nome suscita ancora riverenza in tutti i cuori $georgian_culture$." #OLD ITA
 geo_legacy_of_tamar_desc: "Tamar was one of the greatest rulers our nation ever had. Her military and cultural successes are legendary, and the mere utterance of her name still stirs reverence in all $GEO_ADJ$ hearts." #NEW
 #geo_legacy_of_tamar_desc: "Tamar was one of the greatest rulers our nation ever had. Her military and cultural successes became legendary, and the utterance of her name still stirs reverence in all $georgian_culture$ hearts." #OLD ENG
 geo_david_the_builder: "Davit il Costruttore"
 #geo_david_the_builder_desc: "Considerato tuttora il più grande sovrano della storia del nostro paese, il re Davit il Costruttore portò $GEO$ al suo massimo splendore. Lo edificò come un regno potente, culturalmente influente e un faro per il cristianesimo e per il popolo $georgian_culture$." #OLD ITA
 geo_david_the_builder_desc: "Considered the greatest ruler in the history of our country, King Davit the Builder brought $GEO$ to its pinnacle. He built a powerful, culturally influential kingdom, and a beacon for $christian$ and the $GEO_ADJ$ people." #NEW
 #geo_david_the_builder_desc: "Still to this day considered the greatest ruler in the history of our country, king Davit the Builder brought $GEO$ to the greatest heights. He built it as a powerful, culturally influential kingdom, and a beacon for Christianity and the $georgian_culture$ people." #OLD ENG
 geo_georgian_titles: "Titoli $GEO_IT_ADJ_MP$"
 #geo_georgian_titles_desc: "'Re dei Re, forte e invincibile, maestoso e protettore del sacro regno degli Abkhazi, Iberi, Rani, Kakheti, Armeni, Shahanshah e Shirvanshah, dell'Est e dell'Ovest, del Sud e del Nord, di entrambi i paesi, di due troni e corone, sovrano divino e dominatore del trono.' I titoli del nostro sovrano sono molti, e tutti a corte devono rispettarli." #OLD ITA
 geo_georgian_titles_desc: "'King of Kings, strong and invincible, majestic and protector of the holy kingdom of the Abkhazians, Iberians, Ranis, Kakhetians, Armenians, Shahanshah and Shirvanshah, of the East and the West, of the South and the North, of both countries, of two thrones and crowns, the godlike Suzerain and the Sovereign of the Throne.' The titles of our ruler are numerous, and all at court shall respect them!" #NEW
 #geo_georgian_titles_desc: "'King of Kings, strong and invincible, majestic and protector of the holy kingdom of the Abkhazians, Iberians, Ranis, Kakhetians, Armenians, Shahanshah and Shirvanshah, of the East and the West, of the South and the North, of both countries, of two thrones and crowns, the godlike Suzerain and the Sovereign of the throne.' The titles of our ruler are many, and all at court shall respect them." #OLD ENG
 geo_georgian_numismatics: "Numismatica $GEO_ADJ$"
 #geo_georgian_numismatics_desc: "Il nostro paese ha una grande tradizione di coniazione, incidendo le monete non solo in $georgian_language$ ma anche in $arabic_language$ e $persian_language$, poiché fungono da lingue franche per il commercio attraverso il nostro territorio e quello dei nostri vicini." #OLD ITA
 geo_georgian_numismatics_desc: "Our country has a rich tradition of minting coins, inscribing them not only in $georgian_language$ but also in $arabic_language$ and $persian_language$, as they serve as currency for trade through our country and those that neighbor us." #NEW
 #geo_georgian_numismatics_desc: "Our country has a great tradition of minting coins, inscribing them not only in $georgian_language$ but also in $arabic_language$ and $persian_language$, as they serve as linguae francae for trade through our country and our neighbors." #OLD ENG
 #geo_beacon_of_christianity: "Faro del Cristianesimo" #OLD ITA
 geo_beacon_of_christianity: "Beacon of $christian$" #NEW
 #geo_beacon_of_christianity: "Beacon of Christianity" #OLD ENG
 #geo_beacon_of_christianity_desc: "$GEO$ è un simbolo del cristianesimo nel Caucaso da secoli, anche dopo essere stato circondato e isolato da seguaci dell'Islam. L'ardente fede del nostro popolo è fonte d'ispirazione per tutti i fratelli nella fede." #OLD ITA
 geo_beacon_of_christianity_desc: "$GEO$ has been a haven for $christian$ in the Caucasus for centuries, even after being surrounded and isolated by followers of $muslim$. The ardent faith of our people is a source of inspiration for all our religious brethren." #NEW
 #geo_beacon_of_christianity_desc: "$GEO$ has been a symbol for Christianity in the Caucasus for centuries, even after being surrounded and isolated by followers of Islam. The ardent faith of our people is a source of inspiration for all our brethren." #OLD ENG
 geo_georgian_principalities: "Principati $GEO_IT_ADJ_MP$"
 #geo_georgian_principalities_desc: "L'amministrazione del nostro territorio è suddivisa in molti principati e domini diversi. Questa delega dell'autorità ci permette di esercitare il nostro potere in modo più efficace." #OLD ITA
 geo_georgian_principalities_desc: "Our regional administration is divided into many different principalities and territories. Delegating authority this way allows us to exert our rule more effectively." #NEW
 #geo_georgian_principalities_desc: "The administration of our territory is divided into many different principalities and territories. This delegation of authority allows us for a more effective exertion of our rule." #OLD ENG
 geo_georgian_resilience: "Resilienza $GEO_IT_ADJ_FS$"
 #geo_georgian_resilience_desc: "Il nostro paese è stato più volte lacerato da influenze esterne e interne nella sua lunga storia. Tuttavia, come una fenice risorgente, è sempre tornato dalle ceneri affermandosi come una presenza con cui fare i conti. La resilienza del nostro popolo è encomiabile." #OLD ITA
 geo_georgian_resilience_desc: "Our country has been torn apart, by external and internal influences, more than once in its long history. However, like the phoenix of legend, it has risen from the ashes and established itself as a presence to reckon with each time. The resilience of our people is commendable." #NEW
 #geo_georgian_resilience_desc: "Our country has seen itself torn apart, both by external and internal influences, more than once in its long history. However, like a rising phoenix it has kept coming back from the ashes and establishing itself as a presence to reckon with. The resilience of our people is commendable." #OLD ENG

 #Samtskhe
 #sme_jaqeli_dynasty: "Dinastia $Jaqeli$" #OLD ITA
 sme_jaqeli_dynasty: "$jaqeli_dynasty$ Dynasty" #NEW
 #sme_jaqeli_dynasty: "$Jaqeli$ Dynasty" #OLD ENG
 #sme_jaqeli_dynasty_desc: "Nonostante umili origini, la dinastia dei $Jaqeli$ è riuscita a stabilire molti contatti importanti, legandosi a re ed imperatori attorno a noi. Così, la nostra posizione nella sfera diplomatica è considerata favorevolmente." #OLD ITA
 sme_jaqeli_dynasty_desc: "Despite its humble origins, the $jaqeli_dynasty$ dynasty has been able to establish many successful relationships, forging strong ties to the rulers of surrounding states. As such, we have a positive reputation in the diplomatic sphere." #NEW
 #sme_jaqeli_dynasty_desc: "Despite humble origins, the $Jaqeli$ dynasty has been able to establish many successful contacts, tying itself to kings and emperors around us. As such, our standing in the diplomatic sphere is positively regarded." #OLD ENG
 sme_atabegs_of_samtskhe: "Atabeg di $SME$"
 #sme_atabegs_of_samtskhe_desc: "Non siamo semplicemente una parte del Regno di $GEO$: molto tempo fa ricevemmo il riconoscimento reale e, con esso, il titolo di Atabeg. Tale titolo era stato concesso solo ai vassalli armeni, ed è prova della distinzione e del rispetto che il sovrano $GEO_ADJ$ nutre nei nostri confronti." #OLD ITA
 sme_atabegs_of_samtskhe_desc: "We are not just one part of the Kingdom of $GEO$, as a long time ago we received royal recognition and, with it, the title of Atabeg. This title had previously been granted only to the Armenian vassals, and therefore its conveyance is a sign of distinction and of the respect that the $GEO_ADJ$ monarch has for us." #NEW
 #sme_atabegs_of_samtskhe_desc: "We are not just one part of the Kingdom of $GEO$, as a long time ago we received royal recognition and, with it, the title of Atabeg. Such title had before been granted only to the Armenian vassals, and it is a sign of distinction and of the respect that the $GEO_ADJ$ monarch has for us." #OLD ENG
 sme_proactive_diplomacy: "Diplomazia Proattiva"
 #sme_proactive_diplomacy_desc: "Pur facendo parte di $GEO$, $SME$ è stato ampiamente indipendente nella sua amministrazione e nelle sue decisioni. Ciò ha richiesto costante attenzione alla politica in $GEO$ e alla diplomazia attiva con i grandi imperi confinanti. I nostri sovrani si sono sempre assicurati un contatto diretto con chi deteneva più potere. Allo stesso modo, siamo intervenuti quando necessario nelle politiche interne del regno di $GEO$, partecipando a lotte di successione o alleandoci con la dinastia reale quando ci conveniva. Dobbiamo mantenere questa tradizione, poiché il futuro del nostro piccolo stato dipende da essa. Non si dica mai che abbiamo fatto troppo poco o agito senza sufficiente saggezza." #OLD ITA
 sme_proactive_diplomacy_desc: "While still a part of $GEO$, $SME$ operates with substantial independence. This privileged position requires constant diplomatic awareness and a policy of active diplomacy, ensuring that we always have a direct channel to those in power. We do all this while actively engaging in our internal politics, meddling with the succession and forging dynastic alliances as best benefits us. The survival of our relatively small state depends on upholding these diplomatic traditions. Let it never be said that we have done too little or acted without sufficient wisdom!" #NEW
 #sme_proactive_diplomacy_desc: "While a part of $GEO$, $SME$ has been largely independent in its administration and actions. This has required a constant awareness of politics in $GEO$ as well as very active diplomacy with the larger empires we have bordered. Our rulers have always made sure that we have a direct channel with those that have the most power. Likewise, we have when necessary played an active part in the internal politics of the kingdom of $GEO$, both meddling in succession struggles, and allying with the royal dynasty, when it suits us. We would do well to uphold this tradition, for the future of our small state depends upon it. Let it be never said that we have done too little or acted without sufficient intelligence." #OLD ENG
 sme_fortresses_of_samtskhe: "Fortezze di $SME$"
 #sme_fortresses_of_samtskhe_desc: "Il nostro è un territorio montuoso di frontiera, spesso teatro della difesa contro invasori nemici di $GEO$. Per questo motivo abbiamo imparato a costruire forti possenti ed essere pronti a lunghe guerre difensive. Questa eredità va preservata ad ogni costo: le fortezze di $SME$ devono essere ben mantenute, presidiate e rifornite, poiché le invasioni straniere non sono una possibilità, ma una certezza." #OLD ITA
 sme_fortresses_of_samtskhe_desc: "Our mountainous terrain has acted as a shield against foreign invaders many times. Because of this, we learned to build strong fortresses and to always be prepared for defensive warfare. This legacy of strength and readiness is one we must strive at all costs to uphold — the fortresses of $SME$ must be perpetually well maintained, manned, and supplied, as foreign invaders are not a possibility but a certainty." #NEW
 #sme_fortresses_of_samtskhe_desc: "Our country is a mountainous borderland that has acted as a frontier against foreign invaders of $GEO$ many times. For this reason, we have learned to build strong fortresses and be ready for drawn our defensive warfare. This legacy is one we must strive at all costs to uphold, the fortresses of $SME$ must be well maintained, manned, and supplied, as foreign invaders are not a possibility but a certainty." #OLD ENG
 sme_independent_ambitions: "Ambizioni di Indipendenza"
 #sme_independent_ambitions_desc: "Siano essi musulmani o cristiani, $georgian_culture$, $turkic_group$ o $iranian_group$, $SME$ ha spesso dovuto sottomettersi a re e sultani stranieri. Per creare uno stato ed un'economia duraturi, dobbiamo costruire istituzioni che resistano indipendentemente da chi desidera le nostre terre. Coniamo moneta propria, emaniamo le nostre leggi e sosteniamo i nostri teologi e scrittori." #OLD ITA
 sme_independent_ambitions_desc: "$SME$ has often been obligated to bow to foreign rulers, be they $muslim_ADJ$ or $christian_ADJ$; $georgian_culture$, $turkic_group$, or $iranian_group$. To build an enduring state that survives as an independent entity and can stand against covetous outsiders, we must establish independent institutions: issuing our own coinage, creating our own laws, and patronizing our own theologians and writers." #NEW
 #sme_independent_ambitions_desc: "Be they Muslim or Christian, $georgian_culture$, $turkic_group$, or $iranian_group$, $SME$ has often had to bow to foreign kings and sultans. In order to create an enduring state and economy, we need to build our own institutions that last regardless of who desire our lands at the moment. Let us issue our own coinage and laws as well as patronize our own theologians and writers." #OLD ENG
 sme_protect_trade_routes: "Proteggi le Vie Commerciali"
 #sme_protect_trade_routes_desc: "La nostra posizione al crocevia tra $georgia_area$, $anatolia_region$, $armenia_area$ e $azerbaijan_area$ comporta che molti mercanti attraversino le nostre terre. Tuttavia, i continui raid delle tribù nomadi fanno dubitare della sicurezza delle nostre strade. Dobbiamo proteggere adeguatamente tutte le vie e le locande mercantili affinché il commercio possa fluire indisturbato nel nostro stato." #OLD ITA
 sme_protect_trade_routes_desc: "Our position at the crossroads of $georgia_area$, $anatolia_region$, $armenia_area$, and $azerbaijan_area$ also means that a great number of traders seek to cross our lands. However, the constant threat of being raided by nomadic tribesmen means that some have come to doubt the safety of traveling on our roads. We must properly defend all roads and merchant inns in our nation so that trade revenue can flow into our state treasury unhindered." #NEW
 #sme_protect_trade_routes_desc: "Our position at the crossroads of $georgia_area$, $anatolia_region$, $armenia_area$, and $azerbaijan_area$ also means that a great number of traders seek to cross our lands. The constant raids of nomadic tribesmen, however, means that many now doubt the safety of our roads. We must properly defend all roads and merchant inns in our lands, ensuring that the trade can flow into our state unhindered." #OLD ENG
 sme_frontier_warriors: "Guerrieri di Frontiera"
 #sme_frontier_warriors_desc: "Il Caucaso è stato plasmato a lungo da imperi nomadi, e i pascoli di $SME$ hanno attirato molte tribù a stabilirsi nelle nostre terre. Non dobbiamo permettere che ciò destabilizzi il nostro regno; invece dobbiamo fare accordi con queste genti affinché possano partecipare alle nostre ambizioni militari." #OLD ITA
 sme_frontier_warriors_desc: "The Caucasus have been shaped by nomadic emperors since time immemorial, but the lush pastures of $SME$ have convinced many tribesmen to settle. We must not let this affect the stability of our kingdom, but instead make arrangements with these settling tribes so that they contribute to our military ambitions in exchange for the lands they claim." #NEW
 #sme_frontier_warriors_desc: "The Caucasus have for a long time now been shaped by nomadic emperors, and the pastures of $SME$ have attracted many tribesmen to settle within our lands. We must not let this break down the stability of our kingdom but instead make deals with the tribes so that they may take part in our military ambitions." #OLD ENG
 sme_sacred_land: "Terra Sacra"
 #sme_sacred_land_desc: "Le terre di $SME$ ospitano luoghi sacri e venerati dal popolo $georgian_culture$. Il monastero rupestre di Vardzia, l'antica chiesa di Atskuri con la sua miracolosa icona della Vergine Maria, il Monastero di Ancha con l'icona Anchiskhati: sono alcuni dei più importanti luoghi santi sotto la nostra custodia. Proteggendo e curando la Chiesa di $SME$, distinta da quella di $GEO$, garantiamo l'unità del nostro popolo anche di fronte alle avversità." #OLD ITA
 sme_sacred_land_desc: "The lands of $SME$ are home to places both sacred and revered among the $georgian_culture$ people. The cave monastery of Vardzia, the ancient church of Atskuri with its miraculous icon of the Virgin Mary, and the Monastery of Ancha with its Anchiskhati icon, are some of the most significant holy places in our realm. By protecting and curating the $SME$ church, setting it apart as distinct from that of $GEO$, we ensure that our people stand united even in the face of adversity." #NEW
 #sme_sacred_land_desc: "The lands of $SME$ are home to places both sacred and revered among the $georgian_culture$ people. The cave monastery of Vardzia, the ancient church of Atskuri with its miraculous icon of the Virgin Mary, the Monastery of Ancha with its Anchiskhati icon, are some of the most significant holy places in our care. By protecting and curating the $SME$ Church, separate from that of $GEO$, we ensure that our people stand united even in the face of adversity." #OLD ENG
 sme_bridge_between_worlds: "Ponte tra i Mondi"
 #sme_bridge_between_worlds_desc: "La nostra terra è sempre stata tra due mondi, quello cristiano e quello musulmano, fungendo da ponte e punto di contatto. Per questo, persone di entrambe le fedi hanno costantemente interagito all'interno dei nostri confini." #OLD ITA
 sme_bridge_between_worlds_desc: "Our country has always served as a bridge between the $christian_ADJ$ and $muslim_ADJ$ worlds. As such, people of both faiths within our borders have become accustomed to interacting with each other." #NEW
 #sme_bridge_between_worlds_desc: "Our country has always laid in between two worlds, the Christian and the Muslim, serving as a bridge and connection between them. As such, people of both faiths have always been interacting within our borders." #OLD ENG

 #Armenia
 arm_legacy_of_hayk: "Eredità di Hayk"
 #arm_legacy_of_hayk_desc: "Hayk, discendente di Noè, divenne il patriarca della nostra nazione quando fondò il nostro regno alle pendici del Monte Ararat dopo aver sconfitto i Babilonesi. Tutto il nostro popolo conosce la storia, e tutti sono orgogliosi di appartenere a una stirpe così antica." #OLD ITA
 arm_legacy_of_hayk_desc: "Hayk, descendant of Noah, founded our kingdom at the base of Mount Ararat after defeating the Babylonians, and thus became the patriarch of our nation. All our people know this story, and all are proud to belong to such an ancient lineage." #NEW
 #arm_legacy_of_hayk_desc: "Hayk, descendant of Noah, became the patriarch of our nation when he founded our kingdom at the base of Mount Ararat after defeating the Babylonians. All our people know the story, and all are proud to belong to such an ancient lineage." #OLD ENG
 arm_mount_ararat: "Monte Ararat"
 #arm_mount_ararat_desc: "Il Monte Ararat, dove l'Arca di Noè si posò dopo il Diluvio Universale, è il luogo in cui la nostra nazione si formò per la prima volta. Per questo, il nostro popolo è più che disposto a resistere quando la santità delle nostre terre è minacciata." #OLD ITA
 arm_mount_ararat_desc: "Mount Ararat, where Noah's Ark came to rest after the Great Flood, is where our nation first formed. As a result, our people resist with a particularly holy fervor when the sanctity of our territory is threatened." #NEW
 #arm_mount_ararat_desc: "Mount Ararat, where Noah's Ark settled after the Great Flood, is where our nation first formed. As such, our people are more than willing to resist when the holiness of our lands is threatened." #OLD ENG
 arm_apostolic_church: "Chiesa Apostolica $ARM_ADJ$"
 #arm_apostolic_church_desc: "$ARM$ fu la prima nazione a stabilire il Cristianesimo come religione di stato nel 301. Per questo, le nostre tradizioni religiose e quelle del nostro clero sono una grande fonte della nostra identità." #OLD ITA
 arm_apostolic_church_desc: "$ARM$ was the first nation to declare $christian$ as its state religion. As such, our religious traditions, especially those of our clergy, are a major component of our identity." #NEW
 #arm_apostolic_church_desc: "$ARM$ was the first nation to establish Christianity as its state religion in 301. As such, our religious traditions and that of our clergy are a great source of our identity." #OLD ENG
 #arm_land_reclamation: "Riconquista delle Terre" #OLD ITA
 arm_land_reclamation: "Reclaimed Territory" #NEW
 #arm_land_reclamation: "Land Reclamation" #OLD ENG
 #arm_land_reclamation_desc: "$ARM$ è stata devastata dalla guerra per secoli e fatta a pezzi dai suoi vicini. Riconquistando le nostre terre perdute e rendendole adatte all'insediamento, insieme al restauro di chiese e fortezze in rovina, possiamo garantire un controllo più saldo sulle nostre terre e migliorare le vite dei nostri cittadini." #OLD ITA
 arm_land_reclamation_desc: "$ARM$ has been ravaged by war for centuries. By reclaiming the lands lost in these struggles, making them suitable for inhabitation, and restoring ruined churches and fortresses, we can improve the lives of our people and take firmer control over our territory." #NEW
 #arm_land_reclamation_desc: "$ARM$ has been ravaged by war for centuries and torn apart by its neighbors. By reclaiming our lost lands and making them suitable for in-habitation, along with restoring ruined churches and fortresses, we can ensure a stronger hold over our lands and improve the lives of our citizenry." #OLD ENG
 arm_border_nation: "Nazione di Confine"
 #arm_border_nation_desc: "$ARM$, sin dai tempi antichi, è stata spesso un campo di battaglia tra nazioni più grandi. Anche dopo aver riconquistato la nostra sovranità, è spesso difficile mantenere una posizione neutrale, poiché è difficile accontentare tutti, ma è possibile." #OLD ITA
 arm_border_nation_desc: "Since ancient times, $ARM$ has been the reluctant battleground between larger nations. Even after regaining our sovereignty, remaining neutral is extremely difficult — it is not impossible to appease everyone, but it is not easy, either." #NEW
 #arm_border_nation_desc: "$ARM$, since ancient times, has often been a battleground between larger nations. Even after regaining our sovereignty, it is often hard to maintain a neutral stance, as it is difficult to appease everyone, but it is achievable." #OLD ENG
 arm_melikdom_organization: "Organizzazione dei Melikati"
 #arm_melikdom_organization_desc: "Come uno dei pochi bastioni di uno stato $ARM_ADJ$ indipendente, $ARM$ è governata da signori feudali chiamati melik, poiché l'antico sistema dei Nakharar collassò dopo le invasioni mongole. Il rapporto tra i melik e i loro subordinati è quello tra un ufficiale comandante militare e un ufficiale subalterno, e non quello tra signore feudale e servo della gleba." #OLD ITA
 arm_melikdom_organization_desc: "As one of the few bastions of an independent $ARM_ADJ$ state, $ARM$ is governed by feudal suzerains called #italic meliks#!, as the old system of $arm_nakharar_titles$ collapsed after the $MGE_ADJ$ invasions. The relationship between meliks and their subordinates is that of a military commanding officer and junior officer, and not of feudal lord and a serf." #NEW
 #arm_melikdom_organization_desc: "As one of the few bastions of an independent $ARM_ADJ$ state, $ARM$ is governed by feudal suzerains called meliks, as the old Nakharar system collapsed after the Mongol invasions. The relationship between meliks and their subordinates is that of a military commanding officer and junior officer, and not of feudal lord and a serf." #OLD ENG
 arm_mountain_armies: "Armate di Montagna"
 #arm_mountain_armies_desc: "La terra di $ARM$ è montuosa per natura. Il nostro popolo ha imparato a viverci nel corso dei secoli, e abbiamo sviluppato un modo per usare quelle montagne a nostro vantaggio. Per questo, i nostri eserciti si raduneranno prontamente sotto i nostri stendardi, da ogni angolo del nostro territorio." #OLD ITA
 arm_mountain_armies_desc: "$ARM$ is a mountainous land. Our people have adapted to this terrain over the centuries, and we have developed many ways to use those mountains to our advantage. Our armies will gather readily when called, confident in the additional protection our unique environment provides." #NEW
 #arm_mountain_armies_desc: "The land of $ARM$ is mountainous by nature. Our people have learned to live in it over the centuries, and we have developed a way to use those mountains to our advantage. As such, our armies will gather readily under our banners, from all corners of our territory." #OLD ENG
 arm_nakharar_titles: "Titoli dei Nakharar"
 #arm_nakharar_titles_desc: "Il sistema di titoli dei Nakharar era stato in uso continuo in $ARM$ quasi sin dalla sua nascita, e rimase immutato fino ai tempi delle invasioni mongole, quando l'intero sistema stesso collassò. Sebbene i titoli stessi non siano più in uso, certe caratteristiche di quel sistema persistono ancora, migliorando le capacità dei nostri nobili e dei nostri eserciti." #OLD ITA
 arm_nakharar_titles_desc: "The #italic Nakharar#! system of titles was in continuous use in $ARM$ from its inception until the times of the $MGE_ADJ$ invasions, when it collapsed. Although the titles themselves are no longer in use, certain characteristics of that system persist, enhancing the abilities of both our nobles and armies." #NEW
 #arm_nakharar_titles_desc: "The Nakharar system of titles had been in continuous use in $ARM$ almost since its inception, and remained unchanged until the times of the Mongol invasions, when the whole system itself collapsed. Although the titles themselves are no longer in use, certain characteristics of that system persist still, enhancing the abilities of our nobles and armies." #OLD ENG
 arm_greater_armenia: "Grande $ARM$"
 #arm_greater_armenia_desc: "La nostra è una nazione con una storia grande e lunga, e i regni $ARM_ADJ$ del passato riuscirono a espandersi su un vasto territorio, e il nostro popolo $armenian_culture$ con loro. Emulandoli, diventiamo un faro per tutto il popolo $armenian_culture$, che si radunerà volentieri sotto il nostro stendardo." #OLD ITA
 arm_greater_armenia_desc: "In our long and illustrious history, $ARM_ADJ$ kingdoms spread over a large territory, and so did our $armenian_culture$ people. By emulating these bygone realms, we become a beacon of all $armenian_culture$ people, who will happily unite under our leadership." #NEW
 #arm_greater_armenia_desc: "Ours is a country with great and long history, and the $ARM_ADJ$ kingdoms of the past managed to spread over a large territory, and our $armenian_culture$ people with them. By emulating them, we become a beacon of all $armenian_culture$ people, who will gather gladly under our banner." #OLD ENG
 arm_highland_fortresses: "Fortezze degli Altipiani"
 #arm_highland_fortresses_desc: "Le nostre terre montuose ci hanno insegnato molto sulla resilienza e sulla resistenza. Le nostre fortezze sono un esempio di tale resilienza, costruite per resistere non solo alle difficili condizioni dei luoghi in cui sono poste, ma anche a qualsiasi invasore straniero abbastanza audace da penetrare nelle nostre terre impervie." #OLD ITA
 arm_highland_fortresses_desc: "Our fortresses are a brilliant emblem of our resilience and fortitude, built to endure not only the difficult local climate, but also any foreign invader foolish enough to mount an attack into our unforgiving territory." #NEW
 #arm_highland_fortresses_desc: "Our mountainous homelands have taught us much about resilience and endurance. Our fortresses serve as an example of such resilience, built to endure not only the difficult conditions of where they are placed, but also any foreign invader daring enough to penetrate into our arduous lands." #OLD ENG
 
 #Switzerland
 swiss_oath_of_rutli: "Il Giuramento di Rütli"
 #swiss_oath_of_rutli_desc: "Recitiamo il voto di questa nuova unione. Vogliamo essere una nazione di fratelli, e nessun problema o pericolo ci separerà. Nessun tiranno straniero governerà sulle nostre terre!" #OLD ITA
 swiss_oath_of_rutli_desc: "Let us recite the vow of this new union: We shall be one nation of brothers, and no trouble or danger shall separate us. No foreign tyrant shall ever rule over our realm!" #NEW
 #swiss_oath_of_rutli_desc: "Let us recite the vow of this new union. We want to be one nation of brothers, and no trouble or danger shall separate us. No foreign tyrant shall rule over our lands!" #OLD ENG
 swiss_halberd_infantry: "Eredità di Morgarten"
 #swiss_halberd_infantry_desc: "Quando difendemmo la nostra libertà nella Battaglia di Morgarten, avevamo un vantaggio molto importante sugli invasori Asburgo maledetti. L'alabarda è un'arma semplice ma letale che respingerà qualsiasi nemico con facilità. Addestrare le nostre truppe nell'uso dell'arma ci darà un vantaggio contro i nostri nemici, anche se possono accedere a truppe molto più numerose." #OLD ITA
 swiss_halberd_infantry_desc: "When we defended our freedom in the Battle of Morgarten, we had a very important advantage over the cursed $habsburg_dynasty$ invaders: the halberd, a simple yet lethal weapon that can repel any foe with ease. Training our troops to use halberds with skill will give us an advantage against our foes, even if they have superior numbers." #NEW
 #swiss_halberd_infantry_desc: "When we defended our freedom in the Battle of Morgarten, we had a very important advantage over the cursed Habsburg invaders. The halberd is a simple yet lethal weapon that will repel any foe with ease. Training our troops in the usage of the weapon will give us an advantage against our foes, even if they can access much larger troops." #OLD ENG
 #swiss_eternal_alliance: "L'Alleanza Eterna dei Cantoni Forestali" #OLD ITA
 swiss_eternal_alliance: "Eternal Alliance of the Forest Cantons" #NEW
 #swiss_eternal_alliance: "The Eternal Alliance of the Forest Cantons" #OLD ENG
 #swiss_eternal_alliance_desc: "Abbiamo stretto un'alleanza eterna con i nostri amici nei Cantoni vicini. Se non fosse stato per questo trattato, saremmo sicuramente soccombuti agli invasori Asburgo e caduti sotto il governo di tiranni stranieri ancora una volta. Queste alleanze assicureranno la nostra sopravvivenza per i secoli a venire." #OLD ITA
 swiss_eternal_alliance_desc: "We have forged an eternal alliance with our friends in the neighboring Cantons. Had it not been for this treaty, we would have surely succumbed to the $habsburg_dynasty$ invaders and fallen under the rule of foreign tyrants yet again. These alliances will ensure our survival for centuries to come." #NEW
 #swiss_eternal_alliance_desc: "We have entered an eternal alliance with our friends in the neighboring Cantons. Had it not been for this treaty, we would have surely succumbed to the Habsburg invaders and fallen under the rule of foreign tyrants yet again. These alliances will ensure our survival for centuries to come." #OLD ENG
 swiss_mercenaries: "Mercenari $SWI_IT_ADJ_MP$"
 #swiss_mercenaries_desc: "Le nostre truppe sono riconosciute come alcuni dei migliori soldati. Fortunatamente, non abbiamo permanentemente bisogno dei loro servizi, il che ci permetterà di affittare queste truppe a potenze straniere, arricchendoci e dando loro una preziosa esperienza." #OLD ITA
 swiss_mercenaries_desc: "Our troops are widely recognized as exceptional combatants. Fortunately for us, we are not permanently in need of their services, which allows us to rent them out to foreign powers, earning extra revenue and providing them with valuable combat experience." #NEW
 #swiss_mercenaries_desc: "Our troops are well recognized as some of the best soldiers. Fortunately, we are not permanently in need of their services, which will allow us to rent these troops to foreign powers, enriching ourselves and giving valuable experience to them." #OLD ENG
 #the_swiss_confederation: "I Principi della Confederazione" #OLD ITA
 the_swiss_confederation: "Principles of the Confederation" #NEW
 #the_swiss_confederation: "The Principles of the Confederation" #OLD ENG
 #the_swiss_confederation_desc: "Ogni membro della nostra confederazione contribuisce con risorse preziose alla nostra causa. Il nostro approccio decentralizzato al governo di questa alleanza di stati serve uno scopo più grande, così non possiamo cadere in una guerra civile nonostante i disaccordi tra città, comuni o i nostri cantoni." #OLD ITA
 the_swiss_confederation_desc: "Every member of our confederation contributes valuable resources to our cause. Our decentralized approach to governing this alliance of states serves a greater purpose, so we cannot break into civil war when disagreements arise between towns, cities, or our cantons." #NEW
 #the_swiss_confederation_desc: "Every member of our confederation contributes valuable resources to our cause. Our decentralized approach to governing this alliance of states serves a greater purpose, so we can not break into civil war despite disagreements between towns, cities, or our cantons." #OLD ENG
 swiss_reislaufer: "I Reisläufer"
 swiss_reislaufer_desc: "$a_reislaufer_desc$ Dovremmo formare reggimenti da questi veterani e impiegarli nei nostri stessi eserciti."
 swiss_recovery_and_prosperity: "Un Regno Tormentato"
 #swiss_recovery_and_prosperity_desc: "I conflitti del passato hanno dimostrato che respingere gli invasori non è l'unico compito di cui occuparsi. Le valli dei nostri cantoni sono devastate ad ogni battaglia e devono essere presi accorgimenti attenti per riportare la prosperità nelle nostre terre." #OLD ITA
 swiss_recovery_and_prosperity_desc: "Past conflicts have shown that repelling invaders is not our only concern. The valleys of our cantons are devastated with each battle; careful steps must be taken to bring prosperity back to our land." #NEW
 #swiss_recovery_and_prosperity_desc: "The conflicts of the past have shown that repelling the invaders is not the only task to be taken care of. The valleys of our cantons are devastated with each battle and careful steps have to be taken to bring prosperity back to our lands." #OLD ENG
 #alpine_defensiveness: "Difensività Alpina" #OLD ITA
 alpine_defensiveness: "Alpine Defense" #NEW
 #alpine_defensiveness: "Alpine Defensiveness" #OLD ENG
 #alpine_defensiveness_desc: "Le terre $SWI_IT_ADJ_FP$ sono dominate da terreni accidentati, montagne e valli. Dobbiamo utilizzare le nostre terre e incorporare il terreno nelle nostre tattiche militari. In questo modo trionferemo sicuramente su qualsiasi nemico che osi mettere piede sulle nostre terre." #OLD ITA
 alpine_defensiveness_desc: "The $SWI_ADJ$ landscape is dominated by rough terrain, mountains, and valleys. We must find a way to overcome the challenges our environment presents, and to find a way to use it as a weapon against any potential invaders." #NEW
 #alpine_defensiveness_desc: "The $SWI_ADJ$ lands are dominated by rough terrain, mountains, and valleys. We need to utilize our lands and incorporate the terrain into our military tactics. That way we surely will triumph over any foe who dares to set foot on our lands." #OLD ENG
 swiss_religious_refuge: "Rifugio per i Rifugiati"
 #swiss_religious_refuge_desc: "Mentre altri esiliavano le loro minoranze religiose e figure problematiche, noi offriremo loro volentieri una casa. In $SWI$, saranno in grado di stabilire una nuova vita per sé stessi e lodare il nostro governo." #OLD ITA
 swiss_religious_refuge_desc: "While others exile religious minorities and disruptive figures, we will gladly offer them a home. In $SWI$, they will be able to establish a new life for themselves, and as a result will be inclined to praise our rule." #NEW
 #swiss_religious_refuge_desc: "While others exile their religious minorities and problematic figures, we will gladly offer them a home. In $SWI$, they will be able to establish a new life for themselves and praise our rule." #OLD ENG
 swiss_tolerance: "Tolleranza $SWI_IT_ADJ_FS$"
 #swiss_tolerance_desc: "Perché dovremmo ucciderci a vicenda per la transustanziazione e la predestinazione quando potremmo trasformare la nostra casa di montagna in un regno unito ancora una volta?\n\nPer questo motivo, ogni Cantone di $SWI$ avrà l'ultima parola in materia di religione. Sebbene questo non eliminerà tutti i conflitti religiosi nel nostro paese, almeno garantirà che, indipendentemente dalle confessioni, il nostro popolo sarà in grado di trovare un luogo dove non sono perseguitati." #OLD ITA
 swiss_tolerance_desc: "Why must we kill each other over obscure issues of transubstantiation and predestination, when we could spend that energy turning our mountain home into a realm united once more?\n\nFor that reason, every Canton of $SWI$ will have the ultimate jurisdiction over religious matters in their region. While this will not eliminate all religious strife in our country, it will at least ensure that no matter what someone believes, our people will be able to find a place where they are not persecuted." #NEW
 #swiss_tolerance_desc: "Why must we kill each other over transubstantiation and predestination when we could turn our mountain home into a realm united once more?\n\nFor that reason, every Canton of $SWI$ will have the final say in the matter of religion. While this will not eliminate all religious strife in our country, it will at least ensure that no matter the confessions, our people will be able to find a place where they are not persecuted." #OLD ENG
 swiss_clockwork: "Maestri dell'Orologeria"
 #swiss_clockwork_desc: "Alcuni sciocchi pensano che l'orologeria sia solo per gli orologi. Quando si assiste al potere degli ingranaggi rotanti che ticchettano, è ovvio che l'orologeria può fare praticamente qualsiasi cosa si voglia: forse il Creatore dell'Universo stesso ha caricato l'esistenza come un orologio e ha lasciato che gli ingranaggi girassero da soli, scandendo i secoli. Comunque sia, gli orologiai $SWI_ADJ$ sono i più grandi maestri dell'arte dell'orologeria esistenti, escludendo Dio stesso naturalmente." #OLD ITA
 swiss_clockwork_desc: "Some fools think that clockwork is for timekeeping alone, but when one witnesses the power of rotating gears, it is obvious that clockwork can do just about anything one wants it to do. Maybe the Creator of the Universe Himself wound up existence like a clock and let the gears spin on their own, ticking away the centuries. Be that as it may, $SWI_ADJ$ clockmakers are the greatest masters of the art — barring God Himself, of course." #NEW
 #swiss_clockwork_desc: "Some fools think that clockwork is for clocks alone. When one witnesses the power of rotating gears ticking away, it is obvious that clockwork can do just about anything one wants it to do: maybe the Creator of the Universe himself wound up existence like a clock and let the gears spin on their own, ticking away the centuries. Be that as it may, $SWI_ADJ$ clockmakers are the greatest masters of the art of clockwork in existence, barring God Himself of course." #OLD ENG
 swiss_ambition: "Illuminismo $SWI_ADJ$"
 #swiss_ambition_desc: "Non abbiamo bisogno di cercare un'identità unica per il nostro paese poiché il nostro popolo si raduna prontamente attorno agli stendardi dei loro cantoni e agli ideali della nostra confederazione. Ma finanziando gli studiosi illuminati del tempo, saremo in grado di plasmare una nuova era per il popolo $SWI_ADJ$ e solidificare i tratti unici della nostra Eidgenossenschaft. Questo Elvetismo sarà il fondamento dei nostri principi illuminati." #OLD ITA
 swiss_ambition_desc: "We do not need to construct a unique identity for our country, since our people readily rally around the banners of their cantons and the ideals of our confederacy. But by funding our most enlightened scholars of our time, we will be able to shape a new age for the $SWI_ADJ$ people, and solidify the unique traits of our #italic Eidgenossenschaft#!. This Helvetism forms the foundation of our Enlightenment." #NEW
 #swiss_ambition_desc: "We do not need to seek a unique identity for our country since our people readily rally around the banners of their cantons and the ideals of our confederacy. But by funding the enlightened scholars of the time, we will be able to shape a new age for the $SWI_ADJ$ people and solidify the unique traits of our Eidgenossenschaft. This Helvetism will be the foundation for our enlightened principles." #OLD ENG
 swiss_banking: "Sistema Bancario $SWI_ADJ$"
 #swiss_banking_desc: "Siamo un santuario non solo per le persone perseguitate di altri paesi ma anche per la loro ricchezza. In grandi caveau, nascosti dietro mura robuste e protetti dai nostri soldati fidati, saremo la scelta migliore per ogni cittadino dei paesi poveri e dilaniati dalla guerra del mondo per salvare i loro beni di valore." #OLD ITA
 swiss_banking_desc: "We are a sanctuary, not only for persecuted people from other countries, but also for their wealth. In large vaults, hidden away behind strong walls and protected by our most trustworthy soldiers, we will be the best place for every citizen of the poor, war-torn countries of the world to stash their valuables." #NEW
 #swiss_banking_desc: "We are a sanctuary not only for persecuted people of other countries but also for their wealth. In large vaults, hidden away behind strong walls and protected by our trustworthy soldiers, we will be the best choice for every citizen of the poor war-torn countries of the world to save their valuables." #OLD ENG
 
 #Zimbabwe
 zmw_experienced_cattle_herder: "Allevatori Esperti"
 #zmw_experienced_cattle_herder_desc: "L'allevamento di animali non è un compito facile ed è vitale per la nostra sopravvivenza. Se vogliamo stabilizzare ed espandere il nostro dominio, non possiamo sottrarci dall'espandere i nostri terreni di pascolo e allevamento." #OLD ITA
 zmw_experienced_cattle_herder_desc: "Herding animals requires some skill, and is crucial for our survival. If we want to stabilize and expand our rule, we should expand our herding and grazing grounds as well." #NEW
 #zmw_experienced_cattle_herder_desc: "The herding of animals is no easy task and is vital for our survival. If we want to stabilize and expand our rule, we can not shy away from expanding our herding and grazing grounds." #OLD ENG
 #zmw_stone_builders: "Costruttori dello Zimbabwe" #OLD ITA
 zmw_stone_builders: "Builders of $ZMW$" #NEW
 #zmw_stone_builders: "Builders of Zimbabwe" #OLD ENG
 #zmw_stone_builders_desc: "I grandi edifici di pietra dello Zimbabwe impressionano molti visitatori del nostro grande paese. Mantenere questa tradizione ci permetterà di espandere le nostre grandi città di pietra affinché restino in piedi per secoli." #OLD ITA
 zmw_stone_builders_desc: "The astonishing stone buildings of $ZMW$ impress many visitors to our great country. Continuing our architectural traditions will allow us to expand our great cities of stone, which shall stand tall for centuries." #NEW
 #zmw_stone_builders_desc: "The great stone buildings of Zimbabwe impress many visitors to our great country. Keeping this tradition up will allow us to expand our great cities of stone to stand tall for centuries." #OLD ENG
 zmw_encourage_new_settlements: "Nuove Terre per le Risorse"
 #zmw_encourage_new_settlements_desc: "Oltre i nostri confini si estendono vaste terre, ricche di risorse e terreni di pascolo pronti per essere usati dal nostro popolo. Dobbiamo incoraggiare la nostra gente a spostarsi in questi territori e stabilire nuove città." #OLD ITA
 zmw_encourage_new_settlements_desc: "Beyond our borders lie vast expanses of land, studded with resources and herding grounds waiting eagerly to be claimed by our people. We must encourage settlement in these territories, and establish new towns." #NEW
 #zmw_encourage_new_settlements_desc: "Beyond our borders lie vast lands, sprawling with resources and herding grounds ready to be used by our people. We need to encourage our people to move into these territories and establish new towns." #OLD ENG
 #zmw_rekindling_the_royal_fires: "Riaccendere i Fuochi Reali" #OLD ITA
 zmw_rekindling_the_royal_fires: "Rekindling the Royal Fires" #NEW
 #zmw_rekindling_the_royal_fires: "Rekindling The Royal Fires" #OLD ENG
 #zmw_rekindling_the_royal_fires_desc: "Affinché i nostri capi subordinati possano dimostrare la loro lealtà davanti a noi e davanti agli dei, devono viaggiare una volta all'anno verso la capitale per riaccendere il loro fuoco locale usando il nostro. Una volta passato un anno, il nostro esercito estinguerà il loro fuoco, e dovranno intraprendere un nuovo viaggio." #OLD ITA
 zmw_rekindling_the_royal_fires_desc: "Our subordinate chiefs must prove their loyalty to us and the gods by traveling to the capital once a year, and using our flames to rekindle their own local fire. Once a year has passed, our army will extinguish their fire, and they will have to make a new journey." #NEW
 #zmw_rekindling_the_royal_fires_desc: "In order for our subordinate chiefs to prove their loyalty before us and before the gods, they must once a year travel to the capital to rekindle their local fire using ours. Once a year has passed, our army will extinguish their fire, and they will have to make a new journey." #OLD ENG
 #zmw_strict_gold_regulations: "Severe Regolamentazioni sul Commercio dell'Oro" #OLD ITA
 zmw_strict_gold_regulations: "$goods_gold$ Trade Restrictions" #NEW
 #zmw_strict_gold_regulations: "Strict Gold Trade Regulations" #OLD ENG
 #zmw_strict_gold_regulations_desc: "Le nostre terre ci forniscono molti beni per i quali i mercanti stranieri hanno un vivo interesse, ma le nostre abbondanti riserve d'oro brillano più di ogni altro. Sebbene tali ricchezze siano una benedizione per il nostro stato, questo metallo può anche essere piuttosto pericoloso a meno che non sia tenuto sotto stretto controllo. Il nostro stato deve regolamentare rigorosamente tutto il commercio e la proprietà dell'oro per evitare le influenze distruttive provenienti dall'esterno." #OLD ITA
 zmw_strict_gold_regulations_desc: "The land provides us with plenty of goods that foreign merchants have a keen interest in, but our abundant reserves of $goods_gold$ shine brighter than any other. While such riches are a blessing, the state must tightly regulate all trade and ownership of $goods_gold$ in order to help prevent the destructive effects of human greed and skullduggery from affecting  our bottom line." #NEW
 #zmw_strict_gold_regulations_desc: "Our lands provide us with plenty goods foreign merchants have a keen interest in, but our abundant reserves of gold shine brighter than any other. While such riches are a blessing to our state, this metal can also be quite dangerous unless it is kept under firm control. Our state must tightly regulate all trade and ownership of Gold in order to avoid the destructive influences coming from outside influences." #OLD ENG
 #zmw_spokesman_before_the_dead: "Portavoce davanti ai Morti" #OLD ITA
 zmw_spokesman_before_the_dead: "Spokesman Before the Dead" #NEW
 #zmw_spokesman_before_the_dead: "Spokesman before the Dead" #OLD ENG
 #zmw_spokesman_before_the_dead_desc: "Il nostro sovrano non è solo il nostro leader in senso temporale, ma ci si aspetta anche che parli a nostro nome davanti agli spiriti dei morti. Prima di ogni campagna o raccolto, comunicherà il nostro rispetto e i nostri bisogni agli spiriti dei nostri antenati attraverso cerimonie o danze. Senza un grande sovrano che mantenga le tombe reali e mantenga uno stretto contatto con i nostri morti, le cose potrebbero andare storte molto rapidamente per il nostro paese." #OLD ITA
 zmw_spokesman_before_the_dead_desc: "Our ruler is not only our leader in the temporal sense, but is also expected to speak on our behalf before the spirits of the dead. Prior to any campaign or harvest, he will communicate our respect and needs to the spirits of our ancestors through ceremonies or dances. Without a diligent ruler to maintain the royal graves and keep in close contact with our dead, things might go awry very quickly." #NEW
 #zmw_spokesman_before_the_dead_desc: "Our ruler is not only our leader in the temporal sense but is also expected to speak on our behalf before the spirits of the dead. Before any campaign or harvest, he will communicate our respect and our needs to the spirits of our ancestors through ceremonies or dances. Without a great ruler to maintain the royal graves and keep in close contact with our dead, things might go awry very quickly for our country." #OLD ENG
 zmw_elected_administrators: "Amministratori Provinciali"
 #zmw_elected_administrators_desc: "Tradizionalmente, tutti i nostri amministratori, anche a livello locale, sono stati parenti diretti del nostro sovrano. Man mano che il nostro impero è cresciuto e maturato, tuttavia, è tempo di attingere alla conoscenza locale dei nostri sudditi e permettere loro di selezionare i propri amministratori." #OLD ITA
 zmw_elected_administrators_desc: "Traditionally, all of our administrators, even on the local level, have been direct relatives of our ruler. As our empire has grown and matured, however, it is time we show deference to the local knowledge of our subjects, and allow them to select their own administrators." #NEW
 #zmw_elected_administrators_desc: "Traditionally, all of our administrators, even on the local level, have been direct relatives of our ruler. As our empire has grown and matured, however, it is time we draw from the local knowledge of our subjects and allow them to select their own administrators." #OLD ENG
 zmw_discipline_and_traning: "Addestramento Regolare"
 #zmw_discipline_and_traning_desc: "Disciplina, preparazione e addestramento sono ciò che vince le battaglie. Con questo in mente, i nostri comandanti hanno iniziato con successo a sviluppare elaborate nuove tattiche e una nuova organizzazione dell'esercito. Facciamo buon uso di queste innovazioni dividendo i nostri guerrieri in reggimenti e poi lasciandoli addestrare regolarmente con i loro archi, assegai, pugnali e asce. La pratica permetterà loro anche di combattere in formazione senza paura, sconfiggendo nemici molto più numerosi." #OLD ITA
 zmw_discipline_and_traning_desc: "Discipline, preparation, and training are the factors that win battles. With this in mind, our commanders have successfully pioneered elaborate new tactics and organizational improvements. Let us make good use of these innovations by dividing our warriors into regiments and having them train regularly with their bows, assegais, daggers, and axes. Practice will also allow them to fight in formation without fear, defeating many more numerous enemies." #NEW
 #zmw_discipline_and_traning_desc: "Discipline, preparation, and training are what wins battles. With this in mind, our commanders have successfully begun to pioneer elaborate new tactics and a new army organization. Let us make good use of these innovations by dividing our warriors into regiments and then let them train regularly with their bows, assegais, daggers, and axes. Practice will also allow them to fight in formation without fear, defeating much more numerous enemies." #OLD ENG
 zmw_merchant_taxes: "Tasse Mercantili"
 #zmw_merchant_taxes_desc: "Con l'arrivo di nuovi mercanti nell'area dello Zambesi, dobbiamo assicurarci che la nostra autorità sia rispettata. Chiunque desideri commerciare qui e portare il nostro prezioso oro e avorio verso altre rive deve prima essere approvato dal nostro sovrano e pagare una tassa per ottenere il libero accesso. Se i pagamenti dovessero cessare, tutta la merce straniera sarà confiscata dal nostro stato." #OLD ITA
 zmw_merchant_taxes_desc: "With the arrival of new traders in the Zambezi area, the need has arisen to assert our authority. Anyone who wishes to trade here, and carry our precious $goods_gold$ and $ivory$ to other shores, must first be approved by our ruler and pay a tax in order to be granted access. Should payments lapse, all foreign merchandise will be confiscated by our state." #NEW
 #zmw_merchant_taxes_desc: "With the arrival of new traders in the Zambezi area, we must ensure that our authority is respected. Everyone who wishes to do trade here and bring our dear gold and ivory to other shores must first be approved by our ruler and pay a tax in order to be granted free access. Should payments lapse, all foreign merchandise will be confiscated by our state." #OLD ENG
 zmw_controlling_the_mutapan_riches: "Controllare le Ricchezze"
 #zmw_controlling_the_mutapan_riches_desc: "I viaggiatori occidentali hanno chiamato la nostra terra Ofir e le miniere d'oro dell'altopiano e il controllo sul commercio dello Zambesi hanno reso molti visitatori invidiosi nel corso dei secoli. Sfruttiamo il nostro controllo su queste ricchezze e costruiamo posti commerciali permanenti che possano crescere in città estese." #OLD ITA
 zmw_controlling_the_mutapan_riches_desc: "Western travelers have named our land 'Ophir', and the riches of our gold mines and the Zambezi trade have made many visitors envious of us over the centuries. Let us leverage our control over these riches, and build permanent trade posts which can grow into sprawling cities." #NEW
 #zmw_controlling_the_mutapan_riches_desc: "Western travelers have named our land Ophir and the gold mines of the plateau and the control over the Zambezi trade have made many visitors envious over the centuries. Let us leverage our control over these riches and build permanent trade posts which can grow into sprawling cities." #OLD ENG
 zmw_empowering_the_rozwi: "Dare Potere ai Rozwi"
 #zmw_empowering_the_rozwi_desc: "Le nostre terre sono dimora di molti guerrieri esperti. Tra loro ci sono i Rozwi, combattenti disciplinati, che sono pronti a difendere e proteggere il nostro popolo contro chiunque osi prendere le nostre terre da noi." #OLD ITA
 zmw_empowering_the_rozwi_desc: "Our lands are home to many skilled warriors. Among them are the Rozwi, disciplined fighters who stand ready to defend our people against any who would dare try to take our rightful lands from us." #NEW
 #zmw_empowering_the_rozwi_desc: "Our lands are home to many skilled warriors. Among them are the Rozwi, disciplined fighters, who are ready to defend and protect our people against any who would dare to take our lands from us." #OLD ENG
 zmw_cow_horn_tactics: "Formazioni a Corna di Bue"
 #zmw_cow_horn_tactics_desc: "L'adattamento alle tattiche di guerra in continua evoluzione non è un compito facile. Contro nemici potenzialmente superiori dovremmo fare affidamento sulla nostra stessa mobilità sopra ogni altra cosa. Se siamo in grado di inchiodare i nostri nemici in un combattimento corpo a corpo e inviare reggimenti per aggirare e accerchiare le loro truppe, saremo in grado di infliggere loro perdite devastanti." #OLD ITA
 zmw_cow_horn_tactics_desc: "Adapting to the ever-changing tactics of war is no easy task. Against potentially superior enemies, we should rely on our own mobility over everything else. If we are able to pin our foes into a melee fight and send a regiment to flank and encircle their troops, we will be able to inflict devastating casualties." #NEW
 #zmw_cow_horn_tactics_desc: "Adaption to the ever-changing tactics of war is no easy task. Against potentially superior enemies we should rely on our own mobility over everything else. If we are able to pin our foes into a melee fight and send regiment to flank and encircle their troops, we will be able to inflict devastating casualties on them." #OLD ENG

 #Khmer
 khm_religious_flexibility: "Una Fede per $KHM$"
 #khm_religious_flexibility_desc: "Il nostro paese ha vissuto tempi tumultuosi e ha visto monarchi promuovere sia l'$hindu$ che vari rami del $buddhist$. Dobbiamo fidarci delle decisioni dei nostri sovrani e quindi seguire e promuovere la fede scelta in ogni parte del nostro paese." #OLD ITA
 khm_religious_flexibility_desc: "Our country has lived through tumultuous times as royal patronage shifted between both $hindu$ and various branches of $buddhist$. We must promote the chosen faith throughout our country to breed stability, and trust that our ruler has chosen the true path for our people." #NEW
 #khm_religious_flexibility_desc: "Our country has lived through tumultuous times and has seen monarchs promote both $hindu$ and various branches of $buddhist$. We must trust in the decisions of our rulers and thus follow and promote the chosen faith into every part of our country." #OLD ENG
 khm_royal_procession: "Processioni Reali $KHM_ADJ$"
 #khm_royal_procession_desc: "Le processioni dei nostri sovrani sono uno spettacolo da ammirare, rivaleggiato solo da pochi. Mostreremo la nostra autorità sullo stato con processioni stravaganti con il nostro sovrano che mostra lo splendore del nostro stato. Presentando la ricchezza e il potere del sovrano, la processione di elefanti e della guardia reale assicurerà che la fiducia del nostro popolo rimanga sempre salda." #OLD ITA
 khm_royal_procession_desc: "Our rulers excel at creating dazzling processions, events of glorious splendor that very few others can rival. These extravagant demonstrations of our national wealth confirm the power and brilliance of the ruler and the astonishing riches of our nation. The glittering procession of elephants, treasure, and the royal guard will strike awe and respect in the hearts of our people, winning their unbroken loyalty and admiration." #NEW
 #khm_royal_procession_desc: "The processions of our rulers are an event to marvel at, rivaled by only a few. We shall display our authority over the state with extravagant processions with our sovereign displaying the splendor of our state. Presenting the wealth and power of the ruler, the procession of elephants and the royal guard will ensure our people's trust always remains unbroken." #OLD ENG
 khm_ballista_elephants: "Elefanti con Balista"
 khm_ballista_elephants_desc: "Gli elefanti sono creature impressionanti e torreggianti su qualsiasi altro animale che abbiamo visto. È tempo di utilizzare queste qualità per incutere paura nei nostri nemici usando questi animali maestosi in guerra. Gli elefanti sono anche in grado di trasportare grandi pesi, permettendoci di montare macchine da guerra su di essi. Costruire balestre a doppia corda ed equipaggiare i nostri elefanti con esse creerà uno strumento che ci permetterà di dominare i campi di battaglia meglio che mai."
 khm_great_builders: "Città Idrauliche"
 #khm_great_builders_desc: "Le nostre grandi città ospitano molti baray e canali, pronti a immagazzinare e distribuire acqua entro i confini delle città. La nostra abilità nel costruire e mantenere questa rete di vie d'acqua assicurerà che la nostra popolazione possa prosperare anche nelle instabili stagioni dei monsoni." #OLD ITA
 khm_great_builders_desc: "Our great cities are home to many #italic barays#! and canals, primed to store and disperse water throughout the area. Constructing and maintaining this network of waterways with skill will ensure our population will thrive even during the unstable monsoon seasons." #NEW
 #khm_great_builders_desc: "Our great cities are home to many barays and canals, ready to store and disperse water among the cities' boundaries. Our skill in constructing and maintaining this network of waterways will ensure our population can thrive even in the unstable monsoon seasons." #OLD ENG
 #khm_recruitment_of_peasants: "Reclutare i Contadini" #OLD ITA
 khm_recruitment_of_peasants: "Recruit the Peasantry" #NEW
 #khm_recruitment_of_peasants: "Recruit the Peasants" #OLD ENG
 #khm_recruitment_of_peasants_desc: "Dovremo rafforzare il nostro esercito con nuove reclute, che si trovano facilmente nella nostra classe contadina. Con un po' di addestramento, saremo in grado di assicurare che i ranghi delle nostre truppe possano essere riempiti in qualsiasi momento da soldati capaci." #OLD ITA
 khm_recruitment_of_peasants_desc: "We will need to reinforce our army with new recruits, which are easily found among the peasant class. With some training, we will be able to ensure the ranks can be refilled at any time by capable soldiers." #NEW
 #khm_recruitment_of_peasants_desc: "We will need to reinforce our army with new recruits, which are easily found in our peasantry. With some training, we will be able to ensure the ranks of our troops can be refilled at any time by capable soldiers." #OLD ENG
 khm_foreign_production_skills: "Invitare Esperti Stranieri"
 #khm_foreign_production_skills_desc: "Mentre il nostro stesso popolo non è abituato alla produzione di tessuti intrecciati di seta e preferisce altri tessuti, siamo fortunati che tessitori stranieri si siano stabiliti nelle nostre città per aprire le proprie botteghe tessili nella nostra terra. Dovremmo usare lo stesso approccio per altri rami industriali ed espandere la nostra produttività universalmente." #OLD ITA
 khm_foreign_production_skills_desc: "While our own people are not familiar with silk-weaving and prefer other fabrics, we are lucky that foreign artisans have settled in our cities and established their own weaving workshops. We should adopt this approach for other industries by directly inviting foreign artisans to bring their skills here, and thereby universally expand our production." #NEW
 #khm_foreign_production_skills_desc: "While our own people are not used to the production of cloth woven from silk and prefer other fabrics, we are lucky that foreign weavers have settled in our cities to establish their own weaver shops in our land. We should use the same approach to other industrial branches and expand our productivity universally." #OLD ENG
 khm_utilize_the_rivers: "La Linfa Vitale di $KHM$"
 #khm_utilize_the_rivers_desc: "I fiumi delle nostre terre forniscono un modo eccellente per trasportare i vari beni raccolti e prodotti nel nostro territorio interno ai nostri porti collegati alle rotte commerciali straniere. Utilizzare questa rete di trasporto ci aiuterà anche a collegare le nostre città e rendere la comunicazione tra loro più veloce." #OLD ITA
 khm_utilize_the_rivers_desc: "Our rivers provide an excellent way to transport goods harvested and produced in our inland territories to our harbors, which are connected to foreign trade routes. Utilizing this transport network will also connect our cities and make communication between them faster." #NEW
 #khm_utilize_the_rivers_desc: "The rivers of our lands provide an excellent way to transport the various goods harvested and produced in our inland territory to our harbors connected to foreign trade routes. Utilizing this transport network will also help us connect our cities and make communication between them faster." #OLD ENG
 khm_champa_mercenaries: "Leader Mercenari di $CHA$"
 #khm_champa_mercenaries_desc: "In passato abbiamo sia combattuto con che fatto affidamento sui feroci soldati $CHA$. Se possiamo assicurarci il servizio dei loro leader più capaci, possiamo garantire che il nostro stesso esercito rimanga ben addestrato e pronto a combattere in varie circostanze." #OLD ITA
 khm_champa_mercenaries_desc: "In the past, we both fought with and alongside the fierce warriors of $CHA$. If we can secure the service of their most capable leaders in times of conflict, we can ensure our own forces are trained and well-rested, ready to leap into battle as fresh reinforcements." #NEW
 #khm_champa_mercenaries_desc: "In the past we have both fought with and relied upon the fierce $CHA$ soldiers. If we can secure the service of their most capable leaders, we can ensure that our own army remains well-trained and ready to fight in various circumstances." #OLD ENG
 khm_restore_angkor: "Restauro di $angkor$"
 #khm_restore_angkor_desc: "La grande città di $angkor$ fu un tempo un faro splendente del nostro genio architettonico. A causa di influenze esterne, abbiamo dovuto ridurre i nostri sforzi di costruzione, ma dovremmo ricollegarci alle radici del nostro regno e ricominciare a costruire nuovi monumenti al nostro splendore." #OLD ITA
 khm_restore_angkor_desc: "The great city of $angkor$ was once a brilliant example of our architectural genius. Due to external pressures, we had to abandon our construction efforts, but we should connect to the roots of our society and start constructing new monuments to our splendor again." #NEW
 #khm_restore_angkor_desc: "The great city of $angkor$ was once a shining beacon of our architectural genius. Due to outside influences, we had to cut down on our construction efforts, but we should connect to the roots of our realm and start constructing new monuments to our splendor again." #OLD ENG
 khm_modern_navy: "Una Marina Moderna per $KHM$"
 #khm_modern_navy_desc: "Non possiamo permettere ad altri di dominare i mari e controllare il commercio da cui dipende il nostro stato. Creiamo una forza nuova e moderna capace di affrontare qualsiasi pirata o marina rivale nel $south_east_asia$." #OLD ITA
 khm_modern_navy_desc: "We cannot allow others to dominate the seas and control the trade our state depends on. Let us create a new, modern naval force capable of taking on any pirate or rival navy in $south_east_asia$." #NEW
 #khm_modern_navy_desc: "We cannot allow others to dominate the seas and control the trade our state depends on. Let us create a new and modern force capable of taking on any pirate or rival navy in $south_east_asia$." #OLD ENG
 khm_invest_in_irrigation: "Espandere i Baray"
 #khm_invest_in_irrigation_desc: "Mentre i nostri bacini idrici esistenti supportano le nostre attuali esigenze agricole, potremmo facilmente sostenere più persone se dovessimo scavare nuovi baray in altre parti del nostro paese, creando il supporto per nuovi centri urbani per il nostro popolo." #OLD ITA
 khm_invest_in_irrigation_desc: "While our existing water reservoirs meet our current agricultural demands, we could easily support more people if we were to dig new #italic barays#! in other parts of our country, creating the foundations for new urban hubs." #NEW
 #khm_invest_in_irrigation_desc: "While our existing water reservoirs support our current agricultural demands, we could easily support more people if we were to dig new barays in other parts of our country, creating the support for new urban hubs for our people." #OLD ENG
 khm_protection_from_raids: "Proteggere i Confini"
 #khm_protection_from_raids_desc: "Le nostre terre sono frequentemente minacciate da invasioni e specialmente la nostra preziosa $angkor$ giace aperta all'assedio e al destino. Dobbiamo investire in un sistema esteso di fortificazioni con guarnigioni sufficienti per resistere a qualsiasi forza invasore, così da poter proteggere il nostro stesso popolo dalla schiavitù e dal dominio straniero." #OLD ITA
 khm_protection_from_raids_desc: "Our lands are frequently threatened by invasion, and our precious $angkor$ lies especially vulnerable to siege. We must invest into a comprehensive system of fortifications, with sufficient garrisons to withstand any invading force, so that we can protect our people and national treasures from foreign conquest." #NEW
 #khm_protection_from_raids_desc: "Our lands are frequently threatened by invasion and especially our precious $angkor$ lies open to siege and doom. We need to invest into a sprawling system of fortifications with enough garrison to withstand any invading force, so that we can protect our own people from enslavement and foreign rule." #OLD ENG
 khm_old_grudges: "Guidati dalla Rivalità"
 #khm_old_grudges_desc: "Il nostro popolo è stato umiliato in passato da invasori che ci hanno costretto a inchinarci a loro. Sebbene non ogni sconfitta possa essere evitata, la utilizziamo per spronare il nostro popolo a imprese più grandi nei campi di battaglia a venire." #OLD ITA
 khm_old_grudges_desc: "Our people were humiliated in the past by being forced to bow to foreign invaders. While not every defeat can be avoided, we use these old rivalries to spur our people to fight harder and longer on the battlefield, burning to erase the shame of these ancient humiliations." #NEW
 #khm_old_grudges_desc: "Our people have been humiliated in the past by invaders forcing us to bow to them. While not every defeat can be avoided, we utilize it to spur out people to greater feats on the battlefields to come." #OLD ENG


 peasant_connections_advance: "Connessioni Contadine"
 #peasant_connections_advance_desc: "I nostri mercanti hanno stabilito connessioni con gli insediamenti rurali dentro e oltre i nostri confini. Di conseguenza, questi mercanti sono in grado di assicurarsi prezzi migliori per il sostentamento rispetto a quanto previsto." #OLD ITA
 peasant_connections_advance_desc: "Our merchants have established connections to the rural settlements within and beyond our borders. As a result, they are able to secure better prices for food than would otherwise be expected." #NEW
 #peasant_connections_advance_desc: "Our merchants have established connections to the rural settlements within and beyond our borders. As a result, these merchants are able to secure better prices for nourishment than what is expected." #OLD ENG
 
 
 settle_the_frontier_advance: "Richiamo della Frontiera"
 #settle_the_frontier_advance_desc: "Siamo circondati da territori maturi per essere presi. Debolmente difesi, inviare membri avventurosi della nostra corte ci permetterà di far rispettare la nostra autorità in queste terre incontese." #OLD ITA
 settle_the_frontier_advance_desc: "We are surrounded by weakly defended territories ripe for the taking! Let us send out some adventurous courtiers to enforce our authority in these unclaimed lands." #NEW
 #settle_the_frontier_advance_desc: "We are surrounded by territories ripe for the taking. Weakly defended, sending adventurous members of our court will allow us to enforce our authority in these uncontested lands." #OLD ENG

#Trebizond
 tre_pontic_trail_mastery: "Padronanza dei Sentieri $pontic_greek_culture$"
 #tre_pontic_trail_mastery_desc: "Le nostre terre sono la nostra casa; le nostre foreste, il nostro giardino. Ne conosciamo ogni parte meglio di chiunque altro. Ogni percorso e ogni sentiero che lo attraversa ci è noto, e faremo uso di quella conoscenza se qualcuno oserà invaderci." #OLD ITA
 tre_pontic_trail_mastery_desc: "Our land is like our home; its forests, our garden. We know every bit of it better than anyone. Every path and every trail that crosses it is known to us, and we will make use of that knowledge if any dare to invade us." #NEW
 #tre_pontic_trail_mastery_desc: "Our lands are our home; our forests, our garden. We know every bit of it better than anyone. Every path and every trail that crosses it is known to us, and we will make use of that knowledge if any dares to invade us." #OLD ENG
 tre_komnenos_legacy: "Eredità dei $komnenos_dynasty$"
 #tre_komnenos_legacy_desc: "Che nessuno dimentichi che siamo i discendenti dei $komnenos_dynasty$ che governarono l'Impero $BYZ_ADJ$. Sebbene ora governiamo uno stato diverso, l'eredità e il prestigio della nostra dinastia rimangono qualcosa che non può essere negato." #OLD ITA
 tre_komnenos_legacy_desc: "Let nobody forget that we are the descendants of the $komnenos_dynasty$ that ruled over the $BYZ_ADJ$ Empire. Although we now rule a different state, the legacy and prestige of our dynasty remains undeniable." #NEW
 #tre_komnenos_legacy_desc: "Let nobody forget that we are the descendants of the $komnenos_dynasty$ that ruled over the $BYZ_ADJ$ Empire. Although we now rule a different state, the legacy and prestige of our dynasty remains something that cannot be denied." #OLD ENG
 tre_princes_of_the_lazes: "Principi dei $laz_culture$"
 #tre_princes_of_the_lazes_desc: "I $laz_culture$ hanno abitato queste terre per secoli. Mentre il nostro Impero fu forgiato come certamente $greek_culture$, è vero che molti $laz_culture$ rimasero entro i nostri confini. Per questo, molti dei nostri nemici arrivarono a chiamarci $tre_princes_of_the_lazes$ per scherno, considerandoci inferiori. Tuttavia, nonostante i loro sforzi, ciò non diminuisce la nostra pretesa, e indosseremo quel titolo con orgoglio." #OLD ITA
 tre_princes_of_the_lazes_desc: "The $laz_culture$ have inhabited these lands for centuries. While our Empire was forged by $greek_culture$ people, many $laz_culture$ nonetheless remain within our borders. This has led to some of our enemies calling us $tre_princes_of_the_lazes$ in mockery, regarding us as inferiors. However, no matter what they say, it does not diminish our heritage, and we shall wear the title proudly." #NEW
 #tre_princes_of_the_lazes_desc: "The $laz_culture$ have inhabited these lands for centuries. While our Empire was forged as certainly $greek_culture$, it is true that many $laz_culture$ remained within our borders. As such, many of our enemies got to call us $tre_princes_of_the_lazes$ in mockery, regarding us as inferiors. However, no matter their efforts, that does not diminish our claim, and we shall wear that title proudly." #OLD ENG
 tre_strategic_marriages: "Matrimoni Strategici"
 #tre_strategic_marriages_desc: "Non è solo con il potere della spada che si possono conquistare regni e imperi. Stabilendo stretti legami matrimoniali con molte delle nostre nazioni circostanti, possiamo assicurarci una possibilità di successione ai loro troni. O almeno, che possiamo estendere la nostra influenza su di loro." #OLD ITA
 tre_strategic_marriages_desc: "Kingdoms are conquered not only by the sword. By forging marriage alliances with surrounding nations, we create opportunities to inherit their thrones — and, at the very least, extend stronger influence over them." #NEW
 #tre_strategic_marriages_desc: "It is not only by the power of the sword that one can conquer kingdoms and empires. By establishing close marriage ties with many of our surrounding nations, we can ensure a chance of succession into their thrones. Or at least, that we can extend our influence over them." #OLD ENG
 tre_grand_komnenoi: "Grandi Comneni"
 #tre_grand_komnenoi_desc: "La dinastia $komnenos_dynasty$ potrebbe essere stata espulsa dal trono dell'Impero $BYZ_ADJ$ in passato, ma la sua gloria non fu mai spenta. Il riconoscimento che la nostra stirpe ha guadagnato è ancora molto presente, e il rispetto che sia il nostro popolo che altri paesi hanno per noi non è immeritato." #OLD ITA
 tre_grand_komnenoi_desc: "The $komnenos_dynasty$ dynasty may have been expelled from the $BYZ_ADJ$ throne long ago, but its glory never faded. Members of our lineage are still shown the appropriate deference, and this respect and admiration stretches far beyond our borders." #NEW
 #tre_grand_komnenoi_desc: "The $komnenos_dynasty$ dynasty may have been expelled from the throne of the $BYZ_ADJ$ Empire in the past, but its glory was never quenched. The recognition our line earned is still as much present, and the respect both our people and other countries have for us is not undeserved." #OLD ENG
 tre_pontic_mountains: "Montagne $pontic_greek_culture$"
 #tre_pontic_mountains_desc: "Proprio come le Alpi separano i $french_group$ e gli $italian_group$, le Montagne $pontic_greek_culture$ separano la nostra ultima roccaforte $greek_culture$ in $anatolia_region$ dagli invasori $turkic_group$ che hanno conquistato l'Altopiano Anatolico. Il Ponto è sempre stato più $greek_culture$ del resto dell'$anatolia_region$, forse l'eredità del grande Mitridate di un tempo ispirerà i nostri guerrieri e incuterà nei Turchi tanto timore quanto ne incuteva nei Romani?" #OLD ITA
 tre_pontic_mountains_desc: "Much as the Alps separate the $french_group$ and $italian_group$, the $pontic_greek_culture$ Mountains separate our last $greek_culture$ holdout in $anatolia_region$ from the $turkic_group$ invaders who have seized the Anatolian Plateau. Pontus has always been more $greek_culture$ than the rest of $anatolia_region$; perhaps the legacy of the great Mithridates will inspire our warriors and strike as much fear into the Turks as he did the Romans?" #NEW
 #tre_pontic_mountains_desc: "Much as the Alps separate the $french_group$ and $italian_group$, the $pontic_greek_culture$ Mountains separate our last $greek_culture$ holdout in $anatolia_region$ from the $turkic_group$ invaders who have seized the Anatolian Plateau. Pontus has always been more $greek_culture$ than the rest of $anatolia_region$, perhaps the legacy of the great Mithridates of old will inspire our warriors and strike as much fear into the Turks as he did the Romans?" #OLD ENG
 tre_byzantine_birthright: "Diritto di Nascita $BYZ_ADJ$"
 #tre_byzantine_birthright_desc: "Il grande Impero $BYZ_ADJ$ sotto il governo dei nostri antenati era davvero qualcosa da ammirare. Fu l'inganno e il tradimento che ci costrinsero ad essere espulsi da lì, solo per essere riforgiati e risorgere di nuovo. Nessuno dubiterà della nostra autorità." #OLD ITA
 tre_byzantine_birthright_desc: "The great $BYZ_ADJ$ Empire, under the rule of our forefathers, was truly something to behold. Deceit and treachery may have toppled their regime, but $BYZ$ has risen like the phoenix to reclaim its former glory, and now no one shall doubt our authority!" #NEW
 #tre_byzantine_birthright_desc: "The great $BYZ_ADJ$ Empire under the rule of our forefathers was truly something to behold. It was deceit and treachery that forced us to be expelled from there, only to be reforged and rise again. No one shall doubt our authority." #OLD ENG
 tre_trapezuntine_monasteries: "Monasteri $TRE_ADJ$"
 #tre_trapezuntine_monasteries_desc: "È la nostra fede ciò che mantiene al sicuro le anime del nostro popolo. Il nostro clero, coloro che assicurano la loro salvezza. Cosa sono allora i nostri monasteri, se non la fonte e l'origine di tale salvezza?" #OLD ITA
 tre_trapezuntine_monasteries_desc: "It is our faith that saves the souls of our people, and our clergy are the ones who ensure their salvation. What,  then, are our monasteries, if not the source and origin of such salvation?" #NEW
 #tre_trapezuntine_monasteries_desc: "It is our faith what keeps our people's souls save. Our clergy, the ones who ensure their salvation. What are then our monasteries, if not the source and origin of such salvation?" #OLD ENG
 tre_greek_stronghold: "Roccaforte $greek_language$"
 #tre_greek_stronghold_desc: "Sin dai tempi antichi, il $greek_language$ è sempre stato la lingua dell'educazione e della scienza. Quando i nostri antenati arrivarono nelle nostre terre, portarono con sé non solo la loro autorità ma anche la loro cultura e lingua. Per questo, la tradizione $greek_language$ dell'apprendimento è ben viva nel nostro paese." #OLD ITA
 tre_greek_stronghold_desc: "Since ancient times, $greek_language$ has been the language of education and science. When our ancestors came here, they not only brought their determination, but also their culture and native tongue. As such, the $greek_language$ tradition of learning is very much alive in our country." #NEW
 #tre_greek_stronghold_desc: "Since ancient times, $greek_language$ has always been the language of education and science. When our ancestors came to our lands, they not only brought with them their authority but also their culture and language. As such, the $greek_language$ tradition of learning is well alive in our country." #OLD ENG
 tre_komnenoi_princesses: "Principesse Comnene"
 #tre_komnenoi_princesses_desc: "Ci sono state molte donne straordinarie emerse dalla dinastia $komnenos_dynasty$, e molti tra i governanti d'$europe$ e persino alcuni tra gli infedeli hanno cercato la loro mano in matrimonio. La nostra stirpe è ben rispettata, e le nostre principesse lo sono doppiamente, poiché sono loro che permettono ai paesi stranieri di rivendicare legittimità attraverso la nostra linea, e a noi di mantenere influenza nelle loro corti." #OLD ITA
 tre_komnenoi_princesses_desc: "Some remarkable women have emerged from along the $komnenos_dynasty$, and many among the rulers of $europe$ and even the infidels have sought their hands in matrimony. Our line is well-respected, and our princesses doubly so, for they are what allow foreign countries to claim legitimacy through our line, and us to maintain influence in foreign courts." #NEW
 #tre_komnenoi_princesses_desc: "There have been many remarkable women emerging from the $komnenos_dynasty$ dynasty, and many among the rulers of $europe$ and even some among the infidels have sought their hand in matrimony. Our line is well respected, and our princesses doubly so, for they are what allows foreign countries to claim legitimacy through our line, and us to keep influence in their courts." #OLD ENG
 tre_terminus_of_the_silk_road: "Termine della Via della Seta"
 #tre_terminus_of_the_silk_road_desc: "Anche quando era chiamata Trapezunte nelle nebbie dell'Antichità, gli antichi $greek_culture$ potevano vedere quanto utile fosse la sua posizione, il punto in cui la rotta terrestre attraverso l'$asia$ incontra la rotta marittima che conduce al Mediterraneo. Diventammo famosi come punto terminale della grande Via della Seta, poiché la ricchezza della $china$ e dell'$india$ passava attraverso le nostre terre verso l'$europe$. Non c'è ragione per non cercare di trattenere parte della ricchezza che passa." #OLD ITA
 tre_terminus_of_the_silk_road_desc: "Even when it was called Trapezous in the mists of antiquity, our nation was the point where the land route across $asia$ meets the sea route leading to the Mediterranean. We grew famous as the terminal point for the great Silk Road, the wealth of $china$ and $india$ passing through our lands on its way to $europe$. Since our nation still lies in this crucial location, there is no reason for us not to continue and encourage this steady flow of intercontinental trade." #NEW
 #tre_terminus_of_the_silk_road_desc: "Even when it was called Trapezous in the mists of Antiquity, the ancient $greek_culture$ could see how useful a location it was, the point where the land route across $asia$ encounters the sea route that leads to the Mediterranean. We grew famous as the terminal point for the great Silk Road, as the wealth of $china$ and $india$ passed through our lands on its way to $europe$. There is no reason not to try to keep some of the wealth passing through." #OLD ENG
 tre_lessons_of_the_fourth_crusade: "Lezioni della Quarta Crociata"
 #tre_lessons_of_the_fourth_crusade_desc: "Isacco Angelo, che depose la nostra linea nel 1185, fu egli stesso deposto e accecato, e, con il pretesto di rimettere il vecchio sciocco cieco sul trono, le truppe $VEN_ADJ$ saccheggiarono $constantinople$ nel 1204. Se c'è qualcosa da imparare da questo, è che il tradimento e l'inganno sono onnipresenti nella lotta per il potere, ma sono anche ciò che assicura la vittoria." #OLD ITA
 tre_lessons_of_the_fourth_crusade_desc: "Isaakios Angelos, who deposed our line centuries ago, was himself deposed and blinded. On the pretense of putting the blind old fool back on the throne, the $VEN_ADJ$ troops then sacked $constantinople$. If there is something to learn from this incident, it is that treason and deceit are ubiquitous in the struggle for power, but they can also safeguard victory." #NEW
 #tre_lessons_of_the_fourth_crusade_desc: "Isaakios Angelos, who deposed our line in 1185, was himself deposed and blinded, and, on the pretense of putting the blind old fool back on the throne, the $VEN_ADJ$ troops sacked $constantinople$ in 1204. If there is something to learn from that, is that treason and deceit are ubiquitous in the struggle for power, but they are also what ensures victory." #OLD ENG
 tre_trapezuntine_endurance: "Resistenza $TRE_ADJ$"
 #tre_trapezuntine_endurance_desc: "Cacciati dal loro paese, eppure la nostra stirpe sopravvisse. Costretti a vivere in una terra montuosa circondata da nemici, eppure il nostro popolo prosperò. Siamo certi di sfruttare al meglio qualunque esito incontriamo, e il nostro popolo è certo di sfruttare al meglio qualunque risorsa abbia." #OLD ITA
 tre_trapezuntine_endurance_desc: "Banished from our country, and yet our line survived. Forced to live in a mountainous wasteland surrounded by enemies, and yet our people thrived. We are a resourceful people, determined to make the most of what we have and to best whatever situation we encounter." #NEW
 #tre_trapezuntine_endurance_desc: "Forced out of their country, and yet our line survived. Made to live in a mountainous land surrounded by enemies, and yet our people thrived. We are sure to make the most of whatever outcome we encounter, and our people are sure to make the most from whatever resources they have." #OLD ENG

#Kilwa

 palm_tree_masters: "Maestri delle Palme"
 #palm_tree_masters_desc: "Nonostante la mancanza di beni prodotti localmente, una cosa che abbiamo in abbondanza sono le palme. Abbastanza dure da sostenere attività di costruzione e cantieristica navale, e abbastanza morbide da piegarsi e prendere forma grazie alla nostra maestria, padroneggiare questo tipo di legname ci permetterà certamente di espandere la nostra ricchezza e le attività marittime." #OLD ITA
 palm_tree_masters_desc: "We may not have a very robust manufacturing industry, but one thing we do have in abundance are palm trees. Sturdy enough to support construction and shipwrighting, but flexible enough to be shaped by our artisans, mastering the use of this unique lumber will help us expand our seafaring activities, improve production, and ultimately line our pockets." #NEW
 #palm_tree_masters_desc: "Despite the lack of locally-produced goods, one thing we have in abundance is palm trees. Hard enough to support construction and shipwright activities, and soft enough to bend and take shape by our craftsmanship, mastering this type of lumber will certainly allow us to expand our wealth and seafaring activities." #OLD ENG
 kilwan_trade_network: "Reti Commerciali $ZAN_ADJ$"
 #kilwan_trade_network_desc: "Attirando molti mercanti da luoghi lontani come la $persia_region$ e l'$arabia_region$, la nostra capitale è diventata un centro per il commercio, facilitando gli affari dal corno dell'$africa$ alle coste della $china$." #OLD ITA
 kilwan_trade_network_desc: "Attracting merchants from as far away as $persia_region$ and $arabia_region$, our capital has become a bustling commercial hub, facilitating business from the horn of $africa$ all the way to the shores of $china$." #NEW
 #kilwan_trade_network_desc: "Attracting many merchants from as far as $persia_region$ and $arabia_region$, our capital has become a hub for commerce, facilitating business from the horn of $africa$ to the shores of $china$." #OLD ENG
 the_dhow: "$n_kilwan_dhow$"
 the_dhow_desc: "$n_kilwan_dhow_desc$"
 the_kilwan_zambuc: "$n_kilwan_zambuc$"
 the_kilwan_zambuc_desc: "$n_kilwan_zambuc_desc$"
 bantu_and_perso_arabian: "$bantu_language_family$ e Perso-Arabo"
 #bantu_and_perso_arabian_desc: "Sin dalla nostra discesa dall'$arabia_region$ e dalla $persia_region$, abbiamo stabilito comunità attraverso la $swahili_coast_region$ che integrano i $bantu_language_family$ locali in uno sforzo per mantenere l'ordine sociale e aprire la strada all'ascesa di nuovi progressi architettonici e culturali!" #OLD ITA
 bantu_and_perso_arabian_desc: "Ever since our descent from $arabia_region$ and $persia_region$, we have established communities across the $swahili_coast_region$ that integrate the local $bantu_language_family$ in an effort to maintain social order and make way for the rise of new architectural and cultural advances." #NEW
 #bantu_and_perso_arabian_desc: "Ever since our descent from $arabia_region$ and $persia_region$, we have established communities across the $swahili_coast_region$ that integrate the local $bantu_language_family$ in an effort to maintain social order and make way for the rise of new architectural and cultural advances!" #OLD ENG
 zanj_taxation: "Tassazione Zanj"
 #zanj_taxation_desc: "Originariamente un termine per descrivere gli abitanti dell'interno dell'$africa$, in particolare quelli di origine $bantu_language_family$, questa gente venne ad abitare i nostri insediamenti e costituire una porzione sostanziale della nostra demografia. Pur garantendo loro molte libertà e responsabilità, sono tassati di conseguenza per preservare i loro privilegi. La loro relativa autonomia pacifica all'interno del nostro quadro giuridico ha aperto la strada all'introduzione di fenomeni linguistici e nuove tradizioni culturali." #OLD ITA
 zanj_taxation_desc: "Originally a term to describe the inhabitants of inner $africa$, particularly those of $bantu_language_family$ origin, these folk make up a substantial portion of our demographics. While they have many liberties and responsibilities, they are taxed accordingly in order to preserve these privileges. Their peaceful, relatively autonomous  place within our legal framework has led to the organic development of linguistic phenomena and new cultural traditions." #NEW
 #zanj_taxation_desc: "Originally a term to describe the inhabitants of inner $africa$, particularly those of $bantu_language_family$ origin, these folk came to inhabit our settlements and make up a substantial portion of our demographics. While affording them many liberties and responsibilities, they are taxed accordingly in order to preserve their privileges. Their relative peaceful autonomy within our legal framework has made way for the introduction of linguistic phenomena and new cultural traditions." #OLD ENG
 zan_food_imports: "Importazioni Alimentari"
 #zan_food_imports_desc: "L'alba di una nuova era nella navigazione ha aperto nuove opportunità per cercare sostentamento per il nostro popolo. Quando una volta commerciavamo solo con l'interno dell'$africa$ per cercare miglio, bestiame e riso vitali, ora possiamo raggiungere nuovi porti dove il cibo può essere più economico e più facilmente disponibile." #OLD ITA
 zan_food_imports_desc: "The dawn of a new age in seafaring has given us new opportunities to seek sustenance for our people. Whereas once we would only trade with the interior of $africa$ to procure crucial supplies of $millet$, $livestock$, and $rice$, we can now access new ports where food may be cheaper and more readily available." #NEW
 #zan_food_imports_desc: "The dawn of a new age in seafaring has opened new opportunities for us to seek sustenance for our people. When once we would only trade with the interior of $africa$ to seek vital millet, cattle, and rice, now we may reach new ports where food may be cheaper and more readily available." #OLD ENG
 zan_kilwan_latitude_staves: "Bastoni di Latitudine"
 #zan_kilwan_latitude_staves_desc: "La nostra superiore tecnologia navale ci permette di navigare più lontano e meglio di qualsiasi nostro concorrente, dandoci un vantaggio." #OLD ITA
 zan_kilwan_latitude_staves_desc: "Our superior ship technology allows us to sail further and for longer than any of our competitors, giving us a significant edge in any seafaring activity." #NEW
 #zan_kilwan_latitude_staves_desc: "Our superior ship technology allows us to sail further and better than any of our competitors, giving us the edge." #OLD ENG
 shirazi_legacy: "Eredità di Shirazi"
 #shirazi_legacy_desc: "Il nostro fondatore ancestrale venne da $shiraz$, figlio dell'Emiro della $persia_region$, il che non lascia dubbi sul nostro diritto a governare." #OLD ITA
 shirazi_legacy_desc: "Our ancestral founder came from $shiraz$, son of the 'Amīr of $persia_region$, which makes our right to rule undeniable." #NEW
 #shirazi_legacy_desc: "Our ancestral founder came from $shiraz$, son of the 'Amīr of $persia_region$, which gives no option of a doubt of our right to rule." #OLD ENG
 #zan_gold_trade_of_africa: "Commercio dell'Oro dell'$africa$" #OLD ITA
 zan_gold_trade_of_africa: "$goods_gold$ Trade of $africa$" #NEW
 #zan_gold_trade_of_africa: "Gold Trade of $africa$" #OLD ENG
 #zan_gold_trade_of_africa_desc: "Le nostre riserve di $goods_gold$ provenienti da molte fonti attraverso l'$africa$ orientale sono la pietra angolare della nostra ricchezza e prosperità. Dobbiamo sfruttare appieno le nostre riserve e diffondere una valuta forte." #OLD ITA
 zan_gold_trade_of_africa_desc: "Our abundant reserve of $goods_gold$ from many sources across $east_africa$ is the cornerstone of our economy. We must take full advantage of our reserves, and use our wealth to support and disseminate a strong currency. This will help us develop as a trading hub." #NEW
 #zan_gold_trade_of_africa_desc: "Our reserves of $goods_gold$ from many sources across Eastern $africa$ are the cornerstone of our wealth and prosperity. We must take full advantage of our reserves and spread a strong currency." #OLD ENG
 zan_diplomacy_through_trade: "Diplomazia Attraverso il Commercio"
 #zan_diplomacy_through_trade_desc: "La nostra posizione unica tra la ricchezza della $china$, dell'$india$ e dell'$europe$ ci costituisce una grande influenza nel gioco diplomatico tra Imperi e potenze straniere..." #OLD ITA
 zan_diplomacy_through_trade_desc: "We are uniquely positioned at the confluence of wealth coming from $china$, $india$, and $europe$. This not only benefits us financially, but it gives us great influence in the diplomatic game between Empires and foreign powers..." #NEW
 #zan_diplomacy_through_trade_desc: "Our unique position between the wealth of $china$, $india$, and $europe$ constitutes upon us great influence in the diplomatic game between Empires and foreign powers..." #OLD ENG
 
 #Dai Viet
 cha_matrilineal_heritage: "Eredità Matrilineare"
 #cha_matrilineal_heritage_desc: "La posizione della donna nella nostra società è molto più apprezzata e riverita rispetto ai nostri vicini. Il diritto di nascita di qualsiasi bambino proviene dal lato della madre e le donne godono di una grande quantità di libertà e doveri." #OLD ITA
 cha_matrilineal_heritage_desc: "Women in our society are given more reverence and appreciation than in many of our neighboring countries. The birthright of any child comes from their mother's side, and women have a wide array of liberties and social responsibilities." #NEW
 #cha_matrilineal_heritage_desc: "The position of the woman in our society is greatly more appreciated and revered compared to our neighbors. The birthright of any child comes from their mother's side and women enjoy a great deal of liberties and duties." #OLD ENG
 cha_religious_tolerance: "Tolleranza Religiosa"
 #cha_religious_tolerance_desc: "Il nostro popolo è un crogiolo di molte diverse influenze religiose. Le idee $buddhist_ADJ$ dalla $china$, le pratiche $hindu_ADJ$ dall'$india$, e la diffusione dell'$muslim$ nel $south_east_asia$ creano un ambiente unico dove solo la tolleranza religiosa può mantenere unita la nostra società." #OLD ITA
 cha_religious_tolerance_desc: "Our society is a melting pot of different religious influences. The $buddhist_ADJ$ ideas from $china$, the $hindu_ADJ$ practices from $india$, and the spread of $muslim$ in $south_east_asia$ create a unique environment where religious tolerance is paramount to keeping our society together." #NEW
 #cha_religious_tolerance_desc: "Our people is a melting pot of many different religious influences. The $buddhist_ADJ$ ideas from $china$, the $hindu_ADJ$ practices from $india$, and the spread of $muslim$ in $south_east_asia$ create a unique environment where only religious tolerance can keep our society together." #OLD ENG
 cha_dharmic_presence: "Presenza $dharmic_ADJ$"
 cha_dharmic_presence_desc: "Gli dei $dharmic_ADJ$ ci benedicono con la loro presenza. Possa la loro forza guidarci attraverso i momenti più difficili."
 cha_kshatriya: "Kṣatriya"
 #cha_kshatriya_desc: "Il $cha_kshatriya$ è un termine adottato dalle società $hindu_ADJ$ e descrive i nobili d'élite del nostro stato. Per questo, la nostra nobiltà assume un ruolo simile negli approcci alle questioni militari e di corte simili alle loro controparti dell'$india$." #OLD ITA
 cha_kshatriya_desc: "The $cha_kshatriya$ is a term adopted from $hindu_ADJ$ societies, and describes the elite nobles of our state. Given the origin of this term, it follows that our nobility take  similar roles in military and court affairs as their counterparts in $india$." #NEW
 #cha_kshatriya_desc: "The $cha_kshatriya$ is a term adopted from the $hindu_ADJ$ societies and describes the elite nobles of our state. As such, our nobility takes a similar role in the approaches to military and court manners similar to their counterparts of $india$." #OLD ENG
 cha_veteran_shipbuilders: "Costruttori Navali Veterani"
 #cha_veteran_shipbuilders_desc: "Il nostro stato si basa sul dominio marittimo per assicurare una posizione politica, militare ed economica forte in $indochina_region$. Per questo, la rapida costruzione di navi aggiuntive è di grande importanza per la nostra sopravvivenza." #OLD ITA
 cha_veteran_shipbuilders_desc: "Our state relies on maritime dominance to secure its political, military, and economical presence in $indochina_region$. As such, being able to build ships swiftly is of great importance to our survival." #NEW
 #cha_veteran_shipbuilders_desc: "Our state relies on maritime dominance to secure a political, military, and economical strong position in $indochina_region$. As such, the swift construction of additional ships is of great importance for our survival." #OLD ENG
 cha_haluwbilau: "Haluwbilau"
 #cha_haluwbilau_desc: "Gli $cha_haluwbilau$ sono guerrieri d'élite e ufficiali in posizioni chiave del nostro esercito terrestre e navale. Selezionati in base ai loro talenti e al loro coraggio, questi uomini guidano eserciti e navi in battaglia contro minacce esterne, oltre a mediare dispute all'interno delle molte comunità del nostro stato." #OLD ITA
 cha_haluwbilau_desc: "The $cha_haluwbilau$ are elite warriors who occupy key positions in both our land and naval forces. Selected for their talents and bravery, these men lead armies and ships into battle against external threats, and also mediate disputes in local communities." #NEW
 #cha_haluwbilau_desc: "The $cha_haluwbilau$ are elite warriors and officers in key positions of our land and naval military. Selected based on their talents and bravery, these men lead armies and ships into battle against exterior threats, as well as mediate disputes within our state's many communities." #OLD ENG
 cha_commercial_state: "Stato Commerciale"
 #cha_commercial_state_desc: "Gran parte della nostra ricchezza è dovuta alle opportunità commerciali che i nostri territori forniscono. Dovremmo concentrare i nostri sforzi per massimizzarla ancora di più, creando uno stato commerciale nel processo." #OLD ITA
 cha_commercial_state_desc: "Much of our wealth comes from trade. We should concentrate on expanding and refining our exchange practices, with the ultimate goal of creating a commercial state in the process." #NEW
 #cha_commercial_state_desc: "Much of our wealth is thanks to the trading opportunities our territories provide. We should concentrate our efforts to maximize it even further, creating a commercial state in the process." #OLD ENG
 cha_boarding_tactics: "Tattiche di Abbordaggio"
 #cha_boarding_tactics_desc: "A causa del terreno difficile in cui risiede la maggior parte della nostra terra, gli invasori stranieri devono fare affidamento sulla supremazia navale nel loro tentativo di conquistarci. I decenni di pirateria nei mari indocinesi ci hanno insegnato preziose tattiche di abbordaggio che ci permettono di usare le loro stesse navi contro di loro." #OLD ITA
 cha_boarding_tactics_desc: "Due to our challenging native terrain, would-be conquerors must rely on their naval capabilities when attempting to invade us. Decades of piracy in the surrounding seas have taught us valuable boarding tactics, which allow us to use an opponent's own ships against them." #NEW
 #cha_boarding_tactics_desc: "Due to the difficult terrain most of our land resides in, foreign invaders have to rely on naval supremacy in their attempt to conquer us. The decades of piracy in the Indochinese seas have taught us valuable boarding tactics which allow us to use their very own ships against them." #OLD ENG
 cha_towers_on_water: "Torri sull'Acqua"
 #cha_towers_on_water_desc: "Come potenza marittima, gran parte della nostra ricchezza e potere proviene dal mare e dal nostro dominio su di esso. Per assicurarcelo, i nostri costruttori navali hanno progettato speciali grandi navi da guerra che sono conosciute come #italic Torri sull'Acqua#! - un ibrido tra una nave pesante e una galera usato per la supremazia navale." #OLD ITA
 cha_towers_on_water_desc: "As a maritime power, much of our wealth and power comes from the sea and our dominance over it. In order to secure this supremacy, our shipwrights have designed special large warships which are known as #italic Towers on the Water#!, hybrid creations between a heavy ship and a galley." #NEW
 #cha_towers_on_water_desc: "As a maritime power, much of our wealth and power comes from the sea and our dominance over it. In order to secure it, our ship builders have designed special large warships which are known as #italic Towers on the Water#! - a hybrid of a heavy ship and a galley used for naval supremacy." #OLD ENG
 cha_cham_cultural_influence: "Influenza Culturale $cham_culture$"
 #cha_cham_cultural_influence_desc: "Sebbene alcuni dei nostri vicini vedano la nostra cultura come inferiore, sono semplicemente in negazione poiché molti dei nostri aspetti culturali si fanno strada nelle loro corti autoproclamate 'civilizzate'. Ritmi di tamburi $cham_culture$, canzoni $cham_culture$, danze e poesia $cham_culture$ - tutti questi sono elementi che lasciano la loro influenza sugli altri senza fallire." #OLD ITA
 cha_cham_cultural_influence_desc: "Although some of our neighbors see our culture as inferior, they are just in denial, as many of our cultural aspects make their way into their self-proclaimed 'civilized' courts. $cham_culture$ drumming, songs, dances, poetry... all of these art forms have left a clear and lasting mark on what other nations consider artistic achievement!" #NEW
 #cha_cham_cultural_influence_desc: "Although some of our neighbors see our culture as inferior, they are just in denial as many of our cultural aspects make their way into their self-proclaimed 'civilized' courts. $cham_culture$ drum rhythms, $cham_culture$ songs, $cham_culture$ dances and poetry - all of these are elements which leave their influence on others without a fail." #OLD ENG
 dai_vietnamese_architecture: "Architettura $vietnamese_culture$"
 dai_vietnamese_architecture_desc: "Sebbene influenzata dai $chinese_group$, la nostra architettura rimane distinta e unica per il nostro stato. Pur seguendo ancora i concetti del Fēng Shuǐ, molti elementi tipici dei $chinese_group$ sono stati tralasciati o adattati al nostro ambiente unico."
 dai_tran_hung_dao: "Trần Hưng Đạo"
 dai_hung_dao_trans_military_feats: "Tattiche di $dai_tran_hung_dao$"
 #dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ fu un Principe Imperiale di $DAI$ decenni fa. Servì come ufficiale durante la prima invasione $mongolian_group$ di $DAI$ nel 1258, e come comandante principale durante la seconda guerra contro i Mongoli nel 1285 e il loro terzo tentativo nel 1287. Durante questi conflitti sanguinosi, $dai_tran_hung_dao$ riuscì a sviluppare tattiche che respinsero questi cavalieri costantemente." #OLD ITA
 dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ was an Imperial Prince of $DAI$ long ago. He served as officer during the first $MGE_ADJ$ invasion of $DAI$ in 1258, and as leading commander during the second war against the $MGE_ADJ$s in 1285 and their third attempt in 1287. During these bloody conflicts, $dai_tran_hung_dao$ managed to develop tactics which reliably repelled the oncoming onslaught of cavalry." #NEW
 #dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ was an Imperial Prince of $DAI$ decades ago. He served as officer during the first $mongolian_group$ invasion of $DAI$ in 1258, and as leading commander during the second war against the Mongols in 1285 and their third attempt in 1287. During these bloody conflicts, $dai_tran_hung_dao$ managed to develop tactics which repelled these horsemen consistently." #OLD ENG
 #dai_nha_nhac: "Nhã nhạc" #OLD ITA
 dai_nha_nhac: "Nhã Nhạc" #NEW
 #dai_nha_nhac: "Nhã nhạc" #OLD ENG
 #dai_nha_nhac_desc: "Il $dai_nha_nhac$ è la musica tradizionale suonata alle nostre corti ed eseguita alle cerimonie annuali. È un aspetto prominente della nostra cultura e un pilastro delle nostre tradizioni." #OLD ITA
 dai_nha_nhac_desc: "The $dai_nha_nhac$ is the traditional music played at our courts and performed at annual ceremonies. It is a prominent aspect of our culture, and a pillar of our traditions." #NEW
 #dai_nha_nhac_desc: "The $dai_nha_nhac$ is the traditional music played at our courts and performed at annual ceremonies. It is a prominent aspect of our culture and a pillar of our traditions." #OLD ENG
 dai_confucian_administration: "Amministrazione Confuciana"
 #dai_confucian_administration_desc: "La burocrazia del nostro stato è di grande importanza, e per questo solo i più capaci amministratori sono selezionati per i lavori d'ufficio. Studiati nei testi confuciani della $CHI$, questi burocrati assicurano un'operazione fluida e stabile." #OLD ITA
 dai_confucian_administration_desc: "Our state bureaucracy is obviously of the utmost importance, and as such, we select only the most capable administrators to hold government office. Learned in the Confucian texts of $CHI$, these bureaucrats ensure smooth and stable bureaucratic operations." #NEW
 #dai_confucian_administration_desc: "The bureaucracy of our state is of great importance, and as such only the most capable administrators are selected for the office works. Studied in the Confucian texts of $CHI$, these bureaucrats ensure a smooth and stable operation." #OLD ENG
 dai_giao_chi_arquebus: "Archibugio Giao Chỉ"
 #dai_giao_chi_arquebus_desc: "Il $dai_giao_chi_arquebus$ è un punto fermo nel nostro esercito. Autoprodotto e adattato alle esigenze delle nostre truppe, questo tipo di archibugio guadagna non solo l'elogio dei $chinese_group$ ma anche degli osservatori occidentali." #OLD ITA
 dai_giao_chi_arquebus_desc: "The $dai_giao_chi_arquebus$ is a staple of our military. Self-produced and adapted to the specific needs of our troops, this type of arquebus gains praise from not only $chinese_group$ people, but also Western observers." #NEW
 #dai_giao_chi_arquebus_desc: "The $dai_giao_chi_arquebus$ is a staple in our military. Self produced and adapted to the needs of our troops, this type of arquebus gains not only the praise of the $chinese_group$ but also Western observers." #OLD ENG
 #dai_ca_tru: "Ca trù" #OLD ITA
 dai_ca_tru: "Ca Trù" #NEW
 #dai_ca_tru: "Ca trù" #OLD ENG
 #dai_ca_tru_desc: "Il $dai_ca_tru$ è un genere $vietnamese_culture$ di narrazione musicale che serve sia come forma di intrattenimento che come esibizione di canti religiosi." #OLD ITA
 dai_ca_tru_desc: "The $dai_ca_tru$ is a $vietnamese_culture$ genre of musical storytelling which serves both entertainment and religious purposes." #NEW
 #dai_ca_tru_desc: "The $dai_ca_tru$ is a $vietnamese_culture$ genre of musical storytelling which serves both as a way of entertainment and a religious song performance." #OLD ENG
 dai_trade_advance: "Contratti Commerciali"
 #dai_trade_advance_desc: "La nostra storia è stata plasmata dalla $CHI$ per troppo tempo. Per lasciare il nostro segno sul mondo dobbiamo espandere la nostra portata oltre la sfera di influenza dei $chinese_group$." #OLD ITA
 dai_trade_advance_desc: "Our existence has been shaped by $CHI$ for too long. To leave our own mark on the world, we must expand our reach beyond the $chinese_group$ sphere of influence." #NEW
 #dai_trade_advance_desc: "Our history has been shaped by $CHI$ for too long. To leave our own mark on the world we have to expand our reach beyond the $chinese_group$ sphere of influence." #OLD ENG
 dai_literary_reform: "Riforma Letteraria"
 #dai_literary_reform_desc: "Per secoli, abbiamo usato il $classical_chinese_language$ per scrivere i nostri documenti. Tuttavia, la scrittura usata per scrivere la nostra lingua è il Chữ Nôm, una scrittura nativa basata sul Chữ Hán, la scrittura del $classical_chinese_language$. Il Chữ Nôm non era standardizzato e non veniva usato abbastanza spesso rispetto al $classical_chinese_language$, quindi c'è stata una certa spinta per una riforma per nazionalizzare la scrittura per i nostri scopi amministrativi." #OLD ITA
 dai_literary_reform_desc: "For centuries, we used $classical_chinese_language$ to write our documents. However, the script used to write our language is Chữ Nôm, a native script based on Chữ Hán, the script of $classical_chinese_language$. Chữ Nôm was non-standardized and not used often enough compared to $classical_chinese_language$, so there has been some pressure to reform the script and make it more suitable for our administrative purposes." #NEW
 #dai_literary_reform_desc: "For centuries, we have used $classical_chinese_language$ to write our documents. However, the script used to write our language is Chữ Nôm, a native script based on Chữ Hán, the script of $classical_chinese_language$. Chữ Nôm was non-standardized and not used often enough compared to $classical_chinese_language$, so there has been some urge for reform to nationalize the script for our administrative purposes." #OLD ENG
 dai_don_dien: "Đôn Điên"
 #dai_don_dien_desc: "Il $dai_don_dien$ è un sistema che utilizza colonie militari in cui soldati e contadini senza terra bonificano l'area per la fondazione di nuovi villaggi. Questi villaggi vengono poi incorporati nel nostro sistema amministrativo dopo tre anni e i soldati e i contadini senza terra si sposterebbero verso la terra disponibile." #OLD ITA
 dai_don_dien_desc: "The $dai_don_dien$ is a system which utilizes military colonies, in which soldiers and landless peasants clear the area for the establishment of new villages. These villages are then incorporated into our administrative system after three years, and the people who cleared the land may then claim and work it." #NEW
 #dai_don_dien_desc: "The $dai_don_dien$ is a system which utilizes military colonies in which soldiers and landless peasants clear the area for the establishment of new villages. These villages are then incorporated into our administrative system after three years and the soldiers and landless peasants would move on to the available land." #OLD ENG
 dai_thuan_thien: "Thuận Thiên"
 #dai_thuan_thien_desc: "$dai_thuan_thien$, o Volontà del Cielo, è il nome della spada leggendaria impugnata dal nostro liberatore, Lê Lợi. Secondo i racconti, la spada gli diede la forza di mille uomini per scuotere finalmente il giogo del dominio $chinese_group$. Lê Lợi è considerato come la perfetta incarnazione del leader ideale di cui il nostro stato ha bisogno." #OLD ITA
 dai_thuan_thien_desc: "$dai_thuan_thien$, or Heaven's Will, is the name of the legendary sword wielded by our liberator, Lê Lợi. According to the tales, the sword gave him the strength of a thousand men, enough to finally throw off the yoke of $CHI_ADJ$ rule. Many in our country look upon Lê Lợi as the perfect embodiment of the ideal leader." #NEW
 #dai_thuan_thien_desc: "$dai_thuan_thien$, or Heaven's Will, is the name of the legendary sword wielded by our liberator, Lê Lợi. According to the tales, the sword gave him the strength of a thousand men to finally shake off the yoke of $chinese_group$ rule. Lê Lợi is looked upon as the perfect embodiment of the ideal leader our state needs." #OLD ENG
 
 
#Majapahit

 foreign_architectural_influence: "Influenza Architettonica Straniera"
 #foreign_architectural_influence_desc: "Nelle nostre molte conquiste attraverso l'$indonesia_region$, siamo entrati in contatto con molti stili di architettura e modi per perpetuare la nostra eredità. Introducendo nuovi movimenti culturali e artistici nello sviluppo urbano, la nostra cultura incorporerà i migliori aspetti artistici della nostra regione." #OLD ITA
 foreign_architectural_influence_desc: "In our many conquests across $indonesia_region$, we have encountered many new and incredible forms of art, all of which could be adopted and refined by our people to further our legacy. By introducing new techniques and sponsoring artists, our culture will come to exemplify the artistic achievements of our region." #NEW
 #foreign_architectural_influence_desc: "In our many conquests across $indonesia_region$, we have come in contact with many styles of architecture and ways to further our legacy. By introducing new cultural and artistic movements in urban development, our culture will incorporate the best artistic aspects of our region." #OLD ENG
 
 maj_home_of_the_sea_nomads: "Casa dei Nomadi del Mare"
