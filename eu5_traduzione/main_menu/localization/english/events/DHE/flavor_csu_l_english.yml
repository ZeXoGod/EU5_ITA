l_english:
 flavor_csu.100.title: "Il [ShowBuildingTypeNameWithNoTooltip('panaqa_building')] di [ROOT.GetCountry.GetNameWithNoTooltip]"
 flavor_csu.100.desc: "Con la morte del nostro ultimo grande monarca, la famiglia reale ha distribuito le nostre terre ai vecchi [ShowBuildingTypeName('panaqa_building')]. Ancora una volta, il ciclo è ricominciato, e l'attuale [ROOT.GetCountry.GetGovernment.GetRulerTitle] deve stabilire [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] proprio eredità attraverso la conquista."
 flavor_csu.100.a: "Come è nostra tradizione."
 add_panaqas_to_every_location_tt: "#R Ogni [location|e] posseduta guadagna un [ShowBuildingTypeName('panaqa_building')].#!"

 flavor_csu.200.title: "Il Miglior #italic aqha#! nelle Ande"
 flavor_csu.200.desc: "[concubine_poisoner.GetName], moglie del nostro sovrano, è conosciuta come una delle migliori #italic aqha#! produttrici di [ShowAreaName('acamama_area')], la sua abilità di trasformare i chicchi di mais in una bevanda deliziosa era uno dei dolcificanti di accordo che ha aiutato a firmare il matrimonio reale tra [ROOT.GetCountry.GetName] e [GetCountry('AYA').GetName] nonostante la loro lunga storia di rivalità e attrito ai confini.\n\nOggi, [concubine_poisoner.GetShortNameWithNoTooltip] ha di nuovo preparato il suo famoso #italic aqha#!. Dovrebbe [ROOT.GetCountry.GetGovernment.GetRuler.GetName] goderselo come sempre?"
 flavor_csu.200.a: "Bevi!"
 flavor_csu.200.b: "Sta tramando qualcosa! Espellila!"
 flavor_csu.200.c: "La bevanda è stata avvelenata. Catturala!"
 flavor_csu.200.tt.c: "Falla scomparire silenziosamente."

 flavor_csu.201.title: "Tradimento!"
 flavor_csu_201_desc: "[concubine_poisoner.GetName] ha avvelenato il #italic aqha#! del nostro [qusqu_ruler.GetName] e nel momento in cui le guardie sono arrivate per aiutare [qusqu_ruler.GetHerHim], [qusqu_ruler.GetSheHe] giaceva già morto sul pavimento della sala del trono."
 flavor_csu.201.desc.a: "$flavor_csu_201_desc$\n\nMa il tradimento non finisce qui, poiché il guerriero [usurper_inka.GetName] ha colto l'occasione e invece di punire l'avvelenatore [usurper_inka.GetSheHe] ha rubato il trono per [usurper_inka.GetHerselfHimself] e ha iniziato a chiamare [usurper_inka.GetHerselfHimself] #italic Sapa Inka#!"
 flavor_csu.201.tt.a: "C'è un strano gusto residuo nella bevanda..."
 flavor_csu.201.desc.b: "$flavor_csu_201_desc$\n\nLa donna traditrice è stata catturata dalle guardie e solo il suo status di principessa di [GetCountry('AYA').GetName] l'ha salvata dal coltello.\nCosa dovrebbe essere fatto con lei?"
 flavor_csu.201.a: "Il [ROOT.GetCountry.GetGovernment.GetRulerTitle] è morto, lunga vita al [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
 flavor_csu.201.b: "Traditori! [old_heir.GetNameWithNoTooltip] è il vero [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
 hanan_qusqu_rebels: "Ribelli Hanan Qusqu"
 hurin_qusqu_rebels: "Ribelli Hurin Qusqu"
 flavor_csu.201.c: "Espellila!"
 flavor_csu.201.d: "Vendica il nostro [ROOT.GetCountry.GetGovernment.GetRulerTitle]"

 flavor_csu.202.title: "Le Conseguenze"
 flavor_csu.202.desc: "Dopo che la polvere si deposita e il nostro nuovo [ROOT.GetCountry.GetGovernment.GetRuler.GetName] ha assicurato [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] potere e la nuova posizione di [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] dinastia è il momento di decidere cosa fare con la famiglia [ShowDynastyName('hurin_qusqu_dynasty')].\n\nLe loro connessioni ed esperienza come sacerdoti e burocrati possono ancora essere di grande utilità, ma qualsiasi rancore rimasto potrebbe diventare un problema se mantengono posizioni di potere nel [ROOT.GetCountry.GetFlavorRank]."
 flavor_csu.202.a: "Manterranno solo i loro doveri verso #italic Inti#!."
 flavor_csu.202.b: "Assurdità! Espellili come cani!"
 flavor_csu.202.c: "Nessuno mette in pericolo il [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Uccidili tutti!"

 hurin_qusqu_privilege: "Alto Sacerdozio Hurin Qusqu"
 hurin_qusqu_privilege_desc: "L'Hurin Qusqu mantiene il dovere e il privilegio di servire Inti direttamente come il #italic Villaq Umu#!, il Gran Prete di Inti."

 flavor_csu.210.title: "Un Piano Subdolo"
 flavor_csu.210.desc: "Il nostro consigliere [minister.GetName] ci ha presentato un'opportunità di colpire i nostri odiati vicini di [GetCountry('CSU').GetName]. [minister.GetHeShe|U] è riuscito a infiltrare un agente nella loro corte e ha ottenuto accesso al [heir|e] [kidnapped_heir.GetName]. Se decidiamo di procedere potremmo facilmente portare [kidnapped_heir.GetHimHer] nella nostra custodia e portarlo a [ROOT.GetCountry.GetCapital.GetName]. Una volta fatto il atto potremmo riscattare [kidnapped_heir.GetHimHer] a [GetCountry('CSU').GetGovernment.GetRuler.GetName]."
 flavor_csu.210.a: "Procedi."
 flavor_csu.210.b: "Non siamo mostri! Lascia la corte."

 flavor_csu.211.title: "Erede Rapito"
 flavor_csu.211.desc: "Il mostro che governa [GetCountry('AYA').GetName] [GetCountry('AYA').GetGovernment.GetRuler.GetName] ha inviato agenti alla nostra capitale. Sono riusciti a rapire il nostro [heir|e] [kidnapped_heir.GetName] e scappare con [kidnapped_heir.GetHimHer] di nuovo alla loro tana a [ROOT.GetCountry.GetCapital.GetName]. Ora stanno chiedendo una grande quantità d'oro in cambio del ritorno di [kidnapped_heir.GetHimHer] a noi."
 flavor_csu.211.a: "Pagare il riscatto."
 flavor_csu.211.b: "Non daremo loro quello che cercano."

 flavor_csu.212.title: "L'Oro Arriva"
 flavor_csu.212.desc: "I codardi in [GetCountry('CSU').GetName] hanno finalmente ceduto e hanno inviato l'oro che abbiamo richiesto."
 flavor_csu.212.a: "Restituisci il bambino."
 flavor_csu.212.b: "Idioti! Terremo entrambi."

 flavor_csu.213.title: "Il Bambino Malvagio"
 flavor_csu.213.desc: "Dall'arrivo del bambino [GetCountry('CSU').GetAdjective] a [ROOT.GetCountry.GetCapital.GetName] i cortigiani sono stati nervosi. Il bambino non ha smesso di piangere e lamentarsi dal suo [kidnapped_heir.GetHisHer] arrivo, al punto che i loro carcerieri dicono che [kidnapped_heir.GetHeShe] ha iniziato a piangere lacrime di sangue. I servitori del palazzo credono che il bambino sia posseduto da uno spirito maligno e che il sovrano [GetCountry('CSU').GetAdjectiveWithNoTooltip] lo sapesse e per questo motivo non ha tentato di recuperarlo."
 flavor_csu.213.a: "Restituisci questo bambino malvagio a [kidnapped_heir.GetHisHer] tana prima che accada qualcosa di più."
 flavor_csu.213.b: "Sciocchezze dei servitori superstiziosi."
