l_english:
 flavor_zaz.1.title: "Ascesa del $ZAZ_ADJ$ Sich"
 flavor_zaz.1.desc: "Con l'influenza sempre crescente del [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] all'interno [ROOT.GetCountry.GetName], i numerosi guerrieri, servi e tribù hanno lentamente migrato verso le terre di [ShowAreaName('zaporizhzhia_area')]. Dopo aver costruito diverse fortificazioni sul Dniepr, intendono ora fare la loro permanenza lì, sperando per un giorno di raggiungere uno status autogovernante all'interno [ROOT.GetCountry.GetNameWithNoTooltip].\n\nAltre nazioni pure hanno notato questo, e ora stanno pianificando come utilizzare propriamente questo disperato di questo nuovo Sich nel controllo completo sull'area."
 flavor_zaz.1.historical_info: "Lo Zaporozhian Sich rimane il più famoso dei cosacchi. Fondato tra la fine del XV e XVI secolo, la sua emergenza è attribuita alla costruzione del castello di Khortytsia vicino al fiume Dniepr. Avrebbero proseguito a servire il Comunità Polacco-Lituano contro gli Ottomani in aumento, ma avrebbero infine ribellarsi e unirsi all'Impero russo, ma anche allora avrebbero traballare per mantenere la loro identità cosacca. Alla fine sarebbero stati sciolti e entro il 1775 sarebbero stati sostituiti dal Danube Sich."
 flavor_zaz.1.a: "Questi [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] vogliono governare ora?"
 flavor_zaz.1.b: "Faranno buoni soggetti di noi."
 zaz_gains_cores_in_all_of_zaporizhzhia_area_tt: "$ZAZ$ guadagnerà [cores|e] in tutto il [ShowAreaName('zaporizhzhia_area')] [area|e]."

 flavor_zaz.2.title: "Il Nostro Futuro con il [target_international_organization.GetNameWithNoTooltip]"
 flavor_zaz.2.desc: "Nonostante il nostro status come fedele [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetFlavorRank] all'interno del [target_international_organization.GetName], molte persone, incluso [target_character.GetName], hanno notato come lontano [ROOT.GetCountry.GetName] è diventato da [target_country.GetName]. Invece di stare inattivi mentre lasciamo continuare questo trend, i membri [ROOT.GetCountry.Custom('IT_CLERGY_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] e il [ROOT.GetCountry.GetGovernment.GetCourtTitle] desiderano annullare tutto questo. Ci sono alcuni, però, che pensano che questa sia una possibilità per [ROOT.GetCountry.GetNameWithNoTooltip] di sviluppare la propria cultura, indipendente dall'immischione dei funzionari a [target_country.GetCapital.GetName]."
 flavor_zaz.2.a: "Concediamo loro un regalo come gesto di amicizia."
 flavor_zaz.2.b: "Nessun regalo sarà dato a [target_country.GetNameWithNoTooltip]!"

 flavor_zaz.1000.title: "Una Prova di Lealtà"
 flavor_zaz.1000.desc: "Anche se molte persone all'interno [ROOT.GetCountry.GetName] sono state contente del dominio [target_country.GetAdjective], c'è stata una piccola spaccatura tra [target_character.GetName] e [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName], portando a gran parte del [ROOT.GetCountry.GetGovernment.GetCourtTitle] desiderando cercare una nuova alternativa. Uno di loro è il [target_country2.GetLongName], cercando di utilizzare il nostro [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] nel loro esercito, e in cambio ci aiuteranno a liberarci dalla regola che siamo sotto."
 flavor_zaz.1000.a: "Chiederemo loro aiuto."
 flavor_zaz.1000.b: "Ribellarsi contro [target_country.GetNameWithNoTooltip] è rischioso, anche con il supporto di [target_character2.GetNameWithNoTooltip]."
 zaz_russia_will_declare_war_if_they_accept_tt: "Se [target_country2.GetName] accetta la nostra offerta, diventeremo il loro [ShowSubjectTypeName('vassal')] e dichiariamo guerra a [target_country.GetName]"
 zaz_no_rebellion_tt: "Sceglieremo di non ribellarci contro [target_country.GetName]"

 flavor_zaz.1001.title: "$flavor_zaz.1000.title$"
 flavor_zaz.1001.desc: "Anche se ci sono stati molti conflitti tra noi e [target_country.GetName], sono stati sempre in pieno controllo dei loro soggetti [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] a [target_country3.GetName]. I recenti sviluppi nella loro politica, però, hanno reso [target_character3.GetName] desiderosa di cambiare lealtà, e [target_character3.GetSheHe] ha offerto [target_character2.GetName] di unirsi a noi invece, in scambio di aiuto nel liberarsi della regola [target_country.GetAdjectiveWithFlagWithNoTooltip] hanno sofferto abbastanza."
 flavor_zaz.1001.a: "Montiamo all'alba."
 flavor_zaz.1001.b: "Perché dovremmo fidare di quei nomadi di non tradirci anche?"

 flavor_zaz.1100.title: "Le Regalia di [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]"
 flavor_zaz.1100.desc: "Nonostante i nostri servizi all'interno dell'esercito [target_country.GetAdjective], non c'è mai stato alcun onore concesso a noi da [target_country.GetGovernment.GetRulerTitle]. Invece, abbiamo ricevuto solo i vantaggi dei soldati comuni, come il saccheggio e la terra. [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] così come il [ROOT.GetCountry.GetGovernment.GetCourtTitle] desiderano richiedere regalia per il [ROOT.GetCountry.GetAdjective] élites, che hanno servito in molte campagne e hanno portato molte vittorie per [target_country.GetNameWithNoTooltip]. Forse se ascoltano questa richiesta, possiamo garantire che non ci sia insoddisfazione [ROOT.GetCountry.Custom('IT_NOBLES_DAL')][ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
 flavor_zaz.1100.a: "Richiederemo alcuni dei più belli regalia."
 flavor_zaz.1100.b: "I nostri risultati e i nostri racconti sono più preziosi di alcuni manufatti."
 zaz_request_work_of_art_from_overlord_tt: "Richiederemo da [target_country.GetName] di creare una [work_of_art|e] per noi"
 zaz_no_request_from_overlord_tt: "Non invieremo alcuna richiesta a [target_country.GetName]"

 flavor_zaz.1101.title: "$flavor_zaz.1100.title$"
 flavor_zaz.1101.desc: "Il nostro soggetto a [target_country2.GetName] è stato vantaggioso per noi con i loro eserciti [target_country2.GetGovernment.GetEstateName('cossacks_estate')] che servono [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] al massimo. Pensano, però, che non li abbiamo ricompensati con abbastanza regali, quindi richiedono che forgiamo ai loro élites diversi regalia al fine di significare la loro autorità sul resto del [target_country2.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]. Potremmo rispettare le loro richieste e forgliarle, anche se molti dibattono che le casse di [ROOT.GetCountry.GetName] non dovrebbero essere spese su tali casi banali e invece dovrebbero essere dirette al miglioramento del [ROOT.GetCountry.GetFlavorRank]."
 flavor_zaz.1101.a: "Soddisfiamo il nostro soggetto."
 flavor_zaz.1101.b: "Non siamo in grado di permetterci una tale richiesta."
