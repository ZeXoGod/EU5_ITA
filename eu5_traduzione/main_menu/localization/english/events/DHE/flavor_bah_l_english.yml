l_english:
 flavor_bah.1.title: "[ShowBuildingTypeNameWithNoTooltip('mahmud_gawan_madrasa')]"
 flavor_bah.1.desc: "Per riaffermare l'influenza [ShowReligionName('shia')] in [ShowRegionName('deccan_region')], [target_character.GetName] ha optato per la costruzione di una nuova madrasa ispirata all'architettura in [ShowSubContinentName('central_asia')]. Denominandola [ShowBuildingTypeName('mahmud_gawan_madrasa')], ha lo scopo di servire come uno dei più grandi collegi [ShowReligionGroupName('muslim')] in tutta $india$, ospitando lezioni per circa 500 studenti da tutto il mondo. La sua biblioteca è anche prevista per ospitare volumi da ogni angolo della terra, sperando di trasformare [target_location.GetName] in uno dei posti più straordinari che sia mai esistito."
 flavor_bah.1.historical_info: "La Madrasa di Mahmud Gawan a Bidar fu costruita nel 1472. Un miscuglio di architetture indiane e arabe, fu commissionata da Mahmud Gawan e progettata da un nobile locale del Sultanato di Bahmani. Per riaffermare la fede sciita, fu progettata con l'idea che avrebbe attratto studiosi da tutto il mondo, a cui sarebbero stati forniti alloggio, vitto ed educazione gratuiti. Nel corso del tempo, ha accumulato circa 3000 volumi."
 flavor_bah.1.a: "Costruiremo questo edificio."
 flavor_bah.1.b: "L'oro è meglio speso in altre cose che in semplici edifici."

 flavor_bah_1000_shared: "Un Trono per la Pace"
 flavor_bah_100_historical_info_shared: "Il Takht-i-Fīrozā era il trono dei Sultani Bahmani, simbolizzando la regalità della corte. Non era stato costruito dai suoi sudditi, comunque. Invece, era un dono da Musunuri Kapaya Nayaka di Warangal. Originariamente, il trono era destinato a Muhammad bin Tughluq di Delhi, ma la dinastia perse il controllo di Warangal prima che fosse completato."

 flavor_bah.1000.title: "$flavor_bah_1000_shared$"
 flavor_bah.1000.desc: "[target_country.GetName] possiede un'arte molto preziosa. Conosciuto come il $takht_i_firoza$, non serve più a nessun sovrano che possa risiedere in [ShowLocationName('warangal')]. Potremmo esigere questo artefatto e promettere loro di stabilire una tregua, oltre a tracciare i confini tra i nostri due regni. Quell'offerta converrà a [target_character.GetName] e ai [target_character.GetHerHis] sudditi in [target_country.GetNameWithNoTooltip]."
 flavor_bah.1000.historical_info: "$flavor_bah_100_historical_info_shared$"
 flavor_bah.1000.a: "Un'offerta davvero considerevole. Mandiamola."
 flavor_bah.1000.b: "Non c'è bisogno di comprarla da loro quando possiamo conquistarla per noi stessi."
 bah_target_must_accept_tt: "[target_country.GetName] deve accettare la nostra offerta affinché gli effetti abbiano luogo"
 bah_no_deal_tt: "Nessun accordo sarà inviato a [target_country.GetName]"

 flavor_bah.1001.title: "$flavor_bah_1000_shared$"
 flavor_bah.1001.desc: "[target_character2.GetName] di [target_country2.GetName] ha chiesto che consegnamo il $takht_i_firoza$ e in cambio, stabiliremo una tregua tra i nostri due regni, nonché cementeremo i confini che condivideremo."
 flavor_bah.1001.historical_info: "$flavor_bah_100_historical_info_shared$"
 flavor_bah.1001.a: "Un trono per la pace? Un'offerta considerevole. Accettiamo."
 flavor_bah.1001.b: "Non cederemo i nostri artefatti a promesse vuote."
