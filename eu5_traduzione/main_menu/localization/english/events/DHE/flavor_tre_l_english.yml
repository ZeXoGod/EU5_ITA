l_english:

 flavor_tre.1.title: "La Cittadella di [target_location.GetNameWithNoTooltip]"
 flavor_tre.1.desc: "In piedi orgogliosamente per secoli, il [target_location.GetRank.GetName] di [target_location.GetName] è un simbolo dell'autorità reale nel profondo del cuore di [ShowRegionName('anatolia_region')]. Servendo come faro delle nostre tradizioni culturali, la nostra grande capitale ha prosperato molto, in gran parte grazie al suo magnifico porto e alla posizione geografica.\n\nDotato di molti stabilimenti urbani come quartieri mercantili, mercati e acquedotti, è venuto ad essere il simbolo della nostra autorità, il nostro orgoglio e gioiello. La recente crescita della popolazione ha ritenuto la necessità di espandere i confini del [target_location.GetRank.GetNameWithNoTooltip], al fine di accogliere più famiglie dietro i nostri muri robusti."
 flavor_tre.1.historical_info: "Fondata nel 756 a.C., Trebisonda ha una lunga storia come un bastione del Cristianesimo e della cultura greca. Già ai tempi dei Romani, la città ha servito come una base legionaria cruciale in Pontos Polemoniakos. Più tardi, durante il regno di Giustiniano, diverse campagne armene utilizzavano Trebisonda come il punto di raccolta e di lancio.\n\nLa città si è evoluta in un arcivescovato nell'VIII secolo e una metropoli all'inizio del X secolo. L'Impero di Trebisonda, fondato nel 1204 da Alessio I Komnenos e David Komnenos, durò fino al 1461, fortificato dai Monti Pontici, forti difese cittadine e alleanze matrimoniali strategiche. Anche se piccola, con circa 4.000 abitanti nel 1438, era ben difesa e presentava monumenti significativi come il monastero di Hagia Sophia e la Cattedrale di Panagia Chrysokephalos. Trebisonda era l'ultimo avamposto bizantino a cadere ai turchi, mantenendo il suo significato culturale e storico fino al 1461."
 flavor_tre.1.a: "Finanzia l'espansione!"
 flavor_tre.1.b: "Lascia che muoiano di fame fuori dalle mura..."

 flavor_tre.2.title: "Insubordinazione degli Scholarioi"
 flavor_tre.2.desc: "Motivati dalla scomparsa dell'autorità centrale e spinti dalla loro avidità insaziabile, molti membri delle milizie nobili locali sono venuti a controllare grandi fasce della scena politica in [target_location.GetName]. Mentre erano sempre felici di ricevere un nuovo ufficio, privilegi e proprietà preziose, molti membri [ROOT.GetCountry.Custom('IT_NOBLES_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] hanno oltrepassato il limite... Se non agiamo in modo decisivo contro di loro, la loro tendenza alla corruzione potrebbe gettare l'intero paese nelle fauci della guerra civile!"
 flavor_tre.2.a: "Frena questi cani rabbiosi!"
 flavor_tre.2.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 flavor_tre.2.historical_info: "Gli Scholarioi erano influenti #italic άρχοντες#! (nobili), e una delle famiglie più potenti a Trebisonda. Erano originariamente formati come un'unità di milizia reale incaricata di proteggere la città. Presto divennero corrotti e contestarono l'autorità della seduta Imperatrice Irene, nel 1340. La loro audacia e sete di controllo li portarono a porre il veto all'ascensione di Irene, gettando l'intero paese nella guerra civile, mentre allo stesso tempo, il confine meridionale di Trebisonda era molestato da razzie Turkmen. Questo culminò con i predoni che catturarono la città, dandole fuoco e introducendo un'epidemia, che nacque dal fetore ripugnante di cadaveri in decomposizione - uomini e cavalli allo stesso modo."

 flavor_tre.3.title: "L'Avvelenamento di [target_character1.GetNameWithNoTooltip]"
 flavor_tre.3.desc: "In una mossa disperata di odio passionale e gelosia, [target_character2.GetName] è andato avanti con l'avvelenamento e il sigillo del destino di [target_character1.GetShortName]. Esacerbato da [target_character1.GetShortNameWithNoTooltip] apparenti sentimenti freddi verso [target_character2.GetHerHim] e l'esistenza di molte amanti e amanti..."
 flavor_tre.3.a: "Tutto è permesso in amore e guerra."
 flavor_tre.3.b: "Non accetteremo questo!"
 flavor_tre.3.historical_info: "Il matrimonio tra Irene e Basilio non era che un modo per i Komnenoi di assicurare un'alleanza con l'Imperatore di Bisanzio, poiché Irene era la figlia illegittima dell'Imperatore Andronikos III Palaiologos. Anche se non c'era affetto tra i due, Irene non produsse figli mentre Basilio trovò rifugio nelle braccia di un'amante di corte. Il risentimento tra la coppia reale alla fine portò all'assassinio di Basilio, e l'inizio del regno di Irene, un periodo turbolento per Trebisonda."

