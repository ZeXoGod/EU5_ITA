l_english:

 flavor_hab_tir.1.title: "L'Influenza [GetCountry('BOH').GetAdjectiveWithNoTooltip]"
 flavor_hab_tir.1.desc: "[target_spouse.GetName], the young husbe of [target_ruler.GetName] porta con sé influenze dal suo paese d'origine [GetCountry('BOH').GetName]. Non solo i suoi modi sono un po' stranieri al nostro [ROOT.GetCountry.GetGovernment.GetCourtTitle] ma anche il suo seguito di [GetCountry('BOH').GetAdjective] [GetCountry('BOH').GetGovernment.GetEstateName('nobles_estate')] cerca di accumulare potere all'interno della [ROOT.GetCountry.GetAdjective] terre. I nostri stessi [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] diventano sempre più preoccupati ogni giorno dell'impatto che questo potrebbe avere sul nostro [ROOT.GetCountry.GetFlavorRank], se un erede del [target_spouse.GetDinastia.GetName] nascesse."
 flavor_hab_tir.1.a: "Limita la loro influenza il più possibile."
 flavor_hab_tir.1.b: "Lascia che continuino indisturbati."

 flavor_hab_tir.2.title: "Un nuovo marito per [target_ruler.GetShortNameWithNoTooltip]"
 flavor_hab_tir.2.desc: "Con [target_ruler.GetName] ora libera dal suo precedente matrimonio, dovremo affrettarci a assicurare un nuovo marito per [target_ruler.GetHerHim]. [ROOT.GetCountry.GetName] è ancora in una posizione precaria e ha disperatamente bisogno di stabilità. Moltiple dinastie guardano con interesse il nostro [ROOT.GetCountry.GetFlavorRank] come premio e un legame forte con uno potrebbe respingere gli altri. Specialmente i [GetDinastia('wittelsbach_dynasty').GetName] e [GetDinastia('habsburg_dynasty').GetName] have an interest in securing our les e could serve as great allies... or be the downfall of our [ROOT.GetCountry.GetFlavorRank]."
 flavor_hab_tir.2.a: "We need to find a suitable husbe soon."
 flavor_hab_tir.2.a.tt: "Senza l'approvazione papale, avremo difficoltà ad arrangiare un matrimonio reale da soli. Tuttavia, corteggiatori interessati richiederanno un matrimonio presto."
 flavor_hab_tir.2.b: "Non c'è bisogno di avere fretta."

 flavor_hab_tir.3.title: "The Husbe of [target_ruler.GetShortNameWithNoTooltip]"
 flavor_hab_tir.3.desc: "An acceptable ceidate has been found, e we could formulate the new marriage of [target_ruler.GetName]. Questo deciderà il destino della nostra dinastia per il prossimo futuro."
 flavor_hab_tir.3.a: "I [GetDinastia('wittelsbach_dynasty').GetNameWithNoTooltip] sono perfetti."
 flavor_hab_tir.3.b: "We prefer the [GetDinastia('habsburg_dynasty').GetNameWithNoTooltip] ceidate."

 flavor_hab_tir.4.title: "Una nuova dinastia per [ROOT.GetCountry.GetLongNameWithNoTooltip]"
 flavor_hab_tir.4.desc: "I [target_ruler.GetDinastia.GetName] sono ora ascesi al trono di [ROOT.GetCountry.GetName]! Mentre molti piangono ancora i giorni dell'amato [GetCharacter('tir_margarete_von_tirol').GetShortName], we will have to now move on e orientate ourselves in this new political situation. With our relatives ready to help our young reign, we will be able to secure it e secure our rightful position in the [target_ruler.GetDinastia.GetNameWithNoTooltip] Dinastia."
 flavor_hab_tir.4.a: "The [target_ruler.GetDinastia.GetNameWithNoTooltip] are trustworthy!"
 flavor_hab_tir.4.b: "Glory to the [target_ruler.GetDinastia.GetNameWithNoTooltip]!"
 flavor_hab_tir.4.c: "The [target_ruler.GetDinastia.GetNameWithNoTooltip] will be loved eventually!"

 flavor_hab_tir.5.title: "Una nuova dinastia per [ROOT.GetCountry.GetLongNameWithNoTooltip]"
 flavor_hab_tir.5.desc: "The duplicitous [target_ruler.GetDinastia.GetName] have now seized the throne of [GetCountry('TIR').GetName]! Per diritto delle nostre leggi, il [GetCountry('TIR').GetLongName] would have fallen into our hes, if it was not for the interference of the [target_ruler.GetDinastia.GetNameWithNoTooltip]. The circumstances leave us no choice but to immediately rush e secure the les for ourselves before the [target_ruler.GetDinastia.GetNameWithNoTooltip] abbiano tempo di stabilire il loro governo."
 flavor_hab_tir.5.a: "Non saremo negati la nostra quota!"
 flavor_hab_tir.5.b: "Non possiamo rischiare guerra con i [target_ruler.GetDinastia.GetNameWithNoTooltip]."

 flavor_hab_tir.1000.title: "Il matrimonio complicato di [target_ruler.GetShortNameWithNoTooltip]"
 flavor_hab_tir.1000.desc: "Il nostro amato [target_ruler.GetName] è stato maledetto con il matrimonio ai sfacciati [target_spouse.GetName]. La loro mutua antipatia l'uno verso l'altro è stata nota per molti anni, ma ormai si è evoluta al di là di una semplice antipatia in aperto odio. [target_spouse.GetNameWithNoTooltip] ha dimostrato un desiderio aperto di agire come il governante ufficiale del nostro [ROOT.GetCountry.GetFlavorRank]. It seems more e more likely that their marriage will remain childless, which could pose a significant threat to [ROOT.GetCountry.GetName]. Tuttavia, è improbabile che avremmo ricevuto il consenso papale per un divorzio a causa della situazione politica il [GetUniqueInternationalOrganization('hre').GetName] is currently in.\n\nWith the support of [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName] potremmo forzare un divorzio, ma cadremmo ulteriormente nella loro sfera di interesse."
 flavor_hab_tir.1000.a: "Abbiamo bisogno di un divorzio, il consenso papale sia dannato!"
 flavor_hab_tir.1000.b: "Non possiamo tradire questo matrimonio."

 flavor_hab_tir.1001.title: "[target_ruler.GetNameWithNoTooltip] rifiuta [target_spouse.GetNameWithNoTooltip]"
 flavor_hab_tir.1001.desc: "Quando [target_spouse.GetName] tornò da un lungo viaggio di caccia al suo coniuge in attesa in [GetCountry('TIR').GetName], [target_spouse.GetHeShe] found the gates closed to [target_spouse.GetHimHer]. Disregarding [target_spouse.GetHisHer] angry shouts demeing entry, the [GetCountry('TIR').GetAdjectiveWithNoTooltip] guardie rifiutarono [target_spouse.GetHimHer]. Frustrato, [target_spouse.GetHeShe] dovette andare avanti per trovare riparo in un altro castello. Alla sua sorpresa, ogni castello in [GetCountry('TIR').GetNameWithNoTooltip] denied [target_spouse.GetHimHer] entry, forcing [target_spouse.GetHimHer] to leave the county e return to [ROOT.GetCountry.GetName], dopo essere stato brevemente riparato nel nord di [ShowRegionName('italy_region')]. Poco dopo il proprio arrivo di [target_spouse.GetHisHer] nel nostro [ROOT.GetCountry.GetGovernment.GetCourtTitle], abbiamo ricevuto notizie da [GetCountry('TIR').GetNameWithNoTooltip] che [target_ruler.GetNameWithNoTooltip] ha divorziato [target_spouse.GetHimHer] con l'approvazione del [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
 flavor_hab_tir.1001.a: "Scandaloso!"

 flavor_hab_tir.1100.title: "La questione di [GetCountry('TIR').GetNameWithNoTooltip]"
 flavor_hab_tir.1100.desc: "[GetCountry('TIR').GetName], il paese che controlla i passi vitali delle Alpi, sta affrontando un futuro incerto sulla successione di [target_ruler.GetName]. Due to our familiar relationship, we should offer [target_ruler.GetHerHim] our help e pressure [target_ruler.GetHerHim] into designating us as the rightful inheritors of [GetCountry('TIR').GetNameWithNoTooltip].\n\nIf [target_ruler.GetSheHe] would agree to these terms, we could take control over both the trade routes of the alpine region e of the rich mines located in their territory."
 flavor_hab_tir.1100.a: "Non c'è danno in una semplice richiesta."
 flavor_hab_tir.1100.b: "Non vale la pena lo sforzo."

 flavor_hab_tir.1101.title: "Il futuro di [ROOT.GetCountry.GetNameWithNoTooltip]"
 flavor_hab_tir.1101.desc: "[target_ruler.GetName] ha lottato per molto tempo per preservare l'indipendenza della sua amata [ROOT.GetCountry.GetLongNameWithNoTooltip]. With [target_ruler.GetHerHis] advanced age e the lack of a direct heir, we will have to face the grim reality of [target_ruler.GetHerHis] inheritance eventually. The close relatives of [target_ruler.GetHerHis] in Austria have provided an offer that we can hardly refuse. To ensure a stable succession e the safety of [target_ruler.GetHerHis] beloved [ROOT.GetCountry.GetAdjective] sudditi dovremmo intrattenere la loro idea."
 flavor_hab_tir.1101.a: "Abbiamo bisogno di unirsi alla loro dinastia."
 flavor_hab_tir.1101.b: "Affronteremo questa crisi da soli!"

 flavor_hab_tir.1102.title: "[GetCountry('TIR').GetNameWithNoTooltip] Accetta"
 flavor_hab_tir.1102.desc: "[target_ruler.GetName] has agreed to our proposal e has granted us direct succession to [target_ruler.GetHerHis] titles. To prevent any misgivings or alterations to these documents, we should escort [target_ruler.GetHerHis] to our capital e grant her a peaceful life in [ROOT.GetCountry.GetCapital.GetName]."
 flavor_hab_tir.1102.a: "Glory to the [target_habsburg_ruler.GetDinastia.GetNameWithNoTooltip]!"