l_english:
 flavor_pal.1.title: "Una Buona Scelta"
 flavor_pal.1.desc: "Il nostro supporto del vero [GetCountry('PAP').GetGovernment.GetRulerTitle] nello [ShowSituationName('western_schism')] ci ha messo nelle grazie di [ShowLocationName('rome')], che ha indotto il glorioso [pope_ruler.GetName] a concederci una nuova bolla papale che consenta la costruzione di una nuova [ShowBuildingTypeName('university')] a [ShowLocationName('heidelberg')] seguendo il modello dell'università di [ShowLocationName('paris')]."
 flavor_pal.1.a: "Inizia la costruzione."
 flavor_pal.1.b: "Non possiamo permetterci la spesa."

 flavor_pal.2.title: "La Persecuzione di [target_character.GetNameWithNoTooltip]"
 flavor_pal.2.desc: "[target_character.GetName], mentre è uno studioso e umanista rispettato, ha anche un talento per entrare in conflitto con altri teologi [ShowReligionAdjective('catholic')]. [target_character.GetSheHe|U] di recente ha dovuto lasciare il suo precedente datore di lavoro a causa di uno scontro personale con altri consiglieri.\n\nFortunamente per noi, [target_character.GetSheHe] è molto interessato a servirci ed è già in [target_character.GetHerHis] viaggio verso [ROOT.GetCountry.GetCapital.GetName]. Grazie alla sua natura umanista potrebbe beneficiare notevolmente la reputazione della nostra [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
 flavor_pal.2.a: "[target_character.GetSheHe|U] avrà un nuovo posto da chiamare casa."
 flavor_pal.2.b: "[target_character.GetSheHe|U] dovrebbe tornare indietro e andare da qualche altra parte."

 flavor_pal.3.title: "Trasferimento della $game_concept_capital$"
 flavor_pal.3.desc: "A causa delle continue tensioni religiose a [ShowLocationName('heidelberg')], [target_ruler.GetName] considera il trasferimento della $game_concept_capital$ verso il vicino $mannheim$. Questa mossa potrebbe fornire un nuovo inizio e ridurre i conflitti, ma potrebbe turbare il popolo e caricare le risorse."
 flavor_pal.3.a: "Sposta la capitale a $mannheim$."
 flavor_pal.3.b: "Mantieni [ShowLocationNameWithNoTooltip('heidelberg')] come $game_concept_capital$."
 flavor_pal.3.historical_info: "Nel 1720, l'Elettore Palatino Carlo III Filippo affrontò significativi conflitti religiosi a Heidelberg, derivanti dalle tensioni tra la sua amministrazione cattolica e la maggioranza protestante della città. Cercando di mitigare questi problemi e stabilire un seggio di potere più armonico, decise di trasferire la capitale a Mannheim. La costruzione del Palazzo di Mannheim ebbe inizio quell'anno stesso sul sito dell'ex fortezza Friedrichsburg, simboleggiando l'alba di una nuova era per l'Elettorato. Questa mossa strategica non solo mirava ad attenuare i conflitti religiosi, ma posizionò anche Mannheim come centro emergente di significato politico e culturale nella regione."

