l_english:

flavor_pue.101.title: "Le Strade di Chaco"
flavor_pue.101.desc: "Anche se il loro uso principale dai nostri antenati è ormai passato da tempo, le Strade di Chaco in tutto [ShowLocationNameWithNoTooltip('aaku')] e [ShowLocationNameWithNoTooltip('shiewhibak')] hanno invece servito il nostro popolo come un punto di riferimento critico per il trasporto di cibo e altri beni. Tuttavia, con il passare dei secoli, porzioni di queste strade sono cadute in disrepair, provocando l'lentezza di chiavi lungo le strade a svanire lentamente.\n\nCercando di ripristinare porzioni di queste strade, [our_ruler.GetName] ha richiesto aiuto in tutto [ROOT.GetCountry.GetCapital.GetName], cercando volontari per ripristinare queste regioni danneggiate prima che siano perse per sempre."
flavor_pue.101.a: "Ricostruisci le strade dei nostri antenati."
flavor_pue.101.b: "Non possiamo risparmiare le risorse."

flavor_pue.102.title: "Irrigazione di [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
flavor_pue.102.desc: "Anche se il nostro popolo ha gestito a formare un insediamento unico con [ROOT.GetCountry.GetCapital.GetName] situato su un altopiano, ha anche portato con sé le sfide per l'irrigazione così come molti insediamenti all'interno [ShowAreaName('shiewhibak_area')]. Cercando di stabilire un sistema di irrigazione robusto, [our_ruler.GetName] ha richiesto assistenza nel rafforzare i canali esistenti, al fine di garantire una fonte d'acqua più stabile per [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
flavor_pue.102.a: "Divertire risorse per migliorare l'irrigazione di [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
flavor_pue.102.b: "Non abbiamo bisogno di questi sforzi."

flavor_pue.103.title: "Un Luogo Che È Sempre Stato"
flavor_pue.103.desc: "Anche se molti degli insediamenti [ShowCultureGroupName('puebloan_group')] in tutto [ShowAreaName('shiewhibak_area')] sono stati situati su scogliere, il [ShowCultureGroupNameWithNoTooltip('puebloan_group')] di [ShowLocationName('aaku')] rimane uno dei più unici, con essere situato su un altopiano elevato. Anche se [ShowLocationNameWithNoTooltip('aaku')] è stato incontrato con sfide con la sua posizione elevata distinta, questo è stato anche uno dei suoi più grandi punti di forza, offrendo una posizione estremamente difensiva dovrebbe il suo popolo sia forzato nel conflitto."
flavor_pue.103.a: "La posizione di [ShowLocationNameWithNoTooltip('aaku')] è unica nel suo genere."

flavor_pue.104.title: "Sede dei Nostri Antenati"
flavor_pue.104.desc: "Essendo venuto ad essere [ROOT.GetCountry.GetGovernment.GetRulerTitle] sopra le tribù multiple [ShowCultureGroupName('puebloan_group')], [our_ruler.GetName] insieme al supporto di [our_ruler.GetHisHer] cerchio interno, ha richiesto supporto tra gli insediamenti [ShowCultureGroupNameWithNoTooltip('puebloan_group')] per ripopolare l'abbandono [ShowLocationName('tse_bitai')]. Una volta sede principale dei nostri antenati, l'abbandono di [ShowLocationNameWithNoTooltip('tse_bitai')] ha determinato l'eventuale frammentazione del nostro popolo in tribù multiple. Anche se le condizioni difficili hanno anche contribuito ai nostri antenati che abbandonano la regione, [our_ruler.GetNameWithNoTooltip] spera che attraverso uno sforzo combinato, il recupero di [ShowLocationNameWithNoTooltip('tse_bitai')] possa ora essere una possibilità."
flavor_pue.104.a: "Torneremo alla sede dei nostri antenati."
flavor_pue.104.b: "È meglio che non seguiamo il sentiero dei nostri antenati."

flavor_pue.105.title: "Rinsediamento di [ShowLocationNameWithNoTooltip('tse_bitai')]"
flavor_pue.105.desc: "Avendo ripopolato [ShowLocationName('tse_bitai')], [our_ruler.GetName] insieme ai membri degli insediamenti [ShowCultureGroupName('puebloan_group')] sotto [ROOT.GetCountry.GetName] hanno dibattuto designandola come la nuova capitale principale. Anche se [ROOT.GetCountry.GetCapital.GetName] ha a lungo servito la nostra tribù dal nostro esodo degli antenati da [ShowLocationNameWithNoTooltip('tse_bitai')], il nostro ritorno recente ha spinto il dibattito se dovrebbe ancora una volta servire come l'insediamento principale per il nostro popolo. Anche se il rinsediamento di [ShowLocationNameWithNoTooltip('tse_bitai')] è ancora in pieno svolgimento, ci sono ancora vecchie paure che le siccità dure che hanno costretto i nostri antenati a fuggire potrebbero risorgere di nuovo, e causare un altro collasso."
flavor_pue.105.a: "Servirà come nostra sede ancora una volta."
flavor_pue.105.b: "Rimarrebbe meglio se [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] rimanesse la sede di [ROOT.GetCountry.GetNameWithNoTooltip]."

flavor_pue.106.title: "Riunire il [ShowCultureGroupNameWithNoTooltip('puebloan_group')]"
flavor_pue.106.desc: "Grazie agli sforzi di [our_ruler.GetName], diverse tribù [ShowCultureGroupName('puebloan_group')] sono state portate sotto un singolo [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Anche se sono stati secoli dal collasso della società dei nostri antenati, alcuni vedono [our_ruler.GetNameWithNoTooltip] come una figura unificante che potrebbe ancora una volta unire le varie tribù [ShowCultureGroupNameWithNoTooltip('puebloan_group')] che hanno a lungo lasciato le nostre terre ancestrali."
flavor_pue.106.a: "È tempo che il nostro popolo si unisca ancora una volta."
flavor_pue.106.b: "Sarebbe uno sforzo costoso, concentriamoci sulla pace."

flavor_pue.107.title: "Successori degli Ancestrali [ShowCultureGroupNameWithNoTooltip('puebloan_group')]"
flavor_pue.107.desc: "Una volta considerato un compito impossibile, [our_ruler.GetName] è riuscito a unire le varie tribù [ShowCultureGroupName('puebloan_group')] che si sono frammentate dopo il collasso dei nostri antenati. Avendo promesso di consentire a ogni tribù di conservare l'autonomia nella sua identità sviluppata, [our_ruler.GetNameWithNoTooltip] spera che il popolo riunito possa conservare la parentela nei secoli a venire ed evitare i conflitti che hanno frammentato i nostri antenati."
flavor_pue.107.a: "Possa il nostro popolo rimanere eternamente unito!"
