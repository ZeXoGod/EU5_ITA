l_english:
 flavor_dai.1.title: "La Campagna [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Contro [target_country.GetNameWithNoTooltip]"
 flavor_dai.1.desc: "I conflitti tra il [ROOT.GetCountry.GetLongName] e il [target_country.GetLongName] sono stati presenti per secoli nelle relazioni [ROOT.GetCountry.GetCulture.GetName]-[target_country.GetCulture.GetName]. Ancora una volta, il governo di [target_country.GetNameWithNoTooltip] mostra debolezza, rendendoli maturi per la conquista una volta per tutte."
 flavor_dai.1.historical_info: "Nonostante un'alleanza nel XIII secolo contro la dinastia Yuán, il conflitto è sorto tra questi due stati ancora una volta quando una disputa di successione per il trono di Champa si è escalata in una semi-guerra civile. Chế Mô, un membro della famiglia reale di Champa, si è disertato a Đại Việt e ha chiesto aiuto da Trần Dụ Tông contro l'usurpatore Trà Hòa Bố Để per prendere il trono di Champa, il che a sua volta ha comportato la Guerra Champa-Đại Việt che è infuriata dal 1367 al 1390."
 flavor_dai.1.a: "Questa volta, [target_country.GetNameWithNoTooltip] dovrà inginocchiarsi davanti a noi!"
 flavor_dai.1.b: "Troppo sangue è stato versato in passato. Terminamo le ostilità."

 flavor_dai.2.title: "Consolidamento di [target_area.GetNameWithNoTooltip]"
 flavor_dai.2.desc: "Dopo molti anni di conflitti con il [target_country.GetLongName], infine, il loro fato è stato sigillato. I territori di [target_area.GetName] sono stati ora soggiogati dal [ROOT.GetCountry.GetLongName], e il grande [target_location.GetRank.GetName] di [target_location.GetName] deve piegare il ginocchio davanti a [root_location.GetName]. Comunque, con questa conquista viene la questione di come amministrare le nuove terre e come gestire il popolo [target_culture.GetName] in una società [root_culture.GetName]."
 flavor_dai.2.tt: "L'[integration|e] di ogni [location|e] in [target_area.GetName] è aumentata di #G +10#!"
 flavor_dai.2.a: "Integrare il [target_culture.GetNameWithNoTooltip] nella nostra società."
 flavor_dai.2.b: "Lasciali stare."
 flavor_dai.2.c: "Insediare il popolo [root_culture.GetNameWithNoTooltip] a [target_area.GetNameWithNoTooltip]."

 flavor_dai.3.title: "I Mercanti [target_culture_group.GetNameWithNoTooltip]"
 flavor_dai.3.desc: "I mercanti [target_culture_group.GetName] da [target_country.GetName] sono diventati una vista comune in [target_location.GetName]. Commerciando in [target_market.GetName], la loro presenza ha creato un legame unico tra [ROOT.GetCountry.GetName] e il popolo di [target_region.GetName]. Alcuni dei nostri membri più sospettosi [ROOT.GetCountry.Custom('IT_NOBLES_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] temono, comunque, che parte del [root_culture.GetName] potrebbe andare perso se continuiamo questa relazione commerciale."
 flavor_dai.3.historical_info: "Durante il XVI secolo, i mercanti giapponesi si sono impegnati nel commercio con i vietnamiti e hanno persino stabilito la loro stessa residenza nella città portuale di Faifo. Durante questo periodo, i giapponesi costruirono il Ponte Giapponese che serve sia come ponte che come tempio."
 flavor_dai.3.a: "Rafforzare i nostri legami con [target_country.GetNameWithNoTooltip]"
 japanese_bridge: "$japanese_group$ Bridge"
 flavor_dai.3.b: "Mantenere lo status quo."
 flavor_dai.3.c: "Rimuovere i mercanti [target_culture_group.GetNameWithNoTooltip] dai nostri porti."

 flavor_dai.4.title: "La Cittadella Imperiale"
 flavor_dai.4.desc: "Con la crescita della popolazione del [ROOT.GetCountry.GetLongName], il nostro stato continua a somigliare a un vero imperio simile a quello dei [GetUniqueInternationalOrganization('middle_kingdom').GetName]. I nostri consulenti suggeriscono di costruire una grande cittadella in onore di [target_character.GetName]."
 flavor_dai.4.desc.a: "$flavor_dai.4.desc$ Propongono inoltre di spostare la [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] al [target_location.GetRank.GetName] di [target_location.GetName], anche se alcuni consigliano di espandere [capital_location.GetName] invece."
 flavor_dai.4.desc.b: "$flavor_dai.4.desc$ Il [target_location.GetRank.GetName] di [target_location.GetName] sarà espanso per ospitare la [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] di [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_dai.4.historical_info: "La Città Imperiale di Huế è un'enclave murata all'interno della cittadella della capitale imperiale della dinastia Nguyễn. Fu costruita nel 1803 dopo che Nguyễn Ánh finalmente unificò il Vietnam dopo un secolo di divisione tra i signori Trịnh e i signori Nguyễn."
 flavor_dai.4.a: "[target_location.GetNameWithNoTooltip] farà un'eccellente capitale."
 flavor_dai.4.tt: "Sponsorizzato dallo Stato"
 flavor_dai.4.b: "Dovremmo concentrare i nostri sforzi su [capital_location.GetNameWithNoTooltip]."
 flavor_dai.4.c: "Grande sarà la gloria di [target_location.GetNameWithNoTooltip]."

 flavor_dai.5.title: "La Latinizzazione di [root_language.GetNameWithNoTooltip]"
 flavor_dai.5.desc: "I mercanti e i missionari europei hanno raggiunto [target_region.GetName] e si impegnano con i residenti di questi luoghi nel commercio mentre cercano anche di diffondere la loro fede. Uno di questi missionari è [target_character.GetName] da [target_country.GetName] che diffonde l'influenza di [target_religion.GetName] in [ROOT.GetCountry.GetName]. Mentre il lavoro religioso di [target_character.GetHerHis] aumenta le sopracciglia [ROOT.GetCountry.Custom('IT_CLERGY_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], il lavoro degli studiosi di [target_character.GetHerHis] ha creato una versione dello script [target_language.GetName] per scrivere la lingua [root_language.GetName] che porta grandi vantaggi sulla vecchia scrittura [root_culture.GetName]."
 flavor_dai.5.historical_info: "Francisco de Pina, un gesuita portoghese, interprete e missionario influente, fu attivo nel moderno Vietnam dal 1617 fino alla sua morte nel 1625. Ha latinizzato la scrittura della lingua vietnamita che in seguito avrebbe costruito il fondamento dell'alfabeto vietnamita moderno."
 flavor_dai.5.a: "Abbraccia questo nuovo alfabeto."
 portuguese_missionary: "Missionario [target_culture.GetName]"
 flavor_dai.5.b: "Lascia che [target_character.GetHerHim] risieda, ma il lavoro di [target_character.GetHerHis] non influenzerà la nostra lingua."
 flavor_dai.5.c: "Espelli questo e tutti gli altri missionari [target_culture.GetNameWithNoTooltip] per l'insolenza di [target_character.GetHerHis]."
