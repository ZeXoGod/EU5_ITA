l_english:

 flavor_tri.1.title: "#italic Codex Balduini Trevirensis#!"
 flavor_tri.1.desc: "Ci è stato regalato un bellissimo cronaca che raffigura un momento fatale nella nostra storia dinastica! Dettagliando la campagna italiana di [GetCharacter('lux_henry_vii_luxembourg').GetName], il primo Imperatore della nostra dinastia, evidenzia la posizione elevata della nostra famiglia e il loro diritto legittimo al trono imperiale. Mentre l'artista desidera rimanere sconosciuto, i loro ritratti dell'incoronazione di [GetCharacter('lux_henry_vii_luxembourg').GetNameWithNoTooltip] e il Collegio degli Elettori solidificano la nostra posizione all'interno del [GetInternationalOrganization('hre').GetName]."
 flavor_tri.1.a: "Adornerà il nostro [ROOT.GetCountry.GetGovernment.GetCourtTitle] a [target_location.GetNameWithNoTooltip]."
 flavor_tri.1.b: "Regalalo al [GetInternationalOrganization('hre').GetLeaderTitle]."
