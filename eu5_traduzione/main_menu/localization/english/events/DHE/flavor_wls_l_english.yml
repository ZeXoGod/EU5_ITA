l_english:
 flavor_wls.10.title: "Eisteddfod di [target_location.GetNameWithNoTooltip]"
 flavor_wls.10.desc: "L'Eisteddfod è un festival culturale [target_location.GetDominantCulture.GetName] di origine antica, una popolare competizione dove bardi e menestrelli eseguono imprese astrabilianti di musica e poesia. Quest'anno, il festival è impostato per svolgersi a [target_location.GetName].\n\nMentre il festival è una celebrazione delle arti e della cultura [target_location.GetDominantCulture.GetNameWithNoTooltip], temiamo che possa stuzzicare sentimenti anti-[ROOT.GetCountry.GetCulture.GetName] e allentare la nostra presa su [target_location.GetProvince.GetName].\n\nMentre potremmo semplicemente ignorare il festival come nulla di più che una fiera rurale, potremmo anche inumidire i messaggi politici assicurando che solo i bardi autorizzati (che cantano canzoni approvate) possono esibirsi.\n\nPotremmo naturalmente anche rompere questo tumulto rurale con un distaccamento di bruti armati."
 flavor_wls.10.a: "Consenti ai organizzatori il libero raggio."
 flavor_wls.10.b: "Licenza i bardi."
 flavor_wls.10.c: "Chiudi questa assurdità."

 flavor_wls.11.title: "Owain Glyndŵr"
 flavor_wls.11.desc: "Un gallese eccezionalmente intelligente, discendente dalla pre-conquista nativa dinastia reale [mathrafal_dynasty.GetName], è diventato in qualche modo il discorso della città. Dimostrando un talento di guidare e ispirare, potrebbe un giorno liberarci dai ceppi del nostro signore."
 flavor_wls.11.desc_subject: "Un gallese eccezionalmente intelligente, discendente dalla pre-conquista nativa dinastia reale [mathrafal_dynasty.GetName], è diventato in qualche modo il discorso della città. Dimostrando un talento di guidare e ispirare, potrebbe un giorno causare problemi tra i nostri fratelli [GetCountry('ENG').GetAdjective] e il popolo [GetCountry('WLS').GetAdjective]."
 flavor_wls.11.a: "Uno spirito libero non ha bisogno di guida."
 flavor_wls.11.tt1: "[owain_glyndwr.GetNameWithNoTooltip] viene aggiunto come personaggio e sceglie il suo stesso percorso"
 flavor_wls.11.b: "Sponsorizza una carriera nel diritto."
 flavor_wls.11.tt2: "[owain_glyndwr.GetNameWithNoTooltip] viene aggiunto come personaggio e studia diritto"
 flavor_wls.11.c: "Arruolalo per il servizio militare."
 flavor_wls.11.tt3: "[owain_glyndwr.GetNameWithNoTooltip] viene aggiunto come personaggio e diventa uno scudiero per [GetCountry('ENG').GetGovernment.GetRuler.GetName]"

 flavor_wls.12.title: "Appello al [GetCountry('ENG').GetGovernment.GetRulerTitle]"
 flavor_wls.12.desc: "Il notevole [owain_glyndwr.GetName] ha recentemente avuto un po' di terra confiscato da un barone vicino [GetCountry('ENG').GetAdjective]. Inoltre, sostiene anche di essere stato mal informato in merito a una citazione per mobilitare truppe feudali per il servizio di confine [GetCountry('SCO').GetAdjective] ed è stato etichettato come un traditore dai tribunali [GetCountry('ENG').GetAdjectiveWithNoTooltip].\n\nPer risolvere la controversia, desidera appellarsi direttamente a [GetCountry('ENG').GetGovernment.GetRuler.GetName] di [GetCountry('ENG').GetNameWithNoTooltip]."
 flavor_wls.12.a: "Invia la lettera."
 flavor_wls.12.tt: "[GetCountry('ENG').GetName] riceverà una lettera contenente un appello personale per la giustizia."
 flavor_wls.12.b: "Compensarlo per i suoi guai."

 flavor_wls.13.title: "Udienza rifiutata"
 flavor_wls.13.desc: "Il [GetCountry('ENG').GetAdjective] [GetCountry('ENG').GetGovernment.GetRulerTitle] ha rifiutato una richiesta di incontrarsi con [owain_glyndwr.GetName] per risolvere la controversia territoriale e la questione della diffamazione del suo onore. La decisione dei tribunali è rimasta, lasciandolo vulnerabile a ulteriori ritorsioni.\n\nOffeso dal suo trattamento, Owain ha preso da parte di dichiararsi il 'Principe del Galles' e sta sollevando una ribellione nel tentativo di rovesciare il dominio [GetCountry('ENG').GetAdjectiveWithNoTooltip]."
 owain_glyndar_rebels: "Glyndŵr Rebellion"
 flavor_wls.13.a: "Schiaccia il traditore!"
 flavor_wls.13.tt1: "[owain_glyndwr.GetName] avvierà una [ShowCultureName('welsh')] [civil_war|e] contro di noi. Eventuali [disloyal_subjects|e] si uniranno a lui. Se vincono, [owain_glyndwr.GetShortNameWithNoTooltip] diventerà indipendente."
 flavor_wls.13.b: "Unisciti alla causa!"
 flavor_wls.13.tt2: "[owain_glyndwr.GetName] avvierà una [ShowCultureName('welsh')] [civil_war|e], e ci uniremo! Eventuali [loyal_subjects|e] ci seguiranno. Se vinciamo, diventeremo indipendenti. "

 flavor_wls.14.title: "Terra e onore ripristinati"
 flavor_wls.14.desc: "Il [GetCountry('ENG').GetAdjective] [GetCountry('ENG').GetGovernment.GetRulerTitle] ha annullato una sentenza di tribunale di [owain_glyndwr.GetName], al fine di risolvere la controversia territoriale e la questione della diffamazione del suo onore."
 flavor_wls.14.a: "Perdoneremo, ma non dimenticheremo."
 flavor_wls.14.tt: "[owain_glyndwr.GetNameWithNoTooltip] vede la sua fortuna ripristinata"

 flavor_wls.15.title: "Nobile [GetCountry('ENG').GetAdjectiveWithNoTooltip] catturato"
 flavor_wls.15.desc: "Un nobile e generale di nome [edmund_mortimer.GetName] è stato recentemente catturato in una scaramuccia di confine e il [GetCountry('ENG').GetGovernment.GetRulerTitle] di [GetCountry('ENG').GetName] ha rifiutato di fornire i fondi necessari per assicurare la sua libertà.\n\nLa famiglia [percy_dynasty.GetName] di [northumberland.GetName] e la famiglia [mortimer_dynasty.GetName] di [shropshire.GetName] ci si sono avvicinate con una proposta che libererebbe [edmund_mortimer.GetNameWithNoTooltip] dalla prigionia, mentre divide [GetCountry('ENG').GetNameWithNoTooltip] tra loro stessi, con [ROOT.GetCountry.GetName] che riceve diverse province occidentali in cambio."
 flavor_wls.15.desc_ransom_paid: "Una recente scaramuccia di confine ha visto la cattura di un generale [GetCountry('ENG').GetAdjective] e nobile noto come [edmund_mortimer.GetName].\n\n[GetCountry('ENG').GetNameWithNoTooltip] ha accettato di pagare un riscatto per il suo ritorno immediato."
 flavor_wls.15.a: "Accetta i termini."
 flavor_wls.15.tt1: "I ribelli colpiranno una volta che dichiariamo guerra a [GetCountry('ENG').GetNameWithNoTooltip]"
 flavor_wls.15.tt2: "I ribelli colpiranno in un attimo"
 flavor_wls.15.b: "Accetta i termini e offri monete aggiuntive."
 flavor_wls.15.tt3: "I ribelli colpiranno una volta che dichiariamo guerra a [GetCountry('ENG').GetNameWithNoTooltip], e hanno maggiori probabilità di onorare l'accordo"
 flavor_wls.15.tt4: "I ribelli colpiranno in un attimo, e hanno maggiori probabilità di onorare l'accordo"
 flavor_wls.15.c: "Non possono essere affidabili."
 flavor_wls.15.tt5: "I nobili saranno rifiutati"
 flavor_wls.15.d: "Liberalo."
 flavor_wls.15.tt6: "[edmund_mortimer.GetNameWithNoTooltip] sarà liberato"

 flavor_wls.16.title: "Un Capomaestra Relazioni"
 flavor_wls.16.desc_england_success: "La famiglia [dishonorable_dynasty.GetName] ha elogiato [GetCountry('ENG').GetGovernment.GetRuler.GetName] per la manifestazione di generosità e hanno accettato di deporre le armi. Le nostre spie confermano le avvistamenti dei loro eserciti che si disperdono."
 flavor_wls.16.desc_england_failure: "La famiglia [dishonorable_dynasty.GetName] ha rifiutato il tentativo di corruzione di [GetCountry('ENG').GetGovernment.GetRuler.GetName]. Ulteriore spargimento di sangue sembra inevitabile."
 flavor_wls.16.desc: "Le nostre spie riferiscono che il [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetRulerTitle] ha cercato un accordo con la famiglia [dishonorable_dynasty.GetName], che hanno accettato di deporre le armi. Ci viene consigliato di agire rapidamente se vogliamo avere successo."
 flavor_wls.16.a: "Cani sleali."
 flavor_wls.16.tt1: "I ribelli [dishonorable_dynasty.GetNameWithNoTooltip] si disperderanno"
 flavor_wls.16.b: "Come previsto."
 flavor_wls.16.c: "Era la pena di un tentativo."
 flavor_wls.16.tt2: "I ribelli rimangono leali a [owain_glyndwr.GetName]"

