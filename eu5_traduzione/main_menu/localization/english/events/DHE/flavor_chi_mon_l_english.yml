l_english:
 flavor_chi_mon.1.title: "Vittoria a [target_location.GetNameWithNoTooltip]"
 flavor_chi_mon.1.desc: "Gloriose notizie sono arrivate alla nostra [ROOT.GetCountry.GetGovernment.GetCourtTitle] a [ROOT.GetCountry.GetCapital.GetName]. Non solo abbiamo vinto la battaglia a [target_location.GetName], come ci aspettavamo, ma la nostra vittoria è stata così assoluta che siamo riusciti a catturare [captured_emperor.GetName], il leader capo del [GetInternationalOrganizationType('middle_kingdom').GetName]. Se spingiamo il nostro vantaggio, potremmo essere in grado di raccogliere grandi concessioni dal [target_war.GetName]."
 flavor_chi_mon.1.a: "Spingere il nostro vantaggio."
 flavor_chi_mon.1.b: "Offrire a [target_country.GetNameWithNoTooltip] un riscatto per [captured_emperor.GetNameWithNoTooltip]."

 mon_pushing_advantage: "[ShowModifier('chi_tumu_crisis_benefit')] durerà finché [captured_emperor.GetName] rimane imprigionato in [ROOT.GetCountry.GetName] e vivo.\nSe catturiamo [location_for_capture.GetName], riceveremo i seguenti vantaggi:"
 mon_offer_ransom: "Offrire a [target_country.GetName] un riscatto per [captured_emperor.GetName] per il costo di [SCOPE.GetLocalVariable('ransom_value')|=+]"

 flavor_chi_mon.2.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] è Catturato!"
 flavor_chi_mon.2.desc: "La battaglia a [target_location.GetName] si è rivelata essere una sconfitta disastrosa per le nostre forze. Peggio ancora, [captured_emperor.GetName], il nostro amato [ROOT.GetCountry.GetGovernment.GetRulerTitle], è stato catturato nel mezzo della rotta [capturing_country.GetAdjective], sprofondando la nostra [ROOT.GetCountry.GetGovernment.GetCourtTitle] nel panico. Non è certo chi guiderà il [GetInternationalOrganizationType('middle_kingdom').GetName] d'ora in poi."
 flavor_chi_mon.2.a: "Mantenere lo status quo."
 flavor_chi_mon.2.b: "[sibling_candidate.GetSisterBrother] di [captured_emperor.GetNameWithNoTooltip] può governare il [ROOT.GetCountry.GetFlavorRank]."
 flavor_chi_mon.2.c: "Un figlio del [ROOT.GetCountry.GetGovernment.GetRulerTitle] è ideale."
 flavor_chi_mon.2.d: "[dynasty_candidate.GetNameWithNoTooltip] è un'opzione ideale."
 chi_recapture_emperor_tt: "[captured_emperor.GetName] deve essere ricatturato attraverso il [ShowPeaceTreatyTypeName('chi_recapture_emperor')] [peace_treaty|e]. Se [captured_emperor.GetName] muore in cattività, riceveremo le seguenti penalità:"

 flavor_chi_mon.3.title: "[target.GetNameWithNoTooltip] Muore in Prigione"
 flavor_chi_mon.3.desc: "Il nostro più grande bene, [target.GetName], ex sovrano di [target_country.GetName], è perito mentre era nella nostra custodia. Abbiamo veramente perso un grande [target.GetManWoman], che sarà ricordato per sempre come il nostro biglietto per la grandezza."
 flavor_chi_mon.3.a: "Dannazione!"

 flavor_chi_mon.4.title: "La Morte di [target.GetNameWithNoTooltip]"
 flavor_chi_mon.4.desc: "[ROOT.GetCountry.GetName|U] è stata appena colpita da una calamità. Il nostro amato sovrano, il [target.GetSonDaughter] del cielo, [target.GetName], è segnalato essere morto in cattività dei [target.GetOwner.GetAdjective] demoni. È tragico che [target.GetShortNameWithNoTooltip] non sia mai vissuto per essere ricatturato e ritornato al suo [target.GetHerHis] caro paese."
 flavor_chi_mon.4.a: "[target.GetShortNameWithNoTooltip] non era degno di tale morte."

 flavor_chi_mon.5.title: "Offerta di Riscatto"
 flavor_chi_mon.5.desc: "Sorprendentemente, i demoni in [capturing_country.GetName] ci hanno dato una proposta di riscatto. Una grande somma d'oro per il ritorno sicuro del nostro amato catturato [captured_emperor.GetName]. Dobbiamo anche ammettere che, anche se consideriamo il [captured_emperor.GetHerHis] vita inestimabile, siamo contenti di sapere che i nostri nemici la sottovalutano così tanto."
 flavor_chi_mon.5.a: "Accettare la proposta."
 flavor_chi_mon.5.b: "È un trucco! Non inviare risposta."

 flavor_chi_mon.6.title: "Cattura di [target_location.GetNameWithNoTooltip]"
 flavor_chi_mon.6.desc: "Il [target_location.GetRank.GetName] di [target_location.GetName] è finalmente caduto nelle nostre mani. La guarnigione demoralizzata non poteva resistere all'assalto delle forze [ROOT.GetCountry.GetAdjective] e ha ceduto il controllo del nostro obiettivo. Inoltre, il loro [target_character.GetName] rimane ancora nella nostra custodia, mettendo la [target_location.GetOwner.GetAdjective] [target_location.GetOwner.GetGovernment.GetCourtTitle] nel panico."
 flavor_chi_mon.6.a: "Questo sarà nei libri di storia."

 flavor_chi_mon.7.title: "Ritorno di [target_emperor.GetNameWithNoTooltip]"
 flavor_chi_mon.7.desc: "[target_emperor.GetName], l'ex sovrano di [ROOT.GetCountry.GetName], è finalmente stato riportato al [ROOT.GetCountry.GetFlavorRank]. Essendo stato accolto calosamente dai cittadini di [ROOT.GetCountry.GetCapital.GetName], non tutti sono contenti del suo [target_emperor.GetHerHis] ritorno. Fazioni si sono formate nella [ROOT.GetCountry.GetGovernment.GetCourtTitle], alcuni dei quali preferirebbero che [target_emperor.GetNameWithNoTooltip] abdicasse."
 flavor_chi_mon.7.a: "Il sovrano legittimo è ritornato."
 flavor_chi_mon.7.b: "[ROOT.GetCountry.GetGovernment.GetRulerOrHeirIfRegent.GetNameWithNoTooltip] dovrebbe governare invece."
