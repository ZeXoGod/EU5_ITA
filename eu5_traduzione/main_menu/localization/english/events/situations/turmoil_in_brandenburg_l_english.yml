 turmoil_in_brandenburg.1301.title: "Baroni Predoni a [robber_baron_province.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1301.desc: "Il flagello dei Baroni Predoni si è diffuso nella provincia di [robber_baron_province.GetName]. Le loro manifestazioni di criminalità e arroganza equivalgono a sputarci in faccia. È giunto il momento di dare loro una lezione — e di ristabilire l'autorità centrale nel paese."
 turmoil_in_brandenburg.1301.a: "Li affronteremo a tempo debito."

 turmoil_in_brandenburg.1302.title: "I von Quitzow"
 turmoil_in_brandenburg.1302.desc: "Tra tutti i Baroni Predoni, pochi possono competere per influenza con la famiglia von Quitzow. I loro possedimenti sono numerosi in tutta l'area del [ShowProvinceDefinitionName('mittelmark_province')], e detengono vasti latifondi. Eppure, nonostante tutta questa ricchezza, si sono comunque dati al crimine. Li scacceremo, e spazzeremo via i loro possedimenti prima che causino il caos totale."
 turmoil_in_brandenburg.1302.a: "Dobbiamo occuparci di loro!"
 turmoil_in_brandenburg.1302.b: "Sarebbe meglio procedere con cautela."
 turmoil_in_brandenburg.1302.historical_info: "La famiglia von Quitzow era la famiglia nobile più influente nel Brandeburgo dei primi anni del XV secolo. Durante la centralizzazione della Marca da parte di Federico I von Hohenzollern tra il 1411 e il 1415, i famosi fratelli Baroni Predoni Hans e Dietrich furono presi di mira dal nuovo elettore, che conquistò i loro castelli e pose fine all'era della supremazia dei von Quitzow nel Brandeburgo."
 STATIC_MODIFIER_NAME_PRU_quitzow_modifier: "Influenza dei von Quitzow"
 STATIC_MODIFIER_NAME_PRU_quitzow_repressed_modifier: "Repressione dei von Quitzow"
 bra_quitzow_revolt: "Rivolta dei Quitzow"

 turmoil_in_brandenburg.1303.title: "Fine del Dominio dei Baroni Predoni"
 turmoil_in_brandenburg.1303.desc: "Sebbene abbia richiesto molti anni e campagne, siamo finalmente riusciti a contenere il prepotente [ShowEstateTypeName('nobles_estate')]. Da questo momento, tutte le rotte commerciali del paese sono al sicuro dai predatori di nobile origine, e nessun uomo comune ha nulla da temere. Inoltre, la maggior parte dei contadini non sarà più obbligata a pagare il pizzo [ROOT.GetCountry.Custom('IT_NOBLES_AL')][ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
 turmoil_in_brandenburg.1303.a: "Il [ROOT.GetCountry.GetFlavorRank] è di nuovo integro."
 STATIC_MODIFIER_NAME_PRU_end_of_robber_barons: "Fine dell'Era dei Baroni Predoni"

 turmoil_in_brandenburg.1304.title: "Punire i Baroni Predoni"
 turmoil_in_brandenburg.1304.desc: "Sebbene siamo riusciti a prevalere nella nostra lotta contro il [ShowEstateTypeName('nobles_estate')] ribelle, molti alla [ROOT.GetCountry.GetGovernment.GetCourtTitle] ritengono che il solo sconfiggerli non serva a nulla, e che il [ROOT.GetCountry.GetGovernment.GetRulerTitle] debba far loro pagare il tradimento. Sebbene molti appoggino questa iniziativa, altri credono che un ulteriore inasprimento non sia necessario, soprattutto dal momento che abbiamo già riaffermato il nostro controllo."
 turmoil_in_brandenburg.1304.a: "Pagheranno il loro tradimento!"
 turmoil_in_brandenburg.1304.b: "Punirli con moderazione."
 turmoil_in_brandenburg.1304.c: "Non è necessaria alcuna ulteriore punizione."

