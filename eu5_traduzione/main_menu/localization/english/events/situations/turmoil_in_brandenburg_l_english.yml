l_english:
 #Loc macros
 bra_hre_hyperlink: "[GetUniqueInternationalOrganization('hre').GetName]"
 bra_hre_hyperlink_no_tt: "[GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
 bra_hre_emperor_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
 bra_hre_emperor_country_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
 bra_wittelsbach_hyperlink: "[ShowDynastyName('wittelsbach_dynasty')]"
 bra_wittelsbach_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('wittelsbach_dynasty')]"
 bra_askanier_hyperlink: "[ShowDynastyName('askanier_dynasty')]"
 bra_askanier_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('askanier_dynasty')]"
 bra_variable_counter: "#Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_investment_var').GetValue]#!"
 bra_neglect_variable_counter: "#Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_neglect_var').GetValue]#!"
 bra_wittelsbacher_investment_var: "#Y Investimento Wittelsbacher#!"
 bra_wittelsbacher_neglect_var: "#Y Negligenza Wittelsbach#!"

 bra_change_investment_score_add: "Otteniamo $VALUE|G0$ $bra_wittelsbacher_investment_var$ $bra_variable_counter$"
 bra_change_investment_score_subtract: "Perdiamo $VALUE|R0$ $bra_wittelsbacher_investment_var$ $bra_variable_counter$"

 bra_change_neglect_score_add: "Otteniamo $VALUE|G0$ $bra_wittelsbacher_neglect_var$ $bra_neglect_variable_counter$"
 bra_change_neglect_score_subtract: "Perdiamo $VALUE|R0$ $bra_wittelsbacher_neglect_var$ $bra_neglect_variable_counter$"

 PRU_DEAL_WITH_ROBBER_BARONS_TOOLTIP_IN_PROGRESS: "Progresso: $PROGRESS$%\n$DAYS$, $DATE$"

 #Events
 turmoil_in_brandenburg.1.title: "I [root_dynasty.GetNameWithNoTooltip] di [ROOT.GetCountry.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1.desc.start: "Con la morte dell'ultimo membro degli $bra_askanier_hyperlink$ di [ROOT.GetCountry.GetName], [GetCharacter('bra_heinrich_ii_askanier').GetName], nel 1320, le terre [ROOT.GetCountry.Custom('IT_ADJ_FP')] sono cadute nelle mani di [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName], l'Imperatore eletto del $bra_hre_hyperlink$. Al fine di mantenere il territorio della Germania settentrionale amministrato, [GetCharacter('ubv_ludwig_iv_wittelsbach').GetShortNameWithNoTooltip] ha assegnato la Marca [ROOT.GetCountry.Custom('IT_ADJ_FS')] a suo [GetCharacter('bra_ludwig_v_wittelsbach').GetDaughterSon], [GetCharacter('bra_ludwig_v_wittelsbach').GetName]."
 turmoil_in_brandenburg.1.desc: "$turmoil_in_brandenburg.1.desc.start$\n\nQuesto è l'inizio dell'era $bra_wittelsbach_hyperlink$ di [ROOT.GetCountry.GetNameWithNoTooltip]. È un'epoca di problemi, poiché [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_TITOLO')][ROOT.GetCountry.GetGovernment.GetRulerTitle] era stato posto come sovrano in giovane età, lasciando gran parte del governo nelle mani di [GetCharacter('hnb_berthold_iv_henneberg_schleusingen').GetName]. I baroni ladri, le questioni economiche e il malcontento generale della popolazione nei confronti del[ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_NULL_LA')] propri[ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_O_A')] [ROOT.GetCountry.GetGovernment.GetRulerTitle] affliggevano il governo di [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], e i $bra_wittelsbach_hyperlink_no_tt$ sembrano preoccuparsi poco dei loro possedimenti nel nord..."
 turmoil_in_brandenburg.1.desc.fallback: "$turmoil_in_brandenburg.1.desc.start$\n\nIl dominio di [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], tuttavia, ebbe vita breve, e [root_ruler.Custom('IT_ART_TITOLO')][root_ruler.GetName] assunse il controllo [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetNameWithNoTooltip]. Tuttavia, le questioni economiche e i Baroni Ladri continuano a macchiare l'autorità del[ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_NULL_LA')] [ROOT.GetCountry.GetGovernment.GetRulerTitle], e gli $bra_wittelsbach_hyperlink$ mostrano scarso interesse nel cambiare l'attuale situazione della poco sviluppata marca..."
 turmoil_in_brandenburg.1.a: "[ROOT.GetCountry.Custom('IT_La')|U][ROOT.GetCountry.GetNameWithNoTooltip] prevarrà!"
 turmoil_in_brandenburg.1.a.at: "Il [control|e] sul nostro Paese declinerà!"
 turmoil_in_brandenburg.1.a.bt: "Per risolvere questo disastro, dobbiamo anche risolvere la crisi dinastica e il disordine causato dai rampanti Baroni Ladri."

 turmoil_in_brandenburg.2.title: "La Fine del Periodo $bra_wittelsbach_hyperlink_no_tt$"
 turmoil_in_brandenburg.2.desc: "Poiché nessun membro della dinastia $bra_wittelsbach_hyperlink$ detiene alcun potere monarchico[ROOT.GetCountry.Custom('IT_Sulla')][ROOT.GetCountry.GetName], l'era della stagnazione economica e del costante abbandono è finalmente giunta al termine. Ora spetta ai nuovi governanti portare prosperità al nostro popolo."
 turmoil_in_brandenburg.2.a: "Che questo possa essere l'inizio di un'età dell'oro."
 turmoil_in_brandenburg.2.a.tt: "$bra_wittelsbacher_investment_var$ e $bra_wittelsbacher_neglect_var$ saranno disabilitati."

 turmoil_in_brandenburg.3.title: "Il Falso $name_waldemar$"
 turmoil_in_brandenburg.3.desc: "All'inizio, la sua storia sembrava realistica, anche se un po' strana: un governante che aveva inscenato il proprio funerale per poter intraprendere un pellegrinaggio senza essere disturbato, per poi tornare. Ma mentre la sua nuova campagna per il trono continuava, la sua storia cominciò a mostrare delle crepe. Coloro che conoscevano [GetCharacter('bra_waldemar_askanier').GetName] prima del 1320 avevano notato i suoi inspiegabili cambiamenti di personalità...\n\nMa con grande sorpresa di tutti, è stato finalmente rivelato che [target_character.GetName] non è altro che un semplice impostore che si finge l'illustre Margravio!\n\nIn un istante, qualsiasi forma di sostegno di cui godeva il pretendente è svanita, e il dominio [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_DEL_TITOLO')][ROOT.GetCountry.GetGovernment.GetRuler.GetName] è ancora una volta indiscusso."
 turmoil_in_brandenburg.3.a: "Un impostore tra noi... chi avrebbe mai potuto immaginarlo?"

 turmoil_in_brandenburg.4.title: "La Tirannia dei Baroni Ladri"
 turmoil_in_brandenburg.4.desc: "Protetti dallo status giuridico del loro feudo, i Baroni Ladri [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetName] sono membri [ROOT.GetCountry.Custom('IT_NOBLES_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] che impongono pedaggi e tasse paralizzanti alla popolazione locale. Anche se le loro ragioni potrebbero essere dettate dalla disperazione, le loro azioni ostacoleranno lo sviluppo delle terre [ROOT.GetCountry.Custom('IT_ADJ_FP')] se lasciamo che questo continui ad accadere..."
 turmoil_in_brandenburg.4.a: "Combattere i Baroni Ladri."
 turmoil_in_brandenburg.4.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 bra_peasants_revolt: "Rivolta Contadina"

 turmoil_in_brandenburg.5.title: "Rivolta [ROOT.GetCountry.Custom('IT_PEASANTS_DEL')][ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Revolt"
 turmoil_in_brandenburg.5.desc: "La spirale economica discendente [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetName] ha lasciato molti membri [ROOT.GetCountry.Custom('IT_PEASANTS_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] amareggiati e contrariati. Si rifiutano di lavorare nei campi a meno che non vengano soddisfatte le loro richieste di miglioramento della loro situazione sotto la tirannia degli egoisti cavalieri ladri..."
 turmoil_in_brandenburg.5.a: "Migliorate la loro situazione."
 turmoil_in_brandenburg.5.b: "Sono solo contadini. Non causeranno alcun problema."

 turmoil_in_brandenburg.6.title: "Controllo [ROOT.GetCountry.Custom('IT_CLERGY_DEL')][ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
 turmoil_in_brandenburg.6.desc: "Mentre l'autorità dei $bra_wittelsbach_hyperlink$ è presente sulla carta, l'autorità effettiva sul popolo è nelle mani di coloro che le masse scelgono di seguire. Negli insediamenti rurali, si tratta [ROOT.GetCountry.Custom('IT_CLERGY_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Se vogliamo mantenere l'autorità sul nostro territorio, dobbiamo revocare il potere dei chierici..."
 turmoil_in_brandenburg.6.a: "Revocate il loro potere."
 turmoil_in_brandenburg.6.b: "Non dovremmo interferire con [ROOT.GetCountry.Custom('IT_CLERGY_IL')][ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."

 turmoil_in_brandenburg.7.title: "Tasse Cittadine Rifiutate"
 turmoil_in_brandenburg.7.desc: "[ROOT.GetCountry.Custom('IT_La')|U][ROOT.GetCountry.GetName|U] è in cattive condizioni. Le sue terre sono scarsamente popolate e ancora meno sviluppate. La maggior parte dei miglioramenti apportati alle istituzioni [ROOT.GetCountry.Custom('IT_ADJ_FP')] sono pagati con le tasse riscosse dai borghi e dalle città. Tuttavia, i membri [ROOT.GetCountry.Custom('IT_BURGHERS_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] rifiutano di pagare la loro parte, poiché vedono pochi motivi per riconoscere i $bra_wittelsbach_hyperlink$ come loro sovrani..."
 turmoil_in_brandenburg.7.a: "Imponiamo il nostro volere [ROOT.GetCountry.Custom('IT_BURGHERS_AL')][ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
 turmoil_in_brandenburg.7.b: "$common_string_leave_them_be$"

 turmoil_in_brandenburg.8.title: "Il Dominio Privato di [target_character.GetShortNameWithNoTooltip]"
 turmoil_in_brandenburg.8.desc: "Rapporti da [target_location.GetName] parlano di [target_character.GetName] che governa le sue proprietà come se fossero un regno a sé stante. Le mura del castello diventano più alte, i fossati più larghi e gli uomini d'arme rispondono solo a [target_character.GetHerHim]. Petizioni che dovrebbero essere ascoltate presso la [ROOT.GetCountry.GetGovernment.GetCourtTitle] vengono decise nella sua sala, e i tributi e le tasse una volta pagati [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_AL_TITOLO')][ROOT.GetCountry.GetGovernment.GetRulerTitle] ora riempiono invece le sue casse. Per molti, la distinzione tra le terre [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetName] e il dominio privato di [target_character.GetShortNameWithNoTooltip] sta diventando preoccupantemente sfocata..."
 turmoil_in_brandenburg.8.a: "Per ora lo tollereremo."
 turmoil_in_brandenburg.8.b: "Nessun lord è al di sopra [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_DEL_TITOLO')][ROOT.GetCountry.GetGovernment.GetRulerTitle]."

 tib_outcome_8_1_tt: "I nostri agenti faranno in modo che [target_character.GetShortNameWithNoTooltip] non ci dia più fastidio"
 tib_outcome_8_2_tt: "La [ShowEstateTypeName('nobles_estate')] di [target_location.GetName] si infurierà per il nostro intervento"
 tib_outcome_8_3_tt: "La nostra decisione peggiorerà i rapporti con la [ShowEstateTypeName('nobles_estate')] in tutto il regno"

 turmoil_in_brandenburg.9.title: "La Lega [ROOT.GetCountry.Custom('IT_NOBLES_DEL')][ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] di [target_province.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.9.desc: "Nella campagna di [target_province.GetName], numerose famiglie importanti si sono unite in una lega formale. Giurano difesa reciproca, tengono tribunali congiunti e concordano di resistere a qualsiasi ulteriore intrusione dei funzionari reali nei loro affari.\n\nPer molti abitanti del luogo, è chiaro che la vera autorità in [target_province.GetNameWithNoTooltip] ora spetta a questo gruppo [ROOT.GetCountry.Custom('IT_NOBLES_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] piuttosto che [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_AL_TITOLO')][ROOT.GetCountry.GetGovernment.GetRulerTitle] a [ROOT.GetCountry.GetCapital.GetName]. Alcuni a [ROOT.GetCountry.GetGovernment.GetCourtTitle] sussurrano che tollerare tali unioni non farà altro che accelerare il declino del potere centrale."
 turmoil_in_brandenburg.9.a: "Riconoscete la lega e conquistate il loro favore."
 turmoil_in_brandenburg.9.b: "Spezzate questa cricca e ripristiniamo la nostra autorità."
 
 nobles_in_target_province_gain_pop_satisfaction_extreme_bonus_tt: "I [pops|e] sotto il nostro governo in [target_province.GetName], che appartengono alla [ShowEstateTypeName('nobles_estate')], saranno molto incoraggiati dal nostro riconoscimento della loro lega, ottenendo un [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] di [pop_satisfaction|e]"
 lower_class_pop_satisfaction_weak_penalty_tt: "La [lower_class|e] di [target_province.GetName] proveranno risentimento per il potere incontrollato dei loro signori, subendo così un [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] di [pop_satisfaction|e]"
 nobles_in_target_province_may_agitate_locals_to_rebel_tt: "Gli umili [ShowEstateTypeName('nobles_estate')] di [target_province.GetName] potrebbero cercare di fomentare disordini tra i loro sottoposti in risposta alla nostra linea dura"

 turmoil_in_brandenburg.10.title: "Pedaggi Illegali in [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.10.desc: "I commercianti lamentano che le strade e i ponti nei dintorni di [target_location.GetName] sono ora intasate da nuovi posti di pedaggio, istituiti senza autorizzazione reale da membri intraprendenti [ROOT.GetCountry.Custom('IT_NOBLES_DEL')][ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. I carri vengono fermati, le merci vengono contate e viene richiesta una moneta in nome della #italic protezione locale#!.\n\nOgni carro che cede a queste imposte deruba [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_TITOLO')][ROOT.GetCountry.GetGovernment.GetRulerTitle] dei doveri e indebolisce il principio secondo cui la legge deriva dalla [ROOT.GetCountry.GetGovernment.GetCourtTitle], non dalla torre del castello più vicino."
 turmoil_in_brandenburg.10.a: "Chiudiamo un occhio sui loro pedaggi."
 turmoil_in_brandenburg.10.b: "Abbattiamo le barriere e rivendichiamo i nostri diritti."

 turmoil_in_brandenburg.11.title: "La Casa dei [target_dynasty_1.GetNameWithNoTooltip] Sfida i [target_dynasty_2.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.11.desc: "La tensione è esplosa tra i [target_dynasty_1.GetName] e la nostra casata dei [target_dynasty_2.GetName]. Durante le feste, le battute di caccia e ora anche nei concili, i loro rampolli più importanti mettono in discussione il giudizio e il lignaggio [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_DEL_TITOLO')][ROOT.GetCountry.GetGovernment.GetRulerTitle], sottintendendo che il loro sangue non è meno adatto a governare [ROOT.GetCountry.Custom('IT_La')][ROOT.GetCountry.GetName].\n\nQuello che era iniziato come un mormorio di disprezzo si è trasformato in una aperta contesa per il prestigio, i sudditi e l'influenza a corte. Se non prendiamo una posizione ferma, i signori minori potrebbero concludere che la nostra dinastia è solo una delle tante famiglie nobili."
 turmoil_in_brandenburg.11.a: "Sosteniamo con fermezza [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_IL_LA')] nostr[ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_O_A')] [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
 turmoil_in_brandenburg.11.b: "Comprate la pace con concessioni ai [target_dynasty_1.GetNameWithNoTooltip]."

 target_character_2_will_challenge_the_power_nobles_tt: "[ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_ART_TITOLO')|U][target_character_2.GetName] affronterà direttamente la [ShowEstateTypeName('nobles_estate')] riguardo le loro rivendicazioni di potere."

 turmoil_in_brandenburg.12.title: "Investimento a [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.12.desc: "I consiglieri presentano un piano per convogliare fondi regi a [target_location.GetName] e nelle terre circostanti di [target_province.GetName]. Nuove strade, mercati e uffici porterebbero la presenza [ROOT.GetCountry.GetGovernment.GetRuler.Custom('IT_DEL_TITOLO')][ROOT.GetCountry.GetGovernment.GetRulerTitle] più in profondità nelle campagne, allentando la presa dei magnati locali sul commercio e sulla giustizia.\n\nEppure la [ShowEstateTypeName('nobles_estate')] sostiene che tali miglioramenti dovrebbero passare per le loro mani, non le nostre, avvertendo che un'ingerenza centrale nei loro domini non farà che provocare resistenza."
 turmoil_in_brandenburg.12.a: "Investiamo le risorse della corona e rafforziamo la nostra presa."
 turmoil_in_brandenburg.12.b: "In ogni caso, questa questione non ci riguarda."

 turmoil_in_brandenburg.13.title: "La Crescita di [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.13.desc: "Figure di spicco di [target_location.GetName] si sono fatti avanti per presentare una petizione alla [ROOT.GetCountry.GetGovernment.GetCourtTitle] per un investimento. Sostengono che nuove strade, sale delle corporazioni e opere pubbliche legherebbero gli insediamenti di [target_province.GetName] più strettamente [ROOT.GetCountry.Custom('IT_Alla')][ROOT.GetCountry.GetName], placando il malcontento tra la popolazione locale.\n\nI nostri tesorieri avvertono tuttavia che tale larghezza graverebbe sulle casse e potrebbe essere vista come indulgenza da altre province ancora in attesa del proprio turno."
 turmoil_in_brandenburg.13.a: "Distribuite gli investimenti su tutta [target_province.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.13.b: "Concentrate i nostri sforzi su [target_location.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.13.c: "Non possiamo permetterci tale generosità."
 
 every_location_in_target_province_gains_center_of_urbanization_modifier_tt: "Ogni [location|e] in [target_province.GetName] riceverà il [modifier|e] [GetModifier('center_of_urbanization_modifier').GetNameWithTooltip]"
 every_location_in_target_province_gains_flourishing_capital_modifier: "Ogni [location|e] in [target_province.GetName] riceverà il [modifier|e] [GetModifier('flourishing_capital_modifier').GetNameWithTooltip]"
 every_location_in_target_province_gains_development_mild_bonus: "Ogni [location|e] in [target_province.GetName] otterrà [ShowNamedValue('development_weak_bonus')|+=] [development|e]"
 every_location_in_target_province_gains_prosperity_extreme_bonus: "Ogni [location|e] in [target_province.GetName] otterrà [ShowNamedValue('prosperity_severe_bonus')|+=2%] [prosperity|e]."


 tturmoil_in_brandenburg.100.title: "I $bra_wittelsbach_hyperlink_no_tt$ Rivitalizzano [ROOT.GetCountry.Custom('IT_La')][ROOT.GetCountry.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.100.desc: "Dopo anni di povertà e devastazione, di possedimenti autonomi e tirannia dei Baroni Ladri, di sfide e pretendenti, la Casa $bra_wittelsbach_hyperlink$ ha infine prevalso, e [ROOT.GetCountry.Custom('IT_ART_RANGO')][ROOT.GetCountry.GetFlavorRank] [ROOT.GetCountry.Custom('IT_Di')][ROOT.GetCountry.GetName] è diventato un gioiello nella [ShowRegionName('north_german_region')]. Lunga vita al governo di [target_character.GetName]!"
 turmoil_in_brandenburg.100.a: "[ROOT.GetCountry.Custom('IT_La')|U][ROOT.GetCountry.GetNameWithNoTooltip] diventerà il vanto dei $bra_wittelsbach_hyperlink_no_tt$."

 turmoil_in_brandenburg.200.title: "Il Mistero di [target_character.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.200.desc: "La sua morte fu rapida e inaspettata, eppure la sua eredità tormenta ancora [ROOT.GetCountry.Custom('IT_La')][ROOT.GetCountry.GetName]. [target_character.GetName], il presunto $bra_askanier_hyperlink$ che governò [ROOT.GetCountry.Custom('IT_ART_NOSTRO_RANGO')]nostr[ROOT.GetCountry.Custom('IT_OA_RANGO')] [ROOT.GetCountry.GetFlavorRank] fino al 1320, si rivelò essere il più ingannatore degli impostori e dei cospiratori nella storia [ROOT.GetCountry.Custom('IT_ADJ_FS')]!\n\nAl suo funerale, la sua vecchia tomba fu riesumata affinché [target_character.GetHeShe] potesse riposare definitivamente. Tuttavia, la cerimonia giunse a una conclusione prematura quando lo scheletro di [GetCharacter('bra_waldemar_askanier').GetName] - il #italic $name_waldemar$#! - fu scoperto al suo interno!\n\nCiò portò naturalmente grande vergogna [ROOT.GetCountry.Custom('IT_Alla')][ROOT.GetCountry.GetNameWithNoTooltip], poiché un semplice individuo era riuscito a ingannare l'intero paese..."
 turmoil_in_brandenburg.200.a: "Com'è potuto accadere? Siamo più intelligenti di così..."

 turmoil_in_brandenburg.300.title: "Una Lunga Battaglia Giunge al Termine"
 turmoil_in_brandenburg.300.desc: "Dopo decenni, la nostra lotta per domare e soggiogare [ROOT.GetCountry.Custom('IT_ART_RANGO')][ROOT.GetCountry.GetLongName] è finalmente giunta al termine. Le dinastie rivali per il nostro trono sono state respinte e le ultime roccaforti dei Baroni Ladri sono state rase al suolo. La nostra azione decisa ci ha accordato l'opportunità di plasmare questo stato a nostro vantaggio, costruendo un'amministrazione in grado di resistere più facilmente a tali mali in futuro."
 turmoil_in_brandenburg.300.a: "Finalmente la pace."

 turmoil_in_brandenburg.1000.title: "Il Ritorno di [target_character.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1000.desc: "Poiché nessun imperatore del $bra_hre_hyperlink$ è più connesso ai regnante $bra_wittelsbach_hyperlink$, la legittimità [bra_ruler.Custom('IT_DEL_TITOLO')][bra_ruler.GetName] è nuovamente in discussione. Il popolo [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetName] anela agli anni del governo $bra_askanier_hyperlink$.\n\nMa, come vuole il destino, il presunto defunto [target_character.GetName] ha compiuto una pubblica resurrezione! Affermando che il suo funerale era stato orchestrato per facilitare il suo pellegrinaggio in Terra Santa, [target_character.GetShortNameWithNoTooltip] è tornato a reclamare il trono [ROOT.GetCountry.GetAdjective] [bra_ruler.Custom('IT_DAL_TITOLO')][bra_ruler.GetShortNameWithNoTooltip]."
 turmoil_in_brandenburg.1000.desc.emperor_supports: "$turmoil_in_brandenburg.1000.desc$\n\nFortunamente, i rapporti tra [emperor_ruler.GetName] e [bra_ruler.GetShortNameWithNoTooltip] sono benevoli. Pertanto, il $bra_hre_emperor_hyperlink$ sostiene la casata $bra_wittelsbach_hyperlink_no_tt$ contro il pretendente."
 turmoil_in_brandenburg.1000.desc.emperor_rejects: "$turmoil_in_brandenburg.1000.desc$\n\nSfortunatamente, il $bra_hre_emperor_hyperlink$ favorisce la casata $bra_askanier_hyperlink_no_tt$ rispetto alla $bra_wittelsbach_hyperlink_no_tt$. Pertanto, [emperor_ruler.Custom('IT_ART_TITOLO')][emperor_ruler.GetName] ha concesso il diritto di governare [bra_country.Custom('IT_La')][bra_country.GetNameWithNoTooltip] a [target_character.GetShortNameWithNoTooltip]. Solo stringere un accordo con [emperor_ruler.Custom('IT_ART_TITOLO')][emperor_ruler.GetNameWithNoTooltip] potrebbe risolvere la minaccia di [target_character.GetShortNameWithNoTooltip]..."
 turmoil_in_brandenburg.1000.a: "Contattate il $bra_hre_emperor_hyperlink$!"
 turmoil_in_brandenburg.1000.a.at: "Ogni paese che ha un membro della dinastia $bra_wittelsbach_hyperlink$ come proprio governante guadagna [ShowBiasValue('opinion_support_our_dynasty_member')|+0] [opinion|e] nei confornti  [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetName]"
 turmoil_in_brandenburg.1000.a.tt: "Ci rivolgeremo [ROOT.GetCountry.Custom('IT_Alla')][emperor_country.GetName] e chiederemo il loro aiuto per gestire il pretendente. Ciò richiederà #Y 2 anni#! per essere completato, e saremo costretti a rispettare le condizioni del $bra_hre_emperor_hyperlink$ a meno che la loro [opinion|e] nei nostri confronti non superi #Y 100#!"
 turmoil_in_brandenburg.1000.b: "Giustiziamo noi stessi il pretendente!"
 turmoil_in_brandenburg.1000.b.tt: "Tenteremo di giustiziare [target_character.GetName]. Se ci riusciremo, la legittimità di [bra_ruler.GetName] sarà ripristinata e riceveremo un bonus di #Y +5#! al nostro $bra_wittelsbacher_investment_var$ $bra_variable_counter$.\nQualora fallissimo, scoppierà una [civil_war|e]"
 turmoil_in_brandenburg.1000.c: "Abdichiamo a favore del vero governante [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1000.c.at: "Ogni paese che ha un membro della dinastia $bra_wittelsbach_hyperlink$ come proprio governante guadagna [ShowBiasValue('opinion_ousted_our_dynasty_member')|+0] [opinion|e] nei confronti [ROOT.GetCountry.Custom('IT_Della')][ROOT.GetCountry.GetName]"
 turmoil_in_brandenburg.false_waldemar_rebel.tt: "I [ShowPopTypeName('nobles')] e i [ShowPopTypeName('peasants')] di massimo #Y 4#! delle località più popolose e di nostra proprietà acquisiscono i seguenti effetti:\n- Perdono il [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] di [pop_satisfaction|e]\n- Si uniscono a [false_waldemar_rebel.GetName]"

 turmoil_in_brandenburg.1001.title: "L'Ascesa di [target_character.GetShortNameWithNoTooltip] [bra_country.Custom('IT_In')][bra_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1001.desc.imposter_revealed: "Un ambasciatore di [bra_country.GetName] è giunto alla nostra grandiosa corte per richiedere il nostro sostegno contro un pretendente emergente e rivale di [bra_ruler.GetName]. A quanto pare, questo sedicente '[target_character.GetName]' afferma di essere tornato da un pellegrinaggio in Terra Santa, e ora rivendica il trono [bra_country.GetAdjectiveWithNoTooltip].\n\nTuttavia, notizie di inganni ci hanno raggiunto: questo '$name_waldemar$' è un mero impostore!"
 turmoil_in_brandenburg.1001.desc: "Un ambasciatore di [bra_country.GetName] è giunto alla nostra corte per richiedere il nostro sostegno in un conflitto dinastico. L'ex sovrano di [bra_country.GetNameWithNoTooltip], [target_character.GetName], è tornato da un lungo pellegrinaggio in Terra Santa e ora rivendica nuovamente per sé il trono [bra_country.GetAdjective]. [bra_ruler.GetName] trova scarso sostegno tra i [bra_ruler.GetHisHer] sudditi, e ha manifestato la [bra_ruler.GetHisHer] disponibilità a trattare con noi in cambio del nostro appoggio contro il pretendente."
 turmoil_in_brandenburg.1001.help.tt: "[target_character.GetName] sarà bandito da [bra_country.GetName], e il [modifier|e] [ShowModifier('bra_waldemar_rallies_nobility')] sarà rimosso da loro"
 turmoil_in_brandenburg.1001.a: "Sosterremo la loro causa in cambio di oro."
 turmoil_in_brandenburg.1001.a.tt: "Riceveremo [ROOT.GetVariable('bra_gold_tooltip_var').GetValue|+=2] [gold|e] da [bra_country.GetName] tra #Y 1 anno#!"
 turmoil_in_brandenburg.1001.b: "Una mano lava l'altra. Aiutiamoli!"
 turmoil_in_brandenburg.1001.b.tt: "[bra_country.GetName] voterà per noi tra #Y 1 anno#!"
 turmoil_in_brandenburg.1001.c: "Aiuteremo la $bra_wittelsbach_hyperlink_no_tt$ in cambio del loro sostegno politico."
 turmoil_in_brandenburg.1001.c.tt: "Riceveremo [ShowBiasValue('opinion_supported_the_wittelsbacher')|+=0] [opinion|e] con tutti i [countries|e] che hanno la [dynasty|e] $bra_wittelsbach_hyperlink$ al potere tra #Y 1 anno#!"
 turmoil_in_brandenburg.1001.d: "La $bra_wittelsbach_hyperlink_no_tt$ sarà supportata."
 turmoil_in_brandenburg.1001.d.tt: "Non chiederemo nulla in cambio"
 turmoil_in_brandenburg.1001.e: "Non abbiamo nulla da guadagnare aiutando la $bra_wittelsbach_hyperlink_no_tt$."
 turmoil_in_brandenburg.1001.e.tt: "Rifiuteremo di sostenere la $bra_wittelsbach_hyperlink$, riducendo l'[opinion|e] di tutti i [countries|e] con la $bra_wittelsbach_hyperlink_no_tt$ come [dynasty|e] regnante di [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0], ma migliorando l'opinione di tutti i paesi con la [dynasty|e] $bra_askanier_hyperlink$ di [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] tra #Y 1 anno#!"
 turmoil_in_brandenburg.1001.zzz: "[bra_ruler.GetShortNameWithNoTooltip] sarà autorizzato ad esercitare la giustizia come [bra_ruler.GetHeShe] ritiene opportuno."
 turmoil_in_brandenburg.1001.zzz.tt: "[bra_country.GetName] sarà autorizzato a gestire [target_character.GetName] come meglio crede"

 turmoil_in_brandenburg.1002.title: "Il Sostegno del $bra_hre_emperor_hyperlink$"
 turmoil_in_brandenburg.1002.desc: "Notizie straordinarie hanno raggiunto la nostra corte! Il $bra_hre_emperor_hyperlink$, [emperor_ruler.GetName] di [emperor_country.GetName], ha espresso il proprio genuino sostegno a [bra_ruler.GetName] nella [bra_ruler.GetHisHer] lotta contro il pretendente [target_character.GetName]!"
 turmoil_in_brandenburg.1002.desc.gold: "$turmoil_in_brandenburg.1002.desc$\n\nNaturalmente, tale sostegno non è gratuito. [emperor_ruler.GetShortNameWithNoTooltip] ha indicato il peso finanziario che il [emperor_ruler.GetHisHer] supporto imporrebbe al [emperor_ruler.GetHisHer] tesoro. Pertanto, [emperor_ruler.GetHeShe] esige un tributo di [ROOT.GetVariable('bra_owes_gold').GetValue|V2] oro in cambio."
 turmoil_in_brandenburg.1002.desc.loyalty: "$turmoil_in_brandon.1002.desc$\n\nNaturalmente, tale sostegno non è gratuito. [emperor_ruler.GetShortNameWithNoTooltip] è preoccupato per la [emperor_ruler.GetHisHer] successione nel $bra_hre_hyperlink$, e richiede la nostra piena lealtà alla causa della [emperor_ruler.GetHisHer] famiglia per assicurarsi il Trono Imperiale."
 turmoil_in_brandenburg.1002.desc.relations: "$turmoil_in_brandenburg.1002.desc$\n\nNaturalmente, tale sostegno non è gratuito. [emperor_ruler.GetShortNameWithNoTooltip] desidera che agiamo come loro araldi all'interno della $bra_wittelsbach_hyperlink$, mostrando la gloria di [emperor_country.GetNameWithNoTooltip] a ogni membro della dinastia."
 turmoil_in_brandenburg.1002.desc.free: "$turmoil_in_brandenburg.1002.desc$\n\nCon nostra sorpresa, il $bra_hre_emperor_hyperlink$ non ha avanzato alcuna richiesta in cambio. Il loro aiuto proviene da buona fede, senza alcuna condizione."
 turmoil_in_brandenburg.1002.a: "Finalmente l'autorità della $bra_wittelsbach_hyperlink_no_tt$ è ripristinata!"
 turmoil_in_brandenburg.1002.a.tt: "Ogni [country|e] con la $bra_wittelsbach_hyperlink$ come [dynasty|e] regnante guadagna [ShowBiasValue('opinion_supported_the_wittelsbacher')|0] [opinion|e] di [emperor_country.GetName]"

 turmoil_in_brandenburg.1003.title: "L'Imperatore Rifiuta di Dare Supporto"
 turmoil_in_brandenburg.1003.desc.dead: "Notizie dal $bra_hre_emperor_hyperlink$ ci hanno raggiunto. Sebbene [emperor_ruler.GetName] abbia assunto una posizione ostile ai nostri interessi durante la [emperor_ruler.GetHisHer] vita, le [emperor_ruler.GetHisHer] ragioni rimangono sconosciute a chiunque tranne che a [emperor_ruler.GetHerselfHimself]. Pertanto, [target_character.GetName] rimane incontrastato..."
 turmoil_in_brandenburg.1003.desc.wittelsbach: "Terribili notizie hanno raggiunto la nostra corte! Mentre il caos causato da [target_character.GetName] cresce d'intensità, il $bra_hre_emperor_hyperlink$ ha finalmente rivelato la posizione [emperor_country.GetAdjective] sulla questione. Nonostante la [emperor_ruler.GetHisHer] connessione con il casato, [emperor_ruler.GetName] si rifiuta di sostenere [bra_ruler.GetName], e si oppone apertamente alla propria stessa dinastia!"
 turmoil_in_brandenburg.1003.desc: "Terribili notizie hanno raggiunto la nostra corte! Mentre il caos causato da [target_character.GetName] cresce d'intensità, il $bra_hre_emperor_hyperlink$ ha finalmente rivelato la posizione [emperor_country.GetAdjective] sulla questione: [emperor_ruler.GetName] si rifiuta di sostenere [bra_ruler.GetName], e si oppone apertamente alla $bra_wittelsbach_hyperlink_no_tt$!"
 turmoil_in_brandenburg.1003.a: "Che giornata orribile per essere il [ROOT.GetCountry.GetGovernment.GetRulerTitle]..."
 turmoil_in_brandenburg.1003.a.tt: "Ogni [country|e] con la $bra_wittelsbach_hyperlink$ come [dynasty|e] regnante perde [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0] [opinion|e] di [emperor_country.GetName], mentre ogni paese con la [dynasty|e] regnante $bra_askanier_hyperlink$ guadagna [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] di opinione nei loro confronti"

 turmoil_in_brandenburg.1004.title: "Sostegno Incondizionato del $bra_hre_emperor_hyperlink$"
 turmoil_in_brandenburg.1004.desc: "Notizie dal $bra_hre_emperor_country_hyperlink$ sono giunte alla nostra corte. A causa delle disonorevoli azioni di [target_character.GetName], il $bra_hre_emperor_hyperlink$ ci ha concesso il diritto incondizionato di trattare con l'impostore come meglio crediamo."
 turmoil_in_brandenburg.1004.a: "Bandire [target_character.GetHimHer]."
 turmoil_in_brandenburg.1004.b: "Giustiziare [target_character.GetHimHer]."
 turmoil_in_brandenburg.1004.c: "Le [target_character.GetHisHer|U] abilità potrebbero in realtà tornarci utili..."
 turmoil_in_brandenburg.1004.c.tt: "[target_character.GetName] riceve un'altra possibilità e diventerà ora disponibile per il nostro gabinetto"

 turmoil_in_brandenburg.1005.title: "Autenticità Dubbia"
 turmoil_in_brandenburg.1005.desc: "Il governo della $bra_wittelsbach_hyperlink$ è terminato, e il glorioso $bra_askanier_hyperlink$ è finalmente tornato a [bra_country.GetName]. Eppure, il sospetto ricade sul neoincornato [ROOT.GetCountry.GetGovernment.GetRulerTitle]. [target_character.GetName] fatica a ricordare le imprese del [target_character.GetHisHer] tempo precedente al [target_character.GetHisHer] funerale apparentemente simulato, i membri della $bra_askanier_hyperlink_no_tt$ notano inspiegabili cambiamenti fisici nel loro amato familiare, e persino il [target_character.GetHisHer] stile di governo è notoriamente dissimile da [target_character.GetHimHer]. [target_character.GetShortNameWithNoTooltip] attribuisce queste incongruenze alle esperienze vissute durante il [target_character.GetHisHer] pellegrinaggio in Terra Santa..."
 turmoil_in_brandenburg.1005.a: "Avviare un'indagine sulla [target_character.GetHisHer] storia."
 turmoil_in_brandenburg.1005.a.tt: "Viene avviata un'indagine sulla versione di [target_character.GetName], rivelando la [target_character.GetHisHer] vera connessione con il $bra_askanier_hyperlink$..."
 turmoil_in_brandenburg.1005.b: "Sono solo voci non verificate..."

 turmoil_in_brandenburg.1006.title: "Indagini Contro [target_character.GetShortNameWithNoTooltip]"
 turmoil_in_brandenburg.1006.desc: "Dopo due anni di ricerche, indagini e confronto di documenti, il caso dell'autenticità di [target_character.GetName], attuale [ROOT.GetCountry.GetGovernment.GetRulerTitle], ha infine trovato la sua conclusione."
 turmoil_in_brandenburg.1006.desc.true_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nStando alle indagini, [target_character.GetName] è effettivamente un membro del $bra_askanier_hyperlink$, sebbene non il vero [GetCharacter('bra_waldemar_askanier').GetName] che [target_character.GetHeShe] affermava di essere. [target_character.GetHeShe] condivide lo stesso nome del nostro defunto Margravio, ma si scopre che [target_character.GetHisHer] fu accidentalmente confuso con il $name_waldemar$ sbagliato."
 turmoil_in_brandenburg.1006.desc.false_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nNonostante i [target_character.GetHisHer] migliori sforzi per fingere, la [target_character.GetHisHer] commedia si è infine frantumata quando [target_character.GetHeShe] è stato messo di fronte ai fatti. [target_character.GetShortNameWithNoTooltip] non è altro che un impostore, avendo ingannato tutti alla corte e persino i membri del $bra_askanier_hyperlink$ facendo credere che [GetCharacter('bra_waldemar_askanier').GetName] fosse di nuovo vivo e in buona salute. Di conseguenza, le proteste a corte [bra_country.GetAdjectiveWithNoTooltip] sono piuttosto accese, e molte parti del governo esigono una risoluzione."
 turmoil_in_brandenburg.1006.a: "Le somiglianze erano semplicemente così marcate!"
 turmoil_in_brandenburg.1006.a.tt: "[target_character.GetName] e ogni discendente cambierà la propria [dynasty|e] in $bra_askanier_hyperlink$"
 turmoil_in_brandenburg.1006.b: "Almeno [target_character.GetHeShe] non è un $bra_wittelsbach_hyperlink_no_tt$..."
 turmoil_in_brandenburg.1006.b.tt: "[target_character.GetName] e ogni discendente cambierà la propria [dynasty|e] in [target_dynasty.GetName]"
 turmoil_in_brandenburg.1006.c: "Eliminare l'impostore!"

 turmoil_in_brandenburg.1007.title: "L'Esecuzione del Falso [target_character.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1007.desc.successful_execution: "[target_character.GetName] è stato catturato e imprigionato con successo da coloro che sono fedeli a [bra_ruler.GetName]. Come si è scoperto, [target_character.GetShortNameWithNoTooltip] non è un $bra_askanier_hyperlink$ - nemmeno un membro del nostro prestigioso [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]! [target_character.GetSheHe|U] è stato accusato di impostura, tradimento e minaccia alla stabilità di [bra_country.GetName], ed è stato giudicato colpevole..."
 turmoil_in_brandenburg.1007.desc.failed_execution: "Nel cuore della notte, [target_character.GetName] fu catturato e imprigionato a [bra_country.GetCapital.GetName] in attesa della [target_character.GetHisHer] presunta esecuzione all'alba. Tuttavia, [target_character.GetShortNameWithNoTooltip] si è dimostrato astuto, avendo anticipato ogni nostra mossa. In seguito al rapimento, un folto gruppo di nobili - membri [ROOT.GetCountry.Custom('IT_NOBLES_DEL_NOSTRO')][ROOT.GetCountry.Custom('IT_NOBLES_NOSTRO')][ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] - ha assalito i sotterranei del palazzo e liberato il pretendente.\n\nOra, [bra_country.GetName] si trova di fronte a una guerra civile dalle dimensioni imprevedibili..."
 turmoil_in_brandenburg.1007.a: "Un'altra crisi brillantemente scongiurata."
 turmoil_in_brandenburg.1007.b: "Alle armi!"
 bra_true_waldemar_identity_reveal_tt: "#italic La vera identità di [target_character.GetName] sarà rivelata...#!"
 turmoil_in_brandenburg.false_waldemar_big_rebel.tt: "I [ShowPopTypeName('nobles')] e i [ShowPopTypeName('peasants')] fino a #Y 16#! delle località più popolose e di nostra proprietà acquisiscono i seguenti effetti:\n- Perde [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [pop_satisfaction|e]\n- Si unisce a [false_waldemar_rebel.GetName]"
 false_waldemar_rebel: "Sostenitori di $name_waldemar$"

 turmoil_in_brandenburg.1100.title: "L'Abbandono di [root_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1100.desc: "Le terre di [root_country.GetName] sono sempre state piuttosto sottosviluppate. Eppure, anche nei momenti peggiori, [root_country.GetNameWithNoTooltip] non è mai stata così degradata come sotto le mani della $bra_wittelsbach_hyperlink$.\n\nLe notizie di questa triste situazione hanno raggiunto il $bra_hre_emperor_hyperlink$. Il destino di [root_ruler.GetName] e del [root_ruler.GetHisHer] governo su queste terre è appeso a un filo..."
 turmoil_in_brandenburg.1100.a: "Di certo, il $bra_hre_emperor_hyperlink$ comprenderà la nostra situazione."
 turmoil_in_brandenburg.1100.a.tt: "Il $bra_hre_emperor_hyperlink$ deciderà il nostro destino. Il $bra_hre_emperor_hyperlink$ potrebbe decidere di nominare un nuovo sovrano da un'altra dinastia per noi."
 turmoil_in_brandenburg.1101.title: "La $bra_wittelsbach_hyperlink_no_tt$ Tradisce il $bra_hre_hyperlink_no_tt$"
 turmoil_in_brandenburg.1101.desc: "La situazione in uno dei nostri elettori, il [root_country.GetFlavorRank] di [root_country.GetName], si è rivelata piuttosto grave. La tirannia dei Baroni Predoni locali, un'economia in totale collasso e un [root_country.GetGovernment.GetRulerTitle] negligente, [root_ruler.GetName], affliggono la terra, rendendola un pugno nell'occhio all'interno della $bra_hre_hyperlink$. È nostro dovere di $bra_hre_emperor_hyperlink$ della $bra_hre_hyperlink_no_tt$ non permettere che tale grave mal governo continui."
 turmoil_in_brandenburg.1101.a: "Assumere il controllo diretto sul [root_country.GetFlavorRank]."
 turmoil_in_brandenburg.1101.a.tt: "Insedieremo [emperor_ruler.GetName] come nuovo [ruler|e] di [root_country.GetName], formando una [union|e] con loro"
 turmoil_in_brandenburg.1101.b: "Lascia che [dynasty_character.GetNameWithNoTooltip] governi su [root_country.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1101.b.tt: "Insedieremo [dynasty_character.GetName] come nuovo [ruler|e] di [root_country.GetName]"
 turmoil_in_brandenburg.1101.c: "[cabinet_character.GetNameWithNoTooltip] governerà in nostro nome."
 turmoil_in_brandenburg.1101.c.tt: "Insedieremo [cabinet_character.GetName] come nuovo [ruler|e] di [root_country.GetName], trasformandoli nel nostro [ShowSubjectTypeName('vassal')] ma causando [ShowBiasValue('subjugated_elector_antagonism')|-=0] [antagonism|e] con ogni membro di [GetUniqueInternationalOrganization('hre').GetName]"
 subjugated_elector_antagonism: "Elettore Soggiogato"
 turmoil_in_brandenburg.1101.d: "Uno dei nostri consiglieri di corte sistemerà la situazione [root_country.GetAdjectiveWithNoTooltip]."
 turmoil_in_brandenburg.1101.d.tt: "Insedieremo un consigliere locale della nostra corte come nuovo [ruler|e] di [root_country.GetName]"
 turmoil_in_brandenburg.1101.e: "Lascia stare la $bra_wittelsbach_hyperlink_no_tt$, possono rimetterla in sesto."
 turmoil_in_brandenburg.1101.e.tt: "Lasceremo la $bra_wittelsbach_hyperlink$ in pace, permettendole di continuare a governare [root_country.GetName]"

 turmoil_in_brandenburg.1102.title: "La Risposta del $bra_hre_emperor_hyperlink$"
 turmoil_in_brandenburg.1102.desc.wittelsbach: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che le terre di [root_country.GetName] saranno unite a quelle di [emperor_country.GetNameWithNoTooltip], con [emperor_ruler.GetName] come sovrano comune."
 turmoil_in_brandenburg.1102.desc: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che la $bra_wittelsbach_hyperlink$ non è più al potere da questo giorno in poi. Le terre di [root_country.GetName] cadono direttamente nelle mani di [emperor_ruler.GetName], costringendoci in un'unione personale con [emperor_country.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1102.a: "Lunga vita al $bra_hre_emperor_hyperlink$!"
 turmoil_in_brandenburg.1102.b: "Si spera che questa volta il [root_country.GetLongNameWithNoTooltip] riesca a mantenersi unito."

 turmoil_in_brandenburg.1103.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1103.desc.wittelsbach: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che le terre di [root_country.GetName] siano governate da [dynasty_character.GetName]."
 turmoil_in_brandenburg.1103.desc: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che la $bra_wittelsbach_hyperlink$ non è più al potere da questo giorno in poi. Le terre di [root_country.GetName] cadono direttamente nelle mani di [dynasty_character.GetName]."
 turmoil_in_brandenburg.1103.a: "Possa [dynasty_character.GetShortNameWithNoTooltip] governare con forza."
 turmoil_in_brandenburg.1103.b: "Una nuova opportunità per il [root_country.GetLongNameWithNoTooltip], a quanto sembra."

 turmoil_in_brandenburg.1104.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1104.desc.wittelsbach: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che le terre saranno governate da un nuovo membro della dinastia $bra_wittelsbach_hyperlink$ - uno che si è già dimostrato affidabile in passato. [root_country.GetName] è ora affidata alle cure di [cabinet_character.GetName], il più leale dei vassalli [emperor_country.GetAdjectiveWithNoTooltip]."
 turmoil_in_brandenburg.1104.desc: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che la $bra_wittelsbach_hyperlink$ non è più al potere da questo giorno in poi. Le terre di [root_country.GetName] cadono direttamente nelle mani di [cabinet_character.GetName], il più leale dei vassalli [emperor_country.GetAdjectiveWithNoTooltip]."
 turmoil_in_brandenburg.1104.a: "Almeno non è un $bra_wittelsbach_hyperlink_no_tt$."
 turmoil_in_brandenburg.1104.b: "Oh, magnifico... i $bra_wittelsbach_hyperlink_no_tt$ sono tornati..."
 turmoil_in_brandenburg.1104.c: "Non ci inginocchieremo davanti a [emperor_country.GetNameWithNoTooltip]!"

 turmoil_in_brandenburg.1105.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1105.desc: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che la $bra_wittelsbach_hyperlink$ non è più al potere da questo giorno in poi. Le terre di [root_country.GetName] cadono direttamente nelle mani di [hohenzollern_character.GetName], un fidato consigliere della $bra_wittelsbach_hyperlink_no_tt$."
 turmoil_in_brandenburg.1105.a: "Possa [hohenzollern_character.GetHeShe] governare con saggezza."

 turmoil_in_brandenburg.1106.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1106.desc: "Un ambasciatore di [emperor_country.GetName] è giunto alla nostra corte. Proclama che i sovrani $bra_wittelsbach_hyperlink$ riceveranno un avvertimento imperiale, ma manterranno il [root_country.GetFlavorRank]."
 turmoil_in_brandenburg.1106.a: "[root_country.GetNameWithNoTooltip] rimarrà per sempre proprietà della $bra_wittelsbach_hyperlink_no_tt$..."

 turmoil_in_brandenburg.1107.title: "La Resistenza di [root_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1107.desc: "Questo ostinato relitto di stato, [root_country.GetName], si rifiuta di piegarsi davanti a noi e al nostro dominio. È più che evidente che la loro incapace dirigenza manca di visione, e pertanto abbiamo più che abbastanza ragioni per sottometterli con la forza."
 turmoil_in_brandenburg.1107.a: "Non tolleriamo i traditori!"

 turmoil_in_brandenburg.1200.title: "Il Peso [bra_country.GetAdjectiveWithNoTooltip]"
 turmoil_in_brandenburg.1200.desc: "Dopo anni di mal governo della $bra_wittelsbach_hyperlink$, la casata di [emperor_dynasty.GetName] ha preso in mano l'amministrazione di [bra_country.GetName]. Sebbene le nostre intenzioni per il [bra_country.GetFlavorRank] siano genuine e nel loro migliore interesse, è evidente che i nostri sforzi non sono sufficienti a riparare i danni causati dall'abbandono della $bra_wittelsbach_hyperlink_no_tt$.\n\nUno dei nostri consiglieri di corte, [hohenzollern_character.GetName], ha dimostrato grande competenza in materia di amministrazione e diplomazia. Affidare a [hohenzollern_character.GetHimHer] la guida di [bra_country.GetNameWithNoTooltip] e concedergli la necessaria autonomia potrebbe aiutare [bra_country.GetNameWithNoTooltip] a riprendersi."
 turmoil_in_brandenburg.1200.a: "Affideremo a [hohenzollern_character.GetShortNameWithNoTooltip] il [bra_country.GetFlavorRank]."
 turmoil_in_brandenburg.1200.a.tt: "Il [ruler|e] di [bra_country.GetName] sarà sostituito con [hohenzollern_character.GetName]"
 turmoil_in_brandenburg.1200.b: "Sciocchezze. Possiamo ancora guidare [bra_country.GetNameWithNoTooltip] noi stessi."

 turmoil_in_brandenburg.1201.title: "[hohenzollern_character.GetNameWithNoTooltip] - Il Nuovo Sovrano di [bra_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1201.desc: "Dopo anni di mal governo della $bra_wittelsbach_hyperlink$, i signori di [emperor_country.GetName] hanno preso il controllo di [bra_country.GetName]. Sebbene le loro intenzioni siano nel nostro migliore interesse, i loro doveri verso la $bra_hre_hyperlink$ hanno reso impossibile governare le nostre terre con maggiore impegno rispetto al membro più entusiasta della dinastia $bra_wittelsbach_hyperlink_no_tt$.\n\nFortunamente per noi, [emperor_ruler.GetName] è consapevole della situazione e ha inviato il [emperor_ruler.GetHisHer] più talentuoso consigliere, [hohenzollern_character.GetName], per gestire [bra_country.GetNameWithNoTooltip] autonomamente."
 turmoil_in_brandenburg.1201.a: "Possa [hohenzollern_character.GetHeShe] governare con saggezza e forza."

 turmoil_in_brandenburg.1300.title: "L'Ascesa dei Baroni Predoni"
 turmoil_in_brandenburg.1300.desc: "Il debole controllo sul [ROOT.GetCountry.GetGovernment.GetRulerTitle] e la generale illegalità hanno portato all'ascesa dei Baroni Predoni - nobili che vivono di illegalità e conducono una vita criminale. La loro presenza non fa che indebolire il nostro controllo e minare l'autorità di [target_ruler.GetName]. Attualmente, la loro presa è più forte a [robber_baron_province.GetName]."
 turmoil_in_brandenburg.1300.a: "Li affronteremo a tempo debito."
